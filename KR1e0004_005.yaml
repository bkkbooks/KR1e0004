body:
  text: 春秋左傳注䟽卷五起桓公三年盡六年晉杜氏注唐陸徳明音義孔頴逹䟽經三年春正月公㑹齊侯于嬴注經之首時必書王明此厯天王之所班也其或廢法違常失不班厯故不書王嬴齊邑今泰山嬴縣音義經三年正月從此盡十七年皆無王唯十年有王傳以為義或有王字者非嬴音盈䟽注正義曰桓公元年二年十年十八年凡四年於春有王九年春無王無月其餘十三年雖春有月悉皆無王穀梁傳曰桓無王其曰王何也謹始也其曰無王何也桓弟弑兄臣弑君天子不能定諸侯不能救百姓不能去以為無王之道遂可以至焉爾元年有王所以治桓也二年有王正與夷之卒也十年有王正終生之卒也十八年書王范寗注云此年書王以王法終治桓之事先儒多用糓梁之說賈逵云不書王弑君易枋田成宋亂無王也元年治桓二年治督十年正曹伯十八年終始治桓杜以正是王正厯從王出故以為王者班厯史乃書王明此厯天王之所班也其或廢法違常失不班厯則諸侯之史不得書王言此十三年無王皆王不班厯故也劉炫規過云然天王失不班厯經不書王乃是國之大事何得傳無異文又昭二十三年以後王室有子朝之亂經皆書王豈是王室猶能班厯又㐮二十七年再失閏杜云魯之司厯頓置两閏又哀十三年十二月螽杜云季孫雖聞仲尼之言而不正厯如杜所注厯既天王所班魯人何得擅改又子朝奔椘其年王室方亂王位猶且未定諸侯不知所奉復有何人尚能班厯昭二十三年秋乃書天王居于狄泉則其春未有王矣時未有王厯無所出何故其年亦書王也若春秋之厯必是天王所班則周之錯失不闗於魯魯人雖或知之無由輙得改正㐮二十七年傳稱司厯過再失閏者是周司厯也魯司厯也而杜釋例云魯之司厯始覺其謬頓置两閏以應天正若歴為王班當一論王命寧敢專置閏月改易嵗年哀十二年十二月螽仲尼曰火猶西流司厯過也杜於釋例又云季孫雖聞此言猶不即改明年復螽於是始悟十四年春乃置閏欲以補正時厯既言厯為王班又稱魯人輙改改之不惮於王亦復何須王厯杜之此言自相矛楯以此立說難得而通又案春秋經之闕文甚多其事非一亦如夫人有氏無姜有姜無氏及大雨霖廧咎如潰之類也此無王者正是闕文耳今刪定知此不書王非是經之闕文必以為失不班厯者杜之所據雖無明文若必闕文止應一事两事而已不應一公之内十四年並闕王字杜以周禮有頒告朔于邦國都鄙以有成文故為此說但齊桓晋文以前翼戴天子王室雖㣲猶能班厯至靈王景王以後王空卑㣲厯或諸侯所為亦遥禀天子正朔所以有子朝之亂經仍稱王不責人所不得也猶如大夫之卒公疾在外雖不與小歛亦同書日之限然則司厯之過魯史所改據此而言有何可責劉君不尋此㫖横生異同以規杜過恐非其義也夏齊侯衞侯胥命于蒲注申約言以相命而不㰱血也蒲衛地在陳留長垣縣西南音義約如字又於妙反㰱所洽反垣音袁六月公㑹杞侯于郕秋七月壬辰朔日有食之既注無傳既盡也厯家之說謂日光以望時遥奪月光故月食日月同㑹月奄日故日食食有上下者行有髙下日光輪存而中食者相奄宻故曰光溢出皆既者正相當而相奄間䟽也然聖人不言月食日而以自食為文闕於所不見䟽注正義曰食既者謂日光盡也故云既盡也月體無光待日照而光生半照即為弦全照乃成望望為日光所照反得奪月光者厯家之說當日之衝有大如日者謂之闇虗闇虚當月則月必滅光故為月食張衡靈憲曰當日之衝光常不合是謂闇虚在星則星㣲遇月則月食是言日奪月光故月食也若是日奪月光則應毎望常食而望亦有不食者由其道度異也日月異道有時而交交則相犯故日月逓食交在望前朔則日食望則月食交在望後望則月食後月朔則日食交正在朔則日食既前後望不食交正在望則月食既前後朔不食大率一百七十三日有餘而道始一交非交則不相侵犯故朔望不常有食也道不正交則日斜照月故月光更盛道若正交則日衝當月故月光即滅譬如火斜照水日斜照鏡則水鏡之光旁照他物若使鏡正當日水正當火則水鏡之光不能有照日之奪月亦猶是也日月同㑹道度相交月揜日光故日食日奪月光故月食言月食是日光所衝日食是月體所映故日食常在朔月食常在望也食有上下者行有髙下謂月在日南從南入食南下北髙則食起於下月在日北從北入食則食發於髙是其行有髙下故食不同也故異義云月髙則其食虧於上月下則其食虧於下也日月之體大小正同相揜宻者二體相近正映其形故光得溢出而中食也相揜䟽者二體相逺月近而日逺自人望之則月之所映者廣故日光不復能見而日食既也日食者實是月映之也但日之所在則月體不見聖人不言月來食日而云有物食之以自食為文闕於所不見也公子翬如齊逆女注禮君有故則使卿逆䟽注正義曰天子尊無與敵不自親逆使卿逆而上公臨之諸侯則親逆有故得使卿八年祭公逆王后于紀傳曰禮也是當使人天子不親逆也㐮十五年傳曰官師從單靖公逆王后于齊卿不行非禮也是知天子之禮當使卿逆而上公臨之也禮記哀公問曰冕而親迎不已重乎孔子對曰合二姓之好以継先聖之後以為天地宗廟社稷之主君何謂已重乎此對哀公指言魯事是諸侯正禮當親逆也荘二十四年公如齊逆女丘明不為之傳以其得禮故也文四年逆婦姜于齊傳曰卿不行非禮也以卿不行為非禮知君有故得使卿逆也九月齊侯送姜氏于讙注讙魯地濟北蛇丘縣西有下讙亭巳去齊國故不言女未至於魯故不稱夫人音義讙呼端反蛇以支反公㑹齊侯于讙注無傳夫人姜氏至自齊注無傳告於廟也不言翬以至者齊侯送之公受之於讙冬齊侯使其弟年來聘有年注無傳五糓皆熟書有年䟽正義曰年訓為稔謂嵗為年者取其嵗榖一熟之義故禾稼既収農功畢入以其嵗豊於常故史書有年於䇿此書有年宣十六年書大有年榖梁傳曰五榖皆熟為有年五榖大熟為大有年杜取榖梁為說其義亦當然也周禮疾醫以五榖養病鄭𤣥云五榖麻黍稷麥豆即月令五時所食榖也賈云桓惡而有年豊異之也言有非其所宜有案昭元年傳曰國無道而年榖和熟天賛之也是言嵗豊為佐助之非妖異之物也君行既惡澤不下流遇有豊年輙以為異是則無道之世唯宜有大饑不宜有豊年非上天祐民之本意也且言有不宜有傳無其說釋例曰劉賈許因有年大有年之经有鸜鵒來巢書所無之傳以為經諸言有皆不宜有之辭也據經螟螽不書有傳發於魯之無鸜鵒不以有字為例也經書十有一年十有一月不可謂不宜有此年不宜有此月也螟螽俱是非常之災亦不可謂其宜有也傳三年春曲沃武公伐翼次于陘庭韓萬御戎梁𢎞為右注武公曲沃荘伯子也韓萬荘伯弟也御戎僕也右戎車之右䟽注正義曰武公荘伯子韓萬荘伯弟世夲世家文也周禮戎僕掌馭戎車戎右掌戎車之兵革使故知御為戎僕右是戎車之右也逐翼侯于汾隰注汾隰汾水邉音義汾扶云反汾水名下涇曰隰䟽注正義曰釋例曰汾水出太原故汾陽縣東南至晉陽縣西南經西河平陽至河東汾陽縣入河爾雅釋地云下溼曰隰知汾隰汾水邉也驂絓而止注驂騑馬音義驂七南反絓户卦反騑芳非反䟽注正義曰說文云騑驂旁馬是騑驂為一也初駕馬者以二馬夾轅而已又駕一馬與两服為参故謂之驂又駕一馬乃謂之駟故說文云驂駕三馬也駟一乗也両服為主以漸参之閊旁二馬遂名為驂故揔舉一乗則謂之駟指其騑馬則謂之驂詩稱两驂如舞二馬皆稱驂禮記稱說驂而􅉠之一馬亦稱驂是夲其初参遂以為名也驂馬在衡外挽靷毎絓於木由頸不當衡故也名騑者以駟馬有騑騑之容故少儀云騑騑翼翼是也夜獲之及欒共叔注共叔桓叔之傳欒賔之子也身傅翼侯父子各殉所奉之主故並見獲而死音義共音恭注同殉似俊反㑹于嬴成昏于齊也注公不由媒介自與齊侯㑹而成昏非禮也音義介音界䟽注正義曰此成昏謂聘文姜也詩刺魯桓公不能禁制文姜云取妻如之何匪媒不得既曰得止曷又極止言桓公以媒得文姜此云不由媒者公親㑹齊侯必無媒也詩舉正法以刺上傳據實事以觧經故不同耳夏齊侯衛侯胥命于蒲不盟也公㑹杞侯于郕杞求成也注二年入把故今來求成秋公子翬如齊逆女修先君之好故曰公子注昏禮雖奉時君之命其言必稱先君以為禮辭故公子翬逆女傳稱修先君之好公子遂逆女傳稱尊君命互舉其義音義好呼報反注同䟽注正義曰公子遂逆女傳言尊君命是奉時君之命也此言修先君之好是稱先君為辭也翬遂俱是逆女傳文各言其一是互舉其義昏禮納采辭曰某有先人之禮使某也請納采其納徴辭曰某有先人之禮使某也請納徴是男家辭也主人醴賔辭曰子為事故至於某之室某有先人之禮請醴從者是女家辭也彼士禮也故稱先人若諸侯則稱先君以此知其言必稱先君以為禮辭齊侯送姜氏非禮也凡公女嫁于敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之注齊侯送姜氏本或作送姜氏于讙公子則下卿送公子公女䟽正義曰昏以相敵為耦先以敵國為文然後於大國小國辨其所異姊妹於敵國猶上卿送之於大國則上卿必矣且姊妹禮於先君不以所嫁輕重雖則小國亦使上卿送也於小國則上大夫送之文承公子之下謂送公子非送姊妹也周禮序官唯有中大夫無上大夫也禮記王制曰諸侯之上大夫卿鄭𤣥云上大夫曰卿則上大夫即卿也又無上大夫矣而此云上大夫者諸侯之制三卿五大夫五人之中又復分為上下成三年傳曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫是分大夫為上下也冬齊仲年來聘致夫人也注古者女出嫁又使大夫随加聘問存謙敬序殷勤也在魯而出則曰致女在他國而來則揔曰聘故傳以致夫人釋之䟽注正義曰經書來聘傳言致夫人是行聘禮而致之也故知使大夫随加聘問特所以存謙敬序殷勤也其意言不堪事宗廟則欲以之歸也成九年季孫行父如宋致女與此事同而文異故辨之云在魯而出則曰致女在他國而來則揔曰聘是詳内畧外之文傳嫌其不同故以致夫人釋之芮伯萬之母芮姜惡芮伯之多寵人也故逐之出居于魏注為明年秦侵芮張本芮國在馮翊臨晋縣魏國河東河北縣音義芮如鋭反國名惡烏路反翊音翼䟽注正義曰地理志云馮翊臨晋縣芮郷故芮國也河東郡河北縣詩魏國也世夲芮魏皆姬姓尚書顧命成王将崩有芮伯為卿士名謚不見魏之初封不知何人閔元年晋獻公滅魏芮則不知誰滅之經四年春正月公狩于郎注冬獵曰狩行三驅之禮得田狩之時故傳曰書時禮也周之春夏之冬也田狩朷夏時郎非國内之狩地故書地音義狩手又反夏户雅反下同䟽注正義曰冬獵曰狩爾雅釋天文也易比卦九五王用三驅失前禽鄭𤣥云王者習兵於蒐狩驅禽而射之三則已法軍禮也失前禽者謂禽在前来者不逆而射之旁去又不射唯背走者順而射之不中則已是其所以失之用兵之法亦如之降者不殺奔者不禦皆為敵不敵已加以仁恩養威之道是説三驅之事也狩獵之禮唯有三驅故知行三驅之正禮得田獵之常時故傳曰書時禮也善其得時明禮皆無違矣周之春正月建子即是夏之仲冬也周禮大司馬仲冬教大閲遂以狩田是田狩從夏時也釋例曰三王異正朔而夏數為得天雖在周代於言時舉事皆據夏正故公以春狩而傳曰書時禮也隠五年公矢魚于棠傳曰言逺地也僖二十八年天王狩于河陽傳曰言非其地也舉地名者皆言其非地故知此郎非國内之狩地故書地也若國内狩地大野是也哀十四年傳曰西狩於大野經不書大野明其得常地故不書耳由此而言則狩于禚蒐于紅及比蒲昌間皆非常地故書地也田狩之地須有常者古者民多地狭唯在山澤之間乃有不殖之地故天子諸侯必於其封内擇隙地而為之僖三十三年傳曰鄭之有原圃猶秦之有具囿也是其諸國各有常狩之處違其常處則犯害民物故書地以譏之夏天王使宰渠伯紏來聘注宰官渠氏伯紏名也王官之宰當以才授位而伯紏攝父之職出聘列國故書名以譏之國史之記必書年以集此公之事書首時以成此年之嵗故春秋有空時而無事者今不書秋冬首月史闕文他皆放此音義紏居黝反䟽注正義曰周禮天官有大宰小宰宰夫知宰是官也傳言父在故名知伯紏是名自然渠為氏矣周禮大宰卿小宰中大夫宰夫下大夫未知伯紏是何宰也貶之乃書名則於法當書字但中下大夫例皆書字則此宰髙下猶未可量故注直言王官之宰不指小宰宰夫慎疑故也詩稱濟濟多士書戒無曠庶官為政有三擇人為急王官之宰當以才授位今其父居官而使子攝職是王者輕侮爵位遭人則可故書名以譏之紏之出聘事由於王而貶紏者王不應授紏紏不應受使二者俱有其過貶紏亦所以責王如宰咺之比也春秋編年之書四時畢具乃得為年此無秋冬知是史闕文也舊史先闕故仲尼因之膏盲何休以為左氏宰渠伯紏父在故名仍叔之子何以不名又仍叔之子以為父在稱子伯紏父在何以不稱子鄭箴之云仍叔之子者譏其㓜弱故畧言子不名之至於伯紏能堪聘事私覿又不失子道故名且字也鄭氏所箴與杜同云伯紏名且字非杜義傳四年春正月公狩于郎書時禮也注郎非狩地故書時合禮䟽注正義曰春秋之世狩獵多矣見於經者無數事焉良由得時得地則常事不書故也以獲麟在於大野得地則不書其地知地時並得則例皆不書此書公狩于郎必是有所譏刺所刺之意在於失常地也但傳於棠與河陽己云言非其地則非地之責於理已見而此狩得時恐并時亦刺駮出合禮而非禮自明故注申其意言郎非狩地唯時合禮以時合禮地非禮也公羊傳曰常事不書此何以書譏何譏爾逺也公羊說諸侯逰戲不得過郊故有逺近之言左氏無此義要言逺者亦是譏其失常地也夏周宰渠伯紏來聘父在故名秋秦師侵芮敗焉小之也注秦以芮小輕之故為芮所敗冬王師秦師圍魏執芮伯以歸注三年芮伯出居魏芮更立君秦為芮所敗故以芮伯歸将欲納之經五年春正月甲戌已丑陳侯鮑卒注未同盟而書名者來赴以名故也甲戌前年十二月二十一日已丑此年正月六日陳亂故再赴赴雖日異而皆以正月起文故但書正月愼疑審事故從赴两書音義鮑歩飽反䟽注正義曰僖二十三年傳例曰赴以名則亦書之檢經傳魯未與陳盟而書鮑名知其来赴以名故也隐八年蔡侯考父卒注云盖春秋前與惠公盟故赴以名案史記年表隐之元年是陳桓公之二十三年則桓公亦得與惠公盟而云未同盟者以蔡侯之卒去惠尚近故疑與惠公盟此去惠公年月已逺且自隐公以来陳魯未甞交好於惠公之世亦似無盟故以未同盟觧之也以長厯推之知甲戌己丑别月而赴者並言正月故両書其日而共言正月若其各以月赴亦應両書其月但此異年之事設令両以月赴則當於四年云十二月甲戌陳侯鮑卒五年正月己丑陳侯鮑卒夏齊侯鄭伯如紀注外相朝皆言如齊欲滅紀紀人懼而来告故書䟽注正義曰傳言朝經言如知如即朝也下文州公如曹與此相類故云外相朝皆言如也魯出朝聘例亦言如獨言外朝者經有公朝王所以不盡云公如故獨云外也朝聘而謂之如者爾雅釋詁云如往也朝者両君相見揖譲両楹之間聘者使卿通問鄰國執圭以致君命據行禮而為言也魯之君臣出適他國始行即書於䇿未知成禮以否經毎有在塗乃復是禮未必成故直云如言其往彼國耳不果必成朝聘也公朝王所則朝訖乃書故指朝言之此齊鄭朝紀亦應朝訖乃告但畧外故言如耳外相朝例不書而此獨書者傳言欲以襲紀紀人知之明其懼而告魯故書也天王使仍叔之子來聘注仍叔天子之大夫稱仍叔之子夲於父字㓜弱之辭也譏使童子出聘䟽注正意曰天子大夫例皆書字仍氏叔字知是天子大夫也公羊穀梁皆以仍叔之子為父老代父從政左氏直云弱也言其㓜弱不言父在則是代父嗣位非父在也伯紏身未居官攝行父事故稱名以貶之此子雖已嗣位而未堪從政故繋父以譏之譏王使童子出聘也蘓氏用公羊穀梁之義以為父老来聘非父沒義或當然葬陳桓公注無傳城祝邱注無傳齊鄭将襲紀故秋蔡人衛人陳人從王伐鄭注王自為伐鄭之主君臣之辭也王師敗不書不以告音義從如字又才用反大雩注傳例曰書不時也失龍見之時音義雩音于祭名見賢遍反螽注無傳蜙蝑之属為災故書音義螽音終蜙相容反蝑相魚反䟽注正義曰釋蟲云蜤螽蜙蝑楊雄方言云春黍謂之蜙蝑陸璣毛詩䟽云幽州人謂之春箕春箕即舂黍蝗類也長而青股鳴者或謂似蝗而小班黒其股状如瑇瑁又五月中以两股相切作聲聞十數歩爾雅又有蟿螽土螽樊光云皆蜙蝑之属然則螽之種類多故言属以包之傳稱凡物不為災不書知此為災故書冬州公如曹注不書奔以朝出也為下寔來書也曹國今濟隂定陶縣音義陶同勞反䟽正義曰周禮公之地封疆方五百里侯四百里伯三百里子二百里男一百里隐五年公羊傳曰天子三公稱公王者之後稱公其餘大國稱侯小國稱伯子男然則三公之外傳稱公者唯二王之後杞與宋耳此州公及僖五年晋人執虞公並是小國而得稱公者鄭𤣥王制注以為殷地三䓁百里七十里五十里武王克殷雖制五䓁之爵而因殷三䓁之地及周公制禮大國五百里小國百里所因殷之諸侯亦以功黜陟之其不滿者皆益之地為百里焉是以周世有爵尊而國小爵卑而國大者言爵尊國小盖指此州公虞公也案虞是克啇始封非為殷之餘國鄭𤣥之言不可通於此矣杜之所觧亦無明言唯世族譜云虞姬姓武王克啇封虞仲之庻係以為虞仲之後處中國為西吴後世謂之虞公服䖍云春秋前以黜陟之法進爵為公未知孰是或可甞為三公之官若虢公之属故稱公也以其無文故備言之劉炫難服云周法二王之後乃得稱公雖復周公太公之勲齊桓晋文之覇位止通侯未升上䓁州有何功得遷公爵若其爵得稱公土亦應廣安得爵為上公地仍小國若地被兼黜爵亦宜減安得地既削小爵尚尊崇此則理之不通也注正義曰如者朝也以朝出國不得書奔外朝不書以因来向魯故書其夲也世夲州國姜姓曹國伯爵譜云曹姬姓文王子叔振鐸之後也武王封之陶丘今濟隂定陶縣是也桓公三十五年魯隐公之元年也伯陽立十五年魯哀公之八年而宋滅曹地理志濟隂郡定陶縣詩曹國是也傳五年春正月甲戌己丑陳侯鮑卒再赴也於是陳亂文公子佗殺大子免而代之注佗桓公弟五父也稱文公子明佗非桓公母弟也免桓公太子音義佗大河反免音問父音甫公疾病而亂作國人分散故再赴䟽正義曰鄭𤣥論語注云病謂疾益困也夏齊侯鄭伯朝于紀欲以襲之紀人知之音義襲音習王奪鄭伯政鄭伯不朝注奪不使知王政䟽注正義曰隐三年傳稱王貳于虢謂欲分政於虢不復専任鄭伯也及平王崩周人将畀虢公政即周鄭交悪未得與之八年傳曰虢公忌父始作卿士于周於是始與之政共鄭伯分王政矣九年傳曰鄭伯為王左卿士然則虢公為右卿士與鄭伯夹輔王也此年王奪鄭伯政全奪與虢不使鄭伯復知王政故鄭伯積恨不復朝王秋王以諸侯伐鄭鄭伯禦之王為中軍虢公林父将右軍蔡人衛人属焉注虢公林父王卿士音義將子匠反下及注大将同周公黒肩将左軍陳人属焉注黒肩周桓公也鄭子元請為左拒以當蔡人衛人注子元鄭公子拒方陳音義拒俱甫反下同陳直覲反下文之陳及注同為右拒以當陳人曰陳亂民莫有鬭心若先犯之必奔王卒顧之必亂蔡衛不枝固将先奔注不能相枝持也音義卒尊忽反下同既而萃於王卒可以集事從之注萃聚也集成也音義萃似類反曼伯為右拒注曼伯檀伯音義曼音萬䟽注正義曰十五年傳曰鄭伯因櫟人殺檀伯昭十一年傳曰鄭京櫟實殺曼伯知一人也祭仲足為左拒原繁髙渠彌以中軍奉公為魚麗之陳先偏後伍伍承彌縫注司馬法車戰二十五乗為偏以車居前以伍次之承偏之隙而彌縫闕漏也五人為伍此盖魚麗陳法音義力知反注同縫扶容反乗䋲證反䟽注正義曰史記稱齊景公之時有田穣苴善用兵景公尊之位為大司馬六國時齊威王用兵行威大放穣苴之法乃使大夫追論古者司馬兵法而附穣苴其中凡一百五十萹號曰司馬法車戰二十五乗為偏是彼文也五人為伍周禮司馬序官文也戰于繻葛注繻葛鄭地音義繻音須命二拒曰旝動而鼓注旝旃也通帛為之盖今大将之麾也執以為號令音義旝古外反又古活反說文作檜建大木置石其上發機以磓敵麾許危反䟽注正義曰旝之為旃事無所出說者相傳為然成二年傳張侯曰師之耳目在吾旗鼓進退從之是在軍之士視将旗以進退也今命二拒令旝動而鼔望旗之動鼔以進兵明旝是可觀之物又旝字從㫃旌旗之類故知旝為旃也周禮司常通帛為旜故云通帛為之謂通用一絳帛無畫餙也鄭𤣥云凡旌旗有軍衆者畫異物無者帛而已郷遂大夫或載旜或載物衆属軍吏無所将如鄭之意則将不得建旃而此軍得有旃者僖二十八年傳曰城濮之戰晋中軍風于澤亡大斾之左旃是知戰必有旃故以旝為旃也鄭氏之言自謂治兵之時出軍所建不廢戰陳之上猶自用旃指麾今時為軍猶以旌麾號令故云盖今大将之麾執以為號令也賈逵以旝為發石一曰飛石引范蠡兵法作飛石之事以證之說文亦云建大木置石其上發機以磓敵與賈同也案范蠡兵法雖有飛石之事不言名為旃也發石非旌旗之比說文載之於部而以飛石觧之為不類矣且三軍之衆人多路逺發石之動何以可見而使二拒凖之為繫鼔候也注以旃說為長故從之蔡衛陳皆奔王卒亂鄭師合以攻之王卒大敗祝聃射王中肩王亦能軍注雖軍敗身傷猶殿而不奔故言能軍音義射食亦反中丁仲反殿多見反祝聃請從之公曰君子不欲多上人况敢陵天子乎苟自救也社稷無隕多矣注鄭於此收兵自退音義隕于敏反夜鄭伯使祭足勞王且問左右注祭足即祭仲之字盖名仲字冲足也勞王問左右言鄭志在苟免王討之非也音義勞力報反注同名仲字仲足一夲作名仲字足䟽注正義曰隐元年傳稱祭仲上云祭仲足此云祭足十一年傳云祭封人仲足此人雖名字互見而不知孰字孰名公羊以仲為字左氏先儒亦以為字但春秋之例諸侯之卿嘉之乃書字十一年經書祭仲而事無可嘉注意以仲為名故云名仲字仲足釋例曰伯仲叔季固人字之常然古今亦有以為名者而公羊守株専謂祭氏以仲為字既謂之字無辭以善之因托以行權人臣而善其行權逐君是亂人倫壊大教也說左氏者知其不可更云鄭人嘉之以字告故書字此為因有告命之例欲以苟免未是春秋之實也宰渠伯紏蕭叔大心皆以伯叔為名則仲亦名也傳又曰祭仲足或偏稱仲或偏稱足盖名仲字足也是辨其名仲之意也凡傳所記事必有意存焉此丁寕說鄭言其志在苟免知其意言王討之非也仍叔之子弱也注仍叔之子來聘童子将命無速反之心久留在魯故經書夏聘傳釋之於末秋䟽注正義曰此子來聘傳雖不言聘意盖為将伐鄭而遣告魯也經在伐鄭之上傳在伐鄭之下明其必有深意故注者原之以為童子将命無速反之心久㽞在魯故經書夏聘傳釋之於末秋譏其夏至而秋末反也下句更言秋大雩則秋未為未注云末秋者上有秋王以諸侯伐鄭此仍叔之文在秋事之末故云末秋也下文更云秋者自為欲顯天時更别言秋秋大雩書不時也注十二公𫝊唯此年及㐮二十六年有两秋此發雩祭之例欲顯天時以指事故重言秋異於凡事音義重直用反䟽注正義曰上既言秋王以諸侯伐鄭而此重言秋故觧之方𤼵雩祭之例湏辨雩祭之月欲顯言天時以指怠慢之事故重言秋異於凡事凡事則不湏毎事重舉時也㐮二十六年重言秋者彼注自釋中間有𥘉不言秋則嫌楚客過在他年凡祀啓蟄而郊注言凡祀通下三句天地宗廟之事也啓蟄夏正建寅之月祀天南郊音義蟄直力反正音征䟽注正義曰下三句謂雩甞烝也雩是祭天甞烝祭宗廟此無祭地而言祭地者因天連言地耳周禮天神曰祀地祗曰祭人鬼曰享對則别為三名散則総為一號禮諸侯不得祭天魯以周公之故得郊祀上帝故雩亦祀帝書𫝊皆不言魯得祭地盖不祭地也魯不祭地而注言天地者以𤼵凡言例雖因魯史經文然凡之所論総􅊶天子及諸國則凡公嫁女於天子諸卿皆行及王曰小童之例是也此凡祀亦総􅊶天子及諸國則有祭地之文故杜連言之釋例云凡祀舉郊雩烝甞則天神地祗人鬼之祭皆通其他羣祀不錄可知也礿祠及地祗經無其事故不備言亦約文以相􅊶也礿祠之祭過則亦書但無過時者故經不書耳夏小正曰正月唘蟄其𫝊曰言始發蟄也故漢氏之始以唘蟄為正月中雨水為二月莭及太𥘉以後更改氣名以雨水為正月中驚蟄為二月莭以迄於今踵而不改今厯正月雨水中四月小滿中八月秋分中十月小雪中注皆以此四句為建寅建巳建酉建亥之月則唘蟄當雨水龍見當小滿始殺當秋分閉蟄當小雪晉世之厯亦以雨水為正月中而釋例云厯法正月莭立春唘蟄為中氣者因𫝊有唘蟄之文故逺取漢𥘉氣名欲令𫝊與厯合其餘三者不可強同其名雖則不同其法理亦不異故釋例云案厯法有唘蟄驚蟄而無龍見始殺閉蟄此古人所名不同然其法推不得有異𫝊曰火伏而後蟄者畢此謂十月始蟄也至十一月則遂閉之猶二月之驚蟄既唘之後遂驚而走出始蟄之後又自閉塞也是言唘蟄為正月中閉蟄為十月中也注以閉蟄為十月而釋例云十一月遂閉之者以正月半蟄蟲唘户二月初則驚而走出十月半墊蟲始閉十一月初則遂閉之𫝊稱四者皆舉中氣言其至此中氣則卜此祭次月𥘉氣仍是祭限次月中氣乃為過時既以閉蟄為建亥之月又言十一月則遂閉之欲見閉蟄以後冬至以前皆得烝祭也故釋例云孟獻子曰唘蟄而郊郊而後謂春分也言得唘蟄當卜郊不應過春分也春分以前皆得郊則冬至以前皆得烝也釋例又曰僖公㐮公夏四月卜郊但譏其非所宜卜而不譏其四月不可郊也以建卯之月猶可郊知建子之月猶可烝也正由莭郤月前未渉後月中氣故耳𫝊夲不舉月為限而舉候以言者釋例曰凡十二月而莭氣有二十四共通三百六十六日分為四時間之以閏月故莭未必恒在其月初而中氣亦不得恒在其月之半是以𫝊舉天宿氣莭為文而不以月為正也土功作者不必月日故亦言龍見而畢務戒事也火見而致用水昏正而栽日至而畢此其大凖也是言凡候天時皆不以月為其莭有参差故也若周禮不舉天象故以月為正大司馬職曰中夏獻禽以享礿中冬獻禽以享烝言四時之祭不得後仲月非謂孟月不得烝也釋例曰周禮祭宗廟以四仲盖言其下限也下限至於仲月則上限起於孟月烝𧺫建亥之月則甞起建申之月此言始殺而甞謂建酉之月亦是下限也若仲是下限則周之正月得為烝祭春秋之例得常不書而八年書正月烝者釋例云經書正月烝得仲月之時也其夏五月復烝此為過時若但書夏五月烝則唯可知其非時故先發正月之烝而継書五月烝以示非時并明再烝凟也然仲月雖不過時而月莭有前有郤若使莭前月郤即為非禮此秋大雩是建午之月耳而傳言不時明渉其中莭故譏之釋例云龍星之體畢見謂立夏之月得此月則當卜祀過渉次莭則以過而書故秋雩書不時此渉周之立秋莭也言渉立秋莭者謂渉立秋之月中氣莭也過渉次莭亦謂中莭非初莭也若始渉初莭則不譏之矣如此傳注必是建寅之月方始郊天周之孟春未得郊也禮記明堂位曰魯君孟春乗大輅載弧韣以祀帝於郊季夏六月以禘禮祀周公於太廟季夏周之六月即孟春是周之正月矣又雜記云孟獻子曰正月日至可以有事於上帝七月曰至可以有事於祖七月而禘獻子為之如彼記文則魯郊以周之孟春而傳言唘蟄而郊者禮記後人所錄其言或中或否未必所言皆是正禮㐮七年傳孟獻子曰唘蟄而郊禮記左傳俱稱獻子而記言日至傳言唘蟄一人两說必有􅍝者若七月而禘獻子為之時應有七月禘矣烝甞過則書禘過亦應書何以獻子之時不書七月禘也是知獻子夲無此言不得云禮記是而左傳非也明堂位言正月郊者盖春秋之末魯稍僭侈見天子冬至祭天便以正月祀帝記者不察其夲遂謂正月為常明堂位後世之書其末章云魯君臣未甞相弑也禮樂刑法政俗未甞相變也春秋之世三君見弑髽而弔士有誄俗變多矣尚云無之此言既誣則郊亦難信以此知記言孟春非正禮也鄭𤣥注書多用䜟緯言天神有六地祗有二天有天皇大帝又有五方之帝地有崑崙之山神又有神州之神大司樂冬至祭於圜丘者祭天皇大帝北辰之星也月令四時迎氣於四郊所祭者祭五徳之帝太㣲宫中五帝坐星也春秋緯文耀鈎云太㣲宫有五帝坐星蒼帝其名曰靈威仰赤帝曰赤熛怒黄帝曰含樞紐白帝曰白招拒黒帝曰汁光紀五徳之帝謂此也其夏正郊天祭其所感之帝焉周人木徳祭靈威仰也魯無冬至之祭唯祭靈威仰耳唯鄭𤣥立此為義而先儒悉不然故王肅作聖證論引羣書以證之言郊則圜丘圜丘即郊天體唯一安得有六天也晋武帝王肅之外孫也泰始之初定南北郊祭一地一天用王肅之義杜君身處晋朝共遵王說集觧釋例都不言有二天然則杜意天子冬至所祭魯人唘蟄而郊猶是一天但異時祭耳此注直云祀天南郊不言靈威仰明與鄭異也劉炫云夏正郊天后稷配也冬至祭天圜丘以帝嚳配也龍見而雩注龍見建巳之月蒼龍宿之體昏見東方萬物始盛待雨而大故祭天逺為百穀祈膏雨音義見賢遍反注同宿音秀為于偽反䟽注正義曰天官東方之星盡為蒼龍之宿見謂合昏見也雩之言逺也逺為百穀祈膏雨逺者豫為秋収言意深逺也穀之種類多故詩毎言百穀舉成數也雨之潤物若脂膏然故謂甘雨為膏雨㐮十九年傳曰百穀之仰膏雨是也傳有言雩而經書大雩者賈逵云言大别山川之雩盖以諸侯雩山川魯得雩上帝故稱大月令云大雩帝用盛樂是雩帝稱大雩也此龍見而雩定在建巳之月而月令記於仲夏章者鄭𤣥云雩之正當以四月凡周之秋五月之中而早亦修雩祀而求雨因著正雩於此月失之矣杜君以為月令秦法非是周典穎子嚴以龍見即是五月釋例曰月令之書出自吕不韋其意欲為秦制非古典也穎氏因之以為龍見五月五月之時龍星已過於見此為強牽天宿以附㑹不韋之月令非所據而據既以不安且又自違左氏傳稱秋大雩書不時此秋即穎氏之五月而忘其不時之文而欲以雩祭是言月令不得與傳合也鄭𤣥禮注云雩之言吁也言吁嗟哭泣以求雨也郊雩俱是祈穀何獨雩為吁嗟旱而修雩言吁嗟可矣四月常雩於時未旱何當言吁嗟也賈服以雩為逺故社從之也始殺而甞注建酉之月隂氣始殺嘉穀始熟故薦甞於宗廟䟽注正義曰甞者薦於宗廟以甞新為名知必待嘉穀熟乃為之也詩稱八月其獲獲刈嘉穀在於八月知始殺為建酉之月隂氣始殺也釋例引詩蒹葭蒼蒼白露為霜以證始殺百草也月令孟秋白露降季秋霜始降然則七月有白露八月露結九月乃成霜時寒有漸嵗事稍成八月嘉穀熟所薦之物備故以建酉之月薦甞於宗廟案月令孟秋農乃登穀天子甞新先薦寝廟則似七月穀熟矣七月當甞祭而云建酉之月乃甞祭者以上下凖之始殺甞祭實起於建申之月今云建酉者言其下限然杜獨於甞祭舉下限者以秋物初熟孝子之祭必待新物故特舉下限而言之哀十三年子服景伯謂吴太宰曰魯将以十月上辛有事於上帝先公季辛而畢彼雖恐吴之辭亦是八月甞祭之騐也何則於時㑹吴在夏公至在秋景伯言然之時秋之初也若甞在建申當言九月不應逺指十月知十月是甞祭之常期周之十月是建酉之月也建酉是下限耳若莭前月郤孟秋物成亦可以孟秋甞祭故釋例云周禮四仲月言其下限若建申得嘗何以釋例又云始殺而甞謂建酉之月蒹葭蒼蒼白露為霜又以始殺唯建酉之月者以賈服始殺唯據孟秋不通建酉之月故釋例破賈服而為此言也先此則不可十四年八月乙亥甞乃是建未之月故注云先其時亦過也閉蟄而烝注建亥之月昆蟲閉户萬物皆成可薦者衆故烝祭宗廟釋例論之備矣音義閉必計反又必結反字林方結反烝之承反䟽注正義曰傳稱火伏而後蟄者畢周禮季秋内火則火以季秋入而孟冬伏昆蟲以孟冬蟄故知閉蟄是建亥之月也王制云昆蟲未蟄不以火田鄭𤣥云昆明也明蟲者得陽而生得隂而藏隂陽即寒温也祭統注云昆蟲謂温生寒死之蟲也是蟄蟲謂之昆蟲也月令仲春云蟄蠡咸動唘户始出出言唘户故蟄言閉户爾雅釋詁云烝衆也知萬物皆成可薦者衆故名此祭為烝過則書注卜日有吉否過次莭則書以譏慢也䟽注正義曰祭必當卜卜有吉否不吉則當改卜次旬故不可期以一日卜不過三故限以一月過渉次月之莭則書之以譏其慢冬淳于公如曹度其國危遂不復注淳于州國所都城陽淳于縣也國有危難不能自安故出朝而遂不還音義度待洛反復音服後不音者皆同難乃旦反經六年春正月寔來注寔實也不言州公者承上五年冬經如曹間無異事省文從可知音義寔時力反省所景反夏四月公㑹紀侯于成注成魯地在泰山鉅平縣東南秋八月壬午大閲注齊為大國以戎事徴諸侯之戍嘉美鄭忽而忽欲以有功為班怒而訴齊魯人懼之故以非時簡車馬音義閲音悦䟽正義曰公狩于郎公狩于禚皆書公大蒐大閲不書公者周禮雖四時教戰而遂以田獵但蒐閲車馬未必皆因田獵田獵從禽未必皆閲車馬何則怠慢之主外作禽荒豈待教戰方始獵也公及齊人狩于禚乃與鄰國共獵必非自教民戰以矢魚于棠非教戰之事主為逰戲而斥言公則狩于郎禚亦主為逰戲故特書公也大蒐大閲國家之常禮公身雖在非為逰戲如此之類例不書公定十四年大蒐于比蒲邾子來㑹公公身在蒐而經不書公知其法所不書以其國家大事非公私欲故也且比蒲昌間皆舉蒐地此不言地者盖在國簡閲未必田獵昭十八年鄭人簡兵大蒐在於城内此亦當在城内注正義曰大閲之禮在於仲冬今農時閲兵必有所為傳不言其意故注者原之於時四鄰與魯無怨又竟無征伐之處諸侯戍齊經所不見而傳說鄭忽怒事於大閲之上及十年鄭與齊衛来戰于郎知此大閲是懼鄭忽而畏齊人故以非時簡車馬也蔡人殺陳佗注佗立踰年不稱爵者篡立未㑹諸侯也傳例在荘二十二年䟽注正義曰殺陳佗傳無文不言無傳者以傳說此事在荘二十二年不是全無其事故不言無傳九月丁卯子同生注桓公子荘公也十二公唯子同是適夫人之長子備用大子之禮故史書之於䇿不稱大子者書始生也音義適丁歴反傳同長丁丈反䟽注正義曰適妻長子於法當為大子故以大子之禮舉之由舉以正禮故史書於䇿古人之立大子其禮雖則無文盖亦待其長大特加禮命如今之臨軒䇿拜始生之時未得即為大子也以其備用正禮故書其生未得命故不言大子也杜云十二公唯子同是適夫人之長子又云文公哀公其母並無明文未知其母是適以否盖其父未為君之前已生縂令是適亦不書也釋例云據公衡之年成公又非穆姜所生杜此注云子同是適夫人之長子備用大子之禮故史書之然則雖適夫人之長子不用大子之禮亦不書也冬紀侯來朝傳六年春自曹來朝書曰寔來不復其國也注亦承五年冬傳淳于公如曹也言奔則來行朝禮言朝則遂留不去故變文言寔來楚武王侵随注随國今義陽随縣䟽注正義曰世夲随國姬姓不知始封為誰随以此年見傳僖二十年經書椘人伐随自是以後遂為椘之私属不與諸侯㑹同至定四年吴入郢昭王奔随随人免之卒復椘國椘人徳之使列諸侯哀元年随侯見經其後不知為誰所滅使薳章求成焉注薳章椘大夫音義薳于委反軍于瑕以待之注瑕随地音義瑕下加反随人使少師董成注少師随大夫董正也音義少詩照反注及下同後皆倣此鬭伯比言於楚子曰吾不得志於漢東也我則使然注闘伯比椘大夫令尹子文之父我張吾三軍而被吾甲兵以武臨之彼則懼而協以謀我故難間也漢東之國随為大随張必棄小國注張自侈大也音義被皮寄反下注被甲同間間厠之間張豬亮反注同一音如字侈昌氏反又式氏反小國離楚之利也少師侈請羸師以張之注羸弱也音義羸劣追反注即下同熊率且比曰季梁在何益注熊率且比椘大夫季梁随賢臣音義率音律且子余反鬭伯比曰以為後圖少師得其君注言季梁之諫不過一見從随後卒當以少師為計故云以為後圖二年蔡侯鄭伯㑹于鄧始懼椘楚子自此遂盛終於抗衡中國故傳備言其事以終始之音義抗苦浪反䟽正義曰言此計今雖無益以為在後圖謀也言季梁之諫不過一見從耳少師得其君心君将必用其計若用少師則此謀必合故請示弱以希後日之利王毁軍而納少師注從伯比之謀少師歸請追楚師随侯将許之注信椘弱也季梁止之曰天方授椘椘之羸其誘我也君何急焉臣聞小之能敵大也小道大滛所謂道忠於民而信於神也上思利民忠也祝史正辭信也注正辭不虚稱君美今民餒而君逞欲注逞快也音義餒奴罪反餓也祝史矯舉以祭臣不知其可也注詐稱功徳以欺鬼神音義矯居兆反䟽正義曰椘之先君熊繹始封於椘在蠻夷之間食子男之地至此君始彊盛威服鄰國似有天助故云天方授楚臣聞小國之能敵大國也必小國得道大國滛辟如是乃得為敵也其意言随未有道而楚未為滛辟随不能敵楚也既言随未有道更說為道之事道猶道路行不失正名之曰道施於人君則治民事神使之得所乃可稱為道矣故云所謂道者忠恕於民而誠信於神也此覆說忠信之義於文中心為忠言中心愛物也人言為信謂言不虚妄也在上位者思利於民欲民之安飽是其忠也祝官史官正其言辭不欺誑鬼神是其信也今随國民皆饑餒而君快情欲是不思利民是不忠也祝史詐稱功徳以祭鬼神是不正言辭是不信也無忠無信不可謂道小而無道何以敵大君欲敵之臣不知其可也欲居之下椘也公曰吾牲牷肥腯粢盛豐備何則不信注牲牛羊豕也牷純色完全也腯亦肥也黍稷曰粢在噐曰盛音義牲音全腯徒忽反䟽注正義曰諸侯祭用太牢祭以三牲為主知牲為三牲牛羊豕也周禮牧人掌共祭祀之牲牷祭用純色故知牷謂純色完全言毛體全具也曲禮曰豚曰腯肥肥腯具文知腯亦肥也重言肥腯者古人自有複語耳服䖍云牛羊曰肥豕曰腯案禮記豚亦稱肥非獨牛羊也粢是黍稷之别名亦為諸穀之縂號祭之用米黍稷為多故云黍稷曰粢粢是穀之體也盛謂盛於噐故云在噐曰盛對曰夫民神之主也注言鬼神之情依民而行是以聖王先成民而後致力於神故奉牲以告曰博碩肥腯謂民力之普存也注博廣也碩大也謂其畜之碩大蕃滋也謂其不疾瘯蠡也謂其備腯咸有也注雖告神以博碩肥腯其實皆當兼此四謂民力適完則六畜既大而滋也皮毛無疥癬兼備而無有所闕音義畜吁又反下皆同蕃音煩瘯七木反夲又作蔟同蠡力果反說文作瘰云瘯瘰皮肥也疥音界癬息淺反說文云乾瘍奉盛以告曰絜粢豐盛謂其三時不害而民和年豐也注三時春夏秋奉酒醴以告曰嘉栗㫖酒注嘉善也栗敬謹也謂其上下皆有嘉徳而無違心也所謂馨香無䜛慝也注馨香之逺聞音義慝他得反聞音問又如字故務其三時修其五教注父義母慈兄友弟恭子孝親其九族以致其禋祀注禋絜敬也九族謂外祖父外祖母從母子及妻父妻母姑之子姊妹之子女子之子非已之同族皆外親有服而異族者也音義九族杜釋與孔安國鄭𤣥不同禋音因於是乎民和而神降之福故動則有成今民各有心而鬼神乏主注民饑餒也音義饑音飢君雖獨豐其何福之有君姑修政而親兄弟之國庶免於難随侯懼而修政楚不敢伐䟽正義曰鬼神之情依人而行故云夫民神之主也以民和乃神說故聖王先成其民而後致力於神言養民使成就然後致孝享由是告神之辭各有成百姓之意祭之所用有牲有食有酒耳聖人文餙詞義為立嘉名以告神季梁舉其告辭觧其告意故奉牲以告神曰博碩肥腯者非謂所祭之牲廣大肥充而已乃言民之畜産盡肥充皆所以得博碩肥腯者由四種之謂故又申說四種之事四謂者第一謂民力普徧安存故致第二畜之碩大滋息民力普存所以致之者由民無勞役養畜以時故六畜碩大蕃多滋息民力普存又致第三不有疾病疥癬所以然者由民力普存身無疲苦故所養六畜飲食以理埽刷依法故皮毛身體無疥癬疾病民力普存又致第四備腯咸有所以然者由民力普存人皆逸樂種種養畜羣牲備有也奉盛以告神曰絜粢豐盛者非謂所祭之食絜净豊多而已乃言民之糧食盡豊多也言豐絜者謂其春夏秋三時農之要莭為政不害於民得使盡力耘自事生産故百姓和而年嵗豊也奉酒醴以告神曰嘉栗㫖酒者非謂所祭之酒栗善味美而已乃言百姓之情上下皆善美也言嘉㫖者謂其國内上下羣臣及民皆有善徳而無違上之心若民心不和則酒食腥穢由上下皆善故酒食馨香非言酒食馨香無腥膻臭穢乃謂民徳馨香無䜛謏邪惡也所謂馨香縂上三者由是王者将說神心先和民志故務其三時使農無廢業修其五教使家道協和親其九族使内外無怨然後致其絜敬之祀於神明矣於是民俗大和而神降之福故動則有成戰無不克今民各有心或欲從主或欲叛君不得為無違上之心而鬼神乏主百姓饑餒民力彫竭不得為年嵗豐也民既不和則神心不說君雖獨豐其何福之有神所不福民所不與以此敵大必喪其師君且修政撫其民人而親兄弟之國以為外援如是則庻㡬可以免於祸難也告牲肥碩言民畜多告粢豐絜言民食多告酒嘉㫖不言民酒多而言民徳善者酒之與食俱以米粟為之於盛已言年豐故於酒變言嘉徳重明民和之意注正義曰劉炫云杜以博碩肥腯據牲體而言季梁推出此理嫌其不實故云其實皆當兼此四謂又民力普存非畜之形貎而季梁以之觧情又申之民力適完則得生養六畜故六畜既大而滋息也博碩言其形状大蕃滋言其生乳多碩大蕃滋皆複語也瘯蠡畜之小病故以為疥癬之疢也不疾者猶言不患此病也嘉善釋詁文也杜訓栗為謹敬言善敬為酒案詩實穎實栗與田事相連故栗為穟貎此栗與嘉善㫖酒相類故栗為謹敬之心即論語云使民戰栗與此相似劉炫以栗為穗貎而規杜過於理恐非父母於子並為慈但父主教訓母主撫養撫養在於㤙愛故以慈為名教訓爱而加教故以義為稱義者宜也教之義方使得其宜弟之於兄亦宜為友但兄弟相敬乃有長㓜尊卑故分出其弟使之為共言敬其兄而友愛釋詁云禋敬也故以禋為絜敬隐十一年注云絜齊以享謂之禋意亦與此同也漢世儒者說九族有二異義今禮戴尚書歐陽說九族乃異姓有属者父族四五属之内為一族父女昆弟適人者與其子為一族己女昆弟適人者與其子為一族已之女子子適人者與其子為一族母族三母之父姓為一族母之母姓為一族母女昆弟適人者與其子為一族妻族二妻之父姓為一族妻之母姓為一族古尚書說九族者從髙祖至𤣥孫凡九皆同姓謹案禮緦麻三月以上㤙之所及禮為妻父母有服明在九族中九族不得但施於同姓鄭駮云𤣥之聞也婦人歸宗女子雖適人守猶繫姓明不得與父兄為異族其子則然婚禮請期辭曰唯是三族之不虞欲及今三族未有不億度之事而迎婦也如此所云三族不當有異姓異姓其服皆緦禮雜記下緦麻之服不禁嫁女取婦是為異姓不在族中明矣周禮小宗伯掌三族之别名喪服小記說服之義曰親親以三為五以五為九以此言之知髙祖至𤣥孫昭然察矣是鄭從古尚書說以九族為髙祖至𤣥孫也此注所云猶是禮戴尚書歐陽䓁說以鄭𤣥駮云女子不得與父兄為異族故簡去其母唯取其子以服重者為先耳其意亦不異也不從古學與鄭說者此言親其九族詩刺不親九族必以九族者踈逺㤙情已薄故刺其不親而美其能親耳髙祖至父已之所禀承也子至𤣥孫己之所生育也人之於此誰或不親而美其能親也詩刺棄其九族豈復上遺父母下棄子孫哉若言棄其九族謂棄其出髙祖出曽祖者然則豈亦棄其出曽孫出𤣥孫者乎又鄭𤣥為昬必三十而娶則人年九十始有曽孫其髙祖𤣥孫無相及之理則是族終無九安得九族而親之三族九族族名雖同而三九數異引三族以難九族為不相值矣若緣三及九則三九不異設使髙祖喪𤣥孫死亦應不得為昬禮何不言九族之不虞也以此知九族皆外親有服而異族者也夏㑹于成紀來諮謀齊難也注齊欲滅紀故來謀之音義難乃旦反下同北戎伐齊齊使乞師于鄭鄭太子忽帥師救齊六月大敗戎師獲其二帥大良少良甲首三百以獻於齊注甲首被甲者首音義帥所類反少詩照反於是諸侯之大夫戍齊齊人饋之餼注生曰餼音義饋其媿反遺也餼許既反牲脭曰餼使魯為其班後鄭注班次也魯親班齊饋則亦使大夫戍齊矣經不書盖史闕文䟽注正義曰劉炫云在戍受饋而使魯為班明魯人在矣㐮五年戍陳書經此戍齊亦宜書今不書經疑史闕文以史䇿夲闕仲尼不得書之十年說此云北戎病齊諸侯救之或可魯亦往救但傳無魯事之騐魯必不救不湏觧之鄭忽以其有功也怒故有郎之師注郎師在十年公之未昏於齊也齊侯欲以文姜妻鄭大子忽大子忽辭人問其故大子曰人各有耦齊大非吾耦也詩云自求多福注詩大雅文王言求福由已非由人也音義妻七計反下及注同在我而已大國何為君子曰善自為謀注言獨絜其身謀不及國及其敗戎師也齊侯又請妻之注欲以他女妻之固辭人問其故大子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師昏也民其謂我何注言必見怪於民遂辭諸鄭伯注假父之命以為辭為十一年鄭忽出奔衛傳秋大閲簡車馬也九月丁卯子同生以大子生之禮舉之接以大牢注大牢牛羊豕也以禮接夫人重適也音義接如字鄭注禮記作㨗讀此者亦或㨗音䟽注正義曰大牢牢之大者三牲牛羊豕具為大牢儀禮少牢饋食之禮以羊豕為少牢以牲多少稱大小也詩公劉曰執豕于牢周禮充人掌繫祭祀之牲拴祀五帝則繋于牢芻之三月是牢者養牲之處故因以為名鄭𤣥詩箋云繫養曰牢是其義也禮記内則曰國君世子生告于君接以大牢文在三日負子之上則三日之内接之矣記云凡接子擇日鄭云雖三日之内必選其吉焉是三日之内擇日接之為子接母故記稱接子此傳舉之之下即云接以大牢亦以接子為文其實接母故云以禮接夫人重適也鄭𤣥云按讀為㨗㨗勝也謂食其母使補虗強氣也此言以禮接之則與鄭異也内則又云接子庶人特豚士特豕大夫少牢國君世子大牢其非冡子則皆降䓁卜士負之士妻食之注禮世子生三日卜士負之射人以桑弧蓬矢射天地四方卜士之妻為乳母音義食音嗣弧音胡蓬歩工反射天地食亦反䟽注正義曰四方以上皆内則文也内則又云卜士之妻大夫之妾使食子食謂乳也故以乳母言之鄭𤣥云桑弧蓬矢夲大古也天地四方男子所有事也士妻大夫之妾謂時自有子者定夲直云射四方無天地案禮云桑弧蓬矢六今無天地誤也賈逵云桑者木中之衆蓬者草中之亂取其長大統衆而治亂公與文姜宗婦命之注世子生三月君夫人沭浴於外寢立於阼階西郷世婦抱子升自西階君命之乃降盖同宗之婦音義阼才故反䟽注正義曰乃降以上皆内則文也鄭𤣥云子升自西階則人君見世子於路寝也見妾子就側室凡子生皆就側室以其生於側室見於路寝故從外而升階也㐮二年葬齊姜傳曰齊侯使諸姜宗婦來送葬諸姜是同姓之女知宗婦是同宗之婦也公與夫人共命之故使宗婦侍夫人公問名於申繻對曰名有五有信有義有象有假有類注申繻魯大夫音義繻音須以名生為信注若唐叔虞魯公子友以徳名為義注若文王名昌武王名發䟽注正義曰周夲紀稱大王見季厯生昌有聖瑞乃言曰我世當有興者其在昌乎則是大王見其有瑞度其當興故名之曰昌欲令昌盛周也其度徳命發則無以言之服䖍云謂若大王度徳命文王曰昌文王命武王曰發似其有舊說也舊說以為文王見武王之生以為必發兵誅暴故名曰發以類名為象注若孔子首象尼丘䟽注正義曰孔子世家云叔梁紇與顔氏禱於尼丘得孔子孔子生而首上汙頂故因名曰丘字仲尼是其象尼丘也取於物為假注若伯魚生人有饋之魚因名之曰鯉音義鯉音里䟽注正義曰家語夲姓萹云孔子年十九娶於宋幵官氏一嵗而生伯魚伯魚生魯昭公以鯉魚賜孔子孔子榮君之賜因名子曰鯉字伯魚此注不言昭公賜而云人有饋之者如家語則伯魚之生當昭公九年昭公庸君孔子尚少未必能尊重聖人禮其生子取其意而遺其人疑其非昭公故取於父為類注若子同生有與父同者不以國注國君之子不自以夲國為名也䟽注正義曰下云以國則廢名以國不可易須廢名不諱若以他國為名則不湏自廢名也且春秋之世晋侯周衛侯鄭陳侯吴衛侯晋之徒皆以他國為名以此知不以國者謂國君之子不得自以夲國為名不以山川者亦謂國内之山川下云以山川則廢主廢主謂廢國内之所主祭也若他國山川則非其主不湏廢也此雖因公之問而對以此法曲禮亦云名子者不以國不以日月不以隐疾不以山川則諸言不以者臣民亦不得以也此注以其言國故特云國君子耳其實雖非國君之子亦不得以國為名其言廢名廢禮之徒唯謂國君之子若使臣民之名國家不為之廢也然則臣民之名亦不以山川而孔子魯人尼丘魯山得以丘為名者盖以其有象故特以類命非常例也不以官不以山川不以隐疾注隐痛疾患辟不祥也䟽注正義曰鄭𤣥云隐疾衣中之疾也謂若黒臀黒肱矣疾在外者雖不得言尚可指擿此則無時可辟俗語云隐疾難為醫案周語單㐮公曰吾聞成公之生也其母夢神規其臀以黒曰使有晋國故命之曰黒臀此與叔虞季友復何以異而云不得名也且黒臀黑肱夲非疾病以證隐疾非其類也詩稱如有隐憂且隐為痛也以痛疾為名則不祥之甚故以為辟不祥不以畜牲注畜牲六畜䟽注正義曰爾雅釋畜於馬牛羊豕狗雞之下題曰六畜故鄭衆服䖍皆以六畜為馬牛羊豕犬雞周禮牧人掌牧六牲鄭𤣥亦以馬牛䓁六者為之然則畜牲一物養之則為畜共用則為牲故并以六畜觧六牲不以噐幣注幣玉帛䟽注正義曰周禮小行人合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼然則幣玉帛者謂此圭璋璧琮帛錦繡黼之属也以幣以幣為玉帛則噐者非徒玉噐服䖍以為俎豆罍彛犠象之属皆不可以為名也周人以諱事神名終将諱之注君父之命固非臣子所斥然禮既卒哭以木鐸狥曰舎故而諱新謂舎親盡之祖而諱新死者故言以諱事神名終将諱之自父至髙祖皆不敢斥言音義周人以諱事神名絶句衆家多以名字属下句鐸待洛反狗似俊反夲又作殉同舎音捨下同䟽正義曰自殷以往未有諱法諱始於周周人尊神之故為之諱名以此諱法敬事明神故言周人以諱事神子生三月為之立名終久必将諱之故須豫有所辟為下諸廢張夲也終将諱之謂死後乃諱之注正義曰君父之名固非臣子所斥謂君父生存之時臣子不得指斥其名也禮稱父前子名君前臣名鄭𤣥云對至尊無大小皆相名是對父則弟可以名兄對君則子可以名父非此則不可也文十四年傳曰齊公子元不順懿公之為政也終不曰公曰夫已氏注云猶言某甲是斥君名也彼以不順故斥其名知平常不斥君也成十六年傳曰欒書将載晉侯鍼曰書退國有大任焉得専之注云在君前故子名其父彼以對君故名其父知平常不斥父也雖不斥其名猶未是為諱曲禮曰卒哭乃諱鄭𤣥云敬鬼神之名也諱辟也生者不相辟名衛侯名惡大夫有石惡君臣同名春秋不非是其末為之諱故得與君同名但言及於君則不斥君名耳既言生已不斥死復為之加諱欲表為諱之莭故言然以形之禮既卒哭以木鐸狥曰舎故而諱新自寝門至於庫門皆禮記檀弓文也既引其文更觧其意謂舎親盡之祖而諱新死者也親盡謂髙祖之父服絶廟毁而親情盡也卒哭之後則以鬼神事之故言以諱事神又觧終将諱之所諱世數自父上至髙祖皆不敢斥言此謂天子諸侯禮也曲禮曰逮事父母則諱王父母不逮事父母則不諱王父母鄭𤣥云此謂庶人適士以上廟事祖雖不逮事父母猶諱祖以其立廟事之無容不為之諱也天子諸侯立親廟四故髙祖以下皆為諱親盡乃舎之既言以諱事神則是神名必諱文王名昌武王名發詩雝禘大祖祭文王之廟也其經曰克昌厥後周公制禮醢人有昌夲之菹七月之詩周公所作經曰一之日觱發烝民詩曰四方爰發皆不以為諱而得言之者古人諱者臨時言語有所辟耳至於制作經典則直言不諱曲禮曰詩書不諱臨文不諱是為詩為書不辟諱也由作詩不諱故祭得歌之尚書牧誓云今予發武成云周王發武王稱名告衆史官録而不諱知於法不當諱也金縢云元孫某獨諱者成王唘金縢之書親自讀之諱其父名口改為某既讀之後史官始録依王所讀遂即云某武成牧誓則宣諸衆人宣訖即録故因而不改也古者諱名不諱字禮以王父字為氏明其不得諱也屈原云朕皇考曰伯庸是不諱之騐也故以國則廢名注國不可易故廢名䟽注正義曰國名受之天子不可輙易若以國為名終卒之後則廢名不諱若未卒之前誤以夲國為名則改其所名晉之先君唐叔封唐爕父稱晉若國不可易而晉得改者盖王命使改之以官則廢職以山川則廢主注改其山川之名䟽注正義曰廢主謂廢其所主山川之名不廢其所主之祭知者漢文帝諱恒改北嶽為常山諱名不廢嶽是也劉炫云廢主謂廢其所主山川不復更得其祀故湏改其山川之名魯改二山是其事也以畜牲則廢祀注名猪則廢猪名羊則廢羊以噐幣則廢禮晋以僖侯廢司徒注僖侯名司徒廢為中軍䟽正義曰祀以牲為主無牲則祀廢噐幣以行禮噐少則禮闕祀雖用噐少一噐而祀不廢且諸禮皆用噐幣故以廢禮縂之宋以武公廢司空注武公名司空廢為司城先君獻武廢二山注二山具敖也魯獻公名具武公名敖更以其鄉名山音義敖五羔反䟽注正義曰晋語云范獻子聘於魯問具敖之山魯人以其鄉對獻子曰不為具敖乎對曰先君獻武之諱也是以其郷對山也禮稱舍故而諱新親盡不復更諱計獻子聘魯在昭公之世獻武之諱久已舎矣而尚以其郷對者當諱之時改其山號諱雖已舎山不復名故依夲改名以其郷對猶司徒司空雖厯世多而不復故名也然獻子言之不為失禮而云名其二諱以自尤者禮入國而問禁入門而問諱獻子入魯不問故以之為慙耳是以大物不可以命公曰是其生也與吾同物命之曰同注物類也謂同日䟽注正義曰魯世家云桓公六年夫人生子與桓公同日故名之曰同是知同物為同日也言物類者辨此以為類命也冬紀侯來朝請王命以求成于齊公告不能注紀㣲弱不能自通於天子欲因公以請王命公無寵於王故告不能春秋左傳注䟽卷五春秋左氏傳注䟽卷五考證齊侯衛侯胥命于蒲臣召南按傳曰不盟也公羊曰近正穀梁曰近古皆以胥命為許之之詞荀子曰春秋善胥命荀子甞從虞卿受左氏春秋可見古人學春秋者皆以胥命為善宋儒疑胥命為自相推為侯伯恐未當也秋七月壬辰朔注日月同㑹月奄日東萊集觧引此奄作掩傳芮伯䟽芮則不知誰滅之臣召南按史記秦夲紀徳公元年梁伯芮伯来朝成公元年又來朝至繆公二十年秦滅梁芮是秦并其地也春正月公狩于郎注周之春夏之冬也田狩從夏時臣浩按傳云書時禮也益可為春秋所書春正月皆從周正之証不然春蒐禮也何以當春書狩而尚曰禮乎春正月甲戌已丑陳侯鮑卒臣浩按先儒趙匡疑甲戍下當有記陳佗作亂事今簡脱之葉夢得曰甲戌下無文經成而亡之也此較注再赴之說為長城祝邱臣召南按杜不注祝邱所在漢地理志東海郡即邱注孟康曰古祝邱傳命二拒曰旝動而鼓䟽周禮司常通帛為􅎶􅎶監夲訛作旝今改正又䟽說文載之於部臣浩按於部當作於部凡旗之属皆從㫃今各本皆誤未敢輙改傳鄭伯使祭足勞王注王討之非也臣召南按鄭寤生不臣至於抗拒六師射王中肩罪惡重大所惜周室㣲弱不能討耳杜注可謂昧於大義矣傳閉蟄而烝趙汸補注曰三代正朔不同故一以莭氣為限傳楚武王侵随陳傅良曰楚事始見於傳至荘十年敗蔡始見經臣召南按史記年表桓公六年楚武王之三十五年也楚世家三十五年伐随随人為之周請尊楚王室不聼還報椘則此時尚未稱王傳稱武王者追叙之文也傳君雖獨豐䟽此注所云猶是禮戴尚書歐陽䓁說刋夲脱尚書二字今補臣浩按文勢當作戴禮歐陽尚書䓁說或曰先言經而姓次之尊經也傳使魯為其班後鄭注經不書盖史闕文趙汸補注引陳氏曰凡諸侯交戍雖内不書春秋左氏傳注䟽卷五考證
