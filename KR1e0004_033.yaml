body:
  text: 春秋左傳注疏卷三十三起襄公十六年盡十八年晉杜氏注唐陸德明音義孔穎達疏經十有六年春王正月葬晉悼公注踰月而葬速也疏正義曰四年七月夫人姒氏薨八月葬我小君定姒才别月耳杜云踰月而葬速也今晉悼往年十一月卒此年正月葬積三月也杜亦云踰月而葬者踰越也所越有多有少俱是踰越之義故杜𢎞通兩解之三月公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于溴梁注不書髙厚逃歸故也溴水出河內軹縣東南至溫入河音義溴古闃反徐公壁反軹之氏反韋昭音枳疏正義曰傳於會溴梁之下晉侯與諸侯宴乃言髙厚逃歸則髙厚會訖乃逃也於會不書齊者以髙厚逃歸晉人怒之諸侯即有伐齊之志不與髙厚得為來會公歸告廟歷告所會不告髙厚故不書也戊寅大夫盟注諸大夫本欲盟髙厚髙厚逃歸故遂自共盟雞澤會重序諸侯今此間無異事即上諸侯大夫可知音義重直用反疏正義曰公羊以為溴梁之盟君若贅旒然穀梁云不曰諸侯之大夫大夫不臣也皆以為此時諸侯微弱權在大夫諸侯皆在而大夫自盟政教約信在於大夫其事不由君也不曰諸侯之大夫者刺大夫不臣也賈服取以為説言惡大夫專而君失權也案傳荀偃怒使諸侯大夫盟髙厚以君臣不敵故使大夫盟之君使之盟非自專也以齊人既有二心髙厚歌詩不類知小國必有從齊者也諸侯大夫本意欲盟髙厚髙厚雖已逃歸仍恐餘國有二故大夫遂自共盟使同會之國皆一其志也雞澤之會又隔袁僑如會故重言諸侯之大夫今此間無異事直言大夫即是上會諸侯之大夫不言諸侯以可知故也晉人執莒子邾子以歸注邾莒二國數侵魯又無道於其民故稱人以執不以歸京師非禮也音義數所角反疏正義曰十二年莒人伐我東鄙十四年莒人侵我東鄙十五年邾人伐我南鄙是邾莒二國數侵伐魯也凡例云君不道於其民則稱人以執知此二國君又皆無道於民故稱人以執之也諸侯不得相治故成十五年晉侯執曹伯僖二十八年晉人執衛侯皆書歸于京師此言以歸乃是自歸晉國故非禮也齊侯伐我北鄙注無傳齊二晉故夏公至自會注無傳五月甲子地震注無傳叔老會鄭伯晉荀偃衛寧殖宋人伐許注荀偃主兵當序鄭上方示叔老可以會鄭伯故荀偃在下疏正義曰春秋之例征伐則主兵者為先雖大夫為將諸侯從之亦以主兵為先僖二十七年楚人陳侯蔡侯鄭伯許男圍宋即其事也但禮卿不會公侯會伯子男可也方示叔老可以會鄭伯故退荀偃於下所以特見此義故發傳云為夷故也宋大於衛稱人而在衛下宋使大夫為將故也秋齊侯伐我北鄙圍郕音義郕音成大雩注無傳書過冬叔孫豹如晉傳十六年春葬晉悼公平公即位注平公悼公子彪音義彪彼蚪反羊舌肸為博注肸叔向也代士渥濁音義肸許乙反向許丈反疏正義曰成十八年傳士渥濁為大傅此代士渥濁亦當為大傅也宣十六年士會將中軍且為大傅注云大傅孤卿彼以中軍之將兼之故知是孤卿也士渥濁以大夫居之今此復代渥濁亦是大夫也昭五年傳楚子稱叔向為上大夫明此以上大夫為傅也諸侯之有孤卿猶天子之有三公無人則闕故隨其本官髙下而兼攝之也而衛冀隆不逹此意以士渥濁叔向等皆為卿故為大傅若是大夫何得居孤卿之任妄以難杜於義非也張君臣為中軍司馬注張老子代其父祁奚韓襄欒盈士鞅為公族大夫注祁奚去中軍尉為公族大夫去劇職就間官韓襄無忌子也音義間音間虞邱書為乘馬御注代程鄭音義乘繩證反改服修官蒸于曲沃注既葬改喪服修官選賢能曲沃晉祖廟蒸冬祭也諸侯五月而葬既葬卒哭作主然後蒸嘗於廟今晉踰月葬作主而蒸祭傳言晉將有溴梁之會故速葬音義蒸之承反警守而下會於溴梁注順河東行故曰下音義警居領反守手又反命歸侵田注諸侯相侵取之田以我故執邾宣公莒犂比公注犂比莒子號也十二年十四年莒人侵魯前年邾人伐魯晉將為魯討之悼公卒不克會故平公終其事音義犂徐力私反一音力兮反比音毗注同為于偽反下文為夷同且曰通齊楚之使注邾莒在齊楚往來道中故并以此責之經書執在大夫盟下既盟而後告音義使所吏反晉侯與諸侯宴于溫使諸大夫舞曰歌詩必類注歌古詩當使各從義類齊髙厚之詩不類注齊有二心故疏正義曰歌古詩各從其恩好之義類髙厚所歌之詩獨不取恩好之義類故云齊有二心劉炫云歌詩不類知有二心者不服晉故違其令違其令是有二心也荀偃怒且曰諸侯有異志矣使諸大夫盟髙厚髙厚逃歸注齊為大國髙厚若此知小國必當有從者疏正義曰荀偃不言齊有異志而云諸侯有異志故解之以髙厚若此故知小國必當有從者總疑諸侯有異志不獨疑齊故髙厚雖逃猶自諸國共盟也於是叔孫豹晉荀偃宋向戌衛寧殖鄭公孫蠆小邾之大夫盟曰同討不庭注自曹以下大夫不書故傳舉小邾以包之音義向舒亮反戌音恤蠆敕邁反許男請遷于晉注許欲叛楚諸侯遂遷許許大夫不可晉人歸諸侯注唯以其師討許之不肯遷鄭子蟜聞將伐許遂相鄭伯以從諸侯之師注鄭與許有宿怨故其君親行音義蟜居表反相息亮反穆叔從公注從公歸音義從才用反又如字注同齊子帥師會晉荀偃書曰會鄭伯為夷故也注夷平也春秋於魯事所記不與外事同者客主之言所以為文固當異也魯卿每會公侯春秋無譏故於此示例不先書主兵之荀偃而書後至之鄭伯時皆諸侯大夫義取皆平故得會鄭伯疏正義曰春秋於魯事所記不與外事同者於外則依實而言於魯則言不以實不實者魯國大小是宋衛之匹其常會序列當在宋下衛上及其書䇿皆云公會某侯雖會霸主亦魯在其上大夫出會魯亦在先如此者客主之言所以為文其言固當有異耳以主客之故先魯而後他國魯非實在先也傳稱在禮卿不會公侯而魯卿每會公侯春秋無譏文元年公孫敖會晉侯于戚是也杜云體例巳舉據用魯史成文是春秋無譏既常不譏無以示可否之義故於此變文以示例特言書曰是仲尼新意舊史當書荀偃在前今仲尼改之不先書主兵之荀偃而書後至之鄭伯以當時共伐許者皆是諸侯之大夫義取與鄭伯尊卑皆平得會鄭伯故也言後至之鄭伯者三月會於溴梁夏公至自會則鄭伯亦已歸矣五月之下始書伐許鄭伯聞將伐許乃從諸侯之師是諸侯謀伐已定鄭伯始來從之故杜言後至也夏六月次于棫林庚寅伐許次于函氏注棫林函氏皆許地音義棫為逼反徐于日反函音咸晉荀偃欒黶帥師伐楚以報宋揚梁之役注晉師獨進揚梁役在十二年音義黶於斬反楚公子格帥師及晉師戰于湛阪注襄城昆陽縣北有湛水東入汝音義格古核反湛市林反徐又丈林反一音直斬反阪音反徐又扶板反楚師敗績晉師遂侵方城之外注不書不告復伐許而還注許未遷故音義復扶又反秋齊侯圍成注成魯孟氏邑二晉故伐魯孟孺子速徼之注孟獻子之子莊子速也徼要也音義孺本又作孑焉正如住反速本亦作遫音同徼古堯反要一遙反齊侯曰是好勇去之以為之名速遂塞海陘而還注海陘魯隘道音義好呼報反陘音刑徐古定反隘於懈反冬穆叔如晉聘且言齊故注言齊再伐魯晉人曰以寡君之未禘祀注禘祀三年喪畢之吉祭音義禘大計反疏正義曰僖三十三年傳云凡君薨卒哭而祔祔而作主特祀於主蒸嘗禘於廟如彼傳文則既祔之後可以為蒸嘗也閔二年五月吉禘於莊公以其時未可吉書吉以譏之此年正月晉巳蒸于曲沃仍云未得禘祀知其禘祀是三年喪畢之吉祭也與民之未息注新伐許及楚不然不敢忘穆叔曰以齊人之朝夕釋憾於敝邑之地是以大請敝邑之急朝不及夕引領西望曰庶幾乎注庶幾晉來救音義朝夕如字下同憾本亦作感户暗反比執事之間恐無及也見中行獻子賦圻父注圻父詩小雅周司馬掌封畿之兵甲故謂之圻父詩人責圻父為王爪牙不修其職使百姓受困苦之憂而無所止居音義比必利反間音間行户郎反圻其依反父音甫注同疏正義曰此詩小雅篇刺宣王也云圻父子王之爪牙胡轉豫于恤靡所止居注云宣王之末司馬職廢此勇力之士責司馬云我乃王之爪牙之士當為王閎守之衛女何移於憂使我無所止居乎謂見使從軍與薑戌戰于千畝而敗之時也獻子曰偃知罪矣敢不從執事以同恤社稷而使魯及此注及此憂見范宣子賦鴻鴈之卒章注鴻鴈詩小雅卒章曰鴻鴈于飛哀鳴嗸嗸唯此哲人謂我劬勞言魯憂困嗸嗸然若鴻鴈之失所大曰鴻小曰鴈音義嗸五刀反劬求于反宣子曰丐在此敢使魯無鳩乎注鳩集也音義丐古害反鳩居久反疏正義曰釋詁云鳩聚也聚亦集之義國有兵寇則民人不得集聚也經十有七年春王二月庚午邾子牼卒注無傳宣公也四同盟音義牼苦耕反徐户耕反疏正義曰經不書葬故詳言其諡牼以成十八年即位其年盟于虛朾襄三年于雞澤五年于戚九年于戲十一年于亳城北十六年于溴梁皆魯邾俱在凡六同盟沈氏云去虛朾之盟又不數溴梁故為四劉炫以為杜氏誤非也宋人伐陳夏衛石買帥師伐曹注買石稷子秋齊侯伐我北鄙圍桃注辨縣東南有桃虛音義虛起居反髙厚帥師伐我北鄙圍防九月大雩注無傳書過宋華臣出奔陳注暴亂宗室懼而出奔實以冬出書秋者以始作亂時來告音義華户化反疏正義曰傳説此事文在冬下知其實以冬出經書在秋故知追以秋告實冬出而告以秋明以華臣始作亂時來告也但傳因華臣之出本其懼罪之由故於冬之下追言華閲卒耳其實華閲之卒或在九月之前華臣弱其室殺其宰當在九月內耳冬邾人伐我南鄙傳十七年春宋莊朝伐陳獲司徒卬卑宋也注司徒卬陳大夫卑宋不設備音義朝如字凡人名字皆放此卬五郎反注同衛孫蒯田于曹隧注越竟而獵孫蒯林父之子音義蒯苦怪反隧音遂竟音境飲馬于重邱注重邱曹邑音義飲於鴆反重直龍反毁其瓶重邱人閉門而詬之注詬罵也音義瓶步經反詬呼豆反罵馬嫁反曰親逐而君爾父為厲注厲惡鬼林父逐君在十四年疏正義曰蒯與其父共逐其君則是身親為惡故言親逐而君爾父為厲者父為惡首故以惡鬼罵之是之不憂而何以田為夏衛石買孫蒯伐曹取重邱注孫蒯不書非卿疏正義曰經書他國征伐例書元帥而已此經已書石買縱蒯是卿亦不書杜為此注者蘇氏云孫氏世為上卿蒯若是上卿應書蒯不書石買故云非卿也或曰事由孫蒯故決之曹人訴于晉注為明年晉人執石買傳音義訴悉路反齊人以其未得志于我故注前年圍成辟孟孺子秋齊侯伐我北鄙圍桃髙厚圍臧紇于防注防臧紇邑音義紇恨發反師自陽關逆臧孫至于旅松注陽關在泰山巨平縣東旅松近防地也魯師畏齊不敢至防音義近附近之近下居近同郰叔紇臧疇臧賈帥甲三百宵犯齊師送之而復注郰叔紇叔梁紇臧疇臧賈臧紇之昆弟也三子與臧紇共在防故夜送臧紇於旅松而復還守防音義郰側留反復還扶又反齊師去之注失臧紇故齊人獲臧堅注堅臧紇之族齊侯使夙沙衛唁之且曰無死注使無自殺音義唁音彥堅稽首曰拜命之辱抑君賜不終姑又使其刑臣禮於士以杙抉其傷而死注言使賤人來唁巳是惠賜不終也夙沙衛奄人故謂之刑臣音義杙羊職反抉鳥穴反徐又古穴反傷如字一本作瘍音羊疏正義曰來唁是君之恩賜使賤者唁是為惠不終也服虔云言君義巳故來唁之是惠賜也謂已無死不以義望已是不終也冬邾人伐我南鄙為齊故也注齊未得志於魯故邾助之音義為于偽反宋華閲卒華臣弱臯比之室注臣閲之弟臯比閲之子弱侵易之音義比音毗易以鼓反使賊殺其宰華吳賊六人以鈹殺諸盧門合左師之後注盧門宋城門合向戌邑後屋後音義鈹普皮反左師懼曰老夫無罪賊曰臯比私有討於吳遂幽其妻注幽吳妻也曰畀余而大壁注畀與也音義畀必利反注同宋公聞之曰臣也不唯其宗室是暴大亂宋國之政必逐之左師曰臣也亦卿也大臣不順國之恥也不如蓋之乃舍之疏正義曰服虔云蓋復蓋之言左師無鷹鸇之志而蓋不義之人故尤之此未必然正是左師諱國惡耻聞於外故蓋之耳非是畏華臣也左師為巳短䇿苟過華臣之門必騁注惡之音義騁勑領反惡烏路反年末注同疏正義曰服虔云䇿馬捶也自為短䇿過菙臣之門助御者擊馬而馳惡之甚也必為短策者私助御者不欲使人知也十一月甲午國人逐瘈狗瘈狗入於華臣氏國人從之華臣懼遂奔陳注華臣心不自安見逐狗而驚走音義瘈徐居世反一音制字林作狾九世反云狂犬也宋皇國父為大宰為平公築臺妨於農收注周十一月今九月收斂時音義大音泰後放此為平于偽反妨因芳收如字又手又反子罕請俟農功之畢公弗許築者謳曰澤門之晢實興我役注澤門宋東城南門也皇國父白晢而居近澤門音義謳烏侯反澤門本或作臯門者誤也晢星歷反徐思益反邑中之黔實慰我心注子罕黑色而居邑中音義黔徐音琴一音其廉反子罕聞之親執撲注撲杖音義撲普卜反以行築者而抶其不勉者曰吾儕小人皆有闔廬以辟燥溼寒暑注闔謂門户閉塞音義行下孟反抶耻乙反儕仕皆反闔戶獵反廬力居反疏正義曰月令仲春修闔扇鄭玄云用木曰闔用竹葦曰扇是闔為門扇所以閉塞廬舍之門戶也今君為一臺而不速成何以為役注役事也謳者乃止或問其故子罕曰宋國區區而有詛有祝禍之本也注傳善子罕分謗音義區邱于反詛莊慮反祝之又反齊晏桓子卒注晏嬰父也晏嬰粗縗斬注斬不緝之也縗在胸前粗三升布音義粗本又作粗縗本又作衰七雷反注同緝七入反疏正義曰喪服斬衰裳傳曰斬者何不緝也馬融云不緝不緶也謂斬布用之不緶其端也衰用布為之廣四寸長六寸當心故云在胸前也喪服傳曰衰三升鄭玄云布八十縷為升然則傳以三升之布布之最粗故謂之粗也以粗布為衰而斬之故以粗縗斬為文之次苴絰帶杖菅屨注苴麻之有子者取其粗也杖竹杖菅屨草屨音義苴七徐反絰直結反以苴麻為絰及帶杖禮記云苴杖竹也管古顔反屨九具反疏正義曰喪服云苴絰杖絞帶此傳帶不言絞亦當為絞帶也若要帶則謂之絰故喪服注云麻在首在要皆曰絰喪服傳曰苴絰者麻之有蕡者也杖竹杖也絞帶者繩帶也馬融云蕡者枲實枲麻之有子者其色粗惡故用之苴者麻之色鄭玄士喪禮注云苴麻者其貌苴服重者尚粗惡喪服及此傳絰帶杖三者皆在苴下言其色皆苴也絰帶用麻杖用竹麻竹雖異而其苴則同故三者共蒙苴也鄭玄云麻在首在要皆曰絰此言絰者謂首絰也凡喪服冠纓帶屨皆象吉時常服但變之使粗惡耳其衰與絰是新造以明義故特為立其名衰之言摧也絰之言實也明孝子之心實摧痛故制此服立此名也衰當心絰在首獨立名於心首者心是發哀之主首是四體之先故制服以表之要絰之下又有絞帶絰殺首絰五分之一絞帶殺要絰亦然雖大小有三等而同用苴麻喪服杖在帶上此傳杖在帶下者喪服具明其服故杖在上然後言絞帶冠繩纓此傳略言其禮欲明帶與絰俱用麻故杖在帶下喪服傳云菅屨者菅菲也菲者屨之别名故杜注云草屨也食鬻居倚廬寢苫枕草注此禮與士喪禮略同其異唯枕草耳然枕凷亦非喪服正文音義鬻之六反一音羊六反謂朝一溢米暮一溢米倚廬於綺反廬倚東墻而為之故曰倚廬苫傷廉反編草也枕之鴆反注同王儉云夏枕凷冬枕草凷苦對反一音苦怪反疏正義曰喪服傳文及士喪禮記皆云居倚廬寢苫枕凷啜粥朝一溢米夕一溢米是此禮與士喪禮略同其異者唯彼言枕凷此言枕草耳然枕凷者乃是禮記及喪服傳耳亦非喪服正文杜意言古禮未必無枕草之法也居倚廬寢苫者鄭玄云用木為廬在中門外東方北戶苫編稿也此初喪為然其既虞之後則每事有變具於禮文鄭玄云二十兩曰溢為米一升二十四分升之一知者古者一斛百二十斤一斗十二斤十二斤百九十二兩一升十九兩二分少八分未充二十兩更取一升分作百九十二分二十四分取一得八分添前十九兩二分是為二十兩也其老曰非大夫之禮也注時之所行士及大夫縗服各有不同晏子為大夫而行士禮其家臣不解故譏之音義解音蟹疏正義曰雜記云大夫為其父母兄弟之未為大夫者之喪服如士服士為其父母兄弟之為大夫者之喪服如士服如彼記文則大夫與士喪服不同記是後人所記記當時之事今此晏子之老亦譏晏子所為非大夫之禮是時之所行士及大夫喪服各有不同也晏子實為大夫而行當時之士禮晏子反時以從正其家老不解謂晏子為失故據時所行而譏之也晏子其父始卒則晏子未為大夫言晏子為大夫者禮喪服大夫之子得從大夫之法曰唯卿為大夫注晏子惡直巳以斥時失禮故孫辭略答家老疏正義曰檀弓云魯穆公之母卒使人問於曾申曾申對曰哭泣之哀齊斬之情饘粥之食自天子逹然則天子以下其服父母尊卑皆同無大夫士之異晏子所行是正禮也言唯卿得服大夫服我是大夫得服士服又言己位卑不得從大夫之法者是惡其直已以斥時之失禮故孫辭略答家老也家語曽子問此事孔子云晏平仲可謂能辟害也不以已是而駮人之非孫辭以辟咎義也夫家語雖未必是孔子之言要其辭合理故王肅與杜皆為此説鄭玄注雜記引此傳言晏子云唯卿為大夫此平仲之謙也言喪服服布粗衰斬衰三升義服斬衰三升半為母服齊衰四升正服齊衰五升義服齊衰六升降服大功七升正服大功八升義服大功九升降服小功十升正服小功十一升義服小功十二升緦麻十五升去其半鄭注雜記云士為父斬衰縷如三升半而三升不緝言縷之精粗如三升半成布而縷三升故云粗衰在齊斬之間鄭又云士為母衰五升縷而四升為兄弟衰六升縷而五升鄭玄以雜記之文士為父母兄弟之服不得與大夫同皆縷細降一等其縷數與大夫同但雜記之文記當時之制以當時大夫與士有異故為此解非杜義也經十有八年春白狄來注不言朝不能行朝禮夏晉人執衛行人石買注石買即是伐曹者宜即懲治本罪而晉因其為行人之使執之故書行人以罪晉音義使所吏反秋齊師伐我北鄙注不書齊侯齊侯不入竟音義竟音境冬十月公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊注齊數行不義諸侯同心俱圍之音義數所角反曹伯負芻卒于師注無傳禮當與許男同三同盟音義芻初俱反疏正義曰僖四年許男新臣卒傳曰葬之以侯禮也凡諸侯薨于朝會加一等諸侯命有三等男加一等葬之以侯禮此曹是伯爵與許男同當葬以公禮也彼許男之卒不書于師此言卒于師者釋例曰若卒于朝會或書師或書地者史之成文非義例所存也負芻以成十四年即位十五年盟於戚十七年于柯陵襄五年于戚九年于戲十一年于亳城北十六年于溴梁凡六同盟不數成公之盟溴梁是大夫去之是為三劉炫以杜為誤非也楚公子午帥師伐鄭傳十八年春白狄始來注白狄狄之别名未嘗與魯接故曰始夏晉人執衛行人石買于長子執孫蒯于純留注長子純留二縣今皆屬上黨郡孫蒯不書父在位蒯非卿音義長丁丈反或如字純徒溫反或如字地理志作屯為曹故也注前年衛伐曹音義為于偽反秋齊侯伐我北鄙中行獻子將伐齊夢與厲公訟弗勝注厲公獻子所弒者音義弒申志反公以戈擊之首隊於前跪而戴之奉之以走見梗陽之巫臯注梗陽晉邑在太原晉陽縣南臯巫名也夢并見之音義隊直位反跪其委反奉芳勇反梗古杏反臯古刀反他日見諸道與之言同注巫亦夢見獻子與厲公訟巫曰今兹主必死若有事於東方則可以逞注巫知獻子有死徴故勸使快意伐齊獻子許諾晉侯伐齊將濟河獻子以朱絲係玉二玨注雙玉曰玨音義玨古學反而禱曰齊環怙恃其險負其衆庶注環齊靈公名負依也音義禱丁老反一音丁報反怙音戶棄好背盟陵虐神主注神主民也謂數伐魯殘民人音義好呼報反背音佩數所角反曾臣彪將率諸侯以討焉注彪晉平公名稱臣者明上有天子以謙告神曾臣猶末臣疏正義曰王制云五嶽視三公四瀆視諸侯則諸侯於河神其辭不得稱臣故解其意稱臣者以明上有天子言已是天子之臣以謙告神也曽祖曽孫者曽為重義諸侯之於天子無所可重曽臣猶末臣謙卑之意耳其官臣偃實先後之注守官之臣偃獻子名音義先悉薦反後戶豆反守手又反又如字苟捷有功無作神羞注羞恥也官臣偃無敢復濟注偃信巫言故以死自誓音義復扶又反下注復欲同唯爾有神裁之沈玉而濟冬十月會于魯濟尋溴梁之言同伐齊注溴梁在十六年盟曰同討不庭音義沈音鴆或如字濟子禮反齊侯禦諸平隂塹防門而守之廣里注平隂城在濟北盧縣東北其城南有防防有門於門外作塹橫行廣一里故經書圍音義禦魚吕反塹七艷反廣古曠反注同疏正義曰平隂城南有防者形猶在杜觀其迹而知之也言塹防門而守之明是齊人自於門外作塹以固守也此平隂齊邑而言圍齊者沈氏云君在故稱圍劉炫云案下傳范鞅門於雍門又門于揚門州綽門于東閭既門其三門即是圍事杜何知不以門于三門為圍必以禦諸平隂為圍乎今刪定知不然者案上九年諸侯伐鄭傳稱門其三門而經不稱圍則攻門非圍也此傳云塹防門而守之則是被圍之道劉以門其三門為圍而規杜氏非也夙沙衛曰不能戰莫如守險注謂防門不足為險弗聽諸侯之士門焉齊人多死范宣子告析文子注析文子齊大夫子家音義析星歷反曰吾知子敢匿情乎魯人莒人皆請以車千乘自其鄉入既許之矣若入君必失國子盍圖之子家以告公公恐晏嬰聞之曰君固無勇而又聞是弗能久矣注不能久敵晉音義匿女力反乘繩證反盍戶獵反恐曲勇反齊侯登巫山以望晉師注巫山在盧縣東北晉人使司馬斥山澤之險雖所不至必斾而疏陳之注斥候也疏建旌旗以為陳示衆也音義斥音尺一音昌夜反斾步蓋反陳直覲反注同使乘車者左實右偽以斾先注偽以衣服為人形也建斾以先驅輿曵柴而從之注以揚塵齊侯見之畏其衆也乃脫歸注脫不張旗幟音義脫敕括反注同一音他外反幟申志反一音赤志反丙寅晦齊師夜遁師曠告晉侯曰鳥烏之聲樂齊師其遁注鳥烏得空營故樂也音義遁徒困反樂音洛注同邢伯告中行伯注邢伯晉大夫邢侯也中行伯獻子曰有班馬之聲注夜遁馬不相見故鳴班别也音義别彼列反齊師其遁叔向告晉侯曰城上有烏齊師其遁十一月丁卯朔入平隂遂從齊師夙沙衛連大車以塞隧而殿注此衛所欲守險音義連大並如字隧音遂道也殿都練反下及注同殖綽郭最曰子殿國師齊之辱也注奄人殿師故以為辱音義最徐子會反子姑先乎乃代之殿衛殺馬於隘以塞道注恨二子故塞其道欲使晉得之音義隘於懈反晉州綽及之射殖綽中肩兩矢夾脰注脰頸也音義射食亦反下注同中丁仲反夾古洽反或古協反脰音豆疏正義曰説文云脰項也考工記云以脰鳴者又曰大體短脰數目顅脰公羊傳稱宋萬摶閔公絶其脰鄭玄何休皆以脰為頸頸之與項亦一物也曰止將為三軍獲不止將取其衷注不止復欲射兩矢中央音義衷音忠顧曰為私誓州綽曰有如日注言必不殺女明如日音義女音汝乃弛弓而自後縳之注反縳之音義弛式氏反本又作施音同疏正義曰下云其右具丙亦舍兵則此是州綽弛弓也其右具丙注州綽之右亦舍兵而縳郭最皆襟甲面縳注襟甲不解甲音義舍音捨襟其鴆反坐于中軍之鼓下晉人欲逐歸者魯衛請攻險注險固城守者音義守手又反己卯荀偃士丐以中軍克京兹注在平隂城東南乙酉魏綘欒盈以下軍克邿注欒黶死其子盈佐下軍平隂西有邿山音義邿音詩趙武韓起以上軍圍盧弗克十二月戊戌及秦周伐雍門之萩注秦周魯大夫趙武及之共伐萩也雍門齊城門音義雍於用反萩音秋本又作秋范鞅門于雍門其御追喜以戈殺犬于門中注殺犬示間暇音義間音間孟莊子斬其橁以為公琴注莊子孺子速也橁木名音義橁敕倫反又相倫反己亥焚雍門及西郭南郭劉難士弱率諸侯之師焚申池之竹木注二子晉大夫音義難乃多反又如字壬寅焚東郭北郭范鞅門于揚門注齊西門州綽門于東閭注齊東門左驂迫還于東門中以枚數闔注枚馬檛也闔門扇也數其板示不恐音義驂七男反迫音百還音旋一音患枚每回反數所主反注同闔戶獵反檛陟瓜反恐曲勇反齊侯駕將走郵棠注郵棠齊邑音義郵音尤大子與郭榮扣馬注大子光也榮齊大夫音義扣音口曰師速而疾略也注言欲略行其地無久攻意音義行下孟反將退矣君何懼焉且社稷之主不可以輕輕則失衆君必待之將犯之大子抽劍斷鞅乃止甲辰東侵及濰南及沂注濰水在東莞東北至北海都昌縣入海沂水出東莞蓋縣至下邳入泗音義輕遣政反下同斷音短濰本又作維音同沂魚依反莞音官蓋古害反邳蒲悲反泗音四鄭子孔欲去諸大夫注欲專權音義去起吕反下同將叛晉而起楚師以去之使告子庚子庚弗許注子庚楚令尹公子午楚子聞之使楊豚尹宜告子庚曰國人謂不榖主社稷而不出師死不從禮注不能承先君之業死將不能從先君之禮音義豚徒門反不榖即位於今五年師徒不出人其以不榖為自逸而忘先君之業矣注謂巳未嘗統師自出大夫圖之其若之何子庚歎曰君王其謂午懷安乎吾以利社稷也見使者稽首而對曰諸侯方睦於晉臣請嘗之注嘗試其難易也音義使所吏反易以䜴反若可君而繼之不可收師而退可以無害君亦無辱子庚帥師治兵於汾注襄城縣東北有汾邱城音義汾扶云反於是子蟜伯有子張從鄭伯伐齊注子張公孫黑肱子孔子展子西守二子知子孔之謀注二子子展子西音義守手又反下完守同完守入保注完城郭內保守子孔不敢會楚師楚師伐鄭次於魚陵注魚陵魚齒山也在南陽犫縣北鄭地音義犫尺由反右師城上棘遂涉潁次于旃然注將涉潁故於水邉權築小城以為進退之備旃然水出滎陽成臯縣東入汴音義旃之然反汴皮彥反蒍子馮公子格率鋭師侵費滑胥靡獻于雍梁注胥靡獻于雍梁皆鄭邑河南陽翟縣東北有雍氏城音義蒍本又作薳于委反馮皮氷反費扶味反滑于八反雍於用反右回梅山注在滎陽密縣東北音義回如字徐胡猥反侵鄭東北至于蟲牢而反子庚門于純門信于城下而還注信再宿也音義牢力刀反純如字一音市荀反涉於魚齒之下注魚齒山之下有滍水故言涉音義滍音雉甚雨及之疏正義曰楚師南行有大雨從北而南遂及楚師楚師多凍役徒幾盡晉人聞有楚師師曠曰不害吾驟歌北風又歌南風南風不競注歌者吹律以詠八風南風音微故曰不競也師曠唯歌南北風者聽晉楚之強弱音義凍丁弄反幾音祈驟仕救反疏注正義曰律吕雖有十二其風有八八風者乾風不周坎風廣莫艮風條震風明庶巽風清明離風景坤風涼兌風閶闔八方之風風别先有音曲總吹律吕以詠八方音曲今師曠以律吕歌南風音曲南風音微不與律聲相應故云不競服虔以為卯酉以北律吕為北風以南為南風與杜八風義違非杜義也多死聲楚必無功疏正義曰服虔云南風律氣不至故聲多死董叔曰天道多在西北注嵗在豕韋月又建亥故曰多在西北疏正義曰嵗星右行於天大率一嵗行一次二十八年嵗在星紀距此十一年郤而數之此年在豕韋豕韋一名娵訾當亥之次也周十二月夏之十月其月又建亥故曰多在西北南師不時必無功注不時謂觸嵗月叔向曰在其君之德也注言天時地利不如人和疏注正義曰孟子云天時不如地利地利不如人和春秋左傳注疏卷三十三春秋左氏傳注疏卷三十三考證公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于溴梁戊寅大夫盟臣召南按杜注以諸大夫本欲盟髙厚髙厚逃歸故遂自共盟雞澤會重序諸侯今此間無異事即上諸侯大夫可知非也公羊榖梁並謂政在大夫孫復曰溴梁之會不言諸侯之大夫者大夫無諸侯故也孫覺曰於時六卿專晉三桓擅魯齊之政出於崔髙衛之政歸於孫寧天下諸侯國政無不在大夫者孔子傷之蘇氏胡氏之説亦同證以論語則杜注非也疏駁賈服舊説未免曲護杜氏傳齊侯圍成注成魯孟氏邑臣浩按成即郕前年經傳皆書成此年經書圍郕傳書圍成其實一地齊侯伐我北鄙圍桃注辨縣東南有桃虛臣召南按辨縣即卞縣也卞辨古通用後漢郡國志魯國卞縣注即引此注髙厚帥師伐我北鄙圍防林堯叟曰伐我大夫將書大夫始此自隱以來齊伐我皆書人若君將書君自文十五年始大夫將書大夫自髙厚始傳華臣懼遂奔陳趙汸補注曰經書華臣出奔在秋而傳記其事在冬且詳其日月杜氏謂以始作亂時來告非也由左氏所據載籍或追録舊事日月訛舛不與經合傳姑仍之以示傳疑之意不得以從赴為辭也其傳記在前而經書在後者乃可言從赴耳他倣此傳妨於農收臣浩按注明曰收斂時音義明曰收如字知各本俱作妨於農功誤也今改正傳唯卿為大夫臣照按杜注孔疏俱據家語謂晏子遜辭避害不肯明言父母之喪無貴賤一也之義以觸時忌是也顧所謂唯卿為大夫者未明言其句旨蓋諸侯之卿視天子之大夫大夫視士故曰唯卿為大夫猶云今所行正侯國大夫之禮也傳晉人執衛行人注長子純留二縣今皆屬上黨郡臣召南按漢書地理志上黨郡長子師古注曰讀如長短之長屯留師古注曰屯音純晉志亦作屯留唯此作純傳齊侯禦諸平隂塹防門而守之注一段趙汸補注曰此言齊侯守平隂之防於書圍齊何與後十二月門其三門焚其四郭乃圍齊之事耳杜説非也顧炎武日知録曰注云故經書圍非也圍者圍齊非圍防門也傳衛殺馬於隘以塞道注欲使晉得之監本晉得之下衍一心字今刪傳楚子聞之使楊豚尹宜林堯叟曰楊豚邑大夫名宜傳右回梅山臣召南按注在滎陽密縣東北後漢郡國志河南尹密縣有梅山注引此注作在縣西北未知孰是又魚陵魚齒山注在南陽犨縣北而郡國志潁川郡襄城有汾邱有魚齒山注引此注蓋犨縣與襄城連界也傳吾驟歌北風又歌南風注故曰不競也監本于此句下衍師也二字今刪又疏艮風條條監訛作調今改正春秋左氏傳注疏卷三十三考證
