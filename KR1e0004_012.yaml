body:
  text: 春秋左傳注疏卷十二起僖公六年盡十四年晉杜氏注唐陸德明音義孔穎達疏經六年春王正月夏公會齊侯宋公陳侯衛侯曹伯伐鄭圍新城注新城鄭新密今滎陽密縣秋楚人圍許注楚子不親圍以圍者告諸侯遂救許注皆伐鄭之諸侯故不復更敘冬公至自伐鄭注無傳疏正義曰二十八年公會晉侯云云于溫諸侯遂圍許二十九年公至自圍許此年會伐鄭遂救許不稱至自救許而云至自伐鄭與溫會反者釋例曰諸若此類事勢相接或以始致或以終致蓋時史之異也此事當由公至自告廟所告不同史依告而書不為義例傳六年春晉侯使賈華伐屈夷吾不能守盟而行注賈華晉大夫非不欲校力不能守言不如重耳之賢將奔狄郤芮曰後出同走罪也注嫌與重耳同謀而相隨音義郤去逆反芮如鋭反不如之梁梁近秦而幸焉乃之梁注以梁為秦所親幸秦既大國且穆姬在焉故欲因以求入音義近附近之近夏諸侯伐鄭以其逃首止之盟故也注首止盟在五年圍新密鄭所以不時城也注實新密而經言新城者鄭以非時興土功齊桓聲其罪以告諸侯疏正義曰密是邑名鄭人新築密邑故傳稱密經不稱圍新密言圍新城傳云鄭所以不時城也解經言新城之意鄭以非時築城違禮害民齊桓聲其罪以告諸侯故書新城以新城為鄭之罪狀劉炫云先王之制諸侯無故不造城造城則攻其所造司馬法曰産城攻其所産是也秋楚子圍許以救鄭諸侯救許乃還冬蔡穆侯將許僖公以見楚子於武城注楚子退舍武城猶有忿志而諸侯各罷兵故蔡將許君歸楚武城楚地在南陽宛縣北音義見賢遍反罷扶罵反又扶買反宛於元反許男面縛銜璧大夫衰絰士輿櫬注縳手於後唯見其面以璧為質手縛故銜之櫬棺也將受死故衰絰音義衰七雷反注同櫬於覲反棺也為質如字一音置本又作贄音至縳如字舊扶卧反楚子問諸逢伯注逢伯楚大夫對曰昔武王克殷微子啓如是注微子啓紂庶兄宋之祖也疏正義曰案宋世家云微子開者殷帝乙之首子而帝紂之庶兄周武王克殷微子乃持其祭器造於軍門肉袒面縛左牽羊右把茅膝行而前以告於是武王乃釋微子復其位成王誅武庚乃命微子代殷之後國於宋史記之言多有錯繆微子手縛於後故以口銜璧又焉得牽羊把茅也此皆馬遷之妄也武王親釋其縛受其璧而祓之注祓除凶之禮音義祓芳弗反又音廢説文云除惡之祭也疏正義曰周禮女巫掌歲時祓除謂之祓除明是除凶之禮也襄二十九年稱公臨喪使巫以桃茢先祓殯此亦當以桃茢祓之焚其櫬禮而命之使復其所楚子從之經七年春齊人伐鄭夏小邾子來朝注無傳郳犂來始得王命而來朝也邾之别封故曰小邾鄭殺其大夫申侯注申侯鄭卿專利而不厭故稱名以殺罪之也例在文六年音義厭於鹽反傳同秋七月公會齊侯宋公陳世子欵鄭世子華盟于寧母注高平方與縣東有泥母亭音如寧音義母如字又音無注同方音房與音預泥乃麗反又音寧王奴兮反曹伯班卒注無傳五年同盟于首止公子友如齊注無傳罷盟而聘謝不敏也冬葬曹昭公注無傳傳七年春齊人伐鄭孔叔言於鄭伯曰諺有之曰心則不競何憚於病注競強也憚難也音義憚徒旦反難乃旦反下及八年經傳並同疏正義曰競強也言心則不能強盛則當須屈服於人何得難於屈弱之病而不下齊既不能強又不能弱所以斃也國危矣請下齊以救國音義下户嫁反公曰吾知其所由來矣疏正義曰孔叔既請鄭伯下齊公初欲下齊不知何事而來得説於齊後更云吾知其説齊所由來矣謂由殺申侯説齊之事得來矣姑少待我注欲以申侯説對曰朝不及夕何以待君音義朝如字夏鄭殺申侯以説于齊且用陳轅濤塗之譖也注濤塗譖在五年初申侯申出也注姊妹之子為出有寵於楚文王文王將死與之璧使行曰唯我知女女專利而不厭豫取豫求不女疵瑕也注從我取從我求不以女為罪釁音義女音汝下皆同疵似斯反又疾移反釁許靳反下文同後之人將求多於女注謂嗣君也求多以禮義大望責之女必不免我死女必速行無適小國將不女容焉注政狹法峻音義狹音洽既葬出奔鄭又有寵於厲公子文聞其死也曰古人有言曰知臣莫若君弗可改也已秋盟于寧母謀鄭故也管仲言於齊侯曰臣聞之招攜以禮懷逺以德注攜離也德禮不易無人不懷齊侯修禮於諸侯諸侯官受方物注諸侯官司各於齊受其方所當貢天子之物疏正義曰周禮大行人云侯服貢祀物甸服貢嬪物男服貢器物采服貢服物衛服貢材物要服貢貨物鄭玄云祀貢者犧牲之屬嬪物絲枲也器物尊彝之屬服物玄纁絺纊也材物八材也貨物龜貝也如彼禮文諸侯所貢之物皆以服數為差尚書禹貢任土作貢皆貢土地所生不計路之逺近然則周禮雖依服數亦貢土地所生不宜逺求他方之物以貢王也王室盛明之時每國貢有常職天子既衰諸侯惰慢貢賦之事無復定凖故霸主總帥諸侯尊崇天子量其國之大小號令所出之物傳言諸侯各使官司取齊約束受其方所當貢天子之物言其一聽齊令美齊侯能以禮服諸侯鄭伯使大子華聽命於會言於齊侯曰泄氏孔氏子人氏三族實違君命注三族鄭大夫音義泄息列反若君去之以為成我以鄭為內臣君亦無所不利焉注以鄭事齊如封內臣音義去起吕反齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子父不姦之謂禮守命共時之謂信注守君命共時事音義姦音干共音恭注同違此二者姦莫大焉公曰諸侯有討於鄭未捷今苟有釁從之不亦可乎注子華犯父命是其釁隙音義隙去逆反對曰君若綏之以德加之以訓辭而帥諸侯以討鄭鄭將覆亡之不暇豈敢不懼若總其罪人以臨之注總將領也子華姦父之命即罪人音義覆芳服反鄭有辭矣何懼注以大義為辭且夫合諸侯以崇德也會而列姦何以示後嗣注列姦用子華疏正義曰經書齊侯宋公陳世子款鄭世子華盟于寧母則已列於會矣管仲方云會而列姦何以示後嗣者桓公列之於會直是列其身耳管仲言列姦者謂將用其姦謀故杜云列姦用子華也不受子華之請即是會不列姦他國無事可記齊史無所不隱故下句言他國記姦則廢君盟齊史隱誨則損盛德也夫諸侯之會其德刑禮義無國不記記姦之位注位會位也子華為姦人而列在會位將為諸侯所記君盟替矣注替廢也音義替他計反作而不記非盛德也注君舉必書雖復齊史隱諱亦損盛德音義復扶又反君其勿許鄭必受盟夫子華既為大子而求介於大國以弱其國亦必不免注介因也音義介音界鄭有叔詹堵叔師叔三良為政未可間也齊侯辭焉子華由是得罪於鄭冬鄭伯使請盟于齊注以齊侯不聽子華故音義堵丁古反又音者間間厠之間閏月惠王崩襄王惡大叔帶之難注襄王惠王大子鄭也大叔帶襄王弟惠后之子也有寵於惠后惠后欲立之未及而卒音義惡烏路反大音泰叔又作州懼不立不發喪而告難于齊注為八年盟洮傳音義洮他刀反經八年春王正月公會王人齊侯宋公衛侯許男曹伯陳世子款盟于洮注王人與諸侯盟不譏者王室有難故洮曹地音義洮他刀反疏正義曰公羊傳曰王人微者曷為序乎諸侯之上先王命也榖梁傳曰王人之先諸侯何也貴王命也辨冕雖舊必加於首周室雖衰必先諸侯釋例以為中士稱名下士稱人此言王人是天子之下士也諸侯相與為盟所以同奬王室天子之臣不與諸侯同盟釋例曰未有臣而盟君臣而盟君是子可盟父故春秋王世子以下會諸侯者皆同會而不同盟是言王臣正法不與諸侯盟也二十八年踐土之盟傳稱王子虎盟諸侯于王庭杜云王子虎臨盟不同歃故不書宣七年傳曰諸侯盟于黑壤王叔桓公臨之以謀不睦杜云王叔桓公銜天子之命以監臨諸侯不同歃尊卑之别也哀十三年傳曰公會單平公晉定公吳夫差于黃差杜云平公周卿士也不書尊之不與會此三者王臣皆不與盟是其正法然也若天子初立王室不安命臣使結盟諸侯以安王室雖非正法事勢宜然既無褒美又無貶責此王人與諸侯盟不譏者王室有難王勑使來盟故也文十年及蘇子盟于女栗傳曰頃王立故也襄三年公會單子晉侯云云盟于雞澤杜云周靈王新即位使王官伯出與諸侯盟以安王室皆事與此同以情義可許故都無貶書二十九年翟泉之盟於時諸侯新睦王室無虞而王子虎下盟列國以瀆大典故貶稱王人是依禮不合故據法貶之春秋王臣與諸侯會盟凡十有餘事譏與不譏皆從此例鄭伯乞盟注新服未與會故不序列别言乞盟音義與音預下同疏正義曰鄭伯往年使子華聽命心猶未服齊桓拒子華之請故今始服從齊桓以其新服尚未與之會故不序列而别言乞盟止言乞盟不知與盟以否傳稱鄭伯乞盟請服也既言請服義無不受當是既盟之後而别與之盟諸言乞師皆乞得其師知此乞盟亦乞得其盟但盟理可見不復别言盟耳夏狄伐晉秋七月禘于大廟用致夫人注禘三年大祭之名大廟周公廟致者致新死之主於廟而列之昭穆夫人淫而與菽不薨於寢於禮不應致故僖公疑其禮歷三禘今果行之嫌異常故書之音義大音泰殺音試疏正義曰釋天云禘大祭也言其大於四時之祭故為三年大祭之名言每積三年而一為此祭也大廟廟之大者故為周公廟釋例曰三年喪畢致新死之主以進於廟廟之逺主當遷入祧於是乃大祭於大廟以審定昭穆謂之禘是説致者致新死之主於廟而列之昭穆也此致致哀薑也哀薑薨已多年非復新死而於今始致者傳發凡例夫人不薨于寢則不致哀薑例不應致故僖公疑其禮喪畢之日不作禘祭之禮以致之既不為哀薑作喪畢禘祭其禘自從閔公數之二年除閔喪為禘至五年復禘今八年復禘薑死以來已歷三禘今因禘祭果復行之三年一禘禘自是常不為夫人禘祭因禘而致夫人嫌其異於常禮故史官書之若其不致夫人則此禘得常不書為用致夫人而書之耳冬十有二月丁未天王崩注實以前年閏月崩以今年十二月丁未告傳八年春盟於洮謀王室也鄭伯乞盟請服也襄王定位而後發喪注王人會洮還而後王定位晉里克帥師梁由靡御虢射為右以敗狄于采桑注傳言前年事也平陽北屈縣西南有采桑津音義射食亦反梁由靡曰狄無恥從之必大克注不恥走故可逐里克曰懼之而已無速衆狄注恐怨深而羣黨來報虢射曰期年狄必至示之弱矣音義期音基本或作期注同夏狄伐晉報采桑之役也復期月注明期年之言驗秋禘而致哀薑焉非禮也凡夫人不薨于寢不殯于廟不赴于同不祔于姑則弗致也注寢小寢同同盟將葬又不以殯過廟據經哀薑薨葬之文則為殯廟赴同祔姑今當以不薨于寢不得致也音義祔音附疏正義曰夫人薨葬之禮有赴同祔姑反哭三事而已此説致之禮加以薨寢殯廟而不言反哭者蓋以致於廟者終始成其尊死生之禮畢不薨於寢死不得其所也不殯於廟葬之不以禮也死葬非禮則先神耻之故不具四事皆不合致反哭者直為書葬以否假使不書其葬夫人之禮亦成自是生者之可譏非為死者之有失雖不反哭亦得致之故於此不言反哭也注正義曰喪大記云男子不死於婦人之手婦人不死於男子之手君夫人卒於路寢既言婦人不死於男子之手必不得死於君之路寢言夫人卒於路寢謂卒於夫人之大寢對君路寢為小故云小寢也同者同盟之國也檀弓曰喪之朝也順死者之孝心也其哀離其室也故至於祖考之廟而後行殷朝而殯於祖周朝而遂葬士喪禮朝而遂葬與記正同知周法不殯于廟而此傳及襄四年皆云不殯于廟以為失禮知其將葬之時不以殯過廟耳殯過廟者將葬之時從殯宫出告廟乃葬非是殯尸於廟中也據經哀薑薨葬之文知其赴同祔姑可矣亦知其殯于廟者以元年十二月喪至二年五月始葬明至則殯于寢也既殯於寢自然葬當朝廟故據葬文亦知殯廟唯當以不薨于寢不得致耳冬王人來告喪難故也是以緩注有大叔帶之難宋公疾大子兹父固請曰目夷長且仁君其立之注兹父襄公也目夷兹父庶兄子魚也音義父音甫長丁丈反公命子魚子魚辭曰能以國讓仁孰大焉臣不及也且又不順注立庶不順禮遂走而退經九年春王三月丁丑宋公御説卒注四同盟音義御魚呂反説音悅疏正義曰御説以莊十三年即位十六年盟于幽十九年于鄄二十七年于幽僖元年于柳四年于召陸五年于首止七年于寧母八年于洮皆魯宋俱在是為八同盟不數莊公之盟柳盟經不書亦不數故云四同盟劉君乃數莊公之盟又不數召陵以為六同盟而規杜非也夏公會宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘注周公宰孔也宰官周采地天子三公不字宋子襄公也傳例曰在喪公侯曰子陳留外黃縣東有葵丘疏正義曰傳稱王使宰孔賜齊侯胙知周公即宰孔也其官為大宰采地名為周天子三公故稱公孔則其名也榖梁傳曰天子之宰通於四海其意言宰者六官之長官名通於海內是故書其官名也通於四海者當謂大宰之長官耳其屬官不應得通而宰咺宰渠伯紏則必非長官亦稱為宰者蓋自宰夫以上皆通也釋例曰今案春秋以考之其稱公者皆三公非五等之公也是言祭公周公皆三公也釋例又曰王之公卿皆書爵則卿亦不字杜云三公不字者以入春秋以來家父南季皆大夫稱字宰周公又承其後故云不字不於祭公逆王后注者因歷序諸國而言之莊八年傳曰連稱管至父戍葵丘杜云齊地臨淄縣西有地名葵丘與彼異者傳稱齊侯不務德而勤逺略西為此會則此地逺處齊西不得近在臨淄故釋例以為宋地陳留外黃縣東有葵丘或曰河東汾隂縣為葵丘非也經書夏會葵丘九月乃盟晉為地主無緣欲會而不及盟也是説不同之意秋七月乙酉伯姬卒注無傳公羊榖梁曰未適人故不稱國已許嫁則以成人之禮書不復殤也婦人許嫁而笄猶丈夫之冠音義復扶又反殤式羊反笄古兮反冠古喚反疏正義曰公羊傳曰此未適人何以卒許嫁矣婦人許嫁字而笄之死則以成人之喪治之榖梁傳意亦與之同嫁於大夫死不書卒此許嫁者嫁於國君也但未往彼國不成彼國之婦故不稱國也喪服小記曰男子冠而婦人笄其義一也是許嫁而笄猶丈夫之冠也禮男子冠而不為殤婦人笄而不為殤故以成人之喪治之為之服成人之服禮姊妹在室期出嫁大功檀弓曰姑姊妹之薄也蓋有受我而厚之者為夫厚之故我降之也曽子問云取女有吉日而女死如之何孔子曰壻齊衰而弔既葬而除之其夫不為服則兄弟不為降禮諸侯絶旁期此為將嫁於諸侯故書其卒既書其卒當服其本服為之齊衰期也但於時服否不可知耳九月戊辰諸侯盟于葵丘注夏會葵丘次伯姬卒文不相比故重言諸侯宰孔先歸不與盟音義比毗志反重直用反與音預疏正義曰平丘會後即盟不言諸侯為間無異事故也此亦會後為盟間有伯姬卒盟會文不相比故重言諸侯又傳稱宰孔先歸則宰孔不盟杜云宰孔先歸不與盟者欲見縱無伯姬之卒亦當重言諸侯甲子晉侯佹諸卒注未同盟而赴以名甲子九月十一日戊辰十五日也書在盟後從赴音義佹九委反疏正義曰甲子在戊辰之前而書在盟後從赴從赴者赴在盟後也春秋之世史失其守赴告之文多違禮制記諸侯之薨當具以薨之月日告於鄰國隱三年傳曰壬戌平王崩赴以庚戌故書之是赴者妄稱日也襄二十八年傳曰王人來告喪問崩日以甲寅告故書之是元赴不以日被問乃稱日也文十四年傳曰七月乙卯夜齊商人弒舍齊人定懿公使來告難故書以九月是赴者不言死月魯史不復審問即書以來告之月也此甲子晉侯卒蓋赴以日而不以月魯史不復審問書其來告之日唯稱甲子而已不知甲子是何月之日故在戊辰後也若赴以九月告魯魯史當推其日之先後不得甲子在戊辰後也明告不以月故書其日耳冬晉里克殺其君之子奚齊注獻公未葬奚齊未成君故稱君之子奚齊受命繼位無罪故里克稱名音義殺如字傳同公羊音試傳九年春宋桓公卒未葬而襄公會諸侯故曰子凡在喪王曰小童公侯曰子注在喪未葬也小童者童蒙幼稚之稱子者繼父之辭公侯位尊上連王者下絶伯子男周康王在喪稱子一人釗禮稱亦不言小童或所稱之辭各有所施此謂王自稱之辭非諸下所得書故經無其事傳通取舊典之文以事相接音義稱尺證反釗古堯反又音昭疏正義曰既言桓公未葬即發在喪之例知其在喪謂未葬也童者未冠之名童而又小故為童蒙幼稚之稱易蒙卦云匪我求童蒙童蒙求我蒙謂暗昧也幼童於事多暗昧是以謂之童蒙焉曲禮曰夫人自稱於其君曰小童鄭玄云小童若云未成人也王崩未葬嗣王自稱亦言已未成人也子者對父之名故云繼父之辭以未成君故繫於父不忍絶之稱也諸侯爵有五等唯言公侯曰子以公侯尊也傳稱在禮卿不會公侯會伯子男可也又子産云鄭伯男也使從公侯之貢懼弗給也是公侯之尊絶於伯子男也此既言王即云公侯是其與王相連特為公侯立稱伯子男不得同之也春秋無伯子男在喪之事既不為立稱又不得成君不知其當何所稱也然按桓十一年鄭忽出奔衛莊二十四年曹羈出奔陳杜云先君既葬不稱爵者國人賤之以名赴則既葬稱爵未葬稱名也周康王在喪稱子一人釗尚書康王之誥也曲禮云君天下者曰天子朝諸侯分職授政曰余一人天子未除喪曰余小子是禮天子自稱亦不言小童也此言王曰小童必有稱之時或所稱之辭各有所施但不知施何處耳如曲禮之文天子未除喪曰余小子則是未得稱一人而康王在喪稱豫一人釗者當以諸侯列土之君將欲各歸其國故正其成君之稱以答諸侯也此小童者王謙自稱之辭非諸下所得書故經無其事其公侯曰子乃是史書之文二者非相類之事而并為一凡是傳通取舊典之文以事相類接耳非言小童是策書之例也釋例郊雩蒸嘗例不云地祗及礿祠者經無其事故傳略而不言此王者小童亦經無其事所以言之者郊雩例多故經無者略之此王曰小童與公侯相接其文簡約經雖無事亦連而言之釋例曰位彌髙者事彌重重慮周於經逺故儀制異於凡人存其實篤其志足以敘親疏之情通萬事之理而已故諸列國之君在喪或不得已而修會盟之事唯公侯特稱子以别尊卑是言獨為公侯立稱之意春秋公侯稱子皆是其父未葬唯二十五年公會衛子莒慶盟于洮於時衛文公巳葬而成公稱子釋例曰衛文公欲平莒於魯未終而薨故衛子尋父之志魯人由此亦修文公之好此孝子之至感人情之所篤故成公雖已免喪至於此盟降從在喪之名故經隨而書子傳從而釋之云修文公之好也夏會于葵丘尋盟且修好禮也音義好呼報反下于好并注同王使宰孔賜齊侯胙注胙祭肉尊之比二王後音義胙才素反疏正義曰傳稱太子祭于曲沃歸胙于公此天子有事於文武賜齊侯以胙知胙是祭肉也周禮大宗伯以脤膰之禮親兄弟之國鄭玄云脤膰社稷宗廟之肉以賜同姓之國同福祿也脤膰即胙肉也言親兄弟之國則異姓不合賜也二十四年傳曰宋先代之後也於周為客天子有事膰焉是言二王之後禮合得之今賜齊候是尊之比二王後也曰天子有事於文武注有祭事也使孔賜伯舅胙注天子謂異姓諸侯曰伯舅疏正義曰曲禮曰五官之長曰伯天子同姓謂之伯父異姓謂之伯舅鄭玄云謂為三公者周禮九命作伯齊桓是九命之伯故以伯舅呼之齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜注七十曰耋級等也音義耋田節反一音他結反勞力報反級音急疏正義曰釋言云耋老也舍人云年六十稱也郭璞云八十為耋釋名云八十曰耋耋鐡也皮黑如鐡彼説或云六十或云八十杜云七十曰耋者耋之年齒既無明文曲禮云七十曰老爾雅以耋為老故以為七十曲禮升階之法云涉級聚足是級為等也法當下拜賜之勿下是進一級對曰天威不違顔咫尺注言天鑒察不遠威嚴常在顔面之前八寸曰咫音義咫之氏反疏正義曰顔謂額也揚雄方言云顔額謂顙也中夏謂之額東齊謂之顙河潁淮泗之間謂之顔魯語云肅慎氏貢楛矢長尺有咫賈逵亦云八寸曰咫説文云周制寸尺咫尋皆以人之體為法中婦人手長八寸謂之咫周尺也小白余敢貪天子之命無下拜注小白齊侯名余身也疏正義曰諸自稱余者當稱名之處耳齊侯既稱小白而復言余故解之余身釋詁文舍人曰余卑謙之身也孫炎田余舒遲之身也郭璞曰今人亦自呼為身恐隕越于下注隕越顚墜也據天王居上故言恐顛墜于下音義墜直類反下同以遺天子羞敢不下拜下拜登受注自堂下受胙於堂上音義遺于季反疏正義曰覲禮天子賜侯氏以車服諸公奉篋服加命書于其上升自西階東面大史氏右侯氏升西面立大史述命侯氏降兩階之間北面再拜稽首升成拜彼侯氏降階再拜是此下拜也升成拜是此登受秋齊侯盟諸侯于葵丘曰凡我同盟之人既盟之後言歸于好注義取修好故傳顯其盟辭宰孔先歸注既會先諸侯去音義先諸侯悉薦反遇晉侯曰可無會也注晉侯欲求會葵丘齊侯不務德而勤逺略故北伐山戎注在莊三十一年南伐楚注在四年西為此會也東略之不知西則否矣注言或向東必不能復西略音義復扶又反下不復會同其在亂乎君務靖亂無勤於行注在存也微戒獻公言晉將有亂晉侯乃還注不復會齊九月晉獻公卒里克丕鄭欲納文公故以三公子之徒作亂注丕鄭晉大夫三公子申生重耳夷吾音義丕普悲反初獻公使荀息傅奚齊公疾召之曰以是藐諸孤注言其幼賤與諸子縣藐音義藐妙小反又亡角反縣音玄疏正義曰藐者縣遠之言諸子之年皆長而奚齊獨幼是小大相藐也藐諸孤者言年既幼稚縣藐於諸子之孤辱在大夫其若之何注欲屈辱荀息使保護之稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也注往死者居生者耦兩也送死事生兩無猜恨所謂正也音義猜七才反疑也及里克將殺奚齊先告荀息曰三怨將作注三公子之徒秦晉輔之子將何如荀息曰將死之里克曰無益也荀叔曰吾與先君言矣不可以二能欲復言而愛身乎注荀叔荀息也復言言可復也疏正義曰意能欲使前言可反復而行之得愛惜身命不死乎雖無益也將焉辟之且人之欲善誰不如我我欲無二而能謂人巳乎注言不能止里克使不忠於申生等音義焉於虔反下文焉能克同冬十月里克殺奚齊于次注次喪寢書曰殺其君之子未葬也荀息將死之人曰不如立卓子而輔之荀息立公子卓以葬十一月里克殺公子卓于朝荀息死之君子曰詩所謂白圭之玷尚可磨也斯言之玷不可為也注詩大雅言此言之缺難治甚於白圭音義玷丁簞反又丁念反缺也荀息有焉注有此詩人重言之義齊侯以諸侯之師伐晉及髙梁而還討晉亂也注高梁晉地在平陽縣西南令不及魯故不書注前已發不書例今復重發嫌霸者異於凡諸侯音義令力政反本又作命復扶又反重直用反晉郤芮使夷吾重賂秦以求入注郤芮郤克祖父從夷吾者音義從才用反曰人實有國我何愛焉注言國非已之有何愛而不以賂秦入而能民土於何有從之注能得民不患無土齊隰朋帥師會秦師納晉惠公注隰朋齊大夫惠公夷吾音義隰音習秦伯謂郤芮曰公子誰恃對曰臣聞亡人無黨有黨必有讎注言夷吾無黨無黨則無讎易出易入以微勸秦音義易並以豉反疏正義曰秦伯問公子誰恃問公子於晉國之臣倚恃誰為內主也對言夷吾無黨無讎者由無黨故往前易出無讎故此時易入言易出易入以微勸秦使納之夷吾弱不好弄注弄戲也音義好呼報反能鬭不過注有節制長亦不改不識其他公謂公孫枝曰夷吾其定乎注公孫枝秦大夫子桑也音義長丁丈反對曰臣聞之唯則定國詩曰不識不知順帝之則文王之謂也注詩大雅帝天也則法也言文王暗行自然合天之法又曰不僣不賊鮮不為則注僣過差也賊傷害也皆忌克也能不然則可為人法則音義僣子念反下注同鮮息淺反無好無惡不忌不克之謂也今其言多忌克注既僣而賊音義好呼報反又如字惡烏路反難哉注言能自定難公曰忌則多怨又焉能克是吾利也注其言雖多忌適足以自害不能勝人也秦伯慮其還害已故曰是吾利疏正義曰唯身有則者乃能定國也詩美文王之德不記識古事不學知今事常順天之法則而行之為此行者文王之謂也又曰人行不僣差不賊害能如此者少不為人所法則言必為人所法則也此二詩所云者無所偏好無所私惡不為忌差不好勝人之謂也今其此夷吾之言多有所忌多欲陵人以此而求安定難哉今其言多忌克覆上不忌不克上既有無好無惡不覆之者以身行忌克則有私好私惡之心舉忌克足以包好惡也公曰多忌於人則多為人怨又焉能勝人此乃是吾之利也無好無惡言文王之行也不忌不克述抑篇之義也引二詩於前以此言結之注正義曰詩大雅皇矣之篇也則法釋詁文彼鄭箋云其為人不識古不知今順天之法而行之是言暗行自然合天地之法也禮記稱天無私覆地無私載合天地法者即無偏好無私惡之謂也正義曰詩大雅抑之篇也彼毛傳云僣差也鄭玄云不殘賊是賊為害也心有所忌則多過差志在陵人必多為賊害下云不忌不克覆述此文故言僣賊者皆忌克也正義曰心忌前人則人亦忌已志在陸人則人亦陵已若使人皆忌之人皆陵之是適足以自害不能勝人也秦伯聞其忌克慮其還來害已故以不能勝人為是吾利也宋襄公即位以公子目夷為仁使為左師以聽政於是宋治故魚氏世為左師音義治直吏氏經十年春王正月公如齊注無傳狄滅溫溫子奔衛注蓋中國之狄滅而居其土地晉里克弒其君卓及其大夫荀息注弒卓在前年而以今春書者從赴也獻公既葬卓以免喪故稱君也荀息稱名者雖欲復言本無遠謀從君於昏疏正義曰傳於前年甚詳經以今年書之明赴以今年弒也傳稱立公子卓以葬是免喪始死故稱君也文七年宋人殺其大夫傳曰不稱名衆也且言非其罪也死者不稱名非其罪故知稱名者皆有罪也荀息稱名者不知奚齊卓子之不可立又不能誅里克以存君是其雖欲復言本無逺謀也襄十九年齊殺其大夫髙厚傳稱從君於昏獻公惑於驪姬殺適立庶荀息知其事而為之傅奚齊是其從君於昏也夏齊侯許男伐北戎注無傳北戎山戎晉殺其大夫里克注奚齊者先君所命卓子又以在國嗣位罪未為無道而里克親為三怨之主纍弒二君故稱名以罪之疏正義曰宣四年傳例曰弒君稱君君無道也稱臣臣之罪也里克殺奚齊弒卓子皆書里克之名是奚齊與卓子未為無道也殺大夫傳言不稱名者為無罪則稱名為有罪故今稱里克之名以罪之秋七月冬大雨雪注無傳平地尺為大雪音義雨于付反傳十年春狄滅溫蘇子無信也蘇子叛王即狄又不能于狄狄人伐之王不救故滅蘇子奔衛注蘇子周司寇蘇公之後也國于溫故曰溫子叛王事在莊十九年疏正義曰尚書立政云司寇蘇公成十一年傳曰昔周克商蘇忿生以溫為司寇以此知蘇子司寇蘇公之後也國名為蘇所都之邑名為溫故溫蘇遞見於經是得兩稱故也夏四月周公忌父王子黨會齊隰朋立晉侯注周公忌父周卿士王子黨周大夫晉侯殺里克以説注自解説不篡音義篡初患反將殺里克公使謂之曰微子則不及此雖然子弒二君與一大夫為子君者不亦難乎對曰不有廢也君何以興欲加之罪其無辭乎注言欲加己罪不患無辭疏正義曰言君今欲加臣之罪其畏無辭以罪臣乎言必加便有辭耳臣聞命矣伏劒而死於是丕鄭聘于秦且謝緩賂故不及注丕鄭里克黨以在秦故不及里克俱死晉侯改葬共大子注共大子申生也音義共音恭本亦作恭大音泰秋狐突適下國注下國曲沃新城疏正義曰曲沃邑也而稱國者晉昭侯嘗以此邑封桓叔桓叔國之三世武公始并晉國遷居而就之此曲沃晉之舊國故謂之為下國也遇大子大子使登僕注忽如夢而相見狐突本為申生御故復使登車為僕音義復扶又反下文及注同而告之曰夷吾無禮疏正義曰賈逵云蒸於獻公夫人賈君故曰無禮馬融云申生不自明而死夷吾改葬之章父之過故曰無禮杜不為注當以鬼神之意難得而知夷吾無禮或非一事不可指言故不説也余得請於帝矣注請罰夷吾將以晉畀秦秦將祀余對曰臣聞之神不歆非類民不祀非族疏正義曰傳稱非我族類其心必異則族類一也皆謂非其子孫妄祀他人父祖則鬼神不歆享之耳祭法云聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之若農棄為稷后土為社社稷功被天下乃令率土報功如此之徒非獨歆巳之族若功不被於下民名不載於祀典唯其子孫祀之神亦不歆他族然則秦非晉類而使祀申生祀之大失也晉無罪而滅以畀秦刑之濫也夫豈不達此事而待狐突之言方改圗者民之與神不相雜擾雖理有大歸非曲為小惠豈有一人寃枉即能訴天天受人訴辭便將滅國此事本是妖夢假託上天非天實為之人能改易傳言鬼神所馮有時而信非言此事實是天心不可執其言而以人事為難也君祀無乃殄乎注歆饗也殄絶也音義畀必利反下注同歆許金反且民何罪失刑乏祀君其圖之君曰諾吾將復請七日新城西偏將有巫者而見我焉注新城曲沃也將因巫而見音義偏匹綿反疏正義曰申生謂狐突云更經七日於新城西偏將有巫者而與之俱見我焉故杜云將因巫而見許之遂不見注狐突許其言申生之象亦沒音義見賢遍反又如字及期而往告之曰帝許我罰有罪矣敝於韓注敝敗也韓晉地獨敝惠公故言罰有罪明不復以晉畀秦夷吾忌克多怨終於失國雖改葬加諡申生猶忿傳言鬼神所馮有時而信音義馮皮氷反疏正義曰晉語云惠公即位出共世子而改葬之臭徹於外國人誦之曰貞之無報孰是人斯而有是臭也貞為不聽信為不誠不更厥正大命其傾猗兮違兮心之哀兮嵗之二七其靡有微兮郭偃曰甚哉善之難也君改葬共君以為榮也而惡滋章十四年君之冡嗣其替乎亦是申生猶忿之事丕鄭之如秦也言於秦伯曰呂甥郤稱冀芮實為不從若重問以召之注三子晉大夫不從不與秦賂問聘問之幣音義稱尺證反又如字疏正義曰曲禮云凡以弓劒苞苴簞笥問人者鄭玄云問猶遺也重問謂多以財貨遺之也下云幣重而言甘故云問聘問之幣也臣出晉君君納重耳蔑不濟矣注蔑無也冬秦伯使泠至報問且召三子注泠至秦大夫音義泠力丁反郤芮曰幣重而言甘誘我也遂殺丕鄭祁舉注祁舉晉大夫及七輿大夫注侯伯七命副車七乘音義乘繩證反疏正義曰周禮大行人云侯伯七命二車七乘二即副也每車一大夫主之謂之七輿大夫服虔云上軍之輿帥七人屬申生者襄二十三年下軍輿帥七人往前申生將上軍今七輿大夫為申生報怨欒盈將下軍故七與大夫與欒氏炫謂服言是左行共華右行賈華叔堅騅歂纍虎特宮山祁皆里丕之黨也注七子七輿大夫音義行户剛反下同共音恭騅音佳歂音市專反纍力追反祁巨之反字林上尸反丕豹奔秦注丕豹丕鄭之子言於秦伯曰晉侯背大主而忌小怨民弗與也伐之必出注大主秦也小怨里丕音義背音佩公曰失衆焉能殺注謂殺里丕之黨音義焉於虔反違禍誰能出君注謂豹辟禍也為明年晉殺丕鄭傳經十有一年春晉殺其大夫丕鄭父注以私怨謀亂國書名罪之書春從告夏公及夫人薑氏會齊侯于陽穀注無傳婦人送迎不出門見兄弟不踰閾與公俱會齊侯非禮音義閾音域門限也一音况域反秋八月大雩注無傳過時故書冬楚人伐黃傳十一年春晉侯使以丕鄭之亂來告注釋經書在今年天王使召武公內史過賜晉侯命注天王周襄王召武公周卿士內史過周大夫諸侯即位天子賜之命圭為瑞音義過古禾反受玉惰過歸告王曰晉侯其無後乎王賜之命而惰於受瑞先自棄也已而何繼之有禮國之幹也敬禮之輿也不敬則禮不行禮不行則上下昏何以長世注為惠公不終張本音義惰徒卧反長直良反又丁丈反疏正義曰召武公亦名過周語云襄王使召公過及內史過賜晉惠公命晉侯執玉卑拜不稽首內史過歸以告王曰晉不亡其君必無後不敬王命棄其禮也執玉卑替其質也拜不稽首誣其王也替質無鎮誣王無人晉侯誣王人亦將誣之欲替其鎮人亦將替之其言多而小異孔朝云左丘明集其典雅令辭與經相發明者以為春秋傳其髙論善言别為國語凡左傳國語有事同而辭異者以其詳於左傳而略於國語詳於國語而略于左傳夏揚拒泉臯伊雒之戎同伐京師入王城焚東門注揚拒泉臯皆戎邑及諸雜戎居伊水雒水之間者今伊闕北有泉亭音義拒俱宇反臯古刀反疏正義曰釋例曰諸雜戎居伊水雒水之間者河南雒陽縣西南有戎城伊水出上雒盧氏縣熊耳山東北至河南雒陽縣入雒雒水出上雒縣冢領山東北經𢎞農至河南鞏縣入河王子帶召之也注王子帶甘昭公也召戎欲因以篡位秦晉伐戎以救周秋晉侯平戎于王注為二十四年天王出居鄭傳黃人不歸楚貢冬楚人伐黃注黃人恃齊故經十有二年春王三月庚午日有食之注無傳不書朔官失之夏楚人滅黃秋七月冬十有二月丁丑陳侯杵臼卒注無傳遣世子與僖公同盟寧母及洮音義杵昌呂反臼其九反傳十二年春諸侯城衛楚丘之郛懼狄難也注楚丘衛國都郛郭也為明年春狄侵衛傳音義郛芳夫反難乃旦反下同疏正義曰衛以二年遷於楚丘諸侯為之築其城至此為之築其郛公羊傳曰郛者何郭也不單言衛楚丘者見楚丘未有郛也諸侯不告魯不與故不書無經而為傳者其言必有所為故云為狄侵衛傳黃人恃諸侯之睦于齊也不共楚職曰自郢及我九百里焉能害我音義共音恭焉於虔反夏楚滅黃注郢楚都王以戎難故討王子帶注子帶前年召戎伐周秋王子帶奔齊冬齊侯使管夷吾平戎于王使隰朋平戎于晉注平和也前年晉救周伐戎故戎與周晉不和王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國髙在注國子髙子天子所命為齊守臣皆上卿也莊二十二年髙傒始見經僖二十八年國歸父乃見傳歸父之父曰懿仲髙傒之子曰莊子不知今當誰世音義守手又反注同見賢遍反下同若節春秋來承王命何以禮焉注節時也陪臣敢辭注諸侯之臣曰陪臣音義陪步回反王曰舅氏注伯舅之使故曰舅氏音義使所吏反余嘉乃勳應乃懿德謂督不忘往踐乃職無逆朕命注功勳美德可謂正而不可忘者不言位而言職者管仲位卑而執齊政故欲以職尊之音義督音篤疏正義曰余朕皆我也乃女也應當也懿美也督正也言我善女功勳當女美德謂女功德正而不可忘宜受此禮往居女職無得逆我之命欲令受上卿之禮管仲受下卿之禮而還注管仲不敢以職自髙卒受本位之禮君子曰管氏之世祀也宜哉疏正義曰丘明之意假稱君子論管氏應合世祀也宜哉而遂不世祀子孫絶滅是行善無驗故杜注云傳亦舉其無驗是也讓不忘其上詩曰愷悌君子神所勞矣注詩大雅愷樂也悌易也言樂易君子為神所勞來故世祀也管仲之後於齊沒不復見傳亦舉其無驗音義愷本亦作凱開在反悌音弟本亦作弟勞力報反注同欒音洛下同易以豉反下同來力代反復扶又反疏正義曰詩大雅旱麓之篇愷樂悌易皆釋詁文樂易言志度𢎞簡欣樂而和易也世族譜管氏出自周穆王成十一年傳有齊管于奚譜以為雜人則非管仲之子孫也哀十六年傳稱楚白公殺齊管修杜云管修楚賢大夫故齊管仲之後是管仲之後於齊沒不復見也經十有三年春狄侵衛注傳在前年春夏四月葬陳宣公注無傳公會齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹注鹹衛地東郡濮陽縣東南有鹹城音義濮音卜秋九月大雩注無傳書過冬公子友如齊注無傳傳十三年春齊侯使仲孫湫聘于周且言王子帶注前年王子帶奔齊言欲復之事畢不與王言注不言子帶事歸復命曰未可王怒未怠其十年乎不十年王弗召也夏會于鹹淮夷病杞故且謀王室也秋為戎難故諸侯戍周齊仲孫湫致之注戍守也致諸侯戍卒于周音義為于偽反下注欲為同難乃旦反卒子忽反冬晉荐飢注麥禾皆不熟音義荐在薦反重也飢音飢疏正義曰釋天云穀不熟為飢仍飢為荐李巡曰穀不成熟曰飢連嵗不熟曰荐使乞糴于秦秦伯謂子桑與諸乎對曰重施而報君將何求注言不損秦音義糴直歷反施式豉反下同重施而不報其民必攜攜而討焉無衆必敗注不義故民離謂百里與諸乎注百里秦大夫對曰天災流行國家代有救災恤鄰道也行道有福丕鄭之子豹在秦請伐晉注欲為父報怨秦伯曰其君是惡其民何罪秦於是乎輸粟于晉自雍及絳相繼注雍秦國都絳晉國都音義雍於用反絳古巷反命之曰泛舟之役注從渭水運入河汾音義泛芳劒反汾扶云反疏正義曰秦都雍雍臨渭晉都絳絳臨汾渭水從雍而東至𢎞農華隂縣入河從河逆流而北上至河東汾隂縣乃東入汾逆流東行而通絳故杜云從渭水運入河汾也經十有四年春諸侯城緣陵注緣陵杞邑辟淮夷遷都於緣陵夏六月季姬及鄫子遇于防使鄫子來朝注季姬魯女鄫夫人也鄫子夲無朝志為季姬所召而來故言使鄫子來朝鄭國今琅邪鄫縣音義鄫似綾反本或作繒秋八月辛卯沙鹿崩注沙鹿山名陽平元城縣東有沙鹿土山在晉地災害繫於所災所害故不繫國疏正義曰公羊傳曰沙鹿者何河上之邑也榖梁傳曰林屬於山為鹿沙山名也服虔云沙山名鹿山足林屬於山曰鹿取榖梁為説也漢書元后傳稱后祖翁孺自東平陵徙魏郡元城委粟里元城建公曰昔春秋沙鹿崩晉史卜之曰隂為陽雄土火相乘故有沙鹿崩崩後六百四十五年宜有聖女興今王翁孺徙正值其地日月當之元城郭東有五鹿之虛即沙鹿地計爾時去聖猶近所言當得其實故以沙鹿為山名依漢書為義也沙鹿實是晉地不言晉沙鹿者凡有災害繫於所災所害之處不繫於所屬之國故不繫晉也釋例曰陳既已滅降為楚縣而書陳災者猶晉之梁山沙鹿崩不書晉也災害繫於所災所害故以所在為名災為陳災成周宣榭火害為梁山沙鹿崩山崩必有所害故所災所害别言之狄侵鄭注無傳冬蔡侯肸卒注無傳未同盟而赴以名音義肸許乙反傳十四年春諸侯城緣陵而遷杞焉不書其人有闕也注闕謂器用不具城池未固而去為惠不終也澶淵之會既而無歸大夫不書而國别稱人今此總日諸侯君臣之辭不言城把把未遷也音義澶市然反疏正義曰元年齊師宋師曹師城邢傳稱具邢器用而遷之師無私焉是器用具而城池固故具列三國之師詳其文以美之也今此總云諸侯城緣陵不言某侯某侯與城邢文異不具書其所城之人為其有闕也知闕為器用不具城池不固而去為惠不終故總言諸侯以譏之凡諸侯盟會不歷序其人總言諸侯者皆是譏之辭文十五年諸侯盟於扈傳曰書曰諸侯無能為也十七年諸侯會於扈傳曰書曰諸侯無功也是其總言諸侯皆譏辭也十六年會于淮傳稱城鄫役人病不果城而還亦是為惠不終而淮會具書其人者淮之會為謀鄫且東略非為城鄫而聚會既會之後乃欲城鄫而不果本意不城鄫無可貶也先儒以為諸侯有過貶而稱人杜據澶淵之會與此傳文知諸侯之貶不至稱人故釋例曰傳滅入例衛侯燬滅邢同姓故名又云穀伯綏鄧侯吾離來朝名賤之也又云不書蔡許之君乘楚車也謂之失位此皆諸侯貶之例例不稱人也諸侯在事傳有明文而經稱人者凡十一條丘明不示其義而諸儒皆據案生意原無所出貶諸侯而去爵稱人是為君臣同文非正等差之謂也又澶淵大夫之會傳曰不書其人按經皆去名稱人至諸侯親城緣陵傳亦曰不書其人而經總稱諸侯此大夫及諸侯經傳所以為别也通校春秋自宣公五年以下百數十年諸侯之咎甚多而皆無貶稱人者益明此蓋當時告命注記之異非仲尼所以為例故也鄫季姬來寧公怒止之以鄫子之不朝也注來寧不書而後年書歸鄫更嫁之文也明公絶鄫昏既來朝而還音義還户關反夏遇于防而使來朝秋八月辛卯沙鹿崩晉卜偃曰期年將有大咎幾亡國注國主山川山崩川竭亡國之徴音義期音基咎其九反幾音祈又音機疏正義曰成五年傳曰國主山川故山崩川竭君為之不舉周語幽王二年西周三川皆震伯陽父曰昔伊雒竭而夏亡河竭而商亡國必依山川山崩川竭亡國之微也卜偃明逹災異以山崩為亡國之徴知其將有大咎不言知之意非末學者所得詳也釋例曰天人之際或異而無感或感而不可知沙鹿崩因謂期年將有大咎梁山崩則云山有朽壞而自崩此皆聖賢之讜言逹者所宜先識是説卜偃之言非後人所能測冬秦飢使乞糴于晉晉人弗與慶鄭曰背施無親注慶鄭晉大夫音義背音佩後皆同施式豉反注及下而施毛十五年皆同幸災不仁貪愛不祥怒鄰不義四德皆失何以守國虢射曰皮之不存毛將安傅注虢射惠公舅也皮以喻所許秦城毛以喻糴言既背秦施為怨以深雖與之糴猶無皮而施毛音義傳音附疏注正義曰晉語云秦飢惠公命輸之粟虢射請勿與慶鄭請與之公曰非鄭之所知也遂不與秦侵晉至于韓公謂慶鄭曰寇深矣奈何慶鄭曰非鄭之所知也君其訊射也公曰舅所病也是虢射為惠公之舅也慶鄭曰棄信背鄰患孰恤之無信患作失援必斃是則然矣虢射曰無損於怨而厚於寇不如勿與注言與秦粟不足解怨適足使秦強慶鄭曰背施幸災民所棄也近猶讎之况怨敵乎弗聽退曰君其悔是哉春秋左傳注疏卷十二春秋左氏傳注疏卷十二考證楚人圍許注楚子不親圍以圍者告臣召南按傳明曰楚子圍許以救鄭下又明曰蔡穆侯將許僖公以見楚子于武城不得云楚子不親圍也傳圍新密鄭所以不時城也注鄭以非時興土功齊桓聲其罪以告諸侯顧炎武日知録曰罪莫大於逃盟而但責其非時興土功不亦細乎且上文固曰以其逃首止之盟故也則不煩添此一節矣傳許男面縛銜璧趙汸補注曰微子啓事蓋逢伯設辭以動楚君欲其全許耳劉侍讀疑許事為妄誤矣小邾子來朝宋忠曰邾顔别封小子肥于郳為小邾子公會王人齊侯宋公衛侯許男曹伯陳世子款盟于洮臣浩按公羊經陳世子款下有鄭世子華經下文即曰鄭伯乞盟則華必不得列于是會左氏經是也傳夏狄伐晉臣召南按此傳與上晉里克帥師本同一篇各本俱用一圈斷之似誤又注明期年之言驗監本脫驗字今增傳齊侯盟諸侯于葵丘趙仿補注曰傳記盟辭凡我同盟之人既盟之後言歸于好即孟子所述之末句其五禁之辭傳不能舉則二伯之事闕漏多矣臣召南按葵丘五禁三傳惟榖梁略記數語而亦不備以東萊集解即以孟子初命曰全文截附傳下傳宰孔先歸陳傳良曰傳言宰孔不與盟傳晉郤芮使夷吾重賂秦以求入趙仿補注曰里克志在重耳夷吾得國不以正秦穆公貪賄而無逺略重耳克讓舅犯有謀其事皆見于外傳可補傳文之闕臣召南按桓文二霸傳文俱不盡詳而齊桓尤略齊語晉語則始末具載矣傳及七輿大夫疏服虔云上軍之輿帥七人屬申生者臣召南按韋昭注晉語曰七輿申生下軍之衆大夫也説同服義但申生初將下軍自東山之役乃將上軍孔疏于杜注無不曲護惟此條以劉炫從服義為是傳受玉惰疏拜不稽首誣其王也又誣王無人又晉侯誣王人亦將誣之監本誣字俱訛作無今依周語改正傳有天子之二守國髙在臣浩按齊語亦但言髙子國子故杜云不知今當誰世林堯叟曰大國三卿其二卿命于天子則曰天子之守臣傳謂百里注百里秦大夫林堯叟句解曰即百里奚也諸侯城緣陵注緣陵杞邑臣召南按漢書地理志北海郡營陵注臣瓚曰營陵春秋謂之緣陵沙鹿崩注陽平元城縣東有沙鹿土山陽平監本訛作平陽今改正春秋左氏傳注疏卷十二考證
