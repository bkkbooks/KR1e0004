body:
  text: 左傳後序大康元年三月呉宼始平余自江陵還襄陽解甲休兵乃申杼舊意脩成春秋釋例及經傳集解始訖會汲郡汲縣有發其界内舊冡者大得古書皆簡編科斗文字發冡者不以為意徃徃散亂科斗書久廢推尋不能盡通始者藏在袐府余晚得見之所記大凡七十五卷多雜碎怪妄不可訓知周易及紀年最為分了周易上下篇與今正同别有隂陽説而無彖象文言繫辭疑于時仲尼造之於魯尚未播之於逺國也其紀年篇起自夏殷周皆三代王事無諸國别也唯特記晉國起自殤叔次文侯昭侯以至曲沃莊伯莊伯之十一年十一月魯隱公之元年正月也皆用夏正建寅之月為歲首編年相次晉國滅獨記魏事下至魏哀王之二十年蓋魏國之史記也推校哀王二十年太歲在壬戌是周赧王之十六年秦昭王之八年韓襄王之十三年趙武靈王之二十七年楚懐王之三十年燕昭王之十三年齊涽王之二十五年也上去孔丘卒百八十一歲下去今大康三年五百八十一歲哀王於史記襄王之子惠王之孫也惠王三十六年卒而襄王立立十六年卒而哀王立古書紀年篇惠王三十六年改元從一年始至十六年而稱惠成王卒即惠王也疑史記誤分惠成之世以為後王年也哀王二十三年乃卒故特不稱諡謂之今王其著書文意大似春秋經推此足見古者國史策書之常也文稱魯隠公及邾莊公盟于姑蔑即春秋所書邾儀父未王命故不書爵曰儀父貴之也又稱晉獻公會虞師伐虢滅下陽即春秋所書虞師晉師滅下陽先書虞賄故也又稱周襄王會諸侯于河陽即春秋所書天王狩于河陽以臣召君不可以訓也諸若此輩甚多略舉數條以明國史皆承告據實而書時事仲尼脩春秋以義而制異文也又稱衛懿公及赤翟戰于洞澤疑洞當為泂即左傳所謂滎澤也齊國佐來獻玉磬紀公之甗即左傳所謂賔媚人也諸所記多與左傳符同異於公羊榖梁知此二書近世穿鑿非春秋本意審矣雖不皆與史記尚書同然參而求之可以端正學者又别有一卷純集疏左氏傳卜筮事上下次第及其文義皆與左傳同名曰師春師春似是抄集者人名也紀年又稱殷仲壬即位居亳其卿士伊尹仲壬崩伊尹放大甲于桐乃自立也伊尹即位於大甲十年大甲潛出自桐殺伊尹乃立其子伊陟伊奮命復其父之田宅而中分之左氏傳伊尹放大甲而相之卒無怨色然則大甲雖見放還殺伊尹而猶以其子為相也此為大與尚書敘説大甲事乖異不知老叟之伏生或致昏忘將此古書亦當時雜記未足以取審也為其粗有益於左氏故略記之附集解之末焉正義曰王隱晉書武帝紀大康元年諸軍伐呉三月至江陵縣而孫皓靣縛詣王濬降杜預先為荆州刺史鎮襄陽督諸軍伐呉將兵向江陵因東下伐呉呉平又自江陵還襄陽束晳傳云大康元年汲郡民盜發魏安釐王塜得竹書漆字科斗之文科斗文者周時古文也其字頭麤尾細似科斗之蟲故俗名之焉大凡七十五卷晉書有其目録其六十八卷皆有名題其七卷折簡碎雜不可名題有周易上下經二卷紀年十二卷𤨏語十一卷周王遊行五卷説周穆王遊行天下之事今謂之穆天子傳此四部差為整頓汲郡初得此書表藏袐府詔荀朂和嶠以隸字寫之勗等於時即已不能盡識其書今復闕落又轉寫益誤穆天子傳世間偏多史記魏世家云哀王二十三年卒子昭王立十九年卒子安釐王立哀王是安釐王之祖故安釐王之塜藏哀王時之書哀王二十一年是赧王之十七年并下秦韓趙楚燕齊之年皆史記六國年表文也竹書説伊尹傳之事與書序大乖杜不見古文唯以書序考正疑伏生昏忘虛傳此事又疑竹簡雜記未足取審今據古文尚書説伊尹之事與左氏符同明是竹書不可盡信杜以紀年記事大似春秋之經知古之史官記事如此為其有益於左氏令人知左氏不妄故略記之以附集解之末左傳後序
