body:
  text: 春秋左傳注疏卷十九起文公十一年盡十五年晉杜氏注唐陸德明音義孔頴達疏經十有一年春楚子伐麇注討前年逃厥貉會音義麇九倫反夏叔仲彭生會晉郤缺于承筐注承筐宋地在陳留襄邑縣西彭生叔仲惠伯郤缺冀缺音義叔仲彭生叔又作州夲或作叔彭生仲衍字缺丘悅反秋曹伯來朝公子遂如宋狄侵齊冬十月甲午叔孫得臣敗狄于鹹注鹹魯地音義鹹音咸傳十一年春楚子伐麇成大心敗麇師於防渚注成大心子玉之子大孫伯也防渚麇地潘崇復伐麇至于錫冗注錫冗麇地音義復扶又反錫音羊或作錫星歷反夏叔仲惠伯會晉郤缺于承筐謀諸侯之從於楚者注九年陳鄭及楚平十年宋聽楚命秋曹文公來朝即位而來見也音義見賢遍反襄仲聘于宋且言司城蕩意諸而復之注八年意諸來奔歸不書史失之疏正義曰諸侯之卿出奔而復歸者宋華元衛孫林父之徒皆書其歸則蕩意諸之歸亦當書之服虔云反不書者施而不德衛冀隆亦同服義而難杜云襄二十九年樂氏施而不德春秋所善不書意諸之歸則是施而不德且經所不書傳即發文史失之即不書日史失之之類是也此既無傳何知史失杜必以為史失者案衛侯鄭之歸于衛也僖公納賂而請之衛侯朔之入于衛也莊公興師而納之歸邾子益于邾自我而歸之皆受魯施並書於經何獨意諸施而不德若意諸施而不德彼何故施而德之春秋公侯大夫失位出奔得人力而反者多矣若皆施而不德不應赴告諸侯魯以不書為是則書者為非何以無貶責之文定人之謂禮存亡之謂義未有禮義在可諱之意故杜以為史官失之故不書於策因賀楚師之不害也注往年楚次厥貉將以伐宋鄋瞞侵齊注鄋瞞狄國名防風之後漆姓音義鄋所求反説文作云北方長狄國也在夏為防風氏殷為汪芒氏字林一音先牢反瞞莫干反漆音七疏正義曰狄是北夷大號鄋瞞是其國名魯語云吳伐越隳會稽獲骨節專車吳子使來聘問之仲尼仲尼宴之客執骨而問曰敢問骨何為大仲尼曰昔禹致羣臣於會稽之山防風氏後至禹殺而戮之其骨節專車此為大矣客曰防風氏何守仲尼曰汪芒氏之君守封隅之山者也為漆姓在虞夏商為汪芒氏於周為長狄氏今曰大人客曰人長之極幾何仲尼曰僬堯氏長三尺短之至也長者不過十尺數之極也此言長狄狄之長者彼言於周為長狄知鄋瞞即是防風氏之後故以國語為説服云伐我不書諱之遂伐我公卜使叔孫得臣追之吉侯叔夏御莊叔注莊叔得臣音義夏户雅反綿房甥為右富父終甥駟乘注駟乘四人共車音義乘繩證反注及下皆同冬十月甲午敗狄于鹹獲長狄僑如注僑如鄋瞞國之君蓋長三丈獲僑如不書賤夷狄也音義僑夲作喬其驕反長如字又直亮反疏正義曰經書敗狄于鹹即是敗一國也敗其國而獲此人傳不言是其將帥知是其國之君也榖梁傳曰長狄瓦石不能害叔孫得臣最善射者射其目身橫九畝斷其首而載之眉見於軾何休云蓋長百尺魯語仲尼所云此十倍僬堯氏之長者故云蓋長三丈魯語言不過十尺是疑之言故云蓋也宣十五年晉師滅赤狄潞氏以潞子嬰兒歸彼獲嬰兒歸書之此獲僑如不書者潞國大其君貴故書之此國小僑如賤不書賤夷狄也富父終甥摏其喉以戈殺之注摏猶衝也音義摏舒容反喉音侯戈古禾反疏正義曰考工記戈之長六尺六寸耳得及長狄之喉者兵車之法皆三人共乘魯宋與長狄之戰車皆四乘改其乘必長其兵謂之戈蓋形如戈也埋其首於子駒之門注子駒魯郭門骨節非常恐後世怪之故詳其處音義處昌吕反以命宣伯注得臣待事而名其三子因名宣伯曰僑如以旌其功音義名如字或亡政反疏正義曰襄三十年傳説此事云叔孫莊叔敗狄于鹹獲長狄僑如及虺也豹也皆以名其子定八年傳稱魯苦越生子將待事而名之陽州之役獲焉故名之曰陽州如得臣亦待事以名其三子以旌章其功也此三子未必同年而生或生訖待事或事後始生欲以章已功取彼名而名之也初宋武公之世鄋瞞伐宋注在春秋前疏正義曰史記十二諸侯年表宋武公即位十八年以魯惠公二十一年卒卒在春秋前二十六年不知鄋瞞以何年伐宋也司徒皇父帥師禦之耐斑御皇父充石注皇父戴公子充石皇父名音義禦夲亦作御魚吕反耐音而疏正義曰皇父戴公子世夲文古人連言名字者皆先字後名且此人子孫以皇為氏知皇父字充石名公子榖甥為右司寇牛父駟乘以敗狄于長丘注長丘宋地獲長狄緣斯注緣斯僑如之先疏正義曰服虔云不言所埋埋其身首同處於戰地可知皇父之二子死焉注皇父與榖甥及牛父皆死故耐斑獨受賞疏正義曰賈逵云皇父與榖甥牛父三子皆死鄭衆以為榖甥牛父二人死耳皇父不死馬融以為皇父之二子從父在軍為敵所殺名不見者方道二子死故得勝之如令皆死誰殺緣斯服虔云殺緣斯者未必三子之手士卒獲之耳下言宋公以門賞耐斑斑為皇父御而有賞三子不見賞疑皆死賈君為近之如馬之言於傳文為順但斑獨受賞知三子皆死故杜亦同之宋公於是以門賞耐斑使食其征注門關門征稅也音義稅舒鋭反疏正義曰禮惟關門有征知門是關門也周禮司關司貨賄之出入掌其治禁與其征㕓國凶札則無門之征鄭玄云征㕓者貨賄之稅孟子曰關市譏而不征則天下行旅皆悅而願出於其塗矣如彼文知出入關者必有征稅但不知幾而稅一也然據禮文城門亦有征必知關門者以關門征稅其數既多故昭二十年逼介之關暴征其私是關禁之重異於城門此云食其征稅故知關稅也謂之耐門晉之滅潞也注在宣十五年音義潞音路獲僑如之弟焚如齊襄公之二年注魯桓之十六年鄋瞞伐齊齊王子成父獲其弟榮如注榮如焚如之弟焚如後死而先説者欲其足弟伯季相次榮如以魯桓十六年死至宣十五年一百三嵗其兄猶在傳言既長且夀有異於人王子成父齊大夫音義且夀如字一音授埋其首於周首之北門注周首齊邑濟北榖城縣東北有周首亭衛人獲其季弟簡如注伐齊退走至衛見獲鄋瞞由是遂亡注長狄之種絶音義種章勇反疏正義曰此時長狄種絶仲尼猶云今曰大人者言當時呼往前長狄為大人未必其時有之若當時猶有其種吳入不應怪其骨也但如此傳文長狄有種種類相生當有支裔唯獲數人云其種遂絶深可疑之命守封隅之山賜之以漆為姓則是世為國主綿歷四代安得更無支屬唯有四人且君為民心方以類聚不應獨立三丈之君使牧八尺之民又三丈之人誰為匹配豈有三丈之妻為之生産乎人情度之深可惑也國語仲尼之談左傳丘明所説通賢大聖立此格言不可論其是非實疑之久矣蘇氏云國語稱今曰大人但迸居四夷不在中國故云遂亡公羊榖梁並云長狄足弟三人一之齊一之魯一之晉何以書記異猶如史記所云秦時大人見於臨洮郕大子朱儒自安於夫鍾注安處也夫鍾郕邑音義郕音成儒如朱反夫音扶國人弗徇注徇順也為明年郕伯來奔傳音義徇以俊反經十有二年春王正月郕伯來奔注稱爵見公以諸侯禮迎之音義見賢遍反疏正義曰此實大子公以諸侯禮迎之公既尊之為君史遂從公之意成十年晉侯有疾立太子州蒲為君會諸侯伐鄭經即書為晉侯史官不可反公之心追言世子從君所稱更是其實故也杞伯來朝注復稱伯舍夷禮音義復扶又反一音服舍音捨二月庚子子叔姬卒注既嫁成人雖見出棄猶以恩録其卒疏正義曰天子諸侯絶期嫁女於諸侯則尊同恩成於敵體其禮不為降卒則服大功九月叔姬既為杞之夫人雖見出棄猶以恩録其卒喪服女子既嫁而反在父母之室從夲服為之齊衰期此既書其卒當服其夲服杜譜不知此叔姬是何公之女要姑與姊妹皆服期也釋例曰出棄之女反在父母之室則與既笄成人者同故亦書卒也杞叔姬卒穀梁以為公母姊妹謂同母姊妹夏楚人圍巢注巢吳楚間小國廬江六縣東有居巢城秋滕子來朝秦伯使術來聘注術不稱氏史略文冬十有二月戊午晉人秦人戰于河曲注不書敗績交綏而退不大崩也稱人秦晉無功以微者告也皆陳曰戰例在莊十一年河曲在河東蒲坂縣南音義陳直覲反坂音反季孫行父帥師城諸及鄆注鄆莒魯所爭者城陽姑幕縣南有員亭員即鄆也以其逺逼外國故帥師城之音義鄆音軍幕音莫員音云一音運夲又作鄆音同傳十二年春郕伯卒郕人立君注大子自安於外邑故大子以夫鍾與郕邽來奔注郕邽亦邑音義邽音圭公以諸侯逆之非禮也注非公寵叛人故書曰郕伯來奔不書地尊諸侯也注既尊以為諸侯故不復見其竊邑之罪音義復扶又反見賢遍反杞桓公來朝始朝公也注公即位始來朝疏正義曰劉炫云魯公新立鄰國及時來朝則曰公即位而來朝晚則云始朝公也諸侯自新立來及時者則云即位而來見晚則云始見霸主即位魯公往朝則曰朝嗣君魯君新立往朝大國則曰即位而往見也且請絶叔姬而無絶昏公許之注不絶昏立其娣以為夫人不書來歸未歸而卒疏正義曰傳言請無絶昏成五年有杞叔姬來歸故知其娣為夫人也其娣亦字叔者周之法稱叔也釋例曰杞桓公以僖二十三年即位襄六年卒凡在位七十一年文成之世經書叔姬二人一人出一人卒皆杞桓公夫人也傳例出曰來歸不書來歸未歸而卒也既歸而卒亦當書之成五年杞叔姬來歸八年書卒是也宣十六年郯伯姬來歸後不書卒者或更嫁於大失故不書卒耳二月叔姬卒不言杞絶也注既許其絶故不言杞書叔姬言非女也注女未嫁而卒不書楚令尹大孫伯卒成嘉為令尹注若敖曾孫子孔羣舒叛楚注羣舒偃姓舒庸舒鳩之屬今廬江南有舒城舒城西南有龍舒疏正義曰世夲偃姓舒庸舒蓼舒鳩舒龍舒鮑舒龔以其非一故言屬以包之夏子孔執舒子平及宗子遂圍巢注平舒君名宗巢二國羣舒之屬秋滕昭公來朝亦始朝公也秦伯使西乞術來聘且言將伐晉襄仲辭玉曰君不忘先君之好照臨魯國鎮撫其社稷重之以大器寡君敢辭玉注大器圭璋也不欲與秦為好故辭玉音義好呼報反注及下同重直用反璋音章疏正義曰聘君用圭享用璧聘夫人用璋享用琮聘禮記曰凡四器者唯其所寶以聘可也故知所言大器是圭璋也考工記玉人云瑑圭璋八寸璧琮八寸以眺聘聘禮記云所以朝天子圭與繅皆九寸問諸侯朱緑繅八寸鄭玄云於天子曰朝於諸侯曰問記之於聘文互相備言互相備者朝諸侯與天子同聘天子與諸侯同也所言朝圭九寸聘圭八寸謂上公禮也使臣出聘降君一等故八寸則侯伯之使當瑑圭六寸子男之使當瑑璧四寸也聘義曰以圭璋聘重禮也已聘而還圭璋此輕財而重禮之義也然則玉必還其來使而下云致諸執事以為瑞節及襄仲辭之者禮聘終雖復得還玉初聘之時其意欲致與主國且受之而襄仲辭之者為不欲與秦為好因謙退辭還也對曰不腆敝器不足辭也注腆厚也音義腆他典反主人三辭賔客曰寡君願徼福于周公魯公以事君注徼要也魯公伯禽也言願事君以并蒙先君之福音義徼古堯反要於堯反下同不腆先君之敝器使下臣致諸執事以為瑞節注節信也出聘必告廟故稱先君之器音義瑞垂偽反要結好命所以藉寡君之命結二國之好注藉薦也音義藉在夜反注同疏正義曰聘禮執圭所以致君命君命致藉玉而後通若坐之有薦席然故以藉為薦也是以敢致之襄仲曰不有君子其能國乎國無陋矣厚賄之注賄贈送也音義賄呼罪反秦為令狐之役故音義為于偽反冬秦伯伐晉取羈馬注令狐役在七年羈馬晉邑音義令力丁反晉人禦之趙盾將中軍荀林父佐之注林父代先克音義將子匠反下皆同卻缺將上軍注代箕鄭臾駢佐之注代林父音義駢步邉反欒盾將下軍注欒枝子代先蔑音義欒力官反盾徒夲反胥甲佐之注胥臣子代先都范無恤御戎注代步昭音義昭上遙反以從秦師于河曲臾駢曰秦不能久請深壘固軍以待之從之秦人欲戰秦伯謂士會曰若何而戰注晉士會七年奔秦音義壘力軌反疏正義曰壘壁也軍營所處築土自衛謂之為壘深者髙也髙其壘以為軍之阻固案覲禮説為壇深四尺鄭注云深髙也是其義也對曰趙氏新出其屬曰臾駢必實為此謀將以老我師也注臾駢趙盾屬大夫新出佐上軍趙有側室曰穿晉君之壻也注側室支子穿趙夙庶孫音義穿音川疏正義曰文王世子云公若有出疆之政庶子守公宫正室守太廟鄭玄云正室適子也正室是適子知側室是支子言在適子之側也世族譜穿趙夙之孫則是趙盾從父昆弟之子也盾為正室故謂穿為側室穿别為邯鄲氏趙施趙勝邯鄲午是其後也有寵而弱不在軍事注弱年少也又未嘗涉知軍事音義少詩照反好勇而狂且惡臾駢之佐上軍也若使輕者肆焉其可注肆暫往而退也音義惡烏路反輕遣政反肆音四秦伯以璧祈戰于河注禱求勝音義禱丁老反一音丁報反十二月戊午秦軍掩晉上軍趙穿追之不及注上軍不動趙穿獨追之反怒曰裹糧坐甲固敵是求敵至不擊將何俟焉軍吏曰將有待也注待可擊音義裹音果疏正義曰甲者所以制禦非常臨敵則被之於身未戰且坐之於地穿曰我不知謀將獨出乃以其屬出宣子曰秦獲穿也獲一卿矣注僖三十三年晉侯以一命命卻缺為卿不在軍帥之數然則晉自有散位從卿者音義帥所類反散悉但反秦以勝歸我何以報乃皆出戰交綏注司馬法曰逐奔不逺從綏不及逐奔不逺則難誘從綏不及則難陷然則古名退軍為綏秦晉志未能堅戰短兵未至爭而兩退故曰交綏音義爭爭鬬之爭疏正義曰魏武全引司馬法云將軍死綏舊説綏部也言軍卻將當死綏必是退軍之名綏訓為安蓋兵書務在進取恥言其退以安行即為大罪故以綏為名焉秦行人夜戒晉師曰兩君之士皆未憖也明日請相見也注憖缺也音義憖魚覲反又魚轄反方言云傷也字林云間也牛吝反疏正義曰憖者缺之貌今人猶謂缺為憖也沈氏云方言云憖傷傷即缺也下云死傷未收則是已有死者但未至大崩未甚喪敗故為皆未缺也臾駢曰使者目動而言肆懼我也注目動心不安言肆聲放失常節音義使所吏反將遁矣薄諸河必敗之注薄迫也音義遁徒困反薄蒲莫反下同敗卑賣反胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人於險無勇也乃止注晉師止為宣元年放胥甲傳秦師夜遁復侵晉入瑕音義復扶又反城諸及鄆書時也經十有三年春王正月夏五月壬午陳侯朔卒注無傳再同盟疏正義曰朔以僖二十九年即位其年盟于翟泉文二年于垂隴七年于扈云再同盟者據文公言之邾子蘧蒢卒注未同盟而赴以名音義蘧其居反蒢丈居反疏正義曰蘧蒢邾子瑣之子也莊二十九年即位僖元年與魯盟于犖而云未同盟蓋據文公為言故云未同盟劉炫以犖盟規之非也自正月不雨至于秋七月注無傳義與二年同大室屋壞注大廟之室音義大音泰注及傳同疏正義曰傳稱書不共則於此室當共知大廟之室也明堂位曰祀周公於大廟此周公之廟壞也不直言大廟壞而云大室屋壞者大廟之制其簷四阿而下室當其中又拔出為重屋明堂位云大廟天子眀堂復廟重簷天子之廟飾鄭云復廟重屋也是天子之廟上為重屋此是大廟當中之室其上之屋壞非大廟全壞也公羊作世室傳曰世室者何魯公之廟也周公稱大廟魯公稱世室羣公稱宫此魯公之廟也曷為謂之世室猶世世不毁也左傳不辨此是何公之廟而經謂之大室言此室是室之最大者故知是周公之廟非魯公也明堂位曰魯公之廟文世室也武公之廟武世室也不毁則稱世室世室非一君廟名若是伯禽之廟則宜舉其號諡案左傳經為大室不作世室故左氏先師賈服等皆以為廟之室也壞必更作書其壞而不書作者隨即修之故不書也定二年五月雉門及兩觀災十月新作雉門及兩觀啓塞從時譏其緩作故别書之耳冬公如晉衛侯會公于沓注沓地闕音義沓徒答反狄侵衛注無傳十有二月已丑公及晉侯盟注十二月無己丑己丑十一月十一日公還自晉鄭伯會公于棐注棐鄭地音義棐芳味反又非尾反傳十三年春晉侯使詹嘉處瑕以守桃林之塞注詹嘉晉大夫賜其瑕邑令帥衆守桃林以備秦桃林在𢎞農華隂縣東潼關音義詹章亷反塞悉代反令力呈反華户化反潼音童疏正義曰桃林之塞在南河之南逺處晉之南竟從秦適周乃由此路使詹嘉守此塞者以秦與東方諸侯逺結恩好及西乞聘魯亦應更交餘國慮其要結外援東西圖已故使守此厄塞欲斷其來往也晉人患秦之用士會也夏六卿相見於諸浮注諸浮晉地蔬正義曰六卿在朝旦夕聚集而特云相見於諸浮者將欲密謀慮其漏泄故出就外野屏人私議諸浮當是城外之近地耳趙宣子曰隨會在秦賈季在狄難日至矣若之何注六年賈季奔狄音義難乃旦反日人實反中行桓子曰請復賈季注中行桓子荀林父也僖二十八年始將中行故以為氏音義行司郎反注同將子匠反能外事且由舊勳注有狐偃之舊疏正義曰賈季是狐突之孫狐偃之子夲是狄人能知外竟之事謂知狄之情得豫為之備卻成子曰賈季亂且罪大注殺陽處父故不如隨會能賤而有恥柔而不犯注不可犯以不義疏正義曰服虔云謂能處賤且又知恥言不可汚辱其知足使也且無罪乃使魏夀餘偽以魏叛者以誘士會執其帑於晉使夜逸注魏夀餘畢萬之後帑壽餘子音義知音智帑音奴疏正義曰閔元年晉侯賜畢萬魏魏犨者萬之孫為魏之世適夀餘為魏邑之主當是犨之近親故云畢萬之後請自歸于秦秦伯許之注許受其邑履士會之足於朝注躡士會足欲使行音義躡女涉反秦伯師于河西注將取魏魏人在東注今河北縣於秦為在河之東夀餘曰請東人之能與夫二三有司言者吾與之先注欲與晉人在秦者共先告喻魏有司音義夫音扶疏正義曰請舊是東方之人并有才能堪與彼魏邑二三有司説歸秦之言者吾與先行使士會士會辭曰晉人虎狼也若背其言臣死妻子為戮無益於君不可悔也注辭行示已無去心音義背音佩下同疏正義曰言身徇死於晉妻為戮於秦必無益於君不可改悔秦伯曰若背其言所不歸爾帑者有如河注言必歸其妻子眀白如河乃行繞朝贈之以策注策馬檛臨别授之馬檛並示已所策以展情繞朝秦大夫音義朝如字又張遙反策夲又作莢初革反檛張瓜反馬杖也王鄒華反字林作􅥺云箠也竹瓜反疏正義曰服虔云繞朝以策書贈士會杜不然者夀餘請訖士會即行不暇書策為辭且事既密不宜以簡贈人傳稱以書相與皆云與書此獨不宜云贈之以策知是馬檛檛杖也曰子無謂秦無人吾謀適不用也注示已覺其情既濟魏人譟而還注喜得士會音義譟素報反還音旋秦人歸其帑其處者為劉氏注士會堯後劉纍之裔别族復纍之姓音義纍劣被反疏正義曰伍員屬其子於齊使為王孫氏者知已將死豫令改族其傳有為而發之士會之帑在秦不顯於會之身復無所辟傳説處秦為劉氏未知何意言此討尋上下其文不類深疑此句或非夲旨蓋以為漢室初興捐棄古學左氏不顯於世先儒無以自申劉氏從秦徙魏其源夲出劉纍插注此辭將以媚於世明帝時賈逵上疏云五經皆無證圖讖明劉氏為堯後者而左氏獨有明文竊謂前世藉此以求道通故後引之以為證耳注正義曰昭二十九年傳稱陶唐氏既衰其後曰劉纍能飲食龍夏王孔甲賜氏曰御龍襄二十四年傳范宣子云丐之祖自虞以上為陶唐氏在夏為御龍氏在商為豖韋氏在周為唐杜氏晉主夏盟為范氏晉語云昔隰叔子違周難於晉生子輿為司空世及武子佐文襄輔成景是以受隨范賈逵云隰叔杜伯之子周宣王殺杜伯其子逃奔晉子輿士蒍也武子蒍之孫即士會也又士夲士蒍生士伯缺缺生士會會生士燮會是蒍之孫是為堯後也會子在秦不被賜族故自復纍之姓為劉氏秦滅魏劉氏徙大梁漢髙祖之祖為豐公又徙沛故髙祖為沛人邾文公卜遷于繹注繹邾邑魯國鄒縣北有繹山音義繹音亦鄒側留反疏正義曰邾都夲在鄒縣鄒縣北有繹山徙都於彼山旁山旁當有舊邑故曰繹邾邑也邾既遷都於此竟內别有繹邑宣十年公孫歸父帥師代邾取繹取彼之别邑不取邾之國都也但邾是小國彼繹邑亦取繹山為名應近邾之都耳史曰利於民而不利於君邾子曰苟利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民苟利矣遷也吉莫如之注左右以一人之命為言文公以百姓之命為主一人之命各有短長不可如何百姓之命乃傳世無窮故徙之音義與音預傳直専反疏正義曰史明卜筮知國遷君必死不知君命自當卒也左右之意謂不遷命可長左右勸君弗遷以一人之命為言也文公之意人君之命在於養民遷則民利志在必遷以百姓之命為主也一人之命各有短長長短先定不遷亦死是不可如何百姓之命利在水土遷就善居則民安樂乃傳世無窮也晉遷新田十世之利衛遷帝丘卜曰三百年是傳世也遂遷于繹五月邾文公卒君子曰知命疏正義曰俗人見其早卒謂由遷而死死之短長有時不遷至期亦卒傳言君子曰知命所以證俗人之惑邾文公以莊二十九年即位至今五十一年享國久矣命非短折也秋七月大室之屋壞書不共也注簡慢宗廟使至傾頽故書以見臣子不共音義頽大回反見賢遍反疏正義曰釋例曰大室之屋國之所尊朽而不繕久旱遇雨乃遂傾頽不共之甚故特書之冬公如晉朝且尋盟衛侯會公于沓請平于晉公還鄭伯會公于棐亦請平于晉公皆成之注鄭衛二于楚畏晉故因公請平鄭伯與公宴于棐子家賦鴻鴈注子家鄭大夫公子歸生也鴻鴈詩小雅義取侯伯哀恤鰥寡有征行之勞言鄭國寡弱欲使魯侯還晉恤之音義鰥古頑反疏正義曰鴻鴈美宣王勞來諸侯之詩也首章云之子于征劬勞于野爰及矜人哀此鰥寡之子侯伯卿士也存省諸侯劬勞外野爰曰也矜憐也王命之曰當及此可憐之人謂貧窮者又當哀此鰥夫寡婦當收斂之使有依附子家言鄭寡弱欲使魯侯逺行還晉存恤之也季文子曰寡君未免於此注言亦同有微弱之憂文子賦四月注四月詩小雅義取行役踰時思歸祭祀不欲為還晉音義為于偽反下皆同疏正義曰四月大夫行役之怨詩也首章云四月維夏六月徂暑先祖匪人胡寧忍豫大夫言已四月初夏而行至六月徂暑矣寒暑易節尚不得歸我之先祖匪人乎王者何當施恩於我不使得祭祀也文子言已思歸祭祀不欲更復還晉子家賦載馳之四章注載馳詩鄘風四章以下義取小國有急欲引大國以救助音義鄘音容疏正義曰載馳許穆夫人聞衛之滅思歸唁兄之詩也其四章曰陟彼阿丘言采其虻女子善懷亦各有行許人尤之衆稚且狂其五章曰我行其野芃芃其麥控于大邦誰因誰極大夫君子無我有尤百爾所思不如我所之此義取小國有急控告大國文在五章而傳言四章故云四章以下言其并賦五章文子賦采薇之四章注采薇詩小雅取其豈敢定居一月三捷許為鄭還不敢安居音義三息暫反又如字捷在接反疏正義曰捷勝也三者為侵也伐也戰也鄭伯拜注謝公為行公答拜經十有四年春王正月公至自晉注無傳告于廟邾人伐我南鄙叔彭生帥師伐邾夏五月乙亥齊侯潘卒注七年盟于扈乙亥四月二十九日書五月從赴音義潘叛干反疏正義曰齊世家孝公卒弟潘殺孝公子而立是為昭公昭公則以僖二十八年即位其年盟于踐土據文公言之唯同扈之盟耳杜以長歷校之知乙亥是四月二十九日書五月從赴者蓋赴以五月到惟言卒日不言其月即書其所至之月六月公會宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城注新城宋地在梁國榖熟縣西秋七月有星孛入于北斗注孛彗也既見而移入北斗非常所有故書之音義孛旨佩徐無憒反嵇康音勃海字彗嵇似嵗反一音雖遂反見賢遍反疏正義曰公羊傳曰孛者何彗星也其言入于北斗何北斗有中也何以書記異也穀梁傳曰孛之為言猶茀也其曰入北斗斗有環域也釋天云彗星為欃槍郭璞曰妖星也亦謂之孛言其形孛孛似掃彗也經言入于北斗則從他處而入是既見而移入北斗也彗星長有尾入于北斗杓中妖星非常所有故書公至自會注無傳晉人納捷葘于邾弗克納注邾有成君晉趙盾不度於義而大興諸侯之師涉邾之竟見辭而退雖有服義之善所興者廣所害者衆故貶稱人音義葘側其反度待各反竟音境疏正義曰捷葘不言邾者下有于邾之文莊公伐齊納子糾不言齊者上有伐齊之文與此同也僖二十五年楚人圍陳納頓子于頓昭十二年齊高偃納北燕伯于陽彼舊是國君故稱其國哀二年晉趙鞅納衛世子蒯聵于戚世子之尊以名體國上下又無衛文故亦稱國與此異也齊小白齊陽生許叔蔡季之屬經無納文又復得國與此不同也劉炫曰已去邾國又非邾君故不稱邾捷葘也得國為君皆舉國言之齊小白入于齊是也九月甲申公孫敖卒于齊注既許復之故從大夫例書卒疏正義曰傳稱請葬不許明年傳云葬視共仲則是不得從大夫禮葬而得從大夫例書卒者卒葬異禮事不相連隱公書薨不書葬不成喪不以君禮成其葬也不以君禮猶得書公薨敖雖不以卿禮葬既許其復得從例書卒齊公子商人弒其君舍注舍未踰年而稱君者先君既葬舍已即位弒君例在宣四年疏正義曰公羊之例既葬稱子踰年稱公左氏則不然僖九年九月晉侯詭諸卒冬晉里克殺其君之子奚齊傳曰書曰殺其君之子未葬也荀息立公子卓以葬十一月里克殺公子卓于朝經書里克弒其君卓是未葬稱子既葬稱君不待踰年始稱君也此稱弒其君舍舍已成君故云未踰年而稱君者先君既葬舍已即位也傳云五月昭公卒舍即位後七月為商人所弒經傳無葬昭公之文又齊侯以五月而卒傳稱七月弒舍時未合葬知已葬者正以舍已稱君決知既葬春秋之世多不如禮葬之早晚時有遲速雖復違禮而葬後君葬訖即成君非計禮之葬日始成君也宣十年夏四月齊侯元卒六月葬齊惠公冬齊侯使國佐來聘是葬訖成君之文也杜以成君在於既葬不以踰年為限此言未踰年者意在排舊説也宋子哀來奔注大夫奔例書名氏貴之故書字疏正義曰崔杼無罪書崔氏出奔此貴子哀書其字云於例字貴於名故儀父女叔之徒皆書其字則書字是貴之常例也崔氏傳曰且告以族故因稱氏唯以不名為義冬單伯如齊注單伯周卿士為魯如齊故書音義單音善為于偽反齊人執單伯注諸侯無執王使之義故不依行人例音義使所吏反疏正義曰諸侯執諸侯之大夫無罪則稱行人以見無罪之義王者之使不問有罪無罪諸侯皆不得執之執之則為不臣以諸侯無執王使之義故單伯不依行人例言單伯身雖無罪不依使例故不稱行人也諸侯不得執王使而諸侯之史得貶王使者史之所書周公定法已君有過猶尚書之王使有愆亦得貶也齊人執子叔姬注叔姬魯女齊侯舍之母不稱夫人自魯録之父母辭疏正義曰傳稱子叔姬妃齊昭公知舍之母也不稱夫人自魯録之父母辭亦不知是何公之女魯是其父母家不言文公是其父稱子叔姬者服云子殺身執閔之故言子為在室辭十二年子叔姬卒已被杞絶是並在室也傳十四年春頃王崩周公閲與王孫蘇爭政故不赴凡崩薨不赴則不書禍福不告亦不書注奔亡禍也歸復福也音義頃音傾閲音悅疏正義曰因崩薨而言禍福則禍亦崩薨之類福是反禍者也福莫大於享國有家禍莫甚於亡家喪國禍亦崩薨之類相次之物且奔亡歸復其事多矣雖有出入之例未見不告之義此傳於崩薨之末言之故知奔亡是禍歸復是福也懲不敬也注欲使怠慢者戒音義懲直升反邾文公之卒也注在前年公使弔焉不敬邾人來討伐我南鄙故惠伯伐邾子叔姬妃齊昭公生舍叔姬無寵舍無威公子商人驟施於國注驟數也商人桓公子音義妃音配夲亦作配驟仕救反施式跂反數音朔而多聚士盡其家貸於公有司以繼之注家財盡從公及國之有司富者貸音義盡車忍反貸音待又音忒注同夏五月昭公卒舍即位邾文公元妃齊薑生定公二妃晉姬生捷葘文公卒邾人立定公捷葘奔晉六月同盟于新城從於楚者服注從楚者陳鄭宋且謀邾也注謀納捷葘秋七月乙卯夜齊商人弒舍而讓元注元商人兄齊惠公也書九月從告七月無乙卯日誤音義弒音試夲又作殺元曰爾求之久矣我能事爾爾不可使多蓄憾注不為君則恨多音義蓄勑六反夲又作畜憾夲又作感户暗反恨也將免我乎爾為之注言將復殺我音義復扶又反疏正義曰言爾已殺君矣我若為君爾將肯放免我乎言將復殺我劉炫云爾將免我為君之事乎有星孛入于北斗周內史叔服曰不出七年宋齊晉之君皆將死亂注後三年宋弒昭公五年齊弒懿公七年晉弒靈公史服但言事徴而不論其占固非末學所得詳言音義弒音試下同疏正義曰昭十七年傳申須云彗所以除舊布新也天事恆象又二十六年傳晏子曰天之有彗也以除穢也宋齊晉三國之君並為無道皆有穢德今彗出而彼死是除穢之事但未測何以知此三君當之史服但言事徴不言其占非末學所得詳言故言其驗而不推其義晉趙盾以諸侯之師八百乘納捷葘于邾注八百乘六萬人言力有餘音義乘繩證反注同邾人辭曰齊出貜且長注貜且定公音義貜俱縳反徐居碧反且子餘反長丁丈反下注同宣子曰辭順而弗從不祥乃還注立適以長故曰辭順音義適丁歷反周公將與王孫蘇訟于晉王叛王孫蘇注王匡王叛不與而使尹氏與𥅆啓訟周公于晉注訟理之尹氏周卿士𥅆啓周大夫音義𥅆乃甘反趙宣子平王室而復之注使復和親楚莊王立注穆王子也子孔潘崇將襲羣舒使公子燮與子儀守而伐舒蓼注即羣舒音義燮昔協反守手又反蓼音了二子作亂城郢而使賊殺子孔不克而還八月二子以楚子出將如商密注國語曰楚莊王幼弱子儀為師王子燮為傅疏正義曰按楚語蔡聲子云楚莊王方弱申公子儀父為師王子燮為傅使潘崇子孔帥師以伐舒燮及儀父施二帥而分其室師還至則以王如廬廬戢黎殺二子而復王廬戢黎及叔麇誘之遂殺鬭克及公子燮注廬今襄陽中廬縣戢黎廬大夫叔麇其佐鬭克子儀也音義廬力於反又音盧注同戢側立反麇九倫反初鬭克囚于秦注在僖二十五年秦有殽之敗注在僖三十三年而使歸求成成而不得志注無賞報也公子燮求令尹而不得故二子作亂注傳言楚莊幼弱國內亂所以不能與晉競穆伯之從已氏也注在八年音義已音紀又音祀魯人立文伯注穆伯之子榖也穆伯生二子於莒而求復文伯以為請襄仲使無朝聽命復而不出注不得使與聽政事終寢於家故出入不書音義為請如字又于偽反下以為請同十五年亦放此與音預二年而盡室以復適莒文伯疾而請曰榖之子弱注子孟獻子年尚少音義盡津忍反復扶又反少詩照反請立難也注難榖弟音義難乃多反又如字許之文伯卒立惠叔穆伯請重賂以求復惠叔以為請許之將來九月卒于齊告喪請葬不許注請以卿禮葬宋高哀為蕭封人以為卿注蕭宋附庸仕附庸還升為卿疏正義曰蕭夲宋邑莊十二年宋萬弒閔公蕭叔大心者宋蕭邑之大夫也平宋亂立桓公宋人賞其勞以蕭邑封叔為附庸莊二十三年蕭叔朝公是為附庸故稱朝附屬宋國故云宋附庸也宣十二年楚子滅蕭此時蕭國仍在髙哀仕於蕭國遂被拔擢升為宋卿不義宋公而出遂來奔注出而待放從放所來故曰遂書曰宋子哀來奔貴之也注貴其不食汚君之祿辟禍速也音義汚汙辱之也齊人定懿公使來告難故書以九月注齊人不服故三月而後定書以九月明經日月皆從赴音義難乃旦反疏正義曰商人實以七月弒舍取其位而齊人未服三月而後定定訖始來告不告舍死之月唯言商人弒舍魯史以其九月來告即書之於九月如此傳文告以九月即書九月明經之日月皆從赴而書非褒貶詳略也杜言此者排先儒言日月有褒貶之義齊公子元不順懿公之為政也終不曰公曰夫已氏注猶言某甲音義夫音扶已音紀疏正義曰心惡其政不以為公凡與人言欲稱君者終不謂之為公曰夫已斥懿公之名也劉云甲已俱是名故云猶言某甲襄仲使告于王請以王寵求昭姬于齊注昭姬子叔姬曰殺其子焉用母請受而罪之音義焉於虔反冬單伯如齊請子叔姬齊人執之注恨魯恃王勢以求女故又執子叔姬注欲以恥辱魯經十有五年春季孫行父如晉三月宋司馬華孫來盟注華孫奉使鄰國能臨事制宜至魯而後定盟故不稱使其官皆從故稱司馬音義華户化反使所吏反從才用反疏正義曰成三年晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟彼先以君命行聘禮既而别與之盟故書聘又書盟此雖使來聘魯不令結盟故書盟未稱使也僖四年楚屈完來盟于師即其比也諸侯之卿例書名氏以華耦能率其屬官備禮盡儀故貴其人書其官也八年宋人殺其大夫司馬宋司城來奔唯言其官不言氏族此既書司馬復曰華孫者劉炫云或以為華耦貴之既深故特書族案傳華耦魯人以為敏則君子不許是魯貴之不深蓋史有文質故辭有詳略夏曹伯來朝齊人歸公孫敖之喪注大夫喪還不書善魯感子以赦父敦公族之恩崇仁孝之教故特録敖喪歸以示義疏正義曰桓十八年公之喪至自齊僖元年夫人氏之喪至自齊二注皆云告於廟也是公與夫人薨于外竟皆啓廟告至例書於策宣八年仲遂卒于垂成十七年公孫嬰齊卒于貍脤皆不書喪至是大夫喪還例不書此獨書齊人歸公孫敖之喪者釋例曰公孫敖縱情棄命既已絶位非大夫也而備書於經者惠叔毁請於朝感子以赦父敦公族之恩崇仁孝之教故曰為孟氏且國故是也不言來者魯人取之齊人送之非有専使特來故不言來哀八年齊人歸歡及闡注云不言來命歸之無指使此亦彼之類也六月辛丑朔日有食之鼓用牲于社注傳例曰非禮也單伯至自齊晉郤缺帥師伐蔡戊申入蔡注傳例曰獲大城曰入齊人侵我西鄙季孫行父如晉冬十有一月諸侯盟于扈注將伐齊晉侯受賂而止故總曰諸侯言不足序列十有二月齊人來歸子叔姬注齊人以王故來送子叔姬故與直出者異文疏正義曰傳例出曰來歸是直出之文也齊人以王之故來送叔姬故與直出異文也使者卑微不可言齊侯使人故云齊人來歸九年秦人來歸僖公成風之禭定十年齊人來歸鄆歡龜隂之田成九年晉人來媵之類皆是來者微賤不得稱君命故舉國稱人齊侯侵我西鄙遂伐曹入其郛注郛郭也音義郛音孚傳十五年春季文子如晉為單伯與子叔姬故也注因晉請齊音義為于偽反下為孟及下注為惠叔皆同三月宋華耦來盟其官皆從之書曰宋司馬華孫貴之也注古之盟會必備威儀崇贄幣賔主以成禮為敬故傳曰卿行旅從春秋時率多不能備儀華孫能率其屬以從古典所以敬事而自重使重而事敬則魯尊而禮篤故貴而不名音義皆從才用反注旅從同又音如字贄音至率所類反又音律使所吏反疏正義曰杜檢傳文諸言書曰者皆是仲尼新意此云其官皆從即云書曰司馬貴之明是貴其官從故書其官也聘禮之文有上介衆介至所聘之國誓于其竟則史讀書司馬執策賈人拭玉有司展幣其從羣官多矣詩綿蠻之篇言大臣出行微臣隨從傳稱卿行旅從昭六年楚公子棄疾聘晉至於鄭竟而誓知其從人多矣盟會禮重於聘知古人盟會必備威儀崇贄幣賔之與主以成禮為敬故傳云其官皆從貴之也春秋之時率多不能備威儀故傳每言一介行李是也華孫今獨能率其官屬以從古典所以敬其君事而自鎮重也使人既重而承事恭敬則魯被尊而賔禮篤也奉使鄰國能尊主厚禮是可貴之事故仲尼貴而不名至宴無故揚其先祖之罪為已謙辭是不敏之極魯人以為敏明君子所不與言仲尼貴其官從君子嗤其失辭有善有惡傳兩舉之也釋例曰古之盟會必備禮儀示等威明貴賤各以成禮為節節制兼備則名位不愆華孫居擾攘之世而能率由古典所以敬事而自重使重而事敬則魯尊而禮篤故貴之也至於宴會追稱先人之罪為已謙辭謙以失辭故傳云魯人以為敏明君子所不與也是故善惡兩舉之事也襄五年傳曰楚殺其大夫公子壬夫貪也君子謂楚共王於是不刑言貪也罪壬夫不刑責共王亦是兩舉之文其事類於此也服虔云華耦為卿侈而不度以君命修好結盟舉其官屬從之空官廢職魯人不知其非反尊貴之其意以為貴之者魯人貴之非君子貴之案經儀父與魯結好子哀不義宋公司城效節來奔單伯自齊致命傳皆言書曰貴之實善而貴之也此亦云書曰司馬華孫貴之何故惡而貴之也劉炫又難云此為不知其非儀父豈亦魯不知其非而貴之乎孔子修春秋裁其得失定其褒貶善惡彰於其篇臧否示於來世若魯人所善亦善之所惡亦惡之已無心於抑揚遂逐魯人之善惡筆削之勞何所施用約之以理豈其然哉其官皆從謂共聘之官無闕當有留治政者豈舉朝盡行而責其空官也若以官從即責空官聘禮官屬不少豈周公妄制禮乎公與之宴辭曰君之先臣督得罪於宋殤公名在諸侯之策臣承其祀其敢辱君注耦華督曾孫也督弒殤公在桓二年耦自以罪人子孫故不敢屈辱魯公對共宴會請承命於亞旅注亞旅上大夫也音義亞於嫁反疏正義曰尚書牧誓武王呼羣官而誓曰司徒司馬司空亞旅孔安國云亞次也旅衆也衆大夫其位次卿成二年傳魯賜晉三帥三命之服侯正亞旅受一命之服皆卿後即次亞旅知是上大夫也華孫不敢當君請受上大夫之宴魯人以為敏注無故揚其先祖之罪是不敏魯人以為敏明君子所不與也疏正義曰魯人魯鈍之人夏曹伯來朝禮也諸侯五年再相朝以修王命古之制也注十一年曹伯來朝雖至此乃來亦五年傳為冬齊侯伐曹張夲疏正義曰周禮大行人云凡諸侯之邦交嵗相問也殷相聘也世相朝也鄭玄云父死子立曰世凡諸侯相朝皆小國朝於大國或敵國相為賔或彼君新立此往朝焉或此君新即位自往朝彼皆是世相朝也襄元年邾子來朝傳曰凡諸侯即位小國朝之是此新立而彼朝之也文九年曹伯襄卒十一年曹伯來朝傳曰即位而來見也是彼新立而朝此也則知春秋之時猶有世相朝法與周禮合也周禮諸侯邦交唯有此法無五年再朝之制此云古之制也必是古有此法但禮文殘缺未知古是何時鄭玄云古者據今而述前代之言夏殷之時天子蓋六年一巡狩諸侯間而朝天子其不朝者朝罷朝五年再相朝者似如此然則古者據今時而道前世自不必皆道前代傳稱古者越國而謀非謂前代之人有此謀也古人有言非謂前代之人有此言也詩云我思古人非思夏殷之人也此云古者亦非必夏殷鄭言夏殷禮非也僖十五年公如齊杜云諸侯五年再相朝禮也引此證彼則是當時正法非謂前代禮也或人見僖公朝齊杜引此為證遂言五年再相朝是時霸主之法然則魯非霸主曹伯何以朝之曹豈推魯為霸主而屈已以朝之也且云古之制也即是古之聖王制為此法天子不衰諸侯無霸明德天子豈慮世衰霸主威權不行而為之制此法驅諸侯以朝之此不達理之言耳然則諸侯之邦交者將以協近鄰結恩好安社稷息民人土宇相望竟界連接一世一朝疏濶太甚其於間暇之年必有相朝之法周禮言世相朝者以其一舊一新彼此未狎於此之際必須往朝舉其禮之大者不言唯有此事五年再相朝正是周禮之制周禮文不具耳文襄之霸其務不煩諸侯以五年再朝往來大數更制三年一聘五年一朝所以説諸侯也五年一朝者亦謂朝大國耳且彼因説弔葬非獨霸主之喪明使諸侯相共行此禮也霸主遭時制宜非能創制改物諸侯或從時令或率舊章此在文襄之後仍守舊制故五年再相朝也傳言古之制以文襄已改故也昭十二年嵗聘間朝是周之諸侯朝天子之法故釋例引之云明王之制嵗聘以志業以解朝聘之數尚書周官六年五服一朝孔傳云一朝會京師是再朝而會周之正禮也若然大行人云侯服一嵗一見甸服二嵗一見男服三嵗一見采服四嵗一見衛服五嵗一見要服六嵗一見拘於服數朝者大行人所云謂貢物而見或君自至或遣臣來除此貢物之外别有朝會之禮沈氏以為諸侯五年再相朝及昭十三年皆為朝牧伯之法以間朝以講禮與再朝而會是三嵗之朝與六年之朝大率言之是五年之內再相朝也但魯非曹之伯國而沈云朝牧伯之禮又昭十三年朝盟主之法亦無明證沈氏之言未可從也齊人或為孟氏謀注孟氏公孫敖家慶父為長庶故或稱孟氏疏正義曰公孫敖慶父之子杜以慶父與莊公異母庶長稱孟雖強同於適自稱為仲以其實是長庶故時人或稱孟氏一曰魯爾親也飾棺置諸堂阜注堂阜齊魯竟上地飾棺不殯示無所歸音義置之䜴反竟音境殯必刃反疏正義曰喪大記云飾棺君龍帷黼荒火三列黻三列素錦褚加帷荒纁紐六大夫畫帷畫荒火三列黻三列素錦褚纁紐二玄紐二鄭玄云飾棺者以華道路及壙中不欲使衆惡其親也荒蒙也在旁曰帷在上曰荒皆所以衣柳也士布帷布荒君大夫加文章焉黼荒緣邉為黼文畫荒緑邉為雲氣火黻為列於其中耳褚以襯覆棺又加帷荒於其上紐所以連結帷荒者也禮之飾棺惟有此耳齊人教之飾棺蓋依此大夫之制而為之飾置諸堂阜故為不殯示無所歸冀魯人哀之也沈氏云飾棺即雜記云諸侯死於道其輤有裧緇布裳帷素錦以為屋而行大夫死於道以布為輤而行義或當然魯必取之從之卞人以告注卞人魯卞邑大夫音義卞皮彥反疏正義曰治邑大夫例呼為人孔子父為鄹邑大夫謂之鄹人知此卞人是卞邑大夫其邑近堂阜故見之而告魯君惠叔猶毁以為請注敖卒則惠叔請之至今期年而猶未已毁過喪禮音義期居其反疏正義曰敖卒已向周年猶尚毁以為請知敖卒即請至今未已也傳言有毁是不復應毁故知毁過喪禮也劉炫云敖去年九月卒至今年夏據月未匝不得稱期年今知非者杜以傳云惠叔猶毁據日月之久欲盛言其逺故云期年但首尾二年亦得為期年之義劉以未周十二月而規杜氏非也立於朝以待命許之取而殯之注殯於孟氏之寢終叔服之言齊人送之書曰齊人歸公孫敖之喪為孟氏且國故也注為惠叔毁請且國之公族故聽其歸殯而書之音義為于偽反葬視共仲注制如慶父皆以罪降音義共音恭聲已不視帷堂而哭注聲已惠叔母怨敖從莒女故帷堂音義已音紀疏正義曰檀弓云尸未設飾故惟堂小斂而徹帷至大斂之節又帷堂以至於殯恆帷堂雜記云朝夕哭則不帷今聲已恨穆伯故朝夕哭仍帷堂檀弓又云帷殯非古自敬薑之哭穆伯始也與此相類也敬薑者穆伯妻又伯歜之母也穆伯季悼子之子公甫靖與敖非一人襄仲欲勿哭注怨敖取其妻惠伯曰喪親之終也注惠伯叔彭生雖不能始善終可也史佚有言曰兄弟致美注各盡其美義乃繼音義佚音逸救乏賀善弔災祭敬喪哀情雖不同毋絶其愛親之道也子無失道何怨於人襄仲説帥兄弟以哭之他年其二子來注敖在莒所生音義毋音無説音悅疏正義曰祭敬者謂助祭於兄弟之家盡其敬也喪哀者謂兄弟死喪之事竭其哀也情雖不同謂內相怨恨情雖不能和同當無絶其愛是相親之道也孟獻子愛之聞於國注獻子榖之子仲孫蔑音義聞音問或如字下同蔑亡結反或譛之曰將殺子獻子以告季文子二子曰夫子以愛我聞我以將殺子聞不亦逺於禮乎逺禮不如死一人門于句鼆一人門于戾丘皆死注句鼆戾丘魯邑有冦攻門二子禦之而死音義逺于萬反下同句七侯反鼆又作黽莫幸反戾力計反疏正義曰句鼆戾丘有冦攻門不書者服虔云魯國中小冦非異國侵伐故不書也六月辛丑朔日有食之鼓用牲于社非禮也注得常鼓之月而於社用牲為非禮疏正義曰此與莊二十五年經文正同彼傳云非常此傳云非禮者彼失常鼓之月言鼓之為非常此得常鼓之月而用牲為非禮彼云六月實是七月傳因日月之變以起時歷之誤故釋例曰文十五年與莊二十五年經文皆同而更復發傳曰非禮者明前傳欲以審正陽之月後傳發例欲以明諸侯之禮而用牲為非禮也此乃聖賢之微旨而先儒所未喻也是解二傳不同之意日有食之天子不舉注去盛饌音義去起呂反饌仕眷反疏正義曰周禮膳夫掌王之食飲膳羞以養王及后世子王日一舉鼎十有二物皆有爼天地有災則不舉鄭玄云殺牲盛饌曰舉今云天子不舉是去盛饌貶膳食也伐鼓于社注責羣隂伐猶擊也疏正義曰郊特牲云社祭土而主隂氣也君南鄉於北墉下答隂之義也論語云鳴鼓而攻之伐鼓者是攻責之事故云責羣隂也日食者隂侵陽故責隂以救日孔安國尚書傳云凡日食天子伐鼓于社責上公然則社以上公配食天子伐鼓責羣隂亦以責上公也諸侯用幣于社請上公亦以請羣隂也互相備也諸侯用幣于社注社尊于諸侯故請救而不敢責之疏正義曰昭二十九年傳曰封為上公祀為貴神社稷五祀是尊是奉是社為上公之神尊於諸侯禮用幣者皆是告請神明之事以社尊故用幣請救而不敢攻責也隂侵陽而請隂者請止而勿侵陽也伐鼓于朝注退自責以昭事神訓民事君注天子不舉諸侯用幣所以事神尊卑異制所以訓民疏正義曰天子不舉自貶食耳而以為事神者畏敬神明乃自貶損徹膳不舉亦是事神之義故通以不舉為事神也示有等威古之道也注等威威儀之等差音義差初佳反又初宜反齊人許單伯請而赦之使來致命注以單伯執節不移且畏晉故許之書曰單伯至自齊貴之也注單伯為魯拘執既免而不廢禮終來致命故貴而告廟音義為于偽反下似為同拘音俱新城之盟注在前年蔡人不與注不會盟音義與音預下同晉卻缺以上軍下軍伐蔡注兼帥二軍曰君弱不可以怠注怠解也音義解佳賣反戊申入蔡以城下之盟而還凡勝國曰滅之注勝國絶其社稷有其土地音義還音旋獲大城焉曰入之注得大都而不有疏正義曰此傳已發凡例襄十三年復發傳云用大師曰滅弗地曰入再發例者兵之所加不可細舉故舉舊策之典以例而言用大師起大衆重力以陷敵因而有之故曰勝國通以滅為文也以成師重力雖獲大城得而弗有故直以出入為辭曰入之而已城不包地國不通邑滅邑必主大師是故再發例也秋齊人侵我西鄙故季文子告于晉冬十一月晉侯宋公衛侯蔡侯鄭伯許男曹伯盟于扈尋新城之盟且謀伐齊也注齊執王使且數伐魯音義使所吏反下王使同數音朔齊人賂晉侯故不克而還於是有齊難是以公不會注明今不序諸侯不以公不會故音義難乃旦反下注同書曰諸侯盟于扈無能為故也注惡受其賂不能討齊音義惡烏路反凡諸侯會公不與不書諱君惡也注謂國無難不會議事故為惡不書謂不國别序諸侯與而不書後也注謂後期也今貶諸侯以為公諱故傳發例以明之音義為于偽反疏正義曰七年公會諸侯晉大夫盟于扈傳曰公後至故不書所會因發例云凡諸侯不書所會後也後至不書其國辟不敏也彼乃議事而君後期諱君之惡故總稱諸侯此亦總稱諸侯不會非公之罪而經文相似傳辨諸嫌故更復發例而以善形惡凡諸侯為議事聚會而公不與則不歷書諸國諱君惡也若公實預會而亦不書諸國為公後期也即七年扈之盟是也今與此會受賂舍罪致使魯有齊患公雖不與非公之罪經與後期文同似為公諱故傳發例以明之此會公雖不與非公惡也齊人來歸子叔姬王故也注單伯雖見執能守節不移終達王命使叔姬得歸齊侯侵我西鄙謂諸侯不能也注不能討已遂伐曹入其郛討其來朝也注此年夏朝季文子曰齊侯其不免乎已則無禮注執王使而伐無罪音義已音紀使所吏反而討於有禮者曰女何故行禮禮以順天天之道也已則反天而又以討人難以免矣詩曰胡不相畏不畏于天注詩小雅音義女音汝相息亮反又如字疏正義曰言曰者原齊侯之意而為之辭也責曹曰女何故行禮謂責於朝魯也天道以卑承尊人道以小事大禮者自卑而尊人朝者謙順以行禮行禮以順天是天之道也此詩小雅雨無正之篇胡何也詩人責朝廷之臣女羣臣上下何以不相畏乎女上下不相畏乃是不畏于天也君子之不虐幼賤畏于天也在周頌曰畏天之威于時保之注詩周頌言畏天威于是保福祿不畏于天將何能保以亂取國奉禮以守猶懼不終多行無禮弗能在矣注為十八年齊弒商人傳音義守手又反春秋左傳注疏卷十九春秋左氏傳注疏卷十九考證叔仲彭生會晉卻缺于承筐音義叔又作州臣浩按叔又作州四字疑衍叔孫得臣敗狄于鹹注鹹魯地臣召南按杜顯言魯地以異于僖十三年齊桓會諸侯之鹹也傳潘崇復伐麇至于錫冗臣召南按地理志漢中郡錫縣注應邵曰音陽師古曰即春秋所謂錫冗傳齊襄公之二年注魯桓之十六年臣召南按史記魯世家曰齊惠公二年鄋瞞伐齊齊王子城父獲其弟榮如埋其首于北門裴駰集解曰按年表齊惠公二年魯宣公之二年也史記于此事全用左傳首尾而以為惠公二年事則異矣季孫行父帥師城諸及鄆注鄆莒魯所爭者臣召南按魯地名鄆者有二此年季孫所城東鄆也與莒分界今沂水縣北之團城是成四年城鄆以備晉及昭公所居此西鄆也今鄆城縣東有故城傳且請絶叔姬注未歸而卒歸監夲訛作笄今改正傳羣舒叛楚臣浩按魯頌曰荆舒是懲傳于此言叛楚則知從前結連比附之日久矣傳秦伯使西乞術來聘臣召南按劉敞曰內大夫未賜族者猶不氏安知此術非未賜族者乎按西乞術于戰殽時已氏西乞則杜注所云術不稱氏史略文未可駁也傳寡君敢辭玉趙汸補注曰聘義以圭璋聘重禮也已聘而還圭璋此輕財而重禮之義也然則禮終必還玉非不欲與秦為好也傳録賔主辭令以見秦人之進於禮下云國無陋矣是也杜説非又疏其意欲致與主國且受之而襄仲辭之者為不欲與秦為好因謙退辭還也監夲訛作且主之且襄仲辭之者為不欲與秦為好國謙退禮終還訛謬不可斷句今訂正傳其處者為劉氏臣召南按孔氏疑此文為漢儒所加不易之論也邾人伐我南鄙叔彭生帥師伐邾臣浩按叔彭生即十一年會卻缺于承筐之叔仲彭生也陸氏謂仲衍字觀此經殆信傳宋華耦來盟其官皆從之書曰宋司馬華孫貴之也葉夢得曰諸侯相聘使介有常不聞其官皆從也以此為貴豈春秋之意哉趙汸補注曰華孫公子鮑之黨來盟蓋結魯以輔篡不稱使不名者非時君所使無所受命從史文也書官者夫子特筆使與八年之書官者相首尾以異其事左氏於筆削之旨無傳惟榖梁傳曰以其官稱無君之辭也惜為其學者不能發明傳諸侯五年再相朝以修王命古之制也劉敞曰尚書周官六年五服一朝不得于諸侯亦五年一朝也大行人職曰凡諸侯邦交嵗相問殷相聘世相朝此為得中趙汸補注曰曹伯以文十一年來朝至十五年再來偶合五年之數傳遂以為古制由不見周禮耳春秋左氏傳注疏卷十九考證
