body:
  text: 春秋左傳注疏卷十六起僖公二十九年盡三十三年晉杜氏注唐陸德明音義孔穎達疏經二十有九年春介葛盧來注介東夷國也在城陽黔陬縣葛盧介君名也不稱朝不見公且不能行朝禮雖不見公國賓禮之故書音義介音界國名黔巨廉反又音琴陬子侯反又側留反公至自圍許注無傳夏六月會王人晉人宋人齊人陳人蔡人秦人盟于翟泉注翟泉今洛陽城內太倉西南池水也魯侯諱盟天子大夫諸侯大夫又違禮盟公侯王子虎違禮下盟故不言公會又皆稱人音義翟直歷反大倉音奉疏正義曰傳曰卿不書罪之也在禮卿不會公侯唯言諸侯之卿會魯君罪耳不言罪魯侯與子虎知其亦有罪者襄二十六年公會晉人鄭良霄宋人曹人于澶淵彼為趙武敵公貶之稱人而文不沒公此沒公不書明公别有罪五年公及齊侯宋公云云會王世子于首止王世子不盟也九年公會宰周公云云于葵丘宰周公不盟也往年踐土之會王子虎盟諸侯于王庭宣七年黑壤之會王叔桓公臨之王之公卿皆不與諸侯共盟則知諸侯不合盟王臣王臣不合與於盟今王子虎亦貶稱人知魯侯諱盟天子大夫故沒公不書也王子虎違禮下盟故貶稱人秋大雨雹音義雨于付反傳同雹蒲學反冬介葛盧來傳二十九年春介葛盧來朝舍于昌衍之上注魯縣東南有昌平城音義衍以善反公在會饋之芻米禮也注嫌公行不當致饋故曰禮也音義饋其愧反芻初俱反疏正義曰周禮掌客天子待諸侯之禮上公饔餼九牢饔五牢餼四牢車禾視死牢牢十車則禾五十車車未視生牢牢十車則米四十車侯伯饔餼七牢禾四十車米三十車子男饔餼五牢禾三十車米二十車芻薪皆倍禾也聘禮卿饔餼五牢禾米與子男同其附庸執帛與公之孤同則饔餼亦五牢禾三十車米二十車芻薪倍禾則此饋之芻米芻六十車未二十車夏公會王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟于翟泉尋踐土之盟且謀伐鄭也注經書蔡人而傳無名氏即微者秦小子憖在蔡下者若宋向戌之後會音義轅音袁濤音桃憖魚覲反向式亮反疏正義曰晉侯受命鄭伯傅王踐土與溫二會咸在鄭無叛晉之狀而此會謀伐鄭者文公昔嘗過鄭鄭不禮焉城濮戰前鄭復如楚雖以敗楚之後畏威來會晉侯以大義受之內實懷恨此會鄭人不至必有背晉之心故謀伐之也晉語城濮戰下稱文公誅觀狀以伐鄭及其陴鄭人以名實行成公不許得叔詹將亨而舍之左傳無伐鄭之事蓋溫會以後已嘗伐鄭鄭至今未服故此會謀伐明年遂與秦圍之傳曰且二於楚也鄭自知負晉故有二心也注正義曰經若貶卿稱人傳則言其名氏若傳無名氏則本是微人此經書蔡人而傳無名氏此是實蔡之微者秦是大國小子憖名見於傳而在蔡微者之後若宋向戌之後會也襄二十六年公會晉人鄭良霄宋人曹人于澶淵傳曰趙武不書尊公也向戌不書後也鄭先宋不失所也宋是大國常在鄭先向戌既以會公貶又以後至退其班使在鄭下此小子憖既以會公貶又退之在蔡下若彼宋向戌之後會也然向戌後會傳為發之經書良霄以駁向戌之後今小子憖既是後會傳不為發又不書蔡人之名以駁之者但秦辟陋西戎未同中國蔡人又蔡之微者不合書名故傳不發之經不貶責也公孫固序在齊上者蓋為大司馬尊於歸父歸父雖執齊政不廢身非上卿如管仲之類猶文十七年陳公孫寧襄二十七年陳孔奐皆序在衛下杜云非上卿即此類也卿不書罪之也注晉侯始霸翼戴天子諸侯輯睦王室無虞而王子虎下盟列國以瀆大典諸侯大夫上敵公侯虧禮傷教故貶諸大夫諱公與盟音義輯音集又七入反瀆徒木反上時掌反又如字與音預在禮卿不會公侯會伯子男可也注大國之卿當小國之君故可以會伯子男諸卿之見貶亦兼有此闕故傳重發之音義重直用反疏正義曰昭二十三年傳叔孫婼曰列國之卿當小國之君固周制也是其可以會伯子男也諸卿見貶兼有此闕謂諸卿既上盟天子大夫又上敵公侯故云兼案杜上注經云諸侯大夫違禮盟公侯又注傳云諸侯大夫上敵公侯則是唯責諸侯大夫上敵公侯不責上盟天子之使而言兼有此闕者以魯君上盟天子之使已諱而不書則諸侯之臣罪在可悉故傳云卿不書罪之略言其事故杜經傳二注唯言敵公侯不云盟王使以其可知故也劉炫以為直責其敵公侯不責其盟王使以規杜氏必如劉義則是君盟王使乃為有罪臣盟王使翻無貶責便是君臣易位尊卑失序聖人垂訓豈若是乎秋大雨雹為災也冬介葛盧來以其未見公故復來朝禮之加燕好注燕燕禮也好好貨也一嵗再來故加之音義復扶又反好呼報反下同介葛盧聞牛鳴曰是生三犧皆用之矣其音云問之而信注傳言人聽或通鳥獸之情音義犧許宜反疏正義曰周禮夷𨽻掌與鳥言貉𨽻掌與獸言鄭司農云夷狄之人或曉鳥獸之言鄭玄云夷𨽻征東夷所獲貉𨽻征東北夷所獲然則介葛盧是東夷之國其土俗有知者故介葛盧曉之經三十年春王正月夏狄侵齊秋衛殺其大夫元咺及公子瑕注咺見殺稱名者訟君求直又先歸立公子瑕非國人所與罪之也瑕立經年未會諸侯故不稱君疏正義曰咺既稱名故知以訟君立瑕為咺之罪狀春秋之世諸侯雖篡弒而立已列於會雖復見弒即成為君齊商人蔡侯班之屬是也瑕立雖已經年未會諸侯故不稱君既不成君即與元咺同為國討之辭元咺先死故稱及也瑕若成君當據周歂冶厪為文書曰衛弒其君瑕衛侯鄭歸于衛注魯為之請故從諸侯納之例例在成十八年音義為于偽反晉人秦人圍鄭注晉軍函陵秦軍泛南各使微者圍鄭故稱人音義函音咸泛音凡傳同介人侵蕭注無傳冬天王使宰周公來聘注周公天子三公兼冢宰也音義兼如字又經念反公子遂如京師遂如晉注如京師報宰周公傳三十年春晉人侵鄭以觀其可攻與否狄間晉之有鄭虞也音義間間厠之間夏狄侵齊注齊晉與國晉侯使醫衍鴆衛侯注衍醫名晉侯實怨衛侯欲殺而罪不及死故使醫因治疾而加鴆毒音義衍以善反鴆音鴆疏正義曰周禮大司馬以九伐之法正邦國賊殺其親則正之鄭玄云正之者執而治其罪王霸記曰正殺之也春秋僖二十八年晉人執衛侯歸之于京師坐殺其弟叔武如鄭彼言則衛侯合死而云罪不及死者衛侯之心疑叔武耳前驅歂犬卜君意而殺之非衛侯命殺也公知其無罪枕股而哭又命殺歂犬是則殺非公意也故不至死若然則是衛侯無罪而往年衛侯與元咺訟衛侯不勝殺士榮刖針莊子者用讒疑賢弟渝盟先期入是衛侯之罪也罪不合死而晉侯心怨欲得殺之故使醫因治疾而加鴆毒若不治疾不得使醫故知因治疾也魯語云晉人執衛成公歸之于周使醫鴆之不死醫亦不誅臧文仲言於僖公曰夫衛君殆無罪矣今晉侯鴆衛侯而不死亦不討其使者諱而惡殺之也是罪不合死之事也寧俞貨醫使薄其鴆不死注寧俞視衛侯衣食故得知之公為之請納玉於王與晉侯皆十玨王許之注雙玉曰玨公本與衛同好故為之請音義公為于偽反注同玨音角好呼報反秋乃釋衛侯衛侯使賂周歂冶厪曰苟能納我吾使爾為卿注恐元咺距已故賂周冶音義歂市專反冶音也厪音覲又音謹人名也漢書音義云古勤字也鄭氏音勤周冶殺元咺及子適子儀注子儀瑕母弟不書殺賤也音義適丁歷反公入祀先君周冶既服將命注服卿服將入廟受命疏正義曰言祀先君而服將命知其將入廟也必入廟者祭統云古者明君爵有德而祿有功必賜爵祿於太廟示不敢專也命臣必在廟而王制云爵人於朝者朝上詢於衆人位定然後入廟受命今世受官猶然周歂先入及門遇疾而死冶厪辭卿注見周歂死而懼九月甲午晉侯秦伯圍鄭以其無禮於晉注文公亡過鄭鄭不禮之音義過古禾反且二於楚也晉軍函陵秦軍泛南注此東泛也在滎陽中牟縣疏正義曰劉炫云二十四年王出適鄭處于泛注云鄭南泛也釋例土地名僖三十四年泛下云此南汜也周王出居于汜楚戍鄭師于汜襄城縣南汜城是也此年泛下云此東汜也秦軍泛南晉伐鄭師于汜滎陽中牟縣南汜澤是也杜考校既精當不徒爾尋討傳文未見杜意佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退注佚之狐燭之武皆鄭大夫音義佚音逸公從之辭曰臣之壯也猶不如人今老矣無能為也已公曰吾不能早用子今急而求子是寡人之過也然鄭亡子亦有不利焉許之夜縋而出注縋縣城而下音義縋支偽反縣音玄見秦伯曰秦晉圍鄭鄭既知亡矣若鄭亡而有益於君敢以煩執事注執事亦謂秦越國以鄙遠君知其難也注設得鄭以為秦邉邑則越晉而難保焉用亡鄭以倍鄰注倍益也音義焉於虔反下焉取之同倍蒲回反鄰之厚君之薄也若舍鄭以為東道主行李之往來共其乏困注行李使人音義舍音捨又如字共音恭木亦作供使所吏反疏正義曰襄八年傳云一介行李杜云行李行人也昭十三年傳云行理之命杜云行理使人李理字異為注則同都不解理字周語行理以節逆之賈逵云理吏也小行人也孔朝注國語其本亦作李字注云行李行人之官也然則兩字通用本多作理訓之為吏故為行人使人也君亦無所害且君嘗為晉君賜矣許君焦瑕朝濟而夕設版焉君之所知也注晉君謂惠公也焦瑕晉河外五城之二邑朝濟河而夕設版築以距秦言背秦之速音義朝如字注同版音反背音佩夫晉何厭之有既東封鄭又欲肆其西封注封疆也肆申也音義厭於鹽反疆古良反若不闕秦將焉取之疏正義曰沈云不闕秦家更何處取之言有心取秦先謀取鄭言滅秦以將利晉益大疆土闕秦以利晉唯君圖之秦伯説與鄭人盟使杞子逄孫楊孫戍之乃還注三子秦大夫反為鄭守音義説音悅為于偽反子犯請擊之公曰不可微夫人之力不及此注請擊秦也夫人謂秦穆公音義夫音扶注同因人之力而敝之不仁失其所與不知以亂易整不武注秦晉和整而還相攻更相亂也音義知音智吾其還也亦去之初鄭公子蘭出奔晉注蘭鄭穆公從於晉侯伐鄭請無與圍鄭許之使待命于東注晉東界音義與音預鄭石甲父侯宣多逆以為大子以求成于晉晉人許之注二子鄭大夫言穆公所以立冬王使周公閲來聘饗有昌歜白黑形鹽注昌歜昌蒲葅白熬稻黑熬黍形鹽鹽形象虎音義閲音悅歜在感反葅莊居反熬稻五刀反疏正義曰昌歜饗之所設必是籩豆之實周禮醢人朝事之豆其實有昌本麋臡鄭玄云昌本昌蒲根切之四寸為菹彼昌本可以為葅知此昌歜即是昌蒲葅也齊有邴歜魯有公甫歜其音為觸説文云歜盛氣怒也從欠蜀聲此昌歜之音相傳為在惑反不知其字與彼為同為異遍檢書傳昌蒲之草無此别名未知其所由也此云白黑下云嘉榖榖之白黑唯稻黍為然下云鹽虎形知其形象虎也辭曰國君文足昭也武可畏也則有備物之饗以象其德薦五味羞嘉穀鹽虎形注嘉穀熬稻黍也以象其文也鹽虎形以象武也以獻其功吾何以堪之疏正義曰周禮掌客王巡守百官從者所過之國共其積膳三公眂上公之禮卿眂侯伯之禮大夫視子男之禮宰周公是天子三公其主國待之當尊於國君但周公自謙不敢當比國君耳既云備物之饗以象其德及説備物之下即云以獻其功功德互見之耳獻其功者獻謂呈見族表之也備設以象德薦獻以見功故象獻分配為文東門襄仲將聘于周遂初聘于晉注公既命襄仲聘周未行故曰將又命自周聘晉故曰遂自入春秋魯始聘晉故曰初疏正義曰經書實行之事傳説將命之初故云命之將聘于周未行又命之遂聘于晉令其從周即去更不回也賈服不曉傳意解為先聘晉後聘周故杜詳説之經三十有一年春取濟西田注晉分曹田以賜魯故不繫曹不用師徒故曰取疏正義曰濟西之田實是曹地晉文公以賜魯故不繫於曹不繫晉者晉本意賜諸侯不為己有故亦不繫晉也昭四年傳例曰凡克邑不用師徒曰取取田取邑義亦同也公子遂如晉夏四月四卜郊不從乃免牲注龜曰卜不從不吉也卜郊不吉故免牲免猶縱也疏正義曰龜曰卜曲禮文也洪範稽疑云龜從筮從謂從人之心也人心欲吉不從是不吉也卜郊不吉不復為郊牲無所用故免牲免猶縱放不殺之也穀梁傳曰免牲者為之緇衣纁裳有司玄端奉送至于南郊免牛亦然左傳無説其事或然也桓五年傳例曰凡祀啓蟄而郊啓蟄周之三月也今於夏四月卜郊者傳舉節氣有前有却但使春分未過仍得為郊故四月得卜郊也故釋例曰凡十二月而節氣有二十四共通三百六十六日分為四時間之以閏月故節不必得恆在其月初而中氣亦不得恆在其月之半是以傳舉天宿氣節為文而不以月為正僖公襄公夏四月卜郊但譏其非所宜卜而不譏其四月不可郊也孟獻子曰啓蟄而郊郊而後耕耕謂春分也言得啓蟄當卜郊不得過春分耳是言四月得郊也周禮太宰職云祀五帝前期十日帥執事而卜日然則將祭必十日之前豫卜之也言四卜郊者蓋三月每旬一卜至四月上旬更一卜乃成為四卜也此言四卜郊不從襄七年三卜郊不從公羊傳曰曷為或言三卜或言四卜三卜禮也四卜非禮也三卜何以禮求吉之道三今左傳以為禮不卜常祀則一卜亦非不云四非而三是異於公羊説猶三望注三望分野之星國中山川皆郊祀望而祭之魯廢郊天而修其小祀故曰猶猶者可止之辭音義分扶問反疏正義曰公羊傳曰三望者何望祭也然則曷祭祭泰山河海鄭玄以為望者祭山川之名諸侯之祭山川在其地則祭之非其地則不祭且魯竟不及於河禹貢海岱及淮惟徐州徐即魯地三望謂淮海岱也賈逵服虔以為三望分野之星國之山川今杜亦從之以襄九年傳曰陶唐氏之火正關伯居商丘祀大火相土因之故商主大火昭元年傳云辰為商星參為晉星楚語云天子遍祀羣神品物諸侯二王後祀天地三辰及其土地之山川注國語者皆云諸侯二王後祀天地三辰日月星也非二王後杞分野星辰山川也以此知三望分野之星國內山川其義是也昭七年夏四月甲辰朔日有食之於時夏之二月日在降婁傳稱去衛地如魯地於十二次豕韋衛地降婁魯地魯祭分野之星其祭奎婁之神也此三望者因郊祭天而望祭之於法不獨祭也魯既廢郊天而獨修小把故曰猶公羊穀梁皆云猶者可止之辭秋七月冬杞伯姬來求婦注無傳自為其子成昏音義為于偽反狄圍衛十有二月衛遷于帝丘注辟狄難也帝丘今東郡濮陽縣故帝顓頊之虛故曰帝丘音義難乃旦反顓音專頊許玉反虛起魚反疏正義曰傳稱狄圍衛衛遷于帝丘蓋有險阻可以辟狄難也釋例曰帝丘故帝顓頊之虛故曰帝丘昆吾氏因之故曰昆吾之虛東郡濮陽縣是也傳三十一年春取濟西田分曹地也注二十八年晉文討曹分其地竟界未定至是乃以賜諸侯音義竟音境使臧文仲往宿於重館注高平方與縣西北有重鄉城音義重直龍反注同方音房與音預重館人告曰晉新得諸侯必親其共不速行將無及也從之分曹地自洮以南東傅于濟盡曹地也注文仲不書請田而已非聘享會同也濟水自滎陽東過魯之西至樂安入海音義洮吐刁反傳音附盡湋忍反樂音洛疏正義曰魯語説此事云獲地於諸侯為多臧文仲反既復命為之請曰地之多重館人之力也臣聞之曰善有章雖賤賞也今一言而辟竟其章大矣請賞之乃出而爵之襄仲如晉拜曹田也夏四月四卜郊不從乃免牲非禮也注諸侯不得郊天魯以周公故得用天子禮樂故郊為魯常祀疏正義曰明堂位稱成王幼弱周公踐天子之位以治天下制禮作樂七年致政於成王成王以周公為有勳勞於天下命魯公世世祀周公以天子之禮樂是以魯君孟春乘大輅載弧韣旗十有二旊日月之章祀帝于郊配以后稷天子之禮也是魯以周公之故得用天子禮樂天子命之則為常祀故郊為魯之常祀也記言正月謂周正違子之月與傳啓蟄而郊其月不同禮記是後儒所作不可以難左傳猶三望亦非禮也禮不卜常祀注必其時而卜其牲日注卜牲與日知吉凶牛卜日曰牲注既得吉日則牛改名曰牲疏正義曰卜云卜其牲日則牲之與日俱卜之也必當先卜牲而後卜日卜得吉日則改牛為牲然則牛雖卜吉未得稱牲牲是成用之名不可改名為牲更卜吉凶明知卜牛在卜日之前也此言免牲是已得吉日牲既成矣成七年乃免牛是未得吉日牲未成也牲成而卜郊上怠慢也注怠於古典慢瀆龜策望郊之細也不郊亦無望可也秋晉搜于清原作五軍以禦狄注二十八年晉作三行今罷之更為上下新軍河東聞喜縣北有清原音義行户郎反趙衰為卿注二十七年命趙衰為卿讓於欒枝今始從原大夫為新軍帥音義帥所類反疏正義曰晉語云文公命趙衰為卿讓於欒枝先軫後又使為卿讓於狐偃孤毛卒又使為卿讓於先且居公曰趙衰三讓其所讓皆社稯之衛也廢讓是廢德也以趙衰故搜于清原作五軍使趙衰將新上軍箕鄭佐之胥嬰將下軍先都佐之如彼文正為趙衰作五軍故特言趙衰為卿以見之於時舊三軍之將佐先軫將中軍郤溱佐之先且居將上軍狐偃佐之樂枝將下軍胥臣佐之國語有其文也冬狄圍衛衛遷于帝丘卜曰三百年疏正義曰案史記衛世家及年表衛從此年以後歷十九君積四百二十年衛元君乃徙于野王元君卒子角代立秦滅衛廢角為庶人衛成公夢康叔曰相奪豫享注相夏后啓之孫居帝丘享祭也音義卜曰音越或人實反非也相息亮反注及下同夏戶雅反下同疏正義曰夏本紀禹生啓啓生太康及仲康仲康生相是為啓之孫也周禮祭人鬼曰享公命祀相寧武子不可曰鬼神非其族類不歆其祀注歆猶饗也音義歆許金反杞鄫何事注言杞鄫夏後自當祀相相之不享於此久矣非衛之罪也注言帝丘久不祀相非衛所絶不可以間成王周公之命祀注諸侯受命各有常祀音義間間厠之間請改祀命注改祀相之命疏正義曰昭七年傳稱晉居夏虛祀鯀而晉侯疾瘳此衛居帝丘而不合祀相者祭法云鯀障洪水而殛死載在祀典傳稱實為夏郊三代祀之周室既衰晉為盟主當代天子祭絶祀之神故祭鯀為得禮相無功德於民惟當子孫自祭故稱杞鄫何事非衛之罪與鯀異也鄭泄駕惡公子瑕鄭伯亦惡之故公子瑕出奔楚注瑕文公子傳為納瑕張本泄駕亦鄭大夫隱五年泄駕距此九十年疑非一人音義惡烏路反下同經三十有二年春王正月夏四月己丑鄭伯捷卒注無傳文公也三同盟音義捷在妾反疏正義曰經無其葬故言其諡也捷以莊二十二年即位至此與魯十餘同盟言三同盟者但杜數同盟不例若周盟少者數先君之盟或數大夫之盟或數經不書盟而傳載盟者若同盟多者唯數今君或就今君之中數其大會盟亡顯著者比言三同盟者皆據王臣臨盟則八年盟于洮九年于葵丘二十八年于踐土是也劉炫不尋杜意而規其謬非也衛人侵狄注報前年狄圍衛秋衛人及狄盟注不地者就狄廬帳盟音義廬力於反帳張亮反疏正義曰會狄于攢函言地今不言地故云就廬帳盟廬帳即是狄人所居之處上云衛人侵狄及狄盟猶若公如晉及晉侯盟是指其所居之處故不言地劉炫云春秋時戎狄錯居中國此狄無國都處所直云及狄盟盟於狄之處也此狄俗逐水草無城郭宮室故云就廬帳盟冬十有二月己卯晉侯重耳卒注同盟踐土翟泉傳三十二年春楚鬬章請平于晉晉陽處父報之晉楚始通注陽處父晉大夫晉楚自春秋以來始交使命為和同音義使所吏反夏狄有亂衛人侵狄狄請平焉秋衛人及秋盟冬晉文公卒庚辰將殯于曲沃注殯窆棺也曲沃有舊宫焉音義窆彼驗反一本作塗疏正義曰周禮鄉師職云大喪及葬與匠師御柩及窆執斧以蒞匠師昭十二年傳曰日中而塴禮記皆作封封墉窆聲相近而字改易耳皆謂葬時下棺之名也殯則攢置於西序亦是下棺於地故殯為窆棺也晉武公自曲沃而兼晉國曲沃有舊時宫廟故公卒而往殯焉禮諸侯五日而殯案經文以己卯卒庚辰是卒之明日即將殯者以曲沃路逺故早行耳禮在牀日尸在棺曰柩下云柩有聲明是斂於棺而後行也出絳柩有聲如牛注如牛詬聲音義柩其救反禮云在牀曰尸在棺曰柩詬呼口反卜偃使大夫拜曰君命大事將有西師過軼我擊之必大捷焉注聲自柩出故曰君命大事戎事也卜偃聞秦密謀故因柩聲以正衆心音義過古禾反又古卧反軼直結反又音逸杞子自鄭使告于秦注三十年秦使大夫杞子戍鄭曰鄭人使我掌其北門之管注管籥也音義籥餘若反若濳師以來國可得也穆公訪諸蹇叔蹇叔曰勞師以襲遠非所聞也注蹇叔秦大夫音義蹇紀輦反師勞力竭遠主備之無乃不可乎師知所為鄭必知之勤而無所必有悖心注將害良善音義悖必內反且行千里其誰不知公辭焉注辭不受其言召孟明西乞白乙使出師於東門之外注孟明百里孟明視西乞西乞術白乙白乙丙疏正義曰世族譜以百里孟明視為百里奚之子則姓百里名視字孟明也古人之言名字者皆先字後名而連言之其術丙必是名西乞白乙或字或氏不可明也譜云或以為西乞術白乙丙為蹇叔子案傳稱蹇叔之子與師言其在師中而已若是西乞白乙則為將帥不得云與也或説必妄記異聞耳蹇叔哭之曰孟子吾見師之出而不見其入也公使謂之曰爾何知中夀疏正義曰上夀百二十嵗中夀百下夀八十爾墓之木拱矣注合手曰拱言其過老悖不可用音義孟子本或作孟兮夀音授又如字拱九勇反蹇叔之子與師哭而送之曰晉人禦師必於殽注殽在𢎞農澠池縣西音義殽本又作崤户交反劉昌宗音豪澠綿善反又綿忍反與芋恕反殽有二陵焉注大阜曰陵疏正義曰釋地云髙平曰陸大陸曰阜大阜曰陵李巡曰高平謂土地豐正名為陸大陸謂土地髙大名曰阜阜最髙大為陵其南陵夏后臯之墓也注臯夏桀之祖父音義夏户雅反注同臯古刀反疏正義曰夏本紀文桀父名發桀名履癸其北陵文王之所辟風雨也注此道在二殽之間南谷中谷深委曲兩山相嶔故可以辟風雨古道由此魏武帝西討巴漢惡其險而更開北山髙道音義辟音避谷古木反又音欲嶔許金反又音欽本或作嵐力含反惡烏路反疏正義曰此道見在殽是山名俗呼為土殽石殽其厄道在兩殽之間山髙而曲兩山參差相映其下兩所不及故可以辟風雨也公羊傳曰蹇叔送其子而戒之曰爾即死必於殽之嶔巖是文王之所辟風雨者也此注言兩山相嶔故可以辟風雨者杜氏此言或取公羊之意嶔字蓋從山但嶔巖是山之貌而云相嶔文亦不順未能審杜意也何休云其處險阻隘勢一人可要百故文王過之驅馳常若辟風雨必死是間注以其深險故余收爾骨焉秦師遂東注為明年晉敗秦于殽傳音義為于偽反經三十有三年春王二月秦人入滑注滅而書入不能有其地齊侯使國歸父來聘夏四月辛巳晉人及薑戎敗秦師于殽注晉侯諱背喪用兵故通以賤者告薑戎薑姓之戎居晉南鄙戎子駒支之先也晉人角之諸戎掎之不同陳故言及音義背音佩掎居綺反陳直覲反疏正義曰杜以諸侯之貶不至稱人故知諱在喪用兵以賤者告也襄十四年傳戎子駒支自陳此事云謂我諸戎四嶽之裔胄且此云薑戎知是薑姓之戎也角之掎之皆彼傳文耳彼云晉禦其上戎亢其下是不同陳故言及也諸戰之陳其用師不言反者皆同陳也癸巳葬晉文公狄侵齊公伐邾取訾婁音義訾子斯反秋公子遂帥師伐邾晉人敗狄于箕注太原陽邑縣南有箕城郤缺稱人者未為卿疏正義曰劉炫云案傳晉侯親兵先軫死敵則將帥非郤缺也而稱人者晉諱而以微人告今知不然者以戰于殽文公未葬故諱其背殯用兵此則文公既葬之後於禮得從戎事又敗狄有功又何恥諱而以微者告故杜云郤缺稱人未為卿劉以晉侯稱人同於殽諱而規杜氏非也冬十月公如齊十有二月公至自齊乙巳公薨于小寢注小寢內寢也乙巳十一月十二日經書十二月誤隕霜不殺草李梅實注無傳書時失也周十一月今九月霜當微而重重而不能殺草所以為災音義隕于敏反疏正義曰此在十二月下杜以長歷殺之乙巳是十一月十二日謂經十二月為誤遂以此經四事皆為十一月夏之九月霜不應重重又不能殺草所以為災也此云隕霜不殺草定元年冬十月隕霜殺菽穀梁傳曰未可以殺而殺舉重可殺而不殺舉輕其意言菽重草輕也晉人陳人鄭人伐許傳三十三年春秦師過周北門左右免胄而下注王城之北門胄兜鍪兵車非大將御者在中故左右下御不下音義胄直救反兜丁侯反鍪亡侯反將子匠反疏正義曰成二年傳稱晉解張御郤克鄭丘緩為右張侯曰矢貫子手及肘左輪朱殷傷手而血染左輪是御者在左大將居中也宣十二年傳稱楚許伯御樂伯攝叔為右樂伯云左射以菆是射在左而御在中也鄭玄詩箋云兵車之法左人持弓右人持矛中人御車故左右下御不下超乘者三百乘王孫滿尚幼觀之言於王曰秦師輕而無禮必敗注謂過天子門不卷甲束兵超乘示勇音義乘繩證反下及注皆同輕遣政反下同疏正義曰服虔云無禮謂過天子門不橐甲束兵而但免胄吕氏春秋説此事云師行過周王孫滿日過天子之城宜櫜甲束兵左右皆下然則過天子門當卷甲束兵必古有此禮或出司馬兵法其書既亡未見其本輕則寡謀無禮則脫注脫易也音義脫他活反易以䜴反入險而脫又不能謀能無敗乎及滑鄭商人弦髙將市於周遇之以乘韋先牛十二犒師注商行賈也乘四韋先韋乃入牛古者將獻遺於人必有以先之音義先悉薦反注有以先之同犒若報反賈音古遺唯季反疏正義曰周禮太宰以九職任萬民六曰商賈阜通貨賄鄭玄云行曰商處曰賈易云商旅不行是商行賈坐而言行賈者相形以曉人也乘車必駕四馬因以乘為四名禮言乘矢謂四矢此言乘韋謂四韋也遺人之物必以輕先重後故先韋乃入牛老子云雖有拱璧以先四馬不如坐進此道是古者將齊饋必有以先之曰寡君聞吾子將步師出於敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積注腆厚也淹久也積芻米菜薪音義步師步猶行也從才用反下同腆他典反為于偽反下為吾子同積子賜反注同疏正義曰腆厚淹久經傳常訓也周禮大行人云王待諸侯之禮上公五積侯伯四積子男三積積皆謂未禾芻薪知此亦然案掌客上公五積皆視飱牽鄭注云飱牽謂牽牲以往不殺也亦有米禾芻薪鄭又注云上公飱五牢米二十車禾三十車侯伯四牢米禾皆二十車子男三牢米十車禾二十車芻薪皆倍其禾積既視飱則米禾芻薪與飱同行則備一夕之衛且使遽告于鄭注遽傳車疏正義曰釋言云驛遽傳也孫炎曰傳車驛馬也鄭穆公使視客館注視秦三大夫之舍則束載厲兵秣馬矣注嚴兵待秦師使皇武子辭焉曰吾子淹久於敝邑唯是脯資餼牽竭矣注資糧也生曰餼牽謂牛羊豕音義餼許氣反牲腥曰餼牲生曰牽疏正義曰聘禮歸飱饔餼五牢飪一牢腥二牢餼二牢以飪是熟肉腥是生肉知餼是未殺故云生曰餼牛羊豕可牽行故云牽謂牛羊豕也為吾子之將行也注示知其情鄭之有原圃猶秦之有具囿也注原圃具囿皆圃名音義國布古反疏正義曰下注云中牟縣西有圃田澤則原圃地名以其地為囿知與具囿皆囿名也囿者所以飬禽獸故令自取其麋鹿焉天子曰苑諸侯曰囿吾子取其麋鹿以間敝邑若何注使秦戍自取麋鹿以為行資令敝邑得間暇若何猶如何滎陽中牟縣西有圃田澤音義麋亡悲反問音間注同令力呈反杞子奔齊逢孫楊孫奔宋孟眀曰鄭有備矣不可冀也攻之不克圍之不繼吾其還也滅滑而還齊國莊子來聘自郊勞至於贈賄禮成而加之以敏注迎來曰郊勞送去曰贈賄敏審當於事音義勞力報反注同賄呼罪反當丁浪反又如字疏正義曰聘禮賓至于近郊君使卿朝服用束帛勞及聘事皆畢乃去賔遂行舍於郊公使卿贈如覿幣是來有郊勞去有贈賄也臧文仲言於公曰國子為政齊猶有禮君其朝焉臣聞之服於有禮社稷之衛也注為公如齊傳晉原軫曰秦違蹇叔而以貪勤民天奉我也注奉與也音義奉扶用反注及下同奉不可失敵不可縱縱敵患生違天不祥必伐秦師欒枝曰未報秦施而伐其師其為死君乎注言以君死故忘秦施音義縱子用反下同施始䜴反注及下同先軫曰秦不哀吾喪而伐吾同姓秦則無禮何施之為注言秦以無禮加已施不足顧吾聞之一日縱敵數世之患也謀及子孫可謂死君乎注言不可謂背君音義數所主反背音佩遂發命遽興薑戎子墨衰絰注晉文公未葬故襄公稱子以凶服從戎故墨之音義衰七雷反絰直結反梁𢎞御戎萊駒為右音義萊音來夏四月辛巳敗秦師于殽獲百里孟明視西乞術白乙丙以歸遂墨以葬文公晉於是始墨注後遂常以為俗記禮所由變文嬴請三帥注文嬴晉文公始適秦春穆公所妻夫人襄公嫡母三帥孟明等音義嬴音盈帥所類反注同妻七計反嫡丁歷反曰彼實搆吾二君寡君若得而食之不厭君何辱討焉使歸就戮于秦以逞寡君之志若何公許之先軫朝問秦囚公曰夫人請之吾舍之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國注暫猶卒也音義厭於豔反又於鹽反戮音六逞敕領反拘音俱卒寸忽反墮軍實而長寇讎亡無日矣注墮毁也音義墮許規反長丁丈反不顧而唾公使陽處父追之及諸河則在舟中矣釋左驂以公命贈孟明注欲使還拜謝因而執之音義唾他卧反驂七南反孟明稽首曰君之惠不以纍臣釁鼓注纍囚繫也殺人以血塗鼓謂之釁鼓音義纍力追反釁許覲反使歸就戮于秦寡君之以為戮死且不朽若從君惠而免之三年將拜君賜注意欲報伐晉秦伯素服郊次注待之於郊鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也大夫何罪且吾不以一眚掩大德注眚過也音義鄉許亮反替他計反眚所景反掩於撿反狄侵齊因晉喪也公伐邾取訾婁以報升陘之役注在二十二年邾人不設備秋襄仲復伐邾注魯亦因晉喪以陵小國音義復扶又反狄伐晉及箕八月戊子晉侯敗狄于箕郤缺獲白狄子注白狄狄别種也故西河郡有白部胡音義箕音基種章勇反疏正義曰宣十五年晉師滅赤狄潞氏以潞子嬰兒歸彼書於經而此不書者蓋略賤之不以告也先軫曰匹夫逞志於君注謂不顧而唾而無討敢不自討乎免胄入狄師死焉狄人歸其元注元首面如生注言其有異於人初臼季使過冀見冀缺耨其妻饁之注臼季胥臣也冀晉邑耨鋤也野饋曰饁音義臼其九反使所吏反過古禾反又古卧反耨乃豆反鉏田也饁于輒反字林于劫反鋤本又作鉏仕居反饋其位反餉也疏正義曰世本云垂作耨釋器云斪斸謂之定李巡曰鋤也廣雅云定謂之耨吕氏春秋云耨枘尺此其度也其耨六寸所以間稼也髙誘注云槈耘苗也六寸所以入苖間也釋名云耨鋤嫗媷禾也釋詁云饁饋也孫炎曰饁野之饋也敬相待如賔與之歸言諸文公曰敬德之聚也能敬必有德德以治民君請用之臣聞之出門如賔注如見大賔承事如祭注常謹敬也仁之則也公曰其父有罪可乎注缺父冀芮欲弒文公在二十四年音義芮如鋭反弒音試或如字對曰舜之罪也殛鯀其舉也興禹注禹鯀子音義殛紀力反誅也鯀古本反禹父也管敬仲桓之賊也實相以濟康誥曰父不慈子不祗兄不友弟不共不相及也注康誥周書祗敬也音義實相息亮反不共音恭疏正義曰此雖言康誥曰直引康誥之意耳非康誥之全文也彼云子弗祗服厥父事大傷厥考心于父不能字厥子乃疾厥子于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟曰乃其速由文王作罰刑兹無赦其意言不慈不祗不友不恭各用文王之法刑之不是罪子又罪父刑弟復刑兄是其不相及也詩曰采葑采菲無以下體君取節焉可也注詩國風也葑菲之菜上善下惡食之者不以其惡而棄其善言可取其善節音義葑芳逢反菲芳匪反疏正義曰彼毛傳曰葑須也菲芴也釋草云須葑孫炎曰須一名葑鄭玄坊記注云葑蔓菁也釋草又云菲芴也孫炎曰葍類也陸璣毛詩義疏云葑蔓菁幽州人或謂之芥也菲似葛莖粗葉厚而長有毛三月中蒸煮為茹滑美又可以為羮是也此二菜其根有惡詩故云上善下惡食之者取善節也文公以為下軍大夫反自箕襄公以三命命先且居將中軍注且居先軫之子其父死敵故進之音義且子徐反將子匠反疏正義曰且居父在之時已將上軍以父死敵故進之以再命命先茅之縣賞胥臣曰舉郤缺子之功也注先茅絶後故取其縣以賞胥臣以一命命郤缺為卿復與之冀注還其父故邑音義復扶又反又音服亦未有軍行注雖登卿位未有軍列音義行户剛反冬公如齊朝且弔有狄師也反薨于小寢即安也注小寢夫人寢也譏公就所安不終于路寢晉陳鄭伐許討其二於楚也楚令尹子上侵陳蔡陳蔡成遂伐鄭將納公子瑕注三十一年瑕奔楚門于桔柣之門瑕覆于周氏之汪注車傾覆池水中音義桔戶結反柣大結反覆芳服反注同汪烏黃反外僕髠屯禽之以獻注殺瑕以獻鄭伯音義髠苦門反屯徒門反文夫人斂而葬之鄶城之下注鄭文公夫人也鄶城故鄶國在滎陽密縣東北傳言穆公所以遂有國音義斂力豔反鄶古外反晉陽處父侵蔡楚子上救之與晉師夾泜而軍注泜水出魯陽縣東經襄城定陵入汝音義夾古洽反一音古協反泜音雉又直里反又徒死反陽子患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舍子濟而陳注欲辟楚使渡成陳而後戰音義陳直覲反注同遲速唯命不然紓我注紓緩也音義紓音舒一音直吕反老師費財亦無益也注師久為老音義費芳味反乃駕以待子上欲涉大孫伯曰不可晉人無信半涉而薄我悔敗何及不如紓之乃退舍注楚退欲使晉渡陽子宣言曰楚師遁矣遂歸楚師亦歸大子商臣譖子上曰受晉賂而辟之椘之恥也罪莫大焉王殺子上注商臣怨子上止王立己故譖之音義遁徒困反葬僖公緩注文公元年經書四月葬僖公僖公實以今年十一月薨并閏七月乃葬故傳云緩自此以下遂因説作主祭祀之事文相次也皆當次在經葬僖公下今在此簡編倒錯音義編必連反又布千反倒丁老反疏正義曰經書十二月下云乙巳公薨杜以長歷推之十一月十二日有乙巳乙巳非十二月文元年傳曰於是閏三月非禮也故至四月并閏為七月禮當五月而葬今乃七月始葬故傳曰緩也左氏為傳凡有譏者皆先言所譏乃復述其事自此以下不論葬紱既言葬之緩遂因説作主祭祀之事皆事與葬速故文相次耳僖公葬在明年而此年有傳知其當在明年絰葬僖公下今在此者簡編倒錯故爾杜以此年空説葬事而其上無經文元年空舉經而其下無傳故謂此年之傳當在彼絰之下於理誠為順序於文失於重疊此云葬僖公彼又云葬僖公重生文者亦既錯謬必乖其本或可編絶之處三字分簡彼有葬無公此有公無葬後人並添足之致使彼此共剩一文耳若其不然不知所以謬也作主非禮也注文二年乃作主遂因葬文通譏之凡君薨卒哭而祔祔而作主特祀於主注既葬反虞則免喪故曰卒哭哭止也以新死者之神祔之於祖尸柩已遠孝子思慕故造木主立几筵焉特用喪禮祭祀於寢不同之於宗廟言凡君者謂諸侯以上不通於卿大夫音義祔音附蒸嘗禘於廟注冬祭曰蒸秋祭曰嘗新主既立特祀於寢則宗廟四時常祀自如舊也三年禮畢又大禘乃皆同於吉音義蒸之承反禘大計反疏正義曰釋例云此諸侯之禮故稱君君既葬反虞則免喪故曰卒哭哭止也以新死者之神祔之於祖尸柩既已遠矣神形又不可得而見矣孝子之思彌篤倣徨求索不知所至故造木主立几筵特用喪禮祭祀於寢不同之於宗廟宗廟則復用四時蒸嘗之禮也三年喪畢致新死者之主以進於廟廟之遠主當遷入祧於是乃大祭於太廟以審定昭穆謂之禘此皆自諸侯上達天子之制也其意於此注同文少詳耳劉炫云既言作主非禮因言作主祭祀吉凶之節凡諸侯之薨葬日而虞從是以後間日一虞七虞之後明日而為卒哭之祭卒哭之明日而作祔祭以新死之神祔於祖父於此祔祭而作木主以依神其主在寢特用喪禮祭祀於在寢之主其四時常祭礿祀蒸嘗及三年喪畢為大祀禘祭並行之於廟正禮當如是耳今以葬僖公後積十月始作僖公木主是作主太緩故為非禮也注既葬反虞至大夫正義曰檀弓曰既封有司以几筵舍奠於墓左反日中而虞葬日虞弗忍一日離也雜記曰士三虞大夫五諸侯七士虞記曰始虞用柔日再虞皆如初三虞卒哭用剛日如士虞之禮諸侯七虞其六虞用柔日最後虞改用剛日間一日乃卒哭卒哭亦用剛日則諸侯卒哭在葬後十四日也然始免喪與葬不得相遠共在一月之內故杜每云既葬卒哭棄麻除是其不甚相逺然喪事先遠日則葬在月半之後葬後行虞虞後卒哭所以得同月者但卜葬雖先逺日但葬是喪之大事又有虞祔之祭當應及早為之使得容其虞祔禮云喪事先逺日謂練祥禫除之屬晉平公之喪大夫欲見新君王與文伯宴樽以魯壺皆是既葬之後未卒哭之前雜記曰天子七月而葬九月而卒哭諸侯五月而葬七月而卒哭釋例云禮記後人所作不與春秋同是七虞九虞杜所不用或云杜亦同之解云比注言虞則免喪者謂七虞皆畢乃免喪免喪後日為卒哭也理亦通耳檀弓曰葬日虞是日也以虞易奠卒哭曰成事是日也以吉祭易喪祭是葬前奠而不祭至虞乃為喪祭卒哭乃為吉祭也自初死至於卒哭晝夜哭無時謂之卒哭者卒此無時之哭自此以後唯朝夕哭耳天子諸侯則於此除喪全不復哭也檀弓於卒哭之下云明日祔於祖父士虞記亦云卒哭明日以其班祔是以新死之神祔之於祖也於此之時葬已多日尸柩既已逺矣孝子思慕彌篤倣徨不知所至故造木主立几筵以依神也作主置之於寢特用喪祭之禮祭之於寢不同祭之於宗廟也大夫以下不得稱君此言凡君者謂諸侯以上耳不得通於卿大夫也文二年公羊傳曰主者曷用虞主用桑練主用栗鄭玄注禮用公羊之説以為虞已有主此傳稱祔而作主者虞而作主禮本無文不可以公羊而疑左氏也注冬祭曰蒸至於吉正義曰周禮禮記諸文皆有之也新主既特祀於寢而其餘宗廟四時常祀自如舊不廢也三年喪畢新主入廟廟之遠主當遷入祧乃為大祭於太廟以審昭穆謂之為禘於是新死者乃得同於吉也釋例曰舊説以為諸侯喪三年之後乃蒸嘗按傳襄公十五年冬十二月晉侯周卒十六年春葬晉悼公改服修官蒸于曲沃會于溴梁其冬穆叔如晉且言齊故晉人答以寡君之未禘祀其後晉人徵朝于鄭鄭公孫僑云溴梁之明年公孫夏從寡君以朝于君見於嘗酎與執膰焉此皆春秋之明證也是言知諸侯卒哭以後時祭不廢之事也釋例又曰凡三年喪畢而後禘於是遂以三年為節仍計除喪即吉之月卜日而後行事無復當月也是以絰書禘及大事傳唯見莊公之速他無非時之譏也如例所言除喪即吉禘遂以三年為常則新君即位二年而禘五年又禘八年又禘僖八年禘于太廟宣八年有事于太廟定八年從祀先公皆得三年之常期也按元年夫人薑氏薨當以三年喪畢而禘再絰三年則九年乃可禘耳而得八年禘者哀薑喪畢不為作禘八年因禘祭乃致之故計閔公之喪數之耳昭十五年有事于武公計非禘年而為禘者釋例曰禘于太廟禮之常也各於其宫時之為也雖非三年大祭而書禘用禘禮也昭二十五年傳曰將禘於襄公亦其義也三年之禘自國之常常事不書故唯書此數事祭雖得常亦記仲遂叔弓之非常也如杜此言昭十五年雖非禘耳用禘禮故稱禘也鄭玄解禮三年一祫五年一禘杜解左傳都不言祫者以左傳無祫語則祫禘正是一祭故杜以審禘昭穆謂之為禘明其更無祫也古禮多亡未知孰是且使禮傳各從其家而為之説耳劉炫云以正經無祫文也唯禮記毛詩有祫字耳釋天云禘大祭也則祭無大於禘者若祫大於禘禘焉得稱大乎春秋左傳注疏卷十六春秋左氏傳注疏卷十六考證會王人晉人宋人齊人陳人蔡人秦人盟于翟泉臣浩按公羊穀梁會字上皆有公字左氏經無之傳發貶卿稱人之義矣程子曰晉文連年會盟皆在王畿之側而此盟復迫王城又與王人盟強逼甚矣故諱公諸侯貶稱人惡之大也傳夏公會王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟于翟泉注秦小子憖在蔡下者若宋向戌之後會趙汸補注曰秦伯爵國其大夫自合班蔡國大夫下非為後至成二年秦右太夫説在宋華元陳公孫寧上乃楚人為之不可據以為例又疏公孫固序在齊上者蓋為大司馬尊於歸父歸父雖執齊政不廢身非上卿如管仲之類臣召南按高氏國氏乃齊之命大夫世為上卿傳十二年管仲之言可證不得云非上卿也此會宋序齊上或是王子虎以國之列爵為序故齊次宋耳傳卿不書罪之也劉敞曰翟泉在王城之內諸侯之大夫入天子之境雖貴曰士陪臣也而盟于天子之側自此始是以貶也又意林曰列國之卿亂王室之禮王子虎不能正也使陪臣盟天子之側所謂下陵上替也天王使宰周公來聘注周公天子三公兼冢宰也孫覺曰禮雖有天子聘諸侯之義然義不可使三公書使宰周公來聘見周道之衰而諸侯強盛也傳東門襄仲將聘于周陳則通春秋提綱曰二百四十二年之間魯紀無聘周之文亦無實聘周之意公子遂之聘報周公也叔孫得臣之聘因毛伯也黃仲炎通説曰凡書大夫如京師者見諸侯不朝而聘也衛遷于帝丘注今東郡濮陽縣臣召南按漢書地理志曰東郡濮陽衛成公自楚丘徙此故帝丘顓頊虛又後漢郡國志注引皇覽曰顓頊冡在城門外廣陽里中傳晉搜于清原作五軍以禦狄趙衰為卿趙汸補注曰上下新軍帥皆卿也晉于是乎有八卿傳衛成公夢康叔曰相奪豫享注相夏后啓之孫居帝丘臣召南按夏后相居帝丘惟據此傳伍員曰昔有過澆殺斟灌以伐斟尋滅夏后相斟灌亦衛地后相居帝丘依之耳汲郡古文則直謂相居斟灌傳其南陵夏后臯之墓也臣召南按史記夏本紀夏帝孔甲子為帝臯通鑑前編后臯在位十一嵗子發踐位十九嵗子癸踐位是為桀十有二月乙巳注乙巳十一月十二日絰書十二月誤萬斯大學春秋隨筆曰絰傳所書日月杜氏每以長歷推校或言絰誤或言傳誤甚不然之獨是絰言誤不可謂非文元年書二月癸亥日有食之此二日也從癸亥逆推正月朔非壬辰則癸巳乙巳距壬辰癸巳四十八九日則在十一月明矣傳葬僖公緩趙汸補注曰劉氏云杜氏欲讀緩以上為一句非也蓋春秋周歷本差而後世追算又互有得失杜氏惟據長歷釋絰遂以此年十二月所書四事皆為十一月亦固矣臣召南按如劉敞説當以緩字連下讀曰緩作主非禮也傳蒸嘗禘于廟朱子曰左氏蒸嘗禘于廟與王制喪三年不祭者不合臣召南按襄十六年春葬晉悼公傳言改服修官蒸于曲沃則當時之事皆然非周禮之舊也春秋左氏傳注疏卷十六考證
