body:
  text: 春秋左傳注疏卷四十五起昭公九年盡十二年晉杜氏注唐陸德明音義孔穎達疏經九年春叔弓會楚子于陳注以事往非行會禮疏注正義曰此與宣十五年公孫歸父會楚子于宋其事同也楚子在彼魯敬大國自往會之非楚子召使會自以小國事大國之禮往許遷于夷注許畏鄭欲遷故以自遷為文疏注正義曰許自楚莊王以來世屬於楚常與鄭為仇敵今畏鄭欲遷都近楚楚從其意而遷之故以許自遷為文若許不欲遷而楚強遷之則當云楚人遷許如宋人遷宿齊人遷陽夏四月陳災注天火曰災陳既已滅降為楚縣而書陳災者猶晉之梁山沙鹿崩不書晉災害繫於所災所害故以所在為名疏注正義曰天火曰災宣十六年傳例也公羊榖梁經皆作陳火公羊傳曰陳已滅矣其言陳火何存陳也穀梁傳曰國曰災邑曰火火不志此何以志閔陳而存之也賈服取彼為説言愍陳不與楚故存陳而書之言陳尚為國也杜以左氏無此義故辨而異之云陳既已滅降為楚縣不言楚陳災而直書陳災者猶如晉之梁山沙鹿崩不書也以彼不繫晉知法自不當繫楚非是存陳如舊國也凡災害所及繫於所災所害之處故以所在為名不復繫其本國大都以名通例不繫國陳是楚之大都無緑當繫於楚二傳妄説故杜不從所災所害者所災謂陳災是也所害謂梁山沙鹿崩是也然災害繫於所災所害而宣十六年不直云宣榭火而以宣榭繫成周者以宣榭其名不顯若不繫成周不知何處宣榭與此别也秋仲孫貜如齊音義貜俱縛反冬築郎囿音義囿音又苑也於郎地築苑傳九年春叔弓宋華亥鄭遊吉衛趙黶會楚子于陳注楚子在陳故四國大夫往非盟主所召不行會禮故不總書音義黶於減反疏注正義曰往年楚公子棄疾帥師圍陳楚子不親行也既滅陳以為縣楚子自往巡行鎮撫之魯宋鄭衛聞其在陳畏威加敬各遣大夫往彼會之非是盟主所召至亦不行會禮故魯史獨書已使不復總書諸國也傳因叔弓所見故歷序四國大夫以見諸國皆行非獨魯也十年叔孫婼如晉葬晉平公傳因歷序諸國大夫此意與彼同也服虔以為此會宋鄭衛之大夫不書叔弓後也服見文七年公會諸侯晉大夫盟于扈傳歷序諸國乃云公後至故不書所會凡會諸侯不書所會後也後至不書其國辟不敏也服意準彼為義故云叔弓後耳彼為盟主所召故諱後期此則楚非盟主何以當諱春秋之意豈欲魯棄晉而從楚乃為之諱其會楚遲也且彼不書所會乃總書諸侯此若是會經何以不總書叔弓會諸侯之大夫傳何以不言叔弓會楚子宋華亥鄭遊吉衛趙黶于陳也今傳以四國大夫共會楚子義非扈類足以可明且叔弓若後傳當言之傳不言後而服以為後是欲代丘明為傳非解之也故杜顯而異之言不行會禮故不總書見此意二月庚申楚公子棄疾遷許于夷實城父注此時改城父為夷故傳實之城父縣屬譙郡疏注正義曰杜以地名經傳不同而傳言實者則以為名有改易也傳不言實則以為二名並存也所言實者皆舉舊以實新此地舊名城父此時新改為夷然言城父是舊名故傳以實名之凡有二義經書未改之名傳以所改實名之則昭十八年許遷于白羽傳云許遷於析實白羽定十年公會齊侯于夾谷傳云會于祝其實夾谷是也若經書已改之名則傳亦舉其已改實其未改之號即此許遷于夷傳云遷許于夷實城父定十三年齊侯衛侯次于垂葭傳云次于垂葭實鄖氏是也此四者或經書未改或經書已改傳皆上句舉其已改之名下句實其未改之號凡一地前後二名者非謂經時為未改之名傳時為已改之名乃於經傳以前上世之時已有所改前後之名夫子集史記而為經丘明采簡牘而作傳史記或書其舊名者即白羽夾谷是也或史記書其後名者即夷與垂葭是也丘明據簡牘為傳以所改後名而實之故僖二十五年秦取析矣襄二十六年聲子云析公之亂皆舉白羽改為析之後但簡牘稱析故杜云於傳時白羽改為析止謂簡牘之時非丘明作傳時也若其不然孔子修經丘明作傳事相連接時日不遠豈可修經時為白羽作傳即改為析故杜云此四者皆為所在之地舊名絶於當時史記有遺者也劉炫不審思杜意怪僖公襄公之世巳有析名而規杜氏非也取州來淮北之田以益之注益許田疏正義曰釋例云州來淮南下蔡縣汝水之南地淮北之田淮水北田則州來邑在淮南邑民有田在淮北也許國盡遷于夷夷田少故取以益之伍舉授許男田然丹遷城父人於陳以夷濮西田益之注以夷田在濮水西者與城父人音義濮音卜遷方城外人於許注成十五年許遷於葉因謂之許今許遷於夷故以方城外人實其處傳言靈王使民不安音義葉始涉反處昌慮反周甘人與晉閻嘉爭閻田注甘人甘大夫襄也閻嘉晉閻縣大夫音義閰以廉反疏注正義曰孔子父叔梁紇為鄒邑之長論語謂孔子為鄒人之子是典邑大夫法當以邑名冠之而稱人知此甘人即是下文甘大夫襄也甘人是甘縣大夫知閻嘉是晉之閻縣大夫名嘉也甘閻接竟田或相侵故共爭之晉梁丙張躍率隂戎伐潁注隂戎陸渾之戎潁周邑音義躍他歷反王使詹桓伯辭於晉注辭責讓之桓伯周大夫音義詹之廉反曰我自夏以后稷魏駘芮岐畢吾西土也注在夏世以后稷功受此五國為西土之長駘在始平武功縣所治釐城岐在扶風美陽縣西北音義夏戶雅反注同駘他來反依字應作邰芮如鋭反岐其宜反長丁丈反下師長同治直吏反釐本又作漦他來反又音來一音力之反疏注正義曰周語云昔我先世后稷以服事虞夏及夏之衰也棄稷弗務我先王不窋用失其官案本紀不窋是后稷之子繼其父業世為大國故受此五國為西土之長也釋例土地名云魏河東河北縣也芮馮翊臨晉縣芮鄉是也畢在京兆長安縣西北駘在武功岐在美陽今案其地芮在魏之西南百餘里耳岐在駘之西北無百里也詩稱后稷封邰與岐畢相近為之長可矣計魏在邰東六百餘里而令邰國與魏為長道路太遙公劉居豳又在岐西北四百餘里此傳極言遠竟而辭不及豳並不知其故及武王克啇蒲姑啇奄吾東土也注樂安博昌縣北有蒲姑城音義蒲如字又音薄奄於檢反樂音洛疏正義曰武王克啇光有天下外簿四海皆為周地上文既言西土故以下唯説三方其實西方所至過於上文自岐以西猶是周竟但不復重言之耳服虔云蒲姑啇奄濵東海者也蒲姑齊也商奄魯也二十年傳曰蒲姑氏因之定四年傳曰因商奄之民命以伯禽巴濮楚鄧吾南土也肅愼燕亳吾北土也注肅愼北夷在玄莬北三千餘里音義巴必加反燕於賢反亳步各反疏正義曰土地名云巴巴郡江州縣也楚南郡江陵縣也鄧義陽鄧縣也建寧郡南有濮夷地然則巴楚鄧中夏之國唯濮為逺夷耳土地名又云燕國薊縣也亳是小國闕不知所在蓋與燕相近亦是中國也唯肅愼為逺夷注正義曰書序云成王既伐東夷肅慎來賀魯語云武王克商肅愼氏貢楛矢韋昭云肅愼東北夷之國去扶餘千里晉之玄莬即在遼東北杜言玄莬北三千里是北夷之近東者故杜言北夷韋言東北夷吾何邇封之有注邇近也疏正義曰言我之封疆何近之有邇近也文武成康之建母弟以蕃屏周亦其廢隊是為注為後世廢隊兄弟之國當救濟之音義蕃方元反屏必并反隊直類反注同為于偽反注同疏正義曰傳稱虢仲虢叔王季之穆是文王母弟也管蔡郕霍魯衛毛𣆀史記以為武王之母弟也唐叔成王之母弟也其康王之母弟則書傳無文文王周之始王故言文王文王未得封諸侯也弟以同母為親故言母弟耳所封非同母者亦多矣建為國君所以為藩籬屏蔽周室使與天子蔽鄣患難亦其慮後世子孫或有廢隊王命望諸侯共救濟之是為此也豈如辨髦而因以敝之注童子垂髦始冠必三加冠成禮而棄其始冠故言辨髦因以敝之音義辨皮彥反本又作卞髦音毛始冠古亂反疏正義曰豈如辨髦因以敝之者辨謂緇布冠髦謂童子垂髦凡加冠之禮先用緇布之冠斂括垂髦三加之後去緇布之冠不復更用故云因以敝之今王自比豈得將王室如緇布冠加髦之後不須復用因以敝之猶言以我王家封建晉國之後因即棄而不事之也注正義曰案禮未髻之時必垂髦故云童子垂髦也士冠禮始冠緇布冠次加皮辨次加爵辨是始冠必三加冠也其記冠義云始冠緇布之冠冠而敝之可也玉藻亦云始冠緇布冠自諸侯下達冠而敝可也鄭玄云本大古耳非時王之法服也是言本古而暫冠既加而即棄是禮成而棄其始冠故云辨髦而因以敝之也辨有爵辨皮辨嫌緇布之冠不得名辨故云辨亦冠也周禮辨師掌冕是辨為大名也劉炫以為辨髦二物以童子垂髦為髡彼兩髦又云因以敝之者謂親沒不髦案禮加冠以後親沒以前身既成人猶自垂髦何得云童子垂髦髦既親沒乃棄杜注何以不言親沒也若三加之後棄辨不棄髦杜注何得云棄其始冠故言辨髦因以敝之既連髦而言明非親沒之髦也髦之形像鄭注士喪禮云未聞先王居檮杌于四裔以禦螭魅注言檮杌略舉四凶之一下言四裔則三苗在其中音義檮徒刀反杌五忽反裔以制友禦魚吕反蝺勑知反魅本又作魅武冀反疏注正義曰文十八年傳稱舜臣堯流四凶族渾敦窮竒檮杌叨餮投諸四裔以禦螭魅先儒皆以為渾敦歡兜也窮竒共工也檮杌鯀也叨餮三苗也此傳以晉率隂戎伐潁正須言叨餮耳而云檮杌者略舉四凶之一耳下言四裔則三苗在其中可知也若直説鯀當言居檮杌于羽山不須言四裔也故允姓之姦居于瓜州注允姓隂戎之祖與三苗俱放三危者瓜州今敦煌音義姦古顔反瓜古華反敦都門反煌音皇疏注正義曰此言主責隂戎知允姓隂戎之祖也言允姓之姦者謂其姦邪之人惡言之也尚書云竄三苗于三危此言允姓居于瓜州時同而人别知與三苗俱放於三危也伯父惠公歸自秦而誘以來注僖十五年晉惠公自秦歸二十三年秦晉遷陸渾之戎於伊川使逼我諸姬入我郊甸則戎焉取之注邑外為郊郊外為甸言戎取周郊甸之地音義逼彼力反甸徒遍反焉於虔反又如字疏正義曰焉猶何也若不由晉則戎何得取周之地也注正義曰釋地云邑外謂之郊周禮載師掌任土之法其敘王畿之內遠近之次自國中以外有近郊遠郊次甸次稍次縣次都是郊外為甸也陸渾之戎居伊洛之間是取周郊甸之地戎有中國誰之咎也注咎在晉音義咎其九反后稷封殖天下今戎制之不亦難乎注后稷修封疆殖五榖今戎得之唯以畜牧音義殖時力反疆居良反畜許入反一音許六反牧音目又音茂伯父圖之我在伯父猶衣服之有冠冕木水之有本原民人之有謀主也注民人謀主宗族之師長疏正義曰言我周存在於伯父有益如衣服云云伯父若裂冠毁冕拔本塞原專棄謀主雖戎狄其何有余一人注伯父猶然則雖戎狄無所可責晉率隂戎伐周邑故云然疏正義曰言伯父我親猶自如此則雖戎狄其何有恩義於我一人既無恩親侵我亦無可責叔向謂宣子曰文之伯也豈能改物注言文公雖霸未能改正朔易服色音義伯如字又音霸翼戴天子而加之以共注翼佐也自文以來世有衰德而暴滅宗周注宗周天子以宣示其侈諸侯之二不亦宜乎且王辭直子其圖之宣子説王有姻喪注外親之喪音義説音悅疏正義曰隱元年傳云士踰月外姻至姻是外親故杜云外親之喪也服虔云婦之父曰姻王之后喪父於王亦有服義故往弔案妻父為姻雖有此稱王之納后必取諸侯之女后之父母不得身在京師往弔可耳何以得致襚也以致襚言之知是外親之喪耳不知外親喪是誰死使趙成如周弔且致閻田與襚注襚送死衣音義襚音遂贈死衣服反潁俘王亦使賔滑執甘大夫襄以説於晉晉人禮而歸之注賔滑周大夫音義俘芳夫反滑乎八反又于八反説如字又音悅夏四月陳災鄭裨竈曰五年陳將復封封五十二年而遂亡子産問其故對曰陳水屬也注陳顓頊之後故為水屬音義復扶又反下注復封皆同疏正義曰陳顓頊之後顓頊以水德王天下故為水屬也陳是舜後舜是土德不近言土屬而遠繫顓頊為水屬者蓋裨竈知陳將欲復興須取水為占驗假此以為言耳未必帝王子孫永與所承同德楚之先世嘗為火官即以火為楚象豈復五行之官後世皆依其行乎此皆賢哲有以知之非吾徒所測火水妃也注火畏水故為之妃音義妃方非反一音配注同疏注正義曰隂陽之書有五行妃合之説甲乙木也丙丁火也戊己土也庚辛金也壬癸水也木克土土克水水克火火克金金克木木畏金以乙為庚妃也金畏火以辛為丙妃也火畏水以丁為壬妃也水畏土以癸為戊妃也土畏木以已為甲妃也杜用此説故云火畏水故為之妃也服虔云火離也水坎也易卦離為中女坎為中男故火為水妃而楚所相也注相治也楚之先祝融為高辛氏火正主治火事音義相息亮反注同疏注正義曰相訓助也主火而助君為治故以為治也二十九年傳曰火正曰祝融顓頊氏有子曰犂為祝融楚世家云高陽生稱稱生卷章卷章生犂犂為高辛氏火正甚有功能光融天下帝嚳命曰祝融共工作亂帝使犂誅之而不盡帝誅犂而以其弟吳回為後復居火正為祝融回生陸終陸終生子六人六曰季連楚其後也是楚之先為火正治火事今火出而火陳注火心星也火出於周為五月而以四月出者以長歷推前年誤置閏疏注正義曰襄九年傳曰心為大火十七年傳曰火出於周為五月今經書四月陳災傳言火出而火陳火得以四月出者長歷云閏當在此年五月後而在前年故火以四月出也長歷以為前年閏八月則此年四月五日得中氣二十日得五月節故四月得火見逐楚而建陳也注水得妃而興陳興則楚衰故曰逐楚而建陳疏注正義曰杜以陳為楚邑楚人在陳陳興則楚衰故曰逐楚而建陳當為逐去楚人之在陳者若穿封戍為陳公者也但歐逐楚國之人於義甚通劉炫乃改逐為遁言火逃遁去楚而建立陳國而規杜非也妃以五成故曰五年注妃合也五行各相妃合得五而成故五嵗而陳復封為十三年陳侯吳歸于陳傳音義妃音配注妃並同疏注正義曰妃合釋詁文也易繫辭云天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合鄭玄云天地之氣各有五五行之次一曰水天數也二曰火地數也三曰木天數也四曰金地數也五曰土天數也此五者隂無匹陽無耦故又合之地六為天一匹也天七為地二耦也地八為天三匹也天九為地四耦也地十為天五匹也二五隂陽各有合然後氣相得施化行也是言五行各相妃合生數以上皆得五而成故云五嵗而陳將復封嵗五及鶉火而後陳卒亡楚克有之天之道也故曰五十二年注是嵗嵗在星紀五嵗及大梁而陳復封自大梁四嵗而及鶉火後四周四十八嵗凡五及鶉火五十二年天數以五為紀故五及鶉火火盛水衰疏注正義曰如杜所注嵗星每年而行一次至昭三十二年則嵗星在寅未至於丑其傳云越得嵗而吳伐之故服氏以為有事于武宮之嵗龍度天門謂十五年嵗星從申越未而至午歷家以周天十二次次别為百四十四分嵗星每年行一百四十五分是嵗星行一次外剩行一分積一百四十四年乃剩行一次故昭十五年得超一辰今杜氏既無此義而三十二年嵗星得在丑者但嵗星之行天之常數超辰之義不言自顯故杜不注若然楚卒城陳在哀十七年則嵗星當逾鶉火至鶉尾而云五及鶉火者以顓頊嵗在鶉火而滅故裨竈舉大略而言云五及鶉火不復細言殘數雖至鶉尾亦經由鶉火天有五星又大微宮中有五帝坐又四方中央亦有五是天數以五為紀故五及鶉火也嵗星天之貴神所在之國必昌嵗在鶉火火得嵗星之助火漸盛而水則衰晉荀盈如齊逆女注自為逆音義為于偽反還六月卒于戲陽注魏郡內黃縣北有戲陽城音義戲許宜反殯于絳未葬晉侯飲酒樂膳宰屠蒯趨入請佐公使尊注公之使人執尊酌酒請為之佐音義樂音洛屠音徒禮記作杜蒯苦怪反使尊如字亦所吏反許之注公許之而遂酌以飲工注工樂師師曠也音義飲於鴆反下與飲同疏注正義曰禮記檀弓説此事云知悼子卒未葬平公飲酒師曠李調侍知工即師曠也外嬖叔即李調也曰女為君耳將司聰也注樂所以聰耳音義女音汝下皆同疏注正義曰樂以和心聲從耳入故樂者所以聰耳大師掌樂務使君聰故為君耳將司聰也辰在子卯謂之疾日注疾惡也紂以甲子喪桀以乙卯亡故國君以為忌日音義喪息浪反疏注正義曰訓疾為惡言王者惡此日不以舉吉事也尚書武成篇云時甲子昧爽受率其旅若林會于牧野罔有敵于我師前徒倒戈攻于後以北血流漂杵是紂以甲子喪也詩云韋顧既伐昆吾夏桀言昆吾與桀同時死也十八年傳二月乙卯周毛得殺毛伯過而伐之萇𢎞曰毛得必亡是昆吾稔之日也昆吾之死與桀同日知桀以乙卯亡也以此二王之亡為天誅之日故國君以為忌日惡此日也檀弓云君子有終身之憂故忌日不樂鄭玄云謂死日也彼謂親亡之日至此日而念親故此日不用舉吉事非是惡此日也此與忌日名同意異君徹宴樂學人舍業為疾故也君之卿佐是為股肱股肱或虧何痛如之注言痛疾過於忌日音義舍音捨為于偽反下為是同女弗聞而樂是不聰也注不聞是義而作樂又飲外嬖嬖叔注外都大夫之嬖者疏注正義曰此言外嬖嬖叔即李調是也禮記云調也君之褻臣也既云褻臣而謂之外嬖知是外都大夫之嬖者猶晉獻公時有外嬖梁伍東關嬖伍曰女為君目將司明也注職為外故主視服以旌禮注旌表也禮以行事注事政令事有其物注物類也物有其容注容貌也今君之容非其物也注有卿佐之喪而作樂歡會故曰非其物而女不見是不明也疏正義曰吉有辨冕凶有衰麻禮有吉凶之異作衣服以表之如此之類是服以旌禮也周禮司服六冕以祭祀皮辨以視朝韋辨以即戎冠辨以田獵如此之類是禮以行事也傳稱哀有哭泣樂有歌舞如此之類是事有其物言行事各有其物類也記稱衰麻則有哀色端冕則有敬色介胄則有不可犯之色周禮保氏教國子六儀一曰祭祀之容二曰賓客之容三曰朝廷之容四曰喪紀之容五曰軍旅之容六曰車馬之容少儀曰言語之美穆穆皇皇朝廷之美濟濟翔翔祭祀之美齊齊皇皇車馬之美騑騑翼翼鸞和之美肅肅雍雍如此之類是物有其容也君有卿佐之喪宜有悲哀之貌而與羣臣飲酒作樂今君之容貌非其類也而女不見是不明也亦自飲也曰味以行氣氣以實志注氣和則志充志以定言注在心為志發口為言言以出令臣實司味二御失官而君弗命臣之罪也注工與嬖叔侍御君者失官不聰明疏正義曰調和飲食之味以養人所以行人氣也氣得和順所以充人志也志意充滿慮之於心所以定言語也詳審言語宣之於口所以出號令也臣實主掌食味今工師不聰叔也不明二侍御者並失其官而君不出令以罪之必是食味失宜是臣之罪也公説徹酒初公欲廢知氏而立其外嬖為是悛而止音義説音悅知音智下同悛七全反疏正義曰公心欲廢知氏故輕悼子之喪不廢飲酒得蒯以禮責之乃知君臣義重其禮不可輒廢為是悛而止悛改也改革前意也禮記記此事飲酒事同而其言盡别記是傳聞故與此異二者必有一謬當傳實而記虛也秋八月使荀躒佐下軍以説焉注躒荀盈之子知文子也佐下軍代父也説自解説音義躒本又作櫟力狄反又音洛孟僖子如齊殷聘禮也注自叔老聘齊至今二十年禮意久曠今修盛聘以無忘舊好故曰禮音義好呼報反疏注正義曰襄二十年叔老聘齊至今二十年更不遣聘是邦交禮意久曠絶也殷訓盛也今修盛聘以無忘舊好故禮之也聘禮云小聘曰問不享有獻不及夫人主人不延几不郊勞然則聘禮經之所言是大聘也王制云諸侯之於天子也比年一小聘三年一大聘鄭玄云小聘使大夫大聘使卿聘禮既是大聘使卿矣殷聘又當盛於大聘不知以何為盛或當享禮之物多矣冬築郎囿書時也季平子欲其速成也叔孫昭子曰詩曰經始勿亟庶民子來注詩大雅言文王始經營靈臺非急疾之衆民自以子義來勸樂為之音義亟紀力反樂如字又五教反一音洛疏正義曰大雅靈臺之篇也言文王經始靈臺之基址其意勿使急成之但其衆民自以子成父事而來勸樂而早成之耳子成父事不待督帥故云子來以示民樂之意焉用速成其以勦民也注勦勞也音義焉於虔反勦初交反又子小反無囿猶可無民其可乎經十年春王正月夏齊欒施來奔注嗜酒好內以取敗亡故書名音義嗜市志反傳同好呼報反秋七月季孫意如叔弓仲孫貜帥師伐莒注三大夫皆卿故書之季孫為主二子從之疏注正義曰成二年鞍之戰魯四卿並書此三卿皆書重兵詳內故備書之其他國行兵唯書元帥而已略外也傳云平子伐莒取郠平丘又獨見執明是季孫為伐莒之主二子從之戊子晉侯彪卒注五同盟音義彪彼蚪反疏注正義曰彪以襄十六年即位其年盟于溴梁十九年于祝柯二十年于澶淵二十五年于重丘二十七年于宋不數元年虢會是五同盟九月叔孫婼如晉葬晉平公注三月而葬速十有二月甲子宋公成卒注十一同盟也無冬史闕文音義成音城何休音恤疏注正義曰成以成十六年即位十七年盟于柯陵十八年于虛朾襄三年于雞澤五年于戚九年于戲十一年于亳城北十五年及向戌盟于劉十六年于溴梁十九年于祝柯二十年于澶淵二十五年于重丘二十七年于宋元年于虢皆魯宋俱在凡十三同盟杜意盟數多者不數特盟襄十五年向戌盟于劉及虢盟不數故十一劉炫并數以規杜過非也如此數盟不同者或由傳寫誤傳十年春王正月有星出于婺女注客星也不書非孛音義婺武付反孛蒲對反鄭裨竈言於子産曰七月戊子晉君將死今兹嵗在顓頊之虛注嵗嵗星也顓頊之虛謂玄枵音義禆婢支反虛起魚反注同枵許驕反疏注正義曰釋天云玄枵虛也顓頊之虛虛也郭璞曰虛在正北顓頊水德位在北方當以北方三次以玄枵為中玄枵次有三宿又虛在其中以水位在北顓頊居之故謂玄枵虛星為顓頊之虛也薑氏任氏實守其地注薑齊姓任薛姓齊薛二國守玄枵之地音義任音壬注同居其維首而有妖星焉告邑薑也注客星居玄枵之維首邑薑齊大公女晉唐叔之母星占婺女為既嫁之女織女為處女邑薑齊之既嫁女妖星在婺女齊得嵗故知禍歸邑薑音義大音泰疏正義曰維者綱也玄枵次有三宿女為其初女是次之綱維也居其維首謂星居之也其玄枵維首而有妖異之星焉以將死之妖告邑薑也邑薑齊女告邑薑言其子孫當死也邑薑晉之妣也天以七紀注二十八宿面七音義妣必履反宿音秀疏正義曰曲禮云生曰母死曰妣鄭玄云妣之言嫓嫓於考也邑薑唐叔之母故為晉之妣也邑薑亦是成王之母而於周無災任薑共守其地而不告薛女此則裨竈自知非吾徒所能測戊子逄公以登星斯於是乎出注逄公殷諸侯居齊地者逄公將死妖星出婺女時非嵗星所在故齊自當禍而以戊子日卒疏正義曰昔戊子之日逄公死其神以此日登天於時有星是此星也於是婺女乎出爾時妖星出於婺女而戊子逄公死今此星亦出婺女知戊子晉君當死也逄公死日星出婺女當時猶有書記故裨竈得而知之注正義曰二十年晏子説齊地云有逄伯陵因之則陵是逄君之始祖也周語記玄枵之次云我皇妣大薑之姪伯陵之後逄公之所馮神也孔朝云大薑大王之妃王季之母也女子謂昆弟之子曰姪伯陵大薑之祖逄公大薑之姪伯陵之後逄公殷諸侯也然則伯陵之後世為逄君皆是逄公未知戊子卒者何名號也逄公死時妖星亦出婺女於時嵗星不在齊分故齊地之君自當其禍此時嵗在齊分故外孫當之吾是以譏之注為晉侯彪卒傳齊惠欒高氏皆耆酒注欒高二族皆出惠公疏正義曰齊惠公生公子欒公子高高生子尾尾生子良欒生子雅雅生子旗子旗是欒孫子良是髙孫孫以王父字為氏皆出惠公故曰惠欒高氏也信內多怨注説婦人言故多怨音義説音悅強於陳鮑氏而惡之注惡陳鮑音義惡烏路反注司夏有告陳桓子曰子旗子良將攻陳鮑亦告鮑氏桓子授甲而如鮑氏遭子良醉而騁注欲及子良醉故騁告鮑文子音義騁勑領反遂見文子注文子鮑國則亦授甲矣使視二子注二子子旗子良則皆將飲酒桓子曰彼雖不信注彼傳言者音義傳直專反聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒高氏子良曰先得公陳鮑焉往注欲以公自輔助音義先伐諸一本無伐字焉於虔反下焉歸同遂伐虎門注欲入公不聼故伐公門疏正義曰周禮師氏掌以美詔王居虎門之左司王朝鄭玄云虎門路寢門也王日視朝於路寢門外畫虎焉以明勇猛於守宜也司猶察也察王之視朝若有善道可行者則當前以詔王彼師氏察王得失明其近王故以虎門為路寢門此亦當然或以虎門非路寢門當是宫之外門不與周禮同晏平仲端委立于虎門之外注端委朝服疏注正義曰元年傳劉定公謂趙文子云吾與子辨冕端委哀七年傳曰大伯端委以治周禮則端委是在公之服故云朝服鄭玄云諸侯與其臣皮辨以視朔朝服以視朝其朝服玄冠緇布衣素積以為裳也四族召之無所往注四族欒高陳鮑其徒曰助陳鮑乎曰何善焉注言無善義可助助欒高乎曰庸愈乎注罪惡不差於陳鮑音義差初賣反然則歸乎曰君伐焉歸公召之而後入公卜使王黑以靈姑銔率吉請斷三尺焉而用之注王黑齊大夫靈姑銔公旗名斷三尺不敢與君同音義銔扶眉反又音丕率所律反徐所類反斷丁管反注同疏正義曰公卜卜與欒高戰也靈姑銔者齊侯旌旗之名卜使王黑以此靈姑銔之旗率人以戰得吉也禮諸侯當建蛟龍之旗此靈姑銔蓋是蛟龍之旗當時為之名其義不可知也知是旗者以請斷三尺而用之故知是旗五月庚辰戰于稷注稷祀后稷之處音義稷地名六國時齊有稷下館處昌慮反欒高敗又敗諸莊注莊六軌之道疏注正義曰釋宫云六達謂之莊舊説皆云六道旁出杜皆以一達為一軌國人追之又敗諸鹿門注鹿門齊城門欒施高疆來奔注髙疆不書非卿陳鮑分其室晏子謂桓子必致諸公讓德之主也讓之謂懿德凡有血氣皆有爭心故利不可強注不可強取音義爭爭鬬之爭強其丈反注同思義為愈義利之本也藴利生孽姑使無藴乎注藴畜也孽妖害也音義藴紆粉反孽魚列反畜勑六反可以滋長桓子盡致諸公而請老于莒注莒齊邑音義長丁丈反桓子召子山注子山子商子周襄三十一年子尾所逐羣公子私具幄幕器用從者之衣屨注私具不告公音義幄於角反幕音莫從才用反屨九具反而反棘焉注棘子山故邑齊國西安縣東有戟里亭子啇亦如之而反其邑子周亦如之而與之夫于注子周本無邑故更與之濟南於陵縣西北有于亭反子城子公公孫捷注三子八年子旗所逐而皆益其祿凡公子公孫之無祿者私分之邑注桓子以己邑分之國之貧約孤寡者私與之粟曰詩云陳錫載周能施也注詩大雅言文王能布陳大利以賜天下行之周遍音義載如字詩作哉毛云哉載也鄭云始也施始䜴反下注同遍音遍桓公是以霸注齊桓公亦能施以致霸疏正義曰曰者桓子辭也既私施與又言已施之意大雅文王之篇錫賜載行周遍也言文王能布陳大利以賜天下行之周遍此言文王之能施也桓公亦用此能霸諸侯焉得不務施乎言已多施為此也公與桓子莒之旁邑辭注讓不受穆孟姬為之請高唐陳氏始大注穆孟姬景公母傳言陳氏所以興音義為于偽反秋七月平子伐莒取郠注郠莒邑取郠不書公見討於平丘魯諱之音義郠古杏反獻俘始用人於亳社注以人祭殷社音義俘芳夫反亳步洛反臧武仲在齊聞之曰周公其不饗魯祭乎周公饗義魯無義詩曰德音孔昭視民不佻注詩小雅佻偷也言明德君子必愛民音義視如字詩作示佻他雕反佻之謂甚矣而一用之將誰福哉注一同也同人於畜牲音義畜許又反疏正義曰小雅鹿鳴之篇也孔甚昭明佻偷也以君子之人為賔客德音甚明其視下民不偷薄茍且也偷之已謂甚矣而一同畜牲用之將誰肯福祐之哉佻偷釋言文李巡曰佻偷薄之偷也孫炎曰偷茍且也戊子晉平公卒注如裨竈之言鄭伯如晉及河晉人辭之遊吉遂如晉注禮諸侯不相弔故辭九月叔孫婼齊國弱宋華定衛北宫喜鄭罕虎許人曹人莒人邾人薛人把人小邾人如晉葬平公也注經不書諸侯大夫者非盟會鄭子皮將以幣行注見新君之贄音義見賢遍反下不得見下因見同贄音至子産曰喪焉用幣用幣必百兩注載幣用車百乘音義焉於虔反乘繩證反疏正義曰尚書武王戎車三百兩孔安國云兵車稱兩百兩必千人千人至將不行注行用也不行必盡用之注不得見新君將自費用盡音義費芳味反下同幾千人而國不亡注言千人之費不可數音義幾居豈反數所角反子皮固請以行既葬諸侯之大夫欲因見新君叔孫昭子曰非禮也弗聽叔向辭之曰大夫之事畢矣注送葬禮畢而又命孤孤斬焉在衰絰之中注既葬未卒哭故猶服斬衰音義衰七雷反絰直結反其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何皆無辭以見子皮盡用其幣歸謂子羽曰非知之實難將在行之注言不患不知患不能行音義嘉服見如字又賢遍反下同重直用反以見賢遍反下同夫子知之矣我則不足注言已由子産之戒既知其不可而遂行之是我之不足疏正義曰尚書説命云非知之艱行之惟艱此言出彼意也非知之實為難將在行之為難也言子産語己巳既知之知而不行所以自悔夫子謂子産知之矣知喪不用幣也我則知不足矣書曰欲敗度縱敗禮注逸書音義敗必邁反下同疏正義曰尚書太甲篇也孔傳云言已放縱情欲毁敗禮儀法度我之謂矣夫子知度與禮矣我實縱欲而不能自克也注欲因喪以慶新君故縱而行之不能自勝音義勝音升昭子至自晉大夫皆見高強見而退注高強子良昭子語諸大夫曰為人子不可不慎也哉昔慶封亡子尾多受邑而稍致諸君君以為忠而甚寵之將死疾于公宫注在公宫被疾音義語魚據反輦而歸君親推之注推其車而送之音義推如字又他回反注同其子不能任是以在此忠為令德其子弗能任罪猶及之難不慎也喪夫人之力棄德曠宗以及其身不亦害乎注夫人謂子尾曠空也音義任音壬下同喪息浪反夫音扶注同疏正義曰言人居之難可不謹慎詩曰不自我先不自我後其是之謂乎注詩小雅言禍亂不在他正當己身以喻高強身自取此禍疏正義曰正月大夫刺幽王也云父母生我胡俾我愈不自我先不自我後注云父母謂文武也天使父母生我何故不長遂我而使我遭此暴虐之政而病此何不出我之前居我之後窮苦之情茍欲免身冬十二月宋平公卒初元公惡寺人柳欲殺之注元公平公大子佐也音義惡烏路反寺又作侍疏正義曰諡法內外賔服曰平好建國都曰元及喪柳熾炭于位注以溫地音義熾尺志反炭吐旦反將至則去之注使公坐其處音義去起呂反處昌慮反比葬又有寵注言元公好惡無常音義比必利反好呼報反惡烏路反經十有一年春王二月叔弓如宋葬宋平公夏四月丁巳楚子虔誘蔡侯般殺之于申注蔡侯雖弒父而立楚子誘而殺之刑其羣士蔡大夫深怨故以楚子名告音義虔其連反般音班弒申志反傳放此疏注正義曰蔡侯雖弒父而立實宜受討但立為君於蔡已十三年楚子誘而殺之又刑其羣士不以殺父之罪討之蔡大夫深怨楚子故以楚子名赴告禮諸侯不生名書名是罪絶之事以其名告欲使諸國之史書名以罪絶之也若是楚告不當自罪其君知是蔡人告也公子圍弒君取國改名曰虔楚公子棄疾帥師圍蔡五月甲申夫人歸氏薨注昭公母胡女歸姓大搜于比蒲仲孫貜會邾子盟于祲祥注祲祥地闕音義比音毗徐扶夷反祲子鴆反徐又七林反秋季孫意如會晉韓起齊國弱宋華亥衛北宫他鄭罕虎曹人杞人于厥憖注厥憖地闕音義他徒河反憖魚靳反徐五巾反一音五轄反九月己亥葬我小君齊歸注齊諡音義齊如字冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之注用之殺以祭山疏正義曰父既死矣猶稱世子者君死而國被圍未暇以禮即位故國以世子告傳十一年春王二月叔弓如宋葬平公也注嫌以聘事行故傳具之景王問於萇𢎞曰今兹諸侯何實吉何實凶注萇𢎞周大夫音義萇直良反對曰蔡凶此蔡侯般弒其君之嵗也嵗在豕韋注襄三十年蔡世子般弒其君嵗在豕韋至今十三嵗嵗復在豕韋般即靈侯也音義復扶又反下嵗復在同弗過此矣注言蔡凶不過此年楚將有之然壅也注蔡近楚故知楚將有之楚無德而享大利所以壅積其惡音義壅於勇反注及後同近附近之近下同嵗及大梁蔡復楚凶天之道也注楚靈王弒立之嵗嵗在大梁到昭十三年嵗復在大梁美惡周必復故知楚凶楚子在申召蔡靈侯靈侯將往蔡大夫曰王貪而無信唯蔡於感注蔡近楚之大國故楚常恨其不服順音義於感戶暗反今幣重而言甘誘我也不如無往蔡侯不可三月丙申楚子伏甲而饗蔡侯於申醉而執之夏四月丁巳殺之刑其士七十人公子棄疾帥師圍蔡注傳言楚子無道音義重直用反韓宣子問於叔向曰楚其克乎對曰克哉蔡侯獲罪於其君注謂弒父而立而不能其民注不能施德天將假手於楚以斃之注借楚手以討蔡音義斃婢世反何故不克然肸聞之不信以幸不可再也楚王奉孫吳以討於陳曰將定而國陳人聽命而遂縣之注事在八年今又誘蔡而殺其君以圍其國雖幸而克必受其咎弗能久矣桀克有緡以喪其國紂克東夷而隕其身注紂為黎之搜東夷叛之桀為仍之會有緡叛之故伐而克之音義緡武巾反喪息浪反下且喪君同隕于敏反疏正義曰桀身奔南巢故云喪國也紂首縣白旗故云隕身也楚小位下而亟暴於二王能無咎乎天之假助不善非祚之也厚其凶惡而降之罰也且譬之如天其有五材而將用之力盡而敝之是以無拯不可沒振注金木水火土五者為物用久則必有敝盡盡則棄捐故言無拯拯猶救助也不可沒振猶沒不可復振音義亟欺冀反數也咎其又反下同祚本又作祚在路反拯拯濟之拯注同振之慎反捐以專反救本亦作救音救不可復振扶又反本或作沒振疏正義曰亟數也比於桀紂則楚小位下而數行暴虐甚於桀紂二王能無咎惡乎拯音蒸之上聲也方言云出溺為拯拯是救助之義天之用楚如人用五材力盡而敝敝則棄之是以無救助之者拯是救溺之名遂以救溺為喻也不可沈沒之後復振救之振亦救也言楚如沒水不可救也注正義曰金木水火土五者之材皆為物用用久則必敝盡敝盡則棄捐之捐亦棄也言天之用楚亦如此也五月齊歸薨大搜于比蒲非禮也孟僖子會邾莊公盟于祲祥修好禮也注搜非存亡之由故臨喪不宜為之盟會以安社稷故喪盟謂之禮音義好呼報反泉丘人有女夢以其帷幕孟氏之廟注泉丘魯邑音義夢以其帷位悲反一本作夢以帷幕音莫遂奔僖子其僚從之注鄰女為僚友者隨而奔僖子音義僚力雕反盟于清丘之社曰有子無相棄也注二女自共盟僖子使助薳氏之簉注簉副倅也薳氏之女為僖子副妾别居在外故僖子納泉丘人女令副助之音義薳為彼反本又作蒍簉本又作造初又反説文簉從廾倅七對反令力呈反疏注正義曰禮有副車倅車皆謂副二之車也簉亦副倅之意妻為正適妾為副二薳氏之女先為副二别居在外故使泉丘人女與之聚居令副助而為對偶之反自祲祥宿于薳氏生懿子及南宫敬叔於泉丘人其僚無子使字敬叔注字養也似雙生音義生如字或一音所敬反疏正義曰以傳直云宿於薳氏即連言生懿子及南宫敬叔疑薳氏所生故傳顯云生懿子及南宫敬叔於泉丘人於泉丘人宜上讀為句楚師在蔡注向四月之師音義向本又作嚮亦作向同許亮反晉荀吳謂韓宣子曰不能救陳又不能救蔡物無以親注物事也疏正義曰物事也事事如此以是故無人肯親我晉國晉之不能亦可知也已為盟主而不恤亡國將焉用之音義將焉於虔反秋會于厥憖謀救蔡也注不書救蔡不果救蔡鄭子皮將行子産曰行不遠不能救蔡也蔡小而不順楚大而不德天將棄蔡以壅楚盈而罰之注盈楚惡蔡必亡矣且喪君而能守者鮮矣三年王其有咎乎美惡周必復王惡周矣注元年楚子弒君而立嵗為大梁後二年十三嵗嵗星周復於大梁音義鮮息淺反復於扶反一本又作復在晉人使孤父請蔡于楚弗許注狐父晉大夫音義狐音胡單子會韓宣子于戚注單子單成公視下言徐叔向曰單子其將死乎朝有著定注著定朝內列位常處謂之表著音義著張慮反徐治居反注及下同處昌慮反疏注正義曰著定謂佇立定處故謂朝內列位常處也周禮司士正朝儀之位辨其貴賤之等王南鄉三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之右南面東上大僕大右六僕從者在路門之左南面西上鄭玄云此王日視朝事於路門外之位此是朝上之位貴賤有定處也會有表亦是位之定處但著下言定則表亦是定故直言會有表耳俗本表下有旗謬也野會設表為位亦當有物記處如今之位版也謂之表著者杜意當以下文表著之位謂此也劉炫謂下文有著有表二文不同以著定為朝有著不得謂之表著而規杜氏今知非者杜意當以下文會朝之言必聞於表著故於朝有著之文并探下文會有表以配著故云謂之表著所以覆結下文非謂著之一字即名表著也劉炫不達杜旨而為規過非也會有表注野會設表以為位疏注正義曰禮諸侯建旗設旗以為表也周禮司儀云將合諸侯則令為壇三成宫旁一門覲禮云諸侯覲于天子為宫方三百步四門壇十有二尋深四尺上介皆奉其君之旗置于宫尚左公侯伯子男皆就其旗而立鄭玄云置于宫者建之豫為其君見王之位也諸公中階之前北面東上諸侯東階之東西靣北上諸伯西階之西東面北上諸子門東北面東上諸男門西北面東上尚左者建旗公東上侯先伯伯先子子先男而位皆上東方也諸侯入壝門或左或右各就其旗而立王降階南鄉見之是天子於野會諸侯設表以為位也周禮大司馬中冬教大閲門立四表是以設表為位也盟主之會諸侯必亦旗表位大夫聚會亦應有以表位但無文以言耳衣有襘帶有結注禬領會結帶結也音義禬古外反説文云帶所結也會朝之言必聞于表著之位所以昭事序也視不過結禬之中所以道容貌也言以命之容貌以明之失則有闕今單子為王官伯而命事於會視不登帶言不過步貌不道容而言不昭矣不道不共不昭不從注貌正曰共言順曰從音義道音導下同疏正義曰言聲所聞不過一步注正義曰洪範五事貌曰恭言曰從其意曰容貌當恭恪言是則可從是貌正曰共言順曰從無守氣矣注為此年冬單于卒起本疏正義曰言無守身之氣將必死九月葬齊歸公不戚晉士之送葬者歸以語史趙史趙曰必為魯郊注言昭公必出在郊野不能有國音義語魚據反疏正義曰傳稱文襄之制夫人喪士弔大夫送葬此言晉士送葬者蓋大夫來而士為介未必士獨行也此士以公不戚語史趙故特言士耳必為魯郊言昭公必為魯人所逐而出在郊侍者曰何故曰歸姓也不思親祖不歸也注姓生也言不思親則不為祖考所歸祐音義祐音又叔向曰魯公室其卑乎君有大喪國不廢搜注謂搜比蒲有三年之喪而無一日之戚國不恤喪不忌君也注忌畏也君無戚容不顧親也國不忌君君不顧親能無卑乎殆其失國注為二十五年公孫於齊傳冬十一月楚子滅蔡用隱大子于岡山注蔡靈公之大子蔡侯廬之父音義岡音剛廬力吳反疏正義曰此時楚以畜牲用之無人為之作諡必是蔡侯廬歸國乃追諡其父為隱耳釋例土地名岡山闕不知其處經言以歸用之必是楚地山也申無宇曰不祥五牲不相為用况用諸侯乎注五牲牛羊豕犬雞音義為于為反或如字疏正義曰世子雖未即位以其父既死則當君處故以諸侯言之甚之也注正義曰爾雅以此五者并馬為六畜周禮謂之六牲但馬非常祭所用故去馬而以此五者當之王必悔之注悔為暴虐十二月單成公卒注終叔向之言楚子城陳蔡不羮注襄城縣東南有不羮城定陵西北有不羮亭音義羮舊音郎漢書地理志作更字疏正義曰古者羮臛之字音亦為郎故魯頌閟宫楚辭招魂與史遊急就篇羮與房漿粳為韻但近世以來獨以此地音為郎耳使棄疾為蔡公王問於申無宇曰棄疾在蔡何如對曰擇子莫如父擇臣莫如君鄭莊公城櫟而置子元焉使昭公不立注子元鄭公子莊公置子元於櫟桓十五年厲公因之以殺櫟大夫檀伯遂居櫟卒使昭公不安位而見殺音義櫟力狄反疏注正義曰杜以子元為鄭公子曼伯與檀伯為一人莊公城櫟而置子元又使檀伯為櫟邑大夫故厲公得因子元而殺檀伯劉炫以為傳言城櫟以置子元當謂賜元以櫟則以元為櫟邑之長若其别有大夫子元寄居於櫟便是城櫟以置檀伯何言置子元也若厲公因子元以殺檀伯則子元是檀邑之大夫耳豈是莊公城櫟之咎乎且桓十五年傳云鄭伯因櫟人殺檀伯不言因子元也子元鄭之公子不得為櫟人也鄭衆云子元即檀伯也厲公殺檀伯居櫟因櫟之衆逼弱昭公使至殺死案桓五年傳云子元請為左拒即云曼伯為右拒則曼伯子元近是為一以規杜氏今知劉説非者案晉封桓叔于曲沃而以欒賔傳之鄭使許叔居許而以公孫獲為佐楚使大子建居城父而以奮揚助之並是一邑之內而有二人則莊城櫟而置子元别有檀伯居櫟何為不可子元共櫟邑之人而納厲公但此因棄疾在蔡故特指子元桓十五年直明厲公之入故總言櫟人辭有彼此不可為怪劉又以子元為曼伯案隱五年傳云曼伯與子元潛軍軍其後又下文鄭二公子敗燕師于北制是子元非曼伯也劉妄規杜非也齊桓公城榖而置管仲焉至于今賴之注城榖在莊三十二年臣聞五大不在邊五細不在庭注上古金木水火土謂之五官玄鳥氏丹鳥氏亦有五又以五鳩鳩民五雉為五工正蓋立官之本也末世隨事施職是以官無常數今無宇稱習古言故云五大也言五官之長專盛過節則不可居邊細弱不勝任亦不可居朝庭疏注正義曰二十九年傳曰有五行之官是謂五官木正曰句芒火正曰祝融金正曰蓐收水正曰玄冥土正曰后土是上古金木水火土謂之五官也十七年傳云少皥氏紀於鳥為鳥師而鳥名鳯鳥氏歷正也玄鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也是玄鳥丹鳥亦有五也彼傳又云五鳩鳩民者也五雉為五工正數皆有五蓋古立官之本以五為常末世隨事施職是以官無常數不復以五耳今無宇稱習古言故云五大也言五官之長其人太大專盛過節則不可居邊城或將據邊城以陵本國也五官之長大細弱則不勝其任不能使威行於下將為人所陵亦不可居朝庭也賈逵云五大謂大子母弟貴寵公子公孫纍世正卿也鄭衆云大子晉申生居曲沃是也母弟鄭共叔假居京是也貴寵公子若棄疾在蔡是也貴寵公孫若無知食渠丘是也纍世正卿衛寧殖居蒲孫氏居戚是也五細賤妨貴少陵長逺間親新間舊小加大也不在庭不當使君朝廷為政也此五大五細無宇唯言五耳不知五者何謂故先儒各自以意言之雖杜之言亦無明證正以彼必不通故改之耳親不在外羈不在內今棄疾在外鄭丹在內注襄十九年丹奔楚君其少戒王曰國有大城何如對曰鄭京櫟實殺曼伯注曼伯檀伯也厲公得櫟又并京音義曼音萬疏注正義曰厲公并京傳無其事正以京櫟連言故云又并京宋蕭亳實殺子遊注在莊十二年齊渠丘實殺無知注在莊九年渠丘今齊國西安縣也齊大夫雍廪邑疏注正義曰渠丘為雍廪之邑傳無其文以彼傳言雍廪殺無知此云齊渠丘實殺無知以此知渠丘是雍廪邑也鄭衆以渠丘為無知之邑無知不坐邑死何以言渠丘殺無知蕭亳非子遊之邑渠丘不得為無知邑衛蒲戚實出獻公注蒲寧殖邑戚孫林父邑出獻公在襄公四年音義出如字徐音黜若由是觀之則害於國末大必折注折其本尾大不掉君所知也注為十三年陳蔡作亂傳音義掉徒弔反疏正義曰宋殺子遊齊殺無知乃是賴得大邑以討纂賊而謂之害於國者以其能專廢置則是國害天子之建諸侯欲令蕃屏王室諸侯之有城邑欲令指揮從已不得使下邑制國都故大城為國害也末大必折以樹木喻也尾大不掉以畜獸喻也楚語説此事公制城邑若體牲焉自首領股肱至於拇指毛脈大能掉小故變而不動夫邉境者國之尾也譬之如牛馬處暑之既至虻䗸之既多而不能掉其尾臣懼之經十有三年春齊高偃帥師納北燕伯于陽注三年燕伯出奔齊高偃高傒玄孫齊大夫陽即唐燕别邑中山有唐縣不言于燕未得國都音義傒音奚疏注正義曰劉炫云杜譜以偃與酀為一亦云高傒玄孫案襄二十九年傳云敬仲曽孫酀非玄孫也今知非者案世本敬仲生莊子莊子生傾子傾子之孫酀是偃為敬仲玄孫也經言于陽傳言于唐知陽即唐也不言于燕未得國都與哀二年納蒯瞶于戚同三月壬申鄭伯嘉卒注五同盟疏注正義曰嘉以襄九年即位其年盟于戲十一年于亳城北十六年于溴梁二十年于澶淵二十五年于重丘二十七年于宋元年于虢皆魯鄭俱在凡七云五者杜以其盟既多故皆據君在盟會而言之襄二十七年是大夫之盟元年虢會讀舊書二者不數故為五也或可傳寫錯誤夏宋公使華定來聘注定華椒孫公如晉至河乃復注晉人以莒故辭公五月葬鄭簡公注三月而葬速楚殺其大夫成熊注傳在葬簡公上經從赴音義熊音雄秋七月冬十月公子憖出奔齊注書名謀亂故也音義憖魚覲反一讀為整正領反楚子伐徐注不書圍以乾溪師告疏注正義曰傳稱使蕩侯潘子司馬督囂尹午陵尹喜帥師圍徐以懼吳楚子次于乾溪以為之援如傳文則實圍徐也不書圍者不以所圍之師告以乾溪援師告也晉伐鮮虞注不書將帥史闕文音義將子匠反帥所類反疏注正義曰十五年晉荀吳帥師伐鮮虞定四年晉士鞅衛孔圉帥師伐鮮虞二者皆書將帥此獨不書將帥知是史闕或是告辭略史闕不得書亦得言史闕文也榖梁曰其曰晉狄之也不正其與夷狄交伐中國故狄稱之也賈服取以為説左氏無貶中國從夷狄之法傳曰亡者侮之亂者取之又曰間攜二覆昏亂霸王之器也鮮虞夷狄也近居中山不式王命不共諸夏不事盟主伐而取之唯恐知力不足焉有以夏討夷反狄中國從此以後用師多矣何以不常狄晉而復舉其人也杜以其言不通故顯而異之傳十二年春齊高偃納北燕伯欵于唐因其衆也注言因唐衆欲納之故得先入唐三月鄭簡公卒將為葬除注除葬道音義為于偽反及遊氏之廟注遊氏子大叔族將毁焉子大叔使其除徒執用以立而無庸毁注用毁廟具疏正義曰用謂毁廟之具若今鍬钁之類也庸亦用也教其除道之徒執所用作具以佇立而無用即毁廟也曰子産過女而問何故不毁乃曰不忍廟也諾將毁矣注教毁廟者之辭音義女音汝既如是子産乃使辟之司墓之室有當道者注簡公别營葬地不在鄭先公舊墓故道有臨時迂直也司墓之室鄭之掌公墓大夫徒屬之家音義迂音于一音於疏正義曰周禮墓大夫下大夫二人中士八人掌凡邦墓之地域為之圗令國民族葬鄭之司墓亦當如彼此是掌公墓大夫也言之室有當道者則非司墓自家之室故注以為徒屬之家猶尚書注云玄孫之親言之以見高祖曽祖之弟皆親親相似毁之則朝而塴注塴下棺音義朝如字塴北鄧反徐甫贈反禮家作窆徐驗反義同疏注正義曰周禮作窆禮記作封此作塴皆是葬時下棺於壙之事而其字不同是聲相近經篆𨽻而字轉易耳弗毁則日中而塴子大叔請毁之曰無若諸侯之賔何注不欲久留賔子産曰諸侯之賔能來會吾喪豈憚日中無損於賔而民不害何故不為遂弗毁日中而葬君子謂子産於是乎知禮禮無毁人以自成也音義憚待旦反夏宋華定來聘通嗣君也注宋元公新即位享之為賦蓼蕭弗知又不答賦注蓼蕭詩小雅義取燕笑語兮是以有譽處兮樂與華定燕語也又曰既見君子為龍為光欲以寵光賔也又曰宜兄宜弟令德壽凱言賔有令德可以壽樂也又曰和鸞雍雍萬福攸同言欲與賔同福祿也音義為于偽反蓼音六樂音洛疏正義曰享燕之禮自有常樂今特云為賦蓼蕭者文四年衛寧武子來聘公與之宴為賦湛露及彤弓注云非禮之常公特命樂人以示意則知此亦特命樂人所以嘗試華定昭子曰必亡宴語之不懷注懷思也寵光之不宣注宣揚也令德之不知同福之不受將何以在注為二十年華定出奔傳疏正義曰不懷不宣不知不受皆據華定為文也詩云燕笑語兮言定當思此笑語與主相對也詩云為龍為光定當應此寵光宣揚之也詩云令德壽凱定當知已有德與否須辭謝之也詩云萬福攸同定當受同福荷君恩也各準事而為之文齊侯衛侯鄭伯如晉朝嗣君也注晉昭公新立公如晉注亦欲朝嗣君至河乃復取郠之役注在十年莒人訴于晉晉有平公之喪未之治也故辭公公子憖遂如晉注憖魯大夫如晉不書還不復命而奔故史不書於策疏注正義曰此經書公子憖出奔齊名見於經則憖是卿也出奔既書於策如晉亦應書之今不書者杜以宣十八年書公孫歸父如晉歸父還自晉至笙遂奔齊傳稱歸父還至笙聞公薨乃壇帷復命於介然後出奔書曰歸父還自晉善之也彼善之故書其去又書其還此憖知已謀泄逃介而先不復命於君而還出奔故史不書於策言其為此故不書其如晉也劉炫云杜以憖還不復命於介而奔止可不書其還何故如晉亦不書也此蓋謂君使臣聘必當告廟告廟乃得書於策公歸告復不告使憖故不書如晉今剛定以為憖初欲謀亂魯國而牲聘晉魯人責其謀亂不復命故賤而不録其聘也出奔書者榮其罪人斯得故顯而書之也劉以為出聘不告廟故不書而規杜氏案不復命而奔傳有其事公子憖不告廟傳無其文以無文之事妄規杜氏非也晉侯享諸侯子産相鄭伯辭於享請免喪而後聽命注簡公未葬音義相息亮反下同疏正義曰僖九年宋桓公卒未葬襄公會諸侯故曰子是先君未葬有會從之禮也鄭逼於楚以固事晉故父雖未葬朝晉嗣君不得已而行於情可許也諸侯相享享必有樂未葬不可以從吉故辭享為得禮晉人許之禮也注善晉不奪孝子之情晉侯以齊侯宴中行穆子相注穆子荀吳投壺晉侯先穆子曰有酒如淮有肉如坻注淮水名坻山名音義淮舊如字四瀆水也學者皆以淮坻之韻不切云淮當為濰濰齊地水名下稱澠亦是齊國水也案澠是齊水齊侯稱之荀吳既非齊人不應逺舉濰水古韻緩作淮足得無勞改也坻直疑反徐直夷反詩云宛在水中坻坻水中高地也疏正義曰禮記有投壺之禮其文無相者祝辭此中行穆子與齊侯皆有言辭者投之中否似若有神故設為此語或作投時皆有言語禮自不載之耳伯瑕責穆子唯言壺何為焉其以中為俊責其失辭不云法不言是投壺皆有言也凡宴不射即為投壺投壺之禮壺去席二矢半司射執八算東面投壺如射三而止其矢室中五扶堂上七扶庭中九扶鋪四指曰扶扶四寸也算長尺二寸壺頸修七寸腹修五寸口徑二寸半容斗五升壺中實小豆焉為其矢之躍而出也小豆取滑且堅矢以柘若棘母去其皮取其堅且重也舊説矢大七分注正義曰杜以淮為水名當謂四瀆之淮也劉炫以為淮坻非韻淮當作濰又以坻為水中之地以規杜氏今知不然者以古之為韻不甚要切故詩云泛彼柏舟在彼中河髧彼兩髦實維我儀又云為絺為綌服之無斁儀河斁綌尚得為韻淮坻相韻何故不可此若齊侯之語容可舉齊地濰水此是穆子在晉何意舉齊地水乎又酒肉相對多少相似案爾雅小洲曰渚小渚曰沚小沚曰坻何得以坻之小地對淮之大水故杜以坻為山名劉炫又以山無名坻者案楚子觀兵於坻箕之山坻非山乎劉以此規杜失非也寡君中此為諸侯師中之齊侯舉矢曰有酒如澠有肉如陵注澠水出齊國臨淄縣北入時水陵大阜也音義中丁仲反下及注同澠音繩時如字本或作溡音同疏注正義曰釋例云澠水出齊國臨淄縣北經樂安博昌縣南界西入時水釋地云大阜曰陵寡人中此與君代興注代更也音義更音庚亦中之伯瑕謂穆子注伯瑕士文伯曰子失辭吾固師諸侯矣壺何為焉其以中俊也注言投壺中不足為俊異齊君弱吾君歸弗來矣注欲與晉君代興是弱之音義齊君弱吾君輕吾君以為弱也穆子曰吾軍帥強禦卒乘競勸今猶古也齊將何事注言晉德不衰於古齊不事晉將無所事音義帥所類反禦魚吕反卒子忽反乘繩證反公孫叟趨進曰日旰君勤可以出矣以齊侯出注叟齊大夫傳言晉之衰音義叟素口反徐又所流反旰白但反楚子謂成虎若敖之餘也遂殺之注成虎令尹子玊之孫與鬭氏同出於若敖宣四年鬬椒作亂今楚子信譖而託討若敖之餘疏正義曰經書熊傳言虎者此人名熊字虎傳言其字經書其名名字相覆猶伯魚名鯉或譖成虎於楚子成虎知之而不能行書曰楚殺其大夫成虎懷寵也注解經所以書名六月葬鄭簡公注傳終子産辭享明既葬則為免喪經書五月誤晉荀吳偽會齊師者假道於鮮虞遂入昔陽注鮮虞白狄别種在中山新市縣昔陽肥國都樂平沾縣東有昔陽城音義種章勇反沾張亷反韋昭音拈字林他亷反疏注正義曰宣十五年晉師滅赤狄潞氏十六年晉人滅赤狄甲氏及留吁成三年晉卻克衛孫良夫伐牆咎如傳曰討赤狄之餘焉是赤狄已滅盡矣知鮮虞與肥皆白狄之别種也杜以昔陽為肥國之都樂平沾縣東有昔陽城疑此為都也下注云巨鹿下曲陽縣西南有肥纍城復疑肥國取彼肥為名也劉炫以為齊在晉東偽會齊師當自晉而東行也假道鮮虞遂入昔陽則昔陽當在鮮虞之東也今案樂平沾縣在中山新市西南五百餘里何當假道於東北之鮮虞而反入西南之昔陽也既入昔陽而别言滅肥則肥與昔陽不得為一安得以昔陽為肥國之都也昔陽即是肥都何以復言巨鹿下曲陽有肥纍之城疑是肥名取於彼也肥為小國竟必不逺豈肥名取巨鹿之城建都於樂平之縣也十五年荀吳伐鮮虞圍鼓杜云鼓白狄之别巨鹿下曲陽縣有鼓聚炫謂肥鼓並在巨鹿昔陽即是鼓都在鮮虞以東南也二十二年傳云晉荀吳使師偽糴者負甲以息於昔陽之門外遂襲鼓滅之則昔陽之為鼓都斷可知矣今杜以昔陽為肥國都是者以傳云遂入昔陽即云壬午滅肥是因入而滅之故云昔陽肥國都也昔陽既在樂平沾縣而杜又云巨鹿下曲陽縣西南有肥纍城相去逺者以肥是本封之名後遷於昔陽猶若杞國本都陳留後遷緣陵鄭本都京兆後遷虢鄶與此何異且昔陽今屬亷州去下曲陽道路非逺在中山南二百餘里劉炫自云肥之與鼓俱在曲陽足知肥纍城與昔陽不甚縣絶劉意欲破杜乃云樂平沾縣在中山新市西南五百餘里又自云昔陽鼓國都與肥相近在中山東南是自相矛楯也然鮮虞在北昔陽在南所以得假道鮮虞遂入昔陽者荀吳意欲滅肥恐肥團防備故從晉之北竟偽欲東南而行往會齊師故先回路假道鮮虞南入昔陽如湯之放桀迂路從陑出其不意故也自杜君土地例稱有者皆疑辭故杜云樂平沾縣東有昔陽是疑而不定又且都縣移動古今不一則晉時樂平沾縣何知不是古之昔陽但肥都昔陽與鼓相近晉既滅得肥國故二十二年息昔陽之門外遂襲鼓而取之昔陽非鼓都也劉意好異聞妄規杜過非也秋八月壬午滅肥以肥子綿臯歸注肥白狄也綿臯其君名巨鹿下曲陽縣西有肥纍城為下晉伐鮮虞起音義臯古刀友纍劣彼反又力輒反周原伯絞虐其輿臣使曹逃注原伯絞周大夫原公也輿衆也曹羣也音義絞古卯反疏注正義曰杜以原伯絞為周大夫甘簡公為周卿士此無明據以意言耳冬十月壬申朔原輿人逐絞而立公子跪尋注跪尋絞弟音義跪求委反又音詭絞奔郊注郊周也甘簡公無子立其弟過注甘簡公周卿士音義過古禾反下之子過反過將去成景之族注成公景公皆過之先君音義去起吕反成景之族賂劉獻公注欲使殺過劉獻公亦周卿士劉定公子丙申殺甘悼公注悼公即過而立成公之孫鰌注鰌平公音義鰌音秋丁酉殺獻太子之傳庾皮之子過注過劉獻公太子之傳殺瑕辛于市及宫嬖綽王孫沒劉州鳩隂忌老陽子注六子周大夫及庾過皆甘悼公之黨傳言周衰原甘二族所以遂微季平子立而不禮於南蒯注蒯南遺之子季氏費邑宰音義蒯苦怪反費音祕南蒯謂子仲注子仲公子憖吾出季氏而歸其室於公注室季氏家財子更其位注更代也音義更音庚注同我以費為公臣子仲許之南蒯語叔仲穆子且告之故注穆子叔仲帶之子叔仲小也語以欲出季氏以不見禮故音義語魚據反注同季悼子之卒也叔孫昭子以再命為卿注悼子季武子之子平子父也傳言叔孫之見命乃在平子為卿之前及平子伐莒克之更受三命注十年平子伐莒以功加三命昭子不伐莒亦以例加為三命疏正義曰悼子之卒不書於經則是未為卿也其卒當在武子之前平子以孫繼祖武子卒後即平子立也傳言悼子卒者欲見昭子為卿逺在平子之先注正義曰十年平子伐莒名書於經即平子於時已為卿矣釋例曰魯之叔孫父兄再命而書於經晉司空亞旅一命而經不書推此知諸侯之卿大夫再命以上皆書於經自一命以下大夫及士經皆稱人名氏不得見也劉賈云春秋之序三命以上乃書於經穎氏以為再命稱人傳云叔孫昭子三命踰父兄昭公十年昭子始加三命先此叔孫皆自見經知所書皆再命也是杜檢傳文知再命書名平子伐莒書名知其已再命矣平子伐莒克之昭子不伐莒也昭子無功而更受三命知平子以功加三命昭子以例加為三命也叔仲子欲構二家注欲構使相憎謂平子曰三命踰父兄非禮也注言昭子受三命自踰其先人疏注正義曰禮記文王世子云其朝于公內朝庶子治之雖有三命不踰父兄鄭玄云治之治公族之禮也唯於內朝則然其餘會聚之事則與庶姓同一命齒于鄉里再命齒於父族三命不齒不齒者不在父兄行例中也彼言三命不踰父兄者自謂在公內朝位在父兄下耳非謂不得受三命踰父兄也叔仲子欲構二家因禮有三命不踰父兄之法遂言昭子受三命自踰其先人以此為非禮也平子初得其言不甚曉解故使昭子令自貶黜見昭子不服乃自知其非故歡而歸罪於叔仲子也昭子無兄叔仲子引禮法連言之耳平子曰然故使昭子注使昭子自貶黜昭子曰叔孫氏有家禍殺適立庶故婼也及此注禍在四年音義適丁歷反若因禍以斃之則聞命矣注言因亂討已不敢辭若不廢君命則固有著矣注著位次昭子朝而命吏曰婼將與季民訟書辭無頗注頗偏也音義頗普何反季孫懼而歸罪於叔仲子故叔仲小南蒯公子憖謀季氏憖告公而遂從公如晉注憖子仲南蒯懼不克以費叛如齊子仲還及衛聞亂逃介而先注介副使也音義介音界使所吏反及郊聞費叛遂奔齊注言及郊解經所以書出疏注正義曰凡言出奔皆自內而出文七年晉先蔑奔秦先在秦地因即奔秦故不言出也歸父還自晉至笙遂奔齊笙在魯之竟外故不言出也此言及郊已入魯竟傳言及郊解經所以書出南蒯之將叛也其鄉人或知之過之而歎注鄉人過蒯而歎且言曰恤恤乎湫乎攸乎注恤恤憂患湫愁隘攸懸危之貌音義湫子小反徐又在酒反一音秋攸如字除以帚反隘於賣反懸音玄本又作縣疏注正義曰釋詁云恤憂也故以恤恤為憂患之意也湫是湫隘故以湫為愁隘之意也詩云攸攸斾旌故以攸為懸之貌也言南蒯之心若此深思而淺謀邇身而逺志家臣而君圖注家臣而圖人君之事故言思深而謀淺身近而志逺音義思息嗣反注同疏正義曰深思而淺謀思慮深而知計淺言其知小而謀大也邇身而逺志身卑近而志高逺言其越分以求通也家臣而君圖為家臣而謀君事言其非已所當為也上二句言其心下一句指其事為下句而發上句故注倒言之有人矣哉注言今有此人微以戒之南蒯枚筮之注不指其事泛卜吉凶音義枚武回反泛芳斂反疏正義曰禮有銜枚所銜之木大如蓍也今人數物云一枚兩枚是籌之名也尚書大禹謨舜禪禹禹讓不受請帝枚卜功臣惟吉之從孔安國云枚謂歷卜之而從其吉彼謂人下一籌使歷卜之也此則不告筮者以所筮之事空下一籌而使之筮故杜云不指其事泛卜吉凶也或以為杜云泛卜吉凶謂枚雷總卜則禮云無雷同是總衆之辭也今俗語云枚雷則其義理或然也遇坤注坤上坤下坤音義坤苦門反之比注坤下坎上比坤六五爻變音義比毗志反注同曰黃裳元吉注坤六五爻辭以為大吉也示子服惠伯曰即欲有事何如惠伯曰吾嘗學此矣忠信之事則可不然必敗外強內溫忠也注坎險故強坤順故溫強而能溫所以為忠疏正義曰筮遇此爻而辭云黃裳元吉南蒯自以為所謀之事必大吉注正義曰坎彖云習坎重險是坎為險也説卦云坤順也六五爻變則上體為坎坎有險難故為剛強也坤道和順故為溫柔也剛強以禦難柔順以事主故外強而能內溫所以為忠也和以率貞信也注水和而土安正和正信之本也疏注正義曰坎為水水性和柔坤為土土性安正率循也貞正也用和柔之性以循安正道既和且正信之本故為信也故曰黃裳元吉疏正義曰天下之事雖則萬端總之諸法大歸忠信而已能忠能信無施不可以有忠信故曰黃裳元吉解此爻辭之意黃中之色也裳下之飾也元善之長也中不忠不得其色注言非黃音義長丁丈反下不共不得其飾注不為裳事不善不得其極注失中德疏注正義曰極訓為中不得其中言其失中德也此文以上二句類之當云善不極不得為長文不然者惠伯之語雖反覆相疊不可字字相對隨便而言故與上不類外內倡和為忠注不相違也音義倡昌亮反和戶卧反率事以信為共注率猶行也疏注正義曰率訓循循而行故率猶行也供養三德為善注三德謂正直剛克柔克也音義供九用反養餘亮反疏注正義曰洪範三德一曰正直二曰剛克三曰柔克孔安國云正直者能正人之曲直剛克者剛能立事柔克者和柔能治三者皆人之性也剛則失之於強柔則失之於弱故貴其能剛能柔謂剛不苛酷柔不滯溺也供養三德為善者剛則抑之柔則進之以志意供給長養之使合於中道各成其德乃為善也董遇注本為共養解云盡共所以養成三德也非此三者弗當注非忠信善不當此卦音義當如字注同或丁浪反疏正義曰既言爻為此辭之意又解此辭所言之義也五方則為五色黃是中央之色也衣裳所以飾身裳是在下之飾也元者始也首也於物為初始於人為頭首元是諸善之長也五方之中猶人之心中心中不忠則不得其黃之色也身體之下猶名位之下為下不共則不得其裳之飾也舉事不善則不得其善之中言為事不中則非善之長也更覆言忠共善三者之義外內倡和為忠言君在內臣在外君倡臣和不相乖違是名為忠也行事以信無有虛詐是名為共也人之為德有正直剛柔供養此三者之德使其德無愆乃名為善也非此三者忠也共也善也則於此卦不當也不當此卦雖吉不可且夫易不可以占險將何事也且可飾乎注夫易猶此易謂黃裳元吉之卦問其何事欲令從下之飾音義夫音扶注同令力呈反疏正義曰且夫易謂此黃裳元吉之易也唯可以占忠信之事不可以占危險之事也問南蒯今將欲為何事也且可飾乎言此易所占唯且可為在下之飾乎不可為餘事也中美能黃忠則黃也上美為元善則元也下美則裳共則裳也忠善共三者皆成可知此筮之言吉也三者猶有所闕筮雖吉未可用也注正義曰惠伯指論此卦而言夫易非是漫言易故知夫易猶言此易謂此黃裳元吉之易卦也險謂危險言此卦不可以占危險之事心疑南蒯事險故問將何事也且可為下之飾也欲令南蒯從下之飾為共中美能黃上美為元下美則裳參成可筮注參美盡備吉可如筮音義參七南反又音三猶有闕也筮雖吉未也注有闕謂不參成將適費飲鄉人酒注南蒯自其家還適費音義飲於鴆反鄉人或歌之曰我有圃生之杞乎注言南蒯在費欲為亂如把生於園圃非宜也把世所謂枸把也音義圃布古反把音紀枸音茍本又作狗從我者子乎注子男子之通稱言從已可不失今之尊音義稱尺證反去我者鄙乎倍其鄰者恥乎注鄰猶親也音義倍音佩已乎已乎非吾黨之士乎注已乎已乎言自遂不改疏正義曰鄉人以南蒯季氏家臣而欲反害季氏故為歌以感切之也圃者所以殖菜蔬也把非可食之物我有圃生之把以喻南蒯在費欲為亂也若能從我之言不為亂者是為子也子者男子之美稱不失尊貴得為子也去我而背叛者鄙賤之行也倍其鄰近者恥惡之事也若已乎已乎自遂其心不肯改者則不復是吾黨之士乎釋木云把枸檵舍人曰枸把也注正義曰杜此解原南蒯之意蒯若云此事已乎已乎自遂其心如不肯改則此南蒯非復是吾黨之士也服虔云已矣決絶之辭則謂歌者自言己意可已乎已乎此南蒯今已非是吾黨之士平子欲使昭子逐叔仲小注欲以自解説小聞之不敢朝昭子命吏謂小待政於朝曰吾不為怨府注言不能為季氏逐小生怨禍之聚為明年叔弓圍費傳音義為季于偽反下同楚子狩于州來注狩冬獵也音義狩本亦作守同手又反注同次于潁尾注潁水之尾在下蔡使蕩侯潘子司馬督囂尹午陵尹喜帥師圍徐以懼吳注五子楚大夫徐吳與國故圍之以逼吳音義潘普干反督音篤本亦作裻囂五刀反徐許驕反楚子次于乾溪注在譙國城父縣南以為之援雨雪王皮冠秦復陶注秦所遺羽衣也音義援于眷反雨于付反王皮冠一本作楚子皮冠復音服一音福陶徒刀反遺唯季反疏注正義曰文在冠下舄上知是衣也目之以秦明是秦所遺也冒雪服之知是羽毛之衣可以禦雨雪也翠被注以翠羽飾被音義被普義反注及下同豹舄注以豹皮為履音義舄音昔執鞭以出注執鞭以教令音義鞭必綿反又或革旁作更者五孟反非也僕析父從注楚大夫音義析星歷反從才用反疏正義曰釋鳥云翠鷸樊光云青出交州李巡曰其羽可以飾物郭璞曰似燕紺色生鬱林鄭子臧好鷸冠以此鳥之羽飾冠劉炫以為僕析父從右尹子革夕見於王為下與革語張本以規杜今知不然者若僕析父共子革二人同時見王王與之語則二人並在子革獨對傳應云子革對曰不得直云對故杜以為右尹子革將夕故下即云對事理分明劉妄規杜過非也右尹子革夕注子革鄭丹夕莫見音義莫音暮見賢遍反王見之去冠被舍鞭注敬大臣音義去起吕反舍音捨與之語曰昔我先王熊繹注楚始封君音義繹音亦疏注正義曰此與吕伋王孫牟燮父禽父杜所注者皆是世家文也燮父禽父亦王孫傳於牟言王孫燮禽亦蒙之與吕伋注齊太公之子丁公音義級音急本亦作伋王孫牟注衛康叔子康伯燮父注晉唐叔之子音義燮素協反父音甫下同禽父注周公子伯禽並事康王注康王成王子四國皆有分我獨無有注四國齊晉魯衛分珍寶之器音義分扶問反下及注皆同疏注正義曰書序云武王既勝殷邦諸侯班宗彛作分器旅獒云明王慎德四夷咸賔無有遠邇畢獻方物惟服食器用王乃昭德之致于異姓之邦無替厥服分寶玉於伯叔之國時庸展親魯語云古者分同姓以珍玉展親也分異姓以逺方之職貢使無忘服也是言諸侯皆得天子之分器也定四年傳稱分魯公以夏后氏之璜封父之繁弱分康叔以大吕之鍾分唐叔以密須之鼓闕鞏之甲姑洗之鍾其齊之所得則無以言之今吾使人於周求鼎以為分王其與我乎對曰與君王哉昔我先王熊繹辟在荆山注在新城沶鄉縣南音義辟匹亦反沶音市又音示篳路藍縷以處草莽跋涉山林以事天子唯是桃弧棘矢以共禦王事注桃弧棘矢以禦不祥言楚在山林少所出有音義篳音必藍力甘反縷力主反莽武黨反跋蒲末反共音恭禦魚吕反齊王舅也注成王母齊太公女晉及魯衛王母弟也楚是以無分而彼皆有今周與四國服事君王將唯命是從豈其愛鼎王曰昔我皇祖伯父昆吾舊許是宅注陸終氏生六子長曰昆吾少曰季連季連楚之祖故謂昆吾為伯父昆吾嘗居許地故曰舊許是宅音義長丁丈反少詩照反嘗一本作曽才能反疏注正義曰楚世家云陸終生子六人圻剖而産焉一曰昆吾二曰參胡三曰彭祖四曰會人五曰曹姓六曰季連季連芋姓楚其後也昆吾是楚之逺祖之兄也舊許是宅昆吾嘗居許地許既南遷故云舊許是宅其地此時屬鄭故云鄭人貪賴其田而不我與哀十七年傳衛侯夢見人登昆吾之觀北面而譟曰登此昆吾之墟杜云今在濮陽城中蓋昆吾居此二處未知孰為先後也今鄭人貪賴其田而不我與我若求之其與我乎對曰與君王哉周不愛鼎鄭敢愛田王曰昔諸侯遠我而畏晉今我大城陳蔡不羮賦皆千乘子與有勞焉諸侯其畏我乎對曰畏君王哉是四國者專足畏也注四國陳蔡二不羮音義遠于万反羮音郎乘繩證反與音預疏注正義曰劉炫以為楚語云靈王城陳蔡不羮使僕夫子晳問於范無宇曰今吾城三國賦皆千乘亦當晉矣諸侯其來乎對曰是三城者豈不使諸侯之惕焉彼再言三城無四國也縱使不羮有二或當前後遷焉非是並有二也炫謂古四字積畫四當為三以規杜過今知不然者以三之與四古雖積畫錯否難知但今諸儒所注春秋傳本並云四國無作三者國語是不傳之書何可執以為真而攻左氏劉雖有所規未可從也又加之以楚敢不畏君王哉工尹路請曰君王命剝圭以為鏚柲注鏚斧也柲柄也破圭玊以飾斧柄音義剝邦角反鏚音戚柲音祕疏正義曰斧柯長三尺和氏之玉長一尺二寸圭玊非為斧柄之物故知破之為飾敢請命注請制度之命王入視之析父謂子革吾子楚國之望也今與王言如響國其若之何注譏其順王心如響應聲音義響許丈反應應對之應子革曰摩厲以須王出吾刃將斬矣注以已喻鋒刃欲自摩厲以斬王之淫慝音義慝他得反王出復語左史倚相趨過注倚相楚史名音義復扶又反倚於綺反徐其綺反相息亮反王曰是良史也子善視之是能讀三墳五典八索九丘注皆古書名音義墳扶云反索所白反本又作索疏注正義曰孔安國尚書序云伏犧神農黃帝之書謂之三墳言大道也少昊顓頊高辛唐虞之書謂之五典言常道也八卦之説謂之八索求其義也九州之志謂之九丘丘聚也言九州所有土地所生風氣所宜皆聚此書也楚左史倚相能讀三墳五典八索九丘即謂上世帝王遺書也周禮外史掌三皇五帝之書鄭玄云楚靈王所謂三墳五典是也賈逵云三墳三王之書五典五帝之典八索八王之法九丘九州亡國之戒延篤言張平子説三墳三禮禮為人防爾雅曰墳大防也書曰誰能典朕三禮三禮天地人之禮也五典五帝之常道也八索周禮八議之刑索空空設之九丘周禮之九刑丘空也亦空設之馬融説三墳三氣隂陽始生天地人之氣也五典五行也八索八卦九丘九州之數也此諸家者各以意言無正驗杜所不信故云皆古書名耳對曰臣嘗問焉昔穆王欲肆其心注周穆王肆極也周行天下將皆必有車轍馬迹焉祭公謀父作祈招之詩以止王心注謀父周卿也祈父周司馬世掌甲兵之職招其名祭公方諫遊行故指司馬官而言此詩逸音義周行如字又下孟反轍直列反祭側界反招常遙反又音昭父音甫疏注正義曰尚書酒誥云若疇圻父是祈父為官名也詩小雅有祈父之篇其詩云祈父豫王之爪牙胡轉豫于恤毛傳云祈父司馬也職掌封祈之甲兵鄭箋云此司馬也時人以其職號之故曰祈父杜用彼説故云祈父司馬世掌甲兵之職也祈既是官故以招為其名謂穆王之時有司馬之官其名曰招也祭公方諌遊行故指司馬官而為言也賈逵云祈求也昭明也言求明德也馬融以圻為王圻千里王者遊戲不過圻內昭明也言千里之內足明德王是以獲沒於祇宫注獲沒不見篡弒音義祇音支又音祈篡初患反弒申志反疏正義曰馬融云圻內遊觀之宫也杜不解蓋以為王離宫之名也臣問其詩而不知也若問逺焉其焉能知之王曰子能乎對曰能其詩曰祈招之愔愔式昭德音注愔愔安和貌式用也昭明也音義焉能於虔反愔愔一心反徐於林反思我王度式如玊式如金注金玊取其堅重形民之力而無醉飽之心注言國之用民當隨其力任如金冶之器隨器而制形故言形民之力去其醉飽過盈之心音義冶音也去起吕反疏正義曰穆王之時有祈父官名招即是司馬官也職掌兵甲常從王行祭公諌王遊行設言以戒司馬也言祈招之愔愔美其志性安和愔愔然也女當用此職掌以明我王之德音也思使我王之德度用如玉然用如金然使之堅而且重可寶愛也若用民力當隨其所能而制其形模依其形模用民之力而無有醉飽盈溢之心也以王之遊行必勞損民力故令依法用之注正義曰言國之用民當隨其力任量其力之所堪而任用之不使勞役過其所堪也如金冶之器隨器而制形者鑄冶之家將作器而制其模謂之為形今代猶名焉用民之力依模用之故言形民之力也食充其腹謂之飽酒卒其量謂之醉醉飽者是酒食饜足過度之名也穆王用民之力不知饜足故令去其醉飽過盈之心王揖而入饋不食寢不寐數日注深感子革之言音義饋其位反數所主反不能自克以及於難注克勝也音義難乃旦反勝升證反又音升仲尼曰古也有志克己復禮仁也信善哉楚靈王若能如是豈其辱於乾溪疏正義曰劉炫云克訓勝也己謂身也有嗜欲當以禮義齊之嗜欲與禮義交戰使禮義勝其嗜欲身得歸復於禮如是乃為仁也復反也言情為嗜欲所逼已離禮而更歸復之今刪定云克訓勝也己謂身也謂身能勝去嗜欲反復於禮也晉伐鮮虞因肥之役也注肥役在此年春秋左傳注疏卷四十五春秋左氏傳注疏卷四十五考證傳魏駘芮岐畢吾西土也注駘在始平武功縣所治釐城臣召南按后稷封邰故詩曰即有邰家室其地即漢右扶風之漦縣漦即邰字故師古注曰讀與邰同音台也各本作釐城誤讀陸氏音義知自唐時已然矣又按杜注謂在夏世以后稷功受此五國為西土之長此語微覺未檢周于夏世安得境土東至河東之魏乎傳舉后稷以至文王舉夏初以至商末故言五國皆封內耳又疏昔我先世后稷臣照按後世以后稷為棄不知后稷虞官非獨棄也自棄以後世守其官及夏之衰棄稷不務乃失其官而自竄于戎翟之間故國語云昔我先王世后稷以服事虞夏言周先王世為后稷之官也鄭康成詩譜亦稱先王世后稷後人妄刪王字遂似后稷云者専指棄而言今此疏亦無王字知唐時已訛脫矣如無王字則是專指棄言及夏之衰棄稷弗務與不窋何與何以自竄于戎翟之間耶又周本紀以不窋為后稷之子蓋馬遷以不窋以上無可考遂謂不窋為后稷之子其實不窋若為棄子者夏歷四百年其衰也即據中興以前論亦歷年孔久不應棄子猶在人世殆俱臆説耳傳巴濮楚鄧吾南土也疏唯濮為逺夷耳臣召南按武王伐商微盧彭濮與庸蜀羌髳並會則周初聲教逺及西南濮人早從義師矣傳而楚所相也疏卷章生犂犂為高辛氏火正臣浩按此用楚世家文楚世家作卷章生重犂重犂為高辛居火正臣照按孔穎逹用楚世家文而去重字蓋重犂二人又有以重犂為一人者孔氏斷從二人也又以黎作犂古字本通傳妃以五成故曰五年臣召南按此傳之注及疏皆原本劉歆春秋説按五行志曰天以一生水地以二生火天以三生木地以四生金天以五生土五位皆以五而合而隂陽易位故曰妃以五成然則水之大數六火七木八金九土十故水以天一為火二牡木以天三為土十牡土以天五為水六牡火以天七為金四牡金以天九為木八牡陽竒為牡隂耦為妃故曰水火之牡也火水妃也於易坎為水為中男離為火為中女蓋取諸此也又按下文嵗五及鶉火杜亦全用歆説臣照按嵗五及鶉火當六十年而云五十二年者包遲留伏逆而約略計之也傳孟僖子如齊殷聘禮也疏主人不延几臣浩按聘禮原文作主人不筵几各本俱誤今仍之季孫意如叔弓仲孫貜帥師伐莒萬斯大學春秋隨筆曰時止二軍季之一軍已為將而叔弓為佐偏師而出則迭將之悉師以行則同帥之二子之一軍不分將佐而各主其偏或専行或並出不相隸也専恣如此于公何有哉春秋自此于諸卿並將悉書深著其無君之罪也傳齊惠欒高氏皆耆酒疏齊惠公一段各本俱誤刋于下文遂伐虎門之下又多誤字如齊惠公生公子欒生字下脫公字又子旗是欒孫子良是高孫脫二子字又孫以王父字為氏為氏之上衍王父字三字遂不可解今並改正傳始用人於亳社趙汸補注曰不書諱國惡傳葬平公也趙汸補注曰傳記鄭伯往弔又因叔孫如晉併記十一國大夫會葬見晉雖失政諸侯猶畏其強楚子虔誘蔡侯般殺之于申臣浩按此春秋書法所以深惡楚虔也杜注謂蔡大夫以楚子名告不亦迂乎傳視下言徐漢書五行志注應劭曰視下視不登帶言徐不聞於表著傳臣聞五大不在邊五細不在庭臣召南按杜解五大引古五官與傳上文所引子元管仲不類疏中引賈逵鄭衆之説與傳相合勝於杜注傳及遊氏之廟顧炎武日知録曰此傳與十八年傳簡兵大搜將為搜除子太叔之廟在道南其寢在道北其庭小過期二日使除徒陳于道南廟北曰子産過女而命速除乃過于南鄉子産朝過而怒之除者南毁子産及衝使從者止之曰毁於北方此亦一事而記者或以為葬或以為搜傳兩存之而失刪其一耳臣召南按宋儒劉敞已謂此兩傳實一事説者不同丘明兩記之傳遂入昔陽疏昔陽今屬亷州臣召南按唐志亷州武德元年置貞觀元年省屬鎮州或疑亷州字誤非也傳已乎已乎疏釋木云杞枸檵舍人曰向杞也推尋文義應作枸把也傳翠被豹舄王應麟困學記聞曰楚之興也篳路藍縷其衰也翠被豹舄國家之興衰視其儉侈而已傳對曰與君王哉臣召南按此子革語也楚世家作析父對曰讀左傳而誤者也傳古也有志克己復禮仁也王應麟困學紀聞曰或謂二語古人所傳非出于仲尼胡致堂云夫子以克己復禮為仁非指克己復禮即仁也國語胥臣曰出門如賔承事如祭仁之則也蓋左氏粗聞闕里諸言每每引用而輒有更易穆薑于隨舉文言亦此類臣照按國語曰教之語語者先聖先師之嘉語也魯論顔子曰請事斯語冉子曰請事斯語知此皆非孔子自言皆述古語也故曰請事斯語王應麟不本左氏以解魯論轉因魯論以疑左氏非也春秋左氏傳注疏卷四十五考證
