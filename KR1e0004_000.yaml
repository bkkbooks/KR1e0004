body:
  text: 御製偶閱左傳宋楚泓之戰事因題阻隘鼓儳雖失正狥名昧義詎非癡經書明鑒傳千古識務通權用者誰御製讀左傳荀吳伐鮮虞鉅鹿圍其鼓或請以城叛穆子拒弗許好惡苟弗愆民皆知適所弗賞為失信賞惡去聲則何取欲城而邇奸所䘮多無補鼓人殺叛人繕備更守禦圍之又三月請降仍致語民猶有食色姑修而城拒食竭告力盡取之方振旅不納叛誠當去聲不撫降何處信如待食竭菅命豈弗苦何云不戮一謬託怠弗賈子魚誚宋襄致志鼓儳可叶設其愛二毛則如服扵楚比義可知非何事邱明叙浮夸真定評吾聞之韓愈御製書春秋元年春王正月事春秋聖人尊王之經也元年春王正月開宗明義之第一也解此者自三傳以至後儒其說充棟或致撡戈無容置議然識聖人之深意者有㡬乎王道熄而作春秋春秋魯之舊史也自隠公始則不得不書隠公元年而即繼之曰春王正月前史所無有也盖言公之元年乃禀王之春王之正而得是非尊王之義乎且是年也于齊為九年于晉為二年衛鄭以下各為其年不可婁指數而總為平王之四十九年于斯時也世人將何以紀其年而知其嵗乎是則聖人之書元年春王正月也者其亦有感于斯乎行夏之時聖人之私議不能行于時言春王而不言王春月可改而春不可改亦隠寓夏之時與王之元所謂大一統足以一天下之心而不可任其紛有不能行之嘆矣兹為開宗始義乃貫春秋之本末而絶筆於獲麟盖聖人之道在萬世即聖人之憂在萬世然則封建之説不惟不可行於後世知聖人亦未必以為宜然也御製讀左傳晉楚城濮之戰說域濮之戰人皆知子玉之傲而憤以致敗晉臣之巧而和以致勝予則以為其過不在子玉而在楚子也夫戰國之大事也臣不聽君言冒徼幸以間執讒慝之口而君即從之一失也知其不可而少與之師以觀其敗二失也馬且必乗其産乃以陳蔡屬之右師驚虎皮而先奔三失也有此三失即楚子以全軍臨師亦必致敗而况君臣之心先自携貳謬任其敗以實已言而棄西廣東宫及若敖之六卒與敵而弗惜是非以怨一臣而波及自䘮其衆軍士之命乎且明知晉侯備嘗險阻天之所置允當應歸矣何不令子玉全師而旋雖將在外君命有所不受亦視其得失之大小何如耳未有明知其失顧以强臣一言而怒姑由其戰置國勢之興衰人命之存亡於不計如越人視秦人之肥瘠豈理也哉予故曰其過不在子玉而在楚子也御製讀左傳季文子出莒僕季文子出莒僕是也而左氏有過辭然魯之襄仲獨非僕之類乎其事即接宣公之立不聞文子有討賊之誅何獨嚴於僕而恕於仲乎且僂數元愷四凶謂堯不能舉賢而舜舉之堯不能去惡而舜去之審如是則堯何以為巍巍蕩蕩則天之大聖乎盖其賢其惡或者當堯之時尚未甚彰而其舉其去亦因之而有所待千載之下豈可輕議哉况舜之協帝皆出堯之所授則舜之所舉即堯之所舉舜之所去即堯之所去耳邱明博於紀事但逞其文藻而昧於知理讀其文者斥其浮誇資其强識而於是非去取之間斷之以理可也欽定四庫全書經部五春秋左傳注疏春秋類目録春秋正義序春秋左傳序春秋左傳原目附春秋三傳注解傳述人卷一隱公起元年盡二年卷二隱公起三年盡五年卷三隱公起六年盡十一年卷四桓公起元年盡二年卷五桓公起三年盡六年卷六桓公起七年盡十八年卷七莊公起元年盡十年卷八莊公起十一年盡二十二年卷九莊公起二十三年盡三十二年卷十閔公起元年盡二年卷十一僖公起元年盡五年卷十二僖公起六年盡十四年卷十三僖公起十五年盡二十一年卷十四僖公起二十二年盡二十四年卷十五僖公起二十五年盡二十八年卷十六僖公起二十九年盡三十三年卷十七文公起元年盡四年卷十八文公起五年盡十年卷十九文公起十一年盡十五年卷二十文公起十六年盡十八年卷二十一宣公起元年盡四年卷二十二宣公起五年盡十一年卷二十三宣公十二年卷二十四宣公起十三年盡十八年卷二十五成公起元年盡二年卷二十六成公起三年盡十年卷二十七成公起十一年盡十五年卷二十八成公起十六年盡十八年卷二十九襄公起元年盡四年卷三十襄公起五年盡九年卷三十一襄公起十年盡十二年卷三十二襄公起十三年盡十五年卷三十三襄公起十六年盡十八年卷三十四襄公起十九年盡二十一年卷三十五襄公起二十二年盡二十四年卷三十六襄公二十五年卷三十七襄公二十六年卷三十八襄公起二十七年盡二十八年卷三十九襄公二十九年卷四十襄公起三十年盡三十一年卷四十一昭公元年卷四十二昭公起二年盡四年卷四十三昭公起五年盡六年卷四十四昭公起七年盡八年卷四十五昭公起九年盡十二年卷四十六昭公十三年卷四十七昭公起十四年盡十六年卷四十八昭公起十七年盡十九年卷四十九昭公二十年卷五十昭公起二十一年盡二十三年卷五十一昭公起二十四年盡二十五年卷五十二昭公起二十六年盡二十八年卷五十三昭公起二十九年盡三十二年卷五十四定公起元年盡四年卷五十五定公起五年盡九年卷五十六定公起十年盡十五年卷五十七哀公起元年盡五年卷五十八哀公起六年盡十一年卷五十九哀公起十二年盡十五年卷六十哀公起十六年盡二十七年卷末後序臣等謹案春秋左氏傳注疏六十卷晉杜預注唐孔頴達疏左氏傳出於漢初而立於學官最晚其於釋經則義畧而事詳預為經傳集解世稱左氏功臣其後沈文阿蘇寛劉炫皆據杜説沈氏義例粗可蘇氏惟攻賈服劉氏好規杜失頴達參取沈劉之説兩義俱違則斷以己意務引經稽傳以曲暢集解之㫖盖又杜氏之功臣也明刻本多訛如韓原之戰誤以陸氏釋文混於杜注今刻本悉正之乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋正義序唐孔穎達著夫春秋者紀人君動作之務是左史所職之書王者統三才而宅九有順四時而治萬物四時序則玉燭調於上三才協則寳命昌於下故可以享國永年令聞長世然則有爲之務可不愼與國之大事在祀與戎祀則必盡其敬戎則不加無罪盟會協於禮興動順其莭失則貶其惡得則褒其善此春秋之大㫖爲皇王之明鑒也若夫五始之目章於帝軒六經之道光於禮記然則此書之發其來尚矣但年祀緜邈無得而言暨乎周室東遷王綱不振楚子北伐神器將移鄭伯敗王於前晉侯請隧於後竊僭名號者何國不然專行征伐者諸侯皆是下陵上替内叛外侵九域騷然三綱遂絶夫子内韞大聖逢時若此欲垂之以法則無位正之以武則無兵賞之以利則無財説之以道則不用虛歎銜書之鳯乃似喪家之狗既不救於已徃冀垂訓於後昆因魯史之有得失據周經以正褒貶一字所嘉有同華衮之贈一言所黜無異蕭斧之誅所謂不怒而人威不賞而人勸實永世而作則歴百王而不朽者也至於秦滅典籍鴻猷遂濅漢徳既興儒風不泯其前漢傳左氏者有張蒼賈誼尹咸劉歆後漢有鄭衆賈逵服䖍許惠卿之等各爲詁訓然雜取公羊榖梁以釋左氏此乃以冠雙屨將絲綜麻方鑿圓枘其可入乎晉世杜元凱又爲左氏集解專取丘明之傳以釋孔氏之經所謂子應乎母以膠投漆雖欲勿合其可離乎今校先儒優劣杜爲甲矣故晉宋傳授以至于今其爲義疏者則有沈文阿蘇寛劉炫然沈氏於義例粗可於經傳極疎蘇氏則全不體本文唯旁攻賈服使後之學者鑽仰無成劉炫於數君之内實爲翹楚然聰惠辯博固亦罕儔而探賾鉤深未能致遠其經注易者必具飾以文辭其理致難者乃不入其根莭又意在矜伐性好非毁規杜氏之失凡一百五十餘條習杜義而攻杜氏猶蠧生於木而還食其木非其理也雖規杜過義又淺近所謂捕鳴蟬於前不知黃雀在其後案僖公三十三年經云晉人敗狄于箕杜注云郤缺稱人者未爲卿劉炫規云晉侯稱人與殽戰同案殽戰在葬晉文公之前可得云背喪用兵以賤者告箕戰在葬晉文公之後非是背喪用兵何得云與殽戰同此則一年之經數行而已曾不勘省上下妄規得失又襄公二十一年傳云邾庶其以漆閭丘來奔以公姑姊妻之杜注云蓋寡者二人劉炫規云是襄公之姑成公之姊只一人而已案成公二年成公之子公衡為質及宋逃歸案家語本命云男子十六而化生公衡已能逃歸則十六七矣公衡之年如此則於時成公三十三四矣計至襄二十一年成公七十餘矣何得有姊而妻庶其此等皆其事歴然猶尚妄説况其餘錯亂良可悲矣然比諸義疏猶有可觀今奉勑刪定據以為本其有疎漏以沈氏補焉若兩義俱違則特申短見雖課率庸鄙仍不敢自專謹與朝請大夫國子博士臣谷那律故四門博士臣楊士勛四門博士臣朱長才等對共參定至十六年又奉勑與前脩疏人及朝散大夫行大學博士上騎都尉臣馬嘉運朝散大夫行大學博士上騎都尉臣王徳韶給事郎守四門博士上騎都尉臣蘇徳融登仕郎守大學助敎雲騎尉臣隨徳素等對勑使趙𢎞智覆更詳審為之正義凡三十六卷冀貽諸學者以裨萬一焉春秋正義序春秋正義序考證其為義疏者則有沈文阿臣浩按南史文阿吳興武康人沈峻子也監本作文何非臣召南按各經注疏及釋文俱訛作沈文何陳書及南史儒林傳俱言文阿治三禮三傳撰經典大義十八卷隋志載文阿撰左氏義略二十五卷今依史改為之正義凡三十六巻臣召南按唐志亦云春秋正義三十六巻今本分為六十卷不知始於何時臣浩按唐志云孔穎達楊士勛朱長才奉詔撰獨脱谷那律一人當以此序正之春秋正義序考證春秋左傳序晉杜氏著唐陸徳明音義孔穎達疏春秋左氏傳序音義陸曰此元凱所作既以釋經故依例音之本或題為春秋左傳序者沈文阿以為釋例序今不用疏正義曰此序題目文多不同或云春秋序或云左氏傳序或云春秋經傳集解序或云春秋左氏傳序案晉宋古本及今定本竝云春秋左氏傳序今依用之南人多云此本釋例序後人移之於此且有題曰春秋釋例序置之釋例之端今所不用晉太尉劉寔與杜同時人也宋太學博士賀道養去杜亦近俱為此序作注題竝不言釋例序明非釋例序也又晉宋古本序在集解之端徐邈以晉世言五經音訓為此序作音且此序稱分年相附隨而解之名曰經傳集解是言為集解作序也又别集諸例從而釋之名曰釋例異同之説釋例詳之是其據集解而指釋例安得為釋例序也序與叙音義同爾雅釋詁云叙緒也然則舉其綱要若繭之抽緒孔子為書作序為易作序卦子夏為詩作序故杜亦稱序序春秋名義經傳體例及已為解之意也此序大畧凡有十一叚名義以春秋是此書大名先解立名之由自春秋至所記之名也明史官記事之書名曰春秋之義自周禮有史官至其實一也明天子諸侯皆有史官必湏記事之義自韓宣子適魯至舊典禮經也言周史記事褒貶得失本有大法之意自周徳既衰至從而明之言典禮廢缺善惡無章故仲尼所以脩此經之意自左丘明受經於仲尼至所脩之要故也言丘明作傳務在解經而有無傳之意自身為國史至然後為得也言經㫖之表不應湏傳有通經之意自其發凡以言例至非例也言丘明傳有三等之體自故發傳之體有三至三叛人名之類是也言仲尼脩經有五種之例自推此五體至人倫之紀備矣總言聖賢大趣足以周悉人道所説經傳理畢故以此言結之自或曰春秋以錯文見義至釋例詳之也言已異於先儒自明作集解釋例之意自或日春秋之作下盡亦無取焉大明春秋之早晚始隱終麟先儒錯繆之意賈逵太史公十二諸侯年表序云魯君子左丘明作傳據劉向别録云左丘明授曾申申授吳起起授其子期期授楚人鐸椒鐸椒作抄撮八卷授虞卿虞卿作抄撮九卷授荀卿荀卿授張蒼此經既遭焚書而亦廢滅及魯共王壊孔子舊宅於壁中得古文逸禮有三十九篇書十六篇天漢之後孔安國獻之遭巫蠱倉卒之難未及施行及春秋左氏丘明所脩皆古文舊書多者二十餘通藏於秘府伏而未發漢武帝時河間獻左氏及古文周官光武之世議立左氏學公羊之徒上書訟公羊抵左氏左氏之學不立成帝時劉歆校秘書見府中古文春秋左氏傳歆大好之時丞相史尹咸以能治左氏與歆共校傳歆畧從咸及丞相翟方進受質問大義初左氏傳多古字古言學者傳訓詁而已及歆治左氏引傳文以釋經轉相發明由是章句義理備焉歆以為左丘明好惡與聖人同親見夫子而公羊榖梁在七十二弟子後傳聞之與親見其詳畧不同歆數以問向向不能非也及歆親近欲建立左氏春秋及毛詩逸禮古文尚書皆列於學官哀帝令歆與五經博士講論其義諸儒博士或不肯置對歆因移書於太常博士責讓之和帝元興十一年鄭興父子及歆創通大義奏上左氏始得立學遂行於世至章帝時賈逵上春秋大義四十條以抵公羊榖梁帝賜布五百匹又與左氏作長義至鄭康成箴左氏膏肓發公羊墨守起榖梁廢疾自此以後二傳遂微左氏學顯矣春秋者魯史記之名也疏人臣奉主品目不同掌事曰司掌書曰史史官記事為書立名以春秋二字為記事之書名也正義曰從此以下至所記之名也明史官記事之書名曰春秋之意春秋之名經無所見唯傳記有之昭二年韓起聘魯稱見魯春秋外傳晉語司馬侯對晉悼公云羊舌肸習於春秋楚語申叔時論傅太子之法云敎之以春秋禮坊記云魯春秋記晉喪曰殺其君之子奚齊又經解曰屬辭比事春秋敎也凡此諸文所説皆在孔子之前則知未脩之時舊有春秋之目其名起逺亦難得而詳禮記内則稱五帝有史官既有史官必應記事但未必名為春秋耳據周世法則每國有史記當同名春秋獨言魯史記者仲尼脩魯史所記以為春秋止解仲尼所脩春秋故指言魯史言脩魯史春秋以為褒貶之法也記事者以事繫日音義繫工帝反以日繫月以月繫時以時繫年所以紀逺近别同異也音義别彼列反疏既辨春秋之名又言記事之法繫者以下綴上以末連本之辭言於此日而有此事故以事繫日月統日故以日繫月時統月故以月繫時年統時故以時繫年所以紀理年月遠近分别事之同異也若隱三年春王二月己巳日有食之二年秋八月庚辰公及戎盟于唐之類是事之所繫年時月日四者皆具文也史之所記皆應具文而春秋之經文多不具或時而不月月而不日亦有日不繫月月而無時者史之所記日必繫月月必繫時春秋三百四十二年之間有日無月者十四有月無時者二或史文先闕而仲尼不改或仲尼備文而後人脱誤四時必具乃得成年桓十七年五月無夏昭十年十二月無冬二者皆有月而無時既得其月時則可知仲尼不應故闕其時獨書其月當是仲尼之後寫者脱漏其日不繫於月或是史先闕文若僖二十八年冬下無月而有壬申丁丑計一時之間再有此日雖欲改正何以可知仲尼無以復知當是本文自闕不得不因其闕文使有日而無月如此之類蓋是史文先闕未必後人脱誤其時而不月月而不日者史官立文亦互自有詳畧何則案經朝聘侵伐執殺大夫土功之屬或時或月未有書日者其要盟戰敗崩薨卒葬之屬雖不盡書日而書日者多是其本有詳畧也計記事之初日月應備但國史總集其事書之於策簡其精麤合其同異量事而制法率意以約文史非一人辭無定式故日月參差不可齊等及仲尼脩改因魯史成文史有詳畧日有具否不得不即因而用之案經傳書日者凡六百八十一事自文公以上書日者二百四十九宣公以下亦俱六公書日者四百三十二計年數畧同而日數向倍此則久逺遺落不與近同且他國之告有詳有畧若告不以日魯史無由得其日而書之如是則當時之史亦不能使日月皆具當時己自不具仲尼從後脩之舊典參差日月不等仲尼安能盡得知其日月皆使齊同去其日月則或害事之先後備其日月則古史有所不載自然湏舊有日者因而詳之舊無日者因而畧之亦既自有詳畧不可以為褒貶故春秋諸事皆不以日月為例其以日月為義例者唯卿卒日食二事而已故隱元年冬十有二月公子益師卒傳曰公不與小斂故不書日桓十七年冬十月朔日有食之傳曰不書日官失之也丘明發傳唯此二條明二條以外皆無義例既不以日為例獨於此二條見義者君之卿佐是謂股肱股肱或虧何痛如之病則親問歛則親與卿佐之喪公不與小歛則知君之恩薄但是事之小失不足以貶人君君自不臨臣喪亦非死者之罪意欲垂戒於後無辭可以寄文而人臣輕賤死日可畧故特假日以見義也日食者天之變甲乙者厯之紀朔是日月之會其食必在朔日是故史書日食必記月朔朔有甲乙乃可推求故日有食之湏書朔日日與不日唯此而已月與不月傳本無義公羊穀梁之書道聴塗説之學或日或月妄生褒貶先儒溺於二傳横為左氏造日月褒貶之例故杜於大夫卒例備詳説之仲尼刊定日無褒貶而此序言史官記事必繫日月時年者自言記事之體湏有所繫不言繫之具否皆有義例也春秋感精符曰日者陽之精耀魄光明所以察下也淮南子曰積陽之熱氣生火火氣之精者為日劉熙釋名曰日實也光明盛實是説日之義也日之在天隨天轉運出則為晝入則為夜故每一出謂之一日日之先後無所分别故聖人作甲乙以紀之世本云容成造厯大撓作甲子宋忠注云皆黄帝史官也感精符曰月者隂之精地之理也淮南子曰積隂之寒氣久者為水水氣之精者為月劉熙釋名曰月闕也滿而闕是説月之義也月之行天其疾於日十三倍有餘積二十九日過半而行及日與日相會張衡靈憲曰日譬火月譬水火外光水含景故月光生於日之所照魄生於日之所蔽當日則光盈就日則明盡然則以明一盡謂之一月所以總紀諸月也三月乃為一時四時乃為一年故遞相統攝紀理庶事紀遠近者前年遠於後年後月近於前月異其年月則遠近明也别同異者共在月下則同月之事各繫其月則異月之事觀其月則異同别矣若然言正月二月則知是春四月五月則知是夏不湏以月繫時足明遠近同異必湏以月繫時者但以日月時年各有統屬史官記事唯須順叙時既管月不得不以月繫時案經未有重書月者日則有之桓十二年冬十有一月丙戌公會鄭伯盟于武父丙戌衛侯晉卒一日再書者史本異文仲尼從而不改故杜云重書丙戌非義例因史成文也故史之所記必表年以首事年有四時故錯舉以為所記之名也音義錯七各反下皆同疏將解名曰春秋之意先説記事主記當時之事事有先後湏顯有事之年表顯也首始也事繫日下年是事端故史之所記必先顯其年以為事之初始也年有四時不可徧舉四字以為書號故交錯互舉取春秋二字以為所記之名也春先於夏秋先於冬舉先可以及後言春足以兼夏言秋足以見冬故舉二字以包四時也春秋二字是此書之總名雖舉春秋二字其實包冬夏四時之義四時之内一切萬物生植孕育盡在其中春秋之書無物不包無事不記與四時義同故謂此書為春秋孝經云春秋祭祀以時思之詩魯頌云春秋匪解享祀不忒鄭箋云春秋猶言四時也是舉春秋足包四時之義年歲載祀異代殊名而其實一也爾雅釋天云載歲也夏曰歲商曰祀周曰年唐虞曰載李廵曰夏嵗商祀周年唐虞載各自紀事堯舜三代示不相襲也孫炎曰載始也取物終更始也歲取歲星行一次也祀取四時祭祀一訖也年取年榖一熟也是其名别而實同也此四者雖代有所尚而名興自遠非夏代始有歲名周時始有年稱何則堯典云期三百有六旬有六日以閏月定四時成歲禹貢作十有三載乃同是於唐虞之世已有年歲之言記事者則各從所尚常語者則通以為言故虞亦稱年周亦稱歲周詩唐風稱百歲之後是周之稱歲也四時之名春夏秋冬皆以時物為之號也禮記鄉飲酒義曰春之為言蠢也夏之為言假也秋之為言揫也冬之為言中也中者藏也漢書津厯志云春蠢也物蠢生也夏假也物假大也秋􅒫即由反也物􅒫斂也冬終也物終藏之也是解四時異名之義也史之記事一月無事不空舉月一時無事必空舉時者蓋以四時不具不成為歲故時雖無事必虛録首月其或不録皆是史之闕文隱六年空書秋七月注云雖無事而書首月具四時以成歲桓四年不書秋冬注云國史之記必書年以集此公之事書首時以成此年之歲故春秋有空時而無事者今不書秋冬首月史闕文是其説也然一時無事則書首月莊二十二年書夏五月者杜雖於彼無注釋例以為闕謬春秋之名錯舉而已後代儒者妄為華葉賈逵云取法隂陽之中春為陽中萬物以生秋為隂中萬物以成欲使人君動作不失中也賀道養云春貴陽之始秋取隂之初計春秋之名理包三統據周以建子為正言之則春非陽中秋非隂中據夏以建寅為正言之則春非陽始秋非隂初乃是竅混沌而畫蛇足必將夭性命而失巵酒周禮有史官掌邦國四方之事達四方之志諸侯亦各有國史疏既解名曰春秋之意又顯記事之人春官宗伯之屬有大史下大夫二人小史中士八人内史中大夫一人外史上士四人御史中士八人雖復各有所職俱是掌書之官正義曰周禮春官小史職曰掌邦國之志内史職曰凡四方之事書内史讀之外史職曰掌四方之志掌達書名于四方今杜氏序云掌邦國四方之事者掌邦國取小史職文四方之事取内史職文杜總括兩史共成此語諸侯官屬雖難備知要傳記每説諸侯之史知諸侯亦各有國史也周禮言邦國者乃謂畿外諸侯之國也國有四表故言四方云凡四方之事書内史讀之者謂四方有書來告内史讀以白王也告王之後則小史主掌之故云掌邦國之志内史雖云讀四方之事書其實國内史策皆内史所掌故其職掌八柄及策命之事也然則内史小史既主國内及主四方來告之事故僖二十三年杜注云國史承告而書是也杜此序又云達四方之志取外史職文案外史職云掌四方之志掌達書名四方今移達字於四方之志上如杜之意外史達此國内之志以告四方故僖二十三年杜注云同盟然後告名赴者之禮是也然則掌邦國四方之事若據此承受他國之赴也達四方之志者據己國有事赴告他國也春秋既有内外二種故杜翦撮天子之史取外史内史兩文周禮諸史雖皆掌書仍不知所記春秋定是何史蓋天子則内史主之外史佐之諸侯蓋亦不異但春秋之時不能依禮諸侯史官多有廢闕或不置内史其策命之事多是大史則大史主之小史佐之劉炫以為尚書周公封康叔戒之酒誥其經曰大史友内史友如彼言之似諸侯有大史内史矣但徧檢記傳諸侯無内史之文何則周禮内史職曰凡命諸侯及孤卿大夫則策命之僖二十八年傳說襄王使内史叔興父策命晉侯為侯伯是天子命臣内史掌之襄三十年傳稱鄭使大史命伯石為卿是諸侯命臣大史掌之諸侯大史當天子内史之職以諸侯兼官無内史故也鄭公孫黒强與薰隧之盟使大史書其名齊大史書崔抒弑其君晉大史書趙盾弑其君是知諸侯大史主記事也南史聞大史盡死執簡以往明南史是佐大史者當是小史也若然襄二十三年傳稱季孫召外史掌惡臣言外史則似有内史矣必言諸侯無内史者閔二年傳稱史華龍滑與禮孔曰我大史也文十八年傳稱魯有大史克哀十四年傳稱齊有大史子餘諸國皆言大史安得有内史也季孫召外史者蓋史官身居在外季孫從内召之故曰外史猶史居在南謂之南史耳南史外史非官名也藝文志云古之王者世有史官君舉必書所以愼言行昭法戒左史記言右史記事事為春秋言為尚書帝王靡不同之禮記玉藻云動則左史書之言則右史書之雖左右所記二文相反要此二者皆言左史右史周禮無左右之名得稱左右者直是時君之意處之左右别史掌之事因為立名故傳有左史倚相掌記左事謂之左史左右非史官之名也左是陽道陽氣施生故令之記動右是隂道隂氣安静故使之記言藝文志稱左史記言右史記動誤耳上言魯史記則諸侯各有史可知又言諸侯各有國史者方説諸侯各有春秋重詳其文也大事書之於策音義策本又作冊亦作筴同初革反小事簡牘而已音義牘徒木反疏既言尊卑皆有史官又論所記簡策之異釋器云簡謂之畢郭璞云今簡札也許慎説文曰簡牒也牘書版也蔡邕獨斷曰策者簡也其制長二尺短者半之其次一長一短兩編下附鄭𤣥注中庸亦云策簡也由此言之則簡札牒畢同物而異名單執一札謂之為簡連編諸簡乃名為策故於文策或作冊象其編簡之形以其編簡為策故言策者簡也鄭玄注論語序以鉤命決云春秋二尺四寸書之孝經一尺二寸書之故知六經之策皆稱長二尺四寸蔡邕言二尺者謂漢世天子策書所用故與六經異也簡之所容一行字耳牘乃方版版廣於簡可以竝容數行凡為書字有多有少一行可盡者書之於簡數行可盡者書之於方方所不容者乃書於策聘禮記曰若有故則加書將命百名以上書於策不及百名書於方鄭𤣥云名書文也今謂之字策簡也方版也是其字少則書簡字多則書策此言大事小事乃謂事有大小非言字有多少也大事者謂君舉告廟及鄰國赴告經之所書皆是也小事者謂物不為災及言語文辭傳之所載皆是也大事後雖在策其初亦記於簡何則弑君大事南史欲書崔杼執簡而往董狐既書趙盾以示於朝是執簡而示之非舉策以示之明大事皆先書於簡後乃定之於策也其有小事文辭或多如吕相絶秦聲子説楚字遇數百非一牘一簡所能容者則於衆簡牘以次存録也杜所以知其然者以隱十一年傳例云滅不告敗勝不告克不書于策明是大事來告載之策書也策書不載丘明得之明是小事傳聞記於簡牘也以此知仲尼脩經皆約策書成文丘明作傳皆博采簡牘衆記故隱十一年注云承其告辭史乃書之于策若所傳聞行言非將君命則記在簡牘而已不得記於典策此蓋周禮之舊制也又莊二十六年經皆無傳傳不解經注云此年經傳各自言其事者或策書雖存而簡牘散落不究其本末故傳不復申解是言經據策書傳馮簡牘經之所言其事大傳之所言其事小故知小事在簡大事在策也孟子曰楚謂之檮杌晉謂之乘而魯謂之春秋其實一也音義孟子書名姓孟名軻字子輿鄹邑人與齊宣王同時人著此書檮徒刀反杌五忽反檮杌四凶之一杜云頑凶無儔匹之貌乘繩證反車乘也一云兵乘疏既言簡策之異又説諸國别名孟子姓孟名軻字子輿鄹邑人也當六國之時師事孔子之孫子思脩儒術之道著書七篇其第四離婁篇云王者之迹息而詩亡詩亡然後春秋作晉謂之乘楚謂之檮杌魯謂之春秋一也其言與此小異是杜足其實二字使成文也彼趙岐注云乘者興於田賦乘馬之事因以為名檮杌者嚚凶之類興於記惡垂戒因以為名春秋以二始舉四時記萬事之名是三者立名雖異記事則同故云其實一也序發首云春秋者魯史記之名也故引此以為證且明諸侯之國各有史記故魯有春秋仲尼得因而脩之也案外傳申叔時司馬侯乃是晉楚之人其言皆云春秋不言乘與檮杌然則春秋是其大名晉楚私立别號魯無别號故守其本名賈逵云周禮盡在魯矣史法最備故史記與周禮同名然則晉楚豈當自知不備故别立惡名韓宣子適魯音義宣子名起晉大夫適魯在昭二年見易象與魯春秋曰周禮盡在魯矣音義盡津忍反後放此吾乃今知周公之徳與周之所以王音義王于况反又如字疏既言諸國有書欲明魯最兼備故云此正義曰此昭二年傳文也宣子晉卿名起食邑於韓因以為氏諡曰宣子者有徳之稱為昭公新立身新為政故來聘魯因觀書於大史氏見此書而發言杜注彼以為易象即今周易上下經之象辭也魯春秋謂魯史記之策書也春秋遵周公之典以序事故曰周禮盡在魯矣易象春秋是文王周公之所制故見春秋知周公之徳見易象知周之所以王也文王能制此典即是身有聖徳聖不空生必王天下周室之王文王之功故觀其書知周之所以得王天下之由也文王身處王位故以王言之周公不王故以徳屬之人異故文異傳言觀書大史則所觀非一而獨言易象魯春秋者韓子主美文王周公故特言之易象魯無增改故不言魯易象春秋雖是周法所記乃是魯事故言魯春秋也春秋易象晉應有之韓子至魯方乃發歎者味其義善其人以其舊所未悟故云今始知示其歎美之深非是素不見也易下繫辭云易之興也其當殷之末世周之盛徳當文王與紂之事則謂易象爻彖之辭也鄭𤣥案據此文以為易是文王所作鄭衆賈逵虞飜陸績之徒以易有箕子之明夷東鄰殺牛皆以為易之爻辭周公所作杜雖無明解似同鄭説韓子所見蓋周之舊典禮經也疏序言史官所書舊有成法故引韓子之事以此言結之韓子所見魯春秋者蓋是周之舊日正典禮之大經也韓子之言幷歎易象此之所見唯謂春秋者指説春秋不湏易象故也知是舊典禮經者傳於隱七年書名例云謂之禮經十一年不告例云不書於策明書於策必有常禮未脩之前舊有此法韓子所見而説之即是周之舊典以無正文故言蓋為疑辭也制禮作樂周公所為明策書禮經亦周公所制故下句每云周公正謂五十發凡是周公舊制也必知史官所記有周公舊制者以聖人所為動皆有法以為立官記事豈得全無憲章定四年傳稱備物典策以賜伯禽典策則史官記事之法也若其所記無法何足以賜諸侯諸侯得之何足以為光榮而子魚稱為美談也且仲尼脩此春秋以為一經若周公無法史官妄説仲尼何所可馮斯文何足為典得與諸書禮樂詩易竝稱經哉以此知周公舊有定制韓子所見是也周徳既衰官失其守上之人不能使春秋昭明赴告策書音義告古毒反一音古報反崩薨曰赴禍福曰告諸所記注音義注張住反字或作註多違舊章疏正義曰此明仲尼脩春秋之由先論史策失宜之意計周公之垂法典策具存豈假仲尼更加筆削但為官失其守褒貶失中赴告策書多違舊典是故仲尼脩成此法垂示後昆襄三十一年傳稱卿大夫能守其官職昭二十年傳曰守道不如守官是言人臣為官各有所守周徳既衰邦國無法羣小在位故官人失其所守也雖廣言衆官失職要其本意是言史官失其所掌也昭三十一年傳曰春秋之稱微而顯婉而辨上之人能使春秋昭明注云上之人謂在位者也彼謂賢徳之人在天子諸侯之位能使春秋褒貶勸戒昭明周徳既衰主掌之官已失其守在上之人又非賢聖故不能使春秋褒貶勸戒昭明致令赴告記注多違舊章也文十四年傅曰崩薨不赴禍福不告然則鄰國相命凶事謂之赴他事謂之告對文則别散文則通昭七年傳衛齊惡告喪于周則是凶亦稱告也赴告之中違舊章者若隱三年平王以壬戌崩赴以庚戌桓五年陳侯鮑卒再赴以甲戌己丑及不同盟者而赴以名同盟而赴不以名之類是也策書記注多違舊章者仲尼既已脩改不可復知正以仲尼脩之故知其多違也仲尼因魯史策書成文考其眞偽而志其典禮上以遵周公之遺制下以明將來之法疏此明仲尼所因幷制作之意所脩之經以魯為主是因魯史策書成定之舊文也考謂校勘志謂記識考其眞偽眞者因之偽者改之志其典禮合典法者褒之違禮度者貶之上以遵周公之遺制使舊典更興下以明將来之法令後世有則以此故脩春秋也前代後代事終一揆所賞所罰理必相符仲尼定春秋之文制治國之法文之所褒是可賞之徒文之所貶是可罰之類後代人主誠能觀春秋之文揆當代之事辟所惡而行所善順褒貶而施賞罰則法必明而國必治故云下以明將來之法也不敎當時而為將來制法者孔子之時道不見用既知被屈冀範將来將来之與今時其法亦何以異但為時不見用故指之將来其實亦以敎當代也其敎之所存文之所害則刋而正之音義刊苦干反削也以示勸戒疏此説仲尼改舊史之意敎之所存謂名敎善惡義存於此事若文無褒貶無以懲勸則是文之害敎若僖二十八年天王狩于河陽傳云晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽杜以晉文之意本欲尊周將率諸侯共朝天子自嫌彊大不敢至周喻王出狩得盡臣禮尋其蹤緒心是跡非又昭十九年許世子止弑其君買傳云許悼公瘧五月戊辰飲大子止之藥卒書曰弑其君君子曰盡心力以事君舍藥物可也許止進藥不由於醫其父飲之因兹而卒名敎善惡湏存於此者也不罪許止不没晉文無以息篡逆之端勸事君之禮故隱其召王之名顯稱弑君之惡如此之例皆是文之害敎則刊削本策改而正之以示後人使聞善而知勸見惡而自戒諸仲尼所改新意皆是刊而正之也其餘則皆即用舊史史有文質辭有詳略不必改也疏此説不改舊史之意其餘謂新意之外皆即用舊史也始隱終麟二百餘載史官遷代其數甚多人心不同屬辭必異自然史官有文有質致使其辭有詳有畧既無所害故不必改也史有文質謂居官之人辭有詳畧謂書策之文史文則辭華史質則辭直華則多詳直則多畧故春秋之文詳畧不等也螟螽蜚蜮皆害物之蟲蜚蜮言有螟螽不言有諸侯反國或言自某歸或言歸自某晉伐鮮虞吳入郢直舉國名不言將帥及郊與用郊皆無所發諸侯出奔或名或不名明是立文乖異是其史舊有詳畧義例不存於此故不必皆改也故傳曰其善志又曰非聖人孰能脩之疏上傳昭三十一年言春秋之書其是善志記也下傳成十四年言若非聖人誰能脩春秋使成五例也下傳既非同年而云又者言又重上事之辭止又其傳非又其年也蓋周公之志仲尼從而明之疏既以蓋為疑辭而知事必然者案傳君子論春秋之美而云善志春秋既是舊名明稱舊記為善故知上傳之言蓋言周公之志也脩者治舊之名傳善聖人而言脩舊明脩前聖之道故知下傳之言蓋仲尼之明周公也上已言蓋周之舊典禮經此復重云蓋周公之志者上明春秋記事之法舊史之遵周公也此明仲尼因舊史之文還脩周公之法故重言蓋敘此以上論經以下論傳左丘明受經於仲尼以為經者不刊之書也故傳或先經以始事音義先悉薦反或後經以終義音義後户豆反或依經以辯理或錯經以合異隨義而發疏正義曰丘明為經作傳故言受經於仲尼未必面親授受使之作傳也此説作傳解經而傳文不同之意丘明以為經者聖人之所制是不可刊削之書也非傳所能亂之假使傳有先後不畏經因錯亂故傳或先經為文以始後經之事或後經為文以終前經之義或依經之言以辯此經之理或錯經為文以合此經之異皆隨義所在而為之發傳期於釋盡經意而已是故立文不同也太史公十二諸侯年表序云自孔子論史記次春秋七十子之徒口受其傳魯君子左丘明懼弟子各有妄其意失其眞故具論其語成左氏春秋沈氏云嚴氏春秋引觀周篇云孔子將脩春秋與左丘明乗如周觀書於周史歸而脩春秋之經丘明為之傳共為表裏藝文志云左丘明魯史也是言丘明為傳以其姓左故號為左氏傳也先經者若隱公不書即位先發仲子歸於我衛州吁弑其君完先發莊公娶于齊如此之類是先經以始事也後經者昭二十二年王室亂定八年乃言劉子伐盂以定王室哀二年晉納蒯瞆于戚哀十五年乃言蒯聵自戚入衛如此之類是後經以終義也依經者經有其事傳辯其由隱公不書即位而求好於邾故為蔑之盟案其經文明其歸趣如此之類是依經以辯理也錯經者若地有兩名經傳互舉及經侵傳伐經伐傳侵於文雖異於理則合如此之類是錯經以合義也傳文雖多不出四體故以此四句明之也其例之所重音義重直用反又直龍反舊史遺文略不盡舉非聖人所脩之要故也疏此説有經無傳之意例之所重者若桓元年秋大水傳云凡平原出水為大水莊七年秋大水此則例之所重皆是舊史遺餘策書之文丘明畧之不復發傳非聖人所脩之要故也言遺者史舊已没策書遺留故曰遺文身為國史躬覽載籍必廣記而備言之其文緩其㫖逺將令學者原始要終音義令力呈反下令學者同要於遥反尋其枝葉究其所窮音義究久又反疏此説無經有傳之意正義曰説文云籍部書也張衡東京賦曰多識前世之載載亦書也躬覽載籍所見者博以義有所取必廣記而備言之非直解經故其文緩遥明聖意故其㫖逺將令學者本原其事之始要截其事之終尋其枝葉盡其本根則聖人之趣雖逺其賾可得而見是故經無其事而傳亦言之為此也原始要終及其㫖逺竝易下繋辭文也尋其枝葉以樹木喻也究亦窮也言窮盡其所窮之處也優而柔之使自求之饜而飫之音義饜於艶反飫於預反使自趨之音義趨七住反又七俱反若江海之浸音義浸子鴆反膏澤之潤音義膏古刀反渙然冰釋音義渙呼亂反怡然理順音義怡以之反然後為得也疏此又申説無經之傳有利益之意優而柔之使自求之大戴禮子張問入官學之篇有此文也其饜而飫之則未知所出優柔俱訓為安寛舒之意也饜飫俱訓為飽饒裕之意也謂丘明富博其文優柔學者之心使自求索其髙意精華其大義飽足學者之好使自奔趨其深致言其廣記備言欲令使樂翫不倦也江海以水深之故所浸者逺膏澤以雨多之故所潤者博以喻傳之廣記備言亦欲浸潤經文使義理通洽如是而求之然後渙然解散如春冰之釋怡然心説而衆理皆順然後為得其所也江海水之大者故舉以為喻脂之澤者為膏言雨之為潤若脂膏然故稱膏澤也其發凡以言例皆經國之常制周公之垂法史書之舊章仲尼從而脩之以成一經之通體疏正義曰自此至非例也辯説傳之三體此一叚説舊發例也言發凡五十皆是周公舊法先儒之説春秋者多矣皆云丘明以意作傳説仲尼之經凡與不凡無新舊之例杜所以知發凡言例是周公垂法史書舊章者以諸所發凡皆是國之大典非獨經文之例隱七年始發凡例特云謂之禮經十一年又云不書于策建此二句於諸例之端明書於策者皆是經國之常制非仲尼始造策書自制此禮也何則天灾無牲卒哭作主諸侯薨於朝㑹加一等夫人不薨于寢則不致豈是仲尼始造此言也公行告廟侯伯分災二凡之末皆云禮也豈是丘明自制禮乎又公女嫁之送人尊卑哭諸侯之親疎等級王喪之稱小童分至之書雲物皆經無其事傳亦發凡若丘明以意作傳主説仲尼之經此既無經何湏發傳以是故知發凡言例皆是周公垂法史書舊章仲尼從而脩之以成一經之通體也國之有史在於前代非獨周公立法史始有章而指言周公垂法者以三代異物莭文不同周公必因其常文而作以正其變者非是盡變其常也但以一世大典周公所定故春秋之義史必主於常法而以周公正之然凡是周公之禮經今案周禮竟無凡例為當禮外别自有凡為當凡在禮内今者所據禮内有凡知者案周禮大宰職於八法之内有官成官法鄭衆注云官成者謂官府之有成事品式官法者謂職所主之法度然則此凡者是史官之策書成事法式也釋例終篇云稱凡者五十其别四十有九蓋以母弟二凡其義不異故也計周公垂典應每事設法而據經有例於傳無凡多矣釋例四十部無凡者十五然則周公之立凡例非徒五十而已蓋作傳之時已有遺落丘明采而不得故也且凡雖舊例亦非全語丘明采合而用之耳終篇云諸凡雖是周公之舊典丘明撮其體義約以為言非純寫故典之文也蓋據古文覆逆而見之此丘明會意之微致是其説也然丘明撮凡為言體例不一於一凡之内事義不同亦有因經所有連釋經之所無如王曰小童公侯曰子是也亦有略其經之所無直釋經之所有如凡祀啟蟄而郊龍見而雩不言礿祀以經無故也如此之類是也所以然者蓋以舊凡語少經雖無事則亦連文引之所以兼引王曰小童若舊凡語多經無者則畧之經有者則載之所以畧其礿祀獨舉郊雩故莊十一年王師敗績于某杜注云事列於經則不得不因申其義是舊凡多者唯舉經文也發凡之體凡有二條一是特為策書一是兼載國事特為策書者凡告以名則書之類是也兼載國事者凡嫁女于敵國之類是也雖為國事但他書有者亦不在凡例如天子七月而葬既於禮文備有故丘明作傳不在凡例也此書凡者自是天下大例其言非獨為魯故哭諸侯之條既發凡例乃云故魯為諸姬明知正凡所言非止魯事且送女例云於天子則諸卿皆行魯無嫁女於天子之理祭祀例云啟蟄而郊自非魯國不得有郊天之事明是采合故典裁約為文也其微顯闡幽裁成義類者音義闡昌善反明也皆據舊例而發義指行事以正褒貶音義褒保刀反貶彼檢反字林方犯反疏此下盡曲而暢之説新意也微顯闡幽易下繋辭文也微謂纖隱闡謂著明舊説云下云經無義例此釋經有義例謂孔子脩經微其顯事闡其幽理裁莭經之上下以成義之般類其善事顯者若秦穆悔過貶四國大夫以例稱人觀文與常文無異惡事顯若若諸侯城緣陵叔孫豹達命城緣陵依例稱諸侯與無罪文同叔孫豹去氏與未賜族若文同皆是微其顯事闡幽者謂闡其幽理使之宣著若晉趙盾鄭歸生楚比陳乞及許大子止皆非親弑其君是其罪幽隱孔子脩經加弑使罪狀宣露是闡幽也諸春秋褒貶之例竝是也蓋以為皆據舊例而發義以下論丘明之傳微顯闡幽乃是經事故賀沈諸儒皆悉同此劉炫以微顯闡幽皆説作傳之意經文顯者作傳本其纖微經文幽若作傳闡使明著顯者若天王狩于河陽觀經文足知王是天子狩是出獵但不知天子何故出畿外狩耳故傳發晉侯召王是其微顯也幽者若鄭伯克殷于鄢觀經不知段是何人何故稱克故傳發武姜愛段是闡其幽也丘明作傳其有微經之顯闡經之幽以裁制成其義理比類若皆據舊典凡例而起發經義指其人行事是非以正經之褒貶例稱得雋曰克傳言如二君故日克是其據舊例發義也晉侯召王使狩鄭伯不敎其弟仲尼没其召王顯稱鄭伯丘明正述其事先解經文是指其行事以正褒貶也比二事尤明者耳其餘皆是新意也此序主論作傳而賀沈諸儒皆以為經解之是不識文勢而謬失杜旨諸稱書不書先書故書不言不稱書曰之類皆所以起新舊發大義謂之變例疏上既言據舊例而發義故更指發義之條諸傳之所稱書不書先書故書不言不稱及書曰七者之類皆所以起新舊之例令人知發凡是舊七者是新發明經之大義謂之變例以凡是正例故謂此為變例猶詩之有變風變雅也自杜以前不知有新舊之異今言謂之變例是杜自明之以曉人也稱書者若文二年書士縠堪其事襄二十七年書先晉晉有信如此之類是也不書者若隱元年春正月不書即位攝也邾子克未王命故不書爵如此之類是也先書者若桓二年君子以督為有無君之心故先書弑其君僖二年虞師晉師滅下陽先書虞賄故也如此之類是也故書者隱三年壬戌平王崩赴以庚戊故書之成八年杞叔姬卒來歸自杞故書如此之類是也不言者若隱元年鄭伯克段于鄢不言出奔難之也莊十八年公追戎于濟西不言其來諱之也如此之類是也不稱者若僖元年不稱即位公出故也莊元年不稱姜氏絶不為親如此之類是也書曰者若隱元年書曰鄭伯克段于鄢隱四年書曰衛人立晉衆也如此之類是也案襄元年圍宋彭城非宋地追書也隱元年稱鄭伯譏失敎也昭三十一年公在乾侯言不能外内也先書故書既是新意則追書亦是新意書與不書俱是新意則稱與不稱言與不言亦俱是新意豈得不言不稱獨為新意言也稱也便即非乎釋例終篇云諸雜稱二百八十有五止有其數不言其目就文而數又復参差竊謂追書也言也稱也亦是新意序不言者蓋諸類之中足以包之故也有田僧紹者亦注此序以為序言諸稱稱亦即是新意與下七者合為八名斯不然矣案書與不書其文相次若稱字即是新意但當言稱與不稱相次何以分為别文明知杜言諸稱自謂諸傳所稱不以稱為新意但以理而論之稱亦當是新意耳然亦有史所不書即以為義者此蓋春秋新意故傳不言凡曲而暢之也音義暢勑亮反疏此説因舊為新也仲尼脩春秋者欲以上遵周制下明世教其舊史錯失則得刊而正之以為變例其舊史不書則無可刊正故此又辯之亦有史所不書正合仲尼意者仲尼即以為義改其舊史及史所不書此二者蓋是春秋新意故傳亦不言凡每事别釋曲而通暢之也此蓋春秋新意其言總上通變例與不别書也舉一凡而事同者諸理盡見是其直也不言凡而每事發傳是其曲暢暢訓通故言曲而暢之也若然隱公實不即位史無由得書即位邾克實未有爵史無由得書其爵然則傳言不書自是舊史不書而以不書為仲尼新意者釋例終篇杜自問而釋之云丘明之為傳所以釋仲尼春秋仲尼春秋皆因舊史之策書義之所在則時加増損或仍舊史之無亦或改舊史之有雖因舊文固是仲尼之書也丘明所發固是仲尼之意也雖是舊文不書而事合仲尼之意仲尼因而用之即是仲尼新意若宣十年崔氏出奔衛傳稱書曰崔氏非其罪也且告以族不以名是告不以名故知舊史無名及仲尼脩經無罪見逐例不書名此舊史之文適當孔子之意不得不因而用之因舊為新皆此類也然杜唯言史所不書即以為義不云史所書為義者但夫子約史記而脩春秋史記之文皆是舊史所書因而褒貶理在可見不湏更言但恐舊史不書而夫子不用故特言之其經無義例因行事而言則傳直言其歸趣而已音義趣七住反非例也疏此一段説經無義例者國有大事史必書之其事既無得失其文不著善惡故傳直言其指歸趣向而已非褒貶之例也春秋此類最多故隱元年及宋人盟于宿傳曰始通也杜注云經無義例故傳直言其歸而已他皆放此是如彼之類皆非例也故發傳之體有三而為例之情有五音義為音于偽反又如字疏正義曰傳體有三即上文發凡正例新意變例歸趣非例是也為例之情有五則下文五曰是也書經有此五情緣經以求義為例言傳為經發例其體有此五事下文五句成十四年傳也案彼傳上文云春秋之稱下云非聖人誰能脩之聖人指謂孔子美孔子所脩成此五事五事所攝諸例皆盡下句釋其顯者以屬之耳此發傳之體有三上文三言其以别之觀文足可知耳劉寔分變例新意以為二事釋例終篇曰丘明之傳有稱周禮以正常者諸稱凡以發例者是也有明經所立新意者諸顯義例而不稱凡者是也稱古典則立凡以顯之釋變例則隨辭以讃之杜言甚明尚不能悟其為暗也不亦甚乎一曰微而顯文見於此而起義在彼音義見賢遍反下同稱族尊君命舍族尊夫人梁亡城緣陵之類是也音義舍音捨疏文見於此謂彼注云辭微而義顯也稱族尊君命舍族尊夫人成十四年傳為叔孫僑如發也經曰秋叔孫僑如如齊逆女九月僑如以夫人歸姜氏至自齊叔孫是其族也褒賞稱其族貶責去其氏銜君命出使稱其族所以為榮與夫人俱還去其氏所以為辱出稱叔孫舉其榮名所以尊君命也入舍叔孫替其尊稱所以尊夫人也族自卿家之族稱舍别有所尊是文見於此而起義在彼僖十九年經書梁亡是秦亡之也傳曰不書其主自取之也僖十四年經書諸侯城緣陵是齊率諸侯城之以遷杞也傳曰不書其人有闕也秦人滅梁而曰梁亡文見於此梁亡見取者之無罪齊桓城把而書諸侯城緣陵文見於此城緣陵見諸侯之有闕亦是文見於此而起義在彼皆是辭微而義顯故以此三事屬之二曰志而晦約言示制推以知例參會不地與謀曰及之類是也音義參七南反又音三與音預疏彼注云志記也晦亦微也謂約言以記事事叙而文微桓二年秋公及戎盟于唐冬公至自唐傳例曰特相會往來稱地讓事也自參以上則往稱地來稱會成事也其意言會必有主二人共會則莫肯為主兩相推讓會事不成故以地致三國以上則一人為主二人聽命會事有成故以會致宣七年公會齊侯伐萊傳例曰凡師出與謀曰及不與謀曰會其意言同志之國共行征伐彼與我同謀計議議成而後出師則以相連及為文彼不與我謀不得已而徃應命則以相會合為文此二事者義之所異在於一字約少其言以示法制推尋其事以知其例是所記事有叙而其文晦微也三曰婉而成章音義婉於阮反曲從義訓以示大順諸所諱辟璧假許田之類是也音義辟本亦作避音同後放此假古雅反後不音者同疏彼注云婉曲也謂屈曲其辭有所辟諱以示大順而成篇章言諸所諱辟者其事非一故言諸以總之也若僖十六年公會諸侯於淮未歸而取項齊人以為討而止公十七年九月得釋始歸諱執止之恥辟而不言經乃書公至自會諸如此類是諱辟之事也諸侯有大功者於京師受邑為將朝而宿焉謂之朝宿之邑方岳之下亦受田邑為從廵守備湯水以共沐浴焉謂之湯沐之邑魯以周公之故受朝宿之邑於京師許田是也鄭以武公之勲受湯沐之邑於秦山祊田是也隱桓之世周徳既衰魯不朝周王不廵守二邑皆無所用因地勢之便欲相與易祊薄不足以當許鄭人加璧以易許田諸侯不得專易天子之田文諱其事桓元年經書鄭伯以璧假許田言若進璧以假田非久易也掩惡揚善臣子之義可以垂訓於後故此二事皆屈曲其辭從其義訓以示大順之道是其辭婉曲而成其篇章也四曰盡而不汙音義汙於俱反曲也直書其事具文見意丹楹刻桷天王求車齊侯獻㨗之類是也音義楹音盈刻音克桷音角㨗在妾反疏彼注云謂直言其事盡其事實無所汙曲禮制宫廟之飾楹不丹桷不刻莊二十三年秋丹桓宫楹二十四年春刻桓宮桷禮諸侯不貢車服天子不私求財桓十五年天王使家父來求車禮諸侯不相遺俘莊三十一年齊侯來獻戎㨗三者皆非禮而動直書其事不為之隱具為其文以見譏意是其事實盡而不有汚曲也五曰懲惡而勸善音義懲直升反求名而亡欲蓋而章書齊豹盗三叛人名之類是也疏彼注云善名必書惡名不滅所以為懲勸昭二十年盗殺衛侯之兄縶襄二十一年邾庶其以漆閭丘來奔昭五年莒牟夷以牟婁及防兹來奔昭三十一年邾黒肱以濫來奔是謂盗與三叛人名也齊豹衛國之卿春秋之例卿皆書其名氏齊豹忿衛侯之兄起而殺之欲求不畏彊禦之名春秋抑之書曰盗盗者賤人有罪之稱也邾庶其黒肱莒牟夷三人皆小國之臣竝非命卿其名於例不合見經竊地出奔求食而已不欲求其名聞春秋故書其名使惡名不滅若其為惡求名而有名章徹則作難之士誰或不為若竊邑求利而名不聞則貪冐之人誰不盗竊故書齊豹曰盗三叛人名使其求名而名亡欲蓋而名章所以懲創惡人勸奬善人昭三十一年傳具説此事其意然也盗與三叛俱是惡人書此二事唯得懲惡耳而言勸善者惡懲則善勸故連言之推此五體以尋經傳觸類而長之音義長丁丈反附于二百四十二年行事王道之正人倫之紀備矣疏正義曰上云情有五此言五體者言其意謂之情指其狀謂之體體情一也故互見之一曰微而顯者是夫子脩改舊文以成新意所脩春秋以新意為主故為五例之首二曰志而晦者是周公舊凡經國常制三曰婉而成章者夫子因舊史大順義存君親揚善掩惡夫子因而不改四曰盡而不汙者夫子亦因舊史有正直之士直言極諫不掩君惡欲成其美夫子因而用之此婉而成章盡而不汙雖因舊史夫子即以為義總而言之亦是新意之限故傳或言書曰或云不書五曰懲惡而勸善者與上微而顯不異但勸戒緩者在微而顯之條貶責切者在懲惡勸善之例故微而顯居五例之首懲惡勸善在五例之末五者春秋之要故推此以尋經傳觸類而増長之附於二百四十二年時人所行之事觀其善惡用其褒貶則王道之正法人理之紀綱皆得所備矣從首至此説經傳理畢故以此言結之觸類而長之易上繫辭文也二百四十二年謂𫉬麟以前也以後經則魯史舊文傳終説前事辭無褒貶故不數之也觸類而長之者若隱四年經書翬帥師傳稱羽父固請故書曰翬帥師疾之也十年經亦書翬帥師傳雖不言書曰故書是知與上同為新意又隱元年傳曰儀父貴之也則桓十七年云儀父亦是貴之是也或曰春秋以錯文見義若如所論則經當有事同文異而無其義也先儒所傳皆不其然音義傳直專反疏正義曰自此至釋例詳之言已為作注解之意論經傳之下即是自述已懐於文不次言無由發故假稱或問而答以釋之春秋之經侵伐會盟及戰敗克取之類文異而義殊錯文以見義先儒知其如是因謂苟有異文莫不著義杜以為仲尼所述據史舊文文害者則刋而正之不害者因其詳畧此其異於先儒故或人據上文杜之異旨執先儒以問曰春秋以錯文見義其文異者必應有義在焉若如所論辭有詳略不必改也則經當有事同文異而無其義意者也先儒所傳皆不其然今何以獨異欲令杜自辯之答曰春秋雖以一字為褒貶然皆須數句以成言音義數色主反下同非如八卦之爻可錯綜為六十四也音義綜宗宋反固當依傳以為斷音義斷丁亂反疏莊二十五年陳侯使女叔來聘傳曰嘉之故不名僖二十五年衛侯燬滅邢傳曰同姓也故名褒則書字貶則稱名褒貶在於一字褒貶雖在一字不可單書一字以見褒貶故答或人曰春秋雖以一字為褒貶皆須數句以成言語非如八卦之爻可錯綜為六十四也卦之爻也一爻變則成為一卦經之字也一字異不得成為一義故經必須數句以成言義則待傳而後曉不可錯綜經文以求義理故當依傳以為斷文異者丘明不為發傳仲尼必無其義安得傳㫖之表妄説經文以此知經有事同文異而無其義者也數句者謂若隱元年秋七月天王使宰咺來歸惠公仲子之賵及昭十三年夏四月楚公子比自晉歸于楚弑其君䖍于乾谿此皆三句以上春秋一部未必皆然杜欲盛破賈服一字故舉多言之或以為數其文句義亦得通錯綜其數易上繋辭文謂交錯綜理之古今言左氏春秋者多矣今其遺文可見者十數家疏漢書儒林傳云漢興北平侯張蒼及梁大傅賈誼京兆尹張敞大中大夫劉公子皆脩左氏傳誼為左氏傳訓詁授趙人貫公公傳子長卿長卿傳清河張禹禹授尹更始更始傳子咸及丞相翟方進方進授清河胡常常授黎陽賈䕶䕶授蒼梧陳欽而劉歆從尹咸及翟方進受由是言左氏者本之賈䕶劉歆是前漢言左氏者也漢武帝置五經博士左氏不得立於學官至平帝時王莽輔政方始立之後漢復廢雖然學者浸多矣中興以後陳元鄭衆賈逵馬融延篤彭仲博許惠卿服䖍潁容之徒皆傳左氏春秋魏世則王肅董遇為之注此等比至杜時或在或滅不知杜之所見十數家定是何人也大體轉相祖述進不成為錯綜經文以盡其變退不守丘明之傳於丘明之傳有所不通皆没而不説而更膚引公羊榖梁音義膚芳于反適足自亂疏禮記中庸云仲尼祖述堯舜祖始也謂前人為始而述脩之也經之詳畧本不著義强為之説理不可通故進不成為錯綜經文以盡其變於傳之外别立異端故退不守丘明之傳傳有不通則没而不説謂諸家之注多有此事但諸注既亡不可指摘若觀服䖍賈逵之注皆没而不説者衆矣謂若文二年作僖公主傳於僖三十三年云作主非禮也凡君薨卒哭而祔祔而作主及襄九年閏月戊寅濟于隂阪之類是也膚謂皮膚言淺近引之也公羊榖梁口相傳授因事起問意與左氏不同故引之以解左氏適足以自錯亂也預今所以為異專脩丘明之傳以釋經經之條貫必出於傳音義貫古亂反傳之義例總歸諸凡推變例以正褒貶簡二傳而去異端音義去起吕反蓋丘明之志也疏丘明與聖同時為經作傳經有他義無容不盡故專脩丘明之傳以釋經也作傳解經則經義在傳故經之條貫必出於傳也發凡言例則例必在凡故傳之義例總歸諸凡也若有例無凡則傳有變例如是則推㝷變例以正褒貶若左氏不解二傳有説有是有非可去可取如是則簡選二傳取其合義而去其異端杜自言以此立説蓋是丘明之本意也昭三年北燕伯欵出奔齊傳云書曰北燕伯欵出奔齊罪之也則知昭二十一年蔡侯朱出奔楚亦是罪之也釋例曰朱雖無罪據失位而出奔亦其咎也宣十年崔氏出奔衛傳云書曰崔氏非其罪也不書名者非其罪則書名者是罪也襄二十一年晉欒盈出奔楚杜注云稱名罪之如此之類是推變例以正褒貶也莊十九年公子結媵陳人之婦于鄄社注云公羊穀梁皆以為魯女媵陳侯之婦僖九年伯姬卒杜注云公羊榖梁曰未適人故不稱國如此之類是簡二傳也先儒取二傳多矣杜不取者是去異端也其有疑錯則備論而闕之以俟後賢疏集解與釋例每有論錯闕疑之事非一二也釋例終篇云去聖久逺古文篆𨽻歴代相變自然當有錯誤亦不可拘文以害意故聖人貴聞一而知二賢史之闕文也今左氏有無傳之經亦有無經之傳無經之傳或可廣文無傳之經則不知其事又有事由於魯魯君親之而復不書者先儒或强為之説或没而不説疑在闕文誠難以意理推之是備論闕之之事也然劉子駿創通大義音義駿音俊子駿劉歆字創初亮反字林作剏賈景伯父子許惠卿皆先儒之美者也末有潁子嚴者雖淺近亦復名家音義復扶又反下同故特舉劉賈許潁之違以見同異音義見賢遍反下同疏漢書楚元王傳稱劉歆字子駿劉徳孫劉向少子也哀帝時歆校祕書見古文春秋左氏傳大好之初左氏傳多古字古言學者傳訓詁而已及歆治左氏引傳文以解經經傳相發明由是章句義理備焉是其創通大義也後漢賈逵字景伯扶風人也父徽字元伯授業於歆作春秋條例逵傳父業作左氏傳訓詁許惠卿名淑魏郡人也潁子嚴名容陳郡人也比於劉賈之徒學識雖復淺近然亦注述春秋名為一家之學杜以為先儒之内四家差長故特舉其違以見異同自餘服䖍之徒殊劣於此軰故棄而不論也分經之年與傳之年相附比其義類音義比毗志反各隨而解之名曰經傳集解疏丘明作傳不敢與聖言相亂故與經别行何止丘明公羊榖梁及毛公韓嬰之為詩作傳莫不皆爾經傳異處於省覽為煩故杜分年相附别其經傳聚集而解之杜言集解謂聚集經傳為之作解何晏論語集解乃聚集諸家義理以解論語言同而意異也又别集諸例及地名譜第厯數音義譜本又作諩同布古反數所具反後不音者皆同相與為部凡四十部十五卷皆顯其異同從而釋之名曰釋例將令學者觀其所聚異同之説釋例詳之也疏春秋記事之書前人後人行事相類書其行事不得不有比例而散在他年非相比校則善惡不章褒貶不明故杜别集諸例從而釋之將令學者觀其所聚察其同異則於其學易明故也言諸例及地名譜第厯數三者雖春秋之事於經傳無例者繁多以特為篇卷不與諸例相同故言及也事同則為部小異則附出孤經不及例者聚於終篇故言相與為部也其四十部次第從隱即位為首先有其事則先次之惟世族土地事既非例故退之於後終篇宜最處末故次終篇之前終篇處其終耳土地之名起於宋衛遇於垂世族譜起於無駭卒無駭卒在遇垂之後故地名在世族之前也或曰春秋之作左傳及榖梁無明文説者以仲尼自衛反魯脩春秋立素王音義王于況反下王魯素王同丘明為素臣言公羊者亦云黜周而王魯音義黜勑律反危行言孫音義行下孟反孫音遜本亦作遜以辟當時之害故微其文隱其義公羊經止獲麟而左氏經終孔丘卒敢問所安疏正義曰上一問一答説作注理畢而更問春秋作之早晚及仲尼述作大意先儒所説竝皆辟謬須於此明之亦以於文不次故更假問答以明之一問之間凡有四意其一問作之早晚其二問先儒言孔子自為素王其事虛實其三問公羊説孔子黜周王魯其言是非其四問左氏獲麟之後乃有餘經問杜於意安否據杜云左傳及榖梁無明文則指公羊有其顯説今驗何休所注公羊亦無作春秋之事案孔舒元公羊傳本云十有四年春西狩獲麟何以書記異也今麟非常之獸其為非常之獸奈何有王者則至無王者則不至然則孰為而至為孔子之作春秋是有成文也左傳及穀梁則無明文故説左氏者言孔子自衛反魯則便撰述春秋三年文成乃致得麟孔子既作此書麟則為書來應言麟為孔子至也麟是帝王之瑞故有素王之説言孔子自以身為素王故作春秋立素王之法丘明自以身為素臣故為素王作左氏之傳漢魏諸儒皆為此説董仲舒對策云孔子作春秋先正王而繫以萬事是素王之文焉賈逵春秋序云孔子覽史記就是非之説立素王之法鄭𤣥六藝論云孔子既西狩獲麟自號素王為後世受命之君制明王之法盧欽公羊序云孔子自因魯史記而脩春秋制素王之道是先儒皆言孔子立素王也孔子家語稱齊大史子餘歎美孔子言云天其素王之乎素空也言無位而空王之也彼子餘美孔子之深原上天之意故為此言耳非是孔子自號為素王先儒蓋因此而謬遂言春秋立素王之法左丘明述仲尼之道故復以為素臣其言丘明為素臣未知誰所説也言公羊者謂何休之軰黜周王魯非公羊正文説者推其意而致理耳以把是二王之後本爵為上公而經稱杞伯以為孔子黜之宣十六年成周宣榭火公羊傳曰外灾不書此何以書新周也其意言周為王者之後比宋為新縁此故謂春秋託王於魯以周宋為二王之後黜杞同於庶國何休隱元年注云唯王者然後改元立號春秋託新王受命於魯宣十六年注云孔子以春秋當新王上黜杞下新周而故宋黜周為王者之後是黜周王魯之説也定元年公羊傳曰定哀多微辭主人習其讀而問其傳則未知己之有罪焉爾何休云此假説而言之主人謂定哀也習其經而讀之問其傳解詁則不知己之有罪於是此孔子畏時君上以諱尊隆恩下以辟害容身愼之至也是其孫言辟害微文隱義之説自衛反魯危行言孫皆論語文也鄭𤣥以為據時髙言髙行者皆見危謂髙行為危行也何晏以危為厲厲言行不隨俗也未知二者誰當杜旨公羊之經獲麟即止而左氏之經終於孔子卒先儒或以為麟後之經亦是孔子所書故問其意之所安也答曰異乎余所聞仲尼曰文王既没文不在兹乎此制作之本意也歎曰鳯鳥不至河不出圖音義出如字又尺逐反吾已矣夫音義夫音扶下若夫同蓋傷時王之政也疏此盡末以來答上問四意但所答或先或後而其文不次欲令先有案據乃得遞相發明故不得以次而答問者先問作之早晚杜意定以獲麟乃作故從仲尼曰至所以為終明作之時莭兼明白本意自欲制作感麟方始為之非是先作春秋乃後致麟也既言止麟之意須説始隱之由且欲取平王周正驗其非黜周王魯之證但既言其終倒言其始則於文不次故答前義未了更起一問自曰然則以下盡此其義也明春秋始隱之意答黜周王魯之言既言王魯為非遂幷辯公羊之謬自若夫制作盡非隱之也答微文隱義之為非也自聖人包周身之防盡非所聞也答孫言辟害之為虛也先儒以為未獲麟而已作春秋過獲麟而經猶未止故既答公羊之謬然後却辨素王為虛幷説引經為妄自子路欲使門人盡又非通論也答素王素臣之問自先儒以為盡得其實答經止獲麟之意至於反袂以下言其不可采用此章各段大意其文旨如此問者以所聞而問其異乎余所聞一句歎其所據非理故言異乎余所聞仲尼曰與歎曰二者皆論語文也孔子過匡匡人以兵遮而脅之從者驚怖故設此言以强之文王雖身既没其為文王之道豈不在兹身乎孔子自比其身言已有文王之道也其下文又云天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如予何其意言天若未喪文王之道必將使我制作匡人不能違天以害已此言是有制作之本意也聖人受命而王則鳯鳥至河出圖仲尼歎曰鳯鳥不至河不出圖吾已矣夫此言蓋傷時王之政不能致此瑞也先有制作之意而恨時無嘉瑞明是既得嘉瑞即便制作杜欲明得麟乃作故先表此二句鄭𤣥以為河圖洛書龜龍銜負而出如中候所説龍馬御甲赤文綠色甲似龜背袤廣九尺上有列宿斗正之度帝王録紀興亡之數是也孔安國以為河圖即八卦是也未知二者誰當杜旨麟鳯五靈王者之嘉瑞也音義瑞垂偽反今麟出非其時虛其應而失其歸音義應應對之應此聖人所以為感也絶筆於獲麟之一句者所感而起固所以為終也疏麟鳯與龜龍白虎五者神靈之鳥獸王者之嘉瑞也今麟出於衰亂之世是非其時也上無明王是虛其應也為人所𫉬是失其歸也夫此聖人而生非其時道無所行功無所濟與麟相類故所以為感也先有制作之意復為外物所感既知道屈當時欲使功被來世由是所以作春秋絶筆於獲麟之一句者麟是仲尼所感而書為感麟而作既以所感而起故所以為終也答上春秋之作左傳無明文之問又言己所以為獲麟乃作之意獨舉麟鳯而云五靈知二獸以外為龜龍白虎者以鳥獸而為瑞不出五者經傳纖緯莫不盡然禮記禮器曰升中于天而鳯凰降龜龍假詩序曰麟趾關睢之應騶虞鵲巢之應騶虞即白虎也是龜龍白虎竝為瑞應只言麟鳯便言五靈者舉鳯配麟足以成句略其三者故曰五靈其五靈之文出尚書緯也禮記禮運曰麟鳯龜龍謂之四靈不言五者彼稱四靈以為畜則飲食有由也其意言四靈與羞物為羣四靈既擾則羞物皆備龍是魚鮪之長鳯是飛鳥之長麟是走獸之長龜是甲蟲之長飲食所需唯此四物四物之内各舉一長虎麟皆是走獸故畧云四靈杜欲徧舉諸瑞故備言五靈也直云絶筆獲麟則文勢已足而言之一句者以春秋編年之書必應盡年乃止入年唯此一句故顯言之以明一句是其所感也曰然則春秋何始於魯隱公答曰周平王東周之始王也隱公讓國之賢君也考乎其時則相接言乎其位則列國本乎其始則周公之祚𦙍也音義祚才路反𦙍以刃反若平王能祈天永命紹開中興音義中丁仲反隱公能𢎞宣祖業光啓王室則西周之美可尋文武之迹不隊音義隊直類反是故因其厯數附其行事采周之舊以㑹成王義音義王如字又于况反垂法將來疏上既解終麟之意未辯始隱之由故又假問以釋之不言或問而直言曰者以答前未了須更起此問若言問者猶是前人且既解絶筆即因問初起以此不復言或欲示二問共是一人故也然者然上語則者陳下事乗前起後之勢問者言絶筆於獲麟既如前解然則春秋初起何獨始於魯隱公不始於他國餘公何也答曰周平王東周之始王也遷居洛邑平王為首是始王也隱公讓國之賢君也於第當立委位讓桓是賢君也考乎其時則相接隱公之初當平王之末是相接也言乎其位則列國其爵為侯其土則廣是大國也本乎其始則周公之祚𦙍也魯承周公之後是其福祚之𦙍也若使平王能撫養下民求天長命紹先王之烈開中興之功隱公能大宣聖祖之業光啓周王之室君臣同心照臨天下如是則西周之美猶或可尋文武之迹不墜於地而平王隱公居得致之地有得致之資而竟不能然只為無法故也仲尼愍其如是為之作法其意言若能用我道豈致此乎是故因其年月之厯數附其時人之行事采周公之舊典以會合成一王之大義雖前事已往不可復追冀得垂法將來使後人放習以是之故作此春秋此序一叚大明作春秋之深意問者不直云隱公而言魯隱公者言魯决其不始於他國言隱决其不始於餘公挾此二意故幷魯言之也其答直言隱公不云魯者以魯之春秋已為韓起所説可知故也周自武王伐紂定天下恒居鎬地是為西都周公攝政營洛邑於土中謂之東都成王雖暫至洛邑還歸鎬京為西周平王始居東周故云東周之始王也平王四十九年而隱公即位隱公三年而平王崩是其相接也詩既醉云永錫祚𦙍言福祚及後𦙍也尚書召誥云用供王能祈天永命言用善徳治民得長命也襄十年傳曰而以偪陽光啓寡君論語曰文武之道未墜於地是杜所用之文也春秋據魯而作即是諸侯之法而云㑹成王義者春秋所書尊卑盡備王使來聘錫命賵含有天子撫邦國之義公如京師拜賜㑹葬有諸侯事王者之法雖據魯史為文足成王者之義也以其㑹成王義故得垂法將來將使天子法而用之非獨遺將來諸侯也所書之王即平王也所用之厯即周正也音義正音政讀者多音征後皆放此所稱之公即魯隱也安在其黜周而王魯乎子曰如有用我者吾其為東周乎此其義也疏既言作春秋之意然後答黜周王魯之言經書春王正月王即周平王也月即周正也公及邾儀父公即魯隱公也魯用周正則魯事周矣天子稱王諸侯稱公魯尚稱公則號不改矣春秋之文安在黜周王魯乎若黜周王魯則魯宜稱王周宜稱公此言周王而魯公知非黜周而王魯也孔子之作春秋夲欲興周非黜周也故引論語以明之公山弗擾召孔子孔子欲往子路不説夫子設此言以解之其意言彼召我者而豈空然哉必謂我有賢能之徳故也既謂我有賢徳或將能用我言如其能用我言者吾其為東方之周乎言將欲興周道於東方也原其此意知非黜周故云此其興周之義也注論語者其意多然唯鄭𤣥獨異以東周為成周則非杜所用也若夫制作之文所以章往考來情見乎辭言高則旨遠辭約則義微此理之常非隱之也疏此一叚答説公羊者言微其文隱其義之意若夫者發端之辭既答王魯更起言端故云若夫聖人制作之文所以章明已往考校方來欲使將來之人鑒見既往之事聖人之情見乎文辭若使發語卑雜則情趣𤨏近立言高簡則㫖意逺大章句煩多則事情易顯文辭約少則義趣微略此乃理之常事非故隱之也文王演易則亦文高旨遠辭約義微豈復孫辭辟害以彼無所辟其文亦微知理之常非為所隱也其章往考來情見乎辭皆易下繋辭之文彼作彰往而察來意不異耳聖人包周身之防音義包必交反防扶放反又音房既作之後方復隱諱以辟患非所聞也疏此一段答孫言辟害之意若成湯繋於夏臺文王囚於羑里周公留滯於東都孔子絶糧於陳蔡自古聖人幽囚困死則嘗有之未聞有被殺害者也包周身之防者謂聖人防慮必周於身自知無患方始作之既作之後方復隱諱以辟患害此事實非所聞也云非所聞者言前訓未之有也子路欲使門人為臣孔子以為欺天而云仲尼素王丘明素臣又非通論也音義論力頓反疏此一叚答素王素臣為非也案論語稱孔子疾病子路使門人為臣病聞曰久矣哉由之行詐也無臣而為有臣吾誰欺欺天乎其意言子路以孔子將死使門人為臣欲令以臣禮葬君冀其顯榮夫子夫子瘳而責之我實無臣何故而為有臣吾之於人也於誰嘗欺我尚不敢欺人何故使吾欺天乎子路使門人為臣纔僭大夫禮耳孔子尚以為欺天况神器之重非人臣所議而云仲尼為素王丘明為素臣又非通理之論也聖人之生與運隆替運通則功濟當時運閉則道存身後雖復富有天下無益於堯舜賤為匹庶何損於仲尼道為升降自由聖與不聖言之立否乃聞賢與不賢非復假大位以宣風藉虛名以範世稱王稱臣復何所取若使無位無人虛稱王號不爵不禄妄竊臣名是則羡富貴而耻貧賤長僭踰而開亂逆聖人立敎豈當爾也臧文仲山莭藻梲謂之不知管仲鏤簋朱紘稱其器小見季氏舞八佾云孰不可忍若仲尼之竊王號則罪不容誅而言素王素臣是誣大賢而負聖人也嗚呼孔子被誣久矣頼杜預方始雪之先儒以為制作三年文成致麟既已妖妄又引經以至仲尼卒亦又近誣音義近誣如字近舊音附近之近誣音無疏此下至為得其實皆明麟後之經非仲尼所脩之意直言先儒無可尋檢未審是誰先生此意案今左氏之經仍終孔丘之卒雖杜氏之注此經亦存而尤責先儒引經至仲尼卒者蓋先儒以為夫子自衛反魯即作春秋作三年而後致麟雖得麟而猶不止此至孔丘之卒皆是仲尼所脩以是辯之謂之近誣明先儒有此説也服䖍云夫子以哀十一年自衛反魯而作春秋約之以禮故有麟應而至是其宗舊説也服䖍又云春秋終於獲麟故小邾射不在三叛人中也弟子欲明夫子作春秋以顯其師故書小邾射以下至孔子卒案杜於此下及哀十四年注皆取服義為説則服氏於此一事已改先儒矣麟是王者之瑞非為制作而來而云仲尼致之是其妖且妄也經是魯史之文非仲尼之所述而云仲尼脩之是其近誣罔也言近誣者心所不悟非故誣之故云近誣也據公羊經止獲麟而左氏小邾射不在三叛之數音義邾張俱反射音亦故余以為感麟而作作起獲麟則文止於所起為得其實疏穀梁之經亦止獲麟而獨據公羊者春秋之作穀梁無明文杜以獲麟乃作義取公羊故獨據之耳小邾射以句繹來奔與黒肱之徒義無以異傳稱書三叛人名不通數此人以為四叛知其不入傳例麟下之經傳不入例足知此經非復孔旨故余以為感麟而作春秋其意起於獲麟則文止於所起自此而談為得其實重明經止獲麟幷自成已説起麟之意也至於反袂拭面音義袂綿世反拭音式稱吾道窮亦無取焉疏公羊稱孔子聞獲麟反袂拭面涕沾袍曰吾道窮矣杜既取公羊經止獲麟而公羊獲麟之下即有此傳嫌其幷亦取之故云亦無取焉不取之者以聖人盡性窮神樂天知命生而不喜死而不戚困於陳蔡則援琴而歌夢奠兩楹則負杖而詠寧復畏懼死亡下沾衿之泣愛惜性命發道窮之歎若實如是何異凡夫俗人而得稱為聖也公羊之書鄉曲小辯致遠則泥故無取焉此則上文所謂簡二傳而去異端豈有反袂拭面涕下沾袍以虛而不經故不取也春秋左傳序春秋左傳序考證春秋左氏傳序臣浩按舊本祗題曰春秋序讀正義知孔氏依晉宋古本已定作春秋左氏傳序從前刋本皆誤今改正疏賈逵太史公十二諸侯年表云云至末臣召南按所言時代先後錯雜疏文從未有如此舛誤者但宋儒王應麟困學紀聞已言和帝元與十一年數句之謬則刋本舛誤其來久矣今既無善本可正摘記其訛於後賈逵太史公十二諸侯年表序云句似引賈逵所作春秋序中引太史公十二年表及劉向别録也賈逵之下脫一曰字便不可解魯共王壊孔子舊宅於壁中得古文逸禮有三十九篇書十六篇天漢之後孔安國獻之遭巫蠱倉卒之難未及施行及春秋左氏丘明所修皆古文舊書多者二十餘通蔵於祕府伏而未發一叚推尋文義當云魯共王壊孔子舊宅於壁中得古文逸禮有三十九篇書十六篇及古文春秋左氏丘明所修皆古文舊書多者二十餘通天漢之後孔安國獻之遭巫蠱倉卒之難未及施行藏于祕府伏而未發疏於書十六篇之下即接天漢云云遂不可解漢武帝時河間獻左氏及古文周官一叚上文天漢即是武帝年號此又另起不可解光武之世議立左氏學公羊之徒上書訟公羊詆左氏左氏之學不立一叚上既言武帝時未施行當直接下文所云成帝時劉歆校祕書至歆移書責讓太常博士矣文反以光武不立左氏序於成帝哀帝之前時代倒置其誤無疑成帝時句至歆因移書於太常博士責讓之一叚全用漢書歆傳及儒林傳之文但不應叙於光武之後丞相史尹咸句脫史字尹咸為丞相史未甞為丞相也今加史字和帝元興十一年鄭興父子及歆創通大義奏上左氏始得立學遂行於世至章帝時賈逵上春秋大義四十條一叚困學紀聞曰考和帝元興止一年安得有十一年一誤也鄭興子衆終於章帝建初八年不及和帝時二誤也章帝之子為和帝先後失序三誤也釋文序録亦云元興十一年皆非也臣攷王應麟所言三誤甚精但王應麟時刋本祗云鄭興父子奏上始得立學耳今各本俱作鄭興父子及歆創通大義奏上始得立學則誤中又有誤焉創通大義之歆䝉上文之劉歆乎抑指光武時之韓歆乎劉子駿創通大義杜預序中語也自應指劉歆歆於莽世巳沒何得至東京與鄭興父子同奏興本傳云天鳯中興從劉歆講正大義歆使撰條例章句訓詁是興於莽世從學於歆不得云俱至元興中奏上也左氏初立於平帝時劉歆之力然不久即罷至光武時復立於學則韓歆實奏之後書范升傳云建初三年尚書令韓歆上疏欲為左氏立博士詔下其議四年朝公卿大夫博士見於雲䑓升排左氏遂與韓歆及許淑等辨難升奏左氏之失此即疏前文所謂光武之世議立左氏學公羊之徒上書訟公羊詆左氏左氏之學不立者也又陳元傳云建武初元與桓譚杜林鄭興俱為學者所宗時議立左傳博士范升謂不當立元乃上疏言當立帝為立左氏學此光武立左氏學之事也劉歆韓歆混而為一其誤甚矣至章帝時賈逵上春秋大義四十條句後漢書賈逵傳建初元年詔逵出左氏傳大義長於二傳者逵具條奏之曰臣謹擿出左氏三十事尤著明者疏作四十條亦恐是三十條之訛也春秋者魯史記之名也疏諸文所說皆在孔子之前臣召南按疏引晉語羊舌肸習於春秋楚語申叔時曰教之以春秋以見乘與檮杌其本名亦曰春秋二證極確至引坊記經解中語亦云在孔子之前似屬錯誤以時繫年疏桓十七年五月無夏臣浩按左氏經書夏五月丙午及齊師戰於奚惟公羊經無夏字何休曰去夏者明天人不繫於公也疏所引者公羊非左氏本文也左丘明受經於仲尼疏懼弟子各有妄其意失其真臣浩按有字衍文妄字盖安字之訛史記原文云懼弟子人人異端各安其意失其真疏文引史記而稍節之似當作懼弟子各安其意失其真大體轉相祖述疏若觀服䖍賈逵之注皆沒而不說者衆矣賈逵各本俱作賈誼臣召南按賈誼雖嘗從北平侯張蒼受左傳但誼所作解詁晉時未必尚有其書杜預注於服䖍賈逵之說時多駁正此當作賈逵無疑今改正劉子駿創通大義疏授業於歆臣召南按後漢書賈逵傳父徽從劉歆受左氏春秋作條例二十一篇據此當云受業於歆非歆受業於徽也受各本俱作授今仍其舊而辯其譌如左春秋左傳序考證春秋左傳原目春秋經傳集解隠公第一音義解佳買反舊夫子之經與丘明之傳各卷杜氏合而釋之故曰經傳集解隱公名息姑惠公之子母聲子諡法不尸其位曰隠第一此不題左氏傳公羊穀梁二傳既顯姓别之此不言自見疏正義曰五經題篇皆出注者之意人各有心故題無常凖此本經傳别行則經傳各自有題注者以意裁定其本難可復知據今服䖍所注題云隱公左氏傳解誼第一不題春秋二字然則春秋二字盖是經之題也服言左氏傳三字盖本傳之題也杜既集解經傳春秋此書之大名故以春秋冠其上序説左氏言已備悉故畧去左氏而為此題焉經傳集解四字是杜所加其餘皆舊本也經者常也言事有典法可常遵用也傳者傳也博釋經意傳示後人分年相附兼而解之故謂之經傳集解隱公魯君侯爵杜君采太史公書世本旁引傳記以為世族譜畧記國之興滅譜云魯姬姓文王子周公旦之後也周公股肱周室成王封其子伯禽於曲阜為魯侯今魯國是也自哀以下九世二百一十七年而楚滅魯依魯世家伯禽至隱公凡十三君兄弟相及者五人隱公名息姑伯禽七世孫惠公弗皇子聲子所生平王四十九年即位是嵗嵗在豕韋禮記檀弓曰死諡周道也周法天子至於大夫既死則累其徳行而為之諡周書諡法云隱拂不成曰隱魯實侯爵而稱公者五等之爵雖尊卑殊號臣子尊其君父皆稱為公是禮之常也字書云第訓次也一者數之始此卷於次第當其一也杜氏疏正義曰杜氏名預字元凱畿之孫恕之子也陳壽魏志云杜畿字伯侯京兆杜陵人也漢御史大夫杜延年之後文帝時為尚書僕射封豐樂亭侯試舩溺死追贈太僕諡戴侯也恕字務伯官至幽州刺史預司馬宣王女壻也王隱晉書云預知謀深博明於治亂甞稱徳者非所企及立言立功預所庶㡬也大觀羣典謂公羊穀梁詭辯之言又非先儒説左氏未究丘明之意横以二傳亂之乃錯綜微言著春秋左氏經傳集解又參考衆家為之釋例又作盟會圖春秋長厯備成一家之學至老乃成預有大功名於晉室位至征南大將軍開府封當陽侯荆州刺史食邑八千户時人號為武庫不言名而言氏者注述之人義在謙退不欲自言其名故但言杜氏毛君孔安國馬融王肅之徒其所注書皆稱為傳鄭𤣥則謂之為注而此於杜氏之下更無稱謂者以集解之名已題在上故止云杜氏而已劉炫云不言名而云氏者漢承焚書之後諸儒各載學名不敢布於天下但欲傳之私族自題其氏為謙之辭桓公第二十八年莊公第三三十二年閔公第四二年僖公上第五元年至十五年僖公中第六十六年至二十六年僖公下第七二十七年至三十三年文公上第八元年至十年文公下第九十一年至十八年宣公上第十元年至十一年宣公下第十一十二年至十八年成公上第十二元年至十年成公下第十三十一年至十八年襄公元第十四元年至九年襄公二第十五十年至十五年襄公三第十六十六年至二十二年襄公四第十七二十三年至二十五年襄公五第十八二十六年至二十八年襄公六第十九二十九年至三十一年昭公元第二十元年至三年昭公二第二十一四年至七年昭公三第二十二八年至十二年昭公四第二十三十三年至十七年昭公五第二十四十八年至二十二年昭公六第二十五二十三年至二十六年昭公七第二十六二十七年至三十二年定公上第二十七元年至七年定公下第二十八八年至十五年哀公上第二十九元年至十三年哀公下第三十十四年至二十七年春秋左傳原目春秋左傳原目考證杜氏疏杜畿字伯侯京兆杜陵人也漢御史大夫杜延年之後文帝時為尚書僕射封豐樂亭侯監本脫豐字今從魏志増春秋左傳原目考證春秋三傳注解傳述人唐國子博士兼太子中允贈齊州刺史呉縣開國男陸徳明録古之王者必有史官君舉則書所以慎言行昭法式也諸侯亦有國史春秋即魯之史記也孔子應聘不遇自衛而歸西狩獲麟傷其虛應乃與魯君子左丘明觀書於太史氏因魯史記而作春秋上遵周公遺制下明將來之法褒善黜惡勒成十二公之經以授弟子弟子退而異言丘明恐弟子各安其意以失其真故論本事而為之傳明夫子不以空言說經也春秋所貶損人當世君臣其事實皆形於傳故隱其書而不宣所以免時難也及末世口說流行故有公羊名髙齊人子夏弟子受經于子夏榖梁名赤魯人糜信云與秦孝公同時七録云名淑字元始風俗通云子夏門人鄒氏王吉善鄒氏春秋夾氏之傳鄒氏無師夾氏有録無書故不顯于世桓譚新論云左氏傳遭戰國寢蔵後百餘年魯人穀梁赤作春秋殘畧多有遺文又有齊人公羊髙縁經文作傳彌失本事漢興齊人胡母氏字子都景帝時為博士年老歸教于齊齊之言春秋者宗事之公孫𢎞亦頗受焉趙人董仲舒官至江都膠西相並治公羊春秋蘭陵禇大梁相東平嬴公諫太夫廣川叚仲温吕歩舒歩舒丞相長史皆仲舒弟子嬴公守學不失師法授東海孟卿及魯睦𢎞字孟符節令𢎞授彭祖字公子東海下邳人為博士至左馮翊太子太傅及顔安樂字翁孫魯國薛人也孟姊子也為齊郡太守丞由是公羊有嚴顔之學𢎞弟子百餘人常曰春秋之意在二子矣彭祖授琅邪王中少府家世傳業中授同郡公孫文東平太傳徒衆甚盛及東門雲荆州刺史安樂授淮陽泠豐字次君菑川太守及淄川任翁少府豐授大司徒馬宫字游卿東海戚人封扶徳侯及琅邪左咸郡守九卿徒衆甚盛始貢禹字少翁琅邪人御史大夫事嬴公而成於睦孟以授潁川堂谿惠惠授泰山冥都丞相史又疎廣字仲翁東海蘭陵人太子太傅事孟卿以授琅邪筦路筦路及冥都又事顔安樂路授大司農孫寳字子嚴潁川鄢陵人瑕丘江公受榖梁春秋及詩於魯申公武帝時為博士傳子至孫皆為博士使與董仲舒論江公呐於口而丞相公孫𢎞本為公羊學比輯其義卒用董生於是上因尊公羊家詔太子受衞太子復私問榖梁而善之其後浸微唯魯榮廣字王孫皓星公二人受焉廣盡能傳其詩春秋蔡千秋字少君諫大夫郎中户將梁周慶字幼君丁姓字子孫至中山太傅皆從廣受千秋又事皓星公為學最篤宣帝即位聞衞太子好榖梁乃召千秋與公羊家竝説上善榖梁説後又選郎十人從千秋受㑹千秋病死徴江公孫為博士詔劉向受榖梁欲令助之江博士復死乃徴周慶丁姓待詔使卒授十人十餘嵗皆明習乃召五經名儒太子太傅蕭望之等大議殿中平公羊榖梁同異時公羊博士嚴彭祖侍郎申輓伊推宋顯榖梁議郎尹更始待詔劉向周慶丁姓竝論望之等多從榖梁由是大盛慶姓皆為博士姓授楚申章昌曼君為博士至長沙太傅初尹更始字翁君汝南邵陵人議郎諫大夫長樂户將事蔡千秋又受左氏傳取其變理合者以為章句傳子咸大司農及翟方進字子威汝南上蔡人丞相封侯房鳯字子元琅邪不其人光禄大夫五官中郎將青州牧始江博士授胡常常授梁蕭秉字君房王莽時為講學大夫左丘明作傳以授曽申申傳衞人呉起魏文侯相起傳其子期期傳楚人鐸椒楚太傅椒傳趙人虞卿趙相卿傳同郡荀卿名況況傳武威張蒼漢丞相北平侯蒼傳洛陽賈誼長沙梁王太傅誼傳至其孫嘉嘉傳趙人貫公漢書云賈誼授貫公為河間獻王博士貫公傳其少子長卿蕩隂令長卿傳京兆尹張敞字子髙河東平陽人徙杜陵及侍御史張禹字長子清河人禹數為御史大夫蕭望之言左氏望之善之薦禹徴待詔未及問㑹病死禹傳尹更始更始傳其子咸及翟方進胡常常授黎陽賈䕶字季君哀帝時待詔為郎䕶授蒼梧陳欽字子佚以左氏授王莽至將軍漢書儒林傳云漢興北平侯張蒼及梁太傅賈誼京兆尹張敞大中大夫劉公子皆修春秋左氏傳始劉歆字子駿向之子王莽國師從尹咸及翟方進受左氏哀帝時歆與房鳯王龔欲立左氏為師丹所奏不果平帝世始得立由是言左氏者本之賈䕶劉歆歆授扶風賈徽字元伯後漢潁隂令作春秋條例二十一卷徽傳子逵逵受詔列公羊榖梁不如左氏四十事奏之名曰左氏長義章帝善之逵又作左氏訓詁司空南閤祭酒陳元作左氏同異大司農鄭衆作左氏條例章句南郡太守馬融為三家同異之說京兆尹延篤字叔堅南陽人受左氏於賈逵之孫伯升因而注之汝南彭汪字仲博記先師竒說及舊注太中大夫許淑字惠卿魏郡人九江太守服䖍字子慎河南人侍中孔嘉字山甫扶風人魏司徒王朗字景興肅之父荆州刺史王基大司農董遇徴士燉煌周生烈竝注解左氏傳梓潼李仲欽著左氏指歸陳郡頴容字子嚴後漢公車徴不就作春秋條例又何休字邵公任城人後漢諫大夫作左氏膏肓公羊墨守榖梁廢疾鄭康成鍼膏盲發墨守起廢疾自是左氏大興漢初立公羊博士宣帝又立榖梁平帝始立左氏後漢建武中以魏郡李封為左氏博士羣儒蔽固者數廷爭之及封卒因不復補和帝元興十一年鄭興父子奏上左氏乃立於學官仍行於世迄今遂盛行二傳漸微江左中興立左氏傳杜氏服氏博士太常荀崧奏請立二傳博士詔許立公羊云榖梁膚淺不足立博士王敦亂竟不果立左氏今用杜預注公羊用何休注榖梁用范寗注二傳近代無講者恐其學遂絶故為音以示將來士爕注春秋經十一卷字彦威蒼梧人呉衛將軍龍編侯賈逵左氏解詁三十卷服䖍解誼三十卷王肅注三十卷董遇章句三十卷杜預經傳集解三十卷字元凱京兆杜陵人晉鎮南大將軍開府儀同三司當陽穆侯孫毓注二十八卷杜預春秋釋例十五卷四十篇服䖍音一卷魏髙貴鄉公音三卷曹髦字士彦魏廢帝嵇康音三卷字叔夜譙國人晉中散大夫杜預音三卷李軌音三巻荀訥音四卷字世言新蔡人東晉尚書左民郎徐邈音三卷右左氏梁東宫學士沈文阿撰春秋義疏闕下袟陳東宫學士王元規續成之元規又撰春秋音何休注公羊十二卷王愆期注十二卷字門子河東人東晉散騎常侍辰陽伯髙龍注十二卷字文范陽人東晉河南太守孔衍集解十四卷字舒元魯人東晉廣陵相李軌音一卷江淳音一卷右公羊尹更始榖梁章句十五卷唐固注十二卷字人下尚呉書僕射糜信注十二卷字南山東海人魏樂平太守孔衍集解十四卷徐邈注十二卷徐乾注十三卷字文祚東莞人東晉給事中范寗集注十二卷叚肅注十二卷不詳何人胡訥集解十卷右榖梁春秋三傳注解傳述人
