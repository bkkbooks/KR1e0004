body:
  text: 春秋左傳注疏卷八起莊公十一年盡二十二年晉杜氏注唐陸德明音義孔穎逹疏經十有一年春王正月注無傳夏五月戊寅公敗宋師于鄑注鄑魯地傳例曰敵未陳曰敗某師音義鄑子靳反疏正義曰往年公敗宋師于乘丘今為乘丘之役侵我則是報復前怨魯當無辭亦不稱侵伐者莊立以來未嘗犯宋宋黨齊伐我故敗于乘丘今復重來更是宋之可責非魯罪也秋宋大水注公使弔之故書冬王姬歸于齊注魯主昏不書齊侯逆不見公傳十一年夏宋為乘丘之役故侵我公禦之宋師未陳而薄之敗諸鄑凡師敵未陳曰敗某師注通謂設權譎變詐以勝敵彼我不得成列成列而不得用故以未陳獨敗為文音義為乘于僞反陳直覲反下及注皆同疏注正義曰設權譎變詐以勝敵者謂若長勺之役待齊人三鼓氣衰乃擊之定十四年檇李之役越子患吳之整使罪人屬劍自剄吳師屬之目越子因而伐之此二者敵雖已陳設權勝之成列而不得用也此及昭元年晉荀吳敗狄於大鹵傳皆云未陳而薄之是其未陳列也彼我不得成列與成列而不得用皆以未陳獨敗為文言彼不能拒而此獨克之也昭五年叔弓敗莒師於蚡泉傳曰莒未陳也此已發例彼復發者釋例曰魯敗宋莒再發未陳之例者嫌君臣有異也皆陳曰戰注堅而有備各得其所成敗決於志力者也疏注正義曰戰者共鬬之辭彼此成列權無所施故為各得其所成敗決於志力者也兩國交戰必有勝負或有未至成敗各自收斂故有言戰不言敗者桓十年齊侯鄭伯來戰于郎十二年及鄭師伐宋丁未戰于宋如此之類交戰而未至於敗故不書敗也或有彼實未陳應從未陳之例亦書戰者或有實敗而不書敗者皆從告辭也釋例曰令狐之役晉人潛師夜起而書戰者晉諱背其前意而夜薄秦師以戰告也河曲之戰秦晉交綏長岸之戰吳楚兩敗交綏並退軍士未憗吳楚俱病莫肯以告故皆書戰而不書敗也邲之戰上軍先陳林父乃敗故書戰又書敗也大崩曰敗績注師徒撓敗若沮岸崩山喪其功績故曰敗績音義撓乃孝反一音乃巧反沮在吕反壞也一音子餘反岸崩謂之沮喪息浪反疏注正義曰師徒撓敗成二年傳文榖梁傳曰高曰崩厚曰崩解其師非高厚而稱崩意沮訓壞也沮岸謂河岸崩也師旅大敗似岸崩山崩也績訓為功喪其功績故曰敗績唯成十六年言楚子鄭師敗績者釋例曰鄢陵之戰楚師徒未大崩楚子傷目而退故指事而言也言楚子身敗非師敗也故言楚子敗績僖十五年晉侯及秦伯戰于韓獲晉侯其君被獲而不書敗者晉侯戎馬還濘而止為秦所獲師不大崩故不書敗也城濮之戰傳稱楚左右師潰子玉收其卒而止故不敗是二軍敗而經書敗績鄢陵之戰傳稱子反曰臣之卒實奔是一軍敗而杜云師未大崩然敗績者是大崩之名敗多存少乃稱敗績敗少存多則不稱敗績也得俊曰克注謂若太叔假之比才力足以服衆威權足以自固進不成為外寇强敵退復狡壯有二君之難而實非二君克而勝之則不言彼敗績但書所克之名音義俊音俊本或作俊比必利反復扶又反狡壯交卯反下測亮反難乃但反疏注正義曰克訓勝也戰勝其師獲得其軍內之雄俊者故云得俊曰克春秋稱克者唯有叔假一事而已既非敵國相伐又非君之討臣而於戰陳之例别立此名彼傳復云如二君故曰克故具迹叔假之事以充之凡例乃是舊典非獨為假發故云叔假之比釋例與此盡同覆而敗之曰取某師注覆謂威力兼備若羅網所掩覆一軍皆見禽制故以取為文疏注正義曰取謂盡取無遺漏之意也哀九年宋皇瑗取鄭師于雍丘傳稱皇瑗圍鄭師每日遷舍壘合鄭師哭是自知盡死無逃逸之路也又曰使有能者無死是其合軍之內死生在宋也取狀如此而云覆而敗之知其如羅網掩覆一軍皆見禽制故以取為文服䖍云覆隱也設伏而敗之謂攻其無備出其不意敵人不知敗之易故曰取即如服言與未陳何異而别以為例謂之取也荀吳敗狄于大原於越敗吳于檇李並攻其無備出其不意而經不言取鄭二公子敗燕師于北制鄭人大敗戎師是設伏敗之而傳不言取服謂此為取何也宋圍鄭師壘合而哭自知必敗非敵人不知而書取何也京師敗曰王師敗績于某注王者無敵於天下天下非所得與戰者然春秋之世據有其事事列於經則不得不因申其義有時而敗則以自敗為文眀天下莫之得校音義京師敗本或作京師敗績者非校音教疏注正義曰此亦周公舊凡杜解舊凡之意得有王師敗績者以周公制禮理包盛衰故周禮載大喪及王師不功之事故舊凡例有敗績之文杜以尊卑逆順言之天王不應有戰敗之事遂申說凡例故云無敵於天下天下非所得與戰者然春秋之世據有其事成元年王師敗績于茅戎是事列於經丘眀不得不因申舊凡之義蘇氏之說義亦如此沈氏不解杜意以京師敗績非周公舊凡是孔子新意丘眀為傳不得不因申孔子新意之義劉炫亦不達社㫖謂杜與沈氏意同非也秋宋大水公使弔焉曰天作淫雨害于粢盛若之何不弔注不為天所愍弔對曰孤實不敬天降之災又以為君憂拜命之辱注謝辱厚命臧文仲曰宋其興乎注臧文仲魯大夫禹湯罪已其興也浡焉注浡盛貌音義浡蒲忽反一作勃同桀紂罪人其亡也忽焉注忽速貌音義紂直久反疏正義曰湯誥云其爾萬方有罪在豫一人是罪已也泰誓數紂之罪云焚炙忠良刳剔孕婦是罪人也禹桀之時書多亡矣固亦應有此事沈引帝王世紀云禹見罪人下車泣之是罪已也桀殺關龍逄是罪人也且列國有凶稱孤禮也注列國諸侯無凶則常稱寡人疏注正義曰列國謂大國也曲禮曰庶方小侯自稱曰孤諸侯與民言自稱曰寡人其在凶服曰適子孤鄭𤣥云與臣言亦自謂寡人是無凶則常稱寡人有凶則稱孤也言懼而名禮其庶乎注言懼罪已名禮稱孤其庶庶幾於興音義言懼而名禮絶句或以名絶句者非既而聞之曰公子御說之辭也注宋莊公子音義御魚吕反本或作禦說音悅臧孫達曰是宜為君有恤民之心疏正義曰謂御說眀年為君之後方始聞之聞之時已為君故云是人宜其為君也傳以御說有禮故以此言實之冬齊侯來逆共姬注齊桓公也音義共音恭乘丘之役注在十年公以金僕姑射南宫長萬注金僕姑矢名南宫長萬宋大夫音義射食亦反長丁丈反疏注正義曰用之射人必知是矢其名僕姑其義未聞公右歂孫生搏之注搏取也不書獲萬時未為卿音義歂市専反搏音博疏正義曰檀弓云魯莊公及宋人戰于乘丘縣賁父御卜國為右車右與此不同者禮記後人所録聞於所聞之口其事未必實也案傳云公子偃先犯宋師公從而大敗之則木非交戰禮記稱馬驚敗績公隊佐車授綏御與車右皆死之必如記言則是魯師敗績安得稱公敗宋師于乘丘傳記不同固當記文妄耳宋人請之宋公靳之注戲而相愧曰靳魯聽其得還音義靳居覲反疏注正義曰服䖍云恥而惡之曰靳傳稱宋人請之若是恥惡其人不應為之請魯故杜以為戲而相愧曰靳鄭𤣥注禮記儒行云遭人名為儒而以儒靳故相戲俗有靳故之語知是戲而相愧之名也公羊傳以為宋萬與閔公博婦人皆在側萬曰甚矣魯侯之淑魯侯之美閔公矜此婦人妬其言曰此虜也魯侯之美惡乎至何休云惡乎至猶何所至萬怒搏閔公絶其脰是其靳之事也曰始吾敬子今子魯囚也吾弗敬子矣病之注萬不以為戲而以為已病為宋萬弒君傳經十有二年春王三月紀叔姬歸于酅注無傳紀侯去國而死叔姬歸魯紀季自定於齊而後歸之全守節義以終婦道故繫之紀而以初嫁為文賢之也來歸不書非寧且非大歸音義酅音攜疏注正義曰公羊傳曰其言歸于酅何隱之也何隱爾其國亡矣徒歸于叔爾穀梁傳曰其曰歸何吾女也失國喜得其所故言歸焉爾杜略取彼意為說釋例與此盡同大意以其賢愍其國亡乃依附於叔故書之耳夏四月秋八月甲午宋萬弒其君捷及其大夫仇牧注捷閔公不書葬亂也萬及仇牧皆宋卿仇牧稱名不警而遇賊無善事可褒音義警居領反疏注正義曰隱十一年公羊傳曰君弒臣不討賊非臣也子不復讐非子也葬生者之事也春秋君弒賊不討不書葬以為不繫乎臣子也左氏無此義故杜明之不書葬為亂故也凡葬魯不會則不書若使宋亂不葬魯本無可㑹之理兼見此義故言亂也萬及仇牧並名見於經知皆卿也萬不書氏者釋例曰宋萬賈氏以為未賜族案傳稱南宫長萬則為已氏南宫不得為未賜族也推尋經文自莊公以上諸弒君者皆不書氏閔公以下皆書氏亦足眀時史之異同非仲尼所皆貶也是杜意以為史有詳略無義例也文八年宋人殺其大夫司馬傳曰司馬握節以死故書以官然則有善可褒當變文以見義此仇牧書名不警而遇賊無善可褒故不變其文公羊善其不畏疆禦故言此以異之冬十月宋萬出奔陳注奔例在宣十年傳十二年秋宋萬弒閔公于蒙澤注蒙澤宋地梁國有蒙縣疏注正義曰昭十三年楚弒其君䖍于乾溪書地此弒閔公于蒙澤不書地者釋例曰先儒旁采二傳橫生異例宋之䝉澤楚之乾溪俱在國內閔公之弒則以不書蒙澤國內為義楚弒靈王復以地乾溪為失所眀仲尼本不以為義例眀丘眀亦無異文也是亦言史自詳略無義例也遇仇牧于門批而殺之注手批之也音義批普迷反又蒲穴反字林云擊也父節反遇大宰督于東宫之西又殺之注殺督不書宋不以告音義大音泰立子游注子游宋公子疏注正義曰世族譜子游雜人不知何公之子羣公子奔蕭公子御說奔亳注蕭宋邑今沛國蕭縣亳宋邑蒙縣西北有亳城音義亳步各反南宫牛猛獲帥師圍亳注牛長萬之子猛獲其黨也冬十月蕭叔大心注叔蕭大夫名疏注正義曰卿大夫采邑之長則謂之宰公邑之長則曰大夫此則是宋蕭邑大夫也以此年有功宋人以蕭邑别封其人為附庸二十三年經書蕭叔朝公附庸例稱名故杜以叔為名及戴武宣穆莊之族注宋五公之子孫以曹師伐之殺南宫牛于師殺子游于宋立桓公注桓公御說猛獲奔衛南宫萬奔陳以乘車輦其母一日而至注乘車非兵車駕人曰輦宋去陳二百六十里言萬之多力音義南宫萬奔陳本或作長萬長衍字也下亦然乘繩證反注同宋人請猛獲于衛衛人欲勿與石祁子曰不可注石祁子衛大夫天下之惡一也惡于宋而保于我保之何補得一夫而失一國與惡而棄好非謀也注宋衛本同好國音義好呼報反注同衛人歸之亦請南宫萬于陳以賂疏正義曰斷以賂為句言用賂請于陳也請猛獲于衛不言以賂蓋於衛無賂陳人使婦人飲之酒而以犀革裹之比及宋手足皆見宋人皆醢之注醢肉醬并醢猛獲故言皆音義亦請南宫長萬于陳以賂絶句飲於鴆反犀音西裹咅果比必利反見賢遍反醢音海經十有三年春齊侯宋人陳人蔡人邾人㑹于北杏注北杏齊地音義杏户猛反夏六月齊人滅遂注遂國在濟北蛇丘縣東北音義蛇音移秋七月冬公㑹齊侯盟于柯注此柯今濟北東阿齊之阿邑猶祝柯今為祝阿音義柯古何反傳十三年春㑹于北杏以平宋亂注宋有弒君之亂齊桓欲修霸業疏注正義曰桓二年㑹于稷以成宋亂者為㑹之意欲平除宋督弒君之賊此云平宋亂者宋萬已誅宋新立君其位未定齊桓欲修霸業為㑹以安定之非欲平除新君故宋人聼命來列于㑹也遂人不至夏齊人滅遂而戍之注戍守也冬盟于柯始及齊平也注始與齊桓通好音義好呼報反宋人背北杏之㑹音義背音佩十四年經注同經十有四年春齊人陳人曹人伐宋注背北杏㑹故夏單伯㑹伐宋注既伐宋單伯乃至故曰㑹伐宋單伯周大夫疏注正義曰傳稱諸侯伐宋齊請師于周則伐事已成單伯始至故云㑹伐宋言來就宋地㑹之也元年注云單伯天子卿也此云周大夫者大夫亦卿之總號故爾言之秋七月荆入蔡注入例在文十五年冬單伯㑹齊侯宋公衛侯鄭伯于鄄注鄄衛地今東郡甄城也齊桓修霸業卒平宋亂宋人服從欲歸功天子故赴以單伯㑹諸侯為文音義于鄄音絹甄城音絹一音真或音旃又舉然反或作鄄疏正義曰春秋因魯史之文魯史自書其事㑹他國者皆言已往㑹之不問君之與臣㑹諸侯者皆魯人在㑹字之上若微人往㑹則㑹上無字直言其㑹明魯往㑹之微人不合書名書其所為之事而已十六年㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽是也若魯人不與而諸侯自㑹則并序諸侯言㑹于某十五年齊侯宋公陳侯衛侯鄭伯㑹於鄄是也雖霸主召㑹諸侯霸主之身列在諸侯之上耳不言霸主㑹諸侯以其俱是王臣不得與諸侯為主故也若霸主之國遣大夫往㑹諸侯雖政在霸國大夫名列諸侯之下由非諸侯之主列位從其班爵文十四年公㑹宋公陳侯衛侯鄭伯許男曹伯晉趙盾同盟于新城是也若王臣在㑹不問尊卑皆列諸侯之上僖八年公㑹王人齊侯宋公衛侯許男曹伯陳世子欵盟于洮九年公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘是也此㑹魯人不與單伯宜列在諸侯之上下言㑹于鄄耳今㑹字乃在齊侯之上是齊桓歸功天子故赴以單伯㑹諸侯為文所以尊天子示名義也此㑹魯自不與魯所與者皆魯人在上史文以魯為主耳當㑹之時以大小為序魯不在上也釋例曰魯為春秋主常列諸侯上非其實次也于帛卿也依魯大夫之比列於莒上故傳曰魯故也叔孫豹曰宋衛吾匹也又曰諸侯之㑹寡君未嘗後衛君是魯在衛上也宋既先代之後又襄公一合諸侯以紹齊桓之伯宋在齊上則魯次宋也傳十四年春諸侯伐宋齊請師于周注齊欲崇天子故請師假王命以示大順經書人傳諸侯者總衆國之辭疏注正義曰齊既以諸侯伐宋而更請師于周者齊桓始修霸業方欲尊崇天子故請師假王命以示大順耳非慮伐不克而藉王威也經書人而傳言諸侯先儒以為諸如此輩皆是諸侯之身釋例曰傳滅入例衛侯燬滅邢同姓故名又云穀伯綏鄧侯吾離來朝名賤之也又云不書蔡許之君乘楚車也謂之失位此皆貶諸侯之例例不稱人也諸侯在事傳有明文而經稱人者凡十一條丘明不示其義而諸儒皆據案生意原無所出貶諸侯而去爵稱人是為君臣同文非止等差之謂也又澶淵大夫之㑹傳曰不書其人案經皆去名稱人至諸侯親城緣陵傳亦曰不書其人而經總稱諸侯此大夫及諸侯經傳所以為别也通校春秋自宣公五年以下百數十年諸侯之咎甚多而皆無貶稱人者益明此蓋當時告命記注之異非仲尼所以為例故也是言諸侯之貶或書名或沒而不書必不得稱人故以此經書人傳言諸侯為總衆國之辭僖元年齊師宋師曹師救邢於例將卑師衆稱師則三國皆大夫帥也傳稱諸侯救邢亦是總衆國之辭與此同也夏單伯㑹之取成于宋而還鄭厲公自櫟侵鄭注厲公以桓十五年入櫟遂居之咅義櫟音歷及大陵獲傅瑕注大陵鄭地傅瑕鄭大夫傅瑕曰苟舍我吾請納君與之盟而赦之六月甲子傅瑕殺鄭子及其二子而納厲公注鄭子莊四年稱伯㑹諸侯今見殺不稱君無諡者微弱臣子不以君禮成喪告諸侯音義舍音捨鄭子子儀初內蛇與外蛇鬭於鄭南門中內蛇死六年而厲公入疏正義曰服䖍云蛇北方水物水成數六故六年而厲公入公聞之問於申繻曰猶有妖乎對曰人之所忌其氣焰以取之妖由人興也注尚書洛誥無若火始焰焰未盛而進退之時以喻人心不堅正音義蛇市奢反繻音須妖於驕反焰焰音豔誥古報反人無釁焉妖不自作人棄常則妖興故有妖音義釁許靳反疏正義曰公聞厲公之入問於申繻曰猶有蛇妖而厲公得入乎古者由猶二字義得通用申繻對公曰人之所忌謂子儀畏懼厲公心不堅正其畏忌之氣焰焰未盛而進退之時以取此妖來應人也蛇鬭之事由人興也若使人無釁隙焉則妖孽不能自作人棄其常則妖自興以此故有妖棄常謂既不能疆又不能弱失常度也厲公入遂殺傅瑕使謂原繁曰傅瑕二注言有二心於已周有常刑既伏其罪矣納我而無二心者吾皆許之上大夫之事吾願與伯父圖之注上大夫卿也伯父謂原繁疑原繁有二心且寡人出伯父無裏言注無納我之言音義裏音里入又不念寡人注不親附己寡人憾焉對曰先君桓公命我先人典司宗祏注桓公鄭始受封君也宗祏宗廟中藏主石室言已世為宗廟守臣音義憾户暗反祏音石藏主石函也守手又反疏注正義曰桓公初封西鄭蓋其畿內之國周禮王子母弟有功者得立祖王之廟故桓公始封為君即命臣使典宗祏宗祏者慮有非常火災於廟之北壁內為石室以藏木主有事則出而祭之既祭納於石室祏字從示神之也社稷有主而外其心其何二如之苟主社稷國內之民其誰不為臣臣無二心天之制也子儀在位十四年矣注子儀鄭子也而謀召君者庸非二乎注庸用也莊公之子猶有八人若皆以官爵行賂勸二而可以濟事君其若之何臣聞命矣乃縊而死音義莊公之子猶有八人傳唯見四人子忽子亹子儀並死獨厲公在八人名字記傳無聞縊一賜反蔡哀侯為莘故繩息媯以語楚子注莘役在十年繩譽也音義為莘于僞反下所巾反語魚據反繩食承反說文作譝譽音餘又如字疏注正義曰字書繩作譝字從言訓為譽楚子如息以食入享遂滅息注僞設享食之具音義食音嗣注同以息媯歸生堵敖及成王焉未言注未與王言音義堵敖丁古反下五羔反杜云楚人謂未成君為敖史記作杜敖楚子問之對曰吾一婦人而事二夫縱弗能死其又奚言楚子以蔡侯滅息遂伐蔡注欲以說息媯音義說音悅秋七月楚入蔡君子曰商書所謂惡之易也如火之燎于原不可鄉邇其猶可撲滅者其如蔡哀侯乎注商書盤庚言惡易長而難滅音義易以豉反注同燎力召反又力弔反鄉許亮反撲普卜反盤步丹反本又作般長丁丈反冬㑹于鄄宋服故也經十有五年春齊侯宋公陳侯衛侯鄭伯㑹于鄄夏夫人姜氏如齊注無傳夫人文姜齊桓公姊妹父母在則禮有歸寧沒則使卿寧疏注正義曰文姜僖公之女故為桓公姊妹詩美后妃之德云歸寧父母是父母在則禮有歸寧襄十二年傳曰秦嬴歸于楚楚司馬子庚聘于秦為夫人寧禮也是父母沒則使卿寧兄弟不得自歸也但不知今桓公有母以否故杜不明言得失秋宋人齊人邾人伐郳注宋主兵故序齊上音義郳五兮反鄭人侵宋冬十月傳十五年春復㑹焉齊始霸也注始為諸侯長音義復扶又反長丁丈反秋諸侯為宋伐郳注郳附庸屬宋而叛故齊桓為之伐郳音義為宋于僞反鄭人間之而侵宋音義間間厠之間一本作聞經十有六年春王正月夏宋人齊人衛人伐鄭注宋主兵也班序上下以國大小為次征伐則以主兵為先春秋之常也他皆放此疏注正義曰往年齊桓始霸未敢即尸其任救患討罪今為宋伐鄭仍使宋自報怨故宋主兵序於齊上也諸侯㑹許男在曹滑之上班序上下以國大小為次不以爵之尊卑也隱五年邾人鄭人伐宋附庸在伯爵之上是以主兵為先也歷檢上下皆然知是春秋常法禮記祭義云有虞氏貴德而尚齒夏后氏貴爵而尚齒殷人貴富而尚齒周人貴親而尚齒而春秋序㑹不先同姓而大國在上者孔子修春秋有變周之文從殷之質故也秋荆伐鄭冬十有二月㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽注書㑹魯㑹之不書其人微者也言同盟服異也陳國小每盟㑹皆在衛下齊桓始霸楚亦始疆陳侯介於二大國之間而為三恪之客故齊桓因而進之遂班在衛上終於春秋滑國都費河南緱氏縣幽宋地音義介音界為三恪苦各反本或作為三恪之客費扶味反又音祕緱古侯反一咅苦侯反疏注正義曰公羊傳曰同盟者何同欲也穀梁傳曰同者同尊周也杜云服異者亦是同其欲同尊周也書同盟者當盟之時告神稱同釋例曰盟者假神明以要不信故載辭或稱同以服異為言也是言載辭稱同也二十七年同盟于幽傳曰陳鄭服也文十四年同盟于新城傳曰從於楚者服且謀邾也成五年同盟于蟲牢傳曰鄭服也七年同盟於馬陵傳曰尋蟲牢之盟且莒服故也襄三年同盟于雞澤傳曰晉為鄭服故合諸侯二十五年同盟于重丘傳曰齊成故也昭十三年同盟于平丘傳曰齊服也如此之類皆是服異故稱同也喪服繼父不同居傳曰嘗同居乃為異居未嘗同居則不為異居春秋同盟亦猶是也嘗同盟而異乃稱服異未嘗同盟則不為服異故盟不稱同也僖二年齊侯宋公江人黃人盟于貫傳曰服江黃也定四年陳許頓胡楚之屬國皆來㑹于召陵其下云公及諸侯盟于臯二盟並不稱同皆為未嘗同盟非服異故不稱同也應稱同而不稱同者僖五年首正之盟鄭伯逃歸七年盟于寧母鄭伯使太子華聼命於㑹而不稱同者鄭心未服故傳稱子華請去三族管仲曰君其勿許鄭必受盟是寧母之時鄭未服也八年盟于洮鄭伯乞盟傳稱請服也而洮盟不稱同者鄭伯始請服耳未列於㑹故不稱同也文十五年夏晉郤缺帥師伐蔡戊申入蔡其冬諸侯盟于扈傳稱晉侯宋公衛侯蔡侯陳侯鄭伯許男曹伯盟于扈則是蔡新來服不稱同者傳稱郤缺入蔡以城下之盟而還是則蔡已先服故不稱同也宣十二年同盟于清丘傳曰恤病討二十七年同盟于斷道傳曰討二也成九年同盟于蒲傳曰為歸汶陽之田故諸侯二于晉晉人懼會于蒲以尋馬陵之盟十五年同盟于戚傳曰討曹成公也十七年同盟于柯陵傳曰尋戚之盟也十八年同盟于虛朾傳曰謀救宋也此六盟皆非服異稱同盟者清丘斷道與蒲於時諸侯已有二心同心討二故稱同盟戚與虛朾同心疾惡故稱同盟柯陵之盟鄭人不服欲令諸侯同心伐鄭故稱同盟猶襄十八年諸侯同心疾齊稱同圍齊自此以前陳在衛下今在上知齊桓始進之釋例班序譜自隱至莊十四年四十三歲衛與陳凡四㑹衛在陳上自莊十五年盡僖十七年三十五歲凡八㑹陳在衛上故知是齊桓進之遂班在衛上終於春秋也邾子克卒注無傳克儀父名稱子者蓋齊桓請王命以為諸侯再同盟疏注正義曰北杏之㑹邾人在焉今而稱子故云蓋齊侯請王命以為諸侯得為子爵見經也隱元年盟於蔑桓十七年盟于趡是再同盟也傳十六年夏諸侯伐鄭宋故也注鄭侵宋故音義宋故也本或作為宋故鄭伯自櫟入注在十四年緩告于楚秋楚伐鄭及櫟為不禮故也鄭伯治與於雍糾之亂者注在桓十五年音義為于僞反與音預九月殺公子閼刖强鉏注二子祭仲黨斷足曰刖音義公子閼安末反案隱十一年鄭有公孫閼距此三十五年不容復有公子閼若非閼字誤則子當為孫刖音月又五刮反鉏仕魚反斷丁管反疏注正義曰周禮司刑刖罪五百尚書吕刑剕罰之屬五百孔安國云刖足曰剕釋言云剕刖也李巡曰斷足曰刖也說文云刖絶也則剕刖是斷絶之名斬足之罪故云斷足曰刖公父定叔出奔衛注共叔假之孫定諡也音義父音甫王音如字共音恭三年而復之曰不可使共叔無後於鄭使以十月入曰良月也就盈數焉注數滿於十疏注正義曰易繫辭云天一地二天三地四天五地六天七地八天九地十至十而止是數滿於十也閔元年傳曰萬盈數也數至十則小盈至萬則大盈傳具載定叔事者服䖍云定叔之祖共叔假有伐君之罪宜世不長而云不可使共叔無後於鄭言其刑之偏頗鄭厲公以孽篡適同惡相恤故黨於共叔欲令其後不絶傳所以惡厲公也君子謂强鉏不能衛其足注言其不能早辟害冬同盟于幽鄭成也王使虢公命曲沃伯以一軍為晉侯注曲沃武公遂并晉國僖王因就命為晉侯小國故一軍音義并如字王必政反疏注正義曰桓八年傳稱曲沃武公滅翼其年冬王命虢仲立晉哀侯之弟緡于晉至是乃并之也晉世家云曲沃武公伐晉侯緡滅之盡以其寶器賂獻於周僖王僖王命曲沃武公為晉君列為諸侯於是盡并晉地而有之曲沃武公已即位三十七年矣自桓叔始封曲沃以至武公滅晉凡六十七嵗而卒代晉為諸侯是僖王命之事也周禮小國一軍晉土地雖大以初并晉國故以小國之禮命之初晉武公伐夷執夷詭諸注夷詭諸周大夫夷采地名音義詭九委反采七代反後放此蒍國請而免之注蒍國周大夫音義蒍于委反既而弗報注詭諸不報施於蒍國音義施始䜴反故子國作亂謂晉人曰與我伐夷而取其地注使晉取夷地遂以晉師伐夷殺夷詭諸周公忌父出奔虢注周公忌父王卿士辟子國之難音義難乃旦反惠王立而復之注魯桓十五年經書桓王崩魯莊三年經書葬桓王自此以來周有莊王又有僖王崩葬皆不見於經傳王室微弱不能復自通於諸侯故傳因周公忌父之事而見惠王惠王立在此年之末音義不見賢遍反下同復自扶又反疏注正義曰史記十二諸侯年表云莊王元年當魯桓十六年即位十五年而崩僖王元年當魯莊十三年即位五年而崩惠王元年當魯莊十八年即位在十八年而此年傳說惠王之立者杜云傳因周公忌父之事而見惠王立在此年之末是杜以周公忌父此年出奔至惠王立而得復與史記不違經十有七年春齊人執鄭詹注齊桓始伯鄭既伐宋又不朝齊詹為鄭執政大臣詣齊見執不稱行人罪之也行人例在襄十一年諸執大夫皆稱人以執之大夫賤故音義詹之亷反始伯音霸又如字本又作霸疏注正義曰僖七年傳曰鄭有叔詹堵叔師叔先言詹是詹最貴也且傳稱鄭不朝也以君不朝而詹被執明詹是執政大臣為不道君使朝故執之也若詹不至齊則無由被執知是詣齊見執蓋聘齊也昭八年楚人執陳行人于徴師殺之傳曰罪不在行人也無罪乃稱行人知不稱行人罪之也襄十一年楚人執鄭行人良霄傳曰書曰行人言使人也言使人者言非使人之罪也書曰者是仲尼新意故指以為例也執諸侯有稱人稱侯之異執大夫者悉皆稱人以執之為大夫賤故也劉炫以此注云詣齊見執釋例曰詹本非出使謂二者自相矛楯今知非者齊以鄭不朝而責於鄭鄭令詹詣齊謝罪齊人執之故釋例云元非出聘之使集解云詣齊被執二文雖異事實同耳劉炫不尋此意乃為規過非也夏齊人殲于遂注殲盡也齊人戍遂玩而無備遂人討而盡殺之故時史因以自盡為文音義殲子廉反玩五亂反而盡津忍反疏注正義曰殲盡也釋詁文舍人曰殲衆之盡也時史惡其輕敵而以自盡為文罪齊戍也釋例曰齊人殲于遂鄭棄其師亦時史即事以安文或從赴辭故傳不顯明義例也秋鄭詹自齊逃來注無傳詹不能伏節守死以解國患而遁逃苟免書逃以賤之音義遁徒遜反疏注正義曰伏節守死以解國患當如昭元年叔孫豹之居位待罪也逃若匹夫逃竄故云書逃以賤之鄭詹自齊逃來過魯而後歸鄭故書之冬多麋注無傳麋多則害五稼故以災書音義麋亡悲反疏注正義曰麋是澤獸魯所常有是年暴多多則害五穀故言多以災書也傳十七年春齊人執鄭詹鄭不朝也夏遂因氏頜氏工婁氏須遂氏饗齊戍醉而殺之齊人殲焉注饗酒食也四族遂之疆宗齊滅遂戍之在十三年音義頜烏納反又苦答反婁力侯反饗本作享經十有八年春王三月日有食之注無傳不書日官失之疏注正義曰經亦無朔字當云不書朔與日注不言朔脫也夏公追戎于濟西注戎來侵魯公逐之於濟水之西秋有􅈮注􅈮短弧也蓋以含沙射人為災音義􅈮本又作蜮音或短狐也本草謂之射工短弧本又作斷同丁管反弧又作狐音胡射人食亦反疏注正義曰穀梁傳曰􅈮射人者也洪範五行傳曰􅈮如龞三足生於南越南越婦人多淫故其地多􅈮淫女惑亂之氣所生也陸璣毛詩義疏云􅈮短狐也一名射景如龞三足在江淮水中人在岸上景見水中投人景則殺之故曰射景或謂含沙射人入皮肌其創如疥服䖍云遍身濩濩或或故為災沈氏云此有􅈮傳重發例者以螟螽與蜚同是害禾稼此􅈮則害人故傳特發之冬十月傳十八年春虢公晉侯朝王王饗醴命之宥注王之覲羣后始則行饗禮先置醴酒示不忘古飲宴則命以幣物宥助也所以助歡敬之意言備設音義醴音禮宥音又疏注正義曰王饗醴命之宥者王為之設饗禮置醴酒命之以幣物所以助歡也宥助釋詁文周禮掌客王待諸侯之禮上公三饗三食三燕侯伯二饗再食再燕子男一饗一食一燕三禮先言饗是王之覲羣后始則行饗禮也酒正辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰醍齊五曰沈齊鄭注云泛者成而滓浮泛泛然醴猶體也成而汁滓相將如今恬酒矣盎猶翁也成而翁翁然葱白色醍者成而紅赤沈者成而滓沈如今造清矣自醴以上尤濁然則以其尤濁故先置之示不忘古也知者禮運云燔黍捭豚下即云以燔以炙以為醴酪是醴酒在先而有故曰先置醴酒示不忘古也詩序曰鹿鳴燕羣臣嘉賓也既飲食之又實幣帛筐篚以將其厚意聘禮云若不親食使大夫朝服致之以侑幣致饗以酬幣亦如之是饗禮有酬幣也禮主人酌酒於賓曰獻賓答主人曰酢主人又酌以酬賓曰酬幣蓋於酬酒之時賜之幣也所賜之物即下玉馬是也傳稱饗醴命宥言其備設盛禮也此注命之宥者命在下以幣物宥助僖二十八年命晉侯助以束帛以將厚意皆命不同者以彼有命晉侯之事故也皆賜玉五㲄馬三匹非禮也注雙玉為㲄音義㲄音角字又作珏疏注正義曰倉頡篇㲄作珏雙玉為㲄故字從兩玉王命諸侯名位不同禮亦異數不以禮假人注侯而與公同賜是借人禮音義借子夜反疏注正義曰虢君不知何爵稱公謂為三公也周禮王之三公八命侯伯七命是其名位不同也其禮各以命數為節是禮亦異數也今侯而與公同賜是借人禮也假借同義取者假為上聲借為入聲與者假借皆為去聲虢公晉侯鄭伯使原莊公逆王后于陳陳媯歸于京師注虢晉朝王鄭伯又以齊執其卿故求王為援皆在周倡義為王定昏陳人敬從得同姓宗國之禮故傳詳其事不書不告音義為王于僞反實惠后注陳媯後號惠后寵愛少子亂周室事在僖二十四年故傳於此並正其后稱夏公追戎于濟西不言其來諱之也注戎來侵魯魯人不知去乃追之故諱不言其來疏注正義曰傳例有鐘鼓曰伐無曰侵戎之來也魯人不知宜無鐘鼓故以侵言之釋例曰戎之入魯魯人不知去而逺追又無其獲邉竟不備候不在疆所以為諱諱此君之闕亦所以示戒將來之君也秋有􅈮為災也初楚武王克權使鬭緡尹之注權國名南郡當陽縣東南有權城鬭緡楚大夫音義緡亡巾反疏正義曰尹訓正也楚官多以尹為名此滅權為邑使緡為長故曰尹也以叛圍而殺之注緡以權叛音義以叛絶句木或作畔俗字也遷權於那處注那處楚地南郡編縣東南有那口城音義那處那又作那同乃多反下昌吕反又昌慮反編必綿反一音步典反使閻敖尹之注閻敖楚大夫及文王即位與巴人伐申而驚其師注驚巴師巴人叛楚而伐那處取之遂門于楚注攻楚城門閻敖游涌而逸注涌水在南郡華容縣閻敖既不能守城又遊涌水而走音義涌音湧水名楚子殺之其族為亂冬巴人因之以伐楚經十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟注無傳公子結魯大夫公羊榖梁皆以為魯女媵陳侯之婦其稱陳人之婦未入國略言也大夫出竟有可以安社稷利國家者則專之可也結在鄄聞齊宋有㑹權事之宜去其本職遂與二君為盟故備書之本非魯公意而又失媵陳之好故冬各來伐音義媵以證反又繩證反送也竟音境好呼報反疏注正義曰公羊傳曰媵者何諸侯娶一國則二國往媵之媵不書此何以書為其有遂事書大夫無遂事此其言遂何聘禮大夫受命不受辭出竟有可以安社稷利國家者則專之可也榖梁文雖不明其意亦為魯女左氏無傳取彼為說故云公羊榖梁皆以為魯女媵陳侯之婦榖梁傳曰其曰陳人之婦略之也以未入國略而不言陳侯夫人成九年伯姬歸於宋晉衛齊三國來媵然則為人媵者皆送至嫁女之國使之從適而行此鄄是衛之東地蓋陳取衛女為婦魯使公子結送媵向衛至鄄聞齊宋為㑹將謀伐魯故權事之宜去其本職不復送女至衛遂與二君㑹盟故備書之也送女至鄄停女㑹盟鄄是盟處故言于鄄非本期送女使至鄄也既盟之後遂不復送女其盟本非公意又失媵陳之好故至冬而三國來伐結之此盟於魯無益故無嘉善之文文八年冬十月壬午公子遂㑹晉趙盾盟于衡雍乙酉公子遂㑹雒戎盟于暴四日之間不容反報亦是專命而盟患難俱解故再稱名氏珍而貴之與此異也宣十二年宋華椒承羣僞之言以誤其國宋人被伐而貶華椒今三國伐魯不貶公子結者結之為盟本欲安社稷利國家與華椒事異故不貶夫人姜氏如莒注無傳非父母國而往書姦疏注正義曰此既無傳不知何為如莒婦人不以禮出為姦故曰書姦冬齊人宋人陳人伐我西鄙注無傳幽之盟魯使微者㑹鄄之盟又使媵臣行所以受敵鄙邉邑傳十九年春楚子禦之大敗於津注禦巴人為巴人所敗津楚地或曰江陵縣有津鄉還鬻拳弗納遂伐黃注鬻拳楚大閽黃嬴姓國今弋陽縣音義鬻音育拳求圓反閽音昏守門人也嬴音盈姓也字從女疏注正義曰黃嬴姓國世本文敗黃師于踖陵注踖陵黃地音義踖在亦反一音七略反還及湫有疾注南郡鄀縣東南有湫城音義湫子小反鄀音若夏六月庚申卒鬻拳葬諸夕室注夕室地名音義夕朝夕之夕亦自殺也而葬於絰皇注絰皇冡前闕生守門故死不失職音義絰田結反絰皇闕也疏注正義曰鬻拳自殺以殉當是近墓之地宣十四年傳稱楚子聞宋殺申舟投袂而起屨及於窒皇劒及於寢門之外則窒皇近於門外當是寢門闕也知此絰皇亦是冡前闕也且此人生為大閽職掌守門明此亦是守門示死不失職也餘書無絰皇之名蓋唯楚有此號也初鬻拳强諫楚子楚子弗從臨之以兵懼而從之鬻拳曰吾懼君以兵罪莫大焉遂自刖也楚人以為大閽謂之大伯注若今城門校尉官音義强其丈反大伯音泰校戶教反字從木疏正義曰周禮天官閽人掌守王宮之中門之禁鄭𤣥云閽人司昏晨以啓閉者刑人墨者使守門秋官掌戮墨者使守門刖者使守囿則閽不使刖而鬻拳得為閽者周禮地官之屬有司門下大夫二人掌授管鍵以啓閉國門鄭𤣥云若今城門校尉主王城十二門此注亦云若今城門校尉官然則鬻拳本是大臣楚人以其賢而使典此職非為刑而役之其為大閽者當如地官之司門非天官之閽人亦主晨昏開閉通以閽為名焉謂之大伯伯長也為門官之長也使其後掌之注使其子孫常主此官君子曰鬻拳可謂愛君矣諫以自納於刑刑猶不忘納君於善注言愛君明非臣法也楚能盡其忠愛所以興疏注正義曰何休膏肓云人臣諫君非有死亡之急而以兵臨君開篡弒之路左氏以為愛君於義左氏為短故注言此以釋何休之難初王姚嬖于莊王生子頽注王姚莊王之妾也姚姓也音義姚羊消反嬖必計反頽徒回反子頽有寵蒍國為之師及惠王即位注周惠王莊王孫取蒍國之圃以為囿注圃園也囿苑也音義圃必古反又音布囿音又徐于懋反苑於阮反疏注正義曰冢宰職云園圃育草木鄭𤣥云樹果蓏曰圃園其樊也詩云折栁樊圃成十八年築鹿囿然則圃以蕃為之所以樹果蓏囿則築牆為之所以飬禽獸二者相類故取圃為囿邊伯之宮近於王宮王取之注邊伯周大夫音義近附近之近王奪子禽祝跪與詹父田注三子周大夫音義跪求委反而收膳夫之秩注膳夫石速也秩祿也音義收式周反故蒍國邊伯石速詹父子禽祝跪作亂因蘇氏注蘇氏周大夫桓王奪其十二邑以與鄭自此以來遂不和秋五大夫奉子頽以伐王注石速士也故不在五大夫數不克出奔溫注溫蘇氏邑蘇子奉子頽以奔衛衛師燕師伐周注燕南燕冬立子頽經二十年春王二月夫人姜氏如莒注無傳夏齊大災注無傳來告以大故書天火曰災例在宣十六年疏注正義曰襄九年三十年宋災昭九年陳災十八年宋衛陳鄭災皆不言大知此來告以大故書大也秋七月冬齊人伐戎注無傳傳二十年春鄭伯和王室不克注克能也執燕仲父注燕仲父南燕伯為伐周故音義為伐于僞反下文同疏注正義曰譜亦云南燕伯爵不知所出服䖍亦云南燕伯爵夏鄭伯遂以王歸王處于櫟秋王及鄭伯入于塢注塢王所取鄭邑音義塢烏苦反遂入成周取其寶器而還冬王子頽享五大夫樂及遍舞注皆舞六代之樂音義遍音遍疏注正義曰言樂及遍舞則樂之所有舞悉周遍故知皆舞六代之樂也周禮大司樂以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武鄭𤣥云此周所存六代之樂也傳記所說雲門大卷黃帝也大咸堯也大韶舜也大夏禹也大濩湯也大武周武王也是為六代奏黃鐘歌大呂舞雲門以祀天神奏大簇歌應鐘舞咸池以祭地示奏姑洗歌南呂舞大㲈以祀四望奏㽔賔歌林鐘舞大夏以祭山川奏夷則歌中呂舞大濩以享先妣奏無射歌夾鐘舞大武以享先祖鄭伯聞之見虢叔注叔虢公字曰寡人聞之哀樂失時殃咎必至今王子頽歌舞不倦樂禍也夫司寇行戮注司寇刑官音義樂音洛殃咎上於良反下巨九反君為之不舉注去盛饌音義去起呂反饌仕眷反疏注正義曰周禮膳夫職曰王日一舉鼎十有二物皆有爼以樂侑食大喪則不舉大荒則不舉大札則不舉天地有災則不舉邦有大故則不舉鄭𤣥云殺牲盛饌曰舉襄二十六年傳曰古之治民者將刑為之不舉不舉則徹樂是不舉者貶膳食徹聲樂也而况敢樂禍乎奸王之位禍孰大焉臨禍忘憂憂必及之盍納王乎虢公曰寡人之願也音義奸音干盍胡獵反何不也經二十有一年春王正月夏五月辛酉鄭伯突卒注十六年與魯大夫盟于幽秋七月戊戌夫人姜氏薨注無傳薨寢祔姑赴於諸侯故具小君禮書之音義祔音附疏注正義曰經無所闕禮具可知杜為此注者以先儒之說使莊公絶母子之親故於此明之知母子不絶下葬注亦然冬十有二月葬鄭厲公注無傳八月葬緩慢也傳二十一年春胥命于弭夏同伐王城注鄭虢相命弭鄭地音義弭靣爾反鄭伯將王自圉門入虢叔自北門入殺王子頽及五大夫鄭伯享王于闕西辟樂備注闕象魏也樂備備六代之樂音義圉魚呂反辟蒲歷反疏注正義曰定二年雉門及兩觀災注云兩觀闕也禮運云昔者仲尼與於蠟賔事畢出遊於觀之上鄭𤣥云觀闕也釋宮云觀謂之闕郭璞云宮門雙闕周禮大宰正月之吉縣治象之法于象魏使萬民觀治象鄭衆云象魏闕也哀三年魯災傳稱季桓子御公立于象魏之外命藏象魏曰舊章不可亡也由此言之則觀闕象魏其事一也劉熙釋名云闕在門兩旁中央闕然為道也然則其上縣法象其狀巍巍然高大謂之象魏使人觀之謂之觀也闕西辟者辟是旁側之語也服䖍云西辟西遍也當謂兩觀之內道之西也王與之武公之略自虎牢以東注略界也鄭武公傅平王平王賜之自虎牢以東後失其地故惠王今復與之虎牢河南成臯縣音義復扶又反疏注正義曰孟子云仁政必自經界始昭七年傳曰天子經略諸侯正封封略之內何非君土孟子經界即傳之經略且云封略之內封是竟則知略是界也武公東鄭之始封君也言武公之略則是武公舊竟若其由來不失不須今日復與故知後失其地惠王今復與之隱十一年王取塢劉蒍邗之田于鄭蓋桓王之世失之也原伯曰鄭伯效尤其亦將有咎注原伯原莊公也言效子頽舞遍樂音義效戶教反遍音遍五月鄭厲公卒王巡虢守注巡守於虢國也天子省方謂之巡守音義守音狩本或作狩後放此注同疏注正義曰孟子云諸侯朝天子曰述職天子適諸侯曰巡守守者守也言諸侯為天子守土天子時巡行之易稱后不省方故云天子省方謂之巡守虢公為王宮于玤注玤虢地音義玤蒲項反王與之酒泉注酒泉周邑鄭伯之享王也王以后之鞶鑑豫之注后王后也鞶帶而以鑑為飾也今西方羌胡為然古之遺服音義鞶步干反又蒲官反紳帶也鑑工暫反鏡也疏注正義曰鞶是帶也鑑是鏡也此與定六年傳皆鞶鑑雙言則鞶鑑一物故知以鏡飾帶舉今羌胡之服以明之虢公請器王豫之爵注爵飲酒器鄭伯由是始惡於王注為僖二十四年鄭執王使張本音義惡烏路反又如字使所吏反疏正義曰鄭伯謂厲公子文公也服䖍云鞶鑑王后婦人之物非所以賜有功爵飲酒器王爵也一升曰爵爵人之所貴者言鄭伯以其父得賜不如虢公為是始惡於王積而成怨僖二十四年遂執王使此為彼張本冬王歸自虢注傳言王之偏也經二十有二年春王正月肆大眚注無傳赦有罪也易稱赦過宥罪書稱眚災肆赦傳稱肆眚圍鄭皆放赦罪人蕩滌衆故以新其心有時而用之非制所常故書音義眚所景反蕩音蕩又作蕩滌徒歷反疏注正義曰肆大眚者肆緩也眚過也緩縱大過是赦有罪也大罪猶赦則小罪亦赦之猶今赦書大辟罪以下悉皆原免也易解卦象云雷雨作解君子以赦過宥罪解卦坎下震上震為雷坎為雨雷動雨下而萬物解散故君子以此卦象而放赦有過寬宥罪人也書稱眚災肆赦舜典文孔安國云眚過災害肆緩也過而有害當緩赦之肆眚圍鄭襄九年傳文也此諸言肆眚者皆是放赦罪人蕩滌衆故除其瑕穢以新其心也必其國有大患非赦不解或上有嘉慶須布大恩如是乃行此事故釋例曰天有四時得以成歲雷霆以振之霜雪以齊之春陽以暖之雲雨以潤之然後能相育也天且弗違而况於人乎物不可終否故受之以同人同人者與人同也解天下之至結成天下之亹亹肆大眚之謂也堯曰咨爾舜有罪不敢赦所以須待革命冇時而用之非制所常故書之也杜唯言有時用之亦不知此時何以須赦榖梁傳曰肆大眚為嫌天子之葬也其意言文姜有罪不合以禮而葬若不赦不復書葬嫌天子許之明須赦而後得葬故為赦也賈逵以文姜為有罪故赦而後葬以說臣子也魯大赦國中罪過欲令文姜之過因是得除以葬文姜杜不明說要文姜出奔之日常稱夫人夫人之名未嘗有貶何須以赦除之此赦必不為文姜但夫人以去年七月薨十一月則當合葬乃至此年正月經七月始葬如此遲緩必是國家有事須赦解之但不知其所由耳癸丑葬我小君文姜注無傳反哭成喪故稱小君陳人殺其公子御寇注宣公大子也陳人惡其殺大子之名故不稱君父以國討公子告音義御音禦本亦作禦惡烏路反疏注正義曰傳言大子必是大子也僖五年晉侯殺其世子申生稱君稱世子此不然者釋例曰古者討殺其大夫各以罪狀宣告諸侯所以懲不義重刑戮也晉侯使以殺大子申生之故來告衛殺孔逹傳載其辭辭雖有臨時之狀其告則常也然則殺大夫公子當以罪狀告人此傳不說御寇之罪則陳人不以罪告而經書公子是惡殺大子之名故不稱君父以國討公子告夏五月疏正義曰釋例曰年之四時雖或無事必空書首月以紀時變以明歷數莊公獨稱夏五月及經四時有不具者丘明無文皆闕繆也秋七月丙申及齊高傒盟于防注無傳高傒齊之貴卿而與魯之微者盟齊桓謙接諸侯以崇霸業冬公如齊納幣注無傳公不使卿而親納幣非禮也母喪未再期而圖昏二傳不見所譏左氏又無傳失禮明故音義見賢遍反又如字疏注正義曰釋例曰宋公使華元來聘聘不應使卿故傳但言聘共姬也使公孫夀來納幣應使卿故傳明言其得禮也是納幣當使卿公不使卿親納幣非禮也傳二十二年春陳人殺其大子御寇注傳稱大子以實言陳公子完與顓孫奔齊注公子完顓孫皆御寇之黨音義顓音專顓孫自齊來奔注不書非卿齊侯使敬仲為卿注敬仲陳公子完辭曰羇旅之臣注羇寄也旅客也幸若獲宥及於寬政注宥赦也赦其不間於教訓而免於罪戾弛於負擔注弛去離也音義弛失氏反擔丁暫反離力智反君之惠也所獲多矣敢辱高位以速官謗注敢不敢也音義謗布浪反請以死告注以死自誓詩云翹翹車乘招我以弓豈不欲往畏我友朋注逸詩也翹翹遠貌古者聘士以弓言雖貪顯命懼為朋友所譏責音義翹祁堯反乘繩證反使為工正注掌百工之官飲桓公酒樂注齊桓賢之故就其家會據主人之辭故言飲桓公酒音義飲於鴆反注同樂音洛下注同疏注正義曰春秋之世設享禮以召君者皆大臣擅寵如衛公叔文子宋桓魋之徒始為之耳為之非禮法也敬仲羇旅之臣且知禮者也必不召公臨已知是桓公賢之自就其家會也據敬仲為主人辭故言飲公酒耳公曰以火繼之辭曰臣卜其晝未卜其夜不敢疏正義曰服䖍云臣將享君必卜之示戒愼也此桓公自就其家非敬仲發心請享不得言將享必卜也蓋桓公告其往日乃卜之耳言未卜其夜者詩云厭厭夜飲在宗載考鄭𤣥云考成也夜飲之禮在宗室同姓則成於庶姓讓之則止引此敬仲之事云此之謂不成是言敬仲非齊同姓故不敢也君子曰酒以成禮不繼以淫義也注夜飲為淫樂以君成禮弗納於淫仁也初懿氏卜妻敬仲注懿氏陳大夫龜曰卜音義妻匕計反疏注正義曰曲禮文也周禮大卜掌三兆之法一曰玉兆二曰瓦兆三曰原兆其經兆之體皆百有二十其頌皆千有二百鄭𤣥云兆者灼龜發於火其形可占者其象似玉瓦原之舋鏬是用名之焉原原田也頌謂繇也每體十繇然則卜人所占之語古人謂之為繇其辭視兆而作出於臨時之占或是舊辭或是新造猶如筮者引周易或别造辭卜之繇辭未必皆在其頌千有二百之中也此傳鳯凰于飛下盡莫之與京襄十年傳稱衛卜禦寇姜氏問繇曰兆如山陵有夫出征而喪其雄哀九年傳稱晉趙鞅卜救鄭遇水適火史龜曰是謂沈陽可以興兵利以伐姜不利子商三者皆是繇辭其辭並韻則繇辭法當韻也郭璞撰自所卜事謂之辭林其辭皆韻習於古也其妻占之曰吉注懿氏妻是謂鳯凰于飛和鳴鏘鏘注雄曰鳯雌曰凰雄雌俱飛相和而鳴鏘鏘然猶敬仲夫妻相隨適齊有聲譽音義和如字又户卧反注同鏘七羊反本又作將將疏注正義曰釋鳥云鶠鳯其雌皇郭璞云瑞應鳥說文云鳯神鳥也天老曰鳯之象也鴻前麟後蛇頸魚尾鸛顙鴛思龍文龜背燕頷雞喙五色備舉出於東方君子之國翺翔四海之外過昆崘飲砥柱濯羽弱水莫宿丹穴見則天下大安寧從鳥凡聲鳯飛則羣鳥從之以萬數故古文鳯作朋字山海經云丹穴之山有鳥焉其狀如鶴五采而文名曰鳯皇首文曰德翼文曰順背文曰義膺文曰仁腹文曰信是鳥也飲食則自歌自舞是說鳯皇之狀也鳯皇雄雌俱飛喻敬仲夫妻相隨鏘鏘鳴之聲故以喻有聲譽也有媯之後將育于姜注媯陳姓姜齊姓五世其昌並于正卿八世之後莫之與京注京大也音義並于本或作並為誤疏正義曰五世其昌言其始昌盛也並于正卿位與卿並得為上大夫也莫之與京謂無與之比大言其位最高也五世八世當是卜兆之間有其象傳言其占之辭不言其知之意固非後學所得詳之陳厲公蔡出也注姊妹之子曰出疏注正義曰釋親云男子謂姊妹之子為出言姊妹出嫁而生子也故蔡人殺五父而立之注五父陳他也殺陳他在桓六年音義他大多反生敬仲其少也周史有以周易見陳侯者注周大史也音義少詩照反見如字又賢遍反大音泰疏注正義曰直言周史知是大史者周禮大史掌書昭二年傳稱韓宣子觀書於大史氏此以周易見陳侯故知是大史也以周易見者自以知周易見陳侯言已明易能筮故陳侯使之筮也陳侯使筮之注蓍曰筮音義筮上制反蓍音尸疏注正義曰曲禮文也其揲蓍求卦之法則易繫辭具焉遇觀注坤下巽上觀音義觀古亂反注同之否注坤下乾上否觀六四爻變而為否音義否備矣反注同疏正義曰此注坤下巽上觀坤下乾上否及六四爻變諸如此輩皆據周易之文知之劉炫規過云觀之否者為觀卦之否爻屯之比者屯卦之比爻皆不取後卦之義今刪定以為不然何者以閔元年畢萬筮仕遇屯之比云屯固比入僖十五年晉獻公筮嫁伯姬得歸妹之暌云士刲羊亦無􅎺歸妹上六爻辭又云歸妹睽孤寇張之弧睽之上九爻辭又云歸妹之睽猶無相也昭五年明夷之謙云明夷于飛垂其翼又云謙不足飛不翔此之等類皆取前後二卦以占吉凶今人之筮亦皆如此故賈服及杜並皆同焉劉炫苟異前儒好為别見以規杜氏非也沈云遇者不期而會之名筮者所得卦之吉凶非有宿契逢遇而已故謂之遇劉炫云下體坤坤為地為衆上體巽巽為風為木互體有艮艮為門闕地上有木而為門闕宮室之象宫室而可風化使天下之衆觀焉故謂之觀也下體坤坤為地上體乾乾為天天不下降地不上騰天地不通其氣上下否塞故謂之否也曰是謂觀國之光利用賔于王注此周易觀卦六四爻辭易之為書六爻皆有變象又有互體聖人隨其義而論之音義爻户交反此其代陳有國乎不在此其在異國非此其身在其子孫疏正義曰觀國之光利用賔于王二句周易文也此先云不在此其在異國後云非此其身在其子孫所以在下覆結先云其在後乎後云在異國者其在異國之下更欲演說異國是大嶽姜姓其言稍多且須以結末故進其在後乎於上先解之也庭實旅百以下方解利用賔于王則上句故曰觀國之下未須賔王之句而再言利用賔于王者蓋以觀國之光即是朝王之事直言觀光於文不足故連言賔王但未解賔王之義故於下更重解之傳稱引詩斷章則引易論事亦未必如夲此言觀國之光謂所為筮者觀他人有國之光榮也此有國之人利用為賔客于王朝也其意言見其子孫有國作賔于王家耳非其身也代陳有國言代陳正適子孫有其國家陳滅此興是代之也注正義曰易之為書揲蓍求爻重爻為卦爻有七八九六其七八者六爻並皆不變卦下揔為之辭名之曰彖彖者才也揔論一卦之才德若乾元亨利貞之類皆是也其九六者當爻有變每爻别為其辭名之曰象象者像也指言一爻所像若乾初九潛龍勿用之類皆是也不變者聚而為彖其變者散而為象計每於一卦當畫兩體但以此爻隂陽既同唯變否有異且每爻異辭不可爻作二畫從上可知故不畫二也傳之筮者指取易義不為論卦丘明不畫卦也諸為注者皆言上體下體若其畫卦示人則當不煩此注注亦不畫卦也今書有畫卦者當是後之學者自恐不識私畫以備忘遂傳之耳每爻各有象辭是六爻皆有變象二至四三至五兩體交互各成一卦先儒為之互體聖人隨其義而論之或取互體言其取義無常也光遠而自他有耀者也疏正義曰易稱觀國之光故解其光義言光在此處遠照於他物從他物之上而有明耀者也謂光能遠照於他物有明故下云照之以天光是也坤土也巽風也乾天也風為天於土上山也注巽變為乾故曰風為天自三至四有艮象艮為山音義乾其然反疏正義曰六四之爻位在坤上坤為土地山是土之髙者居於土上是為土上山也又巽變為乾六四變為九四從二至四互體有艮之象艮為山故言山也有山之材而照之以天光於是乎居土上注山則材之所生上有乾下有坤故言居土上照之以天光故曰觀國之光利用賔于王注四為諸侯變而之乾有國朝王之象疏正義曰山則材之所生此人有山之材言其必大富也上天以明臨下照之以天光言天子臨照之也於是乎又居於土上既富矣而被天照又復居有土地是為國君之象也易位四為諸侯變而為乾乾為天子是有國朝王之象故曰觀國之光利用賔于王庭實旅百奉之以玉帛天地之美具焉故曰利用賔于王注艮為門庭乾為金玉坤為布帛諸侯朝王陳摯幣之象旅陳也百言物備音義摰音至本又作贄同疏正義曰覲禮侯氏執圭見王王受圭禮成乃出又入行享禮獻國之所有此說行享禮也旅陳也庭之所實陳有百品言物備也奉之以玉帛謂執玉帛而致享禮被天之照有地之材天子賜之土田國君獻國所有天地之美備具焉朝王之儀畢足矣故曰利用賔于王注正義曰易說卦艮為門闕乾為金玉坤為布帛杜以門內有庭傳言庭實故改言艮為門庭耳杜言諸侯朝王陳贄幣之象者謂陳之以行享禮也覲禮侯氏既見王乃云四享皆束帛加璧庭實唯國所有鄭𤣥云四當為三大行人職曰諸侯廟中將幣皆三享其禮差又無取於四也初享或用馬或用虎豹之皮其次享三牲魚臘籩豆之實龜也金也丹漆絲纊竹箭也其餘無常貨此物非一國所能有唯國所有分為三享皆以璧帛致之禮器云大饗其王事與三牲魚臘四海九州之美味也籩豆之薦四時之和氣也內金示和也束帛加璧尊德也龜為前列先知也金次之見情也丹漆絲纊竹箭與衆共財也其餘無常貨各以其國之所有則致遠物也郊特牲曰旅幣無方所以别土地之宜而節遠邇之期也龜為前列先知也以鍾次之以和居參之也虎豹之皮示服猛也束帛加璧往德也鄭𤣥覲禮之注所言出於彼也杜言贄幣即鄭所謂璧帛也此奉之以玉帛執以致庭實耳其玉帛不入王也覲禮侯氏致享執玉致命王撫之而已不受之也又曰侯氏降授宰幣是庭實之幣皆庭受之唯馬受之於門外耳旅陳釋詁文也百者言其物備也猶有觀焉故曰其在後乎注因觀文以傳占故言猶有觀非在已之言故知在子孫音義觀古亂反疏注正義曰以卦名觀故因觀文以傳占也觀者視他之辭此賔王之事若所為筮者身自當有則不應觀他此卦猶有觀焉觀非在己之言其人觀他有之故知在其子孫也風行而著於土音義著直略反又職略反或作著非疏正義曰服䖍云巽在坤上故為著土也一曰巽為風復為木風吹木實落去更生他土而長育是為在異國故曰其在異國乎若在異國必姜姓也姜大嶽之後也注姜姓之先為堯四嶽疏注正義曰周語稱堯命禹治水共之從孫四嶽佐之胙四嶽國命為侯伯賜姓曰姜氏曰有呂賈逵云共共工也從孫同姓末嗣之孫四嶽官名大嶽也者主四嶽之祭焉然則以其主嶽之祀尊之故稱大也山嶽則配天物莫能兩大陳衰此其昌乎注變而象艮故知當興於大嶽之後得大嶽之權則有配天之大功故知陳必衰疏注正義曰六四爻變為九四與二共為艮象艮為山故知興於山嶽之國姜姓大嶽之後知其將育于姜地之髙者莫過於山詩云嵩髙維嶽駿極于天言其大能至天故山嶽則配天也且乾在上艮在下亦是山嶽配天之象此人子孫養於大嶽之後官尊位貴得大嶽之權則其功德有配天之大然天子其功配天今縱得大嶽之權唯諸侯耳言配天者以其功大故甚言之物莫能兩大此有興兆故名陳必衰也及陳之初亡也注昭八年楚滅陳陳桓子始大於齊注桓子敬仲五世孫陳無宇疏注正義曰史記田完世家完卒諡為敬仲仲生釋孟夷夷生湣孟莊莊生文子須無文子生桓子無宇是為敬仲五世孫也其後亡也注哀十七年楚復滅陳音義復扶乂反成子得政注成子陳常也敬仲八世孫陳完有禮於齊子孫世不忘德德協於卜故傳備言其終始卜筮者聖人所以定猶豫決疑似因生義教者也尚書洪範通龜筮以同卿士之數南蒯卜亂而遇元吉惠伯答以忠信則可臧會卜僭遂獲其應丘明故舉諸縣驗於行事者以示來世而君子志其善者遠者他皆放此音義豫音預本亦作預蒯苦反僭子念反應應對之應縣音𤣥疏注正義曰沈氏云世家桓子生武子啓及僖子乞乞卒子常代之是為田成子是於敬仲為七世言八世者據其相代在位為八世也成子殺簡公專齊政是莫之與大也成子生襄子磐磐生莊子白白生大公和和遷齊康公於海上和立為齊侯和孫威王稱王四世而秦滅之作傳之時完之子孫已盛故傳備言其終始也世家云敬仲之如齊以陳字為田氏左傳終始稱陳田必非敬仲所改未知何時改耳左傳之初至此始有卜筮故杜於此通說之曲禮曰卜筮者先聖王之所以使氏決嫌疑定猶與也是先王立之本意也因而生義教謂教人以行義行善則德協於卜行惡則遇吉反凶必以行義乃可卜也洪範曰汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮謀及卿士而以卜筮同之是通龜筮以同卿士之數也南蒯卜為亂不信則不可臧會卜為僭不信乃遂吉二事相反故特引之言卜筮應人行也南蒯在昭十二年臧㑹在昭二十五年南蒯筮而言卜者卜筮通言耳杜引洪範者欲明龜筮未必神靈故云以同卿士之數言龜筮所見才與卿士同耳又引南蒯者明吉凶由行不由卜筮欲使人修德行不可純信卜筮也又引臧會者吉凶亦由卜筮不可專在於行欲使人敬龜筮也故丘明舉縣驗於行事者以示來世修德行敬龜筮言驗於行事者南蒯則行驗而龜筮不驗臧會則行不驗而龜筮驗言君子志其善者遠者善者謂勸人修德行敬龜筮是也遠者謂舉其大綱勸人為善長久遠道非有臨時應驗此遠者即上善者指其事謂之善指其教謂之遠劉炫云計春秋之時卜筮多矣丘明所載唯二十許事舉其縣驗於行事者其不驗者不載之君子之人當記其志之善者知之遠者他皆放此春秋左傳注疏卷八春秋左氏傳注疏卷八考證宋大水注公使弔之故書吕祖謙曰諸國告則書其顯然為衆所知者亦不待告也春秋之世災異多矣聖人不能盡書特取一二甚者以為世戒傳覆而敗之曰取某師疏哀九年宋皇瑗取鄭師于雍丘臣召南按經文書取某師惟皇瑗及哀十三年鄭罕達取宋師于嵒二文而已實則隱十年宋人蔡人衛人伐戴鄭伯伐取之亦取某師之類也宋萬弒其君捷及其大夫仇牧注萬及仇牧皆宋卿仇牧稱名不警而遇賊無美事可褒臣召南按公羊謂仇牧不畏强禦穀梁謂仇牧為間是也即以左傳考之華督為太宰位在牧上亦為萬所殺而經不書以督舊為弒君之逆賊故削之牧為忠臣故筆之也杜氏之說貶孔父貶仇牧悖理傷教孔疏亦附㑹之信如所云然則孔子春秋成而忠臣義士懼耶不可不辨傳蕭叔大心注叔蕭大夫名趙汸補注曰叔蕭大夫字大心其名也傳兼稱之臣浩按趙氏說足以正杜之失齊侯宋人陳人蔡人邾人㑹于北杏孫覺曰桓公將興霸業諸侯未甚信而桓公欲過為謙故親屈其尊以㑹諸侯之臣也蘇軾曰齊桓始合諸侯以平宋亂自是遂得諸侯故四國皆稱人言衆與之也單伯㑹伐宋注單伯周大夫呂大圭曰單伯周之世族諸侯大夫無稱伯者如毛伯凡伯召伯皆王朝卿士周有單姓魯無單姓經傳固可考也趙汸曰二傳誤以單伯為魯大夫故元年送王姬改送為逆傳齊請師于周陳傅良曰傳見齊初伯禀命天子傳十五年春復㑹焉齊始霸也劉敞權衡曰凡霸者當主諸侯諸侯莫先焉此年秋伐郳宋序齊上明年夏伐鄭宋亦序齊上齊之未主諸侯明矣然則齊始霸在十六年九國同盟于幽之時也臣召南按齊桓之霸基於北杏而成於鄄之再㑹傳言始霸甚確劉氏議之非也宋人齊人衛人伐鄭疏諸侯㑹許男在曺滑之上臣浩按此以下文幽之㑹言當作許男在滑伯之上傳惠王立而復之趙汸補注曰經書葬桓王後王人救衛王姬歸于齊則莊王也單伯㑹伐宋㑹諸侯于鄄命曲沃伯為晉侯則僖王也虢公晋侯鄭伯使原莊公逆王后于陳以後皆惠王事傳遂因氏頜氏臣進賢按頜從合不從令别本作領非也傳實惠后陳傅良曰為王子帶起傅傳公追戎于濟西不言其來諱之也啖助曰書追眀已去而追直書實事有何諱乎傳遂伐黃注黃嬴姓國今弋陽縣臣召南按杜注於地名必具郡縣此惟言縣以弋陽漢屬汝南魏分汝南置弋陽郡晋因之弋陽縣屬弋陽郡故不言郡也傳胥命于弭陳傅良曰傳見桓三年齊衛特書臣召南按齊衛胥命于蒲之外惟此傳有胥命二字時虢鄭相約勤王此美事也先儒疑齊衛相推為侯伯不傳王巡虢守臣浩按是時雖異于方嶽朝㑹之盛然猶有其名也河陽以後無巡守矣傳成子得政朱子曰陳敬仲畢萬季友占筮皆其子孫假託如後世符命之類春秋左氏傳注疏卷八考證
