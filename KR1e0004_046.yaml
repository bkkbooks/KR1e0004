body:
  text: 春秋左傳注疏卷四十六起昭公十三年盡十六年晉杜氏注唐陸德明音義孔頴達疏經十有三年春叔弓帥師圍費注不書南蒯以費叛不以告廟音義費音祕疏注正義曰定八年傳云陽虎入于歡陽關以叛注云叛不書略家臣則此亦為略家臣故不告廟也以不告廟故史不得書二注互相備夏四月楚公子比自晉歸于楚弒其君虔于乾溪注比去晉而不送書歸者依陳蔡以入言陳蔡猶列國也比歸而靈王死故書弒其君靈王無道而弒稱臣比非首謀而反書弒比雖脅立猶以罪加也靈王死在五月又不在乾溪楚人生失靈王故本其始禍以赴之音義溪苦兮反疏注正義曰傳稱依陳蔡人以國許復其國而藉其力故書為歸言是陳蔡納之釋例曰韓魏有耦國之強陳蔡有復國之端故晉趙鞅楚公子比皆稱歸從諸侯納之例言非晉楚之所能制是其義也討靈王無道於國其弒不應稱臣又比為觀從所誑迫脅而立非是弒君首謀而反書比弒君者比歸而王死故書比弒其君比雖被脅而立靈王為比而死雖非比弒猶以弒君之罪加比哀六年注云楚比劫立陳乞流涕子家憚老皆疑於免罪故春秋明而書之以為弒主釋例曰若鄭之歸生齊之陳乞楚公子比雖本無其心春秋之義亦同大罪是以君子慎所以立也其意以為弒君之惡惡之大者雖則本無其心君實由之而死若舍而不責則下無所忌故書其名成其罪所以示來世勵後人為教之逺防也靈王見弒實由無道但欲見比罪故稱臣名非言靈王為有道猶宣二年晉趙盾弒其君夷臯釋例曰傳言靈公不君又以明於例此弒宜稱君也弒非趙盾而經不變文者以示良史之意深責執政之臣彼為章盾之罪稱臣名此亦為章比之罪稱臣名非言靈王不合弒稱君也又傳稱五月王縊于芋尹申亥氏他年申亥以王柩告則靈王死在五月其死又不在乾溪而經書四月比弒其君虔于乾溪者楚人生失靈王告時未知死否但以乾溪之地失王以為王必死矣本其始禍故以四月弒君赴也劉炫云比以四月歸既歸而王死故以云云同楚公子棄疾殺公子比注比雖為君而未列於諸侯故不稱爵殺不稱人罪棄疾疏注正義曰釋例曰諸侯不受先君之命而纂立得與諸侯會者則以成君書之齊商人蔡侯般之屬是也若未得接於諸侯則不稱爵楚公子棄疾殺公子比蔡人殺陳他齊人殺無知衛人殺州吁公子瑕之屬是也諸侯篡立雖以會諸侯為正此列國之制也至於國內策名委質即君臣之分已定故諸殺不稱君亦與成君同義也傳曰會平州以定公位又云若有罪則君列諸會矣此以會為斷也衛州吁齊無知皆弒君自立其死稱人以殺此比亦弒君而立不稱人以殺而云棄疾殺者棄疾利比之位而殺之其意不得為討賊不稱人所以罪棄疾也釋例云比既得國國人驚亂棄疾從而扇之比懼自殺皆棄疾之由故書公子棄疾殺公子比是言不稱弒其君又説罪棄疾之意也秋公會劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于平丘注平丘在陳留長垣縣西南音義垣音袁八月甲戌同盟于平丘注書同齊服故公不與盟注魯不堪晉求讒慝𢎞多公不與盟非國惡故不諱音義與音預注同慝他得反疏注正義曰宣七年公會晉侯云云于黑壤傳曰晉侯之立也公不朝焉又不使大夫聘晉人止公于會盟于黃父公不與盟以賂免故黑壤之盟不書諱之也彼公不與盟諱而不書此書之者彼不相朝聘公實有罪諱國之惡故不書其盟此時公實無罪非是國惡故書而不諱襄三十一年傳曰晉公室卑政在侈家韓宣子為政不能圖諸侯魯不堪晉求讒慝𢎞多是以有平丘之會此年傳云邾人莒人訴于晉曰魯朝夕伐我幾亡矣注云自昭公即位邾魯同好又不朝夕伐莒無故怨訴晉人信之所謂讒慝𢎞多是言晉受讒言公無罪非國惡故不諱也晉人執季孫意如以歸公至自會注無傳蔡侯廬歸于蔡音義廬音盧又力居反陳侯吳歸于陳注陳蔡皆受封于楚故稱爵諸侯納之曰歸疏注正義曰公羊傳曰此皆滅國也其言歸何不與諸侯専封也其意言諸侯不得專封不與楚封陳蔡使若陳蔡之君自有國而歸之然以是故稱爵言歸若言各自有爵非由楚也杜以傳言平王封陳蔡又二君之歸再言禮也則興滅繼絶是為得禮無有不與楚封之事也二者皆是舊國立君紹其先祀襲其封爵爵是先世之爵非楚今始立之故言陳蔡皆受封于楚已立為侯故稱爵以歸國非入國始為君也禮諸侯不生名二君皆書名者稱爵以其受封于楚書名以其未成為君稱名稱爵兩見之也諸侯納之曰歸成十八年傳例冬十月葬蔡靈公注蔡復而後以君禮葬之公如晉至河乃復注晉人辭公吳滅州來注州來楚邑用大師焉曰滅疏注正義曰州來楚邑不繫楚者大都以名通者例皆不繫國用大師焉曰滅襄十三年傳例傳十三年春叔弓圍費弗克敗焉注為費人所敗不書諱之平子怒令見費人執之以為囚俘冶區夫曰非也注區夫魯大夫音義俘芳夫反冶音也區烏侯反一音丘于反疏正義曰非三代服叛之道也若見費人寒者衣之飢者食之為之令主而共其乏困費來如歸南氏亡矣民將叛之誰與居邑若憚之以威懼之以怒民疾而叛為之聚也疏正義曰季氏既執費人人皆憎疾季氏而叛之為南氏之積聚也若諸侯皆然費人無歸不親南氏將焉入矣平子從之費人叛南氏注費叛南氏在明年傳善區夫之謀終言其效音義衣於既反食音嗣共音恭憚待旦反為之聚也于偽反焉於虔反效户孝反楚子之為令尹也殺大司馬薳掩而取其室注在襄三十年音義薳于委反掩於檢反及即位奪薳居田注居掩之族言薳氏所以怨遷許而質許圍注遷許在九年圍許大夫音義質音致蔡洧有寵於王王之滅蔡也其父死焉注楚滅蔡在十一年洧仕楚其父在國故死音義洧于軌反王使與於守而行注使洧守國王行至乾溪音義與音預守手又反申之會越大夫戮焉注申會在四年疏正義曰王肅云越大夫常壽過也申之會經書淮夷而不書越者以常壽過有罪不得列會故不書越也戮者陳其罪惡以徇諸軍言將殺之終亦不殺過至今在楚故怨而作亂王奪鬭韋龜中犫注韋龜令尹子文玄孫中犫邑名音義犫尺州反又奪成然邑而使為郊尹注成然韋龜子郊尹治郊竟大夫音義竟音境蔓成然故事蔡公注蔡公棄疾也故猶舊也韋龜以棄疾有當璧之命故使成然事之音義蔓音萬故薳氏之族及薳居許圍蔡洧蔓成然皆王所不禮也因羣喪職之族啓越大夫常壽過作亂注常壽過申會所戮者音義喪息泿反過古禾反疏正義曰言族者以掩既被殺唯有族存故言族也韋龜成然皆被奪邑所以不數韋龜而獨數成然者以是時韋龜已死故不言之上言奪邑者積王之惡見成然怨恨之深由父子被奪故也易稱善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為以小惡為無傷而弗去也故惡積而不可掩罪大而不可解至於滅身也圍固城克息舟城而居之注息舟楚邑城之堅固者疏正義曰圍固城城之固者克息舟息舟即是其邑也以圍時有所毁故更城而居之觀起之死也其子從在蔡事朝吳注觀起死在襄二十二年朝吳故蔡大夫聲子之子音義從如字朝如字疏注正義曰言故蔡大夫者此時蔡滅見為楚縣吳今在蔡其父先為蔡國大夫故云故蔡大夫聲子之子也曰今不封蔡蔡不封矣我請試之注觀從以父死怨楚故欲試作亂以蔡公之命召子干子晳注二子皆靈王弟元年子干奔晉子晳奔鄭音義晳星曆反及郊而告之情注告以蔡公不知謀強與之盟入襲蔡蔡公將食見之而逃注不知其故驚起辟之音義強其丈反疏正義曰二子聞非蔡公之命欲還故觀從強與之盟遂入襲蔡觀從使子干食坎用牲加書而速行注使子干居蔡公之牀食蔡公之食並偽與蔡公盟之徵驗以示衆已徇於蔡注已觀從也音義已音紀徇似俊反曰蔡公召二子將納之與之盟而遣之矣將師而從之注詐言蔡公將以師助二子蔡人聚將執之注執觀從辭曰失賊成軍而殺余何益乃釋之注賊謂子干子晳也言蔡公已成軍殺已不解罪朝吳曰二三子若能死亡則如違之以待所濟注言若能為靈王死亡則可違蔡公之命以待成敗如何音義為于偽反若求安定則如與之以濟所欲注言與蔡公則可得安定且違上何適而可注言不可違上也上謂蔡公衆曰與之乃奉蔡公召二子而盟于鄧注潁州召陵縣西南有鄧城二子子干子晳依陳蔡人以國注國陳蔡而依之疏正義曰二子更無兵衆唯依倚陳蔡人耳以國者許為復其國以此招慰之楚公子比注子干公子黑肱注子晳音義肱古𢎞反公子棄疾注蔡公蔓成然蔡朝吳帥陳蔡不羹許葉之師因四族之徒注四族薳氏許圍蔡洧蔓成然音義羮音郎葉始涉反以入楚及郊陳蔡欲為名故請為武軍注欲築壘壁以示後人為復讐之名音義壘力軌反壁本亦作辟音璧蔡公知之曰欲速且役病矣請藩而已乃藩為軍注藩籬也音義藩方元反注同離也依字應作籬今作離假借也力知反疏正義曰蔡公知之知陳蔡人之情也蔡公楚之公子猶尚吝惜本國恥有報讐之名築壘以示後世故請藩而已蔡公使須務牟與史猈先入因正僕人殺大子祿及公子罷敵注須務牟史狎楚大夫蔡公之黨也正僕大子之近官音義牟亡侯反猈皮佳反徐扶蟹反又扶移反或扶瞻反本或作音同罷音皮徐甫綺反一音蒲買反疏正義曰正僕人即太僕也周禮下大夫二人公子比為王公子黑肱為令尹次于魚陂注竟陵縣城西北有甘魚陂音義陂彼宜反公子棄疾為司馬先除王宫使觀從從師于乾溪而遂告之注從乾溪之師告使叛靈王且曰先歸復所後者劓注劓截鼻音義劓魚器反截鼻之刑師及訾梁而潰注靈王還至訾梁而衆散音義訾子斯反注同潰户內反王聞羣公子之死也自投于車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠于溝壑矣注擠隊也音義擠子細反説文云排也一音子禮反壑許各反隊直類反王曰余殺人子多矣能無及此乎右尹子革曰請待于郊以聽國人注聽國人之所與王曰衆怒不可犯也曰若入於大都而乞師於諸侯王曰皆叛矣曰若亡於諸侯以聽大國之圗君也王曰大福不再祗取辱焉然丹乃歸于楚注然丹子革棄王而歸楚音義祗音支王沿夏將欲入鄢注夏漢别名順流為沿順漢水南至鄢音義沿以全反夏户雅反漢水也鄢徐於建反一音於晚反入本又作至芋尹無宇之子申亥曰吾父再姦王命注謂斷王旌執人於章華宫音義芋于付反徐又音羽姦音干斷丁管反王弗誅惠孰大焉君不可忍惠不可棄吾其從王乃求王遇諸棘闈以歸注棘里名闈門也音義棘闈音韋孔朝云棘楚邑闈巷門疏注正義曰吳語云昔楚靈王不君其臣針諫不入其民不忍飢勞之殃三軍叛王於乾溪王獨行屏營倣徨於山林之中三日乃見其涓人疇王呼之曰余不食三日矣疇趨而進王枕其股以寢於地王寐疇枕王以塊而去之王覺而無見也乃匍匐將入於棘闈棘闈不納乃入芋尹申亥氏焉孔朝曰棘楚邑闈門也案襄二十六年傳言吳伐楚克棘四年傳言吳伐楚入棘以棘為邑或是也夏五月癸亥王縊于芋尹申亥氏注癸亥五月二十六日皆在乙卯丙辰後傳終言之經書四月誤音義縊之䜴反疏注正義曰此癸亥之日實在乙卯丙辰之後傳先言之者因申亥求王遂言王縊是傳終言之也既以五月統癸亥之日而乙卯丙辰亦是五月之日雖則言有顛倒即令蒙此五月之文也劉炫云杜此注經書四月誤案上經注云靈王實以五月死楚人生失靈王本其始禍以赴兩注不同以為杜非今知不然者以其生失靈王不知死在五月遂以四月始禍言靈王之死是其錯誤之事於文似異義實一也劉以為二文異而規杜氏非也申亥以其二女殉而葬之觀從謂子干曰音義殉似俊反謂子干本或作謂子干曰不殺棄疾雖得國猶受禍也子干曰余不忍也子玉曰人將忍子注子玉觀從吾不忍俟也乃行國每夜駭曰王入矣注相恐以靈王也音義駭户楷反恐丘勇反下同乙卯夜棄疾使周走而呼曰王至矣注周遍也乙卯十八日音義呼好故反下同遍音遍國人大驚使蔓成然走告子干子晳曰王至矣國人殺君司馬將來矣注司馬謂棄疾也言司馬見殺以恐子干君若早自圗也可以無辱衆怒如水火焉不可為謀又有呼而走至者曰衆至矣二子皆自殺注不書弒君位未定也音義弒申志反丙辰棄疾即位名曰熊居葬子干于訾實訾敖注不成君無號諡者楚皆謂之敖音義熊音雄疏注正義曰郟敖與此訾敖皆不成君無號諡也元年傳云葬王于郟謂之郟敖此云葬子干于訾實訾敖並以地名冠敖未知其故又世家楚之先君有若敖霄敖皆在位多年亦稱為敖不知敖是何義殺囚衣之王服而流諸漢乃取而葬之以靖國人使子旗為令尹注子旗蔓成然音義衣於既反旗音其楚師還自徐注前年圍徐之師疏正義曰上云師及訾梁而潰此又云楚師還自徐者上所云者是乾溪援師此謂蕩侯等五子伐徐師故杜云前年圍徐之師吳人敗諸豫章獲其五帥注定二年楚人伐吳師于豫章吳人見舟于豫章而濳師于巢以軍楚師於豫章又柏舉之役吳人舍舟于淮汭而自豫章與楚夾漢此皆當在江北淮水南蓋後徙在江南豫章音義五帥所類反謂蕩侯潘子司馬裻囂尹午陵尹喜五人見賢遍反汭如説反平王封陳蔡復遷邑注復九年所遷邑疏注正義曰成十五年許遷于葉九年傳云遷城父人於陳遷方城外人於許今復還邑則許還復葉方城外與城父人各復其本致羣賂注始舉事時所貨賂音義賂音路施舍寬民宥罪舉職注舉職修廢官音義宥音又召觀從王曰唯爾所欲注觀從教子干殺棄疾今召用之明在君為君之義音義為于偽反對曰臣之先佐開卜乃使為卜尹注佐卜人開龜兆使枝如子躬聘于鄭且致犫櫟之田注犫櫟本鄭邑楚中取之平王新立故還以賂鄭音義櫟力直反事畢弗致注知鄭自説服不復須賂故音義説音悅復扶又反下將復使同鄭人請曰聞諸道路將命寡君以犫櫟敢請命對曰臣未聞命既復王問犫櫟降服而對注降服如今解冠也謝違命曰臣過失命未之致也疏正義曰言臣罪過漏失君命遺忘之未之致與也王執其手曰子毋勤姑歸不榖有事其告子也注王善其有權有事將復使之音義毋音無疏正義曰言子毋以見使為勤勞他年芋尹申亥以王柩告乃改葬之初靈王卜曰余尚得天下注尚庶幾音義柩其久反疏正義曰謂得為天子也不吉投龜詬天而呼曰是區區者而不余畀注區區小天下音義詬本又作詬呼豆反徐許后反呼火故反畀必利反徐甫至反與也余必自取之民患王之無厭也故從亂如歸初共王無冢適注冢大也音義厭於鹽反共音恭適丁歷反下無適音同有寵子五人無適立焉乃大有事于羣望注羣望星辰山川疏注正義曰楚語云天子遍祀羣神諸侯祀天地三辰及其土之山川孔朝云三辰日月星也祀天地謂二王後也非二王後祭分野山川而已又元年傳云辰為商星參為晉星是諸侯得祭分野之星知此羣望是星辰山川也於十二次鶉尾為楚當祀翼軫之星及其國內山川哀六年傳曰江漢睢漳楚之望也其山蓋荆山衡山之類而祈曰請神擇於五人者使主社稷乃遍以璧見於羣望曰當璧而拜者神所立也誰敢違之既乃與巴姬密埋璧於大室之庭注巴姬共王妾大室祖廟音義遍音遍見賢遍反下注微見同巴必加反埋亡皆反大室音泰疏正義曰謂以一璧遍見諸神若神各一璧乃多明無不當其上注正義曰知者襄十二年傳云楚司馬子庚聘于秦為夫人寧禮也秦女是夫人明巴姬是妾使五人齊而長入拜注從長幼以次拜音義齊側皆反本又作齊長丁丈反注及下同康王跨之注過其上也音義跨古化反靈王肘加焉子干子晳皆逺之平王弱抱而入再拜皆厭紐注微見璧紐以為審識音義肘中九反逺于萬反厭於甲反徐又於輒反紐女九反識甲志反又如字鬭韋龜屬成然焉注知其將立故託其子音義屬音燭且曰棄禮違命楚其危哉注棄立長之禮違當璧之命終致靈王之亂子干歸韓宣子問於叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈焉何難注宣子謂棄疾親恃子干共同好惡故言如市賈同利以相求音義賈音古好惡並如字又上呼報反下烏路反下皆倣此對曰無與同好誰與同惡注言棄疾本不與子干同好則亦不得同惡取國有五難有寵而無人一也注寵須賢人而固有人而無主二也注雖有賢人當須內主為應音義應應對之應有主而無謀三也注謀策謀也有謀而無民四也注民衆有民而無德五也注四者既備當以德成子干在晉十三年矣晉楚之從不聞達者可謂無人注晉楚之士從子干遊皆非達人族盡親叛可謂無主注無親族在楚無釁而動可謂無謀注召子干時楚未有大釁音義釁許靳反為羇終世可謂無民注終身羇客在晉是無民亡無愛徴可謂無德注楚人無愛念之者疏正義曰子干之亡楚人無愛念之徴驗也王虐而不忌注靈王暴虐無所畏忌將自亡楚君子干涉五難以弒舊君誰能濟之注言楚借君子干以弒靈王終無能成有楚國者其棄疾乎君陳蔡城外屬焉注城方城也時穿封戍既死棄疾并領陳事苛慝不作盜賊伏隱私欲不違注不以私欲違民事音義苛音何本或作荷音同下同慝他得反民無怨心先神命之注先神謂羣望疏正義曰楚國既封即有三望三望起於先代故曰先神國民信之芉姓有亂必季實立楚之常也獲神一也注當璧拜音義芋彌爾反有民二也注民信之令德三也注無苛慝寵貴四也注貴妃子居常五也注棄疾季有五利以去五難誰能害之子干之官則右尹也數其貴寵則庶子也以神所命則又逺之其貴亡矣注位不尊音義去起吕反數所主反逺于萬反亡矣音無又如字其寵棄矣注父既沒故疏正義曰亡無也其貴位則無矣其寵愛之者又棄矣然則父死棄疾寵亦棄獨言子干者以子干母賤唯恃父寵寵又棄矣則無恃託故専屬子干民無懷焉注非令德國無與焉注無內主將何以立宣子曰齊桓晉文不亦是乎注皆庶賤對曰齊桓衛姬之子也有寵於僖注衛姬齊僖公妾有鮑叔牙賔須無隰朋以為輔佐有莒衛以為外主注齊桓出奔莒衛有舅氏之助有國髙以為內主注國氏髙氏齊上卿疏注正義曰僖十二年傳管仲云有天子之二守國髙在是也從善如流注言其疾也下善齊肅注齊嚴也肅敬也音義下遐嫁反齊側皆反注同不藏賄注清也音義賄乎罪反不從欲注儉也音義從子用反施舍不倦注施舍猶言布恩德求善不厭是以有國不亦宜乎我先君文公狐季姬之子也有寵於獻好學而不二注言篤志音義厭於豔反好呼報反生十七年有士五人注狐偃趙衰顛頡魏武子司空季子五士從出音義衰初危反頡户結反從才用反有先大夫子餘子犯以為腹心注子餘趙衰子犯狐偃有魏犫賈他以為股肱注魏犫魏武子也稱五人而説四士賈他又不在本數蓋叔向所賢音義他徒何反疏注正義曰上言五人直舉其數下説四士獨據有賢也五人內不數賈他者他以公族從文公不在五人之數也蓋叔向言之意所將為賢即言之有齊宋秦楚以為外主注齊妻以女宋贈以馬楚王享之秦伯納之音義妻七計反有欒郤狐先以為內主注謂欒枝郤縠狐突先軫也音義欒魯官皮郤火逆反縠户木反亡十九年守志彌篤惠懷棄民注惠公懷公不恤民也民從而與之獻無異親民無異望注獻公之子九人唯文公在天方相晉將何以代文此二君者異於子干共有寵子國有奧主注謂棄疾也音義相息亮反下同共音恭奧烏報反疏正義曰室內西南隅謂之奧奧是內之義奧主國內之主故謂棄疾也無施於民無援於外去晉而不送歸楚而不逆何以冀國注傳言子干所以蒙弒君之名棄疾所以得國音義施式䜴反晉成虒祈注在八年音義虒音斯諸侯朝而歸者皆有二心注賤其奢也為取郠故注取郠在十年音義為于偽反郠亡杏反晉將以諸侯來討叔向曰諸侯不可以不示威注知晉德薄欲以威服之乃並徴會告于吳秋晉侯會吳子于良注下邳有良城縣音義邳皮悲反水道不可吳子辭乃還注辭不會疏正義曰吳地水行故謂水道不可謂水路不通吳子既辭晉侯乃還向平丘之會七月丙寅治兵于邾南甲車四千乘注三十萬人音義乘繩證反下及注皆同羊舌鮒攝司馬注鮒叔向弟也攝兼官也音義鮒音附遂合諸侯于平丘子産子大叔相鄭伯以會子産以幄幕九張行注幄幕軍旅之帳音義幄於角反幕音莫四合象宫室曰幄在上曰幕疏正義曰周禮幕人掌帷幕幄帟綬之事鄭玄云王出宫則有是事在旁曰帷在上曰幕皆以布為之四合象宫室曰幄王所居之帳也帟王在幕若幄中坐上承塵幄帟皆以繒為之凡四物者以綬連繫焉然則幕與幄異幕大而幄小幄在幕下張之幄幕九張蓋九幄九幕也子大叔以四十既而悔之每舍損焉及會亦如之注亦九張也傳言子産之適宜大叔之從善次于衛地叔鮒求貨於衛淫芻蕘者注欲使衛患之而致貨音義芻初俱反説文云割草也蕘如遙反飼牲曰芻草薪曰蕘疏正義曰周禮充人掌繫祭祀之牲牷祀五帝則繫于牢芻之三月説文云蕘薪也從草然則芻者飼牛馬之草也蕘者共燃火之草也衛人使屠伯饋叔向羮與一篋錦注屠伯衛大夫音義屠音徒饋其位反篋若協反曰諸侯事晉未敢攜二况衛在君之宇下注屋宇之下喻近也而敢有異志芻蕘者異於他日敢請之注請止之叔向受羮反錦注受羮示不逆其意且非貨曰晉有羊舌鮒者瀆貨無厭注瀆數也音義瀆徒木反厭於鹽反數音朔亦將及矣注將及禍為此役也注役事也音義為如字或于偽反疏正義曰言叔鮒為此淫芻蕘之事也子若以君命賜之其已客從之未退而禁之注禁芻蕘者晉人將尋盟齊人不可注有二心故晉侯使叔向告劉獻公注獻公王卿士劉子曰抑齊人不盟若之何對曰盟以底信注底致也音義底音旨君茍有信諸侯不二何患焉告之以文辭董之以武師雖齊不許君庸多矣注董督也庸功也討之有辭故功多也疏注正義曰釋詁云董督正也是董為督也又云庸勞勞亦功也討之有辭則前敵易克故功多也天子之老請帥王賦元戎十乘以先啓行注天子大夫稱老元戎戎車在前者啓開也行道也疏正義曰上注云獻公王卿士此注云天子大夫稱老老者是大夫之總名詩云方叔元老毛傳云方叔卿士命而為將是卿士稱老也曲禮云五官之長曰伯自稱於諸侯曰天子之老彼謂三公也如彼文則三公乃得稱天子之老卿亦得稱老者彼説三公之事言三公之自稱耳不言卿之自稱不得同三公也曲禮又云諸侯使人於諸侯使者曰寡君之老諸侯之使尚得稱老明知天子之卿得稱天子之老也詩小雅六月之篇也元大也大戎戎車之大在軍前者也啓開行道常訓耳遲速唯君注欲佐晉討齊叔向告于齊曰諸侯求盟已在此矣今君弗利寡君以為請對曰諸侯討二則有尋盟若皆用命何盟之尋注托用命以拒晉叔向曰國家之敗有事而無業事則不經注業貢賦之業有業而無禮經則不序注須禮而有次序有禮而無威序則不共注禮須威嚴而後共有威而不昭共則不明注威須昭告神明而後信義著不明棄共百事不終所由傾覆也注信義不明則棄威不威棄禮無禮無經無經無業故百事不成音義覆芳服反是故明王之制使諸侯嵗聘以志業注志識也嵗聘以修其職業間朝以講禮注三年而一朝正班爵之義率長幼之序音義間間厠之間長丁丈反再朝而會以示威注六年而一會以訓上下之則制財用之節再會而盟以顯昭明注十二年而一盟所以昭信義也凡八聘四朝再會王一巡守盟于方嶽之下音義守手又反嶽音嶽志業於好注聘也音義好呼報反下注同好同講禮於等注朝也示威於衆注會也昭明於神注盟也自古以來未之或失也存亡之道恆由是興晉禮主盟注依先王先公舊禮主諸侯盟懼有不治奉承齊犧注齊盟之犧牲音義治直吏反舊如字犧許宜反而布諸君求終事也注終竟也君曰余必廢之何齊之有唯君圗之寡君聞命矣疏正義曰叔向此言論聘朝會盟四事意在言盟并説會朝聘為次序耳國家之所以敗也有交好之事而無貢賦之業交好之事不得常矣有貢賦之常而無上下之禮事雖有常則不次序矣有上下之禮而無可畏之威雖有次序則不共敬矣有可畏之威而不昭告神明雖為共敬則不明著矣信義不明棄共敬也承事不共敬棄次序也班位不序棄常度也徴命不常棄事宜也事既棄矣則百事不終國家所由傾覆只為此也聖人知其不可是故明王之制使諸侯每嵗令大夫一聘天子以志識貢賦之業間一嵗諸侯親自入朝以講習上下之禮天子於諸侯再朝而一大會以示可畏之威再會而一為盟誓以顯諸侯之昭明者也志識貢賦之業在於交好故使聘也講習上下之禮在於等差故使朝也示可畏之威在於衆聚故為會也昭明德之信在於告神故為盟也自古以來遵行此法未之有失也國家存亡之道恆由是興為之則存廢之則亡存亡起於此也今晉以先王之禮主諸侯之盟懼諸侯之事有不治禮者奉承齊盟所用之犧牲以來至此而布諸齊君求終竟盟約之事也君言曰今余必廢之何齊盟之有必如此語唯君自圖謀之寡君聞君之命矣言晉知齊必背盟即欲與之戰注正義曰下句覆述此事云嵗聘以志業每年聘者所以共貢賦耳知此業者是貢賦之業也下又云志業於好説聘事而謂之好則好謂交好諸侯天子雖尊卑不同亦是交好然則有事者謂有交好之事也不經者經訓常也謂交好不常也或聘不以時或貢賦不充是不常也昭亦明也昭為昭告神祗明謂信義明著言會雖示威威猶未著必須昭告神明以要束其心而後天子信義始得明著於天下矣杜以信義不明威無可畏則是棄威也不畏威則禮不行是棄禮也無禮則無經無經則無業故百事所以不成劉炫以此傳四文皆緣上事而致下事其上則事業禮威所致則經序共明傳既言不明棄共自然當云不共棄序不序棄經不經棄事今杜云不明則棄威不威棄禮無禮無經無經無業以杜違背傳文而規杜失今知劉義非者杜以不明棄共不共棄序不序棄經不經棄事自是傳文分明但傳云百事不終明知非徒棄共棄序其威禮亦棄也杜與傳共為表裏非是違傳劉不解杜意妄為規過謬矣志是記識故為識也嵗嵗使於天子所以獻其貢賦令諸國各自記其職貢是修其職業也間朝者據聘為言也既云嵗聘因從聘嵗為始更間一年乃朝故知間朝是三年而一朝也朝以正班爵之義率長幼之序與下注會以訓上下之則制財用之節皆莊二十三年傳文也顯昭明三字皆為明也十二年而為一盟者大明黜陟之法諸侯之有明德者表顯升進之於此盟以光顯諸侯有昭明之德者告誓神明所以昭明王之信義以示黜陟必有信也計此十二年間凡八聘四朝再會一盟方嶽之下也尚書周官曰六年五服一朝又六年王乃時巡考制度于四嶽諸侯各朝于方嶽大明黜陟如彼文六年五服諸侯一時朝王即此再朝而會是也此傳之文與尚書正合杜言巡守盟于方嶽暗與彼義符同明此是周典之舊法也而周禮之文不載此法大行人云侯服嵗一見其貢祀物甸服二嵗一見其貢嬪物男服三嵗一見其貢器物采服四嵗一見其貢服物衛服五嵗一見其貢材物要服六嵗一見其貢貨物先儒説周禮者皆以彼為六服諸侯各以服數來朝與此傳文無由得合先達通儒未有解者古書亡滅不可備知然則尚書周官是成王號令之辭尚書之言定是正法左氏復與彼合言必不虛周禮又是明文不得不信蓋周公成王之時即自有此二法也又周禮每嵗一見唯言貢物何必見者即是親朝各計道路長短或當遣使貢耳先儒謂彼為朝未有明據大行人又云十有二嵗王巡守殷國巡守之嵗周禮同於尚書六年一朝尚書何以違禮又大宗伯云時見曰會殷見曰同鄭玄以為時見無常期也諸侯有不順服者王將有征討之事合諸侯而命事焉十二嵗王如不巡守則六服盡朝謂之殷見鄭以時見無常期者出自鄭之意耳非有明文可據也殷見是此再會而盟時見當此再朝而會未必即如鄭説時見為無常期也蓋此傳及尚書是正禮也大行人嵗一見者是遣使貢物非親朝也今此上聘朝會雖以為諸侯於天子之禮然諸侯相朝亦當然也故云志業於好講禮於等示威於衆其昭明於神雖天子於諸侯之禮然王官之伯及霸主亦得與諸侯為盟故晉為盟主以此告齊令齊受盟也必知此朝聘文兼諸侯者以釋例引明王之制八聘四朝云文襄之制因而簡之三嵗而聘五嵗而朝以諸侯為文明嵗聘間朝兼諸侯相朝也知盟年朝會俱行者以傳云再朝而會云云故知盟年朝會不廢也又云嵗聘以志業不言再聘以行朝故知朝年不行聘禮但以朝聘君臣不等盟會敵禮相當故朝年不行聘盟年得有朝會知有盟者傳云同盟至故也齊人懼對曰小國言之大國制之敢不聽從既聞命矣敬共以往遲速唯君叔向曰諸侯有間矣注間隙也疏正義曰申上不用尋盟之意也其意是小國言之可不可則大國制之也大國謂其須盟言已不敢違也不可以不示衆八月辛未治兵注習戰建而不斾注建立旌旗不曳其斾斾遊也音義斾步貝反疏注正義曰釋天云緇廣充幅長尋曰旐繼旐曰斾郭璞曰帛續旐末為燕尾者然則旐謂旗身斾謂旗尾斾綴於旐本是相連之物非别體也而不曳其斾當纒繼於干頭蓋如禮記所云德車結旌也釋天又云練旒九周禮所謂九遊七遊遊即是斾故云斾遊也然郭氏既云斾繼於旐今之燕尾即斾是旐末然天子十有二遊并屬於一幅之廣於理不可蓋遊數多者旁綴於縿如今之旗是也其軍前之斾如郭璞之説壬申復斾之諸侯畏之注軍將戰則斾故曳斾以恐之音義復扶又反恐丘勇反下並同疏注正義曰本作斾者為舒而曳之以為容師結之為非常曳之為得常復斾之者曳之為復常也軍法戰則舒斾晉人舒斾似其將戰故曵斾以恐之諸侯見其曳斾而皆畏之邾人莒人訴于晉曰魯朝夕伐我幾亡矣注自昭公即位邾魯同好又不朝夕伐莒無故怨訴晉人信之所謂讒慝𢎞多音義訴音素朝夕如字注同幾音祈疏注正義曰三年傳穆子云曹滕二邾實不忘我好又無相伐之事是昭公即位邾魯同好也不朝夕伐莒者案元年十年再伐莒耳是不朝夕伐也我之不共魯故之以注不共晉貢以魯故也音義共音恭注及下注同晉侯不見公使叔向來辭曰諸侯將以甲戌盟寡君知不得事君矣請君無勤注託謙辭以絶魯子服惠伯對曰君信蠻夷之訴注蠻夷謂邾莒以絶兄弟之國棄周公之後亦惟君寡君聞命矣叔向曰寡君有甲車四千乘在雖以無道行之必可畏也況其率道其何敵之有牛雖瘠僨於豚上其畏不死注僨仆也音義瘠在亦反僨方問反仆音付一音蒲卜反疏注正義曰前覆曰仆言牛倒豚上豚必死也言牛雖瘠者謂魯以晉為無德輕之故以瘦牛自喻南蒯子仲之憂其庸可棄乎注棄猶忘也若奉晉之衆用諸侯之師因邾莒杞鄫之怒注四國近魯數以小事相忿鄫已滅其民猶存故并以恐魯音義鄫才陵反近附近之近數音朔以討魯罪間其二憂注因南蒯子仲二憂為間隙何求而弗克魯人懼聽命注不敢與盟音義與音預下文不與同甲戌同盟于平丘齊服也注經所以稱同令諸侯日中造于除注除地為壇盟會處音義造七報反壇本或作墠音善處昌慮反癸酉退朝注先盟朝晉音義先悉薦反子産命外僕速張於除注張幄幕子大叔止之使待明日及夕子産聞其未張也使速往乃無所張矣注地已滿也傳言子産每事敏於大叔及盟子産爭承注承貢賦之次疏注正義曰承者奉上之語後承前下承上故以承為次爭貢賦之次言所出貢賦多少之次當承何國之下故言爭承也鄭衆云爭所當承貢賦之輕重曰昔天子班貢輕重以列注列位也列尊貢重周之制也注公侯地廣故所貢者多疏注正義曰周禮大司徒云公地方五百里其食者半侯地方四百里伯地方三百里其食者叄之一子地方二百里男地方百里其食者四之一鄭康成注云食者必足其國禮俗喪紀祭祀之用乃貢其餘上公之地以一易侯伯之地以再易子男之地以三易是上公優饒其半以為荒萊之地侯伯優饒其三分之二子男優饒其四分之三是大國優饒少而出貢多小國優饒多而出貢少假令大國小國其地美惡一種則地多者貢多地少者貢少故杜云公侯地廣所貢者多是也卑而貢重者甸服也注甸服謂天子畿內共職貢者疏注正義曰禹貢云五百里甸服孔安國云規方千里之內謂之甸服為天子服治田去王城靣五百里王制云千里之內曰甸鄭玄云服治田出榖稅是甸服謂天子畿內也畿內於京師路近令其共王職貢故貢重也言卑而貢重者畿內有公卿大夫之采邑公八命卿六命大夫四命其列位卑於畿外公侯伯子男也周禮小司徒鄭注云井田之法備於一同今止於都者采地食者皆四之一其制三等百里之國凡四都一都之田稅入於王五十里之國凡四縣一縣之田稅入於王二十五里之國凡四甸一甸之田稅入於王食采者卑與尊同故云卑而貢重也畿外之國則卑者貢輕尊者貢重鄭伯男也而使從公侯之貢注言鄭國在甸服外爵列伯子男不應出公侯之貢疏注正義曰鄭伯男也舊自多説鄭衆服虔云鄭伯爵在男服也周禮男服在三距王城千五百里鄭去京師不容此數賈逵云男當作南謂南靣之君也子産爭國小貢重輒言鄭伯為南靣之君復何所益南靣君者豈貢得輕乎鄭玄云男謂子男也周之舊俗雖為侯伯皆食子男之地鄭之此言不知所出鄭食子男之地不知復在何時武公既遷東鄭并十邑為國不得食子男之地若西鄭之時食子男之地則今為大國自當貢重子産不得逺言上世國小以距今之貢重晉之朝士焉有受屈而自日中以爭至于昏乎原此諸説悉皆不通周語云鄭伯男也王而卑之是不尊貴也王肅注此與彼皆云鄭伯爵而連男言之猶言曰公侯足句辭也杜用王説言鄭國在甸服之外其爵列於伯子男言己爵卑國小不應出公侯之貢也今使從公侯之貢懼弗給也諸侯地有五等命有三等伯居五等之中與侯同受七命據地小大分為二等則侯同於公伯同子男僖九年在喪之例云公侯曰子言不及伯是不得同於侯也僖二十九年大夫會國君之例云在禮卿不會公侯會伯子男可也是伯國下同子男也子産自言其君爵卑下引子男為例故云鄭伯男也懼弗給也敢以為請諸侯靖兵好以為事注靖息也音義好呼報反行理之命注行理使人通聘問者音義使所吏反無月不至疏正義曰言晉國使人來責貢賦之命無月不至於鄭每月皆來也貢之無藝注藝法制疏注正義曰服虔云藝極也一曰常也二者並非正訓杜以藝為經藝故為法制也貢有法制定數徴求無限則不可共也小國有闕所以得罪也諸侯修盟存小國也貢獻無極亡可待也存亡之制將在今矣疏正義曰極謂限極無極謂無己時自日中以爭至于昏晉人許之既盟子大叔咎之曰諸侯若討其可瀆乎注瀆易也音義咎其九反易以䜴反疏正義曰言諸侯若來討鄭其可不由子輕易晉乎子産曰晉政多門注政不出一家二偷之不暇何暇討注二不一偷茍且疏正義曰政出多門則其情不一情既不一則各懷茍且各自茍且免於目前無人為國逺慮也為此二心為此茍且不有間暇何暇來討鄭乎國不競亦陵何國之為注不競爭則為人所侵陵不成為國音義爭爭鬬之爭下爭競同公不與盟注信邾莒之訴欲討魯故晉人執季孫意如以幕蒙之注蒙裹也音義裹音果使狄人守之疏正義曰有北狄之人從晉師來會故使狄人守之猶如長岸之戰楚使隨人守舟司鐸射注魯大夫音義鐸待洛反射食亦反又食夜反懷錦奉壺飲冰以蒲伏焉守者御之乃與之錦而入注蒲伏竊往飲季孫冰箭筒蓋可以取飲音義奉芳勇反蒲夲又作匍同步都反又音扶本亦作扶伏本又作匐同蒲北反又音服守手又反又如字御魚吕反飲於鴆反筒音童又音勇疏注正義曰蒲伏即匍匐也説文匍手行也匐伏地也詩陳后稷之初生云誕實匍匐今司鐸射竊往飲季孫之所似小兒伏地而手行冰是箭筒之蓋相傳為然夲作此器以蓋箭筒脫而用之可以取飲此以壺盛飲用此冰以飲之晉人以平子歸子服湫從注湫子服惠伯從至晉音義湫子小反徐音椒又子烏反案子服湫又作子服椒止一人耳從才用反注同子産歸未至聞子皮卒哭且曰吾已注已猶決竟無為為善矣唯夫子知我注言子皮知己之善疏正義曰子産言我此日行善唯子皮知之今子皮既卒無人知我之善故云無為更須為善矣仲尼謂子産於是行也足以為國基矣詩曰樂只君子邦家之基注詩小雅言樂只君子為治乃國家之基本音義治直吏反子産君子之求樂者也且曰合諸侯藝貢事禮也注嫌爭競不順故以禮明之疏正義曰此詩小雅南山有臺之篇詩云樂只君子以其能為邦家之基也今子産是君子之人所求樂者也仲尼且復言曰盟主會合諸侯限藝貢賦之事使貢賦有常是為禮也盟主制定貢賦是為得禮則子産爭之不為有失嫌爭競無禮故以禮明之鮮虞人聞晉師之悉起也注五年傳曰遺守四千今甲車四千乘故為悉起而不警邊且不修備注言夷狄無謀音義警音景晉荀吳自著雍以上軍侵鮮虞及中人驅衝競注中山望都縣西北有中人城驅衝車與狄爭逐疏正義曰上云悉起得有上軍在者晉侯從平丘會還行至著雍聞鮮虞不警遂使荀吳侵之非從本國而去故云自著雍以上軍侵鮮虞也大獲而歸注為十五年晉伐鮮虞起楚之滅蔡也靈王遷許胡沈道房申於荆焉平王即位既封陳蔡而皆復之禮也注滅蔡在十一年許胡沈小國也道房申皆故諸侯楚滅以為邑荆荆山也傳言平王得安民之禮汝南有吳防縣即防國疏注正義曰此乃遷動而云安者以狐死首丘人生戀舊往彼靈王逼徙元情悉眷故居平王今復從其所欲民心獲安故云得安民之禮也隱大子之子廬歸于蔡禮也注隱大子大子有也廬蔡平侯悼大子之子吳歸于陳禮也注悼大子偃師也吳陳惠公冬十月葬蔡靈公禮也注國復成禮以葬也此陳蔡事傳皆言禮嫌楚所封不得比諸侯故明之公如晉荀吳謂韓宣子曰諸侯相朝講舊好也執其卿而朝其君有不好焉不如辭之乃使士景伯辭公于河注景伯士文伯之子彌牟也音義舊好呼報反吳滅州來令尹子期請伐吳王弗許曰吾未撫民人未事鬼神未修守備未定國家而用民力敗不可悔州來在吳猶在楚也子姑待之注傳言平王所以能有國音義守手又反季孫猶在晉子服惠伯私於中行穆子注私與之語曰魯事晉何以不如夷之小國魯兄弟也土地猶大所命能具若為夷棄之使事齊楚其何瘳於晉注瘳差也音義為于偽反下為夷將為同瘳敕留反差初賣反親親與大賞共罰否所以為盟主也子其圖之諺曰臣一主二注言一臣必有二主道不合得去事他國音義諺音彥吾豈無大國注言非獨晉可事穆子告韓宣子且曰楚滅陳蔡不能救而為夷執親將焉用之乃歸季孫惠伯曰寡君未知其罪合諸侯而執其老注老尊卿稱音義焉於虔反稱尺證反若猶有罪死命可也注死晉命也若曰無罪而惠免之諸侯不聞是逃命也何免之為請從君惠於會注欲得盟會見遣不欲私去宣子患之謂叔向曰子能歸季孫乎對曰不能鮒也能注鮒叔魚乃使叔魚叔魚見季孫曰昔鮒也得罪於晉君自歸於魯君注蓋襄二十一年坐叔虎與欒氏黨并得罪音義坐才臥反微武子之賜不至於今注武子季平子祖父雖獲歸骨於晉猶子則肉之敢不盡情歸子而不歸鮒也聞諸吏將為子除館於西河注西使近河音義近附近之近其若之何且泣注泣以信其言平子懼先歸惠伯待禮注待見遣之禮春秋左傳注疏卷四十六春秋左氏傳注疏卷四十六考證叔弓帥師圍費陸淳曰凡家臣以邑叛悉不書叛人之名何也曰家臣微賤名不合登于史册也但書大夫圍之則邑叛可知矣克之不書本非他國之邑也臣召南按此説較杜注不以告廟為長經書盜竊寶玉大弓寧告廟乎同盟于平丘孫復曰自宋之會諸侯不出大夫專盟會者十年至申之會楚子專盟會者又十年今晉昭乘楚亂與劉子合諸侯此固不足道也自是迄會召陵諸侯復不出者二十四年蔡侯廬歸于蔡陳侯吳歸于陳注陳蔡皆受封于楚故稱爵林堯叟曰書陳侯蔡侯不與楚專封也歸辭有三突歸于鄭篡公子之辭也衛侯鄭歸于衛嘗失國之君之辭也蔡季自陳歸于蔡宜得國公子之辭也此未嘗有國也使之如失國辭然者不與楚專封也臣浩按杜注未協林氏説本二傳得之傳若入于大都而乞師于諸侯林堯叟曰大都如陳蔡不羮許葉之屬臣召南按楚世家作入于大縣傳平王封陳蔡疏成十五年許遷于葉九年傳云遷城父人於陳一段臣召南按各夲皆同但推尋文勢脫許遷城父一節則下所云遷邑復還者無根矣或疑九年之下脫去許遷於夷四字傳云之下脫去實城父三字傳再會而盟以顯昭明趙汸補注曰叔向言朝聘之節大數與周禮不合蓋東遷後典籍散失士大夫亦無所折衷臣照按周禮固成周遺制所存顧其書亦是漢儒編輯舊聞所成王莾劉歆更竄入己意託之周公以便其私其與左傳不符處不得據以疑傳也傳建而不斾注斾遊也臣浩按遊也應作斿也字形相似而誤傳行理之命注行理使人通聘問者臣召南按古字理李通用行理之命即行李之命也傳鮮虞人聞晉師之悉起也注一段臣召南按五年傳曰遺守四千是言以十縣之千乘攻戰也今甲車四千乘則晉人遺守者尚一千乘傳晉荀吳自著雍以上軍侵鮮虞臣召南按平丘之會不敘三軍以將佐無所改而知躒之佐下軍又見于前傳也此傳荀吳以上軍則佐上軍之魏舒亦在矣傳楚之滅蔡也靈王遷許胡沈道房申于荆焉注汝南有吳防縣即防國臣召南按防國應作房國且吳防縣在漢志亦作吳房縣注孟康曰夲房子國楚靈王遷房于楚是也春秋左氏傳注疏卷四十六考證
