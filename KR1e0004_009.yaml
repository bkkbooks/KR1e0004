body:
  text: 春秋左傳注疏卷九起莊公二十三年盡三十二年晉杜氏注唐陸德明音義孔穎達疏經二十有三年春公至自齊注無傳祭叔來聘注無傳榖梁以祭叔為祭公來聘魯天子內臣不得外交故不言使不與其得使聘音義祭側界反為于僞反疏注正義曰諸言聘者皆言某侯使某來聘此不言使左氏無傳故取榖梁為說穀梁傳云其不言使何也天子之內臣也不正其外交故不與使也然則言內臣不得外交必是畿內之國畿內之國非唯祭耳傳不言為祭公來聘杜言為祭公來聘者但祭叔連祭為文必是祭人虞叔是虞公之弟此祭叔或是祭公之弟故以為為祭公來聘天子內臣不得外交諸侯故不言使不與其得使聘也魯受其聘行其禮故書聘耳二十五年陳女叔來聘嘉之故不名此無可嘉亦稱叔者杜意叔為名為字無以可知故不明言夏公如齊觀社注齊因祭社搜軍實故公往觀之疏注正義曰魯語說此事云夫齊棄太公之法而觀民於社孔朝云聚民於社觀戎器也襄二十四年傳稱楚子使薳啓疆如齊齊社搜軍實使客觀之知此亦然故公往觀之釋例曰凡公出朝聘奔喪㑹葬皆但書而不言其事此春秋之常然則喪葬常事故不書觀社非常故特書公至自齊注無傳荆人來聘注無傳不書荆子使某來聘君臣同辭者蓋楚之始通未成其禮疏注正義曰釋例曰楚之君臣最多混錯此乃楚之初興未間周之典禮告命之辭自生同異楚武王熊達始居江漢之間然猶未能自同列國故稱荆敗蔡師荆人來聘從其所居之稱而總其君臣是言楚之始通未成其禮之意言君臣同辭者此云荆人來聘是臣來也僖二十一年楚人使宜申來獻捷言使則是君也而經亦書楚人是君臣同辭公及齊侯遇于穀注無傳音義穀音谷蕭叔朝公注無傳蕭附庸國叔名就穀朝公故不言來凡在外朝則禮不得具嘉禮不野合疏注正義曰無爵而稱朝知是附庸國也邾儀父貴之乃書字此無所貴知叔為名也公羊傳曰其言朝公何公在外也文連遇于穀是就榖朝公穀是齊地故不言來也定十四年大搜于比蒲邾子來㑹公比蒲魯地故言來也穀梁傳曰朝於廟正也於外非正也是言在外行朝則禮不得具定十年傳稱嘉樂不野合知嘉禮亦不野合嘉禮謂善禮非五禮之嘉也朝於五禮屬賔秋丹桓宮楹注桓公廟也楹柱也音義楹音盈冬十有一月曹伯射姑卒注無傳未同盟而赴以名音義射示亦反又音亦十有二月甲寅公㑹齊侯盟于扈注無傳扈鄭地在滎陽卷縣西北音義扈音户卷音權字林丘權反韋昭丘云反說文丘粉反傳二十三年夏公如齊觀社非禮也曹劌諫曰不可夫禮所以整民也故㑹以訓上下之則制財用之節注貢賦多少朝以正班爵之義帥長幼之序征伐以討其不然注不然不用命音義長丁丈反疏正義曰夫禮者所以整理天下之民民謂氓庶貴賤者皆是也諸侯㑹聚所謀皆是尊王室修臣禮故㑹以訓上下之則以諸侯事天子訓在下事其君也於㑹必號令諸國出貢賦多少即是制財用之節度也禮使小國朝大國是朝以正班爵之等義也爵同則小國在下是帥長幼之次序也諸侯之序以爵不以年此言長幼謂國大小也沈氏云爵同者據年之長幼故云帥長幼之序不朝不㑹則征討之故言征伐以討其不然諸侯有王注從王事王有巡守注省四方以大習之注大習㑹朝之禮非是君不舉矣君舉必書注書於策書而不法後嗣何觀晉桓莊之族逼注桓叔莊伯之子孫彊盛逼迫公室音義逼彼力反獻公患之士蒍曰去富子則羣公子可謀也已注士蒍晉大夫富子二族之富彊者音義蒍于委反去起吕反下同公曰爾試其事士蒍與羣公子謀譖富子而去之注以罪狀誣之同族惡其富彊故士蒍得因而間之用其所親為譖則似信離其骨肉則黨弱羣公子終所以見滅音義惡烏路反間間厠之間秋丹桓宮之楹經二十有四年春王三月刻桓宮桷注刻鏤也桷椽也將迎夫人故為盛飾音義刻音克桷音角字林云齊魯謂榱為桷椽直專反疏注正義曰釋器云金謂之鏤木謂之刻刻木鏤金其事相類故以刻為鏤也桷謂之榱榱即椽也榖梁傳曰刻桷非正也夫人所以崇宗廟也取非禮與非正而加之於宗廟以飾夫人非正也刻桓宮桷丹桓宮楹斥言桓宮以惡莊也是言丹楹刻桷皆為將逆夫人故為盛飾葬曹莊公注無傳夏公如齊逆女注無傳親逆禮也疏注正義曰公羊傳曰何以書親逆禮也親逆是正禮有故得使卿逆亦無譏也秋公至自齊注無傳八月丁丑夫人姜氏入注哀姜也公羊傳以為姜氏要公不與公俱入蓋以孟任故丁丑入而明日乃朝廟音義要於遙反任音壬後孟任皆同疏注正義曰公羊傳曰其言入何難也其難奈何夫人不可使入與公有所約然後入唯言有所要不知要何事故云蓋以孟任故也明日戊寅大夫宗婦覿用幣夫人若未朝廟不得受臣覿禮知明日乃朝廟既朝乃見大夫宗婦杜言朝廟者為覿用幣發也書入不書至者釋例曰莊公顧割臂之盟崇寵孟任故即位二十三年乃娶元妃雖丹楹刻桷身自納幣而有孟任之嫌故與姜氏俱反而異入經所以不以至禮書也戊寅大夫宗婦覿用幣注宗婦同姓大夫之婦禮小君至大夫執贄以見明臣子之道莊公欲奢夸夫人故使大夫宗婦同贄俱見音義覿徒厯反見也以見賢遍反下同夸苦瓜反疏注正義曰襄二年葬齊姜傳稱齊侯使諸姜宗婦來送葬諸姜是同姓之女知宗婦是同姓大夫之婦也禮小君至大夫執贄以見明臣子之道禮亦無此文士相見禮稱大夫始見於君執贄夫人尊與君同臣始為臣有見君之禮明小君初至亦當有禮以見也且傳唯譏婦贄不宜用幣不言覿之為非知其禮當然也大夫當用羔鴈用幣亦為非禮也莊公欲奢夸夫人故使男女同贄惡其男女無别且譏僭為失禮故書之大水注無傳冬戎侵曹注無傳曹羈出奔陳注無傳羈蓋曹世子也先君既葬而不稱爵者微弱不能自定曹人以名赴疏注正義曰此事左氏穀梁並無傳公羊以曹羈為曹大夫三諌不從而出奔杜以此經書曹羈出奔陳赤歸于曹與鄭忽出奔衛突歸于鄭其文相類故附彼為之說蓋為疑辭微弱不能自定曹人以名赴亦如鄭忽之出奔赤歸于曹注無傳赤曹僖公也蓋為戎所納故曰歸疏注正義曰史記曹世家與年表皆云僖公名夷三家經傳有五而皆言赤杜以鄭突類之知赤是曹君故以赤為僖公書有舛誤何必史記是而杜說非也傳例曰諸侯納之曰歸以戎侵曹而赤歸故云蓋為戎所納也賈逵以為羈是曹君赤是戎之外孫故戎侵曹逐羈而立赤亦以意言之無所據也郭公注無傳蓋經闕誤也自曹羈以下公羊穀梁之說既不了又不可通之於左氏故不采用疏注正義曰公羊穀梁並以赤歸于曹郭公連文為句言郭公名赤失國而歸于曹是為說不了故不采用傳二十四年春刻其桷皆非禮也注并非丹楹故言皆疏注正義曰榖梁傳曰禮楹天子諸侯黝堊大夫蒼士黈丹楹非禮也注云黝堊黑色黈黃色又曰禮天子之桷斫之礱之加密石焉諸侯之桷斫之礱之大夫斫之士斫本刻桷非正也加密石注云以細石磨之晉語云天子之室斫其椽而礱之加密石焉諸侯礱之大夫斫之士首之言雖小異要知正禮楹不丹桷不刻故云皆非禮也御孫諫曰臣聞之儉德之共也侈惡之大也注御孫魯大夫音義御魚呂反本亦作禦侈昌紙反又户氏反先君有共德而君納諸大惡無乃不可乎注以不丹楹刻桷為共秋哀姜至公使宗婦覿用幣非禮也注傳不言大夫唯舉非常疏注正義曰士相見禮云夫下大夫相見以鴈上大夫相見以羔如士相見之禮始見於君執贄鄭𤣥云士大夫一也如彼禮文大夫始見於君用羔鴈始見夫人亦當然然則大夫用幣亦非常而以大夫為常者禮孤執皮帛則諸侯之臣有執帛者矣大夫執帛唯上僣耳其帛猶是男子所執婦人執幣則全非常事御孫唯諫婦人不宜執幣丘明為諫發傳故唯舉非常也左傳諸為諫者或言諫曰或不言諌意在載辭不為例也御孫曰男贄大者玉帛注公侯伯子男執玉諸侯世子附庸孤卿執帛音義贄真二反疏注正義曰周禮大宗伯職云公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧是公侯伯子男皆執玉也典命職曰凡諸侯之適子誓於天子攝其君則下其君之禮一等未誓則以皮帛繼子男公之孤四命以皮帛視小國之君是諸侯世子與孤卿執帛也附庸雖則無文而為一國之主來則謂之為朝未有爵命不合執玉明與世子同執帛也且哀七年傳稱禹合諸侯於塗山執玉帛者萬國附庸是國明執帛者附庸也鄭𤣥周禮注云皮帛者束帛而表以皮為之飾皮虎豹皮帛如今璧色繒也周禮以玉作六瑞以禽作六贄則瑞贄有異而此傳玉帛同言贄者鄭𤣥曲禮注云贄之言至也當謂執之見人以表至誠也典瑞注云瑞節信也禮天子執冒以見諸侯諸侯執圭璧以朝天子天子以冒冒之以為信故以瑞為名皮帛以下無此合信之事故以贄為名其實皆以表至誠故傳通以贄言之凡贄皆以爵不以命數也小者禽鳥注卿執羔大夫執鴈士執雉疏注正義曰周禮大宗伯職文也鄭𤣥云羔取其羣而不失其類鴈取其候時而行雉取其守介而死不失其節鶩取其不飛遷雞取其守時而動曲禮曰飾羔鴈者以繢言天子之臣飾羔鴈以布又畫之諸侯之臣飾以布不畫之自雉以下無飾以章物也注章所執之物别貴賤音義别彼列反女贄不過榛栗棗修以告䖍也注榛小栗修脯䖍敬也皆取其名以示敬音義榛側巾反修腵脯加薑桂曰修䖍音乾疏注正義曰曲禮云婦人之贄椇榛脯修棗栗鄭𤣥云婦人無外事見以羞物也椇榛木名椇枳也有實今邳郯之東食之榛實似栗而小鄭又注周禮臘人云薄析曰脯棰之而施薑桂曰腵修然則修脯大同故以修為脯也䖍敬釋詁文皆取其名以示敬者先儒以為栗取其戰栗也棗取其早起也修取其自修也唯榛無說蓋以榛聲近䖍取其䖍於事也今男女同贄是無别也男女之别國之大節也而由夫人亂之無乃不可乎晉士蒍又與羣公子謀使殺游氏之二子注游氏二子亦桓莊之族士蒍告晉侯曰可矣不過二年君必無患經二十有五年春陳侯使女叔來聘注女叔陳卿女氏叔字音義女音汝陳大夫氏夏五月癸丑衛侯朔卒注無傳惠公也書名十六年與內大夫盟于幽六月辛未朔日有食之鼓用牲于社注鼓伐鼓也用牲以祭社傳例曰非常也疏注正義曰尚書召誥云用牲于郊牛二如此之類言用牲者皆用之以祭知此用牲以祭社也鼓之所用必是伐之伐理可見故不言伐鼓牲不言用則牲無所施於文不是故言用牲傳稱正月之朔慝未作日有食之於是乎用幣于社伐鼓于朝正月謂周六月也此經雖書六月杜以長厯校之此是七月七月用鼓非常月也鼓當于朝而此鼓于社非其處也社應用幣而於社用牲非所用也一舉而有三失故譏之伯姬歸于杞注無傳不書逆女逆者微秋大水鼓用牲于社于門注門國門也傳例曰亦非常也疏注正義曰祭法云天子立七祀諸侯立五祀其門皆曰國門知此門亦國門國門謂城門也傳稱天災有幣無牲非日月之眚不鼓則鼓與牲二事皆失故譏之冬公子友如陳注無傳報女叔之聘諸魯出朝聘皆書如不果彼國必成其禮故不稱朝聘春秋之常也公子友莊公之母弟稱公子者史策之通言母弟至親異於他臣其相殺害則稱弟以示義至於嘉好之事兄弟篤睦非例所興或稱弟或稱公子仍舊史之文也母弟例在宣十七年音義好呼報反傳同疏注正義曰魯出朝聘多有在道復者假令得到彼國尚不知受之以否故皆書如如者往也直言往彼而已不果彼國必成其禮故不稱朝聘為春秋之常也僖二十八年公朝于王所朝訖乃書故即稱為朝此公子友莊公之母弟也於莊世稱公子昭元年陳公子招陳哀公母弟也於哀世稱公子故解之稱公子者史策之通言也釋例曰庶弟不得稱弟而母弟猶稱公子秦伯之弟針適晉女叔齊曰秦公子必歸此公子亦國之常言得兩通之證也是言公子母弟得通言之意也釋例又曰兄而害弟則稱弟以章兄罪弟又害兄則去弟以罪弟身統論其義兄弟二人交相殺害各有曲直存弟則示兄曲也是言其相殺害則稱弟以示義也釋例又曰若夫朝聘盟㑹嘉好之事此乃兄弟之篤睦非義例之所興故仍舊史之策或稱弟或稱公子踐土之盟叔武不稱弟此其義也案經桓三年齊侯使其弟年來聘十四年鄭伯使其弟語來盟成十年衛侯之弟黑背帥師侵鄭彼皆稱弟季友陳招並稱公子俱無褒貶所稱不同知是史文之異不為義例仲尼無所見義故仍舊史耳傳二十五年春陳女叔來聘始結陳好也嘉之故不名注季友相魯原仲相陳二人有舊故女叔來聘季友冬亦報聘嘉好接備卿以字為嘉則稱名其常也音義相魯息亮反下同夏六月辛未朔日有食之鼓用牲于社非常也注非常鼓之月長厯推之辛未實七月朔置閏失所故致月錯疏注正義曰此及文十五年昭十七年皆書六月朔日有食之昭十七年傳稱祝史請所用幣昭子許之平子禦之曰止也唯正月朔慝未作日有食之於是乎有伐鼓用幣禮也其餘則否太史曰在此月也經書六月而史言在此月則知傳言正月之朔慝未作者謂此周之六月夏之四月也文十五年傳直說天子諸侯鼓幣異禮不言非常知彼言六月直六月也此亦六月而云非常下句始言唯正月之朔有用幣伐鼓之禮明此經雖書六月實非六月故云非常鼓之月長厯推此辛未為七月之朔由置閏失所故致月錯不應置閏而置閏誤使七月為六月也釋例曰莊二十五年經書六月辛未朔日有食之實是七月朔非六月故傳云非常也唯正月之朔有用幣伐鼓明此食非用幣伐鼓常月因變而起厯誤也文十五年經文皆同而更復發傳曰非禮者明前傳欲以審正陽之月後傳發例欲以明諸侯之禮此乃聖賢之微㫖而先儒所未喻也劉炫云知非五月朔者昭二十四年五月日有食之傳云日過分而未至此若是五月亦應云過分而未至也今言慝未作則是已作之辭故知非五月案二十四年八月丁丑夫人姜氏入從彼推之則六月辛未朔非有差錯杜云置閏失所者以二十四年八月以前誤置一閏非是八月以來始錯也唯正月之朔慝未作注正月夏之四月周之六月謂正陽之月今書六月而傳云唯者明此月非正陽月也慝隂氣音義正音政正月建巳之月慝他得反夏户雅反疏注正義曰昭十七年傳太史論正月之事六當夏四月是謂孟夏知正月是夏之四月周之六月也詩云正月繁霜鄭𤣥云夏之四月建巳純陽用事是謂正月為正陽之月慝惡也人情愛陽而惡陰故謂陰為惡故云慝陰氣也未作謂陰氣未起也日有食之於是乎用幣于社伐鼓于朝注日食厯之常也然食於正陽之月則諸侯用幣于社請救於上公伐鼓于朝退而自責以明陰不宜侵陽臣不宜掩君以示大義疏注正義曰古之厯書亡矣漢興以來草創其術三統以為五月二十三分月之二十而日月交㑹近世為厯者皆以為一百七十三日有餘而日一食是日食者厯之常也古之聖王因事設戒夫以昭昭大明照臨下土忽爾殲亡俾晝作夜其為怪異莫斯之甚故立求神請救之禮責躬罪已之法正陽之月陽氣尤盛於此尤盛之月而為弱陰所侵故尤忌之社是上公之神尊於諸侯故用幣于社請救於上公伐鼓于朝退而自攻責也日食者月掩之也日者陽之精月者陰之精日君道也月臣道也以明陰不宜侵陽臣不宜掩君以示大義也昭二十九年傳曰故有五行之官是謂五官實列受氏姓封為上公祀為貴神社稷五祀是尊是奉故杜以社為上公之神秋大水鼓用牲于社于門亦非常也注失常禮凡天災有幣無牲注天災日月食大水也祈請而已不用牲也疏注正義曰傳言亦非常亦上日食也但日食之鼓非常月伐鼓于社非常禮大水用牲亦非常禮俱是非常故亦前也傳既亦前即發凡例知天災之言兼日食大水也天之見異所以譴告人君欲令改過修善非為求人飲食既遇天災隨時即告唯當告請而已是故有幣無牲若乃亢旱厯時霖雨不止然後禱祀羣神求弭災沴者設禮以祭祭必有牲詩雲漢之篇美宣王為旱禱請自郊徂宮無所不祭云靡神不舉靡愛斯牲是其為旱禱祭皆用牲也祭法曰埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宮祭日也夜明祭月也幽禜祭星也雩禜祭水旱也鄭𤣥云凡此以下皆祭用少牢寒暑不時則或禳之或祈之是說祈禱之祭皆用牲非日月之眚不鼓注眚猶災也月侵日為眚陰陽逆順之事賢聖所重故特鼓之音義眚所景反疏注正義曰易稱是謂災眚書稱眚災肆赦是眚災相類故云眚猶災也月侵日為眚陰犯陽為逆逆順之事賢聖所重故見其逆事而特鼓之此據日食為說耳傳稱日月之眚日月並言則月食亦有鼓周禮大僕職云凡軍旅田役贊王鼓救日月亦如之是日食月食皆有鼓也穀梁傳曰天子救日置五麾陳五兵五鼓諸侯置三麾陳三鼓三兵大夫擊門士擊柝左氏雖無傳義或然也晉士蒍使羣公子盡殺游氏之族乃城聚而處之注聚晉邑音義聚才喻反冬晉侯圍聚盡殺羣公子注卒如士蒍之計經二十有六年春公伐戎注無傳夏公至自伐戎注無傳曹殺其大夫注無傳不稱名非其罪例在文七年疏注正義曰文七年傳稱書曰宋人殺其大夫不稱名衆也且言非其罪也是仲尼新意變例也秋公㑹宋人齊人伐徐注無傳宋序齊上主兵冬十有二月癸亥朔日有食之注無傳傳二十六年春晉士蒍為大司空注大司空卿官疏注正義曰傳於比年以來說士蒍為獻公設計晉國以安今又言大司空明任以卿位也直言司空者是大夫即司空亞旅皆受一命之服是也晉自文公以後世為盟主征伐諸國卿以軍將為名司空非復卿官故文二年司空士縠非卿也雖則非卿職掌不異成十八年傳曰右行辛為司空使修士蒍之法是其典事同也夏士蒍城絳以深其宮注絳晉所都也今平陽絳邑縣秋虢人侵晉冬虢人又侵晉注為傳明年晉將伐虢張本此年經傳各自言其事者或經是直文或策書雖存而簡牘散落不究其本末故傳不復申解但言傳事而已音義牘徒本反究音救復扶又反解居蟹反疏注正義曰此年傳不解經經傳各自言事伐戎日食體例已舉或可經是直文不須傳說曹殺大夫宋齊伐徐或須說其所以此去丘明已逺或是簡牘散落不復能知故耳上二十年亦傳不解經彼經皆是直文故就此一說言下以明上經二十有七年春公㑹杞伯姬于洮注伯姬莊公女洮魯地音義洮徒刀反疏注正義曰上二十五年始歸于杞莊公無母而此來寧知是莊公女也㑹女非常故於此言女以辨之夏六月㑹齊侯宋公陳侯鄭伯同盟于幽秋公子友如陳葬原仲注原仲陳大夫原氏仲字也禮臣既卒不名故稱字季友違禮㑹外大夫葬具見其事亦所以知譏音義見賢遍反疏注正義曰玉藻記云士於君所言大夫沒矣則稱諡若字桓二年榖梁傳曰子既死父不忍稱其名臣既死君不忍稱其名是禮臣卒不名陳人不稱其名故魯史亦書其字冬杞伯姬來注傳例曰歸寧莒慶來逆叔姬注無傳慶莒大夫叔姬莊公女卿自為逆則稱字例在宣五年音義為于僞反杞伯來朝注無傳杞稱伯者蓋為時王所黜音義黜勑律反疏注正義曰桓二年杞侯來朝十二年公㑹杞侯莒子盟于曲池自爾以來不見經傳從此稱伯終於春秋故云蓋為時王所黜於時周王當桓莊僖惠不知何王黜之公㑹齊侯于城濮注無傳城濮衛地將討衛也音義濮音卜傳二十七年春公㑹杞伯姬于洮非事也注非諸侯之事天子非展義不巡守注天子巡守所以宣布德義諸侯非民事不舉卿非君命不越竟音義竟音境夏同盟于幽陳鄭服也注二十二年陳亂而齊納敬仲二十五年鄭文公之四年獲成於楚皆有二心於齊今始服也疏注正義曰比年以來陳鄭無不服之狀此言其服故注者原之二十一年鄭厲公卒二十五年是鄭文公之四年也文十七年傳稱鄭子家與趙宣子書云文公四年二月壬戌為齊侵蔡亦獲成於楚是二十五年既與楚平故至此始服也秋公子友如陳葬原仲非禮也原仲季友之舊也冬杞伯姬來歸寧也注寧問父母安否凡諸侯之女歸寧曰來出曰來歸注歸不反之辭夫人歸寧曰如某出曰歸于某注正義曰釋例曰歸寧者女子既嫁有時而歸問父母之寧否父母沒則使卿歸問兄弟也出者謂犯七出而見絶者也歸者有所往之稱來者有所反之言故嫁謂之歸而寧謂之來見絶而出則以來歸為辭來而不反也如某者非終安之稱歸于某者亦不反之辭是解其文異之意也此杞伯姬寧也宣十六年郯伯姬來歸出也文九年夫人姜氏如齊歸寧也魯之夫人無被出者文十八年夫人姜氏歸于齊雖子死自去歸而不反亦出之類故與出文同晉侯將伐虢士蒍曰不可虢公驕若驟得勝於我必棄其民注棄民不養之無衆而後伐之欲禦我誰與夫禮樂慈愛戰所畜也夫民讓事樂和愛親哀喪而後可用也注上之使民以義讓哀樂為本言不可力强音義畜勑六反下及注皆同哀樂音洛强其文反疏正義曰禮樂慈愛謂國君教民民間有此四者畜聚此事然後可與人戰故云戰所畜也士蒍既言其目更以其義覆之禮尚謙讓讓事謂禮也樂以和親樂和謂樂也慈謂愛之深也愛親謂慈也愛極然後哀喪哀喪謂愛也民間有此四事然後可用以戰虢弗畜也亟戰將饑注言虢不畜義讓而力戰音義亟欺冀反饑居疑反又音機王使召伯廖賜齊侯命注召伯廖王卿士賜命為侯伯音義召音邵廖力雕反疏注正義曰召伯稱爵知是王之卿士召康公之封召也當在西都畿內釋例曰扶風雍縣東南有召亭也春秋時召伯猶是召公之後西都既已賜秦則東都别有召地不復知其所在僖二十八年傳稱王命尹氏王子虎策命晉侯為侯伯則知此賜齊侯命者亦賜命為侯伯也彼注云周禮九命作伯則此亦九命之伯謂九州之長為二伯也僖元年傳曰凡侯伯救患分災討罪禮也注云侯伯州長也彼主說齊桓之事亦謂九州之長非州牧也言州長者兼見州牧之事耳且請伐衛以其立子頽也注立子頽在十九年經二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績注齊侯稱人者諱取賂而還以賤者告不地者史失之疏注正義曰傳稱齊侯而經書人知其諱取賂以賤者告也詩美僖公之伐淮夷得其元龜象齒大賂南金襄十一年傳稱晉侯伐鄭受鄭之賂告于諸侯皆不以為諱而此諱之者彼服罪致賂乃以得賂為榮此舍罪受賂故以受之為恥㑹于稷舍宋督取郜鼎亦此之類也戰皆書地此獨不地知是史失之也莊十年公羊傳曰戰不言伐圍不言戰入不言圍滅不言入書其重者左無此義而泓韓鞍邲令狐河曲鄢陵城濮大棘彭衙長岸柏舉之屬皆書戰不書伐此書伐又書戰襄十八年諸侯同圍齊言圍不言伐文十五年晉郤缺伐蔡戊申入蔡書伐又書入丘明無文杜不為說皆是從告而書史有詳略無義例也此經既言齊人伐衛不言齊及衛戰而言衛人及齊人戰者公羊以為伐人者為客被伐者為主以主及客故使衛人主齊尋案經傳令狐河曲大棘彭衙長岸泓韓之屬皆以主及客也乾時升陘及鞍皆魯與人戰以魯為主城濮鄢陵與邲外楚而內晉也柏舉內蔡而外楚也被伐為主或如公羊之說夏四月丁未邾子瑣卒注無傳未同盟而赴以名音義瑣素果反秋荆伐鄭公㑹齊人宋人救鄭冬築郿注郿魯下邑傳例曰邑曰築音義郿亡悲反疏注正義曰國都為上邑為下故云魯下邑成十八年築鹿囿傳曰書不時也此傳唯發城築之例不言時與不時者春秋重土功無備而興作者傳每事各言時與不時以别有所備禦如書旱雩之别過雩也其有所畏懼而興作者唯一發而已襄十九年城西郛傳曰懼齊也是其事也此年大無麥禾時嵗饑虛恐或侵伐故築之以備難從西郛之例故不發傳也大無麥禾注書於冬者五穀畢入計食不足而後書也疏注正義曰麥熟於夏禾成在秋而書於冬者計食不足而後總書之此年不言水旱而得無麥禾者服䖍曰陰陽不和土氣不養故禾麥不成也傳言饑而經不書者得齊之糴救民之急不至於饑也傳言饑者指未糴之前說告糴之意故言饑也臧孫辰告糴于齊注臧孫辰魯大夫臧文仲音義糴徒厯反疏正義曰何休云買穀曰糴告糴者將貨財告齊以買穀魯語云文仲以鬯圭與玉磬如齊告糴曰不腆先君之敝器敢告滯積以紓執事齊人歸其玉而與之糴公羊傳曰何以不稱使以為臧孫辰之私行也君子之為國也必有三年之季一年不熟告糴譏也榖梁亦然據經魯臣出使例不言使何以當怪此也傳言告糴禮也必不得女二傳之說服䖍云不言如重穀急辭以其情急於糴故不言如齊告糴乞師則情緩於穀故云如楚乞師注正義曰世本孝公生僖伯彄彄生哀伯達達生伯氏瓶瓶生文仲辰辰是臧僖伯曽孫傳二十八年春齊侯伐衛戰敗衛師數之以王命取賂而還晉獻公娶于賈無子注賈姬姓國也蒸於齊姜注齊姜武公妾音義蒸之承反生秦穆夫人及太子申生又娶二女於戎大戎狐姬生重耳注大戎唐叔子孫别在戎狄者音義重直龍反疏注正義曰晉語云狐氏出自唐叔狐伯行之子實生重耳又曰狐偃其舅也小戎子生夷吾注小戎允姓之戎子女也疏注正義曰昭九年傳稱晉率陰戎伐潁王使辭於晉曰先王居檮杌于四裔故允姓之姦居于瓜州知戎為允姓也凡言子者通男女也知子謂女也二戎相對為大小也晉伐驪戎驪戎男女以驪姬注驪戎在京兆新豐縣其君姬姓其爵男也納女於人曰女音義驪力知反女以昵據反注曰女同歸生奚齊其娣生卓子驪姬嬖欲立其子賂外嬖梁五與東關嬖五注姓梁名五在閨闥之外者東關嬖五别在關塞者亦名五皆大夫為獻公所嬖幸視聽外事音義卓勑角反閨音圭闥吐達反塞素代反使言於公曰曲沃君之宗也注曲沃桓叔所封先君宗廟所在蒲與二屈君之疆也注蒲今平陽蒲子縣二屈今平陽北屈縣或云二當為北音義屈求勿反一音居勿反彊居良反下同不可以無主宗邑無主則民不威疆埸無主則啓戎心戎之生心民慢其政國之患也若使大子主曲沃而重耳夷吾主蒲與屈則可以威民而懼戎且旌君伐注旌章也伐功也音義埸音亦使俱曰狄之廣莫於晉為都晉之啓土不亦宜乎注廣莫狄地之曠絶也即謂蒲子北屈也言遣二公子出都之則晉方當大開土界獻公未决故復使二五俱說此美音義復扶又反晉侯說之夏使大子居曲沃重耳居蒲城夷吾居屈羣公子皆鄙注鄙邊邑音義說音悅唯二姬之子在絳二五卒與驪姬譖羣公子而立奚齊晉人謂之二五耦注二耜相耦廣一尺共起一伐言二人俱共墾傷晉室若此音義譖責鴆反耜音似廣古曠反墾苦狠反楚令尹子元欲蠱文夫人注文王夫人息媯也子元文王弟蠱惑以淫事音義蠱音古惑也疏正義曰昭元年傳稱周易女惑男謂之蠱知蠱謂惑以淫事為館於其宮側而振萬焉注振動也萬舞也夫人聞之泣曰先君以是舞也習戎備也今令尹不尋諸仇讎而於未亡人之側不亦異乎注尋用也婦人既寡自稱未亡人御人以告子元注御人夫人之侍人子元曰婦人不忘襲讎我反忘之秋子元以車六百乘伐鄭入于桔柣之門注桔柣鄭遠郊之門也音義乘繩證反桔户結反柣侍結反疏注正義曰此已入一門矣又云入自純門又是入一門矣復言縣門不發則更有一門矣不發是城門則知純門外郭門桔柣遠郊門也尚書費誓序云東郊弗開是郊有門也子元鬭御疆鬭梧耿之不比為斾注子元自與三子特建斾以居前緇廣充幅長尋曰旐繼旐曰斾音義御魚呂反本亦作禦下注反禦同疆其良反又居良反梧音吾比并里反斾蒲貝反長直亮反旐音兆疏注正義曰軍行之次斾最在先故宣十二年傳稱令尹南轅反斾是斾居前而殿在後也釋天云緇廣充幅長尋曰旐繼旐曰斾郭璞曰旐帛全幅長八尺斾帛續旐未為燕尾者鬭班王孫游王孫喜殿注三子在後為反禦音義殿丁見反衆車入自純門及逵市注純門鄭外郭門也逵市郭內道上市音義純如字逵求龜反縣門不發楚言而出子元曰鄭有人焉注縣門施於內城門鄭示楚以閒暇故不閉城門出兵而效楚言故子元畏之不敢進音義縣音𤣥注同諸侯救鄭楚師夜遁鄭人將奔桐丘注許昌縣東北有桐丘城音義遁徒困反諜告曰楚幕有烏乃止注諜間也幕帳也音義諜音牒幕音莫間間厠之間冬饑臧孫辰告糴于齊禮也注經書大無麥禾傳言饑傳又先書饑在築郿上者說始糴經書在下須得糴嫌或諱饑故曰禮築郿非都也凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城注周禮四縣為都四井為邑然宗廟所在則雖邑曰都尊之也言凡邑則他築非例疏注正義曰周禮小司徒職云九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都注引此者以證都大邑小耳經傳之言都邑者非是都則四縣邑皆四井此傳所發乃為小邑發例大者皆名都都則悉書曰城小邑有宗廟則雖小曰都無乃為邑邑則曰築都則曰城為尊宗廟故小邑與大都同名釋例曰若邑有先君宗廟雖小曰都尊其所居而大之也然則都而無廟固宜稱城城漆是也而潁氏唯繫於有先君之廟患漆本非魯邑因說曰漆有邾之舊廟是使魯人尊邾之廢廟與先君同非經傳意也又解傳言凡邑則主為邑言則他築非例也若築臺築囿築王姬之館則皆稱為築無大小之異經二十有九年春新延廏注傳例曰書不時言新者皆舊物不可用更造之辭音義廄居又反疏注正義曰馬之所處謂之廄延是廄之名名之曰延其義不可知也公羊傳曰新延廄者何修舊也謂舊廄敝壞不可因而補治故言新為更造之辭也傳言新作延廄而經無作字僖二十年新作南門定二年新作雉門及兩觀皆言新作而此獨無作是作傳之後轉寫闕文也釋例曰言新意所起言作以興事通謂興起功役之事也總而言之不復分别因舊而與造新也經書延廄稱新而不言作傳言新作延廄書不時也此稱經文而以不時為譏義不在作也然尋傳足以知經闕作字也而劉賈云言新有故木言作有新木延廄不書作所用之木非公命也凡諸興造固當有新固當有因今為春秋微義直記别此門此觀有新木故木既已鄙近且材木者立廄之具也公命立廄則衆用皆隨之矣焉有所用之木非公命也此為匠人受命立廄而盜共其用豈然乎哉夏鄭人侵許注傳例曰無鐘鼓曰侵秋有蜚注傳例曰為災音義蜚扶味反冬十有二月紀叔姬卒注無傳紀國雖滅叔姬執節守義故繫之紀賢而録之城諸及防注諸防皆魯邑傳例曰書時也諸非備難而興作傳皆重云時以釋之他皆放此諸今城陽諸縣音義難乃旦反重直用反疏正義曰此言城諸及防文十二年城諸及鄆定十四年城莒父及霄襄十年傳晉師城梧及制同時城二邑者皆言及穀梁傳曰以大及小也何休云諸君邑防臣邑言及别君臣之義賈逵云言及先後之辭杜不為注先後之辭是也傳二十九年春新作延廄書不時也注經無作字蓋闕凡馬日中而出日中而入注日中春秋分也治廄當以秋分因馬向入而修之今以春作故曰不時音義向許亮反本或作嚮疏注正義曰中者謂日之長短與夜中分故春秋二節謂之春分秋分也釋例曰春秋分而畫夜等謂之日中凡馬春分百草始繁則牧於坰野秋分農功始藏水寒草枯則皆還廄此周典之制也今春而作廄已失民務又違馬節故曰書不時也夏鄭人侵許凡師有鐘鼓曰伐注聲其罪無曰侵注鐘鼓無聲輕曰襲注掩其不備音義輕遣政反疏正義曰釋例曰侵伐襲者師旅討罪之名也嗚鐘鼓以聲其過曰伐寢鐘鼓以入其竟曰侵掩其不備曰襲此所以别興師用兵之狀也然則春秋之世兵加於人唯此三名擊鼓斬木俱名為伐鳴鐘鼓聲其罪往討伐之若擊鼓斬木然侵者加陵之意寢其鐘鼓潛入其竟往侵陵之襲者重衣之名倍道輕行掩其不備忽然而至若被衣然立此三名制討罪之等級也周禮大司馬掌九伐之法賊賢害民則伐之負固不服則侵之天子討罪無掩襲之事唯侵伐二名名與禮合而禮更有七名馮弱犯寡則眚之暴內凌外則壇之野荒民散則削之賊殺其親則正之放弒其君則殘之犯令陵政則社之內外亂鳥獸行則滅之彼謂王者行兵此據當時實事時無其事則傳不為例其滅與入為故不列於此秋有蜚為災也凡物不為災不書冬十二月城諸及防書時也凡土功龍見而畢務戒事也注謂今九月周十一月龍星角亢晨見東方三務始畢戒民以土功事音義見賢遍反注下皆同亢苦浪反又音剛疏正義曰釋例曰都邑者人之聚也國家之藩衛百姓之保障不固則敗不修則壞故雖不臨寇必於農隙備其守禦無妨民務傳曰龍見而畢務戒事也謂夏之九月周之十一月龍星角亢晨見東方於是納其禾稼三務始畢而戒民以土功事也火見而致用大火星次角亢而晨見於是致其用也水昏正而栽謂夏之十月定星昏而中於是樹板幹而興作焉日至而畢謂日既南至微陽始動故土功息傳既顯稱凡例而書時書不時各重發者皆以别無備而興作如書旱雩之别過雩也若城西郛傳特曰懼齊此其意也然則此發例者止謂預修備禦非有當時之急故擇間月而為之若當時有急則不拘此制畢者竟也畢務謂農務竟而民間也日至而畢謂土功竟也冬至之後當更修來年農事不得復興土功也注正義曰今之九月則季秋也月令季秋之月日在房漢書律厯志論星之度數云角十二亢九氐十五自角之初至房初三十六度晨謂夜之將旦於晨之時日體在房故角亢見在東方也東方之宿盡為龍星角即蒼龍角也故角亢專得龍名戒謂令語之也春夏秋三時之務始畢民將閒暇故預令語民將有土功之事使自備也火見而致用注大火心星次角亢見者致築作之物疏注正義曰襄九年傳曰心為大火星度心五尾十八月令孟冬之月日在尾自心初至於尾末二十三度十月之初心星次角亢之後而晨見東方也致築作之物謂板幹畚梮諸是城之所用皆致之於作所也水昏正而栽注謂今十月定星昏而中於是樹板幹而興作音義栽字林才代反一音再說文云築牆長板定多佞反疏注正義曰五行北方水故北方之宿為水星言水昏正者夜之初昏水星有正中者耳非北方七宿皆正中也詩云定之方中作于楚宮釋天云營室謂之定孫炎云定正也天下作宮室者皆以營室為正周語云營室之中土功其始是定星昏而正為土功之大候故知水昏正謂十月定星昏而正中時也鄭𤣥詩箋云定星昏中而正謂小雪時小雪十月之中氣月令仲冬之月昏東壁中室十六度日行一度是十月半而室中十一月初而壁中禮記中庸云栽者培之栽者樹立之語故知樹板幹而起首興作也釋詁云楨翰幹也舍人曰楨正也築牆所立兩木也翰所以當牆之兩邊鄣土者也然則幹在牆之兩端樹立之即楨是也幹則在兩邊鄣土即板是也板幹既異而云樹板幹者因類連言耳日至而畢注日南至微陽始動故土功息樊皮叛王注樊皮周大夫樊其采地皮名經三十年春王正月夏次于成注無傳將卑師少故直言次齊將降鄣故設備音義將卑子匠反降户江反下文注同鄣音章下同疏注正義曰於倒將卑師少稱人人謂大夫身也大夫卑名氏不見故稱人他國可言某人魯事不得自稱魯人故魯之大夫使出者皆言其所為之事而已此大夫帥師而次于成故直言次也榖梁傳曰次止也有畏也欲救鄣而不能是為降鄣故設備也秋七月齊人降鄣注無傳鄣紀附庸國東平無鹽縣東北有鄣城小國孤危不能自固蓋齊遙以兵威脅使降附疏注正義曰公羊榖梁傳並云鄣紀之遺邑也釋例曰劉賈依二傳以為郭紀之遺邑計紀侯去國至此二十七年紀侯猶不堪齊而去則邑不得獨存此蓋附庸小國若邿鄟者也是言鄣為附庸之意不言鄣降于齊而云齊人降鄣又不言侵伐故云蓋以兵威脅使降附八月癸亥葬紀叔姬注無傳以賢録也無臣子故不作諡九月庚午朔日有食之鼓用牲于社注無傳冬公及齊侯遇于魯濟注濟水厯齊魯界在齊界為齊濟在魯界為魯濟蓋魯地音義濟子禮反疏注正義曰釋例曰濟水自滎陽卷縣東經陳留至濟隂北經高平東平至濟北東北經濟南至樂安博昌縣入海案高平東平魯西界也濟南樂安齊竟內也指言魯濟故疑魯地遇于魯地濟水之邊齊人伐山戎注山戎北狄傳三十年春王命虢公討樊皮夏四月丙辰虢公入樊執樊仲皮歸于京師楚公子元歸自伐鄭而處王宮注欲遂蠱文夫人鬭射師諫則執而梏之注射師鬭亷也足曰桎手曰梏音義射食亦反又食夜反梏古毒反桎之實反疏注正義曰杜此注與譜並以射師與鬭亷為一人不知何據也服䖍云射師若敖子鬭班也射師被梏不言舍之何以得殺子元也知射師與班必非一人也杜譜以為鬭射師若敖于鬭班若敖孫周禮掌囚上罪梏拲而桎中罪桎梏下罪梏牿拲共文拲施於手知梏亦手也鄭𤣥序云在手曰梏在足曰桎是先儒同此說也易大畜六四童牛之梏牛云梏者牛雖無手謂梏前足也秋申公鬭班殺子元注申楚縣楚僭號縣尹皆稱公音義僭子念反鬭穀於菟為令尹自毁其家以紓楚國之難注鬭穀於菟令尹子文也毁滅紓緩也音義穀奴走反楚人謂乳曰穀漢書作彀音同於音烏菟音徒紓音舒一音直汝反難乃旦反下注同冬遇于魯濟謀山戎也以其病燕故也注齊桓行霸故欲為燕謀難燕國今薊縣音義為于僞反薊音計經三十有一年春築臺于郎注無傳刺奢且非土功之時音義刺七賜反夏四月薛伯卒注無傳未同盟築臺于薛注無傳薛魯地六月齊侯來獻戎捷注傳例曰諸侯不相遺俘捷獲也獻奉上之辭齊侯以獻捷禮來故書以示過音義捷在妾反遺唯季反傳同俘音孚疏注正義曰捷勝也戰勝而有獲獻其獲故以捷為獲也釋例曰歸者遺也獻者自下奉土之稱遺者敵體相與之辭傳曰諸侯不相遺俘齊侯楚人失辭稱獻失禮遺俘故因其來辭見自卑也以其大卑故書以示過此經言獻捷傳言遺俘則是獻捷獻囚俘也襄八年邢丘之㑹傳稱鄭伯獻捷于㑹又曰獲司馬燮獻于邢丘是獻俘謂之捷也襄二十五年鄭公孫舍之帥師入陳傳稱司空致地司徒致民是不以俘囚歸也亦云子産獻捷于晉然則無囚而獻其功空有器物亦稱捷也秋築臺于秦注無傳東平范縣西北有秦亭冬不雨注無傳不書旱不為災例在僖三年傳三十一年夏六月齊侯來獻戎捷非禮也凡諸侯有四夷之功則獻于王王以警于夷注以警懼夷狄音義警音景懼戒懼也中國則否諸侯不相遺俘注雖夷狄俘猶不以相遺經三十有二年春城小穀注小穀齊邑濟北穀城縣城中有管仲井大都以名通者則不繫國疏注正義曰傳稱為管仲知是齊邑管仲所食采邑也吳滅州來晉滅下陽如此之類皆不繫國知大都以名通者則不繫國也華亥向寧入于宋南里以叛南里非大都不得以名通故繫之宋耳賈逵云不繫齊者世其祿然則彼不繫者豈皆世其祿乎夏宋公齊侯遇于梁丘注齊善宋之請見故進其班梁丘在高平昌邑縣西南秋七月癸巳公子牙卒注牙慶父同母弟僖叔也飲鴆而死不以罪告故得書卒書日者公有疾不責公不與小斂音義鴆音鴆本亦作鴆與音預斂力艷反八月癸亥公薨于路寢注路寢正寢也公薨皆書其所詳凶變疏注正義曰公羊傳曰路寢者何正寢也喪大記曰男子不死於婦人之手婦人不死於男子之手君夫人卒于路寢鄭𤣥云言死必於正處也是薨于路寢得其正也言詳凶變者釋例云詳內事謹凶變冬十月己未子般卒注子般莊公太子先君未葬故不稱爵不言殺諱之也音義般音班殺音試一音如字下同疏注正義曰傳稱公疾問後於叔牙若已有太子則不應須問當問之時似未有太子也季友以死奉般鴆殺叔牙蓋於爾時始命為太子公薨而般立知其為太子也子惡之死也直書子卒不書名此子般及子野皆書名者釋例曰公子惡魯之正適嗣位免喪則魯君也襄仲倚齊而殺之國以為諱故不稱君若言君之子也及子般子也或見殺或不勝喪言罪則不足成貶為孝而滅性故直略而書卒也又曰未成君而卒若君未葬則嗣子書名在喪之禮也既葬則嗣君諒暗羣臣復吉免喪則成君也文公既葬襄仲殺惡及視書曰子卒與未成君同文所以為諱也如杜此言未葬之前生則直稱為子死則書曰子某卒猶外諸侯生稱其爵死書其名以為禮之常也既葬則嗣子成君以禮而卒當稱公薨全成君也子惡父既葬魯人諱其弒不得稱君其實已葬不得從子般子野未葬之例故書子卒而不稱名以示似未成君其實已成為君上不得同閔公下不得同般野故直書為子繫之於父若言君之子也公羊以為君存稱世子君薨稱子某既葬稱子踰年稱公據子般子野卒似欲當然但左氏稱宋桓公卒未葬而襄公㑹諸侯故曰子即發例曰凡在喪公侯曰子是未葬稱子傳之明文不得如公羊說也公子慶父如齊注無傳慶父既殺子般季友出奔國人不與故懼而適齊欲以求援時無君假赴告之禮而行狄伐邢注無傳邢國在廣平襄國縣疏注正義曰明年有傳而言無者明年自為管仲之言發端耳非說此年伐邢之事故言無傳傳三十二年春城小穀為管仲也注公感齊桓之德故為管仲城私邑音義為于僞反注及下同齊侯為楚伐鄭之故請㑹于諸侯注楚伐鄭在二十八年謀為鄭報楚宋公請先見于齊侯夏遇于梁丘音義見賢遍反又如字秋七月有神降于莘注有神聲以接人莘虢地音義莘所巾反疏注正義曰易稱神也者妙萬物而為言者也雖復鬼神之神亦無形象可見今言神降則人皆聞知故知有神謂有神聲以接人也吳孫權時有神自稱王表言語與人無異而形不可見今此神降于莘蓋亦王表之類神者氣也當在人上今下接人故稱降也國語說此事稱內史過對王云昔昭王娶於房曰房后實有爽德協於丹朱丹朱馮身以儀之生穆王焉若由是觀之其丹朱之神乎下說神居莘而虢公請土內史過往聞虢請命知莘是虢地惠王問諸內史過曰是何故也注內史過周大夫音義過古禾反對曰國之將興明神降之監其德也將亡神又降之觀其惡也故有得神以興亦有以亡虞夏商周皆有之注亦有神異音義監本又作鑑古暫反疏正義曰國語內史過曰夏之興也祝融降於崇山其亡也回祿信於黔隧商之興也檮杌次於丕山其亡也夷羊在牧周之興也鸑鷟鳴於岐山其衰也杜伯射宣王於鎬是夏商周之所有也其虞則國語不言焉未知其所謂也服䖍云虞舜祖考來格鳳皇來儀百獸率舞案虞書夔說舜樂所致非神降也必其傅㑹尚書以為得神以興則虞舜得神以亡者又安在也王曰若之何對曰以其物享焉其至之日亦其物也注享祭也若以甲乙日至祭先脾玉用蒼服上青以此類祭之音義脾婢支反疏注正義曰此降莘之神非祀典所載神必須祭故內史過令以其物享之其物不知所謂更以至日釋之謂此神初降之日以其至日之物也月令春其日甲乙夏其日丙子中央土其日戊已秋其日庚辛冬其日壬癸所用之物月令具有其文注引甲乙所用舉一隅也丙丁日至祭用肺玉服皆赤也戊巳日至祭用心玉服皆黃也庚辛日至祭用肝玉服皆白也壬癸日至祭用腎玉服皆𤣥也王從之內史過往聞虢請命注聞虢請於神求賜土田之命反曰虢必亡矣虐而聽於神神居莘六月疏正義曰國語稱惠王十五年神降于莘年表惠王五年是魯莊公之十八年則此年惠王十五年也上云七月降神則今年七月降也居莘六月虢公使祝史享焉則今年十二月也內史過往已聞虢請命則過至虢亦十二月也傳先說王事使了後論虢事以終內史之言故文倒耳虢公使祝應宗區史嚚享焉神賜之土田注祝大祝宗宗人史大史應區嚚皆名音義區丘于反嚚五巾反大祝音泰下同史嚚曰虢其亡乎吾聞之國將興聽於民注政順民心將亡聽於神注求福於神神聰明正直而一者也依人而行注唯德是與虢多凉德其何土之能得注凉薄也為僖二年晉滅下陽傳音義凉音良疏正義曰國語曰耳目心之樞機也故必聽和而視正聽和則聰視正則明然則所謂聰明者不聽淫辭不視邪人之謂也襄七年傳曰正直為正正曲為直言正者能自正直者能正人曲而一者言其一心不二意也依人而行謂善則就之惡則去之虢多薄德神所不依其何土之能得言賜之土田必虛妄也若神所不依則不應賜土而言神賜之土田者神厭其人不告以實猶晉獻公筮以驪姬為夫人亦云吉耳初公築臺臨黨氏注黨氏魯大夫築臺不書不告廟音義黨音掌見孟任從之閟注孟任黨氏女閟不從公音義閟音祕疏正義曰服䖍云從之言欲與通也而以夫人言許之注許以為夫人割臂盟公生子般焉雩講于梁氏女公子觀之注雩祭天也講肄也梁氏魯大夫女公子子般妹音義肄音四又以二反疏注正義曰魯以周公之故得郊祀上天故雩亦祭天也文四年傳曰臣以為肄業及之也肄謂習業故講為肄圉人犖自牆外與之戲注圉人掌養馬者以慢言戲之音義犖音洛又力角反疏注正義曰周禮圉人掌養馬芻牧之事昭七年傳曰馬有圉牛有牧子般怒使鞭之公曰不如殺之是不可鞭犖有力焉能投蓋于稷門注蓋覆也稷門魯南城門走而自投接其屋之桷反覆門上音義覆芳服反疏注正義曰稷門為魯南城門蓋時人猶以名之故知也投蓋者謂自投其身以蓋物故以為走而自投反覆門上劉炫規過云公言犖有力焉如杜此說徑捷耳非有力也當謂投車蓋過於稷門今知不然者周禮車蓋以物帛為之輕而帆風非可投之物且傳直云投蓋于稷門不云過稷門明知自投反覆稷門之上今時猶然且游楚超乘而出女曰子南夫也則徑捷之人亦是勇力之事劉君以徑捷非力而規杜氏非也公疾問後於叔牙對曰慶父材注蓋欲進其同母兄問於季友對曰臣以死奉般注季友莊公母弟故欲立般公曰鄉者牙曰慶父材成季使以君命命僖叔待于針巫氏注成季季友也針巫氏魯大夫音義鄉許亮反針其亷反使針季鴆之注鴆鳥名其羽有毒以畫酒飲之則死音義畫音獲疏注正義曰說文云鴆毒鳥也一名運日廣雅云鴆鳥雄曰運日雌曰陰諧廣志云鴆鳥形似鷹大如鶚毛黑喙長七八寸黃赤如金食蛇及橡實常居高山巔晉諸公讚云鴆鳥食蝮以羽翮櫟酒水中飲之則殺人舊制鴆不得渡江有重法石崇為南中郎得鴆以與王愷養之大如鵝喙長尺餘純食蛇虺司隸傅祇於愷家得此鳥奏之宣示百官燒於都街是說鴆鳥之狀也以其因酒毒人故字或為鴆曰飲此則有後於魯國不然死且無後飲之歸及逵泉而卒立叔孫氏注逵泉魯地不以罪誅故得立後世其祿八月癸亥公薨于路寢子般即位次于黨氏注即喪位次舍也冬十月己未共仲使圉人犖賊子般于黨氏注共仲慶父音義共音恭成季奔陳注出奔不書國亂史失之立閔公注閔公莊公庶子於是年八嵗音義閔亡謹反疏注正義曰傳稱閔公哀姜之娣叔姜之子哀姜以二十四年八月始入娣必與適俱行當以二十五年生子故云八嵗春秋左傳注疏卷九春秋左氏傳注疏卷九考證公如齊觀社疏皆但書而不言其事推尋文義應作皆但書如不言其事蕭叔朝公注蕭附庸國叔名臣召南按十二年傳蕭叔大心似此人字叔名大心也杜以附庸之君例稱名故以叔為名耳傳曹劌諫曰不可王應麟困學紀聞曰劌問戰諫觀社藹然儒者之言公羊乃有盟柯之事史記遂以曹沫列刺客之首此戰國之風春秋初未有此習也傳譖富子而去之陳傅良曰為殺太子申生起傳後見二十四年二十五年臣召南按晉盡去諸公族後日六卿擅權三家裂土即始於此不止為太子申生起本也郭公注蓋經闕誤也臣浩按杜說遠勝二傳公子友如陳注諸魯出朝聘皆書如臣浩按東萊集解引此作諸魯大夫出朝聘皆書如多大夫二字於文義為合傳伐鼓於朝劉敞曰日食變之大者豈可以非正陽安而視之春秋所以書者譏其不鼓于朝乃鼓于社又用牲耳公㑹宋人齊人伐徐注無傳宋序齊上主兵東萊集解引此注主兵句下有徐國在下邳􅥧縣七字臣召南按此文既在僖三年之前則徐國自應有注但􅥧縣應作僮縣耳傳晉士蒍為大司空注大司空卿官趙汸補注曰傳見晉變周制僭王官傳王使召伯廖賜齊侯命臣召南按齊桓霸業始於十三年㑹北杏至此二十七年實受王命為侯伯傳子元鬭御疆鬭梧耿之不比為斾疏釋天云緇廣充幅長尋曰旐臣浩按爾雅以旌旗附釋天卷疏引之故曰釋天云云監本作釋文非也今改正城諸及防注諸今城陽諸縣臣召南按諸縣兩漢屬琅邪晉屬城陽别本脫諸字傳凡師有鐘鼓曰伐無曰侵趙汸補注曰外傳晉語趙宣子曰伐備鐘鼓聲其罪也襲侵無聲為暫事也傳例蓋本此傳遇於魯濟注燕國今薊縣臣召南按薊縣漢屬廣陽國晉屬燕國杜注薊縣之上不言燕國從省文也春秋左氏傳注疏卷九考證
