body:
  text: 春秋左傳注疏卷四十八起昭公十七年盡十九年晉杜氏注唐陸德明音義孔頴逹疏經十有七年春小邾子來朝夏六月甲戌朔日有食之秋郯子來朝八月晉荀吳帥師滅陸渾之戎音義渾户門反冬有星孛于大辰注大辰房心尾也妖變非常故書音義孛音佩一音勃疏注正義曰釋天云大辰房心尾也大火謂之大辰李巡云大辰蒼龍宿之體最為明故曰房心尾也大火蒼龍宿心以候四時故曰辰孫炎曰龍星明者以為時候故曰大辰大火也心在中最明故時候主焉公羊傳曰孛者何彗星也彗為帚也言其狀似掃帚光芒孛孛然妖變之星非常所有故書之傳稱孛于大辰西經直書于大辰者雖在其星之西仍在大辰分度之內故直云于大辰楚人及吳戰于長岸注吳楚兩敗莫肯告負故但書戰而不書敗也長岸楚地音義岸五旦反疏注正義曰傳稱大敗吳師又云大敗楚師是兩皆大敗也縱使兩皆來告無肯自云負敗者故但書戰而不書敗也傳稱令尹陽丐則是楚之貴臣而云楚人者楚人恥其敗以賤者告也傳十七年春小邾穆公來朝公與之燕季平子賦采叔注采叔詩小雅取其君子來朝何錫豫之以穆公喻君子疏正義曰采叔刺幽王慢諸侯也云采叔采叔筐之筥之君子來朝何錫豫之雖無豫之路車乘馬注云賜諸侯以車馬言雖無豫之尚以為薄穆公賦菁菁者莪注菁菁者莪亦詩小雅取其既見君子樂且有儀以答采叔音義菁子丁反莪五河反樂音洛疏正義曰菁菁者莪云既見君子樂且有儀既見君子者官爵之而得見也見則心既喜樂又以禮儀見接昭子曰不有以國其能久乎注嘉其能答賦言其賢故能久有國疏正義曰言不有學問之人以治其國能長久乎夏六月甲戌朔日有食之祝史請所用幣注禮正陽之月日食當用幣於社故請之疏注正義曰隂陽之氣運行於天一消一息周而復始十一月建子為陽始五月建午為隂始以易爻卦言之從建子之後每月一陽息一隂消至四月建巳六隂消盡六陽並盛是為純乾之卦正陽之月也從建午之後每月一隂息一陽消至十月建亥六陽消盡六隂並盛是為純坤之卦正隂之月也此年六月日食是夏之四月正陽之月也禮正陽之月日食諸侯當用幣於社故魯之祝史依禮法請所用之幣昭子曰日有食之天子不舉注不舉盛饌音義饌仕眷反伐鼓於社注責羣隂諸侯用幣於社注謂上公伐鼓於朝注退自責禮也疏正義曰昭子雖不言正月而云日食之禮明此月即是正月也文十五年傳與此昭子之言正同是正法有此禮也殺牲盛饌曰舉故天子不舉謂去盛饌也郊特牲云社所以神地之道也祭土而主隂氣也則社是羣隂所聚論語云鳴鼓而攻之伐鼓者是攻責之事故為責羣隂亦以責上公也二十九年傳曰封為上公祀為貴神社稷五祀是尊是奉是社為上公之神尊於諸侯故諸侯用幣於社請上公亦所以請羣隂請令勿侵陽也然伐鼓於社云責羣隂用幣於社云請上公社文是一二注不同者以天子之尊無所不責故云責羣隂也諸侯南面之君於諸侯之內唯請上公故云請上公也平子禦之注禦禁也音義禦之魚自反注同曰止也唯正月朔慝未作日有食之於是乎有伐鼓用幣禮也其餘則否太史曰在此月也注正月謂建巳正陽之月也於周為六月於夏為四月慝隂氣也四月純陽用事隂氣未動而侵陽災重故有伐鼓用幣之禮也平子以為六月非正月故太史答言在此月也音義正音政慝他得反夏戶雅反下文當夏注當夏並同疏正義曰平子聞有此禮而不知正月是周之六月故止其請幣仍說正禮慝惡也人情愛陽而惡隂故謂隂為慝五月隂始生故四月隂未作也平子亦不識慝為隂義故語雖得禮而心不肯從平子蓋以正月為嵗首之月故云其餘則否大史以平子不識正月故為辨之所言慝未作所以行伐鼓用幣之禮正當在此月也因為說日食之禮引夏書以證之日過分而未至注過春分而未夏至三辰有災注三辰日月星也日月相侵又犯是宿故三辰皆為災音義宿音秀於是乎百官降物注降物素服疏注正義曰降物謂減其物采也昏義曰日食則天子素服知百官降物亦素服也古之素服禮無明文蓋象朝服而用素為之如今之單衣也近世儀注日食則擊鼓於大社天子單衣介幘辟正殿坐東西堂百官白服坐本司大常率官屬繞大廟過時乃罷君不舉辟移時注辟正寢過日食時樂奏鼓注伐鼓疏正義曰樂奏鼓與下瞽奏鼓一也樂謂作樂之人即瞽矇也奏訓進也孔安國尚書傳云瞽樂官樂官進鼓則伐之故杜云伐鼓也其日食王或有至社親伐鼓之時故周禮大僕云凡軍旅田役贊王鼓救日月食亦如之鄭𤣥云王通鼓佐擊其餘面則日食王有親鼓之時也祝用幣注用幣於社史用辭注用辭以自責故夏書曰辰不集于房注逸書也集安也房舍也日月不安其舍則食瞽奏鼓注瞽樂師音義瞽音鼓嗇夫馳庶人走注車馬曰馳步曰走為救日食備也音義嗇音色疏正義曰此尚書􅏷征文也彼云乃季秋月朔辰弗集于房彼季秋日食亦以此禮救之傳言唯正月朔日食乃有伐鼓用幣餘月則否引夏書而與夏書違者蓋先代尚質凡有日食皆用鼓幣周禮極文周家禮法見事有差降唯正陽之月特用鼓幣餘月則否注正義曰杜以鳥止謂之集故訓集為安也孔安國云房所舍之次集合也不合則日食可知與杜少異杜以馳是馬疾行故云車馬曰馳步曰走孔安國云嗇夫主幣之官馳取幣禮天神嗇夫於周禮無文鄭注覲禮云嗇夫蓋司空之屬也則官屬司空庶人在官若胥徒之屬使之取幣而禮天神也衆人走共救日食之百役也嗇夫取幣未必馳車蓋馳走相對變其文耳言禮天神者謂天子禮傳無天子禮天神之事文不具此月朔之謂也當夏四月是謂孟夏注言此六月當夏家之四月平子弗從昭子退曰夫子將有異志不君君矣注安君之災故曰有異志疏正義曰日食隂侵陽臣侵君之象救日食所以助君抑臣也平子不肯救日食乃是不君事其君也劉炫云乃是不復以君為君矣秋郯子來朝公與之宴昭子問焉曰少皥氏鳥名官何故也注少皥金天氏黃帝之子己姓之祖也問何故以鳥名官音義少詩照反皥胡老反己音紀又音祀疏注正義曰帝系云黃帝生𤣥囂也史記云黃帝正妃生二子其後皆有天下其一曰𤣥囂是為青陽降居江水言降居江水謂不為帝也此傳言其以鳥名官則是為帝明矣故世本及春秋緯皆言青陽即是少皥黃帝之子代黃帝而有天下號曰金天氏少皥氏身號金天氏代號也晉語稱青陽與黃帝同德故為姬姓黃帝之子十四人為十二姓其十二有姬有己青陽既為姬姓則己姓非青陽之後而世本己姓出自少皥非青陽也事逺書亡不可委悉耳郯子曰吾祖也我知之昔者黃帝氏以雲紀故為雲師而雲名注黃帝軒轅氏姬姓之祖也黃帝受命有雲瑞故以雲紀事百官師長皆以雲為名號縉雲氏蓋其一官也音義長丁丈反縉音進疏注正義曰史記云黃帝者少典之子名曰軒轅為天子代神農氏是為黃帝晉語云黃帝以姬水成為姬姓是姬姓之祖也以少皥之立有鳯鳥之瑞而以鳥紀事黃帝以雲紀事明其初受天命有雲瑞也雲之為瑞未能審也史記天官書曰若煙非煙若雲非雲郁郁紛紛蕭索輪囷是為卿雲或作慶雲或作景雲孝經援神契曰德至山陵則景雲出服䖍云黃帝受命得景雲之瑞故以雲紀事黃帝雲瑞或當是景雲也百官師長皆以雲為名號即是以雲紀綱諸事也雲為官名更無所出唯文十八年傳云縉雲氏有不才子疑是黃帝時官故云縉雲氏蓋其一官也炎帝氏以火紀故為火師而火名注炎帝神農氏姜姓之祖也亦有火瑞以火紀事名百官疏注正義曰帝系世本皆為炎帝即神農氏炎帝身號神農代號也譙周考古史以為炎帝與神農各為一人非杜義晉語云炎帝以姜水成為姜姓是為姜姓之祖也火之為瑞亦未審也共工氏以水紀故為水師而水名注共工以諸侯霸有九州者在神農前大皥後亦受水瑞以水為官音義共音恭大音泰下大皥同疏注正義曰共工氏霸有九州祭法文也此傳從黃帝向上逆陳之知共工在神農前大皥後也水之為瑞亦未審也大皥氏以龍紀故為龍師而龍名注大皥伏犧氏風姓之祖也有龍瑞故以龍命官疏注正義曰月令孟春云其帝大皥易下繫云包犧氏之王天下也即大皥大皥身號伏犧代號也僖二十一年傳云任宿須句風姓也實司大皥知大皥是風姓之祖也龍之為瑞亦未審也此黃帝以上四代用火雲水龍紀事其官之名必用雲火水龍為之但書典散亡更無文紀其名不可復知故杜不復委說唯有縉雲見傳疑是黃帝官耳服䖍云黃帝以雲名官蓋春官為青雲氏夏官為縉雲氏秋官為白雲氏冬官為黑雲氏中官為黃雲氏炎帝以火名官春官為大火夏官為鶉火秋官為西火冬官為北火中官為中火共工以水為官春官為東水夏官為南水秋官為西水冬官為北水中官為中水大皥以龍名官春官為青龍氏夏官為赤龍氏秋官為白龍氏冬官為黑龍氏中官為黃龍氏此皆事無所見茍出肺腸少皥鳥紀不以五方名官焉知彼四代者皆以四時五方名官乎以縉為赤色則云夏官為縉雲焉知餘方不更為之目而直指青黃為名也以天文有大火鶉火即云春為大火夏為鶉火其餘何故直以西北名火也此皆虛而不經故不可采用我髙祖少皥摰之立也鳯鳥適至故紀於鳥為鳥師而鳥名鳯鳥氏歷正也注鳯鳥知天時故以名歷正之官音義摰音至疏注正義曰釋鳥云鶠鳯其雌皇則此鳥雄曰鳯雌曰皇說文云鳯神鳥也山海經云丹穴之山有鳥焉其狀如雞五采而文名曰鳯皇見則天下大安寧運斗樞云天樞德見則鳯皇翔中侯握河紀云堯即政七十年鳯皇止庭伯禹拜曰昔帝軒提象鳯巢阿閣白虎通云黃帝時鳯皇蔽日而至止於東園終身不去諸書皆言君有聖德鳯皇乃來是鳯皇知天時也歷正主治歷數正天時之官故名其官為鳯鳥氏也當時名官直為鳥名而已其所職掌與後代名官所司事同所言歷正以下及司徒司寇工農之屬皆以後代之官所掌之事託言之言爾時鳥名如今之此官也𤣥鳥氏司分者也注𤣥鳥燕也以春分來秋分去音義燕於見反疏注正義曰說文云燕𤣥鳥也釋鳥云燕燕􅜈郭璞曰詩云燕燕于飛一名𤣥鳥齊人呼􅜈詩云天命𤣥鳥月令云玄鳥至之日是一名𤣥鳥也或單呼為燕或重名燕燕異方語也此鳥以春分來秋分去故以名官使之主二分伯趙氏司至者也注伯趙伯勞也以夏至鳴冬至止疏注正義曰釋鳥云鵙伯勞也樊光曰春秋云伯趙氏司至伯趙鵙也以夏至來冬至去郭璞曰似鶷􅗾而大此鳥以夏至來冬至去故以名官使之主二至也月令仲夏之月鵙始鳴蔡雍云鵙伯勞也一曰伯趙應時而鳴為隂侯也詩云七月鳴鵙者鄭𤣥云豳地晚寒鳥物之候從其氣焉王肅云七當為五古文五字似七故誤青鳥氏司啓者也注青鳥鶬鴳也以立春鳴立夏止音義鶬音倉鴳亦作鷃於諫反疏注正義曰青鳥鶬鷃爾雅無文先儒傳說耳立春立夏謂之啓此鳥以立春鳴立夏止故以名官使之主立春立夏丹鳥氏司閉者也注丹鳥鷩雉也以立秋來立冬去入大水為蜃上四鳥皆歷正之屬官音義鷩必滅反蜃市軫反疏注正義曰釋鳥雉之類有鷩雉樊光曰丹雉也少皥氏以鳥名官丹鳥氏司閉以立秋來立冬去入水為蜃周禮王享先公服鷩冕郭璞曰似山雞而小冠背毛黃腹下赤項緑色鮮明是解丹鳥為鷩雉也立秋立冬謂之閉此鳥以秋來冬去故以名官使之主立秋立冬也分至啓閉立四官使主之鳯皇氏為之長故云四鳥皆歷正之屬官也祝鳩氏司徒也注祝鳩鷦鳩也鷦鳩孝故為司徒主教民音義鷦音焦本又作焦本或作鷦子遙反又子堯反疏注正義曰釋鳥云隹其鳺鴀舍人云隹一名夫不今楚鳩也樊光曰春秋云祝鳩氏司徒祝鳩即隹其夫不孝故為司徒郭璞曰今䳕鳩也詩云翩翩者隹毛傳云鷦夫不也一宿之鳥鄭𤣥云一宿者一意於其所宿之木又云夫不鳥之慤謹者人皆愛之則此是謹慤孝順之鳥故名司徒之官教人使之孝也鴡鳩氏司馬也注鴡鳩王鴡也鷙而有别故為司馬主法制音義鴡本又作雎七徐反鷙音至本又作摯下同别故列反疏注正義曰釋鳥云鴡鳩王鴡李巡云王鴡一名鴡鳩郭璞云鵰類今江東呼之為鶚好在江渚山邉食魚毛詩傳曰鳥鷙而有别則鴡鳩是鷙擊之鳥又能雄雌有别也司馬主兵又主法制擊伐又當法制分明故以此鳥名官使主司馬之職鳲鳩氏司空也注鳲鳩鴶鵴也鳲鳩平均故為司空平水土音義鴶本亦作秸簡八反又音吉鵴本亦作鞠居六反疏注正義曰釋鳥云鳲鳩鴶鵴樊光曰春秋云鳲鳩氏司空心平均故為司空郭璞曰今之布榖也孫炎曰方言云鳲鳩自關而東謂之戴勝陸璣毛詩義疏云今梁宋之間謂布榖為鴶鵴則布榖是鳲鳩明矣而楊雄云鳲鳩是戴勝也今戴勝自生穴中不巢生雄言非也詩云鳲鳩在桑其子七兮毛傳云鳲鳩之養其子朝從上下莫從下上平均如一是鳲鳩平均故為司空尚書舜典云伯禹作司空帝曰禹汝平水土惟時懋哉是司空主平水土也爽鳩氏司寇也注爽鳩鷹也鷙故為司寇主盜賊音義爽所丈反疏注正義曰釋鳥云鷹鶆鳩樊光曰來鳩爽鳩也春秋曰爽鳩氏司寇鷹鷙故為司寇郭璞曰鶆當為爽字之誤耳左傳作爽鳩是也鷹是鷙擊之鳥司寇主擊盜賊故為司寇鶻鳩氏司事也注鶻鳩鶻鵃也春來冬去故為司事音義鵃陟交反又陟留反又音雕疏注正義曰釋鳥云鶌鳩鶻鵃舍人曰鶌鳩一名鶻鵃今之班鴆也樊光曰春秋云鶻鳩氏司事春來冬去孫炎曰鶻鳩一名鳴鳩月令云鳴鳩拂其羽郭璞云今江東亦呼為鶻鵃似山鵲而小尾尾青黑色多聲即是此也舊說及廣雅皆云班鳩非也所論班鳩鳴鳩雖有異同其言春來冬去舊有此說國家營事繕治器物一年之間無時暫止故以此鳥名司事之官也司事謂營造之事於六官皆屬司空此司空司事各為一官者古今代異猶如舜典司空與共工各為一官也五鳩鳩民者也注鳩聚也治民上聚故以鳩為名疏注正義曰鳩聚釋詁文也治民上其集聚惡其流散故以鳩為官名欲其聚散民也五雉為五工正注五雉雉有五種西方曰鷷雉東方曰鶅雉南方曰翟雉北方曰鵗雉伊洛之南曰翬雉音義種章勇反下同鷷音存又音遵本或作蹲鶅側其反翟音狄又音濁鵗本又作希如字一音丁里反翬許韋反疏注正義曰釋鳥雉之屬十有四其說四方之雉西方曰鷷東方曰鶅南方曰􅔧北方曰鵗舍人曰釋四方之雉名也杜言四方之雉唯南方不同也釋鳥又云鸐山雉樊光曰其羽可持而舞詩云右手秉翟郭璞云長尾者爾雅之文翟與􅔧别而賈逵亦云南方曰翟雉則先儒相傳為說杜從之也釋鳥又云伊洛而南素質五采皆備成章曰翬李巡曰素質五采備具文章鮮明曰翬孫炎曰翬雉白質五采為文也傳言五雉必取五方伊洛土之中區明其取翬雉與四方之雉為五也賈逵云西方曰鷷雉攻木之工也東方曰鶅雉磚埴之工也南方曰翬雉攻金之工也北方曰鵗雉攻皮之工也伊洛而南曰翬雉設五色之工也樊光注爾雅四方之雉配工亦與賈同唯翬雉不配工耳案賈樊所言之工出於考工記耳而考工記更有刮摩之工凡有六工非唯五也且記是後世之書少皥時工未必如記所說又以工配雉無所憑據不可采用故杜不言利器用正度量夷民者也注夷平也音義量音亮疏正義曰雉聲近夷雉訓夷夷為平故以雉名工正之官使其利便民之器用正丈尺之度斗斛之量所以平均下民也樊光服䖍云雉者夷也夷平也使度量器用平也九扈為九農正注扈有九種也春扈鳻鶞夏扈竊𤣥秋扈竊藍冬扈竊黃棘扈竊丹行扈唶唶宵扈嘖嘖桑扈竊脂老扈鷃鷃以九扈為九農之號各隨其宜以教民事音義扈音户鳻扶云反又如字鶞勑倫反唶側百反又子夜反又助額反嘖音責又音賾疏注正義曰釋鳥自春鳸鳻鶞至宵扈嘖嘖凡七鳸其文相次與此注正同李巡總釋之云諸扈别春夏秋冬四時之名唶唶嘖嘖鳥聲貌也郭璞曰諸鳸皆因其毛色音聲以為名竊藍青色釋鳥又云鶨䳢老扈鴳桑扈竊脂注爾雅者舍人李巡孫炎郭璞皆斷老上屬鳸下屬解云鶨一名䳢老鴳一名鳸鳸雀也唯樊光斷鶨䳢為句以老下屬注云春秋云九扈為九農正九扈者春扈夏扈秋扈冬扈棘扈行扈宵扈桑扈老扈是以老為下屬唯鴳不重耳李巡云竊脂一名桑扈郭璞曰俗謂之青雀觜白食肉好盜脂膏因名云鄭𤣥詩箋云竊脂肉食陸璣毛詩義疏云竊脂青雀也好竊人脯肉及筒中膏故以名竊脂也諸儒說竊脂皆謂盜人脂膏也即如此言竊𤣥竊黃者豈復盜竊𤣥黃乎爾雅釋獸云虎竊毛謂之虦貓魋如小熊竊毛而黃竊毛皆謂淺毛竊即古之淺字但此鳥其色不純竊𤣥淺黑也竊藍淺青也竊黃淺黃也竊丹淺赤也四色皆具則竊脂為淺白也其唶唶嘖嘖則聲音為之名矣其春扈鳻鶞樊光云鳻鶞言分循也春扈分循五土之宜乃以人事名鳥其義未必然也爾雅老扈鴳字不重賈服皆云鷃鷃亦聲音為名也賈逵云春扈分循相五土之宜趣民耕種者也夏扈竊𤣥趣民耘苗者也秋扈竊藍趣民收斂者也冬扈竊黃趣民蓋藏者也棘扈竊丹為果驅鳥者也行扈唶唶晝為民驅鳥者也宵扈嘖嘖夜為農驅獸者也桑扈竊脂為蠶驅雀者也老扈鷃鷃趣民收麥令不得晏起者也舍人樊光注爾雅其言亦與賈同其意皆謂以扈為官還令依此諸扈而動作也然則趣民耕耘及收斂蓋藏其事可得召民使聚而總號令之其為果驅鳥為蠶驅雀豈得多置官方使之就果樹入蠶室為民驅之哉又晝驅鳥夜驅獸不免竟日通宵常在田野溥天之下何以可周且其言不經難可據信也杜云以九扈為九農之號各隨其宜以教民事以舊說不可采用又不能知其職掌故未言之扈民無淫者也注扈止也止民使不淫放自顓頊以來不能紀逺乃紀於近為民師而命以民事則不能故也注顓頊氏代少皥者德不能致逺瑞而以民事命官音義顓音專頊許玉反疏正義曰𫝊言少皥摰之立也鳯鳥適至則鳯鳥以初立時至也因其初立而有此瑞鳥遂即以鳥紀事雲火水龍亦以初立而有此瑞用之以紀庶事自顓頊以來初立之時既無逺瑞不能紀以逺而乃紀於近天瑞逺民事近為民之師長而命其官以民事則為不能致逺瑞故仲尼聞之見於郯子而學之注於是仲尼年二十八疏注正義曰沈文阿云襄三十一年注云仲尼年十嵗計至此年二十七今云二十八誤既而告人曰吾聞之天子失官學在四夷猶信注失官官不修其職也傳云聖人無常師疏正義曰王肅云郯中國也故吳伐郯季文子歎曰中國不振旅蠻夷入伐吾亡無日矣孔子稱學在四夷疾時學廢也郯少皥之後以其世則逺以其國則小矣魯周公之後以其世則近以其國則大矣然其禮不如郯故孔子發此言也失官為所居之官不修其職也仲尼學樂於萇𢎞問官於郯子是聖人無常師晉侯使屠蒯如周請有事於雒與三塗注屠蒯晉侯之膳宰也以忠諫見進雒雒水也三塗山名在陸渾南音義蒯苦怪反雒音洛萇𢎞謂劉子曰客容猛非祭也其伐戎乎陸渾氏甚睦於楚必是故也君其備之乃警戎備注警戒以備戎也欲因晉以合勢音義警音景九月丁卯晉荀吳帥師涉自棘津注河津名使祭史先用牲于雒陸渾人弗知師從之庚午遂滅陸渾數之以其二於楚也陸渾子奔楚其衆奔甘鹿注甘鹿周地周大獲注先警戎備故獲宣子夢文公攜荀吳而授之陸渾故使穆子帥師獻俘于文宫注欲以應夢音義俘芳夫反應應對之應冬有星孛于大辰西及漢注夏之八月辰星見在天漢西今孛星出辰西光芒東及天漢音義夏戶雅反下文同見賢遍反疏注正義曰星孛文在冬下經傳皆無其月但冬以十月為初故以夏之八月解之也月令中秋之月日在角昏牽牛中大辰是房心尾也其星處於東方之時在角星之北故以八月之昏角星與日俱沒大辰見於西方也天漢在箕斗之間於是時天漢西南東北斜列於天大辰之星見在天漢之西也今孛星又出於大辰之西而尾東指光芒歷辰星而東及天漢也申須曰彗所以除舊布新也注申須魯大夫音義彗似鋭反又音息遂反疏正義曰彗掃帚也其形似彗故名焉帚所以掃去塵彗星象之故所以除舊布新也言此星見必有除舊之事天事恆象注天道恆以象類告示人今除於火火出必布焉諸侯其有火災乎注今火向伏故知當須火出乃布散為災音義向許亮反又作嚮梓慎曰往年吾見之是其徵也注徵始有形象而微也火出而見注前年火出時音義見賢遍反下及注並同今兹火出而章必火入而伏注隨火行也疏正義曰梓慎云往年吾見之是其徵也當時火出之時而彗星已見是隨火而行也今年火星之出而彗星章明是彗漸益長未即消滅必當火入之時與火俱伏也服䖍注本火出而章必火火入而伏重火别句孫育云賈氏舊文無重火字其居火也久矣注歷二年其與不然乎注言必然也音義與如字又音預火出於夏為三月注謂昏見於商為四月於周為五月夏數得天注得天正疏注正義曰斗柄所指一嵗十二月分為四時夏以建寅為正則斗柄東指為春南指為夏是為得天四時之正也若殷周之正則不得正若火作其四國當之在宋衛陳鄭乎宋大辰之虛也注大辰大火宋分野音義虛起居反下同分扶問反疏正義曰虛者舊居之處也陳為大皥之虛鄭為祝融之虛衛為顓頊之虛皆先王先公嘗居此地謂之虛可矣大辰星名非人居也而亦謂之虛者以天之十二次地之十二域大辰為大火之次是宋之區域故謂宋為大辰之虛猶謂晉地為參虛陳大皥之虛也注大皥居陳木火所自出鄭祝融之虛也注祝融髙辛氏之火正居鄭皆火房也注房舍也星孛天漢漢水祥也注天漢水也衛顓頊之虛也故為帝丘注衛今濮陽縣昔帝顓頊居之其城內有顓頊冢音義濮音卜其星為大水注衛星營室營室水也水火之牡也注牡雄也音義牡茂后反疏正義曰獸曰牝牡牡是雄也隂陽之書有五行嫁娶之法火畏水故以丁為壬妃是水為火之雄其以丙子若壬午作乎水火所以合也注丙午火壬子水水火合而相薄水少而火多故水不勝火音義薄本又作搏音博疏注正義曰丙是火日午是火位壬是水日子是水位故丙午為火壬子為水水火合而相薄則是夫妻合而相親親則將行其意或水從火或火從水但彗在大辰為多及漢為少水少而火多故水不勝火火行其意水必助之故此丙子壬午之日當有火災若火入而伏必以壬午注尚未知今孛星當復隨火星俱伏不故言若音義復扶又反疏正義曰劉炫云丙子壬午雖俱是水火合日但二字之內先言疆若火入而伏則連秋至春歷夫隂水用事雖同其欲水當先火故疑火入而伏則必以壬午也劉炫雖為此釋杜既無注其壬午之事理則未詳不過其見之月注火見周之五月鄭禆竈言於子産曰宋衛陳鄭將同日火若我用瓘斝玉瓚鄭必不火注瓘圭也斝玉爵也瓚勺也欲以禳火音義禆婢支反瓘古亂反斝古雅反瓚才旦反勺上若反禳本亦作攘如羊反下同疏注正義曰瓘是玉名此傳所云皆是成就之器故知瓘是圭也斝是爵名玉字在斝瓚之間知斝亦以玉為之故云斝玉爵也周禮典瑞云裸圭有瓚鄭司農云於圭頭為器可以挹鬯裸祭謂之瓚國語謂之鬯瓚鄭𤣥云漢禮瓚槃大五升口徑八寸下有槃口徑一尺考工記玉人云裸圭尺有二寸有瓚以祀廟鄭𤣥云瓚如槃其柄用圭有流前注鄭𤣥詩箋云圭瓚之狀以圭為柄黃金為勺青金為外朱中央是瓚為勺共祭祀之器也禆竈欲用此三物以禳火子産弗與注以為天災流行非禳所息故也為明年宋衛陳鄭災傳吳伐楚陽丐為令尹卜戰不吉注陽丐穆王曾孫令尹子瑕音義丐古害反疏正義曰陽丐心不决死戰必殺將將死是不吉也司馬子魚志在必死不以將死為凶故卜之得吉敗吳之後吳人敗之終是不吉注正義曰依世本穆王生王子揚揚生尹尹生令尹丐司馬子魚曰我得上流何故不吉注子魚公子魴也順江而下易用勝敵音義魴音房易以豉反且楚故司馬令龜我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉注得吉兆戰于長岸子魚先死楚師繼之大敗吳師獲其乘舟餘皇注餘皇舟名音義乘如字又繩證反下同使隨人與後至者守之環而塹之及泉注環周也音義環如字又音患塹七豔反盈其隧炭陳以待命注隧出入道音義隧音遂下同炭叶旦反疏注正義曰守舟者雖環而塹之塹猶不合有出入之路故滿路置火以防吳人也吳公子光注光諸樊子闔廬音義闔户獵反廬力居反請於其衆曰喪先王之乘舟豈唯光之罪衆亦有焉請藉取之以救死注藉衆之力以取舟音義喪息浪反衆許之使長鬛者三人注長鬛多髭鬚與吳人異形狀詐為楚人音義鬛力輒反髭子斯反鬚音須潛伏於舟側曰我呼餘皇則對師夜從之注師吳師也音義呼呼路反又如字下同三呼皆迭對注迭更也音義迭待結反又音弟更音庚楚人從而殺之楚師亂吳人大敗之取餘皇以歸注傳言吳光有謀經十有八年春王正月曹伯須卒注未同盟而赴以名夏五月壬午宋衛陳鄭災注來告故書天火曰災疏注正義曰傳稱皆來告火知是來告故書也春秋書他國之災皆是來告而書公羊傳曰宋衛陳鄭災何以書記異也何異爾異其同日而俱災外異不書此何以書為天下記異也榖梁亦云其志以同日也杜因此傳有來告之文故顯而異之天火曰災宣十六年傳例也六月邾人入鄅注鄅國今琅邪開陽縣音義鄅音禹許慎郭璞皆音矩國名琅音郎本或作郎秋葬曹平公冬許遷于白羽注自葉遷也畏鄭而樂遷故以自遷為文音義葉始涉反疏注正義曰成十五年許遷于葉自是以後許常以葉為都九年許遷于夷是自葉遷于夷也十三年傳曰楚之滅蔡也靈王遷許胡沈道房申於荆焉平王即位既封陳蔡而皆復之禮也注云荆荆山也滅蔡在十一年許又從夷遷于荆山平王復之復其本國許又歸於葉也故知此年遷于白羽是其自葉遷也且傳云葉在楚方城外之蔽明其欲遷之時許在葉也案傳王子勝言於楚子使之遷許則是楚人遷許非許自遷楚雖發意遷許許亦畏鄭樂遷故以自遷為文若許不樂遷楚强遷之當云楚人遷許如宋人遷宿齊人遷陽之類不得云許遷于白羽其以自遷為文知許人自樂遷也傳十八年春王二月乙卯周毛得殺毛伯過注毛伯過周大夫得過之族音義過古禾反而代之注代居其位疏注正義曰毛氏世有采地為畿內之國於時天子微弱故自殺自代不能禁之萇𢎞曰毛得必亡是昆吾稔之日也侈故之以注昆吾夏伯也稔熟也侈惡積熟以乙卯日與桀同誅音義萇直良反稔而審反侈昌氏反又尸氏反夏户雅反而毛得以濟侈於王都不亡何待注為二十六年毛伯奔楚傳疏正義曰是乙卯者昆吾之君惡熟之日也由其侈故以此日死也而毛得以此日成其侈惡於王都不亡何待注正義曰鄭語云黎為髙辛氏火正命之曰祝融其後八姓昆吾為夏伯楚世家云顓頊生稱稱生卷章卷章生黎黎為髙辛氏火正共工氏作亂帝使黎誅之而不盡帝誅黎使其弟吳回居火正為祝融回生陸終終生子六人坼剖而産焉其長曰昆吾虞翻曰昆吾為己姓封昆吾世本云昆吾者衛是也然則昆吾國名言昆吾夏伯者以表昆吾國君其上世嘗為夏伯其惡熟誅者非此為伯之身當是後世之孫耳詩云韋顧既伐昆吾夏桀共桀同文又傳云乙卯亡知以乙卯日與桀同時誅三月曹平公卒注為下㑹葬見原伯起本夏五月火始昏見注火心星音義見賢遍反丙子風梓慎曰是謂融風火之始也注東北曰融風融風木也木火母故曰火之始疏注正義曰東北曰融風易緯作調風俱是東北風一風有二名東北木之始故融風為木也木是火之母火得風而盛故融為火之始七日其火作乎注從丙子至壬午七日壬午水火合之日故知當火作戊寅風甚壬午大甚疏正義曰甚者益盛之言也丙子初風連日不息至戊寅而風益盛至壬午而風又大盛初言融風是東北風也蓋自丙子至壬午風不回而稍益盛傳雖主言魯國之風彼四國亦當然也宋衛陳鄭皆火梓慎登大庭氏之庫以望之注大庭氏古國名在魯城內魯於其處作庫高顯故登以望氣參近占以審前年之言音義大甚本或作火甚處昌慮反下祭處同故登以望氣本或作以望氛氣疏注正義曰大庭氏古天子之國名也先儒舊說皆云炎帝號神農氏一曰大庭氏服䖍云在黃帝前鄭𤣥詩譜云大庭在軒轅之前亦以大庭為炎帝也對文則藏馬曰廄藏車曰庫曲禮云在府言府在庫言庫鄭𤣥云府謂寶藏貨賄之處庫為車馬兵甲之處又大學云未有府庫財非其財者則庫亦藏財貨非獨車馬甲兵也古之大庭嘗都於魯其虛在魯城內魯於其處作庫而其地高顯故梓慎登之以望氣梓慎往年言其將火今更望氣參驗近占以審己前年之言信也梓慎所望望天氣耳非能望見火也而何休難云宋衛陳鄭去魯皆數千里為登髙以見其火豈實事哉劉炫云案左傳不言望火何以言見其火𤣥卿以為孔子登泰山見吳門之白馬離婁覩千里之毫末梓慎既非常人何知不見數百里之煙火孔子在陳知桓僖災者豈復望見之乎若見火知災則人皆知之矣何所貴乎梓慎左氏傳而編記之哉且四國去魯才數百里而何休云數千里雖意欲其逺亦虛妄之極梓慎所望自當有以知之不知見何氣知其災也服䖍云四國次有火氣也梓慎不言夜望安知望次陳獨無次何所望哉今以為服解義或然也曰宋衛陳鄭也數日皆來告火注言經所以書音義數所主反裨竈曰不用吾言鄭又將火注前年裨竈欲用瓘斝禳火子産不聼今復請用之音義禳如羊反復扶又反下同鄭人請用之注信竈言子産不可子大叔曰寶以保民也若有火國幾亡可以救亡子何愛焉子産曰天道逺人道邇非所及也何以知之竈焉知天道是亦多言矣豈不或信注多言者或時有中音義幾音祈又音機下同竈焉於䖍反中丁仲反遂不與亦不復火注傳言天道難明雖裨竈猶不足以盡知之鄭之未災也里析告子産曰將有大祥注里析鄭大夫祥變異之氣音義析星歷反大祥或作火祥非也疏正義曰祥者善惡之徵中庸云國家將興必有禎祥祥則吉祥也國家將亡必有妖孽孽則凶祥也則祥是善事而里析以民動國亡為大祥者彼對文言耳書序云亳有祥桑榖共生于朝五行傳云時有青眚青祥白眚白祥之類皆以惡徵為祥是祥有善有惡故杜云祥變異之氣民震動國幾亡吾身泯焉弗良及也注言將先災死音義泯面忍反先悉薦反疏正義曰良是語辭史傳多云良所未悟良有以也是古今共有此語也而服䖍云弗良及者不能及也良能也能非良之訓妄言耳國遷其可乎子産曰雖可吾不足以定遷矣注子産知天災不可逃非遷所免故託以知不足音義知音智及火里析死矣未葬子産使輿三十人遷其柩注以其常與己言故音義輿音餘柩其又反火作子産辭晉公子公孫于東門注晉人新來未入故辭不使前也疏注正義曰下云出新客禁舊客勿出於宫此辭于東門明是晉人新來未入故辭之不使前也此新來蓋聘使也晉人往因驪姬之難詛謂畜羣公子故文襄之世公子皆出在他國自成公更立公族國內始有公子故使之來聘也自晉適鄭當入西門而辭之東門者鄭城西臨洧水其西無門蓋從東門入為便故辭于東門使司寇出新客注新來聘者禁舊客勿出於宫注為其知國情不欲令去音義為于僞反令力呈反使子寬子上巡羣屏攝至于大宫注二子鄭大夫屏攝祭祀之位大宫鄭祖廟巡行宗廟不得使火及之音義行下孟反下文行火下注復行同疏注正義曰子寬游吉之子世族譜子寬與游速渾罕為一人駟帶字子上六年死矣此别有子上非駟帶也世族譜雜人內有子上無子寬明子寬與渾罕為一人也楚語說事神之禮云使名姓之後能知犧牲之物彛器之量屏攝之位壇場之所而心率舊典者為之宗知屏攝是祭祀之位也鄭衆云攝攝束茅以為屏蔽其事或當然使公孫登徙大龜注登開卜大夫使祝史徙主祏於周廟告于先君注祏廟主石函周廟厲王廟也有火災故合羣主於祖廟易救護音義祏音石函音咸易以豉反疏注正義曰每廟木主皆以石函盛之當祭則出之事畢則納於函藏於廟之北壁之內所以辟火災也文二年傳云鄭祖厲王故知鄭之周廟是厲王之廟也既有災皆須防守故合羣主就於祖王廟易救護也衛次仲云右主八寸左主七寸廣厚三寸穿中央逹四方也范寧云天子主長尺二寸諸侯主長一尺也白虎通云納之西壁使府人庫人各警其事注警備火也音義警音景疏正義曰曲禮云在府言府在庫言庫皆是藏財賄之處故使其人各自警守以防火也周官有大府內府外府天府玉府泉府而無掌庫之官蓋府庫通言庫亦謂之府也諸侯國異政殊故府庫竝言也商成公警司宫注商成公鄭大夫司宫巷伯寺人之官出舊宫人置諸火所不及注舊宫人先公宫女音義置之豉反司馬司寇列居火道注備非常也行火所焮注焮炙也音義焮許靳反城下之人伍列登城注為部伍登城備姦也疏正義曰此承司馬司寇之下亦是二官使之行火所炙欲令人救之也言城下之人為部伍行列以登城亦是司馬司寇之人備姦寇也明日使野司寇各保其徵注野司寇縣士也火之明日四方乃聞災故戒保所徵役之人疏注正義曰傳言野司寇則司寇之官在野周禮司寇屬官有縣士掌野知野司寇是縣士也鄭𤣥縣士注云地距王城二百里以外至三百里曰野三百里以外至四百里曰縣四百里以外至五百里曰都都縣野之地其邑非王子弟公卿大夫之采地則皆公邑也謂之縣縣士掌其獄焉言掌野者郊外曰野大總言之也獄居近野之縣獄在二百里上縣之縣獄在三百里上都之縣獄在四百里上如鄭此言采邑之民有獄則采地之官長各自斷之若公邑之民有獄則縣士斷之縣士司冦屬官所掌在野故此傳謂之野司寇也縣士職曰各掌其縣之民數而聼其獄訟若邦有大役聚衆庶則各掌其縣之禁令則諸侯縣士亦當然也縣士分在四方不聞火火之明日四方乃聞有災故戒使各保其所應受徵役之人皆令具備以待上命慮有所須當徵之郊人助祝史除於國北注為祭處於國北者就太隂禳火疏正義曰周禮鄉在郊內遂在郊外諸侯亦當然郊人當謂郊內鄉之人也祝史掌祭祀之官也使此鄉人助祝史除地在城之北作壇場為祭處也就國北者南為陽北為隂就太隂禳火也禳火于𤣥冥回祿注𤣥冥水神回祿火神音義冥亡丁反疏注正義曰月令冬云其神𤣥冥知𤣥冥水神也周語云夏之亡也回祿信於黔隧先儒注左傳及國語考皆云回祿火神或當有所見也二十九年傳修及熙為𤣥冥則𤣥冥祭修熙不知回祿祭何人楚之先吳回為祝融或云回祿即吳回也祭水神欲令水抑火祭火神欲令火自止禳其餘災慮更火也祈于四鄘注鄘城也城積土隂氣所聚故祈祭之以禳火之餘災音義鄘音容書焚室而寬其征與之材注征賦稅也音義稅始鋭反三日哭國不市注示憂戚不㑹市使行人告於諸侯宋衛皆如是陳不救火許不弔災君子是以知陳許之先亡也注不義所以亡疏正義曰哀十七年楚滅陳也定六年鄭游速帥師滅許其後復立許悼公之孫成是為元公其子結元年獲麟之嵗也當戰國首為楚所滅六月鄅人藉稻注鄅妘姓國也其君自出藉稻蓋履行之音義妘音云疏注正義曰鄅為妘姓世本文也周之六月夏之四月種稻之時其君自出觀行之藉猶藉蹈藉踐履之義故為履行之服䖍云藉耕種於藉田也邾人襲鄅鄅人將閉門邾人羊羅攝其首焉注斬得閉門者頭疏正義曰攝訓為持也斬得閉門者首而持其頭遂入之盡俘以歸鄅子曰余無歸矣從帑於邾邾莊公反鄅夫人而舍其女注為明年宋伐邾起音義俘芳夫反帑音奴疏正義曰言止舍其女而留之秋葬曹平公往者見周原伯魯焉注原伯魯周大夫與之語不說學歸以語閔子馬閔子馬曰周其亂乎夫必多有是說而後及其大人注國亂俗壞言者適多漸以及大人大人在位者音義說學音悅以語魚據反大人患失而惑又曰可以無學無學不害注患有學而失道者以惑其意不害而不學則茍而可注以為無害遂不學則皆懷茍且於是乎下陵上替能無亂乎夫學殖也不學將落原氏其亡乎注殖生長也言學之進德如農之殖苖日新月益音義替他計反殖時力反長丁丈反疏正義曰周室其將亂乎夫其國內之人必多有是不說學問之說也國內多有此言而後流傳及其在位之大人大人謂公卿大夫也大人患其國內有多學而失其道者而疑惑於此言謂此言有道理也大人於是又為言曰其實可以無學無學不為害也以為無害而遂不學則茍且而可也一國之人皆懷苟且不識上下之序不知尊卑之義於是在下者陵侮其上在上者替廢其位上下失分能無亂乎夫學如殖草木也令八日長日進猶草木之生枝葉也不學則才知日退將如草木之隊落枝葉也原氏其亡滅乎七月鄭子産為火故大為社注為治也音義為火故于僞反下將為搜同祓禳於四方振除火災禮也注振棄也音義祓芳佛反徐音廢疏正義曰祭社有常而云大為社者此非常祭之月而為火特祭蓋君臣肅共禮物備異大於常祭故稱大也周禮女巫掌祓除釁浴祓禳皆除凶之祭遍於四方之神如尚書咸秩無文茍可祭者悉皆祭之所以振訊除去火災禮也嫌多祭非禮故禮之乃簡兵大搜將為搜除注治兵於廟城內地隘故除廣之子大叔之廟在道南其寢在道北其庭小注庭搜場也音義場直長反疏正義曰鄭簡公之卒將為葬除亦欲毁游氏之廟則游吉宅近大路故數將徹毁也其廟當在宅內以其居處狹隘故廟在道南寢在道北也寢即游吉所居宅也過期三日注處小不得一時畢音義處昌慮反疏正義曰此量其庭之大小而豫計之以庭小之故當過期三日欲除道使闊望及期得了亦不知本期當幾日也使除徒陳於道南廟北曰子産過女而命速除乃毁於而鄉注而女也毁女所鄉音義女音汝注同鄉許亮反本又作向注同子産朝注朝君過而怒之注怒不毁除者南毁子産及衝使從者止之曰毁於北方注言子産仁不忍毁人廟音義衝昌容反從才用反火之作也子産授兵登陴子大叔曰晉無乃討乎注辭晉公子公孫而授兵似若叛晉音義陴婢支反子産曰吾聞之小國忘守則危况有災乎國之不可小有備故也既晉之邊吏讓鄭曰鄭國有災晉君大夫不敢寧居卜筮走望不愛牲玉音義守手又反一音如字疏正義曰言為鄭卜筮何故有災宜禱何神奔走而望祭之祭山川故為望也莊二十五年傳云天災有幣無牲若祭不愛牲玉者天之見異非求人飲食隨時告請則有幣無牲若祭求弭災者則當有牲雲漢之詩美宣王為旱禱神云靡愛斯牲圭壁既卒亦是用牲玉也鄭之有災寡君之憂也今執事􅏌然授兵登陴注􅏌然徑忿貌音義􅏌遐板反徑古政反疏注正義曰服䖍云􅏌然猛貌也方言云􅏌猛也晉魏之間曰􅏌杜言徑忿貌亦是猛也但述晉人責鄭之意故以徑忿解之將以誰罪疏正義曰將以誰為罪而欲授兵疑其畏晉襲之欲禦晉擊之邊人恐懼不敢不告子産對曰若吾子之言敝邑之災君之憂也敝邑失政天降之災又懼讒慝之間謀之以啓貪人荐為敝邑不利注荐重也音義恐丘勇反慝他得反間間厠之間荐在建反重直用反下文同以重君之憂幸而不亡猶可說也注說解也不幸而亡君雖憂之亦無及也鄭有他竟望走在晉注言鄭雖與他國為竟每瞻望晉歸赴之音義竟音境疏正義曰其所瞻望奔走而歸之者唯在晉耳既事晉矣其敢有二心注傳言子産有備疏注正義曰國有災懼被人襲登陴固守是有備也楚左尹王子勝言於楚子曰許於鄭仇敵也而居楚地以不禮於鄭注十五年平王復遷邑許自夷還居葉恃楚而不事鄭疏正義曰當時許都於葉釋例土地名葉在楚界許本逼於鄭請遷近楚楚以葉與之故為居楚地注正義曰案十二年云楚師之滅蔡也靈王遷許胡沈道房申於荆則許從夷遷向荆也平王復之當從荆却向夷自夷向葉注不言自荆還葉者蓋以許遷于夷見經故據以為言其實自荆遷也晉鄭方睦鄭若伐許而晉助之楚喪地矣君盍遷許許不專於楚注自以舊國不專心事楚音義喪息浪反盍户臘反疏注正義曰劉炫云當時許之於楚更無異望非敢恃舊國不事楚當以畏鄭之故外設備禦不得專心事楚耳今杜必以為舊國不專心事楚者以此傳許謂鄭人云余舊國許畏於鄭尚以舊國不肯事鄭明以舊國亦不專心事楚劉以為畏鄭不專心事楚茍背傳文而規杜氏非也鄭方有令政許曰余舊國也注許先鄭封音義先悉薦反鄭曰余俘邑也注隱十一年鄭滅許而復存之故曰我俘邑音義復扶又反葉在楚國方城外之蔽也注為方城外之蔽障音義障章亮反土不可易注易輕也音義易以豉反國不可小注謂鄭許不可俘讎不可啓君其圖之楚子說音義說音悅冬楚子使王子勝遷許於析實白羽注於傳時白羽改為析音義析星厯反經十有九年春宋公伐邾注為鄅音義為于僞反夏五月戊辰許世子止弒其君買注加弒者責止不舍藥物音義弒音試舍音捨疏注正義曰案傳許君飲止之藥而卒耳實非止弒也言書曰弒其君則仲尼新意書弒也實非弒而加弒者責止事父不舍其藥物言藥當信醫不須己自為也釋例曰醫非三世不服其藥古之慎戒也人子之孝當盡心嘗禱而已藥物之齊非所習也許止身為國嗣國非無醫而輕果進藥故罪同於弒雖原其本心而春秋不赦其罪蓋為教之逺防也己卯地震注無傳秋齊高發帥師伐莒冬葬許悼公注無傳傳十九年春楚工尹赤遷隂于下隂注隂縣今屬南鄉縣令尹子瑕城郟叔孫昭子曰楚不在諸侯矣其僅自完也以持其世而已注遷隂城郟皆欲以自完守音義郟古洽反僅音覲持如字本或作恃怙之恃非也楚子之在蔡也注蓋為大夫時往聘蔡疏注正義曰賈逵云楚子在蔡為蔡公時也杜以楚子十一年為蔡公十三年而即位若在蔡生子唯十二嵗耳未堪立師傅也至今七年未得云建可室矣故疑為大夫時聘蔡也郥陽封人之女奔之生太子建注郥陽蔡邑音義郥古閴反及即位使伍奢為之師注伍奢伍舉之子伍員之父音義員音云費無極為少師無寵焉欲譖諸王曰建可室矣注室妻也音義少詩昭反王為之聘於秦無極與逆勸王取之正月楚夫人嬴氏至自秦注王自取之故稱夫人至為下拜夫人起音義王為于僞反注同與音預嬴音盈鄅夫人宋向戌之女也故向寧請師注寧向戌子也請於宋公伐邾音義向傷亮反戌音恤二月宋公伐邾圍蟲三月取之注蟲邾邑不書圍取不以告音義蟲直中反疏注正義曰隱四年莒人伐杞取牟婁僖二十三年齊侯伐宋圍緡伐國而圍邑取邑皆書於經知此不書圍取不以告也乃盡歸鄅俘夏許悼公瘧五月戊辰飲太子止之藥卒注止獨進藥不由醫音義瘧魚略反病也疏注正義曰言飲太子止之藥專以止為藥主是止獨進藥不由醫也太子奔晉書曰弒其君君子曰盡心力以事君舍藥物可也注藥物有毒當由醫非凡人所知譏止不舍藥物所以加弒君之名音義舍音捨下注舍于同疏正義曰此君子論止之罪也言為人臣子盡心盡力以事君父如禮記文王世子之為即自足矣如此則舍去藥物已不干知於禮可也此許世子不舍藥物致令君死是違人子之道故春秋書其弒君解經書弒君之意也邾人郳人徐人㑹宋公乙亥同盟于蟲注終宋公伐邾事音義郳五兮反楚子為舟師以伐濮注濮南夷也音義濮音卜疏正義曰費無極因此生意令王收南方使太子居城父舉此為發端費無極言於楚子曰晉之伯也邇於諸夏而楚辟陋故弗能與爭若大城城父而置太子焉注城父今襄城城父縣音義伯音霸又如字夏户雅反辟匹亦反父音甫置之䜴反以通北方王收南方是得天下也王說從之故太子建居于城父令尹子瑕聘于秦拜夫人也注為明年譖太子張本故以為夫人遣謝秦音義說音悅秋齊髙發帥師伐莒注莒不事齊故莒子奔紀障注紀障莒邑也東海贛榆縣東北有紀城音義障音章贛古弄反如淳音耿弇反榆音俞使孫書伐之注孫書陳無宇之子子占也初莒有婦人莒子殺其夫已為嫠婦注寡婦為嫠音義嫠力之反本又作釐及老託於紀鄣紡焉以度而去之注因紡纑連所紡以度城而藏之以待外攻者欲報讎音義紡芳往反度待洛反注同去起吕反裴松之注魏志云古人謂藏為去案今關中猶有此音纑力吳反麻縷也疏正義曰紡謂紡麻作纑也此婦人以麻纑度城高下令長與城等而去藏之去即藏也字書去作弆羌莒反謂掌物也今關西仍呼為弆東人輕言為去音莒劉炫云紡謂紡麻作纑為布作纑之法有小繩紀其升縷纑既為布繩無所用婦人不肯棄之積而留之以此小繩度城而去之注正義曰連所紡者謂連所紡之纑以為繩故下云投繩城外或解以連紀纑之繩然紀纑之繩其物細小而短何可以度城婦人意欲報讎故藏纑以為繩故杜云連所紡所紡即纑也及師至則投諸外注投繩城外隨之而出疏注正義曰傳言投諸外者當是繫繩城上而投其所垂於外婦人則隨之而出劉炫云唯投繩城外婦人不出今知不然者婦人既託於縋登則是愛惜身命若投繩不去身則交死若唯繫繩城上則身不離城何得言獻諸子占明知將此婦人而獻之子占師則因繩在城而夜縋登焉劉以為唯投城外而規杜氏非也或獻諸子占子占使師夜縋而登注縋繩登城音義縋直僞反登者六十人縋絶師鼓譟城上之人亦譟莒共公懼啓西門而出七月丙子齊師入紀注傳言怨不在大音義譟素報反城上之人亦譟一本作上之人亦譟共音恭疏正義曰此紀即上紀鄣也釋例土地名於莒地有紀鄣紀二名東海贛榆縣東北有紀城是嵗也鄭駟偃卒子游娶於晉大夫生絲弱注子游駟偃也弱幼少音義少詩照反其父兄立子瑕注子瑕子游叔父駟乞疏注正義曰案世本子游子瑕竝公孫夏之子杜云叔父未詳子産憎其為人也注憎子瑕且以為不順注舍子立叔不順禮也弗許亦弗止注許之為違禮止之為違衆故中立駟氏聳注聳懼也音義聳息勇反疏注正義曰釋詁云竦懼也聳與竦音義同他日絲以告其舅冬晉人使以幣如鄭問駟乞之立故駟氏懼駟乞欲逃子産弗遣請龜以卜亦弗豫大夫謀對子産不待而對客曰鄭國不天注不獲天福寡君之二三臣札瘥夭昏注大死曰札小疫曰瘥短折曰夭未明曰昏音義札側八反一音截字林作壯列反云夭死也瘥才何反字林作􅦹夭於表反昏如字疫音役疏注正義曰此皆賈逵言也周禮大司樂云大札令弛縣鄭𤣥云札疫癘也是札大疫死也爾雅云瘥病也以此說死事而與札相對故解云小疫也成二年傳說鄭靈公早死云夭子蠻是夭為少死也尚書六極一曰凶短折孔安國云短未六十折未三十是短折為早死之名故為夭也子生三月父名之未名之曰昏謂未三月而死也未名不得為臣總說諸死連言之耳今又喪我先大夫偃其子幼弱其一二父兄懼隊宗主私族於謀而立長親注於私族之謀宜立親之長者音義喪息浪反隊直類反長丁丈反注同疏正義曰大夫繼世為一宗之主恐隊失之也服䖍云祏主藏於宗廟故曰宗主少牢饋食大夫禮也大夫無主何所隊乎寡君與其二三老曰抑天實剝亂是吾何知焉注言天自欲亂駟氏非國所知音義剝邦角反疏正義曰二三老者鄭之卿大夫也服䖍云二三老駟偃家臣上言私族於謀而立長親豈得家臣不知也諺曰無過亂門民有兵亂猶憚過之而况敢知天之所亂今大夫將問其故抑寡君實不敢知其誰實知之平丘之㑹注在十三年音義諺音彥過古禾反下同一音古卧反憚待旦反君尋舊盟曰無或失職若寡君之二三臣其即世者晉大夫而專制其位是晉之縣鄙也何國之為辭客幣而報其使晉人舍之注遣人報晉使音義使所吏反注同楚人城州來沈尹戌曰楚人必敗注十三年吳縣州來今就城而取之戌莊王曽孫葉公諸梁父也音義戌音恤葉始涉反昔吳滅州來注在十三年子旗請伐之王曰吾未撫吾民今亦如之而城州來以挑吳能無敗乎侍者曰王施舍不倦息民五年可謂撫之矣音義旗音其挑徒了反疏正義曰平王以十三年五月始即位其年兵亂未息今嵗又役民城州來其間唯有五年戌曰吾聞撫民者節用於內而樹德於外民樂其性而無寇讎今宫室無量民人日駭勞罷死轉注轉遷徙也音義樂音洛罷音皮本或作疲疏正義曰性生也兵革竝起則民不樂生國家和平則樂生忘寢與食非撫之也注傳言平王所以不能霸鄭大水龍鬭于時門之外洧淵注時門鄭城門也洧水出滎陽密縣東南至潁川長平入潁音義洧于軌反國人請為禜焉音義禜為命反疏正義曰禜祭名元年傳曰山川之神則水旱癘疫之不時於是乎禜之子産弗許曰我鬭龍不我覿也注覿見也音義覿大厯反見賢遍反龍鬭我獨何覿焉禳之則彼其室也注淵龍之室吾無求於龍龍亦無求於我乃止也注傳言子産之知音義知音智疏正義曰言禳之則彼淵是其室也其室既近禳之不難但吾無求於龍龍亦無求於我乃止也言其不復祭令尹子瑕言蹶由於楚子注蹶由吳王弟五年靈王執以歸音義蹶九衛反曰彼何罪諺所謂室於怒市於色者楚之謂矣注言靈王怒吳子而執其弟猶人忿於室家而作色於市人疏正義曰室內於自家相瞋怒市於他人作色忿舍前之忿可也乃歸蹶由注言楚子能用善言音義舍音捨又音赦春秋左傳注疏卷四十八春秋左氏傳注疏卷四十八考證傳唯正月朔慝未作日有食之於是乎伐鼓用幣禮也其餘則否大史曰在此月也漢書五行志引此傳劉歆說曰正月謂周六月夏四月正陽純乾之月也慝謂隂爻也冬至陽爻初起故曰復至建巳之月為純乾亡隂爻而隂侵陽為災重故伐鼓用幣責隂之禮傳故夏書曰辰不集于房劉敞曰夏書乃季秋月朔非正陽之月詩十月之交朔日辛卯日有食之亦孔之醜然則古人不獨以正月日食為醜矣傳所言未可信也臣照按日食乃天行一定之度數與昏旦中星無以異也星官推步可以不爽銖黍而自古重以為災者何歟或曰古人算法疏濶不知其為一定自夏書以來傳以為災中庸曰雖聖人有所不知焉此之謂矣或曰聖人未始不知日食之有定期也辟之夀命修短不因疾病與否而父母有疾未有不憂之理故明知日食之有定期而不得不以為災焉孔子作春秋但記何年何月日食而無明訓其故不可得而知矣傳昭子問焉曰少皥氏鳥名官何故也臣召南按魯是少皥之墟郯又少昊之裔故問之又注少皥金天氏黃帝之子己姓之祖也臣浩按此注則郯國姓己與莒為同姓矣傳太皥氏以龍紀故為龍師而龍名疏包犧氏之王天下也即太皥太皥身號伏犧代號也監本脫太皥二字今添傳伯趙氏司至者也疏此鳥以夏至來冬至去去上監本衍一止字今刪傳鶻鳩氏司事也注鶻鳩鶻鵃也各本俱誤作鶻鵰也爾雅釋鳥云鶌鳩鶻鵃鵰非鳩類今據爾雅改正傳五雉為五工正疏南方曰􅔧各本俱訛作南方曰翟疏引爾雅釋鳥不得改其文也今改正􅔧音儔傳自顓頊以來不能紀逺臣召南按南正北正及勾芒祝融后土蓐收元冥之官分掌木火土金水皆始於髙陽氏所謂命以民事也傳冬有星孛于大辰西及漢臣召南按俗讀有星孛于大辰為句西及漢為句非也當以有星孛于大辰西為句注疏甚明又按漢書五行志引此傳劉歆說曰大辰房心尾也八月心星在西方孛從其西過心東及漢也傳申須曰五行志引此作申繻傳宋大辰之虛也陳大皥之虛也鄭祝融之虛也五行志注師古曰虛讀皆曰墟傳其星為大水臣召南按心為大火書傳多用之營室為大水見於此文而已傳水火所以合也五行志注張晏曰水以天一為地二牡丙與午南方火也子及壬北方水也又其配合邾人入鄅林堯叟曰鄅小國姒姓禹之後臣召南按杜注言妘姓是也林說非傳丙子風梓慎曰是謂融風五行志注張晏曰融風立春木風也淮南子曰東北曰炎風髙誘以為艮氣所生也炎風一名融風七日其火作乎丙子至壬午既其配合之日又火以七為紀傳使子寬子上巡羣屏攝疏鄭衆云攝攝束茅以為屏蔽其事或當然臣浩按疑當作屏攝束茅以為屏蔽各本俱兩攝字相連疑誤傳六月鄅人藉稻疏服䖍云藉耕種於藉田也趙汸補注曰國語宣王不藉千畝下云及藉膳夫農正陳藉禮工耕一墢則藉者耕種藉田之名記云天子田藉千畝諸侯百畝則諸侯比天子特多寡不同而已其禮則一此但言藉稻者如周禮掌稼下地者但名稻人舉一以包其餘也舊說誤以藉為藉稻又轉為履行學者疑之遂引此為周不改月之證不以服說考之故也傳原氏其亡乎王應麟曰周之衰也自原伯魯之不說學秦之亡也自子楚之不習誦傳袚禳于四方振除火災疏所以振訊除去火災臣浩按振訊應作振迅各本俱誤作訉春秋左氏傳注疏卷四十八考證
