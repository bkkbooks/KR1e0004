body:
  text: 春秋左傳注疏卷五十一起昭公二十四年盡二十五年晉杜氏注唐陸德明音義孔穎達疏經二十四年春王二月丙戌仲孫貜卒注無傳孟僖子也音義貜俱縛反徐俱碧反婼至自晉注喜得赦歸故書至夏五月乙未朔日有食之秋八月大雩丁酉把伯郁釐卒注無傳未同盟而赴以名丁酉九月五日有日無月音義郁於六反釐本又作􅘭力之反又音來疏注正義曰此年五月乙未朔一大一小七月甲午朔九月癸巳朔五日得丁酉文在八月之下是有日而無月也冬吳滅巢注楚邑也書滅用大師疏注正義曰大都以名通故不繫楚也襄十三年傳例曰用大師焉曰滅葬把平公注無傳傳二十四年春王正月辛丑召簡公南宫嚚以甘桓公見王子朝注簡公召莊公之子召伯盈也嚚南宫極之子桓公甘平公之子音義嚚魚巾反見賢遍反劉子謂萇𢎞曰甘氏又往矣對曰何害同德度義注度謀也言唯同心同德則能謀義子朝不能於我無害音義度徒洛反注同疏注正義曰同德度義尚書泰誓文也劉炫云案孔安國云德鈞則秉義者強萇𢎞此言取彼為説必其與彼德同乃度義之勝負但使德勝不畏彼強故即引泰誓而勸其務德杜為不見古文故致有此謬今知非者彼尚書之文論兩敵對戰揆度有義者強此論甘氏又往既不能同德何能度義屬意有異與書義不同且引詩斷章其類多矣劉以為杜違尚書之文而規其過非也太誓曰紂有億兆夷人亦有離德注言紂衆億兆兼有四夷不能同德終敗亡音義紂直九反億於力反疏注正義曰孔安國云夷人謂平人杜為夷狄之人者案四年傳曰啇紂為黎之搜東夷叛之孔杜各自為義其意俱通劉炫以杜為過而規其短非也余有亂臣十人同心同德注武王言我有治臣十人雖少同心也今大誓無此語音義治直吏反此周所以興也君其務德無患無人戊午王子朝入于塢注緱氏西南有塢聚言子朝稍強音義塢烏户反緱古侯反又若侯反聚才住反晉士彌牟逆叔孫于箕注將禮而歸之叔孫使梁其脛待于門內注脛叔孫家臣音義脛户定反曰余左顧而咳乃殺之注疑士伯來殺已故謀殺之音義咳苦代反右顧而笑乃止叔孫見士伯士伯曰寡君以為盟主之故是以久子注久執子以謝邾不腆敝邑之禮將致諸從者使彌牟逆吾子叔孫受禮而歸二月婼至自晉尊晉也注貶婼族所以尊晉婼行人故不言罪已音義腆他典反從才用反疏注正義曰卿當備書名氏去氏則為貶責貶婼之族喜於得免所以尊晉而自屈也釋例曰意如至自晉傳言尊晉罪已婼至自晉傳復重發但言尊晉者意如以罪見執宜在罪已婼本使人不應見執故尊晉而已內大夫行還皆不書至異於公也今此二人執而見釋更以書至見義也杜言見義者見其喜得釋特告廟而書至也三月庚戌晉侯使士景伯涖問周故注涖臨也就問子朝敬王知誰曲直音義涖音利疏正義曰晉助敬王久矣今使景伯如周問曲直者以子朝更強久競未決晉人恐敬王不成更審其事故疑而使察之也晉人於此乃辭王子朝不納其使則以前猶與往來其心兩望至此始絶耳士伯立于乾祭而問於介衆注乾祭王城北門介大也音義乾音千祭側界反介音戒注同晉人乃辭王子朝不納其使注衆言子朝曲故音義使所吏反夏五月乙未朔日有食之梓愼曰將水注隂勝陽故曰將水昭子曰旱也日過分而陽猶不克克必甚能無旱乎注過春分陽氣盛時而不勝隂陽將猥出故為旱音義猥烏罪反陽不克莫將積聚也注陽氣莫然不動乃將積聚音義陽不克莫絶句六月壬申王子朝之師攻瑕及杏皆潰注瑕杏敬王邑音義瑕户加反杏户孟反潰户內反鄭伯如晉子大叔相見范獻子獻子曰若王室何對曰老夫其國家不能恤敢及王室抑人亦有言曰嫠不恤其緯注嫠寡婦也織者常苦緯少寡婦所宜憂音義相息亮反嫠本又作釐力之反緯有貴反而憂宗周之隕為將及焉注恐禍及已音義隕于敏反今王室實蠢蠢焉注蠢蠢動擾貌音義蠢昌允反擾而小反本又作動攝吾小國懼矣然大國之憂也吾儕何知焉吾子其早圖之詩曰瓶之罄矣惟罍之恥注詩小雅罍大器瓶小器常稟於罍者而所受罄盡則罍為無餘故恥之音義儕仕皆反瓶本又作瓶步丁反罍音雷疏注正義曰此詩小雅蓼莪刺厲王之詩也或曰瓶是器罍大瓶小實由罍所資瓶是小器常稟受於罍今瓶罄盡罍更無物以共瓶惟是罍之恥也瓶喻周罍喻晉言周之微弱相依恃於晉今王室亂矣晉無力以助之是晉之恥也詩注云瓶小而盡罍大而盈刺王不使富分貧衆恤寡王室之不寧晉之恥也獻子懼而與宣子圖之注宣子韓起乃徴會於諸侯期以明年注為明年會黃父傳音義父音甫秋八月大雩旱也注終如叔孫之言冬十月癸酉王子朝用成周之寶圭于河注禱河求福音義圭于河本或作沈于河沈直蔭反又如字甲戌津人得諸河上注圭自出水隂不佞以溫人南侵注不佞敬王大夫晉以溫兵助敬王南侵子朝拘得玉者取其玉將賣之則為石王定而獻之注不佞獻玉音義拘音俱王定而獻之本或作王定之與之東訾注喜得玉故與之邑鞏縣西南訾城是也音義訾子斯反楚子為舟師以略吳疆注略行也行吳界將侵之音義疆居良反行下孟反下同沈尹戌曰此行也楚必亡邑不撫民而勞之吳不動而速之注速召也吳踵楚注躡楚踵迹音義踵章勇反躡女輒反而疆埸無備邑能無亡乎越大夫胥犴勞王於豫章之汭注汭水曲音義埸音亦犴音岸勞力報反汭如鋭反越公子倉歸王乘舟注歸遺也音義歸如字又其愧反乘繩證反又如字遺唯季反倉及壽夢帥師從王注壽夢越大夫音義夢莫公反王及圉陽而還注圉陽楚地音義圉魚吕反疏正義曰王歸行及圉陽倉與壽夢辭還歸於越也吳人踵楚而邊人不備遂滅巢及鍾離而還注鍾離不書告敗略沈尹戌曰亡郢之始於此在矣王一動而亡二姓之帥注二姓之帥守巢踵離大夫音義帥所類反注同幾如是而不及郢詩曰誰生厲階至今為梗注詩大雅厲惡階道梗病也音義幾居豈反又音幾梗更猛反疏注正義曰此詩大雅桑柔刺厲王之詩也其王之謂乎注為定四年吳入郢傳經二十有五年春叔孫婼如宋夏叔詣會晉趙鞅宋樂大心衛北宮喜鄭遊吉曹人邾人滕人薛人小邾人于黃父音義詣五計反有鸜鵒來巢注此鳥穴居不在魯界故曰來巢非常故書音義鸜其居反嵇康音權本又作鴝音劬公羊傳作鸛音權郭璞注山海經云鸜鵒鴝鵒也鵒音欲疏注正義曰此鳥穴居今驗猶然考工記云鸜鵒不踰濟禹貢導沇水東流為濟入于河溢為滎東出于陶丘北又東至于菏又東北會于汶又北東入于海濟經齊魯之界魯在汶水之南鸜鵒北方之鳥南不踰濟舊不在魯界今來魯而不穴又巢居故曰來巢傳曰書所無也是非常故書也公羊傳曰何以書記異也何異爾非中國之禽也宜穴又巢穀梁亦然案今大河以北皆有鸜鵒不得云非中國之禽也宜穴又巢信然秋七月上辛大雩季辛又雩注季辛下旬之辛也言又重上事音義重直龍反又直用反疏注正義曰月有三辛上辛上旬之辛也季辛下旬之辛也長歷推校此年七月己丑朔上辛月三日季辛二十三日也不書其日之辰空言辛者本見旱甚欲知二雩相去逺近耳無取於辰故空書辛也季辛又雩不言大者言又見其重上事上辛是大雩明季辛亦大雩也春秋旱則修雩雩而得雨則書雩喜雩有益雩而不得雨則書旱以明災成此書二雩者上辛雩而得雨雨少尋即為旱故季辛又雩傳曰秋書再雩旱甚也是言前雩少得雨旱甚而復雩故賈云上辛不注是也公羊傳曰又雩者何又雩者非雩聚以逐季氏也公以九月始孫豈七月已與季氏戰乎若使時實不旱亦不得託雩以聚衆矣九月己亥公孫于齊次于陽州注諱奔故曰孫若自孫讓而去位者陽州齊魯竟上邑未敢直前故次于竟音義孫音遜本亦作遜注及傳同竟音境下同齊侯唁公于野井注濟南祝阿縣東有野井亭齊侯來唁公公不敢遠勞故逆之往至野井音義唁音彥弔失國曰唁冬十月戊辰叔孫婼卒注公不與小斂而書日者公在外非無恩與音預斂力驗反十有一月己亥宋公佐卒于曲棘注陳留外黃縣城中有曲棘里宋地未同盟而赴以名十有二月齊侯取鄆注取鄆以居公也音義鄆音運傳二十五年春叔孫婼聘于宋桐門右師見之注右師樂大心居桐門語卑宋大夫而賤司城氏注司城樂氏之大宗也卑賤謂其才德薄昭子告其人曰右師其亡乎君子貴其身而後能及人是以有禮注唯禮可以貴身貴身故尚禮今夫子卑其大夫而賤其宗是賤其身也注賤人人亦賤已能有禮乎無禮必亡注為定十年樂大心出奔傳疏正義曰揚子法言云何以動而見敬曰敬人何以動而見侮曰侮人然則貴人者人亦貴之卑人者人亦卑之此言凡人輕賤其身則不能以尊貴之道及於他人若君子能自貴其身者已先貴人欲其身之貴是以須有禮然後能以尊貴之道及於他人既尊貴他人是以有禮宋公享昭子賦新宫注逸詩疏正義曰燕禮記云升歌鹿鳴下管新宫鄭玄云新宫小雅逸篇也其詩既逸知是小雅篇者管即笙也以燕禮及鄉飲酒升歌笙歌同用小雅知新宫必是小雅但其詩辭義皆亡無以知其意也昭子賦車轄注詩小雅周人思得賢女以配君子昭子將為季孫迎宋公女故賦之音義轄本又作胡瞎反將為于偽反疏注正義曰周人思得賢女以配君子車詩序也杜以下云逆女故知將為季孫迎宋公之女故賦之杜必知為逆女而賦者以車之詩論逆女之事其詩云間關車之兮思孌季女逝兮言間關然設此車思憶孌然季女而往迎之又云辰彼碩女令德來教皆論逆女之事又昭子因聘迎女已共宋公平論故於享禮之時而賦車轄猶如季文子如宋致女還賦韓奕之詩與此正同又何不可而劉炫以為昭子賦車轄不為逆女又以新宫非昏姻之事而規杜過然新宫既亡焉知非是親好茍生異見於義非也明日宴飲酒樂宋公使昭子右坐注坐宋公右以相近言改禮坐音義樂音洛近附近之近禮坐如字又才卧反疏注正義曰燕禮云司宫筵賔于户西東上小臣設公席于阼階上西鄉是禮坐公西向賔南向也宋公使昭子右坐令在宋公之右蓋在宋公之北同西向以相近言其改禮坐也語相泣也樂祁佐注助宴禮退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂注可樂而哀音義哀樂音洛注及下同而樂哀注可哀而樂皆喪心也心之精爽是謂魂魄魂魄去之何以能久注為此冬叔孫宋公卒傳音義喪息浪反下同季公若之姊為小邾夫人注平子庶姑與公若同母故曰公若姊疏注正義曰公若即平子之叔父也不言平子之姑而云公若之姊明公若是平子庶叔此姑與公若同母故曰公若姊也生宋元夫人注宋元夫人平子之外姊生子以妻季平子昭子如宋聘且逆之注平子人臣而因卿逆季氏強橫音義妻七計反橫華孟反公若從注從昭子音義從才用反又如字注同謂曹氏勿與魯將逐之注曹氏宋元夫人曹氏告公公告樂祁樂祁曰與之如是魯君必出政在季氏三世矣注文子武子平子疏注正義曰武子生悼子悼子生平子政在季氏唯云三世不數悼子者悼子未為卿而卒不執魯政故不數也十二年傳曰季悼子之卒也叔孫昭子以再命為卿卿必再命乃得經書名氏七年三月經書叔孫婼如齊涖盟其年十一月季孫宿卒是悼子先武子而卒平子以孫繼祖也魯君喪政四公矣注宣成襄昭無民而能逞其志者未之有也國君是以鎮撫其民詩曰人之云亡心之憂矣注詩大雅言無人則憂患至音義逞敕景反魯君失民矣焉得逞其志靖以待命猶可動必憂注為下公孫傳音義焉於虔反夏會於黃父謀王室也注王室有子朝亂謀定之趙簡子令諸侯之大夫注簡子趙鞅輸王粟具戍人曰明年將納王注納王於王城子大叔見趙簡子簡子問揖讓周旋之禮焉對曰是儀也非禮也疏正義曰樂記云簠簋俎豆制度文章禮之器也升降上下周旋裼襲禮之文也又曰鋪筵席陳尊俎列籩豆以升降為禮者禮之末節也故有司掌之仲尼燕居云子張問禮子曰師爾以為必鋪几筵升降酌獻酬酢然後謂之禮乎言而履之禮也又五年傳云公如晉自郊勞至于贈賄禮無違者晉侯以為知禮女叔齊曰是儀也非禮也此問揖讓周旋之禮又云是儀也非禮也凡此諸文皆言禮與儀異禮之與儀非為大異但所從言之有不同耳禮是儀之心儀是禮之貌本其心謂之禮察其貌謂之儀行禮必為儀為儀未是禮故云儀非禮也鄭玄禮序云禮者體也履也統之於心曰禮踐而行之曰履此訓兩釋良有以也鄭謂體為禮履為儀是其所以禮儀别也簡子曰敢問何謂禮對曰吉也聞諸先大夫子産曰夫禮天之經也注經者道之常地之義也注義者利之宜民之行也注行者人所履行音義之行下孟反注同天地之經而民實則之則天之明注日月星辰天之明也因地之性注髙下剛柔地之性也疏正義曰自夫禮至因地之性言禮本法天地也自生其六氣至民失其性言天用氣味聲色以飬人不得過其度也是故為禮以下言聖人制禮以奉天性不使過其度也經常也義宜也夫禮者天之常道地之宜利民之所行也天地之有常道人民實法則之法則天之明道因循地之恆性聖人所以制作此禮也此傳文於天言常則地亦常也於地言義則天亦義也覆言天地之經明天地皆有常也天有常明之義地有常利之義也覆云則天之明是天以明為常因地之性則地以性為義是天以光明為常義地以剛柔為常義義謂義理性謂本性言天地性義有常可以為法故民法之而為禮也注正義曰覆而無外髙而在上運行不息日月星辰溫涼寒暑皆是天之道也訓經為常故言道之常也載而無棄物無不殖山川原隰剛柔髙下皆是地之利也訓義為宜故云利之宜也杜以今文孝經云用天之道分地之利故天以道言之地以利言之天無形言其有道理也地有質言其有利益也民之所行法象天地象天而為之者皆是天之常也象地而為之者皆是地之宜也故禮為天之經地之義也孝經以孝為天之經地之義者孝是禮之本禮為孝之末本末别名理實不異故取法天地其事同也民謂人也人稟天地之性而生動作皆象天地其踐履謂之為行但人有賢與不肖行有過與不及聖人制為中法名之曰禮故禮是民之行也行者人之所履也易及爾雅並訓履為禮是禮名由踐履而生也人之本性自然法象天地聖人還復法象天地而制禮教之是禮由天地而來故仲尼説孝子産論禮皆天地民三者並言之則天之明杜以為日月星辰者以下傳云為父子兄弟昏媾姻婭以象天明若衆星之共北辰故知天明日月星也杜知髙下剛柔地之性者以下傳云為君臣上下以則地義則君髙臣下臣柔君剛地義則地之性也傳文上下其理分明人法天地其事多種杜以天明地義舉要而言故不備顯刑罰威獄溫慈惠和劉炫貴杜不具載其文而規其過非也此傳文天言則地言因者民見地有宜利因取而法效之因亦則之義也既言天之經不可復言地之經故變文稱義既言則天之明不可復言則地之性故變文言因因之與則互相通也正是變文使相辟耳生其六氣注謂隂陽風雨晦明用其五行注金木水火土氣為五味注酸鹹辛苦甘發為五色注青黃赤白黑發見也音義見賢遍反下解見放此章為五聲注宫商角徴羽音義徵張里反淫則昏亂民失其性注滋味聲色過則傷性疏正義曰此言天用氣味聲色以養人不得過其度也因上則天之下更復本之於天傳稱天有六氣此言生其六氣謂天生之也用其五行謂天用之也上天用此五行以養人五行之氣入人之口為五味發見於目為五色章徹於耳為五聲味以養口色以養目聲以養耳此三者雖復用以養人人用不得過度過度則為昏亂使人失其恆性故須為禮以節之注正義曰洪範云五行一曰水二曰火三曰木四曰金五曰土孔安國云皆其生數是其以生數為次也大禹謨説六府云水火金木土穀五行之次與洪範異者以相尅為次也此注言金木水火土者隨便而言之不以義為次也五物世所行用故謂之五行五者各有材能傳又謂之五材此傳所説禮意意在味色聲也但味色聲本於五行而來五行又是六氣所生故先言六氣五行然後至於味色聲也釋名五氣於其方各施行白虎通云言為天行氣故謂之五行洪範又演五行云水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘孔安國云鹹水鹵所生苦焦氣之味酸木實之性辛金之氣味甘味生於百穀是言五行之氣為五味水味鹹火味苦水味酸金味辛土味甘也五行本性自有此氣氣至於人乃為五味味之為異入口乃知言氣為五味謂氣入口與下章也發也皆據人知為文味為性所有色是形之貌聲是質之響色可近視聲可逺聞自近以及遠故以口目耳所知味色聲為次也五色五行之色也木色青火色赤土色黃金色白水色黑也木生柯葉則青金被磨礪則白土黃火赤水黑則本質自然也發見也謂見於人目有此五色聲之清濁差為五等聖人因其有五分配五行其本末由五行而來也但既配五行即以五者為五行之聲土為宫金為啇木為角火為徴水為羽聲之清濁入耳乃知是章徹於人為五聲也此言章為五聲元年傳云徴為五聲章徴不同者據聲之至人是為章徹據人之知聲則為徴驗是彼此之異言耳老子云五味令人口爽五色令人目盲五音令人耳聾言其過耽耆之則有此病是其過則傷本性也是故為禮以奉之注制禮以奉其性為六畜注馬牛羊雞犬豕音義畜許六反又楮六反五牲注麋鹿麏狼兔音義麋亡悲反麏九倫反本亦作麋三犧注祭天地宗廟三者謂之犧以奉五味疏正義曰口欲嘗味目欲視色耳欲聼聲人之自然之性也欲之不已則失其性聖人慮其失性是故為禮以奉養其性使不失也牲犧祭祀所用非人所食而以牲犧奉五味者禮推人道以事神神之所享皆是人食尊鬼神而異其名耳故亦為奉五味注正義曰爾雅釋畜馬牛羊犬雞五者之名其豕在釋獸之篇畜養也家養謂之畜野生謂之獸豕有野豕故因記之於釋獸耳又釋畜之末别釋馬牛羊豕犬雞六者之名其下題曰六畜謂此是也周禮膳夫云膳用六牲是庖用六牲也庖人掌共六畜鄭玄云六牲馬牛羊豕犬雞六畜即六牲也始養之曰畜將用之曰牲是畜牲一也十一年傳曰五牲不相為用注云五牲牛羊豕犬雞此異彼者以上文已言六畜則五牲非六畜故别解之周禮庖人掌共六獸鄭衆云六獸麋鹿熊麏野豕兔鄭玄云獸人冬獻狼夏獻麋又內則無熊則六畜當有狼而熊不屬今杜解五牲之名用鄭玄六畜之説去野豕而以其餘當之也傳稱牛卜日曰牲鄭玄云將用之曰牲此五者實獸也據其將用祭祀故名之曰牲服虔云牲麏鹿熊狼野豕尚書泰誓武王數紂之罪云乃夷居弗事上帝神祗遺厥先宗廟弗祀犧牲粢盛既于凶盜於神祗宗廟之下總言犧牲杜雖不見古文其言暗與之合是祭天地宗廟之牲謂之犧也然則犧亦六畜而别言之者周禮牧人凡祭祀共其犧牲以授充人繫之鄭玄云犧牲毛羽完具也授充人者當殊養之然則六畜之內取其毛羽完具别養以共祭祀者乃名為犧故與六畜異言之也服虔云三犧鴈鶩雉也為九文注謂山龍華蟲藻火粉米黼黻也華若草華藻水草火畫火粉米若白米黼若斧黻若兩巳相戾傳曰火龍黼黻昭其文也音義黼音甫黻音弗疏注正義曰尚書益稷篇云帝曰豫欲觀古人之象日月星辰山龍華蟲作會宗彝藻火粉米黼黻絺繡以五采彰施于五色作服汝明尚書之文如此其解者多有異説孔安國云日月星為三辰華象草華蟲雉也畫三辰山龍華蟲於衣服旌旗會五采也以五采成此畫焉宗廟彜樽亦以山龍華蟲為飾藻水草有文者火為火字粉若粟冰米若聚米黼若斧形黻為兩已相背葛之精者曰絺五色備曰繡如孔此言日也月也星辰也山也龍也華也蟲也七者畫於衣服旌旗山龍華蟲四者亦畫於宗廟彜器藻也火也粉也米也黼也黻也六者繡之於裳如此數之則十三章矣天之大數不過十二若為十三無所法象或以為孔并華蟲為一其言華象草華蟲雉者言象草華之蟲故為雉也若華别似草安知蟲為雉乎未知孔意必然以否鄭玄讀會為繢謂畫也絺為繡謂刺也宗彜謂虎蜼也周禮宗廟彜器有虎彜蜼彜故以宗彜名虎蜼也周禮有衮冕鷩冕毳冕其衮鷩毳者各是其服章首所畫舉其首章以名服耳衮是衮龍也衮冕九章以龍為首鷩是華蟲也鷩冕七章以華蟲為首毳是虎蜼也毳冕五章以虎蜼為首虎毛淺蜼毛深故以毳言之毳亂毛也如鄭此言則於尚書之文其章不次故於周禮之注具分辨之鄭於司服之注具引尚書之文乃云此古天子冕服十二章希或作黹字之誤也王者相變至周而以日月星辰畫於旌旗所謂三辰旗旗昭其明也而冕服九章登龍於山登火於宗彜尊其神明也九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彜皆畫以為繢次六曰藻次七曰粉米次八曰黼次九曰黻皆絺以為繡則衮之衣五章裳四章凡九也鷩畫以雉謂華蟲也其衣三章裳四章凡七也毳畫虎蜼謂宗彜也其衣三章裳二章凡五也是鄭玄之説華蟲為一粉米為一也杜之此注亦以日月星辰畫於旌旗九文唯言衣服之文謂山也龍也華也蟲也藻也粉米也黼也黻也以此為九杜言華若草華而不言蟲則華蟲各為一也粉米若白米是粉米共為一也詩云魚在在藻為水草也孔安國云火為火字考工記畫繢之事火以圜鄭衆云為圜形以火鄭玄云形如半圜然則杜言火畫火蓋同安國為火字也粉米色白故粉米若白米也考工記曰白與黑謂之黼孔安國云黼若斧形謂刃白而身黑故若斧也黻為兩巳相戾今之刺黻猶然也引桓二年傳曰火龍黼黻昭其文也者以證此九文是山龍之屬也世本云胡曹作冕注云胡曹黃帝臣也繫辭云黃帝堯舜垂衣裳而天下治蓋取諸乾坤則冕服起於黃帝也加飾起自唐虞即書云豫欲觀古人之象云云是也所以衣服畫日月星等者象王者之德照臨天下如三光之耀也山體鎮重象王者之德鎮重安靜四方又能潤益含靈如山興雲致雨也龍者水物也象王者之德流通無壅如水利蒼生又龍舒卷變化無方象人君有無方之德也華蟲即鷩雉雉有文章表王者有文章之德也宗彜彜常也宗廟之常器有六彜今唯取虎蜼者虎取毛淺而有威蜼取毛深而有知以表王者有深淺之知威猛之德也藻者水草是鮮潔之物生於清水能隨短長象王者之德冰清玉潔隨機應物隨民設教不肅而成也火者火性炎上用表王者之德能使率土羣黎向歸上命也粉米者米能濟人之命表王者有濟養之德也黼白與黑形若斧斧能裁斷以象王者有裁斷之德也黻之言戾戾背也黑與青謂之黻作兩已字相背象王者能綏化兆民能使向巳背惡以從善故為黻也日之質赤月星之質白山作獐考工記云山以獐也龍為騰躍之形蜼爾雅云卬鼻而長尾郭璞云似獼猴而大也章次如此者王者與天地合其德日月星天用昭明日最為盛所以居先月星光劣其次之也上以象天下宜法地地之形勢莫大於山故次三光也龍為水物水出於山故次之也華蟲象於禮樂文章以禮樂文章潤於萬物故以次龍也宗彜所以次華蟲者言王者既有禮樂須威知乃行無威則民不畏無知則教不成故以次也藻所以次宗彜者王者威知之德隨世而應故以次也火者言王者有德必向歸仰之如火向上故次之也米所以次火者民既歸王王須濟活濟活之理得米為生故次之也黼所以次米者言王者能濟活兆民宜裁斷合理如斧之斷決故以次之黻所以次黼者王既裁斷得所善惡各有分宜人皆背惡從善故以次之六采注畫繢之事雜用天地四方之色青與白赤與黑玄與黃皆相次謂之六色音義繢户對反疏注正義曰考工記云畫繢之事雜五色東方謂之青南方謂之赤西方謂之白北方謂之黑天謂之玄地謂之黃青與白相次赤與黑相次玄與黃相次鄭玄云此言畫繢六色所象及布采之第次此杜取彼記文省約而為之辭也五章以奉五色注青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻五色備謂之繡集此五章以奉成五色之用疏注正義曰謂之繡以上皆考工記文也此刺繡之文以比方相次色亦采也六采謂繢畫五色謂刺繡故令色采之文異耳鄭注尚書性曰采施曰色味色聲三事色居其中故杜言集此五章以奉成五色之用明上下二文亦集此所陳以奉成五味五聲之用舉中以明上下也為九歌八風七音六律以奉五聲注解見二十年為君臣上下以則地義注君臣有尊卑法地有高下為夫婦外內以經二物注夫治外婦治內各治其物疏正義曰此更覆上因地之義也為父子以下至生殖長育覆上則天之明也地有髙下聖人制禮為君臣上下君在上臣在下以法則地之義也以地有剛柔為夫婦外內天治外婦治內以經紀二物也物事也治理外內之二事也上云天之經也地之義也又云則天之明因地之性再重言之皆先天後地但法地事少則天事多故上先言法天後言法地此先云為君臣上下以則地義始云為父子兄弟以象天明者以其則地事少故先言之象天事多欲下就以從四時類其震矅殺戮及生殖長育皆是象天之事欲使文相連接故後言之也下云以象天明則是當云以象地性而云以則地義者義之與性一也因其先言故逺覆上文地之義也為父子兄弟姑姊甥舅昏媾姻亞以象天明注六親和睦以事嚴父若衆星之共辰極也妻父曰昏重昏曰媾壻父曰姻兩壻相謂曰亞音義媾古豆反姻音因亞於嫁反本亦作婭同重直龍反疏注正義曰老子云六親不和焉有孝慈六親謂父子兄弟夫婦也孝經曰孝莫大於嚴父論語云北辰居其所而衆星共之六親父為尊嚴衆星北辰為長六親和睦以事嚴父若衆星之共北極是其象天明也妻父為昏壻父為姻兩壻相謂曰亞皆釋親文也重昏曰媾爾雅無文相傳説耳釋親文曰男子先生為兄後生為弟男子謂女子先生為姊後生為妹父之姊妹為姑母之晜弟為舅謂我舅者吾謂之甥此皆世俗常言杜不解者為易知故也為政事庸力行務以從四時注在君為政在臣為事民功曰庸治功曰力行其德教務其時要禮之本也音義治直吏反疏注正義曰論語云冉子退朝子曰何宴對曰有政子曰其事也如有政雖不吾以吾其與聞之於時冉子仕於季氏稱季氏有政孔子謂之為事是在君為政在臣為事也此對文别耳論語稱孝友是亦為政明其政事通言也民功曰庸治功曰力周禮司勳文也鄭玄以為庸謂法施於民若后稷力謂制法成治若咎繇司勳又云王功曰勳國功曰功事功曰勞戰功曰多鄭注云王功者若周公國功者若伊尹事功者若禹戰功者若韓信陳平行其德教務其時要使民春耕夏耘秋斂冬藏聖王之化先致力於民是為禮之本也為刑罰威獄使民畏忌以類其震曜殺戮注雷震電曜天之威也聖人作刑戮以象類之為溫慈惠和以效天之生殖長育民有好惡喜怒哀樂生于六氣注此六者皆稟隂陽風雨晦明之氣音義效尸孝反長丁丈反好呼報反注及下於好皆同惡烏路反下注及下於惡皆同樂音洛下及注皆同疏注正義曰賈逵云好生於陽惡生於隂喜生於風怒生於雨哀生於晦樂生於明謂一氣生於二志謬矣杜以元年傳云天有六氣降生五味謂六氣共生五味非一氣生一味此民之六志亦六氣共生之非一氣生一志故云此六者皆稟隂陽風雨晦明之氣言共稟六氣而生也是故審則宜類以制六志注為禮以制好惡喜怒哀樂六志使不過節疏正義曰民有六志其志無限是故人君為政審法時之所宜事之所類以制民之六志使之不過節也下云審行信令謂人君行之知此審則宜類亦是人君則之審者言其謹愼之意也此六志禮記謂之六情在己為情情動為志情志一也所從言之異耳哀有哭泣樂有歌舞喜有施舍怒有戰鬭喜生於好怒生於惡是故審行信令禍福賞罰以制死生生好物也死惡物也好物樂也惡物哀也哀樂不失乃能協于天地之性是以長久注協和也簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也注經緯錯居以相成者疏正義曰言禮之於天地猶織之有經緯得經緯相錯乃成文如天地得禮始成就民之所以生也是以先王尚之故人之能自曲直以赴禮者謂之成人大不亦宜乎注曲直以弼其性疏正義曰劉炫云禮有宜曲宜直不可信情而行故人之能自曲直以赴於禮者謂之為成人不能赴禮則不成為人謂之為大不亦宜乎赴謂奔走言弼諧己性奔走以赴禮也恐劉義未當注正義曰性曲者以禮直之性直者以禮曲之故云曲直以弼其性也簡子曰鞅也請終身守此言也注鞅能守此言故終免於晉陽之難音義以赴禮者赴或作從難乃旦反宋樂大心曰我不輸粟我於周為客注二王後為賔客若之何使客晉士伯曰自踐土以來注踐土在僖二十八年宋何役之不會而何盟之不同曰同恤王室子焉得辟之子奉君命以會大事而宋背盟無乃不可乎右師不敢對受牒而退注右師樂大心音義焉於虔反背音佩下同疏正義曰説文云簡牒也牒札也於時號令輸王粟具戍人宋國之應出人粟之數書之於牒受牒而退言服從也士伯告簡子曰宋右師必亡奉君命以使而欲背盟以干盟主無不祥大焉注言不善無大此者為定十年宋樂大心出奔傳音義使所吏反有鸜鵒來巢書所無也師巳曰異哉吾聞文成之世童謡有之注師巳魯大夫音義巳音紀一音祀謡音遙曰鸜之鵒之公出辱之注言鸜鵒來則公出辱也疏正義曰此鳥以兩字為名但謡辭必韻故分言之鸜鵒之羽公在外野往饋之馬注饋遺也音義饋音求位反遺唯季反鸜鵒跦跦公在乾侯注跦跦跳行貌音義跦張于反又張留反跳直雕反徵褰與襦注褰袴音義褰起虔反字林巳偃反又音愆襦本或作而朱反袴苦故反説文作袴疏注正義曰內則云童子不衣襦袴是衣有袴也以可褰行故以褰為袴鸜鵒之巢遠哉遙遙稠父喪勞宋父以驕注稠父昭公死外故喪勞宋父定公代立故以驕音義稠直留反父音甫下同喪息浪反注同鸜鵒鸜鵒往歌來哭注昭公生出歌死還哭童謠有是今鸜鵒來巢其將及乎注將及禍也秋書再雩旱甚也疏正義曰既言旱甚而經不書旱者傳言旱甚解經一月再雩再雩雖曰旱甚然而後雩得雩不至成災故不書旱初季公鳥娶妻於齊鮑文子生甲注公鳥季公亥之兄平子庶叔父音義娶七住反公鳥死季公亥與公思展與公鳥之臣申夜姑相其室注公亥即公若也展季氏族相治也音義夜本或作射音夜又音亦相息亮反注同及季姒與饔人檀通注季姒公鳥妻鮑文子女饔人食官音義姒音似檀直丹反人名也或市戰反而懼乃使其妾抶己以示秦遄之妻注秦遄魯大夫妻公鳥妹秦姬也音義抶敕乙反遄市專反曰公若欲使余余不可而抶余又訴於公甫注公甫平子弟音義訴音素又音訴曰展與夜姑將要余注要劫我以非禮音義展與夜姑並如字公思展及申夜姑也與及也讀或作餘音者非也要一遙反下同秦姬以告公之注公之亦平子弟公之與公甫告平子平子拘展於卞而執夜姑將殺之公若泣而哀之曰殺是是殺余也將為之請平子使豎勿內日中不得請有司逆命注執夜姑之有司欲迎受殺生之命音義為于偽反公之使速殺之故公若怨平子季郈之雞鬭注季平子郈昭伯二家相近故雞鬬音義郈音后字林下遘反近附近之近又如字季氏介其雞注搗芥子播其羽也或曰以膠沙播之為介雞音義介又作芥音界疏注正義曰杜此二解一讀介為芥搗芥子為末播其雞羽賈逵云搗芥子為末播其雞翼可以坌郈氏雞目是此説也鄭衆云介甲也為雞著甲高誘注吕氏春秋云鎧著雞頭杜又云或曰不知誰説以膠沙播之亦不可解蓋以膠塗雞之足爪然後以沙糝之令其澀得傷彼雞也以郈氏為金距言之則著甲是也郈氏為之金距平子怒注怒其不下已音義下遐嫁反益宫於郈氏注侵郈氏室以自益且讓之注讓責也故郈昭伯亦怨平子臧昭伯之從弟會注昭伯臧為子音義從才用反後從者皆同為讒於臧氏而逃於季氏臧氏執旃平子怒拘藏氏老將禘於襄公萬者二人其衆萬於季氏注禘祭也萬舞也於禮公當三十六人音義禘大計反疏正義曰季氏私祭家廟與禘同日言將禘是豫部分也樂人少季氏先使自足故於公萬者唯有二人其衆萬於季氏輕公重已故大夫遂怨注正義曰釋例曰三年喪畢致新死之主以進於廟於是乃大祭於大廟以審定昭穆謂之禘禘於大廟禮之常也各於其宫時之為也雖非三年大祭而書禘用禘禮也釋天云禘大祭也執干戚而舞謂之萬舞也隱五年傳説舞佾之差云諸侯用六是於禮法當三十六人也此以正禮言耳亦不知昔時魯君用六佾以否公羊傳曰昭公告子家駒曰季氏僭公室吾欲弒之何如子家駒曰諸侯僭天子大夫僭諸侯久矣公曰吾何僭矣哉子家駒曰設兩觀乘大路朱干玉戚以舞大夏八佾以舞大武此皆天子之禮也如彼傳文當時或僭八佾佾不必用六也臧孫曰此之謂不能庸先君之廟注不能用禮也蓋襄公别立廟疏注正義曰杜以襄若以次遞毁則廟與先公同處禘於襄公亦應兼祭餘廟今特云禘於襄公似與先公異處故云蓋襄公别立廟大夫遂怨平子公若獻弓於公為注公為昭公子務人且與之出射於外而謀去季氏公為告公果公賁注果賁皆公為弟音義去起吕反賁音奔又扶云反又皮義反公果公賁使侍人僚柤告公公寢將以戈擊之乃走公曰執之亦無命也注獨言執之無敕命音義侍人本亦作寺人柤側加反懼而不出數月不見公不怒又使言公使戈以懼之乃走又使言公曰非小人之所及也注謂僚柤為小人音義數所主反下數世同見賢遍反公果自言公以告臧孫臧孫以難注言難逐音義難如字注同告郈孫郈孫以可勸告子家懿伯注子家羈莊公之玄孫音義郈孫以可絶句勸勸公逐季氏也懿伯曰讒人以君徼幸事若不克君受其名注受惡名音義徼古堯反不可為也疏正義曰讒人謂公若郈孫之徒讒季氏者勸君使伐季氏以君徼天之幸幸而得勝則以為己功不勝則推君為惡不可從也舍民數世以求克事不可必也疏正義曰克勝也言君從上以來舍民已經數代今以求勝此事不可必也且政在焉其難圖也公退之注退使去音義舍音捨辭曰臣與聞命矣言若泄臣不獲死乃館於公注恐受泄命之罪故留公宫以自明音義與音預泄息列反又以制反注同漏泄也叔孫昭子如闞注闞魯色音義闞口暫反公居於長府注長府官府名九月戊戌伐季氏殺公之于門遂入之平子登臺而請曰君不察臣之罪使有司討臣以干戈臣請待於沂上以察罪弗許注魯城南自有沂水平子欲出城待罪也大沂水出蓋縣南至下邳入泗音義沂魚依反疏注正義曰釋例土地名襄十八年沂出東莞蓋縣艾山南經琅邪東海至下邳縣入泗此沂水出魯國魯縣西南入泗水是沂水有二也此注云魯城南目有沂水謂出魯縣者也又云大沂水出蓋縣南至下邳入泗謂襄十八年之沂水也以有二故辨明之請囚于費弗許請以五乘亡弗許子家子曰君其許之政自之出久矣隱民多取食焉注隱約窮困音義乘繩證反為之徒者衆矣日入慝作弗可知也注慝姦惡也日冥姦人將起叛君助季氏不可知音義慝他待反冥亡定反衆怒不可蓄也注季氏衆音義蓄敕六反本亦作畜下並同蓄而弗治將薀注薀積也音義薀本作作藴紆粉反薀蓄民將生心生心同求將合注與季氏同求叛君者君必悔之弗聼郈孫曰必殺之公使郈孫逆孟懿子注懿子仲孫何忌叔孫氏之司馬鬷戾言於其衆曰若之何莫對注衆疑所助音義鬷子公反戾力計反又曰我家臣也不敢知國凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也鬷戾曰然則救諸帥徒以往陷西北隅以入注陷公圍也音義陷陷沒之陷隅本或作堣音同公徒釋甲執冰而踞注言無戰心也冰櫝丸蓋或云櫝丸是箭筒其蓋可以取飲音義踞音據櫝音獨丸胡官反筒音童又音動二音勇疏正義曰二十七年傳説此事云豈其伐人而説甲執冰以遊則此踞是遊也曲禮云遊無倨倨是慢也謂傲慢而遊戲注正義曰賈逵云冰櫝丸蓋也則是相傳為此言也方言曰弓藏謂之鞬或謂之櫝丸如彼文則櫝九是盛弓者也此或説櫝丸是箭筒其蓋可以取飲十三年傳云司鐸射奉壺飲冰謂執此也詩云抑釋掤忌抑鬯弓忌鬯藏弓則冰藏矢也毛傳云掤所以覆矢掤與冰字雖異音義同是一器也遂逐之注逐公徒孟氏使登西北隅以望季氏見叔孫氏之旌以告孟氏執郈昭伯殺之於南門之西遂伐公徒子家子曰諸臣偽劫君者而負罪以出君止注使若非君本意者君自可止不出疏正義曰子家子以為公本意自伐季氏非是諸臣所劫今子家意欲得令諸臣等偽作劫君以伐季氏者令負罪而出君自可止意如之事君也不敢不改注意如季平子名公曰余不忍也與臧孫如墓謀注辭先君且謀所奔遂行己亥公孫于齊次于陽州齊侯將唁公于平隂公先至于野井齊侯曰寡人之罪也使有司待于平隂為近故也注齊侯自咎本不敕有司遠詣陽州而欲近會于平隂故令魯侯過共先至野井遠見迎逆自咎以謝公音義為于偽反咎其九反下同令力呈反書曰公孫于齊次于陽州齊侯唁公于野井禮也將求於人則先下之禮之善物也注物事也謂先往至野井音義下遐嫁反齊侯曰自莒疆以西請致千社注二十五家為社千社二萬五千家欲以給公音義疆居良反疏注正義曰禮有里社郊特牲稱唯為社事單出里以二十五家為里故知二十五家為社也以待君命注待君伐季氏之命寡人將帥敝賦以從執事唯命是聽君之憂寡人之憂也公喜子家子曰天祿不再天若胙君不過周公以魯足矣失魯而以千社為臣誰與之立注為齊臣音義胙才路反疏正義曰天之福祿不可再謂得齊千社復得魯國也胙報也天若報君終不得過于周公周公止卦魯以魯封君足矣若既得魯國又得千社則是過周公矣周公理不可過得齊千社失魯國也既失魯國而以千社為臣於齊誰復與之立也言從君之人皆將棄君夫矣且齊君無信不如早之晉弗從臧昭伯率從者將盟載書曰戮力一心好惡同之信罪之有無注信明也處者有罪從者無罪音義戮音六又力雕反繾綣從公無通外內注繾綣不離散音義繾音遣綣起阮反以公命示子家子子家子曰如此吾不可以盟羈也不佞不能與二三子同心而以為皆有罪注從者陷君留者逐君皆有罪也或欲通外內且欲去君注去君偽負罪出奔不必譴綣從公二三子好亡而惡定焉可同也陷君於難罪孰大焉通外內而去君君將速入弗通何為而何守焉乃不與盟注何必守公音義好呼報反惡烏路反焉可於虔反難乃旦反不與音預昭子自闞歸見平子平子稽顙曰子若我何昭子曰人誰不死子以逐君成名子孫不忘不亦傷乎將若子何平子曰茍使意如得改事君所謂生死而肉骨也昭子從公于齊與公言子家子命適公館者執之注恐從者知叔孫謀音義稽音啓顙息黨反公與昭子言於幄內曰將安衆而納公注昭子請歸安衆音義幄於角反公徒將殺昭子疏正義曰昭子謀歸安衆而後納公則獨公得入從公伐季氏者不得入故欲殺昭子也伏諸道注伏兵左師展告公公使昭子自鑄歸注辟伏兵音義鑄之樹反平子有異志注不欲復納公音義復扶又反冬十月辛酉昭子齊於其寢使祝宗祈死戊辰卒注恥為平子所欺因祈而自殺音義齊側皆反本又作齋左師展將以公乘馬而歸公徒執之注展魯大夫欲與公俱輕歸音義秉如字騎馬也輕遣政反疏正義曰古者服牛乘馬馬以駕車不單騎也至六國之時始有單騎蘇秦所云車千乘騎萬匹是也曲禮云前有車騎者禮記漢世書耳經典無騎字也炫謂此左師展將以公乘馬而歸欲共公單騎而歸此騎馬之漸也壬申尹文公涉于鞏焚東訾弗克注文公子朝黨於鞏縣涉洛水也東訾敬王邑十一月宋元公將為公故如晉注請納公音義為音于偽反夢大子欒即位於廟已與平公服而相之注平公元公父音義相息亮反疏正義曰言已與父平公盛服飾而輔相之也旦召六卿公曰寡人不佞不能事父兄注父兄謂華向以為二三子憂寡人之罪也若以羣子之靈獲保首領以殁唯是楄柎所以藉幹者注楄柎棺中苓牀也幹骸骨也音義殁音沒楄蒲田反柎步口反又音附藉在夜反苓力丁反骸户皆反疏注正義曰説文云楄方木也幹脅也木以藉脅明是棺中苓牀也宋元所言藉幹者舉脅而言耳非獨為脅故云幹骸骨也請無及先君注欲自貶損仲幾對曰君若以社稷之故私降昵宴羣臣弗敢知注昵近也降昵宴謂損親近聲樂飲食之事音義昵女乙反若夫宋國之法死生之度先君有命矣羣臣以死守之弗敢失隊臣之失職常刑不赦臣不忍其死君命祗辱注言君命必不行祗適也音義隊直類反祗音支宋公遂行己亥卒于曲棘注為明年梁丘據語起本十二月庚辰齊侯圍鄆注欲取以居公不書圍鄆人自服不成圍疏注正義曰經書取鄆而傳言圍鄆故云鄆人自服不成圍以傳云書取言易也故賈為此解杜從之也劉炫以為此時圍鄆而未得明年方始取之經即因圍書取傳言實圍之日非自服也而規杜氏今知非者案二十六年公圍成亦是圍而不得而書圍此若圍鄆不得何以不書圍案元年伐莒取鄆書取不言伐此圍鄆取鄆亦書取不言圍其義正同何為不可劉何知此年圍鄆未服鄆若未服經何得書取茍出胸臆而規杜氏非也初臧昭伯如晉臧會竊其寶龜僂句注僂句龜所出地名音義僂力主反又力具反句居具反疏注正義曰釋魚云一曰神龜二曰靈龜三曰攝龜四曰寶龜五曰文龜六曰筮龜七曰山龜八曰澤龜九曰水龜十曰火龜則龜名無僂句故云所出地之名臧氏有蔡又有此蓋所寶非一以卜為信與僭僭吉注僭不信也音義僭子念反注同臧氏老將如晉問注問昭伯起居會請往注代家老行昭伯問家故盡對注故事也及內子與母弟叔孫則不對注內子昭伯妻不對若有他故再三問不對歸及郊會逆問又如初注又不對至次於外而察之皆無之執而戮之逸奔郈郈魴假使為賈正焉注郈在東平無鹽縣東南魴假郈邑大夫賈正掌貨物使有長賈若市吏音義魴音房賈音嫁注同疏正義曰賈正如周禮之賈師也賈師二十肆則一人其職云各掌其次之貨賄之治辨其物而均平之禁貴賣者使有恆賈此郈邑大夫使為賈正使為郈市之賈正也郈在後為叔孫私邑此時尚為公邑故使賈正通計簿於季氏計於季氏注送計簿於季氏音義簿步户反臧氏使五人以戈楯伏諸桐汝之閭注桐汝里名音義楯食準反又音允會出逐之反奔執諸季氏中門之外平子怒曰何故以兵入吾門拘臧氏老季臧有惡注相怨惡及昭伯從公平子立臧會注立以為臧氏後會曰僂句不余欺也注傳言卜筮之驗善惡由人楚子使薳射城州屈復茄人焉注還復茄人於州屈音義屈居勿反一音其勿反茄人音加城丘皇遷訾人焉注移訾人於丘皇使熊相禖郭巢季然郭卷注使二大夫為巢卷築郭也卷城在南陽葉縣南音義相息亮反禖音梅卷音權或眷勉反為于偽反子大叔聞之曰楚王將死矣使民不安其土民必憂憂將及王弗能久矣注為明年楚子居卒傳春秋左傳注疏卷五十一春秋左氏傳注疏卷五十一考證丁酉把伯郁釐卒疏七月甲午朔七月下監本衍一至字今刪傳婼至自晉尊晉也臣召南按婼以前年見執此經蒙前文故不書族非尊晉也呂祖謙曰婼不言叔孫前見也傳士伯立於乾祭而問於介衆後漢郡國志河南尹河南春秋時謂之王城東城門名鼎門北城門名乾祭傳梓愼曰將水昭子曰旱也臣召南按禆竈之占不如子産梓愼之占不如昭子則知術士推以術不如士大夫推以理也傳王室之不寧晉之恥也趙汸補注曰傳見天下責望在晉又言徵會于諸侯期以明年見晉人怠于勤王臣浩按襄王之亂文公辭秦伯而自將以定王室晉之所以霸也子朝之亂晉君及正卿不出徒以偏師助之踰年未定乃始徴會諸侯蓋霸業既衰而大夫分國之勢成矣傳與之東訾注鞏縣西南訾城是也後漢郡國志河南尹鞏有東訾聚今名訾城注引此傳及杜預曰在縣西南是其明證監本作鞏在帝南訾城誤也今改正傳王及圉陽而還疏倉與壽夢辭還歸於越也辭監本訛作而今改正傳遂滅巢及鍾離而還趙汸補注曰巢即五年薳啓疆所城者本屬楚小國故得書滅劉氏曰巢伯爵國非楚邑公孫于齊次于陽州齊侯唁公于野井孫復曰次于陽州者不得入于齊也唁慰安之辭齊大國也不能討意如于魯國徒能唁昭公于野井齊侯之惡亦可見也傳曰明年將納王趙汸補注曰晉人徵會則曰明年納王又曰明年傳見不惟怠且觀望矣傳章為五聲疏聲之清濁入耳乃知監本脫知字今添傳以奉五味疏口欲嘗味目欲視色至服虔云三犧鴈騖雉也一段監本誤刻于為九文下今改正傳為九文疏考工記云龍為騰躍之形句下監本即接似獮猴而大也獮猴獮字是獼字之誤此不過點畫脫耳夫以神龍騰躍而擬其狀于獼猴何其不倫也今細玩文勢山龍之下應有虎蜼但虎易知不煩解説則此必言蜼也按爾雅釋獸曰蜼卭鼻而長尾郭璞曰似獼猴而大也則此句正引彼文且鄭注周禮司尊彝云蜼禺屬卭鼻而長尾賈公彥疏亦引郭璞云似獼猴而大也則此為脫誤顯然今于龍為騰躍之形下添補蜼爾雅云卭鼻而長尾郭璞云共十二字傳吾聞文成之世童謠有之臣召南按各本俱作文武之世非也史記魯世家及漢書五行志俱引此作文成之世史記集解引賈逵曰文成魯文公成公尤其明證賈即注左傳之一家也今改正傳鸜鵒之巢遠哉遙遙臣照按五行志引此作遠哉搖搖顔師古曰搖搖不安貌似較遙遙為勝蓋遠即遙也但謠或重疊其辭以見意亦未可定未敢據彼以改此傳宋父以驕父監本訛作公今改正傳季氏介其雞疏然後以沙糝之糝監本訛作槮今改正傳公使郈孫逆孟懿子臣召南按公不使人迎叔孫昭子以昭子如闞未歸也使昭子在則司馬鬷戾必不敢助季氏而孟氏亦必從公矣傳十一月宋元公將為公故如晉監本宋字下衍一公字今刪春秋左氏傳注疏卷五十一考證
