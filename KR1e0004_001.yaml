body:
  text: 春秋左傳注疏卷一起隱公元年盡二年晉杜氏注唐陸德明音義孔頴達疏隱公疏正義曰魯世家隱公名息姑伯禽七世孫惠全弗皇子聲子所生平王四十九年即位諡法隱拂不成曰隱是嵗嵗在豕韋傳惠公元妃孟子注言元妃明始適夫人也子宋姓音義惠公名弗皇諡法愛人好與曰惠其子隱公讓國之君元妃芳非反傳曰嘉耦曰妃適本又作嫡同丁歷反疏正義曰惠公名弗皇孝公之子也諡法愛民好與曰惠釋詁云元始也妃匹也始匹者言以前未曾娶而此人始為匹故注云言元妃明始適夫人也妃者名通適妾故傳云陳哀公元妃鄭姬生悼大子偃師二妃生公子留下妃生公子勝元者始也長也一元之字兼始適兩義故云始適夫人也然則有始而非適若孟任之類是也亦有適而非始若哀薑之類是也妃者配匹之言非有尊卑之異其尊卑殊稱則曲禮所云天子之妃曰后諸侯曰夫人大夫曰孺人士曰婦人庶人曰妻是也鄭玄以為后之言後蓋執治內事在夫之後也夫之言扶言能扶成人君之德也孺之言屬言其繫屬人也婦之言服言其服事人也妻之言齊言與夫齊等也庶人之賤見其齊等也以上因其爵之尊卑為立别號其實皆配夫通以妃為稱少牢饋食禮云以某妃配某氏是大夫之妻亦稱妃也孟仲叔季兄弟姊妹長幼之别字也孟伯俱長也禮緯云庶長稱孟然則適妻之子長者稱伯妾子長於妻子則稱為孟所以别適庶也故杜注文十五年及釋例皆云慶父為長庶故或稱孟氏沈氏亦然案傳趙莊子之妻晉景公之姊則趙武適妻子也而武稱趙孟荀偃之卒也士丐請後曰鄭甥可則荀吳妾子也而吳稱知伯豈知氏常為適而稱伯趙氏恆為庶而稱孟者也蓋以趙氏趙盾之後盾為庶長故子孫恆以孟言之與慶父同也推此言之知知氏荀首之後傳云中行伯之季弟則俱是適妻之子但林父荀首並得立家故荀首子孫亦從適長稱伯也或可春秋之時不能如禮孟伯之字無適庶之異蓋從心所欲而自稱之耳契子姓宋是殷後故子為宋姓婦人以字配姓故稱孟子孟子卒注不稱薨不成喪也無諡先夫死不得從夫諡音義諡實至反疏注正義曰魯之夫人皆稱薨舉諡此獨無諡先公卒故特解之定十五年姒氏卒傳曰不成喪則知此不稱薨亦不成喪也案傳例不赴則不稱薨然則此云不成喪者正謂不赴於諸侯也周禮小史卿大夫之喪賜諡讀誄止賜卿大夫不賜婦人則婦人法不當諡故號當繫夫釋例曰諡者興於周之始王變質從文於是有諱焉傳曰周人以諱事神名終將諱之故易之以諡末世滋蔓降及匹夫爰暨婦人婦人無外行於禮當繫夫之諡以其所屬詩稱莊薑宣薑即其義也是言婦人於法無諡故取其夫諡冠於姓之上生以夫國冠之韓姞秦姬是也死以夫諡冠之莊薑定姒是也直見此人是某公之妻故從夫諡此諡非婦人之行也夫諡已定妻即從而稱之先夫而死則夫未有諡或隨宜稱字故云無諡言婦人法無諡也先夫死不得從夫諡解其不稱惠也此言其正法耳其末世滋蔓則為之作諡景王未崩妻稱穆后如此之類皆非禮也重言孟子者服虔云嫌與惠公俱卒故重言之下仲子亦然繼室以聲子生隱公注聲諡也蓋孟子之姪娣也諸侯始娶則同姓之國以姪娣媵元妃死則次妃攝治內事猶不得稱夫人故謂之繼室音義姪直結反字林文一反兄女也娣夫計反女弟也娶七住反媵以證反又繩證反疏注正義曰諡法不生其國曰聲是聲為諡也襄二十三年傳稱臧宣叔娶于鑄生賈及為而死繼室以其姪則姪之與娣皆得繼室此既無文故設疑辭云蓋孟子之姪娣也成八年傳曰凡諸侯嫁女同姓媵之異姓則否莊十九年公羊傳曰諸侯娶一國則二國往媵之以姪娣從姪者何兄之子也娣者何弟也諸侯一聘九女然則諸侯娶於三國國别各有三女此言諸侯始娶則同姓之國以姪娣媵者欲言媵者亦有姪娣省略為文耳其實夫人與媵皆有姪娣但聲子或是孟子姪娣或是同姓之國媵者姪娣以其難明故杜兩解之初云孟子之姪娣又云同姓之國以姪娣媵是也故釋例曰古者諸侯之娶適夫人及左右媵各有姪娣皆同姓之國國三人凡九女參骨肉至親所以息隂訟隂訟息所以廣繼嗣是其義也然宋之同姓國依世本子姓殷時來宋空同黎比髦目夷蕭但春秋不載其國未知宋之同姓者是何釋言云媵送也言妾送適行故夫人姪娣亦稱媵也經傳之説諸侯唯有繼室之文皆無重娶之禮故知元妃死則次妃攝治內事次妃謂姪娣與媵諸妾之最貴者釋例曰夫人薨不更聘必以姪娣媵繼室是夫人之姪娣與二媵皆可以繼室也適庶交爭禍之大者禮所以别嫌明疑防微杜漸故雖攝治內事猶不得稱夫人又異於餘妾故謂之繼室妻處夫之室故書傳通謂妻為室言繼續元妃在夫之室宋武公生仲子仲子生而有文在其手曰為魯夫人故仲子歸于我注婦人謂嫁曰歸以手理自然成字有若天命故嫁之於魯音義婦人謂嫁曰歸本或無曰字此依公羊傳疏正義曰宋國公爵譜云宋子姓其先契佐唐虞為司徒封於啇成湯受命王有天下及紂無道周武王滅之而封其子武庚以紹殷後武庚作亂周公伐而誅之更封紂兄帝乙之元子微子啓為宋公都商丘今梁國睢陽縣是也微子卒其弟微仲代立穆公七年魯隱公之元年也景公三十六年魯哀公之十四年獲麟之嵗也昭公得之元年春秋之傳終矣其後五世百七十年而齊魏楚共滅宋依宋世家微子至武公凡十二君兄弟相及者二人武公是微仲九世孫諡法克定禍亂曰武注正義曰婦人謂嫁曰歸隱二年公羊傳文也以其手之文理自然成字有若天之所命使為魯夫人然故嫁之於魯也成季唐叔亦有文在其手曰友曰虞曰下不言為此傳言為魯夫人者以宋女而作他國之妻故傳加為以示異耳非為手文有為字故魯夫人之上有為字也仲子手有此文自然成字似其天命使然故云有若天命也隸書起於秦末手文必非隸書石經古文虞作魯作􅨞手文容或似之其友及夫人固當有似之者也傳重言仲子生者詳言之與上重言孟子卒其義同也舊説云若河圖洛書天神言語真是天命此雖手有文理更無靈驗又非夢天故言有若生桓公而惠公薨注言歸魯而生男惠公不以桓生之年薨琉注正義曰杜知不以桓生之年薨者以元年傳曰惠公之薨也有宋師大子少葬故有闕少者未成人之辭非新始生之稱又改葬惠公而隱公不臨使桓為主若薨年生則才二嵗未堪為喪主又羽父弒隱與桓同謀若年始十二亦未堪定弒君之謀以此知桓公之生非惠公薨之年也年之長幼理無所異杜言此者欲明慶父為莊公庶兄故顯言此以張本也釋例曰今推案傳之注下羽父之弒隱公皆咨謀於桓然則桓公已成人也傳云生桓公而惠公薨指明仲子唯有此男非謂生在薨年也桓巳成人而弒隱即位乃娶於齊自應有長庶長庶故氏曰孟是杜張本之意也是以隱公立而奉之注隱公繼室之子當嗣世以禎祥之故追成父志為桓尚少是以立為大子帥國人奉之為經元年春不書即位傳音義禎音貞為于偽反少詩照反大音泰舊泰字皆作大後大字皆放此為經于偽反後凡為經為傳張本起本之例皆放此更不音疏注正義曰繼室雖非夫人而貴於諸妾惠公不立大子母貴則宜為君隱公當嗣父世正以禎祥之故仲子手有夫人之文其父愛之有以仲子為夫人之意故追成父志以位讓桓但為桓年少未堪多難是以立桓為大子帥國人而奉之巳則且攝君位待其年長故於嵗首不即君位傳於元年之前預發此語者為經不書公即位傳是謂先經以始事也凡稱傳者皆是為經唯文五年霍伯臼季等卒注云為六年搜於夷傳者以搜於夷與此文次相接故不得言張本也或言張本或言起本或言起檢其上下事同文異疑杜隨便而言也鄭衆以為隱公攝立為君奉桓為大子案傳言立而奉之是先立後奉之也若隱公先立乃後奉桓則隱立之時未有大子隱之為君復何所攝若先奉大子乃後攝立不得云立而奉之是鄭之謬也賈逵以為隱立桓為大子奉以為君隱雖不即位稱公改元號令於臣子朝正於宗廟言立桓為大子可矣安在其奉以為君乎是賈之妄也襄二十五年齊景公立傳云崔杼立而相之以此知立而奉之謂立為大子帥國人奉之正謂奉之以為大子也元年傳曰大子少是立為大子之文也大子者父在之稱今惠公已薨而言立為大子者以其未堪為君仍處大子之位故也禮記曽子問曰君薨而世子生是君薨之後仍可以稱大子也經元年春王正月注隱公之始年周王之正月也凡人君即位欲其體元以居正故不言一年一月也隱雖不即位然攝行君事故亦朝廟告朔也告朔朝正例在襄二十九年即位例在隱莊閔僖元年音義朝直遙反下同疏正義曰此經字并下傳字亦杜氏所題以分年相附若不有經字何以異傳不有傳字何以别經又公羊穀梁二傳年上皆無經傳字故知杜所題也釋詁云元始也正長也此公之始年故稱元年此年之長月故稱正月言王正月者王者革前代馭天下必改正朔易服色以變人視聽夏以建寅之月為正殷以建丑之月為正周以建子之月為正三代異制正朔不同故禮記檀弓云夏后氏尚黑殷人尚白周人尚赤鄭康成依據緯候以正朔三而改自古皆相變如孔安國以自古皆用建寅為正唯殷革夏命而用建丑周革殷命而用建子杜無明説未知所從正是時王所建故以王字冠之言是今王之正月也王不在春上者月改則春移春非王所改故王不先春王必連月故王處春下周以建子為正則周之二月三月皆是前世之正月也故於春每月書王王二月者言是我王之二月乃殷之正月也王三月者言是我王之三月乃夏之正月也既有正朔之異故每月稱王以别之何休云二月三月皆有王者二月殷之正月也三月夏之正月也王者存二王之後使統其正朔服其服色行其禮樂所以尊先聖通三統師法之義恭讓之禮服虔亦云孔子作春秋於春每月書王以統三王之正其意以為王二月王三月王是夏殷之王謂大禹成湯也為周室之臣民尊夏殷之舊主每月書王敬奉前代揆之人情未見其可杞宋二王之後各行己祖正朔宋不行夏杞不行殷而使天下諸侯遍視二代考諸典籍未之或聞杞宋不奉周正周人悉尊夏殷則是重過去而忽當今尊二國而慢時主其為顛倒不亦甚乎且經之所言王二月王三月若是夏殷之王當自皆言正月何以言王二月王三月乎謂之二月三月其王必是周王安得以為夏殷王也若如公羊之説春秋黜周王魯則杞非王後夏無可尊復通夏正何也但春之三月不必月皆有事若入年已有王正月者則二月不復書王若已有王二月者則三月不復書王以其上月已是此王之月則下月從而可知故每年之春唯一言王耳春秋之例竟時無事乃書首月以記時此下二月有會盟之事則不得空書首月也正月無事而空書首月者以人君於始年初月必朝廟告朔因即人君之位以繼臣子之心故君之始年必書曰元年春王正月公即位史策之正法也隱公攝行君事雖不即位而亦改元朝廟與人更始異於常年之正月故史特書其事見此月公宜即位而自不即位莊閔僖元年皆書春王正月與此同也定公元年不書正月者正月之時定公未立即位在於六月歲首未得朝正公之即位别見下文正月無所可見故不書也然則定以六月即位即位乃可改元正月已稱元年者未改之日必乘前君之年既改之後方以元年紀事及其史官定策須有一統不可半年從前半年從後雖非年初亦統此嵗故入年即稱元也釋例曰癸亥公之喪至自乾侯戊辰公即位喪在外踰年乃入故因五日改殯之莭國史用元年即位之禮因以此年為元年也古法既然故漢魏以來雖秋冬改元史於春夏即以元年冠之是有因於古也受命之王必改正朔繼世之王奉而行之每嵗頒於諸侯諸侯受王正朔故言春王正月王即當時之王序云所書之王即平王是其事也公羊傳曰王者孰謂謂文王也始改正朔自是文王所為頒於諸侯非復文王之歷受今王之歷稱文王之正非其義也注正義曰傳云王周正月知是周王之正月也説公羊者云元者氣之始春者四時之始王者受命之始正月者政教之始公即位者一國之始春秋緯稱黃帝受圗有五始謂此五事也杜於左氏之義雖無此文而五始之理亦於杜無害此非左氏褒貶之要自是史官記事之體故晉宋諸史皆言元年春王正月帝即位是也元年正月實是一年一月而别立名故鮮之云凡人君即位欲其體元以居正故不言一年一月也言欲其體元以居正者元正實是始長之義但因名以廣之元者氣之本也善之長也人君執大本長庶物欲其與元同體故年稱元年正者直方之間語也直其行方其義人君當執直心仗大義欲其常居正道故月稱正也以其君之始年嵗之始月故特假此名以示義其餘皆即從其數不復改也書稱月正元日意同於此又解無事而書正月之意隱雖不即位然攝行君事而亦朝廟告朔改元布政故書首年始月以明其應即位而不為也天子之封諸侯也割其土壤分之臣民使之専為已有故諸侯於其封內各得改元傳説鄭國之事云僖之元年朝於晉簡之元年士子孔卒是諸侯皆改元非獨魯也劉炫為規過云元正惟取始長之義不為體元居正規釋杜云欲其體元以居正謂人君體是元長以居正位不欲在下陵奪處位不終是劉妄解杜意不為體其元善居於正道以規杜氏其理非也劉炫又難何休云唯王者然後改元立號春秋託新王受命於魯故因以録即位若然新王受命正朔必改是魯得稱元亦應改其正朔仍用周正何也既託王於魯則是不事文王仍奉王正何也諸侯改元自是常法而云託王改元是妄説也説公羊者云元者氣之始春者四時之始王者受命之始正月者政教之始公即位者一國之始春秋緯云黃帝坐於扈閣鳯凰銜書致帝前其中得五始之文謂此五事何休又云公即位者一國之始政莫大於正始故春秋以元之氣正天之端以天之端正王之政以王之政正諸侯之即位以諸侯之即位正境內之治諸侯不上奉王之政則不得即位故先言正月而後言即位政不由王出則不得為政故先言王而後言正月王者不奉天以制號令則無法故先言春而後言王天不深正其元則不能成其化故先言元而後言春五者同日並見相須成體非比辭也何休自云諸侯不得改元則元者王之元年非公之元年公即位不在王之元年安得同日並見共成體也即以託王於魯史之改元元既為魯所改則政不由王出安得以王之政正諸侯元尊而王卑年大而月小年之有元改而無忌王之立政必云須奉舍其大而事其細敬所卑而慢所尊以此立教必不可行聖人有作豈當爾也黃帝之作五始者為天子法乎為諸侯法乎諸侯不得改元必非諸侯法若非諸侯法安得有公即位乎無公即位則闕一始何得為五始也若是天子法不得言王正月王即位何休云以王之政正諸侯之即位然王者豈復以己之政正已即位不通若此何以行之言左氏者或取為説是逐狂東走也隱莊閔僖四公元年傳皆説不書即位之由故指以為例隱不行即位又謙不告至而嵗首告朔朝正所以尊敬祖考也若不行即位又不朝正則與臣子無别不成為君故告朔朝廟也三月公及邾儀父盟于蔑注附庸之君未王命例稱名能自通于大國繼好息兵故書字冠之名例在莊五年邾今魯國鄒縣也蔑姑蔑魯地魯國卞縣南有姑城音義父音甫邾子之字凡人名字皆放此蔑亡結反好呼報反鄒側留反卞皮彥反本或作辨疏正義曰公隱公也及與也與彼邾君字儀父者盟于蔑地譜云邾曹姓顓頊之後有六終産六子其第五子曰安邾即安之後也周武王封其苗裔邾俠為附庸居邾今魯國鄒縣是也自安至儀父十二世始見春秋齊桓行霸儀父附從進爵稱子文公徙於繹桓公以下春秋後八世而楚滅之諸侯俱受王命各有寰宇上事天子旁交鄰國天子不信諸侯諸侯自不相信則盟以要之凡盟禮殺牲歃血告誓神明若有背違欲令神加殃咎使如此牲也曲禮曰約信曰誓涖牲曰盟周禮天官玉府職曰若合諸侯則共珠槃玉敦夏官戎右職曰盟則以玉敦辟盟遂役之贊牛耳桃茢秋官司盟職曰掌盟載之法曰邦國有疑會同則掌其盟約之載及其禮義北面詔明神鄭玄以為槃敦皆器名也珠玉以為飾合諸侯者必割牛耳取其血歃之以盟敦以盛血槃以盛耳將歃則戎右執其器為衆陳其載辭使心皆開辟司盟之官乃北面讀其載書以告曰月山川之神既告乃尊卑以次歃戎右傳敦血以授當歃者令含其血既歃乃坎其牲加書於上而埋之此則天子會諸侯使諸侯聚盟之禮也凡天子之盟諸侯十二嵗於方嶽之下故傳云再會而盟以顯昭明若王不巡守及諸侯有事朝王即時見曰會殷見曰同亦為盟禮其盟之法案覲禮為壇十有二尋深四尺加方明於其上方明者木也方四尺設六玉上圭下璧南方璋西方琥北方璜東方圭朝諸侯於壇訖乃加方明于壇而祀之列諸侯於庭玉府共珠槃玉敦戎右以玉敦辟盟遂役之贊牛耳桃茢司盟北面詔告明神諸侯以次歃血鄭注覲禮云王之盟其神主日王官之伯盟其神主月諸侯之盟其神主山川是盟禮之略也若諸侯之盟亦有壇知者故柯之盟公羊傳稱曹子以手劒劫桓公于壇是也其盟神則無復定限故襄十一年傳稱司慎司盟名山名川羣神羣祀先王先公七姓十二國之祖是也其盟用牛牲故襄二十六年傳云歃用牲又哀十七年傳云諸侯盟誰執牛耳是也其殺牛必取血及耳以手執玉敦之血進之於口知者定八年涉他捘衛侯之手及捥又襄九年傳云與大國盟口血未乾是也既盟之後牲及餘血并盟載之書加於牲上坎而埋之故僖二十五年傳云宵坎血加書是也春秋之世不由天子之命諸侯自相與盟則大國制其言小國尸其事官雖小異禮則大同故釋例曰盟者殺牲載書大國制其言小國尸其事珠槃玉敦以奉流血而同歃是其事也其盟載之辭則傳多有之此時公求好於邾邾君來至蔑地公出與之盟史書魯事以公為主言公及及者言自此及彼據魯為文也桓十七年公會邾儀父盟于趡彼言會此言及者彼行會禮此不行會禮故也故劉炫云策書之例先會後盟者上言會下言盟唯盟不會者直言及此為不行會禮故言及也或可史異辭非先會而盟則稱會知者文七年公會諸侯晉大夫盟于扈傳云公後至則是不及其會而經稱會故知盟稱會者未必先行會禮也注正義曰傳言未王命知是附庸也莊五年郳犂來來朝傳曰未王命解其稱名之意是知附庸之君例稱名也禮記王制云不合於天子附於諸侯曰附庸鄭玄云不合謂不朝會也小城曰附庸附庸者以國附於大國未能以其名通是説附庸之義也王制又云天子之元士視附庸然則附庸貴賤與天子之元士同也其禮則四命知者天子大夫視子男卿視伯三公視公侯所視皆多一命明知附庸多於元士一命又諸侯世子未誓執皮帛視小國之君公之孤四命亦執皮帛及附庸亦執皮帛故知四命也然則天子大夫四命稱字附庸稱名者以王朝之臣故特尊之而稱字釋例曰名重於字故君父之前自名朋友之接自字是以春秋之義貶責書其名斥所重也褒厚顯其字辟所諱也然則應字而名則是貶應名而字則是貴故宰咺書名以貶之儀父書字以貴之傳文唯言貴之不説可貴之狀賈服以為儀父嘉隱公有至孝謙讓之義而與結好故貴而字之善其慕賢説讓知不然者案傳云公攝位而欲求好於邾是公先求邾非邾先慕公復何足貴且書曰儀父乃是新意仲尼以事有可善乃得書字善之不是緣魯之意以為褒貶安得以其慕賢便足貴之又桓十七年公及邾儀父盟于趡桓公不賢不讓彼經亦書儀父故知貴之之言不為慕賢説讓也附庸不能自通不與盟會今能自通大國繼好息民故知為此貴而字之不貴來朝而貴其盟者朝事大國則附庸常道齊盟結好非附庸所能故盟則貴之朝從常法夏五月鄭伯克段于鄢注不稱國討而言鄭伯譏失教也段不弟故不言弟明鄭伯雖失教而段亦凶逆以君討臣而用二君之例者言假強大雋傑據大都以耦國所謂得雋曰克也國討例在莊二十二年得雋例在莊十一年母弟例在宣十七年鄭在滎陽苑陵縣西南鄢今潁川鄢陵縣音義假徒亂反鄭伯弟名鄢於晚反又於建反又於然反弟音悌又如字雋音俊傑音桀滎户扄反本或作熒非苑於阮反又於元反疏正義曰鄭國伯爵譜云鄭姬姓周厲王子宣王母弟桓公友之後也宣王封友於鄭今京兆鄭縣是也及幽王無道友遷其民於虢鄶虢鄶之君分其地遂國焉今河南新鄭縣是也莊公二十二年魯隱公之元年也聲公二十年獲麟之嵗也三十三年而春秋之傳終矣聲公三十七年卒自聲以下五世八十七年而韓滅鄭此鄭伯莊公也諡法勝敵克壯日莊注正義曰國討者謂稱國若人稱國稱人則明其為賊言一國之人所欲討也今稱鄭伯指言君自殺弟若弟無罪然譏其失兄之教不肯早為之所乃是養成其惡及其作亂則必欲殺之故稱鄭伯所以罪鄭伯也傳例母弟稱弟假實母弟以其不為弟行故去弟以罪假也兩罪之者明兄雖失教而假亦凶逆也釋例曰兄而害弟者稱弟以章兄罪弟又害兄則去弟以罪弟身統論其義兄弟二人交相殺害各有曲直存弟則示兄曲也鄭伯既失教若依例存弟則嫌善假故特去弟兩見其義是其説也襄三十年天王殺其弟佞夫傳曰罪在王則與鄭伯同譏而佞夫不去弟者釋例曰佞夫稱弟不聞反謀也鄭假去弟身為謀首也然則佞夫不與反謀罪王而不罪佞夫故稱弟也傳例戰敗克取兩國之文假實鄭臣而言克假故申明傳意以解之得雋曰克莊十一年傳例也國討例在莊二十二年者彼經書陳人殺其公子御寇實君殺大子而稱陳人者陳人惡其殺大子之名故不稱君父以國討公子告也傳稱陳人殺其大子御寇以實言之明經所書國討之例也彼無凡例而言例者正以此傳云稱鄭伯譏失教也言稱是仲尼之變例也稱君為罪君則知稱人為國討序云推變例以正褒貶即此類也推以為例故言例在彼年諸注言例在者未必皆有凡例也地理志河南郡有苑陵新鄭各自為縣晉世分河南而立滎陽廢新鄭而入苑陵故鄭在苑陵西南也又地理志潁川郡有鄢陵縣秋七月天王使宰咺來歸惠公仲子之賵注宰官咺名也咺贈死不及尸弔生不及哀豫凶事故貶而名之此天子大夫稱字之例仲子者桓公之母婦人無諡故以字配姓來者自外之文歸者不反之辭音義咺吁阮反賵芳鳯反疏正義曰天王周平王也譜云周黃帝之苗裔姬姓后稷之後也后稷封於邰及夏之衰后稷之子不窋失其官竄於西戎至大王為狄所逼去邠居岐文王受命武王克殷而王有天下幽王為犬戎所殺平王遷都王城今河南縣是也平王四十九年魯隱公之元年也敬王又遷成周今洛陽是也敬王三十九年獲麟之嵗也四十三年而敬王崩敬王子元王九年春秋之傳終矣元王以下十一世二百二十六年而周亡也周本紀武王至平王凡十三王兄弟相及者一人平王是武王十一世孫也惠公薨在往年明年仲子始薨蓋於時有疾王聞其疾謂之巳薨故使大宰大夫名咺者來至於魯并歸惠公仲子之賵賵者助喪之物文五年注云車馬曰賵士喪既夕禮云公賵玄纁束帛兩馬士之制只得駕兩馬故云賵兩馬大夫以上皆駕四馬此宰咺來賵蓋用四馬也公羊傳曰喪事有賵賵者蓋以馬以乘馬束帛車馬曰賵穀梁傳曰乘馬曰賵皆謂宰咺用乘馬來也惠公仲子不言及者是并致二賵或是史異辭蓋二者各以乘馬不宜以一乘之馬賵二人也服虔云賵覆也天王所以覆被臣子案士喪既夕禮兄弟所知悉皆致賵非獨君之賵臣以賵為覆則可矣其言覆被臣子則非也何休亦云賵猶覆也蓋謂覆被亡者耳注正義曰傳言緩且子氏未薨故名是不應名而名之也貶乃書名知法應書字故云此天子大夫稱字之例傳無明例故推此以為例也周禮天官大宰卿一人小宰中大夫二人宰夫下大夫四人宰夫小宰皆是大夫未知宰咺是何宰也宰夫職曰凡邦之弔事掌其戒令與其幣器財用鄭玄云弔事弔諸侯諸臣幣所用賻也既掌弔事或即充使此蓋宰夫也仲子乃惠公妾耳王使賵之者隱立桓為大子成桓母為夫人天王知其然故遣賵惠公因即賵之杜言仲子者桓公之母正見此意不然仲子為桓母傳有明文不須解也男子之有諡者人君則配王配公大夫或配子或配字皆不以字配姓婦人於法無諡故以字配姓言其正法然也釋例曰婦人無外行於禮當繫夫之諡以明所屬是言婦人不合諡也繫夫諡者夫人而已衆妾不合繫夫正當以字配姓也其聲子戴媯有諡者皆越禮妄作也九月及宋人盟于宿注客主無名皆微者也宿小國東平無鹽縣也凡盟以國地者國主亦與盟例在僖十九年宋今梁國睢陽縣音義與音預下同睢音雖疏注正義曰春秋之例若是命卿則名書於經此盟客主無名故知皆是微者公羊傳曰孰及之內之微者也穀梁傳曰及者何內卑者也宋人外卑者也卑微言非卿也客謂宋主謂魯直言及者他國可言某人魯史不得自言魯人直言及彼是魯及可知其微人與他國聚會亦直言會與此同也會盟之地地必有主舉地者地主之國或與或否故地主之國亦序於其列經舉國名以為盟地者國主與在其中不復序之於列以其可知故也例在僖十九年者彼經書會陳人蔡人楚人鄭人盟于齊傳曰陳穆公請修好於諸侯以無忘齊桓之德冬盟于齊修桓公之好也言修桓公之好齊人必與可知也齊人不序於列而以齊為盟地是其盟以國地者國主與盟之例此亦推以為例非凡例也然則桓十四年公會鄭伯于曹即亦是例而逺指僖十九年者此既是盟故取盟為例其實會亦然也故彼注云以曹地曹與會是也僖二十七年楚人陳侯蔡侯鄭伯許男圍宋公會諸侯盟于宋宋不與盟亦地以宋者彼注云宋方見圍無嫌於與盟故直以宋地然則宣十四年楚子圍宋十五年公孫歸父會楚子于宋亦是不嫌宋與故地以宋也地理志梁國睢陽縣故宋國微子所封也冬十有二月祭伯來注祭伯諸侯為王卿士者祭國伯爵也傳曰非王命也釋其不稱使音義祭側界反國名傳祭仲同使如字又所吏反疏注正義曰僖二十四年傳富辰説周公封建親戚以蕃屏周而云邢茅胙祭則祭之初封畿外之國也穆王之時有祭公謀父今有祭伯世仕王朝蓋本封絶滅食采於王畿也莊二十三年祭叔來聘注以為祭叔為祭公來聘魯天子內臣不得外交是祭於此時為畿內之國仍有封爵故言諸侯為王卿士也釋例曰王之公卿皆書爵祭伯凡伯是也大夫稱字南季榮叔是也元士中士稱名劉夏石尚是也下士稱人公會王人于洮是也其或稱祭公舉官而言之此其定例也然春秋之世有王之卿士無采地者若王叔陳生伯輿之屬是也但未知書經其稱云何杜既云公卿稱爵而王子虎及劉卷卒稱名者彼是天王為赴以名告魯如諸侯之例薨則稱名此云公卿稱爵者謂聘使往還與彼為異也又襄十五年注云天子卿書字者以傳云劉夏逆王后于齊卿不行非禮也以劉夏非卿書名若卿則應書字以名字相對故舉以言焉其實卿書爵也此祭伯若王使來當云天王使祭伯來聘亦如天王使凡伯來聘今以自來為文明非王命而私行也劉炫云卿而無爵或亦書字大夫有爵或亦書爵傳稱王叔陳生與伯輿爭政俱是卿士並不言爵又滕侯之先為周卜正書稱齊侯吕伋為虎賁氏則大夫或有爵也然則大夫有爵不可舍爵而書氏卿而無爵不可越字而書名蓋有卿士亦書字大夫亦書爵也王臣之見經者衆祭伯凡伯毛伯單伯召伯尹子單子劉子其間未必無大夫榮叔南季家父叔服其間未必無卿但無明證故依例解之襄十五年注云天子卿書字是言天子卿有書字之理公子益師卒注傳例曰公不與小斂故不書日所以示薄厚也春秋不以日月為例唯卿佐之喪獨託日以見義者事之得失既未足以褒貶人君然亦非死者之罪無辭可以寄文而人臣輕賤死日可略故特假日以見義音義斂力驗反見賢遍反下同疏注正義曰傳文與上下作例者注皆謂之傳例釋例曰君之卿佐是謂股肱股肱或虧何痛如之疾則親問焉喪則親與小斂大斂慎終歸厚之義也故仲尼修春秋卿佐之喪公不與小斂則不書日示薄厚戒將來也即以新死小斂為文則但臨大斂及不臨其喪亦同不書曰也襄五年冬十二月辛未季孫行父卒傳曰大夫入斂公在位是公與小斂則書曰之事也其翬柔溺等生見經傳死而不書卒者皆不以卿禮終也文十四年秋九月甲申公孫敖卒于齊已絶卿位公不與小斂而書曰卒者釋例曰公孫敖縱情棄命既已絶位非大夫也而備書於終者惠叔毁請於朝感子以赦父敦公族之恩崇仁孝之教故傳曰為孟氏且國故也是言雖不與斂恩實過厚故書曰也莊三十二年秋七月癸巳公子牙卒時公有疾昭二十五年冬十月戊辰叔孫婼卒二十九年夏四月庚子叔詣卒時公孫在外成十七年冬十一月壬申公孫嬰齊卒于貍脤在外而卒皆公不與斂而書日者釋例曰其或公疾在外大夫不卒於國而猶存其日者君子不責人以所不得備非不欲臨也然則為其有故不得以責公故皆書日也公孫嬰齊書所卒之地餘皆不書地者釋例曰魯大夫卒其境內則不書地傳稱季平子行東野卒于房是也而先儒以為雖以卿禮終而不臨其喪皆沒而不書杜知不臨其喪亦同不書日者案慶父之死不以卿禮終而經不書足知唯據不以卿禮終者經始不書明以卿禮終雖全不臨喪亦同書卒但不書日耳春秋諸事日與不日傳皆不發唯此發傳故特解之云春秋不以日月為例唯卿佐之喪獨託日以見義也言事之得失未足以褒貶人君者春秋之文褒為厚賞貶為大罰君之於臣有恩則常事不足以加賞無恩則小失不足以致罰故云未足以褒貶也止欲貶責死者君自無恩然亦非死者之罪意欲以為勸戒無辭可以寄文而人臣對君為輕賤死日可略去故於此一條特假日以見義其餘則不以日月為例故無傳也傳元年春王周正月注言周以别夏殷音義别彼列反夏户雅反三代之號可以意求不書即位攝也注假攝君政不修即位之禮故史不書於策傳所以見異於常音義見賢遍反疏正義曰攝訓持也隱以桓公幼少且攝持國政待其年長所以不行即位之禮史官不書即位仲尼因而不改故發傳以解之公實不即位史本無可書莊閔僖不書即位義亦然也舊説賈服之徒以為四公皆實即位孔子修經乃有不書故杜詳辨之釋例曰遭喪繼位者每新年正月必改元正位百官以序故國史皆書即位於策以表之隱既繼室之子於第應立而尋父娶仲子之意委位以讓桓天子既已定之諸侯既已正之國人既已君之而隱終有讓國授桓之心所以不行即位之禮也隱莊閔僖雖居君位皆有故而不修即位之禮或讓而不為或痛而不忍或亂而不得禮廢事異國史固無所書非行其禮而不書於文也顔氏説以為魯十二公國史盡書即位仲尼修之乃有所不書若實即位則為隱公無讓若實有讓則史無緣虛書是言實不即位故史不書也傳於隱閔云不書即位於莊僖云不稱即位者釋例曰丘明於四公發傳以不書不稱起文其義一也劉賈顧為傳文生例云恩深不忍則傳言不稱恩淺可忍則傳言不書博據傳辭殊多不通案殺欒盈則云不言大夫殺良霄則云不稱大夫君氏卒則云不曰薨不言葬不書姓鄭伯克假則云稱鄭伯此皆同意而别文之驗也傳本意在解經非曲文以生例是言不書不稱義同之意也何休膏盲以為古制諸侯幼弱天子命賢大夫輔相為政無攝代之義昔周公居攝死不記崩今隱公生稱侯死稱薨何因得為攝者周公攝政仍以成王為主直攝其政事而已所有大事稟王命以行之致政之後乃死故卒稱薨不稱崩隱公所攝則位亦攝之以桓為太子所有大事皆専命以行攝位被殺在君位而死故生稱公死稱薨是與周公異也且公羊以為諸侯無攝鄭康成引公羊難云宋穆公云吾立乎此攝也以此言之何得非左氏是鄭意亦不從何説也下傳曰公攝位而欲求好於邾是位亦攝也又曰惠公之薨也大子少是以桓為大子也所以異於正君者元年不即位行還不告廟不臨惠公之葬不成聲子之喪尊仲子為夫人薨則赴於諸侯又為之立廟此是謙之實也隱公讓位賢君故為春秋之首所以不入頌者魯僖公之時周王嵗二月東巡守至于岱宗柴季孫行父為之請於周大史克為之作頌故得入頌隱公無人為請故不入頌也三月公及邾儀父盟于蔑邾子克也注克儀父名未王命故不書爵曰儀父貴之也注王未賜命以為諸侯其後儀父服事齊桓以奬王室王命以為邾子故莊十六年經書邾子克卒音義故不書爵一本無故字奬將丈反疏注正義曰莊十三年齊桓會諸侯于北杏邾人在焉及十六年而書邾子克卒故知由事齊桓乃得王命也賈服以為北杏之會時已得王命蓋以北杏之會邾人在列故謂其已得命也列與不列在於主會之意不由有爵與否襄二十七年宋之盟齊人請邾宋人請滕邾滕不列於會故不書邾滕襄五年戚之會穆叔以屬鄫為不利使鄫大夫聽命于會故經書鄫人然則為人私屬則不列於會不為人私屬則列於會不可據列會與否以明有爵也昭四年申之會淮夷列焉未必有爵也邾今無爵得與魯盟北杏會齊何須有爵莊十五年會于鄄傳曰齊始霸則齊桓為霸自鄄會始耳北杏之時諸侯未從霸功未立桓尚未有殊勳儀父何足可紀且齊桓未有功於王焉能使王命之其得王命必在北杏之後但未知定是何年耳服虔云爵者醮也所以醮盡其材也公攝位而欲求好於邾故為蔑之盟注解所以與盟也音義好呼報反與如字又音預夏四月費伯帥師城郎不書非君命也注費伯魯大夫郎魯邑髙平方與縣東南有郁郎亭傳曰君舉必書然則史之策書皆君命也今不書於經亦因史之舊法故傳釋之諸魯事傳釋不書他皆倣此音義費音祕郁於六反倣甫往反後此例皆同疏注正義曰史之䇿書皆君命者謂君所命為之事乃得書之於策非謂君命遣書方始書也又解史策不書經亦不書之意仲尼書於經者亦因史之舊法舊史不書則亦不書故傳發此事釋經不書之意諸魯事傳釋不書他皆倣此謂下盟于翼作南門之類是也初鄭武公娶于申曰武薑注申國今南陽宛縣音義娶取住反宛於元反疏正義曰杜以為凡倒本其事者皆言初也賈逵云凡言初者隔其年後有禍福將終之乃言初也注正義曰外傳説伯夷之後曰申吕雖衰齊許猶在則申吕與齊許俱出伯夷同為薑姓也國語曰齊許申吕由大薑言由大薑而得封也然則申之始封亦在周興之初其後中絶至宣王之時申伯以王舅改封於謝詩大雅嵩髙之篇美宣王褒賞申伯云王命召伯定申伯之宅是其事也地理志南陽郡宛縣故申伯國宛縣者謂宣王改封之後也以前則不知其地生莊公及共叔假注假出奔共故曰共叔猶晉侯在鄂謂之鄂侯音義共音恭共地名凡國名地名人名字氏族皆不重音疑者復出後倣此鄂五各反疏注正義曰賈服以共為諡諡法敬長事上曰共作亂而出非有其德可稱糊口四方無人與之為諡故知假出奔共故稱共猶下晉侯之稱鄂侯也莊公寤生驚薑氏故名曰寤生遂惡之注寐寤而莊公巳生故驚而惡之音義寤五故反惡烏路反注同疏正義曰謂武薑寐時生莊公至寤始覺其生故杜云寐寤而莊公已生愛共叔假欲立之注欲立以為大子亟請於武公公弗許及莊公即位為之請制公曰制巖邑也虢叔死焉他邑唯命注虢叔東虢君也恃制巖險而不修德鄭滅之恐假復然故開以他邑虢國今滎陽縣音義亟欺冀反數也為于偽反巖五銜反本又作嚴虢瓜伯反國名復扶又反疏注正義曰僖五年傳曰虢仲虢叔王季之穆也晉語稱文王敬友二虢則虢國本有二也晉所滅者其國在西故謂此為東虢也鄭語史伯為桓公設謀云虢叔恃勢鄫仲恃險皆有驕侈怠慢之心君以成周之衆奉辭伐罪無不克矣桓公從之是其恃險而不修德為鄭滅之之事也云虢叔封西虢仲封東而此云虢叔東虢君者言所滅之君字叔也桓十年傳云虢仲譖其大夫謂叔之子孫字曰仲也案傳燕國有二則一稱北燕邾國有二則一稱小邾此虢國有二而經傳不言東西者於時東虢已滅故西虢不稱西其並存之日亦應以東西别之地理志云河南郡滎陽縣應劭云故虢國今虢亭是也請京使居之謂之京城大叔注公順薑請使假居京謂之京城大叔言寵異於衆臣京鄭邑今滎陽京縣音義大音泰注及下皆同祭仲曰都城過百雉國之害也注祭仲鄭大夫方丈曰堵三堵曰雉一雉之牆長三丈髙一丈侯伯之城方五里徑三百雉故其大都不得過百雉音義過古卧反後不音者皆同堵丁古反長直亮反又如字髙古報反又如字徑古定反疏注正義曰注諸言大夫者以其名氏顯見於傳更無卑賤之驗者皆以大夫言之其實是大夫與否亦不可委知也定十二年公羊傳曰雉者何五板而堵五堵而雉何休以為堵四十尺雉二百尺許慎五經異議戴禮及韓詩説八尺為板五板為堵一堵為雉板廣二尺積髙五板為一丈五堵為雉雉長四丈古周禮及左氏説一丈為板板廣二尺五板為堵一堵之牆長丈髙丈三堵為雉一雉之牆長三丈髙一丈以度其長者用其長以度其髙者用其髙也諸説不同必以雉長三丈為正者以鄭是伯爵城方五里大都三國之一其城不過百雉則百雉是大都定制因而三之則侯伯之城當三百雉計五里積千五百步步長六尺是九百丈也以九百丈而為三百雉則雉長三丈賈逵馬融鄭玄王肅之徒為古學者皆云雉長三丈故杜依用之侯伯之城方五里亦無正文周禮冬官考工記匠人營國方九里旁三門謂天子之城天子之城方九里諸侯禮當降殺則知公七里侯伯五里子男三里以此為定説也但春官典命職乃稱上公九命侯伯七命子男五命其國家宫室車旗衣服禮儀皆以命數為莭鄭玄以為國家國之所居謂城方也如典命之言則公當九里侯伯七里子男五里故鄭玄兩解之其注尚書大傳以天子九里為正説文云或者天子之城方十二里詩文王有聲箋言文王城方十里大於諸侯小於天子之制論語注以為公大都之城方三里皆以為天子十二里公九里也其駁異義又云侯伯城方五里以匠人典命俱是正文因其不同故兩申其説今杜無二解以侯伯五里為正者蓋以典命所云國家者自謂國家所為之法禮儀之度未必以為城居也先王之制大都不過參國之一注三分國城之一音義參七南反又音三中五之一小九之一今京不度非制也注不合法度非先王制疏正義曰定以王城方九里依此數計之則王城長五百四十雉其大都方三里長一百八十雉中都方二里又二百四十步長一百八雉也小都方一里長六十雉也公城方七里長四百二十雉其大都方二里又一百步長一百四十雉也中都方一里又一百二十步長八十四雉也小都方二百三十三步二尺長四十六雉又二丈也侯伯城方五里長三百雉其大都方一里又二百步長百雉也中都比王之小都其小都方一百六十六步四尺長三十三雉又一丈也子男城比王之大都其大都比侯伯之中都其中都方一百八十步長三十六雉也小都方百步長二十雉也考工記曰王宫門阿之制五雉宫隅之制七雉城隅之制九雉門阿之制以為都城之制宫隅之制以為諸侯之城制然則王之都城隅髙五丈城蓋髙三丈諸侯城隅髙七丈城蓋髙五丈也三丈以下不復成城其都城蓋亦髙三丈也周禮四縣為都周公之設法耳但土地之形不可方平如圗其邑竟廣狹無復定準隨人多少而制其都邑故有大都小都焉下邑謂之都都亦一名邑莊二十八年傳曰宗邑無主閔元年傳曰分之都城俱論曲沃而都邑互言是其名相通也君將不堪公曰薑氏欲之焉辟害對曰薑氏何厭之有不如早為之所注使得其所宜音義焉於虔反厭於鹽反無使滋蔓蔓難圖也蔓草猶不可除況君之寵弟乎公曰多行不義必自斃子姑待之注斃踣也姑且也音義蔓音萬斃婢世反本又作弊舊扶設反踣蒲北反疏正義曰此以草喻也草之滋長引蔓則難可芟除喻假之威勢稍大難可圖謀也注正義曰釋言文也孫炎曰前覆曰踣既而大叔命西鄙北鄙二於巳注鄙鄭邉邑二兩屬公子吕曰國不堪二君將若之何注公子吕鄭大夫疏正義曰兩屬則賦役倍賦役倍則國人不堪也欲與大叔臣請事之若弗與則請除之無生民心注叔久不除則舉國之民當生他心公曰無庸將自及注言無用除之禍將自及大叔又收二以為巳邑注前兩屬者今皆取以為巳邑至于廩延注言轉侵多也廩延鄭邑陳留酸棗縣北有延津音義廩力錦反子封曰可矣厚將得衆注子封公子吕也厚謂土地廣大公曰不義不昵厚將崩注不義於君不親於兄非衆所附雖厚必崩音義䁥女乙反親也疏正義曰以牆屋喻也厚而無基必自崩喻衆所不附將自敗也髙大而壞謂之崩大叔完聚注完城郭聚人民音義完音桓疏注正義曰服虔以聚為聚禾黍也假欲輕行襲鄭不作固守之資故知聚為聚人非聚糧也完城者謂聚人而完之非欲守城也繕甲兵具卒乘注步曰卒車曰乘音義繕市戰反卒尊忽反步兵也注及下同乘繩證反注及下同將襲鄭夫人將啓之注啓開也公聞其期曰可矣命子封帥車二百乘以伐京注古者兵車一乘甲士三人步卒七十二人京叛大叔假假入于鄢公伐諸鄢五月辛丑大叔出奔共注共國今汲郡共縣音義共音恭汲居及反書曰鄭伯克假于鄢假不弟故不言弟如二君故曰克稱鄭伯譏失教也謂之鄭志不言出奔難之也注傳言夫子作春秋改舊史以明義不早為之所而養成其惡故曰失教假實出奔而以克為文明鄭伯志在於殺難言其奔音義不弟之弟大計反又如字難乃旦反注同疏正義曰謂實非二君雋傑強盛如似二君伐而勝之然後稱克非謂真是二君也若真是二君則以戰襲敗取為文然既非二君而杜注經云以君討臣而用二君之例又似真二君者但杜於彼應云以君討臣而用如二君之例略其如字但云而用二君耳準獲麟之後史文夫子未修之前應云鄭伯之弟假出奔共與秦伯之弟針出奔晉同也以其不弟故不言弟志在於殺故不言奔然則鄭伯亦是舊史之文而得為新意者假以去弟為貶宜以國討為文仍存鄭伯見其失教其文雖是舊史即是仲尼新意也注正義曰經皆孔子所書此事特言書曰必是舊史不然夫子始改故知傳之此辭言夫子作春秋改舊史以明義也克者戰勝獲賊之名公伐諸鄢假即奔共既不交戰亦不獲假假實出奔而以克為文者此非夫子之心謂是鄭伯本志不欲言其出奔難言其奔志在於殺故夫子承其本志而書克也鄭伯之於假也以其母所鍾愛順母私情分之大邑恣其榮寵實無殺心但大叔無義恃寵驕盈若微加裁貶則恐傷母意故祭仲欲早為之所子封請往除之公皆不許是其無殺心也言必自斃厚將崩者止謂自損其身不言惡能害國及其謀欲襲鄭禍將逼身自念友愛之深遂起􅋀心之恨由是志在必殺難言出奔此時始有殺心往前則無殺意傳稱公曰薑氏欲之焉辟害詩序曰不勝其母以害其弟經曰父母之言亦可畏也是迫於母命不得裁之非欲待其惡成乃加誅戮也服虔云公本欲養成其惡而加誅使不得生出此鄭伯之志意也言鄭伯本有殺意故為養成其惡斯不然矣傳曰稱鄭伯譏失教也止責鄭伯失於教誨之道不謂鄭伯元有殺害之心若從本以來即謀殺害乃是故相屠滅何止失教之有且君之討臣遏其萌漸惡雖未就君得誅之何須待其惡成方始殺害服言本意欲殺乃是誣鄭伯也劉炫云以克為文非其實狀故傳解之謂之鄭志言仲尼之意書克者謂是鄭伯本志也注又申解傳意言鄭伯志在於殺心欲其克難言其奔故仲尼書克不書奔如鄭伯之志為文所以惡鄭伯也遂置薑氏于城潁注城潁鄭地音義置之豉反置也而誓之曰不及黃泉無相見也注地中之泉故曰黃泉既而悔之潁考叔為潁谷封人注封人典封疆者音義疆居良反疏注正義曰周禮封人掌為畿封而樹之鄭玄云畿上有封若今時界也天子封人職典封疆知諸侯封人亦然也傳言祭仲足為祭封人宋髙哀為蕭封人論語有儀封人此言潁谷封人皆以地名封人蓋封人職典封疆居在邉邑潁谷儀祭皆是國之邉邑也聞之有獻於公公賜之食食舍肉公問之對曰小人有母皆嘗小人之食矣未嘗君之羮請以遺之注食而不啜羮欲以發問也宋華元殺羊為羮饗士蓋古賜賤官之常音義舍音捨遺唯季反下同啜川恱反華户化反疏注正義曰禮公食大夫及曲禮所記大夫士與客燕食皆有牲體殽胾非徒設羮而已此與華元饗士唯言有羮故疑是古賜賤官之常公曰爾有母遺繄我獨無注繄語助音義繄烏兮反又烏帝反潁考叔曰敢問何謂也注據武薑在設疑也公語之故且告之悔對曰君何患焉若闕地及泉隧而相見其誰曰不然注隧若今延道音義語魚據反闕其月反隧音遂公從之公入而賦大隧之中其樂也融融注賦賦詩也融融和樂也音義樂音洛注及下同融羊弓反薑出而賦大隧之外其樂也泄泄注泄泄舒散也音義泄羊世反疏注正義曰賦詩謂自作詩也中融外泄各自為韻蓋所賦之詩有此辭傳略而言之也融融和樂泄泄舒散皆是樂之狀以意言之耳服虔云入言公出言薑明俱出入互相見遂為母子如初君子曰潁考叔純孝也注純猶篤也疏注正義曰爾雅釋詁訓純為大則純孝純臣者謂大孝大忠也此純猶篤者言孝之篤厚也愛其母施及莊公詩曰孝子不匱永錫爾類其是之謂乎注不匱純孝也莊公雖失之於初孝心不忘考叔感而通之所謂永錫爾類詩人之作各以情言君子論之不以文害意故春秋傳引詩不皆與今説詩者同後皆倣此音義施以豉反又式智反匱其位反疏正義曰詩毛傳及爾雅之訓匱竭永長錫豫爾女也此詩大雅既醉之五章言孝子為孝不有竭極之時故能以此孝道長賜豫女之族類言行孝之至能延及旁人其是此事之謂乎族類者言俱有孝心則是其族類也注正義曰潁考叔有純孝之行能錫莊公莊公雖失之於初孝心不忘則與潁考叔同是孝之般類也今考叔能感而通之是謂永錫爾類也詩人之作各以情言君子論之不以文害意出孟子文也此云春秋傳引詩不皆與今説詩者同何以昭八年注云叔向時詩義如此所以不同者此是丘明作傳稱君子之言容可引詩斷章評論得失彼是叔向之語事近前代當時譏刺故云叔向時詩義如此也詩注意類謂子孫族類此傳意以為事之般類也秋七月天王使宰咺來歸惠公仲子之賵緩且子氏未薨故名注惠公葬在春秋前故曰緩也子氏仲子也薨在二年賵助喪之物疏正義曰緩賵惠公生賵仲子事由於王非咺之過所以貶咺者天王至尊不可貶責貶王之使足見王非且緩賵惠公專是王過生賵仲子咺亦有愆使者受命不受辭欲令遭時設宜臨機制變王謂仲子已薨令咺并致其賵仲子尚存賵事須止宰咺知其未薨猶尚致賵是則不達時宜恥辱君命王則任非其人咺為辱命之使君臣一體好惡同之貶咺亦所以責王也文五年王使榮叔歸含且賵不指所賵之人此指言惠公仲子者彼成風未葬不言可知此則惠公巳葬子氏未薨若不言其人則不知為誰來賵文九年秦人來歸僖公成風之禭亦為年月已逺故指其所禭與此同也季文子求遭喪之禮以行亦豫凶事不貶者宰咺無喪致賵文子乃量時制宜備豫不虞古之善教與此不同天子七月而葬同軌畢至注言同軌以别四夷之國音義别彼列反諸侯五月同盟至注同在方嶽之盟大夫三月同位至注古者行役不踰時士踰月外姻至注踰月度月也姻猶親也此言赴弔各以逺近為差因為葬節疏正義曰天子諸侯大夫士位既不同禮亦異數赴弔逺近各有等差因其弔答以為葬節且位髙則禮大爵卑則事小大禮踰時乃備小事纍月即成聖王制為常規示民軌法欲使各修其典無敢忒差資父事君生民之所極哀死送終臣子之所盡是以未及期而葬謂之不懷過期而葬謂之緩慢春秋從實而録以示是非天子七月諸侯五月者死月葬月皆通數之也文八年八月天王崩九年二月葬襄王是天子之七月也成十八年八月公薨于路寢十二月葬我君成公是諸侯之五月也宣八年傳云禮卜葬先逺日辟不懷也是卜逺日不吉乃卜近日辟不思親之嫌也則未及期而葬者不思其親理在可見故傳皆不言其事唯過期乃葬者傳言緩以示譏耳桓王以桓十五年崩莊三年乃葬積七年也僖公以其三十三年十一月薨文元年四月乃葬薨葬中有閏積七月也二者並過於期故傳皆言緩以譏之也衛桓公以隱四年三月為州吁所弒五年四月乃葬積十四月也莊公以其三十二年八月薨閔元年六月乃葬積十一月也二者雖亦過期而國有事難故傳皆言亂故是以緩原其非慢不以責臣子也然則諸侯五月而葬自是正法得禮可知不假發傳而葬成公之下傳特云書順者釋例曰魯君薨葬多不順制唯成公薨于路寢五月而葬國家安靜世適承嗣故傳見莊之緩舉成書順以包之然則特發此傳欲以包羣公之得失於莊見亂故而緩於僖見無故而緩於成見順禮傳發三者則其餘皆可知也士踰月者通死月亦三月也襄十五年十一月晉侯周卒十六年正月葬晉悼公杜云踰月而葬速是踰月亦三月也此注云踰月度月者言從死月至葬月其間度一月也士與大夫不異而别設文者以大夫與士名位既異因其名異示為等差故變其文耳其實月數同也同軌同盟至者謂遣使來至非諸侯身至釋例曰萬國之數至衆封疆之守至重故天王之喪諸侯不得越竟而奔修服於其國卿共弔葬之禮魯侯無故而穆伯如周弔此天子崩諸侯遣卿共弔葬之經傳也是言禮天子之喪諸侯不親奔也其諸侯相弔則昭三十年傳云先王之制諸侯之喪士弔大夫送葬是正禮也同位至待其使還也外姻至親戚畢集也於天子言畢至以下不言畢者天子貴在尊極海內為家天下聞喪無敢不至故言畢也諸侯同盟或來或否大夫出使本奉君命雖或聞喪未必盡來故不言畢也此亦例而不言凡者序已解訖何休膏盲以為禮士三月葬今云踰月左氏為短鄭康成云人君殯數來日葬數往月大夫殯葬皆數來日來月士殯葬皆數往日往月士之三月大夫之踰月也鄭之此言天子諸侯葬數往月於左氏無害云大夫葬數來月恐非杜旨蘇寬之意以古禮大夫以上殯葬皆數來日來月士殯葬數往日往月空云古禮事無所出不可依用也劉炫云此亦例不言凡者諸所發凡皆為經張例此舉葬之大期以譏宰咺之緩非是為葬發例故不言凡也注正義曰鄭玄服虔皆以軌為車轍也王者馭天下必令車同軌書同文同軌畢至謂海內皆至也四夷異俗不可同其文軌天子之喪不能以時赴弔故言同軌以别四夷之國也周禮巾車本路以封蕃國蕃國即四夷也既受王命車亦應同軌而言别四夷者四夷來朝天子天子賜之車服行於中國自然同軌其在夲國軌必不同若以巾車之文即言與華夏同軌豈亦能同文也周禮司盟凡邦國有疑會同則掌其盟約之載然則天子之合諸侯有使諸侯共盟之禮也王合諸侯唯有巡守其非巡守則有事而會會之多少唯王所命不得有同盟常禮禮之同盟唯方嶽耳故左氏舊説十二年三考黜陟幽明既分天子展義巡守柴望既畢諸侯遂朝退相與盟同好惡奬王室是其當方諸侯同有方嶽之盟同盟情親吉凶相告故遣使會葬也同位謂同為大夫其在列位者待其來至三月待之故知古者於法行役不踰時也隱五年榖梁傳曰伐不踰時明行役聘問亦不踰時也贈死不及尸注尸未葬之通稱音義稱尺證反疏注正義曰曲禮下云在牀曰尸在棺曰柩是其相對言耳今以既葬乃來而云不及尸知尸是未葬之通稱也葬則尸不復見未葬猶及見之故以葬為限也釋例曰喪贈之幣車馬曰賵貨財曰賻衣服曰禭珠玉曰含然而總謂之贈故傳曰贈死不及尸也然則此文雖為賵發其實賵賻含禭總名為贈但及未葬皆無所譏也禭以衣尸含以實口大斂之後無所用之既殯之後猶致之者示存恩好不以充用也合讃曰雜記弔含禭賵臨之等未葬則葦席既葬則蒲席是葬後得行此言緩者禮記後人雜録不可與傳同言也或可初葬之後則可久則不許弔生不及哀注諸侯已上既葬則縗麻除無哭位諒暗終喪音義上時掌反縗七雷反諒音亮又音良暗如字疏注正義曰昭十五年傳稱穆后崩不既葬除喪叔向曰三年之喪雖貴遂服禮也杜云天子諸侯除喪當在卒哭今王既葬而除故譏其不遂也案僖三十三年傳云卒哭而祔杜云既葬反虞則免喪故曰卒哭哭止也如杜此言則卒哭與葬相去非逺同在一月儀禮士三虞則天子諸侯皆同於此必知然者以卒哭是葬之餘事共在一月之中故杜云既葬則衰麻除或云既葬卒哭衰麻除以其相近故也若據雜記云諸侯五月而葬七月而卒哭中間既賖或有國事稱號云何是知葬與卒哭相連間無事也然雜記云諸侯五月而葬七月而卒哭者按釋例曰禮記後人所作不與春秋同是杜所不用也既葬除喪唯杜有此説正以春秋之例皆既葬成君明葬是人君之大節也昭公十二年傳曰齊侯衛侯鄭伯如晉晉侯享諸侯子産相鄭伯辭於享請免喪而後聽命晉人許之禮也於時鄭有簡公之喪未葬故請免喪其下傳又云六月葬鄭簡公丘明作傳未嘗虛舉經文而虛言此葬得非終前免喪之言也以此知諸侯既葬則免喪喪服既除則無哭位諸侯既然知天子亦爾尚書高宗亮隂三年不言論語云何必高宗古之人皆然是天子諸侯除服之後皆諒隂終喪也晉書杜預傳云泰始十年元皇后崩依漢魏舊制既葬帝及羣臣皆除服疑皇大子亦應除否詔諸尚書會僕射盧欽論之唯預以為古者天子諸侯三年之喪始服齊斬既葬除喪服諒暗以居心喪終制不與士庶同禮於是盧欽魏舒問預證據預曰春秋晉侯享諸侯子産相鄭伯時簡公未葬請免喪以聽命君子謂之得禮宰咺歸惠公仲子之賵傳曰弔生不及哀此皆既葬除服諒暗之證也書傳之説既多學者未之思耳喪服諸侯為天子亦斬衰豈可謂終服三年也預又作議曰周景王有后世子之喪既葬除喪而宴樂晉叔向譏之曰三年之喪雖貴遂服禮也王雖不遂宴樂以早此亦天子喪事見於古也稱高宗不言喪服三年而云亮隂三年此釋服心喪之文也譏景王不譏其除喪而譏其宴樂早則既葬應除而違諒暗之莭也堯喪舜諒暗三年故稱遏密八音由此言之天子居喪齊斬之制菲杖絰帶當遂其服既葬而除諒暗以終之三年無改於父之道故曰百官總已以聽冢宰喪服既除故更稱不言之美明不復寢苫枕塊以荒大政也禮記云三年之喪自天子達又云父母之喪無貴賤一也又云端衰喪車皆無等此通謂天子居喪衣服之制同於凡人心喪之禮終於三年亦無服喪三年之文天子之位至尊萬幾之政至大羣臣之衆至廣不得同之於凡人故大行既葬祔祭於廟則因疏而除之已不除則羣臣莫敢除故屈己以除之而諒暗以終制天下之人皆曰我王之仁也屈已以從宜皆曰我王之孝也既除而心喪我王猶若此之篤也凡我臣子亦安得不自勉以崇禮此乃聖制移風易俗之本也議奏皇大子遂除衰麻而諒暗終喪於時內外卒聞預議多怪惑者乃謂其違禮以合時預謂鄉人殷暢曰兹事體大本欲宣明古典知未合於當今也宜博采典籍為之證據全大分明足以垂示將來暢遂敷通危疑以𢎞指趣其論具存焉杜議引尚書傳云亮信也隂默也為聽於冡宰信默而不言鄭玄以諒暗為凶廬杜所不用豫凶事非禮也注仲子在而來贈故曰豫凶事八月紀人伐夷夷不告故不書注夷國在城陽壯武縣紀國在東莞劇縣隱十一年傳例曰凡諸侯有命告則書不然則否史不書於策故夫子亦不書于經傳見其事以明春秋例也他皆倣此音義莞音官見賢遍反下三見同疏正義曰世族譜紀薑姓侯爵莊四年齊滅之世本夷妘姓傳無其人不知為誰所滅釋例土地名夷國在城陽壯武縣莊十六年晉武公伐夷執夷詭諸杜云詭諸周大夫夷采地名釋例土地名注為闕則二夷别也世族譜於夷詭諸之下注云妘姓更無夷國則以二夷為一計壯武之縣逺在東垂不得為周大夫之采邑而晉取其地是譜誤也有蜚不為災亦不書注蜚負蠜也莊二十九年傳例曰凡物不為災不書又於此發之者明傳之所據非唯史䇿兼采簡牘之記他皆倣此音義蜚扶味反蠜音煩又音盤疏注正義曰釋蟲云蜚蠦蜰舍人李巡皆云蜚蠦一名蜰郭璞云蜚即負盤臭蟲洪範五行傳云蜚負蠜夷狄之物趙之所生其為蟲臭惡南方淫女氣之所生也夲草曰蜚厲蟲也然則蜚是臭惡之蟲害人之物故或為災或不為災也經傳皆云有蜚則此蟲直名蜚耳不名蜚蠦爾雅所釋當言蜚一名蠦蜰説爾雅者言蜚蠦一名蜰非也此蟲一名負盤漢書及此注多作負蠜者釋蟲云草螽負蠜彼則嵗時常有非災蟲也蓋相涉誤為蠜耳又明下有成例此不合書而傳發之者明傳之所據非獨正史之策亦兼采簡牘所有故傳據而言之案上傳紀人伐夷注云傳見其事以明春秋例則此有蜚亦明春秋例此云傳之所據非唯史䇿兼采簡牘則上紀人伐夷亦是兼采簡牘但紀人伐夷他國不告故以明例解之蜚是魯國之有故以兼采簡牘言之其實二注互以相通他如此類惠公之季年敗宋師于黃注黃宋邑陳留外黃縣東有黃城音義敗必邁反敗他也後倣此公立而求成焉九月及宋人盟于宿始通也注經無義例故傳直言其歸宿而已他皆倣此冬十月庚申改葬惠公公弗臨故不書注以桓為大子故隱公讓而不敢為喪主隱攝君政故據隱而言惠公之薨也有宋師大子少葬故有闕是以改葬音義少詩照反疏正義曰上云惠公之季年敗宋師于黃公立而求成焉則隱公未立之前惠公敗宋師也今云惠公之薨也有宋師蓋是報黃之敗來伐魯也隱公將兵禦宋委葬事于大子故有闕也服虔以為宋師即黃之師也是時宋來伐魯公自與戰然則隱自敗宋還自求成傳何當屬敗於惠公而别言公立也且薨之與葬相去既逺豈有宋師薨時已來葬時後去衛侯來會葬不見公亦不書注諸侯會葬非禮也不得接見成禮故不書於䇿他皆倣此衛國在汲郡朝歌縣音義朝如字疏正義曰衛國侯爵譜云姬姓文王子康叔封之後也周公既誅祿父以其地封康叔為衛侯居殷虛今朝歌是也狄滅衛文公居楚丘成公徙帝丘今東郡濮陽是也桓公十三年魯隱公之元年也出公輒十二年獲麟之歲也悼公二年春秋之傳終矣悼公二年卒自悼以下十一世二百五十五年而秦滅衛也衛世家桓公康叔十一世孫尚書顧命稱康叔為衛侯則初封侯爵也世家康叔子則稱伯至頃侯復為侯故今桓公為侯爵注正義曰昭三十年傳云先王之制諸侯之喪士弔大夫送葬昭三年傳稱文襄之霸君薨大夫弔卿共葬事皆不言諸侯親會葬是諸侯會葬非禮也不得接公成禮故不書此云不見公不書介葛盧亦不見公而書者此則公在國而不與衛侯相見故不書彼則公身在會國人賓禮之又欲見其一年再來故書之也鄭共叔之亂公孫滑出奔衛注公孫滑共叔段之子音義滑于八反又乎八反衛人為之伐鄭取廪延鄭人以王師虢師伐衛南鄙注虢西虢國也𢎞農陜縣東南有虢城音義為于偽反陜失冉反依字作陜請師於邾邾子使私於公子豫注公子豫魯大夫私請師音義豫音預豫請往公弗許遂行及邾人鄭人盟于翼注翼邾地不書非公命也新作南門不書亦非公命也注非公命不書三見者皆興作大事各舉以備文十二月祭伯來非王命也衆父卒注衆父公子益師字音義衆音終公不與小斂故不書日注禮卿佐之喪小斂大斂君皆親臨之崇恩厚也始死情之所篤禮之所崇故以小斂為文至於但臨大斂及不臨喪亦同不書日音義與音預斂力驗反注皆同疏注正義曰喪大記君臨臣喪之禮云君於大夫大斂焉為之賜則小斂焉卿是大夫之尊者也明小斂大斂君皆親之所以崇恩厚也小斂大斂皆應親之獨以小斂為文故知始死情之所篤故也賈逵云不與大斂則不書卒然則在殯又不往者復欲何以裁之且傳無其事不宜妄説故杜以為但臨大斂及不臨其喪亦同不書日也經二年春公會戎于潛注戎狄夷蠻皆氐羌之别種也戎而書會者順其俗以為禮皆謂居中國若戎子駒支者陳留濟陽縣東南有戎城潛魯地音義氏都兮反羌郤良反種章勇反駒音拘濟子禮反水名凡地名皆同疏注正義曰曲禮云東夷西戎南蠻比狄然則四者是九州之外别名也詩商頌曰自彼氐羌氐羌西戎之國名也杜欲明其在逺無以相形故云氐羌之别種謂是相類之物耳非謂四者是羌內之别也其實氐羌乃是戎內之别耳戎子駒支云我諸戎飲食衣服不與華同贄幣不通言語不達計應不堪會盟故解云言順其俗以為禮也沈氏云會據公往戎為主人故得隨主人之俗以為會禮朝據戎來魯為主人戎不能從主人之俗故朝禮不成戎是西方之夷必不逺來會魯故知謂居中國若戎子駒支者也駒支事見襄十四年夏五月莒人入向注向小國也譙國龍亢縣東南有向城莒國今城陽莒縣也將卑師少稱人弗地曰入例在襄十三年音義向舒亮反國名譙在遙反亢音剛又苦浪反將子匠反疏正義曰世夲莒已姓向薑姓此傳云莒人入向以薑氏還文八年傳稱穆伯奔莒從己氏是莒已向薑見於傳也譜云莒嬴姓少昊之後周武王封兹與於莒初都計後徙莒今城陽莒縣是也世夲自紀公以下為己姓不知誰賜之姓者十一世兹丕公方見春秋其公以下微弱不復見四世楚滅之向則唯此見經不能知其終始注正義曰將卑師少稱人者周禮萬二千五百人為軍二千五百人為師五百人為旅用兵多少其數無常重其舉大事動大衆滿師則書之不滿則不書輕其衆少故經皆不書旅也師者衆也雖復五軍三軍悉皆以師為名取其衆義故經亦不書軍也釋例曰春秋不書軍旅一皆曰師從衆辭是其義也經之大例君自將者言軍不言師卿將者滿師則師將並書不滿則空舉將名大夫將者滿師則稱師不滿則稱人所以然者定四年傳曰君行師從卿行旅從則君行必有師卿行必有旅文雖不見理足可明君將不言帥師卿將不言帥旅以其可知故也卿行不合師從今乃帥領一師若不言師則師文不見卿尊自合書名師文又須别見故師將並舉言某帥師也其師少者卿自須見唯舉將名不云帥旅言衆少不足録也大夫爵位卑下名氏不合見經但所帥滿師師自須見故言師不言將也若不滿師者一旅之衆則例所不書大夫位卑又名不當見則空舉其將謂之為人人即大夫身也其將尊師少及將卑師衆若其序列則將卑師衆者在上襄二年晉師宋師衛寧殖侵鄭是也隱五年公羊傳曰曷為或言率師或不言率師將尊師衆稱某率師將尊師少稱將將卑師衆稱師將卑師少稱人君將不言率師書其重者也釋例曰大夫將滿師稱師不滿稱人而已卿將滿師則兩書不滿則直書名氏君將不言帥師卿將不言帥旅此史䇿記注之常此用公羊為説也劉炫云盟會例卿則書名氏非卿則書人人當名氏之處由是將卑師少則書人亦與盟會同無駭帥師入極注無駭魯卿極附庸小國無駭不書氏未賜族賜族例在八年音義駭户楷反疏注正義曰春秋之例卿乃見經今名書於經傳言司空故知無駭是魯卿諸名書於經皆是卿也故於此一注以下不復言之又王制云上大夫卿則卿亦大夫也故注多以大夫言卿下注云裂繻紀大夫如此之類皆是卿也其名見於傳而注云大夫者則其爵真大夫也穀梁以極為國杜云附庸者沈云以費伯帥師城郎因得勝極則極是竟內故云附庸凡卿出使必具其名氏以尊君命今不書氏故解云未賜族無族可稱故也賈云極戎邑也極為戎邑傳無文焉戎之於魯夲無怨惡言修惠公之好則是求與魯親公未言戎心故辭其盟耳秋即與盟復修戎好若已共戎會故不與盟旋令師入其都然後結好其為惡行亦不是過讓位賢君固應不爾良史直筆焉得無譏傳乃夲其勝之所由而歸功於費伯也秋八月庚辰公及戎盟于唐注高平方與縣北有武唐亭八月無庚辰庚辰七月九日也日月必有誤音義方音房與音預疏注正義曰杜勘檢經傳上下月日制為長歷此年八月壬寅朔其月三日甲辰十五日丙辰二十七日戊辰其月無庚辰也七月壬申朔則九日有庚辰杜觀上下若月不容誤則指言日誤若日不容誤則指言月誤此則上有秋下有九月則日月俱得有誤故云日月必有誤也九月紀裂繻來逆女注裂繻紀大夫傳曰卿為君逆也以别卿自逆也逆女或稱使或不稱使昏禮不稱主人史各隨其實而書非例也他皆倣此音義裂音列繻音須為于偽反下為魯同别彼列反疏注正義曰此書逆女傳曰卿為君逆也宣五年齊髙因來逆叔姬傳曰書曰叔姬卿自逆也是為君逆則稱女自逆則書字故云以别卿自逆也釋例曰天子娶則稱逆王后卿為君逆則稱逆女其目為逆則稱所逆之字尊卑之别也此不言紀侯使裂繻而成八年經書宋公使公孫夀來納幣俱是昏禮而立文不同故解之也言昏禮不稱主人者主人謂壻也為有亷耻之心不欲自言娶婦故卿為君昏侍者必稟君母之命婦人之命不得通於鄰國若言卿輒自來非君所命故裂繻不言使也其無母者臣無所稟不得不稱君命故公孫夀言宋公使也史皆隨其實事而書之非褒貶之例也公羊傳曰何以不稱使昏禮不稱主人然則曷稱稱諸父兄師友宋公使公孫夀來納幣則其稱主人何辭窮也辭窮者何無母也然則紀有母乎曰有有則何以不稱母母不通也是婦人之言不通外國故不言君使亦不言母命作自來之文也公羊言無母者稱父兄師友宋公不稱父兄者諸侯臣其父兄故不得稱也昏禮記曰宗子無父母命之親皆沒已躬命之以宗子之尊尚不稱父兄况諸侯也其稱父兄師友謂大夫以下非宗子者耳昏禮記所云支子則稱其宗弟稱其兄是也冬十月伯姬歸于紀注無傳伯姬魯女裂繻所逆者紀子帛莒子盟于密注子帛裂繻字也莒魯有怨紀侯既昏于魯使大夫盟莒以和解之子帛為魯結好息民故傳曰魯故也比之內大夫而在莒子上稱字以嘉之也字例在閔元年密莒邑城陽淳于縣東北有密鄉音義帛音白解如字又户買反好呼報反疏注正義曰杜云比之內大夫而在莒子上者案諸經文魯大夫出會他國皆先書魯大夫下即云及某人今子帛之下不云及者不可全同魯大夫故也十有二月乙卯夫人子氏薨注無傳桓未為君仲子不應稱夫人隱讓桓以為大子成其母喪以赴諸侯故經於此稱夫人也不反哭故不書葬例在三年疏注正義曰妾子為君其母成為夫人敬嬴齊歸是也仲子實妾桓未為君故仲子不應稱夫人也今稱夫人薨是隱成之讓桓為大子成其母喪傳例曰不赴則不曰薨故知稱薨是赴於諸侯故經於此稱夫人也五年考仲子之宫公羊傳曰桓未君則曷為祭仲子隱為桓立故為桓祭其母也然則何言爾成公意也是言隱公成仲子為夫人也鄭人伐衛注凡師有鐘鼓曰伐例在莊二十九年傳二年春公會戎于潛修惠公之好也戎請盟公辭注許其修好而不許其盟禦夷秋者不一而足音義好呼報反注及下同疏注正義曰戎貪而無信盟或背之公未得戎意恐好不久成故不許其盟也禦夷狄者不一而足文九年公羊傳文言制禦夷狄當以漸教之不一度而即使足也莒子娶于向向薑不安莒而歸夏莒人入向以薑氏還注傳言失昏姻之義凡得失小故經無異文而傳備其事案文則是非足以為戒他皆倣此音義還音旋後皆同司空無駭入極費㡵父勝之注魯司徒司馬司空皆卿也㡵父費伯也前年城郎今因得以勝極故傳於前年發之音義㡵音琴戎請盟秋盟于唐復修戎好也音義復扶又反九月紀裂繻來逆女卿為君逆也音義為于偽反冬紀子帛莒子盟于密魯故也鄭人伐衛討公孫滑之亂也注治元年取廪延之亂春秋左傳注疏卷一春秋左氏傳注疏卷一考證傳惠公元妃孟子疏惠公名弗皇史記世家皇作湟傳繼室以聲子疏宋之同姓國依世本子姓殷時來宋空同黎比髦目夷蕭臣召南按世本今不可見史記殷本紀贊則曰有殷氏來氏宋氏空桐氏稚氏北殷氏目夷氏傳有文在其手疏隸書起于秦末手文必非隸書石經古文虞作魯作􅨞手文容或似之其文及夫人固當有似之者也臣浩按􅨞二文許愼説文不載疏據石經言之漢儒以公羊穀梁為今學以左氏為古學為其字皆古文孔穎達時猶見蔡雍石經也文及夫人文似當作友蓋上文言唐叔虞公子友及仲子魯夫人皆有手文虞應為魯應為􅨞則手文或得似之若友字及夫人二字手文尤易似也祭伯來臣召南按杜不注祭國所在羅泌路史云周圻內管城東北有古祭城傳春王周正月注言周以别夏殷臣浩按孔子以周人紀周事必不改時王之正朔自唐啖助趙匡以後學者爭攻左氏宋儒又造為夏時冠周月之説朱子已言其非吕大圭曰周以建子之月為正則春者始建子之月云爾最為直截左氏若預料後人必有紛紜穿鑿之解以一周字解之至簡至當臣召南按後儒春王正月之辨膠葛不明其實春秋所書皆周正也以傳證之僖五年正月辛亥朔日南至而正月之上亦冠以春又昭十七年梓慎曰火出於夏為三月於商為四月於周為五月可為改時改月之明證且以經所書參考如桓八年冬十月雨雪十四年春正月無氷襄二十八年春無氷僖三十三年十二月隕霜不殺草定元年冬十月隕霜殺菽皆備書於册以見失常若從夏正則東風解凍豈以無氷為奇亥月立冬豈以雨雪為異十月菽已畢刈豈有經霜見殺之苗十二月草已盡枯豈有隕霜不殺之理故知先儒紛紛之論皆曲説也傳不書即位攝也疏隱公讓位賢君一段臣照按周自東遷以後王室微弱政令不行並無巡狩方嶽之事孟子曰王者之迹熄而詩亡詩亡然後春秋作可證也疏言魯僖公時周王歲二月東巡狩至於岱宗柴季孫行父為請於周太史克為之作頌云云别無證佐又謂隱以讓國而為春秋之首以無人為請而不得入頌夫詩與春秋各為義例豈必春秋首隱詩即當頌隱耶平地生疑復舉後世偽説以解之蓋亦未論其世也傳莊公寤生臣浩按史記鄭世家曰武薑生太子寤生生之難及生夫人勿愛以生之難解寤生較杜注為明白傳太叔完聚疏服虔以聚為聚禾黍也監本脫為聚二字今增傳謂之鄭志傳書志者二一曰鄭志一曰宋志王應麟困學紀聞曰謂之鄭志以明兄弟之倫謂之宋志以正君臣之分傳天王使宰咺疏緩賵惠公監本脫賵惠二字今增傳弔生不及哀疏昭公十二年句監本作二年按事在昭公十二年今改正又疏泰始十年監本脫泰字今增傳紀人伐夷注夷國在城陽壯武縣臣召南按城陽郡有壯武縣無莊武縣漢封宋昌晉封張華皆以壯武各本俱作莊武東萊集解亦然皆誤也今從晉志改正紀裂繻來逆女臣召南按吕祖謙東萊集解此條下引注有紀國在東管劇縣七字推按前後注文於某國某地下皆有之則此七字當在裂繻紀大夫句之上不知何時刋本始脫今亦未敢遽增紀子帛莒子盟于密注子帛裂繻字也陳傅良春秋後傳曰杜預以子帛為裂繻字蓋意之也傳司空無駭入極注魯司徒司馬司空皆卿也臣召南按諸侯三卿用王朝之半亦曰三官昭四年傳杜泄言三官書之時季氏為司徒叔孫氏為司馬孟孫氏為司空是其證也春秋左氏傳注疏卷一考證
