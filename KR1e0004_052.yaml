body:
  text: 春秋左傳注疏卷五十二起昭公二十六年盡二十八年晉杜氏注唐陸德明音義孔穎達疏經二十有六年春王正月葬宋元公注三月而葬速三月公至自齊居于鄆疏正義曰往年公孫于齊齊侯唁公于野井公未必往至齊都而云至自齊者得與齊侯相見雖從齊境而來亦是自齊也穀梁傳云公次于陽州其曰至自齊何也以齊侯之見公可以言至自齊是也公不得歸其國都而書至者賈云季氏示欲為臣故以告廟夏公圍成注成孟氏邑不書齊師帥賤衆少重在公音義帥所類反秋公會齊侯莒子邾子杞伯盟于鄟陵注鄟陵地闕音義鄟音專又市轉反一音徒丸反公至自會居于鄆注無傳九月庚申楚子居卒注未同盟而赴以名冬十月天王入于成周注傳言王入在子朝奔後經在前者子朝來告晚疏正義曰二十三年七月天王居于狄泉自爾以來單子劉子夾以東西雖不出王畿而居無定所此時始得入于成周遂以成周為都來告故特書之案傳子朝奔楚及王入成周皆在十一月經書王入成周子朝奔楚皆在十月者從告也劉炫云杜以朝旣奔楚王始得入入必在朝奔後經書王入在前傳有告于諸侯之語故以為王告入在前朝告奔在後故先書王入炫謂子朝出亦王告下注與此自違尹氏召伯毛伯以王子朝奔楚注召伯當言召氏經誤也尹召族奔非一人故言氏書奔在王入下者王入乃告諸侯疏注正義曰傳言召伯盈逐王子朝朝及召氏之族奔楚召伯逆王于尸與王入于成周則召氏族出奔召伯身不奔也知召伯當為召氏經誤也宣十年崔氏出奔書崔氏者非其罪也此尹氏召氏立庶篡適竝為有罪而亦書氏者彼實崔杼身奔非是舉族盡出但於例諸侯之卿出奔者有罪則名無罪則不名崔杼不合書名因其來告以族遂書崔氏示杼無罪也此尹氏召氏舉族悉奔據實而書與彼有異故注云尹召族奔非一人故言氏所謂文同而意異也子朝奔王乃得入書奔在王入下者王入乃告諸侯也劉炫云杜上注云子朝來告晚何為此注又云王入乃告諸侯以二注不同將為杜失今知不然者杜意王入乃告謂王入之後子朝乃告杜以傳云癸酉王入于成周癸未王入于莊宮始云王子朝使告諸侯是王入之後子朝告諸侯也劉以為王入乃告據王告諸侯而規杜失非也傳二十六年春王正月庚申齊侯取鄆注前年已取鄆至是乃發傳者為公處鄆起疏注正義曰杜謂往年已取鄆此又發傳言齊侯取鄆者為下三月公處鄆以發端也服䖍以為往年齊侯取鄆實圍鄆耳經於圍書取傳實其事故於是言取劉以服言為是往年十二月庚辰圍鄆今年正月庚申取之凡三十一日例書取言易此圍乃取言易者齊侯取以居公臣無拒君之義若魯自與之然故書取以見其易穀梁曰以其為公取之故易言之是也葬宋元公如先君禮也注善宋人違命以合禮三月公至自齊處于鄆言魯地也注入魯竟故書至猶在外故書地音義竟音境夏齊侯將納公命無受魯貨申豐從女賈注豐賈二人皆季氏家臣音義女音汝以幣錦二兩注二丈為一端二端為一兩所謂匹也二兩二匹縳一如瑱注瑱充耳縳卷也急卷使如充耳易懷藏音義縳直轉反瑱它殿反易以豉反疏注正義曰家語云水至清則無魚人至察則無徒故人君冕而前旒所以蔽明黈纊塞耳所以蔽聽又詩云玊之瑱也禮以一絛五采横冕上兩頭下垂繫黄緜緜下又縣玉為瑱以塞耳適齊師謂子猶之人高齮注齮子猶家臣子猶梁丘據音義齮魚綺反能貨子猶為高氏後粟五千庾注言若能為我行貨於子猶當為請使得為高氏後又當致粟五千庾庾十六斗凡八千斛音義庾羊主反能為于偽反下當為下云為魯君同疏正義曰聘禮記云十六斗曰籔十籔曰秉鄭𤣥云秉十六斛今江淮之間量名有爲籔者今文籔為逾杜據儀禮今文故以庾為十六斗五千庾凡八千斛考工記陶人為庾實二觳厚半寸脣寸其下文旊人云豆實三而成觳則觳受斗二升庾實二觳則受二斗四升也彼陶人所作庾自瓦器今甕之類非量器也與此名同而實異髙齮以錦示子猶子猶欲之齮曰魯人買之百兩一布以道之不通先入幣財注言魯人買此甚多布陳之以百兩為數子猶受之言於齊侯曰羣臣不盡力于魯君者非不能事君也注欲行其説故先示欲盡力納魯君音義說如字又始銳反然據有異焉注異猶怪也宋元公為魯君如晉卒於曲棘叔孫昭子求納其君無疾而死不知天之棄魯耶抑魯君有罪於鬼神故及此也君若待于曲棘使羣臣從魯君以卜焉注卜知可伐否疏正義曰宋公佐卒于曲棘者杜云曲棘宋地陳留外黄縣城中有曲棘里今齊侯欲納魯君當是從齊向魯必不遠涉宋地子猶令齊君待于曲棘必使止於竟内土地名齊地無曲棘十年傳桓子召子山而反棘焉杜云齊國西安縣東有㦸里亭此卽彼棘也本無曲字涉上卒于曲棘誤加曲耳若可師有濟也君而繼之兹無敵矣若其無成君無辱焉齊侯從之使公子鉏帥師從公注鉏齊大夫音義鉏仕居反成大夫公孫朝謂平子曰有都以衞國也請我受師許之注以成邑禦齊師音義朝如字請納質注恐見疑音義質音致弗許曰信女足矣告於齊師曰孟氏魯之敝室也注敝壊也音義女音汝用成已甚弗能忍也請息肩于齊注公孫朝詐齊師言欲降使來取成音義降戸江反下同齊師圍成成人伐齊師之飲馬于淄者曰將以厭衆注以厭衆心不欲使知已降也淄水出泰山梁父縣西北入汶音義飲於鴆反淄側其反厭於冉反又於葉反汶音問魯成備而後告曰不勝衆注告齊言衆不欲降已不能勝音義勝音升注同又始證反師及齊師戰于炊鼻注季氏師距公非公命則不書炊鼻魯地音義炊昌垂反齊子淵㨗從洩聲子注聲子魯大夫音義洩息列反射之中楯瓦注瓦楯脊音義射食亦反下及注皆同中丁仲反下中手同楯常允反又音允脊子亦反繇朐汰輈七入者三寸注入楯瓦也朐車軛輈車轅繇過也汰矢激七矢鏃也音義繇音由朐其俱反本又作軥同汰他逹反輈陟留反七必履反軛於革反激古狄反鏃子木反或七木反疏正義曰射之中楯瓦先言中之之處更説矢來之狀繇車軛矢激從車轅之上其矢之七鏃入著楯瓦者猶深三寸言其弓力多而矢入深也注正義曰此覆説中楯之事故知入者入楯瓦也說文云軥軛下曲者襄十四年傳稱射兩軥而還此與彼同蓋朐軥字通用耳繇卽由也訓為從也從上而過故言繇過也宣四年傳云伯棼射王汰輈注云汰過也此云汰矢激謂矢激汰其上而過也傳言七入則七是入楯者也今人猶謂箭鏃薄而長濶者為七是匕為矢鏃也聲子射其馬斬鞅殪注殪死也音義鞅於丈反殪音於計反改駕人以為鬷戾也而助之注人魯人也鬷戾叔孫氏司馬子車曰齊人也注子車卽淵捷將擊子車子車射之殪其御曰又之注又欲使射餘人子車曰衆可懼也而不可怒也子囊帶從野洩叱之注囊帶齊大夫野洩卽聲子音義叱昌實反洩曰軍無私怒報乃私也將亢子注欲以公戰禦之不欲私報其叱音義亢苦浪反下同又叱之注子囊復叱之音義復扶又反下復欲反亦叱之注野洩亦叱也言齊無戰心但相叱冉豎射陳武子中手注冉豎季氏臣失弓而罵注武子罵音義罵馬嫁反以告平子曰有君子白晳鬒鬚眉甚口音義晳星暦反鬒之忍反黑也鬚本又作須脩于反疏正義曰說文云鬒稠髪也鬒鬚眉者言鬚眉皆稠多也甚口者謂大口也平子曰必子彊也無乃亢諸注子彊武子字對曰謂之君子何敢亢之注偽言不敢違季氏林雍羞為顔鳴右下注皆魯人羞為右故下車戰苑何忌取其耳注何忌齊大夫不欲殺雍但截其耳以辱之音義苑於阮反顔鳴去之注其右見獲懼而去之苑子之御曰視下顧注復欲使苑子擊其足苑子刜林雍斷其足鑋而乘於他車以歸注鑋一足行音義刜芳弗反説文云擊也又父勿反又忿勿反斷丁管反鑋遣政反又音磬又苦頂反字林丘貞反疏正義曰説文云刜擊也字從刀謂以擊也今江南猶謂刀擊為刜注正義曰旣斷其足而云鑋知鑋是一足行也說文云鑋金聲也蓋擊金為聲亦名鑋顔鳴三入齊師呼曰林雍乘注言魯人皆致力於季氏不以私怨而相棄音義呼火故反乘繩證反四月單子如晉告急五月戊午劉人敗王城之師于尸氏注劉人劉蚠之屬王城子朝之徒尸在鞏縣西南偃師城戊辰王城人劉人戰于施谷劉師敗績注施谷周地秋盟于鄟陵謀納公也注齊侯謀七月己巳劉子以王出注師敗懼而出疏正義曰二十三年傳云六月庚寅單子劉子樊齊以王如劉蓋從劉而居狄泉自狄泉又居於劉今為子朝所逐蓋自劉而出也服䖍云出成周也案二十三年天王居于狄泉狄泉雖近成周成周不屬王也其傳云召伯奐南宫極以成周人戌尹二十四年傳云王子朝用成周之寳珪于河是周常屬子朝之驗也二十五年黄父之會趙簡子令諸侯之大夫云明年將納王納王者欲納之於成周耳若敬王先在成周無為更須納之知此出者從劉出耳王旣棄劉而去故王城人焚劉庚午次于渠注渠周地王城人焚劉注燒劉子邑丙子王宿于褚氏注洛陽縣南有褚氏亭音義禇張吕反一音勑吕反丁丑王次于萑谷庚辰王入于胥靡辛巳王次于滑注萑谷胥靡滑皆周地胥靡滑本鄭邑音義萑音丸本又作雚古亂反疏注正義曰王雖未有安居終亦不出畿内知此皆周地也襄十八年楚人伐鄭傳稱公子格率銳師侵費滑胥靡是本為鄭邑今為周邑也晉知躒趙鞅帥師納王使女寛守關塞注女寛晉大夫關塞洛陽西南伊闕口也守之備子朝音義知音智躒音歴女音汝本亦作汝塞素代反九月楚平王卒令尹子常欲立子西注子西平王之長庶音義長丁丈反下文同曰太子壬弱其母非適也注壬昭王也音義適丁歴反下文同王子建實聘之子西長而好善立長則順建善則治王順國治可不務乎子西怒曰是亂國而惡君王也注言王子建聘之是章君王之惡音義好呼報反治直吏反下同國有外援不可瀆也注外援秦也瀆僈也音義僈武諫反王有適嗣不可亂也敗親速讎注不立壬秦將來討是速讎也亂嗣不祥我受其名注受惡名賂吾以天下吾滋不從也注滋益也音義賂音路疏正義曰賂吾以天下使吾為天子吾益不從也楚國何為必殺令尹令尹懼乃立昭王冬十月丙申王起師于滑注起發也音義滑于八反辛丑在郊注郊子朝邑遂次于尸十一月辛酉晉師克鞏注知躒趙鞅之師召伯盈逐王子朝注伯盈本黨子朝晉師克鞏知子朝不成更逐之而逆敬王王子朝及召氏之族毛伯得尹氏固南宫嚚奉周之典籍以奔楚注尹召二族皆奔故稱氏重見尹固名者為後還見殺音義重見上直用反下賢遍反為于偽反下且為同陰忌奔莒以叛注陰忌子朝黨莒周邑召伯逆王于尸及劉子單子盟注召伯新還故盟遂軍圉澤次于隄上注圉澤隄上皆周地音義圉魚吕反隄音低或音啼癸酉王入于成周注成周今洛陽甲戌盟于襄宫注襄王之廟晉師使成公般戍周而還注般晉大夫音義般音班十二月癸未王入于莊宫注莊宫在王城王子朝使告于諸侯曰昔武王克殷成王靖四方康王息民竝建母弟以蕃屏周亦曰吾無專享文武之功注不敢專故建母弟音義蕃方元反亦作藩疏正義曰諸家本皆然服䖍王肅竝注云文王受命武王伐紂故云文武克殷下句云吾無專享文武之功則合文武是也杜無注諸本悉作武王克殷疑誤也今定本亦作武王克殷且為後人之迷敗傾覆而溺入于難則振救之至于夷王王愆于厥身注夷王厲王父也愆惡疾也音義覆芳服反溺乃歴反難乃旦反愆起䖍反疏正義曰諡法安民好靜曰夷諸侯莫不竝走其望以祈王身至于厲王王心戾虐萬民弗忍居王于彘注不忍害王也厲王之末周人流王于彘音義彘直例反疏注正義曰周語云厲王虐國人謗王召公告曰民不堪命也王怒得衞巫使監謗者以告則殺之國莫敢言道路以目三年乃流王于彘劉炫案周本紀民相與叛襲厲王厲王出奔于彘周語又曰彘之亂宣王在召公之宮國人圍之召公知之乃以其子代宣王言代王則國人謂是宣王國語雖不言殺必殺之矣國人相與襲王王旣奔免得王子而殺之若得厲王亦應不舍而杜云不忍害王未必然也當謂不忍者不能忍王之虐也今知不然者下云居王于彘是以禮居處厲王于彘又云諸侯釋位以間王政是憂念王政則不忍者是不忍害王也若其必欲殺王應云王奔于彘劉以為周語云周人欲殺王子召公以子代之則周人欲殺王子何肯不忍害王以為不忍者不堪忍王惡案周語但云求王子不云求殺之是益横周語之文而規杜過非也諸侯釋位以間王政注間猶與也去其位與治王之政事音義間間厠之間注同一音如字與音預下同疏注正義曰周本紀云彘之亂宣王在召公之宮國人圍之召公以其子代太子太子竟得脫周召二公二相行政號曰共和元年是其釋位與治王政之事也宣王有志而後效官注宣王厲王子彘之亂宣王尚少召公虎取而長之效授也音義效戸教反少詩照反下文同長丁丈反下文同疏之正義曰周語云召公以其子代宣王宣王長而立周本紀云共和十四年厲王死于彘太子靖長于召公家二相乃共立之為王是為宣王是召公長之也共和之年官之政事皆決於二相宣王長而有志堪為人主二相乃致其官政於王也效者致與之義故注云效授也至于幽王天不弔周王昏不若用愆厥位注幽王宣王子若順也愆失也攜王奸命諸侯替之而建王嗣用遷郟鄏注攜王幽王少子伯服也王嗣宜臼也幽王后申姜生太子宜臼王幸褒姒生伯服欲立之而殺太子太子奔申申伯與鄫及西戎伐周戰于戲幽王死諸侯廢伯服而立宜臼是為平王東遷郟鄏音義攜戸圭反奸音千下同替他計反郟古洽反鄏音辱鄫才陵反戲許宜反疏注正義曰鄭語稱夏之衰也褒人之神化為二龍以伺於王庭而言曰余褒之二君也夏后卜殺之與去之與止之莫吉卜請其漦而藏之吉乃布幣焉而策告之龍亡而漦在櫝而藏之及歴殷周莫之發也及厲王之末發而觀之漦流於庭不可除也王使婦人不幃而譟之化而為黿以入於王府府之童妾未旣齓而遭之旣笄而孕當宣王而生不夫而育故懼而棄之時有童謠曰檿弧箕箙實亡周國於是宣王聞之乃有夫婦鬻是器者王使執而戮之夫婦方戮逃在路哀其夜號也而取之以逸逃於褒褒人有獄而以入於王王遂置之而嬖是女使至於后而生伯服周語云幽王伐有褒褒人以褒姒女焉褒姒有寵生伯服於是乎與虢石父比逐太子宜臼而立伯服太子出奔申申人繒人召西戎以伐周周於是亡書傳多説其事此其本也詩序云幽王取申女以為后後得褒姒而黜申后周本紀云幽王太子母申侯女也而為后王廢后并去太子用褒姒為后以其子伯服為太子申侯怒乃與繒西戎共殺幽王于驪山之下虜褒姒盡取周賂而去於是諸侯乃卽申侯共立故幽王太子宜臼是為平王東遷徙於洛邑辟戎寇也魯語云幽王滅于戲戲驪山之北水名也皇甫謐云今京兆新豐東二十里戲亭是也劉炫云如國語史記之文幽王止立伯服為太子耳旣虜褒姒必廢其子未立為王而得呼為攜王者或幽王死後褒姒之黨立之為王也汲冡書紀年云平王奔西申而立伯盤以為太子與幽王俱死于戲先是申侯魯侯及許文公立平王於申以本大子故稱天王幽王旣死而虢公翰又立王子余臣於攜周二王竝立二十一年攜王為晉文侯所殺以本非適故稱攜王束晳云案左傳攜王奸命舊説攜王為伯服伯服古文作伯盤非攜王伯服立為王積年諸侯始廢之而立平王其事或當然則是兄弟之能用力於王室也至于惠王天不靖周生頽禍心施于叔帶惠襄辟難越去王都注惠王平王六世孫頽惠王庶叔也莊十九年作亂惠王適鄭襄王惠王子叔帶襄王弟僖二十四年叔帶作難襄王處氾音義頽徒回反施以䜴反難乃旦反注同氾音凡疏注正義曰世本云平王生桓王林林生莊王佗佗生僖王胡齊齊生惠王凉是六代也惠王生襄王鄭鄭生頃王巨巨生匡王班及定王瑜瑜生簡王夷夷生靈王泄心心生景王貴貴生悼王猛及敬王匄則有晉鄭咸黜不端注黜去也晉文殺叔帶鄭厲殺子頽為王室去不端直之人音義去起吕反下同為于偽反疏正義曰諸本咸或作减王肅云咸皆也傅咸為七經詩其傳詩有此句王義之寫亦作咸杜本當然以綏定王家則是兄弟之能率先王之命也在定王六年秦人降妖注定王襄王孫定王六年魯宣八年音義妖本又作訞於驕反説文云衣服謌謠草木之怪謂之妖曰周其有頿王亦克能脩其職諸侯服享二世共職注二世謂靈景音義頿子斯反共音恭王室其有間王位諸侯不圖而受其亂災注間王位謂子朝也今子朝以為王猛受亂災謂楚也今子朝以為晉音義間間側之間注及下以間先王并注同疏正義曰降者自上而下之言當時秦人有此妖語若似自上而下神馮之然故云降妖也然自受其亂災以上皆是妖語至于靈王以下是子朝演説妖言謂子猛當間王位耳服享言諸侯服從獻國之所有至于靈王生而有頿注靈王定王孫王甚神聖無惡於諸侯靈王景王克終其世注景王靈王子今王室亂單旗劉狄剝亂天下壹行不若注單旗穆公也劉狄劉蚠也壹專也音義剝邦角反謂先王何常之有注言先王無常法唯余心所命其誰敢討之帥羣不弔之人注弔至也音義弔如字舊丁歴反注同以行亂于王室侵欲無厭規求無度貫瀆鬼神注貫習也瀆易也音義厭本又作厭於鹽反貫古患反易以䜴反疏正義曰俗本作規服王孫皆注云玩貪也元年傳曰翫歲而愒日杜云翫愒皆貪也則此言貪求無限度本或作規謬也慢棄刑法倍奸齊盟傲狠威儀矯誣先王晉為不道是攝是贊注攝持也贊佐也先王謂景王音義傲五報反狠戸懇反矯居表反疏正義曰倍卽背也違背奸犯齊同之盟也案於時諸侯不有同盟許立子朝單劉未嘗與朝結盟而復背之言單劉倍奸齊盟誣之注正義曰是攝言執持之使不傾危也是贊謂佐助之使得存立也故以攝為持贊為佐也杜以先王為景王則矯誣先王者當謂矯景之命立猛耳知先王非先世之王者以言矯誣是矯詐誣罔據其人有語矯誣之猶今矯稱詔勑若先世之王去此久遠不得有立猛之事子朝何得稱矯誣之乎又𫝊云干景之命故杜以先王謂景王劉炫以為先世之王而規杜氏非也思肆其罔極注肆放也兹不穀震盪播越竄在荆蠻注兹此也此不穀子朝自謂音義盪本又作蕩徒黨反竄七亂反字林七舛反未有攸底注底至也攸所也音義底音㫖若我一二兄弟甥舅奬順天法無助狡猾以從先王之命毋速天罰赦圖不穀注赦其憂而圖其難音義奬將丈反狡古卯反猾又作滑于八反毋音無難乃旦反疏正義曰速召也子朝以單劉為亂從之必有天殃故勸諸侯無召天罰則所願也敢盡布其腹心及先王之經而諸侯實深圖之昔先王之命曰王后無適則擇立長年鈞以德德鈞以卜注此所謂先王之經音義適丁歴反疏正義曰先王先世之王不斥一人蓋自古以來共如此也襄三十一年傳曰公薨立胡女敬歸之子子野子野卒立敬歸之娣齊歸之子稠穆叔曰太子死有母弟則立之無則立長年鈞擇賢義鈞則卜古之道也非適嗣何必娣之子彼言太子死立母弟則此言擇立長謂無母弟者也彼又云子野非適嗣何必娣之子然則適嗣立而死當立娣之子也姪與娣同蓋王后夫人無姪娣之子乃於諸妾之子擇立長耳年鈞擇賢與此年鈞以德皆謂母之貴賤等者公羊傳曰立適以長不以賢立子以貴不以長明母貴則先立也此子朝之母必賤於猛母故專言立長之義不言母之貴賤何休難年鈞以德之言云人君所賢下必從之焉能使王不立愛也鄭𤣥答云周禮小司寇掌外朝之政以致萬民而詢焉其三曰詢立君其位王南鄉三公及州長百姓北面羣臣西面羣吏東面小司寇以叙進而問焉如此則大衆之口非君所能掩是王不得立愛之法也王不立愛公卿無私古之制也疏正義曰三公六卿無得私附王之庶子而妄立之其意言單劉有私情違古制也何休難云大夫不世功而并為公卿通繼嗣左氏為短鄭𤣥云公卿之世有大功德先王命所不絶者何難旣非鄭答亦謬穆后及太子壽早夭卽世注在十五年單劉贊私立少以間先王注間錯先王之制亦唯仲伯叔季圖之注伯仲叔季揔謂諸侯閔馬父聞子朝之辭曰文辭以行禮也子朝干景之命遠晉之大以專其志無禮甚矣文辭何為注傳終王室亂音義遠于萬反齊有彗星注出齊之分野不書魯不見音義彗似歲反又息遂反分扶問反疏注正義曰傳言齊有此星而齊侯使禳之明出齊之分野出於𤣥枵之次也彗即孛也文十四年有星孛入于北斗十七年有星孛于大辰彼皆書此不書者時魯不見或隂不見齊侯使禳之注祭以禳除之音義禳如羊反晏子曰無益也祇取誣焉注誣欺也音義祗音支天道不惂注慆疑也音義惂本又作淊他刀反不貳其命若之何禳之且天之有彗也以除穢也君無穢德又何禳焉若德之穢禳之何損詩曰惟此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國注詩大雅翼翼共也聿惟也回違也言文王德不違天人故四方之國歸往之音義聿戸橘反疏正義曰詩大雅大明之篇也惟此文王愼小其心翼翼然共愼也又能明事上天惟行上天之道思使自得多福其德不有回邪以受四方之國言四方皆歸之君無違德方國將至何患於彗詩曰我無所監夏后及商用亂之故民卒流亡注逸詩也言追監夏商之亡皆以亂故音義夏户雅反注同若德回亂民將流亡祝史之為無能補也公說乃止齊侯與晏子坐于路寢公歎曰美哉室其誰有此乎注景公自知德不能乆有國故歎也音義説音悦下注喜説同晏子曰敢問何謂也公曰吾以為在德對曰如君之言其陳氏乎陳氏雖無大德而有施於民豆區釡鍾之數其取之公也薄注謂以公量收音義施式䜴反下出者皆同區烏侯反量音亮下同其施之民也厚注謂以私量貸音義施如字又始豉反公厚斂焉陳氏厚施焉民歸之矣詩曰雖無德與女式歌且舞注詩小雅義取雖無大德要有喜説之心欲歌舞之式用也音義斂力驗反女音汝疏正義曰詩小雅車舝刺幽王也陳氏之施民歌舞之矣後世若少惰陳氏而不亡則國其國也已音義惰徒卧反本亦作憜同公曰善哉是可若何對曰唯禮可以已之在禮家施不及國疏正義曰大夫稱家家之所施不得施及國人言國人是國君之所有大夫不得妄施遺之以樹己私惠陳氏施及國人是違禮也民不遷農不移工賈不變注守常業音義工賈音古本亦作商賈士不濫注不失職官不滔注滔慢也音義滔吐刀反慢武諫反本亦作漫武半反大夫不收公利注不作福疏正義曰尚書洪範曰惟辟作福惟辟作威臣無有作福作威臣之有作福作威其害于而家凶于而國是言作福作威君之利也大夫不得自收公利自作福也陳氏作福以招國人之心施民作福是收公利也公曰善哉我不能矣吾今而後知禮之可以為國也對曰禮之可以為國也久矣與天地竝注有天地則禮義興疏正義曰天地人民莫知其始但人稟隂陽之氣生於天地之間天地旣形人民必育易序卦曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯是言有天地卽有人民有人民卽有父子君臣父子相愛君臣相敬敬愛為禮之本是與天地竝興君令臣恭父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不貳父慈而敎子孝而箴注箴諫也音義共音恭下同箴之林反兄愛而友弟敬而順夫和而義妻柔而正姑慈而從注從不自專婦聽而婉注婉順也音義婉於阮反禮之善物也公曰善哉寡人今而後聞此禮之上也對曰先王所稟於天地以為其民也是以先王上之注稟受也疏正義曰先古聖王所治理人民者為受陰陽之氣生於天地之中以有上下之禮乃可治其天下又禮與天地同貴是以先王上之經二十有七年春公如齊注自鄆行音義鄆音運公至自齊居于鄆夏四月吳弑其君僚注僚亟戰民罷又伐楚喪故光乘間而動稱國以弑罪在僚音義弑申志反注同僚力彫反亟欺冀反罷音皮疏注正義曰杜數僚之罪以示無道之驗僚以十六年卽位十七年與楚戰于長岸二十三年伐州來敗楚于雞父其年又使大子諸樊入郥二十四年滅巢及鍾離此年又因楚喪而伐之是其亟戰民罷又伐楚喪故光得乘間而動稱國以弑罪在僚也言舉國皆欲弑之非獨光之罪故不書光弑楚殺其大夫郤宛注無極楚之讒人宛所明知而信近之以取敗亡故書名罪宛音義殺死察反郤去逆反宛於阮反又於元反近附近之近疏正義曰文七年宋殺其大夫傳曰不稱名非其罪也死者無罪則不稱其名是稱名者皆為有罪矣此郤宛書名故杜跡其為罪之狀書名所以罪宛也秋晉士鞅宋樂祁犂衞北宫喜曹人邾人滕人會于扈音義祁力兮反又力之反扈音戸冬十月曹伯午卒注無傳未同盟而赴以名音義午音五邾快來奔注無傳快邾命卿也故書音義快苦怪反疏注正義曰邾是小國其臣見於經者甚少唯此與襄二十三年邾畀我來奔書者二人而已釋例曰魯之叔孫父兄再命而書於經晉之司空亞旅一命而經不書推此知諸侯大夫再命以上皆書於經自一命以下大夫及士經皆稱人名氏不得見此皆典策之正文也小國之卿或命而禮儀不備或未加命數故不書之邾畀我之等其奔亡亦多所書唯數人而已知其合制者少杜言數人謂此快與畀我及曹公孫會也是言快是邾之命卿備於禮成為卿故書也快不書氏蓋未賜族無可稱也公如齊注自鄆行公至自齊居于鄆注無傳傳二十七年春公如齊公至自齊處于鄆言在外也注在外邑故書地吳子欲因楚喪而伐之注前年楚平王卒使公子掩餘公子燭庸帥師圍潜注二子皆王僚母弟潜楚邑在廬江六縣西南音義掩於檢反疏注正義曰賈逵云然當是相傳說耳未必有正文也三十年傳此二公子奔楚楚子大封而定其徙子西諫曰吳光新得國若好吾邊疆使柔服焉猶懼其至吾又疆其讎以重怒之無乃不可乎謂此二子為光之讎或當是僚母弟也使延州來季子聘于上國注季子本封延陵後復封州來故曰延州來音義復扶又反疏正義曰服䖍云上國中國也蓋以吳辟在東南地勢卑下中國在其上流故謂中國為上國也下云遂聘于晉則上國之言不包晉矣當總謂宋衞陳鄭之徒為上國耳亦不知其時聘㡬國也經不書未必不至魯檀弓云延陵季子適齊於其反也其長子死葬於嬴博之間鄭𤣥云魯昭二十七年吳公子札聘於上國是也如鄭之言此時或聘齊也注正義曰襄三十一年注云延州來季札邑此又分析之言本封延陵後復封州來故曰延州來成七年呉入州來注云楚邑淮南下蔡縣是也十三年吳滅州來二十三年傳云吳伐州來楚薳越救之則州來未為吳有不可以封札也釋例土地名延州來闕則延陵州來竝闕不知其處杜意當謂吳地别有州來非楚邑也鄭𤣥云季子譲國居延陵因號焉襄二十九年公羊傳曰季子去之延陵終身不入吳國然則季子雖則譲國猶尚仕為吳卿非自竄於彼地吳世家云季札封于延陵故號曰延陵季子杜言封是也封謂賜之為采邑耳遂聘于晉以觀諸侯注觀彊弱楚莠尹然工尹麇帥師救濳注二尹楚官然麇其名音義莠由九反麇九倫反疏注正義曰楚官多以尹為名知二尹是官名耳其莠王之義不可知也服䖍云王尹主宫内之政莠不可解王未必然定本王作工左司馬沈尹戌帥都君子與王馬之屬以濟師注都尹子在都邑之士有復除者王馬之屬王之養馬官屬校人也濟益也音義戌音恤復音福校胡孝反疏注正義曰都謂國都在都君子明是在都邑之士也都邑之士以君子為號故知是有復除者謂優復其身除其徭役賈逵云然今之律令猶名放課役者為復除是漢世以來有此言也此人或别有功勞或曲蒙恩澤平常免其徭役事急乃使之耳周禮校人掌養馬知王馬之屬是王之養馬之官屬也校人職云凡頒良馬而養乘之乘馬一師四圉三乘為皁皁一趣馬三皁為繫繫一馭夫六繫為廏廏一僕夫六廏成校校有左右駑馬三良馬之數麗馬一圉八麗一師八師一趣馬八趣馬一馭夫諸侯六閑養馬之人多矣此唯養馬不給餘役今亦事急而徴使之與吳師遇於窮令尹子常以舟師及沙汭而還注沙水名音義汭如銳反疏正義曰窮土地名窮闕也本或窮下有谷字者為定七年傳敗尹氏于窮谷涉彼而誤耳左尹郤宛工尹壽帥師至于濳吳師不能退注楚師彊故吳不得退去吳公子光曰此時也弗可失也注欲因其師徒在外國不堪役以弑王音義弑申志反下文同告鱄設諸曰上國有言曰不索何獲我王嗣也吾欲求之注光吳王諸樊子也故曰我王嗣音義鱄音專上國賈云上國與中國同服云上古國也索所白反疏正義曰賈逵云上國中國也服䖍云上國謂上古之國賢士所言也此猶如上文聘于上國則賈言是也注正義曰吳世家云吳王壽夢有子四人長曰諸樊次曰餘祭次曰餘昧次曰季札季札賢而壽夢欲立之季札讓不可乃立諸樊諸樊卒有命授弟餘祭欲傳以次必致國於札兄弟皆欲致國令以漸至焉餘祭卒弟餘昧立餘昧卒欲授季札札讓逃去於是吳人曰先王有命必致季子今逃位則餘昧後立今卒其子當代乃立餘昧之子僚為王公子光者王諸樊之子也常以為吾父兄弟四人當傳至季子季子不受光父先立若旣不傳季子光當立遂殺王僚光代立為王是史記以光為諸樊之子僚為夷昧之子也襄二十九年公羊傳曰謁也餘祭也夷昧也與季子同母者四季子弱而才兄弟皆愛之同欲立之以為君弟兄迭為君而致國乎季子故謁也死餘祭也立餘祭也死夷昧也立夷昧也死則國宜之季子者也季子使而亡焉僚者長庶也卽之闔閭曰將從先君之命與則國宜之季子者也如不從先君之命與則我宜立者也僚惡得為君乎於是使專諸刺僚世本云夷昧及僚夷昧生光服䖍云夷昧生光而廢之僚者夷昧之庶兄夷昧卒僚代立故光曰我王嗣也是用公羊為説也杜言光吳王諸樊子用史記為説也班固云司馬遷采世本為史記而今之世本與遷言不同世本多誤不足依憑故杜以史記為正也光言王嗣者言已是世適之長孫也事若克季子雖至不吾廢也注至謂聘還鱄設諸曰王可弑也母老子弱是無若我何注猶言我無若是何欲以老弱託光疏注正義曰古人言有顚倒故杜以為是無若我何猶言我無若是何恐已死之後不能存立欲以老弱託光也彭仲博云當言是無我若何我母無我當如何我字當在若上光曰我爾身也注言我身猶爾身夏四月光伏甲於堀室而享王注掘地為室音義堀本又作窟同苦忽反掘其勿反又其月反王使甲坐於道及其門注坐道邊至光門門階戸席皆王親也夾之以鈹羞者獻體改服於門外注羞進食也獻體解衣音義夾古洽反又古協反下同鈹普皮反説文云劒也疏正義曰言從門至階從階至户從户至席皆是王之親兵也說文云鈹劔也則鈹是劔之别名執羞者坐行而入注坐行膝行執鈹者夾承之注承執羞者及體以相授也注鈹及進羞者體以所食授王疏正義曰鈹之鋒刃及進羞者體也王之左右必更有人受羞以進王故言相授也雖則相授進羞者得至王所光偽足疾入于堀室注恐難作王黨殺已素辟之音義難乃旦反鱄設諸寘劒於魚中以進注全魚炙音義寘之䜴反炙章夜反疏注正義曰吳世家云鱄諸置七首於炙魚之中以進食手匕首刺王僚七首者劒首如七匙手七首謂執七首也抽劒刺王鈹交於匈注交鱄諸匈音義抽勑留反刺七亦反遂弑王闔廬以其子為卿注闔廬光也以鱄諸子為卿音義闔戸臘反季子至曰茍先君無廢祀民人無廢主社稷有奉國家無傾乃吾君也吾誰敢怨哀死事生以待天命非我生亂立者從之先人之道也注吳自諸樊以下兄弟相傳而不立適是亂由先人起也季子自知力不能討光故云爾音義傳直專反適丁歴反復命哭墓注復使命於僚墓音義使所吏反復位而待注復本位待光命吳公子掩餘奔徐公子燭庸奔鍾吾注鍾吾小國楚師聞吳亂而還注言聞吳亂明郤宛不取賂而還郤宛直而和國人說之注以直事君以和接類音義說音悦鄢將師為右領注右領官名音義鄢於晚反又烏戸反與費無極比而惡之注惡郤宛音義費扶味反比毗志反惡烏路反注同令尹子常賄而信讒無極譖郤宛焉謂子常曰子惡欲飲子酒注子惡郤宛音義賄乎罪反譖側鴆反飲於鴆反又謂子惡令尹欲飲酒於子氏子惡曰我賤人也不足以辱令尹令尹將必來辱為惠已甚吾無以酬之若何注酬報獻無極曰令尹好甲兵子出之吾擇焉注擇取以進子常音義好呼報反取五甲五兵曰寘諸門令尹至必觀之而從以酬之注曰無極辭疏正義曰周禮司右云凡國之勇力之士能用五兵者屬焉鄭引司馬法曰弓矢圍殳矛守戈㦸助凡五兵長以衞短短以救長然則弓矢殳矛戈㦸五者皆名為兵此云五兵當是一種器耳不知取何兵也服䖍云兵㦸也及饗日帷諸門左注張帷陳甲兵其中無極謂令尹曰吾幾禍子子惡將為子不利甲在門矣子必無往且此役也注此春救濳之役音義幾音祈吳可以得志子惡取賂焉而還又誤羣帥使退其師曰乘亂不祥吳乘我喪我乘其亂不亦可乎令尹使視郤氏則有甲焉不往召鄢將師而告之注告子惡門有甲兵將害己將師退遂令攻郤氏且爇之注爇燒也音義爇如悦反子惡聞之遂自殺也國人弗爇令曰不爇郤氏與之同罪或取一編菅焉或取一秉秆焉注編菅苫也秉把也秆稾也音義編必然反又必干反菅古顔反秆古但反説文云禾莖也或古旦反苫式占反李廵云編菅茅以覆屋曰苫把必馬反稾古老反疏注正義曰釋草云白華野菅郭璞云菅茅屬釋器云白蓋謂之苫李廵曰編菅以覆屋曰苫郭璞曰白茅苫也是編菅為苫也秉把詩毛傳文也說文云秆禾莖也是為槀也或取一片苫或取一把稾言民不肯燒之國人投之遂弗爇也令尹炮之注炮燔郤宛音義炮陟交反又彭交反燔音煩疏正義曰國人投之謂投菅秆於地故遂不燒也令尹炮之一句是鄢將師令衆之辭服䖍云民弗肯爇也鄢將師稱令尹使女燔炮之燔炮爇皆是燒也盡滅郤氏之族黨殺陽令終與其弟完及佗注令終陽匄子音義佗徒何反匄古害反與晉陳及其子弟注晉陳楚大夫皆郤氏之黨晉陳之族呼於國曰鄢氏費氏自以為王專禍楚國弱寡王室蒙王與令尹以自利也注蒙欺也音義呼火故反令尹盡信之矣國將如何令尹病之注為下殺無極張本秋會于扈令戍周且謀納公也宋衞皆利納公固請之范獻子取貨於季孫謂司城子梁與北宫貞子注子梁宋樂祁也貞子衞北宫喜曰季孫未知其罪而君伐之請囚請亡於是乎不獲君又弗克而自出也夫豈無備而能出君乎季氏之復天救之也注復猶安也休公徒之怒注休息也而啓叔孫氏之心不然豈其伐人而說甲執氷以游叔孫氏懼禍之濫而自同於季氏天之道也音義說他活反疏正義曰言季氏無罪而公濫討之叔孫氏亦懼禍濫及於已而自同心於季氏俱叛公此乃天之常道也魯君守齊三年而無成季氏甚得其民淮夷與之注淮夷魯東夷有十年之備有齊楚之援注公雖在齊言齊不致力有天之贊有民之助有堅守之心有列國之權而弗敢宣也注宣用也音義守手又反事君如在國注書公行告公至是也故鞅以為難二子皆圖國者也而欲納魯君鞅之願也請從二子以圍魯無成死之二子懼皆辭乃辭小國而以難復注以難納白晉君孟懿子陽虎伐鄆注陽虎季氏家臣伐鄆欲奪公疏正義曰伐鄆欲奪公鄆使公不得居也不書者伐公逆事不可以告廟國史無由得書鄆人將戰子家子曰天命不惂久矣注惂疑也言棄君不疑音義惂他刀反使君亡者必此衆也注言君據鄆衆以與魯戰必敗之天旣禍之而自福也不亦難乎猶有鬼神此必敗也疏正義曰言尚有鬼神以助君此戰必當敗也况無鬼神乎嗚呼為無望也夫其死於此乎公使子家子如晉公徒敗于且知注且知近鄆地也音義夫音扶且子餘反近附近之近楚郤宛之難國言未已進胙者莫不謗令尹注進胙國中祭祀也謗詛也音義難乃旦反年末同胙才故反詛側慮反沈尹戌言於子常曰夫左尹與中廐尹莫知其罪而子殺之以興謗讟至于今不已注左尹郤宛也中廐尹陽令終音義廐九又反讟音獨戌也惑之仁者殺人以掩謗猶弗為也今吾子殺人以興謗而弗圖不亦異乎夫無極楚之讒人也民莫不知去朝吳注在十五年音義去起呂反朝如字下朝夕同出蔡侯朱注在二十一年喪太子建殺連尹奢注在二十年音義喪息浪反屏王之耳目使不聰明不然平王之温惠共儉有過成莊無不及焉所以不獲諸侯邇無極也注邇近也音義近附近之近今又殺三不辜以興大謗注三不辜郤氏陽氏晉陳氏幾及子矣子而不圖將焉用之夫鄢將師矯子之命以滅三族國之良也而不愆位注在位無愆過音義幾音祁又音機焉於䖍反矯居表反愆起䖍反疏正義曰令尹召鄢將師告之以郤宛門有甲耳不令攻郤宛也鄢將師退而令衆使攻之是矯令尹命也吳新有君注光新立也疆埸日駭楚國若有大事子其危哉知者除讒以自安也今子愛讒以自危也甚矣其惑也子常曰是瓦之罪敢不良圖九月己未子常殺費無極與鄢將師盡滅其族以說于國謗言乃止音義疆居良反埸音亦知音智冬公如齊齊侯請饗之注設饗禮子家子曰朝夕立於其朝又何饗焉其飲酒也乃飲酒使宰獻而請安注比公於大夫也禮君不敵臣宴大夫使宰為主獻獻爵也請安齊侯請自安不在坐也音義坐才臥反疏正義曰禮為諸侯相為賓主國待之有享食燕三禮享為大鄭𤣥云享謂享大牢以飲賓是為禮之大者子家以公雖居鄆以齊為主此年已再如齊數相見不為賓客故言朝夕立於其朝又何須設饗禮焉其飲酒也勸其用宴禮而飲酒耳注正義曰燕禮者公燕大夫之禮也公雖親在而别有主人鄭𤣥云主人宰夫也宰夫大宰之屬掌賓客之獻飲食者也君於其臣雖為賓不親獻以其尊莫敢伉禮也今齊侯與公飲酒而使宰獻是比公於大夫也獻獻爵者禮有三酌獻也酬也酢也獻酬是主人獻賓唯酢是賓答主人耳禮君不敵臣宴大夫使宰為主卽燕禮是其事也杜以宰獻而請安為齊侯請自安於别室不在坐也劉炫云案燕禮司正洗角觶南面坐奠於中庭升東楹之東受命西階上北面命卿大夫君曰以我安卿大夫皆對曰諾敢不安彼是請賓使自安當如彼使宰請魯侯自安耳主人請安謂主人使司正請安于賓服䖍亦然杜今云齊侯請自安非也今知不然者案鄉飲酒禮賓主相敵主人亦請安于賓然則齊侯與公敵禮安賓乃是常事何須傳載其文以為卑公之義明是齊侯請欲自安不在其坐明慢公之甚劉不審思此理用燕禮請安之義而規杜非也子仲之子曰重為齊侯夫人曰請使重見注子仲魯公子憖也十二年謀逐季氏不能而奔齊今行飲酒禮而欲使重見從宴媟也音義曰重直勇反又直恭反見賢遍反注同憖魚覲反媟息列反子家子乃以君出注辟齊夫人十二月晉籍秦致諸侯之戌于周魯人辭以難注經所以不書戍周籍秦籍談子經二十有八年春王三月葬曹悼公注無傳六月而葬緩公如晉次于乾侯注乾侯在魏郡斥丘縣晉竟内邑音義斥音尺一音昌夜反竟音境傳同夏四月丙戌鄭伯寧卒注無傳未同盟而赴以名六月葬鄭定公注無傳三月而葬速秋七月癸巳滕子寧卒注無傳未同盟而赴以名冬葬滕悼公注無傳傳二十八年春公如晉將如乾侯注齊侯卑公故適晉子家子曰有求於人而卽其安人孰矜之其造於竟注欲使次於竟以待命音義造七報反弗聽使請逆於晉晉人曰天禍魯國君淹恤在外君亦不使一个辱在寡人注一个單使音義个古賀反注同單使所吏反而卽安於甥舅其亦使逆君注言自使齊逆君使公復于竟而後逆之注逆著乾侯也言公不能用子家所以見辱音義著中略反一音直略反晉祁勝與鄔臧通室注二子祁盈家臣也通室易妻音義祁巨支反字林云太原縣上尸反鄔舊音烏戸反又音偃案地名在周者烏戸反隠十一年王取鄔留是也在鄭者音偃成十六年戰于鄢陵是也在楚者於建反又音偃昭十三年王㳂夏將入鄢是也在晉者於庶反字林云袪反郭璞三倉解詁音瘀於庶反闞駰音厭飫之飫重言之太原有鄔縣唯周地者從鄔餘皆從焉字林亦作鄢音同傳云分祁氏之田以為七縣司馬彌牟為鄔大夫卽太原縣也鄔臧宜以邑為氏於爰反舊音誤祁盈將執之注盈祁午之子訪於司馬叔游注叔游司馬叔侯之子叔游曰鄭書有之惡直醜正實蕃有徒注鄭書古書名也言害正直者實多徒衆音義惡如字又烏路反蕃音煩疏正義曰以直為惡以正為醜惡直事醜正道如此人者實蕃多有徒衆言時世慕善者少從惡者多無道立矣子懼不免注言世亂讒勝詩曰民之多辟無自立辟注詩大雅音義多辟本又作僻匹亦反立辟婢亦反疏正義曰詩大雅板之篇刺厲王之詩辟邪也辟法也民之多有邪辟者於此之時無自謂所立者為法是言無道之世法不可為古辟辟字同音異耳姑已若何注姑且也已止也盈曰祁氏私有討國何有焉注言討家臣無與國事音義無與音預遂執之祁勝賂荀躒為之言於晉侯晉侯執祁盈注以其專戮音義為于偽反祁盈之臣曰鈞將皆死注鈞同也疏正義曰鈞同也殺勝與臧盈亦死不殺盈亦死同將皆死不如殺之使盈聞而快意憖使吾君聞勝與臧之死也以為快注憖發語之音音義憖魚覲反乃殺之夏六月晉殺祁盈及楊食我注楊叔向邑食我叔向子伯石也音義食音嗣向許丈反食我祁盈之黨也而助亂故殺之遂滅祁氏羊舌氏初叔向欲娶於申公巫臣氏注夏姬女也音義娶七主反夏戸雅反注同其母欲娶其黨叔向曰吾母多而庶鮮吾懲舅氏矣注言父多妾媵而庶子鮮少嫌母氏性不曠音義鮮息淺反注同懲直升反媵繩證反又時證反疏正義曰言父多妾媵而謂之母多者意言庶弟少據庶弟而發言故謂父妾為母耳其母曰子靈之妻殺三夫注子靈巫臣妻夏姬也三夫陳御叔楚㐮老及巫臣也時巫臣已死疏正義曰三夫皆自命盡而死其死不由夏姬而云殺三夫者婦之配夫欲其偕老其夫數死是妻之薄相故以為夏姬之咎一君注陳靈公一子注夏徴舒而亡一國注陳也兩卿矣注孔寧儀行父疏正義曰一君一子䝉上殺文兩卿亦䝉亡文也以兩卿棄位出奔身不死故為亡也此事皆宣十年十一年傳可無懲乎吾聞之甚美必有甚惡是鄭穆少妃姚子之子子貉之妹也注子貉鄭靈公夷音義少詩照反貉亡白反疏正義曰物忌大盛善不可常暑往寒來晝明夜暗孰能為此者天地天地尚不能常况人乎故甚美必有甚惡也甚美謂夏姬之身甚惡當在其後言其種𦙍當惡故禁其子取之子貉早死無後而天鍾美於是注是夏姬也鍾聚也子貉死在宣四年疏正義曰此因鄭靈早夭而夏姬美推之為此言耳不是兄早死而妹必美也猶今俗語云衰家女未必慧慧家女未必衰將必以是大有敗也疏正義曰夏姬淫慝喪國滅家叔向之母猶謂未得大敗故言將必以是大有敗也十四年傳稱施邢侯者或是夏姫之男比殺楊食我又是夏姬之外孫其種類蓋盡矣昔有仍氏生女黰黑注有仍古諸侯也美髪為黰音義黰之忍反説文作又作鬒云稠髪也疏正義曰黰卽鬒也詩云鬒髪如雲毛傳云鬒黑髪也如雲言美長也説文云鬒稠髪也然則鬒者髪多長而黑美之䫉也此傳黰下有黑則黰文不兼於黑故賈杜皆云美髪為鬒而甚美光可以鑑注髪膚光色可以照人音義鑑古暫反鏡也疏注正義曰傳於黰黑甚美之下乃云光可以鑑知髪與肌膚二者光色皆可以照人名曰元妻注以髪黑故樂正后䕫取之注䕫舜典樂之君長音義䕫求龜反取如字又七住反疏注正義曰尚書舜典云帝曰䕫命汝典樂教胄子是䕫為舜之典樂官也正長也后君也故云典樂之君長王朝公卿故以后言之猶謂為后稷生伯封實有豕心貪惏無饜忿纇無期謂之封豕注纇戾也封大也音義長丁丈反惏力耽反方言云楚人謂貪為惏饜亦作厭於鹽反纇本又作類立對反服作類疏正義曰豕心言其心似豬貪而無耻也方言云晉魏河内之北謂惏為殘楚謂之貪則惏亦貪也賈逵云惏耆食也其人貪耆財利飲食無知饜足忿怒狠戾無有期度時人謂之大豬注正義曰以纇忿共文則類亦似忿故以為戾言狠戾也定四年傳封豕與長蛇相對知封為大也服䖍云忿怒其類以饜其私無期度也有窮后羿滅之夔是以不祀注羿簒夏后者音義羿音藝簒初患反且三代之亡共子之廢皆是物也注夏以妹喜殷以妲己周以褒姒三代所由亡也共子晉申生以驪姬廢音義共音恭本亦作恭妹喜本或作嬉音同國語云桀伐有施有施氏以妹喜女焉韋昭注漢書云嬉姓也妲己丁達反下音紀國語云有蘇氏之女也韋昭云己姓也褒姒音似龍漦所生褒人所養者也毛詩云姒姓也鄭箋云姒字也驪姬本又作麗同力知反獻公伐驪戎所得而以為夫人穀梁傳云滅虢所得莊子云艾封人之子疏注正義曰晉語云史蘇曰昔夏桀伐有施氏有施氏以妹嬉女焉妹嬉有寵於是與伊尹比而亡夏殷辛伐有蘇氏有蘇以妲己女焉妲已有寵於是與膠鬲比而亡殷周幽王伐有褒有褒人以褒姒女焉褒姒有寵生伯服於是與虢石甫比逐太子宜咎而立伯服太子奔申申人繒人召西戎以伐周周於是乎亡是三代所由亡之事也共子之事具見於傳女何以為哉夫有尤物足以移人苟非德義則必有禍注尤異也音義女音汝疏正義曰苟誠也誠不以德義自持則必有禍叔向懼不敢取平公強使取之生伯石伯石始生子容之母走謁諸姑注子容母叔向嫂伯華妻也姑叔向母音義敢取七住反又如字強其丈反嫂素早反兄妻也也依字宜如此長叔姒生男注兄弟之妻相謂姒音義長丁丈反疏注正義曰相謂者㓜者謂長為姒也子容是伯華之子其兄弟伯華最長叔向次之其餘諸弟皆小於叔向也故謂叔向為長叔叔向之妻其年長於子容之母故稱長叔姒也釋親云女子同出謂先生為姒後生為娣孫炎曰同出俱嫁事一夫也公羊傳曰娣者何弟也此其義也是言共事一夫者長為姒㓜為娣自以身之長㓜生娣姒之名其娣姒之名不由夫之長㓜也釋親又云長婦謂稚婦為娣婦娣婦謂長婦為姒婦自以身之長稚相謂也喪服小功章云娣姒婦報傳曰娣姒婦者弟長也傳言弟長者雙訓娣姒言娣是弟姒是長也鄭𤣥云娣姒者兄弟之妻相名也長婦謂穉婦為娣婦娣婦謂長婦為姒婦亦取爾雅之文以解弟長之義是以身之長㓜明矣姑視之及堂聞其聲而還曰是豺狼之聲也狼子野心非是莫喪羊舌氏矣遂弗視音義豺本作犲同仕皆反喪息浪反秋晉韓宣子卒魏獻子為政注獻子魏舒分祁氏之田以為七縣注七縣鄔祁平陵梗陽塗水馬首盂也音義梗古杏反盂音于下文同分羊舌氏之田以為三縣注銅鞮平陽楊氏音義鞮丁兮反司馬彌牟為鄔大夫注太原鄔縣賈辛為祁大夫注大原祁縣司馬烏為平陵大夫魏戊為梗陽大夫注戊魏舒庶子梗陽在太原晉陽縣南音義戊音茂知徐吾為塗水大夫注徐吾知盈孫塗水太原榆次縣音義知音智次資利反又如字韓固為馬首大夫注固韓起孫孟丙為盂大夫注太原盂縣樂霄為銅鞮大夫注上黨銅鞮縣趙朝為平陽大夫注朝趙勝曾孫平陽平陽縣音義朝如字僚安為楊氏大夫注平陽楊氏縣疏正義曰此祁氏與羊舌氏之田舊是私家采邑二族旣滅其田歸公分為十縣為公邑故選置大夫也傳云先祁後羊舌故依下文選置大夫之次上七縣為祁氏之田下三縣為羊舌氏之田且五年傳謂伯石為楊石明楊氏是羊舌之田也家語與史記皆謂羊舌赤為銅鞮伯華是銅鞮亦羊舌邑也平陽之次在銅鞮楊氏之間知亦羊舌邑也謂賈辛司馬烏為有力於王室注二十二年辛烏帥師納敬王疏注正義曰二十二年傳曰晉籍談荀躒賈辛司馬督帥師軍于陰于侯氏于谿泉次于社賈辛軍谿泉司馬督次于社督卽烏也此衆軍竝為伐子朝欲納敬王故舉之謂知徐吾趙朝韓固魏戊餘子之不失職能守業者也注卿之庶子為餘子疏注正義曰宣二年傳云宦卿之適以為公族又官其餘子亦為餘子其庶子為公行注云餘子適子之母弟也庶子妾子也彼適庶分為三等故餘子與庶子為異此無所對故總謂庶子為餘子也此四人之内當有妻生妾生者也知徐吾韓固是卿之孫也趙朝卿之曾孫也而竝稱餘子者言其父祖是餘子就餘子子孫之内選其賢者而用之此四人不失常職能守其父祖之業也其四人者皆受縣而後見於魏子以賢舉也注四人司馬彌牟孟丙樂霄僚安也受縣而後見言采衆而舉不以私也音義見賢遍反注及下見魏子竝同魏子謂成鱄注鱄晉大夫音義鱄音鄟又市轉反又音附吾與戊也縣人其以我為黨乎對曰何也戊之為人也遠不忘君注遠疏遠也近不偪同注不偪同位音義偪彼力反居利思義注不茍得在約思純注無濫心有守心而無淫行雖與之縣不亦可乎音義行下孟反疏正義曰遠不忘君言職雖疏遠而心在公室常忠敬也近不偪同言親近有寵不偪廹同位常謙共也居利思義臨財不茍得思義可取乃取之也在約思純處貧匱而思純固無叨濫之心也有守善之心而無淫邪之行雖則親子而與之縣不亦可乎昔武王克商光有天下注光大也其兄弟之國者十有五人姬姓之國者四十人皆舉親也夫舉無他唯善所在親疏一也疏正義曰由武王克商得封建諸國歸功於武王耳此十五國或有在後封者非武王之時盡得封也尚書康誥之篇周公營洛之年始封康叔于衛洛誥之篇周公致政之年始封伯禽于魯明知武王之時兄弟未盡封也僖二十四年傳稱周公弔二叔之不咸故封建親戚以藩屏周亦以周公為制禮之主故歸功於周公耳非盡周公封也九年傳曰文武成康之封建母弟則康王之世尚有封國宣王方始封鄭非獨武王周公封諸國也僖二十四年傳數文之昭也有十六國此言武王兄弟之國十五人者人異故説異耳非武王封十五周公始加一也以魯衛驗之知周公所加非唯一耳詩曰唯此文王帝度其心莫其德音其德克明克明克類克長克君王此大國克順克比比于文王其德靡悔旣受帝祉施于孫子注詩大雅美文王能王大國受天福施及子孫音義唯此文王詩作唯此王季度待洛反下及注同莫亡白反又如字爾雅云貊莫安定也下及注同長丁丈反下及注同王此于况反注能王同祉音恥施以豉反注同疏正義曰詩大雅皇矣之篇美文王之德也唯此文王之身為天帝所佑天帝開度其心令其有揆度之慧所度前事莫不皆得其中也又使之莫然安靜其德敎之善音施之於人則皆應和之也又能有監昭在下之明又能有勤施無私之善又能敎誨不倦有為人師長之德又能賞善刑惡有為人君上之度旣有人君之德故為人君王此周之大邦也其施教令能使國人徧服而順之旣為國人順服又能擇人之善者比方其善乃從而用之以此文王之德比于上世有能經緯天地文德之王如堯舜之軰其此詩人稱比較于文王之九德其德皆是無為人所悔吝者言文王之德堪比或以為比于前世文德之王義亦通也以此之故旣受天之祉福施及于後世之子孫得使長王天下也此章文次如此者德皆天之所授故先言帝度其心明以下皆蒙帝文也德由心起故先言心能度物也心旣能度然後能施為政敎故次莫其德音言變政敎清静也為君所以施政故先言政教清靜乃論身内之德故次能明能善其明與善還是德音之事施之於人有照臨之明勤施之善耳心能施而無私乃可為人君長故次克長克君長卽師也學記曰能為師然後能為長能為長然後能為君故先長後君也旣言堪為人君卽説為君之事故言王此大邦也旣為大邦之君能使國人順服故次克順也民旣順服又須擇善用之故次克比也比于文王其德無可恨故言受天之福澤流後世以結之此傳言唯此文王毛詩作唯此王季經渉亂離師有異讀後人因而兩存不敢追改今王肅注毛詩及韓詩亦作唯此文王鄭注毛詩作唯此王季故解比于文王言王季之德可以比于文王也劉炫云此作唯此文王不可以文王之德還自比文王故知比于文王可以比于上代文德之王也心能制義曰度注帝度其心疏正義曰心能制斷時事使合於義是為善揆度也言預度未來之事皆得中也德正應和曰莫注莫然清靜音義應應對之應和如字又胡臥反疏正義曰毛詩莫作貃樂記引此詩亦作莫釋詁云貉嗼安定也郭璞云皆靜定毛傳云貃靜也其德旣正為政清靜故有所施為民皆應和易繋辭曰君子居其室出其言善則千里之外應之卽此義也莫是清靜之意故杜云莫然清靜照臨四方曰明勤施無私曰類注施而無私物得其所無失類也音義施式䜴反注及下同疏注正義曰勤行施惠情無偏私物皆得所是無失類也鄭𤣥云類善也無失類者不失善之類也敎誨不倦曰長注敎誨長人之道賞慶刑威曰君注作威作福君之職也疏正義曰人君執賞罰之柄以賞慶人以刑威物是為君之道慈和徧服曰順注唯順故天下徧服音義徧音遍注同疏正義曰人君執慈心以惠下用和善以接物則天下徧服而順從之故為順也易繫辭云天之所助者順故杜云唯順故天下徧服擇善而從之曰比注比方善事使相從也經緯天地曰文注經緯相錯故織成文疏正義曰易稱聖人先天而天弗違後天而奉天時言德能順天隨天所為如經緯相錯織成文章故為文也九德不愆作事無悔注九德上九曰也皆無愆過則動無悔吝音義吝力仞反故襲天祿子孫頼之注襲受也主之舉也近文德矣所及其遠哉注舉魏戊等勤施無私也其四者擇善而從故曰近文德所及遠也音義近附近之近疏注正義曰成鱄引此詩者唯欲取克類克比二事同於文王故云近文德矣文王以有此德故得施于子孫魏子旣近文德亦將所及遠也賈辛將適其縣見於魏子魏子曰辛來昔叔向適鄭鬷蔑惡注惡貌醜音義鬷音子工反欲觀叔向從使之收器者注從隨也隨使人應歛爼豆者疏正義曰下云叔向將餘酒將欲舉爵而飲此則飲酒未畢使者擬收器耳未卽收也而往立於堂下一言而善叔向將飲酒聞之曰必鬷明也注素聞其賢故聞其言而知之疏正義曰舊說云一言者謂設由上徹由下下執其手以上曰昔賈大夫惡注賈國之大夫惡亦醜也音義上時掌反下并注同娶妻而美三年不言不笑御以如臯注為妻御之臯澤音義娶七住反為于僞反疏正義曰詩云鶴鳴于九臯是臯為澤也如往也為妻御車以往澤也射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射女遂不言不笑夫今子少不颺注顔貌不揚顯音義射雉食亦反女音汝下同夫音扶颺音揚子若無言吾幾失子矣言不可以已也如是遂如故知今女有功於王室吾是以舉女注因賈辛有功而後舉之言人不可無能音義幾音祈疏正義曰遂如故舊相知行乎敬之哉毋墮乃力注墮損也音義毋音無墮許規反仲尼聞魏子之舉也以為義曰近不失親注謂舉魏戊遠不失舉注以賢舉可謂義矣又聞其命賈辛也以為忠注先賞王室之功故為忠詩曰永言配命自求多福忠也注詩大雅永長也言能長配天命致多福者唯忠疏正義曰詩大雅文王之篇也言王者長自言我之所為配上天之命而行之是自求衆多之福使歸已此詩之意言忠則然也言魏子能忠必有多福歸之魏子之舉也義其命也忠其長有後於晉國乎冬梗陽人有獄魏戊不能斷以獄上注上魏子音義斷丁亂反其大宗賂以女樂注訟者之大宗魏子將受之魏戊謂閻没女寛注二人魏子之屬大夫音義閻以占反曰主以不賄聞於諸侯若受梗陽人賄莫甚焉吾子必諫皆許諾退朝待於庭注魏子朝君退而待於魏子之庭音義聞如字又音問饋入召之注召二大夫食音義饋求位反比置三歎旣食使坐注更命之令坐音義比必利反令力呈反魏子曰吾聞諸伯叔諺曰唯食忘憂吾子置食之間三歎何也同辭而對曰或賜二小人酒不夕食注或他人也言飢甚饋之始至恐其不足是以歎中置自咎曰豈將軍食之而有不足是以再歎注魏子中軍將故謂之將軍音義咎其九反食之音嗣帥所類反本又作率同疏注正義曰晉使卿為軍將謂之將中軍將上軍此以魏子將中軍故呼為將軍及六國以來遂以將軍為官名蓋其元起于此及饋之畢願以小人之腹為君子之心屬厭而已注屬足也言小人之腹飽猶知厭足君子之心亦宜然音義屬之玉反注同厭於鹽反又於豔反注同獻子辭梗陽人注傳言魏氏所以興也春秋左傳注疏卷五十二春秋左氏傳注疏卷五十二考證公至自齊居于鄆蘇轍曰凡公行反而告廟則書至在外雖不告而書至所以存公也臣召南按此說較疏所引賈逵之說為勝季氏豈時時能以公至告廟乎此實聖人特筆所以示君臣之義也公圍成孫復曰公圍成書者見國内皆叛也尹氏召伯毛伯以王子朝奔楚疏召伯逆王于尸尸地名監本訛作戸今改正傳處于鄆言魯地也臣召南按諸侯於其境内皆可言居書處于鄆所以别于三十年以後之書在乾侯也傳師及齊師戰于炊鼻註非公命則不書趙汸補注曰戰不書為魯諱臣拒君也故齊師圍成特書公以見義傳王次于滑疏襄十八年楚人伐鄭傳稱公子格率銳師侵費滑胥靡臣召南按公子格之上似應有蒍子馮三字疏不應偏舉一人傳王入于成周吳澄曰王城曰東都蓋以鎬京為周之西都相對而言也成周曰下都蓋以王城為洛之上都相對而言也傳晉師使成公般戍周而還監本脫使字今添傳王入于莊宫注莊宫在王城趙汸補注曰汪氏云敬王此時已入王城矣三十二年書城成周蓋入王城而勿居遂定都成周也傳諸侯釋位以間王政疏周召二公二相行政依周本紀應作周公召公二相行政傳攜王奸命疏攜王為晉文公所殺以本非適故稱攜王臣召南按此晉文公乃文侯非重耳也楚殺其大夫郤宛注故書名罪宛臣召南按傳言郤宛之寃則宛無罪傳使延州來季子聘于上國疏則上國之言不包晉矣臣召南按吳謂中原諸國為上國晉亦其一也傳楚莠尹然工尹麇帥師救潛疏旣從定本作工尹則俗本作王尹非也前傳有工尹路卽其明証今改正傳乃辭小國而以難復趙汸補注曰傳見諸侯皆欲納公晉卿貪故勿克傳君亦不使一个辱在寡人趙汸補注曰誚公先齊而後晉非謂不告傳且三代之亡共子之廢皆是物也疏申人繒人召西戎以伐周繒監本訛作鄶今改正傳非是莫喪羊舌氏矣臣召南按祁氏羊舌氏之滅晉之公族盡矣史記晉世家曰六卿欲弱公氏乃遂以法盡滅其族而分其邑為十縣各令其子為大夫晉益弱六卿皆大可謂直筆矣滅祁盈始於知躒知氏子孫卒見滅於趙魏韓孰謂無天道哉傳知徐吾為塗水大夫注徐吾知盈孫孫監本訛作縣今改正傳僚安為楊氏大夫楊監本訛作陳今改正傳謂知徐吾趙朝韓固魏戊餘子之不失職能守業者也臣召南按十縣中而知趙韓魏之餘子居其四則四卿之專晉國始於此矣傳豈將軍食之而有不足疏及六國以來遂以將軍為官名蓋其元起於此臣召南按漢書百官公卿表云將軍秦官是未深考耳春秋左氏傳注疏卷五十二考證
