body:
  text: 春秋左傳注疏卷四起桓公元年盡二年晉杜氏注唐陸徳明音義孔穎達疏桓公音義陸曰桓公名軌惠公之子隱公之弟母仲子史記亦名允諡法辟土服逺曰桓疏正義曰魯世家桓公名允恵公之子隱公之弟仲子所生以桓王九年卽位莊王三年薨世本桓公名軌世族譜亦為軌諡法辟土服逺曰桓諡法非一略舉一耳亦不知本以何行而為此諡他皆放此是嵗嵗在𤣥􅑎經元年春王正月公卽位注嗣子位定於初喪而改元必須踰年者繼父之業成父之志不忍有變於中年也諸侯每首嵗必有禮於廟諸遭喪繼位者因此而改元正位百官以序故國史亦書卽位之事於策桓公簒立而用常禮欲自同於遭喪繼位者釋例論之備矣音義簒立初患反疏注正義曰顧命曰乙丑成王崩使齊侯吕伋以二干戈逆子釗于南門之外延入翼室恤宅宗孔安國云明室路寢延之使居憂為天下宗主天子初崩嗣子定位則諸侯亦當然也釋例曰尚書顧命天子在殯之遺制也推此亦足以凖諸侯之禮矣是知嗣子位定於初喪孝子緣生以事死嵗之首日必朝事宗廟因即改元釋例曰襄二十九年經書春王正月公在楚傳曰釋不朝正於廟也然則諸侯每嵗首必有禮於廟今遭喪繼立者每新年正月亦改元正位百官以序故國史因書即位於䇿以表之此新君之常禮也桓之於隱本無君臣之義計隱公之死桓公既合改元不假踰年方行即位猶如晉厲被弑悼公即位改元今桓雖實簒立歸罪寪氏詐言不與賊謀而用常禮自同於遭喪繼位者亦既實即其位國史依實書之仲尼因而不改反明公實簒立而自同於常亦足見桓之簒也三月公㑹鄭伯于垂鄭伯以璧假許田音義假舉下反夏四月丁未公及鄭伯盟于越注公以簒立而修好於鄭鄭因而迎之成禮於垂終易二田然後結盟垂大丘衞地也越近垂地名鄭求祀周公魯聽受祊田令鄭廢泰山之祀知其非禮故以璧假為文時之所隱音義好呼報反傳同近附近之近祊百庚反令力呈反疏注正義曰成㑹鄭於垂既易許田然後盟以結之故先㑹次假田然後書盟也言迎之成禮於垂者垂是衞地沈以為公迎鄭伯於垂知時史之所隱諱者傳不言書曰知非仲尼新意也秋大水注書災也傳例曰凡平原出水為大水冬十月𫝊兀年春公即位修好于鄭鄭人請復祀周公卒易祊田注事在隱八年音義復扶又反公許之三月鄭伯以璧假許田為周公祊故也注魯不宜聽鄭祀周公又不宜易取祊田犯二不宜以動故隱其實不言祊稱璧假言若進璧以假田非久易也音義為于偽反疏注正義曰祊薄于許加之以璧易取許田非假借之也今經乃以璧假為文故傳言為周公祊故解經璧假之言也注又解傳之意周公非鄭之祖魯不宜聽鄭祀周公天子賜魯以許田義當傳之後世不宜易取祊田於此一事犯二不宜以動故史官諱其實不言以祊易許乃稱以璧假田言若進璧於魯以權借許田非久易然所以諱國惡也不言以祊假而言以璧假者此璧實入於魯但諸侯相交有執圭璧致信命之理今言以璧假似若進璧以致辭然故璧猶可言祊則不可言也何則祊許俱地以地借地易理已章非復得為隱諱故也夏四月丁未公及鄭伯盟于越結祊成也注結成易二田之事也傳以經不書祊故獨見祊音義見賢遍反盟曰渝盟無享國注渝變也音義渝羊朱反享許丈反疏注正義曰釋言文也傳載其盟辭者以易田惡事而誓不變改見其終無悔心所以深惡魯也此時許田巳入於鄭而詩頌僖公云居常與許復周公之宇蓋僖公之時復得之也齊人取讙及闡及其歸也經復書之自此以後不書鄭人來歸許田者此經書假言若暫以借鄭地仍魯物不得書鄭人歸之秋大水凡平原出水為大水注廣平曰原疏正義曰洪範云水曰潤下言雨自上而下浸潤於土陂鄣下地可使水潦停焉平原髙地則不宜有也凡平原出水則為大水平原出水言水不入於土而出於地上非湧泉出也注正義曰釋地文也李廵曰謂土地寛博而平正名之曰原冬鄭伯拜盟注鄭伯若自來則經不書若遣使則當言鄭人不得稱鄭伯疑謬誤音義使所吏反疏注正義曰六年傳云魯為其班後鄭注云魯親班齊饋則亦使大夫戍齊矣經不書蓋史闕文然則經所不書自有闕文之類注既疑此事不云闕文而云謬誤者師出征伐貴賤皆書經所不書必是文闕若其事重使人雖賤亦書鄭人来渝平齊人歸讙及闡是也今以拜盟事輕若其使賤則例不合書故杜云若遣使來傳當云鄭人疑傳繆誤知非實是鄭伯為不見公不書者以魯鄭相親易田結好鄭伯既拜盟而來魯君無容不見故知非實是鄭伯止是鄭人而已宋華父督見孔父之妻于路注華父督宋戴公孫也孔父嘉孔子六世祖音義華戸化反大夫氏也後皆同督音篤疏注正義曰案世本云華父督宋戴公之孫好父説之子孔父嘉生木金父木金父生祁父其子奔魯為防叔防叔生伯夏伯夏生叔梁紇叔梁紇生仲尼是孔父嘉為孔子六世祖目逆而送之曰美而豔注色美曰豔音義豔以瞻反美色也疏正義曰未至則目逆既過則目送俱是目也故以目冠之美者言其形貌美豔者言其顔色好故曰美而豔為二事之辭色美曰豔詩毛傳文也經二年春王正月戊申宋督弑其君與夷及其大夫孔父注稱督以弑罪在督也孔父稱名者内不能治其閨門外取怨於民身死而禍及其君音義閨音圭疏正義曰凡言其者是其身之所有君是臣之君故臣弑君則云弑其君臣是君之臣故君殺臣則云殺其大夫子亦君之子故云殺其世子稱國稱人以殺亦言其者人與國竝舉一國之辭君與大夫皆是國人所有故亦言其也若兩臣相殺死者非殺者所有則兩書名氏不得言其則王札子殺召伯毛伯是也與夷是督之君言弑其君則可孔父非督之大夫而言及其大夫者與君俱死據君為文言宋督弑其君據督為文而上弑其君也言及其大夫孔父據君為文而下及其大夫言及與夷之大夫非督之大夫也仇牧荀息其意亦同注正義曰宣四年傳例曰弑君稱君君無道也稱臣臣之罪也故知稱督以弑罪在督也諸言父者雖或是字而春秋之世有齊侯祿父蔡侯考父季孫行父衞孫林父乃皆是名故杜以孔父為名文七年宋人殺其大夫傳曰不稱名衆也且言非其罪也不名者非其罪則知稱名者皆有罪矣杜既以孔父為名因論為罪之狀内不能治其閨門使妻行於路令華督見之外取怨於民使君數攻戰而國人恨之身死而禍及其君故書名以罪孔父也釋例曰經書宋督弑其君與夷及其大夫孔父仲尼丘明唯以先後見義無善孔父之文孔父為國政則取怨於民治其家則無閨闈之教身先見殺禍遂及君既無所善仇牧不警而遇賊又死無忠事晋之荀息期欲復言本無大節先儒皆随加善例又為不安經書臣蒙君弑者有三直是弑死相及即實為文仲尼以督為有無君之心改書一事而巳無他例也是以孔父行無可善書名罪之也案公羊穀梁及先儒皆以善孔父而書字知不然者案宋人殺其大夫司馬傳稱握節以死故書其官又宋人殺其大夫傳以為無罪不書名今孔父之死傳無善事故杜氏之意以父為名言若齊侯禄父宋公兹父之等父既是名孔則為氏猶仇牧荀息被殺皆書名氏蓋孔父先世以孔為氏故傳云督攻孔氏也婦人之出禮必擁蔽其面孔父妻行令人見其色美是不能治其閨門又殤公之好攻戰孔父湏伏死而爭乃從君之非是取怨於百姓事由孔父遂禍及其君似公子比刼立加弑君之罪杜君積累其惡故以書名責之劉君不逹此㫖妄為規過非也滕子來朝注無傳隠十一年稱侯今稱子者盖時王所黜疏注正義曰杞行夷禮傳毎發之此不發傳非為夷禮自是以下滕常稱子故疑為時王所黜於時周桓王也東周雖則微弱猶為天下宗主尚得命邾為諸侯明能黜滕為子爵三月公㑹齊侯陳侯鄭伯于稷以成宋亂注成平也宋有弑君之亂故為㑹欲以平之稷宋地疏注正義曰成平釋詁文也宣十五年傳晉侯治兵于稷治兵欲以禦秦明其不出晋竟故以稷為河東之稷山此欲平宋故以稷為宋地夏四月取郜大鼎于宋戊申納于大廟注宋以鼎賂公大廟周公廟也始欲平宋之亂終於受賂故備書之戊申五月十日音義郜古報反大音泰傳大廟倣此疏注正義曰禮記明堂位稱魯君季夏六月以禘禮祀周公於大廟文十三年公羊傳曰周公稱大廟故知大廟周公廟也始欲平宋亂故㑹于稷終舍宋罪而受其賂故得失備書之始書成宋亂終書取郜鼎是其備書之也鄭衆服䖍皆以成宋亂為成就宋亂故以此言正之長厯此年四月庚午朔其月無戊申五月己亥朔十日得戊申是有日而無月也秋七月杞侯来朝注公即位而來朝蔡侯鄭伯㑹于鄧注潁川召陵縣西南有鄧城音義召上照反疏注正義曰賈服以鄧為國言蔡鄭㑹于鄧之國都釋例以此鄧川鄧城為蔡地其鄧國則義陽鄧縣是也以鄧是小國去蔡路逺蔡鄭不宜逺㑹其都且蔡鄭懼楚始為此㑹何當反求近楚小國而與之結援故知非鄧國也九月入杞注不稱主帥微者也弗地曰入音義帥所類反或作師公及戎盟于唐冬公至自唐注傳例曰告于廟也特相㑹故致地也凡公行還不書至者皆不告廟也隠不書至謙不敢自同於正君書勞策勲疏注正義曰釋例曰凡盟有一百五公行一百七十六書至者八十二其不書至者九十四皆不告廟也隠公之不告謙也餘公之不告慢於禮也是言不告不書之意也知隠不書至為謙者以隠是讓位賢君必不慢於宗廟假使惰慢宗廟止可時或失禮不應終隐之身竟不書至知其以謙之故勞非所憚勲無可紀不可自同於正君書勞䇿勲故不告至也傳二年春宋督攻孔氏殺孔父而取其妻公怒督懼遂弑殤公君子以督為有無君之心而後動於惡注雖有君若無也故先書弑其君㑹于稷以成宋亂為賂故立華氏也注經稱平宋亂者蓋以魯君受賂立華氏貪縱之甚惡其指斥故逺言始與齊陳鄭為㑹之本意也傳言為賂故立華氏明經本書平宋亂為公諱諱在受賂立華氏也猶璧假許田為周公祊故所謂婉而成章督未死而賜族督之妄也音義為賂于偽反注除為㑹一字竝同惡其烏路反婉於阮反疏正義曰諸傳言君子者或當時賢者或指斥仲尼或語出丘明之意而託諸賢者期於明理而已不復曲為義例唯河陽之狩趙盾之弑洩冶之罪危疑之理湏取聖證故特稱仲尼以明之其餘皆託諸君子君子者其可以居上位子下民有徳之美稱也此言先書弑君則是仲尼新意不言仲尼而言君子者欲見君子之人意皆然非獨仲尼也督有無君之心而先書弑君者君人執柄臣人畏威每事禀命而行不敢妄相殺害督乃専殺孔父而取其妻非有忌君之心全無敬上之意不臣之迹在心已久非為公怒始興毒害若先書孔父後書弑君便是既殺孔父始有惡心今先書弑君後書孔父見其先有輕君之心以著不義之極故也注正義曰傳言為賂故立華氏解經以成宋亂之言也成宋亂者欲殺賊臣定宋國今乃受貨賂立華氏非是平亂之狀而傳以解經故注申通其義以成宋亂者是四國為㑹之本謀及其既㑹違背前謀非徒不討宋督乃更為立華氏宋亂實不平而經書平宋亂者蓋以魯君受賂立華氏貪貨縱賊為惡之甚時史惡其指斥不可言四國為㑹縱賊取財故逺言為㑹之木意言㑹于稷欲以平宋亂也傳以經文不實解其諱之所由所諱者諱其受賂立華氏故也為周公祊故文與此同故以類相明然案為周公祊故故字在下而向上結之此亦應云為賂立華氏故也何以此文故字乃在立華氏之上為賂之下者以周公祊故其文約少得以故字在下總而結之此則文句長緩不可總而結之先舉為賂惡重所以云為賂故也然後始言立華氏備詳其事今定本有故字檢晉宋古本徃徃無故字者妄也襄三十年諸侯之卿㑹于澶淵謀歸宋財既而無歸書曰宋災故尤之也此書成宋亂知非譏受賂尤四國者澶淵之㑹貶卿稱人是尤之文此則具序君爵辭無貶責非尤過之狀知為諱故而本其㑹意從其平文也文十七年晉㑹諸侯于扈欲以平宋之亂既而不討受賂而還其事與此正同而經書諸侯㑹于扈傳曰書曰諸侯無功也此亦無功不言諸侯㑹于稷而歴序諸國者扈之㑹晉為伯會諸侯以討亂乃受賂而還猶如僖十四年諸侯城緣陵齊桓為伯城而不終故貶稱諸侯此則齊陳鄭自相平亂故不加貶文知不為公諱不貶諸侯者以狄泉之諱唯没公文其餘皆貶此若必諱唯須没公而已何湏不貶諸國宣四年公及齊侯平莒及郯成平同義而彼言平此言成者史官非一置辭不同猶暨之與及更無他義所謂史有文質不必改也文十三年傳稱衞侯鄭伯請平于晉公皆成之是知成平義無異也宋殤公立十年十一戰注殤公以隠四年立十一戰皆在隠公世疏注正義曰服䖍云與夷隠四年即位一戰伐鄭圍其東門再戰取其禾皆在隠四年三戰取邾田四戰邾鄭入其郛五戰伐鄭圍長葛皆在隠五年六戰鄭伯以王命伐宋在隠九年七戰公敗宋師于菅八戰宋衛入鄭九戰宋人蔡人衞人伐戴十戰戊寅鄭伯入宋皆在隠十年十一戰鄭伯以虢師大敗宋師在隠十一年是皆在隠公世也民不堪命孔父嘉為司馬督為大宰故因民之不堪命先宣言曰司馬則然注言公之數戰則司馬使爾嘉孔父字音義大音泰數音朔巳殺孔父而弑殤公召莊公于鄭而立之以親鄭注莊公公子馮也隠三年出居于鄭馮入宋不書不告也音義馮皮氷反下同以郜大鼎賂公注郜國所造器也故繋名於郜濟隂城武縣東南有北郜城疏注正義曰榖梁傳曰郜鼎者郜之所為也孔子曰名從主人故曰郜大鼎也公羊傳曰器從名地從主人其意言器從本主之名地從後屬主人是知郜國所造故繋名於郜劉君難杜注郜國濟隂城武縣東南有北郜城郜宋邑濟隂城武縣東南有郜城俱是城武縣東南相去不逺何得所為郜國所為宋邑劉以南郜北郜竝宋邑别有郜國以規杜氏知不然者以許田許國相去非遥則郜國郜邑何妨相近且杜言有者皆是疑辭何得執杜之疑以規其過如劉所解郜國竟在何處齊陳鄭皆有賂故遂相宋公音義相息亮反下注傳相同夏四月取郜大鼎于宋戊申納于大廟非禮也臧哀伯諫曰注臧哀伯魯大夫僖伯之子君人者將昭徳塞違以臨照百官猶懼或失之故昭令徳以示子孫是以清廟茅屋注以茅飾屋著儉也清廟肅然清净之稱也音義著張慮反後不音者同稱尺證反疏正義曰君人謂與人為君也昭徳謂昭明善徳使徳益章聞也塞違謂閉塞違邪使違命止息也徳者得也謂内得於心外得於物在心為徳施之為行徳是行之未發者也而徳在於心不可聞見故聖王設法以外物表之儉與度數文物聲明皆是昭徳之事故傳每事皆言昭是昭其徳也自不敢易紀律以上言昭徳耳都無塞違之事自滅徳立違以下言違徳之事徳之與違義不竝立徳明則違絶故昭徳之下言塞違違立則徳㓕故立違之上言滅徳立違謂建立違命之臣知塞違謂遏絶違命之人也國家之敗謂邦國喪亡知猶懼或失之謂恐失國家此諫辭有首尾故理互相見注正義曰冬官考工記有葺屋瓦屋則屋之覆盖或草或瓦傳言清廟茅屋其屋必用茅也但用茅覆屋更無他文明堂位曰山節藻税複廟重檐刮楹達鄉反坫出尊崇坫康圭疏屏天子之廟飾也其飾備物盡文不應以茅為覆得有茅者杜云以茅飾屋著儉也以茅飾之而已非謂多用其茅總為覆盖猶童子垂髦及蔽膝之屬示其存古耳白虎通曰王者所以立宗廟何緣生以事死敬亡若存故以宗廟而事之此孝子之心也宗者尊也廟者貌也象先祖之尊貌然則象尊之貌享祭之所嚴其舍宇簡其出入其處肅然清静故稱清廟清廟者宗廟之大稱詩頌清廟者祀文王之歌故鄭𤣥以文王解之言天徳清明文王象焉故稱清廟此則廣指諸廟非獨文王故以清净解之大路越席注大路玉路祀天車也越席結草音義越戸括反祀天車本或無天字者非疏注正義曰路訓大也君之所在以大為號門曰路門寢曰路寢車曰路車故人君之車通以路為名也周禮巾車掌王之五路鄭𤣥云王在焉曰路彼解天子之車故云王在耳其實諸侯之車亦稱為路路之最大者巾車五路玉路為大故杜以玉路為大路巾車云玉路錫樊纓十有再就建大常十有二斿以祀故云祀天車也越席結蒲為席置於玉路之中以茵藉示其儉也經傳言大路者多矣注者皆觀文為説尚書顧命陳列器物有大輅綴輅先輅次輅孔安國以為玉金象以飾車以其徧陳諸路故以周禮次之僖二十八年王賜晉文公以大輅之服定四年祝佗言先王分魯衛晉以大路注皆以為金路以周禮金路同姓以封玉路不可以賜故知皆金路也襄十九年王賜鄭子蟜以大路二十四年王賜叔孫豹以大路二注皆云大路天子所賜車之總名以周禮孤乗夏篆卿乗夏縵釋例以所賜穆叔子蟜當是革木二路故杜以大路為賜車之總名服䖍云大路木路杜不然者以大路越席猶如清廟茅屋清廟之華以茅飾屋示儉玉路之美以越席示質若大路是木則與越席各為一物豈清廟與茅屋又為别乎故杜以犬路為玉路於玉路而施越席是方可以示儉故沈氏云玉路雖文亦以越席示儉而劉君横生異義以大路為木路妄規杜氏非也大羮不致注大羮肉汁不致五味疏注正義曰郊特牲云大羮不和貴其質也儀禮士虞特牲皆設大羮湆鄭𤣥云大羮湆煑肉汁也不和貴其質設之所以敬尸也是祭祀之禮有大羮也大羮者大古初食肉者煑之而已未有五味之齊祭神設之所以敬而不忘本也記言大羮不和故知不致者不致五味五味即洪範所云酸苦辛鹹甘也粢食不鑿注黍稷曰粢不精鑿音義粢音咨稷也食音嗣餅也鑿子洛反精米也字林作子沃反云糲米一斛舂為八斗疏注正義曰釋草云粢稷舍人曰粢一名稷稷粟也郭璞云今江東人呼粟為粢士虞記云明齊鄭云今文曰明粢粢稷也然則粢是稷之别名但稷是諸穀之長粢亦諸穀總名周禮小宗伯辨六粱之名物鄭𤣥云六粢謂黍稷稻粢麥苽是諸糓皆名粢也祭祀用穀黍稷為多故云黍稷曰粢飯謂之食傳云粢食不鑿謂以黍稷為飯不使細也九章算術粟率五十鑿二十四言粟五斗為米二斗四升是則米之精鑿昭其儉也注此四者皆示儉衮冕黻珽注衮畫衣也冕冠也黻韋韠以蔽膝也珽玉笏也若今吏之持簿音義衮古本反黻音弗下同珽他頂反韠音必笏音忽持簿歩古反徐廣云持簿手版也疏注正義曰畫衣謂畫龍於衣祭服𤣥衣纁裳詩稱𤣥衮是𤣥衣而畫以衮龍衮之言卷也謂龍首卷然玉藻曰龍卷以祭知謂龍首卷也尚書益稷云帝曰予欲觀古人之象日月星辰山龍華蟲作㑹宗彛藻火粉米黼黻絺繡言觀古人之象謂觀衣服所象日月以至黼黻十二物皆衣服之所有也華蟲以上言作㑹宗彛以下言絺繡則二者雖在於服而施之不同冬官考工記畫繢與繡布采異次知在衣則畫之在裳則刺之故鄭𤣥禮注及詩箋皆云衣繢而裳繡以此知衮是畫文故云衮畫衣也衮衣以下章數鄭𤣥注司服云有虞氏十二章自日月而下至周而日月星長畫於旌旗又登龍於山登火於宗彛冕服自九章而下如鄭此言九章者龍一山二華蟲三火四宗彜五在衣藻六粉米七黼八黻九在裳鷩冕者去龍去山自華蟲而下七章華蟲一火二宗彛三在衣餘四章在裳毳冕者去華蟲去火五章自宗彛而下宗彞一藻二粉米三在衣餘二章在裳希冕者去宗彞去藻三章自粉米而下粉米一在衣餘二章在裳𤣥冕者其衣無畫裳上刺黻而已杜昭二十五年數九文不取宗彛則與鄭異也冠者首服之大名冕者冠中之别號故云冕冠也世本云黄帝作冕宋仲子云冕冠之有旒者禮文殘缺形制難詳周禮弁師掌王之五冕皆𤣥冕朱裏止言𤣥朱而已不言所用之物論語云麻冕禮也盖以木為幹而用布衣之上𤣥下朱取天地之色其長短廣狹則經傳無文阮諶三禮圖漢禮器制度云冕制皆長尺六寸廣八寸天子以下皆同沈引董巴輿服志云廣七寸長尺二寸應劭漢官儀云廣七寸長八寸沈又云廣八寸長尺六寸者天子之冕廣七寸長尺二寸者諸侯之冕廣七寸長八寸者大夫之冕但古禮殘缺未知孰是故備載焉司馬彪漢書輿服志云孝明帝永平二年初詔有司采周官禮記尚書之文制冕皆前圓後方朱裏𤣥上前垂四寸後垂三寸天子白玉珠十二旒三公諸侯青玉珠七旒卿大夫黒玉珠五旒皆有前無後此則漢法耳古禮鄭𤣥注弁師云天子衮冕以五采繅前後各十二斿斿有五采玉石有二鷩冕前後九斿毳冕前後七斿希冕前後五斿𤣥冕前後三斿斿皆五采玉十有二上公衮冕三采繅前後九斿斿有三采玉几侯伯鷩冕三采繅前後七斿斿有三采玉七子男毳冕三采繅前後五斿斿有二采玉五孤卿以下皆二采繅二采玉其斿及玉各依命數耳謂之冕者冕俛也以其後髙前下有俛俯之形故因名焉盖以在上位者失於驕矜欲令位彌髙而志彌下故制此服令貴者下賤也黻韠制同而名異鄭𤣥詩箋云芾大古蔽膝之象也冕服謂之芾其他服謂之韠以韋為之故云黻韋韠也詩云赤芾在股則芾是當股之衣故云以蔽膝也鄭𤣥易緯乾鑿度注云古者田漁而食因衣其皮先知蔽前後知蔽後後王易之以布帛而獨存其蔽前者重古道而不忘本也是説黻韠之元由也易下繋辭曰包犠氏之王天下也作為網罟以佃以漁則田漁而食伏犠時也禮運説上古之時云昔者先王食鳥獸之肉衣其羽皮是田漁而食因衣其皮也又曰後聖有作治其麻絲以為布帛易繋辭曰黄帝堯舜垂衣裳而天下治然則易之布帛自黄帝始也垂衣裳服布帛初必始於黄帝其存蔽膝之象未知始自何代也禮記明堂位云有虞氏服韍言舜始作韍也尊祭服而異其名耳未必此時始存象也知冕服謂之黻者易云朱紱方來利用享祀知他服謂之韠者案士冠禮士服皮弁𤣥端皆服韠是他服謂之韠以冕為主非冕謂之他此欲以兩服相形故謂黻為韋韠黻之與韠祭服他服之異名耳其體制則同玉藻説𤣥端服之韠云韠君朱大夫素士爵韋發首言韠句末言韋明皆以韋為之凡韠皆象裳色言君朱大夫素則尊卑之韠直色别而巳無他飾也其黻則有文飾焉明堂位曰有虞氏服黻夏后氏山殷火周龍章鄭𤣥云韍冕服之韠也舜始作之以尊祭服禹湯至周増以畫文後王彌飾也山取其仁可仰也火取其明也龍取其變化也天子備焉諸侯火而下卿大夫山士韎韋而已是説韍之飾也玉藻曰韠下廣二尺上廣一尺長三尺其頸五寸肩革帶傳二寸鄭𤣥云頸五寸亦謂廣也頸中央肩兩角皆上接革帶以繋之肩與革帶廣同是説韠之制也記傳更無黻制皆是韠義明其制與韠同經傳作黻或作韍或作芾音義同也徐廣車服儀制曰古者韍如今蔽膝戰國連兵以韍非兵飾去之漢明帝復制韍天子赤皮蔽膝蔽膝古韍也然則漢世蔽膝猶用赤皮魏晉以來用絳紗為之是其古今異也以其用絲故字或有為紱者天子之笏以玉為之故云珽玉笏也管子云大子執玉笏以朝日是有玉笏之文也禮之有笏者玉藻云凡有指畫於君前用笏造受命於君前則書於笏釋名曰笏忽也君有命則書其上備忽忘也或曰簿可以簿疏物也徐廣車服儀制曰古者貴賤皆執笏即今手板也然則笏與簿手板之異名耳蜀志稱秦密見太守以簿擊頰則漢魏以來皆執手板故云若今吏之持簿玉藻云笏畢用也因飾焉言貴賤盡皆用笏因飾以示尊卑其上文云笏天子以球玉諸侯以象大夫以魚湏文竹士竹本象可也鄭𤣥云球羙玉也文猶飾也大夫士飾竹以為笏不敢與君竝用純物是其尊卑異也大夫與士笏俱用竹大夫以魚湏飾之士以象骨為飾不敢純用一物所以下人君也用物既殊體制亦異玉藻云天子搢珽方正於天下也諸侯荼前詘後直讓於天子也大夫前詘後詘無所不讓也鄭𤣥以為謂之珽珽之言珽然無所屈前後皆方正也荼謂舒懦所畏在前也圜殺其首屈於天子也大夫上有天子下有已君故首末皆圜前後皆讓是其形制異也其長則諸侯以下與天子又異珽一名大圭周禮典瑞云王晋大圭以朝日是也冬官考工記大圭長三尺天子服之是天子之珽長三尺也玉藻云笏度二尺有六寸短於天子盖諸侯以下度分皆然也帶裳幅舄注帶革帶也衣下曰裳幅若今行縢也舄複履音義幅音逼舄音昔縢徒登反複音福疏注正義曰下有鞶是紳帶知此帶為革帶玉藻革帶博二寸鄭云凡佩繋於革帶白虎通云男子有鞶革者示有金革之事然則示有革事故用革為帶帶為佩也昭十二年傳云裳下之飾也經傳通例皆上衣下裳故云衣下曰裳幅與行縢今古之異名故云若今行縢詩云邪幅在下毛傳曰幅偪也所以自偪束也鄭箋云邪幅如今行縢也偪束其脛自足至縢縢訓緘也然則行而緘足故名行縢邪纒束之故名邪幅舄者屨之小别鄭𤣥周禮屨人注云複下曰舄禪下曰屨然則舄之與屨下有禪複為異屨是總名故云舄複履謂其複下也鄭𤣥又云天子諸侯吉事皆舄赤舄者冕服之舄白舄者皮弁之舄黒舄者𤣥端之舄其士皆著屨纁屨者爵弁之屨白屨者皮弁之屨黒屨者𤣥端之屨其卿大夫服冕者亦赤舄餘服則屨其王后禕衣𤣥舄褕狄青舄闕狄赤舄鞠衣黄屨展衣白屨緑衣黒屨其諸侯夫人及卿大夫之妻合衣狄者皆舄其餘皆屨其舄之飾用對方之色赤舄黒飾是也屨之飾用比方白屨黒飾是也衡紞紘綖注衡維持冠者紞冠之垂者紘纓從下而上者綖冠上覆音義紞多敢反字林丁坎反紘獲耕反綖音延字林弋善反上時掌反下上下同疏注正義曰此四物者皆冠之飾也周禮追師掌王后之首服追衡笄鄭司農云衡維持冠者鄭𤣥云祭服有衡垂于副之兩旁當耳其下以紞縣瑱彼婦人首服有衡則男子首服亦然冠由此以得支立故云維持冠者追者治玉之名王后之衡以玉為之故追師掌焉弁師掌王之五冕弁及冕皆用玉笄則天子之衡亦用玉其諸侯以下衡之所用則未聞紞者縣瑱之繩垂於冠之兩旁故云冠之垂者魯語敬姜曰王后親織𤣥紞則紞必織線為之若今之絛繩鄭𤣥詩箋云充耳謂所以縣瑱者或名為紞織之人君五色臣則三色是也絛必雜色而魯語獨言𤣥者以𤣥是天色故特言之非謂純𤣥色也紘纓皆以組為之所以結冠於人首也纓用兩組屬之於兩旁結之於頷下垂其餘也紘用一組從下屈而上屬之於兩旁垂其餘也紘纓同類以之相形故云紘纓從下而上者弁師掌王之五冕皆玉笄朱紘祭義稱諸侯冕而青紘士冠禮稱緇布冠青組纓皮弁笄爵弁笄緇組紘鄭𤣥云有笄者屈組為紘垂為飾無笄者纓而結其絛以其有笄者用紘力少故從下而上屬之無笄者用纓力多故從上而下結之冕弁皆有笄故用紘緇布冠無笄故用纓也魯語稱公侯夫人織紘綖知紘亦織而為之士冠禮言組纓組紘知天子諸侯之紘亦用組也綖冠上覆者冕以朱為幹以𤣥布衣其上謂之綖論語尚書皆云麻冕知其當用布也弁師掌王之五冕皆𤣥冕知其色用𤣥也孔安國論語注言績麻三十升布以為冕即是綖也鄭𤣥玉藻注云延冕上覆也此云冠上覆者冠冕通名故此注衡及綖皆以冠言之其實悉冕飾也昭其度也注尊卑各有制度疏注正義曰此上十二物者皆是明其制度哀伯思及則言無次第也鄭𤣥覲禮注云上公衮無升龍天子有升龍有降龍是衮有度也冕則公自衮以下侯伯自鷩以下是冕有度也黻則諸侯火以下卿大夫山是黻有度也珽則玉象不同長短亦異是珽有度也衮冕鷩冕裳四章毳冕希冕裳二章是裳有度也鄭𤣥屨人注云王吉服舄有三等赤舄為上冕服之舄下有白舄黒舄王后祭服舄有三等𤣥舄為上禕衣之舄下有青舄赤舄是舄有度也紞則人君五色臣則三色是紘有度也天子朱紘諸侯青紘是紘有度也其帶幅衡綖則無以言之傳言昭其度也明其尊卑各有制度藻率鞞鞛注藻率以韋為之所以藉玉也王五采公侯伯三采子男二采鞞佩刀削上飾鞛下飾音義率音律鞞補頂反鞛布孔反鞞鞛刀削之飾藉在夜反削音笑疏注正義曰鄭𤣥覲禮注云繅所以藉玉以韋衣木廣袤各如其玉之大小典瑞注云繅有五采文所以薦玉木為中榦用韋衣而畫之此言以韋為之指木上之韋其實木為榦也禮之言繅皆有玉共文大行人謂之繅藉曲禮單稱藉故知所以藉玉也大行人云公執桓圭九寸繅藉九寸知大小各如其玉也大行人注云繅藉以五采韋衣板若奠玉則以藉之是由有奠之時湏有繅以之藉玉故小大如玉耳典瑞職曰王執鎮圭繅藉五采五就以朝日公執桓圭侯執信圭伯執躬圭繅皆三采三就子執穀璧男執蒲璧繅皆二采再就以朝覲宗遇㑹同于王是王五采公侯伯三采子男二采也凡言五采者皆謂𤣥黄朱白蒼三采朱白蒼二采朱緑就成也五就謂五帀每一帀為一就也禮之言藻其文雖多典瑞大行人聘禮覲禮皆單言繅或云繅藉未有言繅率者故服䖍以藻為畫藻率為刷巾杜以藻率為一物者以拭物之巾無名率者服言禮有刷巾事無所出且哀伯謂之昭數固應禮之大者寜當舉拭物之巾與藻藉為類故知藻率正是藻之複名藻得稱為藻藉何以不可名為藻率也玉藻說帶之制曰士練帶率下辟凡帶有率無箴功鄭𤣥云士以下皆襌不合而率積如今作幧頭為之也然則襌而不合縷繂其邉謂之為率此以韋衣木盖亦繂積其邊故稱率也鄭司農典瑞注讀繅為藻率之藻似亦藻率共為藻也詩曰鞞琫容刀故知鞞鞛佩刀削之飾也少儀云刀授頴削授柎削是刀之類故與刀連言之鞞鞛二名明飾有上下先鞞後鞛故知鞞為上飾鞛為下飾劉君以毛詩傳下曰鞞上曰琫而規杜氏但鞞鞛或上或下俱是無正文不可以規杜過也鞶厲游纓注鞶紳帶也一名大帶厲大帶之垂者游旌旗之游纓在馬膺前如索帬音義鞶歩干反游音留注同膺於陵反索悉各反疏注正義曰易訟卦上九或錫之鞶帶知鞶即帶也以帶束要垂其餘以為飾謂之紳上帶為革帶故云鞶紳帶所以别上帶也玉藻說帶云大夫大帶是一名大帶也詩毛傳云厲帶之垂者故用毛說以為厲大帶之垂者也大帶之垂者名之為紳而復名為厲者紳是帶之名厲是垂之貌詩稱垂帶而厲是厲為垂貌也玉藻稱天子素帶朱裏終辟諸侯素帶不朱裏大夫素帶辟垂帶皆博四寸士帶傳二寸再繚四寸緇辟下垂賈服等說鞶厲皆與杜同唯鄭𤣥獨異禮記内則注以鞶為小囊讀厲如裂繻之裂言鞶囊必裂繪緣之以為飾案禮記稱男鞶革女鞶絲鞶是帶之别稱遂以鞶為帶名言其帶革帶絲耳鞶非囊之號也禮記又云婦事舅姑施縏袠袠是囊之别名今人謂裹書之物為袠言其施帶施囊耳其縏亦非囊也若以縏為小囊則袠是何器若袠亦是囊則不應帶二囊矣以此知鞶即是紳帶為得其實游是旐之垂者斾之别名九旗雖各有名而旌旗為之總號故云旌旗之游也案巾車王建大常十有二斿又大行人云上公九斿侯伯七斿子男五斿其孤卿建􅎶大夫士建物其斿各如其命數其鳥旟則七斿熊旗則六斿龜旐則四斿故考工記云鳥旟七斿以象鶉火熊旗六斿以象伐龜旐四斿以象營室是也鄭司農巾車注云禮家說曰纓當胸以削革為之鄭𤣥云纓今馬鞅是纓在馬膺前也服䖍云纓如索帬今乘輿大駕有之然則漢魏以來大駕之馬膺有索帬是纓之遺象故云如索帬也案巾車玉路樊纓十有再就鄭𤣥注云樊及纓皆以五采罽飾之金路樊纓九就象路樊纓七就革路絛纓五就鄭𤣥云其樊及纓以絛絲飾之木路翦樊鵠纓鄭𤣥云以淺黒飾韋為樊鵠色飾韋為纓不言就數飾與革路同昭其數也注尊卑各有數疏注正義曰藻有五采三采之異是藻率有數也毛詩傳說容刀之飾云天子玉琫而珧珌諸侯璗琫而璆珌是鞞鞛有數也玉藻云紳長制士三尺有司二尺有五寸又大夫以上帶廣四寸士廣二寸是鞶厲有數也玉路十二斿金路九斿是斿有數也玉路纓十有二就金路纓九就是纓有數也數之與度大同小異度謂限制數謂多少言其尊卑有節數也火龍黼黻注火畫火也龍畫龍也白與黒謂之黼形若斧黒與青謂之黻兩已相戾音義黼音甫戾力計反疏注正義曰考工記記畫繢之事云火以圜鄭司農云為圜形似火也鄭𤣥云形如半環然又曰水以龍鄭𤣥云龍水物畫水者并畫龍是衣有畫火畫龍也白與黒謂之黼黒與青謂之黻考工記文也其言形若斧兩已相戾相傳為說孔安國虞書傳亦云黼若斧形黻為兩已相背是其舊說然也周世衮冕九章傳唯言火龍黼黻四章者畧以明義故文不具舉衣之所畫龍先於火今火先於龍知其言不以次也昭其文也注以文章明貴賤五色比象昭其物也注車服器械之有五色皆以比象天地四方以示器物不虛設音義比并是反械户戒反疏注正義曰考工記云畫績之事雜五色東青南赤西白北黒天𤣥地黄是其比象天地四方也比象有六而言五者𤣥在赤黒之間非别色也昭二十五年傳云九文六采言采色有六故注以天地四方六事當之五行之色為五色加天色則為六故五色六采互相見也昭其物者以示物不虚設必有所象其物皆象五色故以五色明之鍚鸞和鈴昭其聲也注錫在馬額鸞在鑣和在衡鈴在旂動皆有鳴聲音義錫音揚馬面當盧鈴音令額顔客反鑣彼驕反旂勤衣反疏注正義曰鄭𤣥巾車注云錫馬面當盧刻金為之所謂鏤鍚也詩箋云眉上曰鍚刻金飾之令當盧也然則鍚在眉上故云在馬額也詩稱輶車鸞鑣知鸞在鑣也鑣在馬口兩旁衡在服馬頸上鸞和亦鈴也以處異故異名耳爾雅釋天說旌旗有鈴曰旂李廵曰以鈴置旐端是鈴在旂也鍚在馬額鈴在旂先儒更無異說其鸞和所在則舊說不同毛詩傳曰在軾曰和在鑣曰鸞韓詩内傳曰鸞在衡和在軾前鄭𤣥經解注取韓詩為說秦詩箋云置鸞於鑣異於乘車也其意言乘車之鸞在衡田車之鸞在鑣及商頌烈祖之箋又云鸞在鑣是疑不能定故兩從之也案考工記輪崇車廣衡長參如一則衡之所容唯兩服馬耳詩辭毎言八鸞當謂馬有二鸞鸞若在衡衡唯兩馬安得置八鸞乎以此知鸞必在鑣鸞既在鑣則和當在衡經傳不言和數未知和有幾也四者皆以金為之故動則皆有鳴聲也三辰旂旗昭其明也注三辰日月星也畫於旂旗象天之明疏注正義曰春官神仕掌三辰之法鄭𤣥亦以為日月星也謂之辰辰時也日以照晝月以照夜星則運行於天昏明遞帀而正所以示民早晚民得取為時節故三者皆為辰也三辰是天之光明照臨天下故畫於旌旗象天之明也九旗之物唯日月為常不言畫星者葢大常之上又畫星也穆天子傳稱天子葬盛姬建日月七星蓋畫北斗七星也案司常交龍為旗熊虎為旗不畫三辰而云三辰旂旗者旂旗是九旗之總名可以統大常故舉以為言也夫徳儉而有度登降有數注登降謂上下尊卑文物以紀之聲明以發之以照臨百官百官於是乎戒懼而不敢易紀律今滅徳立違注謂立華督違命之臣而寘其賂器於大廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失徳寵賂章也郜鼎在廟章孰甚焉武王克商遷九鼎于雒邑注九鼎殷所受夏九鼎也武王克商乃營雒邑而後去之又遷九鼎焉時但營洛邑未有都城至周公乃卒營雒邑謂之王城即今河南城也故傳曰成王定鼎于郟鄏音義寘之鼔反置也邪似嗟反雒音洛本亦作洛夏户雅反郟古洽反鄏音辱疏注正義曰據宣三年傳知九鼎是殷家所受夏九鼎也戰國䇿稱齊救周求九鼎顔率謂齊王曰昔周伐殷而取九鼎一鼎九萬人挽之九鼎八十一萬人挽之挽鼎人數或是虚言要知其鼎有九故稱九鼎也知武王遷九鼎於洛邑欲以為都者鼎者帝王所重相傳以為寳器戎衣大定之日自可遷置西周乃徙九鼎處于洛邑故知本意欲以為都又以尚書洛誥說周公營洛邑則知武王但有遷意周公乃卒營之地理志云河南縣故郟鄏地也武王遷九鼎焉周公致太平營以為都是為王城至平王居之言即今河南城者晉時猶以為河南縣成王定鼎宣三年傳文義士猶或非之注蓋伯夷之屬疏注正義曰史記伯夷列傳曰伯夷叔齊孤竹君之二子也讓國俱逃歸周及至西伯卒武王東伐紂伯夷叔齊叩馬諌曰父死不葬爰及干戈可謂孝乎以臣伐君可謂仁乎左右欲兵之太公曰此義人也扶而去之武王既平殷夷齊恥之不食周粟隠於首陽山采薇而食之作歌曰登彼西山兮爰采薇矣以暴易暴兮不知其非矣檢書傳之說非武王者唯此人故知是伯夷之屬而况將昭違亂之賂器於大廟其若之何公不聼周内史聞之曰臧孫達其有後於魯乎君違不忘諫之以徳注内史周大夫官也僖伯諫隠觀魚其子哀伯諫桓納鼎積善之家必有餘慶臧孫其有後於魯疏注正義曰周禮春官内史中大夫是周大夫官也積善之家必有餘慶易文言文也秋七月杞侯來朝不敬杞侯歸乃謀伐之蔡侯鄭伯㑹于鄧始懼楚也注楚國今南郡江陵縣北紀南城也楚武王始僣號稱王欲害中國蔡鄭姬姓近楚故懼而㑹謀音義近附近之近疏注正義曰地理志云南郡江陵縣故楚郢都楚文王自丹陽徙此世本云楚鬻熊居丹陽武王徙郢宋仲子云丹陽在南郡枝江縣今南郡江陵縣北有郢城史記稱文王徙都于郢地理志依史記為說此時當楚武王也譜云楚芊姓顓頊之後也其後有鬻熊事周文王早卒成王封其曾孫熊繹於楚以子男之田居丹陽今南郡枝江是也熊逹始稱武王武王十九年魯隠公之元年也武王居郢今江陵是也昭王徙都恵王八年獲麟之嵗也恵王二十一年春秋之傳終矣恵王五十七年卒自恵王以下十一世二百九年而秦滅之楚世家稱武王使随人請王室尊吾號王弗聼還報楚楚王怒乃自立為楚武王是楚武王始僣號稱王也劉炫云號為武武非諡也九月入杞討不敬也公及戎盟于唐修舊好也注恵隠之好音義好呼報反注同冬公至自唐告于廟也凡公行告于宗廟反行飲至舍爵策勲焉禮也注爵飲酒器也既飲置爵則書勲勞於䇿言速紀有功也音義舍音赦置也舊音捨疏正義曰凡公行者或朝或㑹或盟或伐皆是也孝子之事親也出必告反必面事死如事生故出必告廟反必面至不言告禰廟而言告宗廟者諸廟皆告非獨禰也禮記曽子問曰諸侯適天子必告于祖奠于禰命祝史告于宗廟諸侯相見必告于禰命祝史告于五廟反必親告于祖禰乃命祝史告至于前所告者由此而言諸侯朝天子則親告祖禰祝史告餘廟朝隣國則親告禰祝史告餘廟其路逺者亦親告祖故于其反也言告于祖禰明出時亦告祖也出時不言祖者鄭𤣥云道近或可以不親告祖明道逺者亦親告祖矣雖親與不親而諸廟皆告故總言告于宗廟也曽子問曰凡告用制幣反亦如之則出入皆以幣告也但出則告而遂行反則告訖又飲至故行言告廟反言飲至以見至有飲而行無飲也飲至者嘉其行至故因在廟中飲酒為樂也襄十三年傳曰公至自晉孟獻子書勞于廟禮也書勞䇿勲其事一也舍爵乃䇿勲䇿勲當在廟知飲至亦在廟也彼公至自晋朝還告廟也此公至自唐盟還告廟也十六年公至自伐鄭傳曰以飲至之禮伐還告廟也三者傳皆言禮知朝㑹盟伐告廟禮同傳所以反覆凡例也朝還告至而獻子書勞則䇿勲者非唯討伐之勲雖常事有以安國寜民或亦書功于廟也公行告至必以嘉㑹昭告祖禰有功則舍爵䇿勲無功則告事而已無不告也反行必告而春秋公行一百七十六書至者唯八十二耳其餘不書者釋例曰凡公之行不書至者九十有四皆不告廟也隠公之不告謙也餘公之不告慢於禮也慢於禮者舉大例言耳其中亦應有心實非慢而不宜告者若行有恥辱不足為榮則克躬罪已不以告廟非為慢於禮也若事實可恥而不以為恥反行告廟則史亦書之宣五年傳曰公如齊髙固使齊侯止公請叔姬焉夏公至自齊書過也釋例日執止之辱厭尊毁列所以累其先君忝其社稷固當克躬罪已不以嘉禮自終宣公如齊既已見止連昏於鄰國之臣而行飲至之禮故傳曰書過也是不應告而告故書之以示過也釋例又曰桓公之䘮至自齊此則死還告廟而書至者也莊公違禮如齊觀社用飲至之禮此則失禮之書至者也宣公黒壤之㑹以賂免諱不書盟而復書至亦諱不以見止告廟也襄公至自晋此則榮還而書至者也昭公至自齊居于鄆此則宜告而書至者也諸書至皆告廟啓反或即實而言或有所諱辟傳於伐見飲至之禮於宣見書過之譏於朝見書勞于廟舉此三者以包其他行也僖十六年公㑹諸侯于淮未歸而取項齊人以為討而止公十七年秋聲姜以公故㑹齊侯于卞公始得歸而書公至自㑹是諱其見止而以㑹告廟故傳曰猶有諸侯之事焉且諱之是諱止而以㑹告也諸侯盟者必在㑹後皆書公至自㑹不言公至自盟者以盟是因㑹而為之初必以㑹徴衆公行以㑹告廟故還以㑹告至雖并以盟告亦不云至自盟為行時不以盟告故也僖二十八年公㑹諸侯于溫遂圍許經書公至自圍許襄十年公㑹諸侯于柤遂滅偪陽經書公至自㑹二文不同釋例曰諸若此類事勢相接或以始致或以終致葢時史之異耳無他義也定十二年公至自圍成行不出境而亦告廟者釋例曰陪臣執命大都偶國仲由建堕三都之計而成人不從故公親伐之雖不越境動衆興兵人其事故出入皆告于廟也注正義曰韓詩説一升曰爵爵盡也足也二升曰觚觚寡也飲當寡少三升曰觶觶適也飲當自適四升曰角角觸也飲不自適觸罪過也五升曰散散訕也飲不自節為人謗訕也總名曰爵其實曰觴觴餉也然則飲酒之器其名有五而總稱為爵案燕禮爵用觚觶此飲至之爵不過用觚觶而已為人君者賞不踰月欲民速覩為善之利故舍爵即書勞於策言速紀有功也特相會徃來稱地讓事也注特相會公與一國會也㑹必有主二人獨㑹則莫肯為主兩讓㑹事不成故但書地自參以上則徃稱地來稱會成事也注成㑹事音義參七南反一音三上時掌反初晉穆侯之夫人姜氏以條之役生大子命之曰仇注條晋地大子文侯也意取於戰相仇怨音義仇音求其弟以千畝之戰生命之曰成師注桓叔也西河界休縣南有地名千畝意取能成其衆疏正義曰案周本紀宣王三十九年王與姜戎戰于千畝取此戰事以為子名也師服曰異哉君之名子也注師服晋大夫音義名如字或彌政反夫名以制義注名之必可言也義以出禮注禮從義出禮以體政注政以禮成政以正民是以政成而民聽易則生亂注反易禮義則亂生也疏正義曰出口為名合宜為義人之出言使合於事宜故云名以制義仗義而行所以生出禮法故云義以出禮履禮而行所以體成政教故云禮以體政以禮為政以正下民故云政以正民今晋侯名子不得其宜禮教無所從出政不以禮則民各有心故為始兆亂也嘉耦曰妃怨耦曰仇古之命也注自古有此言音義耦五口反妃芳非反今君命大子曰仇弟曰成師始兆亂矣兄其替乎注穆侯愛少子桓叔俱取於戰以為名所附意異故師服知桓叔之黨必盛於晋以傾宗國故因名以諷諫音義替他計反廢也少詩照反諷芳鳯反疏注正義曰大子與桓叔雖竝因戰為名而所附意異仇取於戰相仇怨成師取能成師衆緣名求義則大子多仇怨而成師有徒衆穆侯本立此名未必先生此意但寵愛少子於時巳著師服知桓叔將盛故推出此理因解其名以為諷諫欲使之強幹弱枝耳人臣規諫若無端緒馮何致言以中已志非謂人之立名必將有驗而何休謂左氏後有興亡由立名善惡引后稷名棄為膏肓以難左氏非也恵之二十四年晋始亂故封桓叔于曲沃注恵魯恵公也晋文侯卒子昭侯元年危不自安封成師為曲沃伯靖侯之孫欒賔傅之注靖侯桓叔之髙祖父言得貴寵公孫為傅相音義靖才井反欒力官反疏注正義曰案晋世家靖侯生僖侯僖侯生獻侯獻侯生穆侯穆侯生桓叔靖侯是桓叔之髙祖也史傳稱祖皆云祖父故謂髙祖為髙祖父非髙祖之父也特云靖侯之孫則知傳意言其得貴寵公孫為傅相也此人之後遂為欒氏盖其父字欒師服曰吾聞國家之立也本大而末小是以能固故天子建國注立諸侯也諸侯立家注卿大夫稱家卿置側室注側室衆子也得立此一官疏注正義曰禮記文王世子云公若有出疆之政庶子守公宫正室守大廟鄭𤣥云正室適子也正室是適子故知側室是衆子言其在適子之旁側也文十二年傳曰趙有側室曰穿是卿得立此官也卿之家臣其數多矣獨言立此一官者其餘諸官事連於國臨時選用異姓皆得為之其側室一官必用同族是卿廕所及唯知宗事故特言之案世族譜趙穿是夙之庶孫於趙盾為從父昆弟而為盾側室然選其宗之庶者而為之未必立卿之親弟大夫有貳宗注適子為小宗次子為貳宗以相輔貳音義適丁歴反為小宗本或作為大宗誤疏注正義曰禮有大宗小宗天子諸侯之庶子謂之别子及異姓受族為後世之始祖者世適承嗣百世不遷謂之大宗為父後者諸弟宗之五世則遷謂之小宗五世遷者謂髙祖以下䘮服未絶其繼髙祖之適則緦服之内共宗之其繼曽祖之適則小功之内共宗之繼祖繼穪所宗及亦然故鄭𤣥䘮服小記注云小宗有四或繼髙祖或繼曽祖或繼祖或繼禰皆至五世則遷以緦服既窮不相宗敬故疏即遞遷也禮記大傳曰有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼髙祖者五世則遷者也是言大宗小宗之别也大夫身是適子為小宗故其次者為貳宗以相輔助為副貳亦立之為此官也杜知非大宗而云小宗者以其大夫不必皆是大宗據為小宗者多故杜言之也若大夫身為大宗亦止得立貳宗官耳禮記據公族為説故言别子為祖主說諸侯庶子耳其實異姓受族亦為始祖其繼者亦是大宗但記文不及之耳沈云適子為小宗謂是大夫之身為小宗次者為貳宗謂大夫庶弟貳宗與側室為例皆是官名與五宗别士有𨽻子弟注士卑自以其子弟為僕𨽻庶人工商各有分親皆有等衰注庶人無復尊卑以親疏為分别也衰殺也音義分扶問反又如字親七刃反又如字衰初危反注同復扶又反别彼列反殺所界反是以民服事其上而下無覬覦注下不冀望上位音義覬音冀覦羊朱反字林羊住反說文云欲也今晉甸侯也而建國本既弱矣其能久乎注諸侯而在甸服者音義甸徒練反疏注正義曰周公斥大九州廣土萬里制為九服邦畿方千里其外每五百里謂之一服侯甸男采衞要六服為中國夷鎮藩三服為夷狄大司馬謂之九畿言其有期限也大行人謂之九服言其服事王也如其數計甸服内畔尚去京師千里晋距王城不容此數而得在甸服者周禮設法耳土地之形不可方平如圖未必毎服皆如其數也地理志云初雒邑與宗周通封畿東西長南北短短長相覆為千里是王畿不正方也志又云束都方六百里半之為三百里外有侯服五百里為八百里計晋都在大原去洛邑近八百里也畿既不方服必差改故晉在甸服也恵之三十年晋潘父弑昭侯而納桓叔不克注潘父晋大夫也昭侯文侯子晋人立孝侯注昭侯子也恵之四十五年曲沃莊伯伐翼弑孝侯注莊伯桓叔子翼晋國所都翼人立其弟鄂侯鄂侯生哀侯注鄂侯以隠五年奔随其年秋王立哀侯于翼哀侯侵陘庭之田注陘庭翼南鄙邑音義陘音刑陘庭南鄙啓曲沃伐翼春秋左傳注疏卷四春秋左氏傳注疏卷四考證元年春王正月公即位疏桓之於隠本無君臣之義臣照按或云疏文害理未有甚於此者不可不辨今按孔穎達言桓之於隐本無君臣之義者未必謂桓本當立以少故諸大夫扳隠而立之桓本是君不得臣于隠也盖言桓實弑隠桓無君臣之義計必隠死而即改元其心亦靡所恤今歸罪寪氏詐言不與賊謀而用常禮是欲諱其無君孔子如其意而與之而桓之簒乃彌顯也故下文舉晋悼即位改元于厲公被弑時者言之晋厲為欒書等所弑國人迎悼公而立之悼公立即改元若果隠公為寪氏所弑與桓無與則桓亦當立即改元何為用嗣子之常禮乎以見春秋之文隠而顯也若作桓不得以隠為君解豈晋悼亦不得以厲為君耶奚為連類及之但其文句頗覺難曉如果謂桓不當君隠則大悖也傳為周公祊故也臣浩按杜注此條極精孔子於春秋書假田以示隠諱於詩存魯頌復周公之宇以見大義正為是爾傳鄭伯拜盟注臣召南按宋儒毎攻杜氏曲䕶傳而疑經如此注則直言傳之謬誤矣宋督弑其君與夷及其大夫孔父注孔父稱名者内不能治其閨門外取怨于民身死而禍及其君臣召南按孔父忠臣自與仇牧一例春秋書之正以褒忠臣杜氏横以為貶而稱名不亦謬乎且孔父名嘉見於世本杜於上年傳中已注曰孔父嘉孔子六世祖矣至此又謂稱名母乃以父為名以嘉為字乎此論闗係倫常當為駁正孔疏亦阿杜説何也臣照按父并非字古人冠而字則以字稱年五十以上又進而尊之則以伯仲叔季稱又進則以父稱此即孔穎達之說也滕子來朝注盖時王所黜臣浩按滕侯稱子諸說紛如朱子最取杜説而又疑滕自降黜公㑹齊侯陳侯鄭伯于稷以成宋亂注成平也臣召南按經于㑹盟未有原其事者此特筆見義深惡之也鄭服解作成就宋亂比杜為長臣照按杜氏之意謂孔子無直斥先君以成人之亂者故釋成為平也即以成為平其意自昭蔡侯鄭伯㑹于鄧臣召南按隠十年與齊鄭盟鄧注曰魯地此則蔡鄭之間地也與鄧國俱不同傳衮冕黻珽疏蜀志稱秦密見太守以簿擊頰秦密應作秦宓傳藻率鞞鞛疏士以下皆襌不合而率積周禮鄭注原文作繂積傳鞶厲游纓疏玉藻稱天子素帶朱裏終辟諸侯素帶不朱裏大夫素帶辟垂臣浩按此依鄭注約玉藻之文也玉藻原文曰天子素帶朱裏終辟而素帶終辟大夫素帶辟垂鄭注而素帶終辟謂諸侯也記有闕文引之不得不加耳傳昭其明也疏昏明遞布而正遞布應作遞帀傳蔡侯鄭伯㑹于鄧疏熊達始稱武王熊達應作熊通又疏乃自立為楚武王史記原文無楚字又趙汸補注曰史記伐隨在桓六年則稱王在桓八年也傳其弟以千畝之戰生疏按周本紀宣王三十九年至與姜戎戰于千畝取此戰事以為子名也臣召南按史記晋世家及年表穆侯七年伐條生太子仇周宣王之二十三年也穆侯十年伐千畝有功生少子名曰成師宣王之二十六年也與王師敗績于千畝事本不同依周本紀宣王三十九年戰于千畝距晋穆侯戰千畝時又隔十三年且晋戰而㨗故以成師名子若王師敗績晋安得言有功乎疏文不據晋世家而據周本紀誤牽王室後事為晋國前事謬矣春秋左氏傳注疏卷四考證
