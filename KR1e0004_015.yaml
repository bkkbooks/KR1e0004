body:
  text: 春秋左傳注疏卷十五起僖公二十五年盡二十八年晉杜氏注唐陸德明音義孔穎達疏經二十有五年春王正月丙午衛侯燬滅邢注衛邢同姬姓惡其親親相滅故稱名罪之音義燬况委反惡烏路反疏正義曰曲禮曰諸侯不生名滅同姓名傳云同姓也故名然則諸侯位貴居尊故不斥其名書名則是罪絶之事故云罪之也夏四月癸酉衛侯燬卒注無傳五同盟疏正義曰燬以元年即位四年盟于召陵五年于首止八年于洮九年于葵丘十五年于牡丘皆魯衛俱在是五同盟也宋蕩伯姬來逆婦注無傳伯姬魯女為宋大夫蕩氏妻也自為其子來逆稱婦姑存之辭婦人越竟迎婦非禮故書音義為于偽反越竟音境疏正義曰伯姬魯女而以宋蕩冠之知為宋大夫蕩氏妻也婦者對姑之文姑即伯姬故知自為子來逆婦公羊傳曰宋蕩伯姬者何蕩氏之母也其稱婦何有姑之辭也穀梁傳曰婦人既嫁不踰竟是婦人越竟逆婦非禮也以非禮故書之紀裂繻來逆女此云逆婦者姑自來逆故即稱婦也宋有蕩氏者宋桓公生公子蕩蕩生公孫夀壽生蕩意諸意諸之後以蕩為氏則此人字蕩也故云蕩氏妻宋殺其大夫注無傳其事則未聞於例為大夫無罪故不稱名秋楚人圍陳納頓子于頓注頓迫於陳而出奔楚故楚圍陳以納頓子不言遂明一事也子玉稱人從告頓子不言歸興師見納故疏正義曰圍陳而納頓子明頓子迫於陳而出奔也楚人納之知其出奔楚也公羊傳曰何以不言遂兩之也一舉兵而行此兩意非因前生後故不言遂明此圍陳納頓子正是一事釋例曰傳稱諸侯納之曰歸今經諸稱納者皆有興師見納之事不待例而自明故但言納不復言歸納歸須兩見故云頓子不言歸興師見納故葬衛文公注無傳冬十有二月癸亥公會衛子莒慶盟于洮注洮魯地衛文公既葬成公不稱爵者述父之志降名從未成君故書子以善之莒慶不稱氏未賜族音義洮吐刀反疏正義曰八年盟于洮杜云曹地三十一年魯始得曹田此時不得為魯地注誤耳禮先君既葬則嗣子成君此文公既葬成公不稱爵者釋例曰文公欲平莒於魯未終而薨故衛子專父之志魯人由此亦修文公之好此孝子之至感而人情之所篤故成公雖已免喪至於此盟會降以在喪自名猶武王伐紂稱大子發故經隨而書子傳從而釋之曰修文公之好也是説書子善之事傳二十五年春衛人伐邢二禮從國子巡城掖以赴外殺之疏正義曰説文云掖持臂也謂執持其臂投之城外也掖本持臂之名遂謂臂下脅上為掖是因名轉而相生也正月丙午衛侯燬滅邢同姓也故名禮至為銘曰余掖殺國子莫余敢止注惡其不知恥詐以滅同姓而反銘功於器音義掖音亦説文云以手持人臂曰掖惡烏路反秦伯師于河上將納王狐偃言於晉侯曰求諸侯莫如勤王注勤納王也諸侯信之且大義也繼文之業注晉文侯仇為平王侯伯匡輔周室音義仇音求疏正義曰言欲繼文侯之功業而使信義宣布於諸侯今日納王是為可矣而信宣於諸侯今為可矣使卜偃卜之曰吉遇黃帝戰于阪泉之兆注黃帝與神農之後薑氏戰于阪泉之野勝之今得其兆故以為吉疏正義曰大戴禮五帝德曰黃帝與赤帝戰于阪泉之野晉語云昔少典娶於有蟜氏生黃帝炎帝黃帝為姬炎帝為薑二帝用師以相濟也韋昭注云濟當為擠擠滅也史記稱黃帝伐炎帝之後于阪泉之野炎帝即神農也黃帝將戰卜得吉兆今卜復得彼兆故以為吉也公曰吾不堪也注文公自以為己當此兆故曰不堪對曰周禮未改今之王古之帝也注言周德雖衰其命未改今之周王自當帝兆不謂晉公曰筮之筮之遇大有注乾下離上大有之睽注兌下離上睽大有九三變而為睽曰吉遇公用享于天子之卦注大有九三爻辭也三為三公而得位變而為兌兌為説得位而説故能為王所宴饗戰克而王饗疏正義曰卜遇黃帝吉兆是戰克也筮得大有是王饗也吉孰大焉注言卜筮協吉且是卦也注方更總言二卦之義不繫於一爻天為澤以當日天子降心以逆公不亦可乎注乾為天兌為澤乾變為兌而上當離離為日日之在天垂曜在澤天子在上説心在下是降心逆公之象大有去睽而復亦其所也注言去睽卦還論大有亦有天子降心之象乾尊離卑降尊下卑亦其義也音義下遐嫁反晉侯辭秦師而下注辭讓秦師使還順流故曰下三月甲辰次于陽樊右師圍溫注大叔在溫故左師逆王夏四月丁巳王入于王城取大叔于溫殺之于隰城戊午晉侯朝王王饗醴命之宥注既行饗禮而設醴酒又加之以幣帛以助勸也宥助也音義隰音習醴音禮宥音又請隧弗許注闕地通路曰隧王之葬禮也諸侯皆縣柩而下音義隧音遂今之延道闕其月反縣音玄柩其九反疏正義曰隱元年傳曰闕地及泉隧而相見是闕地通路曰隧也天子之葬棺重禮大尤須謹愼去壙逺而闕地通路從遠處而漸邪下之諸侯以下棺輕禮小臨壙上而直縣下之故隧為王之葬禮諸侯皆縣柩而下故不得用隧晉侯請隧者欲請以王禮葬也曰王章也注章顯王者與諸侯異未有代德而有二王亦叔父之所惡也與之陽樊溫原攢茅之田晉於是始啓南陽注在晉山南河北故曰南陽音義惡烏路反攢才官反陽樊不服圍之蒼葛呼曰注蒼葛陽樊人音義呼喚故反德以柔中國刑以威四夷宜吾不敢服也此誰非王之親姻其俘之也乃出其民注取其土而已音義俘芳扶反秋秦晉伐鄀注鄀本在商密秦楚界上小國其後遷於南郡鄀縣音義鄀音若國名字林云楚邑楮斫反疏正義曰言本在商密者據在後移都稱舊鄀以為本耳其實此時在商密後始遷於鄀縣國至彼縣而滅故彼縣專得鄀名當此秦晉伐鄀之時國名為鄀所都之邑名商密楚以申息之師戍商密者正謂戍鄀國也析是鄀之别邑戍人居析地為商密之援楚鬬克屈禦寇以申息之師戍商密注鬬克申公子儀屈禦寇息公子邊商密鄀别邑今南鄉丹水縣戍守也二子屯兵於析以為商密援音義禦魚呂反屯徒門反援于眷反秦人過析隈入而係輿人以圍商密昏而傳焉注析楚邑一名白羽今南鄉析縣隈隱蔽之處係縛輿人詐為克析得其囚俘者昏而傅城不欲令商密知囚非析人音義過古臥反王音戈析星曆反俗作析隈烏回反係音計輿音餘傳音附注同處昌慮反令力呈反宵坎血加書偽與子儀子邊盟者注掘地為坎以埋盟之餘血加盟書其上音義掘其勿反又其月反本又作闕其月反商密人懼曰秦取析矣戍人反矣乃降秦師囚申公子儀息公子邊以歸注商密既降析戍亦敗故得囚二子音義降户江反後除注降名皆同楚令尹子玉追秦師弗及注不復言晉者秦為兵主音義復扶又反遂圍陳納頓子于頓注為頓圍陳音義為于偽反冬晉侯圍原命三日之糧原不降命去之諜出注諜間也音義諜音牒間間廁之間曰原將降矣軍吏曰請待之公曰信國之寶也民之所庇也得原失信何以庇之所亡滋多退一舍而原降遷原伯貫于冀注伯貫周守原大夫也音義庇必利反又音祕貫古亂反趙衰為原大夫狐湊為溫大夫注狐溱狐毛之子音義溱側巾反衛人平莒于我十二月盟于洮修衛文公之好且及莒平也注莒以元年酈之役怨魯衛文公將平之未及而卒成公追成父志降名以行事故曰修文公之好音義好呼報反注同酈力知反晉侯問原守於寺人勃鞮注勃鞮披也音義守手又反勃步忽反鞮丁兮反對曰昔趙衰以壺飱從徑餒而弗食注言其亷且仁不忘君也徑猶行也音義飱音孫從才用反舊如字徑古定反一讀以壺飱從絶句讀徑為經連下句乖於杜意餒如罪反餓也疏正義曰杜以徑猶行者以傳文為徑故釋為行上讀為義劉炫改徑為經謂經歷飢餒下屬為句輒改其字以規杜氏非也故使處原注從披言也衰雖有大功猶簡小善以進之示不遺勞音義披普皮反經二十有六年春王正月己未公會莒子衛寧速盟于向注向莒地寧速衛大夫莊子也音義向舒亮反齊人侵我西鄙公追齊師至酅弗及注公逐齊師遠至齊地故書之濟北穀城縣西有地名酅下音義酅本又作巂户圭反注同一音以轉反疏正義曰於例將卑師少稱人將卑師衆稱師此來去一也而師人異文者穀梁傳曰其侵也曰人其追也曰師以公之弗及大之也此傳無解或如穀梁之言美公能逐其師若言追大師然變文以美公猶嘉季子之獲而書莒拏也公追戎于濟西不言所至此言至酅者美公逺追能逺至齊地故書之也桓十年齊侯衛侯鄭伯來戰于郎傳曰不書侵伐我有辭也此齊人侵我討洮向二盟與莒和好我亦無罪而書侵者於時晉文初起諸侯無伯齊侯是桓公之子欲以盟主自居魯不告齊而私為此盟非有正禮可辭齊侯容得侵伐故從本文夏齊人伐我北鄙注孝公未入魯竟先使微者伐之音義竟音境傳同衛人伐齊公子遂如楚乞師注公子遂魯卿也乞不保得之辭疏正義曰公子遂名書於經則是卿也而云大夫者大夫是總辭也今定本為魯卿乞則自我之心得否在於彼國乞者執謙之意不保必得之辭釋例曰凡乞者有求過理之辭執謙以逼成其計故雖小國之乞大國大國之乞小國亦皆從不與謀之例臧宣叔郤錡乞師是也然則與謀者彼此合討同謀共行乞師者取彼之力我獨用之故不從與謀之例公羊傳曰乞者何卑辭也曷為內外同辭重師也曷為重師師不出正反戰不正勝穀梁亦同其意以為兵凶器戰危事用師必有死傷不可必全得歸本不可謂之假借故皆以乞為名秋楚人滅夔以夔子歸注夔楚同姓國今建平秭歸縣夔有不祀之罪故不譏楚滅同姓音義夔求龜反秭音姊冬楚人伐宋圍緡公以楚師伐齊取穀注傳例曰師能左右之曰以音義緡亡巾反公至自伐齊注無傳傳二十六年春王正月公會莒兹丕公注兹丕時君之號莒夷無諡以號為稱音義丕普悲反稱尺證反寧莊子盟于向尋洮之盟也注洮盟在前年齊師侵我西鄙討是二盟也夏齊孝公伐我北鄙衛人伐齊洮之盟故也公使展喜犒師注勞齊師音義犒苦報反勞也勞力報反下文同疏正義曰犒者以酒食餉饋軍師之名也服虔云以師枯稿故饋之飲食勞苦謂之勞也魯語云使展喜以膏沐犒師使受命于展禽注桞下惠疏正義曰魯語展禽對臧文仲云獲聞之是其人氏展名獲字禽柳下是其所食之邑名諡曰惠列女傳柳下惠死門人將諡之妻曰夫子之諡宜為惠乎門人從以為惠莊子云柳下季者季是五十字禽是二十字齊侯未入竟展喜從之曰寡君聞君親舉玉趾將辱於敝邑使下臣犒執事注言執事不敢斥尊音義趾音止足也齊侯曰魯人恐乎對曰小人恐矣君子則否齊侯曰室如縣罄野無青草何恃而不恐注如而也時夏四月今之二月野物未成故言居室而資糧縣盡在野則無蔬食之物所以當恐音義恐立勇反下及注皆同縣音玄注同罄亦作磬盡也疏正義曰服虔云言室屋皆發撤榱椽在如縣罄孔朝曰縣罄但有桷無覆蓋杜以下云野無青草言在野無青草可食明此在室無資糧可噉故改如為而言居室而資糧縣盡劉炫云如罄在縣下無粟帛炫乃以服義規杜非也對曰恃先王之命昔周公大公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府注載載書也音義大音泰下及注同夾古洽反舊音古協反大師職之注職主也大公為大師兼主司盟之官桓公是以糾合諸侯而謀其不協彌縫其闕而匡救其災昭舊職也及君即位諸侯之望曰其率桓之功注率循也音義縫扶容反我敝邑用不敢保聚注用此舊盟故不聚衆保守曰豈其嗣世九年而棄命廢職其若先君何君必不然恃此以不恐齊侯乃還東門襄仲臧文仲如楚乞師注襄仲居東門故以為氏臧文仲為襄仲副使故不書音義使所吏反臧孫見子玉而道之伐齊宋以其不臣也注言其不臣事周室可以此罪責而伐之音義道音導夔子不祀祝融與鬻熊注祝融高辛氏之火正楚之遠祖也鬻熊祝融之十二世孫夔楚之别封故亦世紹其祀音義融餘忠反鬻音育疏正義曰楚世家云楚之先出自帝顓頊高陽高陽生稱稱生卷章卷章生重黎黎為高辛氏火正帝嚳命曰祝融帝誅重黎而以其弟吳回居火正為祝融吳回生陸終陸終生季連季連芉姓楚其後也其後中微或在中國或在蠻夷不能紀其世周文王之時季連之苗裔曰鬻熊事文王曾孫熊繹成王封於楚是祝融鬻熊皆為楚之逺祖也自祝融至鬻熊司馬遷不能紀其世杜言十二世不知出何書故劉炫規杜云計其間出有一千二百年略而言之則百年為一世計父子為十二世何以得近千二百年乎今刪定知不然者以其間或兄弟伯叔相及皆為君故年多而世少或可轉寫誤劉更無别文以意而規杜氏未為得也楚人讓之對曰我先王熊摰有疾鬼神弗赦而自竄于夔注熊摰楚嫡子有疾不得嗣位故别封為夔子音義摰音至竄七亂反字林又千外反嫡丁歷反疏正義曰傳言熊摰有疾是以失楚明是嫡子有疾不得嗣位楚世家無其事不知熊摰是何君之適何時封夔按鄭語孔朝注云熊繹玄孫曰熊摰有疾楚人廢之立其弟熊延熊摰自棄於夔子孫有功王命為夔子亦不知何所據也吾是以失楚又何祀焉注廢其常祀而飾辭文過秋楚成得臣鬬宜申帥師滅夔以夔子歸注成得臣令尹子玉也鬬宜申司馬子西也宋以其善於晉侯也注重耳之出也宋襄公贈馬二十乘音義乘繩證反叛楚即晉冬楚令尹子王司馬子西帥師伐宋圍緡公以楚師伐齊取穀凡師能左右之曰以注左右謂進退在己音義左右並如字疏正義曰能左右者謂欲左則左欲右則右故注云謂進退在己釋例曰凡師能左右之曰以謂求助於諸侯而專制其用征伐進退帥意而行故變會及之文而曰以施於匹敵相用者若伯主之命則上行於下非例所及也吳雖大國順蔡侯之請自將其衆唯蔡侯之命故亦言以吳子也傳例稱師則諸不言師者皆不用以為例也以之於言所涉甚多劉賈許穎既不守例為斷又亦不能盡通諸以唯雜取晉人執季孫以歸劉子單子以王猛居于皇尹氏毛伯以王子朝奔楚隨示以義數事而已又云諸稱以皆小以大下以上非其宜也尋按晉侯以季孫歸又非下以上也荊以蔡侯歸亦非小以大也置桓公子雍於穀易牙奉之以為魯援注雍本與孝公爭立故使居穀以逼齊音義置之䜴反援于眷反楚申公叔侯戍之注為二十八年楚子使申叔去穀張本桓公之子七人為七大夫於楚注言孝公不能撫公族經二十有七年春杞子來朝夏六月庚寅齊侯昭卒注十九年與魯大夫盟于齊秋八月乙未葬齊孝公注無傳三月而葬速乙巳公子遂帥師入杞注弗地曰入八月無乙巳乙巳九月六日冬楚人陳侯蔡侯鄭伯許男圍宋注傳言楚子使子玉去宋經書人者恥不得志以微者告猶序諸侯之上楚主兵故疏正義曰此年傳云楚子及諸侯圍宋則是楚子親自來也十二月公會諸侯盟于宋公為楚子在宋而往會之明與楚子共盟也明年傳晉侯執曹伯分曹衛之田以畀宋人其下始云楚子入居于申使子玉去宋由此而言楚子初來圍宋必親至宋國使子玉主兵明年見晉之盛身始去之獨留子玉於宋耳杜以諸侯之貶不至稱人今言楚人不得為楚子之身也子玉楚之正卿宜書其名今書曰楚人非子玉也故云恥不得志以微者告也若然莊二十八年齊人伐衛杜云齊侯稱人者諱取賂而還以賤者告二十二年宋公及楚人戰于泓杜云楚告命不以主帥人數故略稱人則以彼二解義亦得通但傳有子玉在宋之文故據子玉解之所以𢎞通其義也初圍宋在此年冬楚子入居于中乃是明年三月圍至明年不克始是不得志耳非是初圍之時為不得志也杜意當以此為明年始來告以今冬圍耳下句即有公會諸侯于宋楚未來告而公得往會之者公傳聞即往非待告也其書圍宋之事必待專使來告傳聞行言不得書也然則成十三年公會諸侯伐秦傳稱戰于麻隧秦師敗績而經無戰敗之事杜云時公在師復不須告蓋經文闕傳文獨存即如彼言公見其事不復須告此時公會諸侯于宋即是親見宋圍何以不即書之而云待楚告者按檢上下襄十一年公會晉侯云云伐鄭傳稱鄭人行成下言晉趙武入盟鄭伯鄭子展出盟晉侯杜云二盟不書不告二十五年公會晉侯云云于夷儀傳稱伐齊齊人使隰鉏請成慶封如師杜云慶封獨使於晉不通諸侯故不書二十六年傳六月公會晉趙武宋向戌鄭良霄曹人于澶淵晉人執寧喜以歸杜云歸晉而後告諸侯故經書在秋此三事者公雖在會不告不書所言不須告者皆謂公親行其事麻隧公親在戰故云不復須告此時公往與盟不與圍宋故圍宋之事必待告乃書既以微者來告猶序諸侯之上者春秋之例會同以國大小為序征伐則以主兵在前此序諸侯之上由楚主兵故也十有二月甲戌公會諸侯盟于宋注無傳諸侯伐宋公與楚有好而往會之非後期宋方見圍無嫌於與盟故直以宋地音義好呼報反與音預疏正義曰陳蔡鄭許皆是楚之屬國楚子帥而與之圍宋往年公使公子遂如楚乞師始與之通和好魯非楚之屬國圍宋之事公不與謀直聞其在宋往會之耳非是楚來召公公自往會之非後期也言此者文七年扈之盟為公後期不序其國而總曰諸侯此亦總曰諸侯有後期之嫌故名之非為後期而總稱諸侯即上圍宋之諸侯也一事而再見者前目而後凡常例也圍稱楚人以微者告魯此與諸侯盟會必是楚子親之不復别言楚子者上以厯序諸侯遂令楚子當楚人之處即從總文故不復曲序之也凡盟會以國為地者必國主與其盟會此時宋方見圍無嫌與盟故直以宋地也傳二十七年春杞桓公來朝用夷禮故曰子注杞先代之後而迫於東夷風俗雜壞言語衣服有時而夷故杞子卒傳言其夷也今稱朝者始於朝禮終而不全異於介葛盧故唯貶其爵公卑杞杞不共也注杞用夷禮故賤之音義共音恭本亦作恭下注同夏齊孝公卒有齊怨注前年齊再伐魯不廢喪紀禮也注弔贈之數不有廢疏正義曰周禮小司徒掌喪紀之禁令庖人掌喪紀之庶羞樂記曰衰麻哭泣所以節喪紀也言喪紀者多矣喪紀者喪事之總名諸侯相與唯有弔贈故注云弔贈之數不有廢也秋入杞責無禮也注責不共也音義責無禮本或作責禮也楚子將圍宋使子文治兵於睽注子文時不為令尹故云使治兵習號令也睽楚邑音義睽苦圭反又音圭終朝而畢不戮一人注終朝自旦及食時也子文欲委重於子玉故略其事音義朝如字注同戮音六子玉復治兵於蒍注子玉為令尹故蒍楚邑音義復扶又反蒍于委反終日而畢鞭七人貫三人耳音義貫音官又古亂反疏正義曰耳助句也國老皆賀子文疏正義曰王制云有虞氏養國老於上庠養庶老於下庠然則園老者國之卿大夫士之致仕者也子文飲之酒注賀子玉堪其事音義飲於鴆反蒍賈尚幼後至不賀注蒍賈伯嬴孫叔敖之父幼少也音義嬴音盈少詩照反下同子文問之對曰不知所賀子之傳政於子玉曰以靖國也音義傳直專反疏正義曰二十三年子玉伐陳城頓而還子文使為令尹叔伯曰子若國何對曰吾以靖國也夫有大功而無貴仕其人能靖者與有幾子文恐子玉矜功為亂故授令尹冀以靖國家此舉其前言以非之靖諸內而敗諸外所獲幾何子玉之敗子之舉也舉以敗國將何賀焉子玉剛而無禮不可以治民過三百乘其不能以入矣疏正義曰若使為帥遇三百乘其必不能入前敵矣苟入而賀何後之有注三百乘二萬二千五百人音義幾居豈反乘繩證反下同冬楚子及諸侯圍宋宋公孫固如晉告急注公孫固宋莊公孫先軫曰報施救患取威定霸於是乎在矣注先軫晉下軍之佐原軫也報宋贈馬之施音義軫之忍反施式氏反注同疏正義曰劉炫云下搜于被廬先軫始佐下軍此時未為下軍之佐以規杜氏知不然者以方欲救宋即搜被廬先軫此語與搜相近不知未搜之前先軫身作何官故以搜後下軍之佐明之然先軫後年亦為中軍帥不云中軍帥者相去既逺又隔下軍之佐故杜不言之狐偃曰楚始得曹而新昏於衛若伐曹衛楚必救之則齊宋免矣注前年楚使申叔侯戍穀以逼齊於是乎搜于被廬注晉常以春搜禮改政令敬其始也被廬晉地音義搜所求反被皮義反廬力居反作三軍注閔元年晉獻公作二軍今復大國之禮謀元帥注中軍帥音義帥所類反注同疏正義曰元長也謂將帥之長軍行則重者居中故晉以中軍為尊而上軍次之其二軍則上軍為尊故閔元年晉侯作二軍公將上軍趙衰曰郤縠可臣亟聞其言矣説禮樂而敦詩書詩書義之府也禮樂德之則也德義利之本也音義穀本又作穀同胡木反亟欺冀反數也説音悅疏正義曰説謂愛樂之敦謂厚重之詩之大旨勸善懲惡書之為訓尊賢伐罪奉上以道禁民為非之謂義詩書義之府藏也禮者謙卑恭謹行歸於敬樂者欣喜歡娛事合於愛揆度於內舉措得中之謂德禮樂者德之法則也心説禮樂志重詩書遵禮樂以布德習詩書以行義有德有義利民之本也晉語云文公問元帥於趙衰對曰郤穀可年五十矣守學彌惇夫好先王之法者德義之府也夫德義生民之本也能敦篤不忘百姓請使郤穀公從之夏書曰賦納以言明試以功車服以庸注尚書虞夏書也取納以言觀其志也明試以功考其事也車服以庸報其勞也賦猶取也庸功也君其試之疏正義曰夏書言用臣之法賦取也取人納用以其言察其言觀其志也分明試用以其功考其功觀其能也而賜之車服以報其庸庸亦功也知其有功乃賜之古人之法如此君其試用之注正義曰此古文虞書益稷之篇漢魏諸儒不見古文因伏生之謬從堯典至胤征凡二十篇總名曰虞夏書以與禹對言故傳通謂大禹謨以下皆為夏書也古本作敷納以言明庶以功敷作賦庶作試師受不同古字改易耳賦稅者取受之義故為取也庸功釋詁文舜典云敷奏以言明試以功車服以庸文雖略同此引夏書非舜典也乃使郤縠將中軍郤溱佐之使狐偃將上軍讓於狐毛而佐之注狐毛偃之兄音義將子匠反下將上將皆同溱側巾反疏正義曰晉語偃辭曰毛之知賢於臣其齒又長毛也不在位不敢聞命命趙衰為卿讓於欒枝先軫注欒枝貞子也欒賓之孫音義欒魯官反使欒枝將下軍先軫佐之荀林父御戎魏犫為右注荀林父中行桓子音義行户剛反晉侯始入而教其民二年欲用之注二十四年入子犯曰民未知義未安其居注無義則苟生疏正義曰未知君臣之義不作長久之圖苟且為生以過朝夕是未安其居於是乎出定襄王注二十五年定襄王以示事君之義入務利民民懷生矣疏正義曰利民之事非止一塗晉語説文公為政云棄責薄斂施舍分寡救乏振滯匡困資無輕關易道通商寬農茂穡勸分省用足財利器明德以厚民性皆是利民之事民懷生者謂有懷義之心不復苟且劉炫云生既厚民皆懷戀居處將用之子犯曰民未知信未宣其用注宣明也未明於見用之信疏正義曰信是人之所用若未伐原示信民未明於信是人用故傳云未宣其用云見用者言信見為人所用於是乎伐原以示之信注伐原在二十五年民易資者不求豐焉注不詐以求多明徴其辭注重言信公曰可矣乎子犯曰民未知禮未生其共於是乎大搜以示之禮注搜順少長明貴賤音義長丁丈反作執秩以正其官注執秩主爵秩之官音義秩直乙反民聽不惑而後用之出穀戍釋宋圍注楚子使申叔去穀子玉去宋一戰而霸文之教也注謂明年戰城濮疏正義曰論語云上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情今晉侯以義信禮教民然後用之是文德之教也明年傳君子謂晉於是彼也能以德攻注云以文德教民而後用之謂此役也經二十有八年春晉侯侵曹晉侯伐衛注再舉晉侯者曹衛兩來告公子買戍衛不卒戍刺之注公子買魯大夫子叢也內殺大夫皆書刺言用周禮三刺之法示不枉濫也公實畏晉殺子叢而誣叢以廢戍之罪恐不為遠近所信故顯書其罪音義刺七賜反殺也叢似東反枉紆往反疏正義曰經言買傳言叢蓋名買字叢或字相似而一謬也周禮司刺掌三刺之法以贊司寇聽獄訟一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民鄭玄云刺殺也訊而有罪則殺之訊言也內殺大夫此及成十六年刺公子偃皆書刺者若云用彼三刺之法言問臣吏萬民皆言合殺乃始殺之以示不枉濫也此三刺之法位在外朝庫門之外臯門之內故小司寇掌外朝之政三公及州長百姓北面羣臣西面羣吏東面如此訊之也魯史獨設此名所以異於外也公羊以為內諱殺大夫謂之刺以為諸侯不得專殺故諱言刺之其意小異於此公實畏晉殺子叢以説晉言戍衛者叢之所為又歸罪於叢言不終戍事故殺之恐不為逺近所信故顯書子叢之罪也然魯殺子叢本有兩意謂楚云不卒戍謂晉云叢欲戍衛今經之所書書謂楚之辭不書謂晉之辭者以魯先與楚同好恐楚疑之故顯書不卒戍之罪以告屬楚諸侯心實畏晉未敢宣露故經不書告晉之辭蘇云公子買不卒戍者告晉楚之辭也謂晉云公子買比來戍衛今不使終其戍事是以殺之謂楚云比令公子買戍衛其買不終戍事是以殺之楚人救衛三月丙午晉侯入曹執曹伯畀宋人注畀與也執諸侯當以歸京師晉欲怒楚使戰故以與宋所謂譎而不正音義畀必利反注同譎古穴反疏正義曰劉炫云公羊傳曰畀者何與也其言以畀宋人何與使聽之何休云宋稱人者明聽訟必師斷與其師衆共之穀梁傳曰畀與也其曰人何也不以晉侯畀宋公也注云畀上與下之辭故不以侯畀公按傳執曹伯分曹衛之田以畀宋人則田亦稱人非為斷獄故稱人也若不使晉侯與宋公自可改其畀名何以名之為畀而使義不得與也若與宋人豈宋國卑賤之人得獨受曹伯而治之乎二傳之言皆不得合左氏當以人為衆辭舉國而稱之耳夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績注宋公齊國歸父秦小子憖既次城濮以師屬晉不與戰也子玉及陳蔡之師不書楚人恥敗告文略也大崩曰敗績音義濮音卜憖魚覲反不與音預疏正義曰於例將卑師衆稱師此齊宋秦皆文稱師則將非尊者傳云宋公齊國歸父秦小子憖次于城濮及其交戰唯言晉師陳于莘北説晉之將帥與楚相敵都不言齊宋公卿知其既次城濮以師屬晉不與戰也沈氏云定四年戰于柏舉傳稱蔡侯吳子唐侯伐楚杜云唐侯不書兵屬於吳蔡今宋齊秦屬晉而書之者彼柏舉之戰唐師并屬吳蔡與之同陳故不書此齊宋師等雖屬晉猶異陳故得書之傳稱子玉及陳蔡之師皆在於陳而不書者楚人恥敗告辭略故史不得書之劉炫規過以為晉人告略今知不然者但於此戰時魯猶屬楚凡禍福相告必同好之國故知楚人來告也楚人來告不言陳蔡者恥其諸國皆在不能敵晉故略言楚人而已若其晉告則應襟其勝事以少敗多何肯略其陳蔡而不告也劉以為晉人來告而規杜氏非也楚殺其大夫得臣注子玉違其君命以取敗稱名以殺罪之衛侯出奔楚五月癸丑公會晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土注踐土鄭地王子虎臨盟不同歃故不書衛侯出奔其弟叔武攝位受盟非王命所加從未成君之禮故稱子而序鄭伯之下經書癸丑月十八日也傳書癸亥月二十八日經傳必有誤音義踐以淺反土如字或一音杜歃所洽反本又作喢疏正義曰傳稱王子虎盟諸侯于王庭而不書子虎知子虎臨盟不與歃定四年傳稱踐土之盟其載書云王若曰晉重魯申衛武蔡甲午鄭捷齊潘宋王臣莒期其次與會不同者會之班次以國大小為序及其盟也王臣臨之異姓為後故載書之次與會異也定四年召陵之會傳稱祝他言於萇𢎞曰踐土之盟衛成公不在夷叔其母弟也猶先蔡萇𢎞説告劉子乃長衛侯於盟如彼傳文則踐土召陵二盟衛皆先蔡而經書諸國之序二會皆蔡在衛先者釋例曰周之宗盟異姓為後故踐土載書齊宋雖大降於鄭衛斥周而言止謂王官之宰臨盟者也其餘雜盟未必皆然踐土召陵二會蔡在衛上時國之次至盟乃正其高下者敬恭明神本其始也是言盟會異次之意也如釋例之言王官之宰臨盟乃以異姓為後則二十九年翟泉之盟王子虎在焉宣七年黑壤之盟王叔桓公臨之彼二盟亦當異姓為後與會異次也八年洮之盟王人在列杜指王官之宰則卑者未必能别同姓異姓若無王宫之伯則以大小為序襄二十七年宋之盟晉楚爭先是其餘雜盟不先同姓之文也周禮典命云諸侯之適子誓於天子攝其君則下其君一等未誓則以皮帛繼子男叔武是衛侯之弟未得從世子之法攝位受盟舊無正禮其班位高下出於主會之意以其非王命所加使從未成君之禮故稱子而序於鄭伯之下蓋晉文之意使然陳侯如會注無傳陳本與楚楚敗懼而屬晉來不及盟故曰如會疏正義曰沈氏云八年鄭伯云乞盟此直云如會者彼及其盟故云乞盟此則不及其盟又陳侯不乞故與彼文異公朝于王所注無傳王在踐土非京師故曰王所疏正義曰穀梁傳曰朝不言所言所者非其所也是其由非京師故稱王所也公羊傳曰曷為不言公如京師天子在是也曷為不言天子在是不與致天子也其意言晉文公召王來踐土左傳於此無召王之事直云作王宮于踐土杜云襄王聞戰勝自往勞之故為作宮則以王意自往非晉召之不同公羊説也六月衛侯鄭自楚復歸于衛注復其位曰復歸晉人感叔武之賢而復衛侯衛侯之入由于叔武故以國逆為文例在成十八年衛元咺出奔晉注元咺衛大夫雖為叔武訟訴失君臣之節故無賢文奔例在宣十年音義咺况晚反為于偽反下為其同訴本又作訴蘇路反疏正義曰宣十年齊崔氏出奔衛傳曰書曰崔氏非其罪也文八年宋司城來奔傳言司城效節於府人而出故書以官貴之也然書官及氏為貴則書名不是賢文以元咺訴君於晉所訴雖直令君陷罪失君臣之節故無賢文書其名從本文也陳侯款卒注無傳凡四同盟疏正義曰款以十三年即位十五年盟于牡丘十九年于齊二十一年于薄二十七年于宋魯陳俱在是四同盟也秋杞伯姬來注無傳莊公女歸寧曰來公子遂如齊注無傳聘也冬公會晉侯齊侯宋公蔡侯鄭伯陳子莒子邾人秦人于溫注陳共公稱子先君未葬例在九年宋襄公稱子自在本班陳共公稱子降在鄭下陳懷公稱子而在鄭上傳無義例蓋主會所次非褒貶也音義共音恭下共公同疏正義曰陳侯款經不書葬正以稱子知其先君未葬也宋襄稱子九年葵丘會也陳共公稱子此會也陳懷公稱子定四年召陵會也其班次上下傳無義例故疑主會所次非褒貶也桓十六年公會宋公衛侯陳侯蔡侯伐鄭杜云蔡常在衛上今序陳下蓋後至二十九年翟泉之盟秦人在陳蔡之下傳歷序諸侯之卿而有秦小子憖杜云秦小子憖在蔡下者若宋向戌之後會彼二事班失其次杜以後至釋之知此陳共公稱子降在鄭下非後至者杜以後至為説亦無明文正以國之大小班序先定今乃退在小國之下因向戌有後至之譏故取以為説耳未成君者例無定式不知所由故言蓋為疑辭疑主會之意亦未必不由後至而降之禮雜記云君薨太子號稱子待猶君也然則待之如君在本班者為得禮也降其班者出自主會之意天王狩于河陽注晉地今河內有河陽縣晉實召王為其辭逆而意順故經以王狩為辭音義狩本又作守音同壬申公朝于王所注壬申十月十日有日而無月史闕文晉人執衛侯歸之于京師注稱人以執罪及民也例在成十五年諸侯不得相治故歸之京師疏正義曰成十五年晉侯執曹伯歸于京師彼不言之此言之者公羊傳曰歸之于者罪已定矣歸于者罪未定也左氏無此義正是更異辭耳衛元咺自晉復歸于衛注元咺與衛侯訟得勝而歸從國逆例者明衛侯無道于民國人與元咺諸侯遂圍許注會溫諸侯也許比再會不至故因會共伐之音義比如字王俾利反曹伯襄復歸于曹注晉感侯獳之言而復曹伯故從國逆例音義獳乃侯反疏正義曰侯獳愛君以請此曹伯從園逆之例成十六年曹人再請於晉乃釋成公而云曹伯歸自京師從外納之文者彼國人請君自是恆事此侯獳貨筮史致其誠心晉侯感其言而特釋之所以顯侯獳故從國逆例也遂會諸侯圍許注言遂得復而行不歸國也傳二十八年春晉侯將伐曹假道于衛注曹在衛東故衛人弗許還自南河濟注從汲郡南渡出衛南而東音義汲音急侵曹伐衛正月戊申取五鹿注五鹿衛地二月晉郤縠卒原軫將中軍胥臣佐下軍上德也注先軫以下軍佐超將中軍故曰上德胥臣司空季子音義將子匠反胥思徐反晉侯齊侯盟于斂盂注斂盂衛地音義斂徐音亷又力檢反盂音于衛侯請盟晉人弗許衛侯欲與楚國人不欲故出其君以説于晉衛侯出居于襄牛注襄牛衛地音義説音悅或如字公子買戍衛注晉伐衛衛楚之昏姻魯欲與楚故戍衛楚人救衛不克公懼於晉殺子叢以説焉注召子叢而殺之以謝晉音義説音悅謂楚人曰不卒戍也注謂告楚人言子叢不終戍事而歸故殺之殺子叢在楚救衛下經在上者救衛赴晚至晉侯圍曹門焉多死注攻曹城門曹人尸諸城上注磔晉死人於城上音義磔張宅反晉侯患之聽輿人之謀曰稱舍於墓注輿衆也舍墓為將發冡音義輿音餘為如字又于偽反疏正義曰此謀字或作誦涉下文而誤耳其云誦者音韻如詩賦此稱舍於墓直是計謀之言不得為誦今定本作謀師遷焉曹人凶懼注遷至曹人墓凶凶恐懼聲音義凶凶勇反恐丘勇反為其所得者棺而出之因其凶也而攻之三月丙午入曹數之以其不用僖負羈而乘軒者三百人也且曰獻狀注軒大夫車言其無德居位者多故責其功狀音義棺古患反一音官軒許言反令無入僖負羈之宮而免其族報施也注報飱璧之施音義施始豉反注同飱音孫魏犫顚頡怒曰勞之不圖報於何有注二子各有從亡之勞音義頡胡詰反從才用反疏正義曰二子有從行之勞未得厚賞故言勞苦之大不嘗圖謀其報此小惠於何有哉恨公忘己而念彼也爇僖負羈氏注爇燒也音義爇如悅反魏犫傷於胸公欲殺之而愛其材注材力使問且視之病將殺之魏犫束胸見使者曰以君之靈不有寧也注言不以病故自安寧音義見賢遍反使所吏反距躍三百曲踊三百注距躍超越也曲踊跳踊也百猶勱也音義距音巨躍羊略反三如字又息暫反百音陌下放此跳徒雕反勱音邁疏正義曰詩稱魚躍易言龍躍則躍是舉身向上之名禮記婦人踊不絶地則踊亦向上之名詩云踊躍用兵則踊躍二事勢相類也説文云躍超也踊跳也然則躍以疾生名故以距躍為超越言距地向前跳而越物過也曲踊以曲為言則謂向上跳而折復下故以曲踊為跳踊耳言直上向下而已以傷病之人而再言三百不可為六百跳也杜言百猶勵亦不知勵何所謂蓋復訓勵為勉言每跳皆勉力為之乃舍之殺顚頡以徇于師立舟之僑以為戎右注舟之僑故虢臣閔二年奔晉以代魏犫為先歸張本音義舍如字又音捨下同徇似俊反宋人使門尹般如晉師告急注門尹般宋大夫音義般音班公曰宋人告急舍之則絶注與晉絶告楚不許我欲戰矣齊秦未可若之何注未肯戰先軫曰使宋舍我而賂齊秦注求救於齊秦音義舍音捨藉之告楚注假借齊秦使為宋請音義藉在亦反借也為于偽反我執曹君而分曹衛之田以賜宋人楚愛曹衛必不許也注不許齊秦之請喜賂怒頑能無戰乎注言齊秦喜得宋賂而怒楚之頑必自戰也不可告請故曰頑公説執曹伯分曹衛之田以畀宋人楚子入居于申注申在方城內故曰入音義説音悅畀必利反使申叔去穀注二十六年申叔戍穀使子玉去宋曰無從晉師晉侯在外十九年矣而果得晉國注晉侯生十七年而亡亡十九年而反凡三十六年至此四十矣險阻艱難備嘗之矣民之情偽盡知之矣天假之年注獻公之子九人唯文公在故曰天假之年而除其害注除惠懷呂郤天之所置其可廢乎軍志曰允當則歸注無求過分軍志兵書音義當丁浪反分扶問反又曰知難而退又曰有德不可敵此三志者晉之謂矣注謂今與晉遇當用此三志疏正義曰允當則歸謂信當分理則須歸還無求過分決戰取勝也知難而退謂知前敵之難則須退辟也有德不可敵謂必知敵強不須與競也此三志者與晉相遇之謂矣劉炫云此志三云者情有淺深允當則歸謂彼雖可勝得當則還言前人弱於己也知難而退謂勝不可必早自退斂言前人與己敵也有德不可敵謂必知彼強不須與競言前人強於己也三者從弱至強總言晉之謂矣指言晉強於己也子玉使伯棼請戰注伯棼子越椒也鬬伯比之孫音義棼扶云反王扶粉反曰非敢必有功也願以間執讒慝之口注間執猶塞也讒慝若蒍賈之言謂子玉不能以三百乘入音義間間厠之間注同慝吐得反乘繩證反王怒少與之師唯西廣東宮與若敖之六卒實從之注楚子還申遣此兵以就前圍宋之衆楚有左右廣又大子有宮甲分取以給之若敖楚武王之祖父葬若敖者子玉之祖也六卒子玉宗人之兵六百人言不悉師以益之音義廣古曠反注同卒子忽反注同疏正義曰宣十二年傳欒武子説楚事云其君之戎分為二廣廣有一卒卒偏之兩是楚有左右廣也周禮車僕掌戎路之萃廣車之萃鄭玄云廣車橫陳之車襄十一年鄭人賂晉侯以廣車蓋兵車之名名之為廣因即以車表兵謂屬西廣之兵也文元年商臣以宮甲圍成王是東宮兵也周禮司馬凡制軍百人為卒知六卒六百人也子玉使宛春告於晉師曰請復衛侯而封曹臣亦釋宋之圍注衛侯未出竟曹伯見執在宋已失位故言復衛封曹音義宛於元反又於阮反竟音境子犯曰子玉無禮哉君取一臣取二注君取一以釋宋圍惠晉侯臣取二復曹衛為己功不可失矣注言可伐先軫曰子與之疏正義曰以子犯言為無理故先言子與之欲令子犯與子玉復衛封曹既言此以答子犯然後復言其不可之理更别為之立計使私許復曹衛以攜之定人之謂禮楚一言而定三國我一言而亡之我則無禮何以戰乎不許楚言是棄宋也救而棄之謂諸侯何注言將為諸侯所怪楚有三施我有三怨怨讎已多將何以戰不如私許復曹衛以攜之注私許二國使告絶于楚而後復之攜離也音義施始豉反執宛春以怒楚既戰而後圖之注須勝負決乃定計公説乃拘宛春於衛且私許復曹衛曹衛告絶於楚子玉怒從晉師晉師退軍吏曰以君辟臣辱也且楚師老矣何故退子犯曰師直為壯曲為老豈在久乎微楚之惠不及此注重耳過楚楚成王有贈送之惠音義説音悅拘音俱過古禾反退三舍辟之所以報也注一舍三十里初楚子云若反國何以報我故以退三舍為報背惠食言疏正義曰釋詁云食偽也孫炎云食言之偽尚書湯誓云爾無不信朕不食言孔安國云食盡其言偽不實也哀二十五年傳孟武伯惡郭重曰何肥也公曰是食言多矣能無肥乎然則食言者言而不行如食之消散後終不行則前言為偽通謂偽言為食言故爾雅訓食為偽也以亢其讎注亢猶當也讎謂楚也音義背音佩下及注同亢苦浪反我曲楚直其衆素飽不可謂老注直氣盈飽疏正義曰素訓為上忿怒之深空腹不食直氣盈飽也我退而楚還我將何求若其不還君退臣犯曲在彼矣退三舍楚衆欲止子玉不可夏四月戊辰晉侯宋公齊國歸父崔夭秦小子憖次于城濮注國歸父崔夭齊大夫也小子憖秦穆公子也城濮衛地音義夭於表反楚師背酅而舍注酅丘陵險阻名音義酅户圭反疏正義曰兵法右背山陵前左水澤楚師背酅而舍知其背丘陵也蓋所舍之處有丘陵名酅其處有險阻也晉侯患之聽輿人之誦注恐衆畏險故聽其歌誦曰原田每每舍其舊而新是謀注髙平曰原喻晉君美盛若原田之草每每然可以謀立新功不足念舊惠音義每亡回反又梅對反舍音捨公疑焉注疑衆謂已背舊謀新子犯曰戰也戰而捷必得諸侯若其不捷表裏山河必無害也注晉國外河而內山公曰若楚惠何欒貞子曰漢陽諸姬楚實盡之注貞子欒枝也水北曰陽姬姓之國在漢北者楚盡滅之思小惠而忘大恥不如戰也晉侯夢與楚子搏注搏手搏音義搏音博楚子伏已而盬其腦注盬喋也音義盬音古腦乃老反喋子答反又所答反又子甲反疏正義曰盬之為喋未見正訓蓋相傳為然服虔云如俗語相罵云喋女腦矣是以懼子犯曰吉我得天楚伏其罪吾且柔之矣注晉侯上向故得天楚子下向地故伏其罪腦所以柔物子犯審見事宜故權言以答夢音義向或作嚮許亮反下同子玉使鬭勃請戰注鬬勃楚大夫曰請與君之士戲君馮軾而觀之得臣與寓目焉注寓寄也音義馮皮氷反軾音式與音預寓音遇晉侯使欒枝對曰寡君聞命矣楚君之惠未之敢忘是以在此為大夫退其敢當君乎既不獲命矣注不獲止命音義為于偽反敢煩大夫謂二三子注煩鬬勃令戒勑子玉子西之屬音義令力呈反戒爾車乘敬爾君事詰朝將見注詰朝平旦音義乘繩證反下及注皆同詰起吉反朝如字注同見如字又賢遍反晉車七百乘韅靷鞅靽注五萬二千五百人在背曰韅在胸曰靷在腹曰鞅在後曰靽言駕乘修備音義韅許見反王又去見反説文作云著掖皮靷引刃反説文云軸也鞅於杖反説文云頸皮也靽音半一云縶也背如字疏正義曰説文云韅著掖皮也靷𢎞軸也鞅頸皮也此注與説文不同蓋以時驗而為解也驂馬挽車有皮在背者有約胸者有在腹為帶者有縶絆其足者從馬上而下次之在後正謂在足是也傳唯舉四事文無所結舉其小事皆具言其駕乘修備明諸事皆備也晉侯登有莘之虛以觀師曰少長有禮其可用也注有莘故國名少長猶言大小音義莘所巾反虛丘魚反少詩照反注同長丁丈反注同遂伐其木以益其兵注伐木以益攻戰之具輿曳柴亦是也音義攻如字又音貢己巳晉師陳于莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒將中軍曰今日必無晉矣子西將左子上將右注子西鬬宜申子上鬬勃音義陳于直覲反卒子忽反下同將子匠反下及注同胥臣蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰注陳蔡屬楚右師音義潰户內反狐毛設二斾而退之注斾大旗也又建二斾而退使若大將稍郤音義斾薄貝反欒枝使輿曵柴而偽遁注曵柴起塵詐為衆走音義遁徒困反楚師馳之原軫郤溱以中軍公族橫擊之注公族公所率之軍狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止故不敗注三軍唯中軍完是大崩音義夾古洽反又音頰晉師三日館穀注館舍也食楚軍穀三日及癸酉而還甲午至于衡雍作王宮于踐土注衡雍鄭地今榮陽卷縣襄王聞晉戰勝自往勞之故為作宮音義雍於用反卷音權又丘權反勞力報反故為于偽反下文同鄉役之三月注鄉猶屬也城濮役之前三月音義鄉許亮反又作嚮同屬音燭鄭伯如楚致其師為楚師既敗而懼疏正義曰致其師者致其鄭國之師許以佐楚也戰時雖無鄭師要本心佐楚故既敗而懼使子人九行成于晉注子人氏九名音義為于偽反疏正義曰桓十四年鄭伯使其弟語來盟傳稱子人來盟杜云子人即弟語也其後為子人氏七年傳子華云泄氏孔氏子人氏三族實違君命今子人九必是語之後也杜譜以九為雜人謬矣晉欒枝入盟鄭伯五月丙午晉侯及鄭伯盟于衡雍疏正義曰此二盟及上文晉侯齊侯盟于斂盂皆不書者皆不告也丁未獻楚俘于王駟介百乘徒兵千注駟介四馬被甲徒兵步卒音義駟音四介音界被皮義反卒子忽反鄭伯傅王用平禮也注傅相也以周平王享晉文侯仇之禮享晉侯音義相息亮反己酉王享醴命晉侯侑注既饗又命晉侯助以束帛以將厚意王命尹氏及王子虎內史叔興父䇿命晉侯為侯伯注以䇿書命晉侯為伯也周禮九命作伯尹氏王子虎皆王卿士也叔興父大夫也三官命之以寵晉疏正義曰周語稱晉文公初立襄王使大宰文公及內史叔興賜文公命注國語者皆以為大宰文公即王子虎也今尹氏又在王子虎之上故以為皆卿士唯叔興是大夫或云皆大夫皆字妄耳九命者大宗伯云一命受職再命受服三命受位四命受器五命賜則六命賜官七命賜國八命作牧九命作伯賜之大輅之服戎輅之服注大輅金輅戎輅戎車二輅各有服音義輅音路疏正義曰周禮巾車金路鉤樊纓九就建大旗以賓同姓以封革路龍勒條纓五就建大白以即戎金路以封同姓知大輅是金輅也革路以即戎言戎輅戎車即周禮之革路二輅各有服者周禮司服侯伯之服自鷩冤而下凡兵事韋辨服金輅祭祀所乘其大輅之服當謂鷩冤之服戎輅之服當謂韋辨服也彤弓一彤矢百玈弓矢千注彤赤弓玈黑弓弓一矢百則矢千弓十矣諸侯賜弓矢然後專征伐音義彤徒冬反玈音盧本或作旅字非也矢千本或作玈弓十玈矢千後人專輒加也疏正義曰彤赤玈黑舊説皆然説文彤從丹玈從玄是赤黑之别也周禮司弓矢掌六弓王弓弧弓以授射甲革椹質者夾弓庾弓以授射犴侯鳥獸者唐弓大弓以授學射者使者勞者鄭玄云勞者勤勞王事若晉文侯文公受王弓矢之賜者考工記弓人云往體多來體寡謂之夾庾之屬往體寡來體多謂之王弓之屬往體來體若一謂之唐弓之屬然則唐大是弓強弱之名彤玈是弓所漆之色王弧則合九而成規唐大合七而成規夾庾合五而成規司弓矢又有八矢枉矢潔矢利火射用諸守城車戰殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射恆矢痺矢用諸散射鄭注約考工記云枉矢之屬五分二在前三在後殺矢之屬三分一在前二在後矰矢之屬七分三在前四在後恆矢之屬軒輖中其枉殺矰恆弓所用潔鍭茀痺弩所用彼司弓矢既云枉矢潔矢用諸守城車戰此天子賜諸侯弓矢使用之以戰則彤矢玈矢當彼枉矢也但弓矢相配強弓用重矢弱弓用輕矢既唐弓大弓強弱中其恆矢軒輖亦中又司弓矢云恆矢痺矢用諸散射鄭玄云散射謂禮射及習射也此賜弓矢則禮樂之事彤矢玈矢或當恆矢也玈弓矢千具於彤而略於玈準之則矢千弓十也諸侯賜弓矢然後專征伐王制文秬鬯一卣注秬黑黍鬯香酒所以降神卣器名音義秬音巨鬯勑亮反卣音酉又音由爾雅云卣中尊也疏正義曰秬黑黍釋草云李巡云黑黍一名秬黍周禮鬯人掌共秬鬯而飾之鄭玄云鬯釀秬為酒芬香條暢於上下也鬱人掌祼器凡祭祀之祼事和鬱鬯以實彞而陳之禮祭祀必先祼是用之以降神也釋器云彞卣罍器也李巡曰卣鬯之樽也孫炎曰樽彞為上罍為下卣居中也詩江溪篇述宣王賜召穆公云秬鬯一卣告于文人鄭箋云賜之使祭其宗廟告其先祖也當賜之時實之于卣其祭則陳之於彞也虎賁三百人疏正義曰國語云天子有虎賁習武訓諸侯有旅賁禦災害大夫有二車備承事士有陪乘告奔走周禮司馬之屬虎賁氏下大夫二人虎士八百人掌先後王而趨以卒伍軍旅會同亦如之舍則守王間曰王謂叔父敬服王命以綏四國糾逖王慝注逖遠也有惡於王者糾而遠之音義賁音奔逖勑歷反慝他得反惡也疏正義曰逖遠釋詁文糾者繩治之名有惡於王者當繩治之而使逺於王也晉侯三辭從命曰重耳敢再拜稽首奉揚天子之丕顯休命注稽首首至地丕大也休美也音義三息暫反又如字從例放此丕普悲反休許虯反注同受䇿以出出入三覲注出入猶去來也從來至去凡三見王音義見賢遍反衛侯聞楚師敗懼出奔楚遂適陳注自襄牛出使元咺奉叔武以受盟注奉使攝君事音義使攝君事並如字或讀連上奉字為句使音所吏反非也癸亥王子虎盟諸侯于王庭注踐土宮之庭書踐土别於京師音義别彼列反要言曰皆奬王室無相害也有渝此盟明神殛之俾隊其師無克祚國注奬助也渝變也殛誅也俾使也隊隕也克能也音義奬將丈反渝羊朱反殛紀力反本亦作極下是殛同俾本亦作卑必爾反隊直類反祚才故反隕于敏反疏正義曰勸奬者佐助之意故為助也餘皆釋言文注及其玄孫無有老幼君子謂是盟也信注合義信謂晉於是役也能以德攻注以文德教民而後用之音義攻如字一音公送反初楚子玉自為瓊辨玉纓未之服也注辨以鹿子皮為之瓊玉之别名次之以飾辨及纓詩云會辨如星音義瓊求營反説文云赤玉辨本又作玣皮彥反會本又作璯古外反又户外反疏正義曰禮稱皮辨明其用皮也知以鹿子皮者相傳為然至今仍用之詩毛傳云瓊玉之美者則瓊亦玉也選美者飾辨以惡者飾纓耳周禮辨師掌王之皮辨會五采玉璂鄭玄云會縫中也璂讀如綦綦結也皮辨之縫中每貫結五采玉以為飾謂之綦又諸侯及孤卿大夫之皮辨各以其等為之鄭玄云孤則璂飾四三命之卿璂飾三再命之大夫璂飾二是諸侯之臣其皮辨得以玉為飾也辨師又云王五采諸侯三采鄭玄云王璂飾十二上公九諸伯七子男五卿大夫皆二采璂飾各如其命數鄭又云三采朱白蒼二米朱緣其纓之飾則無以言之蓋以玉飾纓之末耳詩云會辨如星衛風淇澳篇也鄭箋云會謂辨之縫中飾之以玉皪皪而處狀似星也先戰夢河神謂己曰畀余余賜女孟諸之麋注孟諸宋藪澤水草之交曰麋音義先如字又悉薦反畀必利反與也女音汝麋亡皮反藪素口反疏正義曰釋地云十藪宋有孟諸郭璞云今在梁國睢陽縣東北周禮職方氏正東曰青州其澤藪曰望諸禹貢豫州導菏澤被孟豬明皆是一物而字改易耳釋水云水草交為眉李巡曰水中有草木交會曰湄古字皆得通用故此作麋耳弗致也大心與子西使榮黃諫注大心子玉之子子西子玉之族子玉剛愎故因榮黃榮黃榮季也音義愎皮逼反弗聽榮季曰死而利國猶或為之况瓊玉乎是糞土也而可以濟師將何愛焉注因神之欲以附百姓之願濟師之理音義糞弗問反疏正義曰劉炫云神道冥昧與人不交楚師之敗未必由此但於時戰在河旁河神許助若子玉從神所求不惜瓊玉則國人以為神得所欲必將助己自當三軍用命戰士爭先亦既不遂神心人謂神必不助則衆意皆阻莫不畏敵且兵凶戰危必有傷殺三軍之命在茲一舉猶尚愛惜此物是無恤民之心在軍之士誰肯競勸故云因神之欲以附百姓之願是濟師之理也禆竈請用瓘斚禳火非神所求若從而與之則驚動民意且災不可免徒長妖妄故子産不與異於此也弗聽出告二子曰非神敗令尹令尹其不勤民實自敗也注盡心盡力無所愛惜為勤音義盡並津忍反既敗王使謂之曰大夫若入其若申息之老何注申息二邑子弟皆從子玉而死言何以見其父老音義從如字又才用反子西孫伯曰得臣將死二臣止之曰君其將以為戮注孫伯即大心子玉子也二子以此答王使言欲令子玉往就君戮音義使所吏反下前使同令力呈反及連穀而死注至連穀王無赦命故自殺也文十年傳曰城濮之役王使止子玉曰無死不及子西亦自殺縊而縣絶故得不死王時别遣追前使連榖楚地殺得臣經在踐土盟上傳在下者説晉事畢而次及楚屬文之宜音義榖胡木反縊一賜反又於計反縣音玄屬音燭晉侯聞之而後喜可知也注喜見於顔色音義見賢遍反曰莫余毒也已蒍呂臣實為令尹奉己而已不在民矣注言其自守無大志或訴元咺於衛侯曰立叔武矣其子角從公公使殺之注角元咺子音義從才用反又如字咺不廢命奉夷叔以入守注夷諡音義守手又反疏正義曰諡法安民好靖曰夷六月晉人復衛侯注以叔武受盟於踐土故聽衛侯歸音義聽吐丁反寧武子與衛人盟于宛濮注武子寧俞也陳留長垣縣西南有宛亭近濮水音義宛於阮反俞羊朱反近附近之近曰天禍衛國君臣不協以及此憂也注衛侯欲與楚國人不欲故不和也今天誘其衷注衷中也音義衷音忠或丁仲反下同使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉注牛曰牧馬曰圉音義扞户旦反牧音木養牛曰牧養馬曰圉不協之故用昭乞盟于爾大神以誘天衷自今日以往既盟之後行者無保其力居者無懼其罪有渝此盟以相及也注以惡相及明神先君是糾是殛國人聞此盟也而後不二注傳言叔武之賢寧俞之忠衛侯所以書復歸衛侯先期入注不信叔武音義先悉薦反寧子先長牂守門以為使也與之乘而入注長牂衛大夫寧子患公之欲速故先入欲安喻國人音義牂子郎反使所吏反公子歂犬華仲前驅注衛侯遂驅掩寧子未備二子衛大夫音義歂市專反華户花反又如字叔武將沐聞公至喜捉髮走出前驅射而殺之公知其無罪也枕之股而哭之注公以叔武尸枕其股音義射食亦反下注同枕支鴆反注同歂犬走出注手射叔武故公使殺之元咺出奔晉注元咺以衛侯驅入殺叔武故至晉訴之城濮之戰晉中軍風于澤注牛馬因風而走皆失之疏正義曰劉炫規過為以放牛馬於澤遺失大斾左旃不失牛馬今則定知不然者若不失牛馬唯亡左旃罪未至重何須殺之以徇馬牛是軍之要用於事尤重故費誓云馬牛其風臣妾逋逃則有常刑今既亡左旃又失牛馬為罪至重故殺之以徇若牛馬不失又大斾在軍何得因放牛馬而亡左旃故知風于澤者為别失牛馬又於軍中亡失大斾之左旃故杜云掌此二事而不修理劉以為不失牛馬而規杜過非也亡大斾之左旃注大斾旗名繫旐曰斾通帛曰旃音義旃章然反爾雅云因章曰旃疏正義曰釋天云緇廣充幅長尋曰旐繼旐曰斾則斾是旗之尾也今别名大斾則此斾有異於常故以大斾為旗名上云狐毛設二斾而退之亦此類也通帛為旜周禮司常文也鄭玄云通帛謂大赤從周正色無飾釋天云因章曰旃孫炎曰因其繪色以為旗章不畫之是也謂之左旃蓋是左軍所建者此亦於事難明不可強説祁瞞姦命注掌此二事而不修為姦軍令音義瞞莫于反姦音干司馬殺之以徇于諸侯使茅茷代之師還壬午濟河舟之僑先歸士會攝右注權代舟之僑也士會隨武子士薦之孫音義茷扶廢反僑其驕反秋七月丙申振旅愷以入于晉注愷樂也音義愷開在反樂音洛疏正義曰大司馬云若師有功則左執律右秉鉞以先愷樂獻于社注云律所以聽軍聲鉞所以為將威兵樂曰愷司馬注曰得意則愷樂愷歌示喜也獻俘授馘飲至大賞注授數也獻楚俘於廟音義馘古獲反數色主反徴會討二注徴召諸侯將冬會于溫殺舟之僑以徇于國民於是大服君子謂文公其能刑矣三罪而民服注三罪顚頡祁瞞舟之僑詩云惠此中國以綏四方不失賞刑之謂也注詩大雅言賞刑不失則中國受惠四方安靖冬會于溫討不服也注討衛許衛侯與元咺訟注爭殺叔武事寧武子為輔針莊子為坐士榮為大士注大士治獄官也周禮命夫命婦不躬坐獄訟元咺又不宜與其君對坐故使針莊子為主又使衛之忠臣及其獄官質正元咺傳曰王叔之宰與伯輿之大夫坐獄於王庭各不身親蓋今長吏有罪先驗吏卒之義音義針其亷反坐如字或一音才臥反長丁丈反卒子忽反疏正義曰周禮獄官多以士為名鄭玄云士察也主察獄訟之事者周禮命夫命婦不躬坐獄訟小司寇職文也鄭玄云為治獄吏褻尊者也躬身也不身坐必使其屬若子弟也喪服傳曰命夫者其男子之為大夫者命婦者其婦人之為大夫妻者凡斷獄訟皆令競者坐而受其辭故云不躬坐也大司寇云以兩造禁民訟以兩劑禁民獄鄭玄云訟謂以財貨相告者獄謂相告以罪名者對文則小别散則可以通獄訟皆爭罪之事也元咺不宜與君對坐故使針莊子代衛侯為坐獄之主寧子為輔輔莊子也以寧子位高故先言之士榮亦輔莊子舉其官名以其主獄事故亦使輔之與晉之獄官對理質正元咺也所引傳曰在襄十年衛侯不勝注三子辭屈殺士榮刖針莊子謂寧俞忠而免之執衛侯歸之于京師置諸深室注深室别為囚室音義刖音月又五割反置之䜴反寧子職納橐饘焉注寧俞以君在幽隘故親以衣食為己職橐衣囊饘糜也言其忠至所慮者深音義橐音託饘之然反隘於賣反囊乃郎反糜亡皮反疏正義曰寧俞親以衣食為己職者慮君飢渴且防鴆毒也詩毛傳曰小曰橐大曰囊囊橐所以盛衣亦可以盛食宣二年傳曰為之簞食與肉置諸橐以與之是也釋言曰糊饘也鬻糜也郭璞曰饘糜也孫炎曰鬻淖糜也然則糜之與鬻稠淖之異名耳元咺歸于衛立公子瑕注瑕衛公子適也音義適下歷反是會也晉侯召王以諸侯見且使王狩注晉侯大合諸侯而欲尊事天子以為名義自嫌強大不敢朝周喻王出狩因得盡羣臣之禮皆譎而不正之事音義見賢遍反疏正義曰晉侯本意止欲大合諸侯之師共尊事天子以為臣之名義實無覬覦之心但於時周室既衰天子微弱忽然帥九國之師將數十萬衆入京師以臨天子似有篡奪之謀恐為天子拒逆或復天子怖懼棄位出奔則晉侯心實盡誠無辭可解故自嫌強大不敢朝王故召諸侯來會于溫溫去京師路近因加諷諭令王就會受朝天子不可以受朝為辭故令假稱出狩若言王自出狩諸侯因會遇王遂共朝王得盡君臣之禮皆孔子所謂譎而不正之事榖梁傳曰全天王之行也為若將狩而遇諸侯之朝也為天王諱也是使王狩之意也公羊以為踐土與此皆是晉侯召王何休云時晉文公年老恐霸功不成故上白天子曰諸侯不可卒致願王居踐土下謂諸侯曰天子在是不可不朝迫使正君臣明王法案溫去京師路無百里晉侯已能致之於溫何故不能致之於洛何休妄造其辭事非晉侯之意故杜氏正之自嫌強大不敢朝周耳仲尼曰以臣召君不可以訓故書曰天王狩于河陽言非其地也注使若天王自狩以失地故書河陽實以屬晉非王狩地疏正義曰此傳稱仲尼之語即云書曰明是仲尼新意非舊文也杜以書曰為仲尼新意亦以此而知之聖人作法所以貽訓後世以臣召君不可以為教訓故改正舊史舊史當依實而書言晉侯召王且使王狩仲尼書曰天王狩于河陽言天王自來狩獵于河陽之地使若獵失其地故書之以譏王然釋例曰天子諸侯田獵皆於其封內不越國而取諸人河陽實以屬晉非王狩所故言非其地且明德也義在隱其召君之闕是説改史之意也計天王之狩失地不書因此實非王地借之以改舊史若譏王狩然實不譏王也榖梁傳曰水北為陽山南為陽溫河陽也會于溫言小諸侯以河陽言之大天子也然河陽與溫止是一地天子來就諸侯假辭以稱狩耳左氏無此義但會指所在之地故言溫狩是田獵之所故廣言其地蘇氏云明晉侯之德沒其召君書天子之狩顯其失地便是褒諸侯貶天子所以然者此亦假其失地之文欲明王狩所在非實貶也若隱其召君則全沒不書於義為可必書天王非地之狩者若全沒其文無以明晉侯尊崇天子之德故書天子出狩諸侯往朝且明德也注隱其召君之闕欲以明晉之功德河陽之狩趙盾之弒泄冶之罪皆違凡變例以起大義危疑之理故特稱仲尼以明之音義弒音試泄息列反冶音也危疑如字一本音作佹九委反疏正義曰晉侯所以召王志在尊崇天子故解舊史隱其召君之闕以明晉侯之功德功德謂尊事天子是也丘明為傳所以寫仲尼之意凡所改易皆是仲尼而於河陽之狩趙盾之弒泄冶之罪此三事特稱仲尼曰者史策所書皆書實事晉侯召王使狩而作自狩之文是言不實也凡例弒君稱君君無道靈公不君而稱臣以弒似君無過也大夫無罪見殺不書其名泄冶忠諫而被殺書名乃罪合死也此三事皆違凡典變舊例以起大義危疑之理恐人不信須聖言以為證故特稱仲尼以明之壬申公朝于王所注執衛侯經在朝王下傳在上者告執晚疏正義曰傳之上下例不虛舉經文此虛舉經者終上晉侯召王以諸侯見之事丁丑諸侯圍許注十月十五日有日無月晉侯有疾曹伯之豎侯獳貨筮史注豎掌通內外者史晉史使曰以曹為解注以滅曹為解故音義解户買反注同又古買反齊桓公為會而封異姓注封郉衛今君為會而滅同姓曹叔振鐸文之昭也注叔振鐸曹始封君文王之子音義鐸待洛反先君唐叔武之穆也且合諸侯而滅兄弟非禮也與衛偕命注私許復曹衛而不與偕復非信也同罪異罰非刑也注衛已復故禮以行義信以守禮刑以正邪舍此三者君將若之何公説復曹伯遂會諸侯于許晉侯作三行以禦狄荀林父將中行屠擊將右行先蔑將左行注晉置上中下三軍今復增置三行以辟天子六軍之名三行無佐疑大夫帥音義邪似嗟反舍音捨説音悅行户郎反下及注同將子匠反屠音徒擊古狄反又音計蔑亡結反復扶又反春秋左傳注疏卷十五春秋左氏傳注疏卷十五考證宋蕩伯姬來逆婦疏以蕩為氏則此人字蕩也臣照按此人字蕩或謂字應作氏今考衆仲對隱公問云天子建德因生以賜姓胙之土而命之氏諸侯以字為諡因以為族今宋桓公生公子蕩蕩生公孫壽壽生蕩意諸後遂以蕩為氏則是蕩乃公子蕩之字蓋以字行蕩非名也孫以祖字為氏即所為諸侯以字也故孔氏曰以蕩為氏則此人字蕩楚人圍陳納頓子于頓注不言遂明一事也明監本訛作時今改正傳繼文之業注晉文侯仇為平王侯伯匡輔周室監本誤刋在于今為可矣句下今改正傳遇公用享于天子之卦注故能為王所宴饗臣召南按周易作公用亨于天子王弼注讀如字以通解之曰公用斯位乃得通乎天子之道也先儒多依其説惟朱子本義據此傳作享曰謂朝獻也蓋古字亨通之亨享獻之享烹飪之烹皆作亨也傳右師圍溫左師逆王臣召南按晉武公初滅翼王命以一軍為晉侯至獻公始作上下二軍惠公因之與秦戰韓時公與韓簡分將其一至文公初猶是兩軍此左師右師是也至二十七年搜被廬始作三軍傳晉於是始啓南陽趙汸補注曰傳見晉文以功取畿內地至王室益弱臣召南按周之東也晉鄭是依其弱也亦以晉鄭而晉為尤甚陽樊溫原攢茅之田桓王嘗以畀鄭至此又以賞晉畿內所餘曾復幾何觀于盟向之求成陽樊之不服知周民猶戴王室而強侯之跋扈等于攘奪也傳齊侯曰室如縣罄注如而也疏劉炫云如罄在縣下無粟帛臣浩按劉説勝杜傳凡師能左右之曰以趙匡曰齊桓晉文用諸侯師悉能左右之何不曰以凡不用我師而用彼師曰以也臣照按孟子譏五霸摟諸侯以伐諸侯然則師能左右之者即摟也諸侯不奉王命而左右于諸侯正王綱之不振也公以楚師伐齊譏也若五伯之會諸侯直書之而美惡不相掩則不必書以且內外異辭以者內辭也傳命趙衰為卿讓于欒枝先軫臣召南按晉語趙衰辭曰欒枝貞慎先軫有謀胥臣多聞皆可為輔佐臣勿若也疏于狐偃讓狐毛引晉語于此獨遺晉侯侵曹晉侯伐衛臣浩按注以曹衛兩來告故兩書晉侯其實不然呂祖謙曰侵曹伐衛兩事也既侵曹矣又伐衛也事與齊桓之侵蔡遂伐楚不同公朝子王所注王在踐土非京師故曰王所劉敞曰踐土之會天子自往也自往雖微而猶可言河陽之會臣召君不可以訓故書狩焉天王狩于河陽孫覺曰齊桓之興始致世子晉文之霸遂召天王臣召南按河陽即溫也變文言河陽此聖筆也傳而乘軒者三百人也臣召南按史記晉世家曰用美女乘軒者三百人也妄加用美女三字此史遷之謬又按詩曹風候人刺曹共公近小人也彼其之子三百赤芾疏引此傳乘軒者三百人為證甚確傳晉侯在外十九年矣注至此四十矣臣召南按杜此注所以駁正史記之謬也晉世家謂重耳年十七有賢士五人獻公即位重耳年二十一奔狄時年四十三出亡凡十九歲而得入時年六十二矣杜故顯言以别之傳我曲楚直其衆素飽疏素訓為上臣浩按注云直氣盈飽則此句應作素訓為直傳晉師陳于莘北林堯叟曰莘北即城濮傳至于衡雍作王宮于踐土注衡雍鄭地今榮陽卷縣襄王聞晉戰勝自往勞之故為作宮臣召南按史記集解引服虔曰既敗楚師襄王自往臨踐土賜命晉侯晉侯聞而為之作宮此杜注用服義也傳使子人九行成于晉疏泄氏孔氏子人氏泄監本訛作泄今改正傳受䇿以出出入三覲臣召南按史記晉世家用此傳又忽誤以尚書文侯之命為襄王命文公其疏如此傳楚子玉自為瓊辨玉纓注辨以鹿子皮為之子監本訛作孟今改正傳晉侯作三行注以辟天子六軍之名臣召南按史記集解引服虔曰辟天子六軍故謂之三行是杜用服義春秋左氏傳注疏卷十五考證
