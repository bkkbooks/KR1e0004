body:
  text: 春秋左傳注疏卷二十起文公十六年盡十八年晉杜氏注唐陸德明音義孔頴達疏經十有六年春季孫行父會齊侯于陽榖齊侯弗及盟注及與也夏五月公四不視朔注諸侯每月必告朔聽政因朝於廟今公以疾闕不得視二月三月四月五月朔也春秋十二公以疾不視朔非一也義無所取故特舉此以表行事因明公之實有疾非詐齊疏正義曰天子頒朔於諸侯諸侯受而藏之於祖廟每月之朔以特羊告廟受而施行之遂聽冶此月之政謂之視朔因以其日又以朝享之禮祭皇考以下謂之朝廟此年公疾自二月至於五月已經四月不得視朔故書公四不視朔傳稱正月及齊平公有疾使季文子㑹齊侯則正月公初疾不得視二月朔至五月而四故知不得視二月三月四月五月朔也春秋十二公二百四十二年計有三千餘月公以疾不視朔當非一也餘皆不書而此獨書者公身有疾不得視朔國事不廢義無所取因此齊侯疑公故特舉此以表行事餘皆從可知也釋例曰魯之羣公以疾不視朔多矣因有事而見一此猶釋不朝正之義是其事也又於時齊侯不信公實有疾書此者且明公實有疾非詐齊也史之所書當書其始不於二月書之而以五月書者二月公始有疾未知來月瘳否不得豫書其數王六月公瘳乃積前數之闕故以五月書四也昭二十三年公如晉至河有疾乃復彼書有疾此不言有疾者在道而還容有他故昭十二年十三年公如晉至河乃復皆為晉人辭公而還非為疾也故須書有疾以辨之公不視朔惟有疾耳無所分辨故不書疾也告朔謂告於祖廟視朔謂聽治月政視朔由公疾而廢其告朔或有司告之不必廢也論語云子貢欲去告朔之餼羊必是廢其禮而羊在蓋從是以後更有不告朔者故欲去其羊耳六年閏月不告月書經以譏之在後若不告朔不復書之者蓋以閏月不告其譏已明故於後不復譏之閔二年吉禘于莊公已譏其速文二年大事于大廟不復譏之當亦如彼之類不重譏也六月戊辰公子遂及齊侯盟于郪丘注信公疾且以賂故郪丘齊地音義郪音西又七西反秋八月辛未夫人姜氏薨注僖公夫人文公母也毁泉臺注泉臺臺名毁壞之也音義壞音怪楚人秦人巴人滅庸音義巴必麻反冬十有一月宋人弒其君杵臼注稱君君無道也例在宣四年音義杵昌呂反臼强栁反傳十六年春王正月及齊平注齊前年再伐魯魯為受弱故平音義為于僞反公有疾使季文子會齊侯于陽榖請盟齊侯不肯曰請俟君間注間疾瘳音義間如字瘳敕周反差也夏五月公四不視朔疾也公使襄仲納賂于齊侯故盟于郪丘有蛇自泉宫出入于國如先君之數注伯禽至僖公十七君音義伯禽至僖公十七君史記魯世家魯公伯禽子考公酋弟焬公熙子幽公宰弟魏公沸子厲公擢弟獻公具子真公濞弟武公敖子懿公戲弟孝公稱子惠公弗皇子隱公息姑弟桓公允子莊公同子閔公開兄僖公申十七也魏公世本作徽公真公一作愼公疏正義曰魯世家魯公伯禽子考公酋弟焬公熙子幽公宰弟魏公沸子厲公擢弟獻公具子真公濞弟武公敖子懿公戲弟孝公稱子惠公弗皇子隱公息姑弟桓公允子莊公同子閔公開兄僖公申周公不之魯從魯公數之為十七君也秋八月辛未聲姜薨毁泉臺注魯公以為蛇妖所出而聲姜薨故壞之音義壞音怪疏正義曰蛇自宫出而毁其臺則臺在宫內人見從宫而出毁臺並毁其宫也注正義曰人見蛇出而姜薨以為臺是妖之穴仍謂此處有妖更將為害毁之所以絶其源安民意也故釋例曰衆蛇自泉臺出如先君之數入於國聲姜之薨適與妖㑹而國以為災遂毁泉臺書毁而不變文以示義曰君人之心一國之俗須此為安故不譏也以不變文知不譏也不書蛇入國者鸜鵒非魯國之有故書其所無蛇是魯地所有姜薨不由此蛇凡物不為災則不書也楚大饑戎伐其西南至于阜山師于大林又伐其東南至于陽丘以侵訾枝注戎山夷也大林陽丘訾枝皆楚邑音義饑音飢一音機訾子斯反疏正義曰四夷之名隨方定稱則曰東夷西戎南蠻北狄其當處立名則各從方號故北戎病燕齊侯伐山戎北方得有戎故楚西亦有戎戎是山間之民夷為四方總號故云戎山夷也庸人帥羣蠻以叛楚注庸今上庸縣屬楚之小國麇人率百濮聚於選將伐楚注選楚地百濮夷也音義麇九倫反濮音卜選息兖反又息戀反疏正義曰將欲伐楚聚於此地故知是楚地也牧誓武王伐紂有庸濮從之孔安國云庸濮在江漢之南是濮為西南夷也釋例曰建寧郡南有濮夷濮夷無君長總統各以邑落自聚故稱百濮也下云各走其邑是無君長統之於是申息之北門不啓注備中國疏正義曰申息北接中國有寇比從北來故二邑北門不敢開也楚人謀徙於阪髙注楚險地音義阪音反一音扶板反蒍賈曰不可我能往寇亦能往不如伐庸夫麇興百濮謂我饑不能師故伐我也若我出師必懼而歸百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷注濮夷無屯聚見難則散歸音義蒍于委反屯徒門反聚才住反又如字難乃旦反又如字自廬以往振廪同食注往往伐庸也振發也廪倉也同食上下無異饌也音義廬力於反又音盧廪力甚反次于句澨注楚西界地音義句古侯反澨市世反使廬戢梨侵庸注戢梨廬大夫及庸方城注方城庸地上庸縣東有方城亭庸人逐之囚子揚窗注窗戢梨官屬音義窗初江反三宿而逸曰庸師衆羣蠻聚焉不如復大師注還復句澨師且起王卒合而後進師叔曰不可注師叔楚大夫潘尫也音義卒子忽反尫烏黃反姑又與之遇以驕之彼驕我怒而後可克先君蚡冒所以服陘隰也注蚡冒楚武王父陘隰地名音義可克或作可擊蚡扶粉反冒莫報反史記楚世家云蚡冒卒弟熊達殺蚡冒子而代立是為楚武王與杜異陘音刑隰音習疏正義曰劉炫云按楚世家蚡冒卒弟熊達殺蚡冒子而代立是為楚武王則蚡冒是兄不得為父今知不然者以世家之文多有紕繆與經傳異者非是一條杜氏非不見其文但見而不用耳劉以世家而規杜非也言服陘隰則陘隰本是他國蚡冒始服之也釋例陘隰與僖四年次于陘為一地頴川召陵縣南有陘亭楚自武王始居江漢之間則蚡冒之時未至中土不應已能越申息服潁川之邑疑非也又與之遇七遇皆北注軍走曰北音義北如字一音佩唯裨鯈魚人實逐之注裨鯈魚庸三邑魚魚復縣今巴東永安縣輕楚故但使三邑人逐之音義裨婢支反鯈直留反庸人曰楚不足與戰矣遂不設備楚子乘驛會師于臨品注驛傳車也臨品地名音義驛人實反傳丁戀反疏正義曰釋言云驛傳也舍人曰驛尊者之傳也郭璞曰傳車驛馬之名也分為二隊注隊部也兩道攻之音義隊徒對反注同子越自石溪子貝自仞以伐庸注子越鬭椒也石溪仞入庸道音義溪苦兮反本又作溪貝浦蓋反今俗本多作員音云仭人愼反秦人巴人從楚師羣蠻從楚子盟注蠻見楚强故遂滅庸注傳言楚有謀臣所以興宋公子鮑禮於國人注鮑昭公庶弟文公也音義鮑步卯反宋饑竭其粟而貸之年自七十以上無不饋詒也時加羞珍異注羞進也音義上時掌反饋其愧反詒以支反又以志反遺也無日不數於六卿之門注數不疏音義數音朔注坰國之材人無不事也注有賢材者親自桓以下無不恤也注桓鮑之曾祖疏正義曰禮於國人總言接待之也竭其粟而貸與國之饑民也禮與人物曰饋詒遺也饋詒皆是與人物之名也民年七十以上無有不饋遺以飲食也珍異謂非常美食羞進也時加進珍異者謂四時初出珍異之物也無有一日不數數於六卿之門言參請不絶也國之賢材之人無不事公子皆事之也其族親自桓公以下子孫無不恤公子皆賑恤之也公子鮑美而豔襄夫人欲通之注鮑適祖母音義豔以驗反適丁歷反而不可注以禮防間夫人助之施昭公無道國人奉公子鮑以因夫人於是華元為右師注華元督曾孫代公子成音義施式䜴反疏正義曰世本云華督生世子家家生華孫御事事生華元右師是也公孫友為左師華耦為司馬注代公子卬鱗鱹為司徒蕩意諸為司城公子朝為司寇注代華御事音義鱹古亂反朝如字初司城蕩卒公孫壽辭司城注壽蕩之子請使意諸為之注意諸壽之子既而告人曰君無道吾官近懼及焉注禍及己棄官則族無所庇子身之二也姑紓死焉注姑且也紓緩也音義庇必利反又悲位反紓音舒雖亡子猶不亡族注已在故也既夫人將使公田孟諸而殺之公知之盡以寶行蕩意諸曰盍適諸侯公曰不能其大夫至于君祖母以及國人注君祖母諸侯祖母之稱謂襄夫人音義盍户臘反稱尺證反疏正義曰襄十六年傳蒯瞶告周云蒯瞶得罪于君父君母謂母為君母則祖母為君祖母矣故云君祖母者諸侯祖母之稱也昭公成公之子襄公之孫故襄夫人是其祖母也諸侯誰納我且既為人君而又為人臣不如死盡以其寶賜左右以使行注行去也夫人使謂司城去公對曰臣之而逃其難若後君何注言無以事後君音義難乃旦反冬十一月甲寅宋昭公將田孟諸未至夫人王姬使帥甸攻而殺之注襄夫人周襄王妹故稱王姬帥甸郊甸之帥音義甸徒遍反疏正義曰周禮載師云以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任疆地凡任地近郊十一逺郊二十而三甸稍縣都皆無過十二彼從國都而出計逺近節級而别為之名鄭元引司馬法王國百里為郊二百里為州甸三百里為野稍四百里為縣五百里為都諸侯之與天子竟雖不同亦當近國為郊郊外為甸天子之甸為公邑之田則諸侯之甸亦公邑也帥甸者甸地之帥當是公邑之大夫也獨言帥甸無以相明故舉類言之云郊甸之帥其實正是甸地之帥非郊地之帥也蕩意諸死之注不書不告書曰宋人弒其君杵臼君無道也注始例發於臣之罪今稱國人故重明君罪音義重直用反疏正義曰宣四年傳例曰凡弒君稱君君無道也稱臣臣之罪也彼是弒君大例經下注云例在宣四年指彼例也彼雖在此之後乃是例之初始故謂彼為始例彼因歸生弒君而發傳例是始例發於臣之罪也此稱宋人弒其君文異於彼故重明君罪謂與彼例為重也釋例曰鄭靈宋昭文異而例同重發以同之文公即位使母弟須為司城注代意諸華耦卒而使蕩虺為司馬注虺意諸之弟音義虺况鬼反經十有七年春晉人衛人陳人鄭人伐宋注自閔僖以下終於春秋陳侯常在衛侯上今大夫會在衛下傳不言陳公孫寧後至則寧位非上卿故也疏正義曰釋例班序譜自隱至莊十四年四十三歲衛與陳凡四會衛在陳上莊十五年盡僖十七年三十五歲凡八會陳在衛上莊十六年幽盟之下注云齊桓始霸楚亦始彊陳侯介於二大國之間而為三恪之客故齊桓因而進之遂班在衛上終於春秋但齊桓升陳於衛上乃在莊之中年不得以莊為始故云自閔僖以下終於春秋陳侯常在衛上也今此大夫會伐宋貶之稱人而陳在衛下襄二十六年澶淵之會傳稱宋向戍後至退在鄭良霄之下此傳其歷序大夫之名不言公孫寧以後至被退成三年傳曰次國之上卿當大國之中中當其下下當其上大夫彼言大夫位有尊卑次序以之升降則公孫寧位非上卿故降在衛下也檢春秋上下亦有後至無傳而杜云後至者則秦小子憖是也案彼則公孫寧未必非後至但杜𢎞通兩解故云非上卿耳夏四月癸亥葬我小君聲姜齊侯伐我西鄙注西當為北蓋經誤音義西當為北出注疏正義曰經言西鄙傳言北鄙服䖍以為再來伐魯西鄙書北鄙不書諱仍見伐按經十五年秋齊人侵我西鄙冬齊侯侵我西鄙僖二十六年春齊人侵我西鄙夏齊人伐我北鄙皆仍見侵伐書而不諱此何獨諱而不書凡言諱者諱國惡也齊侯無道而伐我我非有惡而可諱何以諱其仍伐故知正是一事經文誤耳知非傳誤者魯求與平即盟于榖榖是濟北榖城縣也榖在魯北知北鄙是也六月癸未公及齊侯盟于榖諸侯會于扈注昭公雖以無道見弒而文公猶宜以弒君受討故林父伐宋以失所稱人晉侯平宋以無功不序明君雖不君臣不可不臣所以督大教音義弒本或作殺音試下同疏正義曰弒君稱君君之罪者欲以懲創人君使為鑒戒不書弒者之名以見君亦合死其君雖則合死要非臣所得弒故文公宜以弒君受討林父稱人諸侯不序責死者罪弒者所以督大教大教謂尊君卑臣之教也秋公至自榖注無傳冬公子遂如齊傳十七年春晉荀林父衛孔達陳公孫寧鄭石楚伐宋討曰何故弒君猶立文公而還卿不書失其所也注卿不書謂稱人夏四月癸亥葬聲姜有齊難是以緩注過五月之例音義難乃旦反下及注皆同齊侯伐我北鄙襄仲請盟六月盟于榖注晉不能救魯故請服晉侯搜于黃父注一名黑壤晉地音義父音甫壤如丈反遂復合諸侯于扈平宋也注傳不列諸國而言復合則如上十五年會扈之諸侯可知也音義復扶又反注同公不與會齊難故也書曰諸侯無功也注刺欲平宋而復不能音義與音預於是晉侯不見鄭伯以為二於楚也鄭子家使執訊而與之書以告趙宣子注執訊通訊問之官為書與宣子音義訊音信疏正義曰使執訊使之行適晉也與之書與此執訊書令持以告宣子曰寡君即位三年注魯文二年召蔡侯而與之事君九月蔡侯入于敝邑以行注行朝晉也敝邑以侯宣多之難寡君是以不得與蔡侯偕注宣多既立穆公恃寵專權音義偕音皆十一月克減侯宣多而隨蔡侯以朝于執事注減損也難未盡而行言汲汲于朝晉音義汲音急十二年六月歸生佐寡君之嫡夷注歸生子家名夷大子名音義嫡丁歷反以請陳侯于楚而朝諸君注請陳于楚與俱朝晉十四年七月寡君又朝以蕆陳事注蕆勑也勑成前好音義蕆勑展反勑也前好呼報反一本作事疏正義曰蕆之為勑無正訓也先儒相傳為然賈服皆云蕆勑也十五年五月陳侯自敝邑往朝于君往年正月燭之武往朝夷也注將夷往晉朝八月寡君又往朝以陳蔡之密邇於楚而不敢二焉則敝邑之故也注密邇比近也音義比毗志反雖敝邑之事君何以不免注免免罪也在位之中一朝于襄注襄公音義朝直遙反而再見于君注君靈公也音義見賢遍反疏正義曰鄭穆公以僖三十三年即位晉襄公以文公六年卒一朝于襄三年十一月也再見于君十四年七月往年八月也或者十四年七月寡君又朝勑成陳事再見于君謂往年正月燭之武往朝夷八月寡君又朝是也夷與孤之二三臣相及於絳注孤之二三臣謂燭之武歸生自謂也絳晉國都疏正義曰禮諸侯與臣民言自謂寡人小國之君自稱曰孤臣與他國之人言稱已君為寡君此歸生對晉稱已君當云寡君之二三臣昭十九年子産對晉人云寡君之二三臣札瘥天昏是其事也此言孤者蓋鄭伯身自對晉或自稱孤歸生因即以孤言其君也雖我小國則蔑以過之矣今大國曰爾未逞吾志敝邑有亡無以加焉古人有言曰畏首畏尾身其餘幾注言首尾有畏則身中不畏者少音義幾居豈反又曰鹿死不擇音注音所茠蔭之處古字聲同皆相假借音義茠虛求反蔭於鴆反疏正義曰釋言云庇茠蔭也舍人曰庇蔽也茠依止也郭璞曰今俗呼樹蔭為茠杜意言本當作蔭古字聲同皆相假借故傳作音言鹿死不擇庇蔭之處喻已不擇所從之國欲復楚也服䖍云鹿得美草呦呦相呼至於困迫將死不暇復擇善音急之至也劉炫從服說以為音聲謂不擇音聲而出之難杜今知不然者以傳云鋌而走險急何能擇言走險論其依止之處以其怖急得險則停不能選擇寬靜茠蔭之所傳文所論止言其出處所在不論音聲好惡故杜不依服義劉以為音聲而規杜非也小國之事大國也德則其人也注以德加已則以人道相事不德則其鹿也鋌而走險急何能擇注鋌疾走貌言急則欲蔭芘於楚如鹿赴險音義鋌他頃反芘必利反又悲位反本或作茠疏正義曰鋌文連走故為疾走貌命之罔極亦知亡矣注言晉命無極將悉敝賦以待於鯈唯執事命之注鯈晉鄭之竟言欲以兵距晉音義鯈直留反竟音境文公二年六月壬申朝于齊注鄭文二年六月壬申魯莊二十三年六月二十四日四年二月壬戍為齊侵蔡注魯莊二十五年二月無壬戌壬戌三月二十日音義為于僞反亦獲成於楚注鄭與楚成居大國之間而從於强令豈其罪也注令號令也大國若不圖無所逃命晉鞏朔行成於鄭趙穿公壻池為質焉注趙穿卿也公壻池晉侯女壻音義鞏九勇反質音致下同秋周甘歜敗戎于邥垂乘其飲酒也注歜周大夫邥垂周地河南新城縣北有垂亭為成元年晉侯平戎于王張本音義歜昌欲反邥於審反冬十月鄭大子夷石楚為質于晉注夷靈公也石楚鄭大夫襄仲如齊拜榖之盟復曰臣聞齊人將食魯之麥以臣觀之將不能齊君之語偷臧文仲有言曰民主偷必死注偷猶苟且音義偷他侯反經十有八年春王二月丁丑公薨于臺下秦伯罃卒注無傳未同盟而赴以名音義罃於耕反夏五月戊戍齊人弒其君商人注不稱盜罪商人疏正義曰弒君稱臣臣之罪賤臣弒君則稱盜哀四年盜殺蔡侯申是也盜字當臣名之處以賤不得書名變文謂之盜耳此弒商人者邴歜閻職亦應書盜不稱盜弒者罪商人今從弒君稱君之例也六月癸酉葬我君文公秋公子遂叔孫得臣如齊注書二卿以兩事行非相為介音義介音界疏正義曰卿為卿介則書使不書介僖二十六年公子遂臧孫辰如楚乞師書遂不書辰是其正也襄十四年季孫宿叔老竝書之者晉人敬之自爾以後晉人輕魯幣而益敬其使故特兩書之於法不應書也此傳稱惠公立故且拜葬是以兩事行非相為介故竝書之耳定六年季孫斯仲孫何忌如晉傳稱桓子獻鄭俘孟孫報夫人之幣亦以兩事行故竝書之但彼非是同時受命經應各自為文但以晉人輕之故不各自别書與此意少異也冬十月子卒注先君既葬不稱君者魯人諱弒以未成君書之子在喪之稱音義弒申志反木又作殺之稱尺證反疏正義曰齊公子商人弒其君舍以先君既葬故稱君也此亦先君既葬不稱君者魯人諱弒成君以未成君書之也子者葬前在喪之稱也若言猶在喪而自卒然諱之也釋例曰公子惡魯之正適嗣位免喪則魯君也襄仲遂倚齊而弒之國以為諱故不稱君若言君之子也夫人姜氏歸于齊季孫行父如齊注無傳莒弒其君庶其注稱君君無道也疏正義曰楚世子商臣弒君言世子此傳稱太子僕因國人以弒紀公不稱世子而稱臣者以見君無道傳言多行無禮於國是其無道之狀十六年宋人弒其君杵臼稱國又稱人此直云莒弒其君庶其不稱人者釋例曰劉賈許頴以為君惡及國朝則稱國以弒君惡及國人則稱人以弒按傳鄭靈宋昭經文異而例同故重發以同之子弒其父又嫌異於他臣亦重明其不異既不碎辨國之與人而傳云莒紀公多行無禮於國太子僕因國人以弒之經但稱國不稱人知國之與人雖言别而事同也傳十八年春齊侯戒師期注將以伐魯而有疾醫曰不及秋將死公聞之卜曰尚無及期注尚庶幾也欲令先師期死音義令力呈反先悉薦反下同惠伯令龜注以卜事告龜疏正義曰周禮大卜大祭祀則視髙命龜鄭𤣥云命龜告龜以所卜之事士喪禮卜葬命龜云哀子某來日某卜葬其父某甫考降無有近悔如此之類是令龜之辭也令者告令使知其意與命同也卜楚丘占之曰齊侯不及期非疾也君亦不聞注言君先齊侯終令龜有咎注言令龜者亦有凶咎見於卜兆為惠伯死張本音義見賢遍反二月丁丑公薨齊懿公之為公子也與邴歜之父爭田弗勝及即位乃掘而則之注斷其尸足音義邴音丙又彼病反歜昌欲反掘其勿反又其月反刖音月又五刮反斷丁管反而使歜僕注僕御也納閻職之妻而使職驂乘注驂乘陪乘音義驂七南反乘繩證反注同夏五月公游于申池注齊南城西門名申門齊城無池唯此門左右有池疑此則是二人浴于池歜以撲抶職注撲箠也抶擊也欲以相感激音義撲普卜反字宜從手作木邉非也抶敕乙反箠市蕊反又之蕊反激古歷反職怒歜曰人奪女妻而不怒一抶女庸何傷職曰與刖其父而弗能病者何如注言不以父刖為病恨音義女音汝乃謀弒懿公納諸竹中歸舍爵而行注飲酒訖乃去言齊人惡懿公二人無所畏音義舍音赦置也惡烏路反齊人立公子元注桓公子惠公六月葬文公秋襄仲莊叔如齊惠公立故且拜葬也注襄仲賀惠公立莊叔謝齊來會葬文公二妃敬嬴生宣公敬嬴嬖而私事襄仲宣公長而屬諸襄仲襄仲欲立之叔仲不可注叔仲惠伯音義嬴音盈嬖必計反長丁丈反屬音燭仲見于齊侯而請之齊侯新立而欲親魯許之音義見賢遍反疏正義曰惡是齊甥齊侯許廢惡者惡以世適嗣立不受齊恩宣以非分得國荷恩必厚齊侯新立欲親魯為援故許之冬十月仲殺惡及視而立宣公注惡大子視其母弟殺視不書賤之書曰子卒諱之也仲以君命召惠伯注詐以子惡命疏正義曰傳因殺惡之下即云而立宣公其實宣公之立當在惠伯死後惡雖已死未告外人故詐以子惡之命召惠伯使入公冉務人疑其宫內有變謂非子惡之命故入必死云耳亦未是審知惡已罪也其宰公冉務人止之曰入必死叔仲曰死君命可也公冉務人曰若君命可死非君命何聽弗聽乃入殺而埋之馬矢之中注惠伯死不書者史畏襄仲不敢書殺惠伯音義聽吐定反公冉務人奉其帑以奔蔡既而復叔仲氏注不絶其後夫人姜氏歸于齊大歸也注惡視之母出姜也嫌與有罪出者異故復發傳音義復扶又反將行哭而過市曰天乎仲為不道殺適立庶市人皆哭魯人謂之哀姜注所謂出姜不允於魯音義過古禾反又古卧反適丁歷反莒紀公生大子僕又生季他愛季他而黜僕且多行無禮於國注紀號也莒夷無諡故有别號音義他徒何反僕因國人以弒紀公以其寶玉來奔納諸宣公公命與之邑曰今日必授季文子使司寇出諸竟曰今日必達注未見公而文子出之故來不書音義竟音境公問其故季文子使大史克對曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也音義大史音泰隊直類反養餘亮反鷹於陵反鸇之然反說文止仙反字林已仙反疏正義曰釋鳥云鷹來鳩郭璞曰來當為爽字之誤耳左傳作爽鳩是也又云晨風鸇舍人曰晨風名鸇鸇鷙鳥名郭璞曰鷂屬也先君周公制周禮曰則以觀德注則法也合法則為吉德德以處事注處猶制也事以度功注度量也音義度待洛反注及下同功以食民注食養也音義食音嗣注同作誓命曰毁則為賊注誓要信也毁則壞法也音義壞音怪掩賊為藏注掩匿也音義匿女乙反竊賄為盜注賄財也盜器為姦注器國用也主藏之名注以掩賊為名賴姦之用注用姦器也為大凶德有常無赦注刑有常在九刑不忘注誓命以下皆九刑之書九刑之書今亡疏正義曰言制周禮曰作誓命曰謂制禮之時有此語為此誓耳此非周禮之文亦無誓命之書在後作九刑者記其誓命之言著於九刑之書耳德者得也自得於心心之所得有惡有善欲知善惡以法觀之合法則為吉德不合法則為凶德故曰則以觀德也既有善德乃能制斷事宜故曰德以處事也既為其事務求成功度量功勳必功成乃善故曰事以度功也民不自治立君牧養作事成功所以養食下民故曰功以食民也其意言在上位者必有法則乃為養民之主將言莒僕無可法則故言此以張本也又作要信誓命以戒後人曰有人毁法則者是為賊言其賊敗法也掩匿賊人是為藏言其藏罪人也竊人財賄謂之為盜盜人器用謂之為姦主為藏匿罪人之名恃賴姦人所盜之用為極大之凶德有常刑無赦其事在九刑之書不遺忘也以宣公容納莒僕為主藏受其寶玉為賴姦故舉此以極諫也注正義曰昭六年傳曰夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也叔世謂衰世世衰民慢作嚴刑以督之稱其創制聖王以為所作之法夏作禹刑商作湯刑則周作九刑作周公之刑也此云周公作誓命其事在九刑知自誓命以下皆九刑之書所載也謂之九刑必其諸法有九而九刑之書今亡不知九者何謂服䖍云正刑一議刑八即引小司寇八議議親故賢能功貴勤賓之辟此八議者載於司寇之章周公已制之矣後世更作何所復加但所議八等之人就其所犯正刑議其可赦以否八者所議其刑一也安得謂之八刑杜知其不可故不解之行父還觀莒僕莫可則也注還猶周旋音義還音旋孝敬忠信為吉德盜賊藏姦為凶德夫莒僕則其孝敬則弒君父矣則其忠信則竊寶玉矣其人則盜賊也其器則姦兆也注兆域也保而利之則主藏也以訓則昏民無則焉不度于善注度居也而皆在於凶德是以去之昔髙陽氏有才子八人注髙陽帝顓頊之號八人其苖裔音義去起莒反顓音專頊許玉反裔以制反疏正義曰先儒舊說及譙周古史考皆以顓頊帝嚳為帝之身號髙陽髙辛皆國氏土地之號髙陽次少昊髙辛次髙陽堯承髙辛之後孔子之録尚書自堯為始史籍之說皇帝其言不經大戴禮五帝德司馬遷五帝紀皆言顓頊帝嚳代别一人春秋緯命歷序顓頊傳九世帝嚳傳八世典籍散亡無以取信要二帝子孫至舜時始用必非帝之親子其八人者不能知其出生本系枝派逺近故略言其苖裔耳蒼舒隤敳禱戭大臨尨降庭堅仲容叔達注此即垂益禹臯陶之倫庭堅即臯陶字音義隤徒回反敳五才反一音五回反韋昭音瑰搗直由反韋昭音桃戴以善反漢書作戭韋昭以震反尨莫江反降下江反陶音遙疏正義曰司馬遷采帝系世本以為史記其夏本紀稱禹是顓頊之後秦本紀稱臯陶是顓頊之後伯益則臯陶之子垂之所出史無其文舊說相傳亦出顓頊故云此即垂益禹臯陶之倫也服䖍云八人禹垂之屬也六年傳臧文仲聞六與蓼滅云臯陶庭堅不祀忽諸知庭堅臯陶為一人其餘則不知誰為禹誰為益故云之倫之屬不敢斥言也班固漢書有古今人表銓量古人為九等之次雖知禹益必在八愷稷契必在八元不能識知其人不得自相分配故八元八愷與臯陶禹稷竝不出其名亦為不知故也鄭𤣥注論語云臯陶為士師號曰庭堅杜云庭堅臯陶字者古人名之與字難得審知言字者明其是一人也齊聖廣淵明允篤誠天下之民謂之八愷注齊中也淵深也允信也篤厚也愷和也音義愷開在反疏正義曰此并序八人總言其德或原其心或據其行一字為一事其義亦更相通齊者中也率心由道舉措皆中也聖者通也博達衆務庶事盡通也廣者寬也器字宏大度量寬𢎞也淵者深也知能周備思慮深遠也明者達也曉解事務照見幽微也允者信也終始不愆言行相副也篤者厚也志性良謹交游欵密也誠者實也秉心純直布行貞實也以其德行如是天下之民為其美目謂之八愷愷和也言其和於物也孟子曰栁下惠聖之和者也注正義曰齊中釋言文允信篤厚釋詁文愷訓為樂樂亦和也深水謂之淵故淵為深也髙辛氏有才子八人注髙辛帝嚳之號八人亦其苖裔音義嚳苦毒反伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍注此即稷契朱虎熊羆之倫音義奮甫問反熊音雄貍力之反契息列反依字當作偰古文作卨熊彼皮反疏正義曰契後為殷稷後為周史記殷周皆為帝嚳之後也此言伯虎仲熊尚書有朱虎熊羆二者其字相類知此即稷契朱虎熊羆之倫也尚書更有夔龍之徒亦應有在元愷之內者但更無明證名字又殊不知與誰為可故不復言之史記稷契皆為帝嚳之子而上句注云其苖裔者史記堯亦帝嚳之子則稷契堯之親弟以堯之聖有大德之弟久而不知舜始舉用以情而測理必不然且云世濟其美其間必應纍世不容髙辛之下即至其身馬遷傳聞於人未必盡得其實世族譜取史記之說又從而譏之云按鯀則舜之五世從祖父也而及舜共為堯臣堯則舜之三從高祖而妻其女此史記之疑者然則以其不可悉信故言苖裔以該之忠肅共懿宣慈惠和天下之民謂之八元注肅敬也懿美也宣遍也元善也音義遍音遍疏正義曰此亦總言其德於義亦得相通忠者與人無隱盡心奉上也肅者敬也應機敏逹臨事恪勤也共者治身克謹當官理治也懿者美也保已精粹立行純厚也宣者遍也應受多方知思周遍也慈者愛出於心恩被於物也惠者性多哀務好拯窮匱也和者體度寬簡物無乖爭也以其德行如是天下之民為其美目謂之八元元善也言其善於事也論語曰善人為邦百年亦可以勝殘去殺矣注正義曰肅敬釋訓文懿美釋詁文宣遍釋言文易文言曰元者善之長也此十六族也世濟其美不隕其名注濟成也隕隊也音義隕于敏反隊直類反疏正義曰此十六人耳而謂之族者以其各有親屬故稱族也世濟其美後世承前世之美不隕其名不隊前世之美名言其世有賢人積善而至其身也劉炫云各有大功皆賜氏族故稱族以至於堯堯不能舉舜臣堯舉八愷使主后土注后土地官禹作司空平水土即主地之官疏正義曰后訓君也天稱皇天故地稱后土舜典云伯禹作司空吕刑云禹平水土則禹是土地之官故云主后土也以揆百事莫不時序地平天成注揆度也成亦平也音義揆葵癸反疏正義曰用禹為主后土之官令以揆度百事百事無不揆度於是皆有次序得地平其化天成其施言有成功也注正義曰揆度釋言文度百事者令之豫自籌度為之數量法制事成則平其可否使之總衆務也地平天成大禹謨之文孔安國云水土治曰平五行叙曰成釋詁云成平也是成亦為平其義一也舉八元使布五教于四方注契作司徒五教在寬故知契在八元之中音義契斯列反疏正義曰舜典云帝曰契百姓不親五品不遜汝作司徒敬敷五教在寬尚書契敷五教此云舉八元使布五教以此故知契在八元中也然則尚書禹作司空此云舉八愷使主后土以此亦知禹在八愷中也但不知八愷之中何者是禹八元之中何者是契矣主后土布五教是事之大者故舉以為言非是各令八人共主一事故主土唯禹主教唯契餘當别有所主或助而為之尚書稱益佐禹治水是其助之事也父義母慈兄友弟共子孝內平外成注內諸夏外夷狄音義夏戶雅反疏正義曰一家之內父母兄弟子尊卑有五品父不義母不慈兄不友弟不共子不孝是五品不遜順也故使契為司徒布五教於四方教父以義教母以慈教兄以友教弟以共教子以孝是之謂五教此五教可常行又謂之五典也諸夏夷狄皆從其教是為內平外成所云五典克從即此內平外成之謂也昔帝鴻氏有不才子注帝鴻黃帝掩義隱賊好行凶德醜類惡物頑嚚不友是與比周注醜亦惡也比近也周密也音義好呼報反嚚魚巾反心不則德義之經為頑口不道忠信之言為嚚比毗志反疏正義曰醜亦惡也物亦類也指謂惡人等輩重復而言之耳比是相近也周是親密也唯是親愛之義非為善惡之名論語云君子周而不比小人比而不周以君子小人相對故鄭𤣥云忠信為周阿黨為比觀文為說也天下之民謂之渾敦注謂歡兜渾敦不開通之貌音義渾户本反敦徒本反歡呼端反兜都侯反疏正義曰掩蓋義事而不行隱蔽其外而陰為賊害也其有凶醜之類穢惡之物心頑而不則德義之經口嚚而不道忠信之言如此惡人不可與之親友者此不才子於是與之相附近相親密言惡人所愛愛同已者也以其為惡如是故天下之民為之惡目謂之渾敦渾敦不開通之貌言其無所知也服䖍用山海經以為歡兜人靣馬喙渾敦亦為獸名注正義曰此傳所言說虞書之事彼云四罪為共工歡兜三苖鯀也此傳四凶乃謂之渾敦窮竒檮杌叨餮檢其事以識其人堯典帝言共工之行云靖言庸違傳說窮竒之惡云靖譖庸回二文正同知窮竒是共工也堯典帝求賢人歡兜舉共工應帝是與共工相比傳說渾敦之惡云醜類惡物是與比周知渾敦是歡兜也堯典帝言鯀行云咈哉方命圯族傳說檮杌之罪云告頑舍嚚傲狠明德即是咈戻圯族之狀且鯀是顓頊之後知檮杌是鯀也尚書無三苖罪狀既甄去三凶自然叨餮是三苖矣先儒盡然蓋無異說皆以行狀驗而知之也莊子稱南方之神其名為鯈北方之神其名為忽中央之神其名為混沌混沌無七竅倏忽為鑿之一日為一竅七日而混沌死混沌與渾敦字之異耳莊子雖則寓言要以無竅為混沌是渾敦為不開通之貌此四凶者渾敦檮杌以狀貌為之名窮竒叨餮以義理為之名古人之意自異耳服䖍案神異經云檮杌狀似虎毫長二尺人靣虎足猪牙尾長丈八尺能鬬不退叨餮獸名身如牛人靣目在腋下食人少皥氏有不才子注少皥金天氏之號次黃帝音義少詩照反注同皥胡老反疏正義曰金天國號少皥身號譙周云金天氏能修大皥之法故曰少皥也其次黃帝則昭十七年傳有其事毁信廢忠崇飾惡言靖譖庸回服讒搜慝以誣盛德注崇聚也靖安也庸用也回邪也服行也搜隱也慝惡也盛德賢人也音義搜所留反慝他得反邪似嗟反疏正義曰毁信者謂信不足行毁壞之也廢忠者謂忠為無益廢棄之也以惡言為善尊崇修飾之安於讒譖信用回邪常行讒疾陰隱為惡以誣罔盛德之賢人也天下之民謂之窮竒言其行窮困所好竒異也注正義曰釋詁云崇充也舍人曰威大充盛大亦集聚之義故崇為聚也庸用靖安回邪慝惡常訓也服從是奉行之義也搜索隱伏是搜得為隱也服䖍亦以搜為隱隱慝謂陰隱為惡也成德謂成就之德故為賢人也定本成德為盛德天下之民謂之窮竒注謂共工其行窮其好竒音義竒其宜反共音恭行下孟反好呼報反疏正義曰孔安國云共工官稱也其人為此官故尚書舉其官也行惡終必窮故云其行窮也好惡言好讒慝是所好竒異於人也顓頊有不才子不可教訓不知話言注話善也音義話户快反告之則頑注德義不入心舍之則嚚注不道忠信音義舍音赦傲狠明德以亂天常天下之民謂之禱杌注謂鯀檮杌頑凶無儔匹之貌音義傲五報反狠戶墾反檮徒刀反杌五忽反鯀古本反此三族也世濟其凶增其惡名以至于堯堯不能去注方以宣公比堯行父比舜故言堯亦不能去須賢臣而除之音義去起吕反注及下皆同疏正義曰宣公不能去莒僕而行父能去之恐宣公以不去之為恥行父以去之為専史克方以宣公比堯行父比舜故言堯朝有四凶堯亦不能去須賢臣而除之所以雪宣公不去之恥解行父専擅之失也然則聖主莫過於堯任賢王政所急大聖之朝不才總萃雖曰帝其難之且復何其甚也此四凶之人才實中品雖行有不善未有大惡故能仕於聖世致位大官自非聖舜登庸大禹致力則滔天之害未或可平以舜禹之成功見此徒之多罪勳業既謝愆釁自生為聖所誅其咎益大且虞史欲盛章舜德歸罪惡於前人史克以宣公比堯同四凶於莒僕此等竝非下愚未有大惡其為不善唯帝所知尚書將言求舜以見帝之知人此傳安慰宣公故言堯不能去辭各有為情頗增甚學者當以意達文不可即以為實縉雲氏有不才子注縉雲黃帝時官名疏正義曰昭十七年傳稱黃帝以雲名官故知縉雲黃帝時官名字書縉赤繪也服䖍云夏官為縉雲氏貪于飲食冒于貨賄侵欲崇侈不可盈厭聚斂積實不知紀極不分孤寡不恤窮匱注冒亦貪也盈滿也實財也音義厭於豔反匱其愧反疏正義曰鄭注周禮云金玉曰貨布帛而賄天下之民以比三凶注非帝王子孫故别以比三凶謂之叨餮注貪財為叨貪食為餮音義叨他刀反餮他結反疏正義曰此無正文光儒賈服等相傳為然舜臣堯注為堯臣疏正義曰昭七年傳稱王臣公公臣大夫謂王以公為臣公以大夫為臣皆是上臣下也而此云舜臣堯謂為臣以事堯乃是下臣上也文同義異意足相顧故辨之云為堯臣賔于四門注闢四門達四聰以賔禮衆賢音義闢婢亦反聰本亦作窗七工反疏正義曰賔于四門是禮賢之事而舜典下文云闢四門明四目達四聰言開闢四方之門未開者廣視聽於四方使天下無壅葬亦是賔禮衆賢之事意同於上故引以解之流四凶族注案四凶罪狀而流放之渾敦窮竒檮杌叨餮投諸四裔以禦螭魅注投棄也裔遠也放之四遠使當螭魅之災螭魅山林異氣所生為人害者音義禦魚吕反螭敕知反山神獸形魅亡備反說文作魅云老精物也魅或從未疏正義曰投者擲去故為葉也舜典云流共工于幽州放歡兜于崇山竄三苖于三危殛鯀于羽山四罪而天下咸服孔安國云幽州北裔崇山南裔三危西裔羽山東裔在海中是放之四方之遠處螭魅若欲害人則使此四者當彼螭魅之災令代善人受害也宣三年傳王孫滿說九鼎云鑄鼎象物百物而為之備民入川澤山林不逢不若螭魅罔兩莫能逢之知螭魅是山林異氣所生為人害者也是以堯崩而天下如一同心戴舜以為天子以其舉十六相去四凶也故虞書數舜之功曰愼徽五典五典克從無違教也注徽美也典常也此八元之功音義戴多代反相息亮反下注同去起吕反數色主反徽許歸反曰納于百揆百揆時序無廢事也注此八愷之功曰賔于四門四門穆穆無凶人也注流四凶疏正義曰此虞書舜典之篇也三事六句舜典本文其云無違教也無廢事也無凶人也是史克解虞書之意也每引一事以一句解之故每事言曰舜有大功二十而為天子注舉十六相去四凶也今行父雖未獲一吉人去一凶矣於舜之功二十之一也庶幾免於戾乎注史克激稱以辨宣公之惑釋行父之志故其言美惡有過辭蓋事宜也音義激吉歷反疏正義曰宣公貪寶玉而受莒僕為惑已大行父違君命而逐出之其專已甚故史克激揚而言舜之事堯以辨宣公之惑以解行父之志方欲盛談善惡說事必當增甚故其言美惡有太過之辭言美則大美言惡則大惡禹則鯀之子也說禹則云世濟其美言鯀則云世濟其凶明其餘亦有大過非其實也蓋事勢宜然耳何休以為孔子云蕩蕩乎堯之為君唯天為大唯堯則之今如左氏堯在位數十年久抑元愷而不能舉養育凶人以為民害而不能去則孔子稱堯虛言也桀紂為惡一世則誅四凶歷數十嵗而無誅放易云積不善之家必有餘殃虛言也左氏為短但堯之為君能舉十六相去四凶四凶之人未必世濟其惡但史克欲明行父之志欲辨宣公之惑故美惡過辭具於此注何休之難不足疑也宋武氏之族道昭公子將奉司城須以作亂注文公弒昭公故武族欲因其子以作亂司城須文公弟音義宋武氏之族本或作武穆之族者後人取下文妄加也道音導十二月宋公殺母弟須及昭公子使戴莊桓之族攻武氏於司馬子伯之館注戴族華樂也莊族公孫師也桓族向魚鱗蕩也司馬子伯華耦也音義向舒亮反遂出武穆之族注穆族黨於武氏故使公孫師為司城注公孫師莊公之孫公子朝卒使樂呂為司寇以靖國人注樂呂戴公之曾孫為宣三年宋師圍曹傳疏正義曰世本云戴公生樂甫術術生碩甫澤澤生夷父須須生大司寇呂今云曾孫誤也春秋左傳注疏卷二十春秋左氏傳注疏卷二十考證公四不視朔注因明公之實有疾非詐齊趙汸補注曰公疾不視朔必書史所以重君疾重國政雖託疾亦書史無訐君以為直之義傳釋公四不視朔曰疾也乃據史法言之然經既削其真有疾者則此為託疾亦可知矣左氏知史而不知經後儒又不知經本出于史此筆削之義所以失傳臣浩按公之疾真僞所不可知然不告朔遂起于此亦所以志禮之始失也傳有蛇自泉宫出音義魯公伯禽云云臣召南按此據史記魯世家也世家魯公伯禽子考公酋弟煬公熙子幽公宰弟魏公沸子厲公擢弟獻公具子真公濞弟武公敖子懿公戲監本及别本多訛字如魏公沸作費厲公擢作躍弟獻公具作子鄭公具懿公戲作獻今依史記改正又疏引世家內字亦多訛如考公作耆公幽公宰作圉魏公作徽公真公作順公今並依史記正之傳姑又與之遇以驕之疏蚡冒卒弟熊達殺蚡冒子而代立臣浩按史記熊達作熊通傳夫人使謂司城去公趙汸補注曰傳序六卿于上而夫人但使司城去公則餘五人皆鮑之黨也傳書曰宋人注一段劉敞曰如傳所說則公子鮑為不臣襄夫人為不母而昭公未有無道之實也傳曰君雖不君臣不可以不臣不得輕此兩人之罪反專惡於宋公趙汸補注曰當時列國皆政出大夫其士民知有大夫而不知有君謂晉趙盾為良大夫謂宋昭公為無道皆弒君者子孫設辭以分惡殺耻左氏不能辨遂援以釋經且立以為例誤矣傳華耦卒而使蕩虺為司馬趙汸補注曰傳見惟殺蕩意諸右師以下皆在位傳夷與孤之二三臣相及于絳疏昭十九年子産對晉人云監本脫年字今添子卒注以未成君書之臣召南按不書名而單書子此正成其為君也書卒固是諱辭書子則大義自正傳仲殺惡及視而立宣公注殺視不書賤之臣召南按杜說無理經既諱惡之弒自然并諱其殺視也太子母弟可云賤乎傳則以觀德注則法也林堯叟曰則者君臣父子兄弟夫婦朋友之法則也傳昔髙陽氏有才子八人王應麟曰古者以德為才十六才子是也如狄之酆舒晉之知伯以才稱者古所謂不才子也傳齊聖廣淵疏栁下惠聖之和者也監本訛作伊尹聖之和者也今改正傳父義母慈兄友弟共子孝內平外成疏是之謂五教又謂之五典臣召南按尚書孔傳解慎徽五典即引此傳八元布五教納于百揆即引此傳八凱揆百事傳今行父雖未獲一吉人注其言美惡有過辭王應麟困學紀聞曰禹鯀之子也史克於鯀曰世濟其凶而於禹曰世濟其美論其世則鯀非美也於此見立言之難春秋左氏傳注疏卷二十考證
