body:
  text: 春秋左傳注疏卷四十三起昭公五年盡六年晉杜氏注唐陸德明音義孔頴達疏經五年春王正月舍中軍注襄十一年始立中軍音義舍音捨傳同楚殺其大夫屈申注書名罪之公如晉夏莒牟夷以牟婁及防兹來奔注城陽平昌縣西南有防亭姑幕縣東北有兹亭音義牟亡侯反幕亡博反秋七月公至自晉戊辰叔弓帥師敗莒師于蚡泉注蚡泉魯地音義蚡扶粉反秦伯卒注無傳不書名未同盟冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吳傳五年春王正月舍中軍卑公室也注罷中軍季孫稱左師孟氏稱右師叔孫氏則自以叔孫為軍名疏正義曰襄十一年初作三軍十二分其國民三家得七公得五國民不盡屬公公室已是卑矣今舍中軍四分公室三家自取其稅減已稅以貢於公國民不復屬於公公室彌益卑矣是舍中軍者三家所以卑弱公室也作中軍卑公室之漸舍中軍卑公室之極初作云作三軍今不云舍三軍者初云作者舊有二軍今更增一軍人數不足故總皆渾破各毁其乘足成三軍故云作三軍此則唯舍中軍之衆屬上下二軍其上下二軍依舊不動故唯云舍中軍也劉炫云四分公室制法别耳還復二軍不得言舍三軍注正義曰魯之軍名傳無其號晉作三軍為上中下則魯之三軍亦當然也其廢中軍之後上下二軍分為四分哀十一年齊師伐魯傳稱孟孺子泄帥右師冉求帥左師冉求季氏宰也又言叔孫武叔退而搜乘更無别稱知自以叔孫為軍名也毁中軍于施氏成諸臧氏注季孫不欲親其議敕二家會諸大夫發毁置之計又取其令名音義臧子郎反疏注正義曰取其令名者季孫實欲自厚令諸大夫議論似若已之不與取其令善廉潔之名也劉炫以為施者舍也臧者善也成諸臧氏取其令名也其二家謂叔孟非謂施臧二氏也初作中軍三分公室而各有其一注三家各有一軍家屬季氏盡征之注無所入於公叔孫氏臣其子弟注以父兄歸公孟氏取其半焉注復以子弟之半歸公音義復扶又反疏正義曰將述其舍倒本其初初作中軍謂襄十一年也三分公室而各有其一民皆分屬三家就中減以與公令公自稅取也季氏盡征之不減入於公令盡屬於己也叔孫氏臣其子弟明其更有父兄以一家之內有此四品叔孫氏則以父兄之稅入公子弟之稅入已總率所屬之人悉皆如此若總計父兄之數不足以子弟添父兄若子弟不足以父兄添子弟大率半屬於己以父兄歸公者尊公室也孟氏則於子弟之中而取其半於一家之內或取其子或取其弟大率而言三分歸公一分入已也或以為其軍分為四分假以父兄子弟四分託之若以假託為言何得云若子若弟直云叔孫氏兩分歸公兩分入已孟氏三分歸公一分入已於文簡略其事易知何須以父兄子弟虛為假託故知不然也魯之三卿季彊孟弱縱使如此差之季氏猶應以一分歸公言盡征之者季氏専恣也及其舍之也四分公室季氏擇二注簡擇取二分音義二分扶運反或如字疏正義曰季氏因叔孫家禍退之使同於孟孫獨取其半為専已甚又擇取善者是専之極故傳言擇二以見之二子各一皆盡征之而貢于公注國人盡屬三家三家隨時獻公而已以書使杜泄告於殯曰注告叔孫之柩音義殯必刃反柩其又反子固欲毁中軍既毁之矣故告杜泄曰夫子唯不欲毁也故盟諸僖閎詛諸五父之衢注皆在襄十一年音義閎音宏詛側慮反衢其俱反受其書而投之注投擲也音義擲直亦反帥士而哭之注痛叔孫之見誣叔仲子謂季孫曰帶受命於子叔孫曰葬鮮者自西門注不以夀終為鮮西門非魯朝正門音義鮮音仙徐息淺反疏注正義曰叔孫餓死而帶言葬鮮知不得以夀終者名之為鮮言年命鮮少也叔仲帶得以此言告季孫則季孫知豎牛餓殺叔孫矣而不討者季孫利其禍而已得専故舍之而不討也杜泄云卿喪自朝知西門非正門季孫命杜泄注命使從西門杜泄曰卿喪自朝魯禮也注從生存朝覲之正路疏注正義曰服䖍云言卿葬三辭於朝從朝出正門卿佐國之楨幹君之股肱必過於朝重之也案檀弓云君為大夫將葬弔於宫及出命引之三步則止如是三君退是君當就家視之無造君朝之禮且杜泄不欲從西門所競道路耳假令自朝而去猶得更從西門不須言自朝也故杜以自朝為從生存朝覲之正路蓋以西門幽辟故欲從正路而出南門吾子為國政未改禮而又遷之注遷易也羣臣懼死不敢自也注自從也既葬而行注善杜泄能辟禍仲至自齊注聞喪而來季孫欲立之南遺曰叔孫氏厚則季氏薄彼實家亂子勿與知不亦可乎南遺使國人助豎牛以攻諸大庫之庭注攻仲壬也魯城內有大庭氏之虛於其上作庫音義與音預虛起居反疏正義曰十八年𫝊梓愼登大庭氏之庫是魯城內有大庭氏之虛於其上作庫謂之大庭氏之庫此言大庫明是彼也此言之庭庭是堂前地名仲壬在此庫之庭前豎牛就攻之此庭非大庭也司宫射之中目而死豎牛取東鄙三十邑以與南遺注取叔孫氏邑音義射食亦反中丁仲反昭子即位朝其家衆曰豎牛禍叔孫氏使亂大從注使從於亂音義使亂大從如字服云使亂大和順之道也疏正義曰杜云使從於亂服䖍云使亂大和順之道殺適立庶又披其邑將以赦罪注披析也謂以邑與南遺昭子不知豎牛餓殺其父故但言其見罪音義適丁歷反本又作嫡披普皮反析星歷反見賢遍反疏注正義曰昭子若知豎牛餓殺其父則當顯加誅戮不應直以殺適立庶為大罪也若昭子知讎不殺則昭子有大罪矣仲尼不宜善其不以立己為功勞也是昭子不知豎牛餓殺其父但言見罪仲尼又據其見言而善之罪莫大焉必速殺之豎牛懼奔齊孟仲之子殺諸塞關之外注齊魯界上關音義塞悉代反投其首於寧風之棘上注寧風齊地仲尼曰叔孫昭子之不勞不可能也注不以立己為功勞據其所言善之時魯人不以餓死語昭子音義語魚據反周任有言曰為政者不賞私勞不罰私怨詩云有覺德行四國順之注詩大雅覺直也言德行直則四方順從之音義任音壬行下孟反注同初穆子之生也莊叔以周易筮之注莊叔穆子父得臣也遇明夷注離下坤上明夷音義坤若門反之謙注艮下坤上謙明夷初九變為謙音義艮古恨反疏正義曰離下坤上為明夷離為日坤為地彖曰明入地中明夷夷者傷也日在地中光不外發則為明傷也艮下坤上為謙艮為山象曰地中有山謙以髙下下謙虛之義以示卜楚丘注楚丘卜人姓名曰是將行注行出奔而歸為子祀注奉祭祀以讒人入其名曰牛卒以餒死明夷日也注離為日夷傷也日明傷音義餒奴罪反餓也日之數十注甲至癸故有十時亦當十位自王已下其二為公其三為卿注日中當王食時當公平旦為卿雞鳴為士夜半為皂人定為輿黃昏為隸日入為僚晡時為僕日昳為臺隅中日出闕不在第尊王公曠其位音義皂才早反輿音餘僚力雕反晡布吳反昳由結反隅遇俱反疏正義曰此先略言卦意有此四事也是者是此子也將出奔而歸為國卿奉子叔孫之祭祀也并以讒人入而其名曰牛然此子終以餓死也牛在國生云以入者去時未有來而有之以讒人入其家非從外國入既已略論此意乃復具釋爻辭云明夷于飛垂其翼君子于行三日不食有攸往主人有言此三辭之間無為祀之意但卦名明夷故先推卦名求為祀之義也先行後歸始得為祀然後推演爻辭得其行去之象又論不食讒言之事爻辭之內亦無名牛故别於離卦以求牛名推演爻之三辭既訖乃復更推卦體以終為祀之言故曰其為後以總結前言也注正義曰七年傳曰天有十日人有十等彼即歷言從王至臺十等之日此傳既云十時十位位以王公卿為三日以中食旦為三日上其中知從中而右旋配之也晡謂食也晡時謂日西食時也日昳謂蹉跌而下也隅謂東南隅也過隅未中故謂隅中也若據時之先後則從旦至食乃至於中宜以左旋為次今𫝊以配十位從中而右旋者以人之道髙以下為基貴以賤為本欲從賤而漸至於貴也若從中左旋則位乃漸退非進長之義故右旋也日上其中注日中盛明故以當王食日為二注公位旦日為三注卿位明夷之謙明而未融其當旦乎注融朗也離在坤下日在地中之象又變為謙謙道卑退故曰明而未融日明未融故曰其當旦乎疏注正義曰明而未融則融是大明故為朗也釋言云明朗也樊光云詩云髙朗令終日月光明是朗為大明也據卦離下坤上日在地中之象又爻變為謙謙是卑退之意日未出而又卑故曰明而未融日明未融故曰其當旦也若於易之明夷據日入之後故明夷象云初登于天照四國也後入于地失則也此𫝊明夷據日未出前者以日未出與日已入皆日在地下其明不見故各取象為義故曰為子祀注莊叔卿也卜豹為卿故知為子祀日之謙當鳥故曰明夷于飛注離為日為鳥離變為謙日光不足故當鳥鳥飛行故曰于飛疏注正義曰說卦離為日為雉雉為鳥也離之一卦為日為鳥日為髙明鳥為微細今日之謙退不得髙明下當微細是日光不足故當鳥也明之未融故曰垂其翼注於日為未融於鳥為垂翼象日之動故曰君子于行注明夷初九得位有應君子象也在明傷之世居謙下之位故將辟難而行音義應應對之應謙下如字又遐嫁反難乃旦反疏注正義曰卦有六位初三五竒數為陽位也二四上耦數為隂位也初與四二與五三與上位相值為相應陽之所求者隂隂之所求者陽陽隂相值為有應隂還值隂陽還值陽為無應明夷初九陽爻在竒是得位也所應在四四為隂爻是有應也居得位而物應之是君子象也初九在明傷之世有大難也居謙下之位宜卑退也以此知將辟難而行也當三在旦故曰三日不食注旦位在三又非食時故曰三日不食疏注正義曰位當三而時在旦是三日象也旦又未至食時非食時則無可食故曰三日不食也離火也艮山也離為火火焚山山敗注離艮合體故音義敗必邁反又如字注同於人為言注艮為言疏注正義曰說卦云成言乎艮故艮為言也敗言為讒注為離所焚故言敗故曰有攸往主人有言言必讒也注離變為艮故言有所往往而見燒故主人有言言而見敗故必讒言音義攸音由純離為牛注易離上離下離畜牝牛吉故言純離為牛音義牝頻忍反舊扶死反疏注正義曰純離者言上體下體皆是離也易離卦云畜牝牛吉故言純離為牛明夷初九無此牛象但明夷初卦下體是離故𫝊於純離之卦求牛象也世亂讒勝勝將適離故曰其名曰牛注離焚山則離勝譬世亂則讒勝山焚則離獨存故知名牛也豎牛非牝牛故不吉謙不足飛不翔注謙道冲退故飛不逺翔垂不峻翼不廣注峻髙也翼垂下故不能廣逺故曰其為子後乎注不逺翔故知不逺去疏正義曰其爻辭唯云君子于行無逺之義故復推此爻於鳥為飛不翔翼不大知其不能逺去行必當歸故曰其為子後乎吾子亞卿也抑少不終注旦日正卿之位莊叔父子世為亞卿位不足以終盡卦體蓋引而致之楚子以屈申為二於吳乃殺之注造生二心以屈生為莫敖注生屈建子使與令尹子蕩如晉逆女過鄭鄭伯勞子蕩于汜勞屈生于莬氏注汜莬氏皆鄭地音義過古禾反勞力報反後皆同汜徐扶嚴反莬大胡反晉侯送女于郉丘子産相鄭伯會晉侯于郉丘注𫝊言楚强諸侯畏敬其使音義相息亮反使所吏反疏注正義曰聘禮云若過邦至于競使次介假道束帛將命于朝下大夫取以入告出許餼之以其禮上賔大牢積惟芻禾如彼禮文唯當餼之而已今鄭伯親勞是鄭畏楚也桓三年𫝊例云凡公女嫁于敵國公子則下卿送之於天子則諸卿皆行尚公不自送昏禮父母送女不下堂今晋侯親送女至邢丘是敬楚也此兼顧上文故云諸侯畏敬其使公如晉注即位而往見音義見賢遍反自郊勞至于贈賄注往有郊勞去有贈賄音義賄呼罪反疏注正義曰聘禮賔至于近郊君使卿朝服用束帛勞及聘事皆畢乃去賔遂行舍于郊公使卿贈如覿幣聘既如此朝亦當然其朝據大行人上公三勞主國使下大夫勞于畿卿勞于逺郊主君自勞于近郊其去贈賄無文聘尚有賄明朝亦然但禮文不具耳其文據公去言故云往有也贈據晉言故云去有也無失禮注揖讓之禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰魯侯焉知禮公曰何為自郊勞至于贈賄禮無違者何故不知對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也今政令在家注在大夫音義女音汝焉於䖍反不能取也有子家羈弗能用也注羈莊公𤣥孫懿伯也音義羈居宜反奸大國之盟陵虐小國注謂伐莒取鄆音義奸音干鄆音運利人之難注謂往年莒亂而取鄆音義難乃旦反下及注並同不知其私注不自知有私難公室四分民食於他注他謂三家也言魯君與民無異疏正義曰言公如民然求食於他也其時四分公室民皆屬三家三家稅以貢公公仰給食自無食也思莫在公不圗其終注無為公謀終始者音義思息吏反謂羣臣慮也一音如字為于僞反疏正義曰羣臣思慮無在公者不為公圖謀其終言其終必禍敗無為謀者為國君難將及身不恤其所禮之本末將於此乎在注在恤民與憂國而屑屑焉習儀以亟注言以習儀為急音義屑屑先結反亟紀力反急也言善於禮不亦逺乎君子謂叔侯於是乎知禮注時晋侯亦失政叔齊以此諷諌音義諷芳鳯反本亦作風音同晉韓宣子如楚送女叔向為介鄭子皮子大叔勞諸索氏注河南成臯縣東有大索城音義介音界大音泰索悉洛反大叔謂叔向曰楚王汰侈已甚子其戒之叔向曰汰侈已甚身之災也焉能及人若奉吾幣帛慎吾威儀守之以信行之以禮敬始而思終終無不復注事皆可復行音義焉於䖍反從而不失儀注從順也敬而不失威道之以訓辭奉之以舊法考之以先王注以先王之禮成其好音義道音導好呼報反度之以二國注度晋楚之勢而行之音義度待洛反注同疏正義曰朝聘之禮享用幣帛致國之所有送女雖則弗聘亦以幣帛通意故云奉吾幣帛慎吾威儀也信當守而無失故云守之以信也禮當勉力復行故云行之以禮也禮無不敬故以敬為始也始敬則終亦敬終恐其惰故云思終也思終亦思始終始無有不可復行之事行必得禮使皆可復行也曲從則失儀從而不失儀不曲從也過敬則無威敬而不失威不妄敬也聖人教訓之辭用之以通志故言道之也聘使舊故之法奉承以致命故言奉之也用先王之禮以成其交好故言考之也量二國形勢以𫝊通時事故言度之也皆凖事為文雖汰侈若我何及楚楚子朝其大夫曰晉吾仇敵也茍得志焉無恤其他今其來者上卿上大夫也若吾以韓起為閽注刖足使守門音義仇音求閽音昏刖音月又五刮反疏注正義曰周禮掌戮云墨者使守門劓者使守關宫者使守內刖者使守囿髠者使守積則守門者當以墨也知不以韓起為墨者楚子意在辱晋必將加之重罪墨是刑之輕者知其必非墨也且欲以叔向為宫刑明起刑亦次宫也莊十九年𫝊稱鬻拳自刖楚人以為大閽知此亦是刖也欲以叔向為司宫為奄官之長則韓起為閽亦欲令為門官之長刑若鬻拳故以鬻拳之刑解之以羊舌肸為司宫注加宫刑音義肸許乙反足以辱晉吾亦得志矣可乎大夫莫對薳啓疆曰可茍有其備何故不可恥匹夫不可以無備况恥國乎是以聖王務行禮不求恥人朝聘有圭注圭以為信疏正義曰周禮典瑞云公執桓圭侯執信圭伯執躬圭子執榖璧男執蒲璧以朝覲宗遇㑹同于王諸矦相見亦如之是朝有圭也又曰琢圭璋璧琮以眺聘是聘有圭也聘用圭璧其飾雖與君同其長降君一等聘禮記曰所以朝天子圭與繅皆九寸問諸侯朱緑繅八寸問即聘也鄭𤣥云九寸上公之圭也於天子曰朝於諸侯曰問記之於聘文互相備鄭云互相備者言諸侯相朝與朝天子同也遣使聘天子與諸侯同也彼典瑞及聘禮記聘圭八寸據上公為文耳公之使既降公一等知侯伯之使當瑑圭六寸子男之使當瑑璧四寸考工記玉人云瑑圭璋八寸璧琮八寸以眺聘亦謂上公之聘也其實子男君臣用璧云朝聘有圭者據公侯伯言之注正義曰鄭𤣥典瑞注云人執以見曰瑞禮神曰器瑞符信也用圭朝聘所以為信故執之享眺有璋注享饗也眺見也既朝聘而享見也臣為君使執璋音義眺他弔反徐他雕反璋音章享饗並許丈反鄭服皆以享為獻耳見賢遍反下同臣為于僞反使所吏反疏正義曰鄭氏先儒以為朝聘之禮使執玉以授主國之君乃行享禮獻國之所有眺見也謂行享禮以見主國之君也案小行人合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼鄭𤣥云上公享王圭以馬享后璋以皮侯伯子男享王璧以帛享后琮以錦公侯伯於諸侯則享用璧琮子男於大國享君琥以繡於夫人璜以黼此云享眺有璋者據上公享后言之所以特舉享后者舉璋與圭相對其實享禮圭與璧琮琥璜皆有今檢杜注意義則不然謂主國設酒食以饗賔賔則執璋以行禮故云享眺有璋注云享饗也破享獻之享為饗食之饗杜必然者以此𫝊下云設機而不倚爵盈而不飲宴有好貨飱有陪鼎皆論饗禮及饗宴之事故破享為饗即大行人三饗三食三宴之類是也但饗禮既亡執璋無文耳故杜云臣為君使執璋則詩云奉璋峨峨尚書大保秉璋以酢之類是也小有述職注諸侯適天子曰述職音義述職述其所治國之功職也疏注正義曰孟子云天子適諸侯曰巡狩巡狩者巡所守也諸侯朝天子曰述職述職者述所職也其意言諸侯職在治國家事天子以時入朝述修其所職也天子職在立諸侯撫下民以時巡狩省視其功勞也大有巡功注天子巡守曰巡功音義巡功巡所守之功績巡守手又反設機而不倚爵盈而不飲注言務行禮音義機音几倚於綺反疏正義曰朝聘之禮有設機進爵之時朝禮雖亡而聘禮有其略也聘義曰聘射之禮至大禮也質明而始行事日幾中而後禮成非強有力者弗能行也酒清人渴而不敢飲也肉乾人飢而不敢食也是言務在行禮不敢倚機不敢飲酒也宴有好貨注宴飲以貨為好衣服車馬在客所無音義好呼報反注及下同疏注正義曰謂主國宴賔以貨財為恩好謂衣服車馬在客所無者與之也明年晋享季武子重其好貨僖二十九年介葛盧來禮之加宴好詩序云鹿鳴燕羣臣嘉賔也既飲食之又實幣帛筐篚以將其厚意是也飱有陪鼎注熟食為飱陪加也加鼎所以厚殷勤音義飱音孫陪薄回反徐扶杯反疏正義曰聘禮賔始入館宰夫朝服設飱飪一牢在西鼎九羞鼎三鄭𤣥云食不備禮曰飱飪熟也其鼎實如饗餼羞鼎則陪鼎也以其實言之則曰羞以其陳言之則曰陪是飱有陪鼎鄭以飱禮小饔餼禮大故云食不備禮曰飱言饔餼備而飱不備也杜以餼生而飱熟故云熟食為飱聘禮又云君使卿韋辨歸饔餼五牢飪一牢鼎九設于西階前陪鼎當內廉鄭𤣥云陪鼎三牲臛臐膮也陪之庶羞加也服䖍云陪牛羊豕鼎故云陪鼎周禮掌客云凡諸侯之禮上公飱五牢饔餼九牢侯伯飱四牢饔餼七牢子男飱三牢饔餼五牢是朝聘皆有飱也案聘禮歸饔餼五牢於賔館飪一牢鼎九設于西階前牛鼎一羊鼎一豕鼎一魚鼎一臘鼎一腸胃鼎一膚鼎一鮮魚鼎一鮮醋鼎一凡九鼎從北向南而陳又有陪鼎三其一曰鼎牛臛也在牛鼎之西其一曰臐鼎羊臛也在羊鼎之西其一曰膮鼎豕臛也在豕鼎之西其陪所設當西階之內廉腥二牢設于東階之前南陳牢别七鼎無鮮魚鮮臘也并上飪一牢所謂死牢三又餼二牢陳于門內之西是卿之饔餼五牢案鄭注掌客其子男饔餼五牢與卿同其腥鼎加鮮魚鮮臘牢别有九也其陳設如卿之禮侯伯饔餼七牢死牢四飪七牢在西腥三牢在東餼三牢在門西其陳設如子男之禮上公饔餼九牢死五牢飪一牢在西腥四牢在東餼四牢陳于門西其陳皆如侯伯之禮也大行人注云爵卿也則飱二牢饔餼五牢爵大夫也則飱一牢饔餼三牢入有郊勞注賔至逆勞之於郊出有贈賄注去則贈之以貨賄禮之至也國家之敗失之道也則禍亂興注失朝聘宴好之道城濮之役注在僖二十八年音義濮音卜晉無楚備以敗於邲注在宣十二年言兵禍始於城濮音義邲皮必反邲之役楚無晉備以敗於鄢在成十六年音義鄢於晚反疏正義曰以上文類之當注云言兵禍始於邲而不注者從可知也自鄢以來晉不失備而加之以禮重之以睦注君臣和也音義重直用反是以楚弗能報而求親焉既獲姻親又欲恥之以召寇讎備之若何注言何以為􅊀音義姻音因誰其重此注言怨重若有其人恥之可也注謂有賢人以敵晉則可恥之若其未有君亦圗之晉之事君臣曰可矣求諸侯而麇至注麇羣也音義麇丘隕反又其鄖反注同求昏而薦女注薦進也君親送之上卿及上大夫致之猶欲恥之君其亦有備矣不然奈何韓起之下趙成中行吳魏舒范鞅知盈注五卿位在韓起之下皆三軍之將佐也成趙武之子吳荀偃之子音義行戶郎反鞅於丈反知音智將子匠反羊舌肸之下祁午張躍籍談女齊梁丙張骼輔躒苖賁皇皆諸侯之選也注言非凡人音義躍他歷反骼古百反或音各躒力狄反又力各反夲又作櫟同賁扶云反選息戀反韓襄為公族大夫韓須受命而使矣注襄韓無忌子也為公族大夫須起之門子年雖幼已任出使音義使所吏反注及下注同任音壬疏正義曰三年𫝊云韓須如齊逆少姜是受命出使之事箕襄邢帶注二人韓氏族叔禽叔椒子羽注皆韓起庶子疏注正義曰賈逵云然杜依用之杜以上箕襄邢帶食邑於箕邢故為韓氏之族叔禽叔椒皆連叔為文羽又稱子事似兄弟故云皆韓起庶子劉炫以為叔禽等亦是韓起之族既無明證而妄規杜氏非也皆大家也韓賦七邑皆成縣也注成縣賦百乘也音義韓賦七邑韓襄起之兄子箕襄邢帶二人韓氏族韓須叔禽叔椒子羽四人皆韓起子凡七人人一邑乘繩證反下皆同羊舌四族皆彊家也注四族銅鞮伯華叔向叔魚叔虎兄弟四人音義鞮丁兮反疏注正義曰家語孔子曰銅鞮伯華不死天下其定矣其人名亦字伯華食邑於銅鞮叔魚名鮒見於十三年𫝊叔虎見於襄二十一年𫝊於時虎已死今得數叔虎者雖身死其族猶在故傳不言羊舌四人而云四族明指其族也據傳文叔向兄弟四人有叔虎案世夲叔向兄弟有季夙疑季夙即是虎也故服氏數伯華叔向叔魚季夙劉炫以為叔虎於時已死别有季夙而規杜氏非也晉人若喪韓起楊肸五卿八大夫注五卿趙成以下八大夫祁午以下音義喪息浪反楊肸叔后本羊舌氏食采於楊故又號楊肸也輔韓須楊石注石叔向子食我也音義食音嗣因其十家九縣注韓氏七羊舌氏四而言十家舉大數也羊舌四家共二縣故但言彊家疏注正義曰杜以家縣為一故并韓賦七邑與羊舌四族乃為十一而言十家舉大數也羊舌四族族有一縣則又太多故以為四家共二縣也劉炫以為韓須是起之門子不别更稱家去韓須之外韓氏唯有六家并羊舌四族故為十家也今知不然者以𫝊歷序韓襄為公族大夫韓須受命而使即云箕襄以下皆大家故知韓須在其內也又韓賦七邑則韓須冇邑既有其邑自然稱家哀二年𫝊曰上大夫受縣論語云百乘之家家即縣也劉以為韓須不得為家家不得稱縣以為韓氏六家羊舌四家為十家而規杜氏非也長轂九百注長轂戎車也縣百乘音義轂古木反疏正義曰考工記車人云兵車乘車輪崇六尺六寸田車輪崇六尺三寸兵車轂長三尺三寸又云大車半柯長尺半是短也其餘四十縣遺守四千注計遺守國者尚有四千乘音義遺唯季反奮其武怒以報其大恥伯華謀之注伯華叔向兄中行伯魏舒帥之注伯中行吳其蔑不濟矣君將以親易怨注失婚姻之親實無禮以速寇而未有其備使羣臣往遺之禽以逞君心何不可之有疏正義曰啓疆發首言可此云何不可之有言其可也紹上之言服䖍云何不可之有言不可也如是大不識文勢王曰不穀之過也大夫無辱注謝薳啓疆厚為韓子禮王欲敖叔向以其所不知而不能注言叔向之多知音義敖五報反叔向以其所不知絶句多知如字一音智疏正義曰王欲調叔向以為敖樂以其所不知不解之處試之而竟不能王之所為叔向悉解故杜云叔向之多知亦厚其禮韓起反鄭伯勞諸圉注圉鄭地名辭不敢見禮也注奉使君命未反故音義見賢遍反鄭罕虎如齊娶於子尾氏注自為逆也音義娶七住反為于僞反晏子驟見之陳桓子問其故對曰能用善人民之主也注謂授子産政音義驟仕救反夏莒牟夷以牟婁及防兹來奔牟夷非卿而書尊地也注尊重也重地故書以名其人終為不義莒人訴于晉注訴魯受牟夷音義訴悉路反晉侯欲止公范獻子曰不可人朝而執之誘也討不以師而誘以成之惰也為盟主而犯此二者無乃不可乎請歸之間而以師討焉注間暇也音義誘音酉惰徒卧反間音間注同又如字乃歸公秋七月公至自晉莒人來討注討受牟夷不設備戊辰叔弓敗諸蚡泉莒未陳也注嫌君臣異故重發例音義陳直覲反重直用反冬十月楚子以諸侯及東夷伐吳以報棘櫟麻之役注役在四年薳射以繁揚之師㑹于夏汭注㑹楚子音義射食夜反又食亦反越大夫常夀過帥師㑹楚子于瑣注瑣楚地音義過古禾反瑣素果反聞吳師出薳啓疆帥師從之注從吳師也遽不設備吳人敗諸鵲岸注廬江舒縣有鵲尾渚音義遽其據反岸五旦反楚子以馹至於羅汭注馹𫝊也羅水名音義馹人實反𫝊中戀反吳子使其弟蹶由犒師注犒勞音義蹶居衛反犒苦報反楚人執之將以釁鼓王使問焉曰女卜來吉乎對曰吉寡君聞君將治兵於敝邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之注言吳令龜如此音義釁許覲反女音汝守手又反下同亟紀力反龜兆告吉曰克可知也君若歡焉好逆使臣滋敝邑休怠注休解也音義好呼報反使所吏反下竝同解佳賣反而忘其死亡無日矣今君奮焉震電馮怒注馮盛也音義馮皮氷反徐敷求反注同疏正義曰言今君奮起威嚴如天震電盛為瞋怒虐執云云是也虐執使臣將以釁鼓則吳知所備矣敝邑雖羸若早修完注完器備音義羸力危反完音丸其可以息師注息楚之師難易有備可謂吉矣且吳社稷是卜豈為一人使臣獲釁軍鼓而敝邑知備以禦不虞其為吉孰大焉國之守龜其何事不卜注言常卜音義易以䜴反豈為于僞反禦魚吕反疏正義曰難易有􅊀言知楚為患難則吳易有防備也且吳社稷是卜豈為一人恐楚王言女既云吉何故今欲被殺故言此以塞之國之守龜其何事不卜又恐王言龜既言吉而使人乃被殺則是龜之不信故又言此以答之一臧一否其誰能常之城濮之兆其報在邲注城濮戰楚卜吉其效乃在邲音義否悲矣反舊方有反今此行也其庸有報志注言吳有報楚意乃弗殺楚師濟於羅汭沈尹赤會楚子次於萊山薳射帥繁揚之師先入南懷楚師從之及汝清注南懷汝清皆楚界音義萊音來吳不可入注有􅊀楚子遂觀兵於坻箕之山注觀示也音義觀舊音官讀爾雅者皆官喚反注同坻直夷反是行也吳早設備楚無功而還以蹶由歸楚子懼吳使沈尹射待命于巢薳啓疆待命于雩婁禮也注善有􅊀音義雩音于徐况于反如淳同韋昭音虛婁力侯反徐力俱反如淳音樓秦后子復歸於秦注元年奔晋景公卒故也注終五稔之言音義五稔而甚反經六年春王正月杞伯益姑卒注再同盟疏注正義曰益姑以襄二十四年即位二十五年􅉀于重丘魯杞俱在二十九年又杞子來盟是再同盟葬秦景公夏季孫宿如晉葬把文公注無傳宋華合比出奔衛注合比事君不以道自取奔亡書名罪之音義華戶化反比如字又毗志反疏正義曰寺人桞有寵太子佐惡之合比請殺之求媚於太子而欲殺君之寵臣是事君不以道也以此而自取奔亡故書名以罪之秋九月大雩楚薳罷帥師伐吳音義罷音皮冬叔弓如楚齊侯伐北燕傳六年春王正月把文公卒弔如同盟禮也注魯怨把因晉取其田而今不廢喪紀故禮之大夫如秦葬景公禮也注合先王士弔大夫送葬之禮疏注正義曰先王之制諸侯之喪士弔大夫送葬三十年傳文也釋例曰先王之制諸侯之喪士弔大夫送葬及其失也禮過於重文襄之伯因而抑之諸侯之喪大夫弔卿共葬事夫人之喪士弔大夫送葬猶過古制故公子遂如晉葬襄公傳不言禮葬秦景公傳曰大夫如秦葬景公特稱禮也一以示古制二以示書他國之葬必須魯會三以示奉使非卿不書於經此皆丘明之微文也三月鄭人鑄刑書注鑄刑書於鼎以為國之常法音義鑄之樹反疏注正義曰傳直言鑄刑書知鑄之於鼎者二十九年傳云晉趙鞅荀寅賦晉國一鼓鐵以鑄刑鼎著范宣子所為刑書焉彼是鑄之於鼎知此亦是鼎也叔向使詒子産書注詒遺也音義詒以之反遺唯季反曰始吾有虞於子注虞度也言凖度子産以為已法音義度待洛反下同今則已矣注已止也昔先王議事以制不為刑辟懼民之有爭心也注臨事制刑不豫設法也法豫設則民知爭端音義辟婢亦反下皆同爭爭鬪之爭注及下注同疏注正義曰尚書伊訓云先王肇修人紀制官刑警于有位又穆王命吕侯訓夏贖刑作吕刑之篇其經云墨罰之屬千劓罰之屬千剕罰之屬五百宫罰之屬三百大辟之屬二百五刑之屬三千周禮司刑掌五刑之法以麗萬民之罪墨罪五百劓罪五百宫罪五百剕罪五百殺罪五百據此二文雖王者相變條數不同皆是豫制刑矣而云臨事制刑不豫設法者聖王雖制刑法舉其大綱但共犯一法情有淺深或輕而難原或重而可恕聼其時事議其重輕雖依準舊條而斷有出入不豫設定法告示下民令不測其淺深常畏威而懼罪也法之所以不可豫定者於小罪之間或情有大惡盡皆致之極刑則夲非應重之罪悉令從其輕比又不足以創小人也於大罪之間或情冇可恕盡加大辟則枉害良善輕致其罰則脫漏重辜以此之故不得不臨時議之凖狀加罪今鄭鑄之於鼎以章示下民亦既示民即為定法民有所犯依法而斷設令情有可恕不敢曲法以矜之罪實難原不得違制以入之法既豫定民皆先知於是倚公法以展私情附輕刑而犯大惡是無所忌而起爭端也漢魏以來班律於民懼其如此制為比例入罪者舉輕以明重出罪者舉重以明輕因小事而别有大罪者則云所為重以重論皆不可一定故也猶不可禁禦是故間之以義注間防也糾之以政注糾舉也行之以禮守之以信奉之以仁注奉飬也制為祿位以勸其從注勸從教嚴斷刑罰以威其淫注淫放也疏正義曰義者宜也合於事宜間謂防衛也間之以義防衛之使合於事宜者也政者正也齊正在下糾謂舉治也糾之以政舉治之使從於齊正也禮當勉力履行故行之以禮也信當守而勿失故守之以信也仁心所以飬物故奉之以仁也位以序德祿以酬勤有德能勤則居官食祿制為祿位以勸其從順教令也其有犯罪則制之刑罰故嚴斷刑罰以威其驕淫放佚也嚴斷言其不放舍也對文則加罪為刑收贖為罰散則刑罰通也間之以下皆言在上位者行此事治民也懼其未也故誨之以忠聳之以行注聳懼也音義聳息勇反行下孟反教之以務注時所急使之以和注說以使民音義說音悅臨之以敬涖之以彊注施之於事為涖音義涖音利又音類斷之以剛注義斷恩疏正義曰此上言行事此又言用心言雖行上事懼其未從教也故復勞心以撫之於文忠心為忠如心為恕謂如其已心也事親事君逺及諸物宜恕以待之不得虛詐忠是萬事之夲故陳忠恕之事以訓誨之行善得善行惡得惡舉善惡之行以恐懼之時之所急民或不知故教示之以當時之務居上位者失於以威迫人故使之以和當和說以使之臨涖一也臨謂位居其上俯臨其下涖謂有所施為臨撫其事臨謂平常之時涖謂當時之時居上位者失於驕慢臨之以敬言當共敬以臨之其濫於行事者失於懈倦涖之以彊言當彊力以臨之柔而少决為政之病故斷之以剛彊此云斷之以剛即上嚴斷之義嚴謂威可畏剛謂情無私此皆論心故重言之注正義曰聳懼也釋詁文也彼作竦音義同涖亦臨也而與臨别文故解之周禮肆師稱涖卜曲禮云涖官春秋書涖盟皆謂當其事而臨之故云施之於事為涖則臨謂平常涖謂當事以此為異故别文也若散而言之涖亦臨也故論語云不莊以涖之則民不敬是也喪服四制云門內之治恩掩義門外之治義斷恩尚書􅏷征云威克厥愛允濟愛克厥威允罔功是斷獄者皆當義斷恩猶求聖哲之上明察之官注上公侯也官卿大夫也忠信之長慈惠之師民於是乎可任使也而不生禍亂民知有辟則不忌於上注權移於法故民不畏上音義長丁丈反疏正義曰以剛以上雖率意教人猶為未善更求聖哲王公之上制明察大夫之官法忠誠信著之長則慈愛溫惠之師教用此四法以教民民於是乎可任使也注正義曰刑不可知威不可測則民畏上也今制法以定之勒鼎以示之民知在上不敢越法以罪已又不能曲法以施恩則權柄移於法故民皆不畏上竝有爭心以徴於書而徼幸以成之注因危文以生爭緣徼幸以成其巧僞音義徼本作邀古堯反巧如字疏注正義曰法之設文有限民之犯罪無窮為法立文不能網羅諸罪民之所犯不必正與法同自然有危疑之理因此危文以生與上爭罪之心緣徼幸以成其巧僞將有實罪而獲免者也弗可為矣注為治也夏有亂政而作禹刑商有亂政而作湯刑注夏商之亂著禹湯之法言不能議事以制音義夏戶雅反疏注正義曰夏商之有亂政在位多非賢哲察獄或失其實斷罪不得其中至有以私亂公以貨枉法其事不可復治乃逺取創業聖王當時所斷之獄因其故事制為定法亦如鄭鼎所鑄遵舊施行言不能臨時議事以制刑罰也周有亂政而作九刑注周之衰亦為刑書謂之九刑疏注正義曰凖夏商所作當為文武周公之制不以聖王名刑而謂之九刑者蓋周公别為此名故稱之耳三辟之興皆叔世也注言刑書不起於始盛之世疏注正義曰三辟謂禹刑湯刑九刑也辟罪也三者斷罪之書故為刑書皆是叔世所為言刑書不起於始盛之世議事制罪叔世不復能然采取上世决事之比作書以為後法其事是始盛之世作書於衰亂之時服䖍云政衰為叔世叔世踰於季世季世不能作辟也今吾子相鄭國作封洫注在襄三十年音義相􅒚亮反洫况域反立謗政注作丘賦在四年音義謗布浪反制參辟鑄刑書注制參辟謂用三代之末法音義參七南反一音三疏注正義曰制參辟鑄刑書是一事也為其文是制參辟勒於鼎是鑄刑書也三代之辟皆取前世故事制以為法子産亦取上世故事故謂之制參辟言其所用三代之末法非謂子産所作還寫三代之書也子産蓋亦采取上世所聞見斷獄善者以為書也將以靖民不亦難乎詩曰儀式刑文王之德日靖四方注詩頌言文王以德為儀式故能日有安靖四方之功刑法也疏正義曰周頌我將之篇祀文王之樂歌也杜言文王以德為儀式刑法也則儀式刑三者皆為法也言以德為儀式法者是文王之德也由其以德為法故能日日有安靖四方之功也服䖍云儀善式用刑法靖謀也言善用法文王之德日日謀安四方此解於文便於杜也又曰儀刑文王萬邦作孚注詩大雅言文王作儀法為天下所信孚信也疏正義曰大雅文王之篇也服䖍云儀善也刑法也善用法者文王也言文王善用其法故能為萬國所信也亦便於杜如是何辟之有注言詩唯以德與信不以刑也民知爭端矣將棄禮而徴於書注以刑書為徴疏正義曰端謂本也今鑄鼎示民則民知爭罪之本在於刑書矣制禮以為民則作書以防民罪違禮之愆非刑書所禁故民將棄禮而取徴驗於書也刑書無違禮之罪民必棄禮而不用矣錐刀之末將盡爭之注錐刀末喻小事亂獄滋豐賄賂竝行終子之世鄭其敗乎疏正義曰子産鑄刑書而叔向責之趙鞅鑄刑鼎而仲尼譏之如此傳文則刑之輕重不可使民知也而李悝作法蕭何造律頒於天下懸示兆民秦漢以來莫之能革以今觀之不可一日而無律也為當吏不及古民僞於昔為是聖人作法不能經逺古今之政何以異乎斯有㫖矣古者分地建國作邑命家諸侯則奕世相承大夫亦子孫不絶皆知國為我土衆實我民自有愛吝之心不生殘賊之意故得設法以待刑臨事而議罪不須豫以告民自令常懷怖懼故仲尼叔向所以譏其鑄刑書也秦漢以來天下為一長吏以時遷代其民非復已有懦弱則為殿負彊猛則為稱職且疆域闊逺户口滋多大郡竟餘千里上縣數以萬計豪橫者陵蹈邦邑桀健者雄張閭里故漢世酷吏専任刑誅或乃肆情好殺成其不撓之威違衆用已以表難測之知至有積骸滿穽流血丹野郅都被蒼鷹之號延年受屠伯之名若復信其殺伐任其縱舍必將喜怒變常愛憎改意不得不作法以齊之宣衆以令之所犯當條則斷之以律疑不能决則讞之上府故得萬民以察天下以治聖人制法非不善也古不可施於今今人所作非能聖也足以周於所用觀民設教遭時制宜謂此道也肸聞之國將亡必多制注數改法其此之謂乎復書曰若吾子之言注復報也疏正義曰若如也誠如吾子之言也僑不才不能及子孫吾以救世也既不承命敢忘大惠注以針戒為惠疏正義曰當時鄭國大夫邑長蓋有斷獄不平輕重失中故作此書以令之所以救當世士文伯曰火見鄭其火乎注火心星也周五月昏見火未出而作火以鑄刑器注刑器鼎也藏爭辟焉火如象之不火何為注象類也同氣相求火未出而用火相感而致災疏注正義曰作刑書以示民教民使爭罪故謂之爭辟火出而象之象類也謂以類相感而致災也同氣相求易文言文也周禮司爟云季春出火民咸從之季秋內火民亦如之鄭𤣥云火所以用陶冶民隨國而為之是火星未出不得用火今鄭火未出而用火以鑄鼎及火星出則相感以致災服䖍云鑄鼎藏爭辟故今出火與五行之火爭明故為災在器故稱藏也夏季孫宿如晉拜莒田也注謝前年受牟夷邑不見討晉侯享之有加籩注籩豆之數多於常禮武子退使行人告曰小國之事大國也茍免於討不敢求貺注貺賜也得貺不過三獻注周禮大夫三獻疏注正義曰周禮卿五獻大夫三獻故鄭注掌客爵卿也饔餼五牢爵大夫也饔餼三牢獻視饔餼之數故言大夫三獻也若依古禮大小國之卿皆五獻大夫三獻故聘禮侯伯之卿出聘饔餼五牢獻同饔餼之數至春秋之時唯大國得從古禮故昭元年鄭人享趙孟注云朝聘之制大國之卿五獻其次國以下卿則從大夫之禮故今武子云得貺不過三獻周禮無此文大行人云上公九獻侯伯七獻子男五獻各如其命數典命云公侯伯之卿皆三命知其當三獻也大夫卿之總名故注云三獻也今豆有加下臣弗堪無乃戾也注懼以不堪為罪疏正義曰上言加籩此言豆者籩豆竝加互舉其一也韓宣子曰寡君以為歡也注以加禮致歡對曰寡君猶未敢注未敢當此加也疏正義曰魯侯爵禮當七獻上文唯言享有加籩已知加於常禮不知幾獻籩豆未必過七獻也言寡君猶未敢當者謙耳况下臣君之隸也敢聞加貺固請徹加而後卒事晉人以為知禮重其好貨注宴好之貨宋寺人桞有寵注有寵於平公音義寺夲又作侍桞良九反寺人名太子佐惡之華合比曰我殺之注欲以求媚太子音義惡烏路反栁聞之乃坎用牲埋書注詐為盟處音義處昌慮反下同而告公曰合比將納亡人之族注亡人華臣也襄十七年奔陳既盟於北郭矣公使視之有焉遂逐華合比合比奔衛於是華亥欲代右師注亥合比弟欲得合比處乃與寺人桞比從為之徴曰聞之久矣注聞合比欲納華臣音義合比毗志反公使代之注代合比為右師見於左師注左師向戌音義見腎遍反又如字左師曰女夫也必亡注夫謂華亥音義女音汝下并注同夫方于反注同女喪而宗室於人何有人亦於女何有注言人亦不能愛女音義喪息浪反詩曰宗子維城毋俾城壞毋獨斯畏注詩大雅言宗子之固若城俾使也音義俾必爾反疏正義曰大雅板之篇凡伯刺厲王之詩也言宗子之同維若城也即謂宗子為城言宗人當固之毋使此城傾壞傾壞則女獨矣女既獨此必冇所畏懼也女其畏哉注為二十年華亥出奔傳六月丙戌鄭災注終士文伯之言楚公子棄疾如晉報韓子也注報前年送女過鄭鄭罕虎公孫僑游吉從鄭伯以勞諸柤辭不敢見注不敢當國君之勞柤鄭地音義過地卧反乂古禾反從才用反或如字勞力報反注及下同柤側加反見賢遍反下見王注見鄭伯如見楚王私見鄭伯同固請見之見如見王注見鄭伯如見楚王言棄疾共而有禮疏注正義曰見如見王是共也辭不敢見是禮也以其乘馬八匹私面注私見鄭伯音義乘繩證反見子皮如上卿注如見楚卿以馬六匹見子産以馬四匹見子大叔以馬二匹注降殺以兩音義殺所界反禁芻牧採樵不入田注不犯田種音義芻初俱反樵似遙反下同不樵樹不采蓻注蓻種也疏正義曰不樵樹不伐樹以為樵不采蓻不采所種之菜果不抽屋不强丐疏正義曰服䖍云抽裂也言不毁裂所舍之屋也丐乞也不就人強乞也誓曰有犯命者君子廢小人降注君子則廢黜不得居位小人則退給下劇也音義抽敕留反強其丈反又其良反丐夲或作丐音蓋乞也說文作丐逯安說亡人為丐黜敕律反舍不為暴主不慁賔注慁患也音義慁户困反往來如是鄭三卿皆知其將為王也注三卿罕虎公孫僑游吉韓宣子之適楚也楚人弗逆公子棄疾及晉竟晉侯將亦弗逆叔向曰楚辟我衷注辟邪也衷正也音義竟音境下注同辟匹亦反注及下同衷音忠邪似嗟反若何效辟詩曰爾之教矣民胥效矣注詩小雅言上教下效音義效戶孝反下同從我而已焉用效人之辟書曰聖作則注逸書則法也音義焉於䖍反無寧以善人為則注無寧寧也而則人之辟乎匹夫為善民猶則之况國君乎晉侯說乃逆之注傳言叔向知禮音義說音悅秋九月大雩旱也徐儀楚聘于楚注儀楚徐大夫楚子執之逃歸懼其叛也使薳泄伐徐注薳泄楚大夫音義泄息列反吳人救之令尹子蕩帥師伐吳師于豫章而次于乾溪注乾溪在譙國城父縣南楚東竟音義溪苦兮反父音甫吳人敗其師於房鍾注房鍾吳地獲宫廄尹棄疾注鬪韋龜之父音義廄九又反子蕩歸罪於薳泄而殺之注歸罪於薳泄不以敗告故不書冬叔弓如楚聘且弔敗也注弔為吳所敗疏正義曰如上注不以敗告故不書而得弔敗者夲自為聘聞敗因弔之故言且也十一月齊侯如晉請伐北燕也注告盟主士丐相士鞅逆諸河禮也注士丐晉大夫相為介得敬逆來者之禮音義丐古害反夲或作丐相息亮反注同士鞅於丈反今傳夲皆作士丐相士鞅古夲士丐或作王正董遇王肅夲同學者皆以士丐是范宣子即士鞅之父不應取其父同姓名人以為介今傳夲誤也依王正為是王元規云古人質口不言之耳何妨為介也案士文伯是士鞅之族亦名丐無妨今相范鞅即文伯也然士文伯名古夲或有作正者解見前卷襄三十一年介音界疏正義曰世族譜以王正為雜人諸夲及王肅董遇注皆作王正俗夲或誤為士丐此人不當取士鞅之父同姓名而為之介也晉侯許之十二月齊侯遂伐北燕將納簡公注簡公北燕伯三年出奔齊晏子曰不入燕有君矣民不二吾君賄左右諂諛作大事不以信未嘗可也注為明年暨齊平傳音義諂敕檢反諛羊朱反春秋左傳注疏卷四十三春秋左氏傳注疏卷四十三考證舍中軍林堯叟曰舍中軍從祀先公皆善辭也非國史無以知舍中軍為季氏専魯從祀先公為陽虎専季氏也又按萬斯大學春秋隨筆曰向作三軍今舍中軍季宿弱二子更弱公室也宿既將中軍専魯政復私計已與二子歸公雖異分國維均因乘叔豹之死舍去中軍已専一軍而以一軍屬二子傳言四分公室者對二子而為言也如是則已不居中軍之名而實則益前之半二子有分民而無専將公室有貢而無民故曰舍中軍者季宿弱二子更弱公室也莒牟夷以牟婁及防兹來奔臣召南按牟婁杜氏不注以隱四年莒人伐把取牟婁已注也楚子蔡侯陳侯許男頓子沈子徐人越人伐吳林堯叟曰越始見經通吳以疲楚者晉謀之失也通越以困吳者楚謀之失也傳舍中軍卑公室也疏還復二軍不得言舍三軍還復二軍監夲訛作還作三軍劉炫之意解經書舍中軍不言舍三軍也夲作還復者是今改正又疏傳稱孟孺子泄帥右師孟孺子泄監夲訛作孟子孺泄今改正傳故有十時亦當十位臣召南按杜解十時十位即用七年傳芊尹無宇所云天有十日人有十等王公大夫士皂輿隸僚僕臺者也彼傳云天有十日故以甲至癸解之此傳云日有十時就一日言下云日上其中食日為二旦日為三故以雞鳴夜半等配之又注人定為輿輿監夲訛作與今改正傳象日之動林堯叟曰日動物也雖有夷傷其動不爽君子象也傳晉侯送女于邢丘陳傅良曰傳言晉卑事楚趙汸補注曰傳記齊請繼室于晉晉亦歸女于楚其後齊又女于吳齊晉皆伯國也於是並衰至薦女以相結楚吳所以獨強又疏於天子則諸卿皆行諸卿監夲訛作諸侯今改正傳自郊勞至于贈賄疏據大行人上公三勞云云臣召南按所引大行人惟上公三勞一句耳主國使下大夫勞王畿卿勞于逺郊主君自勞于近郊並非彼注而文義亦晦大約三勞之目賔及境一也及逺郊二也及近郊三也惟近郊君自出勞其餘使卿大夫傳設機而不倚監夲訛作設機今以陸氏音義定作設機傳飱有陪鼎疏按聘禮歸饔餼五牢於賔館云云孔氏以已意貫串聘禮為之非儀禮原文傳吳人敗諸鵲岸注廬江舒縣有鵲尾渚廬監夲訛作盧今改正傳火如象之不火何為臣召南按漢書五行志引此作火而象之蓋古人如而二字通用也志又引劉歆說曰火星出於周五月而鄭以三月作火鑄鼎刻刑辟書以與民約是為刑器爭辟故火星出與五行之火爭明為災其象然也不書於經不告魯也春秋左氏傳注疏卷四十三考證
