body:
  text: 春秋左傳注疏卷十四起僖公二十二年盡二十四年晉杜氏注唐陸徳明音義孔穎達疏經二十有二年春公伐邾取須句注須句雖别國而削弱不能自通為魯私屬若顓臾之比魯謂之社稷之臣故滅奔及反其君皆略不備書惟書伐邾取須句音義比必二反疏正義曰上傳云須句子則須句子爵故云雖别國而不能自通為魯私屬若襄公之世鄫國屬魯故知如顓臾之比略不備書也夏宋公衞侯許男滕子伐鄭秋八月丁未及邾人戰于升陘注升陘魯地邾人縣公胄于魚門故深恥之不言公又不言師敗績音義陘音刑縣音𤣥胄直救反冬十有一月己巳朔宋公及楚人戰于泓宋師敗績注泓水名宋伐鄭楚救之故戰也楚告命不以主帥人數故略稱人音義帥所類反傳二十二年春伐邾取須句反其君焉禮也注得恤寡小之禮三月鄭伯如楚夏宋公伐鄭子魚曰所謂禍在此矣注怒鄭至楚故伐之為下泓戰起初平王之東遷也注周幽王為犬戎所滅平王嗣位故東遷洛邑辛有適伊川見被髪而祭于野者注辛有周大夫伊川周地伊水也音義被皮寄反下注同曰不及百年此其戎乎其禮先亡矣注被髪而祭有象夷狄疏正義曰其中國之禮先亡矣秋秦晉遷陸渾之戎于伊川注允姓之戎居陸渾在秦晉西北二國誘而徙之伊川遂從戎號至今為陸渾縣也計此去辛有過百年而云不及百年傳舉其事驗不必其年信音義渾户門反一音胡困反疏正義曰昭九年傳曰先王居檮杌于四裔故允姓之姦居于𤓰州伯父恵公歸自秦而誘以來是此戎為允姓也彼注云𤓰州今敦煌則陸渾是敦煌之地名也徙之伊川復以陸渾為名故至今為陸渾縣十一年傳稱伊洛之戎同伐京師則伊洛先有戎矣而以今始遷戎為卒有言驗者蓋今之遷戎始居被髪祭野之處故耳晉太子圉為質于秦將逃歸謂嬴氏曰與子歸乎注嬴氏秦所妻子圉懷嬴也音義質音致妻七計反對曰子晉太子而辱于秦子之欲歸不亦宜乎寡君之使婢子侍執巾櫛注婢子婦人之卑稱也音義櫛側乙反稱尺證反下之稱同疏正義曰曲禮云夫人自稱於其君曰小童世婦以下自稱曰婢子是婢子為婦人之卑稱以固子也從子而歸棄君命也不敢從亦不敢言遂逃歸注傳終史蘇之占富辰言於王曰請召大叔注富辰周大夫大叔王子帶十二年奔齊音義太叔音泰注同詩曰協比其鄰昏姻孔云注詩小雅言王者為政先和協近親則昏姻甚相歸附也鄰猶近也孔甚也云旋也音義比毗志反疏正義曰詩小雅正月之篇也毛傳云洽合鄰近云旋也言王者和合親比其近親則昏姻甚廻旋而相歸附其詩之意欲令王親親以及逺吾兄弟之不恊焉能怨諸侯之不睦王說王子帶自齊復歸于京師王召之也注傳終仲孫湫之言也為二十四年天王出居于鄭起音義焉於䖍反說音悅湫子小反邾人以須句故出師公卑邾不設備而禦之注卑小也音義禦本亦作御音魚呂反臧文仲曰國無小不可易也無備雖衆不可恃也詩曰戰戰兢兢如臨深淵如履薄冰注詩小雅言常戒懼音義易以豉反下同兢居陵反本或作矜又曰敬之敬之天惟顯思注顯明也思猶辭也命不易哉注周頌言有國宜敬戒天明臨下奉承其命甚難疏正義曰詩周頌羣臣進戒成王之辭言為國君者宜敬之哉敬之哉天之道唯明見思言天之臨下善惡必察奉承天命不易哉言其承天命甚為難先王之明徳猶無不難也無不懼也况我小國乎君其無謂邾小蠭蠆有毒音義蠭芳容反本又作螽俗作蜂皆同蠆勅邁反又勅戒反字林作蠆丑介反又他割反疏正義曰說文蠭飛蟲螫人者也蠆毒蟲也方言云燕趙謂蠭為蠓螉其小者謂之蠮螉通俗文云蠆長尾謂之蠍蠍毒傷人曰䖧張列反字或作蜇而况國乎弗聽八月丁未公及邾師戰于升陘我師敗績邾人獲公胄縣諸魚門注胄兠鍪魚門邾城門音義升陘本亦作登陘縣音𤣥兠丁侯反鍪莫侯反疏正義曰説文云胄兠鍪首鎧也書傳皆云胄無兠鍪之文言兠鍪舉今以曉古蓋秦漢以來語楚人伐宋以救鄭宋公將戰大司馬固諫曰天之棄商久矣君將興之弗可赦也已注大司馬固莊公之孫公孫固也言君興天所棄必不可不如赦楚勿與戰弗聽冬十一月己巳朔宋公及楚人戰于泓宋人既成列楚人未既濟注未盡渡泓水司馬曰注子魚也彼衆我寡及其未既濟也請擊之公曰不可既濟而未成列又以告公曰未可既陳而後擊之宋師敗績公傷股門官殲焉注門官守門者師行則在君左右殲盡也音義陳直覲反殲子廉反疏正義曰周禮虎賁氏掌先後王而趨以卒伍軍旅會同亦如之舍則守王閑王在國則守王宫國有大故則守王門諸侯之禮亡其官屬不可得而知此門官蓋亦天子虎賁氏之類故在國則守門師行則在君左右近公故盡死也殲盡釋詁文舍人云殲衆至盡也國人皆咎公公曰君子不重傷不禽二毛注二毛頭白有二色音義咎其九反重直用反下同古之為軍也不以阻隘也注不因阻隘以求勝音義隘於賣反寡人雖亡國之餘注宋商紂之後不鼓不成列注恥以詐勝疏正義曰軍法鳴鼔以戰因謂交戰為鼔彼不成列而鼓以擊之是詐以求勝故注云恥以詐勝子魚曰君未知戰勍敵之人隘而不列天贊我也注勍强也言楚在險隘不得陳列天所以佐宋音義勍其京反阻而鼔之不亦可乎猶有懼焉注雖因阻擊之猶恐不勝且今之勍者皆吾敵也雖及胡耉注今之勍者謂與吾競者胡耉元老之稱音義耉音苟疏正義曰諡法保民耆艾曰胡胡是老之稱也釋詁云耉夀也舍人曰耉覯也血氣精華覯竭言色赤黒如狗矣孫炎曰耉面如凍梨色似浮垢老人夀徵也獲則取之何有于二毛疏正義曰用兵之法前敵無問彊弱不可遺留且復若留彊者還為己害故曰且今之陳上不被損傷材力彊者皆能與吾相敵若其不殺還來害我是以雖及胡耉獲則取之何有恩義於二毛之人明恥敎戰求殺敵也注明設刑戮以恥不果傷未及死如何勿重注言尚能害己若愛重傷則如勿傷愛其二毛則如服焉注言苟不欲傷殺敵人則本可不須鬭疏正義曰如猶不如古人之語然猶似敢即不敢若愛彼重傷則不如本勿傷之若愛其二毛不欲傷害則不如早服從之何須與戰三軍以利用也注為利興音義為于偽反金鼔以聲氣也注鼔以佐士衆之聲氣疏正義曰言金鼔以聲氣謂金鼔佐士衆之聲氣下文聲盛致志者謂士衆由聞金鼔聲氣滿盛能致勇武之志以擊前敵為此前敵儳巖未陳鼓而擊之可也注不言金當以金有止衆之時不足盡以聲氣故也周禮鼔人掌敎六鼔四金之音聲以節聲樂以和軍旅以正田役以金錞和鼔以金鐲節鼔以金鐃止鼓以金鐸通鼓是錞鐲鐸皆助鼔以聲氣其鐃則鳴之以止鼓大司馬敎戰法亦云三刺之後乃鼔退鳴鐃且却哀十一年傳書曰此行也吾聞鼔而已不聞金矣杜云鼓以進軍金以退軍不聞金言將死也是金有止鼓之時非盡用以聲氣注不言金見此意也利而用之阻隘可也聲盛致志鼔儳可也注儳巖未整陳音義儳仕銜反又仕減反陳直覲反又如字丙子晨鄭文夫人芈氏姜氏勞楚子于柯澤注楚子還過鄭鄭文公夫人芈氏楚女姜氏齊女也柯澤鄭地音義芉彌爾反楚姓也勞力報反柯音哥疏正義曰以芈是楚姓姜是齊姓故云楚女齊女耳亦無明文言之二者共以夫人冠之蓋俱是夫人禮無二適而有兩夫人者當時僣恣不如禮也楚子使師縉示之俘馘注師縉楚樂師也俘所得囚馘所截耳音義縉音晉俘芳扶反囚也馘古或反戰所獲疏正義曰書傳所言師曠師曹師蠲之類皆是樂師知此師縉亦樂師也釋詁文俘取也馘獲也李廵云囚敵曰俘伐執之曰取郭璞云今以獲賊耳為馘毛詩傳曰殺而獻其耳曰馘鄭箋云馘所格者左耳也然則俘者生執囚之馘者殺其人截取其左耳欲以計功也君子曰非禮也婦人送迎不出門見兄弟不踰閾注閾門限音義閾音域一音况域反疏正義曰釋宫云柣謂之閾孫炎曰柣門限也經傳諸注皆以閾為門限謂門下横木為外内之限也戎事不邇女器注邇近也器物也言俘馘非近婦人之物音義近如字又附近之近下同丁丑楚子入饗于鄭注為鄭所饗音義為于偽反九獻注用上公之禮九獻酒而禮畢疏正義曰周禮大行人云上公九獻侯伯七獻子男五獻案儀禮主人酌以獻賓賓酢主人主人又酌以酬賓乃成一獻之禮九獻者九為獻酬而禮始畢也楚實子爵以霸主自許故鄭以極禮待之庭實旅百注庭中所陳品數百也加籩豆六品注食物六品加於籩豆籩豆禮食器疏正義曰饗禮既亡庭實所有及所加籩豆無以言之然鄭注周禮享禮兼燕禮食禮與飱禮略同掌客云饔餼之禮其死牢如飱之陳上公飱五牢餁一牢陳在西階之前正鼎九牛一羊二豕三魚四腊五腸胃六膚七鮮魚八鮮腊九從北南陳又有陪鼎三膷鼎一在牛鼎之後臐鼎一在羊鼎之後膮鼎一在豕鼎之後腥四牢陳於東階之前牢别九鼎無陪鼎也侯伯飱四牢餁一牢腥三牢子男飱二牢餁一牢腥二牢其陳列皆如上公又上公醯六十罋從陳於庭碑東醢六十罋從陳於碑西侯伯醯醢百罋子男八十罋其陳如上公又上公米百有二十莒横陳於醯醢之間侯伯百筥子男八十筥陳如上公此飱禮庭實之物饔餼亦然掌客上公豆四十侯伯三十二子男二十四鄭注云公四十豆堂上十六西夾東夾各十二侯伯三十二豆堂上十二西夾東夾各十子男二十四豆堂上十二西夾東夾各六然籩數亦然其籩豆之物者周禮籩人掌四籩之實朝事之籩其實䵄蕡白黑形鹽膴鮑魚鱐饋食之籩其實棗栗桃乾䕩榛實加籩之實蓤芡栗脯羞籩之實糗餌粉餈醢人掌四豆之實朝事之豆其實韭菹醓醢昌本麋臡菁菹鹿臡茆菹䴢臡饋食之豆其實葵菹蠃醢脾析蠯醢蜃蚳醢豚拍魚醢加豆之實芹菹兎醢深蒲醓醢箈菹鴈醢笱菹魚醢羞豆之實酏食糝食此等所陳雖為祭祀下云賓客亦如之是賓客與祭祀不異故三十年饗有昌歜白黑形鹽公食大夫禮亦有昌本之屬此云加籩豆六品必是此等之物但傳文不具無以言之饗畢夜出文芈送于軍取鄭二姬以歸注二姬文芈女也叔詹曰楚王其不没乎注不以夀終音義詹章廉反没門忽反為禮卒于無别無别不可謂禮將何以没諸侯是以知其不遂霸也注言楚子所以師敗城濮終為商臣所弑音義卒子恤反别彼列反下同濮音卜弑音試經二十有三年春齊侯伐宋圍緡注緡宋邑高平昌邑縣東南有東緡城音義緡亡巾反夏五月庚寅宋公兹父卒注三同盟疏正義曰兹父以九年即位其年盟于葵丘十五年于牡丘唯與魯同此二盟而已而云三者并數盟于薄釋宋公也案經盟于薄始云釋宋公則盟薄之時宋公未得與盟而數之者以凡盟之法皆舎其前惡結其後好故宣十五年楚人圍宋圍後始盟及城下之盟皆是其事今釋宋公之後恐楚人伐宋宋公恨楚故盟以結之若未釋宋公之前何須盟誓但經文欲顯公㑹之事故盟在釋前劉炫以宋公不與薄盟而規杜云非也秋楚人伐陳疏正義曰傳稱楚成得臣帥師伐陳則是楚之貴卿也而稱人者釋例曰楚之君臣最多混錯此及楚之初興未閑周之典禮告命之書自生異同猶秦之辟陋不與中國凖故成二年以上春秋未以入例也如杜彼言楚不以得臣名告故稱人耳冬十有一月杞子卒注傳例曰不書名未同盟也杞入春秋稱侯莊二十七年絀稱伯至此用夷禮貶稱子音義絀本又作黜勑律反傳二十三年春齊侯伐宋圍緡以討其不與盟于齊也注十九年盟于齊以無忘桓公之德而宋獨不會復召齊人共盟鹿上故今討之音義與音預復扶又反下不復成嫁同夏五月宋襄公卒傷于泓故也注終子魚之言得死為幸秋楚成得臣帥師伐陳討其貳于宋也注成得臣子玉也遂取焦夷城頓而還注焦今譙縣也夷一名城父今譙郡城父縣二地皆陳邑頓國今汝隂南頓縣音義焦子消反子文以為之功使為令尹叔伯曰子若國何注叔伯楚大夫薳呂臣也以為子玉不任令尹音義薳為彼反任音壬對曰吾以靖國也夫有大功而無貴仕注貴仕貴位音義靖音静其人能靖者與有㡬注言必矜功為亂不可不賞音義其人能靖者與絶句與音餘幾居宜反九月晉惠公卒注經在明年從赴懷公命無從亡人注懷公子圉亡人重耳音義重直龍反期期而不至無赦狐突之子毛及偃從重耳在秦弗召注偃子犯也音義期期上如字下音基下亦作朞下注未期亦音基從才用反後皆同冬懷公執狐突曰子來則免注未期而執突以不召子故對曰子之能仕父敎之忠古之制也策名委質貳乃辟也注名書於所臣之策屈膝而君事之則不可以貳辟罪也音義質如字辟婢亦反注同膝星歴反疏正義曰策簡策也質形體也古之仕者於所臣之人書己名於策以明繫屬之也拜則屈膝而委身體於地以明敬奉之也名繫於彼所事之君則不可以貳心辟罪釋詁文今臣之子名在重耳有年數矣若又召之敎之貳也父教子貳何以事君刑之不濫君之明也臣之願也淫刑以逞誰則無罪臣聞命矣乃殺之卜偃稱疾不出曰周書有之乃大明服注周書康誥言君能大明則民服音義濫力暫反已則不明而殺人以逞不亦難乎民不見德而唯戮是聞其何後之有注言懷公必無後於晉為二十四年殺懷公張本音義逞勑景反本亦作呈之十一月杞成公卒書曰子杞夷也注成公始行夷禮以終其身故於卒貶之杞實稱伯仲尼以文貶稱子故傳言書曰子以明之疏正義曰何休膏肓難左氏云杞子卒豈當用夷禮死乎故解之此杞成公始行夷禮以終其身故於卒貶之卒者人之終於終貶之見其終身行夷禮也於時杞實稱伯唯此獨稱子是仲尼以文貶之稱子貶之而曰子者曲禮曰其在東夷北狄西戎南蠻雖大曰子四夷之君爵不過子故貶之為子言如夷狄之大國耳不書名未同盟也凡諸侯同盟死則赴以名禮也注隱七年已見今重發不書名者疑降爵故也此凡又為國史承告而書例音義見賢遍反重而用反下重詳同為于偽反又如字赴以名則亦書之注謂未同盟不然則否注謂同盟而不以名告辟不敏也注敏猶審也同盟然後告名赴者之禮也承赴然後書策史官之制也内外之宜不同故傳重詳其義疏正義曰隠七年已有例矣今重發者釋例曰杞侯降爵嫌有異同故傳重發不書之例又更發凡者以明雖薨赴有法若或違之國史亦承告而書不必改正也赴以名則亦書之者謂諸侯雖不同盟或以名赴也不然則否辟不敏者謂雖同盟而赴不以名則亦不書名以審違謬也晉公子重耳之及於難也晉人伐諸蒲城注事在五年音義難乃旦反蒲城人欲戰重耳不可曰保君父之命而享其生祿注享受也保猶恃也疏正義曰人以祿生故謂之生祿於是乎得人注以祿致衆有人而校罪莫大焉注校報也音義校音敎吾其奔也遂奔狄從者狐偃趙衰注衰趙夙弟音義衰初危反顛頡魏武子注武子魏犫音義頡戸結反犫尺由反司空季子注胥臣臼季也時狐毛賈佗皆從而獨舉此五人賢而有大功音義臼其九反它徒何反疏正義曰胥氏也臣名也晉有臼邑蓋食采於臼邑字季子而為司空之官故名氏互見也不言狐毛賈佗而獨舉此五人者賢而有大功故也顛頡歸晉尋即被戮而言大功者當為從亡之時有大功也晉語稱公子長事賈佗佗非不賢蓋傳文意之所在便即言之未必五人皆賢於賈佗狄人伐廧咎如注廧咎如赤狄之别種也隗姓音義廧在良反咎古刀反隗五罪反下文皆同疏正義曰成二年晉郤克衛孫良夫伐廧咎如傳曰討赤狄之餘焉彼言赤狄之餘知是赤狄之别種也女曰叔隗季隗知為隗姓也獲其二女叔隗季隗納諸公子公子取季隗生伯鯈叔劉以叔隗妻趙衰生盾注盾趙宣子音義鯈直由反妻七計反下同盾徒本反將適齊謂季隗曰待我二十五年不來而後嫁對曰我二十五年矣又如是而嫁則就木焉注言將死入木不復成嫁請待子處狄十二年而行注以五年奔狄至十六年而去音義請待子絶句過衞衞文公不禮焉出于五鹿注五鹿衞地今衞縣西北有地名五鹿陽平元城縣東亦有五鹿乞食于野人野人與之塊公子怒欲鞭之子犯曰大賜也注得土有國之祥故以為天賜音義塊苦對反又苦怪反稽首受而載之疏正義曰晉語云過五鹿乞食於野人野人舉塊以與之公子怒將鞭之子犯曰天賜也民以土服又何求焉天事必象十二年必獲此土二三子志之嵗在夀星及鶉尾其有此土乎天以命矣復於夀星必獲諸侯天之道也由是始之有此其以戊申乎所以申土也再拜稽首受而載之及齊齊桓公妻之有馬二十乘注四馬為乘八十匹也音義乘繩證反注及下皆同公子安之從者以為不可將行謀于桑下注齊桓既卒知孝公不可恃故蠶妾在其上以告姜氏姜氏殺之注姜氏重耳妻恐孝公怒其去故殺妾以滅口疏正義曰晉語云齊侯妻之甚善焉有馬二十乘將死於齊而已曰民生安樂孰知其他桓公卒孝公即位諸侯叛齊子犯知齊之不可以動而知文公之安齊有終焉之心欲行而患之與從者謀於桑下蠶妾在焉莫知其在也妾告姜氏姜氏殺之而謂公子曰子有四方之志其聞之者吾殺之矣公子曰無之姜曰行也懷與安實敗名公子不可姜與子犯謀醉而遣之醒以戈逐子犯注無去志故怒音義敗必邁反醒星頂反疏正義曰晉語云逐子犯曰若無所濟吾食舅氏肉其知饜乎舅犯走且對曰若無所濟吾未知死所誰能與豺狼争食若克有成公子無亦晉之柔嘉是以甘食偃之肉腥臊將焉用之遂行及曹曹共公聞其駢脅欲觀其裸浴薄而觀之注薄廹也駢脅合幹音義共音恭聞其駢脅絶句駢薄賢反脅許業反說文云駢脅并也廣雅云脅幹之為肋通俗云腋下謂之脅欲觀如字絶句一讀至祼字絶句祼力果反又户化反浴音欲薄如字國語注薄簾也幹古旦反疏正義曰斷其祼以上為句裸謂赤體無衣也駢脅非裸不見故欲觀其裸伺其浴乃逼廹以觀之晉語云曹共公聞其駢脅欲觀其狀止其舍諜其將浴設微薄而觀之孔晁云諜候也微蔽也注正義曰薄者逼近之意故為迫也說文云駢脅并幹也肋脅骨也廣雅云脅幹謂之肋孔晁云聞公子脅幹是一骨故欲觀之通俗文曰腋下謂之脅如此諸說則脅是腋下之名其骨謂之肋幹是肋之别名駢訓比也骨相比迫若一骨然僖負羇之妻曰吾觀晉公子之從者皆足以相國若以相注若遂以為傅相音義羇紀宜反相息亮反下及注同夫子必反其國反其國必得志于諸侯得志于諸侯而誅無禮曹其首也子盍蚤自貳焉注自貳自别異於曹音義盍戸臘反蚤音早别彼列反乃饋盤飱寘璧焉注臣無竟外之交故用盤藏璧飱中不欲令人見音義饋其貴反遺也飱音孫說文云餔也字林云水澆飯也寘之豉反竟音境令力呈反公子受飱反璧及宋宋襄公贈之以馬二十乘注贈送也及鄭鄭文公亦不禮焉叔詹諫曰臣聞天之所啓人弗及也注啓開也疏正義曰啓開也凡是天開道者非人所能及欲令鄭伯禮之晉公子有三焉天其或者將建諸疏正義曰天意不可必知故言或者謂天意或當然也君其禮焉男女同姓其生不蕃注蕃息也音義蕃音煩注同疏正義曰禮取妻不取同姓辟違禮而取故其生子不能蕃息昌盛也晉語曰同姓不婚懼不殖也又曰異姓則異徳異徳則異類異類雖近男女相及以生民也同姓則同徳同徳則同心同心則同志同志雖逺男女不相及畏黷故也黷則生怨怨亂育災災育滅姓是故取辟同姓畏亂災也周禮不得取同姓彼遂演説其意耳未必取同姓者皆滅姓也晉公子姬出也而至于今一也注犬戎狐姬之子故曰姬出離外之患注出奔在外而天不靖晉國殆將啓之二也有三士足以上人而從之三也注國語狐偃趙衰賈佗三人皆卿才音義從如字一音才用反疏正義曰晉語云僖負羇言於曹伯曰晉公子生十七年而亡卿才三人從之可謂賢乎宋公孫固言於襄公曰晉公子好善不厭父事狐偃師事趙衰而長事賈佗此三人者實左右之公子居則下之動則諮焉僖負羇言有卿才公孫固説其名氏知是一物故并引之晉鄭同儕注儕等也音義儕士皆反其過子弟固將禮焉况天之所啓乎弗聽及楚楚子饗之曰公子若反晉國則何以報不穀對曰子女玉帛則君有之羽毛齒革則君地生焉其波及晉國者君之餘也其何以報君曰雖然何以報我對曰若以君之靈得反晉國晉楚治兵遇于中原其辟君三舎若不獲命注三退不得楚王命也音義過古禾反其左執鞭弭右屬櫜鞬以與君周旋注弭弓末無縁者櫜以受箭鞬以受弓屬著也周旋相追逐也音義弭莫爾反爾雅云弓有緣者謂之弓無緣者謂之弭屬音燭注同櫜古刀反受箭器鞬九言反弓衣緣悅絹反疏正義曰釋器云弓有緣者謂之弓無緣者謂之弭李廵曰骨飾兩頭曰弓不以骨飾兩頭曰弭孫炎曰緣謂繳束而漆之弭謂不以繳束骨飾兩頭者也二説雖反俱以弭為弓末也詩云載櫜弓矢則弓矢所藏俱名櫜也昭元年傳伍舉請垂橐而入注云示無弓則櫜亦受弓之物方言云弓藏謂之鞬此櫜鞬二物必一弓一矢以鞬是受弓故云櫜以受箭因對文而分之耳孔晁云馬鞭及弓分在兩手欲辟右帶櫜鞬之文故云左執子玉請殺之注畏其志大楚子曰晉公子廣而儉注志廣而體儉文而有禮其從者肅而寛注肅敬也忠而能力疏正義曰廣大者失於奢僣故美其能儉也文華者失於傲慢故美其能有禮也能敬者失於褊急故美其能寛容也忠誠者未必有力故美其能勤也此四者毎兩事相反而美其能兼有之晉侯無親外内惡之注晉侯惠公也音義惡烏路反吾聞姬姓唐叔之後其後衰者也其將由晉公子乎天將興之誰能廢之違天必有大咎乃送諸秦秦伯納女五人懷嬴與焉注懷嬴子圉妻子圉諡懷公故號為懷嬴音義咎其九反與焉音預奉匜沃盥既而揮之注匜沃盥器也揮湔也音義奉芳勇反匜以支反一音以紙反説文云似羮魁柄中有道可注水盥古緩反揮許韋反湔音薦又音贊一音箭又音牋疏正義曰説文云匜似羮魁柄中有道可以注水盥澡手也從臼水臨皿然則匜者盛水器也盥謂洗手也沃謂澆水也懷嬴奉匜盛水為公子澆水令公子洗手既而以濕手揮之使水湔汚其衣故云揮湔也怒曰秦晉匹也何以卑我注匹敵也公子懼降服而囚注去上服自拘囚以謝之音義去起吕反拘音俱疏正義曰晉語説此事云公子欲辭司空季子子犯子餘勸取之乃歸女而納幣且逆孔晁云歸懷嬴更以貴妾禮迎之也服䖍云申意於楚子伸於知己降服於懷嬴屈於不知己他日公享之子犯曰吾不如衰之文也注有文辭也音義衰初危反下同請使衰從公子賦河水注河水逸詩義取河水朝宗于海海喻秦公賦六月注六月詩小雅道尹吉甫佐宣王征伐喻公子還晉必能匡王國古者禮會因古詩以見意故言賦詩斷章也其全稱詩篇者多取首章之義他皆放此音義見賢遍反斷端緩反疏正義曰杜言全引詩篇者多取首章之義劉炫規過云案春秋賦詩有雖舉篇名不取首章之義者故襄二十七年公孫段賦桑扈趙孟曰匪交匪敖乃是卒章又昭元年云令尹賦大明之首章既特言首章明知舉篇名者不是首章今刪定知不然者以文四年賦湛露云天子當陽又文十三年文子賦四月是皆取首章若取餘章者傳皆指言其事則賦載馳之四章綠衣之卒章是也所以令尹特言大明首章者令尹意特取首章明徳故傳指言首章與餘别也杜言多取首章言多則非是總皆如此劉以春秋賦詩有不取首章以規杜氏非也趙衰曰重耳拜賜公子降拜稽首公降一級而辭焉注下階一級辭公子稽首音義級音急衰曰君稱所以佐天子者命重耳重耳敢不拜注詩首章言匡王國次章言佐天子故趙衰因通言之為明年秦伯納之張本經二十有四年春王正月夏狄伐鄭秋七月冬天王出居于鄭注襄王也天子以天下為家故所在稱居天子無外而書出者譏王蔽於匹夫之孝不顧天下之重因其辟母弟之難書出言其自絶於周音義蔽必世反難乃旦反疏正義曰出居實出奔也出謂出畿内居若移居然天子以天下為家所在皆得安居故為天子别立此名釋例曰天子以天下為家故傳曰凡自周無出今以出居為名而不書奔殊之於列國晉侯夷吾卒注文公定位而後告未同盟而赴以名傳二十四年春王正月秦伯納之不書不告入也注納重耳也及河子犯以璧授公子曰臣負羈絏從君廵於天下注羈馬羈絏馬繮音義羈紀宜反説文云馬絡頭也絏息列反説文云繫也從才用反又如字繮居良反疏正義曰説文云羈馬絡頭也又曰馬絆紲係也少儀云犬則執紲牛則執紖馬則執靮服䖍云一曰犬繮曰紲古者行則有犬杜今正以紲為馬繮者紲是係之别名係馬係犬皆得稱紲彼對文耳散則可以通廵於天下用馬為多故主於馬耳臣之罪甚多矣臣猶知之而况君乎請由此亡公子曰所不與舅氏同心者有如白水注子犯重耳舅也言與舅氏同心之明如此白水猶詩言謂予不信有如皦日音義皦古了反疏正義曰諸言有如皆是誓辭有如日有如河有如皦曰有如白水皆取明白之義言心之明白如日如水也有如上帝有如先君言上帝先君明見其心意亦同也投其璧于河注質信於河音義質音致濟河圍令狐入桑泉取臼衰注桑泉在河東解縣西解縣東南有臼城音義令力丁反衰初危反解戸買反二月甲午晉師軍于廬栁注懷公遣軍距重耳音義廬力居反柳力久反秦伯使公子縶如晉師師退軍于郇注解縣西北有郇城音義縶張立反郇音旬辛丑狐偃及秦晉之大夫盟于郇壬寅公子入于晉師丙午入于曲沃丁未朝于武宫注文公之祖武公廟戊申使殺懷公于高梁不書亦不告也注懷公奔高梁高梁在平陽楊縣西南再發不告者言外諸侯入及見殺亦皆須告乃書于策呂郤畏偪注呂甥郤芮惠公舊臣故畏為文公所偪害音義偪音逼為于偽反將焚公宫而弑晉侯寺人披請見公使讓之且辭焉注辭不見音義弑音試又作殺寺本又作侍披普皮反請見賢遍反曰蒲城之役注在五年君命一宿女即至注即日至音義女音汝下皆同其後余從狄君以田渭濱注田獵音義渭音謂水名濱音賓女為惠公來求殺余命女三宿女中宿至雖有君命何其速也夫袪猶在注披所斬文公衣袂也音義為于偽反中丁仲反下注中鈎同女中宿至或無至字袪起魚反袂滅制反疏正義曰夫辭也彼時斬袪之恨今日猶在女其行乎對曰臣謂君之入也其知之矣注知君人之道若猶未也又將及難君命無二古之制也除君之惡唯力是視蒲人狄人余何有焉注當二君世君為蒲狄之人於我有何義音義難乃旦反下及注皆同今君即位其無蒲狄乎疏正義曰言獻公之時君為蒲邑人恵公之時君為狄國人余未事君何有恩義於君焉今君即位其無蒲狄乎言有人在蒲在狄為君猶是也齊桓公置射鉤而使管仲相注乾時之役管仲射桓公中帶鉤音義射食亦反注同相息亮反君若易之何辱命焉注言若反齊桓已將自去不須辱君命行者甚衆豈唯刑臣注披奄人故稱刑臣音義甚衆一本甚作其疏正義曰公言女其行乎欲使之出奔也公若反齊桓念舊惡則出奔者甚衆多矣豈惟刑臣一人乎言畏罪者皆將去公見之以難告注告呂郤欲焚公宫三月晉侯濳會秦伯于王城己丑晦公宮火瑕甥郤芮不獲公乃如河上秦伯誘而殺之晉侯逆夫人嬴氏以歸注秦穆公女文嬴也秦伯送衞于晉三千人實紀綱之僕注新有吕郤之難國未輯睦故以兵衞文公諸門户僕隸之事皆秦卒共之為之紀綱音義輯音集又七入反本亦作集卒子忽反共音恭本亦作供疏正義曰新有吕郤之難國未輯睦恐晉人情不可信故秦伯以兵衛文公也説文云綱維紘繩也紀絲别也則綱是維之大繩紀者别理絲縷諸門戸僕隸之事皆使秦卒共之與晉人為紀綱謂為之首領主帥也初晉侯之豎頭須守藏者也注頭須一曰里鳬須豎左右小吏音義豎上注反藏才浪反下同里鳬須房孚反韓詩外傳云晉文公亡過曹里鳬須從因盜重耳資而亡重耳無糧餒不能行介子推割股以食重耳然後能行疏正義曰一曰里鳬須者史記謂之里鳬須與傳文不同必有一謬故辨出其别不敢正之鄭𤣥周禮注云豎未冠者之官名其出也竊藏以逃注文公出時盡用以求納之注求納文公音義盡津忍反及入求見公辭焉以沐謂僕人曰沐則心覆疏正義曰韋昭云沐則低頭故心反覆也心覆則圖反宜吾不得見也居者為社稷之守行者為羈絏之僕其亦可也何必罪居者國君而讎匹夫懼者甚衆矣僕人以告公遽見之注言棄小怨所以能安衆音義求見賢遍反下得見同覆芳服反下同守手又反又如字甚衆本或作其衆遽其處反狄人歸季隗于晉而請其二子注二子伯鯈叔劉文公妻趙衰生原同屏括樓嬰注原屏樓三子之邑音義妻七計反屏歩平反括古活反趙姬請逆盾與其母注趙姬文公女也盾狄女叔隗之子子餘辭注子餘趙衰字姬曰得寵而忘舊何以使人必逆之固請許之來以盾為才固請于公以為嫡子而使其三子下之以叔隗為内子而已下之注卿之嫡妻為内子皆非此年事蓋因狄人歸季隗遂終言叔隗音義嫡本亦作適丁歴反注同下遐嫁反下同晉侯賞從亡者介之推不言祿祿亦弗及注介推文公微臣之語助音義從才用反介音界推昌誰反推曰獻公之子九人唯君在矣惠懷無親外内棄之天未絶晉必將有主主晉祀者非君而誰天實置之而二三子以為己力不亦誣乎竊人之財猶謂之盗况貪天之功以為己力乎下義其罪上賞其姦上下相蒙注蒙欺也難與處矣疏正義曰在下者以貪天之功為立君之義是下義其罪也在上者以立君之勲賞盜天之罪是上賞其姦也居下者義其罪是下欺上也居上者賞其姦是上欺下也如此上下相欺䝉難可與並居處矣其母曰盍亦求之以死誰懟對曰尤而效之罪又甚焉且出怨言不食其食注怨言謂上下相蒙難與處音義盍戸臘反懟直類反其母曰亦使知之若何注既不求之且欲令推達言於文公音義令力呈反對曰言身之文也身將隱焉用文之是求顯也其母曰能如是乎與女偕隱注偕俱也音義焉於虔反女音汝遂隱而死晉侯求之不獲以緜上為之田曰以志吾過且旌善人注旌表也西河界休縣南有地名緜上鄭之入滑也滑人聽命注入滑在二十一年師還又即衞鄭公子士洩堵俞彌帥師伐滑注堵俞彌鄭大夫音義俞羊朱反彌亡皮反王使伯服游孫伯如鄭請滑注二子周大夫鄭伯怨惠王之入而不與厲公爵也注事在莊二十一年又怨襄王之與衞滑也注怨王助衞為滑請音義為于偽反故不聽王命而執二子王怒將以狄伐鄭富辰諫曰不可臣聞之太上以德撫民注無親疎也音義聽吐鄭反而執二子本或作而執其二子其衍字也大音泰其次親親以相及也注先親以及疎推恩以行義疏正義曰曲禮云太上貴徳其次務施報鄭𤣥以大上為帝皇之世其次謂三王以來則以大上其次為世代之先後也襄二十四年傳曰大上立徳其次立功其次立言杜以立徳謂黄帝堯舜立功謂禹稷立言謂史佚周任則以人之賢愚為上次非復年代之先後也然則太上謂人之最上上聖之人也以徳撫民唯能是用不簡親疎也其次聖之人則親其所親以漸相及而至於逺人為下周公親親之事張本也周公亦是上聖不以徳而先親者制法為後不獨為身聖人之身不恃親也昔周公弔二叔之不咸故封建親戚以蕃屏周注弔傷也咸同也周公傷夏殷之叔世疏其親戚以至滅亡故廣封其兄弟音義蕃方元反管蔡郕霍魯衞毛聃郜雍曹滕畢原酆郇文之昭也注十六國皆文王子也管國在滎陽京縣東北雍國在河内山陽縣西畢國在長安縣西北酆國在始平鄠縣東音義郕音成聃乃甘反雍於用反注同酆音豐郇音荀邘晉應韓武之穆也注四國皆武王子應國在襄陽城父縣西韓國在河東郡界河内野王縣西北有邘城音義邘音于凡蔣邢茅胙祭周公之𦙍也注𦙍嗣也蔣在弋陽期思縣高平昌邑縣西有茅鄉東郡燕縣西南有胙亭音義蔣將丈反茅于交反胙才故反下注祭胙同祭則界反疏正義曰伯仲叔季長幼之次也故通謂國衰為叔世將亡為季世昔周公傷彼夏殷二國叔世疎其親戚令使宗族之不同心以相匡輔至於滅亡故封立親戚為諸侯之君以為蕃籬屏蔽周室言封此以下文武周公之子孫為二十六國也此二十六國武王克商之後下及成康之世乃可封建畢矣非是一時封建非盡周公所為富辰盡以其事屬周公者以武王克殷周公為輔又攝政制禮成一代大法雖非悉周公所為皆是周公之法故歸之於周公耳昭二十八年傳曰昔武王克商光有天下兄弟之國十有五人姬姓之國四十人彼言由其克商乃得封建兄弟歸功於武王耳亦非武王之時已建五十五國其後不復封人也昭二十六年傳曰昔武王克殷成王靖四方康王息民並建母弟以蕃屏周昭九年傳曰武王成康之建母弟以蕃屏周則康王之世尚有封國非獨周公時也且見於經傳者管叔蔡叔霍叔周公攝政之初以流言見黜則三叔之國已是武王封矣尚書康誥之篇周公營洛之時始封康叔于衛洛誥之篇周公致政之月始封伯禽于魯書傳稱成王削桐葉為珪以封唐叔如此之類不得為武王封也凡蔣邢茅胙祭周公之􅏷也豈周公自封哉固當成王即政之後或至康王之時始封之耳注正義曰弔傷俱是悼徃之辭咸訓為皆故為同也昭六年傳曰夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也彼叔世為三代之末世知此二叔亦二代之末世也二代之末疎其親戚以至滅亡周公創其如此故制禮設法親其所親廣封兄弟以自蕃衛也蕃屏者分地以建諸侯使與京師作蕃籬屛扞也鄭衆賈逵皆以二叔為管叔蔡叔傷其不和睦而流言作亂故封建親戚鄭𤣥詩箋亦然案其封建之中方有管蔡豈傷其作亂始封建之馬融以為夏殷叔世故杜同之文之昭者自后稷以後一昭一穆文王於次為穆故文子為昭武子為穆昭二十八年傳稱武王兄弟之國十五人此十六彼十五者人異故説異耳非武王時十五而周公加一也此十六國所在之地蔡郕魯衛郜曹滕七國當時皆在已經解訖霍在閔元年原在隠十一年郇在此年春亦已解訖其毛聃闕故惟解管雍畢酆也武穆四國晉時見在故唯解應韓邗也周公之胤邢國見在隠七年解訖凡祭闕故唯解蔣茅胙也召穆公思周德之不類故紏合宗族于成周而作詩注類善也紏收也召穆公周卿士名虎召采地扶風雍縣東南有召亭周厲王之時周德衰微兄弟道缺召穆公于東都收會宗族特作此周公之樂歌常棣詩屬小雅音義召上照反注同糾居黝反棣六計反字林大内反曰常棣之華鄂不韡韡注常棣棣也鄂鄂然華外發不韡韡言韡韡以喻兄弟和睦則强盛而有光輝韡韡然音義鄂五各反不方九反韡韋鬼反凡今之人莫如兄弟注言致韡韡之盛莫如親兄弟其四章曰兄弟鬩于牆外禦其侮注鬩訟争貌言内雖不和猶宜外扞異族之侵侮音義鬩呼歴反毛詩傳云狠也禦魚吕反下同侮亡甫反詩作務爭爭鬭之爭本又作諍扞戸旦反疏正義曰常棣之詩周公所作故周語說此事云周文公之詩曰即明是周公所作也召穆公厲王時人於時周徳既衰兄弟道缺召穆公思周徳之不善致使兄弟之恩缺收合宗族於成周為設燕會而作此周公樂歌之詩曰常棣之木華鄂鄂然外發之時豈不韡韡而光明乎以衆華俱外發實韡韡而光明以喻兄弟衆多而相和睦豈不彊盛而有光輝乎言兄弟和睦實彊盛而有光輝兄弟和睦則彊盛如是然則凡今日天下之人欲致此韡韡之盛莫如兄弟之相親也其四章曰兄弟或有自不相善可爭訟于牆内若有他人侵之則同心合意外禦其他人之侵侮也注正義曰類善釋詁文糾者聚合之意故為收也召穆公厲王宣王之臣詩江漢序云命召公平淮夷經曰王命召虎是也思周徳之不善故知是厲王之時周徳衰微兄弟道缺也召穆公於東都會宗族蓋當宣王之時若當厲王之時天子疎之召公雖則聚會不能使之親也於會之上作此周公之樂歌欲感切宗族使相親也劉炫云杜云常棣詩屬小雅明是周公所作也常棣棣釋木文也舍人曰常棣一名棣郭璞曰今關西山中有棣樹子似櫻桃可啖鄂鄂然華外發者華聚而發於外鄂鄂然而光明也不韡韡乎言其實韡韡也古之人語有聲而倒者詩文多有此類釋言云鬩狠也孫炎云相狠戾也李廵本作恨注云相怨恨以心相怨恨而為鬩是為爭訟貌也如是則兄弟雖有小忿不廢懿親注懿羙也今天子不忍小忿以棄鄭親其若之何庸勲親親暱近尊賢德之大者也注庸用也暱親也音義暱女乙反即聾從昩與頑用嚚姦之大者也音義聾鹿工反昧音妹嚚魚巾反疏正義曰親暱尊是愛敬之辭也即從與是依就之意也其庸即用也用其有功勲者親其親族親者暱其道路近者尊其有賢行者此四事是徳之大者也即訓就也就其耳聾者從其目昧者與其心頑者用其口嚚者此四事是姦之大者也勲親近賢據事上為名聾昧頑嚚據身上為名以狄無他事故於耳目身口之上為惡名耳下文各以四事覆之唯棄嬖寵而用三良是言鄭伯之賢與上文倒隨便言耳杜言三良叔詹堵叔師叔所謂尊賢如杜此注則謂鄭伯尊賢與上文尊賢乖者能用三良則是鄭伯之賢王則當尊此鄭伯但杜注省略耳棄德崇姦禍之大者也注崇聚也鄭有平惠之勲注平王東遷晉鄭是依惠王出奔虢鄭納之是其勲也又有厲宣之親注鄭始封之祖桓公友周厲王之子宣王之母弟棄嬖寵而用三良注七年殺嬖臣申侯十六年殺寵子子華也三良叔詹堵叔師叔所謂尊賢音義堵丁古反又音者於諸姬為近注道近當暱之四德具矣耳不聽五聲之和為聾目不别五色之章為昧心不則德義之經為頑口不道忠信之言為嚚狄皆則之四姦具矣周之有懿德也猶曰莫如兄弟故封建之注當周公時故言周之有懿德音義别彼列反其懷柔天下也猶懼有外侮扞禦侮者莫如親親故以親屏周召穆公亦云注周公作詩召公歌之故言亦云今周德既衰於是乎又渝周召以從諸姦無乃不可乎注變周召親兄弟之道音義渝羊朱反變也民未忘禍王又興之注前有子頽之亂中有叔帶召狄故曰民未忘禍音義頽徒回反其若文武何注言將廢文武之功業王弗聽使頽叔桃子出狄師注二子周大夫音義桃如字本或作姚亦宜音桃夏狄伐鄭取櫟王德狄人疏正義曰荷其恩者謂之為徳古人有此語也將以其女為后富辰諫曰不可臣聞之曰報者倦矣施者未厭注施功勞也有勞則望報過甚音義櫟力狄反施如字注同厭於豔反又於鹽反狄固貪惏疏正義曰方言云殺人取財曰惏王又啓之女德無極婦怨無終注婦女之志近之則不知止足逺之則忿怨無已終猶已也音義惏力南反方言云殺人而取其財曰惏近附近之近逺于萬反狄必為患王又弗聽初甘昭公有寵于惠后注甘昭公王子帶也食邑於甘河南縣西南有甘水惠后將立之未及而卒昭公奔齊注奔齊在十二年王復之注在二十二年又通於隗氏注隗氏王所立狄后王替隗氏注替廢也音義替他計反頽叔桃子曰我實使狄狄其怨我遂奉大叔以狄師攻王王御士將禦之注周禮王之御士十二人疏正義曰周禮無御士之官唯夏官太僕之屬有御僕下士十有二人掌王之燕令鄭𤣥云燕居時之令以親近王故欲為王禦宼王曰先后其謂我何注先后惠后也誅大叔恐違先后志寧使諸侯圖之王遂出及坎欿國人納之注坎欿周地在河南鞏縣東音義坎苦感反欿大感反鞏九勇反秋頽叔桃子奉大叔以狄師伐周大敗周師獲周公忌父原伯毛伯富辰注原毛皆采邑疏正義曰此原伯毛伯蓋是文王之子原毛之後世為王臣仍為伯爵或本封絶滅食采畿内故云皆采邑也王出適鄭處于汜注鄭南汜也在襄城縣南音義汜音凡後皆同疏正義曰南汜是襄城縣南則鄭之西南之竟南近於楚西近於周敬王處于汜及楚伐鄭師于汜皆以為南汜其東汜在中牟縣南去鄭城既近三十年秦晉圍鄭秦軍汜南故為東氾各隨其所近而言也大叔以隗氏居于溫鄭子華之弟子臧出奔宋注十六年殺子華故好聚鷸冠注鷸鳥名聚鷸羽以為冠非法之服音義好呼報反鷸尹橘反翠鳥也疏正義曰釋鳥云翠鷸李廵曰鷸一名為翠其羽可以為飾樊光云青羽出交州郭璞云似燕紺色生鬱林說文云翠青羽雀也案漢書尉佗獻文帝翠鳥毛然則鷸羽可以飾器物聚此鷸羽以為冠也鄭伯聞而惡之注惡其服非法音義惡烏路反使盜誘之八月盜殺之于陳宋之間君子曰服之不衷身之災也注衷猶適也音義衷音忠一音丁仲反注同詩曰彼己之子不稱其服注詩曹風刺小人在位言彼人之德不稱其服音義已音記稱尺證反注及下同刺七賜反子臧之服不稱也夫詩曰自詒伊慼其子臧之謂矣注詩小雅詒遺也慼憂也取其自遺憂音義之服一本作之及夫音扶詒以支反遺唯季反下同夏書曰地平天成稱也注夏書逸書地平其化天成其施上下相稱為宜音義夏戸雅反後夏書皆放此施茹豉反疏正義曰此是大禹謨之文以說禹事故傳通以其篇為夏書彼孔安國云水土治曰平五行序曰成水土既治是地平其化五行既序是天成其施杜雖不見孔傳於義亦不相違也宋及楚平宋成公如楚還入于鄭鄭伯將享之問禮于皇武子注皇武子鄭卿對曰宋先代之後也于周為客天子有事膰焉注有事祭宗廟也膰祭肉尊之故賜以祭胙音義膰符袁反周禮又作燔字音義皆同有喪拜焉注宋弔周喪王特拜謝之疏正義曰禮弔䘮之法皆主人拜其弔者謝其勤勞弔者不答拜以其為事而來不自同於賓客此皆據弔及主人敵禮以上若其臣下來弔則主人不拜宋是先代之後王以敵禮待之故拜其來弔其餘諸侯則否豐厚可也鄭伯從之享宋公有加禮也注禮物事事加厚善鄭能尊先代音義享宋公有加絶句禮也一本無也字讀則總為句冬王使來告難曰不穀不德得罪于母弟之寵子帶鄙在鄭地汜注鄙野也音義難乃旦反下同敢告叔父注天子謂同姓諸侯曰叔父臧文仲對曰天子蒙塵于外敢不奔問官守注官守王之羣臣音義守手又反注及下同王使簡師父告于晉使左鄢父告于秦注二子周大夫音義鄢於晚反天子無出書曰天王出居于鄭辟母弟之難也注叔帶襄王同母弟天子凶服降名禮也注凶服素服降名稱不穀鄭伯與孔將鉏石甲父侯宣多省視官具于汜注三子鄭大夫省官司具器用音義鉏仕居反疏正義曰鄭伯與三大夫毎日親自省視當國官司令具其器用送之於氾而後聽其私政也而後聽其私政禮也注得先君後已之禮音義聽吐定反衞人將伐邢禮至曰不得其守國不可得也注禮至衞大夫守謂邢正卿國子我請昆弟仕焉乃往得仕注為明年滅邢傳春秋左傳注疏卷十四春秋左氏傳注疏卷十四考證傳秦晉遷陸渾之戎于伊川注至今為陸渾縣也臣召南按漢書地理志曰𢎞農郡陸渾春秋遷陸渾戎于此晉陸渾縣屬河南郡志云古蠻子國是也傳王召之也趙汸補注曰傳見天王不能以義制恩齊侯為之請已失之富辰之言亦非也舜封象于有庳而使吏治其國未嘗留之于帝都子帶志在召寇作亂與象一夫之事不同宥之列國斯可矣乃還之京師以起後患謂之協其兄弟豈不謬哉傳大司馬固諫曰注大司馬固莊公之孫公孫固也顧炎武日知錄曰大司馬即司馬子魚固諫堅辭以諫也隱三年言召大司馬孔父而屬殤公焉桓二年言孔父嘉為司馬知大司馬即司馬也定十年公若藐固諫曰知固諌之為堅辭以諫也傳弗可赦也已注不如赦楚勿與戰臣浩按杜解弗可赦也已句稍悖不如趙汸補注曰言天棄商久勿赦其罪為直截也傳彼衆我寡疏周禮虎賁氏監本脫虎字賁訛貴今改正傳楚子使師縉示之俘馘疏書傳所言師曠師曹師蠲之類監本曹字下衍一蠲字今去傳庭實旅百疏膷鼎一監本膷訛腳依周禮改正又疏茆菹麇臡臣召南按麇音京倫反與上麋臡不同使昌本以麋臡而茆菹亦以麋臡則先儒必有論說周禮本雖亦有兩作麋臡者今定從麇傳杞成公卒書曰子注仲尼以文貶稱子趙汸補注曰言杞不敬不共皆魯人為之辭耳杜氏謂仲尼以文貶稱子蓋不知春秋有存策書大體之義也臣召南按春秋無降人命爵之理趙汸之說較正傳及齊齊桓公妻之臣召南按史記齊世家桓公四十二年晉公子重耳來桓公妻之四十三年桓公卒則重耳遊齊在魯僖之十六年冬也晉世家曰重耳留齊凡五歳傳曹共公聞其駢脅欲觀其裸浴薄而觀之臣浩按釋文以欲觀斷句孔疏以欲觀其裸斷句並通臣召南按史記晉世家言重耳留齊凡五歳而年表叙過曹過宋過鄭俱在二十三年蓋以此傳為据考其實去齊過曹當在僖二十一年也傳公賦六月疏匪交匪敖臣照按詩作彼交匪敖而襄二十七年傳公孫段賦桑扈趙孟曰匪交匪敖福將焉徃作匪交與詩異或古與今本不同或趙孟别取匪交之義不舉詩本文俱未可定此疏引傳文故不同于詩傳濟河圍令狐入桑泉注桑泉在河東解縣西臣召南按後漢郡國志注引杜預曰在縣西二十里傳女為恵公來求殺余疏彼時斬袪之恨下監本脱今日猶在四字今増傳晉侯潛會秦伯于王城陳傳良曰傳見自齊桓之伯諸侯特相會皆不書趙汸補注曰潛會不告不入例傳鄭公子士洩堵俞彌帥師伐滑注堵俞彌鄭大夫臣浩按二十年傳鄭公子士洩堵寇帥師入滑注曰公子士文公子洩堵寇鄭大夫此洩堵俞彌以洩姓見前不須更舉也俗本俱讀作公子士洩非傳邘晉應韓武之穆也注應國在襄陽城父縣西韓國在河東郡界河内野王縣西北有邘城臣召南按後漢郡國志野王有邘城潁川郡父城有應鄉引杜預曰在縣西南至韓國以詩梁山為据則在馮翊夏陽縣注乃言在河東郡界豈其以河東河北縣之韓亭為古韓國乎傳曰常棣之華鄂不韡韡注不韡韡言韡韡臣召南按詩鄭箋曰不當作跗音芳于反言華下有鄂鄂下有跗與毛傳解不同杜注蓋從傳不從箋也臣照按不字本花趺象形蓋古趺字古人以鄂不不字為實字用者甚多如顔真卿文鄂不照乎棣華龍驥驤乎雲路之類是也春秋左氏傳注疏卷十四考證
