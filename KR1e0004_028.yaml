body:
  text: 春秋左傳注疏卷二十八起成公十六年盡十八年晉杜氏注唐陸德明音義唐孔頴達疏經十有六年春王正月雨木冰注無傳記寒過節冰封著樹音義雨木冰如字公羊傳云雨而木冰也舊豫付反著直略反疏正義曰正月今之仲冬時猶有雨未是盛寒雨下即著樹為冰記寒甚之過其節度公羊穀梁皆云雨而木冰是冰封著樹也今世時有之皆寒甚所致也夏四月辛未滕子卒注不書名未同盟鄭公子喜帥師侵宋注喜穆公子子罕也六月丙寅朔日有食之注無傳晉侯使欒黶來乞師注將伐鄭黶欒書子音義黶於斬反徐於玷反疏正義曰十八年悼公之入黶尚為公族大夫此時欒書尚在黶未為卿而得名見經者襄二十九年鄭公孫段未為卿而見經杜云蓋以攝卿行然則此亦當以攝卿故書甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績注楚師未大崩楚子傷目而退故曰楚子敗績鄢陵鄭地今屬潁川郡音義鄢謁晚反又於建反疏正義曰此戰楚師未至於敗而楚子身傷故書楚子敗績也泓之戰宋公傷股師亦敗績故書師敗而不書宋公敗也君將不言帥師以君重於師也戰陳以師相敵死亡既多舉師為重故師敗君傷者唯書師敗而已不復書君身敗也劉炫又云若君將被殺獲者為重既書師敗又書殺獲即韓之戰獲晉侯大棘之戰獲華元雞父之戰獲胡沈之君是也楚殺其大夫公子側注側子反背盟無禮卒以敗師故書名秋公會晉侯齊侯衛侯宋華元邾人于沙隨注沙隨宋地梁國寧陵縣北有沙隨亭不見公注不及鄢陵戰故不諱者恥輕於執止疏正議曰諸公被執者皆諱不書執此會晉侯不肯見公不諱之者公為國內有故不及戰期雖不見公非公之罪是為恥輕於執止故直書之以示諫公之意冀公改過無後犯及歸書公至自會以無罪不諱故依法告廟也公至自會注無傳公會尹子晉侯齊國佐邾人伐鄭注尹子王卿士子爵曹伯歸京師注為晉侯所赦故書歸諸侯歸國或書名或不書名或言歸自某或言自某歸傳無義例從告辭九月晉人執季孫行父舍之于苕丘注苕丘晉地舍之苕丘明不以歸不稱行人非使人音義苕音條使所吏反疏正義曰昭十三年晉人執季孫意如以歸此言舍之苕丘明其不以歸也大夫因使被執無罪者則書行人以見無罪于時行父從公伐鄭在軍見執雖則無罪不稱行人以其非使人故也季孫意如得釋而歸書意如至自晉此行父得釋不書至者釋例曰賈氏以為書執行父舍于苕丘言失其所不書至者刺晉聽讒執之示已無罪也案傳執于苕丘以别晉都無義例也公待于鄆與行父俱歸厭於公尊故不書行父至耳若欲示無罪則宜於執見義今既直書其執處絶不書至乃所以示終于見執非示無罪也穀梁以行父至不致者為公在故與杜義合也冬十月乙亥叔孫僑如出奔齊注公未歸命國人逐之十有二月乙丑季孫行父及晉郤犨盟于扈注晉許魯平故盟公至自會注無傳伐而以會致史異文乙酉刺公子偃注魯殺大夫皆言刺義取於周禮三刺之法音義刺本又作刺七賜反爾雅云殺也傳十六年春楚子自武城使公子成以汝陰之田求成于鄭注汝水之南近鄭地音義近附近之近鄭叛晉子駟從楚子盟于武城注為晉伐鄭起夏四月滕文公卒鄭子罕伐宋注滕宋之與國鄭因滕有喪而伐宋故傳舉滕侯卒侵伐經傳異文經從告傳言實他皆放此宋將鉏樂懼敗諸汋陂注敗鄭師也樂懼戴公六世孫將鉏樂氏族音義鉏仕魚反徐音在魚反汋七藥反徐音酌一音市藥反陂彼宜反疏正義曰樂懼是戴公六世孫世本有文也將鉏為樂氏之族不知所出杜譜於樂氏之下樂鉏將鉏為一人傳無樂鉏之文不知其故何也退舍於夫渠不警注宋師不警備音義夫音扶警京領反鄭人覆之敗諸汋陵獲將鉏樂懼宋恃勝也注汋陂夫渠汋陵皆宋地音義覆徐敷目反一音扶又反又芳又反衛侯伐鄭至于鳴鴈為晉故也注鳴鴈在陳留雍丘縣西北音義為于偽反晉侯將伐鄭范文子曰若逞吾願諸侯皆叛晉可以逞注逞快也晉厲公無道三郤驕故欲使諸侯叛冀其懼而思德若唯鄭叛晉國之憂可立俟也欒武子曰不可以當吾世而失諸侯必伐鄭乃興師欒書將中軍士燮佐之注代荀庚疏正義曰晉語云鄢陵之役晉伐鄭荆救之欒武子將上軍范文子將下軍與此異者彼孔朝注云上下中軍之上下也傳曰欒書將中軍士燮佐之又曰欒范以其族夾公行引此為證是彼謂分中軍為二將將上而佐將下郤錡將上軍注代士燮荀偃佐之注代郤錡偃荀庚子韓厥將下軍郤至佐新軍荀罃居守注荀罃下軍佐於是郤犨代趙旃將新軍新上下軍罷矣音義守手又反疏正義曰十三年傳云韓厥將下軍苟罃佐之又此年末傳云知武子佐下軍郤犨將新軍是其文也三年作六軍其新三軍將佐六人皆賞鞍之功死亡不復存至此唯有韓厥在耳郤至佐新軍不言中下是新軍唯一知新上下軍於是罷矣郤犨如衛遂如齊皆乞師焉欒黶來乞師孟獻子曰有勝矣注卑讓有禮故知其將勝楚戊寅晉師起鄭人聞有晉師使告于楚姚句耳與往注句耳鄭大夫與往非使也為先歸張本音義句古侯反與音預使所吏反楚子救鄭司馬將中軍注子反令尹將左注子重右尹子辛將右注公子壬夫過申子反入見申叔時注叔時老在申音義過古禾反曰師其何如對曰德刑詳義禮信戰之器也注器猶用也德以施惠刑以正邪詳以事神義以建利禮以順時信以守物民生厚而德正注財足則思無邪音義邪似嗟反注皆同用利而事節注動不失利則事得其節時順而物成注羣生得所上下和睦周旋不逆注動順理求無不具注下應上音義應應對之應各知其極注無二心故詩曰立我蒸民莫匪爾極注蒸衆也極中也詩頌言先王立其衆民無不得中正音義蒸之乘反注同疏正義曰蒸衆釋詁文極中常訓也詩頌思文之篇美后稷之德周語云昔我先王世后稷故杜以先王言之言先王后稷立其衆人無不得其中正也當堯之世洪水滔天人不粒食皆失其正性后稷教人耕稼以養之各復本性故無不得中正也是以神降之福時無災害民生敦龎和同以聽注敦厚也龎大也音義龎莫降反疏注正義曰皆釋詁文也言人之生計若財物足皆豐厚而多大管子曰倉廪實而知禮節衣食足而知榮辱讓生於有餘爭生於不足是其人生厚大則心和而聽上命也莫不盡力以從上命致死以補其闕注闕戰死者此戰之所由克也今楚內棄其民注不施惠而外絶其好注義不建利音義好呼報反瀆齊盟注不詳事神音義瀆徒木反而食話言注信不守物音義話户快反姦時以動注禮不順時周四月今二月妨農業音義姦音干本或作干疏正義曰沈氏云晉亦姦時所以無天殃者以鄭既有罪晉人討之楚黨有罪之鄭故獨謂之姦時而疲民以迋注刑不正邪而苟快意音義疲本亦作罷音皮下注同疏正義曰魯語曰大刑用甲兵其次用斧鉞故大者陳之原野小者致之市朝則征伐之刑刑之大者刑不正邪而苟快意正謂伐晉是也此六句言苟無上六事隨便而言故與上不次服虔以外絶其好為刑不正邪也食話言為義不建利也疲民以逞為信不守物也杜以食話言是言之不信也快意征伐是刑之失所也故不從舊説民不知信進退罪也人恤所底其誰致死注底至也音義底徐音旨又之履反疏正義曰底聲近至故為至也在上之信不著於人號令無常動情恣意或乍東乍西或欲遲欲速每事如此不可測量人不知信進退獲罪人人各憂其身不知性命所至誰肯致死戰也子其勉之吾不復見子矣注言其必敗不反音義復見一本無復字復扶又反疏正義曰叔時此對首尾相成先舉六名云戰之器也言有此六事乃可以戰若器用然也自德以施惠至信以守物辨六事施用之處也自民生厚至所由克言能用六事得戰勝之意也自今楚內棄其民至疲民以逞言楚不行六事也民不知信以下言楚必敗之意也德者得也自得於心美行之大名有大德者以德撫人是德用之以施恩惠也有姦邪者斷以刑罰是刑用之以正邪辟也詳者祥也古字同耳釋詁云祥善也李巡曰祥福之善也事神得福乃名為祥是祥用之以事神也義者宜也物皆得宜利乃生焉故義所以生立利益也禮者履也其所踐履當適時要故禮所以順時事也言而無信物將散矣故信所以守羣物也人君用此道以撫下民民之生計豐厚財用足則民之德皆正矣德謂人之性行論語云民德歸厚矣即是正也此一句覆上德以施惠由上施恩惠故民生計豐厚也財用有利益而每事得節飢則有食寒則有衣其事皆得節矣此一句覆上義以建利也政不擾民時節皆順春種夏耨而物得成矣此一句覆上禮以順時也自上及下和睦相親周旋運轉不有違逆上之所求下無不具下民自知其中無復二心故詩美先王成立我之衆民無不於女先王得其中正言先王善養下民使得中也自上下和睦以下至莫匪爾極總論在上德義禮三事以教於下則在下之人皆無邪惡以信自守即包上刑以正邪信以守物二句也聖王先成於民而後致力於神民既如此是以明神下之福祐時無水旱災害此覆上詳以事神也故下民生計皆豐厚而多大人皆和同其心以聽進止無不益己之力以從上命戰陳之上有被殺傷者皆致其死命以補其空闕之處此戰之所由得而勝也今楚內棄其國內之民不行施惠是無德也外絶其鄰國之好不得其利是無義也與晉結盟而復背之貫瀆齊同之盟是無詳也與人要言今背其語食消善言是無信也夏之二月農事正煩姦犯時篩而動兵伐人是無禮也晉人無罪苟欲伐之疲勞下民以快已欲是無刑也六事皆無是無器也無器而戰其可勝乎上若有信民知所適上既無信不知所從從前言則違後令從後令則背前言人既不知在上之信其進與退皆得罪也人人憂其所至不知己之性命將至何處其誰肯致死而戰也子其勉力為之此行也必敗吾不復得見子矣知其必死與之長訣也姚句耳先歸子駟問焉對曰其行速過險而不整速則失志注不思慮也不整喪列志失列喪將何以戰楚懼不可用也五月晉師濟河聞楚師將至范文子欲反曰我偽逃楚可以紓憂注紓緩也音義喪息浪反下同紓音舒夫合諸侯非吾所能也以遺能者我若羣臣輯睦以事君多矣武子曰不可六月晉楚遇于鄢陵范文子不欲戰郤至曰韓之戰惠公不振旅注衆散敗也在僖十五年音義遺唯季反下注問遺也同輯又作集音同亦七入反箕之役先軫不反命注死於狄也在僖三十三年邲之師荀伯不復從注荀林父奔走不復故道在宣十二年音義從徐子容反音或如字皆晉之恥也子亦見先君之事矣注見先君成敗之事今我辟楚又益恥也文子曰吾先君之亟戰也有故注亟數也音義亟去吏反數所角反秦狄齊楚皆強不盡力子孫將弱今三強服矣注齊秦狄敵楚而已唯聖人能外內無患自非聖人外寧必有內憂注驕亢則憂患生也音義亢苦浪反盍釋楚以為外懼乎甲午晦楚晨壓晉軍而陳注壓笮其未備音義盍户臘反壓於甲反徐於敦反陳直覲反下及注皆同笮側直反軍吏患之范丐趨進曰注丐士燮子音義丐本又作丐古害反塞井夷竈陳於軍中而疏行首注疏行首者當陳前決開營壘為戰道音義行户郎反一音如字注同壘力軌反晉楚唯天所授何患焉文子執戈逐之曰國之存亡天也童子何知焉欒書曰楚師輕窕固壘而待之三日必退退而擊之必獲勝焉郤至曰楚有六間不可失也其二卿相惡注子重子反音義窕敕雕反又敕弔反惡如字又烏路反王卒以舊注罷老不代音義卒子忽反下皆同鄭陳而不整注不整列蠻軍而不陳注蠻夷從楚者不結陳陳不違晦注晦月終隂之盡故兵家以為忌疏正義曰日為陽精月為隂精兵尚殺害隂之道也行兵貴月盛之時晦是月終隂之盡也故兵家以晦為忌不用晦日陳兵也昭二十三年七月戊辰晦吳敗楚師于雞父吳犯兵忌而戰勝者杜云違兵忌晦戰擊楚所不意彼知楚有可敗之機晦是兵家所忌原楚之情必以吳為不動故以晦日掩之擊楚不備故也在陳而囂注囂喧譁也音義囂許驕反徐讀曰嗷五髙反注及後同喧本又作喧况元反譁本又作譁音華合而加囂注陳合宜靜而益有聲各顧其後莫有鬭心注人恤其所底舊不必良以犯天忌我必克之楚子登巢車以望晉軍注巢車車上為櫓音義巢説文作轈云兵車髙如巢以望敵也字林同櫓音魯疏正義曰説文云轈兵髙車如巢以望敵也櫓澤中守草樓也是巢與櫓俱是樓之别名子重使大宰伯州犂侍于王後注州犂晉伯宗子前年奔楚音義大宰音泰官名大者多同以意求之王曰騁而左右何也注騁走也曰召軍吏也皆聚於中軍矣曰合謀也張幕矣曰虔卜於先君也注虔敬也音義幕音莫徹幕矣曰將發命也甚囂且塵上矣曰將塞井夷竈而為行也注夷平也音義上時掌反行户郎反下夾公行同皆乘矣左右執兵而下矣曰聽誓也注左將帥右車右音義乘繩證反下同將子匠反下去將同帥所類反下元帥同疏正義曰兵車唯元帥在中御者在左也其餘將帥皆御者在中將帥在左也在右執兵而下唯御者持車不下耳戰乎曰未可知也乘而左右皆下矣曰戰禱也注禱請於鬼神音義禱丁老反或丁報反伯州犂以公卒告王注公晉侯苗賁皇在晉侯之側亦以王卒告注賁皇楚鬭椒子宣四年奔晉音義賁扶云反皆曰國士在且厚不可當也注晉侯左右皆以伯州犂在楚知晉之情且謂楚衆多故憚合戰與苗賁皇意異音義憚徒旦反疏正義曰服虔以此皆曰之文在州犂賁皇之下解云賁皇州犂皆言曰晉楚之士皆在君側且陳厚不可當以為州犂言晉強賁皇言楚強故云皆曰也若如服言賁皇既言楚不可當何故復請分良以擊其左右故杜不用其説晉侯左右皆為此言以憚伯州犂耳苖賁皇言於晉侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃於王卒注萃集也音義萃似醉反必大敗之公筮之史曰吉其卦遇復注震下坤上復無變疏正義曰説卦震為雷坤為地復象曰雷在地中復服虔云復反也隂盛於上陽動於下以喻小人作亂於上聖人興道於下萬物復萌制度復理故曰復也其筮六爻無變者故言其所遇之卦而已曰南國蹙射其元王中厥目注此卜者辭也復陽長之卦陽氣起子南行推隂故曰南國蹙也南國勢蹙則離受其咎離為諸侯又為目陽氣激南飛矢之象故曰射其元王中厥目音義蹙子六反射食亦反注及下射之同中丁仲反注同長丁丈反激古狄反疏正義曰此實筮也而言卜者卜筮通言耳此既不用周易而别為之辭蓋卜筮之書更有此類筮者據而言耳服虔以為陽氣觸地射出為射之象杜以陽氣激南為飛矢之象二者無所依馮各以意説得失終於無驗是非無以可明今以杜言離為諸侯者案禮器云大明生於東君西酌犧象鄭玄云象日出東方而西行也詩邶柏舟鄭箋云日君象也説卦離為日故為諸侯國蹙王傷不敗何待公從之注從其言而戰有淖於前注淖泥也音義淖乃孝反徐徒較反乃皆左右相違於淖注違辟也步毅御晉厲公欒針為右注步毅即郤毅彭名御楚共王潘黨為右石首御鄭成公唐苟為右欒范以其族夾公行注二族強故在公左右音義共音恭夾古洽反疏注正義曰劉炫云族者屬也屬謂中軍以中軍夾公耳非謂宗族之兵今知非者杜云二族者順傳之文無明言宗族之事劉誣杜以為宗族妄規其過非也陷於淖欒書將載晉侯針曰書退國有大任焉得專之注在君前故子名其父大任謂元帥之職音義焉於虔反疏正義曰言國有元師之大任何得專意廢之而為御也注正義曰曲禮曰父前子名君前臣名鄭玄云對至尊無大小皆相名以君至尊為在君前故子名其父且侵官冒也注載公為侵官音義冒莫報反徐莫北反失官慢也注去將而御失官也離局姦也注逺其部曲為離局音義離力志反注同逺于萬反有三罪焉不可犯也乃掀公以出於淖注掀舉也音義掀徐許言反云捧轂舉之則公軒起也一曰掀引也胡根反一音虛斤反字林云舉出也火氣也又丘近反疏正義曰説文云掀舉出也公在於淖知掀當訓為舉也癸巳潘尫之黨與養由基蹲甲而射之徹七札焉注黨潘尫之子蹲聚也一發逹七札言其能陷堅音義尫烏黃反之黨一本作潘尫之子黨案注云黨潘尫之子也則傳文不得有子字古本此及襄二十三年申鮮虞之傳摯皆無子字蹲在尊反徐又在損反一音才官反札側八反徐側乙反疏正義曰潘尫之子其名為黨襄二十三年申鮮虞之傳摯辭與此同古人為文略言耳以示王曰君有二臣如此何憂於戰注二子以射夸王音義夸苦瓜反王怒曰大辱國注賤其不尚知謀音義知音智詰朝爾射死藝注言女以射自多必當以藝死也詰朝猶明朝是戰日音義朝如字注同女音汝呂錡夢射月中之退入於泥注呂錡魏錡音義射食亦反下至使射呂錡皆同占之曰姬姓日也注周世姬姓尊異姓月也注異姓卑必楚王也射而中之退入於泥亦必死矣注錡自入泥亦死象音義中丁仲反下及注皆同及戰射共王中目王召養由基與之兩矢使射呂錡中項伏韜注韜弓衣音義項户講反韜他刀反以一矢復命注言一發而中郤至三遇楚子之卒見楚子必下免胄而趨風注疾如風楚子使工尹襄問之以弓注問遺也疏正義曰遺人以物謂之為問問弦多以琴問子貢以弓論語云問人於他邦皆是也曰方事之殷也注殷盛也有韎韋之跗注君子也注韎赤色跗注戎服若袴而屬於跗與袴連音義韎莫拜反又音妹徐莫蓋反跗方于反注之樹反袴若故反屬章玉反疏正義曰鄭玄詩注云韎茅搜染也韎聲也韋昭云茅搜今絳草也急疾呼茅搜成韎也茅搜即今之蒨也賈逵云一染曰韎釋器云一染謂之縓謂一入赤為淺赤色也跗注兵戎之服自要以下而注於腳跗謂屬袴於下與跗相連周禮司服凡兵事韋辨服鄭玄云韋辨以韎韋為辨又以為衣裳晉郤至衣韎韋之跗注是也鄭以跗裳為幅謂裁韋若布帛之幅相縫屬鄭言以為衣裳則衣裳不連聘禮君使卿韋辨歸饔餼鄭玄云其服蓋韎布以為衣而素裳鄭以彼非戎事當為素裳明衣裳不連跗注言連者謂要腳連耳若然在軍之服其色皆同所謂均服振振上下同色郤至與衆同服所以獨見識者禮法雖有此服軍士未必盡然郤至服必鮮華故楚王偏識之識見不榖而趨無乃傷乎注恐其傷郤至見客免胄承命曰君之外臣至從寡君之戎事以君之靈間蒙甲胄注間猶近也音義近如字一本或作與音預不敢拜命注介者不拜音義介音界疏正義曰曲禮云介者不拜為其拜而蓌拜鄭玄云蓌則失容節蓌猶詐也慮其笮甲折敢告不寧君命之辱注以君辱賜命故不敢自安疏正義曰劉炫以為楚王云無乃傷乎恐其傷也答云敢告不寧告其身不傷耳魏犨云不有寧也以傷為寧此與魏犨相似今知不然者案僖二十八年魏犨云以君之靈不有寧也謂不有被傷以自寧也知不與彼同者以彼云不有寧謂不有損傷此直云不寧既無有字又先無被傷之狀與魏犨不同也案檢杜注敢告不寧君命之辱宜連讀之若敢告不寧别自為句則君命之辱一句零行無所依附故知與彼不同劉君不尋杜意以為與魏犨相似而規杜非也為事之故敢肅使者注言君辱命來問以有軍事不得答故肅使者肅手至地若今撎音義為于偽反使所吏反注及下同撎伊志反揖也字林云舉首下手也疏正義曰周禮大祝辨九拜九曰肅拜鄭司農云肅拜但俯下手今時撎是也説文云撎舉手下手也其勢如今揖之小别晉宋儀注貴人待賤人賤人拜貴人撎三肅使者而退晉韓厥從鄭伯注從逐也其御杜溷羅曰速從之其御屢顧不在馬可及也韓厥曰不可以再辱國君乃止注二年鞍戰韓厥已辱齊侯音義溷户昏反又户本反郤至從鄭伯其右茀翰胡曰諜輅之余從之乘而俘以下注欲遣輕兵單進以距鄭伯車前而自後登其車以執之音義茀府勿反翰徐音韓諜音牒輅五嫁反乘繩證反輕遣政反又如字疏正義曰説文云諜軍中反間也兵書有反間之法謂詐為敵國之人入其軍中伺候間隙以反告已軍今謂之細作人也此欲令諜迎鄭伯則非一人細作於時鄭伯退走故杜以為輕兵單進繞鄭伯之前逆距鄭伯使鄭伯前視輕兵不復顧後得自後登其車以執之也鄭軍亂走輕兵獨出其間亦諜之類故翰胡得以諜言之郤至曰傷國君有刑亦止石首曰衛懿公唯不去其旗是以敗於熒乃內旌於韜中注熒戰在閔二年音義去起呂反熒户扃反旌音精疏正義曰旌謂鄭伯所建之旗韜是盛旌之囊也周禮全羽為禭析羽為旌謂空建鳥羽者也但凡旗竿首皆有析羽故旌為之總名故此傳鄭伯與子重所建皆以旌言之其鄭伯所建當是交龍之旗子重所建當是熊虎之旗周禮中秋教治兵辨旗物諸侯載旗軍吏載旗鄭玄云軍吏諸軍帥也凡旌旗有軍衆者晝異物無者帛而已子重為將自然當建熊虎之旗唐苟謂石首曰子在君側敗者一大我不如子子以君免我請止乃死注敗者一大謂軍大崩也言石首亦君之親臣而執御與車右不同故首當御君以退已當死戰楚師薄於險注薄迫也叔山冉謂養由基曰雖君有命為國故子必射注王有死藝命音義冉如炎反為于偽反射食亦反乃射再發盡殪叔山冉摶人以投中車折軾晉師乃止注言二子皆有過人之能音義發如字徐音廢殪於計反搏音博中丁仲反折之設反又市列反軾音式囚楚公子茷注為郤至見譖張本音義茷扶廢反疏正義曰晉語謂之王子發鉤蓋一名一字也欒針見子重之旌請曰楚人謂夫旌子重之麾也彼其子重也日臣之使於楚也子重問晉國之勇臣對曰好以衆整曰又何如注又問其餘音義夫音扶麾許危反日人實反使所吏反下免使者同好呼報反下及注皆同臣對曰好以暇注暇間暇音義間音間今兩國治戎行人不使不可謂整臨事而食言不可謂暇注食好整之言音義使所吏反又如字請攝飲焉注攝持也持飲往飲子重音義往飲於鴆反公許之使行人執榼承飲造于子重注承奉也音義榼苦臘反造七報反曰寡君乏使使針御持矛注御侍也是以不得犒從者使某攝飲子重曰夫子嘗與吾言於楚必是故也不亦識乎注知其以往言好暇故致飲音義犒苦報反從才用反受而飲之免使者而復鼓注免脫也音義復扶又反注及下同旦而戰見星未巳子反命軍吏察夷傷注夷亦傷也疏正義曰服虔云金創為夷杜以戰用五兵唯殳無刃所言傷者皆刃傷也何須於此獨辨金木故知夷亦傷也復言之耳補卒乘注補死亡音義乘繩證反下同繕甲兵注繕治也展車馬注展陳也音義陳如字雞鳴而食唯命是聽注復欲戰晉人患之苗賁皇徇曰搜乘補卒注搜閲也音義徇似俊反搜所留反秣馬利兵注秣榖馬也音義秣音未修陳固列注固堅也音義陳直覲反又如字蓐食申禱注申重也音義蓐音辱重直用反明日復戰乃逸楚囚注逸縱也音義縱子用反王聞之召子反謀榖陽豎獻飲於子反子反醉而不能見注榖陽子反內豎音義見賢遍反疏正義曰鄭玄云豎未冠者之名故杜以為內豎也案呂氏春秋云荆共王與晉厲公戰于鄢陵荆師敗共王傷臨戰司馬子反渴而求飲豎陽榖操酒而進之子反曰却酒也豎陽榖曰非酒也子反曰却酒也豎陽榖又曰非酒也子反受而飲之子反之為人也嗜酒甘而不能絶於口醉戰既罷共王欲復戰而謀使召司馬子反子反辭以心疾共王駕往視之入幄中聞酒臭而還曰今日之戰不穀親傷所恃者司馬也而司馬又若此不榖無與復戰矣於是遂罷師去之斬司馬子反以為戮與此不同者傳依簡牘本紀彼采傳聞異辭所説既殊其文亦異王曰天敗楚也夫余不可以待乃宵遁晉入楚軍三日穀注食楚粟三日也音義夫音扶三日穀本或作三日館榖誤也范文子立於戎馬之前曰君幼諸臣不佞注佞才也音義君幼本或作君幼弱何以及此君其戒之注戒勿驕周書曰惟命不于常有德之謂注周書康誥言勝無常命惟德是與疏正義曰周公稱成王之命告康叔以此言也唯上天之命不常於一人也言善則德之惡則失之唯有德者於是與之楚師還及瑕注瑕楚地王使謂子反曰先大夫之覆師徒者君不在注謂子玉敗城濮時王不在軍音義覆芳服反子無以為過不穀之罪也子反再拜稽首曰君賜臣死死且不朽注王引過亦所以責子反也臣之卒實奔臣之罪也子重使謂子反曰初隕師徒者而亦聞之矣盍圖之注聞子玉自殺終二卿相惡音義卒從此己前皆子忽反隕于敏反盍户臘反對曰雖微先大夫有之大夫命側側敢不義注言以義命已不敢不受疏正義曰微無也縱使雖無先大夫有此舊事今大夫將義命已敢不以為之義乎側亡君師敢忘其死王使止之弗及而卒戰之日齊國佐高無咎至于師注無咎高固子衛侯出于衛公出于壞隕注壞隤魯邑齊衛皆後非獨魯明晉以僑如故不見公音義壞户怪反徐音懷隤徒回反疏正義曰出于衛者已出衛竟也公出于壞隤始從壞隤而出猶未出魯竟下云公待於壞隤設守而後行是出國止於壞隤更從壞隤而行宣伯通於穆薑注穆薑成公母欲去季孟而取其室注季文子孟獻子音義去起呂反將行穆薑送公而使逐二子公以晉難告注會晉伐鄭音義難乃旦反曰請反而聽命薑怒公子偃公子鉏趨過注二子公庶弟音義鉏仕居反疏注正義曰沈氏云以刺公子偃不云弟故也指之曰女不可是皆君也注言欲廢公更立君音義女音汝公待于壞隤申宮警備注申敕宮備音義警京領反設守而後行是以後注後晉楚戰期音義守手又反使孟獻子守于公宮秋會于沙隨謀伐鄭也注鄭猶未服宣伯使告郤犨曰魯侯待于壞隤以待勝者注觀晉楚之勝負郤犨將新軍且為公族大夫以主東諸侯注主齊魯之屬取貨于宣伯而訴公于晉侯注訴譖也晉侯不見公曹人請于晉曰自我先君宣公即世注在三十年國人曰若之何憂猶未弭注弭息也既葬國人皆將從子臧所謂憂未息音義弭亡氏反而又討我寡君注前年晉侯執曹伯以亡曹國社稷之鎮公子注謂子臧逃奔宋是大泯曹也注泯滅也先君無乃有罪乎注言今君無罪而見討得無以先君故若有罪則君列諸會矣注諸侯雖有篡弒之罪侯伯已與之會則不復討前年會于戚曹伯在列盟畢乃執之故曹人以為無罪音義篡初患反弒音試復扶又反下及下文復請同疏正義曰諸侯廢立當由天子但春秋之世王政不行若篡弒而立則侯伯既列於會便是己成為君臣不得殺之鄰國不得復討往年為戚之會主為討曹但晉侯既列於會盟畢乃始執之故曹人以為無罪也宣元年會于平州以定公位齊非侯伯而得公位定者縱非侯伯乃是強鄰既得與會即為黨援晉若討魯齊必救之於是晉國竟不伐魯是由會齊而公位遂定也君唯不遺德刑注遺失也以伯諸侯豈獨遺諸敝邑敢私布之注為曹伯歸不以名告傳音義伯如字又音霸疏正義曰諸侯被執及歸或名或否雖從告辭傳不為例但諸侯尊貴不斥其名曲禮曰諸侯不生名諸侯失地名滅同姓名是諸侯稱名者是罪責之事彼告者亦量其事之善否惡之則以名告故釋例曰蔡侯般弒父自立楚子欲顯行刑誅以章伯業誘而殺之蔡人深怨故稱名以告春秋從而書之是告者謂其有罪則稱名以告謂其無罪則告不以名此曹人訴君無罪晉侯從而釋之言其無罪而歸故晉人不以名告下云晉侯謂子臧反吾歸而君是晉人告其歸也此傳説曹伯無罪是為經不以名告之傳也七月公會尹武公及諸侯伐鄭將行薑又命公如初注復欲使公逐季孟公又申守而行諸侯之師次于鄭西我師次于督揚不敢過鄭注督揚鄭東地音義守手又反下注同過古臥反又古禾反子叔聲伯使叔孫豹請逆于晉師注豹叔孫僑如弟也僑如於是遂作亂豹因奔齊疏正義曰此時十月也至十月而僑如奔齊昭四年傳稱穆子去叔孫氏及庚宗遇婦人使私為食而宿焉後生豎牛適齊娶於國氏生孟丙仲壬乃云宣伯奔齊穆子饋之則似豹在齊多年僑如始往故服虔以為叔孫豹先在齊矣此時從國佐在師聲伯令人就齊師使豹豹不忘宗國聞白國佐為魯請逆杜不然者若豹以前在齊則非復魯臣聲伯正可因之以請不得云聲伯使豹聲伯安得專使背叛之臣也又聲伯豈無魯人可使而﨑嶇艱險逺使他國之人乎今傳言聲伯使豹明在魯軍得為聲伯使耳下云聲伯食使者而後食不言食豹而言食使者明豹因請逆遂即不還還者豹之介耳于時魯師在鄭從鄭向齊塗出於魯豹必過魯乃去故得宿於庚宗彼傳因言宿於庚宗遂説娶於國氏生二子耳二子之生必在僑如奔後豹之還魯雖無歸年而襄二年始見於經豎牛己能奉雉故杜以為此年去彼年歸故下注云傳因言其終為食於鄭郊師逆以至注聲伯戒叔孫以必須所逆晉師至乃食聲伯四日不食以待之食使者注使者豹之介音義食使音嗣使所吏反注同介音界下文敢介大國同而後食注言其忠也音義而後食一本作聲伯而後食諸侯遷于制田注滎陽苑陵縣東有制澤知武子佐下軍注武子荀罃以諸侯之師侵陳至于鳴鹿注陳國武平縣西南有鹿邑遂侵蔡未反注侵陳蔡不書公不與音義與音預諸侯遷于頴上戊午鄭子罕宵軍之宋齊衛皆失軍注將主與軍相失宋衛不書後也音義將子匠反疏正義曰服虔以失軍為失其軍糧傳稱諸侯遷于頴上子罕宵軍之則軍請侯之營不軍其輜重安得為失軍糧也故杜以為將主與軍相失謂夜裏迸散相失耳此諸侯即伐鄭之諸侯也經書公會尹子晉侯齊國佐邾人伐鄭不書宋衛傳言宋衛皆失軍則宋衛在矣在而不書後至故也曹人復請于晉晉侯謂子臧反吾歸而君注以曹人重子臧故子臧反曹伯歸注子臧自宋還子臧盡致其邑與卿而不出注不出仕宣伯使告郤犨曰魯之有季孟猶晉之有欒范也政令於是乎成今其謀曰晉政多門不可從也注政不由君寧事齊楚有亡而已蔑從晉矣注蔑無也若欲得志於魯請止行父而殺之注行父季文子也我斃蔑也注蔑孟獻子時留守公宮音義斃婢世反而事晉蔑有二矣魯不二小國必睦不然歸必叛矣九月晉人執季文子于苕丘公還待于鄆注鄆魯西邑東郡廩丘縣東有鄆城音義廪力甚反使子叔聲伯請季孫于晉郤犨曰苟去仲孫蔑而止季孫行父吾與子國親於公室注親魯甚於晉公室音義去起呂反下同對曰僑如之情子必聞之矣注聞其淫慝情音義慝吐得反下文同若去蔑與行父是大棄魯國而罪寡君也若猶不棄而惠徼周公之福使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡以魯之密邇仇讐注仇讐謂齊楚音義夫音扶朝如字疏正義曰朝亡之謂朝失蔑與行父也魯必夕亡謂亡屬他國也下云亡而為讐是欲棄晉而屬齊楚亡而為讐治之何及注言魯屬齊楚則還為晉讐郤讐曰吾為子請邑對曰嬰齊魯之常𨽻也注𨽻賤官音義為于偽反敢介大國以求厚焉注介因也承寡君之命以請注承奉也若得所請吾子之賜多矣又何求范文子謂欒武子曰季孫於魯相二君矣注二君宣成音義相息亮反妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何子叔嬰齊奉君命無私注不受郤犨請邑音義衣於既反食舊如字對上句應作嗣音謀國家不二注謂四日不食以堅事晉圖其身不忘其君注辭邑不食皆先君而後身若虛其請是棄善人也子其圖之乃許魯平赦季孫冬十月出叔孫僑如而盟之僑如奔齊注諸大夫共盟以僑如為戒十二月季孫及郤犨盟于扈歸刺公子偃注偃與鉏俱為薑所指而獨殺偃偃與謀音義偃與音預召叔孫豹于齊而立之注近此七月聲伯使豹請逆於晉聞魯人將討僑如豹乃辟其難先奔齊生二子而魯乃召之故襄二年豹始見經傳於此因言其終音義難乃旦反見賢遍反齊聲孟子通僑如注聲孟子齊靈公母宋女使立於高國之間注位比二卿僑如曰不可以再罪奔衛亦間於卿注傳亦終言僑如之佞音義間徐音間厠之間讀者或如字晉侯使郤至獻楚捷于周與單襄公語驟稱其伐注伐功也疏正義曰周語稱郤至見召桓公與之語召桓公以告單襄公非郤至自與襄公語也襄公論郤至將死答召桓公語耳非語諸大夫也其文與此小異其意與此大同周語詳而此傳略先賢或以為國語非丘明所作為其或有與傳不同故也驟稱其伐謂數數自伐其功周語説郤至自伐之言多矣其辭不可具載單子語諸大夫曰溫季其亡乎注溫季郤至音義語魚據反疏正義曰周語單襄公答召桓公云人有言曰兵在頸者其郤至之謂乎即具論郤至之失乃曰以吾觀之兵在其頸不可久也位於七人之下注佐新軍位在八疏正義曰此時欒書將中軍士燮佐之郤錡將上軍荀偃佐之韓厥將下軍荀罃佐之郤犨將新軍郤至佐之是位在七人之下而求掩其上注稱已之伐掩上功疏正義曰周語曰郤至自稱已有大功欲求晉國之政召桓公謂之曰吾子則賢矣晉國之舉不失其次吾懼政之未及子也至謂召桓公曰何次之有先大夫荀伯下軍之佐以為政趙宣子未有軍行而以為政今欒伯自下軍往是三子也吾又過之無不及也若佐新軍而以之為政不亦可乎將必求之是掩上功怨之所聚亂之本也多怨而階亂何以在位注怨為亂階夏書曰怨豈在明不見是圖注逸書也不見細微也音義見賢遍反又如字注同疏正義曰夏書五子之歌第一章也其為人所怨者豈必在明白之處乎其於人所不見當於是圖謀之此書之言將謂慎其細小之事者也今乃明明言之道已欲掩其上此事甚明其可乎言必不可也杜不見古文故云逸書將慎其細也今而明之其可乎注言郤至顯稱己功所以明怨咎經十有七年春衛北宮括帥師侵鄭注括成公曽孫音義括古活反夏公會尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭注晉未能服鄭故假天子威周使二卿會之晉為兵主而猶先尹單尊王命也單伯稱子孟降爵六月乙酉同盟于柯陵注柯陵鄭西地音義柯古河反秋公至自會注無傳齊髙無咎出奔莒九月辛丑用郊注無傳九月郊祭非禮明矣書用郊從史文疏正義曰傳例啓蟄而郊今九月郊祀是非禮明矣公羊傳曰用者何用者不宜用也九月非所用郊也榖梁傳曰夏之始可以承春以秋之末承春之始蓋不可矣九月用郊用者不宜用也賈逵以二傳為説諸書用者不宜用也釋例曰辛丑用郊文異而丘明不發傳因時史之辭非聖賢意也劉賈以為諸言用皆不宜用反於禮者也施之用郊似若有義至於用幣用鄫子諸若此此皆當須書用以别所用者也若不言用則事敘不明所謂辭窮非聖人故造此用以示義也且諸過祀三望之類奚獨皆不書用邪案左氏傳用幣于社傳曰得禮冉有用矛於齊師孔子以為義無不宜用之例也丘明云我師豈欺我哉晉侯使荀罃來乞師注無傳將伐鄭冬公會單子晉侯宋公衛侯曹伯齊人邾人伐鄭注鄭猶未服故也十有一月公至自伐鄭注無傳壬申公孫嬰齊卒于貍脤注十一月無壬申日誤也貍脤關音義貍力之反脤市軫反疏正義曰杜長歷推十一月丁亥朔六日壬辰十六日壬寅二十六日壬子十日丙申二十二日戊申不知壬申二字何者為誤長歷云公羊榖梁傳及諸儒皆以為十月十五日也十月庚午圍鄭十三日也推至壬申誠在十五日然據傳曰十一月諸侯還自鄭壬申至于貍脤而卒此非十月分明誤在日也又杜於土地之篇凡有地名二十六所不知所在之國貍脤即是其一不知是何國之地故直云闕也杜又稱舊説曰壬申十月十五日貍脤魯地也傳曰十月庚午圍鄭則二日未得及魯竟也釋例又曰魯大夫卒其竟內則不書地傳稱季平子行東野卒于房是也以此益明貍脤非魯地矣以下有十二月丁巳朔逆而推之故諸舊説皆以壬申為十月十五日也公羊榖梁傳以為待公至然後卒大夫故十月之日書在十一月之下於左傳則不通故杜以為日誤十有二月丁巳朔日有食之注無傳邾子貜且卒注無傳五同盟音義貜俱縛反徐居碧反且子餘反疏正義曰貜且以文十四年即位宣十七年盟于斷道成二年于蜀五年于蟲牢七年于馬陵九年于蒲十五年于戚此年于柯陵凡七同盟而云五者沈以杜數同盟之例但有君盟者不數大夫之盟比二年盟蜀十七年盟柯陵皆邾之大夫故不數之劉炫并數二盟而規其過非也晉殺其大夫郤錡郤犨郤至楚人滅舒庸傳十七年春王正月鄭子駟侵晉虛滑注虛滑晉二邑滑故滑國為秦所滅時屬晉後屬周音義虛起居反疏正義曰僖三十三年秦人滅滑經書入則是滅而不有不知滅後屬何國也此言侵晉知此時屬晉耳襄十八年傳楚公子格侵費滑胥靡注云胥靡鄭邑不言費滑杜意當以費滑為周邑也然則若是周邑當言侵周以别之定六年傳稱鄭伐周馮滑胥靡爾時胥靡亦為周邑蓋費滑胥靡周鄭之間襄時屬鄭定時屬周衛北宮括救晉侵鄭至于髙氏注不書救以侵告高氏在陽翟縣西南夏五月鄭大子髠頑侯獳為質於楚注侯獳鄭大夫音義髠苦門反獳乃侯反質音致楚公子成公子寅戌鄭公會尹武公單襄公及諸侯伐鄭自戲童至于曲洧注今新汲縣治曲洧城臨洧水音義戲許宜反洧于軌反治直吏反疏正義曰釋例云洧水出滎陽密縣西北陽城山東南至頴川長平縣入頴晉范文子反自鄢陵注前年鄢陵戰還使其祝宗祈死注祝宗主祭祀祈禱者曰君驕侈而克敵是天益其疾也難將作吳愛我者惟祝我使我速死無及於難范氏之福也六月戊辰士燮卒注傳言厲公無道故賢臣憂懼因禱自裁音義侈尺氏反又尸氏反難乃旦反下同祝之又反疏正義曰劉炫以為士燮及昭子之卒適與死會非自殺今知非者以傳云使祝宗祈死又云祝我使我速死無及於難是其欲死之意叔孫昭子心懷憂懼亦與此同身皆並卒故知自裁若其二人之辛適與死會春秋之內唯有兩人願死何得身死皆與相當故杜斟酌傳文以為自殺劉以為偶然而死以規杜失非也何休膏肓以為人生有三命有夀命以保度有隨命以督行有遭命以摘暴未聞死可祈也故杜以為因禱自裁也傳記此事者欲見厲公無道賢臣憂懼乙酉同盟于柯陵尋戚之盟也注戚盟在十五年楚子重救鄭師于首止諸侯還注畏楚強齊慶克通于聲孟子與婦人蒙衣乘輦而入于閎注慶克慶封父蒙衣亦為婦人服與婦人相冒閎巷門音義輿如字徐音預閎音宏冒亡報反疏正義曰釋宮云宮中弄謂之壼弄門謂之閎孫炎曰弄舍間道也李巡曰閎弄頭門也鮑牽見之以告國武子注鮑牽鮑叔牙曽孫武子召慶克而謂之慶克久不出注慙臥於家夫人所以怪之而告夫人曰國子謫我注謫譴責也音義謫直革反譴遣戰反夫人怒國子相靈公以會注會伐鄭音義相息亮反下相施氏同高鮑處守注高無咎鮑牽音義守手又反及還將至閉門而索客注搜索備姦人音義索所白反注同孟子訴之曰高鮑將不納君而立公子角國子知之注角頃公子音義頃音傾秋七月壬寅刖鮑牽而逐高無咎無咎奔莒高弱以盧叛注弱無咎子盧髙氏邑音義刖音月又五刮反齊人來召鮑國而立之注國牽之弟文子初鮑國去鮑氏而來為施孝叔臣施氏卜宰匡句須吉注卜立家宰音義句其俱反施氏之宰有百室之邑與匡句須邑使為宰以讓鮑國而致邑焉施孝叔曰子實吉對曰能與忠良吉孰大焉鮑國相施氏忠故齊人取以為鮑氏後仲尼曰鮑莊子之知不如葵葵猶能衛其足注葵傾葉向日以蔽其根言鮑牽居亂不能危行言孫音義知音智向許亮反本又作嚮行下孟反冬諸侯伐鄭注前夏未得志故十月庚午圍鄭楚公子申救鄭師于汝上疏正義曰釋例云汝水出南陽魯縣大蓋山東北至河南梁縣東南經襄城頴川汝南至汝隂褒信縣入淮十一月諸侯還注不書圍畏楚救不成圍而還初聲伯夢涉洹注洹水出汲郡林慮縣東北至魏郡長樂縣入清水音義洹音桓一音恆今土俗音袁慮力於反樂音洛下樂平同或與已瓊瑰食之注瓊玉瑰珠也食珠玉含象音義瓊求營反瑰古回反含户暗反本亦作唅疏正義曰瓊是玉之美者廣雅云玫瑰珠也呂靖韻集云玫瑰火齊珠也含者或用玉或用珠故夢食珠玉為含象也詩毛傳云瓊瑰石而次玉禮緯天子含用珠諸侯用玉大夫用碧此聲伯得有瓊瑰者案周禮天子含用玉則禮緯之文未可全依或可珠玉兼有故釋例云珠玉曰含泣而為瓊瑰盈其懷注淚下化為珠玉滿其懷從而歌之曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懷乎注從就也夢中為此歌懼不敢占也還自鄭壬申至于貍脤而占之曰余恐死故不敢占也今衆繁而從余三年矣無傷也言之之莫而卒注繁猶多也傳戒數占夢音義莫音暮數所角反疏正義曰聲伯之意以初得此夢謂凶在已懼不敢占今衆既繁多而從余三年余之此夢凶災散在衆人不在已也故云無傷齊侯使崔杼為大夫使慶克佐之帥師圍盧注討髙弱音義杼直呂反國佐從諸侯圍鄭以難請而歸注請於諸侯音義難乃旦反下及注同遂如盧師殺慶克以穀叛注疾克淫亂故殺之齊侯與之盟于徐關而復之十二月盧降使國勝告難于晉待命于清注勝國佐子使以髙氏難告晉齊欲討國佐故留其子於外清陽平樂平縣是為明年殺國佐傳音義降下江反疏正義曰欲遣國勝告難故令待進止之命在于清地非是使還待命晉厲公侈多外嬖注外嬖愛幸大夫音義嬖必計反反自鄢陵欲盡去羣大夫而立其左右注終如士燮言音義反自鄢陵本作自鄢陵去起呂反胥童以胥克之廢也怨郤氏注童胥克之子宣八年郤缺廢胥克而嬖於厲公郤錡奪夷陽五田五亦嬖於厲公郤犨與長魚矯爭田執而梏之注梏械也音義矯居表反梏古毒反械户戒反與其父母妻子同一轅注繫之車轅既矯亦嬖於厲公欒書怨郤至以其不從已而敗楚師也欲廢之注鄢陵戰欒書欲固壘郤至言楚有六間以取勝也使楚公子茷告公曰此戰也郤至實召寡君注鄢陵戰晉囚公子茷以歸以東師之未至也注齊魯衛之師與軍帥之不具也曰此必敗注荀罃佐下軍居守郤犨將新軍乞師故言不具音義帥所類反守手又反吾因奉孫周以事君注孫周晉襄公曽孫悼公君楚王也疏正義曰晉世家云悼公周者其先祖父捷晉襄公少子也不得立號為桓叔桓叔生惠伯談談生悼公周是周為襄公曽孫也公告欒書書曰其有焉不然豈其死之不恤而受敵使乎注謂鄢陵戰時楚子問郤至以弓音義使所吏反君盍嘗使諸周而察之注嘗試也音義盍户臘反使所吏反又如字郤至聘于周欒書使孫周見之公使覘之信注覘伺也音義覘敕廉反伺音司又絲嗣反遂怨郤至厲公田與婦人先殺而飲酒後使大夫殺注傳言厲公無道先婦人而後卿佐郤至奉豕注進之於公寺人孟張奪之注寺人奄士郤至射而殺之公曰季子欺余注季子郤至公反以為郤至奪孟張豕音義射食亦反厲公將作難胥童曰必先三郤族大多怨去大族不逼注不逼公室音義逼彼力反下同敵多怨有庸注討多怨者易有功音義易以豉反公曰然郤氏聞之郤錡欲攻公曰雖死君必危郤至曰人所以立信知勇也信不叛君知不害民勇不作亂失兹三者其誰與我死而多怨將安用之注言俱死無用多其怨咎音義知音智下同君實有臣而殺之其謂君何我之有罪吾死後矣若殺不辜將失其民欲安得乎注言不得安君位待命而已受君之祿是以聚黨有黨而爭命注爭死命也罪孰大焉注傳言郤至無反心壬午胥童夷羊五帥甲八百將攻郤氏注八百人也長魚矯請無用衆公使清沸魋助之注沸魋亦嬖人音義沸甫味反魋徒回反抽戈結衽注衽裳際音義衽而甚反徐音而鴆反而偽訟者注偽與清沸魋訟三郤將謀於榭注榭講武堂疏正義曰楚語云榭不過講軍實焉是榭為講武堂傳言將謀於榭似仍未至榭猶在塗也下云殺駒伯苦成叔於其位位所坐之處則已至榭矣三郤慮公殺已謀欲自安未及謀而已死故曰將耳非謂未至榭也或可將謀於榭是未至榭故杜云位所坐處也謂當時隨便所坐之處故長魚矯得偽訟而殺之若已至榭不應就榭偽訟矯以戈殺駒伯苦成叔於其位注位所坐處也駒伯郤錡苦成叔郤犨音義處昌慮反溫季曰逃威也遂趨注郤至本意欲稟君命而死今矯等不以君命而來故欲逃凶賊為害故曰威言可畏也或曰威當為藏矯及諸其車以戈殺之皆尸諸朝注陳其尸於朝胥童以甲劫欒書中行偃於朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍益也音義一朝如字疏正義曰一朝謂一旦也晉語説此事一旦而尸三卿不可益也對曰人將忍君注人謂書與偃臣聞亂在外為姦在內為軌御姦以德注德綏逺音義軌本又作宄音同御魚呂反下同御軌以刑注刑治近也不施而殺不可謂德臣逼而不討不可謂刑德刑不立姦軌並至臣請行遂出奔狄注行去也音義施如字或式豉反公使辭於二子曰注辭謝書與偃也寡人有討於郤氏郤氏既伏其辜矣大夫無辱其復職位注胥童劫而執之故云辱也皆再拜稽首曰君討有罪而免臣於死君之惠也二臣雖死敢忘君德乃皆歸公使胥童為卿公遊于匠麗氏注匠麗嬖大夫家欒書中行偃遂執公焉召士丐士丐辭注辭不往也召韓厥韓厥辭曰昔吾畜於趙氏孟姬之讒吾能違兵注畜養也違去也韓厥少為趙盾所待養及孟姬之亂晉將討趙氏而厥去其兵示不與黨言此者明已無所偏助孟姬亂在八年音義去起呂反下同少詩照反古人有言曰殺老牛莫之敢尸而况君乎二三子不能事君焉用厥也注尸主也音義焉於虔反舒庸人以楚師之敗也注敗於鄢陵舒庸東夷國道吳人圍巢伐駕圍釐虺注巢駕釐虺楚四邑音義道音導下及注同駕如字一音加釐力之反虺許鬼反遂恃吳而不設備楚公子櫜師襲舒庸滅之閏月乙卯晦欒書中行偃殺胥童注以其劫已故音義櫜他洛反民不與郤氏胥童道君為亂故皆書曰晉殺其大夫注厲公以私欲殺三郤而三郤死不以無罪書書偃以家怨害胥童而胥童受國討文明郤氏失民胥童道亂宜其為國戮疏正義曰厲公以私欲殺三郤則三郤無罪經應直云晉殺其大夫不應稱名也又胥童為欒書中行偃所殺乃直是兩下相殺今經書二者並為國討之文故傳解之言民不與郤氏郤氏有罪也胥童道君為亂胥童有罪也故皆書曰晉殺其大夫以二者據其死狀皆昨國討故傳正其二者之罪解其並為國討之意劉炫云杜言三郤不以無罪書正謂不書盜書盜即無罪也胥童之死本非國家所殺故特言胥童受國討文其實傳意并論郤氏受國討故云皆書曰晉殺其大夫也杜又云郤氏失民胥童道亂乃總釋傳並言二者皆為國討之意也經十有八年春王正月晉殺其大夫胥童注傳在前年經在今春從告庚申晉弒其君州蒲注不稱臣君無道齊殺其大夫國佐注國武子也公如晉夏楚子鄭伯伐宋宋魚石復入于彭城注傳例曰以惡入也彭城宋邑今彭城縣音義復扶又反公至自晉晉侯使士丐來聘秋杞伯來朝八月邾子來朝築鹿囿注築牆為鹿苑音義囿音又己丑公薨于路寢冬楚人鄭人侵宋注子重先遣輕軍侵宋故稱人而不言伐音義輕遣政反晉侯使士魴來乞師音義魴音房十有二月仲孫蔑會晉侯宋公衛侯邾子齊崔杼同盟于虛朾注虛朾地闕音義虛起居反朾他丁反丁未葬我君成公傳十八年春王正月庚申晉欒書中行偃使程滑弒厲公注程滑晉大夫葬之于翼東門之外以車一乘注言不以君禮葬諸侯葬車七乘音義乘繩證反注同疏正義曰周禮大行人上公二車九乘侯伯七乘子男五乘謂生時副二之車也其送葬亦當如之今唯一乘是不以君禮葬也以晉是侯爵故指言侯禮七乘耳諸侯各依命數不是皆七乘也襄二十五年傳齊人葬莊公下車七乘杜以特言七乘明七非舊制故彼注云齊舊依上公禮九乘以齊嘗為侯伯因而用九九非侯之正法故此以正言之使荀罃士魴逆周子于京師而立之注悼公周也生十四年矣大夫逆于清原周子曰孤始願不及此雖及此豈非天乎注言有命也抑人之求君使出命也立而不從將安用君二三子用我今日否亦今日共而從君神之所福也注傳言其少有才所以能自固音義少詩照反對曰羣臣之願也敢不唯命是聽庚午盟而入注與諸大夫盟館于伯子同氏注晉大夫家館舍也辛巳朝于武宮注武公曲沃始命君疏正義曰服虔本作辛未晉語亦作辛巳孔朝云以辛未盟入國辛巳朝祖廟取其新也案晉語稱庚午大夫逆于清原傳云庚午盟而入逆日即盟非辛未也傳與晉語皆云辛巳朝于武宫服本自誤耳孔朝強欲合之非也逐不臣者七人注夷羊五之屬也周子有兄而無慧不能辨菽麥故不可立注菽大豆也豆麥殊形易别故以為癡者之候不慧蓋世所謂白癡音義菽音叔易以䜴反别彼列反癡勑疑反齊為慶氏之難注前年國左殺慶克音義為于偽反難乃旦反故甲申晦齊侯使士華免以戈殺國佐于內宮之朝注華免齊大夫內宮夫人宫疏正義曰杜世族譜於齊國雜人之中有華免而無士字此注以華免為大夫則士者為士官也官掌刑政故使殺國佐也於夫人之宮有朝羣妾之處故云內宮之朝蓋齊侯召入與語而殺之師逃于夫人之宮注伏兵內宮恐不勝書曰齊殺其大夫國佐棄命專殺以榖叛故也注國佐本疾淫亂殺慶克齊以是討之嫌其罪不及死故傳明言其三罪使清人殺國勝注勝國佐子前年待命于清者國弱來奔注弱勝之弟王湫奔萊注湫國佐黨音義湫子小反徐子鳥反萊音來慶封為大夫慶佐為司寇注封佐皆慶克子既齊侯反國弱使嗣國氏禮也注佐之罪不及不祀二月乙酉朔晉悼公即位于朝注朝廟五日而即位也厲公殺絶故悼公不以嗣子居喪音義殺音試疏正義曰辛巳距乙酉五日先定所修之政待朔旦而後施之故五日也晉語云正月乙酉公即位孔朝云二月即位言正月者記者誤也厲公被殺而嗣絶故悼公自外而入即位之日即命百官施布政教與居喪即位其禮不同釋例曰厲公見殺悼公自外紹立本非君臣無喪制也若然禮喪服小記云與諸侯為兄弟者服斬鄭玄云謂卿大夫以下也與尊者為親不敢以輕服服之言諸侯者明雖在異國猶來為三年也計厲是文公之曽孫悼文公之玄孫有緦麻之親法當服斬而云無喪制者悼之父祖去晉適周與本親隔絶無往來恩義厲既見殺悼即被迎迎之以為晉君即與厲公體敵且葬厲公以車一乘國內尚不以為君不可責悼公服斬也縱使當為之斬絶而别立亦非嗣矣始命百官注始為政施舍已責注施恩惠舍勞役止逋責音義施舍如字一音始豉反逋布吳反逮鰥寡注惠及微音義鰥古頑反振廢滯注起舊德匡乏困救災患注匡亦救也禁淫慝薄賦斂宥罪戾注宥寬也音義惡他得反斂力驗反宥音又戾力計反節器用注節省也音義省所景反下同時用民注使民以時欲無犯時注不縱私欲音義縱本亦作從子用反使魏相士魴魏頡趙武為卿注相魏錡子魴士會子頡魏顆子武趙朔子此四人其父祖皆有勞於晉國音義相息亮反頡户結反顆苦果反疏正義曰晉語云使呂宣子佐下軍曰邲之役呂錡佐知莊子於下軍獲楚公子榖臣與連尹襄老以免其子鄢陵之役親射楚王而敗楚師以定晉國而無後其子不可不崇也使彘共子將新軍曰武子之季文子之母弟也武子宣法以定晉國文子勤身以定諸侯二子之德其可忘乎故以彘季屏其宗使令狐文子佐之曰昔克潞之役秦來圖敗晉功魏顆以身退秦于輔氏親止杜回其勳銘于景鍾至于今不忘其子不可不興也彼言呂宣子魏相也彘共子士魴也令狐文子魏頡也又曰呂宣子卒公以趙文子能恤大事使佐新軍趙武父祖功名顯著故不復序之是四人父祖皆有勞于晉國荀家荀會欒黶韓無忌為公族大夫使訓卿之子弟共儉孝弟注無忌韓厥子音義孝弟音悌本亦作悌疏正義曰晉語云欒伯請公族大夫公曰荀家惇慈荀會文敏黶也果敢無忌鎮靖膏梁之性難正也故使惇惠者教之文敏者道之果敢者諗之鎮靖者修之使兹四人者為公族大夫也公族大夫職掌教誨故使訓卿之子弟令之共儉孝悌也晉語云韓獻子老使公族穆子受事于朝辭曰厲公之亂無忌備公族弗能死孔朝云備公族大夫則韓無忌先為公族大夫今言使為之者悼公始命百官更改新授之使士渥濁為大傅使修范武子之法注渥濁士貞子武子為景公大傅音義渥於角反右行辛為司空使修士蒍之法注辛將右行因以為氏士蒍獻公司空也音義行户郎反蒍于委反將子匠反下軍將同疏正義曰僖二十八年晉作三行三十一年即罷之以為五軍其置三行無多年嵗彼云屠擊將右行未知此人即屠擊之子孫也為是其祖代屠擊也正以荀林父將中行遂以中行為氏故謂此人之先將右行因以為氏耳辨糾御戎校正屬焉注辨糾欒糾也校正主馬官音義辨皮彥反本又作卞同糾居黝反校户孝反注同疏正義曰以晉語知是欒糾也周禮大馭御官之長别有戎僕掌御戎車春秋征伐之世以御戎為重此御戎當是御之尊者校正當周禮校人校人掌主馬之政襄九年傳曰命校正出馬知是主馬之官也周禮校人不屬大御此蓋諸侯兼官或是悼公新法此傳所言諸官皆不得與周禮同也使訓諸御知義注戎士尚節義也疏正義曰此訓諸御謂諸是御車之人設令國有十乘乘有一御皆令此官教之戎士尚節義故訓之使知義如羊斟之徒是不知義也周禮校人主養馬耳不知御事此言校正屬焉乃云訓御蓋令校正助御戎訓御荀賔為右司士屬焉注司士車右之官疏正義曰周禮司士掌羣臣之版以詔王治其職非車右之類不得屬車右也周禮有司右上士也掌羣右之政凡國之勇力之士能用五兵者屬焉其下更有戎右中大夫齊右下大夫道右上士此三右或官尊於司右而司右掌其政令春秋之世車右為尊此司士蓋周禮司右之類為車右屬官服虔以為司士主右之官謂司右也使訓勇力之士時使注勇力皆車右也勇力多不順命故訓之以共時之使音義共音恭本亦作供下文同疏正義曰所訓勇力之士皆謂為車右者也設令國有千乘乘有一右總使此官訓之勇力之士失於強暴如魏犨之徒不順上命故訓之使共時之使不犯法也晉語云君知士貞子之帥志博聞而宣惠於教也使為大傳知右行辛之能以數宣物定功也使為司空知欒糾之能御以和於正也使為戎御知荀賔之有力而不暴也使為戎右是四人者皆公知其能而使之耳范武子為大傅孤也士蒍為司空卿也皆前世能者其法可遵故使二大夫居其官而修其法也二人皆是大夫非孤卿也卿無共御立軍尉以攝之注省卿戎御令軍尉攝御而已音義省所景反令力呈反疏正義曰卿謂軍之諸將也若梁餘子養御罕夷解張御郤克之類往前恆有定員掌共卿御今始省其常員唯立軍尉之官臨有軍事使兼攝之令軍尉兼卿御也祁奚為中軍尉羊舌職佐之魏絳為司馬注魏犨子也張老為候奄鐸遏寇為上軍尉籍偃為之司馬注偃籍談父為上軍司馬音義鐸待洛反遏於葛反徐音謁使訓卒乘親以聽命注相親以聽上命音義卒子忽反乘繩證反下及注皆同程鄭為乘馬御六騶屬焉使訓羣騶知禮注程鄭荀氏别族乘馬御乘車之僕也六騶六間之騶周禮諸侯有六間馬乘車尚禮容故訓羣騶使知禮音義騶側留反疏正義曰晉語云公知祁奚之果而不淫也使為元尉知羊舌職之聰敏肅給也使佐之知魏絳之勇而不亂也使為元司馬知張老之知而不詐也使為元候知鐸遏寇之共敬而信強也使為輿尉知籍偃之惇帥舊職而共給也使為輿司馬知程鄭為端而不淫且好諫而不隱也使為贊僕晉語皆稱其才而用之善公之知人也言元尉元司馬元候者此皆中軍之官元大也中軍尊故稱大也輿尉與司馬者皆上軍官也輿衆也官與諸軍同故稱衆也從車者為卒在車者為乘使此中軍與上軍軍尉司馬各教其軍之士卒使相親以聽在上之命注正義曰荀氏别族世本有文周禮齊僕下大夫掌馭金路以賔朝覲宗遇饗食皆乘金路杜言乘馬御乘車之僕則當彼齊僕也晉語謂之贊僕當時之官名耳周禮掌駕之官無名騶者襄二十三年傳稱豐點為孟氏之御騶則騶亦御之類月令季秋天子乃教田獵命僕夫七騶咸駕載旌旗則騶是主駕之官也鄭玄云七騶謂趣馬主為諸官駕説者也周禮趣馬下士掌駕説之頒是騶為主駕之官駕車以共御者程鄭為乘馬御御之貴者故令掌駕之官亦屬之校人職云良馬三乘為皂皂一趣馬趣馬下士三皂為繫繫一馭夫馭夫中士六繫為廏廏一僕夫僕夫上士天子十有二間邦國六間鄭玄云每廏為一間間有二百一十六匹如彼計之每廏有趣馬十八人六間之騶有一百八人皆屬程鄭而使總領之也戎車貴強力乘車尚禮容故訓羣騶使知禮令教馬進退使合禮法也校人乘馬一師四圉三乘為皂皂一趣馬三皂為繫繫一馭夫六繫為廏廏一僕夫六廏成校校有左右天子十二間馬六種邦國六間馬四種家四間馬二種鄭玄云每廏為一間二百一十六匹易乾為馬此應乾之䇿也校有左右則天子良馬五種各有四百三十二匹合二千一百六十匹駑馬三之四百三十二匹則千二百九十六匹合三千四百五十六匹詩云騋牝三千舉大數也玉路駕種馬戎路駕戎馬金路駕齊馬象路駕道馬田路駕田馬駑馬給宮中之役邦國六間四種去種戎其齊道田各用一間駑馬三之則千二百九十六匹大夫四間二種去齊道田馬一間駑馬三之則八百六十四匹四匹一師也十二匹一趣馬也三十六匹一馭夫也二百一十六匹一僕夫也凡六官之長皆民譽也注大國三卿晉時蓋六卿為軍帥故總舉六官則知羣官無非其人音義長丁丈反帥所類反下之帥為帥皆同也疏正義曰上已歷言諸官特為公所知者更復總言所任皆得其人於時晉立六卿卿名下各有統領羣官非一凡六官之在民上為長者皆是有德有能之人是民所褒譽者也使魏相以下至程鄭為乘馬御以上凡有八條之官魏相等為卿一也荀家等為公族大夫二也士渥濁為大傅三也右行辛為司空四也辨糾為御戎五也荀賔為右六也祁奚為中軍尉至籍偃為司馬七也程鄭為乘馬御八也自公族大夫以下七條各云使為某事而卿下不云使者以卿總攝羣職非偏主一事故也公族大傅司空不云某官屬焉者以其當官自主更無餘官來屬其祁奚為中軍尉及羊舌職張老魏絳鐸遏寇籍偃雖是數官總為一條使訓卒乘親以聽命此唯有中軍上軍無下軍之官者蓋時下軍無闕不别立其官故也其卿無共御立軍尉以攝之一句為下祁奚為中軍尉胤緒也大略所敘皆尊官在前卑官在後注正義曰大國三卿是正法當時晉置六卿為三軍之將佐皆是帥也於是晉又更置新軍凡有四軍八卿但新軍或置或廢故傳不數之耳六官之長非獨卿身乃謂其下凡為人之長者皆有民之美譽故總舉六官則知羣官無非其人者也舉不失職官不易方注官守其業無相踰易疏正義曰所舉用者皆堪其官不有失職者也文任文官武任武官其用為官各守其業不踰易其方也若文人為武武人為文則違方易務不能守其職矣爵不踰德注量德授爵師不陵正旅不逼師注正軍將命卿也師二千五百人之帥也旅五百人之帥也言上下有禮不相陵逼疏正義曰傳言不陵不逼者皆謂下不陵逼其上旅卑於師師卑於正知正是軍將命卿也唯舉師旅不相陵逼言上下有禮皆不相陵逼也民無謗言所以復霸也注此以上通言悼公所行未必皆在即位之年音義復扶又反下及注復霸皆同上時掌反疏正義曰霸者把也把持王政鄭玄云天子衰諸侯興故曰霸夏有昆吾商有豕韋大彭周有齊桓晉文此最強者也故書傳通謂彼五人為五霸耳但霸是強國為之天子既衰諸侯無主若有強者即營霸業其數無定限也而何休以霸不過五不許悼公為霸以鄉曲之學足以忿人傳稱文襄之霸襄承文後紹繼其業以後漸弱至悼乃強故云復霸公如晉朝嗣君也夏六月鄭伯侵宋及曹門外注曹門宋城門也遂會楚子伐宋取朝郟楚子辛鄭皇辰侵城郜取幽丘同伐彭城注朝郟城郜幽丘皆宋邑音義取朝如字郟古洽反郜古報反納宋魚石向為人鱗朱向帶魚府焉注五子以十五年出奔楚獨書魚石為師告以三百乘戍之而還書曰復入注惡其依阻大國以兵威還故書復入音義乘繩證反惡烏路反凡去其國國逆而立之曰入注謂本無位紹繼而立復其位曰復歸注亦國逆音義復歸音服一音扶又反諸侯納之曰歸注謂諸侯以言語告請而納之有位無位皆曰歸以惡曰復入注謂身為戎首稱兵入伐害國殄民者也此四條所以明外內之援辨逆順之辭通君臣取國有家之大例音義以惡本或作以惡入曰復入疏正義曰釋例曰凡去其國者通謂君臣及公子母弟也國逆而立之本無位則稱入本有位則稱復歸齊小白入于齊無位也衛侯鄭復歸于衛復其位也諸侯納之有位無位皆曰歸衛孫林父蔡季是也身為戎首則曰復入晉欒盈是也此所以明外內之援辨逆順之辭故經正魚石衛衎以表舊制傳稱凡例總而明之也衛人逆公子晉于邢宜稱入善其得衆公子友忠於社稷國人所思焉故閔公為落姑之盟以復之夫衛公子晉絶位而在邢魯之季子勢弱而出奔咸得民望享國有家是以聖人貴之殊其文也莊六年五國諸侯犯逆王命以納衛朔大其事故字王人謂之子突朔懼有逆衆之犯而以國逆告華元實國逆欲挾晉以自助故以外納赴春秋從而書之以示二子之情也韓魏有耦國之強陳蔡有復國之端故晉趙鞅楚公子比皆稱歸從諸侯納之例言非晉楚之所能制也侯獳愛君以請故曹伯有國逆之辭許始復國故許叔有國逆之文此皆時史因周典以起時事之情也傳例稱諸侯納之曰歸今檢經諸稱納者皆有興師見納之事不須例而自明故但言納而不復言歸也衛侯鄭曹伯負芻皆見執在周晉魯請而復之鄭書歸于衛負芻稱歸自京師所發事同而文異者例意本在于歸不以他文為義也賈氏又以為諸歸國稱所自之國所自之國有力也案楚公子比去晉而不返是無援於外而經書自晉陳侯吳蔡侯廬皆平王所封可謂有力而不言自楚此既明證又春秋稱入其例有二施於師旅則曰不地在於歸復則曰國逆又以立為例逆而不立則皆非例所入鄭之良霄以寇而入入即見殺而復例之例稱凡去其國明非天子之制也周敬王王子猛不書出而書入襄王書出而不書入凡自周無出故非春秋舊例也諸在例外稱入直是自外入內記事者常辭義無所取而賈氏雖夫人薑氏之入皆以為例如此甚多又依放榖梁云稱納者內難之辭因附會諸納為義至於納北燕伯于陽傳稱因其衆窮不能通乃云時陽守距難故稱納此又無證經書楚人圍陳納頓子于頓則頓國之所欲也北燕伯傳有因衆之文不可言內難也又書納公孫寧儀行父于陳陳縣而見復上下交歡二人雖有淫縱之闕今道楚匡陳賊討君葬威權方盛傳稱有禮理無有難此皆先説之不安也沈氏云國逆而立之曰入唯謂國君知不兼臣者以臣而無位本賤不書故知臣無國逆之例也其復入唯謂臣知者以君雖不君臣不可不臣君若入國臣無違拒之法且杜云身為戎首稱兵入伐是戎首指臣為文故知不得兼君也杜所以云四條通君臣取國有家之大例即是事通君臣者此據大略而言不復曲細為别也宋人患之西鉏吾曰何也注西鉏吾宋大夫音義鉏仕居反徐在居反吾音魚西鉏吾人名也若楚人與吾同惡以德於我吾固事之也不敢二矣注惡謂魚石大國無厭鄙我猶憾注言己事之則以我為鄙邑猶恨不足此吾患也音義厭於鹽反憾户暗反不然而收吾憎使贊其政注謂不同惡魚石而用之使佐政以間吾釁亦吾患也今將崇諸侯之姦而披其地注崇長也謂楚今取彭城以封魚石披猶分也音義間如字又間厠之間釁許靳反披普彼反注同長丁丈反疏正義曰不然謂不與吾同惡也而收取吾之所憎謂魚石是也使佐其楚國之政以伺間吾之釁隙而侵伐我如此則亦是吾之所患若晉用楚材皆為楚國之患焉是也以塞夷庚注夷庚吳晉往來之要道楚封魚石于彭城欲以絶吳晉之道疏正義曰夷平也詩序云由庚萬物得由其道是以庚為道也此云以塞夷庚下云而懼吳晉知謂塞吳晉往來之要道也吳晉往來路由彭城楚取彭城以封魚石欲以斷絶吳晉往來之道使其不得往來故吳晉所以懼耳若其不然何以獨云懼吳晉也夷庚止謂吳晉往來之平道耳非山川險難之名故杜土地名不得指其所在逞姦而攜服毒諸侯而懼吳晉注隔吳晉之道故懼攜離也疏正義曰逞快也封魚石為快姦人也攜離也諸侯見楚助賊服從者其心皆離是離其服從者之心吾庸多矣非吾憂也且事晉何為晉必恤之注言宋常事晉何為顧有此患難音義難乃旦反公至自晉晉范宣子來聘且拜朝也注拜謝公朝君子謂晉於是乎有禮注有卑讓之禮也秋杞桓公來朝勞公且問晉故公以晉君語之注語其德政音義勞力報反語魚據反注同杞伯於是驟朝于晉而請為昏注為平公不徹樂張本疏正義曰詩云載驟駸駸驟是疾行之名從魯即疾朝于晉也七月宋老佐華喜圍彭城老佐卒焉注言所以不克彭城八月邾宣公來朝即位而來見也音義見賢遍反築鹿囿書不時也注非土功時己丑公薨于路寢言道也注在路寢得君薨之道疏正義曰喪大記云君夫人卒於路寢是在路寢得君薨之道也冬十一月楚子重救彭城伐宋注使偏師與鄭人侵宋子重為後鎮宋華元如晉告急韓獻子為政注於是欒書卒韓厥代將中軍曰欲求得人必先勤之注勤恤其急成霸安強自宋始矣疏正義曰謂文公成霸安強自宋為始言今宋有患不可不救也晉侯師于台谷以救宋注台谷地闕音義台勑才反一音臺遇楚師于靡角之谷楚師還注畏晉強也靡角宋地晉士魴來乞師注將救宋也季文子問師數於臧武仲注武仲宣叔之子對曰伐鄭之役知伯實來下軍之佐也注知伯荀罃今彘季亦佐下軍注彘季士魴音義彘直例反如伐鄭可也注伐鄭在十七年事大國無失班爵而加敬焉禮也從之注從武仲言十二月孟獻子會于虛朾謀救宋也宋人辭諸侯而請師以圍彭城注不敢煩諸侯故但請其師為襄元年圍彭城傳孟獻子請于諸侯而先歸會葬丁未葬我君成公書順也注薨于路寢五月而葬國家安靜世適承嗣故曰書順也音義適丁歷反疏正義曰自此以前莊宣薨于路寢桓莊僖文宣皆書葬矣今於此公薨之下言道也於葬之下言書順也獨發傳者隱桓閔皆為人所殺僖公薨于小寢文公薨于臺下皆其薨不得道也莊宣雖薨于路寢莊則子般見殺宣則歸父出奔家國不安非是得道順禮唯成公耳故傳於此發之釋例曰魯君薨葬多不順制唯成公薨于路寢五月而葬國家安靜世適承嗣故傳見莊之緩舉成書順以包之是也春秋左傳注疏卷二十八春秋左氏傳注疏卷二十八考證雨木冰注記寒過節臣召南按漢書五行志曰劉歆以為上陽施不下通下隂施不上逹故雨而木為之冰氛氣寒木不曲直也傳鄭子罕伐宋注滕宋之與國鄭因滕有喪而伐宋故傳舉滕侯卒趙汸補注曰傳欲見滕子諡下偶連鄭伐宋事杜注云云贅甚矣按滕子卒及鄭侵宋經各為一事杜注牽合非也傳韓厥將下軍郤至佐新軍荀罃居守注於是郤犨代趙旃將新軍新上下軍罷矣臣浩按三軍及新軍將佐八人是為八卿臣召南按十三年晉及秦戰於麻隊將佐八人欒書荀庚士燮郤錡韓厥荀罃為三軍將佐趙旃將新軍郤至佐之似新上下二軍已罷不始于是年鄢陵之戰也傳邲之師荀伯不復從顧炎武日知録曰杜注林父奔走不復故道非也謂不復從事于楚傳塞井夷竈陳於軍中而疏行首林堯叟曰軍屯必鑿井結竈以自給今為楚壓晉軍戰也迫狹故自塞其井自平其竈以為戰也楚壓晉軍不可出陳故結陳於晉之軍中傳楚之良在其中軍王族而已臣召南按前後文皆作王卒疑此文亦當作王卒但襄二十六年傳聲子述苗賁皇之言亦作王族尋文考義王卒則應比他卒良不應王族並能良也且古本若係王族杜必有注今無之恐本是王卒後人因一處誤作王族遂兩處均改而從訛也傳寡君乏使使針御持矛注御侍也林堯叟曰車右主擊刺持矛其職也故云使針侍君而持矛傳王聞之召子反謀疏子反之為人也嗜酒句甘而不能絶於口句醉句戰既罷句臣浩按呂覽作不能絶於口以醉似較明晰傳吾因奉孫周以事君趙汸浦注曰晉自驪姬之譖不畜羣公子故周在周事單襄公傳晉欒書中行偃使程滑弒厲公萬斯大學春秋隨筆曰欒書中行偃弒君而書國弒者書偃既弒其君復威制國人使不敢以名告也赴不以名春秋安得而書之傳逐不臣者七人注夷羊五之屬也臣召南按此時不臣孰有過於欒書中行偃者乎悼公不此之戮而逐夷羊五等所謂行事適機宜耳又按程滑當必在七人之數傳右行辛為司空注辛將右行因以為氏臣召南按注文似有殘缺當云辛之先將右行因以為氏春秋左氏傳注疏卷二十八考證
