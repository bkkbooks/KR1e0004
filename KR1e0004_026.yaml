body:
  text: 春秋左傳注疏卷二十六起成公三年盡十年晉杜氏注唐陸德明音義孔穎達疏經三年春王正月公會晉侯宋公衛侯曹伯伐鄭注宋衛未葬而稱爵以接鄰國非禮也疏正義曰僖九年傳曰宋桓公卒未葬而襄公會諸侯故曰子凡在喪公侯曰子傳因未葬而發在喪之例是先君未葬嗣君不得稱爵以㑹諸侯也知非踰年得成君者文八年八月天王崩九年春毛伯來求金傳曰不書王命未葬也彼王既踰年矣猶不得稱王命臣知諸侯雖則踰年但是未葬不得稱爵以接鄰國正以王不命臣明知其非禮也辛亥葬衛穆公注無傳二月公至自伐鄭注無傳甲子新宫災三日哭注無傳三年喪畢宣公神主新入廟故謂之新宫書三日哭善得禮宗廟親之神靈所馮居而遇災故哀而哭之音義馮皮氷反疏正義曰公羊傳曰新宫者何宣公之宫也宣宫則曷為謂之新宫不忍言也其言三日哭何廟災三日哭禮也穀梁傳曰新宫者禰宫也三日哭哀也其哀禮也迫近不敢稱諡恭也二傳皆以新宫為宣宫三日哭為得禮故杜依用之宣公以其十八年冬十月薨至二年十月而大祥祥而禘祭神主始入廟故謂之新宫禮檀弓記曰有焚其先人之室則三日哭故曰新宫火亦三日哭鄭𤣥曰謂人燒其宗廟新宫火人火也記稱新宫火者指此新宫災耳傳例曰天火曰災人火曰火三家經傳有火字皆為災鄭𤣥以為人火雖非其義要天火人火其哭皆當三日是其善得禮也哀三年桓宫僖宫災不言哭而此言三日哭者釋例曰新宫者宣公之廟父廟也諒暗始闋而遇天災故感而哭之以致哀異於餘廟也乙亥葬宋文公注無傳七月而葬緩夏公如晉鄭公子去疾帥師伐許公至自晉注無傳秋叔孫僑如帥師圍棘注棘汶陽田之邑在濟北蛇丘縣音義蛇以支反一音如字大雩注無傳以過時書晉郤克衛孫良夫伐牆咎如注赤狄别種音義牆在良反咎古刀反種章勇反冬十有一月晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟疏正義曰隱元年及宋人盟于宿魯之微者及之也此言及荀庚盟及孫良夫盟十一年及郤犫盟皆是公自及之非臣及之也知者僖二十八年傳晉欒枝入盟鄭伯襄十一年傳晉趙武入盟鄭伯鄭子展出盟晉侯臣對君者皆君自與盟知此使來亦公自與盟也上言來聘盟又不地盟於國都公親可知故不言公丁未及孫良夫盟注先晉後衛尊霸主鄭伐許注無傳不書將帥告辭略音義將子匠反帥所類反疏正義曰直舉國名傳無其說知是告辭略故史異文耳賈逵云鄭小國與大國爭諸侯仍伐許不稱將帥夷狄之刺無知也此年夏鄭公子去疾帥師伐許明年冬鄭伯伐許先後並無貶責何獨此伐偏刺之傳三年春諸侯伐鄭次于伯牛討邲之役也注伯牛鄭地邲役在宣十二年遂東侵鄭注晉潛軍深入鄭公子偃帥師禦之注偃穆公子使東鄙覆諸鄤注覆伏兵也音義覆扶又反注同鄤亡袁反又莫干反徐武旦反一音萬敗諸丘輿注鄤丘與皆鄭地晉偏軍為鄭所敗故不書皇戌如楚獻捷夏公如晉拜汶陽之田注前年晉使齊歸魯汶陽田故許恃楚而不事鄭鄭子良伐許晉人歸楚公子穀臣與連尹襄老之尸于楚以求知罃注邲之戰楚獲知罃於是荀首佐中軍矣注荀首知罃父故楚人許之王送知罃曰子其怨我乎對曰二國治戎臣不才不勝其任以為俘馘執事不以釁鼓注以血塗鼓為釁鼓音義勝音升下注同俘芳夫反馘古獲反釁許覲反疏正義曰說文釁血祭也禮雜記釁廟之禮云雍人舉羊升屋自中上屋南靣刲羊血流于前及降釁廟以血塗廟知釁鼓以血塗鼓也使歸即戮君之惠也臣實不才又誰敢怨王曰然則德我乎疏正義曰德加於彼彼荷其恩故謂荷恩為德論語以德報德傳稱王德狄人皆是也對曰二國圖其社稷而求紓其民注紓緩也音義紓音舒各懲其忿以相宥也注宥赦也音義懲直升反宥音又兩釋纍囚以成其好注纍繫也音義纍力誰反好呼報反下同二國有好臣不與及其誰敢德注言二國本不為已音義與音預為于僞反王曰子歸何以報我對曰臣不任受怨君亦不任受德無怨無德不知所報王曰雖然必告不穀對曰以君之靈纍臣得歸骨於晉寡君之以為戮死且不朽注戮其不勝任音義任音壬下亦不任同疏正義曰懷荷君恩身雖死而朽腐此恩不朽腐也死尚不朽以示其至死不忘也若從君之惠而免之以賜君之外臣首注稱於異國君曰外臣首其請於寡君而以戮於宗亦死且不朽若不獲命注君不許戮而使嗣宗職注嗣其祖宗之位職次及於事而帥偏師以修封疆雖遇執事注遇楚將帥音義疆居良反將子亮反帥所類反其弗敢違注違辟也其竭力致死無有二心以盡臣禮所以報也王曰晉未可與爭重為之禮而歸之秋叔孫僑如圍棘取汶陽之田棘不服故圍之注僑如叔孫得臣子晉郤克衛孫良夫伐牆咎如討赤狄之餘焉注宣十五年晉滅赤狄潞氏其餘民散入牆咎如故討之疏正義曰謂赤狄餘民散入咎如之內今伐咎如者來就咎如之內討彼赤狄餘黨然牆咎如容赤狄餘民則咎如亦赤狄矣劉炫以為牆咎如之國即是赤狄之餘今知不然者以赤狄之國種類極多潞氏甲氏鐸辰臯落氏等皆是其類並為建國假令潞氏甲氏鐸辰臯落雖滅自外猶存則是不滅者多止應言討赤狄之類不得稱餘且伐者聲其鐘鼓討者責其罪狀以牆咎如容受赤狄餘黨故伐而討責若以牆咎如即是赤狄之餘應取土地興兵絶滅何當唯伐討而已劉以牆咎如即是赤狄之餘而規杜非也牆咎如潰上失民也注此傳釋經之文而經無牆咎如潰蓋經闕此四字音義潰户內反疏正義曰傳言上失民也釋經潰文若經無潰文則傳無此解故疑經闕此四字釋例曰傳文牆咎如潰上失民也今經但言伐牆咎如無牆咎如潰之文若經本無此文則丘明為橫益經文而加失民之傳也是言知經闕之意也三年潰逃已有例矣復發傳者嫌夷狄異於中國故重發也冬十一月晉侯使荀庚來聘且尋盟注尋元年赤棘盟荀庚林父之子衛侯使孫良夫來聘且尋盟注尋宣七年盟公問諸臧宣叔曰中行伯之於晉也其位在三注下卿疏正義曰於時郤克將中軍荀首佐之荀庚將上軍是其位在三也注云下卿者傳稱小國之上卿當大國之下卿又言衛在晉不得為次國則以衛為小國荀庚若是中卿自然當先晉矣乃云晉為盟主其將先之直以盟主先晉明是二人位等以此知荀庚是下卿也晉立三軍將佐有六第三猶為下卿則其餘皆下卿也蓋以諸侯之禮唯合三卿三是其正故定以三人為上中下餘皆從下卿也卿有上下往年賜晉三帥皆以三命之服者侯伯之卿禮皆三命上卿下卿命不異也孫子之於衛也位為上卿將誰先對曰次國之上卿當大國之中中當其下下當其上大夫注降一等小國之上卿當大國之下卿中當其上大夫下當其下大夫注降大國二等上下如是古之制也注古制公為大國侯伯為次國子男為小國衛在晉不得為次國注春秋時以强弱為大小故衛雖侯爵猶為小國疏正義曰古制公為大國侯伯為次國子男為小國以土地之大小命數為等差也春秋之世彊陵弱大吞小爵雖不能自改地則以力升降諸侯聚㑹彊者為雄史書時事大小為序此事不可改易仲尼即而用之宋公在齊侯之下許男在曹伯之上不復計爵之尊卑故衛雖侯爵猶為小國以地狹小故也襄二十五年傳子産語晉曰今大國多數圻矣圻方千里是晉有方千里者三四也昭五年十三年傳皆言晉有革車四千乘計衛比於晉不過當五六分之一耳故不得為次國其為次國者當齊秦乎晉為盟主其將先之注計等則二人位敵以盟主故先晉丙午盟晉丁未盟衛禮也十二月甲戌晉作六軍注為六軍僭王也萬二千五百人為軍音義僭子念反韓厥趙括鞏朔韓穿荀騅趙旃皆為卿賞鞍之功也注韓厥為新中軍趙括佐之鞏朔為新上軍韓穿佐之荀騅為新下軍趙旃佐之晉舊自有三軍今增此故為六軍音義騅音佳疏正義曰杜知韓厥為新中軍及上下新軍將佐者以下六年傳云韓厥將新中軍且為僕大夫時晉更增置新中上下三軍韓厥將新中軍名居其首故杜依名配其將佐齊侯朝于晉將授玉注行朝禮疏正義曰玉謂所執之圭也凡諸侯相朝升堂授玉於兩楹之間於此時郤克趨進故記之也史記齊世家曰頃公十一年晉初置六軍頃公朝晉欲尊王晉景公景公不敢當晉世家云景公十二年齊頃公如晉欲上尊景公為王景公讓不敢然此時天子雖弱諸侯並盛晉文不敢請隧楚莊不敢問鼎又齊弱於晉所較不多豈為一戰而勝便即以王相許準時度勢理必不然竊原馬遷之意所以有此說者當讀此傳將授玉以為將授王遂飾成為此謬辭耳郤克趨進曰此行也君為婦人之笑辱也寡君未之敢任注言齊侯之來以謝婦人之笑非為修好故云晉君不任當此惠音義君為于僞反下為兩君同任音壬晉侯享齊侯齊侯視韓厥韓厥曰君知厥也乎齊侯曰服改矣注戎朝異服也言服改明識其人疏正義曰周禮司服凡兵事韋辨服禮玉藻記云諸侯皮辨以聽朔朝服以日視朝聘禮賔皮辨聘公皮辨迎賔迎聘賔尚以皮辨迎朝賔必皮辨矣在朝君臣同服公當皮辨則韓厥於時亦皮辨也鄭𤣥云韋辨以韎韋為辨又以為衣裳春秋傳曰晉郤至衣韎韋之跗注是也皮辨之服十五升白布衣素積以為裳是戎朝異服也韓厥登舉爵曰臣之不敢愛死為兩君之在此堂也荀罃之在楚也鄭賈人有將置諸褚中以出既謀之未行而楚人歸之賈人如晉荀罃善視之如實出已賈人曰吾無其功敢有其實乎吾小人不可以厚誣君子遂適齊注傳言知罃之賢音義賈音古下同置之䜴反褚中呂反經四年春宋公使華元來聘三月壬申鄭伯堅卒注無傳二年大夫盟于蜀壬申二月二十八日杞伯來朝夏四月甲寅臧孫許卒注無傳公如晉葬鄭襄公注無傳秋公至自晉冬城鄆注無傳公欲叛晉故城而為備音義鄆音運疏正義曰釋例土地名魯有二鄆文十二年城諸及鄆杜云此東鄆莒魯所爭者城陽姑幕縣南有員亭或曰鄆即員也成十六年傳晉人執季文子公待于鄆杜云此西鄆昭公所出居者東郡廩丘縣東有鄆城然則此為公欲叛晉故城鄆以為備當西鄆也鄭伯伐許傳四年春宋華元來聘通嗣君也注宋共公即位音義共音恭疏正義曰文元年公孫敖如齊傳曰始聘為禮也凡君即位卿出並聘踐修舊好要結外援好事鄰國以衛社稷忠信卑讓之道也其事與此一也謂君初即位聘鄰國耳在魯而出謂之始聘自外而來謂之通嗣君言彼君嗣位以來未與魯通於此始通之也杞伯來朝歸叔姬故也注將出叔姬先修禮朝魯言其故夏公如晉晉侯見公不敬季文子曰晉侯必不免注言將不能壽終也後十年陷厠而死詩曰敬之敬之天惟顯思命不易哉注詩頌言天道顯明受其命甚難不可不敬以奉之音義易以䜴反夫晉侯之命在諸侯矣可不敬乎注敬諸侯則得天命秋公至自晉欲求成于楚而叛晉季文子曰不可晉雖無道未可叛也國大臣睦而邇於我注邇近也諸侯聽焉未可以二注聽服也史佚之志有之曰注周文王太史音義太音泰非我族類其心必異楚雖大非吾族也注與魯異姓其肯字我乎公乃止注字愛也冬十一月鄭公孫申帥師疆許田注前年鄭伐許侵其田今正其界音義疆居良反許人敗諸展陂鄭伯伐許取鉏任泠敦之田注展陂亦許地音義陂彼皮反鉏仕居反任音壬泠力丁反晉欒書將中軍注代郤克音義將子匠反荀首佐之士燮佐上軍以救許伐鄭取泛祭注泛祭鄭地成臯縣東有泛水音義泛音凡注同或音祀祭側界反疏正義曰杜注滎陽中牟縣有東汜襄城縣有西汜知此泛祭非彼二汜而以成臯縣東有汜水者以傳為晉伐鄭取泛祭既為晉人所取當是鄭之西北界即今之汜水也字書水旁已為泛水旁已為汜字相亂也漢書音義亦為汜今汜水上源為泛谷楚子反救鄭鄭伯與許男訟焉注於子反前爭曲直皇戌攝鄭伯之辭注代之對子反不能決也曰君若辱在寡君寡君與其二三臣共聽兩君之所欲成其可知也注欲使自屈于楚子前決之不然側不足以知二國之成注側子反名為明年許訴鄭於楚張本音義訴音素晉趙嬰通于趙莊姬注趙嬰趙盾弟莊姬趙朔妻朔盾之子經五年春王正月杞叔姬來歸注出也傳在前年疏正義曰杞既出之猶稱杞者雜記曰諸侯出夫人夫人比至于國以夫人之禮行至以夫人入鄭𤣥云行道以夫人之禮者棄妻致命其家乃義絶不用此為始仲孫蔑如宋夏叔孫僑如會晉荀首于穀注穀齊地梁山崩注記異也梁山在馮翊夏陽縣北疏正義曰公羊傳曰梁山崩何以書記異也公羊以為非常為異害物為災此山崩無所害故為異也秋大水注無傳冬十有一月己酉天王崩十有二月己丑公會晉侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢注蟲牢鄭地陳留封丘縣北有桐牢傳五年春原屏放諸齊注放趙嬰也原同屏季嬰之兄音義屏步丁反嬰曰我在故欒氏不作我亡吾二昆其憂哉且人各有能有不能注言已雖淫而能令莊姬護趙氏音義令力丁反舍我何害弗聽嬰夢天使謂已祭余余福女使問諸士貞伯貞伯曰不識也既而告其人曰注自告貞伯從人音義舍音捨又音赦聽吐丁反女音汝從才用反疏正義曰嫌告趙嬰使人故云自告貞伯從人也若告趙嬰使人不得云神福仁而禍淫神福仁而禍淫淫而無罰福也祭其得亡乎注以得放遣為福祭之之明日而亡注為八年晉殺趙同趙括傳孟獻子如宋報華元也注前年宋華元來聘夏晉荀首如齊逆女故宣伯餫諸穀注野饋曰餫運糧饋之敬大國也音義餫音鄆饋其餽反疏正義曰釋詁云饁饋也孫炎曰饁野之饋也彼言野饋饋田農在野之人此言野饋饋在野行路之人俱是在野言之謂之饋者言其運糧饋之彼晉逆女而往饋之者敬大國也梁山崩晉侯以傳召伯宗注傳驛音義傳中戀反注及下同驛音亦伯宗辟重曰辟傳注重載之車音義辟重匹亦反徐甫赤反本又作僻曰辟音避重人曰待我不如捷之速也注捷邪出音義捷在妾反邪似嗟反疏正義曰捷亦速也方行則遲邪出則速楚辭謂邪行小道為捷徑是捷為邪出問其所曰絳人也問絳事焉曰梁山崩將召伯宗謀之問將若之何曰山有朽壤而崩可若何國主山川注主謂所主祭音義絳古巷反壤如丈反故山崩川竭君為之不舉注去盛饌音義為于僞反去起呂反饌仕戀反降服注損盛服乘縵注車無文音義縵武旦反又莫半反疏正義曰周禮巾車掌王之五路皆不言車有文飾其下服車五乘孤乘夏篆卿乘夏縵大夫乘墨車鄭𤣥云夏篆五采畫轂約也夏縵亦五采畫無瑑耳墨車不畫也孤之車尚有瑑約明諸侯之車必有瑑約詩所謂約軧錯衡是其事也乘縵車無文蓋乘大夫墨車也覲禮侯氏乘墨車乃朝鄭𤣥云墨車大夫制也乘之者入天子之國車服不可盡同也彼為適王尚乘墨車明此山崩降服亦乘墨車也徹樂注息八音出次注舍於郊疏正義曰僖三十三年傳秦伯以師敗于殽素服郊泱此言出次降服明亦次于郊也文四年傳楚人滅江秦伯為之降服出次注云辟正寢與此文互相見也祝幣注陳玉帛史辭注自罪責以禮焉注禮山川其如此而已雖伯宗若之何伯宗請見之注見之於晉君音義見賢遍反注皆同不可注不肯見遂以告而從之注從重人言許靈公訴鄭伯于楚注前兩年鄭伐許故六月鄭悼公如楚訟不勝楚人執皇戌及子國注以鄭伯不直故也子國鄭穆公子故鄭伯歸使公子偃請成于晉秋八月鄭伯及晉趙同盟于垂棘注垂棘晉地宋公子圍龜為質于楚而歸注圍龜文公子音義質音致下注同華元享之請鼓譟以出鼓譟以復入注出入輒擊鼓音義譟素報反復扶又反下同曰習攻華氏宋公殺之注蓋宣十五年宋楚平後華元使圍龜代已為質故怨而欲攻華氏冬同盟于蟲牢鄭服也諸侯謀復會宋公使向為人辭以子靈之難注子靈圍龜也宋公不欲會以新誅子靈為辭為明年侵宋傳音義向舒亮反難乃旦反一本無之難二字子靈為辭一本無為辭二字十一月己酉定王崩注經在蟲牢盟上傳在下月倒錯衆家傳悉無此八字或衍文音義倒丁老反疏正義曰傳不虛舉經文此無所明又上下倒錯諸家之傳又悉無此言必是衍文此杜以疑事母質不敢輒去之耳經六年春王正月公至自會注無傳二月辛巳立武宮注魯人自鞍之功至今無患故築武軍又作先君武公宮以告成事欲以示後世疏正義曰杜以傳稱季文子以鞍之功立武宮故云魯人自鞍之功至今無患追思鞍戰以為已功故築武軍又作先君武公之廟以告戰勝之事欲以章示後世明己之功也其意言築為武軍又作武公之廟公羊傳曰武宮者何武公之宮也是立宮為武公廟也武公是成公九世之祖其廟毁已久矣今復立之以為不毁之廟禮明堂位曰魯公之廟文世室也武公之廟武世室也世室言其世世不毁劉炫以為直立武公之宮不築武軍今知不然者以下傳云聽於人以救其難不可以立武立武由已非由人也是丘明譏魯立武以章武功明非徒築宮而已又宣十二年潘黨請築武軍楚子云武有七德我無一焉武非吾功遂不敢築武軍以明武功此則丘明譏魯章武功明亦築武軍也若其唯築武宮傳應云不可以立武宮不得單稱武也劉以為唯築武公之宮而規杜非也取鄟注附庸國也音義鄟徐音專又市欒反衛孫良夫帥師侵宋夏六月邾子來朝注無傳公孫嬰齊如晉注嬰齊叔肸子壬申鄭伯費卒注前年同盟蟲牢音義費音祕秋仲孫蔑叔孫僑如帥師侵宋楚公子嬰齊帥師伐鄭冬季孫行父如晉晉欒書帥師救鄭傳六年春鄭伯如晉拜成注謝前年再盟子游相注子游公子偃音義相息亮反下寧相同授玉于東楹之東注禮授玉兩楹之間鄭伯行疾故東過疏正義曰聘禮云公受玉于中堂與東楹之間鄭𤣥云中堂南北之中也入堂之深尊賔事也東楹之間亦以君行一臣行二也聘禮大夫奉命來聘君臣不敵故授玉于東楹之間國君來朝尊卑禮敵傳言東楹之東以譏鄭伯行速明禮當授玉于兩楹之間士貞伯曰鄭伯其死乎自棄也已視流而行速不安其位宜不能久注視流不端諦音義諦音帝二月季文子以鞍之功立武宮非禮也注宣十二年潘黨勸楚子立武軍楚子答以武有七德非已所堪其為先君宮告成事而已今魯倚晉之功又非霸王而立武宮故譏之音義倚於綺反疏正義曰服䖍云鞍之戰禱武公以求勝故立其宮案定元年傳昭公出故季平子禱于煬公立煬宮此若為禱而立何以不言禱也無驗之說故不可從聽於人以救其難不可以立武立武由已非由人也注言請人救難勝非己功音義難乃旦反注同取鄟言易也音義易以䜴反三月晉伯宗夏陽說衛孫良夫寧相鄭人伊雒之戎陸渾蠻氏侵宋注夏陽說晉大夫蠻氏戎别種也河南新城縣東南有蠻城經唯書衛孫良夫獨衛告也音義夏戶雅反說音悅下文注同渾戶門反種章勇反以其辭會也注辭會在前年師于針衛人不保注不守備音義針其廉反一音針說欲襲衛曰雖不可入多俘而歸有罪不及死伯宗曰不可衛唯信晉故師在其郊而不設備若襲之是棄信也雖多衛俘而晉無信何以求諸侯乃止師還衛人登陴注聞說謀故音義陴毗支反晉人謀去故絳注晉復命新田為絳故謂此故絳音義復扶又反諸大夫皆曰必居郇瑕氏之地注郇瑕古國名河東解縣西北有郇城音義郇音荀解音蟹沃饒而近盬國利君樂不可失也注盬鹽也猗氏縣鹽池是音義近附近之近下及注近寶皆同盬音古猗於宜反疏正義曰說文云盬河東鹽池袤五十一里廣七里周總百一十六里字從鹽省古聲然則盬是鹽之名盬雖是鹽唯此池之鹽獨名為盬餘鹽不名盬也注正義曰土田良沃五穀饒多民豐則國利財多則君樂其處不可失也韓獻子將新中軍且為僕大夫注兼大僕音義樂音洛下謂樂同將子匠反下注軍將同大僕音泰公揖而入獻子從公立於寢庭注路寢之庭疏正義曰禮玉藻云君日而視朝退適路寢聽政知寢庭是路寢之庭也沈氏云大僕職云王視燕朝則正位掌擯相鄭注云燕朝朝於路寢之庭韓獻子既為僕大夫故知寢庭路寢之庭也其路門之外朝則司士掌焉故司士掌治朝之儀治朝則路門之外每日治朝事之朝也其庫門之外朝則朝士掌焉故朝士云掌外朝之法此是詢衆庶問罪人之處也凡人君內朝二外朝一內朝二者路門內外之朝也外朝一者庫門外之朝也若諸侯三門臯應路外朝則在應門外魯之三門庫雉路則外朝在雉門外謂獻子曰何如注問諸大夫言是非對曰不可郇瑕氏土薄水淺注土薄地下其惡易覯注惡疾疢覯成也音義易以豉反下注同覯古豆反疢勑覲反本或作疹同疏正義曰下云土厚水深居之不疾此云土薄水淺必居之多疾以此知惡是疾疢也爾雅訓覯為見杜以惡為疾疢疾疢非難見之物唯苦其病成耳故訓覯為成言其病易成由水土惡故也易覯則民愁民愁則墊隘注墊隘羸困也音義墊丁念反隘於賣反羸劣僞反疏正義曰疾疢易成則下民愁苦民既愁苦則必羸困羸困而謂之墊隘者方言云墊下也地之下濕狹隘猶人之羸瘦困苦故杜以墊隘為羸困也於是乎有沉溺重膇之疾注沉溺濕疾重膇足腫音義溺乃歷反膇治僞反一音直愧反足腫章勇反一音常勇反不如新田注今平陽絳邑縣是土厚水深居之不疾注髙燥故有汾澮以流其惡注汾水出大原經絳北西南入河澮水出平陽絳縣南西入汾惡垢穢音義汾扶云反澮古外反垢古口反且民從教注無災患十世之利也疏正義曰民有災患則不暇從上無災患則從教化十者數之小成故云十世之利也夫山澤林盬國之寶也國饒則民驕佚注財易致則民驕侈音義佚音逸疏正義曰魯語敬姜云昔者聖王之處民也擇瘠土而居之勞其民而用之故長王天下夫民勞則思思則善心生逸則淫淫則忘善忘善則惡心生沃土之民不材逸也瘠土之民莫不向義勞也敬姜此語自是激發之辭未必聖王盡然要亦有此理也太史公書稱武王克殷患殷民富侈太史公曰奢昏厚葬以破其産為其富而驕佚故設法以貧之也管子曰倉廩實而知禮節衣食足而知榮辱讓生於有餘爭生於不足論語稱孔子適衛欲先富而後教為其貧而無恥欲營生以富之也此皆觀民設教故其理不同若遷都近盬則民皆商販則富者彌富驕侈而難治貧者益貧饑寒而犯法且貧者資富而致貧富者削貧而為富惡民之富乃是愍民之貧欲使貧富均而勞佚等也近寶公室乃貧不可謂樂注近寶則民不務本疏正義曰農業人之本也商販事之末也若民居近寶則棄本逐末廢農為商則貧富兼并若貧富兼并則貧多富少貧者無財以共官富者不可以倍稅賦稅少則公室貧也公說從之夏四月丁丑晉遷于新田注為季孫如晉傳音義說音悅六月鄭悼公卒注終士貞伯之言子叔聲伯如晉命伐宋注晉人命聲伯秋孟獻子叔孫宣伯侵宋晉命也楚子重伐鄭鄭從晉故也注前年與晉盟冬季文子如晉賀遷也晉欒書救鄭與楚師遇於繞角注繞角鄭地楚師還晉師遂侵蔡楚公子申公子成以申息之師救蔡注申息楚二縣音義成音城禦諸桑隧注汝南朗陵縣東有桑里在上蔡西南音義禦魚呂反隧音遂趙同趙括欲戰請於武子武子將許之注武子欒書知莊子注荀首中軍佐范文子注士燮上軍佐韓獻子注韓厥新中軍將諫曰不可吾來救鄭楚師去我吾遂至於此注此蔡地是遷戮也戮而不已又怒楚師戰必不克注遷戮不義怒敵難當故不克雖克不令成師以出而敗楚之二縣何榮之有焉注六軍悉出故曰成師以大勝小不足為榮若不能敗為辱已甚不如還也乃遂還於是軍帥之欲戰者衆或謂欒武子曰聖人與衆同欲是以濟事子盍從衆注盍何不也音義帥所類反下注同盍戶臘反子為大政注中軍元帥將酌於民者也注酌取民心以為政子之佐十一人注六軍之卿佐疏正義曰服䖍云是時欒書將中軍荀首佐之荀庚將上軍士燮佐之郤錡將下軍趙同佐之韓厥將新中軍趙括佐之鞏朔將新上軍韓穿佐之荀騅將新下軍趙旃佐之其不欲戰者三人而已注知范韓也欲戰者可謂衆矣商書曰三人占從二人衆故也注商書洪範疏正義曰武王克殷始作洪範今見在周書傳謂之商書者以箕子商人所陳故也武子曰善鈞從衆注鈞等也夫善衆之主也三卿為主可謂衆矣注三卿皆晉之賢人從之不亦可乎注傳善欒書得從衆之義且為八年晉侵蔡傳經七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛注無傳稱牛未卜日免放也免牛可也不郊非禮也音義鼷音兮疏正義曰釋獸鼷鼠李巡曰鼱鼩鼠一名鼷鼠孫炎曰有螫毒者蓋如今鼠狼改卜牛下重言鼷鼠又食其角不重言牛者何休云言角牛可知後食牛者未必故鼠故重言鼠改卜被食角者言乃免牛則前食角者亦免之矣從下免省文也注正義曰僖三十一年傳曰牛卜日曰牲今稱牛是未卜日也免放也放不殺遂不郊也吳伐郯音義郯音談夏五月曹伯來朝不郊猶三望注無傳書不郊問有事三望非禮秋楚公子嬰齊帥師伐鄭公會晉侯齊侯宋公衛侯曹伯莒子邾子杞伯救鄭八月戊辰同盟于馬陵注馬陵衛地陽平元城縣東南有地名馬陵公至自會注無傳吳入州來注州來楚邑淮南下蔡縣是也冬大雩注無傳書過衛孫林父出奔晉傳七年春吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤注振整也旅衆也無弔者也夫注言中國不能相愍恤故夷狄內侵音義夫音扶詩曰不弔昊天亂靡有定其此之謂乎注詩小雅刺在上者不能弔愍下民故號天告亂音義昊户老反號戶刀反疏正義曰此詩小雅節南山之篇有上不弔其誰不受亂注上謂霸主吾亡無日矣君子曰知懼如是斯不亡矣鄭子良相成公以如晉見且拜師注謝前年晉救鄭之師為楚伐鄭張本音義相息亮反見賢遍反夏曹宣公來朝疏正義曰此文及八年傳召桓公來錫公命並無所解釋而虛載經文者釋例曰其經傳事同而文異者或告命之辭有差異或氏族名號當須互見此蓋須互見名號故舉之也秋楚子重伐鄭師于泛注泛鄭地在襄城縣南音義泛音凡諸侯救鄭鄭共仲侯羽軍楚師注二子鄭大夫音義共音恭囚鄖公鍾儀獻諸晉八月同盟于馬陵尋蟲牢之盟且莒服故也注蟲牢盟在五年莒本屬齊齊服故莒從之音義鄖本又作員音云邑名晉人以鍾儀歸囚諸軍府注軍藏府也為九年晉侯見鍾儀張本音義藏才浪反楚圍宋之役注在宣十四年師還子重請取於申呂以為賞田王許之注分申呂之田以自賞申公巫臣曰不可此申呂所以邑也是以為賦以御北方若取之是無申呂也注言申呂賴此田成邑耳不得此田則無以出兵賦而二邑壞也音義所以邑也一本作所邑也御魚呂反晉鄭必至于漢王乃止子重是以怨巫臣子反欲取夏姬巫臣止之遂取以行子反亦怨之及共王即位注楚共王以魯成公元年即位音義共音恭子重子反殺巫臣之族子閻子蕩及清尹弗忌注皆巫臣之族音義閻音鹽及襄老之子黑要注以夏姬故并怨黑要音義要一遙反而分其室子重取子閻之室使沈尹與王子罷分子蕩之室子反取黑要與清尹之室巫臣自晉遺二子書曰注子重子反音義罷音皮下同遺唯季反爾以讒慝貪婪事君而多殺不辜余必使爾罷於奔命以死巫臣請使於吳晉侯許之吳子壽夢說之乃通吳于晉注壽夢季札父音義慝他得反婪力含反使所吏反夢莫公反說音悅札側八反以兩之一卒適吳舍偏兩之一焉注司馬法百人為卒二十五人為兩車九乘為小偏十五乘為大偏蓋留九乘車及一兩二十五人令吳習之音義卒子忽反注同舍音赦舊音捨乘繩證反下注同令力呈反疏正義曰以兩之一謂將二十五人也又言卒謂更將百人也言之者婉句耳凡將一百二十五人適吳也舍偏謂舍一偏之車九乘也兩之一焉又舍二十五人也凡舍九乘車二十五人與吳矣發首言兩之一者為舍此兩之一故先言之又言卒者見巫臣所將非唯有一兩也司馬法車九乘為小偏十五乘為大偏傳言偏不言大當是留九乘車矣唯言留一偏不見元將車數不知去時幾乘車去也丘明為傳辭皆易解此獨蹇澀或誤本文蘇氏云舍九乘車以六乘車還則以去時十五乘車傳不言者以舍既稱偏明去時有車可知從省文也沈氏云聘使未有將兵車者今此特將兵車為方欲教吳戰陳故與常不同與其射御教吳乘車教之戰陳教之叛楚注前是吳常屬楚音義戰陳直覲反置其子狐庸焉使為行人於吳吳始伐楚伐巢伐徐注巢徐楚屬國音義置之豉反子重奔命注救徐巢馬陵之會吳入州來子重自鄭奔命注因伐鄭而行子重子反於是乎一歲七奔命蠻夷屬於楚者吳盡取之是以始大通吳於上國注上國諸夏音義夏户雅反衛定公惡孫林父冬孫林父出奔晉注林父孫良夫之子音義惡烏路反衛侯如晉晉反戚焉注戚林父邑林父出奔戚隨屬晉音義戚七狄反疏正義曰傳言晉反戚焉則戚已屬晉襄二十六年衛孫林父入于戚以叛此不言叛故解之戚是孫氏世所食邑林父出奔之後戚自從隨之而屬晉非林父入而將去故不言叛也經八年春晉侯使韓穿來言汶陽之田歸之于齊注齊服事晉故晉來語魯使還二年所取田音義語魚據反晉欒書帥師侵蔡公孫嬰齊如莒宋公使華元來聘夏宋公使公孫壽來納幣注昏聘不使卿今華元將命故特書之宋公無主昏者自命之故稱使也公孫壽蕩意諸之父疏正義曰傳於華元來聘之下云聘共姬也則華元新始告魯欲圖為昏昏禮發首云昏禮下達乃言納采鄭𤣥云達通也將欲與彼合昏姻必先使媒氏通其言女氏許之乃後使人納其采擇之禮此華元來聘則彼昏禮所謂下達者也士禮使媒諸侯不可求媒於其國自使臣行則亦媒之義昏有六禮下達之後初有納采擇之禮既行納采其日即行問名問女之名將歸卜其吉凶也歸既卜得吉又使使者往告謂之納吉納吉則昏禮定矣復遣納徴徴成也納幣以成昏禮士禮納徴有𤣥纁束帛儷皮其諸侯謂之納幣以其幣多故指幣言之納幣以後又有請期親迎是之謂六禮也計華元來聘之後當有納采納吉二使二吏之後乃次納幣今唯書納幣者納采納吉其使非卿故不書也釋例曰諸侯昏禮云以士昏禮凖之不得唯止於納幣逆女納幣逆女二事皆必使卿行卿行則書之他禮非卿則不書也宋公使華元來聘聘不應使卿故傳但言聘共姬也使公孫壽來納幣納幣應使卿故傳明言得禮也魯君之昏唯存納幣逆女此其義也是言聘女不應使卿今華元以卿將命故特書之也隱二年公羊傳曰昏禮不稱主人宋公使公孫壽來納幣則其稱主人何辭窮也辭窮者何無母也禮有母則母命之宋公無主昏者宋公自命之故稱宋公使公孫壽來也公孫壽蕩意諸之父者文十六年傳文晉殺其大夫趙同趙括注傳曰原屏咎之徒也明本不以德義自居宜其見討故從告辭而稱名疏正義曰傳稱莊姬譖之則是同括無罪大夫無罪見殺例不書名此並書名故解之宣十二年傳曰原屏咎之徒也明本不以德義自居而妄叨髙位宜其見討今雖實不作亂從告而稱其名言從告者凡殺大夫必以其實有罪告不肯言其無罪魯史詳其曲直乃立其文故所書或從或否耳秋七月天子使召伯來賜公命注諸侯即位天子賜以命圭與之合瑞八年乃來緩也天子天王王者之通稱音義通稱尺證反疏正義曰天子賜諸侯之命書傳亦無正禮唯文元年天王使毛伯來錫公命僖十一年傳王賜晉惠公命周語王賜晉文公命皆是即位而賜之又賜之以圭擬朝而合瑞諸侯即位禮必朝王明當即位即賜之命今八年乃來是緩也隱元年宰咺來賵為其緩書名以譏之此亦緩也而不譏之者彼贈死不及尸弔生不及哀子氏未薨而豫凶事所失者大故特譏之春秋之時賜命禮廢唯文公即位而賜成公八年乃賜桓公死後追賜其餘皆不得賜苟以得之為榮故不復譏其緩也且賜之以圭者為朝而合瑞魯尚不朝天子不宜譏天子賜緩也天子之見經者三十有二稱天王者二十五稱王者八稱天子者一即此事是也三稱並行傳無異說故知天子天王王者之通稱也其不同者史異辭耳公羊傳曰其稱天子何元年春王正月正也其餘皆通矣杜用彼說也賈逵云諸夏稱天王畿內曰王夷狄曰天子王使榮叔歸含且賵以恩深加禮妾母恩同畿內故稱王成公八年乃得賜命與夷狄同故稱天子左氏無此義故杜不從之冬十月癸卯杞叔姬卒注前五年來歸者女既適人雖見出棄猶以成人禮書之終為杞伯所葬故稱杞叔姬晉侯使士燮來聘叔孫僑如會晉士燮齊人邾人伐郯注先謀而稱會盟主之命不同之於列國衛人來媵注古者諸侯取適夫人及左右媵各有姪娣皆同姓之國國三人凡九女所以廣繼嗣也魯將嫁伯姬于宋故衛來媵之音義媵以證反又繩證反適丁歷反姪大結反字林丈一反娣大計反疏正義曰莊十九年公羊傳曰媵者何諸侯娶一國則二國往媵之以姪娣從姪者何兄之子也娣者何弟也諸侯一聘九女是諸侯取適夫人及左右媵各有姪娣也傳曰同姓媵之異姓則否是夫人與媵皆同姓之國也魯衛同姓故來媵之釋例曰古者諸侯之娶適夫人及左右媵各有姪娣皆同姓之國國三人凡九女參骨肉至親所以息隂訟隂訟息所以廣繼嗣也當時雖無其人必待年而送之所以絶望求塞非常也辭稱蠢愚不教故遣大夫隨之亦謂之媵臣所以將謙敬之實也夫人薨不更聘必以姪娣媵繼室一與之醮則終身不二所以重婚姻固人倫人倫之義既固上足以奉宗廟下足以繼後世此夫婦之義也傳八年春晉侯使韓穿來言汶陽之田歸之于齊季文子餞之注餞送行飲酒音義餞錢淺反說文云送去食也字林子扇反毛詩箋云祖而舍軷飲酒於其側曰餞疏正義曰詩大雅韓奕篇云韓侯出祖出宿于屠顯父餞之清酒百壺是餞為送行飲酒也私焉注私與之言曰大國制義以為盟主疏正義曰義者宜也事得其宜謂之為義汶陽之田宜其歸魯是歸魯為義歸齊不義大國當制其義事以為諸侯之盟主是以諸侯懷德畏討無有二心謂汶陽之田敝邑之舊也而用師於齊使歸諸敝邑注用師鞍之戰今有二命曰歸諸齊信以行義義以成命小國所望而懷也信不可知義無所立四方諸侯其誰不解體注言不復肅敬於晉音義復扶又反疏正義曰言之有信義事乃行是信以行義事必以義命乃成就故義以成命也杖信以行義事以義而命諸侯故以小國所望而歸之懷歸也言而無信則信不可知所命非義則義無所立如是則四方諸侯其誰不解體謂事晉之心皆踈慢也詩曰女也不爽士二其行士也罔極二三其德注爽差也極中也詩衛風婦人怨丈夫不一其行喻魯事晉猶女之事夫不敢過差而晉有罔極之心反二三其德音義行下孟反注同差初賣反又初佳反疏正義曰衛風氓之篇七年之中一與一奪二三孰甚焉士之二三猶喪妃耦而况霸主霸主將德是以注以用也音義喪息浪反妃音配耦苦口反而二三之其何以長有諸侯乎詩曰猶之未逺是用大簡注猶圖也簡諫也詩大雅言王者圖事不逺故用大道諫之音義長音如字一音丁丈反行父懼晉之不遠猶而失諸侯也是以敢私言之疏正義曰詩大雅板之篇也言王者之所圖謀其事未能長逺我以是故用大道諌王行父今亦懼晉之不能逺圖而因此以失諸侯是以敢私言之私布此言即是大諌也晉欒書侵蔡注六年未得志故遂侵楚獲申驪注申驪楚大夫音義驪力馳反楚師之還也注謂六年遇於繞角時疏正義曰還在六年不於彼言者因其今獲申驪追言六年侵沈述欒書得從善之功故於此并言之晉侵沈獲沈子揖初從知范韓也注繞角之役欒書從知莊子范文子韓獻子之言不與楚戰自是常從其謀師出有功故傳善之沈國今汝南平輿縣音義揖徐音集又於立反與音餘一音預君子曰從善如流宜哉注宜有功也如流喻速詩曰愷悌君子遐不作人注遐逺也作用也詩大雅言文王能逺用善人不語助音義愷開在反樂也悌徒禮反易也疏正義曰大雅旱麓之篇求善也夫作人斯有功績矣是行也鄭伯將會晉師注會伐蔡之師音義夫音扶門于許東門大獲焉注過許見其無備因攻之音義過古禾反聲伯如莒逆也注自為逆婦而書者因聘而逆音義為于僞反下文為趙嬰同宋華元來聘聘共姬也注穆姜之女成公姊妹為宋共公夫人聘不應使卿故傳發其事而已音義共音恭疏正義曰明年季文子如宋致女還稱宋土之樂穆姜出拜謝之知是穆姜所生之女也夏宋公使公孫壽來納幣禮也注納幣應使卿晉趙莊姬為趙嬰之亡故譖之于晉侯注趙嬰亡在五年曰原屏將為亂欒郤為徴注欒氏郤氏亦徴其為亂六月晉討趙同趙括武從姬氏畜于公宮注趙武莊姬之子莊姬晉成公女畜養也疏正義曰史記趙世家云趙朔娶晉成公姊為夫人案傳趙衰適妻是文公之女若朔妻成公之姊則亦文公之女父之從母不可以為妻且文公之卒距此四十六年莊姬此時尚少不得為成公姊也賈服先儒皆以為成公之女故杜從之史記又稱有屠岸賈者有寵于靈公此時為司寇追論趙盾弒君之事誅趙氏殺趙朔趙同趙括而滅其族案二年傳欒書將下軍則於時朔已死矣同括為莊姬所譖此年見殺趙朔不得與同括俱死也於時晉君明諸臣彊無容有屠岸賈輒厠其間得如此專恣又說云公孫杵臼取他兒代武死程嬰匿武于山中居十五年因晉侯有疾韓厥乃請立武為趙氏後與左傳背違馬遷妄說不可從也以其田與祁奚韓厥言於晉侯曰成季之勳宣孟之忠注成季趙衰宣孟趙盾音義祁巨之反字林上尸反衰初危反盾徒本反而無後為善者其懼矣三代之令王皆數百年保天之祿夫豈無辟王賴前哲以免也注言三代亦有邪辟之君但賴其先人以免禍耳音義數所主反辟匹亦反注及下同哲陟列反邪似嗟反疏正義曰比趙同趙括嗣祖父之天祿若桀紂之輩雖邪辟子孫賴禹湯之功而食天祿周書曰不敢侮鰥寡所以明德也注周書康誥言文王不侮鰥寡而德益明欲使晉侯之法文王音義侮亡甫反鰥古頑反乃立武而反其田焉秋召桓公來賜公命注召桓公周卿士晉侯使申公巫臣如吳假道于莒與渠丘公立於池上注渠邱公莒子朱也池城池也渠邱邑名莒縣有蘧里音義蘧其居反疏正義曰十四年莒子朱卒知渠邱公即是朱也渠邱莒之邑名夷不當有諡或作别號此朱以邑名為號不知其故何也曰城已惡莒子曰辟陋在夷其孰以我為虞注虞度也音義已惡如字已猶大也本或作城已惡矣度待洛反對曰夫狡焉注狡猾之人音義狡交卯反猾于八反思啓封疆以利社稷者何國蔑有唯然故多大國矣唯或思或縱也注世有思開封疆者有縱其暴掠者莒人當唯此為命音義疆居良反注同唯然音維本或作雖後人改也掠音亮疏正義曰俗本唯作雖今定本作唯勇夫重閉况國乎注為明年莒潰傳音義重直龍反又直勇反閉補計反又補結反一音户旦反冬杞叔姬卒來歸自把故書注愍其見出來歸故書卒也若更適大夫則不復書卒音義復扶又反晉士燮來聘言伐郯也以其事吳故注七年郯與吳成公賂之請緩師文子不可注文子士燮曰君命無二失信不立禮無加貨事無二成注公私不兩成君後諸侯是寡君不得事君也注欲與魯絶音義後如字徐音胡豆反燮將復之季孫懼使宣伯帥師會伐郯衛人來媵共姬禮也凡諸侯嫁女同姓媵之異姓則否注必以同姓者參骨肉至親所以息隂訟疏正義曰膏肓以為媵不必同姓所以傅異氣今左傳異姓則否十年齊人來媵何以無貶刺之文左氏為短鄭針云禮稱納女于天子云備百姓於國君云備酒漿不得云百姓是不傅異氣也齊是大國今來媵我得之為榮不得貶也經九年春王正月杞伯來逆叔姬之喪以歸公會晉侯齊侯宋公衛侯鄭伯曹伯莒子杞伯同盟于蒲注蒲衛地在長垣縣西南公至自會注無傳二月伯姬歸于宋注宋不使卿逆非禮夏季孫行父如宋致女注女嫁三月又使大夫隨加聘問謂之致女所以致成婦禮篤昏姻之好音義好呼報反疏正義曰桓二年九月夫人姜氏至自齊冬齊侯使其弟年來聘傳曰齊仲年來聘致夫人也此二月伯姬歸于宋夏季孫行父如宋致女二者其間並近三月禮婦入三月廟見知致女必以三月蓋廟見之後婦禮既成使大夫聘問謂之致女其成婦之禮存謙敬序殷勤所以篤昏姻之好也仲年行父俱是致女而彼言聘者在魯而出則曰致女在他國而來則但言聘外內之異文也以彼言聘而實是致女故二注皆言使大夫隨加聘問為此也晉人來媵注媵伯姬也秋七月丙子齊侯無野卒注無傳五同盟丙子六月一日書七月從赴疏正義曰無野以宣十年即位此二年及國佐盟于袁婁又盟于蜀五年于蟲牢七年于馬陵此年于蒲皆魯齊俱在是五同盟也晉人執鄭伯注鄭伯既受盟于蒲又受楚賂會于鄧故晉執之稱人者晉以無道于民告諸侯例在十五年晉欒書帥師伐鄭冬十有一月葬齊頃公注無傳音義頃音傾楚公子嬰齊帥師伐莒庚申莒潰注民逃其上曰潰楚人入鄆注鄆莒别邑也楚偏師入鄆故稱人秦人白狄伐晉鄭人圍許城中城注魯邑也在東海廩邱縣西南此閏月城在十一月之後十二月之前故傳曰書時疏正義曰長歷推此年閻十一月傳城中城文在十二月上而云書時也即是閏月城之閏月半後即是十二月節故水昏已正而城之是得時也傳九年春杞桓公來逆叔姬之喪請之也注叔姬已絶於把魯復强請把使還取葬音義復秩又反下同强其丈反杞叔姬卒為把故也注還為把婦故卒稱把音義為于僞反下注為魯下文為歸汶陽同逆叔姬為我也注既棄而復逆其喪明為魯故音義逆叔姬絶句為我也本或無為字為歸汶陽之田故諸侯二於晉注歸田在前年晉人懼會於蒲以尋馬陵之盟注馬陵在七年季文子謂范文子曰德則不競尋盟何為注競强也范文子曰勤以撫之寬以待之堅彊以御之明神以要之柔服而伐二德之次也是行也將始會吳吳人不至注為十五年會鍾離傳音義御魚呂反要一遙反二月伯姬歸于宋注為致女復命起楚人以重賂求鄭鄭伯會楚公子成于鄧注為晉人執鄭伯傳夏季文子如宋致女復命公享之賦韓奕之五章注韓奕詩大雅篇名其五章言蹶父嫁女於韓侯為女相所居莫如韓樂文子喻魯侯有蹶父之德宋公如韓侯宋土如韓樂音義蹶九衛反為于僞反相息亮反樂音洛下同穆姜出於房再拜曰大夫勤辱不忘先君以及嗣君施及未亡人注穆姜伯姬母聞文子言宋樂喜而出謝其行勞婦人夫死自稱未亡人音義施以豉反先君猶有望也注言先君亦望文子之若此敢拜大夫之重勤又賦緑衣之卒章而入注緑衣詩弼風也取其我思古人實獲我心喻文子言得已意音義重直勇反又直用反緑如字本又作祿吐亂反注同弼音佩又作鄁晉人來媵禮也注同姓故秋鄭伯如晉晉人討其二於楚也執諸銅鞮注銅鞮晉别縣在上黨音義鞮丁兮反欒書伐鄭鄭人使伯蠲行成晉人殺之非禮也兵交使在其間可也注明殺行人例音義蠲古𤣥反又音圭使在所吏反楚子重侵陳以救鄭注陳與晉故晉侯觀于軍府見鍾儀問之曰南冠而縶者誰也注南冠楚冠縶拘執音義縶中立反拘九豫反疏正義曰應劭漢官儀云法冠一曰柱後冠左傳南冠而縶則楚冠也秦滅楚以其冠賜近臣御史服之即今獬豸冠也古有獬豸獸觸不直者故執憲以其形用為冠令觸人也有司對曰鄭人所獻楚囚也使稅之注鄭獻鍾儀在七年稅解也音義稅吐活反徐始鋭反注同召而弔之再拜稽首問其族對曰泠人也注泠人樂官音義泠力丁反依字作伶疏正義曰詩簡兮序云衛之賢者仕于泠官鄭𤣥云泠官樂官也泠氏世掌樂官而善焉故後世召號樂官為泠官呂氏春秋稱黃帝使伶倫自大夏之西崑崙之隂取竹斷兩節而吹之以為黃鍾之宮昭三十一年傳景王鑄無射泠州鳩非之是泠氏世掌樂官也周語云景王鑄鍾成泠人告和魯語云泠簫詠歌及鹿鳴之三此稱泠人詩稱泠官是泠為樂官之名也公曰能樂乎對曰先父之職官也敢有二事注言不敢學他事使與之琴操南音注南音楚聲音義操七刀反下同公曰君王何如對曰非小人之所得知也固問之對曰其為大子也師保奉之以朝于嬰齊而夕于側也注嬰齊令尹子重側司馬子反言其尊卿敬老不知其他公語范文子文子曰楚囚君子也言稱先職不背本也樂操土風不忘舊也稱大子抑無私也注舍其近事而逺稱少小以示性所自然明至誠音義語魚據反背音佩下同舍音捨少詩照反疏正義曰楚王既為君矣不言為君時事而逺稱大子者若言為君時事嫌為君隱惡或疑己在君位矯情為善舍其當時近事逺稱大子少小者未為君時不須隱蔽以示王性自然言其從小如此以明己之至誠無所私也禮君前臣名字則貴于名此道二卿之名不言字是尊晉君也名其二卿尊君也注尊晉君也不背本仁也不忘舊信也無私忠也尊君敏也注敏達也仁以接事信以守之忠以成之敏以行之事雖大必濟注言有此四德必能成大事君盍歸之使合晉楚之成公從之重為之禮使歸求成注為下十二月晉楚結成張本音義盍戶臘反冬十一月楚子重自陳伐莒圍渠丘渠丘城惡衆潰奔莒戊申楚入渠丘注月六日莒人囚楚公子平楚人曰勿殺吾歸而俘莒人殺之楚師圍莒莒城亦惡庚申莒潰注月十八日楚遂入鄆莒無備故也注終巫臣之言君子曰恃陋而不備罪之大者也備豫不虞善之大者也莒恃其陋而不修城郭浹辰之間而楚克其三都無備也夫注浹辰十二日也音義浹子協反徐又音子答反夫音扶疏正義曰浹為周匝也從甲至癸為十日從子至亥為十二辰周禮縣治象浹日而斂之謂周甲癸十日此言浹辰謂周子亥十二辰故為十二日也詩曰雖有絲麻無棄菅蒯雖有姬姜無棄蕉萃凡百君子莫不代匱言備之不可以已也注逸詩也姬姜大國之女蕉萃陋賤之人音義菅古顔反蒯苦怪反蕉在遙反萃在醉反匱其位反疏正義曰釋草云白華野菅郭璞曰菅茅屬陸璣毛詩疏曰菅似茅滑澤無毛肋宜為索漚及曝尤善蒯與菅連亦菅之類喪服疏屨者傳曰藨蒯之菲也可以為屨明肋如菅竝可代絲麻之乏故云無棄也秦人白狄伐晉諸侯二故也鄭人圍許示晉不急君也注此秋晉執鄭伯是則公孫申謀之曰我出師以圍許注示不畏晉為將改立君者而紓晉使注紓緩也勿亟遣使詣晉示欲更立君音義為將竝如字或于僞反非也本或作僞將紓音舒使所吏反注及下同亟紀力反急也或欺異反數也晉必歸君注為明年晉侯歸鄭伯張本城中城書時也十二月楚子使公子辰如晉報鍾儀之使請修好結成注鍾儀奉晉命歸故楚報之音義好呼報反經十年春衛侯之弟黑背帥師侵鄭夏四月五卜郊不從乃不郊注無傳卜常祀不郊皆非禮故書疏正義曰曲禮論卜筮云旬之外曰逺某日旬之內曰近某日則卜者每旬一卜傳稱啓蟄而郊則周之三月郊之大期此云五卜者當是三月三卜四月又二卜皆不吉乃止也僖三十一年傳云禮不卜常祀不應卜而卜以不吉而不郊皆非禮也五月公會晉侯齊侯宋公衛侯曹伯伐鄭注晉侯太子州蒲也稱爵見其生代父居位失人子之禮音義見賢遍反疏正義曰如傳文知晉侯是太子也漢末有汝南應劭作舊名諱議云昔者周穆王名滿晉厲公名州滿又有王孫滿是同名不諱則此為州滿或曰州蒲誤耳今定本作蒲傳無譏文知譏其生代父位失人子之禮者傳稱凡在喪公侯曰子父喪代位尚不稱君生代父位譏之必矣傳言立太子以為君若其不譏則不須此傳是顯其譏之意齊人來媵注無傳媵伯姬也異姓來媵非禮也丙午晉侯獳卒注六同盟據傳丙午六月七日有日無月音義獳乃侯反疏正義曰獳以宣九年即位十七年盟于斷道元年于赤棘二年于袁婁五年于蟲牢七年于馬陵九年于蒲皆魯晉俱在是六同盟也秋七月公如晉冬十月傳十年春晉侯使糴茷如楚注糴茷晉大夫音義糴徐徒弔反一音杜敖反又士弔反茷扶廢反一音蒲發反又蒲艾反報大宰子商之使也注子商楚公子辰使在前年音義大音泰使所吏反下及注使在同衛子叔黑背侵鄭晉命也注晉命衛使侵鄭鄭公子班聞叔申之謀注改立君之謀三月子如立公子繻注子如公子班音義繻音須夏四月鄭人殺繻立髠頑子如奔許注髠頑鄭成公大子音義髠苦門反頑如字徐五班反欒武子曰鄭人立君我執一人焉何益不如伐鄭而歸其君以求成焉晉侯有疾五月晉立大子州蒲以為君而會諸侯伐鄭注生立子為君此父不父子不子經因書晉侯其惡明音義州蒲本或作州滿鄭子罕賂以襄鐘注子罕穆公子襄鐘鄭襄公之廟鐘子然盟于修澤子駟為質注子然子駟皆穆公子滎陽卷縣東有修武亭音義質音致卷音權字林立權反如淳漢書同音辛巳鄭伯歸注鄭伯歸不書鄭不告入晉侯夢大厲被髮及地搏膺而踊曰殺余孫不義注厲鬼也趙氏之先祖也八年晉侯殺趙同趙括故怒音義被皮寄反搏音博踊音勇疏正義曰鬼怒言殺余孫不義必是枉死者之祖也景公即位以來唯有殺趙同趙括故知是趙氏之先祖趙氏先祖其人非一鬼不自言其名未知誰之鬼世本云公明生趙夙晉語云趙衰趙夙之弟則括之祖公明是也服䖍又以為公明之鬼凡為疫癘之鬼皆妖邪之氣未必真是彼人故杜不復指斥余得請於帝矣壞大門及寢門而入公懼入于室又壞戶公覺召桑田巫注桑田晉邑音義壞音怪下同及寢門一本無及字覺古孝反巫言如夢注巫云鬼怒如公所夢公曰何如曰不食新矣注言公不得及食新麥公疾病求醫于秦秦伯使醫緩為之注緩醫名為猶治也音義醫於其反未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何注肓鬲也心下為膏音義懼傷我絶句焉徐於䖍反一讀如字屬上句逃之絶句肓徐音荒說文云心下鬲上也鬲音革疏正義曰此賈逵之言杜依用之古今傳文皆以為膏之下賈服何休諸儒等亦皆以為膏雖凝者為脂釋者為膏其實凝者亦曰膏故內則云小切狼臅膏則此膏謂連心脂膏也劉炫以為釋首者為膏連心之脂不得稱膏以為膏當為鬲改易傳文而規杜氏非也醫至曰疾不可為也在肓之上膏之下攻之不可逹之不及藥不至焉不可為也注逹針音義攻音工公曰良醫也厚為之禮而歸之六月丙午晉侯欲麥注周六月今四月麥始熟使甸人獻麥注甸人主為公田者音義甸徒練反饋人為之召桑田巫示而殺之將食張如厠陷而卒注張腹滿也音義饋其愧反為如字張中亮反注同小臣有晨夢負公以登天及日中負晉侯出諸厠遂以為殉注傳言巫以明術見殺小臣以言夢自禍鄭伯討立君者戊申殺叔申叔禽注叔禽叔申弟疏正義曰此無文也以禽與申俱死當是坐其兄弟知是弟也君子曰忠為令德非其人猶不可况不令乎注言申叔為忠不得其人還害身疏正義曰言申叔忠誠為此令善之德施之於鄭伯施非得其善人猶尚不可何况不有令德者乎言令德者往年公孫申曰我出師以圍許為將改立君者而紓晉使晉必歸君是也秋公如晉注親弔非禮晉人止公使送葬於是糴茷未反注是春晉使糴茷至楚結成晉謂魯二於楚故留公須糴茷還驗其虛實冬葬晉景公公送葬諸侯莫在魯人辱之故不書諱之也注諱不書晉葬也春秋左傳注疏卷二十六春秋左氏傳注疏卷二十六考證丙午及荀庚盟丁未及孫良夫盟孫復曰此公及荀庚孫良夫盟也不言公者二子伉也林堯叟曰聘而遂盟始於此傳討邲之役也趙汸補注曰晉自邲戰後失鄭故傳自其始叛言之傳於是荀首佐中軍矣臣召南按自宣公十七年士會請老郤克為政荀首即已佐中軍是以成二年傳巫臣對楚王曰知罃之父新佐中軍不始于此年也傳追敘於此年耳傳中行伯之於晉也其位在三林堯叟曰中行伯即荀庚以荀林父為晉中行因以為氏故亦謂中行伯臣召南按晉三軍將佐皆卿也時荀庚將上軍故云位在三以下文大國卿有上中下言之正應是中卿耳杜注言是下卿孔疏言第三猶為下卿則其餘皆下卿然則晉六卿惟中軍將為上卿其中軍佐即中卿乎傳齊侯朝于晉將授玉疏竊原馬遷之意所以有此說者當讀此傳將授玉以為將授王遂飾成為此謬辭耳臣召南按司馬遷必因上傳有晉作六軍之文又誤讀此授玉為授王也傳士燮佐上軍林堯叟曰荀庚將上軍不出故佐獨行臣浩按晉軍或全出或半行鞍之戰三軍俱出而將佐半行此役則中軍將佐全出而上軍惟其佐獨行下軍全不出也傳取汜祭疏滎陽中牟縣滎監本訛作熒今改正立武宮公羊傳曰武公之宮也啖助曰左傳以為武軍之宮非也若然煬宮復何謂乎劉敞曰魯僭天子之禮學者習于魯更張而大之曰魯公之廟文世室也武公之廟武世室也人之迷固久矣萬斯大曰據昭十五年經書有事于武宮則公羊說是蓋鞍戰時禱于武公而得勝故立其宮也魯人不知其非禮且擬之于魯公之廟而稱為世室明堂位遂亦侈言之武公之廟在懿孝為禰至閔公則親盡而毁矣閔公至今八十年中斷者三世一旦忽然更立于世字之義何居傳季文子以鞍之功立武宮臣召南按左傳亦不謂立武軍杜氏傅會宣十二年傳有潘黨勸楚子立武軍之文遂據為說耳服䖍曰鞍之戰禱武公以求勝故立其宮解傳極當孔氏必護杜注而駁服義何邪傳下文言不可以立武及立武由己皆言誇耀戰功之非非謂立武軍也傳楚公子申公子成以申息之師救蔡趙汸補注曰楚以申息為經營中國之本故三軍二廣不常出而大抵用申息之師僖二十五年以申息之師戍商密二十六年申公叔侯戍齊文九年息公子朱伐陳成六年以申息之師救蔡昔宣王之世申伯實以王舅為南國之屏翰所以干城王室秦漢之際南陽為要地故楚有圖北方之志其君多居于申大合諸侯亦在焉吳伐郯林堯叟曰吳始見經吳始入伐中國傳是以始大通吳於上國趙汸補注林氏曰楚人禦吳以江故用舟師吳人撓楚以淮故用車戰吳自徐伐巢淮西也入州來淮北也吳楚爭淮自此始自雞父之師一敗而吳得州來滅巢及鍾離矣是則亡郢始于失淮八年秋七月天子使召伯來賜公命注八年乃來緩也臣召南按成公即位已八年未嘗一至京師朝天子杜氏乃以天子賜命為緩乎孔疏謂不宜譏天子賜緩是也傳夏宋公使公孫壽來納幣禮也趙汸補注曰說者疑昏禮不當使公子公孫非也國君臣諸父昆弟同姓之卿與異姓之卿何異如魯鄭卿皆同姓當使何人傳三代之令王皆數百年保天之祿疏比趙同趙括嗣祖父之天祿監本訛作比趙同趙括謂天祿之祖父遂不可解今改正傳晉人殺之非禮也注明殺行人例趙汸補注曰殺行人非卿例不書此為兵交發義傳對曰泠人也疏呂氏春秋稱皇帝使伶倫自大夏之西崑崙之隂臣召南按呂氏春秋本文作阮隃之隂漢志乃作崑崙之隂傳詩曰雖有絲麻疏肋宜為索又云明肋如菅臣浩按爾雅注兩肋字俱宜作韌言堅韌也公會晉侯齊侯宋公衛侯曹伯伐鄭疏周穆王名滿晉厲公名州滿滿監本俱訛作蒲今改正
