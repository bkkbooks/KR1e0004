body:
  text: 春秋左傳注疏卷二起隱公三年盡五年晉杜氏注唐陸德明音義孔穎達疏經三年春王二月已巳日有食之注無傳日行遲一歲一周天月行疾一月一周天一歲凡十二交會然日月動物雖行度有大量不能不小有盈縮故有雖交㑹而不食者或有頻交而食者唯正陽之月君子忌之故有伐鼓用幣之事今釋例以長厯推經傳明此食是二月朔也不書朔史失之書朔日例在桓十七年音義己巳上音紀下音祀後倣此食如字本或作蝕音同量音亮縮所六反疏注正義曰古今之言厯者大率皆以周天為三百六十五度四分度之一日行比月為遲每日行一度故一歲乃行一周天月行比日為疾每日行十三度十九分度之七故一月內則行一周天又行二十九度過半乃逐及日言一月一周天者略言之耳其實及日之時不啻一周天也日月雖共行於天而各有道每積二十九日過半行道交錯而相與㑹集以其一會謂之一月每一歲之間凡有十二㑹故一歲為十二月日食者月掩之也日月之道互相出入或月在日表從外而入內或月在日裏從內而出外道有交錯故日食也二十九日過半月及日者以厯家一度分為九百四十分則四百七十分為半今月來及日凡二十九日又四百九十九分是過半校二十九分也日有食之言有物來食之也日月同處則日被月映而形魄不見聖人不言日被月食而云日有食之者以其月不可見作不知之辭穀梁傳曰其不言食之者何也知其不可知也是言愼疑故不言月也朔則交㑹故食必在朔然而每朔皆㑹應每月常食故解之言日月動物雖行度有大量不能不小有盈縮故有雖交㑹而不食者或有頻交而食者自隱之元年盡哀二十七年積二百五十五年凡三千一百五十四月唯三十七食是雖交而不食也襄二十一年九月十月頻食二十四年七月八月頻食是頻交而食也食無常月唯正陽之月君子忌之以日食者陰侵陽也當陽長之月不宜為弱陰所侵故有伐鼓用幣之事餘月則否其日食例皆書朔己巳之下經無朔字長厯推此己巳實是朔日而不書朔史失之也此注作大判言耳戰國及秦厯紀全差漢來漸候天時始造其術劉歆三統以為五月二十三分月之二十而日一食空得食日而不得加時漢末㑹稽都尉劉洪作乾象厯始推月行遲疾求日食加時後代修之漸益詳密今為厯者推步日食莫不符合但無頻月食法故漢興以來殆將千歲為厯者皆一百七十三日有餘而始一交會未有頻月食者今頻月而食乃是正經不可謂之錯誤也考之厯術事無不驗不可謂之疏失由是注不能定故未言之也又漢書髙祖本紀髙祖即位三年十月十一月晦日頻食則曰有頻食之理其解在襄二十四年穀梁傳曰言日不言朔食晦日也朔日並不言食晦夜也朔日並言食正朔也言朔不言日食既朔也三月庚戌天王崩注周平王也實以壬戌崩欲諸侯之速至故逺日以赴春秋不書實崩日而書逺日者即傳其僞以懲臣子之過也襄二十九年傳曰鄭上卿有事使印段如周會葬今不書葬魯不會音義即傳直專反印因創反疏正義曰曲禮下曰天子死曰崩諸侯曰薨大夫曰卒士曰不祿庶人曰死鄭𤣥云異死名者為人褻其無知若猶不同然也自上顚壞曰崩薨顚壞之聲卒終也不祿不終其祿死之言澌也精神澌盡也是由天子尊若山崩然諸侯卑取崩之聲以為尊卑之差也不書天王名者以海內之主至尊之極故敬而不敢名也穀梁傳云髙曰崩厚曰崩尊曰崩天子之崩以尊也以其在民上故崩之其不名何也大上故不名也蘇氏云王后崩大子卒不書者赴不及魯也今以為略之例所不書也告喪禮云告王喪曰天王登假此言崩者魯史裁約為文不道當時赴不言登假也注正義曰今檢杜注凡葬者皆顯言其諡此為無葬故言周平王也仲尼修經當改正真僞以為褒貶周人赴不以實孔子從僞而書者周人欲令諸侯速至故逺其崩日以赴也不書其實而從其僞言人知其僞則過足章矣故即傳其僞以懲創臣子之過釋例曰天王僞赴遂用其虛明日月闕否亦從赴辭君子不變其文以愼其疑且虛實相生隨而表之真僞之情可以兩見承赴而書之亦所以示將來也夏四月辛卯君氏卒注隱不敢從正君之禮故亦不敢備禮於其母疏正義曰君氏者隱公之母聲子也謂之君氏者言是君之母氏也母之與子氏族必異故經典通呼母舅為母氏舅氏言其與己氏異也秋武氏子來求賻注武氏子天子大夫之嗣也平王喪在殯新王未得行其爵命聽於冢宰故傳曰王未葬釋其所以稱父族又不稱使也魯不共奉王喪致令有求經直文以示不敬故傳不復具釋也音義賻音附殯必刃反共音恭本又作供音同令力呈反復扶又反疏注正義曰武氏者天子大夫之姓直云武氏子不書其字則其人未成為大夫也若是上士例當書名又不應繫之父族謂之為子明其是大夫之子也又王使至魯皆言天王使某此復不言王使明其不稱王命也以此知此人父喪已終宜嗣父位但平王未命而崩新王居喪未得行其爵命政事聽於冢宰冢宰使之適魯冢宰不得專命故作自來之文傳言王未葬者意兼兩事王喪在殯新王不得加臣爵位故此人仍繫父族王又不得命臣出行故此人不稱王使以未葬之故闕此二事故傳以未葬解之八月庚辰宋公和卒注稱卒者略外以别內也元年大夫盟於宿故來赴以名例在七年音義别彼列反冬十有二月齊侯鄭伯盟于石門注來告故書石門齊地或曰濟北盧縣故城西南濟水之門癸未葬宋穆公注無傳魯使大夫㑹葬故書始死書卒史在國承赴為君故惡其薨名改赴書也書葬則舉諡稱公者會葬者在外據彼國之辭也書葬例在昭六年音義為于僞反惡烏路反疏注正義曰文九年叔孫得臣如京師葬襄王昭三年叔弓如滕葬滕成公如此之類遣卿行者皆書其使名此不書使名知是大夫往也大夫奉命出使位賤不合書名故直書其所為之事而已盟則云及某盟會則云㑹某人葬則云葬某公舉其所為之事明有使往可知也釋例曰先王之制諸侯之喪士弔大夫送葬及其失也禮過於重文襄之伯因而抑之諸侯之喪大夫弔卿共葬事夫人之喪士弔大夫送葬猶過古制故公子遂如晉葬襄公傳不言禮葬秦景公傳曰大夫如秦葬景公特稱禮也一以示古制二以示書他國之葬必須魯會三以示奉使非卿則不書於經此丘明之微文也是言大夫得正而卿過禮也諸侯曰薨禮之正名魯史自書君死曰薨若鄰國亦同書薨則與己君無别國史自在己國承他國赴告為與己君同故惡其薨名雖赴稱薨皆改赴書卒略外以别內也至於書葬則五等之爵皆舉諡稱公者㑹葬者在於國外據彼國之辭彼國臣子稱君曰公書使之行不得不稱公也又云惡其薨名改赴書者釋例曰天子曰崩諸侯曰薨大夫曰卒古之制也春秋所稱曲存魯史之義內稱公而書薨所以自尊其君則不得不略外諸侯書卒以自異也至於既葬雖邾許子男之君皆稱諡而言公各順臣子之辭兩通其義是其說也案禮雜記赴告之辭云君訃於他國之君曰寡人不祿敢告於執事然則赴辭本無薨語而云惡其薨名者以夫人薨例云不赴於諸侯則不曰薨明其以薨告人故書薨也是知王侯喪者其通國命皆以崩薨相告記之所稱謂答主人之問飾其文辭耳若以記文無薨即疑不以薨告記稱大夫士赴人之辭皆云不祿豈大夫無卒名也以此知相赴策書必以薨為文但擯者口傳赴辭義在謙退從士之不祿故禮記言之赴則必以薨但改赴書卒耳史之書事莫不在國㑹葬者自可在外書䇿者國內書之而云據彼國之辭者書使行之事言使為此事行故文從彼稱不謂書不在國也卿為君逆謂之逆女亦是書己之使據彼稱女與此同也傳三年春王三月壬戌平王崩赴以庚戌故書之夏君氏卒聲子也不赴于諸侯不反哭于寢不祔于姑故不曰薨不稱夫人故不言葬注夫人喪禮有三薨則赴於同盟之國一也既葬日中自墓反虞於正寢所謂反哭于寢二也卒哭而祔於祖姑三也若此則書曰夫人某氏薨葬我小君某氏此備禮之文也其或不赴不祔則為不成喪故死不稱夫人薨葬不言葬我小君某氏反哭則書葬不反哭則不書葬今聲子三禮皆闕釋例論之詳矣音義祔音附疏注正義曰僖八年致夫人傳曰不赴於同則弗致故知赴者赴於同盟之國也禮檀弓記葬禮云既封有司以几筵舍奠於墓左反日中而虞士喪禮既葬乃反哭於廟遂適殯宫而虞是既葬日中自墓反虞於正寢正寢即殯宫也僖三十三年傳與檀弓記皆云卒哭而祔喪服小記曰妻祔於祖姑雜記曰妾祔於妾祖姑是祔於姑者祔於祖姑也此三者皆夫人之喪禮夫人喪禮有三史策所書有二唯卒葬兩事而已其卒之異者或云夫人某氏薨仲子文姜之類是也或云某氏卒定姒孟子是也葬之異者或云葬我小君某氏文姜敬嬴之類是也或云葬某氏葬定姒是也或則不書葬也今聲子三禮皆闕經異常辭必是闕一事則變一文但傳既并釋注不顯配雖言釋例詳之例亦未甚分明此傳故上三事故下三事若以次相配則不赴於諸侯故不曰薨不反哭於寢則不稱夫人不祔於姑故不言葬文次相屬事乃似然但顧下傳義則不爾定十五年姒氏卒傳曰不稱夫人不赴且不祔也哀十二年孟子卒傳曰死不赴故不稱夫人不反哭故不書葬小君彼二傳皆以不赴解不稱夫人以不反哭解不書葬然則由不赴故不曰薨由不反哭故不書葬也二事既然則由不祔故不稱夫人斷可知矣傳文不以次相配者初死即赴葬乃反哭反哭之後始祔三者依事之先後為文也至書於經則夫人與薨共文故先言不稱夫人後言不書葬順經之先後為文也禮之本意必赴乃稱薨祔乃稱夫人反哭乃書葬者夫人與君同體死必赴於鄰國若不以赴告於鄰國則夫人之禮不成尊成以否義由赴告成尊之狀在於書薨故赴則稱薨不赴則不稱薨也禮適祔於適祖姑妾祔於妾祖姑亦既不祔於姑便是適妾莫辨故祔則稱夫人不祔則不稱夫人也既葬於墓反哭於寢哀之尤極情之最切既葬而不反哭全是不念其親葬與不葬殆無以異故不反哭則不書葬也皆所以懲臣子責其不行禮也人之行禮有勤有惰未必廢則俱廢行則皆行此聲子自三禮皆闕其餘或可一行一否釋例曰夫人子氏赴而不反哭故不書葬定姒則反哭而不赴故書葬而不言小君以此二者據傳則然理在不惑但不知赴而不祔祔而不赴者辭當云何耳薨者夫人之死號不稱夫人必不得稱薨也小君者夫人之别號不稱夫人必不得稱小君也孟子卒下注云不稱夫人故不言薨是夫人與薨文相將也葬定姒傳曰不稱小君不成喪也注云不赴不祔故不稱小君傳以不赴不祔解不稱夫人注以不赴不祔解不稱小君是夫人小君文相將也夫人也薨也小君也三者相將之物不可致詰蓋赴祔二禮果行一事則具此三文二事並廢則三文皆去耳何則檢此傳相配不赴則不曰薨不祔則不稱夫人是稱夫人由祔不由赴也孟子之傳乃云不赴故不稱夫人是稱夫人由於赴不由於祔也定姒之傳云不稱夫人不赴且不祔又以二事並解不稱夫人注云赴同祔姑夫人之禮二者皆闕故不曰夫人明是二者俱闕乃去夫人果行一事則稱夫人稱夫人則必書薨書薨則必稱小君所異者不反哭則不書葬若不書葬則小君之文無所施耳即仲子是也赴同祔姑皆是夫人之禮故赴而不祔祔而不赴則皆曰夫人某氏薨惠公自有元妃别為仲子立廟則仲子未必祔姑蓋以赴同之故得稱夫人薨也不書姓為公故曰君氏注不書姓辟正夫人也隱見為君故特書於經稱曰君氏以别凡妾媵音義為公音于僞反見賢遍反别彼列反疏注正義曰辟正夫人謂辟仲子耳何則妾子為君則其母得為夫人不須辟孟子也但公以讓位之故不從正君之禮故亦不備禮於其母使之辟仲子也釋例曰凡妾子為君其母猶為夫人雖先君不命其母母以子貴其適夫人薨則尊得加於臣子外內之禮皆如夫人矣故姒氏之喪責以小君不成成風之喪王使㑹葬傳曰禮也隱以讓桓攝位故不成禮於聲子假稱君氏以别凡妾媵蓋是一時之宜隱之至義也是其辟仲子之意也鄭武公莊公為平王卿士注卿士王卿之執政者言父子秉周之政王二于虢注虢西虢公亦仕王朝王欲分政於虢不復專任鄭伯音義朝直遙反復扶又反任而鴆反後不音者皆同鄭伯怨王王曰無之故周鄭交質王子狐為質於鄭鄭公子忽為質於周注王子狐平王子音義質音致下同狐音胡王崩周人將畀虢公政注周人遂成平王本意音義畀必二反與也四月鄭祭足帥師取溫之麥秋又取成周之禾注四月今二月也秋今之夏也麥禾皆未熟言取者蓋芟踐之溫今河內溫縣成周洛陽縣也音義祭側界反芟所銜反疏注正義曰此直言秋秋有三月若是季秋則今之七月杜必知秋今之夏者以此傳在武氏之上案經武氏之下有八月宋公和卒則知此是七月故為今之夏謂今之五月也麥熟在夏而云麥禾皆未熟者謂四月之時麥未熟七月之時禾未熟二者異時故言皆也周鄭交惡注兩相疾惡君子曰信不由中質無益也明恕而行要之以禮雖無有質誰能間之苟有明信澗溪沼沚之毛注溪亦澗也沼池也沚小渚也毛草也音義要於遙反間間厠之間溪苦兮反爾雅云山夾水曰澗山瀆無所通曰溪沼之紹反沚音止亦音市本又作畤蘋蘩薀藻之菜注蘋大蓱也蘩皤蒿薀藻聚藻也音義蘋音頻蘩音煩薀紆紛反藻音早蓱蒲丁反皤蒲多反白蒿也疏正義曰毛即菜也而重其文者溪沼言地之陋蘋藻言菜之薄故文重也注正義曰爾雅釋山云山夾水澗李巡曰山間有水釋名曰言水在兩山間也釋水曰水注川曰溪李巡曰水出於山入於川釋山又云山豄無所通溪李巡曰山中水瀆雖無所通與水注川同名宋均曰無水曰谷有水曰溪然則溪亦山間有水之名是澗之類故云溪亦澗也沼者池之别名張揖廣雅亦云沼池也應劭風俗通云池者陂池從水也聲沚與畤音義同釋水曰小渚曰沚釋名曰沚止也小水可止息其上草是地之毛周禮宅不毛謂宅內無草木也故杜以毛為草草即下句蘋蘩薀藻是也蘩陸菜而云沼沚之毛者或采之水旁非皆水內也釋草云蘋蓱其大者蘋舍人曰蘋一名蓱大者名蘋郭璞曰水中浮蓱江東謂之薸陸璣毛詩義疏云今水上浮蓱是也其粗大者謂之蘋小者曰蓱季春始生可糝蒸為茹又可苦酒淹以就酒釋草又云蘩皤蒿孫炎曰白蒿也陸璣疏曰凡艾白色為皤蒿今白蒿春始生及秋香美可生食又可蒸一名遊胡北海人謂之旁勃故大戴禮夏小正傳曰蘩遊胡遊胡旁勃也許愼說文云薻水草從草從水巢聲或作藻從澡毛詩傳曰藻聚藻也然則此草好聚生薀訓聚也故云薀藻聚藻也陸璣疏云生水底有二種其一種葉如雞蘇莖大如箸長四五尺其一種莖大如叉股葉如蓬謂之聚藻又云扶風人謂之藻聚為發聲也此二藻皆可食煮熟捼去腥氣米麵糝蒸為茹嘉美揚州人饑荒可以當穀食筐筥錡釡之器注方曰筐員曰筥無足曰釡有足曰錡音義筐丘方反筥九呂反錡其綺反筐筥皆器也疏注正義曰此皆毛詩傳鄭箋之文也說文云筥飯牛筐也廣雅云錡釡也潢汙行潦之水注潢汙停水行潦流潦音義潢音黃汙音烏潦音老疏注正義曰停水謂水不流也行道也雨水謂之潦言道上聚流者也服䖍云畜小水謂之潢水不流謂之汙行潦道路之水是也此水用為飲食故引泂酌之篇藻雖潦水所生要此潦非生菜處也可薦於鬼神可羞於王公注羞進也疏正義曰上言鬼神此言王公是生王公也或以為王公亦謂鬼神非生王公也此傳之意取詩為言泂酌論天子之事是羞於王也采蘩云公侯之事是羞於公也言薦又言羞者鄭𤣥注庖人云備品物曰薦致滋味乃為羞而况君子結二國之信行之以禮又焉用質注通言盟約彼此之情故言二國音義焉於䖍反約如字又於妙反風有采蘩采蘋注采蘩采蘋詩國風義取於不嫌薄物雅有行葦泂酌注詩大雅也行葦篇義取忠厚也泂酌篇義取雖行潦可以共祭祀也音義葦于鬼反泂音逈共音恭疏正義曰采蘩采蘋泂酌上傳所言皆有彼篇之事其言未及行葦今言行葦者其意别取忠厚非以結上也昭忠信也注明有忠信之行雖薄物皆可為用音義行下孟反武氏子來求賻王未葬也注正義曰蘇氏云案文九年毛伯來求金傳曰不書王命未葬也此傳直云王未葬不同者毛伯直釋不稱使故云不書王命此武氏子非但不稱使又稱父族二事皆由未葬故直云王未葬也宋穆公疾召大司馬孔父而屬殤公焉曰先君舍與夷而立寡人注先君穆公兄宣公也與夷宣公子即所屬殤公音義屬章欲反注同殤舒羊反舍音捨與如字一音餘疏正義曰曲禮下曰諸侯見天子曰臣某侯某其與民言自稱曰寡人今與臣言亦云寡人則知其對臣民自稱同也老子曰孤寡不穀王侯之謙稱故以下諸侯自稱亦多言不穀寡人弗敢忘若以大夫之靈得保首領以沒先君若問與夷其將何辭以對請子奉之以主社稷寡人雖死亦無悔焉對曰羣臣願奉馮也注馮穆公子莊公也音義沒本亦作殁同馮皮氷反本亦作憑公曰不可先君以寡人為賢使主社稷若棄德不讓是廢先君之舉也豈曰能賢注言不讓則不足稱賢光昭先君之令德可不務乎吾子其無廢先君之功注先君以舉賢為功我若不賢是廢之使公子馮出居於鄭注辟殤公也八月庚辰宋穆公卒殤公即位君子曰宋宣公可謂知人矣立穆公其子饗之命以義夫注命出於義也夫語助音義夫音符注同疏正義曰義者宜也錯心方直動合事宜乃謂之為義宣公之立穆公知穆公之賢必以義理不棄其子今穆公方卒命孔父以義事而立殤公是穆公命立殤公出於仁義之中故杜云命出於義也必知命以義夫謂穆公命立殤公者以杜注云帥義而行則殤公宜受此命宜荷此祿公子馮不帥父義終傷咸宜之福明知殤公受穆公之命與殷湯武丁同有咸宜是知穆公命立殤公是為義也商頌曰殷受命咸宜百祿是荷其是之謂乎注詩頌言殷湯武丁受命皆以義故任荷天之百祿也帥義而行則殤公宜受此命宜荷此祿公子馮不帥父義忿而出奔因鄭以求入終傷咸宜之福故知人之稱唯在宣公也殷禮有兄弟相及不必傳子孫宋其後也故指稱商頌音義頌似用反荷本又作何何可反又音何注同任也任音壬忿芳粉反稱尺證反傳直專反疏正義曰商頌𤣥鳥之卒章言成湯武丁此二王者受天之命皆得其宜故天之百種之祿於是乎荷負之言天祿皆歸故得而荷負也今穆公立殤公亦得其宜故殤公宜荷此祿詩之意其是此事之謂乎注正義曰唐虞之代契為司徒封於商十四世至湯王有天下遂以商為代號後世有武丁者中興賢君時有作詩頌之者謂之商頌美湯與武丁能荷天祿今殤公亦荷天祿與詩義同故引以證之公羊傳言宋之禍宣公為之尤其舍子立弟果令馮有爭心以馮之爭為宣公之過今此傳善宣公故申明其事若使帥義而行則殤公宜受此命宜荷此祿但公子馮不帥父義失其咸宜故知人之稱唯在宣公止善宣公知穆公耳馮自爭國非宣公之罪故善之傳言使公子馮出居于鄭則是父使之出注言忿而出奔者四年傳曰公子馮出奔鄭鄭人欲納之又衛告宋曰君若伐鄭以除君害是馮出奔鄭求入欲害宋國也父使居鄭欲以辟殤公馮乃因鄭欲以害殤公故據父言之則云使之出居據馮言之則云忿而出奔各從其實而為之文也諡法短折不成曰殤布德執義曰穆冬齊鄭盟于石門尋盧之盟也注盧盟在春秋前盧齊地今濟北盧縣故城庚戌鄭伯之車僨于濟注既盟而遇大風傳記異也十二月無庚戌日誤音義僨佛問反仆也疏注正義曰釋言云僨僵也舍人曰皆踣意也車踣而入濟是風吹之墜濟水非常之事故云傳記異也禹貢導沇水東流為濟入于河溢為滎釋例曰濟自滎陽卷縣東經陳留至濟陰北經高平東經濟北東北經濟南至樂安博昌縣入海案檢水流之道今古或殊杜既考校無由據當時所見載於釋例今一皆依杜雖與水經乖異亦不復根尋也庚戌無月而云十二月者以經盟于石門在十二月知此亦十二月也經書十二月下云癸未葬宋穆公計庚戌在癸未之前三十三日不得共在一月故長厯推此年十二月甲子朔十一日有甲戌二十三日有丙戌不得有庚戌而月有癸未則月不容誤知日誤也衛莊公娶于齊東宫得臣之妹曰莊姜注得臣齊大子也大子不敢居上位故當處東宮疏正義曰齊國侯爵譜云姜姓太公望之後其先四嶽佐禹有功或封於呂或封於申故太公曰呂望也太公股肱周室成王封之於營丘今臨淄是也僖公九年魯隱公之元年也簡公四年獲麟之歲也簡公弟平公十三年春秋之傳終矣平公二十五年卒後二世七十年而田氏奪齊太公之後滅矣案齊世家莊公生僖公東宮得臣未知何公大子案史記十二諸侯年表衛莊公之立在春秋前二十五年齊僖公之立在春秋前八年然則莊姜必非齊僖公之女蓋是莊公之女僖公姊妹也得臣為太子早死故僖公立也不言僖公姊妹而繫得臣者見其是適女也得臣為大子云當處東宫者四時東為春萬物生長在東西為秋萬物成就在西以此君在西宮太子當處東宮也或可據易象西北為乾乾為君父故君在西東方震震為長男故大子在東也美而無子衛人所為賦碩人也注碩人詩義取莊姜美于色賢于德而不見答終以無子國人憂之音義為賦音于僞反疏正義曰此賦謂自作詩也班固曰不歌而誦亦曰賦鄭𤣥云賦者或造篇或誦古然則賦有二義此與閔二年鄭人賦清人許穆夫人賦載馳皆初造篇也其餘言賦者則皆誦古詩也又娶于陳曰厲媯生孝伯早死注陳今陳國陳縣音義媯九危反疏正義曰陳國侯爵譜云媯姓虞舜之後當周之興有虞遏父者為周陶正武王賴其利器用與其先聖之後以元女大姬配遏父之子滿封於陳賜姓曰媯號胡公桓公二十三年魯隱公之立年也湣公二十一年獲麟之歲也二十四年楚滅陳此當桓公時二媯蓋桓公姊妹也其娣戴媯生桓公莊姜以為已子注媯陳姓也厲戴皆諡雖為莊姜子然大子之位未定疏注正義曰諡法暴慢無親曰厲典禮無愆曰戴是皆諡也石碏言將立州吁乃定之矣請定州吁明大子之位未定衛世家言立完為大子非也公子州吁嬖人之子也注嬖親幸也音義吁足于反嬖必僞反賤而得幸曰嬖有寵而好兵公弗禁莊姜惡之石碏諫曰臣聞愛子教之以義方注石碏衛大夫音義好呼報反禁居鴆反一音金惡烏路反碏七略反弗納於邪驕奢淫泆所自邪也四者之來寵祿過也將立州吁乃定之矣若猶未也階之為禍注言將立為大子則宜早定若不早定州吁必緣寵而為禍音義邪似差反下同泆音逸疏正義曰驕謂恃己陵物奢謂夸矜僣上淫謂耆欲過度泆謂放恣無藝此四者之來從邪而起故服䖍云言此四者過從邪起是也劉炫云此四者所以自邪已身言為之不已將至於邪邪謂惡逆之事劉又難服云邪是何事能起四過若從邪起何須云四者之來寵祿過也寵祿豈是邪事四者得從而來乎且言弗納於邪懼其緑驕以至於邪非先邪而後驕也夫寵而不驕驕而能降降而不憾憾而能眕者鮮矣注如此者少也降其身則必恨恨則思亂不能自安自重音義夫音扶發句之端後放此憾本又作感同胡暗反恨也五年同眕之忍反重也鮮息淺反少也疏正義曰恃君寵愛未有不驕亦既驕矜必不能自降其心强降其心未有不恨亦既怨恨必不能自重其身釋言云眕重也言恨則思亂必不能自安自重也寵而必驕降而必憾言其勢必自然故言其能不然者少也驕而不能降憾而不能眕言其心難自抑故言其能然者少也鮮訓少以一鮮總四事言四事皆鮮也且夫賤妨貴少陵長遠間親新間舊小加大注小國而加兵於大國如息侯伐鄭之比音義妨音芳少詩照反長丁丈反間間厠之間下同比必二反淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也注臣行君之義疏正義曰賤妨貴謂位有貴賤少陵長謂年有長幼楚公子申多受小國之賂以逼子重子辛是賤人而妨貴人也邾捷菑以弟而欲奪兄位是年少而陵年長也齊東郭偃棠無咎專崔氏之政而侮崔成崔彊是疏遠而間親戚也晉胥童夷羊五得君寵而去三郤是新臣而間舊臣也息伐鄭曹奸宋是小國而加大國也陳靈蔡景姦穢無度是邪淫而破正義也妨謂有所害陵謂加尚之間為居其間使彼疏遠也加亦加陵破謂破散淫義不兩立行惡則破善故言破也去順效逆所以速禍也君人者將禍是務去而速之無乃不可乎弗聽其子厚與州吁游禁之不可桓公立乃老注老致仕也四年經書州吁弒其君故傳先經以始事音義去起吕反下同弒音試先悉薦反疏正義曰州吁於逆則少陵長於順則弟不敬是去順效逆也六順六逆因事廣言非謂州吁遍犯之也注正義曰禮七十而致事言還其所掌之事於君也傳之初始有此故言傳先經以始事餘不注從可知也經四年春王二月莒人伐杞取牟婁注無傳書取言易也例在襄十三年杞國夲都陳留雍丘縣推尋事跡桓六年淳于公亡國杞似并之遷都淳于僖十四年又遷緣陵襄二十九年晉人城杞之淳于杞又遷都淳于牟婁杞邑城陽諸縣東北有婁鄉音義杞音起牟亡侯反易以豉反雍於用反疏正義曰譜云杞姒姓夏禹之苗裔武王克殷求禹之後得東樓公而封之於杞今陳留雍丘縣是也九世及成公遷緣陵文公居淳于成公始見春秋湣公六年獲麟之歲也湣公弟哀公三年春秋之傳終矣哀公十年卒自哀公以下二世十三年而楚滅杞檢杞於此歲已見於經桓二年有杞侯來朝莊二十七年有杞伯來朝於傳並無號諡又不書其卒僖二十三年杞成公卒其諡乃見於傳未知此年杞國定是何君當是成公之父祖耳牟婁杞邑莒伐取之自是以後常為莒邑昭五年莒牟夷以牟婁來奔是也文三年秦人伐晉傳稱取王官及郊襄二十三年齊侯伐晉傳稱取朝歌並書伐不書取此伐取兩書者彼告伐不告取此伐取並告故也昭元年伐莒取鄆書取不書伐昭十年伐莒取郠書伐不書取者元年兵未加莒而鄆逆服故書取不書伐十年晉以取郠討公故書伐不書取其伐國圍邑書圍與否亦從告也注正義曰襄十三年傳例曰凡書取言易也知此書取亦言易也地理志云陳留郡雍丘縣故杞國武王封禹之後東樓公是杞本都陳留雍丘縣也志又云北海郡淳于縣應劭曰春秋州公如曹左氏傳曰淳于公如曹臣瓚案州國名淳于國之所都此淳于縣於漢屬北海郡晉時屬東莞郡故釋例土地名云州國都於東莞淳于縣以雍丘淳于雖郡别而竟連也桓五年傳稱淳于公如曹度其國危遂不復六年春實來雖知其國必滅不知何國取之襄二十九年晉帥諸侯城杞昭元年祁午數趙文子之功云城淳于是知淳于即杞國之都也僖十四年諸侯城緣陵而遷杞不知從何而遷故云淳于公亡國杞似并之而遷居其地僖十四年又從淳于而遷於緣陵襄二十九年又從緣陵而遷於淳于以無明文疑不敢質故言推尋事跡似當然也若然淳于為杞所并定似不虛而遷都淳于未有事跡自雍丘而遷緣陵亦可知矣而杜必言遷都淳于又從淳于遷緣陵者以桓六年淳于公亡國襄二十九年又杞都淳于則淳于始末是杞之所有又把之所都故疑未都緣陵之前亦都淳于也取國易者則直言取若取邿取鄟之類是也故不須加伐於上若其伐國取邑其邑既小不得名通若不加伐於上不知得何國之邑是以雖易亦加伐文則伐杞取牟婁伐邾取須句之類是也成二年取汶陽田乞師盟主興兵伐齊得邑既難而亦書取者因其伐齊晉使還汶陽之田魯不加兵故書取從易也劉君或疑此意遂云上言伐下言取者非易以規杜氏非也戊申衛州吁弒其君完注稱臣弒君臣之罪也例在宣四年戊申三月十七日有日而無月音義弒本又作殺同音試凡弒君之例皆放此可以意求不重音完音丸疏注正義曰宣四年傳例曰凡弒君稱君君無道也稱臣臣之罪也注云稱君謂唯書君名而稱國以弒言衆所共絶也稱臣者謂書弒者之名以示來世終為不義然則此稱州吁之名稱臣弒君是臣之罪也言完非無道而州吁為賊也州吁實公子而不稱公子者傳文更無褒貶直是告辭不同史有詳略耳公子雖復非族而文當族據春秋書族以否大有乖異故杜備言之釋例曰尋案春秋諸世族之稱甚多參差而先儒皆以為例欲託之於外赴則患有人身自來者例不可合因以辟陋未賜族為說弒君不書族者四事州吁無知不稱公子公孫賈氏以為弒君取國故以國言之案公子商人亦弒君取國而獨稱公子宋督賈氏以為督有無君之心故去氏案傳自以先書弒君見義不在於氏也宋萬賈氏以為未賜族案傳稱南宫長萬則為已氏南宮不得為未賜族也執殺大夫不書族者二事楚殺得臣與宜申賈氏皆以為陋案楚殺大夫公子側大夫成熊之等六七人皆稱氏族無為獨於此二人陋也欲以為通例則有若此之錯欲以為無義例則傳曰嘉之故不名書曰仲孫嘉之書曰崔氏非其罪翬溺帥師皆曰疾之稱族尊君命舍族尊夫人尊晉罪已之文炳然著明以此推之知亦非仲尼所遺也斯蓋非史策舊法故無凡例當時諸國以意而赴其或自來聘使者辭有詳略仲尼修春秋因采以示義義之所起則刋而定之不者即因而示之不皆利正也故蔡人嘉赴而經從稱季傳曰蔡人嘉之書崔氏傳亦曰且告以族明皆從其本也書司馬華孫來盟亦無他比知非大例也然則總而推之春秋之義諸侯之卿當以名氏備書於經其加貶損則直稱人若有褒異則或稱官或稱氏若內卿有貶則特稱名文不宜言魯人故異於外也若無褒無貶傳所不發者則皆就舊文或未賜族或時有詳略也推尋經文自莊公以上諸弒君者皆不書氏閔公以下皆書氏亦足明時史之異同非仲尼所皆刋也是杜解州吁不稱公子之意杜知然者正以經之所書無常比例褒則或書官或書氏貶則或稱人或去族既無定例明非舊典仲尼有所起發則刋正舊史無所褒貶則因循故策仲尼改者傳辨其由傳所不言則知無義正是史官自有詳略故耳戊申在癸未之後二十五日更盈一周則八十五日往年十二月癸未葬宋穆公則此年二月不得有戊申雖承二月之下未必是一月之日故長厯推此年二月癸亥朔十日壬申二十二日甲申不得有戊申也三月壬辰朔則十七日有戊申也此經上有二月下有夏得在三月之內不是字誤故云有日而無月僖二十八年冬下無月而經有壬申公朝于王所有日而無月經有此類故知此亦同之凡如此者有十四事夏公及宋公遇于清注遇者草次之期二國各簡其禮若道路相逄遇也清衛邑濟北東阿縣有清亭疏注正義曰曲禮下云諸侯未及期相見曰遇相見於卻地曰會然則㑹者豫謀閒地克期聚集訓上下之則制財用之節示威於衆各重其禮雖特會一國若二國以上皆稱會也遇者或未及會期或暫須相見各簡其禮若道路相逢遇然此時宋魯特會欲尋舊盟未及會期衛來告亂故二國相遇若三國簡禮亦曰遇故莊四年齊侯陳侯鄭伯遇于垂是也曲禮稱未及期而相見指此類也周禮冬見曰遇則與此别劉賈以遇者用冬遇之禮故杜難之釋例曰遇者倉卒簡儀若道路相逢遇者耳周禮諸侯冬見天子曰遇劉氏因此名以說春秋自與傳違案禮春曰朝夏曰宗秋曰覲冬曰遇此四時之名今者春秋不皆同之於禮冬見天子當是百官備物之時而云遇禮簡易經書季姬及鄫子遇于防此婦呼夫共朝豈當復用見天子之禮於理皆違是言春秋之遇與周禮冬遇異也草次猶造次造次倉卒皆迫促不暇之意宋公陳侯蔡人衛人伐鄭秋翬帥師會宋公陳侯蔡人衛人伐鄭注公子翬魯大夫不稱公子疾其固請强君以不義也諸外大夫貶皆稱人至於內大夫貶則皆去族稱名於記事之體他國可言某人而已魯之卿佐不得言魯人此所以為異也翬溺去族傳曰疾之叔孫豹則曰言違命此其例也音義翬許歸反强其丈反去起呂反下同溺乃歷反疏注正義曰案鄭伯使宛來歸祊庚寅我入祊及齊侯伐我北鄙及我師敗績然魯事皆得稱我則已之卿佐被貶亦可稱我人所以不然者凡云我者皆上有他國之辭故對他稱我魯之盟㑹他國上未有他國之文不可發例言我人故也九月衛人殺州吁于濮注州吁弒君而立未列於會故不稱君例在成十六年濮陳地水名音義濮音卜疏注正義曰春秋之世王政不行賞罰之柄不在天子殺君取國為罪雖大若已列於諸侯㑹者則不復討也其有臣子殺之即與弒君無異未必禮法當然要其時俗如是宣公殺惡取國納賂於齊以請㑹傳曰會于平州以定公位杜云篡立者諸侯既與之㑹則不得復討臣子殺之與弒君同故公與齊㑹而位定是其義也釋例又云諸侯篡立雖以會諸侯為正此列國之制也至於國內策名委質即君臣之分已定故諸殺不成君者亦與成君同義然杜前注云篡立者諸侯既與之㑹臣子殺之與弒君同則若未會諸侯臣子殺之不與弒君同似與釋例違者釋例所云諸弒不成君亦與成君同義者即莊九年齊人殺無知及此年衛人殺州吁以其未會諸侯故不書爵猶不從兩下相殺之例故云亦與成君同義若既會諸侯則臣弒稱爵則文十八年齊人弒其君商人是也曹伯負芻殺其太子而自立成十五年諸侯同盟于戚曹伯既列於會然後晉人執之十六年傳稱曹人請于晉曰若有罪則君列諸會矣是列會即成君矣此州吁未列於會故不稱君曹人之辭即是成例故云例在成十六年殺之於濮謂死於水旁也釋例土地名此濮下注云闕哀二十七年傳濮下注云濮自陳留酸棗縣受河東北經濟陰至髙平巨野縣入濟彼濮與此名同實異故杜於此不言闕直云濮陳地水名冬十有二月衛人立晉注衛人逆公子晉而立之善其得衆故不書入於衛變文以示義例在成十八年疏注正義曰成十八年傳例曰凡去其國國逆而立之曰入此公子晉去衛居郉衛人迎而立之於法正當書入宜與齊小白同文傳言書曰衛人立晉衆也是仲尼善其得衆故改常例變文以示義也傳四年春衛州吁弒桓公而立公與宋公為會將尋宿之盟未及期衛人來告亂夏公及宋人遇于清注宿盟在元年宋殤公之即位也公子馮出奔鄭鄭人欲納之及衛州吁立將修先君之怨於鄭注謂二年鄭人伐衛之怨疏注正義曰二年伐衛見經故以屬之未必往前更無怨也衛世家稱桓公十六年乃為州吁所弒則隱之二年當桓之世服䖍以先君為莊公非也何則宣公蒸夷姜生急子公納急子之妻生壽及朔朔能構兄壽能代死則是年皆長矣宣公以此年即位桓十二年卒終始二十矣雖夀之死未知何歲急子之娶當在宣初若隱之二年莊公猶在豈於父在之時已得蒸父妾生急子也史記雖多謬誤此當信然而求寵於諸侯以和其民注諸篡立者諸侯既與之會則不復討故欲求此寵音義篡初患反復扶又反下文復伐同使告於宋曰君若伐鄭以除君害注害謂宋公子馮君為主敝邑以賦與陳蔡從則衛國之願也注言舉國之賦調音義從才用反調徒弔反宋人許之於是陳蔡方睦於衛注蔡今汝南上蔡縣疏注正義曰蔡國侯爵譜云蔡姬姓文王子叔度之後也武王封之於汝南上蔡為蔡侯作亂見誅其子蔡仲成王復封之於蔡至平侯徙新蔡昭侯徙九江下蔡宣侯二十八年魯隱公之元年也昭侯子成侯十年獲麟之歲也成侯子聲侯四年春秋之傳終矣聲侯十四年卒自聲侯以下二世二十八年而楚滅蔡地理志云汝南上蔡縣故蔡國周武王弟叔度所封故宋公陳侯蔡人衛人伐鄭圍其東門五日而還公問於衆仲曰衛州吁其成乎注衆仲魯大夫對曰臣聞以德和民不聞以亂注亂謂阻兵而安忍以亂猶治絲而棼之也注絲見棼縕益所以亂音義棼扶云反亂也縕於云反夫州吁阻兵而安忍阻兵無衆安忍無親衆叛親離難以濟矣注恃兵則民殘民殘則衆叛安忍則刑過刑過則親離疏正義曰阻恃諸國之兵以求勝而征伐不巳安忍行虐事刑殺過度也夫兵猶火也弗戢將自焚也夫州吁弒其君而虐用其民於是乎不務令德而欲以亂成必不免矣音義戢莊立反秋諸侯復伐鄭宋公使來乞師注乞師不書非卿公辭之注從衆仲之言羽父請以師會之注羽父公子翬公弗許固請而行故書曰翬帥師疾之也注正義曰案元年傳邾人鄭人盟于翼公子豫請往公不許遂行彼則不書又不加貶責此公子翬之行公亦不許而書於經又加貶責者公子豫公不許私竊而行翬則强梁固請公事不獲已令其出會故以君命而書又加貶責諸侯之師敗鄭徒兵取其禾而還注時鄭不車戰州吁未能和其民厚問定君於石子注石子石碏也以州吁不安咨其父石子曰王覲為可疏正義曰於王處行覲禮此事是為可也曰何以得覲曰陳桓公方有寵於王陳衛方睦若朝陳使請必可得也厚從州吁如陳石碏使告于陳曰衛國褊小老夫耄矣無能為也此二人者實弒寡君敢即圖之注八十曰耄稱國小已老自謙以委陳使因其往就圖之晉義覲其靳反見也朝直遙反後不音者皆放此褊必淺反一音必殄反耄毛報反陳人執之而請涖于衛注請衛人自臨討之音義涖音利又音類臨也九月衛人使右宰醜涖殺州吁于濮石碏使其宰獳羊肩涖殺石厚于陳君子曰石碏純臣也惡州吁而厚與焉大義滅親其是之謂乎注子從弒君之賊國之大逆不可不除故曰大義滅親明小義則常兼子愛之音義獳奴侯反惡烏路反與焉音預衛人逆公子晉于邢冬十二月宣公即位注公子晉也音義邢音刑國名疏正義曰賊討乃立自繼前君故不待踰年也書曰衛人立晉衆也經五年春公矢魚于棠注書陳魚以示非禮也書棠譏遠地也今高平方與縣北有武唐亭魯侯觀魚臺疏注正義曰陳魚者獸獵之類謂使捕魚之人陳設取魚之備觀其取魚以為戲樂非謂既取得魚而陳列之也其實觀魚而書陳魚者國君爵位尊重非搜狩大事則不當親行公故遣陳魚而觀其捕獲主譏其陳故書陳魚以示非禮也傳曰非禮也且言遠地故知書棠譏遠地也夏四月葬衛桓公秋衛師入郕注將卑師衆但稱師此史之常也音義郕音成國名將子匠反九月考仲子之宫初獻六羽注成仲子宮安其主而祭之惠公以仲子手文娶之欲以為夫人諸侯無二嫡蓋隱公成父之志為别立宫也公問羽數故書羽婦人無諡因姓以名宫音義嫡丁歷反為别于僞反疏正義曰三年之內木主特祀於寢宫廟初成木主遷入其中設祭以安神也祭則有樂故初獻六羽初始也往前用八今乃用六也獻者奏也奏進聲樂以娛神也六羽謂六行之人秉羽舞也注正義曰考成釋詁文也言初獻六羽者謂初始而獻非在後恆用知者案宣十五年初稅畝杜云遂以為常故云初杜於此不解初義明不與彼同故春秋之經有文同事異如此之類是也注以祭文不見故辨之云成仲子宮安其主而祭之以其與獻羽連文知考謂祭以成之非謂始築宮成也又解立宮之意惠公以仲子手有夫人之文因即娶之雖不以為夫人有欲以為夫人之意禮諸侯不再娶於法無二適孟子入惠公之廟仲子無享祭之所蓋隱公成父之志為别立宮仲子以二年十二月薨四年十二月已再期矣喪畢即應入廟至此始成宮者仲子立廟本非正法喪服既終將為吉祭主無祭處始議立之故晚成也傳云始用六佾不書佾而書羽者以公問羽數故書羽也婦人法不當諡仲子無諡故因姓以名宮也立宫必書於策羽則非所當書善其復正故書之傳載衆仲之對而言公從之是其善之意也為書六羽故言考宫言其因考以獻羽也若不為羽當云立仲子之宫如立武宮焬宮然不須言考也禮雜記下云成廟則釁之路寢成則考之而不釁以廟則當釁寢則當考此廟言考者考是成就之義廟者鬼神所居祭祀以成之寢則主人所宅飲食以成之雜記注云路寢者生人所居不釁者不神之也考之者設盛食以落之是也廟成釁之者尊而神之蓋木主未入之前已行釁禮也案雜記釁廟之禮云祝宗人宰夫雍人皆爵升純衣雍人拭羊宗人祝之宰夫北靣于碑南東上雍人舉羊升屋自中中屋南靣刲羊血流于前乃降門夾室皆用雞先門而後夾室其衈皆於屋下割雞門當門夾室中室有司皆鄉室而立門則有司當門北靣既事宗人告事畢乃皆退是釁廟之禮此言考宮獻羽自為主已入廟則祭以成之非釁禮與彼異也故公羊傳曰考宮者何考猶入室也始祭仲子也是謂祭為考也服䖍云宮廟初成祭之名為考將納仲子之主故考成以致其五祀之神以堅之其意謂考即是釁也案雜記釁廟之禮止有雞羊既不用樂何由獻羽言將納仲子之主則是仍未入宫然則作樂獻羽敬事何神考仲子之宮唯當祭仲子耳又安得致五祀之神乎蘇氏云不稱夫人宮者桓宮僖宮不言公則仲子例不合稱夫人宫也不稱廟而言宫者於經例周公稱大廟羣公稱宫故仲子依例稱宫也若然案文十三年大室屋壞大廟稱室者謂大廟之室屋壞耳若傳文則大廟或稱宮即大宮之椽是也羣公或稱廟即同宗於祖廟同族於禰廟是也邾人鄭人伐宋注邾主兵故序鄭上疏注正義曰天下有道諸侯不得專行征伐春秋之時專行征伐以其不禀王命故以主兵為首雖小國主兵即序於大國之上欲見伐由其國善惡所歸故也雖大夫為主國君從之亦序主兵於上僖二十七年楚人陳侯蔡侯鄭伯許男圍宋注云傳言楚子使子玉去宋經書人者恥不得志以微者告猶序諸侯之上楚主兵故是微人主兵亦序國君之上史策之常法也螟注無傳蟲食苗心者為災故書音義螟亡丁反疏注正義曰釋蟲云食苗心螟食葉食節賊食根蟊舍人曰食苗心者名螟言冥冥然難知也李巡曰食禾心為螟言其姦冥冥難知也食禾葉者言其假貣無厭故曰也食其節者言其貪狠故曰賊也食其根者言其稅取萬民財貨故曰蟊也孫炎曰皆政貪所致因以為名郭璞曰分别蟲啖食禾所在之名耳李巡孫炎以政致為名舍人郭璞以食處為名陸璣疏云舊說螟蟊賊一種蟲也如言寇賊姦宄內外言之耳故犍為文學曰此四種蟲皆蝗也實不同故分别釋之然則螟非以蟲名以食苗之處為名耳冬十有二月辛巳公子彄卒注大夫書卒不書葬葬者臣子之事非公家所及音義彄若侯反疏注正義曰檀弓下云君於大夫將葬弔於宮君親弔之而不書者弔喪問疾人道之常假有得失不足褒貶如此小事例皆不書葬若國家所營則亦不可不書大夫之葬皆臣子自為非公家所及事不關國無以得書葬也他國之君書葬者遣使往㑹須書君命故耳宋人伐鄭圍長葛注潁州長社縣北有長葛城傳五年春公將如棠觀魚者臧僖伯諫曰凡物不足以講大事注臧僖伯公子彄也僖諡也大事祀與戎音義觀魚者本亦作漁者其材不足以備器用則君不舉焉注材謂皮革齒牙骨角毛羽也器用軍國之器君將納民於軌物者也故講事以度軌量謂之軌取材以章物采謂之物不軌不物謂之亂政亂政亟行所以敗也注言器用衆物不入法度則為不軌不物亂敗之所起音義度待洛反一音如字亟欺冀反數也疏正義曰說文云魚捕魚也然則捕魚謂之魚天官漁人掌以時漁為梁凡漁者掌其政令是謂捕魚為魚魚者猶言獵者也凡物不足以講大事者物謂事物旌旗車服之屬若其為教戰祭祀等大事故布設陳列則可如其細碎盤遊雖陳其物不堪足以講習大事止謂不為大事而陳此物故云不足以講大事也其材不足以備器用者材謂皮革齒牙之屬若其為飾器用故狩獵取材則可如其因遊宴戲樂所得之材不堪足以備飾器用止謂不為器用而取此材故云不足以備器用也人君一國之主在民之上當直已而行之以法驅民而納之於善故云人君將納民於軌物者也言當為軌為物納民於其中也既言民歸軌物更解軌物之名故講習大事以凖度軌法度量謂之為軌凖度軌量既謂習戰治兵祭祀之屬是也取鳥獸之材以章明物色采飾謂之為物章明物采即取材以飾軍國之器是也劉炫云捕魚獵獸其事相類此諌大意言人君可觀獵獸不可觀捕魚凡物者廣言諸物鳥獸魚鱉之類也材謂所有皮革毛羽之類也器謂車馬兵甲軍國所用之物也凡此諸物捕之不足以講習兵事其材不足以充備器用如此者則人君不親舉焉其意言獵之坐作進退可以教戰陳獸之齒牙皮革足以充器用人君可以觀之捕魚不足以教戰陳鱗甲不足以為器用人君不宜觀之人君以下云云同今若人君所行不得其軌舉動不順器服不當其物上下無章如是則謂之荒亂之政也亂政數行國家之所以禍敗也其意言魚非講事是不軌材不充用是不物今君觀魚是為亂國之政禍敗之本故不用使公行也事度軌量正謂順時狩獵以教習戎事也材章物采正謂取其皮革以修造器物也下云四時田獵治兵振旅以習威儀覆此講事也肉不登俎材不登器則公不射覆此章物也别言川澤之實非君所及指言不可觀魚辭有首引自相配成也注正義曰僖伯名彄字子臧世本云孝公之子即此冬書公子彄卒是也諡法小心畏忌曰僖是僖為諡也諸侯之子稱公子公子之子稱公孫公孫之子不得祖諸侯乃以王父之字為氏計僖伯之孫始得以臧為氏今於僖伯之上已加臧者蓋以僖伯是臧氏之祖傳家追言之也成十三年傳曰國之大事在祀與戎故知大事祀與戎也必知兼祀者以下云鳥獸之肉不登於俎故也劉炫云田獵止教戎而言祀者獵狩主以祭祀故并祀言之下注云俎祭宗廟器見此意也車馬旌旗衣服刀劍無不皆有法度器用衆物不入法度廣言之也器不當法用非其物則為不軌不物政不在君則亂敗之所起也故春搜夏苗秋獮冬狩注搜索擇取不孕者苗為苗除害也獮殺也以殺為名順秋氣也狩圍守也冬物畢成獲則取之無所擇也音義搜所求反索也獮息淺反說文作􅸦穀梁傳云春曰田秋曰搜狩手又反索所百反孕以證反為苗于僞反疏注正義曰爾雅釋天四時之獵名與此同說者皆如此注故杜依用之周禮大司馬職中春教振旅遂以搜田中夏教茇舍遂以苗田中秋教治兵遂以獮田中冬教大閲遂以狩田其名亦與此同鄭𤣥解苗田與此小異言擇取不孕任者若治苗去不秀實者孫炎亦然桓四年公羊傳曰春曰苗秋曰搜冬曰狩三名既與禮異又復夏時不田穀梁傳曰四時之田皆為宗廟之事也春曰田夏曰苗秋曰搜冬曰狩皆與禮異者良由微言既絶曲辨妄生丘明親受聖師故獨與禮合漢代古學不行明帝集諸學士作白虎通義因穀梁之文為之生說曰王者諸侯所以田獵何為苗除害上以共宗廟下以簡集士衆也春謂之田何春歲之本與本名而言之也夏謂之苗何擇其懷任者也秋謂之搜何搜索肥者也冬謂之狩何守地而取之也四時之田總名為田何為田除害也案苗非懷任之名何云擇去懷任秋獸盡皆不瘦何云搜索取肥雖名通義義不通也故先儒皆依周禮左傳爾雅之文而為之說其名亦有意焉雖復春獵獲則取之不能擇取不孕夏獵所取無多不能為苗除害為因時異而變文耳謂之獵者蔡雍月令章句云獵者捷取之名也皆於農隙以講事也注各隨時事之間音義隙去逆反疏注正義曰隙訓間也四仲之月自是常期就其月中簡選間日雖則農月必有間時故曰隨時事之間也仲冬農之最隙故大備禮也三年而治兵入而振旅注雖四時講武猶復三年而大習出曰治兵始治其事入曰振旅治兵禮畢整衆而還振整也旅衆也音義振之愼反整也復扶又反下同疏注正義曰雖每年常四時講武猶復三年而一大習猶如四時常祀三年而復為禘祭意相類也出曰治兵者以其初出始治其事也入曰振旅者以治兵禮畢整衆而還振訊是整理之義故振為整也旅衆也釋詁文治兵振旅坐作進退其禮皆同所異者唯長幼先後耳釋天云出為治兵尚威武也入為振旅反尊卑也孫炎曰出則幼賤在前貴勇力也入則尊老在前復常法也莊八年穀梁傳曰出曰治兵習戰也入曰振旅習戰也公羊傳曰出曰治兵入曰振旅其禮一也皆習戰也是其禮同也何休公羊為出曰祠兵休云殺牲饗士卒鄭𤣥詩箋引公羊亦作治兵是其所見本異也此治兵振旅亦四時教之但於三年大習詳其文耳周禮春教振旅秋教治兵者四時教民各以其宜春即止兵收衆專心於農秋即繕甲厲兵將威不軌故異其文耳歸而飲至以數軍實注飲於廟以數車徒器械及所獲也音義數所主反注同械户戒反疏注正義曰桓二年傳例曰凡公行告于宗廟反行飲至彼飲至在廟知此言飲至亦飲於廟也軍之資實唯有車徒器械獵則有所獲詩序車攻美宣王修車馬備器械因田獵而選車徒故知數軍實者數車徒器械及所獲也說文云械器之總名虞喜云器械謂鎧甲兜鍪也宣十二年傳言楚國無日不計軍實而申警之襄二十四年傳曰齊社搜軍實使客觀之二注並云軍實不言車徒及所獲者彼無獵事故不言也昭文章注車服旌旗疏注正義曰周禮巾車職曰革路建大白以即戎木路建大麾以田司服職曰凡兵事韋辨服凡甸冠辨服鄭𤣥云甸田獵也計田獵當乘木路服冠辨但三年治兵乃習兵大禮不宜乘田車服田服天子蓋乘革路服韋辨也在軍君臣同服公卿以下蓋亦乘兵車服兵服也其旌旗則尊卑異建治兵之禮為辨旗物必不建大白大麾大司馬職曰中秋教治兵辨旗物之用王載大常諸侯載旗軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟遂以獮田鄭𤣥云軍吏諸軍師也師都遂大夫也鄉遂鄉大夫也或載旜或載物衆屬軍吏無所將也郊謂鄉遂之州長縣正以下也野謂公邑大夫載旐者以其將羡卒也百官卿大夫也載旟者以其屬衛王也凡旌旗有軍衆者畫異物無者帛而已然則治兵旌旗當如司馬職文也案司常職云及國之大閲贊司馬頒旗物王建大常諸侯建旗孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐道車載旞斿車載旌計大閲治兵俱是教戰而旌旗之物所建不同者鄭𤣥云凡頒旗物以出軍之旗則如秋以尊卑之常則如冬大閲備軍禮而旌旗不如出師之時空辟實然則大閲所建尊卑之常治兵所建出軍之禮此三年治兵與秋教治兵其名既同建當不異故服䖍解此亦引司馬職文明是旌旗所建用秋辨旗物之法按大司馬職教治兵王載大常所以巾車云大麾以田又云大白以即戎者先儒以為王田春夏則大麾秋冬則大常旌旗所用雖如治兵之時然王若親軍則建大白明貴賤辨等列注等列行伍音義辨如字又方免反别也行户郎反順少長注出則少者在前還則在後所謂順也音義少詩照反注皆同長丁丈反下注同習威儀也鳥獸之肉不登於俎注俎祭宗廟器音義鳥獸之肉一本作其肉俎莊呂反皮革齒牙骨角毛羽不登於器注謂以飾法度之器則公不射古之制也疏正義曰說文云革獸皮治去其毛革更之然則有毛為皮去毛為革周禮掌皮秋斂皮冬斂革以其少異故别時斂之散文則皮革通也頷上大齒謂之為牙鳥翼長毛謂之為羽齒牙毛羽各自小異故歷言之也登於俎謂升俎以共祭登於器謂在器以為飾諸器之飾有用此材者注正義曰饗燕之饌莫不用俎獨言宗廟器者明田獵取禽主為祭祀若止共燕食則公亦不為下注云法度之器其義亦然非法之器公亦不舉登訓為升服䖍以上登為升下登為成二登不容異訓且云不成於器為不辭矣又器以此物為飾寧復待之乃成也周禮漁人凡祭祀共其魚之鮮薧特牲少牢祭祀之禮皆有魚為俎實肉登於俎公則射之而以觀魚為非禮者此言不登於俎者謂妄出遊獵雖取鳥獸元不為祭祀不登於器亦謂盤遊元不為取材以飾器物今公觀魚乃是遊戲故以非之然登俎登器之物雖君所親至於庶羞雜物細小之倫雖為祭祀亦君不射禮水土之品籩豆之物苟可薦者莫不咸在豈皆公親之也劉炫云此言田獵之時小鳥小獸則公不射雖講事而田尚不射小物况魚非講事不宜輒舉不謂登俎之物皆公所親射祭祀水土云云同若夫山林川澤之實器用之資皂隸之事官司之守非君所及也注士臣皂皂臣輿輿臣隸言取此雜猥之物以資器備是小臣有司之職非諸侯之所親也音義射食亦反皂才早反輿音餘猥烏罪反疏正義曰山林之實謂材木樵薪之類川澤之實謂菱芡魚蟹之屬此皆器用之所資須賤人之所守掌非人君所宜親及之也此雖意諌觀魚而廣言小事故注云取此雜猥之物以資器備非諸侯所親也雜猥謂諸雜猥碎也資謂器之資財待此而備器之所用及所盛皆是也穀梁傳曰禮尊不親小事卑不尸大功魚卑者之事也公觀之非正與此同也若然月令季冬命漁師始漁天子親往嘗魚先薦寢廟彼禮天子親往此譏公者彼以時魚潔美取之以薦宗廟特重其事天子親行意在敬事鬼神非欲以為戲樂隱公觀魚志在遊戲故譏之也公曰吾將略地焉注孫辭以略地略總攝巡行之名傳曰東略之不知西則否矣音義行下孟反疏注正義曰僖九年傳曰東略之不知西則否矣又十六年傳曰謀鄫且東略也略者巡行之名也公曰吾將略地焉言欲案行邊竟是孫辭也若國境之內不應譏公遠遊且言遠地明是他竟也釋例曰舊說棠魯地據傳公辭欲略地則非魯竟也釋例土地名棠在魯部內云本宋地蓋宋魯之界上也遂往陳魚而觀之注陳設張也公大設捕魚之備而觀之音義捕音步一音搏僖伯稱疾不從書曰公矢魚于棠非禮也且言遠地也注矢亦陳也棠實他竟故曰遠地音義從才用反竟音境疏注正義曰釋詁文矢陳也曲沃莊伯以鄭人邢人伐翼注曲沃晉别封成師之邑在河東聞喜縣莊伯成師子也翼晉舊都在平陽絳邑縣東邢國在廣平襄國縣音義沃烏毒反疏注正義曰晉國侯爵譜云姬姓武王子唐叔虞之後也成王滅唐而封之今大原晉陽縣是也燮父改之曰晉燮父孫成侯徙都曲沃今河東聞喜縣是也穆侯徙都絳鄂侯二年魯隱公之元年也定公三十一年獲麟之歲也出公八年而春秋之傳終矣出公十七年卒自出公以下五世八十二年而韓趙魏滅晉也地理志云河東聞喜縣故曲沃也武帝元鼎六年行過改名應邵曰武帝於此聞南越破改曰聞喜志又曰趙國襄國縣故邢國然則於漢屬趙國於晉屬廣平王使尹氏武氏助之翼侯奔隨注尹氏武氏皆周世族大夫也晉內相攻伐不告亂故不書傳具其事為後晉事張本曲沃及翼本末見桓二年隨晉地音義傳具一本作傳見見賢遍反夏葬衛桓公衛亂是以緩注有州吁之亂十四月乃葬傳明其非慢也四月鄭人侵衛牧注牧衛邑經書夏四月葬衛桓公今傳直言夏而更以四月附鄭人侵衛牧者於下事宜得月以明事之先後故不復備舉經文三年君氏卒其義亦同他皆放此音義牧州牧之牧徐音目以報東門之役注東門役在四年衛人以燕師伐鄭注南燕國今東郡燕縣音義燕於賢反國名疏注正義曰燕有二國一稱北燕故此注言南燕以别之世本燕國姞姓地理志東郡燕縣南燕國姞姓黃帝之後也小國無世家不知其君號諡唯莊二十年燕仲父見傳耳鄭祭足原繁泄駕以三軍軍其前使曼伯與子元潛軍軍其後燕人畏鄭三軍而不虞制人六月鄭二公子以制人敗燕師于北制注二公子曼伯子元也北制鄭邑今河南成臯縣也一名虎牢音義泄息列反曼音萬君子曰不備不虞不可以師曲沃叛王秋王命虢公伐曲沃而立哀侯于翼注春翼侯奔隨故立其子光衛之亂也郕人侵衛故衛師入郕注郕國也東平剛父縣西南有郕鄉音義父音甫疏注正義曰史記管蔡世家稱郕叔武文王子武王之母弟後世無所見既無世家不知其君號諡唯文十二年郕大子朱儒奔魯書曰郕伯來奔見於經傳則郕國伯爵也九月考仲子之宮將萬焉注萬舞也疏注正義曰案公羊傳曰萬者何干舞也籥者何羽舞也則萬與羽不同今傳云將萬焉問羽數於衆仲是萬與羽為一者萬羽之異自是公羊之說今杜直云萬舞也則萬是舞之大名也何休云所以仲子之廟唯有羽舞無干舞者婦人無武事獨奏文樂也劉炫云公羊傳曰萬者云云籥者云云羽者為文萬者為武武則左執朱千右秉玉戚文則左執籥右秉翟此傳將萬問羽即似萬羽同者以當此時萬羽俱作但將萬而問羽數非謂羽即萬也經直書羽者與傳互見之公問羽數於衆仲注問執羽人數對曰天子用八注八八六十四人諸侯用六注六六三十六人疏注正義曰何休說如此服䖍以用六為六八四十八大夫四為四八三十二士二為二八十六杜以舞勢宜方行列既減即每行人數亦宜減故同何說也或以襄十一年鄭人賂晉侯以女樂二八為二佾之樂知自上及下行皆八人斯不然矣彼傳見晉侯減樂之半以賜魏絳因歌鐘二肆遂言女樂二八為下半樂張本耳非以二八為二佾若二八即是二佾鄭人豈以二佾之樂賂晉侯晉侯豈以一佾之樂賜魏絳大夫四注四四十六人士二注二二四人士有功賜用樂夫舞所以節八音而行八風注八音金石絲竹匏土革木也八風八方之風也以八音之器播八方之風手之舞之足之蹈之節其制而序其情音義八音金鐘石磬絲琴瑟竹簫管土塤木柷敔匏笙革鼓也八方之風謂東方谷風東南清明風南方凱風西南凉風西方閶闔風西北不周風北方廣莫風東北方融風匏白交反蹈徒報反疏正義曰舞為樂主音逐舞節八音皆奏而舞曲齊之故舞所以節八音也八方風氣寒暑不同樂能調陰陽和節氣八方風氣由舞而行故舞所以行八風也注正義曰八音為金石土革絲木匏竹周禮大師職文也鄭𤣥云金鐘鏄也石磬也土塤也革鼓鼗也絲琴瑟也木柷敔也匏笙也竹管蕭也八風八方之風者服䖍以為八卦之風乾音石其風不周坎音革其風廣莫艮音匏其風融震音竹其風明庶巽音木其風清明離音絲其風景坤音土其風凉兑音金其風閶闔易緯通卦驗云立春調風至春分明庶風至立夏清明風至夏至景風至立秋凉風至秋分閶闔風至立冬不周風至冬至廣莫風至風體一也逐天氣隨八節而為之立名耳調與融一風二名昭十八年傳曰是謂融風是其調融同也沈氏云案樂緯云坎主冬至樂用管艮主立春樂用塤震主春分樂用鼓巽主立夏樂用笙離主夏至樂用絃坤主立秋樂用磬兑主秋分樂用鐘乾主立冬樂用柷敔此八方之音既有二說未知孰是故兩存焉更說制樂之本節音行風之意以八音之器宣播八方之風使人用手以舞之用足以蹈之節其禮制使不荒淫次序人情使不蘊結也蟋蟀詩曰無已大康職思其居是節其制也舜歌南風曰南風之時兮可以阜吾人之財兮南風之薰兮可以解吾人之慍兮是序其情也故自八以下注唯天子得盡物數故以八為列諸侯則不敢用八公從之於是初獻六羽始用六佾也注魯惟文王周公廟得用八而他公遂因仍僭而用之今隱公特立此婦人之廟詳問衆仲因明大典故傳亦因言始用六佾其後季氏舞八佾於庭知惟在仲子廟用六音義佾音逸僭子念反疏注正義曰襄十二年傳曰魯為諸姬臨於周廟是魯立文王之廟也文王天子自然用八禮記祭統曰昔者周公旦有勳勞於天下成王康王賜之以重祭朱干玉戚以舞大武八佾以舞大夏此天子之樂也康周公故以賜魯明堂位曰命魯公世世祀周公以天子之禮樂是周公之廟用八也傳曰始用六佾則知以前用八何休云僭齊也下效上之辭魯之僭效必有所因故本其僭之所由言由文王周公廟用八佾他公之廟遂因仍僭而用之今隱公詳問衆仲衆仲因明大典公從其言於仲子之廟初獻六羽故傳亦因言始用六佾謂仲子之廟用六佾他公則仍用八也至襄昭之時魯猶皆亦用八故昭二十五年公羊傳稱昭公謂子家駒曰吾何僭哉答曰朱干玉戚以舞大夏八佾以舞大武此皆天子之禮也是昭公之時僭用八也此減從正禮尚書於經若更僭非禮無容不書自此之後不書僭用八佾知他廟僭而不改故杜自明其證其後季氏舞八佾於庭知唯在仲子廟用六也宋人取邾田邾人告於鄭曰請君釋憾於宋敝邑為道注釋四年再見伐之恨音義道音導本亦作導鄭人以王師會之注王師不書不以告也伐宋入其郛以報東門之役注郛郭也東門役在四年音義郛方夫反下同宋人使來告命注告命策書公聞其入郛也將救之問於使者曰師何及對曰未及國注忿公知而故問責窮辭音義使所吏反下同公怒乃止辭使者曰君命寡人同恤社稷之難今問諸使者曰師未及國非寡人之所敢知也注為七年公伐邾傳冬十二月辛巳臧僖伯卒公曰叔父有憾於寡人注諸侯稱同姓大夫長曰伯父少曰叔父有恨恨諌觀魚不聽疏注正義曰詩伐木篇毛傳曰天子謂同姓諸侯諸侯謂同姓大夫皆曰父異姓則稱舅覲禮載天子呼諸侯之稱曰同姓大國則曰伯父其異姓則曰伯舅同姓小邦則曰叔父其異姓則曰叔舅然則諸侯之國有大小之異大夫無地之大小明以年之長少為異莊十四年傳稱鄭厲公謂原繁為伯父禮記祭統稱衛莊公呼孔悝為叔舅諸侯呼異姓大夫為伯舅同姓大夫為叔父者雖則無文明亦然矣僖伯者孝公之子惠公之弟惠公立四十六年而薨則子臧此時年非幼少呼曰叔父者是隱公之稱叔父也此注自言呼臣之大法耳寡人弗敢忘葬之加一等注加命服之等宋人伐鄭圍長葛以報入郛之役也春秋左傳注疏卷二春秋左氏傳注疏卷二考證三年春王二月己巳日有食之王應麟困學紀聞曰春秋日食三十六有甲乙者三十四厯家推驗精者不過二十六唐一行得二十七衛朴獨得三十五獨莊十八年三月古今算不入食法君氏卒臣浩按君氏公羊穀梁皆作尹氏故解以為世卿左氏經作君氏故解以為隱公母今春秋刋本經文多從左氏惟此條及莒子伯從二傳以宋胡安國本不從左氏也傳王二于虢左傳補注曰洪氏言左傳議論遣辭有害理者此及王叛王孫蘇以君于臣而言二與叛皆於名分不正今按下云交質交惡並稱周鄭又云結二國之信無復君臣之辨記事者昧於倫理矣臣照按左氏傳記事之書也直書其事而時勢與義理並著時人皆曰王二于虢則書二時人皆曰王叛則書叛傳之千古知孔子之不得不作春秋也若以為左氏之意謂王二王叛則豈有親炙于孔子之丘明而昧于倫理若是乎傳君子曰左傳補注曰凡傳中所引君子曰義皆膚淺左氏之陋見也臣照按君子之稱或以德或以位左氏所為君子曰者謂其時所謂君子其人者皆如是云云也非左氏意以如是云云者乃可稱君子之論也後儒每忘却左氏之書以紀事而以是為左氏論事往往訿謷之亦惑矣傳蘋蘩蘊藻之菜疏陸璣毛詩義疏云臣浩按此陸璣作毛詩義疏者非陸士衡也刋本作陸機誤今改正傳宋穆公卒疏是知穆公命立殤公是為義也監本脫立字今增莒人伐杞疏以雍丘淳于雖郡别而境連也臣召南按雍丘漢晉俱屬陳留今開封府之杞縣也淳于漢屬北海晉屬東莞今青州府安邱縣之淳于故城也二地相去千有餘里不知孔疏何以謂郡别而境連傳王覲為可臣召南按春秋之初諸侯猶知王室與宣成以後又逈不同矣其事皆賴左傳記其大略傳陳桓公方有寵于王困學紀聞曰生而稱諡紀事之失也臣照按史記得楚懷王孫心民間為人牧羊立以為楚懷王古且有以諡為位號者矣大抵古人朴質若陳桓公方有寵于王云者謂之由後書前而非生而稱諡也春公矢魚于棠葉夢得傳曰矢射也古者天子諸侯將祭必親射牲因而獲禽亦以共祭春獻魚之節也公將以盤遊託射牲以祭焉以公為荒矣困學紀聞曰朱文公云據傳言則君不射是以弓矢射之如漢武親射蛟江中之類今按淮南時則訓季冬命漁師始漁天子親往射魚則左氏陳魚之說非矣臣召南按公羊穀梁經皆作觀魚惟左氏經作矢魚而傳作陳魚而觀之則以射魚解矢魚亦聊可備一說耳公子彄卒注大夫書卒不書葬監本作不葬脫書字臣浩按東萊集解引注有書字今補傳君將納民於軌物疏故不用使公行也推尋文義應作不欲使公行也傳故春搜夏苗秋獮冬狩注疏臣浩按周禮鄭注夏田為苗與此異而賈疏以搜取不孕任者解搜以若治苗去不秀實者解苗終覺牽合不若杜以為苗除害解苗也傳翼侯奔隨注隨晉地臣召南按杜注某國某地必有所為如此文恐涉於近楚之隨國也後士會食邑於隨亦曰隨會傳衛人以燕師伐鄭疏唯莊二十年燕仲父見傳耳監本二十下脫年字今增傳諸侯用六疏困學紀聞曰服杜之說不同宋太常傅隆以杜注為非謂八音克諧然後成樂故必以八為列隆殺以兩減其二列耳杜以為一列又減二人至士止餘四人豈復成樂劉原父謂士無舞特牲少牢皆士禮無用樂舞之儀臣召南按服杜之是非誠難懸斷至衆仲明言士二劉氏必執儀禮駁之非通論也春秋左氏傳注疏卷二考證
