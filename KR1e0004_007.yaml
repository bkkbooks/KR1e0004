body:
  text: 春秋左傳注疏卷七起荘公元年盡十年晉杜氏注唐陸德明音義唐孔穎達疏莊公音義陸曰莊公名同桓公子母文姜諡法勝敵克亂曰莊疏正義曰魯世家云莊公名同桓公之子文姜所生即桓六年子同生者也以莊王四年即位諡法勝敵克壯曰荘是嵗嵗在鶉火經元年春王正月疏正義曰此月無事而空書月者荘雖不即君位而亦改元朝廟與民更始史書其事見此月公宜即位而父弑母出不忍即位故空書其文閔僖亦然三月夫人孫于齊注夫人荘公母也魯人責之故出奔内諱奔謂之孫猶孫讓而去音義孫本亦作遜音同注及傳同疏注正義曰夫人孫意傳文不明故云魯人責之蓋責其訴公於齊侯而使公見殺故慙懼而出奔也公羊傳曰孫者何孫猶孫也内諱奔謂之孫穀梁傳曰孫之為言猶孫也諱奔也杜用彼為說昔帝堯孫位以讓虞舜故假彼美事而為之名猶孫讓而去釋例曰使若不為臣子所逐自孫位而去者夏單伯送王姬注無傳單伯天子卿也單采地伯爵也王將嫁女于齊既命魯為主故單伯送女不稱使也王姬不稱字以王為尊且别於内女也天子嫁女於諸侯使同姓諸侯主之不親昏尊卑不敵音義單音善采七代反别彼列反疏注正義曰檢經上下公卿書爵大夫書字單伯書爵故為卿也單者天子畿内地名人君賜臣以邑令采取賦税謂之采地禮運曰諸侯有國以處其子孫大夫有采以處其子孫是謂食邑為采地單氏世仕王朝此及文公之世皆云單伯成公以下常稱單子知伯子皆爵也此時稱伯後降為子耳又解不稱王使之意王於時將遣魯主昏必先有命豈得未嘗命魯徑送女來故知王已命魯為主魯巳承受王命單伯送女付魯而已不復重宣王命故不稱使也十一年王姬不云王使送者為送者微也以姬繋王不稱女字以王為尊故繋之於王且以别於内女内女則以字配姓謂之伯姬是也公羊傳曰使我主之曷為使我主之天子嫁女于諸侯必使諸侯同姓者主之諸侯嫁女于大夫必使大夫同姓者主之所以然者昏之行禮必賔主相敵天子於諸侯諸侯於大夫不親昏者尊卑不敵故也二王之後雖王所賔客示崇先代而已不得即與王敵嫁於二王之後亦使諸侯主之秦漢以來使三公主之呼為公主秋築王姬之館于外注公在諒闇慮齊侯當親迎不忍便以禮接於廟又不敢逆王命故築舍於外音義諒音梁又音亮迎魚敬反疏注正義曰穀梁傳曰築之外變之正也仇讐之人非所以接昏姻也衰麻非所以接弁冕也其意言公與齊為讐又身有重服不得與齊侯為禮故築于外也左氏先儒亦用此為説杜案傳文稱請以彭生除之齊人雖為殺彭生心實讐齊但不敢逆王命故以諒闇為辭故築館于外杜謂諸侯之喪既葬則衰麻除矣不得以喪服為言也若讐不除服未釋則諸侯之國同姓多矣天王不應强使魯侯冒斬衰接父讐與之行吉禮也以此益明杜諒闇之言為得其實徒以昏姻吉禮行事在廟公在諒闇之内慮齊侯當來親迎不可便以全吉之禮接賔於廟又讐除服釋不敢逆王命辭主昏故築舍於外使齊侯從外迎之冬十月乙亥陳侯林卒注無傳未同盟而赴以名王使榮叔來錫桓公命注無傳榮叔周大夫榮氏叔字錫賜也追命桓公褒稱其徳若昭七年王追命衞襄之比音義比必利反疏注正義曰公羊傳曰錫者何賜也命者何加我服也又詩唐風無衣之篇晉人為其君請命於天子之使以無衣為辭則王錫諸侯當有服也傳稱王賜晉惠公命受玉惰則王賜又有玉也但賜諸侯以玉者欲使執而朝覲所以合瑞今追命桓公若追命衞襄之比止應褒稱其徳賜之策書或當有服以表尊卑不復合瑞未必有玉也釋例曰天子錫命其詳未聞諸侯或即位而見錫或歴年乃加錫或已薨而追錫魯桓薨後見錫則亦衞襄之比也魯文即位見錫則亦晉惠之比也魯成八年齊靈二十三年乃見錫随恩所加得失存乎其事言存乎其事者觀其錫之早晚知恩之厚薄觀其人之善惡知事之得失故傳不復顯言其是非也杜於追命衞襄之下注云命如今之哀䇿魏晉以來唯天子崩乃有哀䇿將葬於是遣奠讀之陳大行功徳叙臣子哀情非此類也人臣之喪不作哀䇿良臣既卒或贈之以官褒德叙哀載之於䇿將葬賜其家以告柩如今哀䇿蓋此謂也王姬歸于齊注無傳不書逆公不與接疏注正義曰成九年伯姬歸于宋杜云宋不使卿逆非禮以逆者非卿故不書此云公不與接者杜意以公不與接雖卿亦不書也所以知者十一年齊侯來逆共姬而經不書故也又嫁伯姬于宋魯與宋無故此時有故知不與接也春秋之例送女不書者取受我而厚之此單伯書者為送至於魯不至於齊故也齊師遷紀郱鄑郚注無傳齊欲滅紀故徙其三邑之民而取其地郱在東莞臨朐縣東南郚在朱虛縣東南北海都昌縣西有訾城音義郱蒲丁反鄑子靳反郚音吾朐其俱反訾子斯反疏注正義曰齊人遷此三邑非三邑之人自遷也故知齊欲滅紀故徙其三邑之民而取其地也蘇氏云直取其地不取其民故云遷不云取不言所往之處者志在去之而已非欲安存其人故與宋人遷宿文同其文異於郉遷也釋例曰郉遷于夷儀則以自遷為文宋人遷宿齊人遷陽則以宋齊為文各從彼此所遷之實記注之常辭亦非例也郱在東莞言郡郚在朱虛不言郡者釋例土地名朱虛亦屬東莞使之蒙上郡傳元年春不稱即位文姜出故也注文姜與桓俱行而桓為齊所殺故不敢還莊公父弑母出故不忍行即位之禮據文姜未還故傳稱文姜出也姜於是感公意而還不書不告廟音義父弑音試一音如字疏注正義曰不稱即位為文姜出故也則即位之日文姜未還故知莊公以父弑母出不忍行其即位之禮也經書三月夫人孫于齊則是夫人來而復去故知文姜於是感公意而還也三月以來經傳皆無夫人還事故解之還不書不告廟釋例曰文姜之身終始七如齊再如莒皆以淫行書行而不書反則元年之還亦不告廟推此可知也公羊傳曰夫人固在齊矣其言孫于齊何念母也正月以存君念母以首事穀梁傳曰接練時錄母之變始念之也其意言文姜往年如齊至此年三月猶尚不反三月練祭念及其母乃書其出奔非三月始從魯去也左氏先儒皆用此説杜不然者史之所書據實而錄未有虛書其事者也夫人若遂不還則孫已久矣何故至是三月始言孫于齊乎公若念及於母自可迎使來歸何以反書其孫豈莊公召命史官使書其母孫乎又禮三年之喪期月而練桓公以往年四月薨至今年三月未得一期何故已得為練而云接練錄變存君念母也若以經無還文即言留齊不反則自是以後亦無還文二年夫人㑹齊侯于禚豈復自齊㑹之哉以此知三月始從魯去也三月夫人孫于齊不稱姜氏絶不為親禮也注姜氏齊姓於文姜之義宜與齊絶而復奔齊故於其奔去姜氏以示義音義復扶又反去起呂反疏注正義曰文姜終始皆稱姜氏唯此一文獨異故傳解其意云不稱姜氏絶不為親言於夫人之義宜與齊絶不復為親也姜氏者齊之姓也禮婦人在家則天父出嫁則天夫為夫斬衰三年為兄大功九月今兄殺已夫於文姜之義宜與齊絶姜意不與齊絶而復奔之故於其奔也特去姜氏去姜氏者若言夫人不是齊女不姓姜氏以示應絶之義應絶不絶所以刺文姜也傳言禮者為夫絶兄禮之意也公羊傳曰夫人何以不稱姜氏貶曷為貶與弑公也其與弑公奈何夫人譖公於齊侯公曰同非吾子齊侯之子也齊侯怒使公子彭生搚幹而殺之穀梁傳亦云不言氏姓貶之也左氏先儒取二傳為説言傳稱絶不為親禮也謂莊公絶母不復以之為親為父絶母得禮尊父之義故曰禮也杜不然者釋例曰文姜與公如齊以淫見讁懼而歸訴於襄公襄公殺公而委罪於彭生弑公之謀姜所不與疑懼而自留於齊莊公感其不反以闕即位之禮故姜氐自齊而還魯魯人探情以責之故復出奔夫子以為姜氏罪不與弑於莊公之義當以母淫於齊而絶其齊親内全母子之道故經不稱姜氏傳曰絶不為親禮也明絶之於齊也文姜稱夫人明母義存也哀姜外淫故孫稱姜氏明義異也觀此解之意夫人宜與齊絶釋例之文言莊公宜與齊絶者夫人猶尚宜絶莊公固宜絶矣先儒謂莊公宜與母絶杜意莊公宜與齊絶故偏據莊公為文所以非舊説耳其實夫人及公俱當與齊絶也秋築王姬之館于外為外禮也注齊彊魯弱又委罪於彭生魯不能讐齊然喪制未闋故異其禮得禮之變音義未闋苦穴反疏注正義曰傳不直言禮而云為外禮者築之是常未足褒美正為築之于外是應變之禮故解其意齊彊魯弱又委罪彭生魯既不能讐齊雖内實深讐外若無怨既不敢辭王命又不欲見齊侯因其喪制未闋故異其禮為之於外是其得禮之變也樂息為闋則闋訓為息也未闋言其未止息也王姬之館必築之者公羊傳曰主王姬者必為之改築於路寢則不可小寢則嫌羣公子之舍則以卑矣其道必為之改築者也穀梁傳曰於廟則己尊於寢則己卑為之築節矣鄭箴膏肓云宮廟朝廷各有定處無所館天子之女故宜築于宫外是言湏築之意也但杜意若其内不恨齊非有喪制不湏築於城之外耳此言外者謂城之外説公羊穀梁者亦以為城外然王姬來嫁必湏築館所以十一年王姬不築館者或因其舊館或築而不書也經二年春王二月葬陳莊公注無傳魯往㑹之故書例在昭六年夏公子慶父帥師伐於餘丘注無傳於餘丘國名也莊公時年十五則慶父莊公庶兄疏注正義曰公羊穀梁皆以於餘丘為邾之别邑左氏無傳正以春秋之㫖未有伐人之邑而不繋國者此無所繋故知是國釋例注闕不知其處蓋近魯小國也莊公時年十五者以桓六年生至此二年為十五莊二十七年公羊傳曰公子慶父公子牙公子友皆莊公之母弟也左氏先儒用此為説杜以不然故明之釋例曰經書公子慶父伐於餘丘而公羊以為莊公母弟計其年嵗既未能統軍又無晉悼王孫滿㓜知之文此蓋公羊之妄而先儒曽不覺悟取以為左氏義今推案傳之上下羽父之弑隱公皆諮謀於桓公則桓公已成人也傳曰生桓公而惠公薨指明仲子唯有此男非謂生在薨年也桓以成人而弑隱即位乃娶於齊自應有長庶故氏曰孟此明證也公疾問後於叔牙牙稱慶父材疑同母也傳稱季友文姜之愛子與公同生故以死奉般情義相推考之左氏有若符契是杜明其異母之意也氏曰孟氏傳文實然而經稱仲孫杜無明釋八年傳稱仲慶父其舉諡稱之則謂之共仲蓋慶父雖為庶長而以仲為字其後子孫以字為氏是以經書仲孫時人以其庶長稱孟故傳稱孟孫其以諡配字而謂之共仲猶臧僖伯管敬仲之類也劉炫云蓋慶父自稱仲欲同於正適言已少次莊公為三家之長故以莊公為伯而自稱仲春秋之例皆傳言實而經順其意經稱當時之事書其自稱之辭其人自稱仲孫不得不書為仲傳序已適之事舉其時人之語時人呼為孟氏不得不以孟錄論語云孟孫問孝於我是時人呼云孟氏也楚公子棄疾弑君取國改名為居經書楚子居卒是從其自稱也秋七月齊王姬卒注無傳魯為之主比之内女疏注正義曰他國夫人之卒例皆不書唯魯女為諸侯之妻書其卒耳王姬非是内女亦書其卒為比之内女故也檀弓曰齊告王姬之喪魯莊公為之大功或曰由魯嫁故為之服姊妹之服是其比内女也冬十有二月夫人姜氏㑹齊侯于禚注夫人行不以禮故還皆不書不告廟也禚齊地音義禚諸若反乙酉宋公馮卒注無傳再與桓同盟音義馮皮冰反疏注正義曰桓十一年盟于折十二年于穀丘是再也傳二年冬夫人姜氏㑹齊侯于禚書姦也注文姜前與公俱如齊後懼而出奔至此始與齊好㑹㑹非夫人之事顯然書之傳曰書姦姦在夫人文姜比年出㑹其義皆同音義好呼報反經三年春王正月溺㑹齊師伐衞注溺魯大夫疾其專命而行故去氏音義溺乃狄反去起呂反疏注正義曰隱四年翬㑹宋公陳侯蔡人衞人伐鄭傳曰羽父請以師㑹之公弗許固請而行故書曰翬帥師疾之也彼不稱公子傳言疾之今溺亦不稱公子傳亦言疾之知其事與翬同疾其專命而行故去氏也公子非氏貶與氏同故言氏也夏四月葬宋莊公注無傳五月葬桓王秋紀季以酅入于齊注季紀侯弟酅紀邑在齊國東安平縣齊欲滅紀故季以邑入齊為附庸先祀不廢社稷有奉故書字貴之音義酅戸圭反本又作攜疏注正義曰公羊傳曰紀季者何紀侯之弟也何以不名賢也何賢乎紀季請後五廟以存姑姊妹穀梁傳曰酅紀之邑也入于齊者以酅事齊也杜取彼為説知季是紀侯之弟以酅邑入齊為附庸之君附屬齊國也諸侯之卿例當書名善其能自存立故書字貴之也釋例曰齊侯鄭伯詐朝于紀欲以襲之紀人大懼而謀難於魯請王命以求成于齊公告不能齊遂偪之遷其三邑國有旦夕之危而不能自入為附庸故分季以酅使請事于齊大去之後季為附庸先祀不廢社稷有奉季之力也故書字不書名書入不書叛也判分也傳曰始分為紀侯大去張本也劉賈謂紀季以酅奔齊不言叛不能專酅也傳稱紀侯不能下齊以與紀季季非叛也紀亡之後叔姬歸于酅明為附庸猶得專酅故可歸也是杜具説貴之意也以叔姬歸酅知酅為附庸附庸之君雖無爵命而分地建國南面之主得立宗廟守祭祀僖二十一年傳曰任宿湏句顓臾皆風姓也寔司大皥與有濟之祀論語云夫顓臾昔者先王以為東蒙主湏句顓臾皆附庸也得祀所出之祖主其竟内山川明得祀先君奉社稷冬公次于滑注滑鄭地在陳留襄邑縣西北傳例曰凡師過信為次兵未有所加所次則書之既書兵所加則不書其所次以事為宜非虛次音義滑乎八反又于八反疏注正義曰此解畧而釋例詳釋例曰凡師一宿為舍再宿為信過信為次此周公之典以詳錄師出入行止遲速因為之名也兵事尚速老師費財不可以久故春秋告命三日以上必記其次舍之與信不書者輕碎不以告也兵未有所加所次則書之以示遲速公次于滑師次于郎是也既書兵所加則不書其所次以事為宜非虛次諸久兵而不書次是也既書兵所加而又書次者義有取於次遂伐楚次于陘盟于牡丘遂次于匡是也所記或次在事前次以成事也或次在事後事成而次也皆隨事實無義例也杜言既書兵所加則不書其次者或伐或戰曠日持久其間必有三日之次既書戰伐則不書次雖次在事前次在事後皆不書也既書兵所加而又書次者義有取於次齊侯伐楚楚彊齊欲綏之以徳故不速進而次于陘盟于牡丘本為救徐名使大夫救徐次匡以為之援義取於次故書兵所加而又書其次次在事前謂僖元年齊師宋師曹師次于聶北救邢也次在事後謂襄二十三年叔孫豹帥師救晉次于雍榆也聶北之下公羊傳曰曷為先言次而後言救君也雍榆之下公羊傳曰曷為先言救而後言次先通君命也左氏先儒取彼為説言齊桓君也進止自由故先次後救叔孫臣也先通君命故先救後次杜以傳無此言故改正其謬言此二事或次以成事或事成而次皆隨事實先後而書之無義例也先儒又言書次者皆善之辭釋例曰叔孫救晉次于雍榆傳曰禮者善其宗助盟主非以次為禮也齊桓次于聶北救邢亦以存邢具其器用師人無私見善不在次也而賈氏皆即以為善次次之與否自是臨時用兵之宜非禮之所素制也言非素制者非禮家制此名以為善號也沈氏云將㑹鄭伯非軍旅而書次者古者君行師從卿行旅從故亦從師行之例也傳三年春溺㑹齊師伐衞疾之也注傳重明上例音義重直用反夏五月葬桓王緩也注以桓十五年三月崩七年乃葬故曰緩秋紀季以酅入于齊紀於是乎始判注判分也言分為附庸始於此冬公次于滑將㑹鄭伯謀紀故也鄭伯辭以難注厲公在櫟故音義難乃旦反櫟音歴或音書約反凡師一宿為舎再宿為信過信為次注為經書次例也舍宿不書輕也言凡師通君臣疏注正義曰舍者君行一日止而舍息也信者住經再宿得相信問也穀梁傳曰次止也則次亦止舍之名過信以上雖多日亦為次不復别立名也通君臣者公次于滑君也叔孫豹次于雍榆臣也但是師行皆從此例君將不言帥師故止云公次亦師次也非師之次則不在此例釋例譏賈氏云若魯公次乾侯之比非為用師不應在例而復例之亦為濫也經四年春王二月夫人姜氏享齊侯于祝丘注無傳享食也兩君相見之禮非夫人所用直書以見其失祝丘魯地音義食音嗣又如字本或作㑹以見賢遍反疏注正義曰鄭𤣥儀禮注云饗謂享大牢以飲賔則享是飲酒大禮與㑹小别而以享為㑹者言夫人與齊侯㑹而設享禮故書享齊侯也定十年夾谷之㑹傳稱齊侯將享公孔丘拒之乃不果享是享者兩君相見之禮二年穀梁傳曰婦人不言㑹言㑹非正也饗甚矣是享非夫人所當用也禮不合用而夫人用之故直書以見其失也定本享㑹作享食也三月紀伯姬卒注無傳隱二年裂繻所逆者内女唯諸侯夫人卒葬皆書恩成於敵體疏注正義曰穀梁傳曰外夫人不卒此其言卒何也吾女也適諸侯則尊同以吾為之變卒之也為之變者為之服也禮諸侯絶期尊同則為之變服服大功九月恩成於敵體故書其卒適大夫則畧之釋例曰内女唯諸侯夫人卒乃書恩成於敵體其非適諸侯則畧之以服制相凖也生書其來而死不録其卒從外大夫之比也夏齊侯陳侯鄭伯遇于垂注無傳紀侯大去其國注以國與季季奉社稷故不言滅不見迫逐故不言奔大去者不反之辭疏注正義曰傳稱紀侯不能下齊以與紀季是往年分酅與之紀國猶在今則全以紀與之故云以國與季釋例曰紀侯力弱慮窮自以列國不忍屈臣於齊使季以酅求安而脱身外寓季果為附庸社稷有奉故不言滅不見迫逐故不言奔大去者不反之辭蓋時史即實而言仲尼弗改故傳不言故書書曰也是説大去之意也滅人國者皆毁其宗廟遷其社稷紀季雖降為附庸得自立廟社而其國不滅也諸侯之奔皆被逐而出此則不見迫逐故不言奔時史謂之大去仲尼以為得理故因而用之十二年叔姬歸于酅則紀季雖全得紀國亦不移就紀都紀之宗廟社稷皆遷之於酅承祀如本故為不滅雖云國祚不滅其實為齊所吞紀之器物財賄亦應為齊得成二年傳稱紀甗玉磬目之以紀得非滅紀所得也季既入臣於齊縱使齊不自取必應以之為賂假令季以賂齊亦是滅紀所得也六月乙丑齊侯葬紀伯姬注無傳紀季入酅為齊附庸而紀侯大去其國齊侯加禮初附以崇厚義故攝伯姬之喪而以紀國夫人禮葬之疏注正義曰紀侯由齊大去則是齊為紀讐而葬其夫人故解其意云云雖為齊侯所葬亦由魯往㑹之故書釋例曰紀侯大去其國令弟納邑附齊齊侯嘉而愍之恩及伯姬姬魯女故以來告大夫㑹葬故書齊侯葬紀伯姬也不書諡者亡國之婦夫妻皆降莫與之諡而賈許方以諸侯禮説又失之也秋七月冬公及齊人狩于禚注無傳公越竟與齊微者俱狩失禮可知音義狩手又反竟音境本又作境傳四年春王三月楚武王荆尸授師孑焉以伐隨注尸陳也荆亦楚也更為楚陳兵之法揚雄方言孑者㦸也然則楚始於此參用㦸為陳音義孑吉熱反方言云楚謂㦸為孑為陳直覲反疏注正義曰尸陳也釋詁文荆即楚之舊邑故云荆亦楚也楚本小國地狹民少雖時復出師未自為灋式今始言荆尸則武王初為此楚國陳兵之法名曰荆尸使後人用之宣十二年傳稱荆尸而舉是遵行之也揚雄以爾雅釋古今之語作書擬之采異方之語謂之方言方言云㦸謂之孑郭璞云取名於鉤孑也㦸是撃刺之兵有上刺之刃又有下鉤之刃故以鉤孑為名也始云授師孑焉是往前未以此器授師故云然則楚始於此參用㦸為陳言參用之者參雜用之陳之所用非專用㦸將齊入告夫人鄧曼曰余心蕩注將授兵於廟故齊蕩動散也音義齊側皆反注同鄧曼歎曰王祿盡矣盈而蕩天之道也先君其知之矣故臨武事將發大命而蕩王心焉注楚為小國僻陋在夷至此武王始起其衆僭號稱王陳兵授師志意盈滿臨齊而散故鄧曼以天地鬼神為徴應之符音義僻匹亦反僭子念反應應對之應若師徒無虧王薨於行國之福也注王薨於行不死於敵王遂行卒於樠木之下注樠木木名音義樠郎蕩反又莫昆反又武元反疏注正義曰此字之音或為曼或為朗若以莆為聲當作曼以兩為聲當作朗字體難定或兩為之音杜直云木名不知木何所似木有似榆者俗呼為朗榆蓋為朗也令尹鬬祁莫敖屈重除道梁溠營軍臨隨隨人懼行成注時秘王喪故為竒兵更開直道溠水在義陽厥縣西東南入鄖水梁橋也隨人不意其至故懼而行成音義重直用反一音直容反溠髙貴鄉公音側嫁反水名字林壯加反鄖音云或作員疏注正義曰除道謂除治新路故知更開直道梁溠為作梁於溠故為橋也釋例曰義陽厥縣西有漈水源出縣北從縣西東南至隨縣入鄖水杜以漈解溠蓋聲相近而字轉耳莫敖以王命入盟隨侯且請為㑹於漢汭而還注汭内也謂漢西音義汭如鋭反水曲曰汭濟漢而後發喪疏正義曰莫敖既與隨侯盟且又請隨侯與已為㑹禮於漢水之汭而後遷楚也隨侯畏楚遂從莫敖為㑹禮㑹訖隨侯因濟漢還國而後發王喪也紀侯不能下齊以與紀季注不能降屈事齊盡以國與季明季不叛音義下遐嫁反夏紀侯大去其國違齊難也注違辟也音義難乃旦反經五年春王正月夏夫人姜氏如齊師注無傳書姦疏正義曰於時齊無征伐之事不知師在何處蓋齊侯疆理紀地有師在紀杜云書姦姦發夫人當向紀地從之不言㑹者往其軍内就齊侯耳不行㑹禮秋郳犂來來朝注附庸國也東海昌慮縣東北有郳城犂來名音義郳五兮反國名後為小邾犂力兮反慮如字又力於反冬公㑹齊人宋人陳人蔡人伐衞傳五年秋郳犂來來朝名未王命也注未受爵命為諸侯傳發附庸稱名例也其後數從齊桓以尊周室王命以為小邾子音義數音朔疏注正義曰郳者附庸之國犂來其君之名傳言未王命者解其稱名之意由未得爵命為諸侯故稱名也經書其名傳言未王命此傳所發即是附庸稱名之例例當稱名故儀父稱字為貴之也郳之上世出於邾國世本云邾顔居邾肥徙郳宋仲子注云邾顔别封小子肥於郳為小邾子則顔是邾君肥始封郳譜云小邾邾俠之後也夷父顔有功於周其子友别封為附庸居郳曽孫犂來始見春秋附從齊桓以尊周室命為小邾子穆公之孫惠公以下春秋後六世而楚滅之世本言肥杜譜言友當是一人僖七年經書小邾子來朝知齊桓請王命命之冬伐衞納惠公也注惠公朔也桓十六年出奔齊經六年春王正月王人子突救衞注王人王之微官也雖官卑而見授以大事故稱人而又稱字疏注正義曰昭十二年傳稱叔孫昭子三命踰父兄則昭子之父叔孫豹再命也再命而名見於經知諸侯之卿再命三命皆書名一命乃稱人諸侯之臣既然則王朝之臣亦然周禮王之上士三命中士再命下士一命故杜以為劉夏石尚稱名氏者上士中士也稱王人者下士也僖八年公羊傳曰王人微者知此王人亦微者故云王人王之微官也春秋之世二字而子在上者皆是字故知子突是字救衛必以師救而文不稱師於例為將卑師少以卑官而帥少師救衞不能使衞侯不入是無功也無功而稱字者以朔既讒構取國而又不能於民王意即定黔牟不欲使朔得入故遣師救之時史惡諸侯逆王命故尊王使言子突雖則官卑蒙王授以大事故稱人而又稱字貴王人所以責諸侯也釋例曰莊六年五國諸侯犯逆王命以納衞朔大其事故字王人謂之子突是説進之意也進之不稱名而越稱字者王之上士下士爵同而命異耳進之同中士未足以為榮故超從大夫之例稱字以貴之也文二年垂隴之㑹晉士縠堪其事即書名氏似若眞為卿然故不復稱人此貴子突止為敦責諸侯非是人實堪進故稱人依其夲班稱字見其别有所為耳穀梁傳曰王人卑者也名貴之也善救衞也救者善則伐者不正矣杜意取彼為説唯以子突為字耳范寗注穀梁亦云此名當為字誤爾夏六月衞侯朔入于衞注朔為諸侯所納不稱歸而以國逆為文朔懼失衆心以國逆告也歸入例在成十八年疏注正義曰去年齊宋陳蔡伐衞傳曰納惠公也此年衞侯得入則是諸侯納之當言歸而經書入成十五年宋華元奔晉宋人迎而反之當言復歸而經書歸釋例曰朔懼有違衆之犯而以國逆告華元實國逆欲挾晋以自助故以外納赴春秋從而書之示二子之情也凡諸侯外納有三一者以言語告請得入蔡季歸于蔡是也二者興師送入其國楚人圍陳納頓子于頓是也三者所納之君别在他國而諸侯師伐彼國令其得入今公及諸侯伐衞是也秋公至自伐衞注無傳告于廟也螟注無傳為災音義螟亡丁反冬齊人來歸衞俘注公羊榖梁經傳皆言衞寳此傳亦言寳唯此經言俘疑經誤俘囚也音義俘芳夫反疏注正義曰釋例曰齊人來歸衞寳公羊穀梁經傳及左氏傳皆同唯左氏經獨言衞俘考三家經傳有六而其五皆言寳此必左氏經之獨誤也案説文保從人省聲古文􅱱不省然則古字通用寳或􅱱字與俘相似故誤作俘耳杜既以為誤而又解俘為囚是其不敢正決故且從之傳六年春王人救衞夏衞侯入放公子黔牟于周放寗跪于秦殺左公子洩右公子職注寗跪衞大夫宥之以遠曰放音義寗乃定反跪其毁反宥音又乃即位君子以二公子之立黔牟為不度矣夫能固位者必度於本末而後立衷焉不知其本不謀知本之不枝弗強注本末終始也衷節適也譬之樹木本弱者其枝必披非人力所能强成音義度待洛反下同衷丁仲反注同王音忠强其丈反注同披普靡反又普知反詩云本枝百世注詩大雅言文王本枝俱茂蕃滋百世也音義蕃音煩疏正義曰君子以二公子之立黔牟也為不知揆度形勢矣夫立人為君使能自堅固其位者必當揆度於本末度其本者謂其人才徳賢善根本牢固度其末者謂其人終能保有邦國蕃育子孫知其堪能自固而後立其衷焉衷謂節適言使得節適時乃立之也若不能知其本之可立與否則不當謀之如似樹木知其根本之弱不能生長枝葉以喻所立之人材力劣弱不能保有邦國蕃育子孫則不湏自强立之詩以樹木本幹喻適枝葉喻庻言文王子孫本幹枝葉適子庻子皆傳國百世由文王之徳堪使蕃滋故也劉炫云度其本謂思所立之人有母氏之寵有先君之愛有彊臣之援為國人所信服也度其末謂思所立之人有度量有知謀有治術為下民所愛樂也冬齊人來歸衞寳文姜請之也注公親與齊共伐衞事畢而還文姜淫於齊侯故求其所獲珍寳使以歸魯欲說魯以謝慙音義說音悅楚文王伐申過鄧鄧祁侯曰吾甥也注祁諡也姊妹之子曰甥音義祁巨支反字林上尸反疏注正義曰諡法經典不易曰祁衞有石祁子亦諡也釋親云謂我舅者吾謂之甥是姊妹之子曰甥止而享之騅甥𥅆甥養甥請殺楚子注皆鄧甥仕於舅氏也音義騅音隹鄧侯弗許三甥曰亡鄧國者必此人也若不早圖後君噬齊注若齧腹齊喻不可及音義噬市制反齊粗兮反齧五結反其及圖之乎圖之此為時矣鄧侯曰人將不食吾餘注言自害其甥必為人所賤疏正義曰食謂噉之為甥設享而因享害之所有餘食更為人設之將賤吾不肯復食噉吾之餘食也膏肓以為楚鄧彊弱相縣若從三甥之言楚子雖死鄧滅曽不旋踵若刳腹去疾炊炭止沸左氏為短鄭箴云楚之彊盛從滅鄧以後於時楚未為彊何得云彊弱相縣蘇氏云三甥既有此語左氏因史記之文錄其實事非君子之論何以非之對曰若不從三臣抑社稷實不血食而君焉取餘注言君無復餘音義焉於䖍反復扶又反下文同弗從還年楚子伐鄧注伐申還之年十六年楚復伐鄧滅之注魯莊公十六年楚終强盛為經書楚事張本疏注正義曰知非楚文王十六年者以文王莊五年即位至十九年卒唯十五年耳經七年春夫人姜氏㑹齊侯于防注防魯地夏四月辛卯夜恒星不見注恒常也謂常見之星辛卯四月五日月光尚微蓋時無雲日光不以昏沒音義不見賢遍反注及傳皆同疏注正義曰恒常釋詁文夜者自昏至旦之總名但此經下言夜中則此言夜者夜未至中謂初昏之後耳非竟夜不見星也穀梁夜作昔傳曰日入至於星出謂之昔不見者可以見也必如彼言星出以前名之曰昔則名昔之時法當未有星矣何以怪其不見而書為異也明經所言夜者夜昏之後星應見之時而不見耳公羊傳曰恒星者何列星也言天官列宿常見之星也於時周之四月則夏之仲春月令仲春之月日在奎昬弧中鄭𤣥云弧在輿鬼南則於時南方之星盡當列見謂常見之星者謂南方星也杜以長厯校之知辛卯是四月五日也杜以五日月光尚微不能奄星使不見若有雲蔽當時復無雲蓋日光不以昬沒是故以為異也夜中星隕如雨注如而也夜半乃有雲星落而且雨其數多皆記異也日光不匿恒星不見而云夜中者以水漏知之音義夜中夜半也丁仲反又如字隕于閔反落也匿女力反疏注正義曰公羊説如雨者言其狀似雨也此傳言星隕如雨與雨偕也偕訓為俱與雨俱下不得為狀似雨也故轉如為而謂星落而且雨其數多與雨雜下所落非一星也非常為異害物為灾此二事雖是天之變異不見物被灾害皆記異也星隕非常固可記異雨乃常事亦言之者見星之隕其勢宜明時乃隂雨雨内見星所以為異主言星之異不言雨之為異也夜之早晚以星為驗日光不匿恒星不見而云夜中者以水漏知之漏者晝夜百刻於時春分之月夜當五十刻二十五刻而夜半也秋大水注無傳無麥苖注今五月周之秋平地出水漂殺熟麥及五稼之苖音義漂匹妙反又匹遙反疏注正義曰直言無麥苖似是麥之苖而知麥苗别者公羊傳曰曷為先言無麥而後言無苗待無麥然後書無苗如彼傳文知麥苗别也且此秋今之五月麥已熟矣不得方云麥之無苗故知熟麥及五稼之苗皆為水漂殺也種之曰稼斂之曰穡月令五時食穀黍稷麻麥豆周禮謂之五穀故云五稼之苗何休云禾初生曰苗秀曰禾冬夫人姜氏㑹齊侯于穀注無傳穀齊地今濟北穀城縣傳七年春文姜㑹齊侯于防齊志也注文姜數與齊侯㑹至齊地則姦發夫人至魯地則齊侯之志故傳畧舉二端以言之音義數音朔疏注正義曰文姜數與齊侯㑹者二年于禚四年于祝丘五年如齊師此年于防于穀是也哀十五年傳稱齊致禚媚杏於衞則禚是齊地定五年傳稱季平子行東野卒于防則防是魯地傳於齊地言書姦於魯地言齊志故知至齊地則姦發夫人至魯地則齊侯之志也二年㑹之始此年㑹之末故傳畧舉二端以言之明其餘意同也杜于禚于穀皆言齊地于祝丘言魯地見其有二意若其不然桓五年經書城祝丘祝丘魯地不湏解之釋例曰婦人無外事見兄弟不踰閾故其他行非禮所及亦例所不存而當其時實有出入或以事宜或以淫縱小君之行不得不書故直書其行而其善惡各繋於本㑹于禚傳稱書姦夫人入齊地也㑹于防傳稱齊志齊侯入魯地也於經無例傳以實言之夏恒星不見夜明也星隕如雨與雨偕也注偕俱也音義偕音皆秋無麥苗不害嘉穀也注黍稷尚可更種故曰不害嘉穀經八年春王正月師次于郎以俟陳人蔡人注無傳期共伐郕陳蔡不至故駐師于郎以待之疏注正義曰唯言以俟陳蔡不知何故待之下有師及齊師圍郕或與陳蔡同計故云期共伐郕陳蔡不至故待之賈逵及說穀梁者皆云陳蔡欲伐魯故待之陳蔡於魯竟絶路遙春秋以來未嘗構怨何因輒伐魯也又俟者相須同行之辭非防冦拒敵之稱若是畏其來伐當謂之禦不得稱俟故知期共伐郕耳何休服䖍亦言欲共伐郕甲午治兵注治兵於廟習號令將以圍郕疏注正義曰周禮中春敎振旅中秋敎治兵穀梁傳曰出曰治兵習戰也入曰振旅習戰也公羊傳曰出曰祠兵入曰振旅其禮一也皆習戰也釋天云出為治兵尚威武也入為振旅反尊卑也孫炎云出則幼賤在前貴勇力也入則尊老在前復常灋也彼言治兵振旅皆謂因田獵而選車徒敎戰灋習號令知此治兵亦是習號令此治兵於廟欲就尊嚴之處使之畏威用命耳但軍旅之衆非廟内所容止應告於宗廟出在門巷習之昭十八年傳稱鄭人簡兵大蒐將為蒐除杜云治兵於廟城内地迫故除廣之是告於廟習於巷也下有圍郕知治兵為圍郕也沈云周禮中秋治兵月令孟春令云是月也不可以稱兵所以甲午治兵者以為圍郕故非時治兵猶如備難而城雖非時不譏沈又云治兵之禮必須告廟告廟雖是内事治兵乃是外事故雖告廟仍用甲午且治兵則征伐之類又為圍郕雖在郊内亦用剛日甲午治兵公羊以為祠兵謂殺牲饗士卒夏師及齊師圍郕郕降于齊師注二國同討而齊獨納郕音義降戸江反傳皆同疏正義曰於例將卑師衆稱師此直言師則公不自將傳稱仲慶父請伐齊師聞郕降齊師在國請耳非是軍中請也秋師還注時史善公克己復禮全軍而還故特書師還疏注正義曰春秋之例公行征伐還則書至命將出師未有書師還者也慶父請伐齊師欲以自圍郕之師迴伐齊師若用其言則方相戰鬬師或喪敗公乃自責無德引罪歸己時史善公克己復禮全軍而還喜其得還故特書師還也傳言君子是以善魯荘公君子謂當時之史書此師還以善魯莊公也仲尼以為得理故因而用之克己復禮論語文也克勝也己雖恨齊勝情而止責己而不責於人合於禮意僖三十年秦晉圍鄭傳稱秦人竊與鄭盟子犯請擊秦師晉侯不許與此事同而彼無善文者魯莊中平之主能有善事故為可嘉晉文身為霸主而私自恨鄭引秦共伐而秦人背之失其所與則為不知得免不知之譏已為幸矣雖不從子犯未足可尚時史不善其事故仲尼亦無褒文冬十有一月癸未齊無知弑其君諸兒注稱臣臣之罪也音義兒如字一音五兮反傳八年春治兵于廟禮也夏師及齊師圍郕郕降于齊師仲慶父請伐齊師注齊不與魯共其功故欲伐之公曰不可我實不德齊師何罪罪我之由夏書曰臯陶邁種德注夏書逸書也稱臯陶能勉種德邁勉也音義夏戸雅反後放此陶音遙德乃降疏正義曰此虞書臯陶謨之文以述禹事故傳謂之夏書孔安國以為邁行種布降下也言臯陶能行布其德德乃下洽於民故民歸之今引之斷章取證降義當言臯陶能布行其德由其有德乃為人降服也杜不見古文故以為逸書以邁為勉言臯陶能勉力種樹功德不知德乃降亦是書文謂為莊公之語故隔從下注言能慕臯陶之種徳乃人自降服之自恨不能如臯陶也姑務修德以待時乎注言苟有德乃為人所降服姑且也秋師還君子是以善魯莊公注傳言經所以卽用舊史之文齊侯使連稱管至父戍葵丘注連稱管至父皆齊大夫戍守也葵丘齊地臨淄縣西有地名葵丘音義稱尺證反又如字𤓰時而徃曰及𤓰而代期戍公問不至注問命也音義期音基本亦作朞請代弗許故謀作亂僖公之母弟曰夷仲年生公孫無知有寵於僖公衣服禮秩如適注適太子音義適丁厯反注同襄公絀之二人因之以作亂注二人連稱管至父音義絀勑律反連稱有從妹在公宮無寵使間公注伺公之間隙音義從才用反下從者皆同間如字注同或古莧反非曰㨗吾以女為夫人注㨗克也宣無知之言音義㨗在接反女音汝冬十二月齊侯游于姑棼遂田于貝丘注姑棼貝丘皆齊地田獵也樂安博昌縣南有地名貝丘音義棼扶云反貝補蓋反樂音洛見大豕從者曰公子彭生也注公見大豕而從者見彭生皆妖鬼公怒曰彭生敢見射之豕人立而啼公懼隊于車傷足喪屨反誅屨於徒人費注誅責也音義敢見賢遍反射食亦反啼田兮反隊直類反喪息浪反屨九具反費音秘弗得鞭之見血走出遇賊于門刼而束之費曰我奚御哉袒而示之背信之費請先入注詐欲助賊音義御魚呂反袒音但伏公而出鬬死于門中石之紛如死于階下注石之紛如齊小臣亦鬬死音義紛敷文反遂入殺孟陽于牀注孟陽亦小臣代公居牀音義牀士良反曰非君也不類見公之足于戸下遂弑之而立無知注經書十一月癸未長厯推之月六日也傳云十二月傳誤初襄公立無常注政令無常鮑叔牙曰君使民慢亂將作矣奉公子小白出奔莒注鮑叔牙小白傅小白僖公庶子音義鮑歩卯反亂作管夷吾召忽奉公子糾來奔注管夷吾召忽皆子糾傅也子糾小白庶兄來不書皆非卿也為九年公伐齊納子糾齊小白入于齊傳音義召詩照反糾居黝反初公孫無知虐于雍廩注雍廩齊大夫為殺無知傳音義廩力錦反經九年春齊人殺無知注無知弑君而立未列於會故不書爵例在成十六年疏注正義曰無知弑君自立則是為齊君矣而不言弑其君者為未列於會故不書爵不書爵者正謂不書弑其君也釋例曰諸侯不受先君之命而篡立得與諸侯會者則以成君書之齊商人蔡侯般之屬是也若未得接於諸侯則不稱爵楚公子棄疾殺公子比蔡人殺陳佗齊人殺無知衛人殺州吁公子瑕之屬是也諸侯篡立雖以會諸侯為正此列國之制也至於國内策名委質即君臣之分已定故雖殺不成君亦與成君同義也是言殺而不稱君之意也曹伯負芻殺大子而自立成十五年晉侯討而執之十六年曹人請于晉曰若有罪則君列諸會矣是列會則成君故指彼以為例公及齊大夫盟于蔇注齊亂無君故大夫得敵於公蓋欲迎子糾也來者非一人故不稱名蔇魯地琅邪繒縣北有蔇亭音義蔇其器反繒才陵反疏注正義曰僖二十九年傳曰在禮卿不會公侯會伯子男可也是大夫不得敵公也若敵公則經沒公不書而貶卿稱人翟泉之盟是也此不沒公者齊亂無君故大夫得敵公旣得敵公當書名氏而直言齊大夫者來者非一人故不稱名也文七年宋人殺其大夫傳曰不稱名衆也是衆則不得書名夏公伐齊納子糾疏正義曰公羊傳曰糾者何公子糾也何以不稱公子君前臣名也何休曰嫌當為齊君在魯君前不為臣禮故去公子見臣於魯也賈逵云不言公子次正也公羊之說不可通於左氏次正不稱公子其事又無所出案今定本經文糾之上且有子字自外入内不稱公子者多唯有楚公子比稱公子蓋告辭有詳畧故為文不同此有伐齊之文故不須言于齊納㨗菑于邾為無伐邾之文故須言于邾齊小白入于齊注二公子各有黨故雖盟而迎子糾當須伐乃得入又出在小白之後小白稱入從國逆之文本無位疏注正義曰傳稱鮑叔牙以小白奔莒管夷吾召忽奉子糾來奔則二子在國寵均勢敵故國内各有其黨今齊大夫來盟于蔇直是子糾之黨來迎子糾耳小白之黨猶自向莒迎小白也若其舉國同心共推子糾來迎卽宜付之不須以盟要之今旣與之盟而興師送糾是二公子各自有黨須伐乃得入故公伐齊也昭十三年傳稱桓公有國髙以為内主則國子髙子是小白之黨也彼迎小白旣早公送子糾又遲公伐齊納子糾始行即書小白入齊得告乃書故至齊之時出小白之後也傳例曰凡去國國逆而立之曰入小白稱入從國逆之文以其本無位也若本有位則當云復歸賈服以為齊大夫來迎子糾公不亟遣而盟以要之齊人歸迎小白謂迎小白者還是盟蔇大夫故杜言各自有黨以排之秋七月丁酉葬齊襄公注無傳九月乃葬亂故八月庚申及齊師戰于乾時我師敗績注小白旣定而公猶不退師歴時而戰戰遂大敗不稱公戰公敗諱之乾時齊地時水在樂安界岐流旱則竭涸故曰乾時音義乾音干岐其宜反又巨移反涸戸各反疏注正義曰公以夏伐齊已出小白之後齊人得葬襄公便是國寜位定公可退而不退戰而敗績是公之罪時史書策不稱公戰公敗為公諱也若言此戰非公是將卑師衆故直言師戰師敗耳此戰雖諱猶書敗升陘之戰敗亦不書者彼為獲公胄恥諱之深故不書敗也九月齊人取子糾殺之注公子為賊亂則書齊實告殺而書齊取殺者時史惡齊志在譎以求管仲非不忍其親故極言之音義惡烏路反譎古穴反疏正義曰此名糾耳稱子者公羊傳曰其稱子糾何貴也其貴奈何宜為君者也何休云以君薨稱子某言之者著其宜為君從未踰年君例賈逵云稱子者愍之案定本上納子糾已稱子則此言子非愍之也沈云齊人稱子糾故魯史從其所稱而經書子糾知者傳云子糾親也請君討之豈復是愍之乎劉與賈同注正義曰諸侯之臣為卿乃見經公子為賊亂者則書其名不問位之貴賤釋例曰禍福不告則不書然則國之大事見告則皆承告而書貴賤各以所告為文也福莫大於享國有家禍莫甚於骨肉相殘故公子取國及為亂見殺者亦皆書之不必繫於為卿故子糾意恢以公子見書於經也是説公子書經之意也冬浚洙注無傳洙水在魯城北下合泗浚深之為齊備音義浚蘇俊反深也洙音殊水名泗音四疏注正義曰釋例云洙水出魯國東北西南入沇水下合泗公羊傳曰洙者何水也浚之者何深之也曷為深之畏齊也是畏齊故深之為阻固也傳九年春雍廩殺無知公及齊大夫盟于蔇齊無君也夏公伐齊納子糾桓公自莒先入注桓公小白秋師及齊師戰于乾時我師敗績公喪戎路傳乘而歸注戎路兵車傳乘乘他車音義喪息浪反傳直專反又丁戀反傳乘繩證反注傳乘字同乘他如字秦子梁子以公旗辟于下道注二子公御及戎右也以誤齊師音義辟音避本亦作避一音婢亦反是以皆止注止獲也鮑叔帥師來言曰子糾親也請君討之注鮑叔乘勝而進軍志在生得管仲故託不忍之辭管召讐也請受而甘心焉注管仲射桓公故曰讐甘心言欲快意戮殺之音義召詩照反讐市由反射食亦反乃殺子糾于生竇注生竇魯地音義竇音豆召忽死之管仲請囚鮑叔受之及堂阜而稅之注堂阜齊地東莞蒙隂縣西北有夷吾亭或曰鮑叔解夷吾縳於此因以為名音義税本又作説同土活反一音失銳反解古買反縳扶畧反歸而以告曰管夷吾治於髙傒注髙傒齊卿髙敬仲也言管仲治理政事之才多於敬仲音義治直吏反注同傒音兮使相可也音義相息亮反疏正義曰此傳大畧世有管子書者或是後人所録其言甚詳其小匡篇曰桓公自莒反於齊使鮑叔牙為宰鮑叔辭曰君有加惠於臣使臣不凍餒則是君之賜也若必治國家則非臣之所能也其唯管夷吾乎臣之所不如夷吾者五寛惠愛民臣不如也治國不失秉臣不如也忠信可結於諸侯臣不如也制禮義可法於四方臣不如也介胄執枹立於軍門使百姓皆加勇臣不如也夫管子民之父母也將欲治其子不可棄其父母公曰管夷吾親射寡人中鉤殆於死今乃用之可乎鮑叔曰彼為其君勤也君若宥而反之其為君猶是也公曰然則為之奈何鮑叔曰君使人請之魯公曰夫施伯魯之謀臣也彼知吾將用之必不吾與鮑叔曰君詔使者曰寡君有不令之臣在君之國願請之以戮於羣臣魯君必諾且施伯之知夷吾之才必將致魯之政夷吾受之則魯能弱齊矣夷吾不受彼知其將反齊必殺之君亟請之不然無及公乃使鮑叔行成曰公子糾親也請君討之魯人為殺公子糾又曰管仲讐也請受而戮之魯君許諾施伯謂魯侯曰勿與非戮之也將用其政也管仲天下之賢人今齊求而得之則必長為魯國憂君何不殺之而授其屍魯君曰諾將殺管仲鮑叔進曰殺之齊是戮齊也殺之魯是戮魯也寡君願生得之以狥於國為羣臣戮若不生得是君與寡君之賊比也非敝邑之所請也使臣不敢受命於是乎魯君乃不殺遂生束縛而以與齊鮑叔受而哭之三舉施伯從而笑之謂大夫曰管仲必不死矣鮑叔之不忍戮賢人其知知稱賢以自成也至於堂阜之上鮑叔袚而浴之三桓公親迎於郊遂與歸禮之於廟三酌而問為政焉外傳齊語與管子大同管子當是本耳管子無治於高傒之言鮑叔之美管子其言非一說者各記所聞故不同耳公從之經十年春王正月公敗齊師于長勺注齊人雖成列魯以權譎稽之列成而不得用故以未陳為文例在十一年長勺魯地音義勺上酌反陳直覲反十一年經注同疏注正義曰例稱敵未陳曰敗某師皆陳曰戰此傳稱齊人成陳擊鼓不應稱敗齊師故解之孫子兵書曰誓稽之使失其先後謂稽留彼敵不時與戰使先後失其次第魯以曹劌之語權謀譎詐以稽留之列成而不得用與未陳相似故以未陳為文釋例曰長勺之役雖俱陳而鼓音不齊李之役越人患吳之整以死士亂吳雖皆已陳猶以獨克為文舉其權詐是也此注稽或作掩誤耳今定本作稽二月公侵宋注無傳侵例在二十九年三月宋人遷宿注無傳宋强遷之而取其地故文異於邢遷音義强其丈反夏六月齊師宋師次于郎注不言侵伐齊為兵主背蔇之盟義與長勺同音義背音佩傳同疏注正義曰此春敗齊師于長勺傳稱齊師伐我則今次于郎亦是欲來伐我而經竝不稱侵伐侵伐者責罪之文也桓十年齊侯鄭伯來戰于郎傳曰我有辭也故不稱侵伐則知此與長勺不書侵伐亦為我有辭也我有辭者齊來伐我為公伐齊納子糾來報伐也公之伐齊大夫來盟于蔇許以子糾為君今魯伐齊納子糾彼自背盟伐魯非責魯也魯有此辭故齊人不合伐也杜言二公子各有黨則迎子糾者非小白之徒而責齊背盟者言彼蔇盟大夫背盟而從小白誤公使伐齊耳不言桓公背盟也杜以傳於長勺之役有伐我之語故就傳為解而以此同之公敗宋師于乘丘注乘丘魯地音義乘繩證反秋九月荆敗蔡師于莘注荆楚本號後改為楚楚辟陋在夷於此始通中國然告命之辭猶未合典禮故不稱將帥莘蔡地音義莘所巾反將率于匠反率又作帥同所類反疏注正義曰荆楚一木二名故以為國號亦得二名終莊公之世經皆書荆僖之元年乃書楚人伐鄭蓋於爾時始改爲楚以後常稱楚也他國雖將有尊卑師有多少或稱師或稱將不得直書國名史之書䇿承彼告辭此直稱國知其告命之辭未合典禮故不稱將帥也以蔡侯獻舞歸注獻舞蔡季疏正義曰穀梁傳曰以歸猶愈乎執也杜於隱七年注云但言以歸非執也則以歸者直將與共歸不被囚執其恥輕於執也釋例得獲例曰敵國交兵亦有兵器之獲欲殊别君臣故於君曰滅於臣曰獲國君者社稷之主百姓之望當與社稷宗廟共其存亡者也而見獲於敵國雖存若亡死之與生皆與滅同至於偏軍元帥君之臣僕出身致命榮辱得失自其常事故傳曰胡子髠沈子逞滅獲陳夏齧君臣之辭也如杜此言師敗身虜亦應稱滅此不言滅而云以歸者釋例所云據宗廟社稷已亡而君見獲於敵君身雖在與亡無異皆以滅為文則定六年鄭游速帥師滅許以許男斯歸是也若社稷宗廟不亡君身見獲於敵則云以歸此蔡侯獻舞歸是也劉炫云在陳死則稱滅以還者則言以歸以規杜氏非也冬十月齊師滅譚注譚國在濟南平陵縣西南傳曰譚無禮此直釋所以見滅經無義例他皆放此滅例在文十五年音義譚徒南反譚子奔莒注不言出奔國滅無所出疏注正義曰公羊傳曰何以不言出國已滅矣無所出也傳十年春齊師伐我注不書侵伐齊背蔇之盟我有辭公將戰曹劌請見注曹劌魯人音義劌古衛反見賢遍反下同疏注正義曰史記作曹沬亦云魯人其鄉人曰肉食者謀之又何間焉注肉食在位者間猶與也音義閒間厠之間注同與音預疏注正義曰孟子論庶人云五畝之宅樹之以桑五十者可以衣帛雞豚狗彘之畜無失其時七十者可以食肉是賤人不得食肉故云在位者也襄二十八年傳説子雅子尾之食云公膳日雙雞昭四年傳說頒􅖅之法云食肉之祿􅖅皆與焉大夫命婦喪浴用􅖅蓋位為大夫乃得食肉也間謂間雜言不應間其中而為之謀故云間猶與也劌曰肉食者鄙未能遠謀乃入見問何以戰公曰衣食所安弗敢專也必以分人疏正義曰公意衣食二者雖所以安身然亦不敢專已有之必以之分人對曰小惠未徧民弗從也注分公衣食所惠不過左右故曰未徧音義徧音遍注同公曰犧牲玉帛音義犧許宜反疏正義曰四者皆祭神之物曲禮曰天子以犧牛諸侯以肥牛鄭𤣥云犧純毛也肥養於滌也然則牲謂三牲牛羊豕也犧者牲之純色也魯自得用天子之禮要犧牲相配之語未必為得用乃言之也弗敢加也必以信注祝辭不敢以小為大以惡為美對曰小信未孚神弗福也注孚大信也疏注正義曰孚亦信耳以言小信未孚故解孚為大信以形之公曰小大之獄雖不能察必以情注必盡已情察審也對曰忠之屬也注上思利民忠也音義屬音蜀疏注正義曰桓六年傳文也言以情審察不用使之有枉則是思欲利民故為忠之屬也可以一戰戰則請從公與之乘注共乘兵車音義從才用反乘繩證反戰于長勺公將鼓之劌曰未可齊人三鼓劌曰可矣齊師敗績公將馳之劌曰未可下視其轍注視車跡也音義三息暫反又如字轍直列反登軾而望之疏正義曰考工記云兵車之廣六尺有六寸三分車廣去一以為隧隧謂輿内前後深四尺四寸也三分其隧一在前二在後以揉其式式在輿間從前量之深一尺四寸三分寸之二也以其廣之半為之式崇崇二尺三寸也謂當車輿之内去前軫一尺四寸三分寸之二下去車板三尺三寸横施一木名之曰軾得使人立於其後時依倚之曹劌登軾得臣云君馮軾皆謂此也曰可矣遂逐齊師旣克公問其故對曰夫戰勇氣也一鼔作氣再而衰三而竭彼竭我盈故克之夫大國難測也懼有伏焉注恐詐奔音義軾音式伏如字舊扶乂反吾視其轍亂望其旗靡故逐之注旗靡轍亂怖遽音義旗音其靡音美怖普布反遽其據反夏六月齊師宋師次于郎公子偃曰宋師不整可敗也注公子偃魯大夫宋敗齊必還請擊之公弗許自雩門竊出蒙臯比而先犯之注雩門魯南城門臯比虎皮音義雩音于比音毗注同疏注正義曰雩門為魯南城門蓋時人猶以名之故知也僖二十八年傳稱胥臣蒙馬以虎皮此云蒙臯比而先犯之事與彼同知臯比是虎皮也以胥臣之事譬之必知定是虎皮其名曰臯比則其義未聞樂記云倒載干戈包之以虎皮名之曰建櫜鄭𤣥以為兵甲之衣曰櫜櫜韜也而其字或作建臯故服䖍引以解此公從之大敗宋師于乘丘齊師乃還蔡哀侯娶于陳息侯亦娶焉息媯將歸過蔡蔡侯曰吾姨也注妻之姊妹曰姨疏注正義曰釋親云妻之姊妹同出為姨孫炎云同出俱已嫁也止而見之弗賔注不禮敬也息侯聞之怒使謂楚文王曰伐我吾求救於蔡而伐之楚子從之秋九月楚敗蔡師于莘以蔡侯獻舞歸齊侯之出也過譚譚不禮焉及其入也諸侯皆賀譚又不至注以九年入音義過古禾反冬齊師滅譚譚無禮也譚子奔莒同盟故也注傳言譚不能及遠所以亡春秋左傳注疏卷七春秋左氏傳注疏卷七考證單伯送王姬疏成公以下常稱單子常監本訛當今改正齊師遷紀郱鄑郚注北海都昌縣西有訾城臣召南按此解鄑邑也後書郡國志北海都昌注引齊遷紀之鄑城地道記曰鄑城在縣西是也鄑音同訾故釋文同音子斯反傳不稱姜氏絶不為親禮也臣召南按文姜親與弑桓之謀莊公當以父之義絶其為母此左氏意與二傳不異者也杜注支離迂遠公子慶父帥師伐於餘丘注於餘丘國名也臣浩按啖助亦主杜說公羊以為邾婁之邑劉敞駁之孫復謂是附庸國呂祖謙謂是夷國若於越然又按左傳於莊公一代記事最少甚至一年但有一事餘俱無傳當由所見魯史亦闕失不全耳紀季以􅈶入于齊注􅈶紀邑在齊國東安平縣臣召南按東安平前漢屬葘川國後漢屬北海國前志注引孟康曰今􅈶亭是也後志注引此傳東萊集解引此注無東字誤也傳鄭伯辭以難注厲公在櫟故趙汸補注曰陳氏云杜氏厲公在櫟故説非是鄭伯即厲公今按杜氏疑下年遇埀鄭伯為子儀汸按齊侯殺子亹而祭仲立子儀子儀非齊侯所立陳侯又突之黨二國必不成子儀為君而與之會此鄭伯為厲公無疑杜氏并失傳意傳莫敖以王命入盟隨侯疏莫敖既與隨侯盟且又請隨侯與已為會禮於漢水之汭而後還楚也監本作且又請隨侯畏楚為會禮於漢水之汭而我還楚也殊不可解今依古本改郳犂來來朝注附庸國也東海昌慮縣東北有郳城臣浩按後書郡國志注引此作昌慮縣所治城東北有郳城郳小邾國也傳楚復伐鄧滅之陳傳良曰于此見傳終書之體趙汸曰按傳記楚滅凡十一國見宣十二年傳注春夫人姜氏會齊侯于防監本春字下衍一秋字今去傳星隕如雨與雨偕也臣召南按如雨公羊穀梁皆謂衆星散落如雨之多惟左氏作而雨解傳齊侯使連稱管至父戍葵丘注齊地臨淄縣西有地名葵丘臣召南按此與桓公會諸侯之地不同故杜别解傳初公孫無知虐於雍廩臣浩按此九年傳雍廪殺無知之首句也左傳初與經文各自成書故每有隔年連合之傳自杜預合為經傳集解始離傳以從經于每年之首即自畫斷多所間隔此傳其尤著者也傳秦子梁子以公旗辟于下道臣召南按此直接上公傳乘而歸本一傳也各本俱用一圈畫斷未詳其義齊師滅譚注譚國在濟南平陵縣西南臣召南按漢志作東平陵春秋左氏傳注疏卷七考證
