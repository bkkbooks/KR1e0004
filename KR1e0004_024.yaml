body:
  text: 春秋左傳注疏卷二十四起宣公十三年盡十八年晉杜氏注唐陸德明音義孔穎達疏經十有三年春齊師伐莒夏楚子伐宋秋螽注無傳為災故書冬晉殺其大夫先縠注書名以罪討傳十三年春齊師伐莒莒恃晉而不事齊故也夏楚子伐宋以其救蕭也注救蕭在前年君子曰清丘之盟唯宋可以免焉注宋討陳之二今宋見伐晉衛不顧盟以恤宋而經同貶宋大夫傳嫌華椒之罪纍及其國故曰唯宋可以免音義纍劣僞反疏正義曰往年清丘之盟宋卿亦貶傳稱不實其言此年宋被楚伐而晉衛不救即是不實之狀於此發傳言唯宋可以免者意在責諸國耳嫌華椒之罪纍及其國恐言宋亦有罪宜其不救但盟之不信唯椒身合貶宋國無罪言唯宋可以免見諸國皆合責也秋赤狄伐晉及清先縠召之也注邲戰不得志故召狄欲為變清一名清原冬晉人討邲之敗與清之師歸罪于先縠而殺之盡滅其族君子曰惡之來也已則取之其先縠之謂乎注盡滅其族謂誅已甚故曰惡之來也疏正義曰先縠之罪不合滅族盡滅其族為誅已甚亦是晉刑太過是為太惡君子既嫌晉刑大過又尤先縠自招故曰惡之來也已自取之惡之來也言大惡之事來先縠之家清丘之盟晉以衛之救陳也討焉注尋清丘之盟以責衛使人弗去曰罪無所歸將加而師孔達曰苟利社稷請以我說注欲自殺以說晉音義使所吏反我說如字又音恱以說音恱又如字罪我之由我則為政而亢大國之討將以誰任注亢禦也謂禦宋討陳也音義亢苦浪反任音壬我則死之為明年殺孔達傳經十有四年春衛殺其大夫孔達注書名背盟于大國罪之夏五月壬申曹伯壽卒注無傳文十四年盟新城晉侯伐鄭秋九月楚子圍宋葬曹文公注無傳冬公孫歸父會齊侯于穀傳十四年春孔達縊而死衛人以說于晉而免注以殺告故免于伐音義縊一賜反遂告于諸侯曰寡君有不令之臣達搆我敝邑于大國既伏其罪矣敢告注諸殺大夫亦皆告衛人以為成勞復室其子注以有平國之功故以女妻之音義復扶又反妻七計反疏正義曰釋詁以平為成則成亦平也男子謂妻為室故杜以為衛人以其父有平定國家之勞故以女妻之言衛侯以女妻之也劉炫以為傳文無衛侯之女為孔達之妻復室其子謂復以室家還其子謂達既被誅家當沒入官復以孔達財物家室還其子今知非者案撿傳文上孔達云苟利社稷請以我說是孔達忠於衛國本實無罪所以告於諸侯祗欲虛以說晉衛人荷其功力何得沒其家資男子謂妻為室則室者對夫之言故傳云女有家男有室今若以孔達之妻而還其子便則以母還子不得云復室其子又諸國大夫之妻傳皆不載其氏姓何得獨責孔達之妻須言衛侯之女既言復室其子明孔達之妻非衛候之女可知劉以孔達之妻為衛侯之女於傳無文以規杜過於義非也使復其位注襲父祿位夏晉侯伐鄭為邲故也注晉敗於邲鄭遂屬楚音義為于僞反告於諸侯搜焉而還注搜簡閲車馬音義搜所留反閲音恱中行桓子之謀也曰示之以整使謀而來鄭人懼使子張代子良于楚注十二年子良質于楚子張穆公孫音義行户郎反質音致鄭伯如楚謀晉故也鄭以子良為有禮故召之注有讓國之禮楚子使申舟聘于齊曰無假道于宋注申舟無畏亦使公子馮聘于晉不假道于鄭申舟以孟諸之役惡宋注文十年楚子田孟諸無畏抶宋公僕音義馮皮冰反惡烏路反抶勑乙反曰鄭昭宋聾注昭明也聾暗也音義聾力工反疏正義曰人之視聽聰明唯在耳目而已鄭昭言其目明則宋不明也宋聾言其耳暗則鄭不暗也耳目各舉一事而對以相反言宋不解事必殺我也晉使不害我則必死王曰殺女我伐之見犀而行注犀申舟子以子託王示必死音義使所吏反使者同女音汝見賢遍反及宋宋人止之華元曰過我而不假道鄙我也鄙我亡也注以我比其邊鄙是與亡國同音義過古卧反又古禾反殺其使者必伐我伐我亦亡也亡一也乃殺之楚子聞之投袂而起注投振也袂袖也音義袂面世反袖徐又反屨及于窒皇注窒皇寢門闕音義屨九具反窒直結反疏正義曰下云劔及於寢門之外則屨之所及未至於外故以窒皇為寢門之闕謂至門遂及也莊十九年鬻拳葬於絰皇注云絰皇冢前闕者亦以此而知也經傳通謂兩觀為闕唯指雉門髙大為縣舊章而使民觀之故雉門之觀特得闕名名為闕者以其在門兩旁而中央闕然為道雖則小門亦如此耳故杜於寢門冢門皆以闕言之此作窒彼作絰字異音同未知孰是其名為窒皇及市名蒲胥其義皆未聞劔及于寢門之外車及于蒲胥之市秋九月楚子圍宋冬公孫歸父會齊侯于穀見晏桓子與之言魯樂疏正義曰樂謂樂居髙位也桓子告髙宣子注桓丁晏嬰父宣子髙固音義樂音洛曰子家其亡乎懷于魯矣注子家歸父字懷思也懷必貪貪必謀人謀人人亦謀已一國謀之何以不亡注為十八年歸父奔齊傳疏正義曰懷思也謂思髙位於魯也既思髙位必貪貪必計謀他人既謀去他人他人亦謀去已一國之人謀去之何以不至亡也孟獻子言于公曰臣聞小國之免于大國也聘而獻物注物玉帛皮幣也疏正義曰聘禮賓執圭以致命享用束帛加璧夫人聘用璋享用𤣥纁束帛加琮其享幣又有皮馬是聘所獻物有玉帛皮幣也於是有庭實旅百注主人亦設籩豆百品實於庭以答賓疏正義曰聘禮君使卿韋辨服歸饔餼五牢有司八陳鼎豆簋鉶醯醢百罋米百筥黍稷稻梁皆設於中庭是主人設籩豆百品實於庭以答賓也劉炫謂治國有功士饒云云炫以杜注莊二十二年庭實旅百奉之以玉帛諸侯朝王陳贄帛之象則朝聘陳幣亦實百品於庭非獨主人也朝而獻功注獻其治國若征伐之功於牧伯於是有容貌采章嘉淑而有加貨注容貌威儀容顔也采章車服文章也嘉淑令辭稱讚也加貨命宥幣帛也言往共則來報亦備疏正義曰杜謂於是有者皆主人之事故以容貌有威儀容顔當謂善為威儀容顔以接賓也采章車服文章謂主人陳設物采文章以接賓周禮車逆之類也嘉淑皆訓為善容貌文章以外别言善善故以為令辭稱讚謂接賓之時善言辭善稱讚也加貨謂好貨加增於常若僖二十九年介葛盧來朝禮之加燕好成十三年孟獻子為介王重賄之之類故以加貨為命宥幣帛也劉炫云案此勸君行聘唯當論聘之義深不宜言主之禮備豈慮楚不禮而言此也君之威儀無時可舍豈待朝聘賓至乃始審威儀正顔色無賓客則驕容儀容儀非報賓之物何言報禮備又獻其治國劉炫云傳稱朝以正班爵之儀率長幼之序則不名獻功成二年王禮鞏伯如侯伯充敵使大夫告慶之禮則侯伯克敵秪合使大夫告王征伐之功何故親朝獻牧伯禮小朝大小國不合専征復有何功可獻炫謂采章加貨則聘享獻國所有𤣥纁璣組羽毛齒革皆充衣服旌旗之飾可以為容貌物采文章嘉淑謂美善之物加貨言賄賂之多皆賓所獻亦庭實也於聘總言庭實於朝指其所有詳於君略於臣也案莊二十二年傳庭實旅百則朝有庭實又成二年傳云侯伯克敵使大夫告慶之禮據此文則聘賓有庭實又庭實旅百與容貌采章相對杜何知庭實容貌之等非是賓之所有必為主人之物又君無獻征伐之功何以知獻功於牧伯今知劉說非者僖二十二年楚子入享于鄭庭實旅百加籩豆六品又昭五年燕有好貨飱有陪鼎僖二十九年葛盧來朝禮之加燕好此傳云嘉淑而有加貨故知加貨庭實之等皆是主人待賓之物禮傳賓之於主無加貨之文故杜為此解襄八年鄭伯親獻蔡捷于邢丘是獻征伐之功於牧伯也劉苟違杜義以為庭實旅百及容貌采章嘉淑加貨之等竝為賓物又以諸侯親朝無獻征伐之功以規杜氏違經背傳於義非也謀其不免也誅而薦賄則無及也注薦進也見責而往則不足解罪音義賄呼罪反今楚在宋君其圖之公說注為明年歸父㑹楚子傳音義說音恱疏正義曰臣聞小國之免罪於大國也使卿往聘大國而獻其玉帛皮幣之物於是主人亦禮待之庭前所實籩豆醯醢有百品也君自親朝於牧伯之國而獻其治國之功若征伐之功於是主人敬以待之主人之身有威儀容貌車服之飾有物采文章嘉淑皆善也有善言辭善稱讚燕而送賓有加增賄貨言賓往既共則主報亦厚禮使小國如此朝聘大國者謀其不免於罪也若不往朝聘待其被誅責而始薦賄貨則無及於好事矣今楚子在宋君其圖之勸君使往聘也劉炫以為皆是賓事聘而獻物謂獻其國內之物於是所獻之物庭中實之有百品謂聘享之禮龜金竹箭之屬有百品也朝而獻功言治國有功故土饒物産於是𤣥纁璣組羽毛齒革乃得為容貌之物采文章嘉淑謂美善之物加貨謂賄賂之多多獻賄賂以謀其不免於罪也經十有五年春公孫歸父會楚子于宋夏五月宋人及楚人平注平者總言二國和故不書其人疏正義曰平者和也言其先不平而今始平小服大弱下彊之意昭七年暨齊平燕與齊平也定十年及齊平十一年及鄭平魯與平也諸言平者皆舉國言平總言二國和平之意故不書其人謂不書公卿也燕暨齊平不言人此言宋人楚人史異辭耳穀梁傳曰人者衆辭也平稱衆上下欲之也賈逵云稱人衆辭善其與衆同欲然則彼不稱人者豈唯國君欲平而在下者不欲平乎傳載盟辭則此平有盟不書盟者釋例曰宋人及楚人平實盟書平從赴辭也六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸注潞赤狄之别種潞氏國故稱氏子爵也林父稱師從告音義潞音路種章勇反疏正義曰狄有赤狄白狄就其赤白之間各自别有種類此潞是國名赤狄之內别種一國夷狄祖其雄豪者子孫則稱豪名為種若中國之始封君也謂之赤白其義未聞蓋其俗尚赤衣白衣也傳稱天子建德因生以賜姓胙之士而命之氏者即以國名為氏但華夏不須言夏國名不以氏配赤狄既須言狄單國不復成文故以氏配之潞氏甲氏臯落氏皆是也杜言氏國故稱氏雖指解此狄而中國亦然劉炫云狄稱種者周禮內宰上春生穜稑之種賤之同之草木故稱種林父尊卿當稱帥師今從將卑師衆之例直稱師者從告也秦人伐晉注無傳王札子殺召伯毛伯注稱殺者名兩下相殺之意兩下相殺則殺者有罪王札子王子札也蓋經文倒札字音義札側八反徐又側乙反召上照反倒丁老反疏正義曰穀梁傳曰不言其兩下相殺也言兩臣下自相殺非君殺自不得言其大夫也釋例曰大臣相殺死者無罪則兩稱名氏以示殺者之罪王札子殺召伯毛伯是也若死者有罪不稱殺者名氏晉殺其大夫陽處父是也傳稱此人為王子捷捷札一人而札在子上故疑經文倒札字也公羊傳曰王札子者何長庶之號也何休云天子之庶兄也左傳言札為王孫蘇所使非是尊貴不得為王之庶兄故譜以為雜人不知何王之子秋螽注無傳音義螽音終仲孫蔑㑹齊髙固于無婁注無傳無婁杞邑初稅畝注公田之法十取其一今又履其餘畝復十收其一故哀公曰二吾猶不足遂以為常故曰初音義稅始鋭反復扶又反疏正義曰公羊傳曰古者什一而藉古者曷為什一而藉什一者天下之中正也多乎什一大桀小桀寡乎什一大貉小貉什一者天下之中正者什一行而頌聲作矣何休云多取於民比於桀蠻貉無百官制度之費稅薄穀梁傳亦云古什一而藉孟子云夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也趙岐注云民耕五十畝者貢上五畝耕七十畝者以七畝助公家耕百畝者徹取十畝以為賦雖異名而多少同故云皆什一也書傳言十一者多矣故杜言古者公田之法十取其一謂十畝內取一舊法既已十畝取一矣今又履其餘畝更復十取其一乃是十取其二故論語云哀公曰二吾猶不足謂十內稅二猶尚不足則從此之後遂以十二為常故曰初言初稅十二自此始也諸書皆言十一而周禮載師云凡任地近郊十一逺郊二十而三甸稍縣都皆無過十二漆林之征二十而五者彼謂王畿之內所共多故賦稅重諸書所言十一皆謂畿外之國故鄭𤣥云十一而稅謂之徹徹通也為天下之通法言天下皆十一耳不言畿內亦十一也孟子又曰方里為井井九百畝其中為公田八家皆私百畝同養公田公事畢然後敢治私事漢書食貨志取彼意而為之文云井田方一里是為九夫八家共之各受私田百畝公田十畝是為八百八十畝餘二十畝為廬舍諸儒多用彼為義如彼所言則家别一百一十畝是為十外稅一也鄭𤣥詩箋云井稅一夫其田百畝則九而稅一其意異於漢書不以志為說也又孟子對滕文公云請野九一而助國中什一使自賦鄭𤣥周禮匠人注引孟子此言乃云是邦國亦異外內之法則鄭𤣥以為諸侯郊外郊內其法不同郊內十一使自賦其一郊外九而助一是為二十而稅二故鄭𤣥又云諸侯謂之徹者通共率以十一為正言郊內郊外相通其率為十稅一也杜今直云十取其一則又異於鄭唯謂一夫百畝以十畝歸公今又履其餘畝稅之更十取一耳履畝穀梁傳文也趙岐不解夏五十殷七十之意蓋古者人多田少一夫唯得五十七十畝且五十而貢貢五畝七十而助助七畝好異如此鄭注考工記云周人畿內用夏之貢法邦國用殷之助法冬蝝生注螽子以冬生遇寒而死故不成螽音義蝝恱全反字林尹絹反劉歆云蚍蜉子也董仲舒云蝗子疏正義曰釋蟲云草螽負蠜蜇螽蠔蝑李巡云皆分别蝗子異方之語也釋蟲又云蝝蝮蜪李巡云蝮蜪一名蝝蝝蝗子也郭璞云蝗子未有翅者劉歆以為蚍蜉有翅者非也如李郭之說是蝝為螽子也上云秋螽秋而生子於地至冬其子復生遇寒而死故不成災傳稱凡物不為災不書此不為災而書之者傳云幸之也此年既饑若使蝝早生更為民害則其困甚矣喜其冬生以為國家之幸故喜而書之公羊傳亦云蝝生不書此何以書幸之也饑注風雨不和五稼不豐疏正義曰此年秋螽知不為螽而饑者春秋書螽多矣有螽之年皆不書饑而此獨書饑知年飢不専為蠡故云風雨不和五稼不豐也傳十五年春公孫歸父會楚子于宋注終前年傳宋人使樂嬰齊告急于晉晉侯欲救之伯宗曰不可注伯宗晉大夫古人有言曰雖鞭之長不及馬腹注言非所擊天方授楚未可與爭雖晉之彊能違天乎諺曰髙下在心注度時制宜音義度待洛反川澤納汙注受汙濁山藪藏疾注山之有林藪毒害者居之音義藪素口反疏正義曰周禮虞之官有大澤大藪小澤小藪爾雅十藪皆是大澤則藪是澤類鄭𤣥周禮注云澤水所鍾也水希曰藪是藪者澤之小水之名也川澤山藪相配為文者川是流水澤是委水俱是水故總云納汙言其納汙濁也山有木藪有草毒螫之蟲在草在木故俱云藏疾言其藏毒害也藪是澤類而杜云山之有林藪者藪雖澤類傳文與山相連藪是草木積聚之處近山近渾皆得稱藪上既有川澤之文下别云山藪之事此藪近山故杜云山之有林藪也劉炫以為澤旁之藪以規杜氏非也瑾瑜匿瑕注匿亦藏也雖美玉之質亦或居藏瑕穢音義瑾其靳反瑜羊朱反匿女力反疏正義曰瑾瑜玉之美名聘義曰瑕不掩瑜瑜不掩瑕鄭𤣥云瑕玉之病也瑜其中間美者玉之性善惡不相掩此云匿瑕似以美匿惡故云匿亦藏也言玉質雖美亦瑕藏其中不言瑜能掩蓋瑕也國君含垢注忍垢耻音義垢古口反本或作詬音同天之道也注晉侯耻不救宋故伯宗為說小惡不損大德之喻音義為于僞反君其待之注待楚衰乃止使解揚如宋使無降楚曰晉師悉起將至矣鄭人囚而獻諸楚楚子厚賂之使反其言注反言晉不救音義解音蟹降户江反不許三而許之登諸樓車使呼宋人而告之注樓車車上望櫓音義櫓音魯遂致其君命楚子將殺之使與之言曰爾既許不穀而反之何故非我無信女則棄之速即爾刑對曰臣聞之君能制命為義臣能承命為信信載義而行之為利謀不失利以衛社稷民之主也義無二信注欲為義者不行兩信音義女音汝下注而女也同信無二命注欲行信者不受二命君之賂臣不知命也受命以出有死無霣注霣廢隊也音義霣于敏反隊直類反又可賂乎臣之許君以成命也注成其君命死而成命臣之祿也寡君有信臣注已不廢命下臣獲考注考成也死又何求楚子舍之以歸夏五月楚師將去宋注在宋積九月不能服宋故申犀稽首于王之馬前曰無畏知死而不敢廢王命王棄言焉王不能答注未服宋而去故曰棄言申叔時僕注僕御也曰築室反耕者宋必聽命從之注築室於宋分兵歸田示無去志王從其言宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告注兵法因其鄉人而用之必先知其守將左右謁者門者舍人之姓名因而利道之華元蓋用此術得以自通音義守手又反將子匠反道音導曰敝邑易子而食析骸以爨注爨炊也音義析思歷反骸户皆反本又作骨公羊傳作骸何休注云骸骨也爨七亂反雖然城下之盟有以國斃不能從也注寧以國斃不從城下盟音義斃婢世反去我三十里唯命是聽子反懼與之盟而告王退三十里宋及楚平華元為質盟曰我無爾詐爾無我虞注楚不詐宋宋不備楚盟不書不告音義質音致疏正義曰服䖍云與華元私盟許為退師若孟任割臂與魯莊公盟下云盟曰是兩國平後共盟而楚人為此辭耳非此華元子反私盟之辭也潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目注酆舒潞相音義酆芳忠反相息亮反晉侯將伐之諸大夫皆曰不可酆舒有三雋才注雋絶異也言有才藝勝人者三音義雋音俊疏正義曰辨名記云倍人曰茂十人曰選倍選曰雋千人曰英倍英曰賢萬人曰桀倍桀曰聖是雋為絶異之稱也有三雋才知其有才藝勝人者三事耳不知三者何事也不如待後之人伯宗曰必伐之狄有五罪雋才雖多何補焉不祀一也耆酒二也棄仲章而奪黎氏地三也注仲章潞賢人也黎氏黎侯國上黨壺關縣有黎亭音義耆市志反黎禮兮反國名虐我伯姬四也傷其君目五也疏正義曰此五者從輕至重祀雖為大罪廢祀未是害物故先言之耆酒則廢亂政事有害於民故次之棄賢人而侵鄰國其害已大又次之殺夫人傷君目罪之大者故後言之棄仲章而奪黎氏地是為二事而并數為一者俱是為政之惡故并數之奪黎氏地已盡奪之使黎侯失位故下云立黎侯而還更復其國也怙其雋才而不以茂德兹益罪也後之人或者將敬奉德義以事神人而申固其命注審其政令若之何待之不討有罪曰將待後後有辭而討焉毋乃不可乎夫恃才與衆亡之道也商紂由之故滅注由用也疏正義曰史記殷本紀云紂賢辨捷疾聞見甚敏材力過人手格猛獸知足以拒諫飾是非之端矜人臣以能髙天下以聲以為皆出已之下武王伐滅之是由恃才雋故滅也天反時為災注寒暑易節地反物為妖注羣物失性民反德為亂亂則妖災生疏正義曰據其害物謂之災言其怪異謂之妖時由天物在地故屬災於天屬妖於地其實民有亂德感動天地天地為之見變妖災因民而生天地共為之耳非獨天為災而地為妖民謂人也感動天地皆是人君感之非庶民也昭七年傳曰國無政不用善則自取謫於日月之災言以政取謫是其由君不由民以民表人故釋例引此即改民為人是其民謂人也傳言天災地妖民亂厯序以尊卑為次更言亂則妖災生明妖災由民起妖災亦通言耳天雖四時氣唯寒暑故杜以反時為寒暑易篩物則其數無窮故總云羣物失性反其常性即是妖也釋例曰物者雜而言之則昆蟲草木之類也大而言之則嵗時日月星辰之謂也歲者水旱饑饉也時者寒暑風雨雷電雪霜也日月者薄食夜明也星辰者彗孛霣錯失其次也山崩地震者陽伏而不能出隂迫而不能升也凡天反其時地反其物以害其物性皆為妖災是言妖災皆通天地共為之也此傳地反物者唯言妖耳洪範五行傳則有妖孽禍痾眚祥六者之名以積漸為義漢書五行志說此六名云凡草木之類謂之妖妖猶天胎言尚微也蟲豸之類謂之孽孽則牙孽矣及六畜謂之禍言其著也及人謂之痾痾病類言浸深也甚則異物生謂之眚自外來謂之祥是六名以漸為稱唯眚祥有外內之異耳大旨皆是妖也故文反正為乏注文字疏正義曰許愼說文序云蒼頡之初作書蓋依類象形謂文其後形聲相益謂之字文者物象之本字者孳乳而生是文謂之字也制字之體文反正為乏服䖍云言人反正者皆乏絶之道也人反德則妖災生妖災生則國亡滅是乏絶之道也盡在狄矣疏正義曰言盡在狄矣則狄皆有之其反德為亂則五罪是也天地災妖傳不指斥不知於時潞國有何災何妖也晉侯從之六月癸卯晉荀林父敗赤狄于曲梁辛亥滅潞注曲梁今廣平曲梁縣也書癸卯從赴酆舒奔衛衛人歸諸晉晉人殺之王孫蘇與召氏毛氏爭政注三人皆王卿士使王子捷殺召戴公及毛伯衛注王子捷即王札子卒立召襄注襄召戴公之子疏正義曰卒終也謂後終立之非此時即立毛氏後亦不滅但傳不言之耳秋七月秦桓公伐晉次于輔氏注晉地壬午晉侯治兵于稷以略狄土注略取也稷晉地河東聞喜縣西有稷山壬午十月二十九日晉時新破狄土地未安權秦師之弱故别遣魏顆距秦而東行定狄也音義顆苦果反立黎侯而還注狄奪其地故晉復立之音義復扶又反及雒魏顆敗秦師于輔氏注晉侯還及雒也雒晉地音義雒音洛獲杜回秦之力人也初魏武子有嬖妾無子武子疾命顆曰必嫁是注武子魏犨顆之父音義嬖必計反疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也及輔氏之役顆見老人結草以亢杜回注亢禦也音義殉似俊反本或作必以殉治直吏反下治命同亢苦浪反杜回躓而顚故獲之夜夢之曰余而所嫁婦人之父也注而汝也音義躓陟吏反徐又丁四反爾用先人之治命余是以報注傳舉此以示教晉侯賞桓子狄臣千室注千家亦賞士伯以瓜衍之縣注士伯士貞子音義瓜古華反衍以善反曰吾獲狄土子之功也微子吾喪伯氏矣注伯桓子字邲之敗晉侯將殺林父士伯諫而止音義喪息浪反羊舌職說是賞也注職叔向父音義說音悅向香丈反曰周書所謂庸庸祗祗者謂此物也夫注周書康誥庸用也祗敬也物事也言文王能用可用敬可敬音義夫音扶士伯庸中行伯注言中行伯可用君信之亦庸士伯此之謂明德矣文王所以造周不是過也故詩曰陳錫載周能施也注錫賜也詩大雅言文王布陳大利以賜天下故能載行周道福流子孫音義施式豉反率是道也其何不濟晉侯使趙同獻狄俘于周不敬劉康公曰不及十年原叔必有大咎注劉康公王季子也原叔趙同也音義俘芳夫反不敬一本作而傲天奪之魄矣注心之精爽是謂魂魄為成八年晉殺趙同傳音義魄普白反疏正義曰心之精爽是謂魂魄魂魄去之何以能久昭二十五年傳文初稅畝非禮也穀出不過藉注周法民耕百畝公田十畝借民力而治之稅不過此以豐財也疏正義曰藉者借也民之田穀出共公者不過取所借之田欲以豐民之財故不多稅也既譏某稅畝言非禮乃舉正禮言穀出不過藉則知所稅畝者是藉外更稅故杜氏為十一外更十取一且以哀公之言驗之知十二而稅自此始也冬蝝生饑幸之也注蝝未為災而書之者幸其冬生不為物害時歲雖饑猶喜而書之疏正義曰幸之者為幸蝝冬生不幸饑也而傳以饑連蝝生乃云幸之者以嵗饑而復有災則民彌益其困由饑之故乃以為幸故傳連饑釋之經十有六年春王正月晉人滅赤狄甲氏及留吁注甲氏留吁赤狄别種晉既滅潞氏今又并盡其餘黨士會稱人從告音義吁況于反種章勇反并必政反一音如字夏成周宣榭火注傳例曰人火之也成周洛陽宣榭講武屋别在洛陽者爾雅曰無室曰榭謂屋歇前音義榭本又作謝音同疏正義曰楚語云先王之為臺榭也榭不過講軍實臺不過望氛祥知榭是講武屋也名之曰宣則其義未聞服䖍云宣揚威武之處義或當然也成周周之下都此榭别在洛陽講習武事則往就之爾雅釋宫云無室曰榭又云闍謂之臺有木者謂之榭李巡曰臺積土為之所以觀望臺上有屋謂之榭則榭是臺上之屋居臺而臨觀講武故無室而歇前歇前者無壁也如今㕔是也公羊以為宣宫之榭謂宣王之廟也以其中興其廟不毁與左氏異也秋郯伯姬來歸音義郯音談冬大有年注無傳傳十六年春晉士會帥師滅赤狄甲氏及留吁鐸辰注鐸辰不書留吁之屬音義鐸待洛反三月獻狄俘注獻于王也晉侯請于王戊申以黻冕命士會將中軍且為大傅注代林父將中軍且加以大傅之官黻冕命卿之服大傅孤卿音義黻音弗將子匠反大音泰注同疏正義曰晉之中軍之將執政之上卿也大傅又尊於上卿且加大傅以褒顯之禮命臣者皆賜之以服使服而受命傳言以黻冕者黻冕是命孤卿之服故以之命士會也論語稱禹惡衣服而致美乎黻冕鄭𤣥云黻祭服之衣冕其冠也此云黻冕亦當然也黻蔽膝也祭服謂之黻其他服謂之韠俱以韋為之制同而色異韠各從裳色黻則其色皆赤尊卑以深淺為異天子純朱諸侯黃朱大夫赤而已大夫以上冕服悉皆有黻故禹言黻冕此亦云黻冕但冕服自有尊卑耳周禮司服孤之服自希冕而下此士會黻冕當是希冕也大子大傅三公之官也諸侯大傅孤卿之官也周禮典命云公之孤四命鄭衆云九命上公得置孤卿一人春秋時晉為霸主侯亦置孤卿文六年有大傅陽子大師賈他則晉嘗置二孤於是晉國之盜逃奔于秦羊舌職曰吾聞之禹稱善人注稱舉也不善人逺此之謂也夫詩曰戰戰兢兢如臨深淵如履薄冰善人在上也注言善人居位則無不戒懼音義逺于萬反夫音扶兢居陵反本亦作矜善人在上則國無幸民諺曰民之多幸國之不幸也是無善人之謂也音義諺音彥夏成周宣榭火人火之也凡火人火曰火天火曰災疏正義曰人火從人而起人失火而為害本其火之所來故指火體而謂之為火天火則自然而起不能本其火體故以其所害言之謂之為災聖人重天變故異其名春秋天變多矣唯此言火耳秋郯伯姬來歸出也為毛召之難故王室復亂注毛召難在前年音義為于僞反難乃旦反注同復扶又反王孫蘇奔晉晉人復之注毛伯之黨欲討蘇氏故出奔冬晉侯使士㑹平王室定王享之原襄公相禮注原襄公周大夫相佐也音義相息亮反注同殽蒸注蒸升也升殽於爼音義殽户交反蒸之承反疏正義曰禮升殽於爼皆謂之蒸故蒸為升也鄭𤣥詩箋云凡非穀而食之曰殽則殽是可食之名切肉為殽乃升於爼故謂之殽蒸武子私問其故注享當體薦而殽蒸故怪問之武士會諡季其字疏正義曰若公侯來朝王為設享則當有體薦薦其半體亦謂之房蒸武子謂已被王享亦當房蒸今乃殽蒸故怪而問之王聞之召武子曰季氏而弗聞乎王享有體薦注享則半解其體而薦之所以示共儉疏正義曰王為公侯設享則半解其體而薦之為不食故不解折所以示共儉也示共儉與下示慈惠成十二年傳文宴有折爼注體解節折升之於爼物皆可食所以示慈惠也音義折之設反注同疏正義曰王為公侯設宴禮體解節折升之於爼即殽蒸是也其物解折使皆可食共食噉之所以示慈惠也其宴飲殽蒸其數無文若祭祀體解案特牲饋食禮有九體則肩一臂二臑三肫四胳五正脊六橫脊七長脅八短脅九此謂士禮也若大夫禮則十一體加脡脊代脅其諸侯天子無文或同十一公當享卿當宴王室之禮也注公謂諸侯疏五等諸侯總名為公故云公謂諸侯言諸侯親來則為之設享又設燕也享用體薦燕用折爼若使卿來雖為設享仍用公之燕法亦用折爼是王室待賓之禮也周語說此甚詳王召士季曰子弗聞乎禘郊之事則有全蒸王公立飫則有房蒸親戚宴享則有殽蒸今叔父使士季實來唯是先王之宴禮欲以貽爾體解節折而共飲食之於是乎有折爼以示容合好將安用全蒸注國語者皆云禘祭宗廟郊祭天地則有全其牲體而升於爼謂之全蒸王公立飫即享禮也禮之立成者名為飫半解其體而升於爼謂之房蒸傳言體薦即房蒸也親戚宴享則宴享禮同皆體解節折乃升於爼謂之殽蒸此傳略而為文猶是彼意故注皆取彼解之武子歸而講求典禮以修晉國之法注傳言典禮之廢久經十有七年春王正月庚子許男錫我卒注無傳再與文同盟疏正義曰錫我以文六年即位七年盟于扈十四年于新城魯許俱在是再同盟也丁未蔡侯申卒注無傳未同盟而赴以名丁未二月四日夏葬許昭公注無傳葬蔡文公注無傳六月癸卯日有食之注無傳不書朔官失之已未公會晉侯衛侯曹伯邾子同盟于斷道注斷道晉地音義斷直管反一音短秋公至自會注無傳冬十有一月壬午公弟叔肸卒注傳例曰同母弟音義肸許乙反傳十七年春晉侯使郤克徵會于齊注徵召也欲為斷道會齊頃公帷婦人使觀之郤子登婦人笑于房注跛而登階故笑之音義頃音傾跛波可反疏正義曰沈氏引穀梁傳云魯行父秃晉郤克跛衛孫良夫眇曹公子首傴故婦人笑之是以知郤克跛也穀梁傳定本作郤克眇衛孫良夫跛獻子怒出而誓曰所不此報無能涉河注不復渡河而東音義復扶又反獻子先歸使欒京廬待命于齊曰不得齊事無復命矣注欒京廬郤克之介使得齊之罪乃復命音義廬音盧又力於反郤子至請伐齊晉侯弗許請以其私屬又弗許注私屬家衆也為成二年戰于鞍傳音義鞍音安齊侯使髙固晏弱蔡朝南郭偃會注晏弱桓子音義朝如字及斂盂髙固逃歸注聞郤克怒故音義斂徐音廉一音力漸反盂音于夏會于斷道討二也盟于卷楚注卷楚即斷道音義卷音權一音居免反辭齊人晉人執晏弱于野王執蔡朝于原執南郭偃于溫注執三子不書非卿野王縣今屬河內苗賁皇使見晏桓子注賁皇楚鬭椒之子楚滅鬭氏而奔晉食邑于苗地晏弱時在野王故因使而見之音義賁扶云反使所吏反注及下同歸言於晉侯曰夫晏子何罪昔者諸侯事吾先君皆如不逮注言汲汲也音義逮音代或大計反汲音急舉言羣臣不信諸侯皆有二志注舉亦皆也齊君恐不得禮注不見禮待故不出而使四子來左右或沮之注沮止也音義沮在吕反曰君不出必執吾使故髙子及斂盂而逃夫三子者曰若絶君好寧歸死焉為是犯難而來吾若善逆彼注彼齊三人音義好呼報反為于僞反難乃但反以懷來者吾又執之以信齊沮吾不既過矣乎過而不改而又久之以成其悔何利之有焉使反者得辭注反者髙固謂得不當來之辭疏正義曰使沮者之言信也晏桓子等懼晉之命不得已而來恨齊侯之使也今晉不以禮待之而又久執之以成其悔恨言本恨齊今又恨晉齊侯見晉如此將有背晉之心齊若叛晉何利之有言此者勸晉侯免之耳而害來者以懼諸侯將焉用之晉人緩之逸注緩不拘執使得逃去也傳言晉不能修禮諸侯所以二音義焉於䖍反拘九于反秋八月晉師還范武子將老注老致仕初受隨故曰隨武子後更受范復為范武子音義復扶又反召文子曰燮乎吾聞之喜怒以類者鮮注文子士會之子燮其名音義燮素協反鮮息淺反易者實多注易遷怒也詩曰君子如怒亂庶遄沮君子如祉亂庶遄已注詩小雅也遄速也洱止也祉福也音義遄市専反祉音耻君子之喜怒以已亂也弗已者必益之郤子其或者欲已亂於齊乎不然余懼其益之也余將老使郤子逞其志庶有豸乎注豸解也欲使郤子從政快志以止亂音義豸本又作鳩直是反或音居牛反非也解音蟹此訓見方言疏注豸解也正義曰方言文爾從二三子唯敬注二三子晉諸大夫乃請老郤獻子為政冬公弟叔肸卒公母弟也凡太子之母弟公在曰公子不在曰弟注以兄為尊凡稱弟皆母弟也注此䇿書之通例也庶弟不得稱公弟而母弟或稱公子若嘉好之事則仍舊史之文惟相殺害然後據例以示義所以篤親親之恩崇友于之好釋例論之備矣音義好呼報反疏正義曰此例再言凡者前凡明稱母弟之文適子及妾子之等後凡明策書稱弟者皆母弟之義公之母弟見經者鄭假魯公子友衛叔武實母弟而不稱弟陳公子招昭元年稱公子八年稱弟釋例曰弟之寵異於衆弟蓋緣自然之情以養母氏之志公在雖俱稱公子其兄為君則特稱弟殊而異之親而睦之既以隆友于之恩亦以奬為人弟之敬成相親之益也通庶子為君故不言夫人之子而曰母弟母弟之見於經者二十而傳之所發六條而已凡稱弟皆母弟此策書之通例也庶弟不得稱弟而母弟得稱公子故傳之所發隨而釋之諸稱弟者不言皆必稱弟也秦伯之弟針適晉女叔齊曰秦公子必歸此公子亦國之常言得兩通之證也仲尼因母弟之例據例以興義鄭伯懷害弟之心天王縱羣臣以殺其弟夫子探書其志故顯稱二兄以首惡佞夫稱弟不聞反謀也鄭假去弟身為謀首也然則兄而害弟稱弟以章兄罪弟又害兄則去弟以罪弟身也推此以觀其餘秦伯之弟針陳侯之弟黃衛侯之弟鱄出奔皆是兄害其弟也秦伯有千乘之國而不能容其母弟傳曰罪秦伯歸罪秦伯見針罪輕也陳侯不能制禦臣下使逐其弟傳曰非罪非黃之罪則罪在陳侯此互舉之文也至於陳招殺兄之子宋辰率羣卿以背宗國披大邑以成叛逆然不推刃於其兄故以首惡稱弟稱名從兩下相殺也統論其義兄弟二人交相殺害各有曲直存弟則示兄曲也鄭伯既云失教若依例存弟則嫌善假故特去弟兩見其義也若夫朝聘盟會嘉好之事此乃兄弟之篤睦非義例之所與故仍舊史之策或稱弟或稱公子踐土之盟叔武不稱弟此其義也莒拏非卿非卿則不應書今嘉獲故特書特書猶不稱弟明諸書弟者皆卿也先儒說母弟善惡褒貶既多相錯涉又云稱弟皆謂公子不為大夫者得以君為尊案傳莒拏非卿乃法所不書書而不言弟非得以君為尊也凡聘享嘉好之事於是使卿故夷仲年之聘皆以卿稱弟而行此例所謂凡稱弟皆母弟左傳明文而自違之穎氏又曰臣無竟外之交故去弟以貶季友子招樂憂故去弟以懲過鄭假去弟惟以名通故謂之貶今此二人皆稱公子公子者名號之美稱又非所貶也劉炫云再言凡者前凡據適妻子為文後凡嫌妾子為君母弟不得稱弟故更言凡也經十有八年春晉侯衛世子臧伐齊音義臧子郎反公伐杞注無傳夏四月秋七月邾人戕鄫子于鄫注傳例曰自外曰戕邾大夫就鄫殺鄫子音義戕在良反徐又在精反鄫才陵反疏正義曰杜以會盟之例卿則書名氏大夫則稱人此稱邾人故云邾大夫耳賈逵亦云邾使大夫往殘賊之甲戌楚子旅卒注未同盟而赴以名吳楚之葬僭而不典故絶而不書同之夷蠻以懲求名之僞音義僭子念反懲直升反止也又作徵如字明也疏正義曰諸侯之葬魯不會則不書知吳楚之葬為僭不書者襄二十九年傳稱葬楚康王公親送葬經亦不書故知其不為魯不會也禮坊記曰天無二日土無二王示民有君臣之别春秋不稱楚越之王喪恐民之惑也鄭𤣥云楚越之君僭號稱王不稱其喪謂不書葬也公羊傳曰吳楚之君不書葬辟其號也辟其號者五等諸侯死則稱爵書卒及葬則從彼臣子之辭皆稱為公若書楚葬亦宜從彼所稱當云葬楚王以此僭而不典不得稱王故遂絶之而不書其葬同之蠻夷言其不足紀録以懲創自求名號之僞同之蠻夷者蠻夷卒亦不書言其不書似之也公孫歸父如晉冬十月壬戌公薨于路寢歸父還自晉至笙遂奔齊注大夫還不書春秋之常也今書歸父還奔善其能以禮退不書族者非常所及今特書略之笙魯竟也故不言出音義笙音生徐又勑貞反一本又作柳亦作朾案徐後音是依三傳文竟音境傳十八年春晉侯衛大子臧伐齊至於陽穀齊侯會晉侯盟于繒以公子疆為質于晉晉師還蔡朝南郭偃逃歸注晉既與齊盟守者解緩故得逃音義繒才陵反質音致解佳買反夏公使如楚乞師欲以伐齊注公不事齊齊與晉盟故懼而乞師于楚不書微者行秋邾人戕鄫子于鄫凡自虐其君曰弒自外曰戕注弒戕皆殺也所以别內外之名弒者積微而起所以相測量非一朝一夕之漸戕者卒暴之名音義弒音試注同弒字從式殺字從殳他皆放此别彼列反一朝如字卒寸忽反疏正義曰弒者試也言臣下伺候間隙試犯其君戕者殘也言外人卒暴而來殘賊殺害也弒戕皆是殺也所以别內外之名耳釋例曰列國之君而受害於臣子其所由者積微而起所以相測量非一朝一夕之漸故改殺為弒戕者卒暴之名有國之君當重門設險而輕近暴客變起倉卒亦因事而見戒也臣弒其君子弒其父世之惡逆君子難言故春秋謂自內虐其君者通以弒為文也春秋弒君多矣其戕唯此一事自弒其君足明無道臣罪之例戕者外人所殺為無防被害皆是君自招之縱使君或無道其惡不加外國不得從弒君之例也若戰死則書滅此謂在國見殺耳楚莊王卒楚師不出既而用晉師注成二年戰于鞍是楚于是乎有蜀之役注在成二年冬蜀魯地泰山博縣西北有蜀亭公孫歸父以襄仲之立公也有寵注歸父襄仲子欲去三桓以張公室注時三桓彊公室弱故欲去之以張大公室音義去起吕反下注將去竝同張如字一音陟亮反與公謀而聘于晉欲以晉人去之冬公薨季文子言于朝曰使我殺適立庶以失大援者仲也夫注適謂子惡齊外甥襄仲殺之而立宣公南通於楚既不能固又不能堅事齊晉故云失大援也音義適丁歷反注同援于眷反夫音扶臧宣叔怒曰當其時不能治也後之人何罪子欲去之許請去之注宣叔文仲子武仲父許其名也時為司寇主行刑言子自以歸父害巳欲去者許請為子去之音義請為于僞反遂逐東門氏注襄仲居東門故曰東門氏子家還及笙注子家歸父字壇帷復命于介注除地為壇而張帷介副也將去使介反命於君音義壇音善介音界疏正義曰聘禮復命之禮云公南鄉使者執圭反命曰以君命聘于某君某君受幣于某官某君再拜以享某君某君再拜若聘君薨于後歸執圭復命于殯升自西階不升堂子即位不哭辨復命如聘子臣皆哭與介入北鄉哭出袒括髮入門右即位踊是君之存亡皆有復命之禮若身在外奔不得親自復命故立介於位介當南面歸父於介前北面執圭復命既復命之後北面哭乃退括髮訖前即位北面哭三踊而出以復命之語語介使知令介以此言告於殯也既復命袒括髮注以麻約髮音義袒音但括古活反即位哭三踊而出注依在國喪禮設哭位公薨故遂奔齊書曰歸父還自晉善之也春秋左傳注疏卷二十四春秋左氏傳注疏卷二十四考證傳楚子使申舟聘于齊曰無假道于宋趙汸曰楚子忿晉伐鄭欲伐宋而無名故不假道以起怨其聘于晉非為好也以怠晉之救宋而已傳今楚在宋君其圗之公說下疏一假監本訛刻于前孟獻子言于公曰假下今改正初稅畝注公田之法十取其一萬斯大學春秋隨筆曰孟子言助法曰其中為公田八家皆私百畝非謂周之徹法如此也漢書食貨志直本此以言周制後儒因之若是則周人乃百畝而助矣何名為徹哉惟趙岐注孟子曰周人耕百畝者徹取十畝以為賦斯言得之矣按司馬法云畝百為夫夫三為屋屋三為井小司徒亦云九夫為井是周人井九百畝分之九夫每夫百畝以十畝為公田君取其入而不收餘畝之稅今宣公于公田之外更稅餘畝之十一故曰稅畝也書者譏重困農民且著十二之始也傳諺曰髙下在心臣照按杜注謂度時制宜則與下川澤納汙山藪藏疾瑾瑜匿瑕國君含垢等不一例蓋言物本無髙下意為髙則髙意為下則下耳傳我無爾詐爾無我虞趙汸補注曰凡書平則不書盟以平為重臣召南按左氏載曹劌無劫盟之事而公羊言手劍而從左氏載華元類刺客之為而公羊言乘堙出見其不同如此傳故文反正為乏臣召南按許慎說文亦祗漢時篆體不與古文符合故亥字二首六身漫無似處惟此傳反正為乏及止戈為武二文相沿未變也傳及雒注雒晉地臣召南按杜注於地理考校極精此雒非河南伊雒之雒亦非河西涇雒之雒故直注曰晉地傳穀出不過藉臣浩按穀梁傳曰古者什一藉而不稅初稅畝非正也知藉之義傳冬蝝生饑幸之也趙汸補注曰蝝未成螽故不為災杜注未失說者議之過矣本為一嵗再生記異文偶與下饑相連傳通饑釋之以為幸之也注又以為喜而書之陋益甚矣成周宣榭火注宣榭講武屋别在洛陽者臣召南按公羊謂是宣王之廟而左氏不言宣王若以詩證之則宣王嘗于東都講武車攻吉日是也意者講軍實于是榭故謂之宣榭歟傳晉侯請于王趙汸補注曰傳見列國之卿猶有請命者傳齊項公帷婦人使觀之臣照按穀梁謂婦人乃蕭同叔子景公之母觀于郤克對齊使必以蕭同叔子為質乃退師似笑于房之婦即蕭同叔子但蕭同叔子景公之母郤克欲質其母以辱之顧亦不必蕭同叔子之果笑也必當時有此說穀梁信而著之左氏疑而闕之邾人戕鄫子于鄫臣浩按經書戕以著邾人之虐書戕于鄫以著鄫人不救其君之罪春秋左氏傳注疏卷二十四考證
