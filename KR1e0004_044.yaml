body:
  text: 春秋左傳注疏卷四十四起昭公七年盡八年晉杜氏注唐陸德明音義孔頴逹疏經七年春王正月暨齊平注暨與也燕與齊平前年冬齊伐燕間無異事故不重言燕從可知音義暨其器反傳同重直用反疏正義曰暨與釋詁文也此直言暨齊平不知誰與齊平榖梁傳曰以外及內曰暨謂此為魯與齊平賈逵何休亦以為魯與齊平許惠卿以為燕與齊平服虔云襄二十四年仲孫羯侵齊二十五年崔抒伐我自爾以來齊魯不相侵伐且齊是大國無為求與魯平此六年冬齊侯伐北燕將納簡公齊侯貪賄而與之平故傳言齊求之也齊次于虢燕人行成其文相比許君近之案經例既燕與齊平當書燕魯與諸侯平皆言暨下三月公如楚叔孫婼如齊涖盟公不在國故齊無來者據經言之賈君為得杜則從許説也故兩載其説意從賈解其所疑云前年冬齊伐燕文接此春間無異事故不云燕省文也又此年稱齊暨燕平之月傳所舉經文知此是燕與齊平也釋例曰昭六年冬齊侯伐北燕七年春而平冬春相接間無異事省文故不重言燕猶桓五年冬州公如曹六年春因書實來也傳以其下分明故起見齊燕平之月以正之也三月公如楚叔孫婼如齊涖盟注無傳公將逺適楚故叔孫如齊尋舊好音義婼敕略反徐又音敕好呼報反疏注正義曰魯與齊鄰公逺適楚慮其或來侵伐遣使與之盟尋舊好也案經婼之如齊在公如楚下特言將適楚者叔孫婼非公命則不得書經眀是公未發時命之公發後始去杜言將見此意夏四月甲辰朔日有食之秋八月戊辰衛侯惡卒注元年大夫盟于虢疏正義曰榖梁傳曰卿曰衛齊惡今曰衛侯惡此何為君臣同名也君子不奪人名不奪親之所名重其所以來也王父名子也注云不奪人名明臣雖欲改君不當聼也君不聼臣易名者欲使人重父命也父受名于王父王父卒則稱王父之命名之曲禮云卒哭乃諱鄭玄云敬鬼神之名也生者不相辟名衛侯名惡大夫有石惡君臣同名春秋不非謂此事也然則此君卒哭之後臣當辟其諱曲禮云君子已孤不更名當舍名而稱字注正義曰虢會不盟而言盟者令尹圍請讀舊書加於牲上雖不為載書亦以名告神與盟同也九月公至自楚冬十有一月癸未季孫宿卒十有二月癸亥葬衛襄公傳七年春王正月暨齊平齊求之也注齊伐燕燕人賂之反從求平如晏子言疏正義曰傳云齊求之自言其平之意下云盟于濡上是其平之事也下言齊侯次于虢燕人行成則是燕先發意而言齊求之者齊若志在伐燕不當在竟久次久次而不行即是求之之狀也燕必知其意乃行成耳癸巳齊侯次于虢注虢燕竟音義虢瓜百反竟音境燕人行成曰敝邑知罪敢不聽命先君之敝器請以謝罪注敝器瑶甕玉櫝之屬音義瑶音遙甕烏送反徐於容反櫝徒木反公孫晳曰受服而退俟釁而動可也注晳齊大夫音義晳星厯反徐思益反釁許覲反二月戊午盟于濡上注濡水出髙陽縣東北至河間鄚縣入易水音義濡徐音須説文女于反一音而入反又而于反鄚音莫本又作莫疏注正義曰今案髙陽無此水也水源皆出于山其出平地皆是山中平地燕趙之界無泉出者未知杜言何所案據燕人歸燕姬注嫁女與齊侯賂以瑶甕玉櫝斝耳不克而還注瑶玉也櫝匱也斝耳玉爵音義斝古雅反一音嫁禮記夏曰盞殷曰斝周曰爵説文斝從斗匱其位反疏注正義曰孔安國尚書傳云瑶美石此云瑶甕玉櫝與玉别文亦似非玉杜以瑶為玉者詩毛傳云瓊瑶美玉則瑶之為物在玉石之間與玉小别故或以為石或以為玉瓊是玉之美名詩以瓊瑶為玉故毛言美玉耳周禮醢人王舉則共醢六十甕以齊醢菹臡實之則甕是小器當以瓦為之以瑶為甕故為寶也論語云龜玉毁於櫝中是櫝為盛物之匱也明堂位云爵夏后氏以盞殷以斝周以爵鄭玄云斝畫禾稼也斝是爵名文承玉櫝之下明亦以玉為之言耳者蓋此器旁有耳若今之杯故名耳楚子之為令尹也為王旌以田注析羽為旌王旌斿至於軫音義旌音精析星厯反斿音留軫之忍反疏注正義曰析羽為旌周禮司常文也鄭玄云析羽皆五采繫之於旞旌之上所謂注旌於干首也凡九旗之帛皆用絳然則干首有羽羽為旌名遂以旌為旗稱其垂至軫者謂斿至軫非羽至軫也禮緯稽命徴云禮天子旗九刃曳地諸侯七刃齊軫大夫五刃齊較士三刃齊首周禮節服氏衮冕六人維王之大常鄭玄云王旌十二旒兩兩以縷綴連旁三人持之禮天子旌曳地杜以楚雖僭號稱王未必即如天子不應建大常旌曳地故以諸侯解之言王旌斿至於軫謂楚王旌也蓋建交龍之旗而斿至軫耳然諸侯之旌短於王旌二刃大夫之旌亦短於諸侯之旌二刃案周禮軫去地四尺較去軫並五尺五寸而禮緯云諸侯齊軫大夫齊較於事為疑不可知也芋尹無宇斷之曰一國兩君其誰堪之及即位為章華之宫納亡人以實之注章華南郡華容縣音義芋于付反斷音短疏正義曰芋是草名哀十七年陳有芋尹蓋皆以草名官不知其故無宇之閽入焉注有罪亡入章華宫無宇執之有司弗與注王有司也曰執人於王宫其罪大矣執而謁諸王注執無宇也王將飲酒注遇其歡也無宇辭曰天子經略注經營天下略有四海故曰經略諸侯正封注封疆有定分音義疆居良反下同分扶問反疏正義曰莊二十一年注云略界也則此略亦為界也經營天下以四海為界界內皆為已有故言略有四海謂有四海之內也天子界內天子自經營之故言經略也諸侯封內受之天子非已自營故言正封謂不侵人不與人正之使有定分古之制也封略之內何非君土食土之毛誰非君臣注毛草也故詩曰普天之下莫非王土率土之濵莫非王臣注詩小雅濵涯也音義普本或作溥音同毛傳云大也濵音賔涯五佳反疏正義曰北山大夫刺幽王也役使不均云溥天之下云云鄭箋云此言王之土地廣矣王之臣又衆矣何求而不得何使而不行率土之濵者地之形𫝑水多於土民居水畔故云循土之涯也天有十日注甲至癸人有十等注王至臺下所以事上上所以共神也故王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣隸隸臣僚僚臣僕僕臣臺馬有圉牛有牧注飬馬曰圉養牛曰牧音義共音恭圉魚吕反疏正義曰文十八年傳云舜臣堯者謂舜為臣以事堯也此云王臣公者謂上以下為臣文同而意異也公者五等諸侯之總名環齊要略云自營為某八某為公言正無私也大夫者夫之言扶也大能扶成人也士者事也言能理庶事也服虔云皂造也造成事也輿衆也佐皂舉衆事也隸隸屬於吏也僚勞也共勞事也僕僕豎主藏者也臺給臺下微名也此皆以意言之循名求義不必得夲故杜皆略而不説以待百事今有司曰女胡執人於王宫將焉執之周文王之法曰有亡荒閲注荒大也閲搜也有亡人當大搜其衆音義女音汝焉於虔反閲音悅搜所由反所以得天下也吾先君文王注楚文王作僕區之法注僕區刑書名音義僕區烏侯反徐如字服云僕隱也區匿也為隱匿亡人之法也疏正義曰引其言戒刑法知是刑書名也名曰僕區未知其義服虔云僕隱也區匿也為隱亡人之法也曰盜所隱器注隱盜所得器與盜同罪所以封汝也注行善法故能啓疆北至汝水疏注正義曰文王之法所以得天下言行善法所以得為天子也僕區之法所以封汝言去盜賊所以大啓封疆也哀十七年傳曰彭仲爽申俘也文王以為令尹實縣申息朝陳蔡封畛於汝是文王啓疆至汝水若從有司是無所執逃臣也逃而舍之是無陪臺也注言皆將逃王事無乃闕乎昔武王數紂之罪以告諸侯曰紂為天下逋逃主萃淵藪注萃集也天下逋逃悉以紂為淵藪集而歸之音義數色具反又色主反逋布吳反萃在醉反藪素口反疏正義曰此在尚書武成篇也武王既克殷歸至于豐乃陳伐紂之事告於諸侯言將伐之時以啇之罪告于皇天后土所過名山大川曰今啇王受無道暴殄天物害虐蒸民為天下逋逃主萃淵藪是言天下罪人逋逃者以紂為主集而歸之如魚入深淵獸奔藪澤也故夫致死焉注人欲致死討紂音義夫音扶又方于反君王使求諸侯而則紂無乃不可乎若以二文之法取之盜有所在矣注言王亦為盜王曰取而臣以往注往去也盜有寵未可得也注盜有寵王自謂為葬靈王張本遂赦之注赦無宇楚子成章華之臺願與諸侯落之注宫室始成祭之為落臺今在華容城內疏注正義曰雜記云成廟則釁之路寢成則考之而不釁釁屋者交神明之道也鄭玄云言路寢生人所居不釁者不神之也考之者設盛食以落之爾檀弓曰晉獻文子成室諸大夫發焉是也然則不釁似無祭而杜言宫室始成祭之為落者以其言落必是以酒澆落之雖不如廟以血塗其上當祭中霤之神以安之大宰薳啓疆曰臣能得魯侯薳啓疆來召公辭曰昔先君成公命我先大夫嬰齊曰吾不忘先君之好將使衡父照臨楚國鎮撫其社稷以輯寧爾民嬰齊受命于蜀注蜀盟在成二年衡父公衡音義好呼報反輯音集又七入反奉承以來弗敢失隕而致諸宗祧注言奉成公此語以告宗廟音義隕于敏反祧他乏反日我先君共王引領北望日月以冀注冀魯朝音義共音恭疏正義曰日謂往日也嬰齊與魯盟于蜀事在成二年共王之初共王即望魯朝故言往日我先君共王引領北望也董遇注無日字諡法既過能改曰共傳序相授於今四王矣注四王共康郟敖及靈王音義傳直專反郟古洽反嘉惠未至唯襄公之辱臨我喪注襄公二十八年如楚臨康王喪孤與其二三臣悼心失圖注在哀喪故社稷之不皇况能懷思君德注皇暇也言有大喪多不暇今君若步玉趾辱見寡君注趾足也寵靈楚國以信蜀之役致君之嘉惠是寡君既受貺矣何蜀之敢望注言但欲使君來不敢望如蜀復有質子音義復扶又反質音致又如字疏正義曰言開其恩寵賜以威靈以及楚國以明受命于蜀之事不虛致令君之嘉惠於楚即是寡君受貺矣其先君鬼神實嘉賴之豈唯寡君君若不來使臣請問行期注問魯見伐之期音義使所吏反寡君將承質幣而見于蜀以請先君之貺注請問也音義質音致徐之二反又如字見賢遍反公將往夢襄公祖注祖祭道神疏注正義曰詩云韓侯出祖仲山甫出祖是出行必為祖也曽子問曰諸侯適天子與諸侯相見皆云道而出是祖與道為一知祖是祭道神也周禮大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之鄭玄云行山曰軷犯之者封土為山象以菩芻棘柏為神主既祭以車櫟之而去喻無險難也又聘禮記云出祖釋軷祭酒脯乃飲酒于其側鄭玄云祖始也行出國門止陳車騎釋酒脯之奠於軷為行始也詩傳曰軷道祭也謂祭道路之神春秋傳曰軷涉山川然則軷山行之名也道路以險阻為難是以委土為山或伏牲其上使者為軷祭酒脯祈告也卿大夫處者於是餞之飲酒於其側禮畢乘車轢之而遂行是説祖軷之事也詩云取羝以軷謂諸侯也天子則以犬故犬人云伏瘞亦如之鄭司農云伏謂伏犬以王車轢之是也大夫用酒脯梓愼曰君不果行襄公之適楚也夢周公祖而行今襄公實祖君其不行子服惠伯曰行先君未嘗適楚故周公祖以道之襄公適楚矣而祖以道君不行何之三月公如楚鄭伯勞于師之梁注鄭城門音義道之音導下同勞力報反下同孟僖子為介不能相儀注僖子仲孫貜音義介音界相息亮反貜俱縛反又俱碧反及楚不能答郊勞注為下僖子病不能相禮張夲夏四月甲辰朔日有食之晉侯問於士文伯曰誰將當日食對曰魯衛惡之注受其凶惡音義惡之如字或烏路反非也衛大魯小公曰何故對曰去衛地如魯地注衛地豕韋也魯地降婁也日食於豕韋之末及降婁之始乃息故禍在衛大在魯小也周四月今二月故曰在降婁音義降戶江反下同疏注正義曰周禮保章氏以星土辨九州之地所封封域皆有分星是在地封域必當天星之分但古書亡失鄭注保章氏引堪輿云寅析木燕也卯大火宋也辰夀星鄭也已鶉尾楚也午鶉火周也未鶉首秦也申實沈晉也酉大梁趙也戍降婁魯也亥娵訾衛也子玄枵齊也丑星紀吳越也秦漢以來地分天次娵訾衛也降婁魯也娵訾之次一名豕韋故云衛地豕韋也三統歷娵訾初日在危十六度立春即在營室十四度雨水中終於奎四度也降婁初日在奎五度驚蟄節在婁四度春分中終於胃六度也此時周四月今二月故日在降婁但閏有前却不知日在何度而食也言去衛地如魯地蓋始入降婁之初耳於是有災魯實受之注災發於衛而魯受其餘禍其大咎其衛君乎魯將上卿注八月衛侯卒十一月季孫宿卒音義咎其九反公曰詩所謂彼日而食于何不臧者何也注感日食而問詩疏正義曰十月之交大夫刺幽王也十月之交朔日辛卯日有食之亦孔之醜注云日為君辰為臣辛金也卯木也又以卯侵辛故甚惡也又云彼月而食則維其常此日而食于何不臧詩作此此云彼者師讀不同也對曰不善政之謂也國無政不用善則自取謫于日月之災注謫譴也音義謫直革反譴遣戰反疏正義曰士文伯緣公之問設勸戒之辭言人君為政不善可以感動上天則自取譴責於日月之災以日食之災由君行之所致也昏義云天子聽男教后聽女順天子治陽道后治隂德是故男教不修陽事不得適見於天日為之食婦順不修隂教不得適見於天月為之食此傳彼記皆是勸戒辭耳日月之會自有常數每於一百七十三日有餘則日月之道一交交則日月必食雖千歲之日食豫算而盡知寧復由教不修而政不善也此時周室微弱王政不行非復能動天也設有天變當與天下為災何獨衛君魯卿當其咎也若日食在其分次其國即當有咎則每於日食必有君死豈日食之歲常有一君死乎足明士文伯言衛君魯卿之死不由日食而知矣人君者位貴居尊志移心溢或淫恣情欲壞亂天下聖人假之神靈作為鑒戒夫以昭昭大眀照臨下土忽爾殱亡俾晝作夜其為怪異莫斯之甚故鳴之以鼓柝射之以弓矢庶人奔走以相從嗇夫馳騁以告衆降物辟寢以哀之祝幣史辭以禮之立貶食去樂之數制入門廢朝之典示之以罪巳之冝教之以修德之法所以重天變警人君也天道深逺有時而驗或亦人之禍釁偶與相逢故聖人得因其變常假為勸戒知逹之士識先聖之幽情中下之主信妖祥以自懼但神道可以助教不可專以為教神之則惑衆去之則害冝故其言若有若無其事若信若不信期於大通而已世之學者宜知其趣焉故政不可不慎也務三而已一曰擇人注擇賢人二曰因民注因民所利而利之三曰從時注順四時之所務晉人來治把田注前女叔侯不盡歸今公適楚晉人恨故復來治把田音義復扶又反下復伐同疏注正義曰下云君之在楚於晉罪也知晉人以此故復來治把田也宋之盟云晉楚之從交相見今復恨者於時不逆楚意為此盟耳私心不欲諸侯向楚又無辭可以禁之故內懷恨而治其田季孫將以成與之注成孟氏邑本把田謝息為孟孫守不可注謝息僖子家臣音義為于偽反注及下為把同守手又反下守臣同曰人有言曰雖有挈瓶之知守不假器禮也注挈瓶汲者喻小知為人守器猶知不以借人音義挈苦結反瓶蒲丁反之知音智注小知同汲音急借子夜反夫子從君而守臣喪邑注夫子謂孟僖子從公如楚音義喪息浪反雖吾子亦有猜焉注言季孫亦將疑我不忠音義猜七才反季孫曰君之在楚於晉罪也注言晉罪君之至楚又不聽晉魯罪重矣晉師必至吾無以待之不如與之間晉而取諸把注候晉間隙可復伐把取之音義間如字注同吾與子桃注魯國卞縣東南有桃虛音義虛起居反成反誰敢有之是得二成也魯無憂而孟孫益邑子何病焉辭以無山與之萊柞注萊柞二山音義萊音來柞子洛反又音昨乃遷于桃注謝息遷也晉人為把取成注不書非公命楚子享公于新臺注章華臺也使長鬛者相注鬛鬚也欲先夸魯侯音義鬛力輒反相息亮反鬚音須夸苦華反疏正義曰吳楚之人少鬚故選長鬛者相禮也好以大屈注宴好之賜大屈弓名音義好呼報反注同屈扂勿反大屈弓名服同又云大曲也賈云寶金可以為劍出大屈也疏注正義曰賈逵云大屈寶金可以為劍大屈金所生地名服虔云一曰大屈弓名魯連書曰楚子享魯侯於章華之臺與大曲之弓既而悔之薳啓疆見魯侯魯侯歸之大屈即大曲也既而悔之薳啓疆聞之見公公語之拜賀公曰何賀對曰齊與晉越欲此久矣寡君無適與也而傳諸君君其備禦三鄰注言齊晉越將伐魯而取之音義見賢遍反語魚據反適丁歷反傳直專反慎守寶矣敢不賀乎公懼乃反之注傳言楚靈不信所以不終鄭子産聘于晉晉侯有疾韓宣子逆客私焉注私語曰寡君寢疾於今三月矣並走羣望注晉所望祀山川皆走往祈禱音義禱丁老反又丁報反有加而無瘳今夢黃熊入于寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀于羽山注羽山在東海祝其縣西南音義瘳敕留反黃熊音雄獸名亦作能如字一音奴來反三足鱉也解者云獸非入水之物故是鱉也一曰既為神何妨是獸案説文及字林皆云能熊屬足似􅎷然則能既熊屬又為龞類今本作能者勝也東海人祭禹廟不用熊白及鱉為膳斯豈鯀化為二物乎殛紀力反誅也本又作極音義同鯀古本反下注同疏正義曰諸本皆作熊字賈逵云熊獸也説文云熊獸似豕山居冬蟄釋獸云羆如熊黃白文孫炎曰書云如熊如羆則熊似羆似豕之獸即今之所謂熊是也釋獸又云熊虎醜其子狗李巡曰熊虎之類其子名狗則熊獸似虎非能也又釋魚云鱉三足能樊光曰龞皆四足今三足故記之彼是龞之異狀張衡東京賦云能鱉三趾梁王云鮌之所化是能龞也若是熊獸何以能入羽淵但以神之所化不可以常而言之若是能龞何以得入寢門先儒既以為獸今亦以為熊獸是也汲冢書瑣語云晉平公夢見赤熊窺屏惡之而有疾使問子産言窺屏牆必是獸也張叔皮論云賓爵下華田鼠上騰牛哀虎變鮌化為熊久血為磷積灰生蠅傅玄潛通賦云聲伯忌瓊瑰而弗占兮晝言諸而暮終嬴正沈壁以祈福兮鬼告凶而命窮黃母化而為黿兮鮌殛變而成熊二者所韻不同或疑張叔為能著作郎王劭云古人讀雄與熊者皆于陵反張叔用舊音傅玄用新音張叔亦作熊也案詩無羊與正月及襄十年衛卜禦寇之繇皆以雄韻陵劭言是也其神化為黃熊以入于羽淵實為夏郊三代祀之注鯀禹父夏家郊祭之歷殷周二代又通在羣神之數并見祀音義夏户雅反注夏下同疏注正義曰祭法云夏后氏禘黃帝而郊鯀言郊祭天而以鯀配是夏家郊祭之也殷周二代自以其祖配天雖復不以鯀配郊鯀有治水之功又通在羣神之數并亦見祀通夏世為三代祀之也祭法又曰夫聖人之制祀也能禦大災則祀之能捍大患則祀之鯀鄣鴻水而殛死禹能修鯀之功非此族也不在祀典是言鯀有大功而歷代祀之也祭法又云有虞氏禘黃帝而郊嚳祖顓頊而宗堯夏后氏亦禘黃帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王家語子羔問曰周人祖文王而宗武王虞夏祖宗異代者孔子曰殷周祖宗其廟可以不毁則其他所祖宗者功德不殊雖在異代亦可以無疑矣周人愛召公猶敬其樹况祖宗其功德而可以不尊奉其廟哉晉為盟主其或者未之祀也乎注言周衰晉為盟主得佐天子祀羣神疏注正義曰祭法曰有天下者祭百神諸侯在其地則祭之亡其地則不祭然則鯀非晉地之神晉人不合祭之也但周室既衰晉為盟主得佐助天子祭祀羣神故不祀鯀而鯀為祟也晉語説此事云昔者鯀違帝命殛之于羽山化為黃熊以入于羽淵實為夏郊三代舉之夫鬼神之所及非其族類則紹其同位今周室少卑晉實繼之其或者未舉夏郊邪宣子以告祀夏郊董伯為尸五日晉侯疾間是言晉當繼周得佐天子祀羣神也僖三十一年傳云相之不享於此久矣非衛之罪也祀鄫何事然則把是夏後自當祀相衛不祀相而晉祀鯀者相無功唯子孫當祀鯀則列在祀典天子祀之故晉繼周祀鯀也韓子祀夏郊注祀鯀疏正義曰言祀實家所郊者故注云祀鯀晉侯有間注間差也音義差初賣反賜子産莒之二方鼎注方鼎莒所貢疏正義曰服虔云鼎三足則圓四足則方子産為豐施歸州田於韓宣子注豐施鄭公孫假之子三年晉以州田賜假音義為于偽反下為初言同曰日君以夫公孫假為能任其事而賜之州田今無祿早世不獲久享君德其子弗敢有不敢以聞於君私致諸子注此年正月公孫假卒音義夫音扶任音壬下同宣子辭子産曰古人有言曰其父析薪其子弗克負荷注荷擔也以微薄喻貴重音義析星歷反荷本亦作何河可反又音河擔丁甘反施將懼不能任其先人之祿其况能任大國之賜縱吾子為政而可後之人若屬有疆埸之言敝邑獲戾注恐後代宣子者將以鄭取晉邑罪鄭音義若屬音燭疆居良反埸音亦而豐氏受其大討吾子取州是免敝邑於戾而建置豐氏也敢以為請注傳言子産貞而不諒疏注正義曰貞而不諒論語文也貞正也諒信也假受晉邑卒而歸之正也知宣子欲之而言畏懼後禍是不信也宣子受之以告晉侯晉侯以與宣子宣子為初言病有之注初言謂與趙文子爭州田以易原縣於樂大心注樂大心宋大夫原晉邑以賜樂大心也鄭人相驚以伯有曰伯有至矣則皆走不知所往注襄三十年鄭人殺伯有言其鬼至鑄刑書之歲二月注在前年或夢伯有介而行注介甲也音義介音界曰壬子余將殺帶也注駟帶助子晳殺伯有壬子六年三月三日明年壬寅余又將殺假也注公孫假豐氏黨壬寅此年正月二十八日疏注正義曰劉炫云假即豐氏當言駟氏黨字之誤以規杜氏今知非者假為豐氏傳有明文杜既注傳無容不妥蓋後人傳寫之誤劉君雖規未必是杜之失及壬子駟帶卒國人益懼齊燕平之月注此年正月壬寅公孫假卒國人愈懼其眀月子産立公孫泄及良止以撫之乃止注公孫泄子孔之子也襄十九年鄭殺子孔良止伯有子也立以為大夫使有宗廟音義泄息列反子大叔問其故子産曰鬼有所歸乃不為厲吾為之歸也大叔曰公孫泄何為注子孔不為厲問何為復立泄音義復扶又反子産曰説也為身無義而圖説注伯有無義以妖鬼故立之恐惑民并立泄使若自以大義存誅絶之後者以解説民心音義説如字下及注同徐始鋭反疏正義曰言立公孫泄者所以解説民心也伯有作亂而死不應立其後祀今立良止民必怪之為伯有之身無義立後而圖謀自解説於民也解説者以子孔良霄俱被誅殺今并立二人言若國家自以大義存誅絶之後不為妖鬼立良止也以此解説民心從政有所反之以取媚也注民不可使知之故治政或當反道以求媚於民音義治直吏反疏正義曰反之謂反正道也媚愛也從其政事治國家者有所反於正道以取民愛也反正道者子孔誅絶於道理不合立公孫泄今既立良止恐民以鬼神為惑故反違正道兼立公孫泄以取媚於民今民不惑也假與帶之卒自當命盡而終耳未必良霄所能殺也但良霄為厲因此恐民民心不安義須止遏故立祀止厲所以安下民也何休膏肓難此言孔子不語怪力亂神以鬼神為政必惑衆故不言也今左氏以此令後世信其然廢仁義而祈福於鬼神此大亂之道也子産雖立良止以託繼絶此以鬼賞罰要不免於惑衆豈當述之以示季末鄭玄答之曰伯有惡人也其鬼為厲鬼厲者隂陽之氣相乘不和之名尚書五行傳六厲是也人死醴魄則降魂氣在上有尚德者附和氣而興利孟夏之月令雩祀百辟卿士有益于民者由此也為厲者因害氣而施災故謂之厲鬼月令民多厲疾五行傳有禦六厲之禮禮天子立七祀有大厲諸侯立五祀有國厲欲以安鬼神弭其害也子産立良止使祀伯有以弭害乃禮與洪範之事也子所不語怪力亂神謂虛陳靈象於今無驗也伯有為厲鬼著明若此而何不語乎子産固為衆愚將惑故并立公孫泄云從政有所反之以取媚也孔子曰民可使由之不可使知之子産逹於此也不媚不信注説而後信之音義説音悅不信民不從也及子産適晉趙景子問焉注景子晉中軍佐趙成曰伯有猶能為鬼乎子産曰能人生始化曰魄注魄形也音義魄普白反既生魄陽曰魂注陽神氣也疏正義曰人稟五常以生感隂陽以靈有身體之質名之曰形有噓吸之動謂之為氣形氣合而為用知力以此而強故得成為人也此將説淫厲故逺本其初人之生也始變化為形形之靈者名之曰魄也既生魄矣魄內自有陽氣氣之神者名之曰魂也魂魄神靈之名本從形氣而有形氣既殊魂魄亦異附形之靈為魄附氣之神為魂也附形之靈者謂初生之時耳目心識手足運動啼呼為聲此則魄之靈也附氣之神者謂精神性識漸有所知此則附氣之神也是魄在於前而魂在於後故云既生魄陽曰魂魂魄雖俱是性靈但魄識少而魂識多孝經説曰魄白也魂藝也白明白也藝藝動也形有體質取明白為名氣唯噓吸取藝動為義鄭玄祭義注云氣謂噓吸出入者也耳目之聰明為魄是言魄附形而魂附氣也人之生也魄盛魂強及其死也形消氣滅郊特牲曰魂氣歸于天形魄歸于地以魂本附氣氣必上浮故言魂氣歸于天魄本附形形既入土故言形魄歸于地聖王緣生事死制其祭祀存亡既異别為作名改生之魂曰神改生之魄曰鬼祭義曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也死必歸土此之謂鬼其氣發揚于上神之著也是故魂魄之名為鬼神也檀弓記延陵季子之哭其子云骨肉歸復于土命也若魂氣則無不之也爾雅釋天云鬼之為言歸也易繫辭曰隂陽不測之謂神以骨肉必歸于土故以歸言之魂氣無所不通故以不測名之其實鬼神之夲則魂魄是也劉炫云人之受生形必有氣氣形相合義無先後而此云始化曰魄陽曰魂是則先形而後氣先魄而後魂魂魄之生有先後者以形有質而氣無質尋形以知氣故先魄而後魂其實並生無先後也注正義曰以形有質故為隂魂無形故為陽既以化表形故以陽見氣氣為陽知形為隂互相見也用物精多則魂魄強注物權勢疏正義曰魂既附氣氣又附形形強則氣強形弱則氣弱魂以氣強魄以形強若其居髙官而任權勢奉養厚則魂氣強故用物精而多則魂魄強也注正義曰物非權勢之名而以物為權勢者言有權勢則物備物謂奉養之物衣食所資之總名也是以有精爽至於神眀注爽明也疏正義曰此言從微而至著蓋精亦神也爽亦明也精是神之未著爽是明之未昭言權勢重用物多養此精爽至於神明也匹夫匹婦強死其魂魄猶能馮依於人以為淫厲注強死不病也人謂匹夫匹婦賤身音義強其丈反况良霄我先君穆公之胄子良之孫子耳之子敝邑之卿從政三世矣鄭雖無腆注腆厚也音義胄直又反從政三世矣子良公子去疾生子耳公孫輒輒生伯有良霄三世為鄭卿腆他典反疏正義曰子良子耳良霄三世皆為卿抑諺曰蕞爾國注蕞小貌音義蕞在最反而三世執其政柄其用物也𢎞矣其取精也多矣其族又大所馮厚矣注良霄魂魄所馮者貴重音義柄彼命反而強死能為鬼不亦宜乎注傳言子産之博敏子皮之族飲酒無度注相尚以奢相困以酒疏正義曰相尚以奢食無度也相困以酒飲無度也故馬師氏與子皮氏有惡注馬師氏公孫鉏之子罕朔也襄三十年馬師頡出奔公孫鉏代之為馬師與子皮俱同一族音義鉏什居反頡戶結反齊師還自燕之月注在此年二月罕朔殺罕魋注魋子皮弟音義魋徒回反疏正義曰公孫鉏子展之弟展生子皮鉏生罕朔朔是子罕之孫禮謂之從父昆弟罕朔奔晉韓宣子問其位於子産注問朔可使在何位子産曰君之羈臣苟得容以逃死何位之敢擇卿違從大夫之位注謂以禮去者降位一等罪人以其罪降注罪重則降多古之制也朔於敝邑亞大夫也其官馬師也注大夫位馬師職獲戾而逃唯執政所置之得免其死為惠大矣又敢求位宣子為子産之敏也使從嬖大夫注為子産故使降一等不以罪降音義為子于偽反注同嬖必計反疏正義曰子産數遊楚云子皙上大夫女嬖大夫不尊貴也則晉之嬖大夫亦是下大夫子産云朔亞大夫也今晉侯使朔為下大夫故杜云為子産故使降一等不以罪降秋八月衛襄公卒晉大夫言於范獻子曰衛事晉為睦注睦和也晉不禮焉庇其賊人而取其地注賊人孫林父其地戚也音義庇必利反又音祕故諸侯二詩曰鶺鴒在原兄弟急難注詩小雅鶺鴒渠也飛則鳴行則搖喻兄弟相救於急難不可自舍音義鶺本又作即精亦反鴒本又作令力丁反難如字又乃旦反注同搖音遙又以照反疏正義曰小雅棠棣之篇也以鶺鴒之在原喻兄弟之急難也鶺鴒水鳥也今而在原失其常處飛則鳴行則搖不能自舍也喻人當居平安之世今有兄弟在急難相救之情亦不能自舍也但鳥有飛行可言人之不能自舍無狀可言耳注正義曰釋鳥文郭璞曰雀屬又曰死喪之威兄弟孔懷注威畏也言有死喪則兄弟冝相懷思兄弟之不睦於是乎不弔注不相弔恤况逺人誰敢歸之今又不禮於衛之嗣注嗣新君也衛必叛我是絶諸侯也獻子以告韓宣子宣子説使獻子如衛弔且反戚田注傳言戚田所由還衛音義説音悅還音環衛齊惡告喪于周且請命王使成簡公如衛弔注簡公王卿士也且追命襄公曰叔父陟恪在我先王之左右以佐事上帝注陟登也恪敬也帝天也叔父謂襄公命如今之哀策音義恪苦各反疏注正義曰陟登恪敬釋詁文也周禮所云上帝皆是天也如今之哀策者漢魏以來賢臣既卒或贈以本官印綬近世或更贈以髙官褒德敘哀載之於䇿將葬賜其家以告柩如今之哀策謂此也余敢忘髙圉亞圉注二圉周之先也為殷諸侯亦受殷王追命者音義圉魚呂反疏注正義曰案周本紀髙圉是公劉玄孫之孫髙圉生亞圉亞圉大王亶父之祖也並為殷之諸侯今王追命襄公而云不忘二圉知其亦是受殷王追命此杜以意言耳二圉之受追命無文也九月公至自楚孟僖子病不能相禮注不能相儀答郊勞以此為已病音義病不能相禮本或作病不能禮相息亮反注相儀同勞力報反乃講學之注講習也茍能禮者從之及其將死也注二十四年孟僖子卒傳終言之召其大夫注僖子屬大夫曰禮人之幹也無禮無以立吾聞將有逹者曰孔丘注僖子卒時孔丘年三十五疏注正義曰當言三十四而云五蓋相傳誤耳聖人之後也注聖人殷湯而滅於宋注孔子六代祖孔父嘉為宋督所殺其子奔魯疏注正義曰家語本姓篇云宋公熙生弗父何何生宋父周周生世子勝勝生正考父考父生孔父嘉其後以孔為氏也孔父生木金父金父生臯夷父夷父生防叔防叔辟華氏之禍而奔魯生伯夏伯夏即生梁紇梁紇即生孔子其祖弗父何以有宋而授厲公注弗父何孔父嘉之髙祖宋閔公之子厲公之兄何適嗣當立以讓厲公音義適丁歷反及正考父注弗父何之曽孫佐戴武宣注三人皆宋君三命兹益共注三命工卿也言位高益共故其鼎銘云注考父廟之鼎一命而僂再命而傴三命而俯注俯共於傴傴共於僂音義僂力主反傴紆羽反循牆而走注言不敢安行亦莫余敢侮注其共如是人亦不敢侮之音義侮亡甫反饘於是鬻於是以糊余口注於是鼎中為饘鬻饘鬻糊屬言至儉音義饘之然反爾雅糊饘也鬻之六反孫炎云淖糜也糊音胡疏正義曰釋言云糊饘也郭璞云糜也又云鬻糜也孫炎曰淖糜也然則糊饘鬻糜相類之物稠者曰糜淖者曰鬻糊饘是其别名將糜向口故曰以糊余口猶今人以粥向帛黏使相著謂之糊帛其共也如是臧孫紇有言注紇武仲也曰聖人有明德者若不當世其後必有逹人注聖人之後有明德而不當大位謂正考父疏注正義曰聖人謂殷湯也不當世謂不得在位為國君也上文具言考父之德知此聖人之後有明德而不得在世當大位者止謂正考父也既是聖人之後而又有明德身無貴位必慶隆子孫故言其後必有逹人謂知能通逹之人今其將在孔丘乎我若獲沒注得以壽終必屬説與何忌於夫子疏正義曰身為大夫乃稱夫子此時仲尼未仕不得稱為夫子以未仕之時為仕後之語是丘明意尊之而失事實陳恆未死言諡亦此類也使事之注説南宫敬叔何忌孟懿子皆僖子之子音義屬音燭説音悅而學禮焉以定其位注知禮則位安疏注正義曰説南宫氏也敬諡也叔字也又字容也字括也名説一名故孟懿子與南宫敬叔師事仲尼仲尼曰能補過者君子也詩曰君子是則是效注詩小雅孟僖子可則效已矣單獻公棄親用羈注獻公周卿士單靖公之子頃公之孫羈寄客也音義單音善冬十月辛酉襄頃之族殺獻公而立成公注襄公頃公之父成公獻公弟音義頃傾音十一月季武子卒晉侯謂伯瑕注伯瑕士文伯曰吾所問日食從矣可常乎注衛侯武子皆卒故對曰不可六物不同注各異時民心不一注政教殊事序不類注有變易官職不則注治官居職非一法同始異終胡可常也詩曰或燕燕居息或憔悴事國注詩小雅言不同音義憔在遙反詩作盡悴在醉反疏正義曰小雅北山大夫刺幽王也役使不均已勞於從事而不得養其父母焉或燕燕居息燕燕安息貌或盡瘁事國盡力勞病以從國事此作憔悴蓋師讀不同其異終也如是公曰何謂六物對曰歲時日月星辰是謂也公曰多語寡人辰而莫同何謂辰對曰日月之會是謂辰注一歲日月十二會所會謂之辰音義語魚據反疏正義曰釋天云載歲也夏曰歲周曰年李巡曰載一歲莫不覆載也孫炎曰四時一終曰歲取歲星行一次也年取年榖一熟是言歲即年也時謂四時春夏秋冬也曰謂十日從甲至癸也月從正月至十二月也星二十八宿也辰謂日月所會一歲十二會從子至亥也周禮馮相氏掌十有二歲十有二月十有二辰十日二十有八星之位謂此六物也大歲所在十二年始匝故為十二歲注正義曰東南隅有辰也大火謂之辰也又有日月之會辰也又北方有辰星也日月會謂之辰者辰時也言日月聚會有時也故以配日注謂以子丑配甲乙疏正義曰言辰無常所分在十二以十幹配之明非一所也衛襄公夫人薑氏無子注薑氏宣薑嬖人婤姶生孟縶孔成子夢康叔謂已立元注成子衛卿孔達之孫蒸鉏也元孟縶弟夢時元末生音義婤音周又直周反徐敕周反姶烏答反縶張立反蒸之承反疏注正義曰知者傳曰婤姶生孟縶即云成子夢若已生訖當云婤姶生孟縶及元此云孔成子夢且説夢已下乃云晉韓宣子聘歲生元明未生也余使羈之孫圉與史茍相之注羈蒸鉏子茍史朝子音義羈居冝反相息亮反下同朝如字史朝亦夢康叔謂已余將命而子茍與孔蒸鉏之曽孫圉相元史朝見成子告之夢夢協注協合也晉韓宣子為政聘于諸侯之歲注在二年婤姶生子名之曰元孟縶之足不良弱行注跛也音義跛皮我反疏正義曰當斷不良為句弱行向下讀之知者案二十年杜注云縶足不良故以官邑還豹是也孔成子以周易筮之曰元尚享衛國主其社稷注令蓍辭遇屯注震下坎上屯音義屯張倫反又曰余尚立縶尚克嘉之注嘉善也遇屯之比注坤下坎上比屯初九爻變音義比毗志反注同疏正義曰所以上屯無變者皆遇少爻故也以示史朝史朝曰元亨又何疑焉注周易曰屯元亨音義亨許庚反注元亨皆同成子曰非長之謂乎注言屯之元亨謂年長非謂名元音義長丁丈反注同對曰康叔名之可謂長矣注善之長也音義名如字徐武政反孟非人也將不列於宗不可謂長注足跛非全人不可列為宗主且其繇曰利建侯注繇卦辭音義繇直又反嗣吉何建建非嗣也注嗣子有常位故無所卜又無所建今以位不定卜嗣得吉則當從吉而建之也音義吉何建本或作可建二卦皆云注謂再得屯卦皆有建侯之文疏正義曰謂前卜元之二卦非謂後卜縶之卦也子其建之康叔命之二卦告之筮襲於夢武王所用也弗從何為注外傳云大誓曰朕夢協朕卜襲於休祥戎商必克此武王辭疏注正義曰外傳云者國語引大誓也古文尚書大誓具有此文此傳之意取大誓也杜不見古文故引外傳解之弱足者居注跛則遍弱居其家不能行侯主社稷臨祭祀奉民人事鬼神從會朝又焉得居各以所利不亦可乎注孟跛利居元吉利建音義焉於虔反故孔成子立靈公十二月癸亥葬衛襄公注靈公元也經八年春陳侯之弟招殺陳世子偃師注以首惡從殺例故稱弟又稱世子音義招常遙反疏注正義曰招與公子過共殺偃師而立公子留及楚殺徴師留出奔鄭招乃歸罪於過而使陳人殺之及楚師來討又推過為首得免重責不死而放之於越是以招為從罪也若其從招之詐如楚之意則冝書過殺偃師由是仲尼知其實狀以招為首傳言書曰陳侯之弟招殺陳世子偃師罪在招也是仲尼新意以招為惡首也從殺例者從兩下相殺之例也釋例曰大臣相殺死者無罪則兩稱名氏以示殺者之罪王札子殺召伯毛伯是也若死者有罪則不稱殺者名氏晉殺其大夫陽處父是也然則世子雖是副主猶是人臣從此人臣相殺之例故稱弟以見殺者之罪也又稱世子以見世子亦人臣也鄭假去弟陳招不去弟者釋例云陳招殺兄之子然不推刃於其兄故以首惡稱弟稱名從兩下相殺也是言招罪輕於害兄故存弟也夏四月辛丑陳侯溺卒注襄二十七年大夫盟于宋音義溺乃歷反疏注正義曰溺以襄五年即位爾來陳常從楚唯有襄二十七年大夫與魯同盟于宋劉炫云往年衛侯惡卒杜云元年大夫盟于虢此不數虢以杜為上下自相反今知不然者以盟于宋經有明文故指之虢盟文不見經故不數也其衛侯惡更無盟處唯有虢盟故數之劉不尋杜意而規其過非也叔弓如晉楚人執陳行人干徴師殺之注稱行人明非行人罪音義干古丹反陳公子留出奔鄭注留為招所立未成君而出奔秋搜于紅注革車千乘不言大者經文闕也紅魯地沛國蕭縣西有紅亭逺疑音義搜所求反紅户東反乘繩證反沛音貝疏注正義曰傳稱革車千乘是大搜也十一年大搜于比蒲二十二年大搜于昌間定十三年十四年大搜于比蒲皆云大搜此不云大知經闕文也釋例云紅之搜傳言革車千乘所以示大搜也而經不書大諸事同而文異傳不曲言經義者直是時史之闕略仲尼略而從之春秋不可錯綜經文此之類也劉賈頴云搜于紅不言大者言公大失權在三家也十一年搜于比蒲經書大搜復云書大者言大衆盡在三家隨文造意以非例為例不復知其自違也陳人殺其大夫公子過注與招共殺偃師書名罪之音義過古禾反大雩注無傳不旱而秋雩過也冬十月壬午楚師滅陳注不稱將帥不以告壬午月十八日音義將子匠反執陳公子招放之于越注無傳復稱公子兄已卒音義復扶又反殺陳孔奐注無傳招之黨楚殺之音義奐呼亂反疏注正義曰孔奐之為招黨傳無其文正以殺稱名氏是有罪之文知其是招黨也文七年宋人殺其大夫傳曰不稱名衆也且言非其罪也無罪不稱名知稱名為有罪矣若使孔奐無罪仲尼必當變文伹此非常例先無定制不知其將何所稱也執招殺奐皆是楚人為之承上楚師滅陳之下是楚可知不復每文書楚杜以注文隔故言楚殺以明之不言殺陳大夫者殺他國之臣例不書爵宣十一年楚人殺陳夏徴舒是其類也此執招殺奐皆滅陳乃為之故依次而書書在滅陳之下葬陳哀公注嬖人袁克葬之魯往會故書音義嬖必計反疏正義曰賈服以葬哀公之文在殺孔奐之下以為楚葬哀公故杜辨之袁克葬之案傳克欲殺馬毁玉楚人將欲殺克不得為楚葬之若是楚葬冝云楚人葬陳哀公當如齊侯葬紀伯姬不得直言葬也且諸言葬某公者皆是魯往會葬之文大夫不得書名言其所為之事而已故云魯往會故書也案傳袁克之葬乃是私竊葬之而魯得會者諸侯之卒告卒不告葬但葬有常期知卒即往會之未必得以禮從赴也傳八年春石言于晉魏榆注魏榆晉地音義魏榆服云魏邑也榆州里名疏注正義曰服虔云魏邑榆州里名襄二十三年叔孫豹次于雍榆雍榆地名知魏榆亦地名也晉侯問於師曠曰石何故言對曰石不能言或馮焉注謂有精神馮依石而言音義馮皮冰反注同不然民聽濫也注濫失也音義濫方暫反下注同疏正義曰或民聽濫失實無言而妄稱有言也抑臣又聞之注抑疑辭曰作事不時怨讟動于民則有非言之物而言今宫室崇侈民力雕盡注雕傷也音義讟徒木反侈昌氏反又尺氏反怨讟並作莫保其性注性命也民不敢自保其性命石言不亦宜乎於是晉侯方築虒祁之宫注虒祁地名在絳西四十里臨汾水音義虒音斯本又作虒同祁巨之反又音臣之反汾扶云反叔向曰子野之言君子哉注子野師曠字君子之言信而有徴故怨逺於其身注怨咎逺其身也音義逺于萬反注同咎其九反下文同小人之言僭而無徴故怨咎及之詩曰哀哉不能言匪舌是出唯躬是瘁注詩小雅也不能言謂不知言理以僭言見退者其言非不從舌出以僭而無信自取瘁病故哀之音義僭子念反注同不信也出如字又尺遂反瘁在醉反哿矣能言巧言如流俾躬處休其是之謂乎注哿嘉也巧言如流謂非正言而順敘以聽言見答者言其可嘉以信而有徴自取安逸師曠此言緣問流轉終歸于諌故以比巧言如流也當叔向時詩義如此故與今説詩者小異音義哿古可反毛詩傳云可也俾必耳反本又作早休許虯反美也疏正義曰小雅雨無正之篇也可哀愍哉彼不能言之人其所言者非不從舌是出但其言僭而無徴惟於己身是病以不能言而自病其身是可哀也可嘉美矣彼能言者巧為言語如水之轉流然其言信而有徴自使其身處休美之地以能言而自處其美地故可嘉也此能言處休者其是子野之謂乎注正義曰詩毛傳云哿可也哿無正訓以其字從加從可故各以意訓耳此詩上文云聼言則答譖言則退然後次此哀哉故杜以哀哉不能言覆上譖言見退謂言而不見信被黜退者也哿矣能言覆上聼言則答謂言可聽用見應答者也以其言可嘉善信而有徴故自取安逸處休美也師曠因公之問其言流轉終歸于諌其言實巧故以比巧言如流也據今毛鄭解詩哀哉不能言者賢人不能言也不能以其正道曲從君心故身見困病哿矣能言乃指時世所謂能言者巧言從俗如轉流矣阿諛順旨不依正法得使身居休美與此所引意異故言當叔向時詩義如此與今説詩者小異隱元年注云詩人之作各以情言君子論之不以文害意故春秋傳引詩不皆與今説詩者同他皆放此然則引詩斷章取義得異於本而云叔向時詩義如此者但叔向此言在孔子刪詩之前與刪詩之後其義或異故云叔向時詩義如此隱元年論詩者君子之言君子即丘明也其言副刪詩之後乃與詩説不同故云引詩斷章此杜大略而言其實未修之前有引詩亦有斷章者是宫也成諸侯必叛君必有咎夫子知之矣注謂十年晉侯彪卒傳陳哀公元妃鄭姬生悼大子偃師注元妃嫡夫人也二妃生公子留下妃生公子勝二妃嬖留有寵屬諸司徒招與公子過注招及過皆哀公弟也哀公有廢疾音義廢甫肺反三月甲申公子招公子過殺悼大子偃師而立公子留夏四月辛亥哀公縊注憂恚自殺經書辛丑從赴音義縊一鼓反恚一睡反疏注正義曰經云辛丑傳言辛亥經傳異者多是傳實經虛故言從赴長歷四月戊戌朔四日辛丑十四日辛亥一月之內有此二日故不云日誤干徴師赴于楚注干徴師陳大夫且告有立君公子勝訴之于楚注以招過殺偃師告訴也楚人執而殺之注殺干徴師公子留奔鄭書曰陳侯之弟招殺陳世子偃師罪在招也楚子執陳行人干徴師殺之罪不在行人也注疑為招赴楚當同罪故重發之音義為于偽反下為子良立宰為之立宰同重直同反疏注正義曰襄十一年楚人執鄭行人良霄傳稱書曰行人言使人也此復發傳故言重發之也釋例曰行人有六而發傳有三者因良霄以顯其稱行人因干徴師以示其非罪因魯叔孫婼以同外內大夫則餘三人皆隨例而為義也叔弓如晉賀虒祈也注賀宫成遊吉相鄭伯以如晉亦賀虒祁也史趙見子大叔曰甚哉其相蒙也注蒙欺也音義相息亮反下而相吾室同可弔也而又賀之子大叔曰若何弔也其非唯我賀將天下實賀注言諸侯畏晉非獨鄭音義若何弔也本或作若可弔也秋大搜于紅自根牟至于啇衛革車千乘注大搜數軍實簡車馬也根牟魯東界琅琊陽都縣有牟鄉啇宋地魯西竟接宋衛也言千乘明大搜且見魯衆之大數也音義乘繩證反注同數色主反竟音境見賢遍反七月甲戌齊子尾卒子旗欲治其室注子旗欒施也欲并治子尾之家政丁丑殺梁嬰注梁嬰子尾家宰八月庚戌逐子成子工子車注三子齊大夫子尾之屬子成頃公子固也子工成之弟鑄也子車頃公之孫捷也音義頃音傾下文並同鑄之樹反捷在接反皆來奔注不書非卿而立子良氏之宰注子良子尾之子髙強也子旗為子良立宰其臣曰孺子長矣注孺子謂子良音義孺而樹反本亦作孺長丁丈反而相吾室欲兼我也注兼并也授甲將攻之陳桓子善於子尾亦授甲將助之或告子旗子旗不信則數人告將往又數人告於道遂如陳氏桓子將出矣聞之而還注聞子旗至音義數色主反下同疏正義曰將往子良之家也又數人告不復敢向子良之家遂如陳氏服虔云將往者欲往到陳氏問助子良攻我意謬甚也遊服而逆之注去戎備著常遊戲之服音義去起呂反著張略反請命注問桓子所至對曰聞強氏授甲將攻子子聞諸曰弗聞子盍亦授甲無宇請從注無宇桓子名音義盍胡臘反下同從才用反子旗曰子胡然彼孺子也吾誨之猶懼其不濟吾又寵秩之注謂為之立宰其若先人何子盍謂之注謂之使無攻我周書曰惠不惠茂不茂注周書康誥也言當施惠於不惠者勸勉於不免者茂免也疏注正義曰周公戒康叔當施惠於不肯施惠者勸勉其不能勉力者今子良不能勉力為善欲令桓子勸勉之故引此書也茂勉也釋詁文康叔所以服𢎞大也注服行也桓子稽顙曰頃靈福子注頃公靈公欒氏所事之君音義稽音啓顙素黨反疏正義曰諡法祇動追懼曰頃吾猶有望注望子旗惠及已遂和之如初注和欒髙二家陳公子招歸罪於公子過而殺之注言招所以不死而得放九月楚公子棄疾帥師奉孫吳圍陳注孫吳悼大子偃師之子惠公宋戴惡會之注戴惡宋大夫冬十一月壬午滅陳注壬午十月十八日傳言十一月誤疏注正義曰杜以長歷校之十月乙丑朔十八日得壬午也十一月無壬午經書十月歷與經合知傳言十一月者誤也輿嬖袁克殺馬毁玉以葬注輿衆也袁克嬖人之貴者欲以非禮厚葬哀公疏注正義曰就衆嬖之內特舉袁克之名知克是嬖人之貴者也葬無殺馬毁玉之法知欲以非禮厚葬哀公也服虔云一曰馬陳侯所乘馬玉陳侯所佩玉故殺馬毁玉不欲使楚得之事亦有似知不然者楚既滅陳則為已有克不能私藏馬玉欲殘毁之故不從楚人將殺之請置之注置馬玉音義置之䜴反既又請私注私盡君臣恩私於幄加絰於顙而逃注幄帳也逃不欲為楚臣音義幄於角反絰直結反使穿封戍為陳公注戍楚大夫滅陳為縣使戍為縣公音義穿音川戌音恤曰城麇之役不諂注城麇役在襄二十六年戍與靈王爭皇頡音義麇九倫反注同諂敕檢反頡戶結反侍飲酒於王王曰城麇之役女知寡人之及此女其辟寡人乎注及此謂為王音義女音汝下司對曰若知君之及此臣必致死禮以息楚國注息寧靜也疏正義曰致死禮者欲為郟敖致死殺靈王也穿封戍既臣事靈王而為此悖言追恨不殺君者以明在君為君之義見已忠直若如今日有人欲謀靈王已必致死殺之此對是諂非悖也晉侯問於史趙曰陳其遂亡乎對曰未也公曰何故對曰陳顓頊之族也注陳祖舜舜出顓頊音義顓音専頊許玉反歲在鶉火是以卒滅陳將如之注顓頊氏以歲在鶉火而滅火盛而水滅音義鶉市春反疏注正義曰顓頊崩年歲星在鶉火之次於時猶有書傳言之故史趙將而知也歲星天之貴神所在必昌鶉火得歲而火益盛火盛而水滅顓頊水德故以此年終也陳是顓頊之族故知滅將如之亦當歲在鶉火陳乃滅也史趙别有以知假此而為言耳不可一凖此言以驗國之興滅今在析木之津猶將復由注箕斗之間有天漢故謂之析木之津由用也音義析星歷反復扶又反一音服疏注正義曰析木之津於十二次為位在寅也釋天云析木之津箕斗之間漢津也孫炎曰析别水木以箕斗之間是天漢之津也劉炫謂是天漢即天河也天河在箕斗二星之間箕在東方木位斗在北方水位分析水木以箕星為隔隔河須津梁以渡故謂此次為析木之津也不言析水而言析木者此次自南而盡北故依此次而名析木也襄三十年傳稱歲星在娵訾之口其明年乃及降婁歲星歲行一次降婁距此九年故此年歲在析木之津也由用釋詁文言將復用是而更興且陳氏得政于齊而後陳卒亡注物莫能兩盛自幕至于瞽瞍無違命注幕舜之先瞽瞍舜父從幕至瞽瞍間無違天命廢絶者音義幕音莫瞽音古瞍素口反疏注正義曰魯誥云幕能帥顓頊者也有虞氏報焉孔朝云幕能修道功不及祖德不及宗故每於歲之大蒸而祭焉謂之報言虞舜祭幕明幕是舜先不知去舜遠近也帝系云顓頊生窮蟬窮蟬生敬康敬康生句芒句芒生蟜牛蟜牛生瞽瞍亦不知幕於蟜牛以前是誰名字之異也從幕至瞽瞍無違天命廢絶言其不絶世繼嗣相傳以至舜也觀傳此文瞽瞍以前似有國土而尚書序云虞舜側微孔安國云為庶人故微賤經云有在下曰虞舜明是下賤矣蓋至瞽瞍始失國耳此久逺之事不可知也舜重之以明德置德於遂注遂舜後蓋殷之興存舜之後而封遂言舜德乃至於遂音義重直用反疏注正義曰三年傳云箕伯直柄虞遂伯戲則遂在直柄之後故云蓋殷興存舜之後而封之也言舜有明聖之德其德流及於遂故言置德於遂置置也置此德於遂身令使遂有德也遂世守之及胡公不淫故周賜之姓使祀虞帝注胡公滿遂之後也事周武王賜姓曰媯封諸陳紹舜後音義媯九危反疏注正義曰胡公封陳之由襄二十五年傳已具之矣世本舜姓姚氏哀元年傳稱夏后少康奔虞虞思妻之以二姚虞思猶姓姚也至胡公周乃賜姓為媯耳因昔虞舜居媯水故周賜以媯為姓也陳世家言舜居媯汭其後因姓媯氏謂胡公之前已姓媯矣是馬遷之妄也臣聞盛德必百世祀虞之世數未也繼守將在齊其兆既存矣注言陳氏興盛於齊形兆已見音義見賢遍反疏正義曰陳氏世世益賢而位漸髙有恩德而得民意其有國之徴兆既存在矣言可知也春秋左傳注疏卷四十四春秋左傳注疏卷四十四考證傳不克而還林堯叟曰不克納簡公而歸傳楚子之為令尹也為王旌以田注王旌斿至於軫斿字從於無水旁監本訛作遊今改正傳吾先君文王作僕區之法臣召南按此楚刑書也其後莊王用令尹蒍敖擇楚國之令典當又從而損益之至戰國時懷王尚使屈原造為憲令楚人之於刑也亦可謂慎重者哉傳夏四月甲辰朔日有食之臣召南按四月日食於降婁之初是夏時二月可為周人改月改時之證若不改時當云春四月矣傳昔堯殛鯀于羽山疏賔爵下華田鼠上騰臣照按賔爵下華即是爵入大水為蛤耳華本或作革推尋文義作革者是顧賔爵云者蓋因上文鴻雁來賔而誤斷句也亦良踈矣傳聖人之後也而滅於宋疏家語本姓篇臣召南按宋公熙應作湣周生世子勝唐書宰相世系表作世父勝金父生臯夷父今本家語作睪夷父又按湣公熙史記宋世家湣公名共其弟焬公名熙傳哿矣能言疏以言能而自處其美地推尋文義應作以能言而自處其美地傳大搜于紅自根牟至于啇衛注根牟魯東界臣召南按魯東與齊莒二國接連其西境則鄰宋衛衛當正西近北宋當其西南也北為齊南為邾滕薛諸國此傳不唯見魯衆之大數即土地廣輪之大槩巳舉春秋左傳注疏卷四十四考證
