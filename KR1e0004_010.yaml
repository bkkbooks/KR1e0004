body:
  text: 春秋左傳注疏卷十起閔公元年盡二年晉杜氏注唐陸德明音義孔穎達疏閔公音義陸曰閔公名啓方莊公之子母叔姜史記云名開諡法在國遭難曰閔疏正義曰魯世家閔公名開莊公之子惠王十六年卽位杜世族譜云名啟方漢景帝諱啟啟開因是而亂杜譜云啟方從世本文諡法在國逄難曰閔是歲歲在大梁經元年春王正月齊人救邢夏六月辛酉葬我君莊公秋八月公及齊侯盟于落姑注落姑齊地季子來歸注季子公子友之字季子忠於社稷爲國人所思故賢而字之齊侯許納故曰歸疏正義曰季是友之字也子者男子之美稱國人賢而思之得其還魯喜而呼曰季子來歸史因其言而書之傳稱請復季友齊侯許之是得齊之力齊侯許納故曰歸也冬齊仲孫來注仲孫齊大夫以事出疆因來省難非齊侯命故不稱使也還使齊侯務寧魯亂故嘉而字之來者事實省難其志也故經但書仲孫之來而傳尋仲孫之志音義疆居良反難乃旦反下及傳同疏注正義曰傳稱仲孫湫則名湫而字仲孫也杜言以事出疆或使向他國因來省魯難非齊侯命之使來來而不稱君命故不言齊侯使也諸侯之卿例當書名此人還國使齊侯務寧魯難明年卽有高子來盟是齊侯用其言魯人知其事不書其名嘉而字之杜云稱字嘉之則仲孫是字猶楚之孫伯或亦以孫爲字也來者身來至魯是事實也省難心自省之是其志也雖志在省難不告魯人云已省其難故經據實事但書仲孫之來傳尋仲孫之志言其來省難也傳元年春不書卽位亂故也注國亂不得成禮狄人伐邢注狄伐邢在往年冬管敬仲言於齊侯曰戎狄豺狼不可厭也注敬仲管夷吾音義豺士皆反狼音即厭於鹽反諸夏親暱不可棄也注諸夏中國也暱近也音義夏戸雅反暱女一反宴安酖毒不可懷也注以宴安比之酖毒音義宴於見反本又作宴音同一音烏諫反酖直蔭反詩云豈不懷歸畏此簡書注詩小雅美文王爲西伯勞來諸侯之詩音義勞來力報反下力代反疏正義曰戎狄之心若豺狼之獸不可厭足也言其當伐戎狄也諸夏之國皆親近之人不可遺棄也言其當救邢也宴安自逸若酖毒之藥不可懷戀也言其當自勞也詩小雅出車之篇美文王勞來諸侯令賢臣出使此臣在外思歸而以王事自勉言我豈不思歸乎誠思歸也但畏此簡書來告急耳諸侯有事則書之於簡遣使執簡以告命告則須救故畏而不歸也此簡書者同有所惡則相憂之謂也請救邢以從簡書傳稱勤則不匱安則敗名齊侯縱心宴安不欲征伐安則自損其身故言酖毒以勸之釋獸云豺狗足郭璞云腳似狗説文云豺狼屬狗聲釋獸又云狼牡貛牝狼舍人曰牡名貛牝名狼陸璣毛詩義疏云狼鳴能小能大善爲小兒啼聲以誘人去數十步其猛健者雖善用兵者不能免也二者皆貪殘之獸故比戎狄也注正義曰敬諡諡法夙夜勤事曰敬仲字管氏夷吾名此言諸夏襄四年傳魏絳云諸華必叛華夏皆謂中國也中國而謂之華夏者夏大也言有禮儀之大有文章之華也暱近釋詁文舍人曰暱戚之近也言中國諸侯情親而路近簡書同惡相恤之謂也注同恤所惡請救邢以從簡書齊人救邢夏六月葬莊公亂故是以緩注十一月乃葬秋八月公及齊侯盟于落姑請復季友也注閔公初立國家多難以季子忠賢故請霸主而復之齊侯許之使召諸陳公次于郎以待之注非師旅之事故書次季子來歸嘉之也冬齊仲孫湫來省難注湫仲孫名音義湫子小反書曰仲孫亦嘉之也仲孫歸曰不去慶父魯難未巳注時慶父亦還魯音義去起呂反下同公曰若之何而去之對曰難不已將自斃注斃踣也音義斃婢世反踣薄北反君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也臣聞之國將亡本必先顛而後枝葉從之魯不棄周禮未可動也君其務寧魯難而親之親有禮因重固注能重能固則當就成之疏注正義曰服䖍云重不可動因其不可動而堅固之杜以此傳四句相類間攜貳攜貳皆間之覆昬亂昬亂皆敗之知此重固皆因之則非因重而固之間攜貳注離而相疑者則當因而間之音義間問厠之間注同覆昬亂注覆敗也音義覆芳服反注同霸王之器也注霸王所用故以器爲喻音義王于况反注同晉侯作二軍注晉本一軍見莊十六年音義見賢遍反公將上軍大子申生將下軍趙夙御戎畢萬爲右注爲公御右也夙趙衰兄畢萬魏犫祖父音義將子匠反下及注同衰初危反犫尺由反疏注正義曰史記趙世家夙生共孟孟生趙衰晉語云趙衰先君之戎御趙夙之弟也杜以夙爲衰兄從晉語也魏世家畢萬生武子世本畢萬生芒季李生武仲州州卽犫也杜以萬爲犫之祖父依世本也以滅耿滅霍滅魏注平陽皮氏縣東南有耿鄉永安縣東北有霍大山三國皆姬姓音義耿古幸反國名還爲大子城曲沃賜趙夙耿賜畢萬魏以爲大夫士蒍曰大子不得立矣分之都城而位以卿先爲之極又焉得立注位以卿謂將下軍音義還爲于僞反焉於䖍反不如逃之無使罪至爲呉大伯不亦可乎注大伯周大王之適子知其父欲立季歴故讓位而適呉音義大音㤗注同適子丁歴反本又作嫡疏注正義曰史記呉世家云呉大伯弟仲雍皆周大王之子而王季歴之兄也季歴賢而有聖子昌大王欲立季歴以及昌於是大伯仲雍二人乃奔荆蠻以辟季歴季歴果立是爲王季是大伯讓位適呉之事猶有令名與其及也注言雖去猶有令名勝於留而及禍疏正義曰言逃雖失國猶有善名與其留而及禍也何者爲勝勸之使逃且諺曰心苟無瑕何恤乎無家天若祚大子其無晉乎注爲晉殺申生傳音義諺音彦祚在路反卜偃曰畢萬之後必大注卜偃晉掌卜大夫萬盈數也魏大名也疏正義曰以算法從一至萬每十則改名至萬以後稱一萬十萬百萬千萬萬萬始名億從是以往皆以萬爲極是至萬則數滿也論語云巍巍乎其有成功是巍爲高大之名以是始賞天啓之矣天子曰兆民諸侯曰萬民今名之大以從盈數其必有衆注以魏從萬有衆象初畢萬筮仕於晉遇屯注震下坎上屯音義屯張倫反之比注坤下坎上比屯初九變而爲比音義比毗志反注及下同疏正義曰震下坎上爲屯説卦云震動也坎彖云坎險也動而遇險有屯難之象坤下坎上爲比説卦坎爲水坤爲地水潤下而地受之相親比之象也辛廖占之曰吉注辛廖晉大夫音義廖力彫反疏注正義曰杜云辛廖晉大夫則以畢萬筮仕在晉國而筮劉炫云若在晉國而筮何得云筮仕於晉又辛甲辛有並是周人何故辛廖獨爲晉大夫今知不然者傳以畢萬是畢國子孫今乃筮仕於晉言於晉以對畢耳非謂筮時在他國也案昭十五年傳云及辛有之二子董之晉於是乎有董史注云辛有周人二子適晉爲大史則辛氏雖出於周枝流於晉劉炫用服氏之説以爲畢萬在周筮仕於晉又以晉國不得有姓辛而規杜過其義非也屯固比入吉孰大焉其必蕃昌注屯險難所以爲堅固比親宻所以得入音義蕃音煩震爲土注震變爲坤車從馬注震爲車坤爲馬疏注正義曰晉語云司空季子占公子重耳之筮云震車也坤彖云利牝馬之貞是坤爲馬也下注震爲足震爲長男坤爲母坤爲衆皆説卦文也足居之注震爲足兄長之注震爲長男音義長丁丈反母覆之注坤爲母衆歸之注坤爲衆六體不易注初一爻變有此六義不可易也合而能固安而能殺公侯之卦也注比合屯固坤安震殺故曰公侯之卦疏注正義曰震之爲弑傳無明文晉語云震車也車有威武昭二十五年傳云爲刑罰威獄以類其震矅殺戮是震爲威武殺戮之意故震爲殺也公侯之子孫必復其始注萬畢公高之後傳爲魏之子孫衆多張本疏正義曰萬是畢公之後公侯之子孫必當復其初始言此人子孫又將爲公侯也及春秋之後三家分晉而魏爲諸侯是其筮之驗也經二年春王正月齊人遷陽注無傳陽國名蓋齊人偪徙之疏注正義曰世本無有陽國不知何姓杜世族譜土地名闕不知所在與宋人遷宿文同知陽是國名蓋齊人偪遷之夏五月乙酉吉禘于莊公注三年䘮畢致新死者之主於廟廟之逺主當遷入祧因是大祭以審昭穆謂之禘莊公䘮制未闋時别立廟廟成而吉祭又不於大廟故詳書以示譏音義禘大計反祧他彫反昭上饒反闋苦穴反大廟音㤗疏注正義曰僖三十三年傳曰凡君薨卒哭而祔祔而作主特祀於主烝嘗禘於廟禘祀爲吉祭説䘮事而言禘知禘是䘮終而吉祭也襄十五年晉悼公卒十六年傳稱晉人答穆叔云以寡君之未禘祀知三年䘮畢乃爲禘也䘮畢而爲禘祭知致新死之主於廟也新主入廟則逺主當遷知其遷入祧者祭法云天子七廟有二祧則祧是逺祖廟也周禮守祧掌守先王先公之廟祧其遺衣服藏焉廟之逺主其廟既遷主無所處固當遷入祧也鄭𤣥以二祧爲文王武王之廟遷主入廟當各從其班穆入文祧昭入武祧禮諸侯五廟更無别祧則當謂大祖之廟爲祧也逺主初始入祧新死之主义當與先君相接故禮因是而爲大祭以審序昭穆故謂之禘禘者諦也言使昭穆之次審諦而不亂也莊公以其三十二年八月薨至此年五月唯二十二月故䘮制未闋也公羊傳曰其言于莊公何未可以稱宫廟也曷爲未可以稱宮廟在三年之中矣三年之中未得以禮遷廟而特云莊公知爲莊公别立廟廟成而吉祭也僖八年禘于大廟文二年大事于大廟宣八年有事于大廟彼言大事有事亦禘祭也則禘禮必于大廟今未可以吉祭而爲吉祭又不于大廟故詳書以示譏也既云吉禘又云于荘公是其詳也秋入月辛丑公薨注實弑書薨又不地者皆史策諱之九月夫人姜氏孫于邾注哀姜外滛故孫稱姜氏音義孫音遜注同疏注正義曰此決莊元年夫人孫于齊不稱姜氏也賈服之説皆以爲文姜殺夫罪重故去姜氏哀姜殺子罪輕故不去姜氏故杜爲此言以異之言外滛者謂與外姓爲滛公子慶父出奔莒注弑閔公故冬齊高子來盟注無傳蓋高傒也齊侯使來平魯亂僖公新立因遂結盟故不稱使也魯人貴之故不書名子男子之美稱音義美稱尺證反疏注正義曰荘二十二年及齊高傒盟于防自爾以來不見經傳故云蓋高傒也往年仲孫湫勸齊侯使寧魯難今而高子適魯知齊侯使來平魯亂也當齊侯初命高子之時慶父未出僖公未立及其至魯値僖公新立因遂與魯結盟而立之不云齊侯使者盟非齊侯之命故不稱使也齊侯不使之盟而高子輙爲盟者齊侯使之來平魯亂新君既立遂盟而安之亦足稱齊侯之意其盟非専擅也魯人不能自安高子盟以安之魯人貴之故不書其名子者男子之美稱故呼之曰髙子榖梁傳曰其曰來喜之也其曰高子貴之也盟立僖公也然則盟立僖公必僖公共盟不言公及齊高子盟者桓十四年鄭伯使其弟語來盟文十五年宋華孫來盟皆不言公及則不書公者春秋之常也晉荀庚衛孫良夫並爲來聘既行聘禮更與公盟非是直爲盟來故聘後别言及耳十有二月狄入衛注書入不能有其地例在襄十三年鄭棄其師注高克見惡久不得還師潰而克奔陳故克狀其事以告魯也音義惡烏路反潰戸内反疏注正義曰此事詩序具焉大夫出奔多是本國來告傳稱晉侯使以殺大子申生之故來告又衞殺孔達告於諸侯是其本國告也宣十年傳例曰凡諸侯之大夫違告於諸侯曰某氏之守臣某失守宗廟敢告是大夫私家之告辭昭二十六年王子朝奔楚傳稱告于諸侯是奔者自告也此鄭文公心惡高克而欲得逺之克既奔陳無罪可告故杜以爲高克自狀其事以告魯魯史以爲克若將師出奔是爲棄師之道不書高克出奔而書鄭棄其師者案詩序云公子素惡高克進之不以禮文公退之不以道危國亡師之本是棄其師也榖梁傳曰鄭棄其師惡其長也兼不反其衆則是棄其師也傳二年春虢公敗犬戎于渭汭注犬戎西戎别在中國者渭水出隴西東入河水之隈曲曰汭音義汭如鋭反隈烏回反疏注正義曰西方曰戎知犬戎是西戎别在中國者也釋例曰渭水出隴西狄道縣鳥䑕同穴山東經南安天水略陽扶風始平京兆至𢎞農華隂縣入河釋丘云隩隈厓内爲隩外爲隈李廵曰厓内近水爲隩孫炎云内隈曲裏也彼雖不言汭汭即隩也而汭字以内爲聲明是水之隈曲之内也舟之僑曰無德而祿殃也殃將至矣遂奔晉注舟之僑虢大夫音義僑音喬注同夏吉禘于莊公速也初公傅奪卜齮田公不禁注卜齮魯大夫也公即位年八歲知愛其傳而遂成其意以奪齮田齮忿其傅并及公故慶父因之音義齮魚綺反疏注正義曰荘公三十二年注云閔公於是年八歲此云即位年八歳者閔公之年歳傳文不明服䖍於莊三十二年注云閔公於是年九歲於此注云公即位時年九歲僖二年注云閔公死時年九歲杜知其不可故於莊公之末注言年八歲以異之嗣子位定於初䘮言即位者亦謂初立之年也秋八月辛丑共仲使卜齮賊公于武闈注宮中小門謂之闈音義共音恭闈音韋一音暉疏注正義曰釋宫云宫中之門謂之闈其小者謂之閨小閨謂之閤彼就小門之内更别以爲二名大率宫中之門皆小故云宫中小門也名之曰武則其義未聞成季以僖公適邾注僖公閔公庶兄成風之子共仲奔莒乃入立之以賂求共仲于莒莒人歸之及密使公子魚請注密魯地琅邪費縣北有密如亭公子魚奚斯也音義費音祕又扶味反不許哭而往共仲曰奚斯之聲也乃縊注慶父之罪雖重季子推親親之恩欲同之叔牙存孟氏之族故略其罪不書殺又不書卒音義縊一賜反疏注正義曰叔牙云慶父材者始有黨慶父之心本其惡未顯見故季子隱之而書其卒若自死然慶父弑二君其罪已章著計當書其誅殺季子推親親之恩欲同之叔牙存孟氏之族故略其罪不書殺也又不可全同叔牙故又不書卒慶父子孫終爲孟氏是季子推親親之恩枉正法耳閔公哀姜之娣叔姜之子也故齊人立之共仲通於哀姜哀姜欲立之閔公之死也哀姜與知之故孫于邾齊人取而殺之于夷以其尸歸注爲僖元年齊人殺哀姜傳夷魯地音義與音預孫音遜僖公請而葬之注哀姜之罪已重而僖公請其喪還者外欲固齊以居厚内存母子不絶之義爲國家之大計成季之將生也桓公使卜楚丘之父卜之注卜楚丘魯掌卜大夫曰男也其名曰友在公之右注在右言用事間于兩社爲公室輔注兩社周社亳社兩社之間朝廷執政所在音義亳步各反疏注正義曰王者取五色之土封以爲社若封諸侯隨方割其土包之以白茅賜之使立國社魯是周之諸侯故國社謂之周社哀四年亳社災是魯國有亳社榖梁傳曰亳社者亳之社也亳亡國也亡國之社以爲廟屏戒也則亳社在宗廟之前也周禮小宗伯掌建國之神位右社稷左宗廟則諸侯亦當然定二年雉門及兩觀災則兩觀在雉門外也禮運云昔者仲尼與於蜡賔事畢出遊於觀之上蜡祭在廟故出廟而遊於觀也由此言之宗廟社稷在雉門之外分左右廂也鄭𤣥考校禮文以爲魯制三門庫雉路天子諸侯皆三朝圖宗人之嘉事則有路寢庭朝日出視朝則在路門之外其詢國危詢國遷詢立君周禮朝士所掌外朝之位者乃在雉門之外耳雉門之外左有亳社右有周社間于兩社是在兩社之間朝廷詢謀大事則在此處是執政之所在也季氏亡則魯不昌疏正義曰服䖍云謂季友出奔魯弑二君案傳子般既死乃云成季奔陳閔公既死乃云成季適邾皆君死乃出奔非由出奔乃致君死杜雖無注義必不然當謂季友子孫與魯升降從此以後季氏世為上卿終於春秋禮記稱悼公之喪季昭子問為君何食以後雖則無文當是與魯俱滅也又筮之遇大有注乾下離上大有之乾注乾下乾上乾大有六五變而為乾曰同復于父敬如君所注筮者之辭也乾為君父離變為乾故曰同復于父見敬與君同疏注正義曰此雖六五爻變不取周易之文筮者推演卦意自為其辭也離是乾子還變為乾故云同復于父言其尊與父同也國人敬之其敬如君之處所言其貴與君同也説卦乾為君父言其身之尊則云同復于父言其為人所敬則云敬如君所屬意異故分為二也及生有文在其手曰友遂以命之注遂以為名冬十二月狄人伐衞衞懿公好鶴疏正義曰陸璣毛詩義䟽云鶴形状大如鵞長腳青翼高三尺餘赤目赤頰喙長四寸餘多純白或有蒼色蒼色者今人謂之赤頰常夜半鳴故淮南子曰雞知将旦鶴知夜半其鳴高亮聞八九里雌者聲差下今吳人圉囿中及士大夫家皆養之鶴有乘軒者注軒大夫車音義好鶴呼報反下戸各反軒許元反疏注正義曰定十三年傳稱齊侯飲諸大夫之軒故杜云軒大夫車也服䖍云車有藩曰軒將戰國人受甲者皆曰使鶴鶴實有禄位余焉能戰公與石祁子玦與甯莊子矢使守注莊子甯速也玦玉玦音義焉於䖍反玦古穴反守手又反下告守及注同曰以此贊國擇利而爲之注贊助也玦示以當玦斷矢示以禦難音義斷丁亂反難乃旦反與夫人繡衣曰聽於二子注取其文章順序渠孔御戎子伯為右黄夷前驅孔嬰齊殿注傳言衞侯失民有素雖臨事而戒猶無所及音義殿丁練反及狄人戰于滎澤衞師敗績遂滅衞注此滎澤當在河北君死國散經不書滅者狄不能赴衞之君臣皆盡無復文告齊桓為之告諸侯言狄已去言衞之存故但以入為文音義滎户扃反無復扶又反下復逐同為之于偽反下文為衞同疏注正義曰禹貢豫州滎波既豬導沇水入于河溢為滎是滎在河南此時衛都河北為狄所敗乃東徙渡河故知此滎澤當在河北但沇水入河乃泆被河南多故専得滎名其北雖少亦稱滎也衞侯不去其旗是以甚敗狄人囚史華龍滑與禮孔以逐衛人二人曰我大史也實掌其祭不先國不可得也注夷狄畏鬼故恐言當先白神音義去起吕反藏也一云除也華胡化反大音㤗恐丘勇反乃先之至則告守曰不可待也注守石甯二大夫夜與國人出狄入衛遂從之又敗諸河注衛将東走渡河狄復逐而敗之初惠公之即位也少注蓋年十五六音義少詩照文疏注正義曰衛宣公以隠四年立桓十二年卒終始二十年耳即位之後及納急子之妻生夀及朔朔既有兄知其葢年十五六耳齊人使昭伯烝於宣姜不可强之注昭伯惠公庶兄宣公子頑也昭伯不可音義烝之承反强其丈反生齊子戴公文公宋桓夫人許穆夫人文公為衛之多患也先適齊及敗宋桓公逆諸河注迎衛敗衆宵濟注夜渡畏狄衞之遺民男女七百有三十人益之以共滕之民為五千人注共及滕衛别邑音義共音恭立戴公以廬于曹注廬舍也曹衛下邑戴公名申以其年卒而立文公音義廬力居反于曹詩作漕音同疏注正義曰周禮秋官野廬氏掌道路宿息地官遺人云凡國野之道十里有廬廬有飲食是廬為舍也廬于曹者言隨宜寄舍耳曹邑雖闕不知其處當在河東近楚丘也戴公名申世本世家文經傳皆云十二月狄入衛衛人東徙渡河收集離散乃立戴公此年之末文公即位計戴公為君不過十數日耳言立一年卒者滅而復興不是嗣位故成䘮為諡文公繼世而立明年始為元年故戴公雖復日少亦稱一年年表亦以此年為戴公元年今定本云以其年卒許穆夫人賦載馳注載馳詩衛風也許穆夫人痛衛之亡思歸唁之不可故作詩以言志音義唁音彦齊侯使公子無虧帥車三百乘甲士三千人以戍曹注無虧齊桓公子武孟也車甲之賦異於常故傳别見之音義虧去危反乘繩證反下及注同見賢遍反歸公乘馬祭服五稱牛羊豕雞狗皆三百與門材注歸遺也四馬曰乘衣單複具曰稱門材使先立門户音義稱尺證反狗音苟遺于季反單複音丹下方服反疏注正義曰歸者不反之辭故為遺也周禮校人云乘馬一師四圉圉養一馬故云四馬曰乘以乘車并師五人必駕四馬故也喪大記曰袍必有表不禪衣必有裳謂之一稱是衣襌複具曰稱歸夫人魚軒注魚軒夫人車以魚皮為飾疏注正義曰詩云象弭魚服此云魚軒則用魚為飾其皮可以飾器物者唯魚獸耳故云以魚皮為飾陸璣毛詩義䟽云魚獸似猪東海有之其皮背上有班文腹下有純青今人以為弓鞬歩义者也其皮雖乾燥為弓鞬矢服經年海水將潮及天隂毛皆起水潮還及晴則其毛復如故雖在數千里外可以知海水之潮自相感也重錦三十兩注重錦錦之熟細者以二丈雙行故曰兩三十兩三十匹也疏注正義曰服䖍云重牢也杜以其遺夫人貴美不貴牢故以為錦之熟細者雜記曰納幣一束束五兩兩五尋八尺曰尋則五尋四丈謂之兩者分為兩叚故也謂之匹者兩兩合卷皆匹偶然也鄭人惡高克使帥師次于河上久而弗召師潰而歸高克奔陳注高克鄭大夫也好利而不顧其君文公惡之而不能逺故使帥師而不召音義惡烏路反注同好呼報反逺于萬反鄭人為之賦清人注清人詩鄭風也刺文公退臣不以道危國亡師之本音義為于偽反晉侯使大子申生伐東山臯落氏注赤狄别種也臯落其氏族音義臯古刀反種章勇反疏注正義曰狄有赤狄白狄成十三年傳晉侯使呂相絶秦云白狄及君同州則白狄與秦相近當在晉西此云東山當在晉東宣十五年晉師滅赤狄潞氏潞則上黨潞縣在晉之東此云伐東山臯落氏知此亦在晉東是赤狄别種也臯落其氏族也此族之人狄之渠帥也里克諌曰大子奉冡祀社稷之粢盛注里克晉大夫冡大也音義粢盛上音咨下音成以朝夕視君膳者也注膳厨膳音義朝如字又張遥反膳市戰反疏注正義曰鄭𤣥膳夫注云膳之言善也今時美物曰珍膳是膳者美食之名厨者造食之處故云膳厨膳也禮記云文王之為世子食上必在視寒煖之節食下問所膳命膳宰然後退是大子朝夕視君膳者也故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師專行謀注帥師者必專謀軍事音義則守手又反下同從才用反下同監古銜反誓軍旅注宣號令也君與國政之所圖也非大子之事也注國政正卿師在制命而已注命將軍所制禀命則不威專命則不孝故君之嗣適不可以帥師君失其官帥師不威將焉用之注大子統師是失其官也專命則不孝是為帥必不威也音義適丁歴反本又作嫡下配適同焉於䖍反且臣聞臯落氏將戰君其舍之公曰寡人有子未知其誰立焉不對而退見大子大子曰吾其廢乎對曰告之以臨民注謂居曲沃敎之以軍旅注謂將下軍音義謂將子匠反下將上軍並同不共是懼何故廢乎疏正義曰克謂大子還曲沃告百姓以臨示下民之事并教之軍旅之法不共是二事為懼矣何故憂其廢乎且子懼不孝無懼弗得立脩已而不責人則免於難大子帥師公衣之偏衣注偏衣左右異色其半似公服音義共音恭本又作供難乃旦反下同公衣之偏於既反下衣身之偏衣之純衣之尨服注衣之同疏注正義曰下云服其身則衣之純言此偏衣不純知其左右異色也又云衣身之偏言公以身衣之偏半衣大子知其半似公服也佩之金玦注以金為玦狐突御戎先友為右注狐突伯行重耳外祖父也為申生御申生以大子將上軍梁餘子養御罕夷先丹木為右注罕夷晉下軍卿也梁餘子養為罕夷御羊舌大夫為尉注羊舌大夫叔向祖父也尉軍尉音義向許丈反疏注正義曰羊舌氏也爵為大夫號曰羊舌大夫不知其如何也此人生羊舌職職生叔向故為叔向祖父譜云羊舌氏晉之公族羊舌其所食邑也或曰羊舌氏姓李名果有人盗羊而遺其頭不敢不受受而埋之後盗羊事發辭連李氏李氏掘羊頭而示之以明已不食唯識其舌舌存得免號曰羊舌氏也或曰者不知誰為此言杜所不從記異聞耳先友曰衣身之偏注偏半也握兵之要注謂佩金玦將上軍在此行也子其勉之偏躬無慝注分身衣之半非惡意也音義慝他得反兵要逺災注威權在已可以逺害音義逺于萬反注及下同親以無災又何患焉狐突歎曰時事之徴也注歎以先友為不知君心衣身之章也注章貴賤佩衷之旗也注旗表也所以表明其中心音義衷音忠旗音其故敬其事則命以始注賞以春夏服其身則衣之純注必以純色為服用其衷則佩之度注衷中也佩玉者士君子常度今命以時卒閟其事也注冬十二月閟盡之時音義閟音秘衣之尨服逺其躬也注尨雜色音義尨莫江反佩以金玦棄其衷也服以逺之時以閟之尨凉冬殺金寒玦離胡可恃也注寒凉殺離言無溫潤玦如環而缺不連疏正義曰服以逺之覆上衣之尨服也時以閟之覆上命以時卒也上先時後服此先服後時者以下連尨凉冬殺之文又欲使冬殺與金寒相近冬殺是時故退之在下言尨凉則申上衣之尨服也冬殺則申上命以時卒也尨凉㨿服冬殺據時耳金寒玦離申上佩以金玦也金是秋之寒氣故言金寒也雖欲勉之狄可盡乎梁餘子養曰帥師者受命於廟受脤於社注脤宜社之肉盛以脤器音義脤市軫反祭社之肉盛音成疏注正義曰釋天云起大事動大衆必先有事乎社而後出謂之宜知出兵必祭社祭社名為宜周禮大宗伯以脤膰之禮親兄弟之國定十四年天王使石尚來歸脤知脤是器物可執之以賜人也今言受脤於社明是祭社之肉盛以脤器賜元帥也地官掌蜃祭祀共蜃器之蜃鄭玄云蜃大蛤脤之器以蜃飾因名焉有常服矣不獲而尨命可知也注韋弁服軍之常也尨偏衣死而不孝不如逃之罕夷曰尨竒無常注雜色竒怪非常之服金玦不復雖復何為君有心矣注有害大子之心先丹木曰是服也狂夫阻之注阻疑也言雖狂夫猶知有疑音義阻莊吕反疏注正義曰劉炫云阻疑以意訓耳今言猶云阻疑且阻得為疑也言雖狂夫猶知於此服有疑也服䖍云阻止也方相之士䝉𤣥衣朱裳主索室中敺疫號之為狂夫止此服言君與大子以狂夫所止之服衣之晉語云且是之衣也狂夫阻之衣也韋昭云狂夫方相氏之士也阻古詛字也將服是衣必先詛之是由無正訓各以意觧劉以為方相氏狂夫所服𤣥衣朱裳左右同色不得為偏衣也當服此衣非是意所止也詛乃服之文無所出故杜别為此觧曰盡敵而反注曰公辭音義盡子忍反下盡敵同疏注正義曰言公辭者當以公賜之偏衣金玦推其義理原公之意而為之作辭非公出言作此辭也敵可盡乎雖盡敵猶有内讒不如違之注違去也狐突欲行注行亦去也羊舌大夫曰不可違命不孝棄事不忠雖知其寒惡不可取子其死之注寒薄也疏正義曰傳之上下諸言某御戎某為右者謂國君自將此大子亦然者攝君之事故與君同文也傳歴言將帥御右者以下各有言故此舉其目先友不知君有害大子之心故推此衣佩以為善事勸之狐突數先友不知君意乃極言時衣佩三者反覆以答之罕夷唯舉服佩二事故云尨竒無常金玦不復也其梁餘子養先丹木唯言服舉其重者故子養云不獲而尨命可知也先丹木云是服也狂夫阻之是皆勸大子之行也狐突以衆言同已故決意欲行羊舌大夫乃以忠孝之事勸之使留各以意之所見故其言或深或淺大子將戰狐突諫曰不可昔辛伯諗周桓公云注諗告也事在桓十八年音義諗音審説文云深謀内寵並后外寵二政嬖子配適大都耦國亂之本也周公弗從故及於難今亂本成矣注驪姬為内寵二五為外寵奚齊為嬖子曲沃為大都故曰亂本成矣疏注正義曰辛伯之語先有成文其内寵之徒不為晉發故劉炫云二五嬖賤不得為二政大子不以曲沃作亂不得為大都而杜云驪姬為内寵二五為外寵奚齊為嬖子曲沃為大都者今刪定以為辛伯之言雖不為晉要晉國之亂事理相當故杜以事託之二五為耦墾傷晉室曲沃彊大大子居之又築屈與蒲終為禍難但此據大子故以曲沃為文劉君不達此㫖而為規過違傳意也立可必乎孝而安民子其圖之注奉身為孝不戰為安民與其危身以速罪也注有功益見害故言孰與危身以召罪疏正義曰去則孝而安民留則危身召罪等與其危身以召罪也豈若孝而安民乎勸使逃也成風聞成季之繇乃事之注成風莊公之妾僖公之母也繇卦兆之占辭音義繇直救反而屬僖公焉故成季立之音義屬章欲反僖之元年齊桓公遷邢于夷儀二年封衞于楚丘邢遷如歸衞國忘亡注忘其滅亡之困衞文公大布之衣大帛之冠注大布麤布大帛厚繒蓋用諸侯諒闇之服音義衛文公大布之衣本或作衣大布之衣誤繒疾陵反諒音良又音亮務材訓農通商惠工注加惠於百工賞其利器用敬敎勸學授方任能注方百事之宜也疏正義曰務材務在植材用也訓農訓民勸農業也通商通商販之路令貨利往來也惠工加恩惠於百工賞其利器用也敬敎敬民五敎也勸學勸民學問也授方授民以事皆有方法也任能其所委任信用能人也元年革車三十乘季年乃三百乘注衞文公以此年冬立齊桓公始平魯亂故傳因言齊之所以霸衞之所由興革車兵車季年在僖二十五年蓋招懷迸散故能致十倍之衆音義乘繩證反下同迸必諍反春秋左傳注疏卷十春秋左氏傳注疏卷十考證元年冬齊仲孫來注以事出疆因來省難非齊侯命故不稱使也臣召南按杜注非是湫來省難即是齊侯使之二年高子來盟亦不書齊侯使也杜于此曰非齊侯命故稱使于彼又曰齊侯使來平魯亂僖公新立因遂結盟故不稱使前後矛盾傳詩云豈不懷歸畏此簡書注詩小雅美文王為西伯勞來諸侯之詩臣召南按詩出車鄭箋曰西伯以天子之命出車征伐王殷王也南仲文王之屬也豈不懷歸二句毛傳曰簡書戒命也鄰國有急以簡書相告則奔命救之是杜注所本傳請復季友也趙汸補注曰是時閔公八歲耳哀姜慶父專國豈欲季友之歸者故陳氏以為國人為之傳公次于郎以待之注非師旅之事故書次臣浩按杜注觧傳言次而經不書之意當作非師旅之事故不書次各本俱無不字未敢遽添傳書曰仲孫亦嘉之也陳傅良曰傳釋大夫恒書名於是特書族傳公侯之子孫必復其始陳傅良曰傳起趙魏事王應麟曰公侯之子孫必復其始其三卿分晉之後之言乎齊人遷陽注陽國名䟽土地名闕不知所在臣召南按漢書地理志東海郡都陽及城陽國陽都注並引應劭曰春秋齊人遷陽是傳間于兩社為公室輔注兩社周社亳社兩社之間朝廷執政所在臣召南按史記集觧引賈逵注如此蓋杜氏全用賈説傳狐突御戎先友為右注申生以太子將上軍臣召南按前年晉侯作二軍公將上軍太子申生將下軍趙夙御戎畢萬為右是趙夙畢萬為上軍御戎車右也此年太子代將上軍御戎車右皆易自此以後晉更軍制較他國為最詳傳僖之元年齊桓公遷邢于夷儀二年封衞于楚丘臣召南按傳有追叙有預叙此類則預叙也春秋左氏傳注疏卷十考證
