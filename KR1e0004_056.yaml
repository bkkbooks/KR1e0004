body:
  text: 春秋左傳注疏卷五十六起定公十年盡十五年晉杜氏注唐陸徳明音義孔穎達疏經十年春王三月及齊平注平前八年再侵齊之怨夏公會齊侯于夾谷注平故音義夾古洽反又古協反二傳作頰谷古木反公至自夾谷注無傳晉趙鞅帥師圍衛齊人來歸鄆讙龜隂田注三邑皆汶陽田也泰山博縣北有龜山隂田在其北也㑹夾谷孔子相齊人服義而歸魯田音義鄆音運讙火官反汶音問相息亮反疏注正義曰傳言孔丘使兹無還揖對齊要令反汶陽之田乃與之盟齊人為是歸此三邑知三邑皆汶陽田也土地名汶水出泰山萊蕪縣西南經濟北至東平須昌縣入濟則汶水𤼵源東北而西南流也水北曰陽此三邑皆在汶水北近齊齊因陽虎出奔取為己有今服義而歸魯也僖元年公賜季友汶陽之田季氏世脩其徳不應失其采邑則此汶陽之田當為季氏采地今復有此三邑者汶水之北皆名汶陽其地多矣蓋季氏私邑之外别有此田也龜山名也山北曰隂田在龜山北其邑卽以龜隂為名故云三邑叔孫州仇仲孫何忌帥師圍郈注郈叔孫氏邑音義郈音后字林下溝反秋叔孫州仇仲孫何忌帥師圍郈宋樂大心出奔曹注傳在前年春書名罪其稱疾不適晉宋公子地出奔陳注貪弄馬以距君命書名罪之也音義弄魯貢反冬齊侯衛侯鄭游速㑹于安甫注無傳安甫地闕叔孫州仇如齊宋公之弟辰曁仲佗石彄出奔陳注曁與也宋公寵向魋不聼辰請辰忿而將大臣出奔虚請自忿稱弟示首惡也仲佗石彄皆為國卿不能匡君静難而為辰所牽帥出奔稱名亦罪之也音義曁其器反佗徒何反彄苦候反魋大回反難乃旦反疏注正義曰曁與也釋詁文凡大夫出奔書名皆是罪惡故杜迹其為罪之狀解其書名之由地旣出奔辰為之請請而不許是虚其請也公唯不許而已未嘗責其妄請不被廹逐自忿出奔是辰之罪也釋例曰宋辰率羣卿以背宗國披大邑以成叛逆故以首惡稱弟是言稱弟示首惡也杜知是首惡者以其特云宋公之弟辰曁仲佗石彄是辰牽率仲佗石彄故云首惡也若不為首惡當如昭二十二年宋華亥向寜華定出奔楚不須曁字以間之傳十年春及齊平夏公會齊侯于祝其實夾谷注夾谷卽祝其也孔丘相注相會儀也音義相息亮反注同犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉注萊人齊所滅萊夷也音義劫居業反疏注正義曰襄六年齊侯滅萊萊東萊黄縣是也地在東邊去京師大遠孔丘謂之裔夷之俘言是遠夷囚俘知是滅萊所獲此人是其遺種也齊不自使齊人而令萊人劫魯侯者若使齊人執兵則魯亦陳兵當之無由得劫公矣使此萊夷望魯人不覺出其不意得伺間執之齊侯從之孔丘以公退曰士兵之注以兵擊萊人兩君合好而裔夷之俘以兵亂之注裔遠也音義好呼報反下同裔以制反俘芳夫反非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不偪好於神為不祥注盟將告神犯之為不善音義夏戸雅反偪彼力反疏正義曰夏大也中國有禮儀之大故稱夏有服章之羙謂之華華夏一也萊是東夷其地又遠裔不謀夏言諸夏近而萊地遠夷不亂華言萊是夷而魯是華二句其㫖大同各令文相對耳於徳為愆義於人為失禮君必不然齊侯聞之遽辟之注辟去萊兵也音義愆去連反遽其遽反辟婢亦反又音避注同去起吕反將盟齊人加於載書曰齊師出竟而不以甲車三百乘從我者有如此盟注如此盟詛之禍音義竟音境乘繩證反詛側據反孔丘使兹無還揖對曰注無還魯大夫音義還音旋而不反我汶陽之田吾以共命者亦如之注須齊歸汶陽田乃當共齊命於是孔子以公退賤者終其事要盟不潔故略不書音義共音恭注同要一遙反疏注正義曰齊魯既平當兩相從意齊人旣令魯以三百乘從魯不可卽拒故須齊歸汶陽之田乃當共齊三百乘之命則得汶陽之田足當三百乘也賈逵云不書盟諱以三百乘從齊師其意以宣七年盟于黑壤而不書經傳言晉侯之立也公不朝又不使大夫聘晉人止公于㑹公不與盟不書盟諱之也緣彼有諱謂此亦諱案此㑹孔丘相反汶陽之田以共齊命孔丘意也得其三邑而以三百乘從之為相當矣於魯不為負何以諱其盟卽以三邑田少不足以當三百乘孔丘不應唯令反此而已今令反此共命必其足以相當何以諱其從齊也若三百乘從齊必是可諱孔丘為相義不能拒則孔丘為有罪矣何貴乎聖人也故杜以為於是孔子以公退賤者終其事要盟不潔故略不書釋例曰夾谷之㑹齊侯劫公孔丘以義叱之以兵威之將盟又使兹無還責侵田拒齊之享屈彊國正典儀此聖人之大司也徒以二君雖㑹而兵刃相要二國微臣共終盟事故賤而不書非所諱也舊說同於黒壤之辱為負仲尼也齊侯將享公孔丘謂梁丘據曰齊魯之故吾子何不聞焉注故舊典事旣成矣注㑹事成而又享之是勤執事也且犧象不出門嘉樂不野合注犧象酒器犧尊象尊也嘉樂鍾磬也音義犧許宜反又息倚反注同疏注正義曰周禮司尊彝云春祠夏禴祼用雞彝烏彝其朝踐用兩獻尊其再獻用兩象尊鄭衆云獻讀為犧犧尊飾以翡翠象尊以象鳯凰阮諶三禮圖犠尊畫牛以飾象尊畫象以飾當尊腹上畫牛象之形王肅以為犧尊象尊為牛象之形背上負尊魏太和中青州掘得齊大夫子尾送女器為牛形而背上負尊古器或當然也周禮大司樂云雲門之舞冬至日於地上之圜丘奏之若樂六變則天神皆降可得而禮矣咸池之舞夏日至於澤中之方丘奏之若樂八變則地祇皆出可得而禮矣圜丘方丘皆是野澤二者竝是大祭必當備設尊俎而云嘉樂不野合犧象不出門者彼是禮之大者自可依禮而行尊得出門樂得野合此言不出門不野合者謂享燕正禮當設於宫内不得違禮而行妄作於野耳非謂祭祀之大禮也諸侯相見之禮享在廟燕在寢不得行於野僖二十八年晉侯朝王于踐土王享醴命之宥襄十年宋公享晉侯于楚丘請以桑林十九年公享晉六卿于蒲圃二十七年鄭伯享趙孟于垂隴如此之類春秋多矣或特賞殊功或畏敬大國皆權時之事非正禮也此時齊魯敵國釋怨和平未有殊異之歡無假非常之事孔子知齊懐詐慮其掩襲託正禮以拒之故言不野合饗而旣具是棄禮也若其不具用秕稗也注秕穀不成者稗草之似榖者言享不具禮穢薄若秕稗音義秕音鄙字林音比又必履反稗皮賣反用秕稗君辱棄禮名惡子盍圖之夫享所以昭徳也不昭不如其己也乃不果享注孔子知齊侯懷詐故以禮距之音義盍戸臘反下同齊人來歸鄆讙龜隂之田注陽虎九年以此奔齊經文倒者次魯事疏注正義曰八年陽虎入于讙陽關以叛九年代陽關陽虎奔齊其時虎以讙去鄆與龜隂亦從之皆為齊所取至今始歸之歸田之經在趙鞅圍衛之後與傳文倒者傳次魯事進此歸田於上令與盟事相接故也晉趙鞅圍衛報夷儀也注前年齊為衛伐晉夷儀故伐衛以為報音義為衛于偽反初衛侯伐邯鄲午於寒氏注邯鄲廣平縣也午晉邯鄲大夫寒氏即五氏也前年衛人助齊伐五氏音義邯音寒鄲音丹城其西北而守之宵熸注午衆宵㪚音義城其西北而守之一本或作城其西北隅熸子潛反疏正義曰築城於其西北之地而守之也本或北下有隅昭二十五年傳陷西北隅以入又云登西北隅以望渉彼而誤耳今定本有疑誤及晉圍衛午以徒七十人門於衛西門殺人於門中曰請報寒氏之役注衛開門與午鬬渉佗曰夫子則勇矣然我往必不敢啓門亦以徒七十人旦門焉歩左右皆至而立如植注至其門下歩行門左右然後立待如立木不動以示整音義佗徒何反植市力反一音直疏正義曰渉佗以徒七十人旦徃門焉渉佗先至歩行門之左右然後其徒皆至而立如植木然日中不啓門乃退反役晉人討衛之叛故曰由渉佗成何注捘衛侯手故於是執渉佗以求成於衛衛人不許晉人遂殺渉佗成何奔燕君子曰此之謂棄禮必不鈞注言必見殺不得與人等詩曰人而無禮胡不遄死渉佗亦遄矣哉注詩鄘風遄速也音義遄市專反初叔孫成子欲立武叔公若藐固諫曰不可注藐叔孫氏之族音義藐音邈又亡小反成子立之而卒公南使賊射之不能殺注公南叔孫家臣武叔之黨音義射食亦反下及注同公南為馬正使公若為郈宰武叔旣定使郈馬正侯犯殺公若弗能其圉人曰注武叔之圉人吾以劍過朝公若必曰誰之劍也吾稱子以告必觀之吾偽固而授之末則可殺也注偽為固陋不知禮者以劍鋒末授之音義鋒芳逢反疏注正義曰少儀說以器物授人之禮云刀卻刃授頴削授拊凡有刺刃者以授人則辟刃鄭𤣥云頴鐶也拊謂把辟刃不以正鄉人也是禮授刀劍當以鋒刃自郷而授其鐶今圉人偽為固陋不知禮者以劍鋒末授之欲因推而殺之使如之疏正義曰言使為如此之計而欲殺之公若曰爾欲呉王我乎注見劍向己逆呵之鱄諸殺呉王亦用劍刺之音義向許亮反亦作嚮呵呼多反刺七亦反遂殺公若犯侯以郈叛注犯以不能副武叔之命故叛叛而以圍告廟故書圍疏注正義曰昭十三年南蒯以費叛注云不書不告廟八年陽虎叛注云叛不書略家臣此侯犯以郈叛不書者亦為不告廟略家臣也不書叛而書圍興動大衆以圍告廟故書圍也然則九年伐陽關討陽虎亦應書而不書者蓋師少不告廟故不書武叔懿子圍郈弗克秋二子及齊師復圍郈弗克叔孫謂郈工師駟赤注工師掌工匠之官音義復扶又反曰郈非唯叔孫氏之憂社稷之患也將若之何對曰臣之業在揚水卒章之四言矣注揚水詩唐風卒章四言曰我聞有命音義在揚水卒章本或作揚之水卒章疏注正義曰唐詩揚之水刺晉昭公也昭公分國以封沃沃彊盛昭公微弱國人將叛而歸沃焉其三章云揚之水白石𥻘𥻘我聞有命不敢以告人注云聞曲沃有善政命不敢以告人鄭箋云不敢以告人而去者畏昭公謂己動民心叔孫稽首注謝其受己命駟赤謂侯犯曰居齊魯之際而無事必不可矣注無所服事子盍求事於齊以臨民不然將叛侯犯從之齊使至駟赤與郈人為之宣言於郈中注詐為齊使言也音義使所吏反注同為之于偽反下注為齊同曰侯犯將以郈易于齊齊人將遷郈民注謂易其民人衆兇懼注不欲遷音義兇音凶一音凶勇反駟赤謂侯犯曰衆言異矣注不與始同子不如易於齊與其死也猶是郈也而得紓焉何必此注言以郈民易取齊人與郈無異勝於守郈爲叛人所殺音義紓音舒齊人欲以此偪魯必倍與子地注言非徒得民又將得齊地音義偪彼力反倍歩罪反且盍多舍甲於子之門以備不虞侯犯曰諾乃多舍甲焉侯犯請易於齊齊有司觀郈將至駟赤使周走呼曰齊師至矣郈人大駭介侯犯之門甲以圍侯犯駟赤將射之注偽為侯犯射郈人音義呼火故反介音界侯犯止之曰謀免我侯犯請行許之注郈人許之駟赤先如宿注宿東平無鹽縣故宿國侯犯殿每出一門郈人閉之注閉其後門音義殿丁見反及郭門止之曰子以叔孫氏之甲出有司若誅之注誅責也羣臣懼死駟赤曰叔孫氏之甲有物吾未敢以出注物識也赤還救侯犯也音義識申志反又如字犯謂駟赤曰子止而與之數注數甲以相付音義數色主反注同駟赤止而納魯人侯犯奔齊齊人乃致郈注致其名簿也為下武叔如齊傳音義簿歩古反宋公子地嬖蘧富獵注地宋景公弟辰之兄也音義嬖必計反蘧其居反獵力輒反十一分其室而以其五與之注與富獵也公子地有白馬四公嬖向魋魋欲之注向魋司馬桓魋也公取而朱其尾鬛以與之注與魋也音義鬛力輒反爾雅舍人注云馬騣也騣矛工反疏正義曰爾雅舍人注云鬛也地怒使其徒抶魋而奪之魋懼將走公閉門而泣之目盡腫母弟辰曰子分室以與獵也而獨卑魋亦有頗焉子為君禮注禮辟君也音義抶敕乙反腫章勇反頗普多反不過出竟君必止子公子地出奔陳公弗止辰為之請弗聽辰曰是我迋吾兄也注迋欺也音義竟音境辰為于偽反下猶為同迋求徃反又古况反吾以國人出君誰與處冬母弟辰曁仲佗石彄出奔陳注佗仲幾子彄褚師叚子皆宋卿衆之所望故言國人音義褚張吕反武叔聘于齊注謝致郈也經書辰奔在聘後者從告齊侯享之曰子叔孫若使郈在君之他竟寡人何知焉屬與敝邑際故敢助君憂之注以致郈徳叔孫音義屬音燭對曰非寡君之望也所以事君封疆社稷是以注以猶為也音義疆居良反敢以家𨽻勤君之執事夫不令之臣天下之所惡也君豈以為寡君賜注言義在討惡非所以賜寡君音義惡烏路反十一年傳注皆同一音如字經十有一年春宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛注蕭宋邑稱地例在前年疏注正義曰莊十二年宋萬弑閔公蕭叔大心者宋蕭邑大夫也平宋亂立桓公宋人嘉之以蕭邑封叔為附庸宣十二年楚子滅之復為宋邑故辰等今入之以叛也夏四月秋宋樂大心自曹入于蕭注入蕭從叛人叛可知故不書叛冬及鄭平注平六年侵鄭取匡之怨叔還如鄭涖盟注還叔詣曾孫音義還音旋還叔詣曾孫案世族譜叔還是叔弓曾孫此云叔詣誤也疏注正義曰世族譜云叔還叔弓曾孫也又世本云叔弓生定伯閲閲生西巷敬叔叔生成子還還為叔弓曾孫杜云叔詣曽孫傳寫誤耳傳十一年春宋公母弟辰曁仲佗石彄公子地入于蕭以叛秋樂大心從之大為宋患寵向魋故也注惡宋公寵不義以致國患冬及鄭平始叛晉也注魯自僖公以來世服於晉至今而叛故曰始經十有二年春薛伯定卒注無傳四年盟臯鼬疏注正義曰定以昭三十二年即位其年大夫盟于狄泉以未告公而公薨經無明文故不數夏葬薛襄公注無傳叔孫州仇帥師墮郈注墮毁也患其險固故毁壞其城音義墮許規反注及下傳同壞音怪又戸怪反疏注正義曰昭十三年南蒯以費叛連年伐而不克十年侯犯以郈叛一年再圍而不克良由其城險固家臣數以背叛仲由為季氏宰進計季孫防其後患令墮三都以是故毁壊其城慮其拒之故帥師而往公羊傳曰孔子行乎季孫三月不違曰家無藏甲邑無百雉之城於是帥師墮郈帥師墮費左氏不言孔子之計當是仲由自立此謀但𫝊稱費人襲魯而仲尼在焉是仲尼知其事謂墮之為是故不禁也釋例曰三都疆盛以奪三家之權陪臣執政下陵上替故仲由墮之而仲尼不禁帥師登臺僅不皆克直隨事而書以示三家之彊無義例也衛公孟彄帥師伐曹注彄孟縶子音義彄苦侯反縶陟立反疏正義曰世族譜云孟縶無子靈公以其子彄為之後也為後則為其子故云孟縶子此實公孫而不稱公孫者縶字公孟故卽以公孟為氏劉炫謂公孟生得賜族故彄卽以族告季孫斯仲孫何忌帥師墮費音義費音祕秋大雩注無𫝊書過音義雩音于冬十月癸亥公會齊侯盟于黃注無傳結叛晉十有一月丙寅朔日有食之注無傳公至自黄注無傳十有二月公圍成公至自圍成注無傳國内而書至者成彊若列國興動大衆故出入皆告廟疏注正義曰成魯邑國内用兵計不應書而出入皆書者為興動大衆皆告廟也釋例曰陪臣執命大都耦國仲由建墮三都之計而成人不從故公親圍之雖不越竟動衆興兵大其事故出入皆告於廟傳十二年夏衛公孟彄伐曹克郊注郊曹邑還滑羅殿注羅衛大夫音義滑于八反殿丁見反下同未出不退於列注未出曹竟羅不退在行列之後音義竟音境行戸郎反其御曰殿而在列其為無勇乎羅曰與其素厲寜為無勇注素空也厲猛也言伐小國當如畏者以誘致之疏正義曰羅以曹國小弱不敢來追衛師而在後為殿是空設嚴猛等與其空為嚴猛寜為無勇示弱誘之使曹人不憚以爲後圖仲由為季氏宰注仲由子路將墮三都注三都費郈成也彊盛將為國害故仲由欲毁之於是叔孫氏墮郈季氏將墮費公山不狃叔孫輒帥費人以襲魯注不狃費宰也輒不得志於叔孫氏公與三子入于季氏之宫登武子之臺費人攻之弗克入及公側注至臺下仲尼命申句須樂頎下伐之注二子魯大夫仲尼時為司寇音義句音劬頎音祈疏注正義曰史記孔子世家云定公以孔子為中都宰一年四方皆則之由中都宰為司空由司空為大司寇十年㑹于夾谷時己為司寇矣十四年孔子由大司寇攝行相事是此時仲尼為司寇費人北國人追之敗諸姑蔑二子奔齊注二子不狃叔孫輒遂墮費將墮成公歛處父謂孟孫墮成齊人必至于北門注成在魯北竟故且成孟氏之保障也無成是無孟氏也子偽不知注佯不知音義障之尚反又音章子偽不知竝如字一本偽作為佯本亦作陽音同我將不墮冬十二月公圍成弗克經十有三年春齊侯衛侯次于垂葭注二君將使師我晉次垂葭以為之援音義葭音加夏築蛇淵囿注無傳書不時也音義囿音又大蒐于比蒲注無傳夏蒐非時音義蒐所求反比音毗衛公孟彄帥師伐曹注無傳秋晉趙鞅入于晉陽以叛注書叛惡可知冬晉荀寅士吉射入于朝歌以叛注吉射士鞅子音義射食亦反又食夜反朝如字晉趙鞅歸于晉注韓魏請而復之故曰歸言韓魏之强猶列國疏注正義曰成十八年傳例曰凡去其國諸侯納之曰歸此傳稱韓魏以趙氏為請故趙鞅得稱歸韓魏非諸侯亦從諸侯納之例者韓魏之彊猶列國也釋例曰韓魏有耦國之彊陳蔡有復國之端故晉趙鞅楚公子比皆稱歸從諸侯納之例言非晉楚之所能制也薛弑其君比注無傳稱君無道傳十三年春齊侯衛侯次于垂葭實郥氏注垂葭改名郥氏高平鉅野縣西南有郥亭音義郥古閴反疏注正義曰釋例曰經書所改之名則傳以實明之許遷于夷實城父齊侯衛侯次于垂葭實郥氏之比是也則是先名郥氏後名垂葭而此云垂葭改名郥氏者杜意以為垂葭是新改之名本是郥氏也故以結之與釋例不違劉炫以杜注自違釋例以為地無新舊之異止是一地二名若如劉言案許遷于夷實城父經書夷齊侯衛侯次于垂葭實郥氏經書垂葭許遷于析實白羽以此準之經應書析不應書白羽公會齊侯于祝其實夾谷經應書祝其不應書夾谷杜以文同事異故以新舊明之劉不細尋經傳以規杜過非也使師伐晉將濟河諸大夫皆曰不可邴意兹曰可注意兹齊大夫音義邴彼命反又音丙銳師伐河内注今河内汲郡傳必數日而後及綘注傳告晉音義傳直戀反又直專反注同數所主反綘不三月不能出河則我旣濟水矣乃伐河内齊侯皆斂諸大夫之軒唯邴意兹乘軒注以其言當音義當丁良反齊侯欲與衛侯乘注共載音義乘繩證反下同與之宴而駕乘廣載甲焉使告曰晉師至矣齊侯曰比君之駕也寡人請攝注以己車攝代衛車音義廣古曠反比必利反乃介而與之乘驅之或告曰無晉師乃止注傳言齊侯輕所以不能成功音義介音界輕遣政反疏正義曰齊侯輕脱欲得與衛侯同乘先與之宴飲而先駕乘廣於門外豫於廣車之上而載甲焉飲未終而使人告曰晉師至矣齊侯謂衛侯曰比及君之駕至以來君旣未有兵車寡人請以己車攝代衛車與君同乘齊侯乃著甲而與衛侯共乘驅之而行或告無晉師乃止傳載此者言齊侯之輕所以不能成功晉趙鞅謂邯鄲午曰歸我衛貢五百家吾舍諸晉陽午許諾注十年趙鞅圍衛衛人懼貢五百家鞅置之邯鄲今欲徙置晉陽晉陽趙鞅邑音義著丁路反歸告其父兄父兄皆曰不可衛是以為邯鄲注言衛以五百家在邯鄲常為是故與邯鄲親音義為于偽反注同一音如字而寘諸晉陽絶衛之道也不如侵齊而謀之注侵齊則齊當來報欲因懼齊而徙則衛與邯鄲好不絶音義寘之豉反好呼報反乃如之而歸于晉陽注欲如是謀而後歸衞貢趙孟怒召午而囚諸晉陽注趙鞅不察其謀謂午不用命故囚之使其從者說劍而入渉賓不可注渉賓午家臣不肻說劍入欲謀叛音義從才用反說他活反注同乃使告邯鄲人曰吾私有討於午也二三子唯所欲立注午趙鞅同族别封邯鄲故使邯鄲人更立午宗親疏注正義曰世族譜趙衰趙夙之弟也衰生盾盾生朔朔生武武生成成生鞅其家為趙氏夙孫穿穿生旃旃生勝勝生午其家為耿氏計衰至鞅夙至午皆六代今俗所謂五從兄弟是同族也别封邯鄲世不絶祀故使邯鄲人更立午之宗親遂殺午趙稷渉賓以邯鄲叛注稷趙午子夏六月上軍司馬籍秦圍邯鄲邯鄲午荀寅之甥也荀寅范吉射之姻也注壻父為姻荀寅子娶吉射女疏注正義曰釋親云女子子之夫為壻壻之父為姻知荀寅子娶吉射女也而相與睦故不與圍邯鄲將作亂注作亂攻趙鞅音義不與音預又如字董安于聞之注安于趙氏臣疏正義曰史記云安于性緩常佩弦以自急者卽此是也告趙孟曰先備諸趙孟曰晉國有命始禍者死為後可也安于曰與其害於民寜我獨死注懼見攻必傷害民請以我說趙孟不可注晉國若討可殺我以自解說秋七月范氏中行氏伐趙氏之宫趙鞅奔晉陽晋人圍之范臯夷無寵於范吉射而欲為亂於范氏注臯夷范氏側室子音義行戸郎反梁嬰父嬖於知文子注文子荀躒音義知音智文子欲以為卿疏正義曰旣欲以為卿則當去范中行二氏乃始得立言此者明文子欲為亂以去之韓簡子與中行文子相惡注簡子韓起孫不信也中行文子荀寅也音義惡如字又烏路反下同魏襄子亦與范昭子相惡注襄子魏舒孫曼多也昭子士吉射音義曼音萬故五子謀注五子范臯夷梁嬰父知文子韓簡子魏襄子將逐荀寅而以梁嬰父代之逐范吉射而以范臯夷代之荀躒言於晉侯曰君命大臣始禍者死載書在河注為盟書沈之河音義躒力狄反沈如字又音鴆今三臣始禍而獨逐鞅刑已不鈞矣請皆逐之冬十一月荀躒韓不信魏曼多奉公以伐范氏中行氏弗克二子將伐公齊高彊曰三折肱知為良醫注高彊齊子尾之子昭十年奔魯遂適晉音義三如字又息暫反折之設反肱古𢎞反唯伐君為不可民弗與也我以伐君在此矣三家未睦注三家知韓魏可盡克也克之君將誰與若先伐君是使睦也弗聽遂伐公國人助公二子敗從而伐之丁未荀寅士吉射奔朝歌韓魏以趙氏為請注經所以書趙鞅歸十二月辛未趙鞅入于綘盟于公宫注傳錄晉衰亂初衛公叔文子朝而請享靈公注欲令公臨其家音義令力呈反退見史鰌而告之注史鰌史魚音義鰌音秋史鰌曰子必禍矣子富而君貪其及子乎文子曰然吾不先告子是吾罪也君旣許我矣其若之何史鰌曰無害子臣可以免注言能執臣禮富而能臣必免於難上下同之注言尊卑皆然音義難乃旦反下注同戌也驕其亡乎注戌文子之子富而不驕者鮮吾唯子之見驕而不亡者未之有也戌必與焉注與禍難音義鮮息淺反與音預注同及文子卒衛侯始惡於公叔戌以其富也公叔戌又將去夫人之黨注靈公夫人南子黨宋朝之徒音義惡烏路反去起吕反朝如字疏注正義曰傳於明年始云衛侯為夫人南子召宋朝此年言夫人之黨杜己云宋朝之徒者靈公之召宋朝又在前矣明年為宋人歌而𤼵端非明年始召之夫人愬之曰戌將為亂注為明年戌來奔傳音義愬音素經十有四年春衛公叔戌來奔衛趙陽出奔宋注陽趙黶孫書名者親富不親仁音義黶於減反疏注正義曰案世本懿子兼生昭子舉舉生趙陽兼卽黶也二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸音義佗吐何反又徒何反牂子郎反夏衛北宫結來奔注亦黨公叔成皆惡之音義惡烏路反五月於越敗呉于檇李注於越越國也使罪人詐呉亂陳故從未陳之例書敗也檇李呉郡嘉興縣南醉李城音義檇音醉依說文從木陳直覲反下同疏注正義曰於越卽越也夷言𤼵聲謂之於越彼從俗而名之也傳稱陳于檇李則是皆陳而從未陳之例云敗呉者越使罪人詐呉亂呉之陳使不得用力故從未陳之例書敗也釋例云長勺之役雖俱陳而鼓音不齊檇李之役勾踐患呉之整以死士亂呉雖皆已陳猶以從未陳例者其權詐也呉子光卒注未同盟而赴以名公會齊侯衛侯于牽注魏郡黎陽縣東北有牽城音義黎力兮反公至自會注無傳秋齊侯宋公會于洮注洮曹地音義洮吐刀反天王使石尚來歸脤注無傳石尚天子之士石氏尚名脤祭社之肉盛以蜃器以賜同姓諸侯親兄弟之國與之共福音義脤市軫反盛音成疏注正義曰杜以天子上士中士俱稱名氏石尚必是士矣但不知為是上士為是中士故注直云士耳必非下士釋例曰王之公卿皆書爵大夫書字元士中士稱名劉夏石尚是也下士稱人公會王人于洮是也杜知然者周禮典命云王之三公八命其卿六命大夫四命大夫旣四命則士三命也故鄭𤣥云王之上士三命中士再命下士一命曲禮云列國之大夫入天子之國曰某士得不以命數當天子之士故稱士也襄二十六年晉韓起聘于周自稱曰晉士起是諸侯之卿與天子之士命數同也以諸侯之卿三命再命皆書名氏大夫一命則稱人知天子上士中士稱名氏下士則稱人也成十三年傳曰國之大事在祀與戎祀有執膰戎有受脤先儒及杜緣彼傳文知是定例故解此云祭社之肉盛以蜃器以賜同姓諸侯周禮大宗伯云以膰脤之禮親兄弟之國大行人云歸脤以交諸侯之福是以祭肉賜諸侯與之共福也衛世子蒯瞶出奔宋音義蒯苦怪反瞶五怪反衛公孟彄出奔鄭注彄書名與蒯瞶黨罪之宋公之弟辰自蕭來奔注無傳稱宋公之弟例在十年大蒐于比蒲音義比音毗邾子來會公注無傳㑹公于比蒲來而不用朝禮故曰會疏注正義曰莊二十三年公及齊侯遇于穀蕭叔朝公就遇處行朝禮故曰朝此就蒐處行會禮而不用朝禮故曰會也言不用朝禮辨其與蕭叔文異城莒父及霄注無傳公叛晉助范氏故懼而城二邑也此年無冬史闕文音義父音甫疏注正義曰城邑之由傳無其說以傳稱公㑹齊侯衛侯謀救范中行氏知為叛晉之故懼而成此二邑也無冬闕文自是常事特辯此者說公羊者以此城在冬故去冬字何休云是嵗孔子由大司寇攝相事齊人饋女樂孔子去言去冬者貶之也或說無冬者坐受女樂令聖人去冬隂臣之象言去冬見無臣也杜以此為妄說且明城實在秋是非時而城故特辯冬闕傳十四年春衛侯逐公叔戌與其黨故趙陽奔宋戌來奔注終史魚之言梁嬰父惡董安于謂知文子曰不殺安于使終為政於趙氏趙氏必得晉國盍以其先𤼵難也討於趙氏文子使告於趙孟曰范中行氏雖信為亂安于則𤼵之是安于與謀亂也晉國有命始禍者死二子旣伏其罪矣敢以告注告使討安于音義惡烏路反知文音智盍戸臘反難乃旦反與音預趙孟患之安于曰我死而晉國寜趙氏定將焉用生人誰不死吾死莫矣乃縊而死音義焉於䖍反莫音暮縊一四反疏正義曰安于請趙孟先備趙孟不從其言則安于其無罪矣但安于之謀國人聞之梁嬰父忌其知謀恐趙氏彊盛假此事而罪之趙鞅叛而得還不敢違命故安于自縊死趙孟尸諸市而告於知氏曰主命戮罪人安于旣伏其罪矣敢以告知伯從趙孟盟注知伯荀躒而後趙氏定祀安于於廟注趙氏廟疏正義曰禮臣有大功配食於廟周禮司勲云凡有功名者銘書於王之大常祭於大烝司勲詔之尚書盤庚告其卿大夫云兹予大享于先王爾祖其從與享之孔安國云古者天子錄功臣配食於廟大享烝嘗也天子旣有此禮諸侯或亦有之今趙氏祀安于於趙氏之廟其意亦如此也頓子牂欲事晉背楚而絶陳好二月楚滅頓注𫝊言小不事大所以亡音義背音佩好呼報反夏衛北宫結來奔公叔戌之故也呉伐越注報五年越入呉越子句踐禦之陳于檇李注句踐越王允常子音義句古侯反陳直覲反句踐患呉之整也使死士再禽焉不動注使敢死之士往輒為呉所禽欲使呉師亂取之而呉不動使罪人三行屬劍於頸注以劍注頸音義行户郎反下同屬之欲反下同又之住反而辭曰二君有治注治軍旅臣奸旗鼓注犯軍令不敏於君之行前不敢逃刑敢歸死遂自剄也師屬之目越子因而伐之大敗之靈姑浮以戈擊闔廬注姑浮越大夫音義剄古頂反本又作刎闔户臘反闔廬傷將指取其一屨注其足大指見斬遂失屨姑浮取之音義將子匠反屨九具反還卒於陘去檇李七里注釋經所以不書滅音義陘音刑夫差使人立於庭注夫差闔廬嗣子音義夫音扶庭本又作廷茍出入必謂已曰夫差而忘越王之殺而父乎則對曰唯不敢忘三年乃報越注後三年哀元年音義唯惟癸反舊以水反晉人圍朝歌公會齊侯衛侯于脾上梁之間注脾梁間卽牽音義脾婢支反謀救范中行氏注齊魯叛晉故助范中行也析成鮒小王桃甲率狄師以襲晉注二子晉大夫范中行氏之黨音義鮒音附桃如字本又作姚戰于綘中不克而還士鮒奔周小王桃甲入于朝歌秋齊侯宋公會于洮范氏故也注謀救范氏衛侯為夫人南子召宋朝注南子宋女也朝宋公子舊通於南子在宋呼之音義偽于偽反會于洮大子蒯瞶獻盂于齊過宋野注蒯瞶衛靈公大子盂邑名也就㑹獻之故自衛行而過宋野音義盂音于野人歌之曰旣定爾婁豬盍歸吾艾豭注婁豬求子豬以喻南子艾豭喻宋朝艾老也音義婁力侯反字林作力付反豬張魚反盍戸臘反艾五蓋反老也字林作䝛音艾三毛聚居者豭音加牡豕也疏正義曰此㑹于洮還是上文㑹于洮也傳為野人之歌張本故追言衛為夫人南子召宋朝召在遠年非今始召欲說過宋野已隔此語故又本之云齊宋會于洮時大子蒯瞶獻盂于齊過宋野而被譏也服䖍以會于洮上屬為義言衛侯為夫人南子召宋朝故與宋公會于洮言為召宋朝為此㑹也然則宋朝是宋之公子衛侯欲召則召何須與宋為㑹方始召之直言㑹于洮㑹上無國名知與何國會而言宋衞乎服不達此勢愚之甚也注正義曰釋獸云豕子豬牝豝牝者謂之豝則豭是豬之牡故以喻宋朝也以婁豬為求子之豬相傳為說耳曲禮人年五十曰艾是艾為老也大子羞之謂戲陽速曰從我而朝少君注速大子家臣音義戲許宜反少詩照反本亦作小君疏正義曰少君猶小君也君為大君夫人為小君少君見我我顧乃殺之速曰諾乃朝夫人夫人見大子大子三顧速不進夫人見其色啼而走注見大子色變知其欲殺己曰蒯瞶將殺余公執其手以登臺大子奔宋盡逐其黨故公孟彄出奔鄭自鄭奔齊大子告人曰戲陽速禍余戲陽速告人曰大子則禍余大子無道使余殺其母余不許將戕於余注戕殘殺也音義戕在良反若殺夫人將以余說余是故許而弗為以紓余死諺曰民保於信吾以信義也注使義可信不必信言音義紓音舒諺音彦冬十二月晉人敗范中行氏之師於潞獲籍秦高彊注二子黨范氏者終景王言籍父無後音義潞音路父音甫又敗鄭師及范氏之師于百泉注鄭助范氏故幷敗經十有五年春王正月邾子來朝鼷䑕食郊牛牛死改卜牛注無傳不言所食處舉死重也改卜禮也音義鼷音兮處昌慮反疏正義曰爾雅云色黑而小有毒公羊以為不言其所食漫也謂所食非一處穀梁注意亦然非杜意也二月辛丑楚子滅胡以胡子豹歸夏五月辛亥郊注無傳書過壬申公薨于高寢注高寢宫名不於路寢失其所鄭罕達帥師伐宋齊侯衛侯次于渠蒢注不果救故書次音義蒢直居反邾子來奔喪注無傳諸侯奔喪非禮疏注正義曰昭三十年傳曰諸侯之喪士弔大夫送葬諸侯親自奔喪㑹葬皆非禮公羊亦云奔喪非禮也秋七月壬申姒氏卒注定公夫人八月庚辰朔日有食之注無傳九月滕子來會葬注無傳諸侯會葬非禮也丁巳葬我君定公雨不克葬戊午日下昃乃克葬辛巳葬定姒注辛巳十月三日有日無月音義昃音側疏正義曰穀梁以為葬不為雨止禮也雨不克葬喪不以制也非左氏意公羊傳云定姒何以書葬未踰年之君也有子則廟廟則書葬公羊此意以為定姒是妾哀公之母以哀公為君未踰年故書其卒葬耳左氏以定姒實是夫人但禮不備不成喪是哀母以否傳無明說注正義曰此年八月庚辰朔二日則辛巳九月不得有辛巳也更盈一周則六十二日月有一大一小十月己卯朔三日得辛巳是有日無月也冬城漆注邾庶其邑音義漆音七疏注正義曰襄二十一年邾庶其以漆閭丘來奔莊三十八年傳曰凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城此稱城漆漆本邾邑不得有先君宗廟而稱城者釋例曰若邑有先君宗廟則雖小曰都尊其所居以大之也然則都而無廟固宜稱城城漆是也而頴氏唯繫於先君之廟患漆本非魯邑因說曰漆有邾之舊廟是使魯人尊邾之廢廟與先君同非經傳意也是言漆是大都自應稱城言庶其邑者意在排舊說傳十五年春邾隱公來朝注邾子益子貢觀焉邾子執玉高其容仰公受玉卑其容俯注玉朝者之贄音義贄音至疏注正義曰曲禮云凡摯天子鬯天子尊無與敵者故執其鬯酒以對神諸侯珪是謂玉為贄也周禮典瑞云公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧以朝覲宗遇會同于王諸侯相見亦如之是朝必執玉也子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝而皆不度注不合法度心已亡矣嘉事不體何以能久注嘉事朝禮高仰驕也卑俯替也驕近亂替近疾君為主其先亡乎注為此年公薨哀七年以邾子益歸傳音義替他計反近附近之近下皆同呉之入楚也注在四年胡子盡俘楚邑之近胡者注俘取也楚旣定胡子豹又不事楚曰存亡有命事楚何為多取費焉二月楚滅胡注傳言小不事大所以亡音義費芳味反夏五月壬申公薨仲尼曰賜不幸言而中是使賜多言者也注以微知著知之難者子貢言語之士今言而中仲尼懼其易言故抑之音義中丁仲反注同㣲知著知之難竝如字又音智易以豉反鄭罕達敗宋師于老丘注罕達子齹之子老丘宋地宋公子地奔鄭鄭人為之伐宋欲取地以處之事見哀十二年音義齹才何反為于偽反見賢遍反齊侯衛侯次于蘧挐謀救宋也音義蘧音渠挐女居反又女加反秋七月壬申姒氏卒不稱夫人不赴且不祔也注赴同祔姑夫人之禮二者皆闕故不曰夫人音義祔音附疏注正義曰夫人初薨赴於同盟之國其辭當云夫人某氏薨是赴則成夫人也禮適妻祔於適祖姑妾祔於妾祖姑若得祔祖姑則亦成夫人矣此赴同祔姑皆是夫人之禮二者皆闕故不曰夫人薨二者果行一事則得稱夫人故此以不赴兼又不祔解不稱夫人也葬定公雨不克襄事禮也注襄成也雨不成事若汲汲於欲葬音義葬息羊反葬定姒不稱小君不成喪也注公未葬而夫人薨煩於喪禮不赴不祔故不稱小君臣子怠慢也反哭於寢故書葬疏正義曰傳直言不成喪也不知闕少何事但小君者夫人之號不稱小君與不稱夫人其事同矣故知不成喪者卽不赴不祔是也由不赴不祔夫人之喪禮不成故不稱小君也此定姒實是夫人臣子怠慢不成其禮故書卒不稱薨書葬而不稱小君所以罪臣子也哀十二年孟子卒傳曰不反哭故不言葬小君是由反哭於寢故書葬也冬城漆書不時告也注實以秋城冬乃告廟魯知其不時故緩告從而書之以示譏疏正義曰書城漆者書其城不以時所書在冬依其文則得時矣故傳辯之云不時告也城實非時知其不可而以時告廟春秋左傳注疏卷五十六春秋左氏傳注疏卷五十六考證傳公會齊侯于祝其實夾谷臣召南按祝其縣漢屬東海郡後漢郡國志曰祝其春秋時曰夾谷傳而不反我汶陽之田吾以共命者亦如之疏此聖人之大司也大司二字不可解疑應作聖人之大用也各本同作司未敢輙改叔孫州仇帥師隨郈疏仲由墮之而仲尼不禁臣浩按如公羊說孔子為墮三都之謀也如左氏說仲由為之也史記魯世家則直曰使仲由毁三桓城收其甲兵孔子世家則直曰孔子言於定公曰臣無蔵甲大夫無百雉之城使仲由為季氏宰將墮三都是從公羊說也傳公圍成弗克趙汸補注曰以墮三都為夫子之意者蓋後學臆度言之石林葉氏云季孫叔孫皆屈于家臣南蒯以費叛侯犯以郈叛是也墮郈墮費二氏自為計而欲去其險耳夫何有於仲由此亦尊孔氏而反卑之者也臣照按趙汸說是晉趙鞅入于晉陽以叛陸淳曰趙鞅之入晉陽拒范中行也而書曰叛者人臣不當專土也晉趙鞅歸于晉蘇轍曰鞅寅吉射之叛其罪鈞也鞅以有助而歸寅吉射以無援故終叛春秋無所與也鞅之言歸寅吉射旣出則無難也傳綘不三月不能出河則我旣濟水矣林堯叟曰晉自綘都非九十日不能出河而救河内則我已卒事濟河而歸矣臣召南按自綘至河内不必三月邴意兹不過言綘都整頓車馬必淹滯多時而後得出三月言其久也傳趙鞅入于綘盟于公宫臣召南按自此范氏中行氏出惟存知趙韓魏四家而分晉之勢成矣梁嬰父范臯夷之代荀范傳不言疑為卿而不久也大蒐于比蒲孫覺曰春秋田狩之事公行之者必書公公觀魚于裳公狩于郎是也而蒐四見于經皆不曰公政在三桓非公自出也雖公自行皆曰大蒐而不曰公焉傳越子句踐禦之臣召南按史記越世家曰允常卒子句踐立元年呉王闔廬聞允常死乃興師伐越則定十四年卽句踐之元年也傳嘉事不體林堯叟曰朝禮嘉事也而不得其體之正臣浩按體卽上文所謂左右周旋進退俯仰者也春秋左氏傳注疏卷五十六考證
