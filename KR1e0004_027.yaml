body:
  text: 春秋左傳注疏卷二十七起成公十一年盡十五年晉杜氏注唐陸德眀音義孔頴達疏經十有一年春王三月公至自晉注正月公在晉不書諱見止疏正義曰襄二十九年正月公在楚傳曰釋不朝正於廟也彼以踰年故書正月公在楚此亦踰年不書正月公在晉者為諱見止故正月不以告廟案春秋上下公之在晉諱與不諱悉皆不書此言諱見止者以此兼有諱義故詳之也宣五年傳公如齊高固使齊侯止公請叔姬焉夏公至自齊書過也注云公既見止連昏于鄰國之臣厭尊毁列纍其先君而于廟行飲至之禮故書以示過宣七年公會晉侯云云于黑壤傳稱晉侯以公不朝又不聘止公于會不與公盟八年公至自會注云義與五年書過同此亦見止還而告至杜不言義與書過同者公實不二于楚晉以無罪止公非所當諱故依法告至然則正月諱不告者正月公猶被執守臣若其告廟當云公被晉執故諱而不告公還不以為耻故告至耳晉侯使郤犫來聘己丑及郤犫盟注郤犫郤克從父兄弟音義犫尺由反疏正義曰案世本郤豹生冀芮芮生缺缺生克也又云豹生義義生步揚揚生州州即犫也如彼文則犫與克俱是豹之曾孫當為從祖昆弟服虔以為從祖昆弟杜云從父昆弟或父當是祖字誤耳夏季孫行父如晉秋叔孫僑如如齊音義僑其驕反冬十月傳十一年春王三月公至自晉晉人以公為二於楚故止公公請受盟而後使歸注前年七月公如晉弔至是乃得歸郤犫來聘且涖盟注公請受盟故使大夫來臨之音義涖音利又音類聲伯之母不聘注聲伯之母叔肸之妻不聘無媒禮音義聘本亦作娉四政反肸許乙反媒亡回反穆薑曰吾不以妾為姒注昆弟之妻相謂為姒穆薑宣公夫人宣公叔肸同母昆弟音義姒音似疏正義曰世人多疑娣姒之名皆以為兄妻呼弟妻為娣弟妻呼兄妻為姒因即惑于傳文不知何以為説今謂母婦之號隨夫尊卑娣姒之名從身長幼以其俱來夫族其夫班秩既同尊卑無以相加遂從身之少長喪服小功章曰娣姒婦報傳曰娣姒婦者弟長也以弟長解娣姒言娣是弟姒是長也公羊傳亦云娣者何弟也是其以弟解娣自然以長解姒長謂身之年長非夫之年長也釋親云長婦謂稚婦為娣婦謂長婦為姒婦止言婦之長稚不言夫之大小今穆薑謂聲伯之母為姒昭二十八年傳叔向之嫂謂叔向之妻為姒二者皆呼夫弟之妻為姒豈計夫之長幼乎釋親文云女子同出謂先生為姒後生為娣孫炎云同出謂俱嫁事一夫也事一夫者以己生先後為娣姒則知娣姒以己之年非夫之年也故賈逵鄭玄及此注皆云兄弟之妻相謂為姒言兩人相謂謂長者為姒知娣姒之名不計夫之長幼也生聲伯而出之嫁於齊管于奚生二子而寡以歸聲伯聲伯以其外弟為大夫注外弟管于奚之子為魯大夫而嫁其外妹於施孝叔注孝叔魯惠公五世孫郤犫來聘求婦於聲伯聲伯奪施氏婦以與之婦人曰鳥獸猶不失儷注儷耦也音義儷力計反疏正義曰禮謂而皮為儷皮儷兩也故為耦子將若何曰吾不能死亡注言不與郤犫婦懼能忿致禍婦人遂行生二子於郤氏郤氏亡晉人歸之施氏施氏逆諸河沈其二子注沈之於河音義沈徐直蔭反注同一音如字婦人怒曰已不能庇其伉儷而亡之注伉敵也音義己音以又音紀庇必利反又音祕伉苦浪反疏正義曰伉者相當之言故為敵也伉儷者言是相敵之匹耦又不能字人之孤而殺之注字愛也將何以終遂誓施氏注約誓不復為之婦也傳言郤犫淫縱所以亡也音義復扶又反下文注復出皆同夏季文子如晉報聘且涖盟也注郤犫文子交盟魯晉之君其意一也故但書來盟舉重略輕疏正義曰晉臣來盟於魯魯臣往盟於晉俱是相要其意一也意既同矣可書一以包二宜舉重而略輕遣使為輕君親為重故郤犫書聘又書盟文子直書如晉略言其聘而已衛冀隆難以為他卿來敵魯君春秋所諱魯卿出敵外國顯書名氏則應郤犫來盟為輕行父盟晉為重今書郤犫之盟則是舉輕略重何得云舉重略輕蘇氏釋云所言輕重者自謂魯之君臣臣盟為輕君盟為重二國各稟君命奉使而行非關敵公之義其意不同不得相難周公楚惡惠襄之逼也注惠王襄王之族音義惡烏路反且與伯與爭政注伯與周卿士音義伯與音餘本亦作輿不勝怒而出及陽樊注陽樊晉地王使劉子復之盟於鄄而入三日復出奔晉注王既復之而復出所以自絶於周為眀年周公出奔傳鄄周邑音義鄄音絹秋宣伯聘于齊以修前好注鞍以前之好音義好呼報反注同晉郤至與周爭鄇田注鄇溫别邑今河內懷縣西南有鄇人亭音義鄇音侯字林音候鄇人本又作候人如字王命劉康公單襄公訟諸晉郤至曰溫吾故也故不敢失注言溫郤氏舊邑音義單音善疏正義曰鄇是溫之别邑本從溫內分出溫屬晉鄇屬周溫是郤氏舊邑郤氏既已得溫則謂從溫而分出者亦宜從溫而屬郤氏故郤至爭之則劉子單子之言襄王勞文公而賜之溫于時鄇已分矣賜晉以溫不賜以鄇也狐氏陽氏先處溫邑于時亦不得鄇鄇本未嘗屬晉故為王官之邑劉子單子曰昔周克商使諸侯撫封注各撫有其封內之地蘇忿生以溫為司寇與檀伯達封于河注蘇忿生周武王司寇蘇公也與檀伯達俱封於河內音義檀徒丹反疏正義曰尚書立政云周公若曰太史司寇蘇公此傳與彼俱言蘇公為司寇眀是一人此言克商即為司寇是為武王司寇蘇氏即狄又不能於狄而奔衛注事在僖十年襄王勞文公而賜之溫注在僖二十五年音義勞力報反狐氏陽氏先處之注狐溱陽處父先食溫地音義溱側巾反而後及子若治其故則王官之邑也子安得之晉侯使郤至勿敢爭注傳言郤至貪所以亡宋華元善於令尹子重又善於欒武子聞楚人既許晉糴茷成而使歸復命矣注在往年音義華户化反冬華元如楚遂如晉合晉楚之成注為眀年盟宋西門外張本秦晉為成將會于令狐晉侯先至焉秦伯不肯涉河次於王城使史顆盟晉侯于河東注史顆秦大夫音義令力丁反顆苦果反晉郤犫盟秦伯于河西注就盟王城范文子曰是盟也何益齊盟所以質信也注齊一心質成也會所信之始也始之不從其可質乎秦伯歸而背晉成注為十三年伐秦傳音義背音佩卷內背同經十有二年春周公出奔晉夏公會晉侯衛侯于瑣澤注瑣澤地闕音義瑣素果反秋晉人敗狄于交剛注交剛地闕冬十月傳十二年春王使以周公之難來告注周公奔在前年音義難乃旦反書曰周公出奔晉凡自周無出周公自出故也注天子無外故奔者不言出周公為王所復而自絶于周故書出以非之疏正義曰凡言出者謂出其封內天子以天下為家本無出封之理以無外之故雖有出奔之人史䇿皆不言出昭二十六年尹氏召伯毛伯以王子朝奔楚實出而不言出是其事也襄王蔽于匹夫之孝不顧天下之重故書云出居于鄭此周公王既復之而又自出故書云出奔是不應言出而言出皆所以罪責之也鄭玄答孫皓曰几自周無出者周無放臣之法罪大者刑之小則宥之以為實無出法案書流宥五刑則宥者流之非不出也舜放四罪投之四裔安得不出畿乎若如周禮無流放之文即云周無放臣之法禮三諌不從待放于郊然則周臣三諌不從終是不蒙王放欲令諌者何所措身左傳發凡自是書䇿之例因即以為周制謂其實無出者執文害意為蔽何甚宋華元克合晉楚之成注終前年事夏五月晉士燮會楚公子罷許偃注二子楚大夫音義罷音皮癸亥盟於宋西門之外曰凡晉楚無相加戎好惡同之同恤災危備救凶患若有害楚則晉伐之在晉楚亦如之交贄往來道路無壅注贄幣也音義好惡並如字又上呼報反下烏路反災音災贄本又作摯之二反壅於勇反疏正義曰傳言交贄往來謂聘使來去也聘禮賓執圭以通命執幣以致享故知贄是幣謂聘享之幣也謀其不協而討不庭注討背叛不來在王庭者有渝此盟眀神殛之注殛誅也音義渝羊朱反殛本又作極紀力反注同俾隊其師無克胙國注俾使也隊失也音義俾本亦作卑必爾反隊直類反注同胙才故反鄭伯如晉聽成注聽猶受也晉楚既成鄭往受命會于瑣澤成故也注晉既與楚成合諸侯以申成好音義好呼報反盡年皆同狄人間宋之盟以侵晉而不設備音義間宋間厠之間秋晉人敗狄于交剛晉郤至如楚聘且涖盟楚子享之子反相為地室而縣焉注縣鐘鼓也音義相息亮反縣音玄注同郤至將登注登堂金奏作於下注擊鐘而奏樂疏正義曰作樂謂之奏奏樂先擊鐘故周禮大司樂樂師每事皆云令奏鐘鼓以鐘先擊故先言鐘也鐘以金為之謂之金奏故鐘師掌金奏鄭玄云金奏擊金以為奏樂之節金謂鐘及鎛也鄭玄燕禮注云以鐘鎛播之鼓磬應之所謂金奏也是金為奏節之初故傳言金奏作于下作樂先擊鐘故注云擊鐘而奏樂也禮記仲尼燕居云兩君相見入門而縣興升堂而樂闋郊特牲曰賓入大門而奏肆夏示易以敬也鄭玄云賓朝聘者朝聘連言之則兼享朝賓聘客皆入門即奏樂矣其實朝賓入門而奏樂聘客則至庭乃奏樂此郤至將登堂始奏樂者縣當在庭而楚之為地室而縣待客將登乃奏皆所以見異故欲以驚賔矣燕享聘客皆當入門奏肆夏若燕己之羣臣則有王事之勞者乃得以樂納賔其常燕惟有升歌間合而已無納賓之樂也故燕禮記云若以樂納賓則賓及庭奏肆夏鄭玄云卿大夫有王事之勞者則奏此樂焉是燕己之臣無王事之勞者不以樂納賓也驚而走出子反曰日云莫矣寡君須矣吾子其入也賓曰君不忘先君之好施及下臣貺之以大禮重之以備樂注貺賜也音義莫音暮本亦作暮施以豉反重直用反疏正義曰卒聞地下鐘聲出其不意故驚而走出其出實為驚怖因即飾辭辭樂言已不敢當大禮匿其驚走之意如天之福兩君相見何以代此下臣不敢注言此兩君相見之禮疏正義曰仲尼燕居云兩君相見入門而縣興是賓入門作樂為兩君相見之禮也而燕禮雖兼聘問之賓以燕己臣為主而云若以樂納賓燕己之臣尚有以樂納賓之法則燕享聘客必以樂納賓矣故鄭玄郊特牲注云賓朝聘者朝聘並言則君臣同樂郤至不敢同君故以之為辭耳非謂禮不得也子反曰如天之福兩君相見無亦唯是一矢以相加遺焉用樂注言兩君戰乃相見無用此樂音義遺唯季反焉於虔反疏正義曰子反意言晉楚並是大國不肯相朝唯戰乃相見其相見之時唯當用是一矢以相加陵相遺與耳無為用此樂也寡君須矣吾子其入也賓曰注傳諸交讓得賓主辭者多曰賓主以眀之疏正義曰知傳諸交讓得賓主辭多曰賓主者此傳每稱郤至為賓文十二年傳稱西乞術為賓并稱主人曰之類是也若讓之以一矢禍之大者其何福之為世之治也諸侯間於天子之事則相朝也注王事間缺則修私好音義治直吏反下注治世同間音間注同於是乎有享宴之禮享以訓共儉注享有體薦設几而不倚爵盈而不飲肴乾而不食所以訓共儉音義享許丈反舊又許亮反本亦作饗宴於見反徐於顯反倚於綺反疏正義曰享有體薦宣十六年傳文也設几而不倚爵盈而不飲昭五年傳文也禮聘義記曰聘之禮至大禮也酒清人渴而不敢飲也肉乾人飢而不敢食也彼言聘禮即是享聘賓之禮此事皆所以教訓恭儉也宴以示慈惠注宴則折爼相與共食音義折之設反疏正義曰宣十六年傳云宴有折爼宴則節折其肉升之于爼相與共啖食之所以表示慈惠也共儉以行禮而慈惠以布政政以禮成民是以息百官承事朝而不夕注不夕言無事音義朝直遙反朝日朝徐音朝旦之朝疏正義曰旦見君謂之朝莫見君謂之夕哀十四年傳稱子我夕晉語稱叔向夕皆謂夕見君也人息事少故百官承奉職事皆朝朝而莫不夕不夕言無事也此公侯之所以扞城其民也注扞蔽也言享宴結好鄰國所以蔽扞其民音義扞户旦反疏正義曰扞者扞禦寇難故為蔽也言燕享結好與鄰國通和甲兵不興人得安息所以蔽扞其民若如城然故云所以扞城其民也故詩曰赳赳武夫公侯干城注詩周南之風赳赳武貌干扞也言公侯之與武夫止于扞難而已音義赳居黝反一音居醜反難乃旦反干户旦反本亦作扞又如字下同疏正義曰詩周南兔罝之篇言兔罝之人亦是賢者其人乃是赳赳然雄武之夫與公侯共扞城其民也引詩之意言世治無事公侯之與武夫設共儉慈惠之禮與人扞難而已不侵伐他國也干扞釋言文及其亂也諸侯貪冒侵欲不忌爭尋常以盡其民注八尺曰尋倍尋曰常言爭尺丈之地以相攻伐音義冒莫報反又亡北反疏正義曰周禮考工記云人長八尺殳長尋有四尺崇于人四尺車戟常崇于殳四尺是八尺曰尋倍尋曰常喻其少故言爭尺丈之地以相攻伐盡殺其民孟子曰爭城以戰殺人盈城爭地以戰殺人盈野是謂盡殺其民也略其武夫以為己腹心股肱爪牙注略取也言世亂則公侯制禦武夫以從己志使侵害鄰國為搏噬之用無己音義搏音博噬市制反疏正義曰武夫有武能為人之扞蔽世治則公侯同于武夫同其腹心相與扞己民而已不侵犯他人也世亂則使武夫同于公侯其公侯欲得拓竟寬土則制禦武夫以從己志使武夫為己腹心股肱爪牙令之侵害鄰國搏擊也噬齧也犬能搏噬譬之于犬為搏噬之用無已時也故詩曰赳赳武夫公侯腹心注舉詩之正以駮亂義詩言治世則武夫能合德公侯外為扞城內制其腹心音義駮邦角反疏正義曰此亦兔罝之萹美賢人之事而引之以證世亂故解之此舉詩之正以駮世亂之義詩言治世則武夫能合德公侯外則扞城其民內則制其腹心也以其人心則本貪縱之則害物矣美公侯能以武夫制己腹心自守扞難而已不害人也天下有道則公侯能為民干城而制其腹心亂則反之注略其武夫以為己腹心爪牙音義能為于偽反又如字疏正義曰天下有道之時則公侯能為扞城禦難而使武夫制其己之腹心不侵犯他國也亂則反之不復扞蔽己民乃以武夫從己腹心將武夫為股肱爪牙以侵害他國是反治世也晉楚世為仇敵常有相害之心子反言一矢相加仍懷戰鬬之意故郤至言世治則自守世亂則相侵答上一矢之言冀得久為和好故説此也今吾子之言亂之道也不可以為法然吾子主也至敢不從遂入卒事歸以語范文子文子曰無禮必食言吾死無日矣夫注言晉楚不能久和必復相伐為十六年鄢陵戰張本音義語魚據反夫音扶本亦無此字復扶又反鄢謁晚反漢書音義一建反疏正義曰以一矢為辭是無禮也食言是其將背盟也背盟必相伐故為死亡無日矣冬楚公子罷如晉聘且涖盟注報郤至十二月晉侯及楚公子罷盟于赤棘晉地經十有三年春晉侯使郤錡來乞師注將伐秦也侯伯當召兵而乞師謙辭音義錡魚綺反疏正義曰晉雖是侯伯恐魯不與若言召兵或容辭説言乞則不得不與釋例曰乞師者深求過理之辭執謙以逼成其計是解乞為謙意三月公如京師注伐秦道過京師因朝王音義過古禾反又古卧反疏正義曰公本為伐秦道過京師因往朝王不稱朝而言公如京師者以眀公朝于王所王不在京師故指言王所據王言之不得不稱朝此則王在京師京師是國之總號不斥王身不可稱朝故依尋常朝聘鄰國之文稱如而已劉炫云魯朝聘皆言如不果彼國必成其禮或在道而還如者書其始發言往而已言公朝王所者發國不為朝王至彼遇王朝之朝訖乃書故稱朝也此過京師亦直稱朝言如者發雖主為伐秦即有朝王之意書其初發故言如也夏五月公自京師遂會晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦曹伯盧卒于師注五同盟音義盧本亦作廬力吳反疏正義曰盧以宣十五年即位十七年盟于斷道成二年于袁婁又于蜀五年于蟲牢七年于馬陵九年于蒲凡六同盟不數宣公斷道為五秋七月公至自伐秦注無傳冬葬曹宣公傳十三年春晉侯使郤錡來乞師將事不敬注將事致君命孟獻子曰郤氏其亡乎禮身之幹也敬身之基也郤子無基疏正義曰幹以樹木為喻基以牆屋為喻樹木以本根為幹有幹故枝葉茂焉牆屋以下土為基有基乃牆屋成焉人身以禮敬為本必有禮敬身乃得存郤子無基則亦無幹但言有所拘不復得言幹耳且先君之嗣卿也受命以求師將社稷是衛而惰棄君命也不亡何為注郤錡郤克子故曰嗣卿為十七年晉殺郤錡傳音義惰徒卧反三月公如京師宣伯欲賜注欲王賜也請先使王以行人之禮禮焉注不加厚音義使所吏反孟獻子從王以為介而重賄之注介輔相威儀者獻子相公以禮故王重賄之音義從才用反介音界相息亮反下同疏正義曰周語簡王八年魯成公來朝使叔孫僑如先聘且告見王孫説與之語説言于王曰魯叔孫之來有異焉其幣薄而言諂殆請之也若請之必欲賜也且其狀方上而鋭下宜觸冒人主其勿賜若貪陵之人來而盈願是賞不善也且財不給王使私問諸魯魯人云請之也王遂不賜禮如行人孔眺云行人使人也以使人之禮禮之不從聘者之賜禮也又曰魯侯至仲孫蔑為介王孫説與之語説讓説以語王王厚賄之公及諸侯朝王遂從劉康公成肅公會晉侯伐秦注劉康公王季子劉成二公不書兵不加秦成子受脤于社不敬注脤宜社之肉也盛以脤器故曰脤宜出兵祭社之名音義脤市軫反盛音成疏正義曰宜者祭社之名脤是盛肉之器受脤于社受祭社之胙肉也周禮掌蜃祭祀共蜃器之蜃鄭玄云飾祭器之屬也春秋定十四年秋天王使石尚來歸脤脤之器以蜃飾因名焉鄭衆云脤可以白器令色白是盛以脤器故曰脤也既言宜社又自解宜名釋天云起大事動大衆必先有事乎社而後出謂之宜孫炎曰冇事祭也宜求見祐也是宜者出兵祭社之名劉子曰吾聞之民受天地之中以生所謂命也是以有動作禮義威儀之則以定命也能者飬之以福注飬威儀以致福不能者敗以取禍是故君子勤禮小人盡力勤禮莫如致敬盡力莫如敦篤敬在飬神篤在守業國之大事在祀與戎祀有執膰注膰祭肉音義盡津忍反下同膰音煩疏正義曰詩詠祭祀之禮云為俎孔碩或膰或炙又曰旨酒欣欣膰炙芬芬毛傳云傳火曰燔祭肉有燔而薦者因謂祭肉為膰也戎有受脤神之大節也注交神之大節今成子惰棄其命矣注惰則失中和之氣其不反乎注為成肅公卒于瑕張本疏正義曰天地之中謂中和之氣也民者人也言人受此天地中和之氣以得生育所謂命也命者教命之意若有所稟受之辭故孝經説云命者人之所稟受度是也命雖受之天地短長有本順理則夀考逆理則夭折是以有動作禮義威儀之法則以定此命言有法則命之長短得定無法則夭折無恆也故人有能者飬其威儀禮法以往適于福或本分之外更得延長也不能者敗其威儀禮法而身自取禍或本分之內仍有減割也為其求福畏禍之故君子勤禮以臨下小人盡力以事上勤禮莫如臨事致敬盡力莫如用心敦篤敬之所施在于飬神朝廷百官事神必敬篤在守業草野四民勿使失業也國之大事在祀與戎宗廟之祀則有執膰兵戎之祭則有受脤此是交神之大節也今成子受脤而惰是句棄其命矣死必在近此行其不得反乎爾之往也飬之以福謂將身向福也敗以取禍謂禍及身也福則人之所欲作往就之辭也禍則人之所惡作自來之語也敬則所施有處故言致敬也厚則唯在己身無所可致故重言敦篤也執膰受脤俱是于祭未度而執之互相見也劉炫云命者冥也言其生育之性得之于冥兆也夏四月戊午晉侯使呂相絶秦曰注呂相魏錡子蓋口宣己命音義相息亮反注同昔逮我獻公及穆公注晉獻公秦穆公音義逮音代一音大計反相好戮力同心疏正義曰孔安國以戮力為陳力以論語有陳力就列故也戮力猶言勉力努力耳申之以盟誓重之以昏姻注穆公夫人獻公之女音義好呼報反下同戮力相承音六嵇康力幽反呂靜字韻與飂同字林音遼天禍晉國文公如齊惠公如秦注辟驪姫也不言狄梁舉所恃大國音義辟音避驪力知反無祿獻公即世穆公不忘舊德俾我惠公用能奉祀於晉注僖十年秦納惠公音義俾本或作卑必爾反下及注同又不能成大勳而為韓之師注僖十五年秦伐晉獲惠公疏正義曰言秦既納惠公又不能遂成大功而復伐晉為此韓之師也下云亦悔于厥心謂秦悔伐晉也亦悔于厥心用集我文公注集成也是穆之成也注成功于晉文公躬擐甲胄跋履山川注草行為跋音義擐音患胄直又反跋蒲末反踰越險阻征東之諸侯虞夏商周之􅏷而朝諸秦則亦既報舊德矣鄭人怒君之疆埸我文公帥諸侯及秦圍鄭注晉自以鄭二于楚故圍之鄭非侵秦也晉以此誣秦事在僖三十年音義疆居良反埸音亦秦大夫不詢於我寡君擅及鄭盟注詢謀也盟者秦伯謙言大夫音義詢思巡反擅市戰反諸侯疾之將致命於秦注致死命而討秦時無諸侯蓋諸侯遙致此意疏正義曰劉炫以為誣秦今知不然者凡誣秦者謂加之罪傳辭少略者可得稱誣今傳云諸侯疾之將致命于秦文公恐懼綏靜諸侯又云我有大造于西傳文既詳眀諸侯實有此意若無諸侯何得稱為大造且秦師襲鄭鄭亦疾秦此則諸侯之義也劉以為實無諸侯而規杜過非也文公恐懼綏靜諸侯秦師克還無害則是我有大造於西也注造成也言晉有成功于秦音義恐曲勇反無祿文公即世穆為不弔注不見弔傷疏正義曰曲禮云知生者弔知死者傷知生而不知死弔而不傷知死而不知生傷而不弔鄭玄云人恩各施于所知弔傷皆謂致命辭也雜記諸侯使人弔辭曰寡君聞君之喪寡君使某如何不淑此施于生者傷辭未聞也説者有衍弔辭云皇天降災子遭罹之如何不淑此施于死者蓋傷辭畢退皆哭是弔傷之事蔑死我君寡我襄公注寡弱也音義死我君本或以我字在死上疏正義曰輕蔑文公以為死無知矣謂襄公寡弱而陵忽之迭我殽地姦絶我好伐我保城殄滅我費滑注伐保城誣之費滑滑國都于費今緱氏縣音義迭直結反徐音逸殽户交反姦音干費扶味反滑于八反緱古侯反疏正義曰姦亂斷絶不復與我和好也注正義曰伐我涑川俘我王官傳皆無文今謂此為誣者于時輕行襲鄭不得在道用兵故知此伐保城是誣之也春秋之時更無費國秦惟滅滑不滅費知費即滑也國都于費國邑並舉以圎文耳散離我兄弟撓亂我同盟注滑晉同姓音義撓乃卯反徐許高反傾覆我國家我襄公未忘君之舊勳注納文公之勳音義覆孚服反下同而懼社稷之隕是以有殽之師注在僖三十三年音義隕于敏反下同猶願赦罪於穆公注晉欲求解于秦穆公弗聽而即楚謀我天誘其𠂻成王隕命注秦使鬭克歸楚求成事見文十四年文元年楚弒成王音義見賢遍反疏正義曰文十四年傳云初鬬克囚于秦秦有殽之敗使歸求成僖三十三年秦敗于殽文元年楚弒成王故謀不成也穆公是以不克逞志于我注逞快也音義逞敕景反穆襄即世康靈即位注文六年晉襄秦穆皆卒康公我之自出注晉外甥又欲闕剪我公室傾覆我社稷帥我蝥賊以來蕩搖我邊疆注蝥賊食禾稼蟲名謂秦納公子雍音義闕其月反徐如字蝥賊莫侯反爾雅蟲食苖為蝥食節為賊疏正義曰釋蟲云食根蝥食節賊是食禾稼之蟲也納雍害晉若蟲食禾然彼晉自召雍非秦罪也我是以有令狐之役注在文七年康猶不悛入我河曲注悛改也音義悛七全反伐我涑川俘我王官注涑水出河東聞喜縣西南至蒲坂縣入河音義涑徐息録反又音速字林同俘芳夫反翦我羈馬我是以有河曲之戰注在文十二年東道之不通則是康公絶我好也注言康公自絶故不復東通晉音義復扶又反及君之嗣也注君秦桓公我君景公引領西望曰庶撫我乎注望秦撫恤晉君亦不惠稱盟注不肯稱晉望而共盟音義稱尺證反注同利我有狄難注謂晉滅潞氏時音義難乃旦反入我河縣焚我箕郜芟夷我農功注夷傷也音義箕音基一音其郜古報反芟所銜反夷本亦作痍音夷虔劉我邊陲注虔劉皆殺也疏正義曰劉殺釋詁文方言云虔殺也重言殺者亦圎文耳我是以有輔氏之聚注聚衆也在宣十五年音義聚才喻反注同疏正義曰謂聚衆以拒秦也以上有殽之師令狐之役河曲之戰不用重文故變文言聚古人為文亦有辟耳君亦悔禍之延注延長也而欲徼福于先君獻穆注晉獻秦穆音義徼古堯反使伯車來命我景公曰注伯車秦桓公子吾與女同好棄惡復修舊德以追念前勳言誓未就景公即世我寡君是以有令狐之會注令狐會在十一年申厲公之命宜言寡人稱君誤也音義女音汝下文皆同好呼報反一音如字復音服又扶又反寡君讀者亦作寡人疏正義曰劉炫以為臣之出使自稱己君皆曰寡君今呂相雖奉君兼有己語稱寡君正是其理杜何知宜為寡人稱君為誤今刪定知劉説非者以吕相奉厲公之命而往絶秦則皆是厲公之言不得兼有己語案隱十一年鄭伯告許大夫云假手于我寡人今吕相稱厲公之命還與自稱無異亦當云我寡人故知稱君為誤劉以稱寡君為是以規杜過非也君又不祥注祥善也背棄盟誓白狄及君同州注及與也疏正義曰周禮職方氏正西曰雍州其川涇汭其浸渭洛皆秦地也正北曰並州其澤藪曰昭餘祁其川呼池嘔夷皆晉地也是秦屬雍而晉屬並白狄蓋狄之西偏屬雍州也君之仇讎而我之昏姻也注季隗牆咎如赤狄之女也白狄伐而獲之納諸文公音義隗五罪反牆在良反咎音羔疏正義曰三年晉衛伐牆咎如傳曰討赤狄之餘焉知咎如是赤狄也文公所奔之狄不言赤白以其伐赤不應赤自相伐知白狄伐之也其女雖是赤狄之種而由白狄以納文公得以白狄為昏姻也且此辭多誣欲親狄以曲秦故引狄為昏姻耳晉人自數伐狄寧復顧昏姻也杜以傳有季隗之事引之以證昏姻未必晉于白狄處無昏姻君來賜命曰吾與女伐狄寡君不敢顧昏姻畏君之威而受命於吏君有二心於狄曰晉將伐女狄應且憎是用告我注言狄雖應答秦而心實憎秦無信音義應應對之應楚人惡君之二三其德也亦來告我曰秦背令狐之盟而來求盟于我昭告昊天上帝秦三公楚三王注三公穆康共三王成穆莊音義惡烏路反下同昊户老反共音恭疏正義曰禮諸侯不得祭天其盟不主天神鄭玄覲禮注云巡守之盟其神主日諸侯之盟其神主山川襄十一年亳城北之盟其載書云司慎司盟名山名川注云二司天神唯告天之别神不告昊天上帝此秦楚為盟告天帝者春秋之時不能如禮且此辭多誣未必是實晉與諸國結盟皆不告昊天上帝何由秦楚獨敢告之蓋欲示楚人恨秦之深言其所告處重耳曰余雖與晉出入注出入猶往來余唯利是視不穀惡其無成德是用宣之以懲不一諸侯備聞此言斯是用痛心疾首昵就寡人注疾亦痛也昵親也音義懲直升反昵女乙反疏正義曰楚道秦人用心不一其盟不足與固宣示諸侯以懲創不一之人寡人帥以聽命唯好是求君若惠顧諸侯矜哀寡人而賜之盟則寡人之願也其承寧諸侯以退注承君之意以寧靜諸侯豈敢徼亂注徼要也音義要一遙反君若不施大惠寡人不佞其不能以諸侯退矣敢盡布之執事俾執事實圖利之注俾使也疏正義曰服虔云佞才也不才者自謙之辭也論語云焉用佞禦人以口給屢憎于人則佞非善事而以不佞為謙者佞是口才捷利之名本非善惡之稱但為佞有善有惡耳為善敏捷是善佞為惡敏捷是惡佞但君子欲訥于言而敏于行言之雖多情或不信故云焉用佞耳秦桓公既與晉厲公為令狐之盟而又召狄與楚欲道以伐晉諸侯是以睦於晉注晉辭多誣秦故傳據此三事以正秦罪音義道音導晉欒書將中軍荀庚佐之注庚代荀首音義將子匠反凡將某軍者放此以意求之士燮將上軍注代荀庚郤錡佐之注代士燮韓厥將下軍注代郤錡荀罃佐之注代趙同趙旃將新軍注代韓厥音義旃之然反郤至佐之注代趙括郤毅御戎欒針為右注郤毅郤至弟欒針欒書子音義針其廉反孟獻子曰晉帥乘和師必有大功注帥軍帥乘車士音義帥所類反乘繩證反注同五月丁亥晉師以諸侯之師及秦師戰於麻隧秦師敗績獲秦成差及不更女父注不更秦爵戰敗績不書以為晉直秦曲則韓役書戰時公在師復不須告克獲有功亦無所諱蓋經文闕漏傳文獨存音義隧音遂差初佳反徐初宜反更音庚女音汝復扶又反疏正義曰秦之官爵有此不更之名知女父是人之名字不更是官爵之號漢書稱商君為法于秦戰斬一首者賜爵一級其爵名一為公士二上造三簪裊四不更五大夫六公大夫七官大夫八公乘九五大夫十左庶長十一右庶長十二左更十三中更十四右更十五少上造十六大上造十七駟車庶長十八大車庶長十九關內侯二十徹侯商君者啇鞅也秦孝公之相封于商號為商君案傳此有不更女父襄十一年有庶長鮑庶長武春秋之世已有此名蓋後世以漸增之商君定為二十非是商君盡新作也其名之義難得而知耳傳言戰敗而經不書杜以意測之不知其故欲以為秦曲晉直不以曲者敵直故不書戰則僖十五年韓之戰秦直晉曲書戰于韓也欲以為不告故不書當時公親在師復不須告也欲以為無功諱負則克獲有功亦無所諱也再三揆度不識所以故云蓋經文闕漏傳文獨存也經文依史官䇿書䇿書所無故經文遂闕也傳文採于簡牘簡牘先有故傳文獨存也曹宣公卒于師師遂濟涇及侯麗而還注涇水出安定東南徑扶風京兆髙陸縣入渭也音義徑音經麗力馳反疏正義曰釋例曰涇水出安定朝那縣西東南經新平扶風至京兆髙陸縣入渭迓晉侯于新楚注迓迎也既戰晉侯止新楚故師還過迎之麻隧侯麗新楚皆秦地音義迓本又作訝五嫁反疏正義曰經書公會晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦是伐時諸侯親行也傳云晉師以諸侯之師及秦師戰則知諸侯不親行也蓋皆别次以待之新楚當是晉侯次之處也以傳不言其次晉侯或聞戰勝而移次故云止新楚也成肅公卒於瑕注終劉子之言瑕晉地六月丁卯夜鄭公子班自訾求入于大宮不能殺子印子羽注訾鄭地大宮鄭祖廟十年班出奔許今欲還為亂子印子羽皆穆公子音義班本亦作般同訾子斯反大音泰下同印一刃反反軍于市己巳子駟帥國人盟于大宮注子駟穆公子遂從而盡焚之注焚燒也殺子如子駹孫叔孫知注子如公子班子駹班弟孫叔子如子孫知子駹子音義駹武邦反疏正義曰子如即是子班據傳可知以外無文見其同時被殺必是近親相傳為此説耳曹人使公子負芻守使公子欣時逆曹伯之喪注二子皆曹宣公庶子音義芻初俱反守手又反欣時如字徐云或作欵亦音欣案公羊傳作喜如冝音欣秋負芻殺其大子而自立也注宣公大子諸侯乃請討之晉人以其役之勞請俟他年冬葬曹宣公既葬子臧將亡注子臧公子欣時國人皆將從之注不義負芻故成公乃懼注成公負芻告罪且請焉注請留子臧乃反而致其邑注還邑於成公為十五年執曹伯傳經十有四年春王正月莒子朱卒注無傳九年盟于蒲夏衛孫林父自晉歸于衛注晉納之故曰歸秋叔孫僑如如齊逆女注成公逆夫人最為得禮而經無納幣者文闕絶也疏正義曰釋例曰成公逆女及夫人至最為得禮故詳其文丘明謂之微而顯婉而成章也然則杜以傳文詳知其最得禮也釋例又云成公娶夫人而不納幣此經文闕也貴聘而賤逆失禮之微者傳猶詳之言其不終若實不納幣非所略也是言闕之意也闕絶者闕而文斷絶蓋疑仲尼修定後其文始闕若修時已闕傳應言其故也鄭公子喜帥師伐許九月僑如以夫人婦薑氏至自齊冬十月庚寅衛侯臧卒注五同盟疏正義曰臧父逆以二年八月卒而臧代立其年十一月衛大夫與公盟于蜀三年孫良夫來盟五年于蟲牢七年于馬陵九年于蒲皆魯衛俱在是五同盟也秦伯卒注無傳二年大夫盟于蜀而不赴以名例在隱七年傳十四年春衛侯如晉晉侯強見孫林父焉注林父以七年奔晉強見欲歸之音義強其丈反注同見賢遍反注強見下而見之同定公不可夏衛侯既歸晉侯使郤犫送孫林父而見之衛侯欲辭定薑曰不可注定薑定公夫人是先君宗卿之嗣也注同姓之卿疏正義曰世本孫氏出于衛武公至林父八世是同姓也大國又以為請不許將亡雖惡之不猶愈於亡乎君其忍之注違大國必見伐故亡音義為如字或于偽反惡烏路反安民而宥宗卿不亦可乎衛侯見而復之注復林父位音義宥音又衛侯饗苦成叔注成叔郤犫寧惠子相注相佐禮惠子寧殖音義相息亮反注同苦成叔傲寧子曰苦成家其亡乎古之為享食也以觀威儀省禍福也故詩曰兕觥其觩旨酒思柔注詩小雅言君子好禮飲酒皆思柔德雖設兕觥觩然不用以兕角為觥所以罰不敬觩陳設之貌音義傲五報反本又作敖音同下同食音嗣兕徐辭姊反觥古橫反觩徐音蚪又彪巨反一音巨秋反好呼報反疏正義曰詩小雅桑扈之章言設爵不用之意君子好禮與于燕者皆思柔順之德無過可罰故雖設觥爵不用之也兕是獸名觥是爵稱知兕觥以兕角為觥也周禮小胥職云觥其不敬者是所以罰不敬也異義韓詩説觥五升所以罰不敬也觥廓也著明之貌君子有過廓然明著詩毛傳説觥大七升許慎云觥罰有過一飲七升為遇多當謂五升是也詩良耜云有觩其角則觩是角貌此詩之意指其角貌言陳設不用故曰陳設之貌彼交匪傲萬福來求注彼之交于事而不惰傲乃萬福之所求疏正義曰兕觥罰酒之爵言古之王者與羣臣燕飲無失禮者用兕觥之爵其觩然空陳設之無所可罰在席飲美酒者皆能思柔順中和故不用也彼飲燕君子與人交接非有傲慢之心故萬種福祿求來歸之今夫子傲取禍之道也注為十七年郤氏亡秋宣伯如齊逆女稱族尊君命也疏正義曰宣元年已發尊君命尊夫人之例今復發者彼以喪娶嫌非正禮且公子非族故重明之何休膏肓難左氏叔孫僑如舍族為尊夫人案襄二十七年豹及諸侯之大夫盟復何所尊而亦舍族春秋之例一事再見者亦以省文耳左氏為短鄭針云左氏以豹違命故貶之而去族今僑如無罪而亦去族故以為尊夫人也春秋有事異文同則此類也八月鄭子罕伐許敗焉注為許所敗音義敗必邁反下同戊戌鄭伯復伐許庚子入其郛注郛郭也音義復扶又反許人平以叔申之封注四年鄭公孫申疆許田許人敗之不得定其封疆今許以是所封田求和于鄭音義疆居良反下同九月僑如以夫人婦薑氏至自齊舍族尊夫人也注舍族謂不稱叔孫音義舍音捨注同故君子曰春秋之稱微而顯注辭微而義顯音義稱尺證反志而晦注志記也晦亦微也謂約言以記事事敘而文微音義晦呼內反婉而成章注婉曲也謂曲屈其辭有所辟諱以示大順而成篇章音義婉怨晚反盡而不汙注謂直言其事盡其事實無所汙曲音義汙憂于反注同懲惡而勸善注善名必書惡名不滅所以為懲勸音義懲直升反非聖人誰能修之注修史䇿成此五者衛侯有疾使孔成子寧惠子立敬姒之子衎以為大子注成子孔達之孫敬姒定公妾衎獻公音義衎徐苦旦反冬十月衛定公卒夫人薑氏既哭而息見大子之不哀也不內酌飲歎曰是夫也將不唯衛國之敗其必始於未亡人注定薑言獻公行無禮必從己始下言暴妾使余是也音義內如字徐音納酌市略反又章略反烏呼天禍衛國也夫吾不獲鱄也使主社稷注鱄衎之母弟音義夫音扶鱄徐市戀反一音專大夫聞之無不聳懼孫文子自是不敢舍其重器於衛注寶器音義聳息勇反舍音赦或音捨盡置諸戚注置置也戚孫氏邑音義置之豉反而甚善晉大夫注備亂起欲以為援為襄十四年衛侯出奔傳經十有五年春王二月葬衛定公注無傳三月乙巳仲嬰齊卒注無傳襄仲子公孫歸父弟宣十八年逐東門氏既而又使嬰齊紹其後曰仲氏疏正義曰公羊穀梁皆以嬰齊為仲遂之子歸父之弟也以為歸父之弟則坰其言稱仲之意則異公羊以為弟無後兄之義使嬰齊為歸父之子則為仲遂之孫故以王父字為氏穀梁以為宣八年仲遂卒者為殺子赤踈之不使稱公子父既見踈不得稱公子故其子由父亦踈之不得稱公孫故别言仲氏杜之此注其言不明當以為襄仲歸父本以東門為氏及命嬰齊紹歸父之後改之曰仲氏也劉炫云仲遂受賜為仲氏故其子孫稱仲氏耳癸丑公會晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于盛音義成音城晉侯執曹伯歸于京師注不稱人以執者曹伯罪不及民歸之京師禮也疏正義曰諸傳于其事之下發凡例者杜皆于經之下引傳而言傳例曰今傳因曹伯發凡杜不引傳例者據稱人以執為例郤云不然則否曹伯稱侯以執從不然之例故杜不得引之也不稱人以執者曹伯罪不反氏其稱人之例于義為然也諸侯不得相治欲歸之京師使夭子治之是禮也釋例曰執諸侯當歸于京師而或以歸或歸于諸侯皆失其所從實而顯之義可知也公至自會注無傳夏六月宋公固卒注四同盟疏正義曰固父鮑以二年八月卒而固代立其年十一月宋大夫與公盟于蜀五年于蟲牢七年于馬陵九年于蒲皆魯宋俱在是四同盟楚子伐鄭秋八月庚辰葬宋共公注三月而葬速音義共音恭宋華元出奔晉宋華元自晉歸于宋注華元欲挾晉以自重故以外納告音義挾音協疏正義曰案傳華元奔晉魚石即議止之魚石自止華元于河上元始至河本未至晉既書奔晉又書自晉歸者華元既出宋即來告華元既歸宋復來告十八年傳例曰凡去其國國逆而立之曰入復其位曰復歸諸侯納之曰歸此是魚石止之宜從國逆之例而為諸侯納之文書曰自晉歸者華元與欒書相善怖懼桓族欲挾晉以自重以晉納告于諸侯春秋從而書之以示元之本情故也宋殺其大夫山注不書氏明背其族宋魚石出奔楚注公子目夷之曾孫冬十有一月叔孫僑如會晉士燮齊高無咎宋華元衛孫林父鄭公子鰌邾人會吳于鍾離注吳夷昧嘗與中國會今始來通晉帥諸侯大夫而會之故殊會眀本非同好鍾離楚邑淮南縣音義燮息協反咎其九反鰌音秋好呼報反許遷于葉注許畏鄭南依楚故以自遷為文葉今南陽葉縣也音義葉舒涉反傳十五年春會于戚討曹成公也注討其殺大子而自立事在十三年執而歸諸京師書曰晉侯執曹伯不及其民也注惡不及民凡君不道於其民諸侯討而執之則曰某人執某侯注稱人示衆所欲執不然則否注謂身犯不義者疏正義曰春秋執諸侯多矣或名或否此例不言之者釋例曰諸侯見執者已在罪賤之地名與否非例所加故但書執某侯也天生民而樹之君使司牧之勿使失性若乃肆于民上人懷怨讎諸侯致討則稱某人執某侯衆討之文也諸侯雖身犯不義而惡不及民則不稱人以執之晉侯執曹伯是也諸無加民之惡而稱人以執皆時之赴告欲重其罪以和民為辭國史承以書䇿而簡牘之記具存夫子因示虛實傳隨而著其本狀以明得失也諸侯將見子臧於王而立之子臧辭曰前志有之曰聖達節注聖人應天命不拘常禮音義見賢遍反應應對之應拘九于反次守節注謂賢者下失節注愚者妄動為君非吾節也雖不能聖敢失守乎疏正義曰節猶分也人生天地之問性命各有其分聖人逹于天命識己知分若以歷數在已則當奉承靈命不復拘君臣之交上下之禮舜禹受終湯武革命是言逹節者也若自知己分不合高位得而不取與而不受子臧季札衛公子郢楚公子閭如此之類皆守節者也下愚之人不識已分侜張妄作取非其理于紀亂常如此之輩古今多矣州吁無知之等皆失節者也子臧自以身是庶子不合有國故言為君非吾節也雖不能為聖敢失其守節者乎遂逃奔宋夏六月宋共公卒注為下宋亂起楚將北師注侵鄭衛子囊曰新與晉盟而背之無乃不可乎子反曰敵利則進何盟之有注晉楚盟在十二年子囊莊王子公子貞音義囊乃郎反申叔時老矣在申注老歸本邑聞之曰子反必不免信以守禮禮以庇身信禮之亡欲免得乎注言不得免音義庇必利反又音祕楚子侵鄭及暴隧遂侵衛及首止鄭子罕侵楚取新石注新石楚邑音義隧音遂欒武子欲報楚韓獻子曰無庸注庸用也使重其罪民將叛之注背盟數戰罪也音義數所角反無民孰戰注為明年晉敗楚于鄢陵傳秋八月葬宋共公於是華元為右師魚石為左師蕩澤為司馬注蕩澤公孫夀之孫疏正義曰世本云公孫夀生大司馬虺虺生司馬澤也華喜督之玄孫者又云督生世子家家生秀老老生司徒鄭鄭生司徒喜也公孫師莊公之孫者又云莊公生右師戊戊生司城師也鱗朱鱗矔孫者又云桓公生公子鱗鱗生東鄉矔矔生司徒文文生大司寇子奏奏生小司寇朱也向戌桓公曾孫者又云桓公生向父昐昐生司城訾守守生小司寇鱣及合左師左師即向戌也華喜為司徒注華父督之玄孫公孫師為司城注莊公孫向為人為大司寇鱗朱為少司寇注鱗矔孫音義少許照反下同矔古亂反向帶為大宰魚府為少宰蕩澤弱公室殺公子肥注輕公室以為弱故殺其枝黨肥文公子音義􅙮音帶本又作帶大音泰華元曰我為右師君臣之訓師所司也今公室卑而不能正注不能討蕩澤吾罪大矣不能治官敢賴寵乎乃出奔晉二華戴族也注華元華喜司城莊族也六官者皆桓族也注魚石蕩澤向為人鱗朱向􅙮魚府皆出桓公魚石將止華元魚府曰右師反必討是無桓氏也注恐華元還討蕩澤并及六族魚石曰右師苟獲反雖許之討必不敢注言畏桓族強且多大功國人與之不反懼桓氏之無祀於宋也注華元大功克合晉楚之成劫子反以免宋圍右師討猶有戍在注向戌桓公曾孫言其賢華元必不討音義戌音恤桓氏雖亡必偏注偏不盡魚石自止華元于河上請討許之乃反使華喜公孫師帥國人攻蕩氏殺子山注喜師非桓族故使攻之書曰宋殺大夫山言背其族也注蕩氏宋公族還害公室故去族以示其罪音義去起呂反魚石向為人鱗朱向􅙮魚府出舍於睢上注睢水名五大夫畏同族罪及將出奔音義睢音雖徐許惟反又音綏華元使止之不可冬十月華元自止之不可乃反注五子不止華元還魚府曰今不從不得入矣注不得復入宋音義復扶又反右師視速而言疾有異志焉若不我納今將馳矣登丘而望之則馳騁而從之注五子亦馳逐之音義登丘而望之則馳絶句騁敕景反則決睢澨注澨水涯決壞也音義澨市利反涯本又作崖魚佳反一音宜壞音怪閉門登陴矣左師二司寇二宰遂出奔楚注四大夫不書獨魚石告音義陴毗支反疏正義曰襄元年傳謂此五人為五大夫故除去魚石謂之四大夫也彼四大夫所以不書者宋人獨以魚石告不以四人告也服虔云魚石卿故書以為四人非卿故不書杜不然者案文七年傳云宋成公卒于是公子成為右師公孫友為左師樂豫為司馬鱗矔為司徒公子蕩為司城華御事為司寇六卿和公室哀二十六年傳宋景公無子于是皇緩為右師皇非我為大司馬皇懷為司徒靈不緩為左師樂茷為司城樂朱鉏為大司寇六卿三族降聽政據彼二文則向為人為大司寇亦是卿也若五人皆告為卿則書向為人亦當書之何以獨書魚石杜言獨以魚石告正為向為人不書故也或少司寇二宰等六卿之外亦是卿官合書名氏猶如魯之三卿外别有公孫嬰齊臧孫許但非如六卿等世掌國政也華元使向戌為左師老佐為司馬樂裔為司寇以靖國人注老佐戴公五世孫音義裔以制反晉三郤害伯宗譖而殺之及樂弗忌注欒弗忌晉賢大夫伯州犂奔楚注伯宗子音義犂力兮反韓獻子曰郤氏其不免乎善人天地之紀也而驟絶之不亡何待注既殺伯宗又及弗忌故曰驟也為十七年晉殺三郤傳音義驟仕救反初伯宗每朝其妻必戒之曰盜憎主人民惡其上子好直言必及於難注傳見雖婦人之言不可廢音義惡烏路反好呼報反難乃旦反見賢遍反十一月會吳鍾離始通吳也注始與中國接許靈公畏逼於鄭請遷於楚辛丑楚公子申遷許于葉春秋左傳注疏卷二十七春秋左氏傳注疏卷二十七考證傳晉侯使郤至勿敢爭注傳言郤至貪所以亡臣召南按注但得其一耳郤至以列國大夫敢與王室爭地王勿能斷使卿訟於晉畏晉強也晉侯知郤至之非不能罪之但使勿復爭田又畏其臣也自是王室愈卑晉之公室亦替而政在大夫矣傳盟於宋西門之外陳傅良曰傳見晉楚嘗同盟不書至襄二十七年特書之也臣浩按晉楚交合俱以宋為樞機此盟華元為之後弭兵向戌為之公至自伐秦孫復曰不以京師至者眀本非朝京師傳孟獻子從疏是賞不善也臣召南按周語本文是不賞善也又按王孫悅與之語説讓説即悅字言好讓也傳是以有動作禮義威儀之則以定命也臣召南按漢書五行志引此作是以有禮義動作威儀之則傳能者養之以福臣召南按左傳本文作能者養以之福與下句不能者敗以取禍相耦故孔疏曰養其威儀禮法以往適於福往適即之字義也漢書五行志引此文亦作能者養以之福顔師古曰之往也是唐以前本俱不誤今各本俱倒之以二字非也然西溪叢語己論及則自宋時已誤矣傳焚我箕郜臣浩按世所行杜林合注本此句有杜注云箕郜晉二邑焚火攻之也十字推尋文義似此處應有注也傳彼交匪傲臣浩按詩作彼交匪敖義與傲同而漢書五行志引此文作彼徼匪傲傳楚將北師注侵鄭衛監本訛作鄭侵衛今改正傳左師二司寇二宰遂出奔楚趙汸補注曰向為人大司寇六卿之一不書者族同罪同獨書魚石舉重耳臣召南按魚氏自子魚之後世為左師至是始出經書其要者耳春秋左氏傳注疏卷二十七考證
