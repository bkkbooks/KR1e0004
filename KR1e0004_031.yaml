body:
  text: 春秋左傳注疏卷三十一起襄公十年盡十二年晉杜氏注唐陸德眀音義孔穎達疏經十年春公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光會吳于柤注吳子在柤晉以諸侯往會之故曰會吳吳不稱子從所稱也柤楚地音義柤莊加反疏正義曰成十五年諸侯大夫會吳于鍾離五年魯衛會吳于善道皆大夫來也此傳云會吳子夀夢則吳子自來也五年戚之會吳序鄶上此殊吳者亦如鍾離善道晉以諸侯往彼會之故曰會吳也哀十三年公會晉侯及吳子于黃池彼稱吳子此不稱子者從其所稱也蘇氏云謂諸侯直稱之曰吳故從諸侯之所稱也至於黃池之會自去其僭號而稱子以告令諸侯故諸侯亦從而稱之也劉炫云從所稱者諸侯盟會會則必自言其爵盟則自言其名故盟得以名告神會得以爵書䇿吳是東夷之君未間諸夏之禮於此自稱為吳不知以爵告衆故從所稱書吳也故釋例云吳晚通上國故其君臣朝會不同於例亦猶楚之初始是言吳未知稱爵也夏五月甲午遂滅逼陽注逼陽妘姓國今彭城傅陽縣也因柤會而滅之故曰遂音義逼徐甫目反又彼力反本或作逼妘音云疏正義曰逼陽妘姓傳文也鄭語云妘姓鄢鄶路逼陽也遂者因上事生下事之辭此因柤會而遂滅逼陽雖復隔以日月文猶繫於會柤因會柤而始謀滅之故言遂也公至自會注無傳楚公子貞鄭公孫輒帥師伐宋晉師伐秦注荀罃不書不親兵也疏正義曰傳稱荀罃伐秦而經不書罃知罃不親兵以師告也秋莒人伐我東鄙公會晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯把伯小邾子伐鄭注齊世子光先至於師為盟主所尊故在滕上疏正義曰周禮典命諸侯之適子誓於天子攝其君則下其君之禮一等未誓則以皮帛繼子男鄭玄云誓猶命也言誓者明天子既命以為之嗣也十九年傳云光之立也列於諸侯矣則光是未誓者也法當繼於子男之下柤之會列於小邾之下是其正也於此伐也傳稱崔杼使太子光先至于師故長於滕晉悼以齊是大國光復先至心善其共遂進其班為盟主所尊故在滕上言其非正法也冬盜殺鄭公子騑公子發公孫輒注非國討當兩稱名氏殺者非卿故稱盜以盜為文故不得言其大夫疏正義曰若國家討而殺之則舉國名言殺其大夫若非國討兩下相殺則兩書名氏王札子殺召伯毛伯是也此非國討亦當兩書名氏但殺之者尉止司臣之徒皆非卿也非卿則名氏不合見經故稱之為盜凡言其者是其所有也君是臣之君故書弒其君臣是君之臣故書殺其大夫盜者寇賊之名賤之不繫於國被殺者非盜之所有既以盜為文故不得言其大夫若如他物殺之然哀四年盜殺蔡侯申注云賤者故稱盜不言弒其君賤盜也文十六年公羊傳曰大夫弒君稱名氏賤者窮諸人大夫相殺稱人賤者窮諸盜其義雖不可通於左氏其言賤盜之意則同戍鄭虎牢注伐鄭諸侯各受晉命戍虎牢不復為告命故獨書魯戍而不敘諸侯音義復扶又反楚公子貞帥師救鄭公至自伐鄭注無傳傳十年春會于柤會吳子壽夢也注壽夢吳子乘音義夢莫公反疏正義曰十二年吳子乘卒是也服虔云壽夢發聲吳蠻夷言多發聲數語共成一言夀夢一言也經言乘傳言壽夢欲使學者知之也然夀夢與乘聲小相涉服以經傳之異即欲使同之然則餘祭戴吳豈復同聲也當是名字之異故末言之三月癸丑齊髙厚相大子光以先會諸侯于鍾離不敬注吳子未至先從東道與東諸侯會遇非本期地故不書會高厚髙固子也癸丑月二十六日音義相息亮反下同疏正義曰言先會諸侯則是會期未到故知吳子未至而諸侯自會也柤與鍾離相近地在宋之東南知光從東道與東方諸侯遇蓋邾莒滕薛之徒自相會遇也本非期會之地會亦不以告魯故不書也如杜此注則吳子未至亦未赴於柤而上注云吳子在柤諸侯往會之者吳子元遣告晉言已至柤而巳非晉侯自期於柤召吳子使赴也戚之會則吳子在善道召使赴戚故與諸國同序於列也杜眀言癸丑是三月二十六日下四月戊午云月一日五月庚寅云月四日甲午云月八日所以眀言日者欲證前九年閏月為門五日於上下日月相當故杜備言其日也劉炫曰杜言癸丑二十六日者見與下四月一日會相近知非二會也士莊子曰高子相大子以會諸侯將社稷是衛而皆不敬注厚與光俱不敬棄社稷也其將不免乎注為十九年齊殺高厚二十五年弒其君光傳夏四月戊午會于柤注經書春書始行也戊午月一日疏正義曰傳言夏會而經書春知經書始行傳言會日也諸赴盟會者初去告行而巳盟會必行還乃書何則初去之時未知所會幾國豈得即書會也眀其皆是行還告廟乃書之耳但所書者或追記發國之初或即書所會之日此會柤以其經傳不同乃知春行夏會其餘傳無會日亦應有如此者如此之類是追記初行也二十年六月庚申公會晉侯云云于澶淵成五年十二月己丑公會晉侯云云于蟲牢如此之類是即書會日也此蓋舊無定法史官不同故立文異耳晉荀偃士丐請伐逼陽而封宋向戌焉注以宋常事晉而向戌有賢行故欲封之為附庸音義行下孟反荀罃曰城小而固勝之不武弗勝為笑固請丙寅圍之弗克注丙寅四月九日孟氏之臣秦堇父輦重如役注堇父孟獻子家臣步挽重車以從師音義堇徐音謹挽音晚疏正義曰重者車名也載物必重謂之重人挽以行謂之輦軍行以載器物止則以為藩營此人挽此重車以從役也宣十二年解巳具之逼陽人啓門諸侯之士門焉注見門開故攻之縣門發郰人紇抉之以出門者注門者諸侯之士在門內者也紇郰邑大夫仲尼父叔梁紇也郰邑魯縣東南莝城是也言紇多力抉舉縣門出在內者音義縣音玄注及下同郰側留反紇恨發反抉烏穴反徐又古穴反出如字一音尺遂反疏正義曰縣門者編版廣長如門施關機以縣門上有冦則發機而下之諸侯之士攻逼陽之門巳有入者縣門乃發郰人紇抉而舉之以出門者門者謂攻門者也紇為郰邑大夫公邑大夫皆以邑名冠之呼為某人孔子之父名紇字叔梁古人名字並言者皆先字而後名故史記孔子世家稱為叔梁紇也服虔云抉撅也謂以木撅抉縣門使舉令下容人出也門者下屬為句狄虒彌建大車之輪而蒙之以甲以為櫓注狄虒彌魯人也蒙覆也櫓大楯音義虒音斯彌徐音彌一音武脾反櫓音魯楯常尹反又音尹左執之右拔戟以成一隊注百人為隊音義隊徒對反徐徒猥反疏正義曰鄭玄云大車平地載任之車也考工記車人為車柯長三尺大車轂長半柯輪崇三柯是輪高九尺其車罔圓周二丈七尺建立也立此大車之輪而覆之以甲以為櫓也考工記殳長尋有四尺車戟常崇於殳四尺八尺曰尋倍尋曰常則戟長一丈六尺也隊是行列之名百人為隊相傳為然成一隊者言其當百人也孟獻子曰詩所謂有力如虎者也注詩邶風也音義邶音佩主人縣布堇父登之及堞而絶之注逼陽人縣布以試外勇者音義堞音牒徐養涉反隊則又縣之蘇而復上者三主人辭焉乃退注主人嘉其勇故辭謝不復縣布音義隊直類反復扶又反注同上時掌反三息暫反又如字疏正義曰宣八年傳曰晉人獲秦諜殺諸絳市六日而蘇則蘇者死而更生之名也堇父隊而悶絶似若死然得蘇悟而復緣布上帶其斷以徇於軍三日注帶其斷布以示勇音義斷徒亂反徇似俊反諸侯之師久於逼陽荀偃士丐請於荀罃曰水潦將降懼不能歸注向夏恐有久雨從丙寅至庚寅二十五日故曰久音義潦音老請班師注班還也知伯怒注知伯荀罃音義知音智投之以機出於其間注出偃丐之間音義機本又作几同曰女成二事而後告余注二事伐逼陽封向戌音義女音汝下及注皆同余恐亂命以不女違注既成改之為亂命女既勤君而興諸侯牽帥老夫以至于此既無武守注無武功可執守而又欲易余罪曰是實班師不然克矣注謂偃丐將言爾余羸老也可重任乎注不任受女此責音義羸劣危反重直用反任音壬注同七日不克必爾乎取之注言當取女以謝不克之罪五月庚寅注月四日荀偃士丐帥卒攻逼陽親受矢石注躬在矢石間音義卒子忽反疏正義曰服虔云古者以石為箭鏑引國語有隼集於陳侯之庭楛矢貫之石砮以證石為箭鏃若石是箭鏃則猶是矢也何須矢石並言杜言在矢石間則不以石為矢也周禮職金凡國有大故而用金石則掌其令鄭玄云用金石者作槍雷之屬雷即礧也兵法守城用礧石以擊攻者陳思王征蜀論云下礧成雷榛殘木碎是也甲午滅之注月八日書曰遂滅逼陽言自會也注言其因會以滅國非之也疏正義曰僖四年公會齊侯云云侵蔡蔡潰遂伐楚二十三年齊侯伐衛遂伐晉如此之類一行而有二事者法當言遂遂非善惡之名而此傳特云書曰遂滅逼陽言自會也則知此言遂者有非之之意所以然者彼因伐遂伐本謀成行兵容可一舉而伐兩國會非征伐之事荀偃士丐於會始請則逼陽無大罪諸侯無宿謀因會滅人情在可責傳稱言自會也是尤其從會行也釋例云會以訓上下敘德刑遂滅逼陽言滅生於會非本意也是言因會以滅國非之之事也書曰者是仲尼新意則舊史不然本蓋别書諸侯滅逼陽仲尼改之而言遂耳以與向戌向戌辭曰君若猶辱鎮撫宋國而以逼陽光啓寡君羣臣安矣其何貺如之注言見賜之厚無過此音義貺音况賜也疏正義曰光昭宋國開其疆竟以賜寡君若専賜臣是臣興諸侯以自封也其何罪大焉敢以死請乃豫宋公宋公享晉侯於楚丘請以桑林注桑林殷天子之樂名疏正義曰若非天子之樂則宋人不當請荀罃不須辭以宋人請而荀罃辭眀其非常樂也宋是殷後得用殷樂知桑林是殷天子之樂名也經典言樂殷為大護而此復云桑林者蓋殷家本有二樂如周之大武象舞也名為大護則傳記有説湯以寬政治民除其邪虐言能覆護下民使得其所故名其樂為大護其曰桑林先儒無説惟書傳言湯伐桀之後大旱七年史卜曰當以人為禱湯乃剪髮斷爪自以為牲而禱於桑林之社而雨大至方數千里或曰禱桑林以得雨遂以桑林名其樂也皇甫謐云殷樂一名桑林以桑林為大護别名無文可馮未能察也荀罃辭注辭讓之荀偃士丐曰諸侯宋魯於是觀禮注宋王者後魯以周公故皆用天子禮樂故可觀魯有禘樂賔祭用之注禘三年大祭則作四代之樂别祭羣公則用諸侯樂音義禘大計反疏正義曰眀堂位云季夏六月以禘禮祀周公於大廟朱干玉戚冕而舞大武皮辨素積裼而舞大夏彼禘祭唯用大武大夏而不言韶護以二十九年魯為季札舞四代之樂知四代之樂魯皆有之眀堂位云凡四代之服器魯兼用之禘是三年大祭禮無過者知禘祭於大廟則作四代之樂也禮唯周公之廟得用天子之禮知其别祭羣公則用諸侯之樂諸侯之樂謂時王所制之樂大武是也然則禘是禮之大者羣公不得與同而於賔得同禘者賔者敬鄰國之賔故得用大祭之樂也其天子享諸侯亦同祭樂故大司樂云大祭祀王出入奏王夏尸出入奏肆夏牲出入奏昭夏大饗不入牲其他如祭祀鄭注云不入牲不奏昭夏王出入賔出入亦奏王夏奏肆夏又禮記祭統云大嘗禘升歌清廟下而管象仲尼燕居云兩君相見亦升歌清廟下而管象是祭與享賔用樂同也而荀罃云我辭禮矣沈氏云嘉樂不野合故也魯之禘祭用四代樂則天子禘用六代樂也鄭康成義以為禘祫各異祫大禘小天子祫用六代之樂禘用四代之樂魯有禘樂謂有周之禘祭之樂非左氏義也劉炫云禘是大禮賔得與同者享賔用樂禮傳無文但賔禮既輕必異於禘魯以享賔當時之失用之巳久遂以為常荀偃士丐引過謬之事以諂晉侯使聼宋耳魯以禘樂享賔猶以十一牢為士鞅吳以引徵百牢亦非正也宋以桑林享君不亦可乎注言俱天子樂也舞師題以旌夏注師樂師也旌夏大旌也題識也以大旌表識其行列音義題大兮反夏戶雅反注同識申志反又如字下同行戶郎反疏正義曰舞師樂人之師主陳設樂事者也謂舞初入之時舞師建旌夏以引舞人而入以題識其舞人之首故晉侯卒見懼而退入于房也謂之旌夏蓋形制大而别為之名也晉侯懼而退入于房注旌夏非常卒見之人心偶有所畏音義卒寸忽反去旌卒享而還及著雍疾注晉侯疾也著雍晉地音義去起呂反著徐都慮反一音除慮反雍於用反卜桑林見注祟見於卜兆音義見賢遍反注同祟息遂反荀偃士丐欲奔請禱焉注奔走還宋禱謝音義禱丁老反荀罃不可曰我辭禮矣彼則以之注以用也猶有鬼神於彼加之注言自當加罪於宋晉侯有間注間疾差也音義差初賣反以逼陽子歸獻于武宮謂之夷俘注諱俘中國故謂之夷音義俘芳夫反疏正義曰昭十七年晉荀吳滅陸渾之戎獻俘于文宮不言謂之夷俘彼真是戎也此言謂之夷俘眀非夷而謂之夷知其諱俘中國改名之也莊三十一年傳例曰凡諸侯有四夷之功則獻于王中國則否中國之俘既不合獻王故獻廟亦諱知其無罪內慙於心故諱之謂之夷俘逼陽妘姓也使周內史選其族嗣納諸霍人禮也注霍晉邑內史掌爵祿廢置者使選逼陽宗族賢者令居霍奉妘姓之祀善不滅姓故曰禮也使周史者示有王命音義令力呈反下令在勸令同疏正義曰霍是舊國閔元年晉獻公滅之以為晉邑也內史掌爵祿廢置周禮內史職文也禮天子不滅國諸侯不滅姓其身有罪宜廢者選其親而賢者更紹立之論語所云興滅國繼絶世者謂此也晉侯以逼陽之罪不合絶祀故歸諸天子使周內史選逼陽宗族賢者繼嗣逼陽之後令居晉之霍邑以奉妘姓之嗣依鄭語及世本皆云逼陽妘姓是祝融之孫陸終第四子求言之後虞夏以來世祀不絶今復繼之善其不滅姓故曰禮也晉侯不自選其人而使周內史者諸侯不得専封示有王命不自専也言納諸霍人者此霍邑或稱霍人猶如晉邑謂之柏人也必知霍人為霍邑者班固漢書樊噲傳云攻霍人是霍人邑名也劉炫云霍晉邑人掌邑大夫猶鄹邑大夫稱鄹人紇蓋使為晉附庸也師歸孟獻子以秦堇父為右注嘉其勇力生秦丕兹事仲尼注言堇父以力相尚子事仲尼以德相尚音義秦丕兹一本作泰不兹六月楚子囊鄭子耳伐宋師于訾毋注宋地音義訾子斯反毋音無庚午圍宋門于桐門注不成圍而攻其城門晉荀罃伐秦報其侵也注侵在九年衛侯救宋師于襄牛鄭子展曰必伐衛不然是不與楚也得罪於晉又得罪於楚國將若之何子駟曰國病矣注師數出疲病也音義數所角反疲音皮子展曰得罪於二大國必亡病不猶愈於亡乎諸大夫皆以為然故鄭皇耳帥師侵衛楚令也注亦兼受楚之勑命也皇耳皇戌子孫文子卜追之獻兆於定薑薑氏問繇注繇兆辭音義繇直救反疏正義曰周禮大卜掌三兆之法一曰玉兆二曰瓦兆三曰原兆其經兆之體皆百有二十其頌皆千有二百鄭玄云頌謂繇也是言灼龜得兆其兆各有繇辭即下三句是也此傳唯言兆有此辭不知卜得何兆但知舊有此辭故卜者得據以答薑耳其千有二百皆此類也此繇辭皆韻古人讀雄與陵為韻詩無羊正月皆以雄韻蒸韻陵是其事也曰兆如山陵有夫出征而喪其雄薑氏曰征者喪雄禦寇之利也大夫圖之衛人追之孫蒯獲鄭皇耳于犬丘注蒯孫林父子音義喪息浪反下同禦魚吕反蒯苦怪反秋七月楚子囊鄭子耳伐我西鄙注於魯無所恥諱而不書其義未聞疏正義曰服虔云不書諱從晉不能服鄭旋復為楚鄭所伐恥而諱之也杜以從盟主而不能服叛國於魯未足為恥被伐無所可諱故云其義未聞還圍蕭八月丙寅克之注蕭宋邑九月子耳侵宋北鄙孟獻子曰鄭其有災乎師競巳甚注競爭競也音義爭爭鬬之爭下文與之爭同周猶不堪競况鄭乎注周謂天王有災其執政之三士乎注鄭簡公幼少子駟子國子耳秉政故知三士任其禍也為下盜殺三大夫傳音義少詩照反任音壬莒人間諸侯之有事也故伐我東鄙注諸侯有討鄭之事音義間間厠之間諸侯伐鄭齊崔杼使大子光先至于師故長於滕注太子宜賔之以上卿而今晉悼以一時之宜令在滕侯上故傳從而釋之音義長丁丈反己酉師於牛首注鄭地初子駟與尉止有爭將禦諸侯之師而黜其車注禦牛首師也黜減損尉止獲又與之爭注獲囚俘子駟抑尉止曰爾車非禮也注言女車猶多過制疏正義曰前巳減損其車復云爾車非禮眀是仍嫌車多言其過制大夫之制不知車常幾乘從軍之車未必制有定限子駟心憎尉止嫌其豪富本意不為過禮制也遂弗使獻注不使獻所獲初子駟為田洫司氏堵氏侯氏子師氏皆喪田焉注洫田畔溝也子駟為田洫以正封疆而侵四族田音義洫況域反堵音者或丁古反喪息浪反下同疆居良反疏正義曰考工記匠人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅎌田首倍之廣二尺深二尺謂之遂九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮然則溝洫俱是通水之路相對大小為異耳皆於田畔為之故云田畔溝也為田造洫故稱田洫此四族皆是富家占田過制子駟為此田洫正其封疆於分有剩則滅給他人故正封疆而侵四族田也小司徒云九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都注云此謂都鄙采地之制也故五族聚羣不逞之人因公子之徒以作亂注八年子駟所殺公子媐等之黨音義媐許其反本亦作熙又音怡於是子駟當國注攝君事也子國為司馬子耳為司空子孔為司徒冬十月戊辰尉止司臣侯晉堵女父子師僕帥賊以入晨攻執政于西宫之朝注公宮殺子駟子國子耳劫鄭伯以如北宮子孔知之故不死注子孔公子嘉也知難不告利得其處也為十九年殺公子嘉傳音義難乃旦反處昌慮反書曰盜言無大夫焉注尉止等五人皆士也大夫謂卿子西聞盜不警而出注子西公孫夏子駟子音義警音景夏戶雅反尸而追盜注先臨尸而追盜盜入於北宫乃歸授甲臣妾多逃器用多喪子産聞盜注子國子為門者注置守門庀羣司注具衆官音義庀匹婢反閉府庫慎閉藏完守備成列而後出兵車十七乘注千二百七十五人音義藏才浪反又如字守手又反乘繩證反尸而攻盜於北宮子蟜帥國人助之殺尉止子師僕盜衆盡死侯晉奔晉堵女父司臣尉翩司齊奔宋注尉翩尉止子司齊司臣子音義翩音篇子孔當國注代子駟為載書以位序聽政辟注自羣卿諸司各守其職位以受執政之法不得與朝政音義辟婢亦反與音預下魯不與同疏正義曰於時鄭伯幼弱政在諸卿國事相與議之不得一人獨決子孔性好専權自以身既當國望其一聽於己新經禍亂與大夫設盟為盟載之書曰自羣卿諸司以下皆以位之次序一聽執政之法悉皆稟受成旨不得干與朝政令其權柄在己也大夫諸司門子不順子産謂之専欲難成謂此也服虔云鄭舊世卿父死子代今子孔欲擅改之使以次先為士大夫乃至卿也若如服言唯當門子恨耳何由大夫諸司亦不順也子孔若為此法即是自害其子子孔之子亦當恨何獨他家門子乎焚書倉門則還依舊法舊法若父死子代子産即應代父何由十九年始立為卿大夫諸司門子弗順將誅之注子孔欲誅不順者子産止之請為之焚書注既止子孔又勸令燒除載書音義為于偽反子孔不可曰為書以定國衆怒而焚之是衆為政也國不亦難乎注難以至治音義治直吏反子産曰衆怒難犯専欲難成合二難以安國危之道也不如焚書以安衆子得所欲注欲為政也衆亦得安不亦可乎專欲無成犯衆興禍子必從之乃焚書於倉門之外衆而後定注不於朝內燒欲使逺近見所燒諸侯之師城虎牢而戍之晉師城梧及制注欲以逼鄭也不書城魯不與也梧制皆鄭舊地音義梧音吾士魴魏絳戍之書曰戍鄭虎牢非鄭地也言將歸焉注二年晉城虎牢而居之今鄭復叛故修其城而置戍鄭服則欲以還鄭故夫子追書繫之於鄭以見晉志音義復扶又反見賢遍反下同疏正義曰如此傳文諸侯戍虎牢士魴魏絳戍梧與制耳其虎牢之內亦應更有晉戍也二年晉城虎牢則虎牢久巳屬晉非復鄭有今繫鄭者晉侯之意鄭人若服將歸之焉善晉侯故探其心而繫之鄭也釋例曰虎牢鄭之郊竟晉人既有之矣又城而居之將以脅鄭鄭畏而強服遇楚而復叛八年之間一南一北至於數四晉悼慮其未巳故大城置戍先以示威鄭服之日釋戍而歸之德立刑行故能終有鄭國春秋探書其本心善之也鄭及晉平楚子囊救鄭十一月諸侯之師還鄭而南至於陽陵注還繞也陽陵鄭地音義還本亦作環戶關反徐音患注同楚師不退知武子欲退曰今我逃楚楚必驕驕則可與戰矣注武子荀罃欒黶曰逃楚晉之恥也合諸侯以益恥不如死我將獨進師遂進己亥與楚師夾潁而軍注潁水出城陽至下蔡入淮音義潁音穎子蟜曰諸侯既有成行必不戰矣注言有成去之志從之將退不從亦退注從猶服也退楚必圍我猶將退也不如從楚亦以退之注以退楚宵涉潁與楚人盟注夜渡畏晉知之欒黶欲伐鄭師注伐涉潁者荀罃不可曰我實不能禦楚又不能庇鄭鄭何罪不如致怨焉而還注致怨為後伐之資音義禦魚呂反庇必利反今伐其師楚必救之戰而不克為諸侯笑克不可命注勝負難要不可命以必克音義要一遙反不如還也丁未諸侯之師還侵鄭北鄙而歸注欲以致怨楚人亦還注鄭服故也王叔陳生與伯輿爭政注二子王卿士音義輿本又作與音同王右伯輿注右助音義右音又注同王叔陳生怒而出奔及河王復之注欲奔晉殺史狡以説焉注説王叔也音義狡古卯反説音悅注同又如字不入遂處之注處叔河上晉侯使士丐平王室王叔與伯輿訟焉注爭曲直王叔之宰注宰家臣與伯輿之大夫瑕禽注瑕禽伯輿屬大夫坐獄於王庭注獄訟也周禮命夫命婦不躬坐獄訟故使宰與屬大夫對爭曲直士丐聽之王叔之宰曰篳門閨竇之人而皆陵其上其難為上矣注篳門柴門閨竇小戶穿壁為戶上鋭下方狀如圭也言伯輿微賤之家音義篳音必閨音圭本亦作圭竇音豆瑕禽曰昔平王東遷吾七姓從王牲用備具王賴之而賜之騂旄之盟注平王徙時大臣從者有七姓伯輿之祖皆在其中主為王備犧牲共祭祀王恃其用故與之盟使世守其職騂旄赤牛也舉騂旄者言得重盟不以犬雞音義從才用反注同又如字騂息營反字林許營反旄音毛為于偽反共音恭疏正義曰七姓從王從王之大臣有七姓也瑕禽言伯輿之祖是七姓之一言其世貴也其祖為王主備犧牲以共祭祀王家牲用備具王恃賴之言其世有功也平王初遷國家未定故與大臣結盟令使世掌其職也周禮牧人陽祀用騂牲檀弓云周人尚赤牲用騂尚書洛誥云文王騂牛一武王騂牛一諸言騂皆是赤牛則知此騂旄是赤牛也旄謂尾也共旌旗之用故其字從者旌旗行而從風偃也曰世世無失職若篳門閨竇其能來東底乎且王何賴焉注言我若貧賤何能來東使王恃其用而與之盟邪底至也音義底音旨今自王叔之相也政以賄成注隨財制政而刑放於寵注寵臣專刑不任法疏正義曰刑罰放赦之事在於寵臣官之師旅不勝其富注師旅之長皆受賂吾能無篳門閨竇乎注言王叔之屬富故使吾貧疏正義曰勝訓堪也言財多故不可用盡不能堪此富唯大國圖之注圖猶議也下而無直則何謂正矣注正者不失下之直音義何或作可誤也疏正義曰凡在上正定在下須眀在下曲直瑕禽自云已有直理不被上知則是使下無直在上何謂正矣故云正者不失下之直也劉炫云七年傳云正直為正正曲為直晉斷王朝之獄乃以下正上宣子若在下而無直心何以謂之為正也勸宣子使心正矣范宣子曰天子所右寡君亦右之所左亦左之注宣子知伯輿直不欲自專故推之於王音義右音又下同左音佐下同左右亦並如字疏正義曰人有左右右便而左不便故以所助者為右不助者為左宣子知伯輿直故從王之所助也使王叔氏與伯輿合要注合要辭王叔氏不能舉其契注要契之辭音義契苦計反注同疏正義曰周禮鄉士職云辨其獄訟異其死刑之罪而要之鄭玄云要之為其罪辭如今劾矣彼謂官人略取罪狀為其要約之辭如今斷事也漢世名斷獄為劾故云如今劾矣此言要辭亦是辭之要約如今辨答也合要者使其各為要約言語兩相辨答伯輿辭直王叔無以應之故不能舉其要契之辭也王叔奔晉不書不告也單靖公為卿士以相王室注代王叔經十有一年春王正月作三軍注增立中軍萬二千五百人為軍疏正義曰昭五年云舍中軍眀此年作而彼年舍故知舊有二軍今增立中軍也然則正是作中軍耳而云作三軍者傳言三子各毁其乘則舊時屬己之乘毁之以足成三軍是舊軍盡廢而全改作之故云作三軍也杜見其以二改三復據彼中軍之文故言增立中軍耳萬二千五百人為軍周禮夏官序文夏四月四卜郊不從乃不郊注無傳疏正義曰此四月四卜與僖三十一年文同蓋亦三月三卜而四月又一卜也止言不郊不云免牲免牛蓋不以其體免直使歸其本牧而已故不書也鄭公孫舍之帥師侵宋公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭注世子光至復在莒子之先故晉悼亦進之音義復扶又反疏正義曰劉炫以為序莒上者直是先至非為先莒今知不然者往年傳云齊大子光先至于師故長於滕是前經為先滕至序在滕子之上今經序在莒子之先眀知亦先莒而至也若非先莒而至唯當還序滕子上耳劉炫無所依馮直云先至更長之而規杜氏非也秋七月己未同盟于亳城北注亳城鄭地伐鄭而書同盟鄭與盟可知音義亳蒲洛反徐扶各反與音預公至自伐鄭注無傳楚子鄭伯伐宋公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭注晉遂尊光會于蕭魚注鄭服而諸侯會蕭魚鄭地公至自會注無傳以會至者觀兵而不果侵伐疏正義曰劉炫云杜釋例自言事勢相接或以始致或以終致是時史異辭何為此注而云不果侵伐今知劉説非者凡云或以始致或以終致皆據實有伐事今據傳文云觀兵于鄭東門是則實無伐事故云不果侵伐劉不逹此意而規杜非也楚人執鄭行人良霄注良霄公孫輒子伯有也音義霄徐音消冬秦人伐晉傳十一年春季武子將作三軍注魯本無中軍唯上下二軍皆屬於公有事二卿更帥以征伐季氏欲專其民人故假立中軍因以改作音義更音庚疏正義曰以昭五年舍中軍知此時作者作中軍是魯本無中軍也以閔元年晉侯作二軍謂之上軍下軍知魯有二軍亦名上下軍也此言請為三軍各征其軍知往前二軍皆屬公也明其有事則二卿更互帥之以征伐耳三卿不得専其民也此時襄公幼弱季氏世秉魯政因公之少欲專其民故假立中軍因以改作也禮明堂位云成王封周公於曲阜地方七百里其時必有三軍也詩魯頌閟宮頌僖公能復周公之宇云公徒三萬鄭玄云大國三軍合三萬七千五百人言三萬者舉成數也則僖公復古制亦三軍矣蓋自文公以來霸主之令軍多則貢事多自減為二軍耳非是魯衆不滿三軍也若然昭五年舍中軍書之於經往前若減一軍亦應書之而經不書者作三軍與舍中軍皆是變故改常卑弱公室季秉國權専擅改作以故史特書之耳若國家自量強弱其軍或減或益國史不須書也何則僖公復古始有三萬則以前無三萬矣僖公作亦不書何怪舍不書也蘇氏亦云僖公之時實有三軍自文以後舍其一軍不書者非是故有所舍故不書蘇氏又云鄭注詩公徒三萬以為三軍鄭答臨碩之問云公徒三萬為二軍者鄭隨問而答當以詩箋為正蘇氏又云搜于紅革車千乘所以今不滿三軍者以當時采地衆多公邑民少故不能滿三軍三子各毁其乘以足之與前解異也周禮小司徒云凡起徒役無過家一人是家出一人故鄉為一軍天子六軍出自六鄉則大國三軍出自三鄉其餘公邑采地之民不在三軍之數季武子今為三軍則異於是矣以魯國屬公之民皆分為三亦謂之三軍其軍之民不啻一萬二千五百家也何則魯國合竟之民屬公者豈唯有三萬七千五百家乎明其決不然矣由此言之此作三軍與禮之三軍名同而實異也春秋之世兵革遞興出軍多少量敵強弱勍寇未息卒士盡行士卒之數無復定準成二年鞍之戰晉車八百乘計有六萬人唯三卿帥之昭十三年平丘之會晉叔向云寡君有甲車四千乘在計四千士卒成二十四軍爾時晉國唯立三軍則甲車四千屬三軍耳其軍豈止一萬二千五百人乎昭八年魯搜于紅傳稱革車千乘千乘之衆充三軍之數明知此分合竟之民以為三軍軍之所統其數異於禮也何休膏肓以為左氏説云尊公室休以為與舍中軍義同於義左氏為短鄭康成針云左氏傳云作三軍三分公室各有其一謂三家始専兵甲卑公室云左氏説者尊公室失左氏意逺矣義符杜説也告叔孫穆子曰請為三軍各征其軍注征賦稅也三家各征其軍之家屬音義稅舒鋭反疏正義曰周禮大司徒以土均之法制天下之地征王制云市廛而不稅關譏而不征經典之文通謂賦稅為征故云征賦稅也往前民皆屬公公稅其民以分賜羣臣今武子欲令民即屬已己所應得自稅取之恐穆子不從故先言之請分國內之民以為三軍三家各自征稅其軍之家屬冀望穆子亦便於己而從其計也言軍之家屬者丁壯從軍者官無所稅其家屬不入軍者乃稅之耳穆子曰政將及子子必不能注政者霸國之政令禮大國三軍魯次國而為大國之制貢賦必重故憂不能堪疏正義曰於時天子衰微政在霸主霸主量國大小責其貢賦若不為三軍則是次國若作三軍則為大國大國之制貢賦必重故云霸主重貢之政將及於子子必不能堪之憂其不能堪之言三軍不可為也魯為三軍二軍國之大小同耳但作三軍則自同大國自同大國則霸主必依大國責其貢重也武子固請之穆子曰然則盟諸注穆子知季氏將復變易故盟之音義復扶又反乃盟諸僖閎注僖宮之門音義閎音宏疏正義曰釋宮云弄門謂之閎孫炎曰巷舍間道也李巡曰閎巷頭門也以此知僖閎是僖公之廟門也詛諸五父之衢注五父衢道名在魯國東南詛以禍福之言相要音義詛側慮反父音甫衢其俱反要一遙反正月作三軍三分公室而各有其一注三分國民衆三子各毁其乘注壞其車乘分以足成三軍音義乘繩證反注及下並同壞音怪足將住反亦如字疏正義曰往前民皆屬公國家自有二軍若非征伐不屬三子故三子自以采邑之民以為己之私乘如子産出兵車十七乘之類是其私家車乘也今既三分公室所分得者即是己有不須更立私乘故三子各自毁壞舊時車乘部伍分以足成三軍也壞者壞其部伍將領也令使各自屬其軍不復立私乘故也季氏使其乘之人以其役邑入者無征注使軍乘之人率其邑役入季氏者無公征不入者倍征注不入季氏者則使公家倍征之設利病欲驅使入己故昭五年傳曰季氏盡征之民辟倍征故盡屬季氏疏正義曰其乘之人即所分得者國內三分有一之人也役謂共官力役則今之丁也邑謂賦稅若今之租調也以其役之與邑皆來入季氏者則無公征也若不以入季氏者則使公家倍征之當輸一而責其二也設利害以懼民驅之使入己耳民畏倍征故盡歸季氏所分得者無一入公也知邑是賦稅者以言役邑入則役之與邑皆從民而入官也從民入官唯在力役與賦稅耳故知邑是賦稅也賦稅而謂之邑者賦稅所入若私邑然故以邑言之孟氏使半為臣若子若弟注取其子弟之半也四分其乘之人以三歸公而取其一叔孫氏使盡為臣注盡取子弟以其父兄歸公疏正義曰昭五年傳追説此事云季氏盡征之叔孫氏臣其子弟孟氏取其半焉叔孫氏臣其子弟不臣父兄謂取二分而二歸公也孟氏取其半又如叔孫所取其中更取其半又以半歸公謂取一分而三歸公也彼傳順序此文顛倒傳意以叔孫為主而先説孟氏言孟氏如叔孫所得使其半為己之臣叔孫所得子與弟也此孟氏若子若弟是子弟中課取其一又分半以歸公也叔孫使子弟盡為己臣唯以父兄歸公耳不然不舍注制軍分民不如是則三家不舍其故而改作也此蓋三家盟詛之本言音義舍音捨疏正義曰如上所分三家所得又各分為四季氏盡取四分叔孫取二分而二分歸公孟氏取一分而三分歸公分國民以為十二三家得七公得五也舍謂舍故也制三軍分國民若不如是則三家不肯舍其故法而别改作也使盡為臣以上是序事之辭不然不舍一句是要契之語故云此蓋三家盟詛之本言盟詛本言必應詳具但史家略取其意而為之立文不復如本辭耳鄭人患晉楚之故諸大夫曰不從晉國幾亡注幾近也音義幾音機注同徐音畿楚弱於晉晉不吾疾也注疾急也晉疾楚將辟之何為而使晉師致死於我注言當作何計楚弗敢敵而後可固與也注固與晉也子展曰與宋為惡諸侯必至吾從之盟楚師至吾又從之則晉怒甚矣晉能驟來楚將不能吾乃固與晉大夫説之使疆埸之司惡於宋注使守疆場之吏侵犯宋音義説音悅疆居良反注同埸音亦注同宋向戌侵鄭大獲子展曰師而伐宋可矣若我伐宋諸侯之伐我必疾吾乃聽命焉且告於楚楚師至吾又與之盟而重賂晉師乃免矣注言如此乃免於晉楚之難音義難乃旦反夏鄭子展侵宋注欲以致諸侯四月諸侯伐鄭己亥齊大子光宋向戌先至於鄭門於東門注傳釋齊太子光所以序莒上也向戌不書宋公在會故其莫晉荀罃至于西郊東侵舊許注許之舊國鄭新邑音義莫音暮疏正義曰昭十二年傳楚子云我皇祖伯父昆吾舊許是宅鄭人貪賴其田而不我與是舊許為鄭邑也謂之舊許明是許之舊國許南遷而鄭得之衛孫林父侵其北鄙六月諸侯會于北林師于向注向地在潁川長社縣東北音義向舒亮反右還次于瑣注北行而西為右還滎陽苑陵縣西有瑣候亭音義瑣素果反苑於阮反又於元反圍鄭觀兵于南門注觀示也西濟于濟隧注濟隧水名音義濟隧上子禮反下音遂鄭人懼乃行成秋七月同盟于亳范宣子曰不慎必失諸侯注慎敬威儀謹辭令諸侯道敝而無成能無二乎注數伐鄭皆罷於道路音義數所角反罷音皮乃盟載書曰凡我同盟毋薀年注薀積年穀而不分災音義毋音無下皆同蕰紆粉反毋壅利注専山川之利音義壅於勇反毋保姦注藏罪人毋留慝注速去惡音義慝他得反下同去起呂反救災患恤禍亂同好惡奬王室注奬助也音義好惡並如字或讀上呼報反下惡路反奬將丈反或間兹命司慎司盟名山名川注二司天神音義間間厠之間兹命本或作兹盟誤疏正義曰盟告諸神而先稱二司知其是天神也覲禮諸侯覲於天子為宫方三百步壇十有二尋深四尺加方明于其上方明者木也方四尺設六色青赤白黑玄黃設六玉圭璋琥璜璧琮公侯伯子男皆就其旗而立天子祀方明禮日月四瀆山川丘陵彼文雖不言盟其所陳設盟之禮也鄭玄云方明者上下四方神明之象也會同而盟明神監之則謂之天之司盟有象者猶宗廟之有主乎天子巡守之盟其神主日諸侯之盟其神主山川王官之伯會諸侯而盟其神主月是言盟之所告告天神也鄭云神監之謂之司盟司盟非一神也其司慎亦不知指斥何神但在山川之上知其是天神耳名山山之有名者謂五嶽四鎮也名川謂四瀆也羣神羣祀注羣祀在祀典者先王先公注先王諸侯之大祖宋祖帝乙鄭祖厲王之比也先公始封君音義大音泰凡大祖大廟大宮皆放此比必利反七姓十二國之祖注七姓晉魯衛鄭曹滕姬姓邾小邾曹姓宋子姓齊薑姓莒巳姓把姒姓薛任姓實十三國言十二誤也音義巳音紀或音把任音壬疏正義曰十三國為七姓世本世家文也姬即次曹意及則言不以大小為次也實十三國而言十二服虔云晉主盟不自數知不然者案定四年祝他稱踐土之盟云晉重魯申於是晉為盟主自在盟內何因晉今主盟乃不自數故知字誤也劉炫難服虔云案宣子恐失諸侯謹慎辭令告神要人身不自數已不在盟彼叛必速豈有如此理哉眀神殛之注殛誅也音義殛紀力反注同俾失其民隊命亡氏踣其國家注踣斃也音義俾本又作卑必爾反隊直類反踣蒲北反徐又敷豆反斃婢世反楚子囊乞旅于秦注乞師旅於秦秦右大夫詹帥師從楚子將以伐鄭鄭伯逆之丙子伐宋注鄭逆服故更伐宋也秦師不書不與伐宋而還音義詹之廉反與音預九月諸侯悉師以復伐鄭注此夏諸侯皆復來故曰悉師音義復扶又反注同鄭人使良霄大宰石􅎢如楚告將服于晉曰孤以社稷之故不能懷君君若能以玉帛綏晉不然則武震以攝威之孤之願也楚人執之書曰行人言使人也注書行人言非使人之罪古者兵交使在其間所以通命示整或執殺之皆以為譏也既成而後告故書在蕭魚下石􅎢為介故不書音義􅎢勑略反攝如字又之涉反使所吏反注同介音界疏正義曰釋例曰使以行言言以接事信令之要於是乎在舉不以怒則刑不濫刑不濫則兩國之情得通兵有不交而解者皆行人之勳也是以雖飛矢在上走驛在下及其末節不統大理遷怒肆忿快意於行人譬諸豺狼求食而巳傳曰鄭人使伯蠲行成晉人殺之非禮也兵交使在其間可也故夫子特顯行人之文行人有六而傳發其三者因良霄以顯其稱行人之事因于徵師以示其非罪因叔孫婼以同外內大夫則餘三人皆隨例而為義也諸以行人為名通及外內以卿出使義取於非其罪也若濤塗寧喜之屬罪在其身鄭叔詹魯行父之等以執政受罪本非使出故不稱行人從實而書皆以罪之也鄭祭仲之如宋也非會非聘與於見誘而以行人應命不能死節挾偽以篡其君故經不稱行人以罪之也是言罪之故不稱行人則稱行人者皆無罪也鄭人先遣告楚乃從諸侯故傳在會先也經在會後既成而後告執故書執在蕭魚會下諸侯之師觀兵于鄭東門鄭人使王子伯駢行成甲戌晉趙武入盟鄭伯冬十月丁亥鄭子展出盟晉侯注二盟不書不告十二月戊寅會于蕭魚注經書秋史失之疏正義曰會于蕭魚經雖無月但會下有冬故以為會在秋也傳言日月次第分明是經謬史官失之也庚辰赦鄭囚皆禮而歸之納斥候注不相備也音義斥徐音尺一音昌夜反禁侵掠晉侯使叔肸告于諸侯注叔肸叔向也告諸侯亦使赦鄭囚音義掠音亮肸許乙反向許丈反公使臧孫紇對曰凡我同盟小國有罪大國致討苟有以藉手鮮不赦宥寡君聞命矣注言晉討小國有藉手之功則赦其罪人德義如是不敢不承命音義藉在夜反注同鮮息淺反宥音又鄭人賂晉侯以師悝師觸師蠲注悝觸蠲皆樂師名音義悝苦回反蠲古玄反又音圭疏正義曰樂師稱師下稱賂以樂知此三人皆樂師悝觸蠲是其名也服虔見下有鐘鎛磬即云三師鐘師鎛磬師謂悝能鐘觸能鎛蠲能磬也然則鄭人以師茂師慧賂宋者又能鐘乎能鎛乎三師必是能鐘磬者要不可即以名次配言之廣車軘車淳十五乘甲兵備注廣車軘車皆兵車名淳耦也音義廣古曠反軘徒溫反淳述倫反徐又之倫反乘繩證反下及注同疏正義曰皆是兵車而别為之名蓋其形制殊用處異也鄭玄云廣車橫陳之車也服虔云軘車屯守之車也或可因所用遂為名及其用之亦無常也射禮數射算二算為純一算為竒是淳為耦也凡兵車百乘注他兵車及廣軘共百乘疏正義曰遍見服本皆云淳十五乘則凡兵車百乘者更合言軘廣或軘廣之外别有百乘杜本淳十五乘更以他兵車七十乘增軘廣共為百乘耳知非軘廣之外更有百乘而云兼軘廣者以上既言廣車軘車下云凡兵車百乘言凡是總攝之辭故知總上軘廣也若然直言兵車百乘於理自足上别云廣車軘車者以廣車軘車甲兵備足自外之車甲兵不備又别有車名非軘廣也歌鐘二肆注肆列也縣鐘十六為一肆二肆三十二枚音義肆音四縣音玄疏正義曰以肆為列者鐘磬皆編縣之在簨虡而各有行列也周禮小胥云凡縣鐘磬半為堵全為肆鄭玄云鐘磬者編縣之二八十六枚而在一虡謂之堵鐘一堵磬一堵謂之肆半之者謂諸侯之卿大夫士也諸侯之卿大夫半天子之卿大夫西縣鐘東縣磬士亦半天子之士縣磬而巳如鄭彼言鐘與磬全乃成為肆此傳於鐘即言肆者十六枚而在一虡古今皆同其虡不可分也虡不可分而云有全有半眀如鄭言鐘磬相對肆為全單為半此傳言歌鐘二肆則兼有磬矣若其無磬不得成肆杜以傳唯云歌鐘故但解鐘數云三十二枚其磬數亦同矣此二肆皆為編縣也下云及其鎛磬者鎛是大鐘磬是大磬皆特縣之非編縣也據鄭玄禮圖如此也言歌鐘者歌必先金奏故鐘以歌名之晉語孔朝注云歌鐘鐘以莭歌也劉炫云傳言歌鐘二肆及其鎛磬則鎛磬亦二肆肆之為名實由鐘磬相對但傳於磬下不復更言其數於鐘則言二肆明鎛磬數與之同乃成肆若磬無二肆則半賜魏絳無磬矣安得有金石也知色别名三十二枚也歌必先云云同及其鎛磬注鎛磬皆樂器音義鎛音博女樂二八注十六人晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華注在四年八年之中九合諸侯如樂之和注九合諸侯謂五年會戚又會城棣救陳七年會鄬八年會邢丘九年盟于戲十年會柤又伐鄭戍虎牢十一年同盟亳城北又會蕭魚疏正義曰服虔云八年從四年以來至十一年也九合諸侯者五年會于戚一也其年又會于城棣救陳二也七年會于鄬三也八年會于邢丘四也九年會于戲五也十年會于柤六也又戍鄭虎牢七也十一年同盟于亳城北八也又會于蕭魚九也晉語説此事云於今八年七合諸侯孔朝云不數救陳與戍鄭虎牢餘為七也如樂之和謂諸侯和同如樂之相應和也無所不諧注諧亦和也請與子樂之注共此樂音義樂音洛一音嶽注同辭曰夫和戎狄國之福也八年之中九合諸侯諸侯無慝君之靈也二三子之勞也臣何力之有焉抑臣願君安其樂而思其終也詩曰樂旨君子殿天子之邦注詩小雅也謂諸侯有樂美之德可以鎮撫天子之邦殿鎮也音義殿都遍反注及下同樂旨君子福祿攸同注攸所也便蕃左右亦是帥從注便蕃數也言逺人相帥來服從便蕃然在左右音義蕃音煩注同數所角反疏正義曰詩小雅采菽之篇也旨美也言樂美之德君子以有樂美之德可以鎮撫天子之邦國也以有樂美之德政故為福祿之所同歸也既能鎮邦國受福祿雖復疏逺之人便蕃然數來在其左右亦於是相帥而來從之也夫樂以安德注和其心也義以處之注處位以義禮以行之注行教令信以守之注守所行仁以厲之注厲風俗而後可以殿邦國同福祿來逺人所謂樂也注言五德皆備乃為樂非但金石書曰居安思危注逸書思則有備有備無患敢以此規注規正公公曰子之教敢不承命抑微子寡人無以待戎注待遇接納不能濟河注渡河南服鄭夫賞國之典也藏在盟府注司盟之府有賞功之制疏正義曰周禮司盟會同則掌其盟約之載既盟則二之二之者寫兩本盟書一埋盟處一藏盟府也唯言會同之盟不掌功勳之事而得有賞功之制者僖五年傳曰虢仲虢叔為文王卿士勳在王室藏於盟府是司盟之府掌藏功勳典策故有賞功之制也不可廢也子其受之魏絳於是乎始有金石之樂禮也注禮大夫有功則賜樂疏正義曰以魏絳蒙賜始有金石之樂知未賜不得有也賜之而云禮也知禮法得賜之也周禮小胥云大夫判縣士特縣鄉飲酒禮云笙入堂下磬南北面鄉射禮云縣于洗東北西面喪大記云疾病君大夫徹縣是大夫得有鐘磬之樂有功乃賜之正禮也維言魏絳有金石之樂不言女樂女樂房中私宴之樂或不以賜之秦庶長鮑庶長武帥師伐晉以救鄭注庶長秦爵也不書救鄭已屬晉無所救音義長丁丈反下及注同鮑步卯反鮑先入晉地士魴禦之少秦師而弗設備壬午武濟自輔氏注從輔氏渡河音義禦魚呂反後放此與鮑交伐晉師己丑秦晉戰于櫟晉師敗績易秦故也注不書敗績晉恥易秦而敗故不告也櫟晉地音義櫟力的反徐失灼反易以豉反經十有二年春王三月莒人伐我東鄙圍台注琅邪費縣南有台亭音義台勑才反又音臺一音翼之反季孫宿帥師救台遂入鄆注鄆莒邑音義鄆音運夏晉侯使士魴來聘秋九月吳子乘卒注五年會於戚公不與盟而赴以名音義與音預疏正義曰劉炫云杜於五年注以為公及其盟還而不以盟告廟也今注云會於戚公不與盟而赴以名何為兩注自相矛楯今知劉難非者以戚盟經既不書公之與否又傳無其事杜𢎞通其義故謂兩解劉不尋杜旨而規其過非也冬楚公子貞帥師侵宋公如晉傳十二年春莒人伐我東鄙圍台季武子救台遂入鄆注乘勝入鄆報見伐取其鐘以為公盤夏晉士魴來聘且拜師注謝前年伐鄭師秋吳子壽夢卒注壽夢吳子之號臨於周廟禮也注周廟文王廟也周公出文王故魯立其廟吳始通故曰禮音義臨力蔭反下同疏正義曰杜以下文周廟尊於周公之廟知是文王廟也以鄭祖厲王立所出王廟知為周公出文王故魯立其廟也哀二年蒯瞶禱云敢昭告皇祖文王衛亦立文王廟也郊特牲曰諸侯不敢祖天子大夫不敢祖諸侯而公廟之設於私家非禮也而諸侯得立王廟者彼謂無功德非王命而輒自言之則為非禮魯衛有大功德王命立之是其正也鄭祖厲王亦然此是常禮特於吳子而傳發例者以吳始通公能體禮故於此言禮也凡諸侯之喪異姓臨於外注於城外向其國音義向或作嚮許亮反疏正義曰禮奔喪之記云哭父之黨於廟母妻之黨於寢師於廟門外朋友於寢門外所識於野張帷此傳言於外與彼於野同於城外向其國張帷而哭之耳同姓於宗廟注所出王之廟疏正義曰此即周廟也但發大例意通古今故不復斥言周耳其實於周之世亦周廟也異姓之國無所出王之廟者其哭同姓必不得同諸異姓亦當於祖廟同宗於祖廟注始封君之廟同族於禰廟注父廟也同族謂髙祖以下音義禰乃禮反是故魯為諸姬臨於周廟注諸姬同姓國音義為于偽反下皆同為邢凡蔣茅胙祭臨於周公之廟注即祖廟也六國皆周公之支子别封為國共祖周公音義邢音刑蔣將丈反案富辰所稱邢在蔣下今傳在凡上未知何者為是茅亡交反胙才故反祭側界反徐又如字冬楚子囊秦庶長無地伐宋師于楊梁以報晉之取鄭也注取鄭在前年梁國睢陽縣東有地名楊梁音義長丁丈反下同靈王求后于齊齊侯問對於晏桓子桓子對曰先王之禮辭有之天子求后於諸侯諸侯對曰夫婦所生若而人注不敢譽亦不敢毁故曰若而人音義譽音餘又如字妾婦之子若而人注言非適也音義適丁歷反無女而有姊妹及姑姊妹疏正義曰釋親云父之姊妹曰姑樊光曰春秋傳云姑姊妹然則古人謂姑為姑姊妹若父之姊為姑姊父之妹為姑妹列女傳梁有節姑妹入火而救兄子是謂父妹為姑妹也後人從省故單稱為姑也古人稱祖父近世單稱祖亦此類也則曰先守某公之遺女若而人齊侯許昏王使隂里結之注隂里周大夫結成也為十五年劉夏逆王后傳音義守手又反夏户雅反公如晉朝且拜士魴之辱禮也注士魴聘在此年夏嫌君臣不敵故曰禮也秦嬴歸于楚注秦景分妹為楚共王夫人音義嬴音盈楚司馬子庚聘于秦為夫人寧禮也注子庚莊王子午也諸侯夫人父母既沒歸寧使卿故曰禮疏正義曰此事不見於經而傳自廣記備言以明禮之事耳楚共王以成元年即位秦嬴歸楚蓋應多年傳因子庚之聘發其歸楚非此年歸而即使歸寧案昭元年秦針奔晉傳云其母曰弗去懼選針則景公之弟昭元年其母猶在此注云父母既沒歸寧使卿者父母並在則身自歸寧若父沒母存身不自歸則亦使卿寧也杜云父母既沒連言之耳春秋左傳注疏卷三十一春秋左氏傳注疏卷三十一考證會吳于柤注柤楚地臣召南按此時楚地恐尚不及淮北若果係楚地晉宋諸國安得會吳于此乎杜云楚地由後遡前之稱也後漢郡國志彭城國傅陽有柤水即此柤也前志楚國傅陽故逼陽國是柤即近逼陽之地既會于柤即滅逼陽耳傅陽故縣在今嶧縣南柤即嶧縣泇口也遂滅逼陽注今彭城傅陽縣也傅監本訛作傳今改正公會晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯把伯小邾子伐鄭疏言誓者明天子既命以為之嗣也明監本訛作用今改正傳郰人紇抉之以出門者郰監本作聊注疏同臣浩按聊落蕭切郰側鳩切與鄒鄹同亦作陬取右偏旁阜置之左即陬也各本以字畫相似而誤今改正傳魯有禘樂賔祭用之疏禘是禮之大者羣公不得與同而於賓得同禘者賓者敬鄰國之賓故得用大祭之樂也臣召南按賓者二字應是衍文傳生秦丕兹臣召南按丕兹即秦啇也史記孔子弟子傳秦啇字子丕鄭康成曰子丕楚人家語七十二弟子解曰秦啇魯人字不慈家語是也丕字訛不兹字訛慈耳鄭以為楚人非也傳楚子囊鄭子耳伐我西鄙趙汸補注曰伐我無不書之理楚鄭志在圍蕭以退為進故史不書傳王叔與伯輿訟焉趙汸曰傳見周衰至使晉大夫聽王卿士之訟作三軍萬斯大學春秋隨筆曰晉將中軍者稱元帥諸卿聽焉季宿心醉久矣魯向惟公室二軍有事則命卿分將季氏雖強權未盡屬忽作三軍名則三家分將實則専領中軍使政權盡歸己也會于蕭魚程子曰晉悼公推至誠以待人自此鄭不背晉者二十四年劉敞曰鄭伯如會歟則宜以如會書乞盟歟則宜以乞盟書今一皆沒之獨稱會何哉美悼公之服鄭信義著于諸侯非一日之積也傳季武子將作三軍疏勍冦未息勍監本訛作就今改正傳政將及子子必不能顧炎武日知録曰言魯國之政將歸于季孫以一軍之征而供霸國之政令將有所不給則必改作其後四分公室季氏擇二蓋亦不得巳之計叔孫固巳豫見之矣傳其莫晉荀罃至于西郊東侵舊許疏楚子云我皇祖伯父昆吾舊許是宅監本脫皇祖二字各本皆同今以昭十二年傳原文添傳楚子囊乞旅于秦臣浩按他處俱云乞師惟此傳言乞旅注亦未明言其故傳臨于周廟禮也疏魯衛有大功德王命立之是其正也臣召南按諸侯不得祖天子自是正禮魯之有周廟乃後人僭立託言王命所賜耳不得謂之正也劉敞曰魯君僭而立周廟三家僭而立公廟左氏不知遂真謂禮豈不誤哉凡諸侯之喪異姓臨於外同姓於祖廟同宗於禰廟於義足矣此論甚確傳靈王求后于齊注不敢譽亦不敢毁故曰若而人而監本訛作如今改正春秋左氏傳注疏卷三十一考證
