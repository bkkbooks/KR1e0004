body:
  text: 春秋左傳注疏卷四十九起昭公二十年盡二十年晉杜氏注唐陸德明音義孔穎達疏經二十年春王正月夏曹公孫會自鄸出奔宋注無傳嘗有玉帛之使來告故書鄸曹邑音義鄸莫公反一音亡增反字林音夢案夢字字林亡忠反使所吏反疏注正義曰宣十年傳例曰凡諸侯之大夫違告於諸侯曰某氏之守臣某失守宗廟敢告所有玉帛之使者則告不然則否注云玉帛之使謂聘恩好不接故不告如杜之意此為奔者之身嘗有玉帛之使於彼國已經相接則告若奔者未嘗往聘恩好不接則不告唯告奔者嘗聘之國餘不告也曹會曾來聘魯故云嘗有玉帛之使來告故書也此與二十二年宋華亥向寧華定自宋南里出奔楚其文正司彼華亥等入南里以叛又從南里出奔則此亦應然賈逵云前此以鄸叛也叛便從鄸而出叛不告故不書是言既以鄸叛又從鄸而出也南里繫宋此鄸不繫曹者鄸是大都得以名通南里是宋都之里非别邑故繫於宋此鄸及定十一年蕭皆是别邑故不繫國也曹是小國其臣書名者少此會書名蓋備於禮成為卿也釋例曰小國之卿或命而禮儀不備或未加命數故不書之邾卑我之等其奔亡亦多所書唯數人而已知其合制者少也杜言數人謂此公孫會與邾邾卑我也是杜意以會備禮成卿故書名也劉炫云春秋未嘗書曹人來聘非徒會不見經炫謂玉帛之使謂國家所有交好皆告之非奔者之身嘗聘也今賈又云所以華亥向寧射姑等不見有玉帛來聘者以其時未為卿也秋盜殺衛侯之兄縶注齊豹作而不義故書曰盜所謂求名而不得音義縶張立反疏注正義曰襄十年鄭尉止司臣等殺子駟子國書曰盜殺鄭公子騑公子發尉止之徒皆士書之為盜釋例曰士殺大夫則書曰盜則此書盜貶之使同於士也三十一年傳説春秋褒貶之義云或求名而不得或欲蓋而名彰懲不義也齊豹為衛司寇守嗣大夫作而不義其書為盜又曰春秋書齊豹曰盜懲不義也宣十七年傳例曰凡稱弟皆母弟公羊傳曰母兄稱兄此縶與衛侯同母故稱兄冬十月宋華亥向寧華定出奔陳注與君爭而出皆書名惡之音義華戶化反爭爭鬬之爭惡烏路反十有一月辛卯蔡侯盧卒注無傳未同盟而赴以名音義盧力烏反本又作廬力於反傳二十年春王二月己丑日南至注是嵗朔旦冬至之嵗也當言正月己丑朔日南至時史失閏閏更在二月後故經因史而書正月傳更具於二月記南至日以正歷也疏注正義曰歷法十九年為一章章首之嵗必周之正月朔旦冬至僖五年正月辛亥朔日南至是章首之嵗年也計僖五年至往年合一百三十三年是為七章今年復為章首故云是嵗朔旦冬至之嵗也朔旦冬至謂正月之朔當言正月己丑朔日南至今傳乃云二月己丑日南至是錯名正月為二月也歷之正法往年十二月後宜置閏月即此年正月當是往年閏月此年二月乃是正月故朔日己丑日南至也時史失閏往年錯不置閏閏更在二月之後傳於八月之下乃云閏月戊辰殺宣薑是閏在二月後也不言在八月後而云在二月後者以正月之前當置閏二月之後即不可故據二月言之時史謂閏月為正月故經因史而書正月從其誤而書之傳以經之正月實非正月更具於二月記南至之日以正歷之失也日南至者謂冬至也冬至者周之正月之中氣歷法閏月無中氣中氣必在前月之內時史誤以閏月為正月而置冬至於二月之朔既不曉歷數故閏月之與冬至悉皆錯也杜下注云時魯侯不行登臺之禮使梓愼望氛是杜意以為時魯之君臣知此己丑是冬至之日但不知其不合在二月耳服虔云梓慎知失閏二月冬至故獨以二月望氣則服意以為當時魯人置冬至於正月之內獨梓愼知二月己丑是真冬至耳其義或當然也梓愼望氛注氛氣也時魯侯不行登臺之禮使梓愼望氛音義氛芳云反曰今茲宋有亂國幾亡三年而後弭蔡有大喪注為宋華向出奔蔡侯卒傳音義幾音祈又音機弭彌爾反叔孫昭子曰然則戴桓也注戴族華氏桓族向氏汰侈無禮已甚亂所在也注傳言妖由人興音義汰音泰費無極言於楚子曰建與伍奢將以方城之外叛自以為猶宋鄭也齊晉又交輔之將以害楚其事集矣王信之問伍奢伍奢對曰君一過多矣注一過納建妻何信於讒王執伍奢注忿奢􅋀言使城父司馬奮揚殺大子未至而使遣之注知大子寃故遣令去音義奮方問反寃於元反令力呈反三月大子建奔宋王召奮揚奮揚使城父人執己以至疏正義曰服虔云城父人城父大夫也王曰言出於余口入於爾耳誰告建也對曰臣告之君王命臣曰事建如事余臣不佞注佞才也不能茍二奉初以還注奉初命以周旋不忍後命故遣之既而悔之亦無及己王曰而敢來何也對曰使而失命召而不來是再姦也注姦犯也音義使而所吏反又如字姦音干逃無所入王曰歸從政如他日注善其言令使還音義還音環下還豹同無極曰奢之子材若在吳必憂楚國盍以免其父召之彼仁必來不然將為患王使召之曰來吾免而父棠君尚謂其弟員注棠君奢之長子尚也為棠邑大夫員尚弟子胥音義盍户臘反棠君尚君或作尹員音云長丁丈反曰爾適吳我將歸死吾知不逮注自以知不及員音義知音智注及下知也同一音如字逮音代一音大計反我能死爾能報聞免父之命不可以莫之奔也親戚為戮不可以莫之報也奔死免父孝也度功而行仁也注仁者貴成功音義度待洛反擇任而往知也注員任報讐音義任音壬注同知死不辟勇也注尚為勇父不可棄注俱去為棄父名不可廢注俱死為廢名爾其勉之相從為愈注愈差也音義差初賣反疏正義曰勉謂努力爾其勉之令勉力報讐比於相從俱死為愈也病差謂之愈言其勝共死也服虔云相從愈於共死則服意相從使員從其言也語法兩人交互乃得稱相獨使員從己語不得為相從也伍尚歸奢聞員不來曰楚君大夫其旰食乎注將有吳憂不得早食音義旰古旦反楚人皆殺之員如吳言伐楚之利於州于注州于吳子僚音義僚力雕反公子光曰是宗為戮而欲反其讐不可從也注光吳公子闔廬也反復也員曰彼將有他志注光欲殺僚不利員用事故破其議而員亦知之余姑為之求士而鄙以待之注計未得用故進勇士以求入於光退居邊鄙音義姑為于偽反乃見鱄設諸焉注鱄諸勇士音義見賢遍反鱄音專疏正義曰見謂為之紹介使之見光下文齊豹見宗魯於公孟亦然猶論語云門人見之也而耕於鄙注為二十七年吳弒僚傳音義弒申志反宋元公無信多私而惡華向華定華亥與向寧謀曰亡愈於死先諸注恐元公殺己欲先作亂音義惡音烏路反華亥偽有疾以誘羣公子公子問之則執之夏六月丙申殺公子寅公子御戎公子朱公子固公孫援公孫丁拘向勝向行於其廪注八子皆公黨音義御魚呂反又如字援于眷反拘九于反廪力甚反公如華氏請焉弗許遂劫之注劫公疏正義曰公未知諸人已死故猶往請之癸卯取大子欒與母弟辰公子地以為質注欒景公也辰及地皆元公弟音義欒力官反質音致下同辰及地皆元公弟案公子辰是景公之母弟地是辰兄皆當為元公之子今注皆作元公弟誤耳疏注正義曰定十年經書宋公之弟辰當景公之世辰及地不得為元公弟也世族譜辰地皆云元公子此諸本皆云元公弟當時傳寫誤耳公亦取華亥之子無戚向寧之子羅華定之子啓與華氏盟以為質注為此冬華向出奔傳音義戚于歷反衛公孟縶狎齊豹注公孟靈公兄也齊豹齊惡之子為衛司寇狎輕也音義狎戶甲反奪之司冦與鄄注鄄豹邑音義鄄音絹有役則反之無則取之注縶足不良故有役則以官邑還豹使行公孟惡北宮喜褚師圃欲去之注喜貞子音義惡烏路反禇中呂反圃布五反去起呂反公子朝通于襄夫人宣薑注宣薑靈公嫡母音義朝如字嫡丁歷反本又作適懼而欲以作亂故齊豹北宮喜褚師圃公子朝作亂初齊豹見宗魯於公孟注薦達也音義見賢遍反為驂乘焉注為公孟驂乘音義驂七南反乘繩證反注及下驂乘與乘一乘駟乘就公乘皆同將作亂而謂之曰公孟之不善子所知也勿與乘吾將殺之對曰吾由子事公孟子假吾名焉故不吾遠也注言子借我以善名故公孟親近我音義與音預又如字逺于萬反借子夜反近附近之近雖其不善吾亦知之抑以利故不能去是吾過也今聞難而逃是僭子也注使子言不信也音義難乃旦反僭子念反子行事乎吾將死之以周事子注周猶終竟也疏注正義曰杜意終不泄子言是終事子即謂殺公孟之言而歸死於公孟其可也丙辰衛侯在平壽注平壽衛下邑公孟有事於蓋獲之門外注有事祭也蓋獲衛郭門齊子氏帷於門外而伏甲焉注齊豹之家使祝蛙置戈於車薪以當門注要其前也音義蛙烏媧反置之䜴反要一遙反使一乘從公孟以出注亦如前車置戈於薪尋其後音義從如字又才用反使華齊御公孟宗魯驂乘及閎中注閎曲門中音義華戶化反下同閎音宏疏正義曰諸本皆華上有使字計華齊是公孟之臣自為公孟之御非齊氏所當使必不得有使字學者以上文有使祝蛙使一乘下有使華寅乘二車使華寅執蓋以此妄加使字今定本有使非也齊氏用戈擊公孟宗魯以背蔽之斷肱以中公孟之肩皆殺之公聞亂乘驅自閲門入慶比御公公南楚驂乘使華寅乘二車注公副車音義斷丁管反肱古𢎞反中丁仲反下中南楚同乘驅如字又繩證反閲音悅比如字又毗志反疏正義曰乘驅者乘車而疾驅也閲門者衛城門蓋偏側之門其路逺齊氏及公宮鴻駵魋駟乘于公注鴻駵復就公乘一車四人音義駵音留魋徒回反復扶又反公載寶以出褚師子申遇公于馬路之衢遂從注從公出音義衢其俱反從才用反注及下注同過齊氏使華寅肉袒執蓋以當其闕注肉袒示不敢與齊氏爭執蓋蔽公而去闕空也以蓋當侍從空闕之處音義袒徒旱反爭爭鬬之爭處昌慮反齊氏射公中南楚之背公遂出寅閉郭門注不欲令追者出音義射食亦反令力呈反踰而從公注踰郭出音義從才用反又如字下從公同公如死鳥注死鳥衛地析朱鉏宵從竇出徒行從公注朱鉏成子黑背孫音義析星歷反鉏仕居反竇音豆齊侯使公孫青聘于衛注青頃公之孫音義頃音傾既出聞衛亂使請所聘公曰猶在竟內則衛君也乃將事焉注將事行聘事音義竟音境遂從諸死鳥請將事辭曰亡人不佞失守社稷越在草莽吾子無所辱君命賔曰寡君命下臣於朝曰阿下執事注阿比也命已使比衛臣下音義莽莫蕩反臣不敢二注二違命也主人曰君若惠顧先君之好昭臨敝邑鎮撫其社稷則有宗祧在注言受聘當在宗廟也音義好呼報反祧他雕反乃止注止不行聘事衛侯固請見之注欲與青相見不獲命以其良馬見注以為相見之禮音義馬見賢遍反下注客禮見同為未致使故也注未致使故不敢以客禮見音義為于偽反使所吏反注同疏注正義曰客禮見者若已致君命則享有庭實復有私覿私靣之禮今為未致使故但以良馬見也衛侯以為乘馬注喜其敬己故貴其物音義乘繩證反又如字賔將掫注掫行夜音義掫側九反又祖侯反行下孟反疏注正義曰下文終夕與於燎故知掫是行夜也説文云掫夜戒有所擊也從手取聲主人辭曰亡人之憂不可以及吾子草莽之中不足以辱從者敢辭賔曰寡君之下臣君之牧圉也若不獲扞外役是不有寡君也注有相親有音義從才用反圉魚呂反扞戶旦反臣懼不免於戾請以除死親執鐸終夕與於燎注設火燎以備守音義鐸待洛反與音預下不與聞謀與於青之賞同燎九召反又力弔反一本作終夕與於燎齊氏之宰渠子召北宮子注北宫喜也北宮氏之宰不與聞謀殺渠子遂伐齊氏滅之丁巳晦公入與北宮喜盟于彭水之上注喜本與齊氏同謀故公先與喜盟疏正義曰丙辰丁巳乃是頻日其事既多不應二日之中并為此事今杜不云日誤者以誤在可知故杜不言且宣二年壬申朝于武宮注云壬申十月五日既有日而無月冬又在壬申下明傳文無較例又注哀十一年傳云此事經在十二月螽上今倒在下更具列其月以為别者丘明本不以為義例故不皆齊同如杜此言或傳因簡牘之辭不復具顯其日月劉炫以為日誤而規杜氏非也秋七月戊午朔遂盟國人八月辛亥公子朝褚師圃子玉霄子髙魴出奔晉注皆齊氏黨閏月戊辰殺宣薑注與公子朝通謀故衛侯賜北宮喜諡曰貞子注滅齊氏故疏正義曰諡法外內用情曰貞賜析朱鉏諡曰成子注宵從公故而以齊氏之墓豫之注皆未死而賜諡及墓田傳終而言之衛侯告寧于齊且言子石注子石公孫青言其有禮疏注正義曰案世本頃公生子夏勝勝生子石青是也齊侯將飲酒遍賜大夫曰二三子之教也注喜青敬衛侯音義遍音遍苑何忌辭曰與於青之賞必及於其罰注何忌齊大夫言青若有罪亦當並受其罰音義苑於元反在康誥曰父子兄弟罪不相及注尚書康誥疏正義曰此非康誥之全文引其意而言之其本文云子弗祗服厥父事大傷厥考心于父不能字厥子乃疾厥子于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟惟弔兹不于我政人得罪孔安國云至此不孝不慈弗友不恭不於我執政之人得罪乎導教不至所致又曰文王作罰刑兹無赦言刑此不孝不慈之人無赦也刑不慈者不可刑其父又刑其子刑不孝者不可刑其子又刑其父是為父子兄弟罪不相及况在羣臣臣敢貪君賜以干先王注言受賜則犯康誥之義琴張聞宗魯死注琴張孔子弟子字子開名牢音義牢力刀反疏注正義曰家語云孔子弟子琴張與宗魯友七十子篇云琴牢衛人字子開一字張則以字配姓為琴張即牢曰子云是也賈逵鄭衆皆以為子張即顓孫師服虔云案七十子傳云子張少孔子四十餘嵗孔子是時四十知未有子張鄭賈之説不知所出將往弔之仲尼曰齊豹之盜而孟縶之賊女何弔焉注言齊豹所以為盜孟縶所以見賊皆由宗魯音義女音汝君子不食姦注知公孟不善而受其祿是食姦也不受亂注許豹行事是受亂也不為利疚於回注疚病回邪也以利故不能去是病身於邪音義為于偽反疚居又反邪似嗟反下同不以回待人注知難不告是以邪待人音義難乃旦反下同不蓋不義注以周事豹是蓋不義不犯非禮注以二心事縶是非禮宋華向之亂公子城注平公子公孫忌樂舍注舍樂喜孫司馬強向宜向鄭注宜鄭皆向戌子楚建注楚平王之亡大子郳申注小邾穆公子音義郳五兮反出奔鄭注八子宋大夫皆公黨辟難去其徒與華氏戰于鬼閻注八子之徒衆也潁川長平縣西北有閻亭音義閻似亷反又似冉反敗子城子城適晉注子城為華氏所敗别走至晉為明年子城以晉師至起本疏正義曰上云八子奔鄭而此又云適晉者子城本意與七子同心奔鄭故上云奔鄭及其敗後遂率意適晉以請師華亥與其妻必盥而食所質公子者而後食公與夫人每日必適華氏食公子而後歸華亥患之欲歸公子向寧曰唯不信故質其子若又歸之死無日矣公請於華費遂將攻華氏注費遂大司馬華氏族音義盥古緩反而食音嗣下食公子同質音致下同費扶味反對曰臣不敢愛死無乃求去憂而滋長乎注恐殺大子憂益長音義去起呂反長丁丈反注及下同臣是以懼敢不聽命公曰子死亡有命余不忍其詬注詬耻也音義詬許侯反本或作詬同疏正義曰言我子死亡自有天命天命欲盡非人所免我不忍其恥欲喪子以伐之冬十月公殺華向之質而攻之戊辰華向奔陳華登奔吳注登費遂之子黨華向者向寧欲殺大子華亥曰干君而出又殺其子其誰納我且歸之有庸注可以為功善使少司寇牼以歸注以三公子歸公也牼華亥庶兄音義少詩照反下注少皥同牼苦耕反曰子之齒長矣不能事人以三公子為質必免注質信也送公子歸可以自明不叛之信音義質如字注同疏正義曰言年齒既長不能他國事人為臣公子既入華牼將自門行注從公門去公遽見之執其手曰余知而無罪也入復而所注而女也所所居官音義遽其據反女音汝齊侯疥遂痁注痁瘧疾音義疥舊音戒梁元帝音該依字則當作痎説文云兩日一發之瘧也痎音皆後學之徒僉以疥字為誤案傳例因事曰遂若痎已是瘧疾何為復言遂痁乎痁失亷反疏正義曰後魏之世嘗使李繪聘梁梁人袁狎與繪言及春秋説此事云疥當為痎痎是小瘧痁是大瘧疥患積久以小致大非疥也狎之所言梁主之説也案説文疥搔也瘧熱寒并作痁有熱瘧痎二日一發瘧今人瘧有二日一發亦有頻日發者俗人仍呼二日一發久不差者為痎瘧則梁主之言信而有徴也是齊侯之瘧初二日一發後遂頻日熱發故曰疥遂痁以此久不差故諸侯之賔問疾者多在齊也若其不然疥搔小患與瘧不類何云疥遂痁乎徐仙民音作疥是先儒舊説皆為疥遂痁初疥後瘧耳今定本亦作疥期而不瘳諸侯之賔問疾者多在注多在齊音義期音基瘳勑留反疏正義曰期三日有六旬又六日法天數三百六十五度四分度之一帝言閏從全數故言三百六十又六日合三百六十五日又四分度之一分欠三分不成六日大月却還天期十度小月不盡置閏梁丘據與裔款注二子齊嬖大夫音義裔以制反嬖必計反言於公曰吾事鬼神豐於先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅於祝固史嚚以辭賔注欲殺嚚固以辭謝來問疾之賔音義盍戶臘反嚚魚巾反疏注正義曰服虔云祝固齊大祝史嚚大史也謂祝史之固陋嚚暗不能盡禮薦美至於鬼神怒也其意以為請誅祝史之嚚暗固陋者嚚固非人名也案莊三十二年神降于莘虢公使祝應宗區史嚚享焉彼是人名則此亦名也世族譜齊雜人內有祝固史嚚此云欲殺嚚固是杜必以為人名也公説告晏子晏子曰日宋之盟注日往日也宋盟在襄二十七年音義説音悅屈建問范會之德於趙武趙武曰夫子之家事治言於晉國竭情無私其祝史祭祀陳信不愧其家事無猜其祝史不祈注家無猜疑之事故祝史無求於鬼神音義屈居勿反治直吏反愧九位反本又作愧猜七才反疏正義曰彼傳趙武對曰夫子之家事治言於晉國無隱情其祝史陳信於鬼神無愧辭此晏子言之其辭微多於彼其意亦不異也建以語康王注楚王音義語魚據反康王曰神人無怨宜夫子之光輔五君以為諸侯主也注五君文襄靈成景疏正義曰文公為戎右襄靈為大夫成公為卿景公為大傅公曰據與款謂寡人能事鬼神故欲誅於祝史子稱是語何故對曰若有德之君外內不廢注無廢事上下無怨動無違事其祝史薦信無愧心矣注君有功德祝史陳説之無所愧疏正義曰此猶如孝經上下無怨也言人臣及民上下無相怨耳服虔云上下謂人神無怨即如服言下云上下怨疾復是人與神相怨疾也是以鬼神用饗國受其福祝史與焉注與受國福音義與焉音預注同下祝史與焉亦同其所以蕃祉老壽者為信君使也其言忠信於鬼神其適遇淫君外內頗邪上下怨疾動作辟違從欲厭私注使私情厭足音義蕃音煩祉音恥為于偽反又如字下為暴君使同頗普何反邪似嗟反辟匹亦反從子用反下淫從同或音如字厭於豔反注同高臺深池撞鍾舞女斬刈民力輸掠其聚注掠奪取也音義撞直江反刈本又作艾魚廢反掠音亮聚才住反又如字疏正義曰輸墮也故為墮毁奪其所聚之物以成其違不恤後人暴虐淫從肆行非度無所還忌注還猶顧也疏正義曰肆縱恣也恣意行非法度之事也不思謗讟疏正義曰俗本作畏定本作思不憚鬼神神怒民痛無悛於心其祝史薦信是言罪也注以實白神是為言君之罪音義讟徒木反悛七全反其蓋失數美是矯誣也注蓋掩也音義數所主反矯居表反疏正義曰掩蓋愆失妄數美善是矯詐誣罔也進退無辭則虛以求媚注作虛辭以求媚於神音義媚眉記反是以鬼神不饗其國以禍之祝史與焉所以夭昏孤疾者為暴君使也其言僭嫚於鬼神公曰然則若之何對曰不可為也注言非誅祝史所能治音義僭子念反下僭令同嫚武諌反山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之注衡鹿舟鮫虞候祈望皆官名也言公專守山澤之利不與民共音義萑音丸鮫音交藪素口反蒸之丞反粗曰薪細曰蒸蜃市軫反疏注正義曰周禮司徒之屬有林衡之官掌巡林麓之禁鄭玄云衡平也平林麓之大小及所生者竹木生平地曰林山足曰麓此置衡麓之官守山林之木是其宜也舟是行水之器鮫是大魚之名澤中有水有魚故以舟鮫為官名也周禮山澤之官皆名為虞每大澤大藪中士四人鄭玄云虞度也度知山之大小及所生者澤水所鍾也水希曰藪則藪是少水之澤立官使之候望故以虞候為名也海是水之大神有時祈望祭之因以祈望為主海之官也此皆齊自立名故與周禮不同山澤之利當與民共之言公立此官使之守掌専山澤之利不與民共故鬼神怒而加病也縣鄙之人入從其政逼介之關暴征其私注介隔也迫近國都之關言邊鄙既入服政役又為近關所征稅枉暴奪其私物音義其政如字一音征逼彼力反介音界近附近之近疏注正義曰聘禮及竟謁關人鄭玄云古者竟上為關又周禮司關注云關界上之門然則禮之正法國之竟界之上乃有關耳自竟至國更無關也齊與竟內更復置關不與常禮同以隔外內故注介為隔也迫近國都為關以隔邊鄙之人縣鄙之人入從國之政役近關又征稅奪其私物而使民困也承嗣大夫強易其賄注承嗣大夫世位者音義強其犬反賄呼罪反布常無藝注藝法制也言布政無法制疏正義曰布其尋常之政無凖藝徴斂無度宮室日更淫樂不違注違去也內寵之妾肆奪於市注肆放也外寵之臣僭令於鄙注詐為教令於邊鄙私欲飬求不給則應注飬長也所求不給則應之以罪音義應應對之應注同長丁丈反疏正義曰言此嬖寵之臣私冇所欲長養其情求物共之民不共給則應之以罪民人苦病夫婦皆詛祝有益也詛亦有損聊攝以東注聊攝齊西界也平原聊城縣東北有攝城音義詛莊慮反祝之又反下善祝同姑尤以西注姑尤齊東界也姑水尤水皆在城陽郡東南入海疏正義曰聊攝姑尤皆是邑也管仲夸楚言其竟界所至故逺舉河海也晏子言其人多故唯舉屬邑言之也其為人也多矣雖其善祝豈能勝億兆人之詛注萬萬曰億萬億曰兆音義億於力反君若欲誅於祝史修德而後可公説使有司寬政毁關去禁薄斂已責注除逋責音義説音悅去起呂反下以去其否同斂力驗反責本又作債同逋布胡反十二月齊侯田于沛注言疾愈行獵沛澤名音義沛音貝招虞人以弓不進注虞人掌山澤之官公使執之辭曰昔我先君之田也旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之仲尼曰守道不如守官注君招當往道之常也非物不進官之制也音義旃之然反疏正義曰周禮孤卿建旃大夫尊故麾旃以招之也逸詩翹翹車乘招我以弓古者聘士以弓故弓以招士也諸侯服皮冠以田虞人掌田獵故皮冠以招虞人也君子韙之注韙是也音義韙于鬼反齊侯至自田晏子侍于遄臺子猶馳而造焉注子猶梁丘據音義田本亦作佃音同遄市專反造七報反公曰唯據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪注燀炊也音義夫音扶焉於虔反羮音庚舊音衡醯呼兮反醢音海烹普庚反煮也燀章善反燃也炊昌垂反疏正義曰醯酢也醢肉醬也梅果實似杏而醋禮記內則炮豚之法云調之以醯醢尚書説命云若作和羮爾惟鹽梅是古人調鼎用梅醢也此説和羮而不言䜴古人未有豉也禮記內則楚辭招魂備論飲食而言不及豉史遊急就篇乃有蕪荑鹽豉蓋秦漢以來始為之耳宰夫和之齊之以味濟其不及以泄其過注濟益也泄減也音義齊才細反又如字泄息列反疏正義曰齊之者使酸鹹適中濟益其味不足者泄減其味大過者君子食之以平其心君臣亦然注亦如羮君所謂可而有否焉注否不可也臣獻其否以成其可注獻君之否以成君可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心故詩曰亦有和羮既戒既平注詩頌殷中宗言中宗能與賢者和齊可否其政如羮敬戒且平和羮備五味異於大羮音義爭爭鬬之爭和齊並如字一讀上戶卧反下才細反鬷嘏無言時靡有爭注鬷總也嘏大也言總大政能使上下皆如和羮音義鬷子工反嘏古雅反總音總疏正義曰詩言殷王中宗非徒身自賢明亦有和羮之臣臣與其君可否相濟如宰夫之和齊羮也此臣既敬戒其事矣既志性和平矣中宗總齊大政自上及下無怨恨之言時民無有相爭鬬訟者也言其上下悉如和羮注正義曰詩商頌烈祖之篇祀中宗之詩也中宗殷王大戊湯之玄孫也有桑榖之異懼而修德殷道復興故表顯之號為中宗殷人祭其廟述其德而歌此詩也言亦有者臣能諫君君能改悔亦者兩相須之意也言中宗能與臣之賢者和齊可否其為政教如宰夫和齊羮之味也敬戒且平言此賢臣之性行也樂記云大羮不和鄭玄云大羮肉湆不調以鹽菜桓二年傳云大羮不致注云大羮肉汁不致五味和羮備五味異於大羮也鬷總嘏大毛詩傳文也言中宗為天子總大政能使上下皆如和羮焉傳引此詩證民無爭心則以時靡有爭謂時無有爭也先王之濟五味注濟成也和五聲也以平其心成其政也聲亦如味一氣注須氣以動音義一氣杜解以為人氣也服云歌氣也疏正義曰服虔云歌氣也杜言須氣以動則一氣不止為歌吹人以氣生動皆由氣彈絲擊石莫不用氣氣是作樂之主故先言之人作諸樂皆須氣以動則與服少異二體注舞者有文武疏正義曰樂之動身體者唯有舞耳文舞執羽籥武舞執干戚舞者有文武之二體三類注風雅頌疏正義曰樂以歌詩為主詩有風雅頌其類各别知三類是風雅頌也一國之事諸侯之詩為風天下之事天子之詩為雅成功告神為頌是三者類别各不同四物注雜用四方之物以成器疏正義曰樂之所用八音之器金石絲竹匏土革木其物非一處能備故雜用四方之物以成器五聲注宮商角徴羽音義五聲宫為君商為臣角為民徵為事羽為物徴張里反疏正義曰漢書律歷志云五聲者宫商角徵羽也所以作樂者諧八音蕩滌人之邪志令其正性移風易俗也五聲和八音諧而樂成商之為言章也物成熟可章度也角觸也物觸地而出戴芒角也宫中也居中央暢四方唱始施生為四聲綱也徴祉也物盛大而蕃祉也羽宇也物聚臧宇覆之也夫聲者中於宫觸於角祉於徴章於商宇於羽故四聲為宫紀也是五聲之名義也聲之清濁凡有五品自然之理也聖人配於五方宫居其中商角徴羽分配四方四時之物春生夏長秋成冬聚取其事而為之名也志又云五聲之本生黃鍾之律九寸為宫或益或損以定商角徴羽九六相生隂陽之應也樂記云宫為君商為臣角為民徴為事羽為物月令春其音角夏其音徵中央土其音宫秋其音商冬其音羽鄭玄云聲始於宫宫數八十一屬土以其最濁君之象也三分宫去一以生徵徴數五十四屬火以其微清事之象也三分徴益一以生商商數七十二屬金以其濁次宫臣之象也三分商去一以生羽羽數四十八屬水以其最清物之象也三分羽益一以生角角數六十四屬木以其清濁中民之象也志言或損或益者下生三分損一上生三分益一九六相生者以九生六是三損一也以六生九是三益一也損益之數清濁之差無可以相凖况以黃鍾九寸自乘為九九八十一定之為宫數因宫而損益以定商角徵羽之差言其相校如此數也唯相凖况耳非言實有此數可用之也六律注黃鍾大簇姑洗㽔賔夷則無射也陽聲為律陰聲為呂此十二月氣音義大音泰簇七豆反㽔人誰反射音亦疏正義曰周禮大師掌六律六吕以合隂陽之聲陽聲黃鍾大簇姑洗㽔賔夷則無射隂聲大吕應鍾南吕林鍾小呂夾鍾月令以小吕為仲呂律歷志云律有十二陽六為律隂六為呂黃帝之所作也黃帝使伶倫自大夏之西昆崘之隂取竹之竅厚均者斷兩節間而吹之以為黃鍾之宫制十二筒以聽鳯凰之鳴其雄鳴為六雌鳴亦六以比黃鍾之宫是為律本黃鍾黃者中之色也鍾者種也天之中數五五為聲聲上宫五聲莫大焉地之中數六六為律律有形有色色上黃五色莫盛焉故陽氣施種於黃泉滋萌萬物為六氣元也以黃色名元氣律者著官聲也始於子在十一月大吕吕旅也言隂大旅助黃鍾宣氣而芽物也位於丑在十二月大簇簇奏也言陽氣大奏地而達物也位於寅在正月夾鍾言隂氣夾助大簇宣四方之氣而出種物也位於卯在二月姑洗洗潔也言陽氣洗物辜潔之也彼注云辜必也位於辰在三月仲吕言微隂始起未成著於其中旅助姑洗宣氣齊物也位於已在四月㽔賔㽔繼也賔道也言陽氣始道隂氣使繼飬物也位於午在五月林鍾林君也言隂氣受任助㽔賔君主種物使長大茂盛也位於未在六月夷則則法也言陽氣正法度而使隂氣夷當傷之物也位於申在七月南吕南任也言隂氣旅助夷則任成萬物也位於酉在八月無射射厭也言陽氣究物而使隂氣畢剝落之終而復始無厭已也位於戌在九月應鍾言隂氣應無射該藏萬物而雜陽閡種也彼注云外閉曰閔位於亥在十月是解六律六呂之名義也如志之言初為律者以竹為之吹其聲也其後則用銅為之以候氣後漢書章帝時零陵文學奚景於隂泠道舜祠下得白玉管是古人或以玉為管也續漢書云候氣之法為土室三重戶閉塗釁必周密布緹縵於室中以木為案每律各一內庳外高從其方位加律其上以葭莩灰實其端案歷而候之其月氣至則灰飛而管通蓋音聲之道與天地之氣通故取律以候氣月令正月律中大簇鄭玄云律者候氣之管以竹為之中猶應也正月氣至則大簇之律應應謂吹灰也是其舊説然也其律吕相生鄭注周禮大師職云黃鍾之初九下生林鍾之初六林鍾又上生大簇之九二大簇又下生南吕之六二南吕又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生㽔賔之九四㽔賔又上生大吕之六四大吕又下生夷則之九五夷則又上生夾鍾之六五夾鍾又下生無射之上九無射又上生中吕之上六周位者象夫妻異位者象子母所謂律取妻而呂生子也子午以東為上生子午以西為下生五下六上乃一終矣鄭玄云同位象夫妻者黃鍾初九林鍾初六及大簇九二南呂六二之類同在初二之位故象夫妻異位象子母者謂林鍾初六生大簇九二初之與二其數不同故為異位象子母律生於呂是為同位故云律取妻呂生於律則為異位故云呂生子言五下者謂林鍾夷則南呂無射應鍾皆是子午以東之管下而生之故云下生六上者謂大呂大簇夾鍾姑洗仲呂㽔賔皆是子午以西之管上而生之故云上生黃鍾為律之首不是餘管所生不入其數上生者三分益一下生者三分減一皆左旋隔八而相生七音注周武王伐紂自午及子凡七日王因此以數合之以聲昭之故以七同其數以律和其聲謂之七音音義七音宫商角徴羽變宫變徵也疏正義曰聲之清濁數不過五而得有七音者終五以外更變為之也賈逵注周語云周有七音謂七律謂七器音也黃鍾為宫大簇為商姑洗為角林鍾為徴南呂為羽應鍾為變宫㽔賔為變徴是五聲以外更加變宫變徵為七音也周語云景王將鑄無射問律於伶州鳩對曰律所以立均出度也古之神瞽考中聲而量之以制度律均鍾百官軌儀故先王貴之王曰七律者何對曰昔武王伐殷嵗在鶉火月在天駟日在析木之津辰在斗柄星在天黿星與辰之位皆在北維我姬氏出自天黿則我皇妣大薑之姪逢公之所馮神也嵗之所在則我周之分野也月之所在辰為農祥我大祖后稷之所經緯也王欲合是五位三所而用之自鶉及駟七列也南北之揆七同也凡神人以數合之以聲昭之數合聲和然後可同也故以七同其數而以律和其聲於是乎有七律也是言周樂有七音之意也五位者嵗月日星辰之位也三所者星與日辰之位是一所也嵗之所在是二所也月之所在是三所也武王以殷之十二月二十八日戊午發師其年嵗星在鶉火之次也其日月合宿於房五度房即天駟之星也日在箕七度箕於次分在析木之津也日月之會謂之辰斗柄斗前也戊午後三日得周二月辛酉朔日月合朔於箕十度在斗前一度是為辰在斗柄也星在天黿者星於五星為水星辰星是也天黿即玄枵次之别名也於是辰星在婺女之宿其分在天黿之宿次也鶉是張星也駟是房星也天宿以右旋為次張翼軫角亢氐房凡七宿是自鶉火至駟為七列宿有七也鶉火在午天黿在子斗柄所建月移一次是自午至子為南北之揆七同也揆度也度量星之有七同也武王既見天時如此因此以數比合之其數有七也以聲昭明之聲亦宜有七也故以七同其數五聲之外加以變宫變徴也此二變者舊樂無之聲或不會而以律和其聲調和其聲使與五音諧會謂之七音由此也武王始加二變周樂有七音耳以前未有七杜言武王伐紂自午及子凡七日者尚書泰誓云戊午王次于河朔又牧誓云時甲子昧爽王朝至于商郊牧野乃誓又武成云戊午時逾孟津癸亥陳于商郊甲子受率其旅若林前徒倒戈攻于後以北血流標杵一戎衣天下大定是自戊午至甲子七日也劉炫云杜既取國語之文以七同其數以律和其聲何為又云自午及子凡七日乎是杜意以武王為七日之故而作樂用七音也違國語之文是杜説謬今知不然者以尚書國語俱有七義事得兩通故杜兼而取之劉以為杜背國語之文而規杜過非也八風注八方之風音義八風易緯通卦驗云東北曰條風東方曰明庶風東南曰清明風南方曰景風西南曰涼風西方曰閶闔風西北曰不周風北方曰廣莫風條風又名融風景風一名凱風疏正義曰易緯通卦驗云立春調風至春分明庶風至立夏清明風至夏至景風至立秋涼風至秋分閶闔風至立冬不周風至冬至廣莫風至調風一名融風十八年傳云是謂融風是調融同也此八方之風以八節而至但八方風氣寒暑不同樂能調隂陽和節氣隱五年傳曰舞所以節八音而行八風故樂以八風相成也八節之風亦與八卦八音相配賈逵云兑為金為閶闔風也乾為石為不周風也坎為革為廣莫風也艮為匏為融風也震為竹為明庶風也巽為木為清明風也離為絲為景風也坤為土為涼風也是先儒依易緯配八風也九歌注九功之德皆可歌也六府三事謂之九功音義六府水火金木土穀三事正德利用厚生也疏正義曰九歌之事尚書大禹謨與文七年傳具有其文以相成也注言此九者合然後相成為和樂清濁小大短長疾徐哀樂剛柔遲速高下出入周疏以相濟也注周密也音義哀樂音洛下及注皆同周疏傳本皆作流然此五句皆相對不應獨作周流古本有作疏者案注訓周為密則與疏相對宜為疏耳疏正義曰周疏以上凡十事皆兩字相對其義相反乃言樂聲如此相反以成音曲猶羮之水火相反人之和而不同也杜訓周為密則疏為希亦相反也俗本疏作流易繫辭云周流六虛仲尼燕居云周流無不遍也涉彼文而誤耳杜既以周為密則流當為疏今定本作流非也君子聽之以平其心心平德和故詩曰德音不瑕注詩豳風也義取心平則德音無瑕闕音義豳彼貧反疏正義曰詩豳風狼跋美周公攝政逺則四國流言近則成王不知周大夫美其不失其聖也云公孫碩膚德音不瑕鄭玄云不瑕言不可疵瑕也今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專一誰能聽之同之不可也如是飲酒樂公曰古而無死其樂若何晏子對曰古而無死則古之樂也君何得焉昔爽鳩氏始居此地注爽鳩氏少皡氏之司寇也音義專如字董遇本作摶音同季萴因之注季萴虞夏諸侯代爽鳩氏者音義萴仕側反夏戶雅反疏注正義曰此相傳説也以逢伯是殷之諸侯此在逢伯之前故以為虞夏時也爽鳩在少皥之世至虞夏歷代多矣未必其間更無他姓據晏之言云代爽鳩氏有逢伯陵因之注逢伯陵殷諸侯薑姓蒲姑氏因之注蒲姑氏殷周之間代逢公者而後大公因之古者無死爽鳩氏之樂非君所願也注齊侯甘於所樂志於不死晏子言古以節其情願音義大音泰爽鳩氏之樂一本作樂之疏正義曰自古者其無死爽鳩至今猶存則此齊地是爽鳩氏得而樂也君不得為齊君不死之事此樂爽鳩氏之有非君所願樂也晏子以爽鳩氏為始故言爽鳩之樂計爽鳩以前處齊地者猶應代有人矣鄭子産有疾謂子大叔曰我死子必為政唯有德者能以寬服民其次莫如猛夫火烈民望而畏之故鮮死焉水懦弱民狎而玩之注狎輕也音義鮮息淺反懦乃亂乃卧二反一音儒狎户甲反玩五亂反則多死焉故寬難注難以治音義治直吏反疾數月而卒大叔為政不忍猛而寬鄭國多盜取人於萑苻之澤注萑苻澤名於澤中劫人音義數所主反萑音丸苻音蒲又如字大叔悔之曰吾早從夫子不及此興徒兵以攻萑苻之盜盡殺之盜少止音義盡殺之本或作盡之殺衍字疏正義曰既言盡殺之復云盜少止者盡謂盡萑苻之內盜也少止謂鄭國餘處之盜由此少止仲尼曰善哉政寬則民慢慢則糾之以猛注糾猶攝也音義紏居黝反猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和詩曰民亦勞止汔可小康惠此中國以綏四方施之以寬也注詩大雅汔其也康綏皆安也周厲王暴虐民勞於苛政故詩人刺之欲其施之以寬音義汔許乙反苛音何毋從詭隨注詭人隨人無正心不可從音義毋本又作無從子用反注同詭九委反以謹無良注謹勑愼也式遏寇虐慘不畏明糾之以猛也注式用也遏止也慘曾也言為寇虐曾不畏明法者亦當用猛政糾治之音義遏於葛反慘七感反柔逺能邇以定我王平之以和也注柔安也邇近也逺者懷附近者各以能進則王室定疏正義曰此詩大雅民勞之篇刺厲王之詩也其下十句詩之文也仲尼分為三假每以一句釋之汔其也康綏皆安也止辭也於是厲王以苛政勞民故言當今之民亦大疲勞止其可以小息之中國京師也四方諸夏也施惠於此京師中國以綏彼諸夏之民此四句者欲其施之以寬也詭隨謂詭人為善隨人小惡此雖惡之小者其事不可舍從也毋得從此詭隨之人以謹勑彼無善之人無善之惡大於詭隨詭隨不從則無善息止是謹勑之也寇虐之惡人又大於無善式用也遏止也慘曾也王當嚴為刑威用止臣民之間有為寇盜苛虐曾不畏明白之刑者此四句者欲其糾之以猛也柔安也邇近也能謂材能也王者當以寬政安慰逺人使之懷附則各以材能自進者是近人也逺者懷而歸近者以能自進用此以定我為王之功此二句者言平之以和也注正義曰釋詁云汔幾也杜以幾其同聲故以汔為其也康綏皆安及下注遏止皆釋詁文也式用慘曾釋言文也又曰不競不絿不剛不柔注詩殷頌言湯政得中和競強也絿急也音義絿音求布政優優百祿是遒注優優和也遒聚也音義遒在由反又子由反和之至也疏正義曰詩商頌長發之篇述成湯之德也湯之為政不大強不大急不大剛不大柔布行政教優優然和綏百種福祿於是聚而歸之言其和之至也競強釋言文也絿急遒聚毛傳文也及子産卒仲尼聞之出涕曰古之遺愛也注子産見愛有古人之遺風疏正義曰案上子大叔悔後已云仲尼曰善哉今方言及子産卒聞之者上所云先美子大叔之善法政用子産生時法也此出涕重美子産身之賢故傳云及子産卒欲顯仲尼美之意也春秋左傳注疏卷四十九春秋左氏傳注疏卷四十九考證曹公孫會自鄸出奔宋臣浩按公羊傳謂會是公子喜時之後是子臧之子也劉敞謂奔未有言自者此言自鄸待放也左既無傳各以意説耳傳春王二月己丑日南至注當言正月己丑朔日南至臣召南按漢書律歷志昭公二十年春王正月距辛亥百三十三嵗是辛亥後八章首也正月己丑朔旦冬至失閏故傳曰二月己丑日南至是杜注所本也又按是年嵗為己卯傳遇公于馬路之衢林堯叟曰馬路衢名傳衛侯賜北宫喜諡曰貞子賜析朱鉏諡曰成子注皆未死而賜諡王應麟困學紀聞曰是人臣生而諡也臣浩聞諸臣何焯曰得宋槧本不全左傳有昭二十年衛侯賜北宫喜事杜注曰皆死而賜諡及墓田傳終言之較近刻少未字而字意頓明義尤協臣浩按王應麟之説非也果若未死賜諡是豫凶事非禮杜當以為譏不應云終言之傳聊攝以東注聊攝齊西界也平原聊城縣東北有攝城臣召南按聊城縣兩漢屬東郡後漢志聊城有聶城引左傳聊攝是也又于樂安國蓼城注引杜預曰縣東北有攝城不亦誤乎聊城之西即衛地所謂齊西界也傳招虞人以弓不進臣浩按此即孟子所謂齊景公招虞人以旌不至者也但此作招以弓耳傳五聲疏唱始施生為四聲綱也各本俱脫施字今依律歷志本文添又疏羽宇也物聚臧宇覆之也各本俱訛作物聚宇而覆之也今改正傳七音疏星與辰之位皆在北維國語本文作星與日辰之位皆在北維日字不可省又疏月之所在是三所也上文既曰三所者星與日辰之位是一所也嵗之所在是二所也則月之所在句下應有是三所也四字監本脫今添補又疏其年嵗星在鶉火之次也其日月合宿於房五度臣召南按其日月合宿於房五度一句理不可解其日即二十八日戊午日也合宿者合朔也此日之月既與日會何以為二十八日乎且既合於房五度矣又何以後三日辛酉朔復會於箕十度也觀下言辛酉朔日月會於箕十度則知此句言戊午之夕月實在房耳日並不在房也豈惟不在房亦並不在心而在尾也戊午之日日在箕七度其夕月在房五度月行一日夜過十三度則二十九日己未之夕在尾九度晦日庚申之夕在箕四度故至辛酉朔旦與日會於箕之十度為南斗之前一度故日辰在斗柄也推尋文義似應作其日之夕月宿房五度傳季萴因之注季萴虞夏諸侯代爽鳩氏者疏此相傳説也臣召南按漢書地理志曰少昊之世有爽鳩氏虞夏時有季萴湯時有逢公柏陵殷末有薄姑氏皆為諸侯國此地至周成王時薄姑氏與四國共作亂成王滅之以封師尚父此即杜注所本非相傳説也傳蒲姑氏因之蒲姑氏地理志作薄姑氏後漢郡國志樂安國博昌有薄姑城薄蒲二字字形相類而字音相轉莫定其孰是傳而後太公因之顔師古曰武王封太公於齊初未得爽鳩之地成王以益之也傳故寬難趙汸補注曰為政用猛非君子之道也或是因太叔所偏而矯之春秋左氏傳注疏卷四十九考證
