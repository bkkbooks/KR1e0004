body:
  text: 春秋左傳注疏卷三十八起襄公二十七年盡二十八年晉杜氏注唐陸德眀音義孔穎達疏經二十有七年春齊侯使慶封來聘注景公即位通嗣君也夏叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋注案傳會者十四國齊秦不交相見邾滕為私屬皆不與盟宋為主人地於宋則與盟可知故經唯序九國大夫楚先晉歃而書先晉貴信也陳于晉會常在衛上孔奐非上卿故在石惡下音義奐呼亂反與音預下同先悉薦反又如字歃所洽反疏注正義曰案傳諸國大夫及諸侯之身至宋者有晉楚齊秦魯衛陳蔡鄭許曹邾滕并宋為主人凡十四國也齊秦不交相見邾滕為人私屬皆不與於盟為盟而為此會故不盟者會亦不序也宋為地主法當不序於列故經唯序九國大夫也案傳楚先晉歃則當先書楚傳言書先晉晉有信也是仲尼貴晉有信故先書趙武也釋例班序譜晉合諸侯二十國起僖二十八年盡哀十四年大率皆陳後次蔡蔡後次衛是陳于晉會常在衛上也今孔奐乃降於蔡衛在石惡之下故知奐非上卿故也成三年傳曰次國之上卿當大國之中中當其下是計卿位為班也知非奐後至者以傳稱與蔡公孫歸生同至故也案傳七月之下乃云庚辰子木等至自陳陳孔奐蔡公孫歸生至則諸侯大夫七月始集於宋而此會書在夏者事雖在秋行還乃告追以叔孫豹發時書之十年夏會于柤而經書在春注云經書春書始行此亦彼之類也衛殺其大夫寧喜注寧喜弒剽立衎衎今雖不以弒剽致討於大義宜追討之故經以國討為文書名也書在宋會下從赴疏注正義曰大夫見殺書名者皆是罪之文案此殺喜之傳乃為専而殺之喜之於衎未為罪當死也故杜迹其應死之狀弒君之賊於法當誅衎雖不以弒剽致討其於大義宜追討之故雖非國人討賊因其被殺亦以國討為文書其名以罪喜也不以弒君之罪討之故言追也衛侯之弟鱄出奔晉注衛侯始者云政由寧氏祭則寡人而今復患其専緩答免餘既負其前信且不能友于賢弟使至出奔故書弟以罪兄音義鱄市轉反又音専復扶又反疏注正義曰釋例曰仲尼因母弟之例以興義鄭伯懷害弟之心天王縱羣臣以殺其弟夫子探書其志故顯書二兄以首惡佞夫稱弟不聞反謀也鄭假去弟身為謀首也然則兄而害弟者稱弟以章兄罪弟又害兄則去弟以罪弟身也推此以觀其餘秦伯之弟針陳侯之弟黃衛侯之弟鱄皆是兄害其弟者也統論其義兄弟二人交相殺害各有曲直書弟則是兄曲也是杜以鱄之出奔非鱄之罪故迹其事以為衛侯罪狀也衛侯始者使鱄與寧喜言云苟得反國政由寧氏祭則寡人如是則寧喜専權未為負約而今公患其専政故免餘請殺公復緩答免餘任令殺喜既負其言信又不能友于賢弟使至出奔故書其弟以罪兄也昭元年秦伯之弟針出奔晉傳曰罪秦伯知此亦罪衛侯也秋七月辛巳豹及諸侯之大夫盟于宋注夏會之大夫也豹不倚順以顯弱命之君而辨小是以自從故以違命貶之釋例論之備矣音義倚於綺反疏注正義曰杜云夏會之大夫者因經書在夏故云夏會其實會在秋耳諸國朝會而因有他事者皆前目而後凡故此不復序而總云諸侯之大夫還是夏會之大夫也豹去叔孫者傳言季孫以公命命豹使視邾滕而叔孫不從不書其族言違公命故貶之也從公之命於理順也不視邾滕其是小也順若之命其禮大不視邾滕為是小豹不倚此順道以顯弱命之君而辨小是以自從故以違命貶之也於時魯國君弱臣強政令出於季氏魯君不得有命臣之理臣之小者季氏以己意命之皆不敢不從也叔孫豹東心強直季氏所憚恐不從己意故假以公命命之諸傳言以公命者實非公命而假稱公耳其時魯君未嘗有命此稱公命是假可知豹雖心知是假若其即以為真共敬從命則國內義士皆將生心必相告云豹是國之大賢我等仰以取法聞是公命雖非亦從則知公之所命悉不可違豈不使季氏懼而公室尊也從公之命是為順也如此雖實非公命豹但倚此順道以從公命則弱命之君命得顯矣尊君卑臣在此一舉比視邾滕未為大失豹乃辨其小是以從己心違君之命故貶之釋例曰季氏専魯祿之去公室三世矣制命出於私門非國所知也叔孫豹魯之賢臣欲匡難以矯時故季孫憚之不敢以己意假公命以敦叔孫也邾滕之班不列於會豹不登朝固請受命而行邾滕降次事非機危既不馳請又不辭會而率意改命失命之甚其君眠食於深宫今一出命共命之使所宜崇長雖有小失遂而伸之國內固知我君之命不可以違則季氏有懼而義士生心君子以豹不倚順以顯弱命之君而辨小是以自從故以違命貶之也杜言辨小是者豹云宋衛吾匹不視邾滕於理是也但比於申弱君之命使臣卑而君尊此為小耳冬十有二月乙亥朔日有食之注今長歷推十一月朔非十二月傳曰辰在申再失閏若是十二月則為三失閏故知經誤疏注正義曰此經言十二月而傳言十一月今杜以長歷推之乙亥是十一月朔非十二月也傳曰辰在申再失閏矣若是十二月當為辰在亥以申為亥則是三失閏非再失也推歷與傳合知傳是而經誤也傳二十七年春胥梁帶使諸喪邑者具車徒以受地必周注諸喪邑謂齊魯宋也周密也必密來勿以受地為名音義喪息浪反注同使烏餘具車徒以受封注烏餘以地來故詐許封之疏正義曰必使烏餘具車徒者以三國皆具車徒若不使亦具車徒恐其驚而覺也且烏餘竊邑諸侯不能治之則烏餘之衆強也慮其迸散欲聚以執之下云盡獲之是也烏餘以其衆出注出受封也使諸侯偽效烏餘之封者注效致也使齊魯宋偽若致邑封烏餘者而遂執之盡獲之注皆獲其徒衆皆取其邑而歸諸侯諸侯是以睦於晉注傳言趙文子賢故平公雖失政而諸侯猶睦疏正義曰古夲亦有不重言諸侯者今定夲重有諸侯若重言諸侯則天下諸侯以此事故皆睦於晉也劉炫云晉宋古夲皆不重言諸侯則唯謂齊魯宋三國睦耳不重是也齊慶封來聘其車美孟孫謂叔孫曰慶季之車不亦美乎注季慶封字叔孫曰豹聞之服美不稱必以惡終美車何為叔孫與慶封食不敬為賦相鼠亦不知也注相鼠詩鄘風曰相鼠有皮人而無儀人而無儀不死何為慶封不知此詩為已言其暗甚為眀年慶封來奔傳音義稱尺證反為賦于偽反注同相息亮反注同鄘音容衛寧喜専公患之公孫免餘請殺之注免餘衛大夫公曰微寧子不及此注及此反國也吾與之言矣注言政由寧氏事未可知注恐伐之未必勝祗成惡名止也注祗適也音義祗音支注同對曰臣殺之君勿與知乃與公孫無地公孫臣謀注二公孫衛大夫音義勿與音預使攻寧氏弗克皆死注無地及臣皆死公曰臣也無罪父子死余矣注獻公出時公孫臣之父為孫氏所殺疏注正義曰十四年傳曰公使子蟜子伯子皮與孫子盟于丘宫孫子皆殺之彼所殺者皆是公子而此臣是公孫公言臣也無罪父子死余知是爾時死耳亦不知彼所殺者誰是臣之父也夏免餘復攻寧氏殺寧喜及右宰榖尸諸朝注榖不書非卿也音義復扶又反石惡將會宋之盟受命而出衣其尸枕之股而哭之欲斂以亡懼不免且曰受命矣乃行注行會于宋為眀年石惡奔傳音義衣於既反枕之鴆反斂力驗反子鮮曰逐我者出注謂孫林父納我者死注謂寧喜音義納夲又作內音納賞罰無章何以沮勸君失其信而國無刑不亦難乎注難以治國音義沮在呂反疏正義曰逐我者應死而得生出納我者有功而更身死章眀也沮止也罰有罪所以止人為惡賞有功所以勸人為善今賞罰既無章眀何以得為止勸乎刑法也君失其信違信而殺寧喜而國無法賞罰無所章眀以此為國不亦難乎言治國難也且鱄實使之注使寧喜納君遂出奔晉公使止之不可注不肯留及河又使止之止使者而盟於河注誓不還音義使者所吏反託於木門注木門晉邑不鄉衛國而坐注怨之深也音義鄉許亮反夲亦作嚮木門大夫勸之仕不可曰仕而廢其事罪也從之昭吾所以出也將誰訴乎注從之謂治其事也事治則眀己出欲仕無所自訴音義訴息路反吾不可以立於人之朝矣終身不仕注自誓不仕終身疏注正義曰終身不仕敘事辭也言自誓不仕以終其身故傳言終身不仕也此終身者子鮮之身終也下云公喪之終身者獻公之身終也獻公以二十九年夏卒其子鮮之卒蓋差在獻公之前耳故公喪服以終身也公喪之如稅服終身注稅即繐也喪服繐縗裳縷細而希非五服之常夲無月數痛愍子鮮故特為此服此服無月數而獻公尋薨故言終身音義喪息郎反又息浪反稅徐云讀繐音嵗注同服音吐外反縗夲亦作衰音七雷反疏注正義曰傳云公喪之者言公為之服喪服也禮無稅服之名如稅服者不知何服也服虔云衰麻已除日月已過乃聞喪而服是為稅服服之輕者案禮記過而追服實名為稅以聞凶之日為服喪之始其服過追而服之衰麻不為有異何云服之輕者公若依彼稅服法其兄弟之服則還是齊衰期耳何以得云如也杜以言義不通故云稅即繐也當是聲相近而字改易耳喪服有繐衰裳牡麻絰既葬除之其章唯有諸侯大夫為天子以外無人服此服也喪服傳曰繐衰者小功之繐也鄭玄云治縷如小功而成布四升半細其縷者以恩輕升數少者以服至尊凡布細而踈者謂之繐是繐者縷細而希踈也喪服之文在大功之下小功之上是非五服之常也既葬除之是夲無月數也禮天子諸侯絶旁期計公於子鮮不應為之服獻公痛愍子鮮特為服此服也此服既無月數獻公服之不自云幾月當止獻公尋自身薨至死未釋此服故云終身也兄弟之服夲服期耳獻公驕淫之君不應過其常月杜言獻公尋薨謂此子鮮之卒差在獻公前耳公與免餘邑六十辭曰唯卿備百邑臣六十矣下有上祿亂也注此一乘之邑非四井之邑論語稱千室又云十室眀通稱音義乘繩證反通稱尺證反疏注正義曰司馬法成方十里出革車一乘此一乘之邑每邑方十里也論語云百乘之家大夫之家邑有百乘是百乘為采邑之極此云唯卿備百邑知所言邑者皆是一乘之邑非四井之邑也杜以一乘名邑書傳無文故引論語千室十室眀其大小通稱邑也臣弗敢聞且寧子唯多邑故死臣懼死之速及也公固與之受其半以為少師公使為卿辭曰太叔儀不二能贊大事注贊佐也音義少詩照反君其命之乃使文子為卿注文子太叔儀宋向戌善於趙文子又善於令尹子木欲弭諸侯之兵以為名注欲獲息民之名音義弭徐武婢反如晉告趙孟趙孟謀於諸大夫韓宣子曰兵民之殘也財用之蠧注蠹害物之蟲音義蠹夲又作蠹丁故反疏正義曰釋蟲云蝎桑蠹李巡云蝎木蟲也穆天子傳云天子蠹書於羽陵曝去書內簡中之蟲是蟲在木中謂之為蠧昭三年傳云公聚朽蠹則在諸物之中皆名為蠹故云害物之蟲也害物之蟲既名為蠹故害於物者皆以蠹言之孫子兵書云興軍十萬日費千金是兵為財用之蠹也小國之大災也將或弭之雖曰不可必將許之注言雖知兵不得久弭今不可不許音義災音災弗許楚將許之以召諸侯則我失為盟主矣晉人許之如楚楚亦許之如齊齊人難之陳文子曰晉楚許之我焉得已且人曰弭兵而我弗許則固攜吾民矣將焉用之齊人許之告於秦秦亦許之皆告於小國為會於宋五月甲辰晉趙武至於宋丙午鄭良霄至六月丁未朔宋人享趙文子叔向為介司馬置折爼禮也注折爼體解節折升之於爼合卿享宴之禮故曰禮也周禮司馬掌會同之事音義難之乃旦反下懼難同焉於虔反下將焉用焉能皆同介音界後注同折之設反注同徐又音制爼莊吕反疏正義曰折爼謂體解節折升之於爼周語文也宣十六年傳曰王享有體薦宴有折爼公當享卿當宴王室之禮也彼傳之意言享公當依享法有體薦也享卿當如宴法有折俎也彼王自言之故云王室禮耳其諸侯之待公卿禮法亦當然也故此享趙孟而置折爼合卿享宴之禮故曰禮也周禮大司馬云大會同則帥士庶子而掌其政令大祭祀饗食羞牲魚是司馬掌會同薦羞之事故宋人此享令司馬置折爼也仲尼使舉是禮也以為多文辭注宋向戌自美弭兵之意敬逆趙武趙武叔向因享宴之會展賔主之辭故仲尼以為多文辭音義使舉是禮也沈云舉謂記録之也疏正義曰此文甚略夲意難知蓋於此享也賔主多有言辭時人迹而記之仲尼見其事善其言使弟子舉是宋享趙孟之禮以為後人之法丘眀述其意仲尼所以特舉此禮者以為此享多文辭以文辭可為法故特舉而施用之注正義曰杜以賔主之辭禮有定式於此享也何以獨多故解其多辭之意服虔云以其多文辭故特舉而用之後世謂之孔氏聘辭以孔氏有其辭故傳不復載也所言孔氏聘辭不知事何所出實享禮而謂之為聘舉舊辭而目曰孔氏事亦不必然也戊申叔孫豹齊慶封陳須無衛石惡至注須無陳文子甲寅晉荀盈從趙武至注趙武命盈追已故言從趙武後武遣盈如楚疏正義曰沈氏曰知非晉侯命者若是晉侯應云甲寅荀盈至今云從武至故知趙武命也杜云後武遣盈如楚見此意耳丙辰邾悼公至注小國故君自來壬戌楚公子黑肱先至成言於晉注時令尹子木止陳遣黑肱就晉大夫成盟載之言兩相然可音義肱古𢎞反丁卯宋向戌如陳從子木成言於楚注就於陳成楚之要言戊辰滕成公至注亦小國君自來子木謂向戌請晉楚之從交相見也注使諸侯從晉楚者更相朝見音義更音庚見賢遍反庚午向戌復於趙孟趙孟曰晉楚齊秦匹也晉之不能於齊猶楚之不能於秦也注不能服而使之楚君若能使秦君辱於敝邑寡君敢不固請於齊注請齊使朝楚壬申左師復言於子木子木使驛謁諸王注驛傳也謁告也音義驛人實反傳涉戀反王曰釋齊秦他國請相見也注經所以不書齊秦秋七月戊寅左師至注從陳還是夜也趙孟及子晳盟以齊言注子晳公子黑肱素要齊其辭至盟時不得復訟爭音義晳星歷反復扶又反庚辰子木至自陳陳孔奐蔡公孫歸生至注二國大夫與子木俱至曹許之大夫皆至以藩為軍注示不相忌音義藩方元反疏正義曰古人行兵止則築為壘塹以備不虞此藩籬為軍者方欲弭兵以示不相忌也晉楚各處其偏注晉處北楚處南伯夙謂趙孟曰注伯夙荀盈疏注正義曰伯夙即是荀盈於傳亦無眀據未測何以知之服虔云伯夙晉大夫其意以為别有伯夙非荀盈也楚氛甚惡懼難注氛氣也言楚有襲晉之氣音義氛芳云反徐扶云反趙孟曰吾左還入於宋若我何注營在宋北東頭為上故晉營在東有急可左回入宋東門辛巳將盟於宋西門之外楚人衷甲注甲在衣中欲因會擊晉音義衷音中徐丁仲反伯州犂曰合諸侯之師以為不信無乃不可乎夫諸侯望信於楚是以來服若不信是棄其所以服諸侯也固請釋甲子木曰晉楚無信久矣事利而已苟得志焉焉用有信大宰退注大宰伯州犂告人曰令尹將死矣不及三年求逞志而棄信志將逞乎志以發言言以出信信以立志參以定之注志言信三者具而後身安存信亡何以及三注為眀年子木死起夲疏正義曰志將逞乎言其不得逞也在心為志出口為言志有所之言乃出口故志以發言也與人為信必言以告之故言以出信也於人有信志乃得立故信以立志也人之處身於世常恐不得安定參即三也言也信也志也三者俱備然後身得安定欲安其身用此三者以定之信亡則志不立失志必死不久何以得及三年趙孟患楚衷甲以告叔向叔向曰何害也匹夫一為不信猶不可單斃其死注單盡也斃踣也音義單音丹注同斃婢世反踣蒲北反疏正義曰匹夫謂賤人也賤人一為不信猶尚不可况國卿也不信之人盡踣其死言無得生者前覆曰踣謂倒地死也若合諸侯之卿以為不信必不捷矣食言者不病注不病者單斃於死疏正義曰不病者不唯病害而已必至於死也言之不用若食之消散故謂無信為食言也非子之患也注楚食言當死晉不食言故無患夫以信召人而以僭濟之注濟成也音義僭子念反不信也必莫之與也安能害我且吾因宋以守病注為楚所病則欲入宋城則夫能致死與宋致死雖倍楚可也注宋為地主致死助我則力可倍楚音義夫如字或音扶子何懼焉又不及是曰弭兵以召諸侯而稱兵以害我注稱舉也疏正義曰夫謂宋也宋能致死助我今晉師與宋致死不但唯敵於楚雖更力倍於楚可也子何須懼焉又想楚人之情不應及是之惡吾庸多矣非所患也注晉獨取信故其功多季武子使謂叔孫以公命曰視邾滕注兩事晉楚則貢賦重故欲比小國武子恐叔孫不從其言故假公命以敦之疏注正義曰案傳上文六月戊申叔孫豹至丁卯向戌如陳從子木成言於楚子木乃請晉楚之從交相見則叔孫發魯之時未有此交相見之議也子木既有此請季孫在國聞之季孫使謂叔孫者使人就宋謂之也於時季氏專魯國之利害季孫所量自慮兩屬貢賦必重疑邾滕將為人之私故令豹比視小國此直季孫意耳非公意也若是餘人為使季孫以己意命之無敢違者但叔孫強直季孫所憚告以已意恐不見從故假稱公命以敦勸之望其敬公命而遂已志也長歷丁卯是六月二十一日也辛巳是七月五日也丁卯已有此議辛巳乃始結盟則叔孫既得公命其去盟日猶逺反魯復請足得往來但叔孫知非公命不復更請臨盟則率已之意自從所欲故釋例云豹不登朝固請受命而行邾滕降次事非機危既不馳請又不辭會率意改命失命之甚是言其間定得反請而叔孫不請故責之也既而齊人請邾宋人請滕皆不與盟注私屬二國故音義與音預叔孫曰邾滕人之私也我列國也何故視之宋衛吾匹也乃盟故不書其族言違命也注季孫専政於國魯君非得有命今君唯以此命告豹豹宜崇大順以顯弱命之君而遂其小是故貶之疏注正義曰季孫専政於國魯君非得有命此以公命非公可知叔孫亦知非公命故不肯從之其實叔孫違命止違季孫意耳但季孫假以公命謂之叔孫雖內知非公而其辭稱公即須從命叔孫既得此命宜應內自思省我君由來無命今君唯以此命命我事雖非理亦宜聽從如是則敬君之情深矣豹宜崇此大順之道以顯弱命之君而乃校計公言是非不肯同於小國遂其小是以忘大順故貶之此義至妙唯杜始得之矣賈逵云叔孫義也魯疾之非也服虔云叔孫欲尊魯國不為人私雖以違命見貶其於尊國之義得之案經去其族是文貶也傳言違命是實惡也賈服違經反傳背左氏異孔子孔子貶之賈逵賞之丘眀言其違命服虔善其尊國是不以丘眀之言解左傳不以孔子之意説春秋也晉楚爭先注爭先歃血晉人曰晉固為諸侯盟主未有先晉者也楚人曰子言晉楚匹也若晉常先是楚弱也且晉楚狎主諸侯之盟也久矣注狎更也音義先晉悉薦反或如字狎户甲反更音庚疏正義曰陳蔡鄭許乍南乍北成二年楚公子嬰齊為蜀之盟諸夏之國大夫皆在是晉楚更代主諸侯之盟實久也豈専在晉叔向謂趙孟曰諸侯歸晉之德只注只辭音義只之氏反非歸其尸盟也注尸主也子務德無爭先且諸侯盟小國固必有尸盟者注小國主辨具音義辨皮莧反疏注正義曰盟實大國為主而此云小國主盟知其主辨具也哀十七年公會齊侯盟于蒙孟武伯問於髙柴曰諸侯盟誰執牛耳季羔曰鄫衍之役吳公子姑曹發陽之役衛石魋武伯曰然則彘也所言主辨具者如彼執牛耳之類皆小國主備之法當小國執牛耳鄫衍吳公子執之者於時吳為盟主夷不知禮故自使其人執之也盟法大國制其言小國尸其事此盟爭先歃不爭主備叔向以小國主盟為言者叔向以久爭不決或將戰鬪因盟時小國有所主欲令趙孟下楚假此以勸之耳楚為晉細不亦可乎注欲推使楚主盟乃先楚人書先晉晉有信也注蓋孔子追正之壬午宋公兼享晉楚之大夫趙孟為客注客一坐所尊故季孫飲大夫酒臧紇為客音義坐才卧反飲於鴆反疏注正義曰享宴之禮賔旅雖多特以一人為客燕禮者諸侯燕臣之禮也經云小臣納卿大夫卿大夫皆入門右北面東上乃云射人請賔公曰命某為賔賔出立于門外更使射人納賔公降一等揖之賔即客也是客一坐所尊也季孫飲大夫酒臧紇為客二十三年傳也魯語云公父文伯飲南宫敬叔酒路堵父為客羞鱉小堵父怒相延食鱉辭曰將使鱉長而食之遂出文伯母聞之怒曰吾聞之先子曰祭養上尸享養上賔鱉於何有而使夫人怒也是一坐所尊敬之事也案燕禮記曰與卿燕則大夫為賔與大夫燕亦大夫為賔又聘禮燕聘賔則以上介為賔此宋公享大夫以趙孟為客者燕禮謂與己之臣子燕嫌卿敵公故以大夫為賔聘禮據特來聘者敬其使人故使介為賔此則兼享晉楚大夫異於常禮以尊敬霸主之國故令趙孟為客服虔云楚君恆以大夫為賔者大夫卑雖尊之猶逺君也楚先歃為盟主故尊趙孟為客案此享宋為主非楚為主服之妄也劉炫云兼享晉楚之大夫不以屈建為賔者賔唯一人出自當時意耳子木與之言弗能對使叔向侍言焉子木亦不能對也疏正義曰上云晉卿不如楚其大夫則賢是也乙酉宋公及諸侯之大夫盟于蒙門之外注前盟諸大夫不敢敵公禮也今宋公以近在其國故謙而重盟重盟故不書蒙門宋城門音義重直用反下二字同子木問於趙孟曰范武子之德何如注士會賢聞於諸侯故問之音義聞音問又如字對曰夫子之家事治言於晉國無隱情其祝史陳信於鬼神無愧辭注祝陳馨香德足副之故不愧音義治直吏反愧九位反子木歸以語王王曰尚矣哉注尚上也音義語魚據反下同能歆神人注歆享也使神享其祭人懷其德音義歆所金反宜其光輔五君以為盟主也注五君謂文襄靈成景疏注正義曰晉語訾祏對范宣子曰武子佐文襄諸侯無二心為卿以輔成景軍無敗政及為元帥居大傅國無姦民是以受隨范是其光輔五君也服虔云文公為戎右襄靈為大夫成公為卿景公為大傳也子木又語王曰宜晉之伯也有叔向以佐其卿楚無以當之不可與爭晉荀盈遂如楚涖盟注重結晉楚之好音義好呼報反鄭伯享趙孟于垂隴注自宋還過鄭音義隴力勇反子展伯有子西子産子大叔二子石從注二子石印假公孫假音義從才用反趙孟曰七子從君以寵武也請皆賦以卒君貺武亦以觀七子之志注詩以言志子展賦草蟲注草蟲詩召南曰未見君子憂心忡忡亦既見止亦既覯止我心則降以趙孟為君子音義蟲直忠反召上照反下同忡勑忠反覯古豆反降户江反又如字下注同趙孟曰善哉民之主也注在上不忘降故可以主民抑武也不足以當之注辭君子伯有賦鶉之賁賁注鶉之賁賁詩鄘風衛人刺其君淫亂鶉鵲之不若義取人之無良我以為兄我以為君也音義鶉順倫反賁音奔疏注正義曰伯有賦此詩者義取人之無善行者我以此為君是有嫌君之意於時鄭簡公是穆公之玄孫良霄是穆公之曽孫君非良霄之兄杜言並取人之無良我以為兄者因詩成文故連言之劉君以為非兄而規杜非也趙孟曰牀第之言不踰閾况在野乎非使人之所得聞也注第簀也此詩刺淫亂故云牀第之言閾門限使人趙孟自謂音義第測里反閾音域徐况逼反使所吏反注同簀音責疏注正義曰釋器云簀謂之第孫炎曰牀也郭璞曰牀版也然則牀是大名簀是牀版檀弓云大夫之簀與簀名亦得統牀故孫炎以為牀也子西賦黍苗之四章注黍苗詩小雅四章曰肅肅謝功召伯營之烈烈征師召伯成之比趙孟於召伯趙孟曰寡君在武何能焉注推善於其君子産賦隰桑注隰桑詩小雅義取思見君子盡心以事之曰既見君子其樂如何音義盡津忍反樂音洛下注及文至樂以安民並同趙孟曰武請受其卒章注卒章曰心乎愛矣遐不謂矣中心藏之何日忘之趙武欲子産之見規誨子大叔賦野有蔓草注野有蔓草詩鄭風取其邂逅相遇適我願兮音義蔓音萬邂户邁反逅户逗反趙孟曰吾子之惠也注大叔喜於相遇故趙孟受其惠印假賦蟋蟀注蟋蟀詩唐風曰無以大康職思其居好樂無荒良士瞿瞿言瞿瞿然顧禮儀音義印一忍反蟀所律反大康音泰居音據好呼報反下同瞿瞿居什反趙孟曰善哉保家之主也吾有望矣注能戒懼不荒所以保家疏正義曰大夫稱主言是守家之主不忘族也下云數世之主亦然公孫假賦桑扈注桑扈詩小雅義取君子有禮文故能受天之祐音義祜音户趙孟曰匪交匪敖福將焉往注此桑扈詩卒章趙孟因以取義音義敖五報反焉於虔反下政其焉往同若保是言也欲辭福祿得乎卒享文子告叔向曰伯有將為戮矣詩以言志志誣其上而公怨之以為賔榮注言誣則鄭伯未有其實趙孟倡賦詩以自寵故言公怨之以為賔榮音義倡昌亮反疏正義曰在心為志發言為詩是詩所以言人之志意也鄭君實未有罪伯有稱人之無良是誣其上也但伯有不臣被公之所怒以公怨怒當自須掩蓋而賦詩道公無良反將公之所怨以為賔之榮寵劉炫云而公顯然將比來之怨以為對賔之榮樂也其能久乎幸而後亡注言必先亡叔向曰然已侈所謂不及五稔者夫子之謂矣注稔年也為三十年鄭殺良霄傳音義侈昌氏反又户氏反字林充豉反稔而甚反熟也穀一熟故為一年文子曰其餘皆數世之主也子展其後亡者也在上不忘降注謂賦草蟲曰我心則降音義數所主反印氏其次也樂而不荒注謂賦蟋蟀曰好樂無荒樂以安民不淫以使之後亡不亦可乎疏正義曰印假賦蟋蟀義取好樂無荒即不淫也好樂則用樂以安民也其使民也又不淫以使之民皆愛之守位必固在人後亡不亦可乎宋左師請賞曰請免死之邑注欲宋君稱功加厚賞故謙言免死之邑也疏注正義曰服虔云向戌自以止兵民不戰鬬自矜其功故求免死之賞也如服此言免死謂止兵不鬬民免死也杜以為謙則向戌自以為已免死也若使計謀不當則罪合死自矜其功言已得免死故請賞邑也公與之邑六十以示子罕子罕曰凡諸侯小國晉楚所以兵威之畏而後上下慈和慈和而後能安靖其國家以事大國所以存也無威則驕驕則亂生亂生必滅所以亡也天生五材注金木水火土也民並用之廢一不可誰能去兵兵之設久矣所以威不軌而昭文德也聖人以興注謂湯武音義去起吕反下皆同亂人以廢注謂桀紂廢興存亡昏眀之術皆兵之由也而子求去之不亦誣乎以誣道蔽諸侯罪莫大焉縱無大討而又求賞無厭之甚也削而投之注削賞左師之書音義蔽必世反徐亡世反服虔王肅董遇並作弊婢世反云踣也厭於鹽反徐於廉反疏正義曰言之術者謂德刑禮義是興存盛眀之法術也驕淫殘虐是廢亡昏暗之法術也皆兵之由者謂皆畏懼此兵行善不行惡畏之則興不畏則亡故云皆兵之由也言不亦誣乎者謂廢興存亡悉皆由兵向戌之意以廢興存亡不須用兵是實須而誣罔云不須故云不亦誣乎服虔曰蔽踣也一曰罷也則知服夲作弊王肅董遇夲皆作蔽謂以誣人之道掩諸侯也杜夲作蔽當如王董為蔽掩之也削而投之正義曰宋公賞邑書之於札向戌執之以示子罕子罕削其字而又投之於地也向戌初謀此事子罕不即止之而至此始怒者蓋初謀子罕不知或子罕初亦不覺久思乃知其非也左師辭邑向氏欲攻司城注司城子罕左師曰我將亡夫子存我德莫大焉又可攻乎君子曰彼已之子邦之司直注詩鄭風司主也音義己音記樂喜之謂乎注樂喜子罕也善其不阿向戌何以恤我我其收之注逸詩恤憂也收取也向戌之謂乎注善向戌能知其過齊崔杼生成及強而寡注偏喪曰寡寡特也音義喪息浪反娶東郭薑生眀東郭薑以孤入曰棠無咎注無咎棠公之子音義娶七住反無咎音無夲亦作無咎其九反與東郭偃相崔氏注東郭偃薑之弟音義相息亮反崔成有疾而廢之注有惡疾也疏注正義曰若非惡疾猶堪為後以疾而廢明是惡疾疾之惡者也不知其何疾也論語稱伯牛有疾不欲見人淮南子云伯牛癩此崔成猶能作亂未必是癩也強無疾亦不得立者愛後妻欲立明故也而立明成請老于崔注濟南東朝陽縣西北有崔氏城成欲居崔邑以終老音義朝如字一音直遙反崔子許之偃與無咎弗子曰崔宗邑也必在宗主注宗邑宗廟所在宗主謂崔明成與強怒將殺之告慶封曰夫子之身亦子所知也唯無咎與偃是從父兄莫得進矣大恐害夫子敢以告注夫子謂崔杼疏正義曰成強是崔杼之子而云父兄者成強之意以崔杼任無咎與偃棄逺宗族不可自斥於已故舉宗族父兄也慶封曰子姑退吾圗之告盧蒲嫳注嫳慶封屬大夫封以成強之言告嫳音義嫳普結反徐敷結反盧蒲嫳曰彼君之讐也天或者將棄彼矣彼實家亂子何病焉注君謂齊莊公為崔杼所弒崔之薄慶之厚也注崔敗則慶専權他日又告注成強復告音義復扶又反慶封曰苟利夫子必去之難吾助女九月庚辰崔成崔強殺東郭偃棠無咎於崔氏之朝崔子怒而出其衆皆逃求人使駕不得使圉人駕寺人御而出注圉人飬馬者寺人奄士音義難乃旦反女音汝圉魚吕反且曰崔氏有福止余猶可注恐滅家禍不止其身遂見慶封慶封曰崔慶一也注言如一家是何敢然請為子討之使盧蒲嫳帥甲以攻崔氏崔氏堞其宫而守之注堞短垣使其衆居短垣內以守音義請為于偽反下注嫳為為齊莊同堞音牒徐養涉反疏正義曰謂新築女墻而守之弗克使國人助之遂滅崔氏殺成與強而盡俘其家其妻縊注妻東郭薑嫳復命於崔子且御而歸之注嫳為崔子御至則無歸矣乃縊注終入於其宫不見其妻凶崔眀夜辟諸大墓注開先人之冢以藏之音義辟婢亦反徐甫亦反辛巳崔眀來奔慶封當國注當國秉政楚薳罷如晉涖盟注罷令尹子蕩報荀盈也音義罷音皮晉侯享之將出賦既醉注既醉詩大雅曰既醉以酒既飽以德君子萬年介爾景福以美晉侯比之太平君子也叔向曰薳氏之有後於楚國也宜哉承君命不忘敏子蕩將知政矣敏以事君必能飬民政其焉往注言政必歸之崔氏之亂注在二十五年申鮮虞來奔僕賃於野以喪莊公注為齊莊公服喪音義賃女鴆反以喪如字又息浪反冬楚人召之遂如楚為右尹注傳言楚能用賢十一月乙亥朔日有食之辰在申司歷過也再失閏矣注謂斗建指申周十一月今之九月斗當建戍而在申故知再失閏也文十一年三月甲子至今年七十一嵗應有二十六閏今長歷推得二十四閏通計少再閏釋例言之詳矣疏注正義曰斗建從甲至癸十者謂之日從子至亥十二者謂之辰傳言辰在申者謂其日昏時斗柄所指於十二辰為在申也九月當建戌而建申故為再失閏也文十一年三月至今七十一嵗應有二十六閏者歷法十九年為一章章有七閏從文十一年至襄十三年凡五十七年已成三章當有二十一閏又從襄十四年至今為十四年又當有五閏故為應有二十六閏也長歷推得二十四閏者杜以長歷實於其間分置二十四閏釋例云閏者會集數年餘日因宜以安之故閏月無中氣斗建斜指兩辰之間也魯之司歷漸失其閏至此年日食之月以儀審望知斗建之在申斗建在申乃是周家九月也而其時歷稱十一月故知再失閏也於是始覺其謬遂頓置兩閏以應天正以敘事期然則前閏月為建酉後閏月為建戌十二月為建亥而嵗終焉是故明年經書春無氷傳以為時災也若不復頓置二閏則明年春是今之九月十月十一月也今之九月十月十一月無氷非天時之異無緣總書春也尋案今世所謂魯歷者不與春秋相符殆來世好事者為之非真也今俱不知其法術俱依春秋經傳反覆其終始以求之近得其實矣杜言以儀審望者太史鑄銅作渾天儀列二十八宿之度設機關候望以測七曜所在故於彼鑄銅儀而審望之知此月斗建申也長歷稱大凡經傳有七百七十九日漢末宋仲子集七歷以考春秋魯歷得五百二十九日失二百五十日是其不與春秋相符也劉炫云逺取文十一年三月甲子者以三十年絳縣老人云臣生之嵗正月甲子朔以全日故又云言通計者若據前閏以來短計不得有再失之理今逺從文十一年以來計之是為通計也經二十有八年春無氷注前年知其再失閏頓置兩閏以應天正故此年正月建子得以無氷為災而書音義應應對之應夏衛石惡出奔晉注寧喜之黨書名惡之音義惡之烏路反邾子來朝秋八月大雩仲孫羯如晉注告將朝楚音義羯居謁反冬齊慶封來奔注崔杼之黨耆酒荒淫而出書名罪之自魯奔吳不書以絶位不為卿音義耆市志反十有一月公如楚注為宋之盟故朝楚音義為于偽反十有二月甲寅天王崩注靈王也乙未楚子昭􅌰注康王也十二月無乙未日誤疏注正義曰甲寅之後四十二日始得乙未則甲寅乙未不得同月長歷推此年十二月戊戌朔甲寅是十七日其月無乙未也經有十一月十二月月不容誤知日誤也傳二十八年春無氷梓慎曰今兹宋鄭其飢乎注梓慎魯大夫今年鄭遊吉宋向戌言之眀年飢甚傳乃詳其事音義梓音子疏注正義曰此年傳鄭遊吉云嵗之不易宋向戌云飢寒之不恤是今年言之也眀年傳云鄭飢子皮餼國人粟於是宋亦飢子罕請於平公出公粟以貸是詳其事也嵗在星紀而淫於玄枵注嵗嵗星也星紀在丑斗牛之次玄枵在子虛危之次十八年晉董叔曰天道多在西北是嵗嵗星在亥至此年十一嵗故在星紀眀年乃當在玄枵今已在玄枵淫行失次音義枵許驕反疏注正義曰左傳及國語所云嵗在者皆謂嵗星所在故云嵗嵗星也五星者五行之精也歷書稱木精曰嵗星火精曰熒惑土精曰鎮星金精曰大白水精曰辰星此五者皆右行於天二十八宿則著天不動故謂二十八宿為經五星為緯言若織之經緯然也天有十二次地有十二辰丑子亥北方之辰也次之與辰上下相值故云星紀在丑玄枵在子釋天云星紀斗牽牛也玄枵虛也孫炎曰星紀日月五星之所終始也故謂之星紀虛在正北北方色玄故曰玄枵枵之言耗耗虛之意也漢書律歷志云星紀初斗十二度終於婺女七度玄枵初婺女八度終於危十五度是星紀為斗牛之次玄枵為虛危之次也九年傳稱晉侯問公生嵗乃曰十二年矣是謂一終一星終也言嵗星大率十二年而一周天也十八年晉董叔曰天道多在西北是言其年嵗星在亥也嵗星右行於天至此年十一年耳行未及周故此年嵗星常法當在星紀明年乃當在玄枵今年已在玄枵是其淫行失次也漢書律歷志載劉歆三統歷歆以為嵗星一百四十四年行天一百四十五次一千七百二十八年為嵗星嵗數言數滿此年例得行天一周也三統之歷以庚戌為上元此年距上元積十四萬二千六百八十六嵗置此嵗數以嵗星嵗數一千七百二十八除之得積終八十二去之嵗餘九百九十以一百四十五乘嵗餘得十四萬三千五百五十以一百四十四除之得九百九十六為積次不盡一百二十六為次餘以十一除之得八十三去之盡是為此年更發初在星紀也欲知此入次度者以次餘一百二十六乘一次三十度以百四十四除之得二十六度餘是嵗星夲平行此年之初已入星紀之次二十六度餘當在婺女四度於法未入於玄枵也傳言淫於玄枵未知己在玄枵幾度此舉其大率耳而五星之次行有遲有疾有留伏逆順於歷法更自别有推步之術此不可詳也以有時災隂不堪陽注時災無氷也盛隂用事而溫無氷是隂不勝陽地氣發泄音義災音災注同泄息列反下同疏注正義曰傳先言無氷乃載梓慎之語則梓慎之語為無氷而發知時災謂春無氷也言以有時災者以此嵗星淫行之年而有天時溫暖之災四時之序冬月當寒故溫則為災害也冬月盛隂用事隂寒在地當遏陽使不出時應寒而溫無氷是隂陽相競隂氣不能勝陽故陽氣出地地氣發泄而使時溫無氷也嵗星自淫行天時自溫暖其溫不由嵗星梓慎以其年有二事而總言其占耳服虔云嵗為陽玄枵為隂嵗乘隂進至玄枵隂不勝陽故溫無氷按下云蛇乘龍乃謂玄枵乘嵗星非嵗星乘玄枵也若必以此無氷謂嵗乘玄枵所致則成元年春無氷者豈謂嵗星乘玄枵乎成十六年雨木氷者復是玄枵乘嵗星也蛇乘龍注蛇玄武之宿虛危之星龍嵗星嵗星木也木為青龍失次出虛危下為蛇所乘音義宿音秀下同疏注正義曰蟲獸在地而有象在天二十八宿分在四方方有七宿共成一象東方為青龍之象西方為白虎之象皆南首北尾也南方為朱鳥之象北方為玄武之象皆西首東尾也曲禮説軍陳象物云行前朱鳥後玄武左青龍右白虎是玄武在北方也龜蛇二蟲共為玄武故蛇是玄武之宿虛危之星也七星共為玄武但嵗星淫行在虛危之分故特指虛危言之耳傳言蛇乘龍龍即嵗星也嵗星木精木位在東方東方之宿為青龍之象故嵗星亦以龍為名焉龍行疾而失次出於虛危宿下龍在下而蛇在上是龍為蛇所乘也嵗星天之貴神福德之星今被乘勢屈是不能祐其夲國之象故知宋鄭飢也龍宋鄭之星也注嵗星夲位在東方東方房心為宋角亢為鄭故以龍為宋鄭之星音義亢音剛又苦浪反疏注正義曰嵗星屬木木位在東方東方之次皆是龍分天之分野卯為大火辰為夀星大火房心為宋分夀星角亢為鄭分故龍為宋鄭之星也然則寅為析木之津析木燕之分野梓慎言不及燕别當有以知之非吾徒所能測也宋鄭必飢玄枵虛中也注玄枵三宿虛星在其中枵耗名也土虛而民耗不飢何為注嵗為宋鄭之星今失常淫入虛耗之次時復無氷地氣發泄故曰土虛民耗音義耗呼報反復扶又反疏正義曰枵聲近耗故枵是耗之名也次有三宿虛為其中土虛不實而人民耗損不飢何為也地氣發泄而使時溫無氷即是土虛之事也於時魯國無氷是魯亦地氣發泄下子服惠伯云飢寒之不恤是魯亦飢矣經不書飢飢當差於宋鄭故梓慎唯言宋鄭飢耳夏齊侯陳侯蔡侯北燕伯把伯胡子沈子白狄朝于晉宋之盟故也注陳侯蔡侯胡子沈子楚屬也宋盟曰晉楚之從交相見故朝晉燕國今薊縣音義燕烏賢反薊音計疏注正義曰傳言宋之盟故雖文在諸國之下止為楚屬發傳故杜眀之陳蔡胡沈為宋盟朝晉其齊燕把狄先非楚屬其朝不為宋之盟也譜云北燕姬姓召公奭之後也周武王封之於燕居漁陽薊縣其國辟小不通諸夏自召公至簡公𣢾二十九世始見經簡公子獻公十二年獲麟之嵗也獻公子孝公七年春秋之傳終矣孝公立十五年􅌰孝公以下六世始大稱王十二世二百二十五年秦滅之齊侯將行慶封曰我不與盟何為於晉注以宋盟釋齊秦音義與音預下同陳文子曰先事後賄禮也注事大國當先從其政事而後薦賄以副己心音義賄呼罪反小事大未獲事焉從之如志禮也注言當從大國請事以順其志疏正義曰言小國之事大國也當每事順從若未獲大國所命之事但如其志之所欲即不待彼命逆即從之如其志意禮也禮者自卑而尊人故先承志意是事大之禮也雖不與盟敢叛晉乎重丘之盟未可忘也子其勸行注重丘盟在二十五年音義重直龍反衛人討寧氏之黨故石惡出奔晉衛人立其從子圃以守石氏之祀禮也注石惡之先石碏有大功於衛國惡之罪不及不祀故曰禮音義從子才用反圃布古反碏七略反邾悼公來朝時事也注傳言來朝非宋盟宋盟唯施於朝晉楚秋八月大雩旱也蔡侯歸自晉入于鄭鄭伯享之不敬子産曰蔡侯其不免乎注不免禍日其過此也注往日至晉時音義日人實反過古禾古卧二反君使子展迋勞於東門之外而傲注迋往也音義迋于况反後同勞力報反吾曰猶將更之今還受享而惰乃其心也君小國事大國而惰傲以為己心將得死乎若不免必由其子其為君也淫而不父注通大子班之妻音義傲五報反下同惰徒卧反君小國事大國古夲無小字疏正義曰晉宋古夲及王肅注其文皆如此君國謂為國君言其為君之難也今定夲作小國僑聞之如是者恆有子禍注為三十年蔡世子班弒其君傳孟孝伯如晉告將為宋之盟故如楚也注魯晉屬故告晉而行音義將為于偽反蔡侯之如晉也鄭伯使遊吉如楚及漢楚人還之曰宋之盟君實親辱注君謂鄭伯音義還音環今吾子來寡君謂吾子姑還吾將使驛奔問諸晉而以告注問鄭君應來朝否音義驛人實反子大叔曰宋之盟君命將利小國而亦使安定其社稷鎮撫其民人以禮承天之休注休福祿也音義休許蚪反注同此君之憲令而小國之望也注憲法也寡君是故使吉奉其皮幣注聘用乘皮束帛音義乘繩證反以嵗之不易聘於下執事注言嵗有飢荒之難故鄭伯不得自朝楚音義易以豉反難乃旦反今執事有命曰女何與政令之有必使而君棄而封守跋涉山川蒙犯霜露以逞君心小國將君是望敢不唯命是聽無乃非盟載之言以闕君德而執事有不利焉小國是懼不然其何勞之敢憚疏正義曰執事謂楚也楚人詰大叔唯有止還之語耳今遊吉還使鄭伯來故遊吉原其意為此辭作甚之言耳而執事有不利焉違盟言闕君德是於楚為不利也小國是懼懼楚不利耳不敢自憚勞也子大叔歸復命告子展曰楚子將死矣不修其政德而貪昧於諸侯以逞其願欲久得乎周易有之在復注震下坤上復音義女音汝何與音預跋涉白末反草行為跋水行為涉憚徒旦反之頤注震下艮上頤復上六變得頤音義頤以之反曰迷復凶注復上六爻辭也復反也極隂反陽之卦上處極位迷而復反失道已逺逺而無應故凶音義應應對之應疏正義曰卦從下起從下而畫隂爻至上六為純坤又將從下變之故復為極隂反陽之卦也上處極位已極更無所往故為迷也既迷而後反夲從下積而至迷是為失道已逺上應在三三亦隂爻逺而無應故凶也復易注云復反也還也隂氣侵陽陽失其位至此始還反起於初故謂之復陽君象君失國而還反道德更興也頤飬也易注云頤者口車輔之名震動於下艮止於上口車動而上因輔嚼物以飬人故謂頤為飬也其楚子之謂乎欲復其願注謂欲得鄭朝以復其願疏注正義曰楚子夲意願鄭伯來朝全不顧道理唯欲復其夲願而棄其夲注不修德復歸無所是謂迷復注失道已逺又無所歸能無凶乎君其往也送葬而歸以快楚心注言楚子必死君往當送其葬楚不幾十年未能恤諸侯也注幾近也言失道逺者復之亦難音義幾居依反又音祈疏注正義曰幾近釋詁文也十者數之小成言失道逺者復之亦難故舉成數以言之周易復卦上六爻云迷復凶有災眚用行師終有大敗以其國君凶至于十年不克征是易有十年之語故遊吉期之以十年服虔云此行也楚康王􅌰至昭四年楚靈王合諸侯子申距今八年故曰不幾十年是謂十年不克征也吾乃休吾民矣注休息也言楚不能復為害音義復扶又反下復顧同禆竈曰今兹周王及楚子皆將死注禆竈鄭大夫音義禆避支反嵗棄其次而旅於眀年之次以害鳥帑周楚惡之注旅客處也嵗星棄星紀之次客在玄枵嵗星所在其國有福失次於北禍衝在南南為朱鳥鳥尾曰帑鶉火鶉尾周楚之分故周王楚子受其咎俱論嵗星過次梓慎則曰宋鄭飢禆竈則曰周楚王死傳故備舉以示卜占惟人所在音義帑音奴惡如字一音烏路反衝尺容反分扶問反疏注正義曰易有旅卦傳言羈旅旅皆是客故為客處也嵗星常行之度此年當在星紀星紀是其所居之次也今嵗星棄其所居星紀之次乃客處在於明年所居之次言其未應往而往向彼玄枵之次為客寄也昭三十二年傳云越得嵗而吳伐之必受其凶是嵗星所在其國有福當福之衝其國有禍今失次於北故禍衝在南子午之位南北相衝淫於玄枵衝當鶉火南方為朱鳥之宿帑者細弱之名於人則妻子為帑於鳥則鳥尾曰帑妻子為人之後鳥尾亦鳥之後故俱以帑為言也天之分野鶉火周分鶉尾楚分嵗星之衝當此周楚之分故周王楚子受其咎也嵗星客在玄枵惟衝鶉火而鶉尾亦有咎者蓋以嵗星漸西衝則漸東尾之於鳥猶是一身故衝其身而及其尾此則禆竈能知亦非吾徒所測也此與上文俱論嵗星過次所占不同其事俱驗而丘明兩載之是傳故備舉以示卜占效驗惟人所在言其知之在於人各自有意見也九月鄭遊吉如晉告將朝于楚以從宋之盟子産相鄭伯以如楚舍不為壇注至故國郊除地封土為壇以受郊勞音義相鄭息亮反下同壇徒丹反勞力報反疏注正義曰聘禮賔至于近郊君使卿用束帛勞無設壇之法下云先君適四國未嘗不為壇蓋以朝禮君親行事重故有之也禮有壇墠者先儒以為除地曰墠封土曰壇此并言除地封土者尚書金縢云三壇同墠是作壇在除地之內故除地封土并言之服虔夲作墠解云除地為墠王肅夲作壇而解云除地坦坦者則讀為墠也按下云作壇以昭其功昭其禍若是除地草穢尋生不足以昭示後人杜言壇是也下言草舍者不為壇則不除地故為草舍耳外僕言曰昔先大夫相先君適四國未嘗不為壇注外僕掌次舍者自是至今亦皆循之疏正義曰因循不廢也今子草舍無乃不可乎子産曰大適小則為壇小適大苟舍而已焉用壇僑聞之大適小有五美宥其罪戾赦其過失救其災患賞其德刑注刑法也音義焉用於虔反下焉用作壇焉辟之又焉用盟皆同宥音又災音災教其不及小國不困懷服如歸是故作壇以昭其功宣告後人無怠於德注怠解也音義解佳賣反小適大有五惡説其罪戾注自解説也請其不足行其政事注奉行大國之政共其職貢從其時命注從朝會之命音義共音恭不然則重其幣帛以賀其福而弔其凶皆小國之禍也焉用作壇以昭其禍所以告子孫無昭禍焉可也注無昭禍以告子孫齊慶封好田而耆酒與慶舍政注舍慶封子慶封當國不自為政以付舍音義好呼報反耆市志反則以其內實遷于盧蒲嫳氏易內而飲酒注內實寶物妻妾也移而居嫳家數日國遷朝焉注就於盧蒲氏朝見封音義數所主反見賢遍反疏正義曰慶封雖與舍政使舍知政事耳封猶有當國之重故國之卿大夫皆遷就嫳家朝焉使諸亡人得賊者以告而反之注亡人辟崔氏難出奔者音義難乃旦反疏正義曰崔氏之亂但是莊公之黨崔氏以之為賊當時辟難並悉出奔崔氏既亡慶封召令還國故言使諸逃亡之人得賊名而出者以已情告而悉反之故反盧蒲癸癸臣子之注子之慶舍有寵妻之注子之以其女妻癸音義妻七計反注及下注皆同慶舍之士謂盧蒲癸曰男女辨姓子不辟宗何也注辨别也别姓而後可相取慶氏盧蒲氏皆薑姓音義别彼列反下同相取七住反夲亦作娶曰宗不余辟注言舍欲妻已疏正義曰男女辨姓則妻亦辟宗癸謂慶舍為宗言彼宗不於余相辟也余獨焉辟之賦詩斷章余取所求焉惡識宗注言已苟欲有求於慶氏不能復顧禮譬如賦詩者取其一章而已音義斷音短惡音烏安也注同癸言王何而反之二人皆嬖注二子皆莊公黨二十五年崔氏弒莊公癸何出奔今還求寵於慶氏欲為莊公報讐音義嬖必計反下同欲為于偽反使執寢戈而先後之注寢戈親近兵杖音義先悉薦反後户豆反近附近之近杖直亮反公膳日雙雞注卿大夫之膳食音義膳市戰反謂公家供卿大夫之常膳疏正義曰按禮記玉藻云天子日食少牢朔月大牢諸侯日食特牲朔月少牢其大夫則日食特豚朔月特牲今膳日雙雞者齊國臨時之事不如禮也饔人竊更之以鶩御者知之則去其肉而以其洎饋注御進食者饔人御者欲使諸大夫怨慶氏減其膳蓋盧蒲癸王何之謀音義鶩徐音木鴨也去起呂反藏也洎其器反肉汁也説文云洎灌釡也字林己蒞反饋其位反疏正義曰釋鳥云舒鳬鶩舍人曰鳬野名也鶩家名也李巡曰野曰鳬家曰鶩郭璞曰鴨也然則謂之舒者舒遲也家飬馴不畏人故飛行遲以遲别野名耳其為鴨一也説文云洎灌釡也周禮士師職云祀五帝則洎鑊水鄭玄云洎謂增其沃汁也然則洎者添釡之名添水以為肉汁遂名肉汁為洎去肉而空以汁饋欲其怨之深也子雅子尾怒注二子皆惠公孫疏注正義曰昭三年傳云二惠競爽猶可又十年傳曰齊惠欒髙氏皆耆酒是知皆惠公孫也慶封告盧蒲嫳注以二子怒告嫳盧蒲嫳曰譬之如禽獸吾寢處之矣注言能殺而席其皮使析歸父告晏平仲注欲與共謀子雅子尾平仲曰嬰之衆不足用也知無能謀也言弗敢出注不敢泄謀音義知無音智有盟可也子家曰子之言云注子家析歸父又焉用盟告北郭子車注子車齊大夫子車曰人各有以事君非佐之所能也注佐子車名陳文子謂桓子曰注桓子文子之子無宇禍將作矣吾其何得對曰得慶氏之木百車於莊注慶封時有此木積於六軌之道疏注正義曰釋宫云六達謂之莊注爾雅者皆以為六道旁出杜以九達並九軌故亦以莊為六軌也文子曰可慎守也已注善其不志於貨財盧蒲癸王何卜攻慶氏示子之兆注龜兆曰或卜攻讐敢獻其兆子之曰克見血冬十月慶封田于萊陳無宇從丙辰文子使召之請曰無宇之母疾病請歸慶季卜之注季慶封音義菜音來從才用反示之兆曰死奉龜而泣注無宇泣音義奉芳勇反乃使歸慶嗣聞之注嗣慶封之族音義慶嗣繼嗣之嗣本或作慶翩誤曰禍將作矣謂子家速歸注子家慶封字禍作必於嘗注嘗秋祭歸猶可及也子家弗聽亦無悛志注悛改寤也音義悛七全反寤五故反子息曰亡矣幸而獲在吳越注子息慶嗣陳無宇濟水而戕舟發梁注戕殘壞也不欲慶封得救難音義戕在羊反難乃旦反下外難同盧蒲薑謂癸曰有事而不告我必不捷矣注薑癸妻慶舍女癸告之注告欲殺慶舍薑曰夫子愎莫之止將不出我請止之注夫子謂慶舍音義愎皮逼反癸曰諾十一月乙亥嘗于大公之廟慶舍涖事注臨祭事音義大音泰盧蒲薑告之且止之弗聽曰誰敢者遂如公注至公所麻嬰為尸注為祭尸慶奊為上獻注上獻先獻者音義奊户結反疏正義曰祭祀之禮主人先獻下文慶舍死公懼而歸則於時公親在矣又此祭慶舍涖事公與慶舍不為上獻而奊為上獻者慶舍使為之不可以禮責也奊即繩也為下殺慶繩張夲盧蒲癸王何執寢戈慶氏以其甲環公宫注廟在宫內音義環如字徐音患陳氏鮑氏之圉人為優注優俳音義優於求反俳皮皆反疏注正義曰優者戲名也晉語有優施史記滑稽傳有優孟優旃皆善為優戲而以優著名史遊急就篇云倡優俳笑是優俳一物而二名也今之散樂戲為可笑之語而令人之笑是也宋大尉袁淑取古之文章令人笑者次而題之名曰俳諧集慶氏之馬善驚士皆釋甲束馬注束絆之也音義絆音半疏正義曰善驚謂數驚古人有此語今人謂數驚為好驚好亦善之意也而飲酒且觀優至於魚里注魚里里名優在魚里就觀之疏注正義曰杜以優在魚里士往觀之劉炫以為國人從旁為優引行以至魚里以規杜氏但傳文不顯古事難知輒以為規一何煩碎欒髙陳鮑之徒介慶氏之甲注欒子雅髙子尾陳陳須無鮑鮑國音義介音界子尾抽桷擊扉三注桷椽也扉門闔也以桷擊扉為期音義桷音角扉音非門扇也椽直専反闔户榼反盧蒲癸自後刺子之王何以戈擊之解其左肩猶援廟桷動於甍注甍屋棟音義刺七亦反援音爰甍亡耕反字林亡成反疏注正義曰先儒相傳為然也張衡西京賦曰甍宇齊平言諸物棟簷髙下等也説文云甍棟梁也是又名為梁此是屋上之長材椽所以馮依者也今俗謂之屋脊以爼壺投殺人而後死注言其多力遂殺慶繩麻嬰注慶繩慶奊公懼鮑國曰羣臣為君故也注言欲尊公室非為亂音義為亂于偽反下為之誦同陳須無以公歸稅服而如內宫注言公懼於外難音義稅吐活反一音如字慶封歸遇告亂者丁亥伐西門弗克還伐北門克之入伐內宫注陳鮑在公所故弗克反陳于嶽注嶽里名音義陳直覲反嶽五角反請戰弗許遂來奔獻車於季武子美澤可以鑑注光鑑形也音義鑑古暫反展莊叔見之注魯大夫曰車甚澤人必瘁宜其亡也叔孫穆子食慶封慶封泛祭注禮食有祭示有所先也泛祭逺散所祭不共音義瘁在醉反夲或作萃同食慶音嗣泛芳劍反疏注正義曰禮法食必先祭祭古之先食以示有所先也公食大夫禮云賔升席坐取韭菹以偏擩于醢上豆之間祭又言祭鉶羮於上鉶之間祭飲食於上豆之間是祭食之禮各有其處論語云泛愛衆泛是寬博之語故知泛祭為逺散所祭言其不共也穆子不説使工為之誦茅鴟注工樂師茅鴟逸詩刺不敬音義説音悅茅亡交反鴟尺之反刺七陽反亦不知既而齊人來讓注讓魯受慶封奔吳吳句餘豫之朱方注句餘吳子夷末也朱方吳邑音義句古侯反下句瀆同疏注正義曰此時吳君是餘祭也明年餘祭死乃夷末代立昭十五年吳子夷末卒是也服虔以句餘為餘祭杜以為夷末者以慶封此年之末始來奔魯齊人來讓方更奔吳明年五月而閽弒餘祭計其間未得賜慶封以邑故以句餘為夷末也聚其族焉而居之富於其舊子服惠伯謂叔孫曰天殆富淫人慶封又富矣穆子曰善人富謂之賞淫人富謂之殃天其殃之也其將聚而殲旃注殲盡也旃之也為昭四年殺慶封傳音義殲子潛反癸巳天王崩未來赴亦未書禮也注嫌時已聞喪當書故發例崔氏之亂喪羣公子故鉏在魯叔孫還在燕買在句瀆之丘注在襄二十一年音義喪息浪反故鉏仕居反公子鉏也夲或作故公鉏者非瀆音豆及慶氏亡皆召之具其器用而反其邑焉注反還也與晏子邶殿其鄙六十注邶殿齊别都以邶殿邉鄙六十邑與晏嬰音義邶蒲對反殿多薦反又如字注及下同疏注正義曰傳直言六十杜知六十邑者下云與北郭佐邑六十則此亦是六十邑也弗受子尾曰富人之所欲也何獨弗欲對曰慶氏之邑足欲故亡吾邑不足欲也益之以邶殿乃足欲足欲亡無日矣在外不得宰吾一邑不受邶殿非惡富也恐失富也且夫富如布帛之有幅焉為之制度使無遷也注遷移也音義惡烏路反且夫音扶幅音福疏正義曰外猶以外宰猶益也以邶殿為外也言吾先有邑更不得益邶殿耳夫民生厚而用利於是乎正德以幅之注言厚利皆人之所欲唯正德可以為之幅疏正義曰人皆欲生計重厚而多財用利益心既無厭於是乎用正德以幅之言用正德以為邉幅使有度也使無黜嫚注黜猶放也音義黜勑律反嫚徐音慢謂之幅利利過則為敗吾不敢貪多所謂幅也與北郭佐邑六十受之與子雅邑辭多受少與子尾邑受而稍致之注致還公公以為忠故有寵釋盧蒲嫳于北竟注釋放也音義竟音境求崔杼之尸將戮之不得叔孫穆子曰必得之武王有亂臣十人注亂治也音義治直吏反疏正義曰尚書泰誓文也亂治也以武王自言我有治理政事者十人鄭玄論語注云十人謂文母周公太公召公畢公榮公太顛閎夭散宜生南宫適崔杼其有乎不十人不足以葬注葬必須十人崔氏不能令十人同心故必得音義令力呈反疏正義曰案武王有亂臣十人而得天下崔子若有十人唯得葬者武王聖人十人皆大德故有天下崔子是罪人又有十人是凡人故唯可以葬也所引武王十人者唯取同心之義既崔氏之臣曰與我其拱璧注崔氏大璧音義拱居勇反徐音恭疏正義曰其者其崔杼也故云崔氏大璧拱謂合兩手也此璧兩手拱抱之故為大璧吾獻其柩於是得之十二月乙亥朔齊人遷莊公殯于大寢注更殯之於路寢也十二月戊戌朔乙亥誤音義柩其救反以其棺尸崔杼於市注崔氏弒莊公又葬不如禮故以莊公棺著崔杼尸邉以章其罪音義著丁略反國人猶知之皆曰崔子也注始求崔杼之尸不得故傳云國人皆知之疏注正義曰始求崔杼尸不得嫌以他尸代之傳言國人猶知之皆曰崔子言猶尚識其形知是真崔子也為宋之盟故公及宋公陳侯鄭伯許男如楚公過鄭鄭伯不在注已在楚音義為于偽反過古禾反伯有迋勞於黃崖不敬注滎陽宛陵縣西有黃水西南至新鄭城西入洧音義勞力報反崖夲又作涯魚佳反穆叔曰伯有無戾於鄭鄭必有大咎注伯有不受戮必還為鄭國害敬民之主也而棄之何以承守注言無以承先祖守其家鄭人不討必受其辜濟澤之阿注言薄土音義濟子禮反行潦之蘋藻注言賤菜音義潦音老蘋音頻藻音早置諸宗室注薦宗廟音義置之䜴反季蘭尸之敬也注言取蘋藻之菜於阿澤之中使服蘭之女而為之主神猶享之以其敬也疏正義曰此意取采蘋之詩也詩云子以采蘋南澗之濵于以采藻于彼行潦于以奠之宗室牖下誰其尸之有齊季女彼詩采蘋於澗采藻於潦此并言行潦之蘋藻又别言濟澤之阿者以其亦是出菜之處故先言之也獨言濟者以濟在魯國故穆叔獨舉所見而言也女將行嫁就宗子之家教之以四德三月教成設祭於宗子之廟此詩述教成之祭置諸宗室謂薦於宗子之家廟也詩言季女而此言季蘭謂季女服蘭草也案宣三年傳曰蘭有國香人服媚之知是女之服蘭也敬可棄乎注為三十年鄭殺良霄傳及漢楚康王卒公欲反叔仲昭伯曰我楚國之為豈為一人行也注昭伯叔仲帶音義為于偽反下除而為之備一字並同子服惠伯曰君子有逺慮小人從邇注邇近也飢寒之不恤誰遑其後注遑暇也不如姑歸也叔孫穆子曰叔仲子専之矣注言足専任子服子始學者也注言未識逺榮成伯曰逺圗者忠也注成伯榮駕鵝音義駕音加鵝五河反公遂行注從昭伯謀宋向戌曰我一人之為非為楚也飢寒之不恤誰能恤楚姑歸而息民待其立君而為之備宋公遂反疏正義曰魯宋俱是朝楚向戌與叔仲昭伯言不同者二者並為楚是大國故朝其君昭伯欲令公行故以國大勸公言大國可畏也向戌欲令公還故以君身規公言君死宜反也意異故言異耳楚屈建卒趙文子喪之如同盟禮也注宋盟有衷甲之隙不以此廢好故曰禮音義喪如字又息浪反隙去逆反夲或作郤好呼報反王人來告喪問崩日以甲寅告故書之以徴過也注徴審也此緩告非有事宜直臣子怠慢故於此發例音義徵張陵反夲或作懲誤疏注正義曰昭三十年傳云非公且徴過杜云徴明也則此徴之訓亦為明明審此緩告者非有事故宜緩直是臣子怠慢耳杜序以故書為新意故於此發新例以明諸無事故而緩來告者皆是譏其怠慢也春秋左傳注疏卷三十八春秋左氏傳注疏卷三十八考證叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋孫復曰宣成之間大夫專國至宋之會則又甚矣自此諸侯日微天下之政皆大夫專持之故二十九年域把三十年會澶淵昭元年會虢諸侯莫有見者也林堯叟曰晉楚始同主夏盟是南北二伯也天下之大變也衛殺其大夫寧喜疏於法當誅監本脫法字今補入豹及諸侯之大夫盟于宋臣召南按豹不書族自是蒙上文會盟祗同一地也左氏以為違命榖梁以為恭褒貶不同要皆過當又疏既不馳請既監本訛作禮今改正冬十有二月乙亥朔日有食之乙亥監本及别本俱作乙卯以傳及疏推之知是乙亥又諸家注解經文皆作乙亥今改正又注今長歷推十一月朔非十二月萬斯大學春秋隨筆曰左傳云十一月乙亥朔與經差一月考上會宋傳五月有丙午六月有戊申戊申止後丙午二日必是六月之朔也七月有戊寅必是七月之朔也七月去十一月凡四月以月大小間數之七月朔戊寅則九月朔非丙子即丁丑矣十一月朔非丙子必乙亥矣傳言是也傳故不書其族言違命也臣召南按豹以違命去族此左氏之曲説也賈逵服虔稱豹執義尊國自是正論孔疏謂杜善解左氏可也即謂賈服皆背左氏亦可也若謂賈服異孔子之經豈其然乎按劉敞曰蔡沈失位左氏貶之今魯欲自同人之私失位甚矣大夫出境有可以重社稷者猶曰專之今令出季氏而謂不可違非也此論甚明傳書先晉晉有信也注蓋孔子追正之趙汸補注曰周制以班爵為序歃血則先同姓説見定四年是盟與會次序本異今屈建所爭者歃血之先後耳其大夫之會楚固未嘗先晉也宋公兼享晉楚之大夫趙孟為客則當時人情可見况宋之盟諸侯雖曰兩屬終未嘗以事晉者事楚楚雖駕晉先歃魯史豈遽以楚先晉乎韓宣子所謂周禮在魯正指此類耳傳云晉有信也考之巳不詳杜云孔子追正之亦非傳意也傳晉荀盈遂如楚涖盟盈監本訛作寅今改正傳而公怨之以為賓榮臣浩按疏以公字指鄭伯似不如劉炫作顯然解傳誰能去兵王應麟曰漢世祖罷郡國都尉晉武帝去州郡武備其害皆見於後唐穆宗之銷兵則不崇朝而變生焉故曰誰能去兵傳東郭薑以孤入曰棠無咎薑監本訛作疆今改正傳崔宗邑也臣召南按唐書宰相表曰崔氏出自薑姓齊丁公伋嫡子季子讓國叔乙食采於崔遂為崔氏可為宗邑之證傳十一月乙亥朔日有食之注文十一年三月甲子至今年七十一歲臣召南按文十一年為乙巳歲此襄二十七年乙卯歲也文十一年傳稱正月甲子而杜改作三月者一從夏正一據周歷也又疏斗建從甲至癸十者謂之日推尋文義斗建二字當是衍文春無氷臣浩按周時若不改月改時則春之無氷宜也何乃以為異而書之乎傳以有時災隂不堪陽疏歲星自淫行天時自溫暖監本訛作歲星自淫天行時自溫暖今改正傳周楚惡之趙汸補注曰周有天下之號也豈可以星次概言周楚隱三年傳周鄭並稱有自來矣顧炎武日知録曰梓愼曰宋鄭其飢禆竈曰周楚惡之一事兩占皆驗臣照按周楚惡之與周鄭交惡不同例在地既有建國在天必有分野言周言京師無以異也豈若交質交惡之辭實為下陵上替哉又按歲星之遲留伏逆莫非星行之常前代推步之術不精不自知巳之無算而咎星之失次既妄以為失次又因而占之所占禨祥又復多驗凡為術皆如是莫非妄也而往往似真由真妄本一致也傳子産相鄭伯以如楚舍不為壇趙汸曰傳見諸侯朝楚非得巳故子産自損其禮傳公膳日雙雞臣召南按公膳二字連讀卿大夫在朝之公膳猶六朝客食唐代堂餐也昭四年傳注曰食肉之祿謂在朝廷治其職事就官食者疏曰在官治事官皆給食大夫以上食乃有肉又引此傳以證之是也傳得慶氏之木百車於莊顧炎武日知録曰杜注善其不志於貨財非也邵寶曰此陳氏父子為隱語以相喻也愚謂木者作室之良材莊者國中之要路言將代之執齊國之權春秋左氏傳注疏卷三十八考證
