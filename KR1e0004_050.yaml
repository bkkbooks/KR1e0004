body:
  text: 春秋左傳注疏卷五十起昭公二十一年盡二十三年晉杜氏注唐陸德明音義孔穎逹疏經二十有一年春王三月葬蔡平公夏晉侯使士鞅來聘注晉頃公即位通嗣君音義頃音傾宋華亥向寧華定自陳入于宋南里以叛注自外至故曰入披其邑故曰叛南里宋城內里名音義披普彼反疏注正義曰賈逵云書入華貙兄弟作亂召而逆之是賈以此入從國逆之例也釋例曰春秋稱入其例有二施於師旅則曰弗地在於復歸則曰國逆國逆又以立為例逆而不立則非例所及諸在例外稱入直自外入內記事常辭義無所取而賈氏皆以為例如此甚多是杜意以賈氏逆之為非故云自外至故曰入以顯異之也五年傳叔孫昭子數豎牛之罪云又披其邑將以赦罪彼注云披析也此分析君邑以自屬己故曰叛也傳稱華氏居盧門以南里叛宋城舊墉及桑林之門守之知此南里是宋城之內里名秋七月壬午朔日有食之八月乙亥叔輒卒注叔弓之子伯張冬蔡侯朱出奔楚注朱為大子則失位遂微弱為國人所逐故以自出為文公如晉至河乃復注晉人辭公故還傳二十一年春天王將鑄無射注周景王也無射鐘名律中無射音義鑄之樹反射音亦注同中丁仲反疏注正義曰周語云景王二十一年將鑄大錢二十三年將鑄無射單穆公曰不可作重幣以絶民資又鑄大鐘以鮮其繼三年之中而有離民之器二焉國其危哉王弗聽問之泠州鳩州鳩對王又弗聽卒鑄大鐘二十四年鐘成二十五年王崩孔朝於二十四年注云昭二十一年如彼云則此年鑄鐘成之年而傳云將鑄無射者此為州鳩之言張夲州鳩以未成之時為此言故此年發傳而言將也州鳩此下之言與周語州鳩之言全不同者彼是對王之問此是自言其事異時别言故不同也周語及此皆論鐘事故云無射鐘名其聲於律應無射之管故以律名名鐘襄十九年季武子作林鐘亦是鐘聲應林鐘之律也此無射之鐘在王城鑄之敬王居洛陽蓋移就之也秦滅周其鐘徙於長安歷漢魏晉常在長安及劉裕滅姚泓又移於江東歷宋齊梁陳時鐘猶在東魏使魏收聘梁收作聘遊賦云珍是淫器無射在縣是也及開皇九年平陳又遷於西京置太常寺時人悉得見之至十五年敕毁之泠州鳩曰王其以心疾死乎注泠樂官州鳩其名也音義泠力丁反字或作伶非也夫樂天子之職也注職所主也夫音樂之輿也注樂因音而行而鐘音之器也注音由器以發天子省風以作樂注省風俗作樂以移之疏注正義曰漢書地理志曰凡民函五常之性而有剛柔緩急音聲不同繫水土之風氣故謂之風好惡取舍動靜無常隨君上之情欲故謂之俗是解風俗之名但風俗盛衰隨時隆替國之將滅風敝俗煩天子新受命者省此風俗之敝乃作樂以移之孝經曰移風易俗莫善於樂孔安國云風化也俗常也移太平之化易衰敝之常也地理志以風為夲俗為末言聖王在上統理人倫必移其夲而易其末此混同天下一之乎中和然後王教成是説作樂移風之事也器以鍾之注鍾聚也以器聚音輿以行之注樂須音而行疏正義曰為上言鍾音之器也故此云器以鍾之言器以鍾聚其音又上言音樂之輿也故此云輿以行之承上語不倫者亦猶易繫辭云天尊地卑乾坤定矣卑髙以陳貴賤位矣隨文便而言耳小者不窕注窕細不滿音義窕他雕反大者不槬注槬橫大不入音義槬戶化反疏正義曰言小不至窕則窕是細之意也大不至槬則槬是大之義也説文云窕深肆極也由細故能極於深是窕為細不滿謂不能充滿心也槬聲近橫故為橫大心所不容故不入心也下窕則不咸咸如字夲或作感戶暗反則和於物物和則嘉成注嘉樂成也故和聲入於耳而藏於心心億則樂注億安也音義億於力反樂音洛窕則不咸注不充滿人心音義咸如字夲或作感户暗反槬則不容注心不堪容心是以感感實生疾今鍾槬矣王心弗堪其能久乎注為眀年天王崩傳三月葬蔡平公蔡大子朱失位位在卑注不在適子位以長幼齒音義適丁歷反長丁丈反疏注正義曰喪大記記國君初死之禮云既正尸子坐于東方卿大夫父兄子姓立于東方有司庶士哭于堂下北靣鄭玄云正尸者謂遷尸牖下南首也子姓謂衆子孫也姓之言生也其男子立於主人後彼言子坐東方謂大子即鄭所謂主人也彼初死之時即别適庶况其至葬君道成矣大子失其位眀其不在適子位也位在卑是以長幼為齒蓋處其庶兄之下大夫送葬者歸見昭子昭子問蔡故以告昭子歎曰蔡其亡乎若不亡是君也必不終詩曰不解于位民之攸塈注詩大雅塈息也音義解佳賣反塈許器反今蔡侯始即位而適卑身將從之注為蔡侯朱出奔傳夏晉士鞅來聘叔孫為政注叔孫昭子以三命為國政季孫欲惡諸晉注憎叔孫在己上位欲使得罪於晉音義惡烏路反使有司以齊鮑國歸費之禮為士鞅注鮑國歸費在十四年牢禮各如其命數魯人失禮故為鮑國七牢音義費音祕故為于偽反疏正義曰十四年傳曰司徒老祁慮癸來歸費齊侯使鮑文子致之是鮑國歸費之事也杜以周禮掌客云上公饔餼九牢侯伯七牢子男五牢以諸侯牢禮各以其命數卿大夫來者亦當牢禮如其命數計鮑國齊卿不過三命於法當三牢而魯人失禮為鮑國七牢也下云加四為十一知夲七也劉炫云案聘禮使卿主國待之饔餼五牢則臣之牢禮不依命數鮑國禮當五牢加二牢耳今知非者杜以掌客諸侯牢禮各依命數以卿大夫無文故杜據諸侯言之不謂卿大夫以下亦依命數而劉以鄭注掌客爵卿五牢爵大夫三牢爵士大牢而規杜非也士鞅怒曰疏正義曰七牢於禮厚矣而鞅怒者但陳設為鞅鞅必不怒其時魯人報云鮑國之禮鞅遂怒其輕己鮑國之位下其國小而使鞅從其牢禮是卑敝邑也將復諸寡君魯人恐加四牢焉為十一牢注言魯不能以禮事大國且為哀七年吳徵百牢起音義恐邱勇反下注同宋華費遂生華貙華多僚華登貙為少司馬多僚為御士注公御士音義貙敕俱反少詩照反與貙相惡乃譖諸公曰貙將納亡人注亡人華亥等音義惡如字又烏路反亟言之音義亟欺冀反疏正義曰服虔云亟疾也疾言之欲使信則服虔讀為亟也或當為亟亟數也數言之公曰司馬以吾故亡其良子注司馬謂費遂為大司馬良子謂華登死亡有命吾不可以再亡之對曰君若愛司馬則如亡注言若愛大司馬則當亡走失國死如可逃何逺之有注言亡可以逃死勿慮其逺以恐動公公懼使侍人召司馬之侍人宜僚飲之酒而使告司馬注告司馬使逐貙音義飲於鴆反下同司馬歎曰必多僚也吾有讒子而弗能殺吾又不死抑君有命可若何乃與公謀逐華貙將使田孟諸而遣之疏正義曰抑語助若如也言吾有讒子謂多僚也雖知其讒既不能殺多僚華貙雖枉為君有逐貙之命可如何言無如之何遂謀逐之公飲之酒厚酬之注酬酒幣賜及從者司馬亦如之注亦如公賜音義從才用反張丐尤之注張丐華貙臣尤怪賜之厚音義丐古􅊣反夲亦作丐曰必有故使子皮承宜僚以劍而訊之注子皮華貙訊問也音義訊音信宜僚盡以告注告欲因田以遣之張丐欲殺多僚子皮曰司馬老矣登之謂甚注言登亡傷司馬心已甚吾又重之不如亡也五月丙申子皮將見司馬而行則遇多僚御司馬而朝張丐不勝其怒遂與子皮臼任鄭翩殺多僚注任翩亦貙家臣音義重直用反見賢遍反勝音升任音壬翩音篇劫司馬以叛而召亡人壬寅華向入樂大心豐愆華牼禦諸橫注梁國睢陽縣南有橫亭音義愆起虔反夲或作衍睢音雖華氏居盧門以南里叛注盧門宋東城南門六月庚午宋城舊鄘及桑林之門而守之注舊鄘故城也桑林城門名音義鄘音容夲或作墉秋七月壬午朔日有食之公問於梓慎曰是何物也禍福何為注物事也對曰二至二分注二至冬至夏至二分春分秋分日有食之不為災日月之行也分同道也至相過也注二分日夜等故言同道二至長短極故相過疏正義曰日月之行交則相食自然之理但日為君象月為臣象隂既侵陽如臣掩君聖人因之設教制為輕重以夏之四月純陽之月時陽極盛隂氣未作正當陽盛之時不宜為弱隂所侵以為大忌此月日食災最重也餘非陽盛之月為災稍輕至於分至之月日食即不為災又解不為災之意以二分畫夜等似其同一道二至長短極並行則相過以為理必相侵故言不為災劉炫云此皆假其事以為等差其實災之大小不如此也且詩云十月之交朔日辛卯日有食之亦孔之醜先儒以為周之十月夏之八月秋分之月也而甚可醜惡七年四月甲辰朔日食春分之月也而云魯衛惡之衛大魯小安在乎二分之食不為災足明此是先賢寓言非實事也注正義曰日之行天一日一周月之行天二十九日有餘已得一周日月異道互相交錯月之一周必半在日道裏從外而入內也半在日道表從內而出外也或六入七出或七入六出凡十三出入而與日一會歷家謂之交道通而計之一百七十三日有餘而有一交交在望前朔則日食望則月食交在望後望則月食後月朔則日食此自然之常數也交數滿則相過非二至乃相過也傳之所言以二分日夜等者春分之時朔則日在婁望則月在角秋分之時朔則日在角望則月在婁婁角是天之中道日月俱從中道故晝夜等似有體敵之理月可敵日冬至之時朔則日在斗望則月在井夏至之時朔則日在井望則月在斗斗井南北晝夜長短之極似若月之極長可以掩日然故云至相過謂絶相縣殊也此至惟冬至耳言二至者全句以成文此皆假託以為言也以日者天之大明人君之象不可虧損故於正陽之月其災為重於分至之月其害為輕於餘月之食其災為水假之以垂訓非實事也其他月則為災陽不克也故常為水注隂侵陽是陽不勝隂疏正義曰其他月非分至之月則為災日食是隂侵陽是陽不勝也故日食常為水災莊二十三年六月日食秋大水此二十四年五月日食梓慎曰將水昭子曰旱也其年八月大雩旱也則亦不是常為水也又七年四月甲辰朔日食春分之月而云魯衛惡之常水之言既無其驗足知是賢聖假託日食以為戒耳於是叔輒哭日食注意在於憂災昭子曰子叔將死非所哭也八月叔輒卒冬十月華登以吳師救華氏注登前年奔吳齊烏枝鳴戍宋注烏枝鳴齊大夫厨人濮曰注濮宋厨邑大夫音義厨直誅反濮音卜軍志有之先人有奪人之心後人有待其衰盍及其勞且未定也伐諸若入而固則華氏衆矣悔無及也從之丙寅齊師宋師敗吳師于鴻口注梁國睢陽縣東有鴻口亭音義先悉薦反後戶豆反盍戶臘反獲其二帥公子苦雂偃州員注二帥吳大夫音義帥色類反注同雂古舍反員音云又音圓華登帥其餘注吳餘師以敗宋師公欲出注出奔厨人濮曰吾小人可藉死注可借使死難音義難乃旦反而不能送亡君請待之注請君待復戰決勝負音義而不能送亡君絶句復扶又反下文復即之同疏正義曰服虔以君上屬孫育以君下屬杜注不明亦似上屬乃徇曰揚徽者公徒也注徽識也音義徇似俊反徽許歸反説文作徽識夲又作幟申志反又音昌志反一音式疏注正義曰禮記大傳云聖人南靣而治天下必改正朔殊徽號鄭玄云徽號旌旗之名也周禮大司馬云中夏教茇舍辨號名之用帥以門名縣鄙各以其名家以號名鄉以州名野以邑名百官各象其事以辨軍之夜事鄭玄云號名者徽識所以相别也鄉遂之屬謂之名家之屬謂之號百官之屬謂之事在國以表朝位在軍又象其制而為之被之以備死事帥謂軍將及師帥旅帥至伍長也以門名者所被徽識如其在門所樹者凡此言以也象也皆謂其制同耳縣鄙謂縣正鄙師至鄰長也家謂食采地者之臣也鄉以州名亦謂州長至比長也野謂公邑大夫百官以其職從王者此六者皆書其官與名氏焉夜事戒夜守之事也草止者慎於夜於是主别其部職如鄭此言則徽識制如旌旗書其所任之官與姓名於上被之於背以備其死知是誰之尸也士喪禮云為銘各以其物亡則以緇長半幅頳末長終幅廣三寸書銘于末曰某氏某之柩今之銘旌旗幡也此生之徽識如死之銘旌其制之大小蓋亦如銘旌也書其官名即今之軍記令其各自揚徽欲知其助公多少如漢書絳侯之令軍人云為劉氏者左袒衆從之公自楊門見之注見國人皆揚徽睢陽正東門名楊門下而巡之曰國亡君死二三子之恥也豈專孤之罪也齊烏枝鳴曰用少莫如齊致死齊致死莫如去備注備長兵也音義去起吕反彼多兵矣請皆用劍從之華氏北復即之注北敗走厨人濮以裳裹首而荷以走曰得華登矣遂敗華氏于新里注新里華氏所取邑音義裹音果荷何可反又音何翟僂新居于新里既戰説甲于公而歸注居華氏地而助公戰音義僂音力主反説他活反下注同華妵居于公里亦如之注妵華氏族故助華氏亦如僂新説甲歸傳言古之為軍不呰小忿音義妵他口反下注同呰夲又作訾才斯反又音紫十一月癸未公子城以晉師至注城以前年奔晉今還救宋曹翰胡注曹大夫音義翰音寒又戶旦反會晉荀吳注中行穆子音義行戶郎反齊苑何忌注齊大夫衛公子朝注前年出奔晉今還衛救宋丙戌與華氏戰于赭丘注赭丘宋地音義赭音者丘又作丘同鄭翩願為鸛其御願為鵝注鄭翩華氏黨鸛鵝皆陳名音義鸛古喚反鵝五多反陳直覲反子祿御公子城莊堇為右注子祿向宜音義莊堇音謹夲或作莊堇父干犫御呂封人華豹張丐為右注呂封人華豹華氏黨音義犫尺由反疏正義曰呂邑封人官名豹即下文華豹是也夲或豹上有華王肅董遇並云呂封人華豹釋例譜一人再見名字不同皆兩載之宋雜人內有呂封人豹華豹為一人知此夲無華也今定夲有華相遇城還華豹曰城也城怒而反之注怒其呼己反還戰將注豹則關矣注注傳矢關引弓音義注之樹反關烏環反夲或作彎同下同傳音附曰平公之靈尚輔相余注平公公子城之父音義相息亮反豹射出其間注出子城子祿之間音義射食亦反又音食夜反下及注皆同將注則又關矣曰不狎鄙注狎更也音義更音庚疏正義曰服虔云狎更也子城謂華豹曰不更射為鄙一曰城言我不狎習故鄙然則豹已關矣何慮不射公子城何當屬之云不更射為鄙城方與豹相射此非謙讓之所又何須自言不習為鄙服之二説皆非杜亦訓狎為更言更遞也城謂豹女頻射我不使我得更遞是為鄙也豹服此言故抽矢而止此豹亦不逹軍之戰禮也抽矢注豹止不射城射之殪注豹死音義殪一計反張丐抽殳而下注殳長丈二在車邊音義殳音殊長直亮反又如字射之折股扶伏而擊之折軫注折城車軫音義折之設反下及注同扶伏並如字上又音蒲下又蒲北反夲或作匍匐同又射之死注丐死干犫請一矢注求死城曰余言女於君注欲活之音義女音汝對曰不死伍乘軍之大刑也注同乘共伍當皆死音義乘繩證反注及下同干刑而從子君焉用之子速諸乃射之殪注犫又死音義焉於虔反大敗華氏圍諸南里華亥搏膺而呼見華貙曰吾為欒氏矣注晉欒盈還入作亂而死事在襄二十三年音義搏音博呼好故反貙曰子無我迋不幸而後亡注迋恐也音義迋求枉反恐邱勇反使華登如楚乞師華貙以車十五乘徒七十人犯師而出注犯公師出送華登食於睢上哭而送之乃復入注入南里音義睢音雖復扶又反楚薳越帥師將逆華氏大宰犯諫曰諸侯惟宋事其君今又爭國釋君而臣是助無乃不可乎音義薳于委反疏正義曰言諸侯之內唯宋之臣民善事其君言以前未嘗有叛逆者也俗夲或無其字若無其字則是唯宋事楚檢於時宋國不屬楚也王曰而告我也後既許之矣注為明年華向出奔楚傳疏正義曰謂大宰犯諫在華登出師之後蔡侯朱出奔楚費無極取貨於東國注東國隱大子之子平侯廬之弟朱叔父也而謂蔡人曰朱不用命於楚君王將立東國若不先從王欲楚必圍蔡蔡人懼出朱而立東國朱訴于楚楚子將討蔡無極曰平侯與楚有盟故封注盟于鄧依陳蔡人以國音義訴音素其子有二心故廢之注子謂朱也靈王殺隱大子其子與君同惡德君必甚疏正義曰荷恩謂之德言荷君恩必甚也又使立之不亦可乎且廢置在君蔡無他矣注言權在楚則蔡無他心公如晉及河鼓叛晉注叛晉屬鮮虞晉將伐鮮虞故辭公注將有軍事無暇於待賔且懼泄軍謀音義泄息列反又以制經二十有二年春齊侯伐莒宋華亥向寧華定自宋南里出奔楚注言自南里别從國去音義别彼列反大搜于昌間注無傳音義搜所求反間如字夏四月乙丑天王崩六月叔鞅如京師葬景王注叔鞅叔弓子三月而葬亂故速音義鞅於丈反王室亂注承叔鞅言而書之未知誰是故但曰亂疏正義曰傳曰叔鞅至自京師言王室之亂是魯史承叔鞅之言而書之也閔馬父聞叔鞅之言乃遙度其事云子朝必不克是未知誰是誰非也故史但書曰亂不言某人某人為亂魯史書事必待告乃書傳聞行言不書之此承叔鞅之言即書策者魯是周之宗國既聞王室之亂義當釋位救之魯聞周亂所憂在己承言即書見魯之憂王室也公羊傳曰何言乎王室亂言不及外也其意言兄弟爭位室內自亂其亂不及外國故指言王室也劉子單子以王猛居于皇注河南鞏縣西南有黃亭辟子朝難出居皇王猛書名未即位音義單音善鞏九勇反難乃旦反疏注正義曰傳曰鞏簡公敗績于京甘平公亦敗焉單子欲告急於晉以王如平畤遂如圃車次于皇是辟子朝之難出居皇也王人以在皇告故書皇也景王既葬猛當成君仍書名者王室大亂未得以禮即位故也如莒展弒君而立未會諸侯元年書莒展輿出奔吳鄭忽嗣父而立鄭人賤之不以為君桓十一年書鄭忽出奔衛然則未成君者法當書名此王猛雖未即位異於諸侯故稱王而以名繫之劉炫云以王當國亦如莒展以名繫國也秋劉子單子以王猛入于王城注王城郟鄏今河南縣晉助猛故得還王都音義郟古洽反鄏音辱冬十月王子猛卒注未即位故不言崩疏注正義曰未即位不成為王故不言崩也書王子猛卒者未成為君繫父言之故稱子猶魯之子般子野卒十有二月癸酉朔日有食之注無傳此月有庚戌又以長厯推校前後當為癸卯朔書癸酉誤疏注正義曰案傳十二月庚戌晉籍談云云庚戌上去癸酉三十七日若此月癸酉朔其月不得有庚戌也又傳十二月下有閏月晉箕遺云云又云辛丑伐京辛丑是壬寅之前日也二十三年傳曰正月壬寅朔二師圍郊則辛丑是閏月之晦日也又計明年正月之朔與今年十二月朔中有一閏相去當為五十九日此年十二月當為癸卯朔經書癸酉明是誤也故言長歷推校十一月小甲戊朔傳有乙酉十二日也又有己丑十六日也十二月大癸卯朔傳有庚戌八日也閏月小癸酉朔傳有閏月辛丑二十九日也明年正月壬寅朔則上下符合矣傳二十二年春王二月甲子齊北郭啓帥師伐莒注啓齊大夫北郭佐之後莒子將戰苑羊牧之諫注牧之莒大夫音義苑於元反牧之州牧之牧曰齊帥賤其求不多不如下之大國不可怒也弗聽敗齊師于壽餘注莒地音義帥所類反下之遐嫁反齊侯伐莒注怒敗莒子行成司馬竈如莒涖盟注竈齊大夫莒子如齊涖盟盟于稷門之外注稷門齊城門也莒於是乎大惡其君注為明年莒子來奔傳音義惡烏路反楚薳越使告于宋曰寡君聞君有不令之臣為君憂無寧以為宗羞注無寧寧也言華氏為宋宗廟之羞恥寡君請受而戮之對曰孤不佞不能媚於父兄注華向公族也故稱父兄以為君憂拜命之辱抑君臣日戰君曰余必臣是助亦唯命人有言曰唯亂門之無過君若惠保敝邑無亢不衷以奬亂人孤之望也唯君圖之音義過音古禾反亢苦浪反衷音忠疏正義曰亢髙也衷善也奬勸也無高貴不善之事以勸亂人為惡也易曰亢龍有悔言其位高也楚人患之注患宋以義距之諸侯之戍謀曰若華氏知困而致死楚恥無功而疾戰非吾利也不如出之以為楚功其亦無能為也已注言華氏不能復為宋患音義復扶又反下復欲同救宋而除其害又何求乃固請出之宋人從之疏正義曰若華氏知困而致死戰或敗諸侯之師也楚恥無功而疾戰戰勝則楚獨有功二者並非吾諸侯之利也聞楚師將至華氏即出亦是楚之功也不如出之以為楚功其此華氏亦無所能為也己言雖放令出亦不復能為宋害言宋人慮更為害決欲取殺之故諸侯之戍固請出之宋人乃從之己巳宋華亥向寧華定華貙華登皇奄傷省臧士平出奔楚注華貙已下五子不書非卿音義省悉井反又所景反臧子郎反宋公使公孫忌為大司馬注代華費遂邊卭為大司徒注卭平公曾孫代華定音義卭五郎反樂祁為司城注祁子罕孫樂祁犂音義犂力私反又力兮反仲幾為左師注幾仲江孫代向寧音義幾音基樂大心為右師注代華亥樂挽為大司寇注挽子罕孫音義挽音晚以靖國人注終梓慎之言三年而後弭音義弭彌氏反王子朝賔起有寵於景王注子朝景王之長庶子賔起子朝之傳音義朝如字凡人名字皆張遙反或云朝錯是王子朝之後又音潮案錯姓亦有兩音長丁丈反疏注正義曰二十六年傳子朝使告于諸侯云單劉贊私立少知朝年長於猛也賔孟欲立子朝明是子朝之傅王與賔孟説之欲立之注孟即起也王語賔孟欲立子朝為大子音義説如字又音悅語魚據反疏正義曰賈逵云賔孟子朝之傅也王愛子朝因愛其傅故朝起並有寵於景王也與賔孟並談説之欲立朝為大子周語云景王欲殺下門子乃云賔孟適郊見雄雞賈逵云下門子周大夫王猛之傅也景王欲立朝故先殺猛傳然則王與賔孟言説既欲立朝乃殺猛傅議久不決故賔孟假雄雞斷尾以勸之劉獻公之庶子伯蚠事單穆公注獻公劉摯伯蚠劉狄穆公單旗音義蚠扶粉反一音扶云反摯音至下同惡賔孟之為人也願殺之又惡王子朝之言以為亂願去之注子朝有欲位之言故劉蚠惡之音義惡烏路反去起呂反有欲位之言一夲位作立疏正義曰伯蚠是果決有知謀者也願得殺賔孟去子朝所以強單子之心故劉子亦與同志共立子猛也於賔孟云願殺之於子朝云願去之者朝是王之寵子王在不可專殺願逐去而已獻諡法知質有聖曰獻賔孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也注畏其為犧牲奉宗廟故自殘毁音義斷丁管反憚待旦反犧許宜反遽歸告王且曰雞其憚為人用乎人異於是注雞犧雖見寵飾然卒當見殺若人見寵飾則當貴盛故言異於雞音義遽其據反犧者實用人人犧實難己犧何害注言設使寵人如寵犧則不宜假人以招禍難使犧在己則無患害己喻子朝欲使王早寵異之音義難乃旦反疏正義曰説文云犧宗廟之牲也曲禮云天子以犧牛鄭玄云犧純毛也周禮牧人掌牧六牲以共祭祀之牲牷鄭玄云六牲謂牛馬羊豕犬雞牷體完具也又曰祭祀共犧牲以授充人繫之鄭玄云犧牲毛羽完具也授充人者當殊養之然則祭祀之牲選其毛羽完具者養之以為犧犧者寵養祭牲之名賔孟感雞以毛羽牷具恐其被養為犧故自斷其尾殘毁其形賔孟怪而問之侍者曰自憚其犧言此雞憚畏其被寵養也賔孟因此感悟疾歸以雞事告王且又言曰雞其憚畏為人用乎人則異於是雞矣雞被寵飾終當見殺人被寵飾則當貴盛此其所以異於雞也犧者寵牲之名因以犧喻寵子即名寵子為犧言寵愛為犧者依法用牲今寵愛為犧者乃實用人言犧當用純德之人猶如祭犧當用純色之牲也他人之有純德寵之如犧後實招禍難矣己子之有純德寵之如犧有何害也但人有親疏若疏人被寵愛為犧實為禍難若己家親屬寵愛如犧有何患害他人謂子猛親屬謂子朝也犧者實用人上人是對牲為稱普據凡人也人犧實難此下人據疏外之人人字雖同上下人意異注正義曰犧者繫養之名耳言寵飾者當養之時必為之服飾以異之如今之繫五采也史記稱楚王欲以莊周為國相謂使者曰郊祭犧牛養之數歲衣以文繡牽入太廟是時欲為孤豚豈可得乎是亦飾之事賔孟言人犧實難假疏人以為説人為疏姓之人寵養疏人擅權害主故言設使寵人如寵犧則不宜假人以招禍難假借他人以權或將反來害己子猛雖亦王子不得王寵與他人無異使犧在己家則無害己喻子朝子朝是己之子欲使王早寵異之如寵犧也王弗應注十五年大子壽卒王立子猛後復欲立子朝而未定賔孟感雞盛稱子朝王心許之故不應音義應應對之應注同疏注正義曰賈逵以為大子夀卒景王不立適子鄭衆以為壽卒王命猛代之後欲廢猛立朝耳服虔以賈為然杜今從鄭説者二十六年傳閔子馬云子朝子景之命則景有命矣若不命猛更命誰乎若子朝子猛並未有命俱是庶子朝年又長於次當立自求為嗣宜矣劉蚠何以惡其為亂而欲去之若俱未被立王意不偏羣臣無黨王命為嗣則莫敢不從何須將殺單劉以立朝也杜以此知大子壽卒王立子猛為適其後復欲立子朝而王意未定賔孟感雞自毁因此盛稱子朝之美王心許賔孟故不應慮其泄言也夏四月王田北山使公卿皆從將殺單子劉子注北山洛北芒也王知單劉不欲立子朝欲因田獵先殺之音義從才用反芒音亡王有心疾乙丑崩于榮錡氏注四月十九日河南鞏縣西有榮錡澗音義錡魚錡反澗古晏反疏注正義曰此於乙丑之下言四月十九日戊辰之下言二十二日顯言此二日者此年之傳其日最多經之與傳又時月多錯故此顯言二日欲令自此以下依次推之易驗耳戊辰劉子摯卒注二十二日無子單子立劉蚠注蚠事單子故五月庚辰見王注見王猛音義見賢遍反注同遂攻賔起殺之注黨子朝故盟羣王子于單氏注王子猛次正故單劉立之懼諸王子或黨子朝故盟之疏注正義曰猛朝俱是王子單劉必欲立猛眀猛是次正當立故也公羊多有次正之語杜取其説猛為次正不知其夲蓋是大子壽之母弟或是穆后姪娣之子或母貴也晉之取鼓也注在十五年既獻而反鼓子焉注獻於廟又叛於鮮虞注叛晉屬鮮虞六月荀吳略東陽注略行也東陽晉之山東邑魏郡廣平以北音義行下孟反使師偽糴者負甲以息於昔陽之門外注昔陽故肥子所都音義糴音狄遂襲鼓滅之以鼓子鳶鞮歸使涉他守之注守鼓之地涉他晉大夫音義鳶悅全反鞮丁兮反他徒多反守手又反又如字丁巳葬景王王子朝因舊官百工之喪職秩者與靈景之族以作亂注百工百官也靈王景王之子孫音義喪息浪反下注羣喪同帥郊要餞之甲注三邑周地音義要一遙反餞賤淺反以逐劉子注逐伯蚠壬戌劉子奔揚注揚周邑單子逆悼王于莊宫以歸注悼王子猛也王子還夜取王以如莊宫注王子還子朝黨也不欲使單子得王猛故取之癸亥單子出注失王故出奔王子還與召莊公謀曰注莊公召伯奐子朝黨也音義召上照反奐音喚不殺單旗不捷注旗單子也音義旗音其捷才接反與之重盟必來背盟而克者多矣從之注從還謀也音義背音佩下注同樊頃子曰非言也必不克注頃子樊齊單劉黨音義頃音傾夲或作須字疏注正義曰此下二十三年單子劉子樊齊以王如劉故知是單劉黨也遂奉王以追單子注王子還奉王及領大盟而復注領周地欲重盟令單子劉子復歸音義令力呈反殺摯荒以説注委罪於荒音義説如字又音悅劉子如劉注歸其采邑單子亡乙丑奔于平畤注平畤周地知王子還欲背盟故亡走音義奔于平畤一夲作于平畤音止又音市下同夲或作平壽誤疏正義曰此上言子還夜取王以如莊宫遂與召莊謀殺單旗與之重盟必來來而殺之王子還遂奉王追單子及領遂與重盟而還殺摯荒者為前取王如莊宫令單子失王而出奔更殺摯荒以解説此事單子覺還欲背又奔平畤羣王子追之單子殺還姑發弱鬷延定稠注八子靈景之族因戰而殺之音義鬷子工反稠直由反疏注正義曰以上言王子還此八人還居其首還既稱王子眀八子皆王子也故知靈景之族子朝奔京注其黨死故丙寅伐之注單子伐京京人奔山劉子入于王城注子朝奔京故得入辛未鞏簡公敗績于京乙亥甘平公亦敗焉注甘鞏二公周卿士皆為子朝所敗音義鞏九勇反疏正義曰諡法一意不懈曰簡布綱持紀曰平注正義曰知為子朝所敗者以傳云敗績于京故知是悼王黨為子朝所敗也叔鞅至自京師注葬景王還言王室之亂也注經所以書閔馬父曰子朝必不克其所與者天所廢也注閔馬父閔子馬魯大夫天所廢謂羣喪職秩者單子欲告急於晉秋七月戊寅以王如平畤遂如圃車次于皇注出次以示急戊寅七月三日經書六月誤也音義圃音補疏注正義曰傳言七月戊寅杜以長歷推校之戊寅是七月三日眀傳是也經書王猛居皇乃在六月下知經六月誤也劉子如劉單子使王子處守于王城注王子處子猛黨守王城距子朝盟百工于平宮注平宫平王廟辛卯鄩肸伐皇注鄩肸子朝黨音義鄩音尋肸許乙反大敗獲鄩肸壬辰焚諸王城之市注焚鄩肸八月辛酉司徒醜以王師敗績于前城注醜悼王司徒前城子朝所得邑百工叛注司徒醜敗故己巳伐單氏之宫敗焉注百工伐單氏為單氏所敗疏注正義曰知單氏所敗者以上云伐單氏下云反伐之是單氏反伐百工也若單氏被敗焉能反伐百工庚午反伐之注單氏反伐百工辛未伐東圉注百工所在洛陽東南有圉鄉音義圉魚呂反冬十月丁巳晉籍談荀躒帥九州之戎注九州戎陸渾戎十七年滅屬晉州鄉屬也五州為鄉音義躒力狄反及焦瑕溫原之師注焦瑕溫原晉四邑以納王于王城注丁巳在十月經書秋誤疏注正義曰傳言冬十月丁巳杜以長歷推之丁巳是十月十四日經書此事在秋其下乃有冬知經誤庚申單子劉蚠以王師敗績于郊注為子朝之黨所敗前城人敗陸渾于社注前城子朝衆社周地音義社市者反夲或作杜下皆同十一月乙酉王子猛卒注乙酉在十一月經書十月誤雖未即位周人諡曰悼王疏注正義曰傳言十一月乙酉杜以長歷推校之乙酉是十一月十二日知經書十月誤也上云單子逆悼王于莊宫悼王即猛也經書為卒傳言其諡故解之雖未即位周人諡曰悼王敬王猛之母弟敬王位定乃追諡之不成喪也注釋所以不稱王崩己丑敬王即位注敬王王子猛母弟王子丐音義丐古害反疏注正義曰敬王名丐夲紀文也夲紀不言敬王是猛之母弟先儒相傳説耳諡法夙夜共事曰敬館于子旅氏注子旅周大夫十二月庚戌晉籍談荀躒賈辛司馬督注司馬烏音義督音篤帥師軍于隂注籍談所軍于侯氏注荀躒所軍于溪泉注賈辛所軍鞏縣西南有明溪泉次于社注司馬督所次王師軍于泛于解次于任人注王師分在三邑洛陽西南有大解小解音義泛音凡解音蟹任音壬閏月晉箕遺樂徵右行詭濟師取前城注三子晉大夫濟師渡伊洛音義行戶郎反詭九委反軍其東南王師軍于京楚辛丑伐京毁其西南注京楚子朝所在經二十有三年春王正月叔孫婼如晉注謝取邾師音義婼敕略反癸丑叔鞅卒注無傳晉人執我行人叔孫婼注稱行人譏晉執使人音義使所吏反疏注正義曰傳説魯取邾師則是魯有罪矣而譏晉執者凡諸侯有罪盟主當以師討之不得執其使人故譏之晉人圍郊注討子朝也郊周邑圍郊在叔鞅卒前經書後從赴疏注正義曰往年傳閏月辛丑晉師王師伐京毁其西南注云京子朝所在此年傳正月壬寅朔二師圍郊計辛丑壬寅頻日耳蓋京城既毁郊是子朝之邑故二師圍之故云討子朝也郊不繫周者大都以名通也傳稱朔日圍郊至癸丑乃叔鞅卒癸丑正月十二日也是圍郊在叔鞅卒前也晉人來告圍郊不以圍郊日告之告在叔鞅卒後故經書在後是從赴也圍郊在朔或亦在叔孫婼如晉之前但行無日未必不以朔行據鞅卒有日而言之夏六月蔡侯東國卒于楚注無傳未同盟而赴以名秋七月莒子庚輿來奔音義輿音餘戊辰吳敗頓胡沈蔡陳許之師于雞父注不書楚楚不戰也雞父楚地安豐縣南有雞備亭音義父音甫疏正義曰此戰獲胡沈之君明是胡沈之君自將也頓序於上頓亦君自將也獲陳大夫陳是大夫將則蔡許亦大夫將也故云頓胡沈祭陳許君在臣上各自以大小序耳桓十三年經書齊師宋師衛師燕師敗績此不每國書師而總云師者傳無其説杜不為注是史略文非義例也賈逵云不國國書師惡其同役而不同心案隱十年宋人蔡人衛人伐戴鄭伯伐取之傳曰宋衛既入鄭而以伐戴召蔡人蔡人怒故不和而敗亦是同役而不同心彼既不變其文此何當變文以見義乎知賈之妄注正義曰杜知楚不戰者以傳云戰于雞父吳子以罪人先犯胡沈與陳三國敗舍胡沈之囚使奔許與蔡頓師譟而從之三國奔是戰於雞父之時先犯胡沈陳後破許蔡頓也六國既陳戰敗而奔下傳始云楚師大奔是六國敗後楚師怖懼不得成陳望風而奔故傳云不言戰楚未陳杜云不書楚楚不戰劉炫用服虔義云不書楚楚諱敗不告然則必其楚人來告容或諱敗若吳人來告豈代楚諱乎劉違背傳文而規杜非也胡子髠沈子逞滅注國雖存君死曰滅音義髠苦門反逞敕逞反疏注正義曰公羊傳曰君死于位曰滅其意言夲國雖存其君見殺與滅國相類據君身言之謂之滅獲陳夏齧注大夫死生通曰獲夏齧徵舒玄孫音義夏戶雅反齧五結反疏注正義曰宣二年鄭人獲華元生獲也哀十一年獲齊國書死獲也故云大夫死生通曰獲案世夲宣公生子夏夏生御叔叔生徵舒舒生惠子晉晉生御寇寇生悼子齧齧是徵舒曾孫杜云玄孫未詳天王居于狄泉注敬王辟子朝也狄泉今洛陽城內大倉西南池水也時在城外音義大音泰疏注正義曰此事傳無其文不言無傳者傳稱六月庚寅單子劉子樊齊以王如劉當從劉而居狄泉不是全無其事故不云無傳也狄泉今洛陽城內大倉西南池水是也若在城內宜云王居成周知此時在城外也今在城內者土地名云或曰定元年城成周乃繞之入城內也尹氏立王子朝注尹氏周世卿也書尹氏立子朝明非周人所欲立疏注正義曰宣王之世有尹吉甫春秋以來數有尹子見經是其食采於尹世為周卿士也以其世為卿士宗族強盛故能專意立朝不言尹子而言尹氏者見其氏族強故能立之也敬王是單劉所立不書單子立者敬王猛之母弟兄死次正當立立之是當朝不應立立庶以亂國書尹氏立朝所以惡尹氏也隱四年衛人立晉善其得衆書衛人言舉國共立之此書尹氏立朝明非周人所欲立獨尹氏立之耳八月乙未地震冬公如晉至河有疾乃復傳二十三年春王正月壬寅朔二師圍郊注二師王師晉師也王師不書不以告癸卯郊鄩潰注河南鞏縣西南有地名鄩中郊鄩二邑皆子朝所得音義鄩音尋潰户內反丁未晉師在平隂王師在澤邑注平隂今河隂縣王使告間注子朝敗故音義間音間庚戌還注晉師還邾人城翼注翼邾邑還將自離姑注離姑邾邑從離姑則道徑魯之武城音義徑音經疏注正義曰邾魯接連竟界相錯邾人從翼邑還邾先徑魯之武城然後始至離姑而後至邾故舉離姑為道次公孫鉏曰魯將御我注鉏邾大夫音義鉏仕居反下同御魚吕反欲自武城還循山而南注至武城而還依山南行不欲過武城音義過古禾反下遂過同徐鉏丘弱茅地注三子邾大夫音義茅亡交反曰道下遇雨將不出是不歸也注謂此山道下濕遂自離姑注遂過武城武城人塞其前注以兵塞其前道疏正義曰此所塞之處必有隘道當是已過武城之邑未出武城之竟故得塞其前斷其後而攻取之斷其後之木而弗殊邾師過之乃推而蹶之遂取邾師獲鉏弱地注取邾師不書非公命音義斷丁管反殊如字説文云死也一曰斷也蹶其月反又音厥又居衛反疏注正義曰傳言武城人則是武城之大夫自専為此謀也既取邾師邾始訴晉晉人來討乃令叔孫往謝叔孫以年初即行則魯取邾師事在往年因叔孫婼如晉追言之邾人訴于晉晉人來討音義訴息路反叔孫婼如晉晉人執之書曰晉人執我行人叔孫婼言使人也注嫌外內異故重發傳音義使所吏反重直用反下重發同晉人使與邾大夫坐注坐訟曲直疏注正義曰周禮小司寇云命夫命婦不躬坐獄訟凡斷獄者皆令競者坐而受其辭故使並坐訟曲直叔孫曰列國之卿當小國之君固周制也注在禮卿得會伯子男故曰當小國之君疏注正義曰僖公十九年傳曰在禮卿不會公侯會伯子男可也於禮得與相會故當小國之君邾又夷也注邾雜有東夷之風寡君之命介子服回在注子服回魯大夫為叔孫之介副音義介音界注同請使當之不敢廢周制故也乃不果坐韓宣子使邾人聚其衆將以叔孫與之注與邾使執之叔孫聞之去衆與兵而朝注示欲以身死音義去起呂反士彌牟謂韓宣子注彌牟士景伯音義彌亡支反牟亡侯反曰子弗良圖而以叔孫與其讐叔孫必死之魯亡叔孫必亡邾邾君亡國將焉歸注時邾君在晉若亡國無所歸將益晉憂音義焉於虔反下同子雖悔之何及所謂盟主討違命也若皆相執焉用盟主注聽邾衆取叔孫是為諸侯皆得輒相執乃弗與使各居一館注分别叔孫子服回音義别彼列反疏注正義曰賈逵云使邾魯大夫各居一館鄭衆云使叔孫子服回各居一館邾魯大夫夲不同館無為復言使各居一館也欲分别叔孫與子服回不得相見各聽其辭耳服虔並載兩説仍云賈氏近之案傳云各居一館之下即云士伯聽其辭而訴諸宣子乃皆執之則皆執各居一館者也若是邾魯别館豈執邾大夫乎且下云館叔孫於箕舍子服回於他邑明此各居一館是分别子服與叔孫恐其相教示士伯聽其辭而訴諸宣子乃皆執之注二子辭不屈故士伯訴而執之疏注正義曰魯人實取邾師二子辭不屈者蓋以朝聘征伐過他國必假道乃行邾人不假魯道是邾亦合責不假道小過也取其師大罪也蹊田奪牛為報已甚故士伯訴而執之久囚其使足以謝邾故晉以明年釋之士伯御叔孫從者四人過邾館以如吏注欲使邾人見叔孫之屈辱音義從才用反下同疏正義曰御謂進引也引叔孫詣於獄也叔孫從者唯有四人先過於邾君之館然後以之如吏故杜云欲使邾人見叔孫之屈辱先歸邾子士伯曰以芻蕘之難從者之病將館子於都注都别都謂箕也音義芻初俱反蕘而昭反叔孫旦而立期焉注立待命也從旦至莫為期音義期夲又作期同居其反乃館諸箕舍子服昭伯於他邑注别囚之范獻子求貨於叔孫使請冠焉注以求冠為辭取其冠法而與之兩冠曰盡矣注既送作冠模法又進二冠以與之偽若不解其意音義模莫胡反字從木解音蟹為叔孫故申豐以貨如晉注欲行貨以免叔孫音義為于偽反叔孫曰見我吾告女所行貨見而不出注留申豐不使得出不欲以貨免音義女音汝吏人之與叔孫居於箕者請其吠狗弗與及將歸殺而與之食之注示不愛音義吠扶廢反疏正義曰狗有吠守者有主獵者主獵者貴吠守者賤吏人請叔孫乞其吠守之狗叔孫所館者雖一日必葺其牆屋注葺補治也音義葺七入反去之如始至注不以當去而有所毁壞音義壞音怪夏四月乙酉單子取訾劉子取牆人直人注三邑屬子朝者訾在河南鞏縣西南音義訾子斯反六月壬午王子朝入于尹注自京入尹氏之邑疏注正義曰知自京入尹者以前年子朝在京王師雖毁其西南不言克京又今年二師圍郊不言子朝在郊故云自京入尹劉炫以為前年王師已克子朝從京入郊郊潰不知子朝所在而規杜非也癸未尹圉誘劉他殺之注尹圉尹文公也劉他劉蚠族敬王黨音義圉魚呂反他徒河反丙戌單子從阪道劉子從尹道伐尹單子先至而敗劉子還注單子敗故音義阪音反又扶板反己丑召伯奐南宮極以成周人戍尹注二子周卿士子朝黨奐召莊公庚寅單子劉子樊齊以王如劉注辟子朝出居劉子邑甲午王子朝入于王城次于左巷注近東城音義近附近之近秋七月戊申鄩羅納諸莊宮注鄩羅周大夫鄩盻之子尹辛敗劉師于唐注尹辛尹氏族唐周地丙辰又敗諸鄩甲子尹辛取西闈注西闈周地音義闈音韋一音暉丙寅攻蒯蒯潰注河南縣西南蒯鄉是也於是敬王居狄泉尹氏立子朝音義蒯苦怪反莒子庚輿虐而好劍苟鑄劒必試諸人國人患之又將叛齊烏存帥國人以逐之注烏存莒大夫音義好呼報反鑄之樹反庚輿將出聞烏存執殳而立於道左懼將止死注殳長丈二而無創音義殳音殊疏注正義曰詩毛傳文也考工記云殳長尋有四尺八尺曰尋是其長丈二也又考工記戈戟皆有刃殳不言刃是無刃也苑羊牧之曰君過之注牧之亦莒大夫烏存以力聞可矣何必以弒君成名遂來奔齊人納郊公注郊公著丘公之子十四年奔齊音義著直除反又直慮反吳人伐州來楚薳越帥師注令尹以疾從戎故薳越攝其事及諸侯之師奔命救州來吳人禦諸鍾離子瑕卒楚師熸注子瑕即令尹不起所疾也吳楚之間謂火滅為熸軍之重主喪亡故其軍人無復氣勢音義熸子潛反字林子兼反復扶又反下王往復敗復增修同吳公子光曰諸侯從於楚者衆而皆小國也畏楚而不獲己是以來吾聞之曰作事威克其愛雖小必濟注克勝也軍事尚威疏正義曰尚書􅏷征云威克厥愛允濟愛克厥威允罔功是古有此言胡沈之君幼而狂注狂無常音義狂求匡反陳大夫齧壯而頑頓與許蔡疾楚政楚令尹死其師熸帥賤多寵政令不一注帥賤薳越非正卿也軍多寵人政令不一於越音義帥所類反注及下帥賤同七國同役而不同心注七國楚頓胡沈蔡陳許帥賤而不能整無大威命楚可敗也若分師先以犯胡沈與陳必先奔三國敗諸侯之師乃搖心矣諸侯乖亂楚必大奔請先者去備薄威注示之以不整以誘之音義去起呂反後者敦陳整旅注敦厚也音義陳直覲反下未陳并注同吳子從之戊辰晦戰于雞父注七月二十九日違兵忌晦戰擊楚所不意疏注正義曰成十六年傳郤至曰陳不違晦以犯天忌我必克之注云晦月終隂之盡故兵家以為忌楚以兵之忌日不意吳來擊之必不設備吳人故違兵忌以晦出兵而戰擊楚所不意也僖二十二年泓之戰書己巳朔成十六年鄢陵之戰書甲午晦此書戊辰而不言晦者釋例曰經傳之見晦朔此時史隨其日而存之無義例也賈氏云泓之戰譏宋襄故書朔鄢陵之戰譏楚子故書晦雞父之戰夷之故不書晦左氏既無此説案雞父之戰經傳備詳其例非夷之實晦戰而經不書晦明經不以晦示褒貶吳子以罪人三千先犯胡沈與陳注囚徒不習戰以示不整三國爭之吳為三軍以繫於後中軍從王注從吳王光帥右掩餘帥左注掩餘吳王壽夢子吳之罪人或奔或止三國亂吳師擊之三國敗獲胡沈之君及陳大夫舍胡沈之囚使奔許與蔡頓曰吾君死矣師譟而從之三國奔注三國許蔡頓音義譟素報反楚師大奔書曰胡子髠沈子逞滅獲陳夏齧君臣之辭也注國君社稷之主與宗廟共其存亡者故稱滅大夫輕故曰獲獲得也疏注正義曰傳言舍胡沈之囚使曰吾君死矣是胡沈之君死稱滅也釋例曰國君者社稷之主百姓之望當與社稷宗廟共其存亡者也而見獲於敵國雖存若亡死之與生皆與滅同故曰胡子髠沈子逞滅諸以戰傷死雖敗績而不見擒故經皆不曰滅則杜意國君生見獲亦書為滅也劉炫謂此胡沈之君戰死故言滅也春秋君戰生見獲者皆言以歸不書滅何得言雖存若亡皆為滅公羊傳曰其言滅獲何别君臣也君死于位曰滅生得曰獲大夫生死皆曰獲以為君死曰滅生曰以歸韓戰貶晉侯從大夫例故書獲以規杜失今知非者莊十年齊師滅談談子奔莒定六年鄭遊速滅許以許男斯歸是君存稱滅劉炫以為生獲於敵但言以歸不得稱滅規杜非也但君存稱滅則滅文在上滅談滅許是也國存君死則滅文在下胡子沈子是也不言戰楚未陳也注嫌與陳例相涉故重發之八月丁酉南宮極震注經書乙未地動魯地也丁酉南宫極震周地亦震也為屋所壓而死音義壓夲又作厭同於甲反疏注正義曰經書乙未地震謂魯國之地動也丁酉南宫極震則周地亦震周魯相去千里故震日不同以震而死明為屋所壓萇𢎞謂劉文公曰君其勉之先君之力可濟也注文公劉蚠也先君謂蚠之父獻公也獻公亦欲立子猛未及而卒周之亡也其三川震注謂幽王時也三川涇渭洛水也地動川岸崩疏注正義曰周語云幽王二年西周三川皆震伯陽父曰周將亡矣陽伏而不能出隂迫而不能蒸於是有地震今三川實震是陽失其所而鎮隂也陽失而在隂原必塞原塞國必亡夫水土演而民用也水土無演民乏財用不亡何待昔伊洛竭而夏亡河竭而商亡今周德若二代之季矣其川原又塞塞必竭夫國必依山川山崩川竭亡之徵也川竭山必崩若亡不過十年數之紀也夫天之所棄不過其紀是嵗也三川竭岐山崩十一年幽王乃滅注國語者亦云三川涇渭洛也西周在雍州之域周禮職方氏正西曰雍州其川涇汭其浸渭洛鄭玄云浸可以為灌溉者今西王之大臣亦震天棄之矣注子朝在王城故謂西王東王必大克注敬王居狄泉在王城之東故曰東王楚大子建之母在郥注郥郥陽也平王娶秦女廢大子建故母歸其家音義郥古閴反召吳人而啓之冬十月甲申吳大子諸樊入郥注諸樊吳王僚之大子音義吳大子諸樊案吳子遏號諸樊王僚是遏之弟子先儒又以為遏弟何容僚子乃取遏號為名恐傳寫誤耳未詳疏正義曰吳子諸樊吳王僚之伯父也僚子又名諸樊乃與伯祖同名吳人雖是東夷理亦不應然也此久逺之書又字經篆𨽻或誤耳取楚夫人與其寶器以歸楚司馬薳越追之不及將死衆曰請遂伐吳以徼之注徼要其勝負音義徼古堯反要一遙反疏正義曰土地名郥是蔡地蔡在楚之東北故建母在郥得召吳人也於時蔡常從楚且失夫人故薳越追之薳越曰再敗君師死且有罪注此年秋敗於雞父設往復敗為再敗亡君夫人不可以莫之死也乃縊於薳澨注薳澨楚地音義縊一賜反澨市制反公為叔孫故如晉及河有疾而復注此年春晉為邾人執叔孫故公如晉謝之音義為于偽反注及下注鄰國為之守相為同楚囊瓦為令尹注囊瓦子囊之孫子常也代陽丐音義囊乃郎反城郢注楚用子囊遺言已築郢城矣今畏吳復增修以自固音義郢以井反又餘政反疏注正義曰襄十四年子囊將死遺言謂子庚必城郢君子謂子囊忠將死不忘衛杜稷可不謂忠乎彼子囊城郢君子謂之為忠此囊瓦城郢沈尹戌謂之必亡事不同者國而無城不可以治楚自文王都郢城郭未固子囊心欲城之其事未暇將死而令城郢故可謂之為忠今郢既固矣足以為治而囊瓦畏吳侵逼恐其入寇國都更復增修其城又求自固不能逺撫邊竟惟欲近守城郭沈尹謂之必亡為其事異故也沈尹戌曰子常必亡郢茍不能衛城無益也古者天子守在四夷注德及逺音義守手又反下文除守其交禮並同天子卑守在諸侯注政卑損諸侯守在四鄰注鄰國為之守諸侯卑守在四竟注裁自完音義竟音境下及注同慎其四竟結其四援注結四鄰之國為助音義援于眷反民狎其野注狎安習也音義狎戶甲反三務成功注春夏秋三時之務民無內憂而又無外懼國焉用城今吳是懼而城於郢守已小矣卑之不獲能無亡乎注不獲守四竟音義焉於虔反昔梁伯溝其公宫而民潰注在僖十八年疏注正義曰事在十九年諸夲皆然當是傳寫誤民棄其上不亡何待夫正其疆埸修其土田險其走集注走集邊竟之壘辟音義疆居良反埸音亦壘力軌反辟音壁親其民人明其伍候注使民有部伍相為候望疏正義曰賈服王董皆作五候賈逵云五候五方之候也敬授民時四方中央之候王云五候山候林候澤候川候平地候也董云五候候四方及國中之姦謀也杜作伍候故云使民有部伍相為候望彼諸夲蓋以上多云四故誤為五也信其鄰國慎其官守守其交禮注交接之禮不僭不貪不懦不耆注懦弱也耆強也音義僭子念反懦乃亂反又乃臥反耆巨支反一音直支反疏正義曰不僭守信也不貪廉正也不懦不受辱也不強不陵人也此皆論守竟之事不僭不貪不耆謂不往侵鄰國也不懦謂不使人侵己也完其守備以待不虞又何畏矣詩曰無念爾祖聿修厥德注詩大雅無念念也聿述也義取念祖考則述治其德以顯之疏正義曰詩大雅文王篇也無念念也聿述也言王者念女先祖之法則還當述治其先祖之德以顯之無亦監乎若敖蚡冒至于武文注四君皆楚先君之賢者音義蚡扶粉反冒莫報反疏注正義曰楚世家云周成王始封熊繹於楚以子男之田居丹陽歷十四君至於熊儀是為若敖若敖生霄敖霄敖生蚡冒蚡冒卒弟熊逹立是為武王武王生文王始都郢杜文十六年云蚡冒楚武王父雖不從世家以蚡冒為武王兄要沈尹以四君為賢故特言之土不過同注方百里為一同言未滿一圻音義圻音祈疏正義曰言土雖至九百里猶止名同故云不過同非謂百里以下也知者以楚是子爵土方二百里明非百里也慎其四竟猶不城郢今土數圻注方千里為圻音義數所主反疏正義曰如楚世家云武王以上未都於郢據當時都郢故以郢言之謂不築其國都也而郢是城不亦難乎注言守若是難以為安也為定四年吳入楚傳春秋左傳注疏卷五十春秋左氏傳注疏卷五十考證傳天王將鑄無射臣召南按漢書五行志引此作將鑄無射鐘鐘字蓋漢志所自加也傳二至二分日有食之不為災臣照按梓慎以二分二至日食不為災知古算術之疏蓋自梓慎始知日食可算而以分同道至相過為言則又失之逺也梓慎以前大約並不知日食之故劉子單子以王猛入于王城呂祖謙曰洛誥我乃卜澗水東瀍水西惟洛食先儒以為今河南城也所謂王城也成王定鼎于郟鄏是也我又卜瀍水東亦惟洛食先儒以為今洛陽也即所謂成周也是時以成周為下都所謂成周既成分正東郊是也至敬王時自王城遷而都之臣召南桉成周去王城四十里漢之河南縣周公所城雒邑也後漢郡國志河南春秋時謂之王城注引博物記曰王城方七百二十丈郛方一十里南望雒水北至陜山又引地道記曰去雒城四十里是也漢之雒陽縣周所謂成周也傳惡賔孟之為人也疏故劉子亦與同志以文義推之劉子應作單子言單穆公與劉蚠同志也傳單子逆悼王于莊宮以歸注悼王子猛也悼監夲訛作博今改正傳晉籍談荀躒帥九州之戎臣召南按左氏敘次俱以官爵為先後十五年荀躒如周籍談為介王稱躒為伯氏談為叔氏是籍談為大夫也此傳及後十二月皆叔籍談于荀躒之上豈談此時已為卿乎晉之六卿皆在又不見有為卿之文何也尹氏立王子朝孫復曰立者篡詞言尹氏立王子朝其惡可知也傳南宫極震趙汸補注曰但言南宮極震明是以震而死不必為屋所壓也傳慎其四竟猶不城郢疏如楚世家云武王以上未都於郢臣召南按楚世家文王熊資始都郢又按漢書地理志云文王自丹陽徙此春秋左氏傳注疏卷五十考證
