body:
  text: 春秋左傳注疏卷三起隱公六年盡十一年晉杜氏注唐陸德明音義孔穎達疏經六年春鄭人來渝平注和而不盟曰平音義渝羊朱反變也疏注正義曰宣十五年宋人及楚人平傳載其盟辭昭七年燕暨齊平傳稱盟于濡上似平皆有盟而云不盟者平實解怨和好之辭非要盟也彼自既平之後别為盟耳此與定十年及齊平皆傳無盟事定十一年及鄭平下乃云叔還如鄭涖盟平後乃盟知平非盟也夏五月辛酉公會齊侯盟于艾注泰山牟縣東南有艾山音義艾五蓋反秋七月注雖無事而書首月具四時以成嵗他皆放此疏注正義曰公羊傳曰此無事何以書春秋雖無事首時過則書首時過則何以書春秋編年四時具然後為年此注用公羊為説釋例曰年之四時雖或無事必空書首月以紀時變以明厯數也冬宋人取長葛注秋取冬乃告也上有伐鄭圍長葛長葛鄭邑可知故不言鄭也前年冬圍不克而還今冬乘長葛無備而取之言易也音義易以豉反傳同疏注正義曰經書冬傳言秋丘明為傳例不虛舉經文獨以秋言此事明是以秋取冬乃告也冬告者告言冬始取耳故書之於冬若其使以冬至告言秋取亦當追書於秋八年傳曰冬齊侯使來告成三國秋成冬告書之於秋明此以冬取告故書於冬也賈服以為長葛不繫鄭者刺不能撫有其邑凡邑為他國所取皆是不能撫有之何故於此獨為惡鄭故杜以為上有伐鄭圍長葛則長葛鄭邑可知故不言鄭也既言秋取取實在秋因其經文在冬遂言冬乘無備襄十三年傳例曰凡書取言易也知此乘其無備而取之也杜知長葛不繫鄭非大都以名通者以前年云伐鄭圍長葛長葛之文繫於鄭故也劉炫以大都名通而規杜氏非也傳六年春鄭人來渝平更成也注渝變也公之為公子戰於狐壤為鄭所執逃歸怨鄭鄭伐宋公欲救宋宋使者失辭公怒而止忿宋則欲厚鄭鄭因此而來故經書渝平傳曰更成音義壤如掌反使所吏反疏注正義曰渝變也釋言文變平者變更前惡而復為和好變即更之義成則平之訓故傳解渝平謂之更成自狐壤以來與鄭不和今曰復和故曰更成言更復狐壤以前之好也服虔云公為鄭所獲釋而不結平於是更為約束以結之故曰渝平案傳公賂尹氏而與之逃歸非鄭所釋安得釋而結平也翼九宗五正頃父之子嘉父逆晉侯于隨注翼晉舊都也唐叔始封受懷姓九宗職官五正遂世為晉強家五正五官之長九宗一姓為九族也頃父之子嘉父晉大夫音義頃音傾長丁文反下文及注同疏注正義曰唐叔始封受懷姓九宗職官五正者謂周成王滅唐始封唐叔於懷氏一姓九族及是先代五官之長子孫賜之言五官之長者謂於殷時為五行官長今褒寵唐叔故以其家族賜之耳今云頃父之子嘉父者以頃父舊居職位名號章顯嘉父新為大夫未甚著見故繫之於父諸繫父為文者義皆同此也納諸鄂晉人謂之鄂侯注鄂晉别邑諸地名疑者皆言有以示不審闕者不復記其闕他皆放此前年桓王立此侯之子於翼故不得復入翼别居鄂音義鄂五各反不復扶又反下同疏注正義曰杜言不復記其闕者謂但言某邑而已下不云闕若鄂直云晉别邑及翼侯奔隨注云隨晉地鄭人侵衛牧注云牧衛邑如此之類皆不言闕是也若不知何國之地者則言闕若虞公出奔共也公孫嬰齊卒于貍脤並注云闕是也亦有雖知某國之地注亦云闕則隱十一年蘇忿生十一邑注陘云闕者以餘邑皆知所在唯此獨闕故也夏盟于艾始平于齊也注春秋前魯與齊不平今乃棄惡結好故言始平于齊音義好呼報反五月庚申疏正義曰案經盟于艾亦在五月傳略不言月庚申之日須月以統之故别言五月他皆放此鄭伯侵陳大獲往嵗鄭伯請成于陳注成猶平也陳侯不許五父諫曰親仁善鄰國之寶也君其許鄭注五父陳公子他音義他徒何反人名皆同陳侯曰宋衛實難注可畏難也音義難乃旦反注同鄭何能為遂不許君子曰善不可失惡不可長其陳桓公之謂乎長惡不悛從自及也注悛止也從隨也音義悛七全反雖欲救之其將能乎商書曰惡之易也如火之燎于原不可鄉邇注商書盤庚言惡易長如火焚原野不可鄉近音義燎力召反又力弔反鄉夲又作嚮同許亮反近附近之近其猶可撲滅注言不可撲滅音義撲普卜反周任有言曰注周任周大夫音義任音壬為國家者見惡如農夫之務去草焉芟夷藴崇之絶其夲根勿使能殖則善者信矣注芟刈也夷殺也蘊積也崇聚也音義去起吕反芟所銜反説文作癹匹末反云以足踏夷草蘊紆粉反信如字一音申秋宋人取長葛冬京師來告飢公為之請糴於宋衛齊鄭禮也注告飢不以王命故傳言京師而不書於經也雖非王命而公共以稱命已國不足旁請鄰國故曰禮也傳見隱之賢音義為于偽反翟直歷反見賢遍反疏注正義曰王使至魯皆應書經此獨不書故解之以人情恕之不得自不輸粟空告他人故知己國不足旁請鄰國故曰禮也定五年歸粟于蔡尚書於經此不書者魯以往嵗螟災故已國飢困所輸不多宋鄭輸粟不復告魯故皆不書此事無經而發故解傳意見隱之賢諸無經之傳皆意有所見悉皆放此鄭伯如周始朝桓王也注桓王即位周鄭交惡至是乃朝故曰始王不禮焉周桓公言於王曰我周之東遷晉鄭焉依注周桓公周公黑肩也周采地扶風雍縣東北有周城幽王為犬戎所殺平王東徙晉文侯鄭武公左右王室故曰晉鄭焉依音義焉依如字或於虔反非雍於用反左音佐右音祐又並如字疏注正義曰桓公是周公黑肩事見桓十八年傳也幽王娶申女為后生太子宜臼後得褒姒嬖之生子伯服廢申后逐太子以褒姒為后伯服為太子宜臼奔申申侯乃與犬戎共攻幽王殺幽王於驪山之下於是諸侯乃與申侯共立宜臼是為平王以西都逼戎晉文侯鄭武公來輔平王東遷洛邑毛詩尚書國語史記皆略有其事善鄭以勸來者猶懼不蔇注蔇至也音義蔇其器反况不禮焉鄭不來矣注為桓五年諸侯從王伐鄭傳經七年春王三月叔姬歸于紀注無傳叔姬伯姬之娣也至是歸者待年於父母國不與嫡俱行故書音義嫡夲又作適同丁歷反疏注正義曰女嫁於他國皆有姪娣與適俱行則所尊在適書適不書姪娣叔姬待年之女年滿特行故書其歸魯女嫁於他國之卿皆書之夫人之娣尊與卿同其書固是常例賈云書之者刺紀貴叔姬傳無其事是妄説也滕侯卒注傳例曰不書名未同盟也滕國在沛國公丘縣東南音義沛音貝疏正義曰譜云滕姬姓文王子錯叔繡之後武王封之居滕今沛郡公丘縣是也自叔繡至宣公十七世乃見春秋隱公以下春秋後六世而齊滅之世夲云齊景公亡滕案齊景之卒在滕隱之前世夲言隱公之後仍有六世為君而云齊景亡滕為謬何甚服虔昭四年注亦云齊景亡滕是不考校而謬言之地理志云沛郡公丘縣故滕國也周文王子錯叔繡所封三十一世為齊所滅夏城中丘注城例在莊二十九年中丘在琅邪臨沂縣東北音義琅音郎沂魚依反齊侯使其弟年來聘注諸聘皆使卿執玉帛以相存問例在襄九年疏注正義曰聘禮使者執圭以致命束帛加璧以致享鄭玄云享獻也既聘又獻所以厚恩惠也是執玉帛以相存問也玉人職云瑑圭璋璧琮八寸以眺聘注云八寸者據上公之臣案聘禮圭以聘君璋以聘夫人既行聘之後璧以享君琮以享夫人又鄭玄注小行人云使卿大夫眺聘降其君瑞一等則侯伯之臣圭璋璧琮皆六寸子男之臣皆四寸又小行人云圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼鄭玄注云二王之後享天子圭以馬享后璋以皮其餘諸侯享天子璧以帛享后琮以錦子男享大國之君琥以繡享大國夫人璜以黼是玉帛之文也秋公伐邾冬天王使凡伯來聘注凡伯周卿士凡國伯爵也汲郡共縣東南有凡城音義共音恭凡字夲作泛音凡戎伐凡伯于楚丘以歸注戎鳴鐘鼓以伐天子之使見夷狄強暴不書凡伯敗者單使無衆非戰陳也但言以歸非執也楚丘衛地在濟隂城武縣西南音義使所吏反下同見賢遍反暴蒲報反陳直覲反疏注正義曰傳例有鐘鼓曰伐此既言伐知其鳴鐘鼓也杜意言以歸者以彼隨已而已非囚執之辭故云但言以歸非執也杜必知以歸非執者穀梁傳云以歸猶愈乎執也又昭十三年晉人執季孫意如以歸若以歸是執何須别起執文明直言以歸者非執也至如定四年以沈子嘉歸經云殺之哀七年以邾子益來傳云囚諸負瑕既有囚殺之文容或是執若直言以歸無囚殺之事者則非執者也春秋有文同事異此即其類也劉君引沈子邾子云以歸者皆執以歸杜氏非其義也傳七年春滕侯卒不書名未同盟也凡諸侯同盟於是稱名故薨則赴以名注盟以名告神故薨亦以名告同盟告終稱嗣也以繼好息民注告亡者之終稱嗣位之主嗣位之主當奉而不忘故曰繼好好同則和親故曰息民音義好呼報反注同謂之禮經注此言凡例乃周公所制禮經也十一年不告之例又曰不書於䇿明禮經皆當書於䇿仲尼修春秋皆承䇿為經丘眀之傳博采衆記故始開凡例特顯此二句他皆放此疏正義曰諸侯者公侯伯子男五等之總號侯訓君也五等之主雖爵命小異而俱是國君故總稱諸侯也諸發凡者皆周公之垂法史書之舊章丘明采合舊語以發明史例雖意是舊典而辭出丘明非全寫舊語同盟稱名薨則赴以名是周公之舊典其告終稱嗣以下乃是解釋赴意非舊語也僖二十三年又發例曰凡諸侯同盟死則赴以名禮也直言赴名是禮不言繼好是禮繼好息民是禮之大意非禮之實明是丘明言此以解赴名之意彼云禮也此云謂之禮經其事一也言謂此赴名為禮之常法丘明之意言周公謂之然也謂之禮經雖指此一事諸發凡者莫不盡然以此為例之初故特言之注正義曰凡例是周公所制其來亦無所出以傳言謂之禮經則是先聖謂之非丘明自謂之也史之書策必有舊法一代大典周公所制故知凡例亦是周公所制此言凡例則云謂之禮經下言凡例則云不書于策以此明所謂禮經皆當書策從傳之首至此始開凡例故特顯此二句二句者謂之禮經是一句與不書于策為二句也然則九年凡雨自三日以往為霖不以為始而逺取十一年云始開凡例者以九年唯記當國雨雪之事史䇿舊文非是赴告國家大事之例夏城中丘書不時也齊侯使夷仲年來聘結艾之盟也注艾盟在六年秋宋及鄭平七月庚申盟于宿公伐邾為宋討也注公距宋而更與鄭平欲以鄭為援今鄭復與宋盟故懼而伐邾欲以求宋故曰為宋討音義為宋于偽反注為宋同援于眷反復扶又反初戎朝于周發幣于公卿凡伯弗賔注朝而發幣於公卿如今計獻詣公府卿寺疏注正義曰朝於天子獻國之所有亦發陳財幣於公卿之府寺如今者如晉時諸州年終遣會計之吏獻物於天子因令以物詣公府卿寺然自漢以來三公所居謂之府九卿所居謂之寺風俗通曰府聚也公卿牧守府道德之所聚也藏府私府財貨之所聚也寺司也庭有法度令官所止皆曰寺釋名曰寺嗣也治事者相嗣續於其內冬王使凡伯來聘還戎伐之于楚丘以歸注傳言凡伯所以見伐陳及鄭平注六年鄭侵陳大獲今乃平十二月陳五父如鄭涖盟注涖臨也壬申及鄭伯盟歃如忘注志不在於歃血也音義歃色洽反歃血也如忘亡亮反服虔云如而也疏正義曰歃謂口含血也當歃血之時如似遺忘物然故注云志不在於歃血也服虔云如而也臨歃而忘其盟載之辭言不精也盟載之辭在於簡策祝史讀以告神非歃者自誦之何言忘載辭也且忘否在心五父終不自言已忘泄伯安知其忘而譏之泄伯曰五父必不免不賴盟矣注泄伯鄭泄駕音義泄息列反鄭良佐如陳涖盟注良佐鄭大夫辛巳及陳侯盟亦知陳之將亂也注入其國觀其政治故總言之也皆為桓五年六年陳亂蔡人殺陳他傳音義治直吏反鄭公子忽在王所故陳侯請妻之注以忽為王寵故音義妻七計反鄭伯許之乃成昏注為鄭忽失齊昏援以至出奔傳音義為鄭于偽反經八年春宋公衛侯遇于垂注垂衛地濟隂句陽縣東北有垂亭音義句古侯反三月鄭伯使宛來歸祊注宛鄭大夫不書氏未賜族祊鄭祀泰山之邑在琅邪費縣東南音義宛於阮反祊必彭反費音祕疏注正義曰內卿貶則去族外卿貶則稱人外無去族之理今宛無族傳無譏文故知未賜族也傳言鄭釋泰山之祀使來歸祊知祊是鄭祀泰山之邑鄭以桓公之故受邑泰山之下天子祭泰山必從往助祭使共湯沐焉故公羊謂之湯沐之邑既有此邑因立周廟劉炫云言祀泰山之邑者謂泰山之旁有此邑邑內有鄭宗廟之祀蓋祀桓武之神庚寅我入祊注桓元年乃卒易祊田知此入祊未肯受而有之夏六月己亥蔡侯考父卒注無傳襄六年傳曰杞桓公卒始赴以名同盟故也諸侯同盟稱名者非唯見在位之君也嘗與其父同盟則亦以名赴其子亦所以繼好也蔡未與隱盟蓋春秋前與惠公盟故赴以名音義見賢遍反好呼報反疏注正義曰同盟赴名自有成例而引杞桓公者蔡自春秋以來未與魯盟疑與惠公同盟故引杞桓為例杞桓與成公同盟而以名赴襄公傳曰同盟故也則與其父盟得以名赴其子故疑蔡與惠盟故以名赴隱也同盟稱名則兩君相知君既知之則國內皆知故彼父雖薨得以名赴彼子以此名嘗與彼父對稱故也若父與彼盟彼君雖在此子不得以其名赴以此名未與彼君對稱故也辛亥宿男卒注無傳元年宋魯大夫盟于宿宿與盟也晉荀偃禱河稱齊晉君名然後自稱名知雖大夫出盟亦當先稱已君之名以答神明故薨皆從身盟之例當告以名也傳例曰赴以名則亦書之不然則否辟不敏也今宿赴不以名故亦不書名諸例或發於始事或發於後者因宜有所異同亦或丘明所得記注夲末不能皆備故音義宿與音預下不與同禱丁老反或丁報反疏注正義曰於例盟以國地則地主與之元年盟于宿知宿與盟也魯宋俱是微人宿君必不親與知宿亦大夫盟也盟禱雖異俱是告神荀偃之禱先稱君名知大夫聚盟亦各稱君名臣盟既稱君名則君薨得以名赴宿君之卒宜以名赴魯今宿男不名自不以名赴非法不得也故引僖二十三年傳例以明之言其赴不以名雖知亦不得書也諸君不親盟而以名赴魯注云大夫盟於某者義皆出此衛冀隆難杜云周人以諱事神臣子何得以君之名告神又荀偃禱河一時之事耳非正禮也何得知大夫盟先稱君名乎杜必為此解者以諱事神謂諱神之名以事其神若祭祖而諱祖之類山川之神尊於諸侯故尚書武成告名山大川云有道周王發則荀偃禱河自稱君名於理何怪杜云諸例或發於始事或發於後者若七年滕侯卒傳曰凡諸侯同盟於是稱名及桓二年公至自唐凡公行告于宗廟是或發於始事也宣四年凡弒君稱君及僖二十六年凡師能左右之曰以是或發於後也云因宜有所異同者宣四年鄭公子歸生弒君嫌歸生無罪及宣五年髙固來逆叔姬嫌見逼成昏故傳因以明之是也云亦或丘明所得記注夲末不能皆備者但杜又自疑以為諸例皆應從始事而發在後發者以記注周公舊凡不繫於始事繫於後事丘明作傳因記注所繫遂以發之如杜此言則周公舊凡於記注之文散在諸事丘明作傳因記注之文發例故或先或後也秋七月庚午宋公齊侯衛侯盟于瓦屋注齊侯尊宋使主會故宋公序齊上瓦屋周地疏注正義曰春秋之例國以大小為序外傳鄭語云齊莊僖於是乎小伯此齊侯即僖公也此盟平宋衛也齊為會主則齊宜在上今宋在齊上故特解之由宋敬齊侯與衛先遇故齊侯尊宋使為會主瓦屋既闕知是周地者以其會于溫盟于瓦屋會盟不得相逺溫是周地知瓦屋亦周地也八月葬蔡宣公注無傳三月而葬速九月辛卯公及莒人盟于浮來注莒人微者不嫌敵公侯故直稱公例在僖二十九年浮來紀邑東莞縣北有邳鄉邳鄉西有公來山號曰邳來間音義邳蒲悲反問如字疏注正義曰僖二十九年公會王子虎及諸侯之卿盟于翟泉沒公不言貶卿稱人直言會某人某人傳曰卿不書罪之也在禮卿不會諸侯會伯子男可也此莒人乃對會公侯故解之莒是小國卿當稱人非貶辭也微者不嫌能敵公侯故直稱公也螟注無傳為災冬十有二月無駭卒注公不與小斂故不書曰卒而後賜族故不書氏音義斂力驗反傳八年春齊侯將平宋衛注平宋衛於鄭有會期宋公以幣請於衛請先相見注宋敬齊命衛侯許之故遇于犬丘注犬丘垂也地有兩名疏注正義曰地有兩名新舊改易者傳則言實以明之若二名俱存者傳則錯經以見之此犬丘與垂兩名俱存故傳不言實釋例曰若一地二名當時並有則直兩文互見黑壤犬丘時來之屬是也猶卿大夫名氏互見非例也鄭伯請釋泰山之祀而祀周公以泰山之祊易許田三月鄭伯使宛來歸祊不祀泰山也注成王營王城有遷都之志故賜周公許田以為魯國朝宿之邑後世因而立周公别廟焉鄭桓公周宣王之母弟封鄭有助祭泰山湯沐之邑在祊鄭以天子不能復巡守故欲以祊易許田各從夲國所近之宜恐魯以周公别廟為疑故云已廢泰山之祀而欲為魯祀周公孫辭以有求也許田近許之田音義泰山如字東嶽能復扶又反守手又反近附近之近下同又如字欲為于偽反下為魯同疏注正義曰成王營邑於洛邑為居土之中貢賦路均將於洛邑受朝許田近於王城故賜周公許田以為魯國朝宿之邑詩魯頌曰居常與許復周公之字是周公得許田也公羊傳曰許田者何魯朝宿之邑也是許田為魯朝宿之邑鄭請易許田而求祀周公故知後世因在許田之中而立周公别廟焉鄭桓公以周宣王之母弟故於泰山之下亦受祊田以為湯沐之邑祊邑內亦有鄭先君别廟此時周室既衰王不巡守鄭以天子不復巡守則泰山之祀既廢祊無所用故欲以祊易許許田近鄭祊田近魯各從夲國所近之宜也魯以許田奉周公之祀易其田則廢其祀恐魯以周公别廟為疑慮將不許云已廢泰山之祀而欲為魯祀周公言鄭得許田周公之祀不絶也云已廢泰山之祀者謂天子不復巡守鄭家已廢此助祭泰山祭祀之事無所祭祀故欲為魯祀周公其實廢來已久今始云巳廢者欲為魯祀周公故云已廢耳方便遜辭以求於魯也定四年祝他言康叔之受分物云取於有閻之土以共王職取於相土之東都以會王之東搜有閻之土猶魯之許田也相土之東都猶鄭之祊邑也鄭近京師無假朝宿魯近泰山不須湯沐各受其一衛以道路並逺故兩皆有之禮記王制曰方伯為朝天子皆有湯沐之邑於天子之縣內然則朝宿之邑亦名湯沐但向京師主為朝王從王巡守主為助祭祭必沐浴隨事立名朝宿湯沐亦互言之耳異義左氏説諸侯有大功德乃有朝宿湯沐之邑公羊説以為諸侯皆有朝宿湯沐之邑許慎以公羊為非則杜意亦從許慎也公羊傳曰此魯朝宿之邑也則曷為謂之許田諱取周田也諱取周田則曷為謂之許田繫之許也曷為繫之許近許也杜言近許之田是用公羊為説杜依公羊之傳邑實近許故以許為名劉君更無所馮直云别有許邑邑自名許非由近許國始名為許以規杜氏非其義也夏虢公忌父始作卿士于周注周人於此遂畀之政音義畀必二反四月甲辰鄭公子忽如陳逆婦媯辛亥以媯氏歸甲寅入于鄭陳針子送女先配而後祖針子曰是不為夫婦誣其祖矣非禮也何以能育注針子陳大夫禮逆婦必先告祖廟而後行故楚公子圍稱告莊公之廟鄭忽先逆婦而後告廟故曰先配而後祖音義針其廉反誣亡符反共音恭夲亦作恭疏注正義曰先配後祖多有異説賈逵以配為成夫婦也禮齊而未配三月廟見然後配案昏禮親迎之夜祍席相連是士禮不待三月也禹娶塗山四日即去而有啓生焉亦不三月乃配是賈之謬也鄭衆以配為同牢食也先食而後祭祖無敬神之心故曰誣其祖也案昏禮婦既入門即設同牢之饌其間無祭祀之事先祭乃食禮無此文是鄭之妄也鄭玄以祖為袚道之祭也先為配匹而後祖道言未去而行配案傳既言入于鄭乃云先配而後祖寧是未去之事也若未去先配則針子在陳譏之何須云送女也此三説皆滯故杜引楚公子圍告廟之事言鄭忽先逆婦而後告廟故曰先配而後祖此時忽父見在計告廟以否當是莊公之事而譏忽者楚公子圍亦人臣矣而自布几筵告於莊共之廟不言稟君之命知逆者雖受父命當自告廟且忽先為配匹而後告祖見其告祖方始譏之知忽自告祖也或可鄭伯為忽娶妻先逆而後告廟針子見而譏之公子圍告廟者專權自由耳非正也齊人卒平宋衛于鄭秋會于溫盟于瓦屋以釋東門之役禮也注會溫不書不以告也定國息民故曰禮也平宋衛二國忿鄭之謀鄭不與盟故不書音義與音預八月丙戌鄭伯以齊人朝王禮也注言鄭伯不以虢公得政而背王故禮之齊稱人略從國辭上有七月庚午下有九月辛卯則八月不得有丙戌音義背音佩疏注正義曰庚午之後十六日而有丙戌二十一日而有辛卯七月有庚午九月有辛卯其間不容一月是八月不得有丙戌更遙一周則丙戌去庚午七十七日八月亦不得有丙戌是明丙戌為日誤長歷推七月丁卯朔四日庚午至二十日是丙戌九月丙寅朔二十六日辛卯其月二十一日是丙戌八月小丁酉朔十日丙午二十日丙辰二日戊戌十四日庚戌二十六日壬戌未知丙戌二字孰為誤也不直云日誤而檢上下者因傳明文故顯言之他皆放此公及莒人盟于浮來以成紀好也注二年紀莒盟于密為魯故今公尋之故曰以成紀好音義好呼報反注同冬齊侯使來告成三國注齊侯冬來告稱秋和三國公使衆仲對曰君釋三國之圖以鳩其民君之惠也寡君聞命矣敢不承受君之明德注鳩集也無駭卒羽父請諡與族公問族於衆仲衆仲對曰天子建德注立有德以為諸侯因生以賜姓注因其所由生以賜姓謂若舜由媯汭故陳為媯姓音義汭如鋭反疏注正義曰陳世家云陳胡公滿者虞帝舜之後也昔舜為庶人時居于媯汭其後因為氏姓姓媯氏武王克殷得媯滿封之於陳是舜由媯汭故陳為媯姓也案世夲帝舜姚姓哀元年傳稱虞思妻少康以二姚是自舜以下猶姓姚也昭八年傳曰及胡公不淫故周賜之姓是胡公始姓媯耳史記以為胡公之前已姓媯非也胙之土而命之氏注報之以土而命氏曰陳音義胙才故反報也疏注正義曰胙訓報也有德之人必有美報報之以土謂封之以國名以為之氏諸侯之氏則國名是也周語曰帝嘉禹德賜姓曰姒氏曰有夏胙四嶽國賜姓曰薑氏曰有呂亦與賜姓曰媯命氏曰陳其事同也姓者生也以此為祖令之相生雖下及百世而此姓不改族者屬也與其子孫共相連屬其傍支别屬則各自立氏禮記大傳曰繫之以姓而弗别百世而昏姻不通者周道然也是言子孫當共姓也其上文云庶姓别於上而戚單於下是言子孫當别氏也氏猶家也傳稱盟于子晢氏逐狗入于華臣氏如此之類皆謂家為氏氏族一也所從言之異耳釋例曰别而稱之謂之氏合而言之則曰族例言别合者若宋之華元華喜皆出戴公向魚鱗蕩共出桓公獨舉其人則云華氏向氏并指其宗則云戴族桓族是其别合之異也記謂之庶姓者以始祖為正姓髙祖為庶姓亦氏族之别名也姓則受之於天子族則稟之於時君天下之廣兆民之衆非君所賜皆有族者人君之賜姓賜族為此姓此族之始祖耳其不賜者各從父之姓族非復人人賜也晉語稱黃帝之子二十五人其得姓者十二人天子之子尚不得姓况餘人哉固當從其父耳黃帝之子兄弟異姓周之子孫皆姓姬者古今不同質文代革周代尚文欲令子孫相親故不使别姓其賜姓者亦少唯外姓媯滿之徒耳賜族者有大功德宜世享祀者方始賜之無大功德任其興衰者則不賜之不賜之者公之同姓蓋亦自氏祖字其異姓則有舊族可稱不世其祿不盡賜也衆仲以天子得封建諸侯故云胙土命氏據諸侯言耳其王朝大夫不封為國君者亦當王賜之族何則春秋之世有尹氏武氏之徒明亦天子賜之與諸侯之臣義無異也此無駭是卿羽父為之請族蓋為卿乃賜族大夫以下或不賜也諸侯之臣卿為其極既登極位理合建家若其父祖微賤此人新升為卿以其位絶等倫其族不復因故身未被賜無族可稱魯挾鄭宛皆未賜族故單稱名也或身以才舉暫升卿位功德猶薄未足立家則雖為卿竟不賜族羽父為無駭請族知其皆由時命非例得之也華督生立華氏知其恐慮不得故早求之也由此而言明有竟無族者魯之翬挾柔溺名見於經而其後無聞是或不得族也其士會之孥處秦者為劉氏伍員之子在齊為王孫氏外傳稱知果知知伯之將滅自别其族為輔氏如此之類皆是身自為之非復君賜釋例曰子孫繁衍枝布葉分始承其夲末取其别故其流至於百姓萬姓其言自有百姓萬姓未必皆君賜也晉語稱炎帝姓薑則伯夷炎帝之後薑自是其夲姓而云賜姓曰薑者黃帝之後别姓非一自以薑姓賜伯夷更使為一姓之祖耳非復因舊姓也猶后稷别姓姬不是因黃帝姓也諸侯以字注諸侯位卑不得賜姓故其臣因氏其王父字為諡因以為族注或使即先人之諡稱以為族疏正義曰杜意諸侯以字言賜先人字為族也為諡因以為族謂賜族雖以先人之字或用先人所為之諡因將為族以諡為族者衛齊惡宋戴惡之類是也而劉君乃稱以諡為族全無一人妄規杜氏非其義也死後賜族乃是正法春秋之世亦有非禮生賜族者華督是也釋例曰舊説以為大夫有功德者則生賜族非也至於鄭祭仲為祭封人後升為卿經書祭仲以生賜族者檢傳既無同華氏之文則祭者是仲之舊氏也諸侯以字字有二等檀弓曰幼名冠字五十以伯仲周道也然則二十有加冠之字又有伯仲叔季為長幼之字二者皆可以為氏矣服虔云公之母弟則以長幼為氏貴適統伯仲叔季是也庶公子則以配字為氏尊公族展氏臧氏是也案鄭子人者鄭厲公之弟桓十四年鄭伯使其弟語來盟即其人也而其後為子人氏不以仲叔為氏則服言公之母弟以長幼為氏其事未必然也杜以慶父叔牙與莊公異母自然仲叔非母弟族矣其或以二十之字或以長幼之字蓋出自時君之命也叔肸稱叔不稱孫而三桓皆稱孫俱氏長幼之字自不同也臧氏稱孫展氏不稱孫俱氏二十之字自不同也然則稱孫與不稱孫蓋出其家之意未必由君賜也以氏為族者謂公之曾孫以王父之字為族也諸侯之子稱公子公子之子稱公孫公子公孫繫公之常言非族也其或貶責則亦與族同成十四年叔孫僑如如齊逆女傳曰稱族尊君命也僑如以夫人婦薑氏至自齊傳曰舍族尊夫人也宣元年公子遂如齊逆女遂以夫人至事與僑如正同其傳直云尊君命導夫人不言稱族舍族既非氏族則不待君賜自稱之矣至於公孫之子不復得稱公曾孫如無駭之輩直以名行及其死也則賜之族以其王父之字為族也此無駭是公之曾孫公之曾孫必須有族故據曾孫為文言以王父字耳公之曾孫正法死後賜族亦有未死則有族者則叔孫得臣是也公子公孫於身必無賜族之理經書季友仲遂叔肸者皆是以字配名連言之故杜注並云字也其蕩伯姬者公子蕩之妻不可言公子伯姫故繫於夫字言蕩伯姬蕩非當時之氏其傳云立叔孫氏臧僖伯臧哀伯叔孫戴伯之徒皆傳家據後追言之耳其公孟彄世夲以為靈公之子字公孟名彄與季友仲遂相似俱以字配名劉炫不逹此直妄規杜過非也必如劉解生賜族之文證在何處其公之曾孫玄孫以外爰及異姓有新升為卿君賜之族蓋以此卿之字即為此族案世夲宋督是戴公之孫好父説之子華父是督之字計督是公孫耳未合賜族應死後其子乃賜族故杜云督未死而賜族督之妄也沈亦云督之子方可有族耳官有世功則有官族邑亦如之注謂取其舊官舊邑之稱以為族皆稟之時君音義稱尺證反疏注正義曰舊官謂若晉之士氏舊邑若韓魏趙氏非是君賜則不得為族嫌其居官邑不待公命故云皆稟之時君此謂同姓異姓皆然也服虔止謂異姓又引宋司城韓魏為證韓與司城非異姓司城又自為樂氏不以司城為族也公命以字為展氏注諸侯之子稱公子公子之子稱公孫公孫之子以王父字為氏無駭公子展之孫故為展氏經九年春天王使南季來聘注無傳南季天子大夫也南氏季字也三月癸酉大雨震電庚辰大雨雪注三月今正月音義電徒練反雨雪于付反傳同疏正義曰説文云震劈歷震物者電隂陽激曜也河圖云隂陽相薄為雷隂激陽為電然則震是雷之劈歷電是雷光僖十五年震夷伯之廟是劈歷破之雷之甚者為震故何休云震雷也説文云雨水從雲下也然則雨者天上下水之名既見雨從天下自上下者因即以雨言之雨螽亦稱為雨故下雪稱雨雪也平原出水為大水直書大水平地尺為大雪不直書大雪而云大雨雪者水則從天入地出地乃為多見其在地之多言其出水之大故不言大雨水雪則自天而下下即委之於地見其自上而下言其下雪之多故言大雨雪水則俯視雪則仰觀故立文有異其大雨雹亦與雪同挾卒注無傳挾魯大夫未賜族夏城郎秋七月冬公會齊侯于防注防魯地在琅邪華縣東南傳九年春王三月癸酉大雨霖以震書始也注書癸酉始雨日音義霖音林爾雅云久雨謂之淫淫雨謂之霖庚辰大雨雪亦如之書時失也注夏之正月微陽始出未可震電既震電又不當大雨雪故皆為時失凡雨自三日以往為霖注此解經書霖也而經無霖字經誤疏注正義曰傳發凡以解經若經無霖字則傳無由發故知經誤然則經當如傳言大雨霖以震不當云大雨震電是經脫霖以二字而妄加電也平地尺為大雪夏城郎書不時也宋公不王注不共王職音義共音恭夲亦作供鄭伯為王左卿士以王命討之伐宋宋以入郛之役怨公不告命注入郛在五年公以七年伐邾欲以説宋而宋猶不和也公怒絶宋使秋鄭人以王命來告伐宋注遣使致王命也伐宋未得志故復往告之冬公會齊侯于防謀伐宋也北戎侵鄭鄭伯禦之患戎師曰彼徒我車懼其侵軼我也注徒步兵也軼突也音義軼直結反又音逸公子突曰使勇而無剛者嘗寇而速去之注公子突鄭厲公也嘗試也勇則能往無剛不恥退君為三覆以待之注覆伏兵也戎輕而不整貪而無親勝不相讓敗不相救先者見獲必務進進而遇覆必速奔後者不救則無繼矣乃可以逞注逞解也音義輕遣政反逞敕領反解音蟹或佳買反疏正義曰嘗寇速去知戎必逐之逐其去者必有所獲獲謂獲鄭人也在先者見逐有所獲不復顧後必務在速進謂棄其後者獨自先進進而遇覆必速回奔走後者不救則是無繼續矣無繼則易敗如是乃可以解患服虔云先者見獲言必不往相救各自務進言其貪利也其言見獲者當謂戎被鄭獲也鄭人速去以誘之安得獲戎也在先者已被鄭獲重進者將復為虜各自務進欲何所貪而云貪利也此則不言可解無故以解亂之從之戎人之前遇覆者奔祝聃逐之注祝聃鄭大夫音義聃乃甘反一音士甘反衷戎師前後擊之盡殪注為三部伏兵祝聃帥勇而無剛者先犯戎而速奔以遇二伏兵至後伏兵起戎還走祝聃反逐之戎前後及中三處受敵故曰衷戎師殪死也音義衷丁仲反又音忠殪於計反處昌慮反疏注正義曰前後及中三處受敵者前謂第一伏逆其前也後謂祝聃與後伏逐其後也中謂第二伏擊其中也衷戎師者謂戎師在三伏之中殪死也釋詁文戎師大奔注後駐軍不復繼也音義駐丁住反十一月甲寅鄭人大敗戎師注此皆春秋時事雖經無正文所謂必廣記而備言之將令學者原始要終尋其枝葉究其所窮他皆放此音義令力呈反要於遙反疏正義曰此即上傳所説擊戎之事史官得其戰狀乃裁約為之辭經之所陳皆是此類既不書經故準經為文以總之經十年春王二月公會齊侯鄭伯于中丘注傳言正月會癸丑盟釋例推經傳曰月癸丑是正月二十六日知經二月誤夏翬帥師會齊人鄭人伐宋注公子翬不待公命而貪會二國之君疾其専進故去氏齊鄭以公不至故亦更始微者從之伐宋不言及明翬專行非鄧之謀也及例在宣七年音義去起呂反傳同疏注正義曰傳稱羽父先會齊侯鄭伯是不待公命也貪會二國之君自求其名時史疾其専進故貶去公子公子義與氏同故以氏言之中丘之會計君自親行今齊鄭稱人是使微者從之也於例師出與謀曰及傳稱盟於鄧為師期公既與謀計當書及今乃言會明其以翬專行非鄧之謀釋例曰王命伐宋羽父不匡君以速進而先會二國自以為名故貶去其族齊為侯伯鄭伯又為王卿士二君奉王命以討宋惡羽父之專進故使與微者同伐動而無功故無成敗也案四年翬固請而行故貶去其氏此直言翬先會齊侯鄭伯無固請之文亦貶之者又公子豫會邾人鄭人以不待公命而經不書此翬亦不待公命而經書者翬於四年傳稱固請明此先會亦固請也傳於四年其文已詳故於此而略耳豫會邾人鄭人夲非公命故不書此則公會齊鄭于中丘已為師期翬又請公先會先會則是君命故以書之六月壬戌公敗宋師于菅注齊鄭後期故公獨敗宋師書敗宋未陳也敗例在莊十一年菅宋地音義菅古頑反陳直覲反疏注正義曰案傳公會齊侯鄭伯于老桃然後公敗宋師則知老桃之會謀與宋戰彼與公謀戰而公獨敗宋師知齊鄭後期也辛未取郜辛巳取防注鄭後至得郜防二邑歸功於魯故書取明不用師徒也濟隂城武縣東南有郜城髙平昌邑縣西南有西防城音義郜古報反字林又工竺反秋宋人衛人入鄭宋人蔡人衛人伐戴鄭伯伐取之注三國伐戴鄭伯因其不和伐而取之書伐用師徒也書取克之易也戴國今陳留外黃縣東南有戴城音義戴音載字林作戴云故國在陳留易以豉反傳同疏注正義曰案傳例克邑不用師徒曰取然則取者據克邑之易今此克得軍師亦稱取者但取者雖據克邑之文其克得師衆而易者亦曰取是以莊十一年注云威力兼備若羅網所掩覆一軍皆見禽制若非前敵之易何能覆而取之故釋例曰如取如攜然則凡言取者皆易辭劉君以取之非易而規杜氏非也沈氏亦云今日圍明日取故知易也公羊傳曰其言伐取之何易也是杜所用之義地理志云梁國災縣故戴國應劭曰章帝改曰考城古者災戴聲相近故鄭玄詩箋讀俶載為熾災是其音大同故漢於戴國立災縣於晉屬陳留冬十月壬午齊人鄭人入郕傳十年春王正月公會齊侯鄭伯于中丘癸丑盟于鄧為師期注尋九年會于防謀伐宋也公既會而盟盟不書非後也蓋公還告會而不告盟鄧魯地疏注正義曰九年傳稱會于防謀伐宋未及伐宋而更為此會為師伐宋之期知是尋防會也釋例曰盟于鄧盟于犖盟于戚公既在會而不書盟者以理推之會在盟前知非後盟也蓋公還告會而不告盟夏五月羽父先會齊侯鄭伯伐宋注言先會明非公夲期釋翬之去族六月戊申公會齊侯鄭伯于老桃注會不書不告於廟也老桃宋地六月無戊申戊申五月二十三日日誤疏注正義曰六月無戊申者下有辛巳取防亦在六月之內戊申在辛巳之前三十三日不得共在一月上有五月今别言六月知日誤月不誤長歷推六月丙辰朔三日戊午五日庚申未知二者孰誤壬戌公敗宋師于菅庚午鄭師入郜辛未歸于我庚辰鄭師入防辛巳歸于我注壬戌六月七日庚午十五日庚辰二十五日鄭伯後期而公獨敗宋師故鄭頻獨進兵以入郜防入而不有命魯取之推功上爵讓以自替不有其實故經但書魯取以成鄭志善之也君子謂鄭莊公於是乎可謂正矣以王命討不庭注下之事上皆成禮於庭中不貪其土以勞王爵正之體也注勞者敘其勤以答之諸侯相朝逆之以饔餼謂之郊勞魯侯爵尊鄭伯爵卑故言以勞王爵音義勞力報反注同餼許氣反疏注正義曰聘禮賔至于近郊君使卿朝服用束帛勞覲禮至于郊王使人皮辨用璧勞周禮司儀曰諸公相為賔主君郊勞皆不言以饔餼勞案禮饔餼乃是既相見致大禮不應於郊以設之杜意蓋以熟食曰饔生牲曰餼以勞客於郊必有牲饌故以饔餼言之非謂大禮之饔餼也勞禮大行人云上公三勞近郊勞一也逺郊勞二也竟首勞三也侯伯再勞去竟首子男一勞去逺郊凡近郊勞皆君自行逺郊使卿竟首使大夫掌客又云上公五積皆視飱牽侯伯四積子男三積是賔入竟之後有致積之禮積雖是牽亦或有熟或在郊致積故謂之郊勞沈依聘禮注其郊之逺近上公逺郊五十里侯伯三十里子男十里近郊各半之蔡人衛人郕人不會王命注不伐宋也秋七月庚寅鄭師入郊猶在郊注鄭師還駐兵於逺郊宋人衛人入鄭注宋衛竒兵承虛入鄭蔡人從之伐戴注從宋衛伐戴也八月壬戌鄭伯圍戴癸亥克之取三師焉注三國之軍在戴故鄭伯合圍之師者軍旅之通稱音義稱尺證反疏注正義曰三國之軍在戴城下故鄭伯合圍之不言圍戴者夲意圍三師不圍戴也不言圍三師者今曰圍明日取圍之不久徑以取告不以圍告三國經皆稱人於例為將卑師少而傳言三師故辨之師者軍旅之通稱宋衛既入鄭而以伐戴召蔡人注伐戴乃召之蔡人怒故不和而敗注言鄭取之易也九月戊寅鄭伯入宋注報入鄭也九月無戊寅戊寅八月二十四日疏注正義曰九月無戊寅者經有十月壬午長歷推壬午十月二十九日戊寅在壬午之前四日耳故九月不得有戊寅上有八月下有冬則誤在日也冬齊人鄭人入郕討違王命也經十有一年春滕侯薛侯來朝注諸侯相朝例在文十五年音義薛息列反疏正義曰十下言有者干寶云十盈則更始以竒從盈數故言有也經備文傳從略故傳不言有桓七年穀伯鄧侯别言來朝此兼言來朝者彼别行禮此同行禮由同時行禮當長者在先故爭之夏公會鄭伯于時來注時來郲也滎陽縣東有釐城鄭地也音義郲音來釐音來王元規力之反秋七月壬午公及齊侯鄭伯入許注與謀曰及還使許叔居之故不言滅也許潁川許昌縣音義與音預還音環疏注正義曰與謀曰及宣七年傳例也傳稱會于郲謀伐許是公與謀也譜云許薑姓與齊同祖堯四嶽伯夷之後也周武王封其苗文叔于許今潁川許昌是也靈公徙葉悼公遷夷一名城父又居析一名白羽許男斯處容城自文叔至莊公十一世始見春秋元公子結元年獲麟之嵗也當戰國初楚滅之地理志云潁川郡許縣故許國文叔所封二十四世為楚所滅也漢世名許縣耳魏武作相改曰許昌冬十有一月壬辰公薨注實弒書薨又不地者史䇿所諱也疏注正義曰他君見弒則書弒魯君見弒則書薨公薨例皆地此公又不地故解之言魯史䇿書所諱也不忍言君之見弒又不忍言其僵尸之處諱而不書故夫子因之傳不言書曰知是舊史諱之也董狐書趙盾弒君仲尼謂之良史不書君弒則是史之不良夫子不改其文而因之者為人臣者或心實愛君為諱愆過或志在疾惡故章賊名雖事迹不同而俱是為國聖賢兩通其事欲見仁非一塗僖元年傳曰諱國惡禮也以中尼之善董狐知為史必須直也以丘明之禮諱惡知為史又當諱也釋例曰臣之事君猶子事父微諌見志造膝詭辭執其是而諌其非不必其得蓋匡救將然而將順其巳然故有隱諱之義焉至於激節之士則不然南史執簡而纍進董狐書法而不隱鬻拳劫君而自刖晏嬰端委而引直聖賢亦録而善之所以廣義訓博大道殷有三仁此之謂也是言聖賢兩通之意也鄭伯髠頑楚子麏齊侯陽生之徒俱實在弒而以卒赴魯是他國之臣亦有諱國惡者非獨魯史也傳十一年春滕侯薛侯來朝爭長注薛魯國薛縣音義長丁丈反注及下文同疏注正義曰譜云薛任姓黃帝之苗裔奚仲封為薛侯今魯國薛縣是也奚仲遷于邳仲虺居薛以為湯左相武王復以其胄為薛侯齊桓霸諸侯黜為伯獻公始與魯同盟小國無記世不可知亦不知為誰所滅地理志云魯國薛縣夏車正奚仲所國後遷于邳湯相仲虺居之薛侯曰我先封注薛祖奚仲夏所封在周之前音義夏戶雅反疏注正義曰定元年傳曰薛之皇祖奚仲居薛以為夏車正是夏所封也滕侯曰我周之卜正也注卜正卜官之長疏注正義曰周禮春官大卜下大夫二人其下有卜師卜人龜人筮人大卜為之長正訓長也故謂之卜正薛庶姓也我不可以後之注庶姓非周之同姓疏注正義曰周禮司儀職云詔王儀南鄉見諸侯土揖庶姓時揖異姓天揖同姓鄭玄云庶姓無親者也異姓婚姻者也是庶姓非同姓也公使羽父請於薛侯曰君與滕君辱在寡人周諺有之曰山有木工則度之賔有禮主則擇之注擇所宜而行之音義諺音彥俗言也度大洛反周之宗盟異姓為後注盟載書皆先同姓例在定四年疏正義曰賈逵以宗為尊服虔以宗盟為同宗之盟孫育以為宗伯屬官掌作盟詛之載辭故曰宗盟杜無明解盟之尊卑自有定法不得言尊盟也周禮司盟之官乃是司寇之屬非宗伯也唯服之言得其旨矣而孫育難服云同宗之盟則無與異姓何論先後若通共同盟則何稱於宗斯不然矣天子之盟諸侯令其共奬王室未聞離逖異姓獨與同宗者也但周人貴親先敘同姓以其篤於宗族是故謂之宗盟魯人之為此言見其重宗之義執其宗盟之文即云無與異姓然則公與族燕則異姓為賔復言族燕不得有異姓也孟軻所云説詩者不以辭害意此之謂也異姓為後者謂王官之伯降臨諸侯以王命而盟者耳其春秋之世狎主齊盟者則不復先姬姓也踐土之盟其載書云王若曰晉重魯申是用王命而盟也召陵之會劉子在焉故祝他引踐土為比為有王官故也宋之盟楚屈建先於趙武明是大國在前不先姬姓若姬姓常先則楚不得競也且言周之宗盟是唯周乃然故釋例曰斥周而言指謂王官之宰臨盟者也其餘雜盟未必皆然是言餘盟不先姬姓盟則同姓在先朝則各從其爵故鄭康成注禮記云朝覲爵同同位若然案覲禮曰諸侯前朝皆受舍于朝同姓西面北上異姓東面北上鄭玄云言諸侯明來朝者衆矣顧其入覲不得並耳分别同姓異姓受之將有先後也若如此言則似朝覲不以爵者但朝覲實以爵同同位就爵同之中先同姓後異姓若盟則爵雖不同先同姓也禮記周公朝諸侯于明堂之位三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上諸子之國門東北面東上諸男之國門西北面東上覲禮於方明之壇鄭言諸侯見王之位亦引明堂位為説是則諸侯總見皆以爵為班雖不分别同姓異姓其受禮之時爵同者猶先同姓也其王官之伯臨諸侯之盟雖羣后咸在常先同姓故此言宗盟耳取重宗之事以喻已也取譬之事聊舉一邊寡人若朝于薛不敢與諸任齒朝於彼國自可下主國之宗諸侯聚盟不肯先盟主之宗也寡人若朝于薛不敢與諸任齒注薛任姓齒列也音義任音壬注同疏注正義曰世夲氏姓篇云任姓謝章薛舒呂祝終泉畢過言此十國皆任姓也禮記文王世子曰古者謂年齡齒亦齡也然則齒是年之别名人以年齒相次列以爵位相次列亦名為齒故云齒列也君若辱貺寡人則願以滕君為請薛侯許之乃長滕侯夏公會鄭伯于郲謀伐許也鄭伯將伐許五月甲辰授兵於大宮注大宮鄭祖廟音義大音泰公孫閼與潁考叔爭車注公孫閼鄭大夫音義閼於葛反潁考叔挾輈以走注輈車轅也音義挾音協輈張留反疏正義曰廟內授車未有馬駕故手挾以走輈轅也方言云楚衛謂轅為輈服虔云考叔挾車轅箠馬而走古者兵車一轅服馬夾之若馬已在轅不可復挾且箠馬而走非捷步所及子都豈復乘車逐之子都拔棘以逐之注子都公孫閼棘戟也及大逵弗及子都怒注逵道方九軌也音義逵求龜反爾雅云九逹謂之逵杜云道方九軌此依考工記疏注正義曰冬官考工記匠人營國經塗九軌軌車轍謂王城之內道廣並九車也爾雅釋宮云一逹謂之道路二逹謂之岐旁三逹謂之劇旁四逹謂之衢五逹謂之康六逹謂之莊七逹謂之劇驂八逹謂之崇期九逹謂之逵説爾雅者皆以為四道交出復有旁通故劉炫規過以逵為九道交出也今以為道方九軌者蓋以九出之道世俗所希不應城內得有此道以記有九軌故以逵當之言並容九軌皆得前逹亦是九逵之義故李巡注爾雅亦取並軌之義又塗方九軌天子之制諸侯之國不得皆有唯鄭城之內獨有其塗故傳於鄭國每言逵也故桓十四年焚渠門入及大逵莊二十八年衆車入自純門及逵市宣十二年入自皇門至於逵路劉君以為國國皆有逵道以規杜氏其義非也秋七月公會齊侯鄭伯伐許庚辰傅于許注傅于許城下音義傅音附注同潁考叔取鄭伯之旗蝥弧以先登注蝥弧旗名音義蝥莫侯反弧音胡疏注正義曰周禮諸侯建旗孤卿建旜而左傳鄭有蝥弧齊有靈姑鉟皆諸侯之旗也趙簡子有蜂旗卿之旗也其名當時為之其義不可知也子都自下射之顚注顚隊而死音義射食亦反下及注同隊直類反瑕叔盈又以蝥弧登注瑕叔盈鄭大夫周麾而呼曰君登矣注周遍也麾招也音義麾許危反又許偽反呼火故反遍音遍鄭師畢登壬午遂入許許莊公奔衛注奔不書兵亂遁逃未知所在音義遁徒頓反齊侯以許讓公公曰君謂許不共注不共職貢音義共音恭夲亦作供音同注及下同故從君討之許既伏其罪矣雖君有命寡人弗敢與聞乃與鄭人鄭伯使許大夫百里奉許叔以居許東偏注許叔許莊公之弟東偏東鄙也音義與聞音預曰天禍許國鬼神實不逞于許君而假手于我寡人注借手于我寡德之人以討許寡人唯是一二父兄不能共億注父兄同姓羣臣共給億安也音義億於力反其敢以許自為功乎寡人有弟不能和協而使糊其口於四方注弟共叔假也糊鬻也假出奔在元年音義糊音胡説文云寄食鬻本又作粥之育反又與六反疏注正義曰莊公之弟逃於四方故知唯是共叔假也説文云糊寄食也以此傳言糊口四方故以寄食言之昭七年傳云饘於是鬻於是以糊余口釋言云糊饘也則糊是饘鬻别名今人以薄鬻塗物謂之糊紙糊帛則糊者以鬻食口之名故云糊其口也其况能久有許乎吾子其奉許叔以撫柔此民也吾將使獲也佐吾子注獲鄭大夫公孫獲若寡人得沒于地注以壽終音義壽如字又音授天其以禮悔禍于許注言天加禮於許而悔禍之無寧兹許公復奉其社稷注無寧寧也兹此也音義復扶又反又音服唯我鄭國之有請謁焉如舊昏媾注謁告也婦之父曰昏重昏曰媾音義媾古豆反重直龍反疏注正義曰謁告也釋詁文婦之父曰昏釋親文也媾與昏同文故先儒皆以為重昏曰媾其能降以相從也注降降心也無滋他族實逼處此以與我鄭國爭此土也吾子孫其覆亡之不暇而况能禋祀許乎注潔齊以享謂之禋祀謂許山川之祀音義覆芳服反暇行稼反禋音因齊側皆反夲亦作齊疏注正義曰釋詁云禋祭也孫炎曰禋潔敬之祭周語曰精意以享禋也是潔齊以享謂之禋享訓獻也言潔清齊敬以酒食獻神也禮諸侯祭山川之在其地者若其受許之土則當祭許山川故知祀謂許山川之祀寡人之使吾子處此不唯許國之為亦聊以固吾圉也注圉邊垂也音義為于偽反圉魚吕反疏注正義曰釋詁云圉垂也舍人曰圉邊垂也乃使公孫獲處許西偏曰凡而器用財賄無置於許我死乃亟去之吾先君新邑於此注此今河南新鄭舊鄭在京兆音義賄呼罪反字林音悔置之豉反置也亟紀力反急也下注同疏注正義曰地理志云河南郡新鄭縣詩鄭桓公之子武公所國是知新邑於此謂河南新鄭也且志又云京兆鄭縣周宣王弟鄭桓公邑是知舊鄭在京兆也志又云夲周宣王弟友為周司徒食采於宗周畿內是為鄭桓公桓公問於史伯曰王室多故何所可以逃死史伯為桓公謀取虢鄶之地令寄帑與賄而虢鄶受之後三年幽王敗桓公死其子武公與平王東遷卒定虢鄶之地然則傳云先君新邑於此謂武公始居此也史記鄭世家稱虢鄶自分十邑獻於桓公桓公竟國之案鄭語桓公始謀未取之也武公始國非桓公也全滅虢鄶非獻邑也馬遷之言皆謬耳昭十六年傳子産謂韓宣子曰我先君桓公與商人皆出自周以艾殺此地而共處之者謂寄帑與賄之時商人即與俱行耳非桓公身至新鄭王室而既卑矣周之子孫日失其序注鄭亦周之子孫夫許大嶽之􅏷也注大嶽神農之後堯四嶽也􅏷繼也音義大嶽音泰疏注正義曰周語稱共工伯鯀二者皆黃炎之後言鯀為黃帝之後共工為炎帝之後炎帝則神農之别號周語又稱堯命禹治水共之從孫四嶽佐之胙四嶽國命為侯伯賜姓曰薑氏曰有呂賈逵云共共工也從孫同姓末嗣之孫四嶽官名大嶽也主四嶽之祭焉薑炎帝之姓其後變易至於四嶽帝復賜之祖姓以紹炎帝之後以此知大嶽是神農之後堯四嶽也以其主嶽之祀尊之故稱大嶽許國是其後也􅏷繼也釋詁文舍人云􅏷繼世也天而既厭周德矣吾其能與許爭乎君子謂鄭莊公於是乎有禮禮經國家定社稷序民人利後嗣者也許無刑而伐之服而舍之注刑法也音義厭於艷反疏正義曰經謂紀理之若詩之經營經始也國家非禮不治社稷得禮乃安故禮所以經理國家安定社稷以禮教民則親戚和睦以禮守位則澤及子孫故禮所以次序民人利益後嗣經國家猶詩序之言經夫婦也度德而處之量力而行之相時而動無纍後人注我死乃亟去之無纍後人音義度待洛反量音良下同相息亮反纍劣偽反注同可謂知禮矣鄭伯使卒出豭行出犬雞以詛射潁考叔者注百人為卒二十五人為行行亦卒之行列疾射潁考叔者故令卒及行間皆詛之音義卒尊忽反注同豭音加豬别名行戶剛反注同詛厠慮反令力呈反疏注正義曰周禮夏官序制軍之法百人為卒二十五人為兩此言二十五人為行者以傳先卒後行豭大於犬知行之人數少於卒也軍法百人之下唯有二十五人為兩耳又大司馬之屬官行司馬是中士軍之屬官兩司馬亦中士知周禮之兩即此行是也周禮之行謂軍之行列知此行亦卒之行列也詛者盟之細殺牲告神令加之殃咎疾射潁考叔者令卒及行間祝詛之欲使神殺之也一卒之內已用一豭又更令一行之間或用雞或用犬重祝詛之犬雞者或雞或犬非雞犬並用何則盟詛例用一牲不用二也豭謂豕之牡者爾雅釋獸豕牝曰豝豝者是牝知豭者是牡祭祀例不用牝且宋人謂宋朝為艾豭明以雄豬喻也君子謂鄭莊公失政刑矣政以治民刑以正邪既無德政又無威刑是以及邪注大臣不睦又不能用刑於邪人音義邪似嗟反下及注同邪而詛之將何益矣王取塢劉注二邑在河南緱氏縣西南有塢聚西北有劉亭音義塢烏戶反緱古候反一音苦候反聚才遇反蒍邘之田于鄭注蒍邘鄭二邑音義蒍尤委反邘音于而與鄭人蘇忿生之田注蘇忿生周武王司寇蘇公也音義忿芳粉反疏注正義曰成十一年傳曰昔周克商使諸侯撫封蘇忿生以溫為司寇尚書立政稱周公告大史曰司寇蘇公是其事也溫注今溫縣原注在沁水縣西音義沁七侵反字林先袵反郭璞三蒼解詁音狗沁之沁沈文阿疏鴆反韋昭思金反水名絺注在野王縣西南音義絺敕之反樊注一名陽樊野王縣西南有陽城音義樊扶袁反隰郕注在懷縣西南音義隰詳立反郕尚征反欑茅注在修武縣北音義欑才官反向注軹縣西有地名向上音義向舒亮反注同軹音紙盟注今盟津音義盟音孟州注今州縣陘注闕音義陘音刑隤注在修武縣北音義隤徒回反懷注今懷縣凡十二邑皆蘇忿生之田欑茅隤屬汲郡餘皆屬河內君子是以知桓王之失鄭也恕而行之德之則也禮之經也已弗能有而以與人人之不至不亦宜乎注蘇氏叛王十二邑王所不能有為桓五年從王伐鄭張夲鄭息有違言注以言語相違恨息侯伐鄭鄭伯與戰于竟息師大敗而還注息國汝南新息縣音義竟音境息一夲作鄎音息疏注正義曰世夲息國姬姓此息侯伐鄭責其不親親知與鄭國同姬姓也莊十四年傳楚文王滅息其初則不知誰之子何時封也地理志汝南郡有新息縣故息國也應劭云其後東徙故加新云若其後東徙當云故息何以反加新字乎蓋夲自他處而徙此也君子是以知息之將亡也不度德注鄭莊賢音義度待洛反不量力注息國弱不親親注鄭息同姓之國不徴辭不察有罪注言語相恨當明徴其辭以審曲直不宜輕鬬犯五不韙而以伐人其喪師也不亦宜乎注韙是也音義韙韋鬼反蒼頡篇同喪息浪反冬十月鄭伯以虢師伐宋壬戌大敗宋師以報其入鄭也注入鄭在十年宋不告命故不書凡諸侯有命告則書不然則否注命者國之大事政令也承其告辭史乃書之于䇿若所傳聞行言非將君命則記在簡牘而已不得記於典䇿此蓋周禮之舊制音義傳直專反師出臧否亦如之注臧否謂善惡得失也滅而告敗勝而告克此皆互言不須兩告乃書音義否音鄙又方九反注同雖及滅國滅不告敗勝不告克不書于策疏正義曰此傳雖因宋不告敗而發此例其言諸侯有命非獨為被伐之命故注云命者國之大事政令也謂諸是大事崩卒會盟戰伐克取君臣乖離水火災害經書他國之事皆是來告則書不告則否來告則書者或彼以實告改其告辭而書之或彼以虛告因其虛言而記之立文褒貶章示善惡雖復依告者多不必盡皆依告衛獻公之出奔也傳稱孫林父寧殖出其君名在諸侯之策及其書經則云衛侯出奔齊如此之類是改告辭也晉人之敗秦也傳稱潛師夜起以敗秦于令狐秦實未陳不與晉戰晉人諱背前言妄以戰告及其書經乃言晉人及秦人戰于令狐如此之類是因虛言也雖復或因其虛或改其實終是歸於勸戒而告乃書也不然則否者雖復傳聞行言實知其事但非故遣來告知亦不書所以慎謬誤辟不審若楚滅六蓼臧文仲嘆而為言魯非不知但無命來告故不書也師出臧否亦如之者傳因被兵發例嫌出師伐人不必須告故重明之雖及滅國者既據侵伐發例又嫌滅國事重不待告命故更明之言不書于策者明告命大事皆書於國史正策以見仲尼修定悉因正策之文注正義曰不言勝敗而言臧否者明其臧否之言非徒勝敗之謂故知是善惡得失總謂理有曲直兵有強弱也狄伐邢之類非狄能告也楚滅庸之徒非庸能告也故知敗克互言不須兩告乃書也且哀元年傳曰吳入越不書吳不告慶越不告敗也吳越並言知其不待兩告羽父請殺桓公將以求大宰注大宰官名音義大音泰注同疏注正義曰周禮天子六卿天官為大宰諸侯則并六為三而兼職焉昭四年傳稱季孫為司徒叔孫為司馬孟孫為司空則魯之三卿無大宰也羽父名見於經已是卿矣而復求大宰蓋欲令魯特置此官以榮巳耳以後更無大宰知魯竟不立之公曰為其少故也吾將授之矣注授桓位音義為于偽反少詩照反使營菟裘吾將老焉注菟裘魯邑在泰山梁父縣南不欲復居魯朝故别營外邑音義菟兔都反裘音求父音甫復扶又反下同羽父懼反譖公于桓公而請弒之公之為公子也與鄭人戰于狐壤止焉注內諱獲故言止狐壤鄭地音義譖側鴪反弒音試下同一夲作殺鄭人囚諸尹氏注尹氏鄭大夫賂尹氏而禱於其主鍾巫注主尹氏所主祭音義賂音路禱丁老反或多報反巫亡夫反遂與尹氏歸而立其主注立鍾巫於魯十一月公祭鍾巫齋于社圃注社圃園名音義圃布古反館于寪氏注館舍也寪氏魯大夫音義寪于委反壬辰羽父使賊殺公于寪氏立桓公而討寪氏有死者注欲以殺君之罪加寪氏而復不能正法誅之傳言進退無據疏正義曰劉炫云羽父遣賊殺公公非寪氏所弒公在寪氏而死遂誣寪氏弒君欲以正法誅之君非寪氏所弒故討寪氏之家僅有死者而已言不總誅之注正義曰劉炫云欲以弒君之罪加寪氏則君非寪氏所弒而復不能以正法誅之正法謂滅其族汙其宫也傳言此者進退無據進誅寪氏則實非寪氏弒君退舍寪氏則無弒君之人是其進退無據也不書葬不成喪也注桓弒隱篡位故喪禮不成春秋左傳注疏卷三春秋左氏傳注疏卷三考證鄭人來渝平臣浩按公羊榖梁經俱作輸平故解作墮成左氏經作渝平故解作更成傳九宗注唐叔始封受懷姓九宗臣召南按定四年傳注曰懷姓唐之餘民傳納諸鄂臣召南按鄂地杜注闕所在史記集解引世本曰唐叔居鄂宋忠曰鄂地今在大夏傳京師來告飢注告飢不以王命故傳言京師而不書于經也趙汸補注曰京師于列國不可言告糴既實是糴不得言歸粟又不可但言告飢來者微故皆不書於策天王使凡伯來聘戎伐凡伯于楚丘以歸注楚丘衛地在濟隂城武縣西南臣召南按城武依漢志晉志應作成武傳告終稱嗣也監夲脫稱字今添蔡侯考父卒疏若父與彼盟彼君雖在此子不得以其名赴以此名未與彼君對稱故也推尋文義當作若父不與彼盟脫不字傳公命以字為展氏注無駭公子展之孫故為展氏劉敞曰若無駭為公子展之孫當其繼大宗時賜氏久矣何待死而後賜族乎無駭固公孫羽父請族者為其子請也三月癸酉大雨震電庚辰大雨雪疏水則俯視雪則仰觀臣召南按此論鑿矣傳謂平地尺為大雪不俯視乎公會齊侯于防注防魯地在琅邪縣東南臣召南按晉時有琅邪國無琅邪縣東萊集解引此注作在琅邪華縣東南是也刋夲脫華字耳華縣故城在今山東費縣辛未取郜辛巳取防注濟隂城武縣東南有郜城髙平昌邑縣西南有西防城臣召南按城武應作成武此防與前年會齊侯于防者名同地異彼是東防近齊此是宋地在魯西南故杜氏另解傳向注軹縣西有地名向上臣召南按此向與莒人入向不同故杜注另解傳逐與尹氏歸而立其主尹監本訛鄭今改正春秋左氏傳注疏卷三考證
