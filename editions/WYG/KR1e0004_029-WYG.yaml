body:
  text: 春秋左傳注疏卷二十九起襄公元年盡四年晉杜氏注唐陸德明音義孔穎達疏襄公音義陸曰襄公名午成公子母定姒諡法因事有功曰襄辟土有徳曰襄疏正義曰魯世家云襄公名午成公之子定姒所生以簡王十四年即位諡法因事有功曰襄是歲歲在壽星經元年春王正月公即位注無傳於是公年四歲疏正義曰九年傳曰㑹于沙隨之歲寡君以生晉侯曰十二年矣知於是公年四歲仲孫蔑㑹晉欒黶宋華元衛甯殖曹人莒人邾人滕人薛人圍宋彭城注魯與謀於虚朾而書㑹者禀命霸主非匹敵故音義魯與音預夏晉韓厥帥師伐鄭仲孫蔑㑹齊崔杼曹人邾人杞人次于鄫注鄫鄭地在陳留襄邑縣東南書次兵不加鄭次鄫以待晉師音義鄫才陵反疏正義曰釋例曰兵未有所加所次則書之以示遲速既書兵所加則不書其所次此書次于鄫者為此魯齊曹邾杞其兵皆不加鄭故書次也傳曰於是東諸侯之師次于鄫以待晉師是韓厥伐鄭此次以待之秋楚公子壬夫帥師侵宋九月辛酉天王崩注無傳辛酉九月十五日疏正義曰顯言此日者欲明下冬聘是十月之初為王崩日近赴人未至故也邾子來朝冬衛侯使公孫剽來聘注剽子叔黑背子音義剽匹妙反字林匹召反晉侯使荀罃來聘注冬者十月初也王崩赴未至皆未聞䘮故各得行朝聘之禮而傳善之疏正義曰禮記曾子問曰諸侯相見揖讓入門不得終禮廢者㡬孔子曰六天子崩大廟火日食后夫人之䘮雨霑服失容則廢是王崩當廢禮也今傳釋此朝聘皆云禮也知此冬者是十月之初崩赴未至由其俱未聞䘮故得以吉行禮而傳善之傳元年春己亥圍宋彭城注下有二月則此己亥為正月正月無己亥日誤疏正義曰長歴推此年正月庚戌朔其月無己亥圍宋彭城經在正月之下傳文下有二月則己亥必是正月月不容誤知是日誤非宋地追書也注成十八年楚取彭城以封魚石故曰非宋地夫子治春秋追書繫之宋疏正義曰公羊傳曰宋華元曷為與諸侯圍宋彭城為宋誅也其為宋誅柰何魚石走之楚楚為之伐宋取彭城以封魚石成十八年傳曰楚伐彭城納魚石焉以三百乘戍之而還西鉏吾曰崇諸侯之姦而披其地不言取為楚邑而云披地長姦是左氏之意亦為楚以彭城封魚石為國故注言封魚石也既列為國非復宋地傳言追書是仲尼新意故云夫子治春秋追書繫之宋也言追書者其地已非宋有追來使屬宋耳非謂夫子在後追思前事若以追為在後追前則仲尼新意皆是追書前事非獨此為追書也於是為宋討魚石故稱宋且不登叛人也注登成也不與其專邑叛君故使彭城還繫宋音義為于偽反疏正義曰登成釋詁文不與其專邑叛君不與楚得取邑封人故使彭城還繫於宋也釋例曰楚人棄君助臣取宋彭城以封叛者削正興偽雖非復宋地故追書繫宋不與楚之所得是其義也言不登叛人則叛罪重矣不書魚石以彭城叛者孫林父將戚而出故得書云孫林父入于戚以叛此則因楚之力取彭城與宋交爭非欲出附他國故言復入也若總而言之俱是背叛於君故云不登叛人也謂之宋志注稱宋亦以成宋志疏正義曰魚石舊是宋人今還取宋地以自封若其不繫於宋則成此魚石為一國之君夫子追繫於宋乃有二意於是為宋討魚石宜繫於宋且又不成此為叛人使得取君之邑以為一國之主有此二意故繫之於宋謂之宋志者言宋人志在攻取彭城故以魚石繫之於宋成此宋人之志注正義曰此與隠元年謂之鄭志義勢同也鄭伯實不獲段而經書克謂之鄭志言鄭伯志於殺雖實不克段而書之為克見鄭伯之志也此彭城實非宋地而經書為宋謂之宋志言宋人志在取之雖實非宋地而繫之於宋成宋人之志也夫子脩春秋而傳於此二條特言謂之宋志謂之鄭志者夫子所脩春秋或褒或貶皆是夫子之志非取國人之志此宋志鄭志者以其雖是夫子所脩還取二國本志故也案下十年戍鄭虎牢傳云非鄭地也言將歸焉杜云繫之于鄭以見晉志即此類也於此二事傳例已明故彼不云謂之晉志也彭城降晉晉人以宋五大夫在彭城者歸寘諸瓠丘注彭城降不書賤畧之瓠邱晉地河東東垣縣東南有壺邱五大夫魚石向為人鱗朱向帶魚府音義降户江反注同寘之豉反瓠徐侯呉反一音户故反垣音袁疏正義曰案莊八年郕降于齊師既書於經則知彭城之降亦合書也今不書者但以其賤故畧之也晉欒盈復入于晉下云晉人殺欒盈而書於經此彭城降所以賤畧不書者彼以殺之為重來告故書此以降事為輕故為賤畧齊人不會彭城晉人以為討二月齊太子光為質於晉注光齊靈公太子音義質音致夏五月晉韓厥荀偃帥諸侯之師伐鄭入其郛注荀偃不書非元帥音義郛芳夫反元帥所類反疏正義曰傳唯言諸侯之師不見諸侯之國未知諸侯之師是何國師也於是東諸侯之師次于鄫以待晉師則次鄫之師皆不與伐鄭此諸侯之師其中必無齊魯曹邾把也案上圍彭城除此五國以外猶有宋衛莒滕薛下云晉侯衛侯次于戚以為之援則衛師從伐明矣明年戚之會知武子云滕薛小邾之不至皆齊故於戚之會始怪滕薛不來明此時伐鄭滕薛在矣東諸侯皆次于鄫莒在齊魯之東若其在此當與東人同次前圍彭城亦無小邾此時或無莒與小邾耳諸侯之師當是宋衛滕薛也賈逵云韓厥荀偃帥諸侯之師謂帥宋衛滕薛伐鄭齊魯曹邾把次于鄫故諸侯之師不序也入郛不書者晉人先以鄭罪令於諸侯故書伐鄭入郛既敗鄭不復告故不書注正義曰魯師出征竝舉諸將他國之師唯書元帥詳内畧外春秋之常故杜為注復時一言之耳敗其徒兵于洧上注徒兵歩兵洧水出密縣東南至長平入潁音義洧于軌反疏正義曰論語云以吾從大夫之後不可徒行徒猶空也謂無車空行也歩行謂之徒行故歩兵謂之徒兵也隠四年傳云敗鄭徒兵注云時鄭不車戰則此亦然也於是東諸侯之師次于鄫以待晉師注齊魯曹邾把晉師自鄭以鄫之師侵楚焦夷及陳注於是孟獻子自鄫先歸不與侵陳楚故不書音義焦如字徐在堯反不與音預疏正義曰獻子先歸傳無其事正以不書侵楚侵陳知其必先歸矣若獻子從師則書不待告以獻子先歸晉不告魯故侵陳楚皆不書也然不知獻子何以先歸傳既不言未測其故也今僣云則先歸者以前年虚朾會獻子先歸會葬今公雖即位年又幼小君既新立故獻子先歸晉侯衛侯次于戚以為之援注為韓厥援秋楚子辛救鄭侵宋呂留注呂留二縣名屬彭城郡鄭子然侵宋取犬邱注譙國酇縣東北有犬邱城迂迴疑音義酇才河反又子旦反迂音于九月邾子來朝禮也注邾宣公冬衛子叔晉知武子來聘禮也凡諸侯即位小國朝之注小事大大國聘焉注大事小以繼好結信謀事補闕禮之大者也注闕猶過也禮以安國家利民人為大音義好呼報反經二年春王正月葬簡王注無傳五月而葬速鄭師伐宋注書伐從告夏五月庚寅夫人姜氏薨六月庚辰鄭伯睔卒注未與襄同盟而赴以名庚辰七月九日書六月經誤音義睔古囷反徐又胡忖反疏正義曰睔以成八年即位九年盟于蒲十五年于戚又七年楚子重伐鄭諸侯救鄭而楚退同盟于馬陵諸侯雖不重序明亦與鄭同盟則是與成三同盟矣與其父盟於法得以名赴其子此云未與襄同盟而赴以名者言其嘗與成同盟於法得以名赴襄也此類多矣注皆云與其父同盟而已此注特言未與襄同盟者以此時鄭既從楚嫌其已背前盟不合更以名赴故明之也此經云六月庚辰鄭伯睔卒傳言七月庚辰鄭伯睔卒經傳必有誤者杜以長歴校之此年六月壬寅朔其月無庚辰七月壬申朔九日得庚辰則傳與歴合知傳是而經誤也此經六月七月其文皆具所言誤者非徒字誤而已乃是書經為誤七月之事錯書以為六月故長歴云書於六月經誤言元本書之誤非字誤也晉師宋師衛甯殖侵鄭注宋雖非卿師重故叙衛上音義殖市力反疏正義曰於例將卑師衆稱師將尊師少稱將此晉宋稱師不書將非卿也衛甯殖書將不稱師師少也晉為兵主故當先書宋雖非卿以師為重故序甯殖之上秋七月仲孫蔑會晉荀罃宋華元衛孫林父曹人邾人于戚己丑葬我小君齊姜注齊諡也三月而葬速音義齊如字諡法執心克莊曰齊或音側皆反非疏正義曰諡法執心克莊曰齊是齊為諡也葬而舉諡禮之常也此特云齊諡者以諡齊者少且齊齊同字夫人齊女嫌齊非諡晉太子申生之母稱齊姜者齊女姓姜氏彼齊非諡故此須明之叔孫豹如宋注豹於此始自齊還為卿冬仲孫蔑會晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢注以逼鄭疏正義曰虎牢是鄭舊邑此時屬晉而不繫晉者莊三十二年注云大都以名通者則不繫國此以名通故不繫晉也十年戍鄭虎牢繫於鄭者傳曰非鄭地也言將歸焉彼為將歸鄭而繫之鄭也或當虎牢雖已屬晉晉人新得不為已有故不繫晉也楚殺其大夫公子申傳二年春鄭伯侵宋楚令也注以彭城故齊侯伐萊萊人使正輿子賂夙沙衛以索馬牛皆百匹注夙沙衛齊寺人索簡擇好者音義萊音來輿音餘本亦作與索所白反疏正義曰司馬法邱出馬一匹牛三頭則牛當稱頭而亦云匹者因馬而名牛曰匹并言之耳經傳之文此類多矣易繫辭云潤之以風雨論語云沽酒市脯不食玉藻云大夫不得造車馬皆從一而省文也齊師乃還君子是以知齊靈公之為靈也注諡法亂而不損曰靈言諡應其行音義應應對之應年末同行下孟反夏齊姜薨初穆姜使擇羙檟注檟梓之屬音義檟古雅反木名疏正義曰釋木云槐小葉曰檟郭璞曰槐當為楸楸細葉者為檟又云大而皵楸小而皵檟樊光云大老也皵棤皮也皮老而麄棤者為楸小少也少而麄棤者為檟又云椅梓郭璞曰即楸也如彼所云楸梓皆檟之小别故云梓之屬也以自為櫬與頌琴注櫬棺也頌琴琴名猶言雅琴皆欲以送終音義櫬初覲反疏正義曰以論死者言櫬知櫬是棺也四年注云櫬親身棺也以親近其身故以櫬為名焉禮記檀弓曰天子之棺四重水兕革棺一杝棺一梓棺二鄭𤣥云杝椵也所謂椵棺也梓棺二所謂屬與大棺也記文從内向外水兕革棺最近尸也次椑以椵為之次屬與大棺乃以梓為之檀弓又云君即位而為椑鄭𤣥云椑謂杝棺親尸者椑堅著之言也天子椑内又有水兕革棺喪大記云君大棺八寸屬六寸椑四寸如彼記文諸侯之棺三重親身之棺名之為椑椑即櫬是也其椑用椵為之屬與大棺乃用梓耳此以梓為櫬者名之曰櫬其内必無棺也擇檟為櫬其櫬必用梓也記唯言即位為椑不言椑所用木鄭𤣥據天子之棺其椑用杝即云椑謂杝棺也天子之椑自用杝則諸侯不必然據此傳文諸侯之椑必用梓也頌琴者詩為樂章琴瑟必以歌詩詩有雅頌故以頌為琴名猶如言雅琴也櫬琴同文知皆欲以送終也季文子取以葬君子曰非禮也禮無所逆婦飬姑者也虧姑以成婦逆莫大焉注穆姜成公母齊姜成公婦音義飬徐余亮反詩曰其惟􅈒人告之話言順徳之行注詩大雅哲知也話善也言知者行事無不順音義話户快反知音致下同季孫於是為不􅈒矣注言逆徳音義為不哲矣一本作不為哲矣疏正義曰詩大雅抑之篇也其惟有知之人告之以善言則順從之為羙徳之行矣言知者行事無有不順從者今季孫逆之於是為不知矣哲知釋言文也且姜氏君之妣也注襄公適母故曰君之妣音義妣必履反適丁歴反本又作嫡疏正義曰曲禮曰生曰父曰母死曰考曰妣襄公是成公之妾定姒所生齊姜是其適母故曰君之妣也詩曰為酒為醴烝畀祖妣以洽百禮降福孔偕注詩周頌烝進也􅂌與也偕徧也言敬事祖妣則鬼神降福季孫葬姜氏不以禮是不敬祖妣音義烝之承反􅂌必利反注同洽户夾反偕音皆徧音遍疏正義曰詩周頌豐年之篇也豐有之年多稌多黍釀之為酒為醴以進與祖妣以洽百種之禮為烝嘗之祭鬼神享之則下與福佑甚周徧言今事妣失禮神將不福佑之也烝進􅂌與皆釋詁文偕訓為俱俱亦徧之義也釋言云孔甚也齊侯使諸姜宗婦來送葬注宗婦同姓大夫之婦婦人越疆送葬非禮音義疆居良反疏正義曰諸姜同姓之女也宗婦同姓之婦也夫人齊姜是齊國之女故使其宗親之婦女來會葬也齊為姜姓歴世多矣不可姜姓之女姜姓之婦今其皆來魯國莊二十四年大夫宗婦覿用幣者宗婦是同姓大夫之婦知此宗婦亦是同姓大夫之婦然則諸姜是齊同姓之女嫁與齊大夫之為妻者也禮記檀弓云婦人不越疆而弔人是越疆送葬非禮也召萊子萊子不㑹故晏弱城東陽以偪之注為六年滅萊傳東陽齊竟上邑音義竟音境疏正義曰世族譜不知萊國之姓齊侯召萊子者不為其姓姜也以其比鄰小國意陵蔑之故召之欲使從送諸姜宗婦來向魯耳萊子以其輕侮故不肯㑹鄭成公疾子駟請息肩於晉注欲辟楚役以負擔喻音義擔都暫反公曰楚君以鄭故親集矢於其目注謂鄢陵戰晉射楚王目音義射食亦反非異人任寡人也注言楚子任此患不為他人盖在已音義非異人任絶句任音壬一讀至人字絶句為于偽反若背之是棄力與言其誰暱我注言盟誓之言音義背音佩棄力服本作棄功暱本又作昵女乙反徐乃吉反免寡人唯二三子疏正義曰說文云鳥之短尾者總名為隹隹在木上為集集是鳥止之名矢有羽似鳥故亦稱集也楚君被射目者非是為異人也任此患者為寡人也今若背之棄其助鄭之力與盟誓之言他人其誰肯親我乎免寡人此棄力背言之責唯二三子耳秋七月庚辰鄭伯睔卒於是子罕當國注攝君事疏正義曰禮君薨聽於冢宰不須攝行君事此令子罕當國者鄭國間於晉楚國家多難喪代之際或致傾危盖成公顧命使之當國非常法也子駟為政已是正卿知當國者為攝君事矣沈氏云魯襄四歳國家無虞今僖公年雖長大為偪於晉楚故令子罕當國也子駟為政注為正卿子國為司馬晉師侵鄭注晉伐喪非禮諸大夫欲從晉子駟曰官命未改注成公未葬嗣君未免喪故言未改不欲違先君意疏正義曰先君既葬嗣君正位乃得建官命臣十六年晉侯改服脩官是其事也先君未葬皆因舊事不得建官命臣故云官命未改庶事悉皆未改不可即違先君言此者不用從晉之意故也㑹於戚謀鄭故也注鄭人叛晉謀討之孟獻子曰請城虎牢以偪鄭注虎牢舊鄭邑今屬晉知武子曰善鄫之㑹吾子聞崔子之言今不來矣注元年孟獻子與齊崔杼次于鄫崔杼有不服晉之言獻子以告知武子疏正義曰元年伐鄭次于鄫唯有韓厥荀偃於時武子未必在軍當是此㑹始告之耳滕薛小邾之不至皆齊故也注三國齊之屬寡君之憂不唯鄭注言復憂齊叛音義復扶又反下文將復復㑹同罃將復於寡君而請於齊注以城事白晉君而請齊㑹之欲以觀齊志得請而告吾子之功也注得請謂齊人應命告諸侯㑹築虎牢若不得請事將在齊注將伐齊吾子之請諸侯之福也注城虎牢足以服鄭息征伐豈唯寡君賴之注傳言荀罃能用善謀穆叔聘于宋通嗣君也冬復㑹于戚齊崔武子及滕薛小邾之大夫皆㑹知武子之言故也注武子言事將在齊齊人懼帥小國而㑹之遂城虎牢鄭人乃成注如孟獻子之謀楚公子申為右司馬多受小國之賂以偪子重子辛注偪奪其權勢楚人殺之故書曰楚殺其大夫公子申注言所以致國討之文經三年春楚公子嬰齊帥師伐呉公如晉夏四月壬戌公及晉侯盟于長樗注晉侯出其國都與公盟於外音義樗勑居反疏正義曰文三年公如晉公及晉侯盟盟不書地在晉都也此時晉侯出其國都與公盟于長樗盖近城之地盟訖還入於晉故公歸書曰公至自晉也又三年盟于晉都此盟出城外者出與不出皆由晉侯意耳此或是悼公謙以待人不敢使國君就已出盟於外若似相就然故出城也公至自晉注無傳不以長樗至本非㑹疏正義曰假令公朝於晉更與晉侯餘處别會即從㑹所而歸亦得書曰公至自晉何則一行而有二事者或以始致或以終致出自當時之意書其所告之事而已所告先後無定例也但此盟于長樗晉侯為盟之故暫出城耳本非刻期聚㑹之處唯得以自晉告廟不得以長樗告也注言本非㑹觧其必不得以長樗致之意也六月公㑹單子晉侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于雞澤注雞澤在廣平曲梁縣西南周靈王新即位使王官伯出與諸侯盟以安王室故無譏音義單音善疏正義曰諸侯不得盟天子之臣天子之臣不得與諸侯聚盟盟則加以貶責僖二十九年翟泉之盟貶王子虎稱人是其事也僖八年洮之盟王人在列傳曰謀王室也諸侯共謀王室不譏王人在盟是由襄王新立命遣與盟故耳此盟單子在列於經亦無譏文靈王以徃年新立明是王新即位使王官之伯出與諸侯結盟以安王室故無所譏與洮之盟同也釋例曰未有臣而盟君臣而盟君是子可盟父故春秋王世子以下㑹諸侯者皆同㑹而不同盟洮之盟王室有子帶之難襄王懼不得立告難於齊遣王人與諸侯盟故傳釋之曰謀王室以盟王勑其來盟非諸侯所敢與也踐土之盟王子虎臨諸侯而不與同㰱故經但列諸侯而傳具載其實此實聖賢之垂意以為將來之永法也一年之間諸侯輯睦翼戴天子而翟泉之盟子虎在列君子以為非天子之命虧上下常節故不存魯侯而人子虎以示篤戒也今雞澤之㑹單子與盟亦王所命也杜言王使盟者傳無其文正以經無貶責知是命使盟也陳侯使袁僑如㑹注陳疾楚政而來屬晉本非召㑹而自來故言如㑹音義僑其驕反疏正義曰凡盟主召其同好之國刻期而與結盟來不及期則加貶責他國後期則沒其國而不序於列魯君後期則總稱諸侯不復國别歴序文七年公㑹諸侯晉大夫盟于扈是也僖二十八年踐土之盟陳侯如㑹此袁僑如㑹皆本非同好慕義而來喜其來而不責其晚故言陳疾楚政而來屬晉本非召㑹而袁僑自來故言如㑹解其後至特書而不貶之意也七年鄭伯髠頑如㑹自是被召而來其人未見諸侯在道而卒故書如㑹為卒張本與此異也戊寅叔孫豹及諸侯之大夫及陳袁僑盟注諸侯既盟袁僑乃至故使大夫别與之盟言諸侯之大夫則在雞澤之諸侯也殊袁僑者明諸侯大夫所以盟盟袁僑也據傳盟在秋長歴推戊寅七月十三日經誤疏正義曰諸侯盟㑹歴序國君其下云某人某人皆是大夫也若卿來則書卿名氏文十四年公㑹宋公陳侯衛侯鄭伯許男曹伯晉趙盾于新城如此之類其事多矣此袁僑來若及盟即序于列當在世子光下今諸侯既盟袁僑乃至不可特為袁僑更復重盟若其不與之盟則又逆陳來意以袁僑是大夫故使大夫盟之若其陳侯自來諸侯雖則盟訖亦當更與之盟不得使大夫也凡諸侯盟㑹皆先目後凡上文雞澤之㑹既以具序諸侯此總言諸侯大夫則雞澤諸侯足以明矣故不復其序諸國從省文耳諸侯大夫既以總書而獨見叔孫豹者經據魯史魯史所記詳内畧外僖十五年牡邱之盟下公孫敖帥師及諸侯之大夫救徐獨書魯臣亦此類也言諸侯之大夫其内可以兼袁僑而殊袁僑言及陳袁僑盟者明此諸侯之大夫所以為此盟者止為盟陳袁僑耳且上文雞澤之㑹其内未有陳侯直言諸侯之大夫則不得包陳袁僑故殊之也秋公至自㑹注無傳冬晉荀罃帥師伐許傳三年春楚子重伐呉為簡之師注簡選練克鳩茲至于衡山注鳩茲呉邑在丹陽蕪湖縣東今臯夷也衡山在呉興烏程縣南使鄧廖帥組甲三百被練三千注組甲被練皆戰備也組甲漆甲成組文被練練袍音義廖力彫反組音祖下皆同被皮義反徐扶僞反注及下同疏正義曰賈逵云組甲以組綴甲車士服之被練帛也以帛綴甲歩卒服之凡甲所以為固者以盈竅也帛盈竅而任力者半卑者所服組盈竅而盡任力尊者所服馬融云組甲以組為甲裏公族所服被練以練為甲裏卑者所服然則甲貴牢固組練皆用絲也練若不固宜俱用組何當尚不牢之甲而令歩卒服之豈欲其被傷故使甲不牢也若練以綴甲何以謂之被也又組是絛繩不可以為衣服安得以為甲裏杜言組甲漆甲成組文今時漆甲有為文者被練文不言甲必非甲名被是被覆衣著之名故以為練袍被於身上雖竝無明證而杜要愜人情以侵呉呉人要而擊之獲鄧廖其能免者組甲八十被練三百而已子重歸既飲至三日呉人伐楚取駕駕良邑也鄧廖亦楚之良也君子謂子重於是役也所獲不如所亡注當時君子音義要於遙反疏正義曰傳言君子多矣獨此言當時君子者諸言君子論議徃事多是邱明自言託之君子謂子重亡多於獲楚人以君子之言咎責子重不得為後世君子故云當時君子楚人以是咎子重子重病之遂遇心疾而卒注憂恚故成心疾音義咎其九反恚一瑞反公如晉始朝也注公即位而朝夏盟於長樗孟獻子相公稽首注相儀也稽首首至地音義相息亮反注同疏正義曰周禮九拜一曰稽首諸侯事天子之禮也知武子曰天子在而君辱稽首寡君懼矣注稽首事天子之禮孟獻子曰以敝邑介在東表密邇仇讎注仇讎謂齊楚與晉爭音義介音界爭爭鬭之爭寡君將君是望敢不稽首注傳言獻于能固事盟主晉為鄭服故且欲脩呉好注鄭服在前年音義為于偽反好呼報反將合諸侯使士匄告于齊曰寡君使匄以歲之不易不虞之不戒寡君願與一二兄弟相見注不易多難也虞度也戒備也列國之君相謂兄弟音義易以豉反注同難乃旦反年内同度待洛反以謀不協請君臨之使匄乞盟齊侯欲勿許而難為不協乃盟於耏外注與士匄盟耏水名音義耏音而疏正義曰此是士匄適齊齊侯與盟其盟不離城之左右若是地名山名不得有外内之異爾雅云厓内為隩外為隈李巡曰厓内近水為隩外為隈孫炎曰内曲裏也外曲表也是水有内外之異知此耏為水名其水蓋曲而近城故稱耏外祁奚請老注老致仕晉侯問嗣焉注嗣續其職者稱解狐其讎也將立之而卒注解狐卒音義解音蟹疏正義曰讎者相負挾怨之名奚負狐狐負奚皆謂之讎此是奚負狐也不是舉之以解怨故下云稱其讎不為謟也又問焉對曰午也可注午祁奚子於是羊舌職死矣晉侯曰孰可以代之對曰赤也可注赤職之子伯華於是使祁午為中軍尉羊舌赤佐之注各代其父君子謂祁奚於是能舉善矣稱其讎不為謟立其子不為比舉其偏不為黨注謟媚也偏屬也音義謟他檢反比毗志反疏正義曰設令他人稱其讎則謟以求媚也立其子則心在親比也舉其偏則情相阿黨也今祁奚以其人實善故舉薦之人見彼善知奚不謟不比不黨也謟者阿順曲從以求彼意故以謟為媚媚愛也言為謟以求愛也偏者半廂之名故傳多云東偏西偏軍師屬已分之别行謂之偏師傳云彘子以偏師䧟是屬為廂屬之名也祈奚為中軍尉羊舌職佐之職屬祈奚復舉其子是舉其偏屬也商書曰無偏無黨王道蕩蕩注商書洪範蕩蕩平正無私其祁奚之謂矣解狐得舉注未得位故曰得舉祁午得位伯華得官建一官而三物成注一官軍尉物事也疏正義曰尉佐同掌一事故為建一官也三事成者成其得舉得位得官也官位一也變文相辟耳服䖍云所舉三賢各能成其職事案解狐得舉而死身未居職何成事之有能舉善也夫唯善故能舉其類詩云惟其有之是以似之祁奚有焉注詩小雅言唯有徳之人能舉似己者也音義夫音扶絶句一讀以夫為下句首疏正義曰此小雅裳裳者華之篇也其卒章云右之右之君子有之惟其有之是以似之六月公㑹單頃公及諸侯己未同盟于雞澤注單頃公王卿士音義頃音傾晉侯使荀會逆呉子于淮上呉子不至注道逺多難楚子辛為令尹侵欲於小國疏正義曰多有所欲求索無厭侵害小國故小國怨也陳成公使袁僑如會求成注患楚侵欲袁僑濤塗四世孫晉侯使和組父告于諸侯注告陳服秋叔孫豹及諸侯之大夫及陳袁僑盟陳請服也注其君不來使大夫盟之匹敵之宜晉侯之弟揚干亂行於曲梁注行陳次音義行户郎反注同陳直覲反魏絳戮其僕注僕御也疏正義曰以車亂行是御者之罪故戮其僕也周禮司寇之屬有掌戮之官鄭𤣥云戮猶辱也既斬殺又辱之其職云掌斬殺賊諜而膊之凡殺其親者焚之殺王之親者辜之殺人者踣諸市肆之三日鄭𤣥云膊謂去衣磔之焚燒也辜謂磔之踣僵尸也肆猶申也陳也彼膊焚辜肆皆謂陳以示人然則此言戮者非徒殺之而已乃殺之以徇諸軍昭四年楚戮慶封負之斧鉞以徇於諸侯先徇乃殺之也成二年韓獻子既斬人郤子使速以徇是殺之而後徇也此戮即彼徇之謂也文十年楚申舟抶宋公之僕以徇或曰國君不可戮也彼抶以徇亦稱為戮下云至於用鉞當是殺之乃以徇也晉侯怒謂羊舌赤曰合諸侯以為榮也揚干為戮何辱如之必殺魏絳無失也對曰絳無貳志事君不辟難有罪不逃刑疏正義曰此言絳之宿心舊行耳非以為此事而言也服䖍云謂敢斬揚干之僕是不辟獲死之難然則斬僕信依灋也豈是絳之罪而得謂之有罪不逃刑乎不逃不辟此事自亦是矣要本其宿心非是專為此事也其將來辭何辱命焉言終魏絳至授僕人書注僕人晉侯御僕將伏劒疏正義曰謂仰劒刃身伏其上而取死也士魴張老止之公讀其書曰日君乏使使臣斯司馬注斯此也臣聞師衆以順為武注順莫敢違軍事有死無犯為敬注守官行法雖死不敢有違君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及揚干無所逃罪注懼自犯不武不敬之罪不能致訓至於用鉞注用鉞斬揚干之僕音義鉞音越疏正義曰臣聞師旅兵衆順從上命莫敢違逆是為威武此據在軍之衆也軍旅之事守官行灋欲討罪人雖有死難不敢辟死犯違灋令而從舍罪人是為共敬也君命既合諸侯臣豈敢畏懼死罪放舍罪人不為共敬也今君之師衆違命亂行既已不武謂揚干也執事之臣畏懼其死罪不戮罪人是為不敬魏絳自謂也不武不敬罪莫大焉是揚干與已皆有大罪臣若不討非直臣有死罪揚干亦合有死罪臣懼身之死罪連及揚干是臣罪更重無所逃辟重罪也不能以禮漸致教訓至於用鉞以斬其僕是臣之罪重也臣之罪重敢有不從以怒君心注言不敢不從戮請歸死於司寇注致尸於司寇使戮之公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟弗能教訓使干大命寡人之過也子無重寡人之過注聽絳死為重過音義跣先典反重直用反注同敢以為請注請使無死晉侯以魏絳為能以刑佐民矣反役與之禮食使佐新軍注羣臣旅㑹今欲顯絳故特為設禮食音義食音嗣注同又如字特為于僞反疏正義曰與之禮食者若公食大夫禮以大夫為賔公親為之特設禮食服䖍云於是魏頡卒矣使趙武將新軍代魏頡升魏絳佐新軍代趙武也世族譜魏顆魏絳俱是魏犫之子顆長生頡則絳是頡之叔父顆别為令狐氏絳為魏氏蓋顆長而庶絳幼而適故也魏世家武子生悼子悼子生絳則絳是犫孫計其年世孫應是也先儒悉皆不然未知何故張老為中軍司馬注代魏絳士富為候奄注代張老士富士㑹别族楚司馬公子何忌侵陳陳叛故也許靈公事楚不會于雞澤冬晉知武子帥師伐許經四年春王三月己酉陳侯午卒注前年大夫盟雞澤三月無己酉日誤夏叔孫豹如晉秋七月戊子夫人姒氏薨注成公妾襄公母姒杞姓疏正義曰二年齊姜薨葬者是成公夫人故此為成公之妾也據傳匠慶之言知是襄公之母以子既為君故得稱夫人而言薨也於時諸國杞鄫之徒皆姒姓據大者言之故云姒杞姓疑是杞女而未審故也葬陳成公注無傳八月辛亥葬我小君定姒注無傳定諡也赴同袝姑反哭成喪皆以正夫人禮母以子貴踰月而葬速疏正義曰諡法純行不爽曰定舊說妾子為君其母不得成為夫人故杜詳言之於例赴同稱薨也袝姑稱小君也反哭成喪書葬也今定姒三禮皆具薨葬備文皆以正夫人之禮者由母以子貴故也釋例曰凡妾子為君其母猶為夫人雖先君不命其母母以子貴其適夫人薨則尊得加於臣子而内外之禮皆如夫人矣故姒氏之喪責以小君不成成風之喪王使來會葬傳曰禮也夫人姒氏薨葬皆以禮備為文明季孫雖議從畧賤聞匠慶之言懼而備禮殯葬無闕也禮公子為其母練冠縓緣既葬除之及其嗣位為君非復公子適母薨則申其母尊而先儒同之公子亦謬矣是杜言妾母得為夫人之意也季孫初議欲不成定姒之喪匠慶以君長懼之乃畧取季孫之木君子謂之多行無禮必自及也則季孫初議是無禮也既季孫議為無禮明知於禮得成是知妾母成尊是為正灋但尊無二上適母若在君尚不得盡禮於其母臣民豈得以夫人之禮事之哉適母既薨則君得盡禮君既盡夫人之禮事其母臣民豈得以妾母遇之哉故適母薨則妾母尊也哀姜既薨成風乃正出姜既出敬嬴乃正齊姜既薨定姒乃正襄公一世無取夫人之文故齊歸得正也鄭𤣥以為正夫人以有罪廢妾母得成為夫人也哀姜雖被齊殺僖公請而葬之案經薨葬備文安得以罪黜也又齊姜非以罪黜定姒薨葬成尊成風定姒並無譏故知其灋得成也冬公如晉陳人圍頓傳四年春楚師為陳叛故猶在繁陽注前年何忌之師侵陳今猶未還繁陽楚地在汝南鮦陽縣南音義為于偽反鮦孟康音紂直又反一音童或音直勇反非韓獻子患之言於朝曰文王帥殷之叛國以事紂唯知時也注知時未可爭今我易之難哉注晉力未能服楚受陳為非時三月陳成公卒楚人將伐陳聞喪乃止注軍禮不伐喪疏正義曰十九年晉士匄侵齊至榖聞齊侯卒乃還傳曰聞喪而還禮也是軍禮不伐喪陳人不聽命注不聽楚命臧武仲聞之曰陳不服於楚必亡大國行禮焉而不服在大猶有咎而况小乎夏楚彭名侵陳陳無禮故也注為下陳圍頓傳音義咎其九反下同穆叔如晉報知武子之聘也注武子聘在元年晉侯享之金奏肆夏之三不拜注肆夏樂曲名周禮以鐘鼓奏九夏其二曰肆夏一名繁三曰韶夏一名遏四曰納夏一名渠蓋擊鐘而奏此三夏曲音義肆夏户雅反注同下同九夏一曰王夏二曰肆夏三曰韶夏四曰納夏五曰章夏六曰齊夏七曰族夏八曰陔夏九曰驁夏肆夏一名繁國語云金奏肆夏繁遏渠杜遂分為三夏之别名呂叔玉云肆夏時邁也繁遏執競也渠思文也韶上招反遏於葛反納夏本或為夏納誤渠其居反工歌文王之三又不拜注工樂人也文王之三大雅之首文王大明緜歌鹿鳴之三三拜注小雅之首鹿鳴四牡皇皇者華疏正義曰奏謂作樂也作樂先擊鍾鐘是金也故稱金奏周禮鐘師掌金奏鄭𤣥云金奏擊金以為奏樂之節金謂鐘及鎛也又燕禮注云以鐘鎛播之鼓磬應之所謂金奏也此晉人作樂先歌肆夏肆夏是作樂之初故於肆夏先言金奏也次工歌文王樂已先作非復以金為始故言工歌也於文王已言工歌鹿鳴又畧不言工互見從省耳其實金奏肆夏亦是工歌之工歌文王擊金仍亦不息其歌鹿鳴亦是工歌之耳注正義曰周禮鐘師凡樂事以鐘鼓奏九夏王夏肆夏韶夏納夏章夏齊夏族夏陔夏驁夏言以鐘鼓奏之也又以文王類之知是樂曲名也杜子春云王出入奏王夏尸出入奏肆夏牲出入奏韶夏四方賔來奏納夏臣有功奏章夏夫人祭奏齊夏族人侍奏族夏賔醉而出奏陔夏公出入奏驁夏定本納夏為夏納此傳直言之三不言其三之名魯語同說此事而云金奏肆夏繁遏渠天子所以享元侯也文王大明緜則兩君相見之樂也文王之三蓋文王大明緜以文王為首并取其次二篇以為三則知肆夏之三以肆夏為首亦并取其次二夏以為三也且下云三夏天子所以享元侯也三者皆名為夏知是其次二夏并肆夏為三也周禮謂之肆韶納魯語謂之繁遏渠故杜以為每夏而有二名肆夏一名繁韶夏一名遏納夏一名渠先儒所說義多不同周禮注載杜子春云肆夏與文王鹿鳴俱稱三謂其三章也以此知肆夏詩也呂叔玉云肆夏繁遏渠皆周頌也肆夏時邁也繁遏執競也渠思文也肆遂也夏大也言遂於天位也故時邁曰肆於時夏允王保之繁多也遏止也言福祿止於周之多也故執競曰降福禳禳降福簡簡福祿來反渠大也言以后稷配天王道之大也故思文曰思文后稷克配彼天鄭𤣥云以文王鹿鳴言之則九夏皆詩篇名頌之族類也此歌之大者載在樂章樂崩亦從而亡是以頌不能具數家之説各以意言經典散亡無以取正劉炫云杜為此解頗允三夏之名而分字配篇不甚愜當何則文王之三即文王是其一大明緜是其二鹿鳴之三則鹿鳴是其一四牡皇皇者華是其二然則肆夏之三亦當肆夏是其一繁遏渠是其二安得復以繁為肆夏之别名也若繁即是肆夏何須重舉二名雖恥習前蹤亦未踰先哲今刪定知不然者以此文云肆夏之三是自肆夏以下有三故為韶夏納夏凡為三夏但此三夏各有别名故國語謂之繁遏渠是一字以當一夏若國語直云金奏繁遏渠則三夏之名没而不顯故於繁字之上特以肆夏冠之云肆夏繁繁即是肆夏明遏是韶夏渠是納夏也國語舉其難明以㑹左氏三夏之義劉不曉杜之深意遂欲妄從先儒先儒二説何所馮準先儒以繁遏二字共為執競以渠之一字獨為思文分字既無定限文句多少任意則杜以繁共肆夏為句何為不可劉君乃與奪恣情不顧曲直妄規杜過於義深非也韓獻子使行人子員問之曰注行人通使之官音義員音云徐子貧反使所吏反下注及文皆同疏正義曰周禮大行人掌大賔之禮大客之儀小行人掌使適四方協賔客之禮諸侯行人當亦通掌此事故為通使之官也此言韓獻子使行人問魯語云晉侯使行人問者彼孔晁注云韓獻子白晉侯使行人問也子以君命辱於敝邑先君之禮藉之以樂以辱吾子注藉薦也音義藉在夜反吾子舍其大而重拜其細敢問何禮也對曰三夏天子所以享元侯也使臣弗敢與聞注元侯牧伯音義舍音捨重直用反下皆同敢與音預下及與同牧徐音目疏正義曰周禮大宗伯云八命作牧九命作伯鄭𤣥云牧謂侯伯有功徳者加命得專征伐於諸侯也伯謂上公有功徳者加命為二伯得征五侯九伯者也鄭司農云牧一州之牧也伯長諸侯為方伯也然則牧是州長伯是二伯雖命數不同俱是諸侯之長也元長也謂之長侯明是牧伯文王兩君相見之樂也臣不敢及注及與也文王之三皆稱文王之徳受命作周故諸侯㑹同以相樂音義相樂音洛疏正義曰及與也釋詁文言不敢與在其間而聞之魯語并陳兩事乃總云皆昭令徳以合好非使臣之所敢聞彼俱不敢聞此分之為等級耳詩序文王言文王受命作周大明言文王有明徳故天復命武王伐紂緜言文王之興本由大王是文王之三皆稱文王之徳能受天命造立周國故諸侯㑹同歌此以相燕樂也朝而設享是亦二君聚㑹故以㑹同言之肆夏既亡不知其篇之義故唯取詩意以解文王鹿鳴耳詩是樂章樂歌詩篇聖王因其尊卑定其等差詩有四始風也小雅也大雅也頌也鄭𤣥以肆夏為頌之族類其差與頌同矣天子享元侯歌肆夏則於其餘諸侯不得用肆夏矣當歌文王與兩君相見同也然則兩元侯相見與天子享之禮同亦歌肆夏之類仲尼燕居兩君相見升歌清廟謂元侯也不歌肆夏辟天子也諸侯來朝乃歌文王遣臣來聘必不得同矣當歌鹿鳴也傳言文王兩君相見之樂則其臣來聘不得與其君同亦當歌鹿鳴也燕禮雖以己臣為主兼燕四方之賔其樂歌鹿鳴是其定差也燕禮升歌訖乃為笙歌三篇堂下吹笙以播詩也笙歌訖乃為間歌六篇堂上歌一篇堂下次一篇相間代也故燕禮云乃間歌魚麗笙由庚歌南有嘉魚笙崇邱歌南山有臺笙由儀是也間歌訖遂合鄉樂周南關睢葛覃卷耳召南鵲巢采蘩采蘋合樂謂堂上堂下合作樂也鄉樂者風詩也燕禮歌小雅而合鄉樂以合卑於歌一等則知諸所歌者其合樂用詩皆卑於升歌一等故鄭𤣥詩譜云天子享元侯歌肆夏合文王於諸侯歌文王合鹿鳴諸侯於鄰國之君與天子於諸侯同天子諸侯燕其羣臣及聘問之賔皆歌鹿鳴合郷樂笙間所用則鄭𤣥云未聞也燕禮升歌小雅笙歌間歌亦用小雅則笙間用詩與升歌差同而云未聞者升歌合樂其用風雅皆用發首二篇笙用南陔間用魚麗不復更用其首篇者未聞者未知其用何篇也此傳言三夏天子所以享元侯則文王兩君相見之樂亦謂享也雖不言燕燕亦當然此傳晉侯享穆叔為歌鹿鳴穆叔以已所當得三拜而受燕禮也工歌鹿鳴則是享燕同樂明享之與燕用樂各自同矣若然肆夏之為樂章樂之最尊者兩君相見猶尚不得用之而燕禮者諸侯燕己羣臣之禮而記云若以樂納賔則賔及庭奏肆夏鄭𤣥云卿大夫有王事之勞者則奏此樂所以得用之者彼謂納賔之樂郊特牲云賔入大門而奏肆夏示易以敬也鄭𤣥云賔朝聘者是朝賔聘客俱得用之與此升歌異也鹿鳴君所以嘉寡君也敢不拜嘉注晉以叔孫為嘉賔故歌鹿鳴之詩取其我有嘉賔叔孫奉君命而來嘉叔孫乃所以嘉魯君疏正義曰詩序言鹿鳴燕羣臣嘉賔正謂燕己之臣以己臣為嘉賔耳叔孫以晉歌此篇者以己為嘉賔故拜受之也燕禮記云若與四方之賔燕則公迎之於大門内鄭𤣥云四方之賔謂來聘者也是燕聘客唯君迎為異餘悉與己臣同也四牡君所以勞使臣也敢不重拜注詩言使臣乘四牡騑騑然行不止勤勞也晉以叔孫來聘故以此勞之音義以勞力報反注勞之同騑芳非反疏正義曰詩序曰四牡勞使臣之來謂遣臣出使來歸乃勞之也叔孫以晉歌此篇勞已來聘故重拜受之也魯語云四牡君之所以章臣之勤也敢不拜章皇皇者華君教使臣曰必諮於周注皇皇者華君遣使臣之詩言忠臣奉使能光輝君命如華之皇皇然又當諮于忠信以補已不及忠信為周其詩曰周爰諮諏周爰諮謀周爰諮度周爰諮詢言必於忠信之人諮此四事音義諏子須反度待洛反下文注同詢音荀疏正義曰此詩本意文王教出使之臣使逺而有光華又當諮問善道於忠信之人今晉君歌此以寵穆叔穆叔執謙以為晉侯所教故云君教使臣下云臣獲五善敢不重拜與詩本意異也忠信為周魯語文也爰於也若遇忠信之人於是訪問詢度諏謀等四事也魯語云皇皇者華君教使臣曰每懷靡及諏謀度詢必諮於周敢不拜教臣聞之訪問於善為咨注問善道咨親為詢注問親戚之義咨禮為度注問禮宜咨事為諏注問政事咨難為謀注問患難音義難乃旦反注同疏正義曰魯語言此四事唯咨親為詢與此文同其餘咨材為諏咨事為謀咨義為度三者與此皆異韋昭改從此傳注云材當為事事當為難孔晁注云材謂政幹也臣獲五善敢不重拜注五善謂諮詢度諏謀疏正義曰教之咨人即得一善故并咨為五魯語云君貺使臣以大禮重之以六徳孔晁云既有五善又自謂無及成為六徳言自謂知所無及懷靡謙以問知者此亦即是一徳故為六徳也皆是受君之教乃知如此亦是君之所賜故云臣獲也秋定姒薨不殯于廟無櫬不虞注櫬親身棺季孫以定姒本賤既無器備議其喪制欲殯不過廟又不反哭音義過古禾反疏正義曰櫬者親身之棺初死即當有之將葬以殯過廟葬訖乃為虞祭今定姒初薨匠慶以君長懼之乃始作櫬知此是季孫以定姒本賤素無器備議其喪制欲如此耳非是終久遂無之也檀弓曰君即位而為椑夫人尊與君同亦當生已有櫬今議欲不為是素無器備故始議之也檀弓又曰喪之制也順死者之孝心也其哀離其室也故至於祖考之廟而後行殷朝而殯於祖周朝而遂葬士喪禮朝而遂葬與記正同知周灋不殯于廟而此及僖八年傳皆云不殯于廟以為非禮知其將葬之時不以殯過廟耳非是殯尸於廟中也葬訖日中反虞於正寢謂之反哭今欲不虞是欲不為反哭也匠慶謂季文子曰注匠慶魯大匠子為正卿而小君之喪不成注謂如季孫所議則為夫人禮不成不終君也注慢其母是不終事君之道君長誰受咎注言襄公長將責季孫音義長丁丈反注同初季孫為已樹六檟於蒲圃東門之外注蒲圃場圃名季文子樹檟欲自為櫬音義為于偽反下注為定姒為言下為執事同圃布古反場直良反疏正義曰詩云九月築場圃毛傳云春夏為圃秋冬為場樹菜蔬為圃治禾黍為場場圃同地耳故杜以場明圃圃名蒲地檟是為櫬之木知季孫樹之欲自為櫬也匠慶請木注為定姒作櫬季孫曰畧注不以道取為畧匠慶用蒲圃之檟季孫不御注御止也傳言遂得成禮故經無異文音義御魚呂反注同疏正義曰止寇謂之禦御猶禦也故訓為止季孫本議欲無櫬不虞今傳唯言取木為櫬而已尚不知得殯廟虞祭以否不虞即是不反哭不反哭則不得書葬今定姒薨葬備文則因匠慶之言遂得每事成禮是故經無異文君子曰志所謂多行無禮必自及也其是之謂乎疏正義曰不以道取為畧今律畧人畧賣人是也季孫言畧令匠慶畧他木也官非無木可用意欲不成其喪請木不順其意怒慶此請令畧木為之也匠慶又忿季孫未必無木可用故取季孫之檟其意言遣我畧人我只畧女季孫令之為畧匠慶奉命而畧雖自被畧不得止之季孫此議自是無禮也被匠慶畧木是自及也君子言古之志記所謂多行無禮必自及者其季孫之謂乎而釋例論此云議從畧賤彼自是解正義之語與此不以道取為畧别也冬公如晉聽政注受貢賦多少之政晉侯享公公請屬鄫注鄫小國也欲得使屬魯如須句顓臾之比使助魯出貢賦公時年七歲蓋相者為之言鄫今琅邪鄫縣音義句其俱反顓音專臾羊朱反比必二反相息亮反疏正義曰附庸附大國耳鄫乃子爵而欲得屬魯者春秋之世小國不得自通多附於大國二十七年齊人請邾宋人請滕邾滕猶尚附人况鄫又小也故杜譬之如須句顓臾之比須句亦子爵使助魯出貢賦耳時公年七歲未能自謀蓋國内共為此計使相者代公言之晉侯不許孟獻子曰以寡君之密邇於仇讎而願固事君無失官命注晉官徵發之命疏正義曰二年鄭子駟以君初喪云官命未改此魯以國小賦重恐失官命二者官命雖同而主意有異故杜彼以未葬解之此以徵發解之觀文為說鄫無賦於司馬注晉司馬又掌諸侯之賦為執事朝夕之命敝邑敝邑褊小闕而為罪注闕不共也音義朝夕如字褊必淺反共音恭寡君是以願借助焉注借鄫以自助音義借子亦反注同晉侯許之注為明年叔孫豹鄫世子巫如晉傳楚人使頓間陳而侵伐之故陳人圍頓注間伺間缺音義間陳間厠之間伺音司間音閑又間厠之間又如字無終子嘉父使孟樂如晉注無終山戎國名孟樂其使臣音義使臣所吏反因魏莊子納虎豹之皮以請和諸戎注欲戎與晉和莊子魏絳晉侯曰戎狄無親而貪不如伐之魏絳曰諸侯新服陳新來和將觀於我我徳則睦否則􅂝貳勞師於戎而楚伐陳必弗能救是棄陳也諸華必叛注諸華中國戎禽獸也獲戎失華無乃不可乎夏訓有之曰有窮后羿注夏訓夏書有窮國名后君也羿有窮君之號音義夏户雅反下注皆同羿音詣疏正義曰夏書五子之歌云太康尸位以逸豫畋于有洛之表十旬弗反有窮后羿因民弗忍距于河厥弟五人御其母以從五子咸怨述大禹之戒以作歌其一曰皇祖有訓是大禹立言以訓後故得謂此書為夏訓也羿居窮石之地故以窮為國號以有配之猶言有周有夏也后君也窮國之君曰羿羿是有窮君之號公曰后羿何如注怪其言不次故問之對曰昔有夏之方衰也后羿自鉏遷于窮石因夏民以代夏政注禹孫太康淫放失國夏人立其弟仲康仲康亦微弱仲康卒子相立羿遂代相號曰有窮鉏羿本國名音義鉏仕居反大音泰相息亮反下及注同疏正義曰夏本紀禹生啟啟生太康是禹孫也為羿所距書序云大康失邦是為淫放失國也本紀又云大康崩弟仲康立夏書𦙍征云惟仲康肇位四海孔安國云羿廢大康而立其弟仲康為天子則仲康羿之所立但羿握其權仲康不能除去之耳哀元年傳稱有過澆殺斟灌以滅后相相依斟灌故澆滅之是相立為天子乃出依斟灌則相之立也蓋亦羿立之矣此傳言羿代夏政云不脩民事寒浞殺羿言取其國家則羿必自立為天子也當是逐出后相羿乃自立相依斟灌斟㝷夏祚尚猶未滅蓋與羿並稱王也及寒浞殺羿因羿室而生澆澆已長大自能用師始滅后相相死之後始生少康少康生杼杼又年長已堪誘豷方始滅浞而立少康計大康失邦及少康紹國向有百載乃滅有窮據此傳文夏亂甚矣而夏本紀云仲康崩子相立相崩子少康立都不言羿浞之事是馬遷說之疎也恃其射也注羿善射疏正義曰尚書云大康尸位以逸豫有窮后羿因民弗忍距于河孔安國云羿諸侯名此云有窮君之號則與孔不同也羿善射論語文也說文云羿帝嚳射官也賈逵云羿之先祖世為先王射官故帝嚳賜羿弓矢使司射淮南子云堯時十日並出堯使羿射九日云而落之楚辭天問云羿焉彃日烏焉解羽歸藏易亦羿彃十日也言雖不經難以取信要言嚳時有羿堯時有羿則羿是善射之號非復人之名字信如彼言則不知此羿名為何也不脩民事而淫于原獸注淫放原野棄武羅伯因熊髠尨圉注四子皆羿之賢臣音義髠苦門反尨莫邦反圉魚呂反而用寒浞寒浞伯明氏之讒子弟也注寒國北海平壽縣東有寒亭伯明其君名音義浞仕角反徐在角反伯明后寒棄之夷羿收之注夷氏信而使之以為已相浞行媚于内注内宫人疏正義曰寒是國名伯明寒君之名也后君也伯明君此寒國之時而棄不收采也注正義曰此傳再言夷羿故以夷為氏也而施賂于外愚弄其民注欺罔之而虞羿于田注樂之以游田音義樂音洛下樂安同樹之詐慝以取其國家注樹立也音義慝他得反後同外内咸服注信浞詐羿猶不悛注悛改也音義悛七全反將歸自田注羿獵還家衆殺而亨之以食其子注食羿子音義亨普彭反煮也食音嗣注同疏正義曰家衆謂羿之家衆人反羿以從浞為浞而殺羿也孟子云逢䝉學射於羿盡羿之道思天下唯羿為愈己於是殺羿則殺羿者逢䝉也其子不忍食諸死于窮門注殺之於國門靡奔有鬲氏注靡夏遺臣事羿者有鬲國名今平原鬲縣音義鬲音革浞因羿室注就其妃妾生澆及豷恃其讒慝詐偽而不德于民使澆用師滅斟灌及斟㝷氏注二國夏同姓諸侯仲康之子后相所依樂安壽光縣東南有灌亭北海平壽縣東南有斟亭音義澆五弔反豷許器反斟之林反灌古亂反疏正義曰世本文也處澆于過處豷于戈注過戈皆國名東萊掖縣北有過鄉戈在宋鄭之間音義過古禾反注及下同戈古禾反掖音亦漢書作夜孟康音掖疏注正義曰哀十二年傳曰宋鄭之間有隙地焉曰嵒戈錫是也靡自有鬲氏收二國之燼注燼遺民音義燼才忍反疏正義曰燋燭既燒之餘名之曰燼二國之燼謂澆之所殺死亡之餘遺脱之民也思報父兄之讎故靡得收而用之以滅浞而立少康注少康夏后相之子音義少詩照反注及下同少康滅澆于過后杼滅豷于戈注后杼少康子音義杼直呂反疏正義曰夏本紀少康崩子帝杼立是也有窮由是遂亡失人故也注浞因羿室故不改有窮之號疏正義曰有窮遂亡謂浞亡也武羅伯因熊髠尨圉本羿棄之浞亦不用失人是國之大患故言之以規悼公也昔周辛甲之為大史也命百官官箴王闕注辛甲周武王大史闕過也使百官各為箴辭戒王過音義箴之林反疏正義曰晉語稱文王訪于辛尹賈逵以為辛甲尹佚則辛甲文王之臣而下及武王但文王之時天命未改不得命百官官箴王闕故以為武王時大史也闕謂過失也大史號令百官每官各以箴辭虞人掌獵故以獵為箴也漢成帝時揚雄愛虞箴遂依放之作十二州二十五官箴後亡失九篇後漢崔駰駰子瑗瑗子寔世補其闕及臨邑侯劉騊駼大傅胡廣各有所増凡四十八篇廣乃次而題之署曰百官箴皆放此虞箴為之於虞人之箴注虞人掌田獵疏正義曰周禮山虞大田獵則萊山田之野澤虞大田獵則萊澤野萊謂芟其草萊以為殺圍之處詩毛傳云大芟草以為防是也曰芒芒禹迹畫為九州注芒芒逺貌畫分也音義芒莫郎反畫乎麥反疏正義曰畫分者言畫地分之以為竟也禹貢惟冀州帝都不言竟界以餘州所至則冀州可知也八州各言竟界云濟河惟兖州海岱惟青州海岱及淮惟徐州淮海惟揚州荆及衡陽惟荆州荆河惟豫州華陽黒水惟梁州黑水西河惟雍州是禹所畫分也經啟九道注啟開九州之道疏正義曰既分海内以為九州遂皆以九言之禹貢云九州攸同九山刋旅九川滌源九澤既陂故此亦言九道言禹開通九州之道也民有寢廟獸有茂草各有攸處徳用不擾注人神各有所歸故徳不亂音義攸處如字本或作攸家擾如小反亂也在帝夷羿冒于原獸注冒貪也音義冒莫報反又音亡北反疏正義曰帝王之號當時所稱三代稱王自以徳劣於前謙而不稱為帝其統天下實與帝同所謂今之王古之帝也後人之稱先代或以王言帝或以帝言王史記於夏殷諸王皆稱為帝此羿簒立為王故以帝稱焉忘其國恤而思其麀牡注言但念獵音義麀音憂鹿牡也牡茂后反武不可重注重猶數也音義重直用反注同數所角反疏正義曰杜讀為重累之重故為數也服䖍云重猶大也言武事不可大任用不恢于夏家注羿以好武雖有夏家而不能恢也音義恢苦回反獸臣司原敢告僕夫注獸臣虞人告僕夫不敢斥尊虞箴如是可不懲乎於是晉侯好田故魏絳及之注及后羿事音義好呼報反下文同懲直升反疏正義曰魏絳本意主勸和戎忽云有窮后羿以開公問遂説羿事以及虞箴乃與初言不相應㑹故傳為此二句以解魏絳之意公曰然則莫如和戎乎對曰和戎有五利焉戎狄荐居貴貨易土注荐聚也易猶輕也音義荐在薦反又才遜反或云草也易以豉反徐神豉反注同疏正義曰釋言云荐再也孫炎曰荐草生之再也即荐是聚也服䖍云荐草也言狄人逐水草而居徙无常處劉炫案莊子云麞鹿食荐即荐是草也服言是土可賈焉一也邊鄙不聳民狎其野穡人成功二也注聳懼狎習也音義賈音古聳息勇反戎狄事晉四鄰振動諸侯威懷三也以徳綏戎師徒不勤甲兵不頓四也注頓壞也疏正義曰頓謂挫傷折壞今俗語云委頓是也鑒于后羿而用德度注以后羿為鑒戒遠至邇安五也君其圖之公説使魏絳盟諸戎脩民事田以時注傳言晉侯能用善謀音義説音悦冬十月邾人莒人伐鄫臧紇救鄫侵邾敗于狐駘注臧紇武仲也鄫屬魯故救之狐駘邾地魯國番縣東南有目台亭音義紇恨發反駘徒來反徐勑才反番本又作蕃應劭音皮一音方袁反白襃魯國記云陳子游為魯相蕃子也國人為諱改曰皮也台吐才反疏正義曰魯國地理志曰番讀如藩屏之藩言魯國南藩也汝南陳子游為魯相子游者藩之子也國人辟諱遂改皮音而為番字因而不改也國人逆喪者皆髽魯於是乎始髽注髽麻髪合結也遭喪者多故不能備凶服髽而已音義髽側𤓰反合結音計本義作髻又作紒音同疏正義曰髽之形制禮無明文先世儒者各以意説鄭衆以為枲麻與髪相半結之馬融以為屈布為巾髙四寸著於顙上鄭𤣥以為去纚而紒案檀弓記稱南宫縚之妻孔子之兄女也縚母喪孔子誨之髽曰爾毋從從爾爾毋扈扈爾鄭𤣥云從從謂太髙扈扈謂太廣若布髙四寸則有定制何當慮其從從扈扈而謂之哉如鄭𤣥去纚而空露其紒則髪上本無服矣喪服女子在室為父髽衰三年空露紒髪安得與衰共文而謂之髽衰也魯人逆喪皆髽豈直露紒迎喪哉凶服以麻表髽字從髟是髪之服也杜以鄭衆為長故用其説言麻髪合結亦當麻髪半也於時魯師大敗遭喪者多婦人迎子迎夫不能備其凶服唯髽而已同路迎喪以髽相弔傳言魯於是始髽者自此以後遂以髽為弔服雖有吉者亦髽以弔人檀弓曰魯婦人之髽而弔也自敗於臺駘始也鄭𤣥云時家家有喪髽而相弔知於是始髽者始用髽相弔也髽者依喪服婦人為斬衰三年者髽故喪服云女子子在室箭笄髽衰三年是也其齊衰期亦髽於檀弓云南宫縚之妻之姑之喪夫子誨之髽是也其婦人弔服則鄭注檀弓云大夫之妻錫衰士之妻則疑衰皆吉笄無首索總也國人誦之曰臧之狐裘敗我於狐駘注臧紇時服狐裘我君小子朱儒是使朱儒朱儒使我敗於邾注公幼弱故曰小子臧紇短小故曰朱儒敗不書魯人諱之音義朱或作侏亦音朱春秋左傳注疏卷二十九春秋左氏傳注疏卷二十九考證仲孫蔑㑹齊崔杼曹人邾人杞人次于鄫注鄫鄭地在陳留襄邑縣東南臣召南按後漢郡國志引此注作縣東南有鄫城傳孟獻子曰請城虎牢以偪鄭王應麟困學紀聞曰齊晉楚之霸皆先服鄭范睢李斯之謀皆先攻韓蓋虎牢之險天下之樞也在虢曰制在鄭曰虎牢在韓曰成臯秦之亡也楚漢爭之叔孫豹及諸侯之大夫及陳袁僑盟劉敞意林曰諸侯皆在是又稱叔孫豹及諸侯之大夫大夫受命於其君之辭也異乎溴梁傳克鳩兹至于衡山注衡山在呉興烏程縣南臣召南按後漢郡國志呉郡烏程引此注又曰或曰丹陽縣之横山去鳩兹不逺子重所至也按此説較杜為長傳今我易之難哉趙汸補注曰傳記韓獻子之言與五年范宣子之言見晉所以終棄陳于楚臣浩按自七年鄬之㑹陳侯畏楚逃歸于是凡㑹盟陳不與矣傳聞喪乃止疏晉士匄侵齊至榖侵字下監本衍一奪字今刪傳陳無禮故也趙汸曰不責諸侯不能救而責陳無禮蓋緣武仲語而失之傳晉侯享之金奏肆夏之三不拜注周禮以鐘鼓奏九夏其二曰肆夏一名繁三曰韶夏一名遏四曰納夏一名渠臣召南按周禮本文韶夏作昭夏鄭注引杜子春曰牲出入奏昭夏又按國語曰金奏肆夏繁遏渠鄭注周禮引之亦作繁又音義八曰陔夏臣召南按周禮本文作祴夏注引杜子春曰祴讀為陔鼓之陔傳歌鹿鳴之三疏不言其三之名言監本訛作拜今改正又疏夏大也言遂於天位也臣召南按周禮注引呂叔玉本文作言遂於大位謂王位也大字是傳無終子嘉父林堯叟曰子爵也嘉父其字臣召南按杜注不言無終國所在漢書地理志右北平郡無終故無終子國是也傳恃其射也疏羿彃日烏焉解羽又羿彃十日也楚辭天問及尚書疏引歸藏俱作彃監本作彈非也今改正傳伯明后寒棄之臣召南按后寒二字無解林堯叟曰伯明之君惡其好讒寒棄之而不用趙汸補注曰伯明君此寒國之時棄不收采二説未知孰是傳有窮由是遂亡顧炎武日知錄云注曰浞因羿室不改有窮之號非也哀元年傳稱有過澆矣此特承上死于窮門而言以結取引夏訓之文耳臣照按哀元年傳稱過澆者安知非推本澆之國本在過而謂之過澆乎曷據而謂澆曾改國號曰過也杜氏去古未逺謂不改有窮之號當非臆説傳昔周辛甲之為太史也疏晉語稱文王訪于辛尹臣召南按晉語此胥臣之言也各本俱脱語字今補又按史記周本紀文王待士辛甲大夫之徒皆往歸之又疏太傅胡廣太傅監本訛作大傳今改正春秋左氏傳注疏卷二十九考證
