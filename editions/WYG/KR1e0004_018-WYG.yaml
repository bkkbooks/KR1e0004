body:
  text: 春秋左傳注疏卷十八起文公五年盡十年晋杜氏注唐陸徳眀音義孔穎逹疏經五年春王正月王使榮叔歸含且􅈖注珠玉曰含含口實車馬曰􅈖音義含本亦作唅户暗反説文作唅云送終口中玉賵芳鳯反疏正義曰公羊傳曰其言歸含且􅈖何兼之兼之非禮也賈服云含􅈖當異人今一人兼両使故書且以譏之案禮雜記諸侯相弔之禮含禭􅈖臨同日而畢與介代有事焉不言遣異使也諸侯相於則唯遣一使而責天子於諸侯必當異人禮何所出而非責王也春秋之世風教陵遲吉凶賀弔罕能如禮王之崩𦵏魯多不行魯之有喪寜能盡至全無所譏不含又無貶責既含且􅈖便責兼之不可是禮備不如不備行禮不如不行豈有如此之理哉左傳舉来含且􅈖㑹𦵏二事乃云禮也則二事俱是得禮無譏兼之之意也言且者見有二禮而已宰咺言来歸此不言来者穀梁傳曰其不言来者不周事之用也􅈖以早而含以晚其意以為含者所以實口當及未殯而至以其至晚故不言来以責王也按雜記含者執璧將命坐委于殯東南有葦席既𦵏蒲席然則含襚者所以助喪盡恩示其有禮而已既𦵏猶尚致之不必以濟其用天子之與鄰國莫不道路長逺赴者猶尚不至責其未殯而来此是理之不通也且来者自外之文非是褒貶之意九年秦人来歸僖公成風之襚襚衣是歛之所用彼􅇰晚矣何以復言来乎言来與不言来史異文耳宰咺秦人歸之既晚故舉其所為之人此夫人新薨言歸含賵為夫人可知故不言歸夫人含􅈖也何休膏肓以為禮尊不含卑又不兼二禮左氏以為禮於義為短鄭康成箴云禮天子於二王後之喪含為先襚次之􅈖次之􅉠次之於諸侯含之􅈖之小君亦如之於諸侯臣禭之諸侯相於如天子於二王後於卿大夫如天子於諸侯於士如天子於諸侯臣何休云尊不含卑是違禮非經意其一人兼歸二禮亦是為譏如康成言尊不含卑禮無其事康成以為譏一人兼二事者非左氏意也注正義曰周禮玉府大喪共含玉穀梁傳曰貝玉曰含士喪禮含用米貝莊子說發冢之事云徐徐破其頰無傷口中珠是含有用珠者也故云珠玉曰含何休云天子以珠周禮大喪共玉不共珠也莊子所言發塜未必發天子冢也雜記云諸侯相含以璧未知何人用珠耳公羊傳曰含者何口實也孝子不忍虚其親之口故以米貝珠玉實之謂之飯含檀弓曰飯用米貝弗忍虚也不以食道用羙焉爾士喪禮用生稻米是不以食道也車馬曰􅈖公羊傳文三月辛亥𦵏我小君成風注無傳反哭成喪故曰𦵏我小君王使召伯來㑹𦵏注召伯天子卿也召采地伯爵也來不及𦵏不譏者不失五月之内音義召上照反夏公孫敖如晉注無傳秦人入鄀注入例在十五年音義鄀音若秋楚人滅六注六國今廬江六縣音義廬力居反冬十月甲申許男業卒注無傳與僖公六同盟疏正義曰業以僖五年即位其年盟于首止八年于洮九年于葵丘十五年于牡丘二十一年于薄二十七年于宋魯許俱在是六同盟也傳五年春王使榮叔來含且􅈖召昭公來會𦵏禮也注成風莊公之妾天子以夫人禮􅈖之明母以子貴故曰禮疏正義曰傳舉二事以一禮結之則含􅈖會𦵏皆得禮也釋例稱􅈖􅉠襚含摠謂之贈言以夫人禮贈之指為􅈖含也初鄀叛楚即秦又貳於楚夏秦人入鄀六人叛楚即東夷秋楚成大心仲歸帥師滅六注仲歸子家冬楚子燮滅蓼注蓼國今安豊蓼縣音義燮息例反蓼音了字或作鄝音同臧文仲聞六與蓼滅曰臯陶庭堅不祀忽諸徳之不建民之無援哀哉注蓼與六皆臯陶後也傷二國之君不能建徳結援大國忽然而亡音義陶音遥晉陽䖏父聘于衞反過寗寗嬴從之注寗晋邑汲郡修武縣也嬴逆旅大夫音義嬴音盈疏正義曰晋語説此事云舍於􅊇旅寗嬴氏注國語者賈逵孔晁皆以寗嬴為掌􅊇旅之大夫故杜亦同之劉炫以寗嬴直是􅊇旅之主非大夫今刪定知不然者若是􅊇旅之主則身為匹庶是卑賤之人猶如重舘人告文仲重丘人罵孫蒯止應稱人而已何得名氏見傳杜以傳載名氏故為􅊇旅大夫劉炫以為客舍主人而規杜氏非也及温而還其妻問之嬴曰以剛商書曰沈漸剛克髙明柔克注沈漸猶滯溺也髙明猶亢爽也言各當以剛柔勝己本性乃能成全也此在洪範今謂之周書音義漸似亷反注同滯溺一本作滯弱亢苦浪反疏正義曰此傳引周書是洪範之三徳也彼説人之三徳乃以此言覆之孔安國以此二句為天地之徳故注云沈漸謂地雖柔而有剛䏻出金石髙明謂天言天為剛徳亦有柔克不干四時杜以傳證人性即以人事觧之沈漸謂人性之沈滯懦溺也髙明謂人性之髙亢明爽也滯溺者當以剛勝其本性亢爽者當以柔勝其本性必自屈矯己乃能成全不然則沈漸失於弱髙明失於剛不能保其身也此文在洪範今謂之周書箕子商人所説故傳謂之商書夫子壹之其不沒乎注陽于性純剛天為剛徳猶不干時注寒暑相順况在人乎且華而不實怨之所聚也注言過其行音義行下孟反犯而聚怨不可以定身注剛則犯人余懼不獲其利而離其難是以去之注為六年晋殺䖏父傳音義難乃旦反晋趙成子欒貞子霍伯臼季皆卒注成子趙衰新上軍帥中軍佐也貞子欒枝下軍帥也霍伯先且居中軍帥也臼季胥臣下軍佐也為六年蒐于夷傳音義帥所類反下同蒐所求反疏正義曰城濮之戰先軫郤溱将中軍狐毛狐偃将上軍欒枝胥臣将下軍晋語云狐毛卒先且居將上軍清原之蒐三軍如故趙衰箕鄭將新上軍胥嬰先都將新下軍箕之役先軫死先且居將中軍不知誰代且居將上軍也此言趙衰新上軍帥中軍佐并舉二官二年彭衙之役云先且居將中軍趙衰佐之注云代郤溱是趙衰新上軍帥中軍佐也經六年春𦵏許僖公注無傳夏季孫行父如陳注行父季友孫秋季孫行父如晋八月乙亥晋侯驩卒注再同盟音義驩喚官反疏正義曰二年及晋䖏父盟三年公及晋侯盟是再同盟也冬十月公子遂如晋𦵏晋㐮公注卿共𦵏事文㐮之制也三月而𦵏速音義共音恭疏正義曰昭三十年傳曰先王之制諸侯之喪士弔大夫送𦵏昭三年傳曰昔文襄之霸也其務不煩諸侯君薨大夫弔卿共𦵏事是也晋殺其大夫陽䖏父注䖏父侵官宜為國討故不言賈季殺晋狐射姑出奔狄注射姑狐偃子賈季也奔例在宣十年音義射音亦一音夜閏月不告月猶朝于廟注諸侯每月必告朔聼政因朝宗廟文公以閏非常月故闕不告朔怠慢政事雖朝于廟則如勿朝故曰猶猶者可止之辭音義不告月月或作朔誤也不告朔本或作告月疏正義曰周禮大史頒告朔于邦國鄭𤣥云天子頒朔于諸侯諸侯蔵之祖廟至朔朝于廟告而受行之論語云子貢欲去告朔之餼羊是用特羊告於廟謂之告朔人君即以此日聼視此朔之政謂之視朔十六年公四不視朔僖五年傳曰公既視朔是也視朔者聼治此月之政亦謂之聼朔玉藻云天子聼朔於南門之外是也其日又以禮祭於宗廟謂之朝廟周禮謂之朝享司尊彜云追享朝享是也其嵗首為之則謂之朝正㐮二十九年正月公在楚傳曰釋不朝正于廟是也告朔視朔聼朔朝廟朝享朝正二禮各有三名同日而為之也文公以閏非常月故闕不告朔告朔之禮大朝廟之禮小文公怠慢政事既不告朔雖朝于廟則如勿朝故書猶朝于廟言猶以譏之必於月朔為此告朔聼朔之禮者釋例曰人君者設官分職以為民極逺細事以全委任之責從諸下以盡知力之用總成敗以效能否執八柄以眀誅賞故自非機事皆委心焉誠信足以相感事實盡而不擁故受位居職者思効忠善日夜自進而無所顧忌也天下之細事無数一日二日萬端人君之眀有所不照人君之力有所不堪則不得不借問近習有時而用之如此則六鄉六遂之長雖躬履此事躬造此官當皆移聼於内官廻心於左右政之粃亂恒必由此聖人知其不可故簡其節敬其事因月朔朝遷坐正位會羣吏而聼大政考其所行而决其煩疑非徒議將然也乃所以考已然又惡其宻聼之亂公也故顯衆以斷之是以上下交泰官人以理萬民以察天下以治也文公謂閏非常月緣以闕禮傳因所闕而眀言典制雖朝于廟則如勿朝故經稱猶朝于廟也經稱告月傳言告朔眀告月必以朔也每月之朔必朝於廟因聼政事事敬而禮成故告以特羊然則朝廟朝正告朔視朔皆同日之事所從言之異耳是言聼朔朝廟之義也玉藻說天子之禮云聼朔於南門之外諸侯皮弁聼朔於大廟鄭𤣥以為眀堂在國之陽南門之外謂眀堂也諸侯告朔以特羊則天子以特羊與天子用特牛告其帝及其神配以文王武王諸侯用特羊告大祖而已杜以眀堂與祖廟為一但眀堂是祭天之䖏天子告朔雖杜之義亦應告人帝朝享即月祭是也祭法云王立七廟曰考廟王考廟皇考廟顯考廟祖考廟皆月祭之二祧享嘗乃止諸侯立五廟曰考廟王考廟皇考廟皆月祭之顯考廟祖考廟享嘗乃止然則天子告朔於眀堂朝享於五廟諸侯告朔於太廟朝享自皇考以下三廟耳皆先告朔後朝廟朝廟小於告朔文公廢其大而行其小故云猶朝于廟公羊傳曰猶者可止之辭也天子𤣥冕以視朔皮弁以視視朝諸侯皮弁以聼朔朝服以日視朝其閏月則聼朔於明堂闔門左扉立於其中聼政於路寢門終月故於文王在門為閏傳六年春晋蒐于夷舍二軍注僖三十一年晋蒐清原作五軍今舍二軍復三軍之制夷晋地前年四卿卒故蒐以謀軍帥音義舍音捨注同帥所類反下同疏正義曰清原之蒐五軍十卿有先軫郤溱先且居狐偃欒枝胥臣趙衰箕鄭胥嬰先都箕之役先軫死往嵗趙衰欒枝先且居胥臣卒八年傳説此蒐之事云晋侯將登鄭父先都則郤溱狐偃胥嬰亦先卒矣清原十卿唯有箕鄭先都在耳故蒐以謀軍帥服䖍云使射姑代先且居趙盾代趙衰也箕鄭將上軍林父佐也先蔑將下軍先都佐也改蒐于董趙盾將中軍射姑奔狄先克代佐中軍使狐射姑將中軍注代先且居音義將子匠反趙盾佐之注代趙衰也盾趙衰子音義盾徒本反陽處父至自温注往年聘衞過温今始至音義過古禾反改蒐于董易中軍注易以趙盾為帥射姑佐之河東汾縣有董亭陽子成季之属也注處父甞為趙衰属大夫疏正義曰僖三十一年清原之蒐衰始為卿三十三年處父已專帥侵蔡則處父之属成子未有多年盖情素相親而黨於趙氏耳非專以甞為其属也故黨於趙氏且謂趙盾能曰使能國之利也是以上之宣子於是乎始為國政注宣趙盾諡制事典注典常也正法罪注輕重當音義當丁浪反辟刑獄注辟猶理也音義辟婢亦反後同者更不音董逋逃注董督也音義逋補吾反由質要注由用也質要劵契也治舊洿注治理洿穢音義洿音烏本又作汙同本秩禮注貴賤不失其本續常職注脩廢官出滯淹注㧞賢能也既成以授大傅陽子與大師賈佗使行諸晋國以為常法注賈佗以公族從文公而不在五人之數音義大音㤗下同佗徒何反從才用反疏正義曰制事典者正國之百事使有常也正法罪者凖所犯輕重豫為之法使在後依用之也辟獄刑者有事在官未决㫁者令於今理治之也董逋逃者舊有逋逃負罪播越者督察追捕之也由質要者謂斷争財之獄用劵契正定之也治舊洿者國之舊政洿穢不絜理治改正之也本秩禮者時有僭踰貴賤相濫本其次秩使如舊也續常職者職有廢闕任賢使能令續故常也出滯淹者賢能之人沈滯田里㧞出而官爵之也此謂所為制作法式者豫為將來使案而遵行臨時决斷者將為故事使後人放習故得行諸晋國以為常法也注辟猶理也正義曰辟訓為法依法斷决是理治之也此與上句所以為異者正法罪謂凖狀制罪為將来之法若今之造律令也辟獄刑謂有獄未决斷當時之罪若昭十四年韓宣子命斷舊獄之類是也注董督也正義曰釋詁云董督正也俱訓為正是董得為督謂督察之也注由用也質要劵契正義曰周禮小宰以官府之八成經邦治四曰聼稱責以傅别六曰聼取予以書契七曰聼賣買以質劑鄭衆云稱責謂貸予也傅别謂劵書也聼訟責者以劵書决之傳傳著約束於文書也别别為両両家各得一也鄭𤣥云傳别謂為大手書於一札中字别之書契謂出予受入之凡要也質劑謂両書一札同而别之長曰質短曰劑傅别質劑皆今之劵書也事異其名耳如彼禮文知質要是契劵也注治理洿穢正義曰洿者穢之别名不絜之稱也法有不便於民事有不利於國是為政之洿穢也治理改正使絜清也注賈佗至之數正義曰晋語宋公孫固云晋公子長事賈佗又曰賈佗公族也而多識以共敬公子居則下之動則咨焉是以公族從文公也尚書周官大師大傅大保天子三公也宣十六年傳晋侯請于王命士會將中軍且為大傅則大傅尊於中軍之將與大師皆為孤卿也周禮上公之國有孤一人王制諸侯三卿晋侯爵也而有三軍六卿復有孤一人者晋為覇主多置羣官共時所湏不能如禮孤尊於卿法由在上故宣子法成授二孤使行之臧文仲以陳衞之睦也欲求好於陳夏季文子聘于陳且娶焉注臣非君命不越竟故因聘而自為娶音義好呼報反娶七住反竟音境為于偽反秦伯任好卒注任好秦穆公名音義任音壬以子車氏之三子奄息仲行鍼虎為殉注子車秦大夫氏也以人從𦵏為殉音義車音居仲本亦作中音仲行户郎反鍼其亷反殉似俊反殺人從死曰殉字林弋絹反皆秦之良也國人哀之為之賦黄鳥注黄鳥詩秦風義取黄鳥止于棘桑往来得其所傷三良不然音義為于偽反下注為立聲教為作善言同君子曰秦穆之不為盟主也宜哉死而棄民先王違世猶詒之法而况奪之善人乎詩曰人之云亡邦國殄瘁注詩大雅言善人亡則國瘁病音義詒以之反瘁似醉反無善人之謂若之何奪之古之王者知命之不長疏正義曰知命之不長知其必將有死不得長生乆視故制法度以遺後人非獨為當已之世設善法也並建聖哲以下即位便為之非臨死始為此也下云衆隷頼之而後即命言其施行此事功成乃就死耳非謂設此法以擬死也是以並建聖哲注建立聖知以司牧民音義王如字一音于况反聖知音智疏正義曰此説王者之事或封為諸侯或置之羣官聖哲是人之雋者故總言之耳樹之風聲注因土地風俗為立聲教之法疏正義曰漢書地理志云凡民性有剛柔緩急聲音不同繋水土之風氣故謂之風好惡取舍動静無常随君上之情欲故謂之俗王制云廣谷大川異制民生其間者異俗器械異制衣服異宜脩其教不易其俗齊其政不易其宜故聖王為教因其土地風俗為立善聲教也聲教人之所立故言樹之今杜云因土地風俗為立聲教之法如杜此言惟樹以聲而傳云樹之風聲而風亦樹者其實風俗亦是人君教化故孝經云移風易俗孔注尚書云立其善風揚其善聲是也分之采物注旌旗衣服各有分制音義分扶問反注同疏正義曰采物謂采章物色旌旗衣服尊卑不同名位髙下各有品制天子所有分而與之故云分之定四年傳稱分魯公以大路大旂之類皆是也著之話言注話善也為作善言遺戒音義話户快反疏正義曰著之話言為作善言遺戒著於竹帛故言著之也為之律度注鍾律度量所以治歴眀時音義量音亮疏正義曰周語云先王之制鍾也律度量衡於是乎生小大器用於是乎出又曰古之神瞽考中聲而量之以制度律均鍾百官軌儀其意言度律之聲以為鍾之均於鍾律取法為度量衡也故漢書律歴志云推歴生律莫不用焉度量衡皆出於黄鍾之律也度者分寸尺丈引所以度長短也本起於黄鍾之長以子榖秬黍之中者一黍之廣度之九十黄鍾之長一黍為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣量者龠合升斗斛所以量多少也本起於黄鍾之龠以子榖秬黍中者千有二百實其龠合龠為合十合為升十升為斗十斗為斛而五量嘉矣權者銖両斤鈞石所以稱輕重也本起黄鍾之重一龠容千二百黍重十二銖両之為両十六両為斤三十斤為鈞四鈞為石而五衡謹矣權衡一物衡平也權重也稱上謂之衡稱錘謂之權所從言之異耳其鍾者亦起於律故服䖍云鳬氏為鍾各自計律倍而半之黄鍾之管長九寸則黄鍾之鍾長二尺二寸半餘鍾亦各自計律倍而半之度量衡其本俱出於律傳言律度注言度量其言不及衡者文雖不足理實兼之易革卦象云君子以治歴眀時此律度量衡皆推歴為之為此法以教天下使之眀四時也陳之藝極注藝凖也極中也貢獻多少之法傳曰貢之無藝又曰貢獻無極疏正義曰藝是凖限極是中正制貢賦多少之法立其凖限中正使不多不少陳之以示民故言陳之所引傳曰及又曰皆昭十三年子産辭也引之表儀注引道也表儀猶威儀音義道音導下同疏正義曰引謂在前故為道也表章儀飾故猶威儀也威儀禮則王者制之以道民言引之道之不用重文故異之也予之法制告之訓典注訓典先王之書疏正義曰訓典先王之書教訓之典取其言以語之故言告之法制謂王者身自制作已之所有故言予之教之防利注防惡興利疏正義曰防者防使勿然故為防惡利者務生此利故為興利傳言防利於文不足互見以曉人也此􅇰為急故特言教之委之常秩注委任也常秩官司之常職疏正義曰設官分職當委任責成故言委之常秩謂職掌位次故為官司之常職道之以禮則使勿失其土宜衆隷頼之而後即命注即就也聖王同之今縱無法以遺後嗣而又收其良以死難以在上矣君子是以知秦之不復東征也注不能復征討東方諸侯為覇主音義遺唯季反復扶又反注同秋季文子將聘於晋使求遭喪之禮以行注季文子季孫行父也聞晋侯疾故疏正義曰劉炫以為聘使之法自湏造遭喪之禮而行防其未然也非是聞晋侯有疾今知不然者依聘禮出使唯以幣物而行無别齎遭喪之禮若主國有凶則臨時辦備今文子聘晋特求遭喪之禮出聘之後晋侯遂卒考其情氣有異尋常聞晋侯之疾何為不可劉炫以不聞晋侯之疾而規杜氏恐非其義也其人曰將焉用之注其人從者音義焉於䖍反從才用反文子曰備豫不虞古之善教也求而無之實難注難卒得音義卒寸勿反過求何害注所謂文子三思音義三思暫反八月乙亥晋㐮公卒靈公少晋人以難故欲立長君注立少君恐有難音義少詩照反注同難乃旦反注及下皆同長丁丈反下皆同趙孟曰立公子雍注趙孟趙盾也公子雍文公子㐮公庶弟杜祁之子好善而長先君愛之且近於秦秦舊好也置善則固事長則順立愛則孝結舊則安為難故故欲立長君有此四徳者難必抒矣注抒除也音義好呼報反下皆同近附近之近抒直吕反又時吕反疏正義曰字有聲相近而為訓者鬼之為言歸也春之為言蠢也其類多矣抒聲近除故為除也服䖍作紓紓緩也賈季曰不如立公子樂注樂文公子音義樂音岳一音洛辰嬴嬖於二君注辰嬴懐嬴也二君懐公文公也音義嬖必計反立其子民必安之趙孟曰辰嬴賤班在九人注班位也其子何震之有注震威也且為二嬖淫也為先君子不能求大而出在小國辟也母淫子辟無威陳小而逺無援將何安焉杜祁以君故譲偪姞而上之注杜祁杜伯之後祁姓也偪姞姞姓之女生㐮公為世子故杜祁譲使在已上音義辟匹亦反又作辟下同祁巨之反偪彼力反姞其吉反又其乙反疏正義曰譜以偪為國名地闕不知所在以狄故譲季隗而已次之故班在四注以季隗是文公託狄時妻故復譲之然則杜祁本班在二音義隗五罪反復扶又反下將復怨同先君是以愛其子而仕諸秦為亞卿焉注亞次也言其賢故位尊音義亞於嫁反秦大而近足以為援母義子愛足以威民立之不亦可乎使先蔑士會如秦逆公子雍注先蔑士伯也士會随季也賈季亦使召公子樂于陳趙孟使殺諸郫注郫晋地音義郫婢支反賈季怨陽子之易其班也注本中軍帥易以為佐音義帥所類反下命帥同而知其無援於晋也注少族多怨九月賈季使續鞫居殺陽處父注鞫居狐氏之族書曰晋殺其大夫侵官也注君已命帥處父易之故曰侵官冬十月㐮仲如晋𦵏㐮公十一月丙寅晋殺續簡伯注簡伯續鞫居十一月無丙寅丙寅十二月八日也日月必有誤賈季奔狄宣子使臾駢送其帑注帑妻子也宣子以賈季中軍之佐同官故音義臾羊朱反駢蒲賢反又蒲丁反帑音奴疏正義曰詩云樂爾妻帑文已有妻故毛傳以帑為子此傳無妻故杜并妻言之帑者細弱之號妻子俱得稱之傳稱以害鳥帑鳥尾猶尚稱帑况妻子也説文云帑金幣所蔵字書帑從子經傳妻帑亦從金夷之蒐賈季戮臾駢臾駢之人欲盡殺賈氏以報焉臾駢曰不可吾聞前志有之曰敵恵敵怨不在後嗣忠之道也注敵猶對也若及子孫則為非對非對則為遷怒音義盡津忍反疏正義曰敵恵謂有恵於彼不可望彼人之子報敵怨謂有怨於彼不可讎彼人之子父祖受人之恵子孫自可不忘要有恩於其父祖不可求報於彼子孫子孫或有不知乃是更復長怨故恵怨皆不在後是為忠恕之道也夫子禮於賈季我以其寵報私怨無乃不可乎注言已蒙宣子寵任介人之寵非勇也注介因也音義介音界損怨益仇非知也注殺季家欲以除怨宣子將復怨已是益仇音義知音智以私害公非忠也釋此三者何以事夫子盡具其帑與其器用財賄親帥扞之送致諸竟注扞衛也音義扞户旦反竟音境閏月不告朔非禮也注經稱告月傳稱告朔眀告月必以朔閏以正時注四時漸差則致閏以正之時以作事注順時命事事以厚生注事不失時則年豐生民之道於是乎在矣不告閏朔棄時政也何以為民音義為民如字治也或音于偽反非也經七年春公伐邾三月甲戌取湏句注湏句魯之封内属國也僖公反其君之後邾復滅之書取易也例在㐮十三年音義湏句其俱反復扶又反易以豉反遂城郚注無傳因伐邾師以城郚郚魯邑卞縣南有郚城備諸難音義郚音吾難乃旦反夏四月宋公王臣卒注二年與魯大夫盟於垂隴音義王如字又往方反疏正義曰王臣以僖二十四年即位與僖盟于踐土翟泉今唯言垂隴據與文同盟言之杜注或兼取前世或正取時君不為例也宋人殺其大夫注宋人攻昭公并殺二大夫故以非罪書戊子晋人及秦人戰于令狐注趙盾廢嫡而外求君故貶稱人晋諱背先蔑而夜薄秦師以戰告音義令力呈反嫡本又作適丁歴反背音佩晋先蔑奔秦注不言出在外奔狄侵我西鄙秋八月公㑹諸侯晋大夫盟于扈注扈鄭地滎陽卷縣西北有扈亭不分别書㑹人總言諸侯晋大夫盟者公後㑹而及其盟音義扈音户卷音權又且權反别彼列反冬徐伐莒注不書將帥徐夷告辭畧音義將子匠反帥所類反公孫敖如莒涖盟音義涖音利又音類傳七年春公伐邾間晋難也注公因覇國有難而侵小音義間間厠之間或如字難乃旦反注同三月甲戌取湏句寘文公子焉非禮也注邾文公子叛在魯故公使為守湏句大夫也絶大皥之祀以與鄰國叛臣故曰非禮音義寘之豉反下同大音㤗皥户老反夏四月宋成公卒於是公子成為右師注莊公子公孫友為左師注目夷子樂豫為司馬注戴公𤣥孫鱗矔為司徒注桓公孫音義矔古亂反疏正義曰世本戴公生樂甫術術生碩甫澤澤生季甫甫生子僕伊與樂豫是也世本又云桓公生公子鱗鱗生東鄉矔是也公子蕩為司城注桓公子也以武公名廢司空為司城華御事為司宼注華元父也傳言六卿皆公族昭公不親信之所以致亂音義御魚吕反本又作禦音同昭公將去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇廕矣葛藟猶能庇其本根注葛之能藟蔓繁滋者以本枝廕庥之多音義去起吕反下及注同庇必吏反又悲位反下同廕本又作蔭於鴆反藟本或作虆力軌反蔓音萬庥許求反又作庇虆類龜反故君子以為比注謂詩人取以喻九族兄弟音義比必爾反疏正義曰此引葛虆王風葛藟之篇也彼毛傳以之為興此言君子以為比者但比之隐者謂之興興之顯者謂之比比之與興深淺為異耳此傳近取庇根理淺故以為比毛意逺取河潤義深故以為興由意不同故比興異耳况國君乎此諺所謂庇焉而縱尋斧焉者也注縱放也必不可君其圖之親之以徳皆股肱也誰敢擕貳若之何去之不聼穆㐮之族率國人以攻公注穆公㐮公之子孫昭公所欲去者殺公孫固公孫鄭于公宫注二子在公宫故為亂兵所殺疏正義曰經書宋人殺其大夫傳言不稱名非其罪則此二子名氏當見於經亦卿官也僖二十二年傳稱大司馬固於時又有司馬子魚上文樂豫為司馬下云六卿和公室六卿之外有此二子盖是孤卿之官也宋是上公禮得有孤且春秋之時不必如禮六卿和公室樂豫舍司馬以譲公子卬注卬昭公弟音義舍音捨下同卬五郎反昭公即位而𦵏書曰宋人殺其大夫不稱名衆也且言非其罪也注不稱殺者及死者名殺者衆故名不可知死者無罪則例不稱名疏正義曰傳云不稱名怪殺者死者並不名也又言衆也觧殺者不名言殺者衆多其名不可知也且言非其罪也觧死者不名言死者無罪則於例不稱名也此傳言書曰是仲尼新意殺大夫有例無凡故毎言書曰所謂曲而暢之也此言死者無罪故不稱名則被殺書名皆為有罪故諸是大夫被殺書名者杜皆言其罪狀止以此傳為例故也釋例曰大臣相殺死者無罪則両稱名氏以示殺者之罪王札子殺召伯毛伯是也若死者有罪則不稱殺者名氏晋殺其大夫陽處父是也若為賊者衆因亂而殺則亦稱國人殺者主名不分故也主名不分死者雖名氏可知亦随而去之嫌於罪死者也士殺大夫則書曰盗盗殺鄭公子騑公子發公孫輒是也若然宋之穆㐮之族既非六卿於例名氏不見亦應書盗而不言盗者彼殺鄭卿者知是尉止司臣之類故書盗以惡其人此則不得主名書盗不知所惡故不書其盗耳若知其人則亦書盗也秦康公送公子雍于晋曰文公之入也無衛故有吕郤之難注僖二十四年文公入音義難乃旦反乃多與之徒衛穆嬴日抱大子以啼于朝曰先君何罪其嗣亦何罪舍適嗣不立而外求君將焉寘此注穆嬴㐮公夫人靈公母也音義嬴音盈適本又作嫡同丁歴反將焉於虔反下焉用同出朝則抱以適趙氏頓首於宣子曰先君奉此子也而属諸子曰此子也才吾受子之賜不才吾唯子之怨注欲使宣子教訓之音義属音燭今君雖終言猶在耳注在宣子之耳而棄之若何宣子與諸大夫皆患穆嬴且畏偪注畏國人以大義来偪己音義偪彼力反乃背先蔑而立靈公以禦秦師箕鄭居守趙盾將中軍先克佐之注克先且居子代狐射姑音義背音佩箕音基守手又反下注同將子匠反下注同荀林父佐上軍注箕鄭將上軍居守故佐獨行先蔑將下軍先都佐之歩招御戎戎津為右及堇陰注先蔑士會逆公子雍前還晋晋人始以逆雍出軍卒然變計立靈公故車右戎御猶在職堇陰晋地音義招上遙反堇音謹一音靳卒寸忽反疏正義曰諸言御戎為右皆是君之御右知此歩招戎津始以逆雍出軍此擬為雍之御右也改立靈公故御右猶在職也十二年河曲之戰傳稱范無恤御戎注云代歩招晋君不行有御戎者成二年楚令尹子重為揚橋之役王卒盡行彭名御戎注云王卒盡行故王戎車亦行然則河曲之戰亦公卒盡行公之戎車亦行故御戎在職也此時未至令狐令狐猶是晋地知堇陰亦是晋地也宣子曰我若受秦秦則賔也不受寇也既不受矣而復緩師秦將生心先人有奪人之心注奪敵之戰心也音義復扶又反先悉薦反有奪人之心本或此下有後人待其反誤軍之善謀也逐寇如追逃軍之善政也訓卒利兵秣馬蓐食潛師夜起注蓐是早食於寝蓐也音義卒子忽反秣音末蓐音辱戊子敗秦師于令狐至于刳首己丑先蔑奔秦士會從之注從刳首去也令狐在河東當與刳首相接音義刳苦胡反先蔑之使也荀林父止之曰夫人大子猶在而外求君此必不行子以疾辭若何不然將及注禍將及已音義使所吏反攝卿以往可也何必子同官為寮吾甞同寮敢不盡心乎弗聼為賦板之三章注板詩大雅其三章義取芻蕘之言猶不可忽况同竂乎僖二十八年林父將中軍先蔑將左行音義寮本又作僚力彫反為于偽反下為同寮同芻初俱反蕘音饒行户郎反下同又弗聼及亡荀伯盡送其帑及其器用財賄於秦曰為同寮故也注荀伯林父士會在秦三年不見士伯注士伯先蔑其人曰能亡人與國注言能與人俱亡於晋國不能見於此焉用之注何用如此士季曰吾與之同罪注俱有迎公子雍之罪非義之也將何見焉注言已非慕先蔑之義而從之及歸遂不見注責先蔑為正卿而不匡諌且俱出奔惡有黨也士會歸在十三年音義惡烏路反狄侵我西鄙公使告于晋趙宣子使因賈季問酆舒且譲之注酆舒狄相譲其伐魯音義酆芳忠反相息亮反酆舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也注冬日可愛夏日可畏秋八月齊侯宋公衛侯陳侯鄭伯許男曺伯會晋趙盾盟于扈晋侯立故也公後至故不書所㑹凡㑹諸侯不書所㑹後也注不書所㑹謂不具列公侯及卿大夫後至不書其國辟不敏也注此傳還自釋凡例之意疏正義曰僖十四年諸侯城緣陵傳曰不書其人有闕也十五年諸侯盟于扈傳曰書曰諸侯無能為也十七年諸侯㑹于扈傳曰書曰諸侯無功也然則摠稱諸侯皆是罪諸侯也此總稱諸侯不稱所㑹為公後也傳還自釋几例云後至不書其國者辟不敏也不敏猶不達也諸國皆在公獨後至是公不達於事辟公之不達於事諱公罪而歸責於諸侯者若言諸侯無功然故貶諸侯而總之所以辟公恥也穆伯娶于莒曰戴已生文伯其娣聲已生恵叔注穆伯公孫敖也文伯榖也恵叔難也音義已音紀一音杞娣大計反難乃多反戴已卒又聘于莒莒人以聲已辭則為㐮仲聘焉注㐮仲公孫敖從父昆弟音義為于偽反且為自為同冬徐伐莒莒人来請盟注見伐故欲結援穆伯如莒涖盟且為仲逆及鄢陵登城見之羙注鄢陵莒邑音義鄢於晚反自為娶之仲請攻之公將許之叔仲恵伯諌注恵伯叔牙孫曰臣聞之兵作於内為亂於外為冦冦猶及人亂自及也今臣作亂而君不禁以啟冦讎若之何公止之恵伯成之注平二子使仲舍之注舍不娶音義舍音捨注同公孫敖反之注還莒女復為兄弟如初從之注為明年公孫敖奔莒傳音義復音服又扶又反晋郤缺言於趙宣子曰日衛不睦故取其地注日往日取衞地在元年今已睦矣可以歸之叛而不討何以示威服而不柔何以示懐注柔安也非威非懐何以示徳無徳何以主盟子為正卿以主諸侯而不務徳將若之何夏書曰注逸書戒之用休注有休則戒之以勿休音義休許虯反注同董之用威注董督也有罪則督之以威刑勸之以九歌勿使壊九功之徳皆可歌也謂之九歌六府三事謂之九功水火金木土榖謂之六府正徳利用厚生謂之三事疏正義曰此虞書大禹謨之文也以其夏禹之言故傳謂之夏書勿使壊以上皆彼正文唯彼言俾勿壊俾亦使也一字别耳彼上文云水火金木土榖惟修正徳利用厚生惟和九功惟叙九叙惟歌乃次此辭下云帝曰六府三事允治郤缺令宣子修徳行禮使人歌樂故先引勸之以九歌然後郤言六府三事義而行之謂之徳禮注徳正徳也禮以制財用之節又以厚生民之命無禮不樂所由叛也疏正義曰在上為政無禮則民不樂是叛之所由若吾子之徳莫可歌也其誰来之注来猶歸也音義樂音洛盍使睦者歌吾子乎宣子説之注為明年晋歸鄭衞田張本音義盍户臘反疏正義曰鄭往前侵衞田今晋令鄭歸還衛田也言歸鄭衛田者謂晋歸以鄭所取衞田故杜下注云匡本衞邑中属鄭令鄭還衞是也然晋亦還衞田獨言鄭還衞田者以鄭歸衞田為主遂畧之劉炫以為歸鄭及歸衛田怪傳文歸衞不歸鄭而規杜氏非也經八年春王正月夏四月秋八月戊申天王崩冬十月壬午公子遂會晋趙盾盟于衡雍注壬午月五日音義雍於用反乙酉公子遂㑹雒戎盟于暴注乙酉月八日也暴鄭地公子遂不受命而盟宜去族善其觧國患故稱公子以貴之音義㑹雒戎本或作伊雒之戎此後人妄取傳文加耳雒音洛去起吕反疏正義曰以壬午乙酉相去四日其間不容報君見其專命之意故注詳其日也衡雍鄭地知暴亦鄭地臣無專命之義故翬溺皆去其族也此公子遂不受君命因事遂行輒與戎盟宜去其族傳言書曰公子遂珍之是善其觧國患故稱公子以貴之也釋例曰人臣受命不受辭出竟有可以利社稷者專之可也故㐮仲始盟趙盾遂盟伊洛之戎四日之間經再書公子不可以遂事常辭顯之也公孫敖如京師不至而復丙戌奔莒注不言出受命而出自外行螽注無傳為災故書宋人殺其大夫司馬宋司城来奔注司馬死不舍節司城奉身而退故皆書官而不名貴之音義舍音捨傳八年春晋侯使解揚歸匡戚之田于衞注匡本衞邑中属鄭孔達伐不能克今晋令鄭還衞及取戚田皆見元年音義解音蟹中丁仲反令鄭力呈反見賢遍反且復致公壻池之封自申至於虎牢之竟注公壻池晋君女壻又取衞地以封之今并還衞也申鄭地傳言趙盾所以能相幼主而盟諸侯音義復扶又反壻音細俗作婿竟音境下注同相息亮反疏正義曰釋親云女子之夫為壻傳稱公壻知是晋君之女壻池其名也杜以上言歸匡戚之田于衞又言且復致則晋亦致于衞故言又取衞地以封之今并還衛也劉炫云服虔以為致之于鄭以服言是規杜已釋之夏秦人伐晋取武城以報令狐之役注令狐役在七年秋㐮王崩注為公孫敖如周弔傳晋人以扈之盟来討注前年盟扈公後至冬㐮仲㑹晋趙孟盟于衡雍報扈之盟也遂㑹伊雒之戎注伊雒之戎將伐魯公子遂不及復君故專命與之盟書曰公子遂珍之也注珍貴也大夫出竟有可以安社稷利國家者專之可也疏正義曰傳多言貴之而此言珍之事同而文異故以珍為貴也大夫出竟以下皆莊十九年公羊傳文穆伯如周弔喪不至以幣奔莒從已氏焉注巳氏莒女宋㐮夫人㐮王之姊也昭公不禮焉注昭公適祖母音義適丁歴反夫人因戴氏之族注華樂皇皆戴族以殺㐮公之孫孔叔公孫鍾離及大司馬公子卬皆昭公之黨也司馬握節以死故書以官注節國之符信也握之以死示不廢命疏正義曰周禮掌莭掌守邦莭而辨其用守邦國者用玉莭守都鄙者用角莭鄭𤣥云玉莭有五則典瑞云榖圭以和難以聘女牙璋以起軍旅以治兵守珍圭以徴守以恤凶荒琬圭以治徳以結好琰圭以易行以除慝其角莭鄭注云未聞此司馬司城以事在官盖執此等之玉莭小行人云守都鄙者用管莭此司馬司城或食采地即都鄙之主此莭或是管莭也掌莭又云山國用虎莭土國用人莭澤國用龍莭鄭注云鑄金為之謂王使之使於邦國之䓁掌莭又云門關用符莭貨賄用璽莭道路用旌莭鄭𤣥云門關者謂司門司關也道路者謂天子之鄉遂大夫也其諸侯之國及門關鄉遂亦有莭小行人云山國用虎莭土國用人莭澤國用龍莭謂已是山澤之國出使用龍虎之莭小行人又云道路用旌莭門關用符莭都鄙用管莭鄭注云道路謂諸侯鄉遂及諸侯司門司關都鄙之等也令之為官授以此莭今握莭以死示已不廢命也此夫人殺而經書宋人殺其大夫者夫人與君共有國家尊與君同不得為両下相殺故同國討之文雖同國討稱人實非國討之例以其死者不稱人無罪故也司城蕩意諸来奔效莭於府人而出注效猶致也意諸公子蕩之孫音義效户教反公以其官逆之皆復之亦書以官皆貴之也注卿違從大夫公賢其效莭故以本官逆之請宋而復之司城官属悉来奔故言皆復疏正義曰卿違從大夫昭七年傳文也效莭於府人然後出奔示已解任而退不敢帶官而逃公賢其效節故以本官逆之為是書宋司城来奔善其人故書其官也請宋復之事在十一年一人不得言皆知司城官属悉與皆復也夷之蒐晋侯將登箕鄭父先都注登之於上軍也夷蒐在六年疏正義曰清原之蒐箕鄭佐新上軍先都佐新下軍二人先為卿也而復欲登之知登於上軍也然則七年令狐之戰傳歴言諸軍將佐箕鄭將上軍先都佐下軍先都不登容可怨恨箕鄭不失其登而亦共作亂者盖先克之薦狐趙并亦請退箕鄭先都先都於時即佐下軍箕鄭雖得不退因此意望以成小憾及狐射姑出奔箕鄭位次冝佐中軍而先克代射姑箕鄭守其故職盖以此而恨也而使士穀梁益耳將中軍注士縠本司空音義穀户木反將子匠反先克曰狐趙之勲不可廢也從之注狐偃趙衰有從亡之勲音義從亡才用反先克奪蒯得田于堇陰注七年晋禦秦師於堇陰以軍事奪其田也先克中軍佐音義蒯苦瞶反故箕鄭父先都士縠梁益耳蒯得作亂注為眀年殺先克張本音義為于偽反經九年春毛伯来求金注求金以共𦵏事雖踰年而未𦵏故不稱王使音義共音恭本亦作供下同夫人姜氏如齊注無傳歸寜二月叔孫得臣如京師辛丑𦵏㐮王注卿共𦵏事禮也疏正義曰言禮者以眀天子之喪卿弔卿㑹𦵏諸侯不親行也釋例曰萬國之數至衆封疆之守至重故天王之喪諸侯不得越竟而奔脩服於其國卿共弔送之禮既𦵏卒哭而除凶魯侯無故而穆伯如周弔為此天子崩諸侯遣卿弔送之經傳也杜以往年穆伯弔喪今令㑹𦵏二事傳無譏文知其禮當然也昭三十年傳鄭㳺吉云靈王之喪我先君簡公在楚似不在楚即當親行而言禮不親者彼言由君在楚上卿守國故使少卿印段往耳言君當親行也晋人殺其大夫先都注下軍佐也以作亂討故書名三月夫人姜氏至自齊注無傳告于廟疏正義曰蘇氏云夫人歸寜書至唯有此耳餘不書者或禮儀不備或滛縱不告廟也晋人殺其大夫士縠及箕鄭父注與先都同罪也楚人伐鄭注楚子師於狼淵不親伐公子遂㑹晋人宋人衞人許人救鄭夏狄侵齊注無傳秋八月曺伯㐮卒注無傳七年同盟于扈疏正義曰㐮以僖八年即位其年盟于洮九年于葵邱十五年于牡丘二十一年于薄今唯言于扈據文公言之九月癸酉地震注無傳地道安静以動為異故書疏正義曰穀梁傳曰震動也公羊傳曰震者何動地也何休云傳先言動者喻若物之動地以曉人也周語伯陽父曰陽伏而不能出陰廹而不能蒸遂於是有地震孔晁云陽氣伏於陰下見廹於陰故不能升以至於地動是地道安静以動為異也冬楚子使椒来聘注稱君以使大夫其禮辭與中國同椒不書氏史畧文疏正義曰莊二十三年荆人来聘不稱楚子使某至此稱君以使大夫其禮與中國同其禮既同椒亦冝書其某氏今不書氏傳無貶文皆是史辭自畧無義例也釋例曰楚殺得臣與冝申賈氏皆以為陋案楚殺大夫公子側成熊之等六七人皆稱氏族無為獨於此二人陋也斯盖非史䇿舊法故無凡例當時諸國以意而赴其自来聘使者辭有詳畧仲尼脩春秋因采以示義義之所起則刋而正之不者即而示之不皆刋正也諸侯之卿當以名氏備書於經其加貶損則直稱人若有褒異則或稱官或但稱氏若無褒無貶傳所不發者則皆就舊文或未賜族或史有詳畧也推尋經文自莊公以上諸弑君者皆不書氏閔公以下皆書氏亦足以明時史之同異非仲尼所皆貶也秦人来歸僖公成風之襚注衣服曰襚秦辟陋故不稱使不稱夫人從来者辭音義襚音遂説文作裞云贈終者衣被曰裞以此襚為衣死人衣辟匹亦反疏正義曰隐元年公羊傳曰衣被曰襚穀梁傳曰衣衾曰襚禮稱襚者君使臣致服故云衣服曰襚也秦處西戎其國辟陋故不稱君使猶楚在莊世稱荆人来聘也成風夫人也来者不言夫人從来者之辭也先言僖公僖公先薨也不言及并致之者𦵏曺共公注無傳音義其音恭傳九年春王正月己酉使賊殺先克注箕鄭等所使也亂殺先克不赴故不書乙丑晋人殺先都梁益耳注乙丑正月十九日經書三月從告毛伯衞来求金非禮也注天子不私求財故曰非禮不書王命未𦵏也二月莊叔如周𦵏㐮王疏正義曰虚舉此經者嫌莊叔别以他事使周𦵏王更使人㑹故明之三月甲戌晋人殺箕鄭父士縠蒯得注梁益耳蒯得不書皆非卿疏正義曰士縠書經則是卿也七年令狐之戰三軍將佐無士縠十二年河曲之戰三軍將佐杜注無代士縠者而士縠得為卿者先蔑奔秦傳無其代十二年欒盾將下軍注云代先蔑者據傳成文言之耳未必不是士縠代先蔑欒盾代士縠也箕鄭上軍將也傳文先箕鄭後士縠士縠若將下軍則是位之次也其事似然或者晋於將佐之外猶别有􅄆位從卿若郤缺趙穿之類也傳箕鄭先士縠經士縠先箕鄭者經以殺之先後傳以位次序列傳蒯得居下知其以位次也賈逵云箕鄭稱及非首謀按襄二十三年陳殺其大夫慶虎及慶寅杜云言及史異辭無義例則此亦然也范山言於楚子曰晋君少不在諸侯北方可圖也注范山楚大夫音義少詩照反下注同楚子師于狼淵以伐鄭注陳師狼淵為伐鄭援也潁川潁陰縣西有狼陂音義陂彼皮反囚公子堅公子尨及樂耳注三子鄭大夫音義尨莫江反鄭及楚平公子遂㑹晋趙盾宋華耦衞孔達許大夫救鄭不及楚師卿不書緩也以懲不恪注華耦華父督曽孫公子遂獨不在貶者諸魯事自非指為其國褒貶則皆從國史不同之於他國此春秋大意他皆放此音義懲直升反恪苦各反為于偽反疏正義曰在禮卿不㑹公侯㑹則貶之稱人元年公孫敖㑹晋侯于戚文無所貶此公子遂與諸國同行諸卿皆貶遂獨不貶諸如此類莫不盡然知諸於魯事自非指為其國褒貶皆從魯史以其體例已舉不假改正故也夏楚侵陳克壺丘注壺丘陳邑以其服於晋也秋楚公子朱自東夷伐陳注子朱息公也陳人敗之獲公子茷陳懼乃及楚平注以小勝大故懼而請平也傳言晋君少楚陵中國明年所以有厥貉之㑹音義茷扶廢反貉武百反冬楚子越椒来聘執幣傲注子越椒令尹子文從子傲不敬音義傲五報反注下同從才用反叔仲恵伯曰是必滅若敖氏之宗傲其先君神弗福也注十二年傳曰先君之敝器使下臣致諸執事明奉使皆告廟故言傲其先君也為宣四年楚滅若敖氏張本音義敖五力反使所吏反秦人来歸僖公成風之襚禮也注秦慕諸夏欲通敬於魯因有翟泉之盟故追贈僖公并及成風本非魯方嶽同盟無相赴弔之制故不譏其緩而以接好為禮音義夏户雅反嶽音岳好呼報反下文注同諸侯相弔賀也雖不當事苟有禮焉書也以無忘舊好注送死不及尸故曰不當事書者書於典䇿垂示子孫使無忘過厚之好疏正義曰此雖廣言諸侯主為秦人發傳隐元年王使来賵尚譏其緩若是同盟之國必譏其緩可知釋例曰秦之與魯本非方嶽同盟魯薨不赴秦秦不賵魯自是其常也僖穆二公雖有同盟之義二君已卒則二子不得用同盟之禮也今秦康公逺慕諸華欲通敬於魯無以為辭因翟泉有盟追贈僖公并及成風假弔禮而行故曰禮也送死不及尸謂不當其事書者書之于䇿垂之子孫以示過厚之好也是言此傳主為秦也僖公成風服除乆矣今始来弔贈當以變禮待之檀弓曰衞將軍文子之喪既除喪而後越人来弔主人深衣練冠待於廟垂涕洟子㳺曰將軍文氏之子其庶㡬乎亡於禮者之禮也其動也中是古有以服終来弔者也何休膏肓云禮主於敬一使兼二喪又於禮既緩而左氏以之為禮非也鄭箴云若以為緩按禮衞將軍文子之喪既除喪而越人来弔子㳺何得善之是鄭不非其綏也若譏一使兼二禮雜記諸侯弔禮有含襚賵臨何以一使兼行知休言非也經十年春王三月辛卯臧孫辰卒注無傳公與小歛故書日音義與音預歛力驗反夏秦伐晋注不稱將帥告辭畧音義將子匠反帥所類反楚殺其大夫宜申注宜申子西也謀弑君故書名自正月不雨至于秋七月注無傳義與二年同及蘇子盟于女栗注女栗地名闕蘇子周卿士頃王新立故與魯盟親諸侯也音義女音汝一音如字頃音傾冬狄侵宋注無傳楚子蔡侯次于厥貉注厥貉地名闕將伐宋而未行故書次傳十年春晋人伐秦取少梁注少梁馮翊夏陽縣音義少啇照反下注同夏户雅反夏秦伯伐晋取北徴注報少梁音義徵如字三蒼云縣属馮翊音懲一音張里反初楚范巫矞似注矞似范邑之巫音義矞尹必反謂成王與子玉子西曰三君皆將强死疏正義曰强健也無病而死謂被殺也城濮之役王思之故使止子玉曰毋死不及止子西子西縊而縣絶注在僖二十八年音義强其丈反濮音卜毋音無縊一䜴反縣音𤣥王使適至遂止之使為啇公注啇楚邑今上雒啇縣音義王使所吏反㳂漢泝江將入郢注㳂順流泝逆流音義㳂悦專反沂息路反郢以井反又以政反疏正義曰啇在漢水北漢水東流而南入江子西既至啇邑聞不敢居啇縣㳂濮水順流而下至江乃泝流逆上渚宫當郢都之南故王在渚宫下見之也下注云小洲曰渚釋水文王在渚宫注小洲曰渚音義渚章吕反水中可居者曰洲洲音州下見之懼而辭曰臣免於死又有䜛言謂臣將逃臣歸死於司敗也注陳楚名司冦為司敗子西畏䜛言不敢之啇縣疏正義曰言歸死於司敗主刑之官司冦是也論語有陳司敗知陳楚同此名也王使為工尹注掌百工之官又與子家謀弑穆王穆王聞之五月殺鬭宜申及仲歸注仲歸子家不書非卿秋七月及蘇子盟于女栗頃王立故也注僖十年狄滅温蘇子奔衞今復見盖王復之音義復扶又反見賢遍反陳侯鄭伯㑹楚子于息冬遂及蔡侯次于厥貉注陳鄭及宋麇子不書者宋鄭執卑苟免為楚僕任受役於司馬麇子恥之遂逃而歸二君失位降爵故不列於諸侯宋鄭猶然則陳侯必同也音義麇九倫反疏正義曰杜以陳鄭㑹楚子于息遂與蔡侯次于厥貉則陳鄭當在次也傳稱厥貉之㑹麇子逃歸則麇子當在也宋公逆楚子則宋公亦在也獨書楚子蔡侯不言陳鄭宋麇故迹其事而為之説言宋陳鄭三君䧏爵麇子逃歸故不書也劉炫以為告文畧故不書陳鄭宋今知不然者此楚㑹諸侯必是楚人来告若楚人来告當以得諸侯為榮何以畧其宋鄭陳乎麇子不㑹傳云逃歸宋鄭二國為楚僕役猶如許蔡二君降乗楚車許蔡既不書於經故知宋鄭失位不見此乃傳事分明故特為此觧劉炫有以告文畧以規杜氏非也將以伐宋宋華御事曰楚欲弱我也先為之弱乎何必使誘我我實不能民何罪乃逆楚子勞且聼命注時楚欲誘呼宋共戰御事華元父音義勞力報反遂道以田孟諸注孟諸宋大藪也在梁國睢陽縣東北音義道音導藪素口反睢音綏宋公為右盂鄭伯為左盂注盂田獵陳名音義盂音于陳直覲反期思公復遂為右司馬注復遂楚期思邑公今弋陽期思縣音義弋以職反子朱及文之無畏為左司馬注將獵張両甄故置二左司馬然則右司馬一人當中央音義甄吉然反疏正義曰宋公為右盂無畏為左司馬而抶宋公之僕自謂當官而行明無畏當右子朱當左是其張両甄故置二左司馬使各掌一甄自然右司馬一人當中央也命夙駕載燧注燧取火者音義命眉病反燧音遂本又作㸂宋公違命注不夙駕載燧無畏抶其僕以狥或謂子舟曰國君不可戮也子舟曰當官而行何彊之有注子舟無畏字音義抶恥乙反狥似俊反舟音州詩曰剛亦不吐柔亦不茹注詩大雅羙仲山甫不辟彊禦音義茹如吕反毋縱詭随以謹罔極注詩大雅詭人随人無正心者謹猶慎也罔無也極中也音義詭九委反疏正義曰無縱此詭人随人無正心者以謹勅彼無中正之人言小罪尚不赦則大罪不敢為也是亦非辟彊也敢愛死以亂官乎注為宣十四年宋人殺子舟張本厥貉之㑹麇子逃歸注為明年楚子伐麇傳春秋左傳注疏卷十八春秋左氏傳注疏卷十八考證王使榮叔歸含且􅈖臣召南按王不稱天劉敞曰王何以無天是非天之法以妾為嫡也程子曰天子成妾母為夫人亂倫之甚失天理矣不稱天義已明稱叔存禮也按左氏稱為禮故杜注不言貶而下文召伯㑹𦵏亦書王使而不稱天三家經文並同不得謂聖經無意也傳楚子燮滅蓼注蓼與六皆臯陶後臣浩按地理志六安國六縣蓼縣皆云故國臯繇後偃姓後漢郡國志引皇覽曰臯陶冡在六安縣傳商書曰沉漸剛克髙明柔克疏箕子商人所説故傳謂之商書臣召南按洪範曰惟十有三祀王訪于箕子稱祀而不稱年以申箕子之志謂之商書可也閏月不告月猶朝于廟注猶者可止之辭臣浩按公羊榖梁俱謂猶者通可以已俱謂閏月本不當告朔不如左氏斷其非禮杜注于猶朝廟以二傳為説非也胡氏謂幸其不已之辭深得經意臣召南按公榖意重譏朝廟之非左氏意重譏不告月之失以論語告朔章推之左氏為長傳既成以授太傅陽子與太師賈佗疏而有三軍六卿復有孤一人者臣召南按當作復有孤卿二人謂太師太傅也傳班在九人趙汸補注曰九等之班乃諸侯取女立子通制隐元年公羊傳何氏注曰禮適夫人無子立右媵右媵無子立左媵左媵無子立適侄娣適姪娣無子立右媵姪娣右媵姪娣無子立左媵姪娣是時諸侯取女立子雖不如禮而九等班位尚存故趙孟得而言之與公羊立子以貴不以長之説合臣召南按此止謂班次第九耳非必如古制也傳不告閏朔棄時政也漢書律歴志引此作棄時正也傳六卿和公室臣召南按春秋時列國官制最備者莫如晋宋晋以霸宋以先代之後爵為上公故官制畧如王室据此傳則所謂六卿右師左師司馬司徒司城司冦也以前後傳考之又有太宰小宰而司冦司馬皆有大小較諸周制惟少宗伯一官耳傳先蔑將下軍先都佐之注先蔑士㑹逆公子雍前還晋臣召南按趙汸補注曰上言先蔑如秦又言背先蔑以禦秦師則將下軍非先蔑傳誤明矣按三軍並出以迎新君及堇陰始變計禦秦蔑始奔也傳本不誤但倒背先蔑一句于及堇陰之下即情事俱見乙酉公子遂㑹雒戎盟于暴注公子遂不受命而盟宜去族善其觧國患故稱公子以貴之葉夢得曰遂本以二事出故以壬午盟趙盾乙酉盟雒戎相去四日非一事再見自不應去族何珍之云趙汸曰杜注遂不受命云云非事實也宋人殺其大夫司馬萬斯大曰是年書宋殺司馬十五年書宋司馬華孫来盟属辭以觀即知公子卬既殺華孫即代為司馬卬乃忠于昭公者孫則公子鮑之黨也前後再書司馬一忠一賊義自分明傳司馬握節以死啖助曰傳言二人不失節致誤節義為符節如孔父義形于色而誤為女色也臣照按啖助謂誤節義為符節施諸握節句猶可通若效節于府人以出則豈得謂非符節之節耶叔孫得臣如京師疏言君當親行也臣浩按文義當作非言君當親行也各本俱脱非字耳傳秦伯伐晋取北徴音義徴如字三蒼云縣属馮翊臣召南按地理志左馮翊徴顔師古注曰即今之澄城縣是也左傳所謂取北徴正此地耳而杜元凱未詳其處也春秋左氏傳注疏卷十八考證
