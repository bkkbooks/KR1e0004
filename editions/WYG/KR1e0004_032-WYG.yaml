body:
  text: 春秋左傳注疏卷三十二起襄公十三年盡十五年晉杜氏注唐陸徳明音義唐孔穎逹疏經十有三年春公至自晉夏取邿注邿小國也任城亢父縣有邿亭𫝊例曰書取言易也音義邿音詩任音壬亢苦浪反又音剛父音甫易以䜴反傳同秋九月庚辰楚子審卒注共王也成二年大夫盟于蜀冬城防傳十三年春公至自晉孟獻子書勞于廟禮也注書勲勞於策也桓二年傳曰公至自唐告於廟也凡公行告於宗廟反行飲至舍爵䇿勲焉禮也桓十六年傳又曰公至自伐鄭以飲至之禮也然則還告廟及飲至及書勞三事偏行一禮則亦書至悉闕乃不書至傳因獻子之事以發明凡例釋例詳之音義舍如字又音捨疏正義曰其書勞與䇿勲一也周禮王功曰勲事功曰勞對則勲大而勞小故𫝊變文以􅊶之注云書勲勞於策明其不異也桓二年𫝊發凡例有告廟也飲至也策勲也桓十六年傳言飲至此年傳言書勞二者各舉其一所以反覆凡例以此知三事偏行一禮則亦書至悉闕乃不書至耳所云偏行一禮謂偏行告至其飲至策勲則不可偏行也何則告廟因行飲至舍爵而即策勲策勲飲至並行之于廟豈得不告至而在廟聚飲乎不告至而入廟書勞乎明其決不然矣但告至已後或飲至而不書勞或書勞而不飲至二事或有闕其一者傳因獻子書勞復言禮也所以發明凡例釋例曰公行或朝或㑹或盟或伐得禮失禮其事非一故傳隨而釋之於盟釋告廟嫌他例不通故復總云凡公行告于宗廟反行飲至舍爵策勲焉禮也此以明公之出竟當無不告及其反也則必飲至有功則策勲故公至自伐鄭傳重言以飲至之禮孟獻子書勞于廟傳復云禮所以反覆凡例也公朝於晉而獻子書勞知策勲非惟討伐之功雖或常行有以定國安民亦書功於廟也然則凡反行飲至必以嘉㑹昭告祖禰有功則舍爵策勲無勞告事而已夏邿亂分為三注國分為三部志力各異師救邿遂取之注魯師也經不稱師不滿二千五百人傳通言之疏正義曰荘八年師及齊師圍郕彼是大夫将滿師故稱師此亦大夫将所将不滿二千五百人故直言取邿而不得言師也傳言師者師是衆人總名雖少亦通言之凡書取言易也注不用師徒及用師徒而不勞雖國亦曰取疏正義曰宣九年取根牟傳曰言易也成六年取鄟傳曰言易也昭四年取鄫傳曰言易也莒亂著邱公立而不撫鄫鄫叛而来故曰取凡克邑不用師徒曰取與此四發取例傳皆云言易也取鄫之下又發凡例云克邑不用師徒曰取者不用師徒即是易得之状所以覆明凡例也若用而不勞則與不用相似故杜云用而不勞亦曰取也凡例克邑邿乃是國知雖國亦曰取釋例曰取者乘其衰亂或受其潰叛或用少師而不頓兵勞力則直言取如取如􅂝言其易也傳四發取例者邿以師徒鄫叛而来根牟東夷鄟附庸國名各不同故也邿為小國非邑非夷故以凡例附之用大師焉曰滅注敵人距戰斬獲俘馘用力難重雖邑亦曰滅音義馘古獲反疏正義曰國大邑小嫌邑易國難滅取止見難易不由國邑大小故注辨之上云易則雖國亦曰取此取邿邿是國也此言用力難重則雖邑亦曰滅僖二年虞師晉師滅下陽昭十三年吳滅州来皆邑而言滅是也弗地曰入注謂勝其國邑不有其地疏正義曰入謂入其都邑制其民人當入之日與滅亦同但尋即去之不為己有故云勝其國邑不即有其土地如此之類謂之為入國邑雙舉者國邑皆稱入也文十五年晉郤缺入蔡是入國也成七年吳入州来九年楚人入鄆是入邑也若然閔二年狄入衞哀八年宋公入曹二者傳皆言滅而經書入者釋例曰狄滅衞而書入者狄無文告衛之君臣死盡齊桓存之以告諸侯言狄巳去不能有其土地也曹背晉而奸宋是以致討宋公既還而不忍禇師之詬怒而反兵一舉滅曹滅非本志故以入告也荀罃士魴卒晉侯蒐于緜上以治兵注為将命軍師也必蒐而命之所以與衆共音義爲于僞反師所類反使士匄将中軍辭曰伯游長注伯游荀偃音義長丁丈反昔臣習於知伯是以佐之非能賢也注七年韓厥老知罃代将中軍士匄佐之匄今将讓故謂爾時之舉不以己賢事見九年音義見賢遍反請從伯游荀偃将中軍注代荀罃士匄佐之注位如故使韓起将上軍辭以趙武又使欒黶注以武位卑故不聽更命黶辭曰臣不如韓起韓起願上趙武君其聽之使趙武将上軍注武自新軍超四等代苟偃韓起佐之注位如故欒黶将下軍魏絳佐之注黶亦如故絳自新軍佐超一等代士魴新軍無帥注将佐皆遷音義将子匠反晉侯難其人使其什吏率其卒乗官屬以從於下軍禮也注得慎舉之禮音義難乃旦反或如字什音十卒子忽反乗䋲證反疏正義曰什吏謂十人長也從車曰卒在車曰乗新軍将佐皆遷晉侯選賢未得難用其人使其軍内十人之長率其歩卒車士與其新軍官屬軍尉司馬之類以從於下軍令下軍将佐兼領之得慎舉之禮也周禮夏官序云凡制軍萬有二千五百人為軍軍将皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長不言十人有長而此傳云什吏者夏官所云周禮之正法耳其量時制事未必盡然尚書牧誓有千夫長百夫長齊語管子設法五人為伍五十人為小戎二百人為卒二千人爲旅萬人為軍吳語王孫雄設法百人為行十行一旌十旌一将軍引司馬法云十人之帥執鈴百人之帥執鐸千人之帥執鼓萬人之将執大鼓三者數人置帥皆以什計之異於周禮則晉人為軍或十人置吏也晉國之民是以大和諸侯遂睦君子曰讓禮之主也范宣子讓其下皆讓欒黶為汰弗敢違也晉國以平數世賴之刑善也夫注刑法也音義汰音泰數所主反夫音扶一人刑善百姓休和可不務乎書曰一人有慶兆民賴之其寜惟永其是之謂乎注周書呂刑也一人天子也寜安也永長也義取上有好善之慶則下賴其福音義休許虯反好呼報反周之興也其詩曰儀刑文王萬邦作孚注詩大雅言文王善用法故能為萬國所信孚信也言刑善也疏正義曰此大雅文王之篇儀善也刑法也孚信也善用法者文王也言文王善用法故能為萬國所信言文王之法善也及其衰也其詩曰大夫不均我從事獨賢注詩小雅刺幽王役使不均故從事者怨恨稱已之勞以為獨賢無讓心言不讓也疏正義曰詩小雅北山之篇刺幽王役使不均平被使之人自稱已之功勞我所以特從王事者在上獨以我爲賢自云已賢是不讓也世之治也君子尚能而讓其下注能者在下位則貴尚而譲之音義治直吏反小人農力以事其上是以上下有禮而讒慝黜逺由不爭也謂之懿徳及其亂也君子稱其功以加小人注加陵也君子在位者音義慝他得反逺于萬反又如字争爭鬬之爭小人伐其技以馮君子注馮亦陵也自稱其能為伐音義技其綺反馮皮氷反是以上下無禮亂虐並生由争善也注争自善也謂之昏徳國家之敝恒必由之注傳言晉之所以興楚子疾告大夫曰不榖不徳少主社稷生十年而䘮先君未及習師保之教訓而應受多福注多福謂為君音義少詩照反䘮息浪反是以不徳而亡師于鄢注鄢在成十六年音義鄢音偃以辱社稷為大夫憂其𢎞多矣注𢎞大也若以大夫之靈獲保首領以殁於地唯是春秋窀穸之事注窀厚也穸夜也厚夜猶長夜春秋謂祭祀長夜謂葬埋音義殁音沒窀張倫反又徒門反穸音夕疏正義曰晉語云窀厚也說文云夕暮也從月半見夜字從夕知是以夕為夜也厚長意同故厚夜猶長夜也孝經云春秋祭祀以時思之故春秋謂祭祀也長夜者言夜不復明死不復生故長夜謂葬埋也以其事施於葬故今字皆從宂王意自貶祭之與葬皆不敢從先君之禮所以從先君於禰廟者注從先君代為禰廟疏正義曰祭法云諸侯立五廟曰考廟王考廟皇考廟顯考廟祖考廟此云禰廟即彼考廟也曲禮云生曰父死曰考考成也言有成徳也禰近也於諸廟父最為近也禮三年之䘮畢則以遷新主入廟是從先君代為禰廟也計昭穆之次昭次入昭廟穆次入穆廟皆代為祖廟而言代為禰廟者是從先君之近也請為靈若厲注欲受惡諡以歸先君也亂而不損曰靈戮殺不辜曰厲大夫擇焉莫對及五命乃許秋楚共王卒子嚢謀諡大夫曰君有命矣子嚢曰君命以共若之何毁之赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏而知其過可不謂共乎請諡之共大夫從之注傳言子嚢之善音義共音恭下同夏户雅反吳侵楚養由基奔命子庚以師繼之注子庚楚司馬養叔曰吳乗我喪謂我不能師也注養叔養由基也必易我而不戒注戒偹也音義易以䜴反子為三覆以待我注覆伏兵音義覆扶又反我請誘之子庚從之戰于庸浦注庸浦楚地音義浦判五反大敗吳師獲公子黨君子以吳為不弔注不用天道相弔恤詩曰不弔昊天亂靡有定注言不為昊天所恤則致罪也為明年㑹向傳音義昊胡老反疏正義曰詩小雅南山之篇冬城防書事時也注土功雖有常節通以事間為時疏正義曰荘二十九年傳例曰凡土功龍見而畢務戒事也火見而致用水昏正而栽是土功之常節也本設此節以為農事既間故得用力於土功今此冬城防經傳皆不言月當在火見致用之前當時農收差早雖天象未至而民事已間故云土功雖有常節通以事間為時言時節未是時而事以得時故言書事時也經例曰冬城防臧武仲請畢農事故傳曰書事時也此作出火見致用之前亦得兼以事時而禮之於是将早城臧武仲請俟畢農事禮也鄭良霄太宰石􅎢猶在楚注十一年楚人執之至今石􅎢言於子囊曰先王卜征五年注先征五年而卜吉凶也征謂廵守征行音義先征悉薦反守手又反注同疏正義曰先征五年而卜其吉凶也者以謂征前五年而預卜之也征訓行也先王之行謹敬之至况禮之大者大禮逺行莫過廵守故知征謂廵守征行之禮文也傳言卜征五年未知何代之禮案尚書舜時五載一廵守孔安國云堯舜同道舜攝則然堯又可知矣周官又云十有二歳王廵守殷國王制云天子五年一廵守傳云天子以海内為家時一廵省之五年者虞夏之制周則十二嵗一廵守如孔鄭之言唐虞及夏皆五年一廵守是卜征五年虞夏法也在周之世而逺陳虞夏法者盖重古而言之或周之巡守不必十二年也周十二年一廵守者嵗星天一周也虞夏五年一廵者五行􅉍主而徧也而嵗習其祥祥習則行注五年習卜皆同吉乃廵狩疏正義曰禮記云卜筮不相襲鄭𤣥云襲因也釋詁云祥善也習其祥謂去年吉今年又吉也善因則行謂五年五吉嵗嵗因襲則先王然後行廵守也傳稱卜不習吉而得五年吉者彼不習吉謂不可一時重吉此則每年一卜非相習也不習則増修徳而改卜注不習謂卜不吉音義不習則増絶句一本無増字則連下總為句疏正義曰其曰不習者是謂不習吉也脩徳改行以六年為始又得五吉乃行也今楚實不競行人何罪注不能修徳與晉競止鄭一卿以除其偪注一卿謂良霄使睦而疾楚以固於晉焉用之注位不偪則大臣睦怨疾楚則事晉固音義焉用之本或作将焉用之焉於䖍反疏正義曰貴者多則勢相偪今止鄭一卿於楚以除其國内相偪之患不偪則大臣和睦使鄭在家之人和睦而疾楚以堅事於晉焉用之何須用此良霄留之於楚使歸而廢其使注行而見執於楚鄭又遂堅事晉是鄭廢本見使之意音義其使所吏反注同怨其君以疾其大夫而相牽引也不猶愈乎楚人歸之疏正義曰往者鄭使良霄向楚其意欲使楚執良霄鄭得堅事晉國是鄭本遣良霄其意如此今若放良霄使歸於鄭則鄭不得堅事晉國是廢其本使之意蘇氏之說亦然也良霄被執久留在楚今若歸之則怨恨其君以憎疾其大夫而相牽引令鄭國大臣不和則事晉之心不固不猶少差乎方言云病差謂之愈後年注以愈為差此亦當為差也服䖍云愈猶病愈是愈為差之義也鄭𤣥論語注云愈猶勝也經十有四年春王正月季孫宿叔老㑹晉士匄齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人㑹吳于向注叔老聲伯子也魯使二卿㑹晉敬事霸國晉人自是輕魯幣而益敬其使故叔老雖介亦列於㑹也齊崔杼宋華閱衛北宫括在㑹惰慢不攝故貶稱人盖欲以督率諸侯奨成霸功也吳来在向諸侯㑹之故曰㑹吳向鄭地音義其使所吏反介音界惰徒卧反疏正義曰叔老聲伯子叔肸孫故以叔為氏也卿出聘使及盟㑹皆以大夫為介禮之常也此㑹魯使季孫宿與叔老二卿㑹晉敬事霸國故以卿為介於例唯征戰重兵詳内畧外魯師出征伐則諸将並書其聘與㑹唯書使主其介不合書也晉人自是輕魯幣而益敬其使叔老雖則為介而晉為盟主亦列之於㑹魯人以其並列於㑹故並書之也傳稱宋華閱仲江㑹伐秦向之㑹亦如之則此㑹宋亦二卿華閱猶尚被貶仲江固不在列若二卿並敬其事俱得列㑹亦當並書於䇿何則盟主列之於㑹魯史無容畧之也故傳言崔杼華閱㑹伐秦不書惰也向之㑹亦如之北宫括不書於向書於伐秦攝也是齊宋衛三國之卿於此㑹也惰慢不自整攝故貶稱人罪其身故去名氏猶序鄭卿之上從其大小舊次也在㑹惰慢未是大尤即加貶責者此是仲尼新意盖欲督率諸侯奨成晉悼霸功故也以吳来在向諸侯就向㑹之故不序吳於列而云㑹吳于向與鍾離善道同也二月乙未朔日有食之注無傳夏四月叔孫豹㑹晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人伐秦注齊宋大夫不書義與向同巳未衛侯出奔齊注諸侯之策書孫甯逐衛侯春秋以其自取奔亡之禍故諸侯失國者皆不書逐君之賊也不書名從告疏正義曰二十年甯子疾召悼子曰諸侯之策云云甯殖自為此言明知諸國策書皆云孫林父甯殖逐衛侯不言衞侯自出奔也仲尼修春秋以其自取奔亡之禍故諸侯失國者皆是被臣逐之悉非其君自出仲尼尤其不能自安皆不書逐君之賊所以責其君也北燕伯款出奔齊蔡侯朱出奔楚並書名此不書名從告也釋例曰諸侯奔亡皆迫逐而苟免非自出也傳稱孫林父甯殖出其君名在諸侯之策此以臣名赴告之文也仲尼之經更沒逐者之名主以自奔為文責其君不能自安自固所犯非徒所逐之臣也衞赴不以名而燕赴以名各隨赴而書之義在於彼不在此也杜言在彼不在此者義在自出為罪不在名與不名以其失國巳足罪賤不假復以名責故史記隨赴而書仲尼依舊為定也曲禮云諸侯失地名滅同姓名記之所言當據春秋為義滅同姓名春秋既依用之則失地書名亦是大例而杜云名與不名無義例者案經書衛侯燬滅邢傳云同姓也故名其言與記符同左氏本有此例也失地書名則傳無其事且記言失地者謂國被人奪非棄位出奔者也州公如曹紀侯太去皆是失地之君經不書名亦不發傳知失地之君不以名為貶也榖伯綏鄧侯吾離来朝公羊傳皆云何以名失地之君也則禮記之文或據公羊之義不可通於左氏故杜不為此說莒人侵我東鄙注無傳報入鄆秋楚公子貞帥師伐吳冬季孫宿㑹晉士匄宋華閱衛孫林父鄭公孫蠆莒人邾人于戚傳十四年春吳告敗于晉注前年為楚所敗㑹于向為吳謀楚故也注謀為吳伐楚音義為于偽反注為吳卒不為同范宣子數吳之不徳也以退吳人注吳伐楚喪故以為不徳數而遣之卒不為伐楚執莒公子務婁注在㑹不書非卿音義務莫侯反又音如字婁力侯反或力俱反以其通楚使也注莒貳於楚故比年伐魯音義使所吏反将執戎子駒支注駒支戎子名范宣子親數諸朝注行之所在亦設朝位曰来姜戎氏昔秦人廹逐乃祖吾離于瓜州注四嶽之後皆姓姜又别為允姓瓜州地在今燉煌音義廹音百瓜古華反燉徒門反煌音皇疏正義曰周語稱堯遭洪水使禹治之共之從孫四嶽佐之胙四嶽國命為侯伯賜姓曰姜賈逵云共共工也從孫同姓末嗣之孫四嶽官名大嶽也主四嶽之祭焉姜炎帝之姓其後變易至於四嶽帝復賜之祖姓以紹炎帝之後是四嶽為姜姓也下傳云謂我諸戎四嶽之裔胄是姜戎為四嶽之後姜姓故稱姜戎也昭九年傳云先王居檮杌于四裔故允姓之姦居于瓜州伯父恵公歸自秦而誘以来同說此事而云允姓知姜姓之後又别為允姓也其姜姓是帝堯所賜允姓不知誰賜之也周語云胙四嶽國為侯伯謂為諸侯之長下注云四嶽堯時方伯據彼文而知之乃祖吾離被苫蓋注蓋苫之别名音義被普支反苫式占反蓋户獵反爾雅曰白盖謂之苫疏正義曰釋器云白盖謂之苫孫炎曰白盖茅苫也郭璞曰白茅苫也今江東呼為盖被苫盖言無布帛可衣唯衣草也蒙荊棘言無道路可從冐榛藪也說其窮困之極耳蒙荆棘以来歸我先君注蒙冐也音義冐莫報反我先君恵公有不腆之田注腆厚也音義腆他典反與女剖分而食之注中分為剖音義女音汝下同剖普口反中丁仲反又如字今諸侯之事我寡君不如昔者蓋言語漏􅂥則職女之由注職主也音義􅂥息列反徐音以世反詰朝之事爾無與焉注詰朝明旦不使復得與㑹事音義詰起吉反朝如字注同與音預注及下同復扶又反與将執女對曰昔秦人負恃其衆貪于土地逐我諸戎恵公蠲其大徳注蠲明也疏正義曰僖二十二年傳云秦晉遷陸渾之戎于伊川則秦晉共遷之也昭九年傳云恵公歸自秦而誘以来又似晉侯獨誘之也此云秦人逐之恵公與田乃是被秦逐而自歸晉也三文不同者此戎本處瓜州明逺在秦之西北秦貪其土晉貪其人二國共誘而使遷僖傳是其實也昭傳王専責晉故指言晉耳此傳宣子施恩於戎故言被逐歸晉駒支順宣子之言故云秦貪土地逐我諸戎秦本貪其土地而遷之也謂我諸戎是四嶽之裔胄也注四嶽堯時方伯姜姓也裔逺也胄後也音義裔以制反胄直又反毋是翦棄注翦削也音義毋音無賜我南鄙之田狐狸所居豺狼所嘷我諸戎除翦其荆棘驅其狐狸豺狼以為先君不侵不叛之臣至于今不貳注不内侵亦不外叛音義狸力之反又作貍同豺仕皆反嘷户羔反昔文公與秦伐鄭秦人竊與鄭盟而舍戍焉注在僖三十年於是乎有殽之師注在僖三十三年音義殽尸交反晉禦其上戎亢其下注亢猶當也音義亢苦浪反秦師不復我諸戎實然譬如捕鹿晉人角之諸戎掎之注掎其足也音義捕音歩徐又音賦掎居綺反與晉踣之注踣僵也音義踣蒲北反又蒲豆反僵居良反疏正義曰角之謂執其角也掎之言戾其足也前覆謂之踣言與晉共倒之戎何以不免自是以来晉之百役與我諸戎相繼于時注言給晉役不曠時以從執政猶殽志也注意常如殽無中二也豈敢離逷今官之師旅無乃實有所闕以㩦諸侯而罪我諸戎我諸戎飲食衣服不與華同贄幣不通言語不逹何惡之能為不與於㑹亦無瞢焉注瞢悶也音義逷他歴反贄音至不與音預瞢莫贈反徐又武登反一音武忠反賦青蠅而退注青蠅詩小雅取其愷悌君子無信讒言音義蠅以仍反愷開在反悌徒禮反下文及注同宣子辭焉注辭謝使即事於㑹成愷悌也注成愷悌不信䜛也不書者戎為晉屬不得特逹於是子叔齊子為季武子介以㑹自是晉人輕魯幣而益敬其使注齊子叔老字也言晉敬魯使經所以並書二卿音義介音界使所吏反注同吳子諸樊既除喪注諸樊吳子乗之長子也乗卒至此春十七月既葬而除喪音義長丁丈反将立季札注札諸樊少弟音義札則八反少詩照反季札辭曰曹宣公之卒也諸侯與曹人不義曹君注曹君公子負芻也殺太子而自立事在成十三年将立子臧子臧去之遂弗為也以成曹君君子曰能守節君義嗣也注諸樊適子故曰義嗣音義適丁歴反誰敢奸君有國非吾節也札雖不才願附於子臧以無失節固立之棄其室而耕乃舍之注傳言季札之譲且明吳兄弟相傳音義奸音干傳直專反夏諸侯之大夫從晉侯伐秦以報櫟之役也注櫟役在十一年晉侯待于竟使六卿帥諸侯之師以進注言經所以不稱晉侯音義竟音境及涇不濟注諸侯之師不肯渡也涇水出安定朝那縣至京兆髙陸縣入渭音義朝如字如淳音株那乃多反叔向見叔孫穆子穆子賦匏有苦葉注詩􅆁風也義取於深則厲淺則揭言巳志在於必濟音義匏白交反揭起例反疏正義曰此詩本文云匏有苦葉濟有深渉深則厲淺則揭釋水全引下三句而釋之云揭者揭衣也以衣渉水為厲繇膝以下為揭繇膝以上為渉繇帶以上為厲李廵云濟渡也水深則厲水淺則揭衣渡也不解衣而渡水曰厲孫炎曰揭褰衣裳也以衣渉水濡禈也詩意言遇水深淺期之必渡穆子賦此詩言己志在於必濟也魯語云叔向見叔孫穆子穆子曰豹之業在匏有苦葉矣叔向退召舟虞與司馬曰夫苦匏不材於人共濟而已魯叔孫賦匏有苦葉必将渉矣彼叔向之意取匏有苦葉為義此注取深厲淺揭為義者穆子止賦此詩不言所取之意未必叔向曲得其情杜以厲揭為義切於取匏有苦業故不從國語而别為此解叔向退而具舟魯人莒人先濟鄭子蟜見衛北宫懿子曰與人而不固取惡莫甚焉若社稷何懿子說二子見諸侯之師而勸之濟濟涇而次注傳言北宫括所以書於伐秦音義說音悦秦人毒涇上流師人多死注飲毒水故鄭司馬子蟜帥鄭師以進師皆從之至于棫林注棫林秦地音義棫位逼反徐于目反一音於鞠反不獲成焉注秦不服疏正義曰此役止為報櫟之敗非欲求與秦成而云不獲成者凡興師伐國彼若服罪謝過即當相與和平故注解其意不獲成焉者止謂秦不服也服䖍云不得成戰陳之事案傳諸伐國者皆服之而已不是皆成戰陳之事此何以獨云不獲成戰也荀偃令曰雞鳴而駕塞井夷竈注示不反唯余馬首是瞻注言進退從己欒黶曰晉國之命未是有也余馬首欲東乃歸注黶惡偃自專故棄之歸音義惡烏路反下軍從之左史謂魏荘子曰不待中行伯乎注中行伯荀偃也荘子魏絳也左史晉大夫荘子曰夫子命從帥注夫子謂荀偃音義帥所類反下及注皆同欒伯吾帥也吾将從之從帥所以待夫子也注以從命為待也欒黶下軍帥荘子為佐故曰吾帥伯游曰吾令實過悔之何及多遺秦禽注軍帥不和恐多為秦所禽獲音義遺唯季反乃命大還晉人謂之遷延之役注遷延却退欒鍼曰此役也報櫟之敗也役又無功晉之恥也吾有二位於戎路注欒鍼欒黶弟也二位謂黶将下軍鍼為戎右敢不恥乎與士鞅馳秦師死焉士鞅反注鞅士匄子欒黶謂士匄曰余弟不欲徃而子召之余弟死而子来是而子殺余之弟也弗逐余亦将殺之士鞅奔秦注欒黶汰侈誣逐士鞅也而女也音義侈昌氏反本或作奓又尺氏反女音汝疏正義曰欒鍼自以家有二位恥其無功與士鞅共馳秦師非鞅召之是誣逐士鞅也於是齊崔杼宋華閱仲江㑹伐秦不書惰也注臨事惰慢不修也仲江宋公孫師之子向之㑹亦如之衛北宫括不書於向注亦惰書於伐秦攝也注能自攝整從鄭子蟜俱濟涇秦伯問於士鞅曰晉大夫其誰先亡對曰其欒氏乎秦伯曰以其汰乎對曰然欒黶汰虐已甚猶可以免其在盈乎注盈黶之子秦伯曰何故對曰武子之徳在民如周人之思召公焉愛其甘棠况其子乎注武子欒書黶之父也召公奭聴訟於甘棠之下周人思之不害其樹而作勿伐之詩在召南音義召上照反注同奭詩亦反欒黶死盈之善未能及人武子所施沒矣而黶之怨實章将於是乎在秦伯以為知言為之請於晉而復之注為傳二十一年晉滅欒氏張本音義施如字又始䜴反為之于偽反衞獻公戒孫文子甯惠子食注勑戒二子欲共宴食疏正義曰君之於臣有禮食宴食儀禮公食大夫禮者主國之君食聘賓之禮也其食已之大夫亦當放之而迎送答拜之儀有差降耳曲禮云凡進食之禮左殽右胾鄭𤣥云此大夫士與賔客燕食之禮其禮食則宜放公食大夫禮也如鄭之言大夫與客禮食尚放公食大夫禮明知國君與臣禮食亦當放之公食大夫之禮其禮甚大衛侯雖則無道不應與臣禮食而得棄之射鴻知是公自勑戒二子欲别為宴食宴食者閒宴無事召臣與之共食耳皆服而朝注服朝服待命於朝疏正義曰言服而朝明朝服也諸侯每日視朝其君與臣皆服𤣥冠緇布衣素積以為裳禮通謂此服為朝服宴食雖非大禮要是以禮見君故服朝服公食大夫之禮賔朝服則臣於君雖非禮食亦當服朝服也日旰不召注旰晏也音義旰古旦反而射鴻於囿二子從之注從公於囿音義射食亦反囿音又不釋皮冠而與之言注皮冠田獵之冠也既不釋冠又不與食疏正義曰此公射鴻於囿而冠皮冠明皮冠是田獵之冠也且虞人掌獵昭二十年傳曰皮冠以招虞人又十二年傳言雨雪楚子皮冠以出出田獵也是諸侯之禮皮冠以田獵周禮司服云凡甸冠弁服鄭𤣥云甸田獵也冠弁委貎也其服緇布衣素積以為裳是服諸侯視朝之服也彼天子之禮故以諸侯朝服而田異於此也昭十二年傳又云右尹子革夕王見之去皮冠杜云敬大臣是君敬大臣宜釋皮冠既不釋皮冠又不與食二子所以怒也二子怒孫文子如戚注戚孫文子邑孫蒯入使注孫蒯孫文子之子音義使所吏反又如字公飲之酒使大師歌巧言之卒章注巧言詩小雅其卒章曰彼何人斯居河之麋無拳無勇職為亂階戚衞河上邑公欲以喻文子居河上而為亂大師掌樂大夫音義飲於引反麋亡悲反或作湄拳音權大師辭師曹請為之注辭以為不可師曹樂人初公有嬖妾使師曹誨之琴注誨教也音義嬖必計反師曹鞭之公怒鞭師曹三百故師曹欲歌之以怒孫子以報公公使歌之遂誦之注恐孫蒯不解故音義解音蟹蒯懼告文子文子曰君忌我矣弗先必死注欲先公作亂音義欲先息薦反并帑於戚注帑子也音義并必政反帑音奴疏正義曰孫子衞朝大臣食邑於戚其子先分兩處将欲作亂慮禍及其子故令并帑處於戚而入見蘧伯玉曰君之暴虐子所知也大懼社稷之傾覆将若之何注伯玉蘧瑗音義蘧其居反覆芳服反瑗于眷反對曰君制其國臣敢奸之注奸猶犯也雖奸之庸知愈乎注言逐君更立未知當差否音義愈羊主反愈差也差初賣反遂行從近關出注懼難作欲速出竟音義難乃旦反竟音境下文皆同疏正義曰聘禮及竟謁關人鄭𤣥云古者竟上為關以譏異服識異言又周禮司關注云關界上之門也衛都不當竟中其界有逺有近欲速出竟故從近關出也公使子蟜子伯子皮與孫子盟于丘宫孫子皆殺之注三子衞羣公子疑孫子故盟之邱宫近戚地音義蟜古表反近附近之近四月已未子展奔齊注子展衞獻公弟公如鄄注鄄衞地音義鄄音絹使子行於孫子孫子又殺之注使往請和也子行羣公子公出奔齊孫氏追之敗公徒于阿澤注濟北東阿縣西南有大澤鄄人執之注公徒因敗散還故為公執之音義為于偽反下為孫氏同疏正義曰服䖍云執追公徒者公如鄄故鄄人為公執之計孫氏追公徒衆必盛鄄人為公可言與之戰耳不得言執之也且文承敗公徒下豈敗公徒之後乃執之乎下文方說二子追公豈復是鄄人執二子也故杜以為公徒因敗而散亡鄄人為公執散走者初尹公佗學射於庾公差庾公差學射於公孫丁二子追公注二子佗與差為孫氏逐公音義佗徒何反差初佳反徐初宜反公孫丁御公注為公御也子魚曰射為背師不射為戮射為禮乎注子魚庾公差禮射不求中音義射食亦反下及注除禮射一字皆同或一讀射而禮乎食夜反背音佩中丁仲反射兩軥而還注軥車軛卷者音義軥其俱反徐又古豆反軛於革反卷音權又起權反尹公佗曰子為師我則逺矣乃反之注佗不從丁學故言逺始與公差俱退悔而獨還射丁公孫丁授公轡而射之貫臂注貫佗臂音義貫古亂反一音官注同疏正義曰孟子云鄭人使子濯孺子侵衛衛使庾公之斯追之子濯孺子疾作庾公之斯至曰夫子何為不執弓曰今日我疾作不可以執弓庾公之斯曰小子學射於尹公之佗尹公之佗學射於夫子我不忍以夫子之道反害夫子雖然今日之事君事也我不敢廢抽矢叩輪去其金發乗矢而後反其姓名與此畧同行義與此正反不應一人之身有此二行孟子辨士之說或當假為之辭此傳應是實也注正義曰說文云軥車軛下曲者服䖍云車軛兩邉叉馬頸者子鮮從公注子鮮公母弟及竟公使祝宗告亡且告無罪注告宗廟定姜曰無神何告若有不可誣也注誣欺也定姜公適母音義適丁歴反有罪若何告無舍大臣而與小臣謀一罪也先君有冡卿以為師保而蔑之二罪也注謂不釋皮冠之比音義舍音捨比必二反余以巾櫛事先君而暴妾使余三罪也告亡而已無告無罪注時姜在國故不使得告無罪音義櫛側乙反疏正義曰言暴虐使余如妾公使厚成叔弔于衞曰寡君使瘠聞君不撫社稷而越在他竟注越逺也瘠厚成叔名音義厚本或作郈音同弔于衞本或作弔于衞侯侯衍字也瘠在亦反若之何不弔以同盟之故使瘠敢私於執事注執事衞諸大夫曰有君不弔注弔恤也有臣不敏注敏逹也疏正義曰不敏不逹於禮也君不赦宥臣亦不帥職増滛發􅂥其若之何衞人使大叔儀對曰注大叔儀衞大夫音義􅂥息列反大音泰羣臣不佞得罪於寡君寡君不以即刑而悼棄之以為君憂君不忘先君之好辱弔羣臣又重恤之注重恤謂愍其不逹也音義好呼報反重直用反注及下同敢拜君命之辱重拜大貺注謝重恤之賜厚孫歸復命語臧武仲曰衞君其必歸乎有大叔儀以守注守於國音義語魚據反守手又反有母弟鱄以出或撫其内或營其外能無歸乎齊人以郲寄衞侯注郲齊所滅郲國音義鱄徐布臠反又音專郲音來及其復也以郲糧歸注言其貪右宰穀從而逃歸衞人将殺之注穀衞大夫也以其從君故欲殺之音義從才用反又如字注同辭曰余不說初矣注言初從君非說之不獲已耳音義說音悦注及下同疏正義曰言余之不説於君初即然矣不得已而從之出耳非是愛君而從在道始悔而反也余狐裘而羔䄂注言一身盡善唯少有惡喻己雖從君出其罪不多音義䄂本又作褏在又反疏正義曰玉藻云君衣狐白裘錦衣以禓之又曰錦衣狐裘諸侯之服也是裘之用皮狐貴於羔也乃赦之衞人立公孫剽注剽穆公孫音義剽匹妙反一音甫遥反字林父召反孫林父甯殖相之以聽命於諸侯注聽盟㑹之命音義相息亮反衞侯在郲臧紇如齊唁衞侯與之言虐退而告其人曰衞侯其不得入矣其言糞土也亡而不變何以復國注武仲不書未為卿音義唁魚變反徐作音唁弔失國曰唁糞方問反子展子鮮聞之見臧紇與之言道注順道理臧孫説謂其人曰衞君必入夫二子者或輓之或推之欲無入得乎注為二十六年衞侯歸傳音義輓音晚推如字又他回反師歸自伐秦晉侯舍新軍禮也成國不過半天子之軍注成國大國音義舍音捨下及注同疏正義曰周禮大宗伯以九儀之命正邦國之位五命賜則七命賜國鄭𤣥云則地未成國之名王之下大夫四命出封加一等五命賜之以方百里二百里三百里之地者方四百里以上為成國如鄭之言成國者唯公與侯耳伯雖與侯同命地方三百里未得為成國也成國乃得半天子之軍未成則不得也夏官序云大國三軍次國二軍小國一軍當以公侯為大國伯為次國子男為小國也諸侯五等唯有三等之命伯之命數可以同於侯其軍則計地大小故伯國之軍不得同於侯也此據禮正法耳春秋之世鄭置六卿未必不為三軍周為六軍諸侯之大者三軍可也於是知朔生盈而死注朔知罃之長子盈朔弟也盈生而朔死音義知音智長丁丈反盈生六年而武子卒彘裘亦幼皆未可立也新軍無帥故舍之注裘士魴子也十三年荀罃士魴卒其子皆幼未任為卿故新軍無帥遂舍之音義彘直例反帥所類反注同任音壬師曠侍於晉侯注師曠晉樂大師子野晉侯曰衞人出其君不亦甚乎對曰或者其君實甚良君将賞善而刑滛養民如子蓋之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主也民之望也若困民之主匱神乏祀百姓絶望社稷無主将安用之弗去何為天生民而立之君使司牧之勿使失性有君而為之貳注貳卿佐音義出如字徐音黜仰本亦作卬音仰霆徒丁反又音挺本又作電匱其位反乏祀本或作之祀誤也去起呂反使師保之勿使過度是故天子有公諸侯有卿卿置側室注側室支子之官大夫有貳宗注貳宗宗子之副貳者士有朋友庶人工商皂隸牧圉皆有親暱以相輔佐也善則賞之注賞謂宣揚音義暱女乙反疏正義曰賞者善善之名也但上之善下則賜之以財故遂以賞為賜財之號此言天子以下皆有臣僕以輔佐其上而下之賞上不得奉以貨財唯當延其譽耳故知賞謂宣揚也過則匡之注匡正也患則救之注救其難也音義難乃旦反失則革之注革更也自王以下各有父兄子弟以補察其政注補其愆過察其得失史為書注謂大史君舉則書疏正義曰周禮有大史小史内史外史御史史官有五名知此史謂大史者以傳稱齊崔杼弑其君云大史書之知君舉則書皆大史書也瞽為詩注瞽盲者為詩以風刺音義瞽音古盲莫庚反風芳鳯反疏正義曰周禮樂官大師之屬有瞽矇之職鄭𤣥云凡樂之歌必使瞽矇為焉命其賢知者以為大師小師鄭衆云無目眹謂之瞽有目眹而無見謂之矇無目是盲者也詩者民之所作采得民詩乃使瞽人為歌以風刺非瞽人自為詩也周語云天子聽政公卿至於列士獻詩瞽陳曲韋昭云公以下至上士各獻諷諌之詩瞽陳樂曲獻之於王是言瞽為歌詩之事工誦箴諫注工樂人也誦箴諌之辭音義箴之林反疏正義曰儀禮通謂樂人為工工亦瞽也詩辭自是箴諫而箴諫之辭或有非詩者如虞箴之類其文似詩而别且諫者萬端非獨詩箴而已詩必播之於樂餘或直誦其言與歌誦小别故使工瞽異文也周語云師箴瞍賦矇誦亦是因事而異文耳大夫規誨注規正諫誨其君疏正義曰規亦諌也鄭𤣥詩箋云規者正圓之器以愚見正君曰規然則物有不圓者規之使圓行有不周者正之使備猶規正物然故云規正諫誨其君也士傳言注士卑不得徑逹聞君過失傳告大夫音義傳直專反注同庶人謗注庶人不與政聞君過則誹謗音義與音預誹如字又本或作非音亦同又甫味反疏正義曰庶人卑賤不與政教聞君過失不得諫爭得在外誹謗之謗謂言其過失使在上聞之而自改亦是諫之類也昭四年傳鄭人謗子産周語厲王虐國人謗王皆是言其實事謂之為謗但傳聞之事有實有虛或有妄謗人者今世遂以謗為誣類是俗易而意異也周語云庶人傳語是庶人亦得傳言以諫上也此有士傳言故别云庶人謗為等差耳商旅于市注旅陳也陳其貨物以示時所貴尚疏正義曰旅陳釋詁文也商旅于市謂商人見君政惡陳其不正之物以諫君也易云商旅不行旅亦是商此云陳者彼云商旅不行故以旅為商此文連于市若以旅為商直云商旅于市則文不成義故以旅為陳也劉炫云王制言廵守之事云命市納賈以觀民之所好惡志滛好辟鄭𤣥云市典市者賈謂物貴賤厚薄也質則用物貴滛則侈物貴此亦彼類彼上觀民此民觀上商陳此物自為求利非欲諫君但觀所陳則貴尚可見在上審而察之其過足以自改故亦為諫類則齊鬻踊之比是也百工獻藝注獻其技藝以喻政事音義技其綺反疏正義曰周禮考工記云審曲靣勢以飭五材以辨民器謂之百工鄭𤣥云五材各有工言百衆言之也則工是巧人能用五材金木水火土者也此百事之工各自獻其藝能以其所能譬喻政事因獻所造之器取喻以諫上即夏書所云工執藝事以諫是也故夏書曰遒人以木鐸徇于路注逸書遒人行人之官也木鐸木舌金鈴徇于路求歌謡之言音義遒在由反徐又在幽反又子由反鐸待洛反徇似俊反鈴力丁反疏正義曰此在􅏷征之篇其本文云每歳孟春遒人以木鐸徇于路官師相規工執藝事以諫其或不共邦有常刑此傳引彼畧去每歲孟春直引遒人以下乃以正月孟春結之殷勤以示歲首恒必然也孔安國云遒人宣令之官木鐸金鈴木舌所以振文教也周禮無遒人之官彼云其或不共邦有常刑是號令羣臣百工使之諫也木鐸徇路是號令之事孔言宣令之官杜必以為行人之官者以其云徇于道路故以為行人之官采訪謌謡者與孔宣令之官其事不異劉炫以為杜不見古文以遒人為宣令之官徇路求諫而規杜氏不見古文誠如劉説然杜之所解於義自通苟生異見其義非也官師相規注官師大夫自相規正疏正義曰杜意謂師為長故以官師為大夫言大夫是羣官之長大夫自相規正案孔安國云官衆衆官也更相規闕其意以師為衆杜必知官師是大夫者此云官師相規上云大夫規誨規文既同故以為大夫尚書文無所對故孔云官衆衆官也工執藝事以諫注所謂獻藝正月孟春於是乎有之諫失常也注有遒人徇路之事天之愛民甚矣豈其使一人肆於民上注肆放也以從其淫而棄天地之性必不然矣注傳善師曠能因問盡言音義從子用反本或作縱秋楚子為庸浦之役故注在前年音義為于偽反子囊師于棠以伐吳吳不出而還子囊殿注殿後軍音義殿多練反以吳為不能而弗儆吳人自臯舟之隘要而擊之注臯舟吳險阨之道音義儆音景隘於懈反要一遥反阨於革反楚人不能相救吳人敗之獲楚公子宜穀注傳言不備不可以師王使劉定公賜齊侯命注将昬於齊故也定公劉夏位賤以能而使之傳稱諡舉其終曰昔伯舅大公右我先王股肱周室師保萬民世胙大師以表東海注胙報也表顯也謂顯封東海以報大師之功音義右音又胙才故反疏正義曰師法也保安也言大公與民為法而民得以安也尚書泰誓武王數紂之罪云放黜師保孔安國云可法以安者反放退之是謂良臣為民之師保也王室之不壊繄伯舅是賴注繄發聲音義壊如字服本作懐繄烏兮反疏正義曰服䖍本壊作懐解云懐柔也繄蒙也賴恃也王室之不懐柔諸侯恃蒙齊桓之匡正也孫毓云案舊本及賈氏皆作壊杜雖不注當謂王室之不傾壊者唯伯舅大公是賴也上文不言桓公不得為賴桓公也今余命女環注環齊靈公名音義女音汝環戸闗反兹率舅氏之典纂乃祖考無忝乃舊敬之哉無廢朕命注纂繼也因昬而加褒顯傳言王室不能命有功晉侯問衞故於中行獻子注問衞逐君當討否獻子荀偃對曰不如因而定之衞有君矣注謂剽己立伐之未可以得志而勤諸侯史佚有言曰因重而撫之注重不可移就撫安之音義佚音逸仲虺有言曰亡者侮之亂者取之推亡固存國之道也注仲虺湯左相音義虺許鬼反侮亡甫反相息亮反疏正義白尚書仲虺之誥云兼弱攻昧取亂侮亡推亡固存邦乃其昌孔安國云弱則兼之闇則攻之亂則取之有亡形則侮之有亡道則推而亡之有存道則輔而固之王者如此國乃昌盛此傳取彼之意而改為之辭其言非本文也君其定衞以待時乎注待其昬亂之時乃伐之冬㑹于戚謀衞也注定立剽范宣子假羽毛於齊而弗歸齊人始貳注析羽為旌王者游車之所建齊私有之因謂之羽毛宣子聞而借觀之音義析星歴反疏正義曰周禮司常掌九旗之物名全羽為旞析羽為旌道車載旞游車載旌鄭𤣥云全羽析羽皆五采繫之於旞旌之上所謂注毛於干首也凡九旗之帛皆用絳道車象路也王以朝夕燕出入游車木路也王以田以鄙是其析羽為旌王者游車之所建也鄭𤣥唯言全羽析羽有五采耳猶不辨羽是何羽周禮有夏采之官鄭𤣥云夏采夏翟羽色禹貢徐州貢夏翟之羽有虞氏以為緌後世或無故染鳥羽象而用之謂之夏采其職云掌大喪以乗車建綏復于四郊鄭𤣥云明堂位曰有虞氏之旂夏后氏之綏則旌旗有是緌者或以旄牛尾為之綴於幢上所謂注旌於干首者釋天云注旄首曰旌李廵曰以旄牛尾著旌首者也孫炎曰析五采羽注旌上也下亦有旒縿據彼諸文言之則羽旄者有五色鳥羽又有旄牛尾也言全羽析羽者蓋有全取其翅或析取其翮故有全析二名也繫此鳥羽牛尾而於干首猶自别有絳為旒縿縣之於干今之旗韣尚然也此傳直言羽耳注不引全羽而以析羽解之者以全羽尊於析羽齊人建以赴㑹當是羽之賤者故以為析羽不然則無以知之計羽毛所用直費無多晉人自應有之而此年范宣子假羽毛於齊定四年晉人假羽旄於鄭皆假之他國者或當制作巧異故聞而借觀之楚子嚢還自伐吳卒将死遺言謂子庚必城郢注楚徙都郢未有城郭公子爕公子儀因築城為亂事未得訖子嚢欲訖而未暇故遺言見意音義見賢遍反君子謂子嚢忠君薨不忘増其名注謂前年諡君為共将死不忘衞社稷可不謂忠乎忠民之望也詩曰行歸于周萬民所望忠也注詩小雅忠信為周言徳行歸于忠信即為萬民所瞻望音義行下孟反注同疏正義曰此詩小雅都人士之篇也注云城郭之域曰都言都人之士所行要歸於忠信其餘萬民寡識者咸瞻望而法傚之經十有五年春宋公使向戌来聘二月已亥及向戌盟于劉疏正義曰荀庚孫良夫卻犫等來聘且尋盟皆直云及某盟不言地者由在國與之盟也此言盟于劉者出國與盟故書其盟地猶如晉侯與公出盟于長樗也釋例劉地闕蓋魯城外之近地也劉夏逆王后于齊注劉采地夏名也天子卿書字劉夏非卿故書名天子無外所命則成故不言逆女疏正義曰宣十年天王使王季子来聘傳稱劉康公来聘是王季子食采於劉遂為劉氏此劉夏當是康公之子即前年傳稱劉定公是也釋例曰天子公卿書爵此言天子卿書字又云劉夏非卿其實非大夫而云非卿者以名相配以劉夏非卿稱名故云天子卿書字以決之傳稱卿不行故云劉夏非卿以對之皆望經傳以為義也或以為無爵卿書字杜何意於此獨舉無爵之卿也諸侯之娶言逆女此與桓八年皆言逆王后者天子無外所命則已成后矣故不言逆女也劉炫云例云天子公卿書爵此言卿書字者以其有爵則書爵無則書字傳稱官師即此劉夏釋例以夏為士則夏此時似未有爵若夏是卿當書字傳言卿不行非禮則此禮本當使卿故以卿決之卿當書字夏非卿故書名例稱天子大夫書字但此禮不使大夫故不以大夫決之夏齊侯伐我北鄙圍成公救成至遇注無傳遇魯地書至遇公畏齊不敢至成季孫宿叔孫豹帥師城成郛注備齊故夏城非例所譏秋八月丁巳日有食之注無傳八月無丁巳丁已七月一日也日月必有誤邾人伐我南鄙冬十有一月癸亥晉侯周卒注四同盟疏正義曰周以成十八年即位其年盟于虚朾㐮三年于雞澤五年于戚九年于戲十一年于亳城北凡五同盟言四者唯數襄公盟也傳十五年春宋向戌來聘且尋盟注報二年豹之聘尋十一年亳之盟見孟獻子尤其室注尤責過也曰子有令聞而羙其室非所望也對曰我在晉吾兄為之毁之重勞且不敢間注傳言獻子友于兄且不隱其實音義間音間重直用反間間厠之間疏正義曰間非也不敢非兄是友于兄也不隱其實者謂恕情實言無所隱諱也故云不隱其實也官師從單靖公逆王后于齊卿不行非禮也注官師劉夏也天子官師非卿也劉夏獨過魯告昬故不書單靖公天子不親昬使上卿逆而公監之故曰卿不行非禮音義過古禾反監工銜反疏正義曰祭法云官師一廟鄭𤣥云官師中士下士也釋例云元士中士稱名劉夏石尚是也下士稱人公㑹王人于洮是也是天子之官師非卿故劉夏從單靖公而議卿不行也桓八年祭公来遂逆王后于紀經書祭公此云官師從單靖公唯書劉夏知劉夏獨過魯告昬靖公不至魯也祭公言來遂逆此劉夏不言來遂逆者彼祭公命魯主昬則是因來遂逆此不命魯主昬直過魯告耳故不言來遂也公羊穀梁亦皆直云過我也此公就行矣唯譏卿之不行不譏王不親逆是知於禮天子不親昬使上卿逆而公臨之故唯言卿不行非禮也釋例據此𫝊知天子當使公卿天子不親逆也楚公子午為令尹注代子囊公子罷戎為右尹蔿子馮為大司馬注子馮叔敖從子音義罷音皮又户買反蔿于委反馮皮氷反從才用反疏正義曰案世本蔿艾獵是孫叔敖之兄馮是艾獵之子則馮是叔敖兄之子也杜集解及釋例皆以蔿艾獵叔敖為一人馮是叔敖之子世本轉寫多誤杜當考得其真公子橐師為右司馬公子成為左司馬屈到為莫敖注屈到屈蕩子音義橐音託成音城屈居勿反公子追舒為箴尹注追舒莊王子子南音義箴之林反屈蕩為連尹養由基為宫廐尹以靖國人君子謂楚於是乎能官人官人國之急也能官人則民無覦心注無覬覦以求幸音義廐徐音救覦羊朱反徐音喻覬音冀疏正義曰服䖍云連尹射官言射相連屬也若是主射當使養由基為之何以使由基為宫廐尹棄能不用豈得為能官人也官名臨時所作莫敖之徒並不可解故杜皆不解之詩云嗟我懷人寘彼周行能官人也注詩周南也寘置也行列也周徧也詩人嗟嘆言我思得賢人置之徧於列位是后妃之志以官人為急音義寘之豉反下同行户郎反注及下同徧音遍下同疏正義曰周南卷耳之篇也序云后妃之志又當輔佐君子求賢審官故詩人述其意后妃嗟嘆言我思得賢人置之使徧於列位是后妃之志以官人為急故嗟嘆思之王及公侯伯子男甸采衞大夫各居其列所謂周行也注言自王以下諸侯大夫各任其職則是詩人周行之志也甸采衞五服之名天子所居千里曰圻其外曰侯服次曰甸服次曰男服次曰采服次曰衞服五百里為一服不言侯男畧舉也音義任音壬圻音祈疏正義曰后妃之志志在輔王求賢置之於公卿以下之位耳非欲更别求賢置之於王位也但公卿以下尚欲使之皆賢豈欲王之不賢乎雖不欲他賢代王而欲使王行益賢也以周訓為徧言徧在列位故自王以下及六服之内大夫以上皆言之各以賢能居其列位是詩人所謂周行者也計后妃之意亦下及士但𫝊以士卑故指言大夫耳詩注以周行謂周之列位此注云周徧者斷章為義與詩説不同也此云能官人者謂能官用賢人為公侯以下王則天之所命非人所用兼言王者王居天位修行善政則是為能官人故杜云自王以下各任其職鄭尉氏司氏之亂其餘盗在宋注亂在十年鄭人以子西伯有子產之故納賂于宋注三子之父皆為尉氏所殺故以馬四十乘注百六十匹音義乘繩證反下千乘同與師茷師慧注樂師也茷慧其名音義茷扶廢反徐音伐三月公孫黑為質焉注公孫黑子晳音義質音致晳星歴反司城子罕以堵女父尉翩司齊與之良司臣而逸之注賢而放之音義女音汝託諸季武子武子寘諸卞注子罕以司臣託季氏音義卞皮彥反鄭人醢之三人也注三人堵女父尉翩司齊疏正義曰以文承司臣之下嫌其亦醢司臣故言之三人師慧過宋朝將私焉注私小便其相曰朝也注相師者音義相息亮反注及下同慧曰無人焉相曰朝也何故無人慧曰必無人焉若猶有人豈其以千乘之相易淫樂之矇必無人焉故也注千乘相謂子産等也言不為子產殺三盗得賂而歸之是重淫樂而輕相國音義易以鼓反輕也矇音蒙為于偽反下文為之攻之同子罕聞之固請而歸之注言子罕能改過夏齊侯圍成貳於晉故也注不畏霸主故敢伐魯於是乎城成郛注郛郭也秋邾人伐我南鄙注亦貳於晉故使告于晉晉将為㑹以討邾莒注十二年十四年莒人伐魯未之討也晉侯有疾乃止冬晉悼公卒遂不克㑹注為明年㑹溴梁傳音義溴古闃反鄭公孫夏如晉奔喪子蟜送葬注夏子西也言諸侯畏晉故卿共葬音義共音恭宋人或得玉獻諸子罕子罕弗受獻玉者曰以示玉人注玉人能治玉者玉人以為寳也故敢獻之子罕曰我以不貪為寳爾以玉為寶若以與我皆喪寳也不若人有其寶疏正義曰我得不貪女得其玉是我女二人各有其寶稽首而告曰小人懷璧不可以越鄉注言必為盗所害音義喪息浪反納此以請死也注請免死子罕寘諸其里使玉人為之攻之注攻治也富而後使復其所注賣玉得富十二月鄭人奪堵狗之妻而歸諸范氏注堵狗堵女父之族狗娶於晉范氏鄭人既誅女父畏狗因范氏而作亂故奪其妻歸范氏先絶之傳言鄭之有謀音義堵音者狗本或作苟娶七住反春秋左傳注疏卷三十二春秋左氏傳注疏卷三十二考證城防林堯叟曰防臧氏邑臣浩按此近齊之防即隱九年㑹齊侯者也又一近宋隱十年伐宋取防者也近齊之防為臧氏邑後武仲自邾如防以求立後即此防也傳孟獻子書勞于廟禮也趙汸補注曰當時諸侯以善事伯主内外無虞為勞績衰世之意也書勞即書至傳凡書取言易也趙汸補注曰胡邦衡云隱四年春莒人伐杞取牟婁上言伐下言取取非易也五年冬宋人伐鄭圍長葛至六年冬取長葛取得為易乎今按根牟鄟邿皆不絶其祀故書取趙伯循云凡得國而不言滅者不絶其祀也臣照按胡銓謂書取非縁易固然苐未言何以書取不書滅也若趙伯循以不絶其祀為取則偪陽之祀未絶而書滅即在上文矣或者邑書取國書滅邿雖小國分為三不成國故亦書取耶傳晉國以平數世賴之臣召南按傳侈言譲善之效耳自偃衰推讓而霸業以興自處父改蒐而禍連數世此復有相讓之事故可稱耳不然明年伐秦即已將佐不睦遷延無功况數世賴之乎傳石􅎢言於子嚢曰先王卜征五年疏傳云天子以海内為家時一廵省之傳云傳字應作鄭盖鄭康成之注也各本俱然未敢遽改恐係古傳之文而康成引之季孫宿㑹晉士匄宋華閲衞孫林父鄭公孫蠆莒人邾人于戚林堯叟曰戚孫林父邑於是林父立公孫剽而晉㑹于戚以定之襄昭之際大夫無君之禍晉為之也悼公之徳衰矣又萬斯大學春秋隨茟曰此與㑹稷成宋亂無異不書成衞亂者孫林父在會不書亂而成亂自明也傳范宣子數吳之不徳也以退吳人趙汸曰晉人方釋楚而從事於秦勢豈能為吳謀楚其通吳以撓楚不過欲其自相攻而已宣子數吳不徳而退之盖設辭以拒其伐楚之謀耳杜氏責其伐喪或者又疑傳妄皆非也傳姜戎氏注四嶽之後皆姓姜又别為允姓臣召南按戎種不一姜戎是四嶽姜姓之裔故曰姜戎隂戎是允姓之後以其同惡故並徙之瓜州恵惠公並誘以来耳非姜戎又别為允姓也杜注似非又瓜州地在今燉煌按漢書地理志敦煌杜林以為古瓜州地生美瓜顔師古注曰即左傳所云允姓之戎居於瓜州者也其地今猶出大瓜傳於是知朔生盈而死注朔知罃之長子盈朔弟也臣召南按史記索隱引系本云莊子首生武子罃罃生荘子朔朔生悼子盈盈生文子躒躒生宣子申申生知伯瑤据此則朔為罃子盈為朔子朔早卒未及為卿于傳文為甚順但其祖首既諡荘朔又諡荘則誤耳不知杜注何以必指盈為朔弟也傳瞽為詩疏瞽陳曲臣召南按曲字今本國語作典非也以是疏瞽陳曲證之則曲字是但古人言詩歌不言曲言曲盖始於此詩譜亦作曲傳故夏書曰遒人以木鐸徇於路注遒人行人之官也臣浩按監本訛作行令之官也若杜已注作行令之官則劉炫不規其失而孔疏又不必辨矣今依疏改正臣召南按杜不見古文疑遒人徇路類於輶車之采風故注為行人之官也傳王室之不壊繄伯舅是賴疏上文不言桓公不得為賴桓公也臣召南按上既有世胙大師之文則此句正言桓公匡正之功耳疏未確春秋左氏傳注疏卷三十二考證
