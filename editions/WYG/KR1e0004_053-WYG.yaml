body:
  text: 春秋左傳注疏卷五十三起昭公二十九年盡三十二年晉杜氏注唐陸德明音義孔穎達疏經二十有九年春公至自乾侯居于鄆注以乾侯至不得見晉侯故疏注正義曰二十五年公孫于齊齊侯唁公于野井二十六年經書公至自齊公雖不至齊都旣入齊境得與齊侯相見故書公至自齊往年公如晉次于乾侯雖入晉境不得與晉侯相見故書至自乾侯以乾侯致告於廟者為不得見晉侯故齊侯使高張來唁公注唁公至晉不見受高張高偃子音義唁音彦疏注正義曰詩毛傳曰弔失國曰唁二十五年公新失國齊侯唁公可矣於此復唁公者公以齊不憂已棄而適晉望得晉人矜之晉侯不肯見公齊侯心復恨公嫌公此舉故遣唁公所以嗤笑公也故云唁公至晉不見受又似更復失國故唁之公如晉次于乾侯注復不見受往乾侯音義復扶又反夏四月庚子叔詣卒注無傳秋七月冬十月鄆潰注無傳民逃其上曰潰潰散叛公音義潰户對反疏注正義曰民逃其上曰潰文三年傳例也公自二十六年以來常居于鄆此時公旣如晉必留人守鄆鄆人潰散而叛公使公不得更來當是季氏道之使然傳二十九年春公至自乾侯處于鄆齊侯使高張來唁公稱主君注比公於大夫疏注正義曰傳稱范宣子撫荀偃云事吳敢不如事主醫和謂趙文子曰主是謂矣如此之類大夫稱主𫝊文多矣今髙張以齊侯之命稱公為主君以晉不受公故輕侮之比公於大夫也子家子曰齊卑君矣君祗辱焉注言往事齊適取辱音義祗音支公如乾侯注為齊所卑故復適晉冀見恤音義復扶又反三月己夘京師殺召伯盈尹氏固及原伯魯之子注皆子朝黨也稱伯魯子終不説學音義召上照反説音悦尹固之復也注二十八年尹固與子朝俱奔楚而道還疏注正義曰尹固復還之年傳雖不載以婦人尤之云其過三歲乎知以二十六年在道而還至此為三歲也有婦人遇之周郊尤之曰處則勸人為禍行則數日而反是夫也其過三歲乎夏五月庚寅王子趙車入于鄻以叛隂不佞敗之注趙車子朝之餘也見王殺伯盈等故叛鄻周邑音義數所主反鄻列勉反平子每歲賈馬注賈買也音義賈古買反具從者之衣屨而歸之于乾侯公執歸馬者賣之注賣其馬乃不歸馬衛侯來獻其乘馬曰啓服注啓服馬名音義乘如字疏注正義曰釋畜云馬前右足白啓郭璞曰左傳曰啓服詩曰兩服上襄鄭𤣥云兩服中央夾轅者此馬毛色名啓公用以夾轅故以啓服為名也塹而死注隋塹死也音義塹七豔反公將為之櫝注為作棺也音義將為如字一音于偽反櫝徒木反為作于偽反下同子家子曰從者病矣請以食之乃以幃裹之注禮曰敝幃不棄為埋馬也音義食音似裹古火反疏注正義曰檀弓文也禮有埋馬之法子家子請以馬肉食從者以公將為之櫝所以深抑之公感子家子之言方始依禮以帷裹之史記滑稽傳云楚莊王有所愛馬衣以文繡置之華屋之下席之以路牀㗖之以棗脯馬病肥死欲以棺椁大夫禮葬之優孟者故楚之樂人也多辯常以談笑風諫於是入門大笑王驚而問其故優孟曰馬者王之所愛也以楚國之大何求不得而以大夫禮塟之薄請以人君禮塟之王曰何如對曰臣請以雕玉為棺文梓為椁𤼵甲卒為穿壙老弱負土廟食太牢奉以萬户之邑諸侯聞之皆知大王賤人而貴馬也王曰寡人過一至於此為之奈何優孟曰請大王以六畜葬之以壠竈為椁銅歴為棺齊以薑桂薦以木蘭祭以粳稻衣以火光葬之人腸於是王乃使以馬屬大官無令天下聞之彼亦此之類也公賜公衍羔裘使獻龍輔於齊侯注龍輔玉名疏注正義曰周禮使澤國用龍節皆金也以英蕩輔之杜子春云蕩謂以函器盛此節謂鑄金為龍以玉為函輔盛龍節謂之龍輔此獻函不獻節故直云獻龍輔𤣥卿云盛龍節之玉函耳案説文云龍禱旱玉也為龍文又玉人云上公用龍今輔與龍連文故云龍輔玉名蓋用此意遂入羔裘齊侯喜與之陽榖注陽榖邑名公衍公為之生也其母偕出注出之産舍疏注正義曰内則云妻將生子及月辰居側室夫使人日再問之作而自問之妻不敢見使姆衣服而對至于子生夫復使人日再問之夫齊則不入側室之門子生男子設弧於門左女子設帨於門右三日始負子男射女否然則産舍是側室也公衍先生公為之母曰相與偕出請相與偕告注留公衍母使待已共白公三日公為生其母先以告公為為兄公私喜於陽榖而思於魯曰務人為此禍也注務人公為也始與公若謀逐季氏且後生而為兄其誣也久矣乃黜之而以公衍為大子秋龍見于絳郊注絳晉國都音義見賢遍反下見龍朝夕見皆同魏獻子問於蔡墨注蔡墨晉太史曰吾聞之蟲莫知於龍以其不生得也謂之知信乎對曰人實不知非龍實知注言龍無知乃人不知之耳音義莫知音智下謂之知實知注無知同疏正義曰人以龍不生得而謂之為知者此是人實不知非是龍實能知言龍可生得非是不生得也故説古有飬龍之事以證龍可生得也以人不知有此事故今説之古者畜龍故國有豢龍氏有御龍氏注豢御養也音義豢音患疏注正義曰服䖍曰豢養也穀食曰豢御亦養也養馬曰圉禮養犬豕曰豢知其以穀養蓋龍亦食穀也御與圉同言養龍猶養馬故稱御獻子曰是二氏者吾亦聞之而不知其故是何謂也對曰昔有飂叔安注飂古國也叔安其君名音義飂力謬反有裔子曰董父注裔逺也𤣥孫之後為裔音義裔以制反實甚好龍能求其耆欲以飲食之龍多歸之乃擾畜龍以服事帝舜帝賜之姓曰董注擾順也音義好呼報反耆時志反飲於鴆反下同食之音嗣下不能食飲食之食同擾而小反疏正義曰擾順也順龍之所欲而畜養之氏曰豢龍注豢龍官名官有世功則以官氏封諸鬷川鬷夷氏其後也注鬷水上夷皆董姓音義鬷子工反疏注正義曰鄭語云黎為高辛氏火正命之曰祝融其後八姓董姓鬷夷豢龍則夏滅之矣是也故帝舜氏世有畜龍及有夏孔甲擾于有帝注孔甲少康之後九世君也其德能順於天音義夏户雅反下皆同少詩照反下少皥同疏注正義曰帝王世紀云少康子帝杼杼子帝芬芬子帝芒芒子帝世世子帝不降不降弟帝喬喬子帝廣也至帝孔甲孔甲不降子帝賜之乘龍河漢各二注合為四音義乘繩證反河漢各二服云河漢各二乘疏注正義曰服䖍云四頭為乘四乘十六頭也傳言賜之乘龍賜之一乘之龍也卽云河漢各二是河漢共一乘也又云各有雌雄是河漢之二皆一雌一雄也故杜以為合為四各有雌雄孔甲不能食而未獲豢龍氏有陶唐氏旣衰其後有劉累注陶唐堯所治地音義治直吏反學擾龍于豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍注夏后孔甲以更豕韋之後注更代也以劉累代彭姓之豕韋累尋遷魯縣豕韋復國至商而滅累之後世復承其國為豕韋氏在襄二十四年音義更音庚注同復扶又反疏注正義曰傳言以更豕韋之後則豕韋是舊國廢其君以劉累代之鄭語云祝融之後八姓大彭豕韋為商伯矣又云彭姓彭祖豕韋則商滅之矣如彼文豕韋之國至商乃滅於夏王孔甲之時彭姓豕韋未全滅也又下云劉累懼而遷于魯縣明是累遷之後豕韋復國至商乃滅耳襄二十四年傳范宣子自言其祖在夏為御龍氏在商為豕韋氏則劉累子孫復封豕韋杜跡其事知累之後世更復其國為豕韋氏也舊無此觧杜自為證故云在襄二十四年龍一雌死濳醢以食夏后注濳藏也藏以為醢明龍不知音義醢音海知音智夏后饗之旣而使求之注求致龍也懼而遷于魯縣注不能致龍故懼遷魯縣自貶退也魯縣今魯陽也范氏其後也注晉范氏也獻子曰今何故無之對曰夫物物有其官官脩其方注方法術朝夕思之一日失職則死及之注失職有罪音義朝如字下朝夕見同失官不食注不食禄官宿其業注宿猶安也其物乃至注設水官脩則龍至若泯棄之物乃坻伏注泯滅也坻止也音義泯彌忍反坻音旨又丁禮反鬱湮不育注鬱滯也湮塞也育生也音義湮音因疏正義曰此論致龍之事物謂龍也夫物物各有其官當謂如龍之輩蓋言鳯凰麒麟白虎元龜之屬每物各有其官主掌之也其人居此官者脩其為官方術從朝至夕終日脩之若一日失其所掌之職令其官方不理則有死罪及之居官者當死矣失其官方則不得食禄得死罪是不食禄也居官者安其為官之業使職事脩理則其所掌之物乃自生至水官脩則龍至其餘亦當然也若滅棄所掌之事令職事不脩則其物乃止息而濳伏沉滯壅塞不復生育以此故不可生而得也注正義曰夜宿所以安身故云宿猶安也謂安心思其職業服䖍云宿思也今日當預思明日之事如家人宿火矣𤣥卿以服義大迂曲氓滅也坻止也釋詁文也上言官宿其業其物乃至職業不脩則物不至物雖不至尚有物在若滅棄所掌職事不理則其物止而濳伏不復生育乃令無有此物非徒不至而已鬱滯也湮塞也賈逵云然杜用之也鬱積是沈滯之意故為滯也傳謂塞井為堙井是堙為塞也言此物沉滯壅塞不復生也故有五行之官是謂五官實列受氏姓封為上公注爵上公疏正義曰列謂行列言五官皆然也人臣有大功者天子封為國君又賜之以姓諸侯以國為氏言其得封又得姓兼受之也祀為貴神社稷五祀是尊是奉注五官之君長能脩其業者死皆配食於五行之神為王者所尊奉音義長丁丈反下文同疏注正義曰五官之君長死則皆為貴神王者社稷五祀則尊奉之如祭配食於五行之神卽下重該脩熙犂是也王者祭木火土金水之神而以此人之神配之食非専祭此人也分五行以配四時故五行之神句芒祝融之徒皆以時物之狀而為之名此五者本為五行之神作名耳非與重該之徒為名也晉語云虢公夢在廟有神人靣白毛虎爪執鉞立西阿公懼而走神曰無走帝命曰使晉襲于爾門公拜稽首覺召史嚚占之對曰如君之言則蓐收也天之刑神也如彼文虢公所夢之狀必非該之貎自是金神之形耳由此言之知句芒祝融𤣥冥后土之徒皆是木火水土之神名非所配人之神名也雖本非配人之名而配者與之同食亦得取彼神名以為配者神名猶社本土神之名稷本榖神之名配者亦得稱社稷也此五行之官配食五行之神天子制禮使祀焉是為王者所尊奉也木正曰句芒注正官長也取木生句曲而有芒角也其祀重焉音義句古侯反注及下皆同重直龍反下文同疏注正義曰正訓為長故為官長木官之最長也其火金水土正亦然賈逵云總言萬物句芒非專木生如句杜誤耳木正順春萬物始生句而有芒角杜獨言木者以木為其主故經云木正且木比萬物芒角為甚故舉木而言劉炫以杜不取賈義而獨舉於木而規杜非也火正曰祝融注祝融明貎其祀犂焉音義犂力兮反疏注正義曰杜不觧祝則謂祝融二字共為明貎也賈逵云夏陽氣明朗祝甚也融明也亦以夏氣為之名耳鄭語云黎為髙辛氏火正以焞燿敦大光明四海故命之曰祝融如彼文又似由人生名者彼以其官掌夏德又稱之故以夏氣昭明命之耳金正曰蓐收注秋物摧蓐而可收也其祀該焉音義蓐音辱本又作辱摧徂回反水正曰𤣥冥注水隂而幽冥其祀脩及熙焉音義冥亡丁反土正曰后土注土為羣物主故稱后也其祀句龍焉在家則祀中霤在野則為社音義霤力救反疏注正義曰后者君也羣物皆土所載故土為羣物之主以君言之故云后土也賈逵云句芒祀於户祝融祀於竈蓐收祀於門𤣥冥祀於井后土祀於中霤今杜云在家則祀中霤是同賈説也家謂宫室之内對野為文故稱家非卿大夫之家也言在野者對家為文雖在庫門之内尚無宫室故稱野且卿大夫以下社在野田故周禮大司徒云辨其邦國都鄙之數制其畿疆而溝封之設其社稷之壝而樹之田主各以其野之所宜木遂以名其社鄭𤣥云社稷后土及田正之神田主田神后土田正之所依也詩人謂之田祖所宜木謂若松栢栗也是在野則祭為社也此野田之社民所共祭卽月令仲春之月擇元日命民社是也劉炫云天子以下俱荷地德皆當祭地但名位有髙下祭之有等級天子祭地祭大地之神也諸侯不得祭地使之祭社也家又不得祭社使祭中霤也霤亦地神所祭小故變其名賈逵以句芒祀於五云云言雖天子之祭五神亦如此耳杜以别祭五行神以五官配之非祀此五神於門户井竈中霤也門户井竈直祭門户等神不祭句芒等也唯有祭后土者亦是土神故特辯之云在家則祀中霤在野則為社言彼為中霤亦是土神但祭有大小郊特牲云社所以神地之道也地載萬物取財於地教民羙報焉家主中霤而國主社示本也是在家則祀中霤也大司徒以下同此禮也龍水物也水官棄矣故龍不生得注棄廢也疏正義曰漢氏先儒説左氏者皆以為五靈配五方龍屬木鳯屬火麟屬土白虎屬金神龜屬水其五行之次木生火火生土土生金金生水水生木王者脩其母則致其子水官脩則龍至木官脩則鳯至火官脩則麟至土官脩則白虎至金官脩則神龜至故為其説云視明禮脩而麟至思睿信立而白虎擾言從文成而神龜在沼聼聦知正而名川出龍貎共體仁則鳯凰來儀皆脩其母而致其子也觧此龍水物者言龍為東方之獸是北方水官之物也水官廢矣故龍不生得言母不脩故子不至也杜氏旣無其説未知與舊同否此下不注似與舊説異或當以為龍是水内生長故為水官之物水官廢矣故龍不生得言水官不脩故無水内之靈獸也若如此觧則上文物有其官當謂五靈之物各自有其官官能脩理各自致物龍是水内之物可令水官致龍其鳯凰麟虎之輩共在天地之間不是寢金食火木生土出未知何官致鳯何官致虎未測杜旨不可强言是用闕疑以俟來哲不然周易有之注言若不爾周易無縁有龍在乾注乾下乾上乾音義乾其連反本亦作乾之姤注巽下乾上姤乾初九變音義姤古豆反曰濳龍勿用注乾初九爻辭音義爻音交反其同人注離下乾上同人乾九二變曰見龍在田注乾九二爻辭其大有注乾下離上大有乾九五變曰飛龍在天注乾九五爻辭其夬注乾下兊上夬乾上九變音義夬古快反兊徒外反曰亢龍有悔注乾上九爻辭音義亢苦浪反其坤注坤上坤下坤乾六爻皆變音義坤本又作巛空門反曰見羣龍無首吉注乾用九爻辭坤之剝注坤下艮上剝坤上六變音義剝邦角反艮古恨反曰龍戰于野注坤上六爻辭疏正義曰傳例上下雖不用筮但指此卦某爻之義者卽以某爻之變更别為卦卽云此卦之某卦則此乾之姤宣十二年師之臨是也劉炫云杜以之為適炫謂易之爻變則成一卦遂以彼卦名爻乾之初九姤卦爻九二同人卦爻九五大有卦爻上九夬卦爻用九全變則成坤卦故謂用九為坤蔡墨此意取易文耳非揲蓍求卦安有之適之義若以之為之適則其非之適之意何以言其同人其大有此本當言初九九二但以爻變成卦卽以彼卦名爻其意不取於之適所言其同人其大有猶引詩言其二章其三章先引初九故言乾卦之姤爻初九言乾以下不復須云乾故言其同人其大有就乾卦而其之其此同人爻其此大有爻以下文勢悉皆若是也巽下乾上姤乾之初九爻變而成姤卦也其彖曰姤遇也柔遇剛也乾為天為剛巽為風為柔風行必有所遇猶女行而遇男故名此卦為姤也蔡墨此言取易有龍字而已無取於易之義理故杜注唯指其辭之所在不觧其辭之意其説易者自具於此不復煩言也離下乾上同人乾之九二爻變而成同人之卦也其象曰天與火同人天體在上火性炎上同于天也猶君設政教而臣民從之和同之義故名此卦為同人也服䖍云天在上火炎上同于天天不可同故曰同人乾下離上大有乾之九五爻變而成大有之卦也其彖曰大有柔得尊位大中而上下應之曰大有柔得尊位謂六五也五位尊而柔居之處尊以柔居中以大體無二隂以分其應上下應之無所不納大有之義故名此卦為大有乾下兊上夬乾之上九爻變而成夬卦也其彖曰夬决也剛决柔也此卦五陽而决一隂乾為天為剛為健兊為澤為柔為説以剛正决柔邪故名此卦為夬乾之六爻皆陽坤之六爻皆隂以二卦其爻旣純故别緫其用而為之辭故乾有用九坤有用六餘卦其爻不純無緫用也六爻皆變乃得緫用乾之六爻皆變則成坤卦故謂用九之辭為其坤也六爻旣變而不用卦下之辭者周易用變卦下之辭非變又無龍文史墨指説於龍故以用為語坤下艮上剝坤之上六爻變而成剝卦也其彖曰剝剝也柔變剛也剝卦五隂而一陽隂漸長而滅陽猶邪長而剝損正道故名此卦為剝也若不朝夕見誰能物之注物謂上六卦之所稱龍各不同也今説易者皆以龍喻陽氣如史墨之言則為皆是眞龍疏正義曰蔡墨言古者龍可生得人皆見之故周易之辭以龍為喻若使龍不朝夕出見誰能知其動靜而得以物名之易言濳龍飛龍及龍戰之等明是見其飛濳見其戰鬭而得以物名之是知龍可生得古人見龍形也獻子曰社稷五祀誰氏之五官也注問五官之長皆是誰對曰少皥氏有四叔注少皥金天氏音義皥户老反疏正義曰少皥氏有四叔四叔是少皥之子孫非一時也未知於少皥逺近也四叔出於少皥耳其使重為句芒非少皥使之世族譜云少皥氏其官以鳥為名然則此五官皆在高陽之世也楚語云少皥氏之衰也九黎亂德民神雜糅不可方物顓頊受之乃命南正重司天以屬神命火正黎司地以屬民是則重黎居官在高陽之世也又鄭語云黎為髙辛氏火正命之曰祝融則黎為祝融又在髙辛氏之世案世本及楚世家云高陽生稱稱生卷章卷章生黎如彼文黎是顓頊之曾孫也楚語云少皥之衰顓頊受之卽命重黎似是卽位之初不應卽得命曾孫為火正也少皥世代不知長短顓頊初已命黎至高辛又加命不應一人之身緜歴兩代事旣久逺書復散亡如此參差難可考校世家云共工作亂帝嚳使黎誅之而不盡帝誅黎而以其弟呉回為黎復居火正為祝融卽如此言黎或是國名官號不是人之名字顓頊命黎髙辛命黎未必共是一人傳言世不失職二者或是父子或是祖孫其事不可知也由此言之少皥四叔未必不有在髙辛世者也此五祀者居官有功以功見祀不是一時之人脩熙相代為水正卽非一時也且傳言世不失職便是積世能官其功益大非是暫時有功遂得萬世承祀明是歴選上代取其中最有功者使之配食亦不知初以此人配食何代聖王為之葢在高辛唐虞之世耳曰重曰該曰脩曰熙實能金木及水注能治其官音義重直龍反該古咳反使重為句芒注木正該為蓐收注金正脩及熙為𤣥冥注二子相代為水正世不失職遂濟窮桑此其三祀也注窮桑少皥之號也四子能治其官使不失職濟成少皥之功死皆為民所祀窮桑地在魯北疏注正義曰窮桑少皥之號帝王世紀亦然賈逵云處窮桑以登為帝故天下號之曰窮桑帝賈以濟為度也言四叔子孫世不失職遂渡少皥之世杜以少皥之世以烏名官不得有木正火正故以濟為成四子能治其官使不失職濟成少皥之功言少皥有王功子孫能成之故死皆為民所祀也少皥居窮桑定四年傳稱封伯禽於少皥之墟故云窮桑地在魯北土地名窮桑言在魯北相傳云耳顓頊氏有子曰犂為祝融注犂為火正音義顓音專頊許玉反共工氏有子曰句龍為后土注共工在太皥後神農前以水名官其子句龍能平水土故死而見祀音義共音恭疏注正義曰十七年傳郯子言前世名官從下而上先言炎帝以火名次言共工以水名次言太皥以龍名是共工在太皥後神農前以水名官者也祭法曰共工氏之霸九州也其子曰后土能平九州故祀以為社能平九州是能平水土也言共工有子謂後世子耳亦不知句龍之為后土在於何代少皥氏旣以鳥名官此當在顓頊以來耳此其二祀也后土為社注方答社稷故明言為社疏注正義曰獻子問社稷五祀旣答五祀當更答社稷但句龍旣為后土又亦配社蔡墨旣答五祀方答社稷故明言后土為社也稷田正也注掌播殖也疏正義曰月令云孟春行冬令則首種不入鄭𤣥云首種謂稷也周語云宣王不籍千畝虢文公諫曰民之大事在農是故稷為大官然則百穀稷為其長遂以稷名為農官之長正長也稷是田官之長有烈山氏之子曰柱為稷注烈山氏神農世諸侯音義烈如字禮記作厲山疏正義曰魯語及祭法皆云烈山氏之有天下也其子能殖百穀故祀以為稷言有天下則是天子矣杜注不得為諸侯也賈逵鄭𤣥皆云烈山炎帝之號杜言神農世諸侯者案帝王世紀神農本起烈山然則初封烈山為諸侯後為天子猶帝堯初為唐侯然也若然烈山卽神農而云神農世為諸侯者案世紀神農為若緫有八世至榆罔而滅亦稱神農氏是緫號神農也故烈山氏得於神農之世為諸侯後為農神也劉炫以為烈山氏卽神農非諸侯而規杜非也此及魯語皆云其子曰柱祭法曰農者劉炫云蓋柱人名其官曰農猶呼周棄為稷自夏以上祀之注祀柱音義上緫掌反周棄亦為稷自商以來祀之注棄周之始祖能播百榖湯旣勝夏廢柱而以棄代之傳言蔡墨之博物疏注正義曰棄為周之始祖能播殖百穀經傳備有其事以其後世有天下號國曰周故以周冠棄棄時未稱周也書序云湯旣勝夏欲遷其社不可作夏社孔安國云湯承堯舜禪代之後順天應人逆取順守而有慙德故革命創制改正易服變置社稷而後世無及句龍者故不可而止是言成湯變置社稷之由也湯於帝世年代猶近功之多少傳習可知故得量其優劣改易祀典意欲遷杜而無及句龍棄功乃過於柱廢柱以棄為稷也其五祀之神重犂之輩若更有賢能亦應遷徙但其功莫之能先帝王不敢改易故得永流萬代常在祀典良由後世之臣弱後王之意謙故也冬晉趙鞅荀寅帥師城汝濵注趙鞅趙武孫也荀寅中行荀呉之子汝濵晉所取陸渾地音義濵音賔行户郎反遂賦晉國一鼓鐵以鑄刑鼎注令晉國各出功力共鼔石為鐵計令一鼓而足因軍役而為之故言遂音義鑄之樹反令力呈反疏注正義曰服䖍云鼓量名也曲禮曰獻米者操量鼓取晉國一鼔鐵以鑄之但禮之將命置重而執輕鼓可操之以將命卽豆區之類非大器也唯用一鼓則不足以成鼎家賦一鼔而鐵又太多且金鐵之物當稱之以權衡數之以鈞石寕用量米之器量之哉故杜以為賦晉國者令民各出功力均賦取其功也冶石為鐵用橐扇火動橐謂之鼓今時俗語猶然令衆人鼔石為鐵計令一鼓使足故云賦晉國一鼓鐵也遂者因上生下之辭因城汝濵遂鑄刑鼎故言遂也著范宣子所為刑書焉疏正義曰范宣子制作刑書施於晉國自使朝廷承用未嘗宣示下民今荀寅謂此等宣子之書可以長為國法故鑄鼎而銘之以示百姓猶如鄭鑄刑鼎仲尼譏之其意亦與叔向譏子産同仲尼曰晉其亡乎失其度矣夫晉國將守唐叔之所受法度以經緯其民卿大夫以序守之注序位次也民是以能尊其貴貴是以能守其業貴賤不愆所謂度也疏正義曰守其舊法民不豫知臨時制宜輕重難測民是以能尊其貴畏其威刑也官有正法民常畏威貴是以能守其業保禄位也貴者執其權柄賤者畏其威嚴貴賤尊卑不愆此乃所謂度也言所謂法度正如此是也文公是以作執秩之官為被廬之法注僖二十七年文公蒐被廬脩唐叔之法音義被皮義反廬力居反蒐本又作搜所求反以為盟主今棄是度也而為刑鼎民在鼎矣何以尊貴注棄禮徴書故不尊貴貴何業之守注民不奉上則上失業貴賤無序何以為國疏正義曰今棄是貴賤常度而為刑書之鼎民知罪之輕重在於鼎矣貴者斷獄不敢加增犯罪者取驗於書更復何以尊貴威權在鼎民不忌上貴復何業之守貴之所以為貴只為權勢在焉勢不足畏故業無可守貴無可守則賤不畏威貴賤旣無次序何以得成為國且夫宣子之刑夷之蒐也晉國之亂制也注范宣子所用刑乃夷蒐之法也夷蒐在文六年一蒐而三易中軍帥賈季箕鄭之徒遂作亂故曰亂制音義帥所類反疏注正義曰於時晉侯將以士穀梁益耳將中軍先克曰狐趙之勳不可廢也以狐射姑將中軍趙盾佐之陽處父改蒐于董更以趙盾將中軍狐射姑佐之是一蒐而三易中軍帥三易者士穀梁益耳將中軍是易代前人是一易也狐射姑將中軍是二易也又趙盾將中軍是三易也致使賈季箕鄭之徒怨恨而作亂其事文公傳具矣因此蒐而有此亂故曰晉國之亂制若之何以為法蔡史墨曰范氏中行氏其亡乎注蔡史墨卽蔡墨中行寅為下卿而干上令擅作刑器以為國法是法姦也又加范氏焉易之亡也注范宣子刑書中旣廢矣今復興之是成其咎音義擅市戰反復抉又反咎其久反疏正義曰宣子刑書久已廢矣今復變易興之以成其滅亡也劉炫云范氏取蒐之法以為國制雖則為非書已廢矣縱應有禍亡釁已歇今荀寅更述其事又加增范氏之惡焉范氏已欲免禍今復改易之而使亡其及趙氏趙孟與焉然不得已若德可以免注鑄刑鼎本非趙鞅意不得已而從之若能脩德可以免禍為定十三年荀寅士吉射入朝歌以叛音義與音預朝如字經三十年春王正月公在乾侯注釋不朝正于廟夏六月庚辰晉侯去疾卒注未同盟而赴以名音義去起呂反秋八月葬晉頃公注三月而葬速音義頃音傾疏正義曰諡法慈仁和民曰頃冬十有二月吳滅徐徐子章羽奔楚注徐子稱名以名告也傳三十年春王正月公在乾侯不先書鄆與乾侯非公且徵過也注徵明也二十七年二十八年公在鄆二十九年公在乾侯而經不釋朝正之禮者所以非責公之妄且明過謬猶可掩故不顯書其所在使若在國然自是鄆人潰叛齊晉卑公子家忠謀終不能用内外棄之非復過誤所當掩塞故每歲書公所在音義徵直升反或本作懲誤復扶又反疏正義曰經書公在乾侯者季氏以此告廟釋公不得朝正故國史書之于策也釋例曰昭公之孫每正月必書者以孫告廟也公二十五年始出居鄆及乾侯累歲居外而仲尼不書于經故傳曰不先書鄆與乾侯非公且徵過也旣以非責公之妄且明過謬之可掩故不顯書其在外使若在國然也自三十年至於終没則皆顯書其所在之地傳皆隨年而互言其事明罪之在公非復過謬也三代封建自上及下降殺以兩君不亢高臣不極卑彊弱相參衆力相須賢愚相厠故雖有昏亂之君亦有忠賢之輔我周東遷晉鄭是依無知之亂實獲小白驪姬之妖重耳以興天下雖瓦觧而不土崩海内雖鼎沸而不盆溢天生季氏以貳魯侯季氏未有篡奪之惡公雖失志亦無抽筯倒懸之急聼用𨽻豎僥倖之私旣不能强又不能弱所以身死於外見貶於春秋也是言罪在公書公在之意也杜言見貶於春秋者公當在國治民毎歲書公在外是其貶責公也劉炫云序云諸言不書皆仲尼新意然則前三年魯史皆書公在仲尼去之仲尼所以不於此先書公在鄆與乾侯者所以非公之妄妄伐季氏且明過謬猶可掩此年書者自是鄆人潰叛云云此年云非公且徵過三十一年云言不能外内三十二年云言不能外内又不能用其人毎歲𤼵傳言公之罪也注不先書鄆與乾侯一事之中有兩種之意一者非責公之妄一者明公過謬猶可掩也非責公之妄者以君舉必書公在乾侯與鄆臣子當委曲詳録今輕略不記似若不足可録然所以非責公之妄也明公過謬猶可掩者被臣所逐出居於外若顯然書之則恥惡尤甚故隱而不書猶若在國欲明公過謬之失尚可容掩也此以徵為明明公過可掩也襄二十八年傳云王人來告䘮問崩日以甲寅告故書之以徴過徵亦為明明告喪者之過也彼言徵審也審其事知無他故以明其過失也服䖍云非公且徴過昭公無道久在外季氏非公不肯釋言公在某地春秋之義亦以不書徵季氏之過此年書者公不得入晉外内有困辱季氏閔而釋之所謂事君如在國案明年傳云言不能外内又明年傳云言不能外内又不能用其人皆是傳説經意非責昭公不是季氏非公也卽如服言往前季氏非公不肯釋公所在此年以後方始閔而釋之所謂事君如在國則往年未釋之時不如在國矣二十七年扈之㑹范獻子何以已言季氏事君如在國也季氏奪公鄆邑與公交戰行貨齊晉使不納公禱于煬宫求君不入及其死也猶欲絶其兆域加之惡諡閔公之事復安在乎夏六月晉頃公卒秋八月葬鄭游吉弔且送葬魏獻子使士景伯詰之曰悼公之喪子西弔子蟜送葬注在襄十五年音義詰起吉反蟜居表反今吾子無貳何故注弔喪共使音義使所吏反對曰諸侯所以歸晉君禮也禮也者小事大大字小之謂事大在共其時命注隨時共所求音義共音恭注及下同字小在恤其所無以敝邑居大國之間共其職貢與其備御不虞之患豈忘共命注言不敢忘共命以所備御者多不及辦之音義御魚吕反注同辦皮莧反先王之制諸侯之喪士弔大夫送葬唯嘉好聘享三軍之事於是乎使卿晉之喪事敝邑之間先君有所助執紼矣注紼輓索也禮送葬必執紼音義好呼報反間音閑下同紼音弗輓本又作晚音晚索悉各反疏注正義曰紼禮或作綍禮記緇衣云王言如絲其出如綸王言如綸其出如綍綍是大繩也周禮天子葬用六綍喪大記君葬用四綍大夫葬用二綍紼為葬之所用是輓索也案禮雜記諸侯執綍五百人大夫三百人鄭𤣥云天子蓋干人也天子諸侯之喪殯於西序而屬綍焉備火灾而輓之也王制云喪三年不祭唯祭天地社稷為越綍而行事謂喪在殯踰紼而行祭也周禮大司徒云大喪帥六郷之衆庻屬其六引又遂人云大喪帥六遂之役屬六綍鄭𤣥喪大記注云在棺曰綍行道曰引至壙將窆又曰綍是綍引一物從所在而異名耳禮送喪必執紼曲禮文也鄭𤣥云葬喪之大事紼引車索也鄭之先君親送晉侯葬者傳無其文游吉今言之蓋亦嘗有矣若其不間雖士大夫有所不獲數矣注不得如先王禮數大國之惠亦慶其加注慶善也謂善其君自行而不討其乏明底其情注底致也音義底音旨取備而已以為禮也疏正義曰善其有加不討其之明知鄭國致其情實取充備而已靈王之喪注在襄二十九年我先君簡公在楚我先大夫印段實往敝邑之少卿也注少年少也音義印一刃反少詩照反注同疏正義曰由簡公在楚上卿守國故少卿行耳鄭𤣥以為簡公若在君當自行其言非傳旨也王吏不討恤所無也今大夫曰女盍從舊注盍何不也音義女音汝盍胡臘反下同舊有豐有省不知所從從其豐則寡君幼弱是以不共從其省則吉在此矣唯大夫圖之晉人不能詰注傳言大叔之敏音義省所景反下同吳子使徐人執掩餘使鍾吾人執燭庸注二十七年奔故二公子奔楚楚子大封而定其徙注大封與土田定其所徙之居使監馬尹大心逆吳公子使居養注二子奔楚楚使逆之於竟也養卽所封之邑音義監古銜反竟音境莠尹然左司馬沈尹戌城之注城養音義莠音誘取於城父與胡田以與之注胡田故胡子之地將以害吳也子西諫曰吳光新得國而親其民視民如子辛苦同之將用之也若好吳邊疆使柔服焉猶懼其至注柔服謂不與吳搆怨音義若好呼報反吳一本作吾疆居良反吾又彊其讎以重怒之無乃不可乎注讎謂二公子音義重直用反吳周之胄裔也而棄在海濵不與姬通今而始大比于諸華光又甚文將自同於先王注先王謂大王王季亦自西戎始比諸華音義胄直又反大王音泰不知天將以為虐乎使翦喪吳國而封大異姓乎其抑亦將卒以祚吳乎其終不遠矣注言其事行可知不久音義喪息浪反祚字故反我盍姑億吾鬼神注億安也音義億於力反而寧吾族姓以待其歸注善惡之歸將焉用自播揚焉注播揚猶勞動也音義焉於䖍反播彼我反又波賀反注同王弗聽吳子怒冬十二月吳子執鍾吾子遂伐徐防山以水之注防壅山水以灌徐音義壅於勇反灌古亂反己卯滅徐徐子章禹斷其髪注斷髪自刑示懼音義斷丁管反注同攜其夫人以逆吳子吳子唁而送之使其邇臣從之遂奔楚注邇近也楚沈尹戌帥師救徐弗及遂城夷使徐子處之注夷城父也吳子問於伍員曰初而言伐楚注在二十年音義員音云余知其可也而恐其使余往也又惡人之有余之功也今余將自有之矣伐楚何如對曰楚執政衆而乖莫適任患若為三師以肄焉注肄猶勞也音義惡烏路反適丁歴反任音壬肄本又作肆以制反下同一師至彼必皆出彼出則歸彼歸則出楚必道敝注罷敝於道音義罷音皮下文同亟肄以罷之注亟數也音義亟欺冀反數所角反多方以誤之旣罷而後以三軍繼之必大克之闔廬從之楚於是乎始病注為定四年吳入楚傳經三十有一年春王正月公在乾侯季孫意如㑹晉荀躒于適歴注適歴晉地音義躒力狄反適丁歴反夏四月丁巳薛伯榖卒注襄二十五年盟重丘音義重直龍反疏注正義曰傳言同盟故書此榖與魯必嘗同盟矣薛於重丘以前雖數與魯盟薛伯入春秋以來卒葬不見經傳未知此穀以何年卽位故舉去今近者言之晉侯使荀躒唁公于乾侯注將使意如迎公故荀躒來唁秋葬薛獻公注無傳冬黑肱以濫來奔注黑肱邾大夫濫東海昌慮縣不書邾史闕文音義濫力甘反或力蹔反慮音閭又如字疏注正義曰公羊穀梁亦以濫為邾邑而傳觧其無邾之意言邾人以濫封此黑肱使為别國故不繋於邾以非天子所封故無子男爵號其言不可通於左氏左氏無傳明是闕文二傳見其文闕而妄為説耳十有二月辛亥朔日有食之傳三十一年春王正月公在乾侯言不能外内也注公内不容於臣子外不容於齊晉所以久在乾侯晉侯將以師納公范獻子曰若召季孫而不來則信不臣矣然後伐之若何晉人召季孫獻子使私焉曰子必來我受其無咎注言我為子受無咎之任音義咎其九反下注放此為于偽反疏正義曰言我為子受其重任其使子必無咎受其貨故保任之季孫意如㑹晉荀躒于適歴荀躒曰寡君使躒謂吾子何故出君有君不事周有常刑子其圖之季孫練冠麻衣跣行注示憂慼音義出如字又勑律反跣素典反疏正義曰練冠蓋如喪服斬衰旣練之後布冠也麻衣當是布深衣也問喪云親始死徒跣跣行不屨以其不得事君示已憂戚之深也伏而對曰事君臣之所不得也敢逃刑命注言願事君君不肯還不敢辟罪君若以臣為有罪請囚于費以待君之察也亦唯君若以先臣之故不絶季氏而賜之死注雖賜以死不絶其後音義費音秘疏正義曰此季孫探言罪已之意不絶季氏之祀或更立其子弟直賜其身死而已服䖍云言賜不使死是為以死賜之若賜死卽是不殺下句何須更言弗殺弗亡若弗殺弗亡君之惠也死且不朽若得從君而歸則固臣之願也敢有異心注君皆謂魯侯也蓋季孫探言罪已輕重以答荀躒音義探他南反夏四月季孫從知伯如乾侯注知伯荀躒音義知音智子家子曰君與之歸一慙之不忍而終身慙乎公曰諾衆曰在一言矣君必逐之注言晉旣憂君君一言使晉晉必逐之荀躒以晉侯之命唁公且曰寡君使躒以君命討於意如意如不敢逃死君其入也公曰君惠顧先君之好施及亡人將使歸糞除宗祧以事君則不能見夫人已所能見夫人者有如河注夫人謂季孫也言若見季孫已當受禍明如河以自誓音義好呼報反施以豉反祧他彫反夫音扶下及注同荀躒掩耳而走注怪公所言示不忍聽曰寡君其罪之恐敢與知魯國之難注言恐獲不納君之罪今納而不入何敢復知耶音義與音預難乃旦反復扶又反臣請復於寡君退而謂季孫君怒未怠子姑歸祭注歸攝君事子家子曰君以一乘入于魯師季孫必與君歸公欲從之衆從者脅公不得歸注傳言君弱不得復自在音義乘繩證反衆從才用反薛伯榖卒同盟故書注謂書名也入春秋來薛始書名故𤼵傳經在荀躒唁公上傳在下者欲魯事相次秋吳人侵楚伐夷侵潛六注皆楚邑楚沈尹戌帥師救濳吳師還楚師遷濳於南岡而還吳師圍弦左司馬戌右司馬稽帥師救弦及豫章注左司馬沈尹戌音義稽音啓又古兮反吳師還始用子胥之謀也注謀在前年冬邾黑肱以濫來奔賤而書名重地故也注黑肱非命卿故曰賤君子曰名之不可不愼也如是注是黑肱也夫有所有名而不如其已注有所謂有地也言雖有名不如無名已止也以地叛雖賤必書地以名其人終為不義弗可滅已是故君子動則思禮行則思義不為利回注回正心也音義不為于偽反下不為同不為義疚注疚病也見義則為之音義疚久又反或求名而不得或欲蓋而名章懲不義也齊豹為衛司宼守嗣大夫注守先人嗣言其尊音義懲直升反下同作而不義其書為盗注求名而不得也二十年豹殺衛侯兄欲求不畏疆禦之名邾庻其注在襄二十二年莒牟夷注在五年邾黑肱以土地出求食而已不求其名賤而必書注春秋叛者多唯取三人來適魯者三人皆小國大夫故曰賤此二物者所以懲肆而去貪也注物事也肆放也齊豹書盗懲肆也三叛人名去貪也音義去起呂反若艱難其身注身為艱難以險危大人注大人在位者而有名章徹注謂得勇名攻難之士將奔走之注攻猶作也奔走猶赴趣也音義難乃旦反若竊邑叛君以徼大利而無名注謂不書其人名音義徼古堯反貪冒之民將寘力焉注盡力為之不顧於見書音義冒亡北反又亡報反寘之䜴反是以春秋書齊豹曰盗三叛人名以懲不義數惡無禮其善志也注無禮惡逆皆數而不忘記事之善者也音義數所主反注同故曰春秋之稱微而顯注文微而義著音義稱尺證反婉而辨注辭婉而㫖别音義婉於阮反别彼列反疏正義曰此婉而辨則與微而顯其意一也故杜云辭婉而㫖别辭婉則文微也㫖别則義顯也上句微而顯者據文雖微隱而義理顯著下句婉而辨者辭雖婉順相似而㫖意有殊故重起其文也此與成十四年婉而成章其事異也彼謂諱君惡與此不同也上之人能使昭明注上之人謂在位者在位者能行其法非賤人所能善人勸焉淫人懼焉是以君子貴之十二月辛亥朔日有食之是夜也趙簡子夢童子臝而轉以歌注轉婉轉也音義臝本又作祼力果反旦占諸史墨曰吾夢如是今而日食何也注簡子夢適與日食㑹謂咎在已故問之對曰六年及此月也吳其入郢乎終亦弗克注史墨知夢非日食之應故釋日食之咎而不釋其夢音義郢以井反又羊政反應應對之應入郢必以庚辰注庚日有變日在辰尾故曰以庚辰定四年十一月庚辰呉入郢疏注正義曰於天文房心尾為大辰尾是辰後之星也日在辰尾自謂在辰星庚辰入郢乃謂日是辰日二辰不同而以日在辰尾配庚為庚辰者二辰實雖不同而同名曰辰以其名同故取以為占此則史墨能知非是人情所測定四年十一月庚辰吳入郢是其言之驗也此十二月日食彼十一月入郢則是未復其月而云及此月者長厯定四年閏十月庚辰吳入郢是十一月二十九日杜云昭二十一年傳曰六年十二月庚辰吳入郢今十一月者并閏數也然則彼是新閏之後且十一月二十九日又其月垂盡故得為及此月也日月在辰尾注辰尾龍尾也周十二月今之十月日月合朔於辰尾而食疏注正義曰東方七宿角亢氐房心尾箕共為蒼龍之體南首北尾角卽龍角尾卽龍尾釋天云大辰房心尾也是房心與尾共為大辰故言辰星龍尾也周十二月今之十月月令孟冬之月日在尾是此時日月合朔於辰尾而日食也庚午之日日始有謫火勝金故弗克注謫變氣也庚午十月十九日去辛亥朔四十一日雖食在辛亥更以始變為占也午南方楚之位也午火庚金也日以庚午有變故災在楚楚之仇敵唯吳故知入郢必吳火勝金者金為火妃食在辛亥亥水也水數六故六年也音義謫直苹反疏注正義曰昏義云陽事不得適見於天日為之食謫譴責也人有咎責氣見於天故謫為變氣也長厯此年十月壬子朔故庚午是十月十九日也從庚午下去十二月辛亥朔為四十一日雖食在辛亥之日而更以庚午為占舎近而取逺自是史墨所見其意不可知也午為南方之辰楚是南方之固故午為楚之位也午是南方之辰火也庚是西方之日金也日以庚午有變午在南方必南方之國當其咎故災在楚楚之仇敵唯有吳耳故知入郢必是吳也其日庚午庚金午火五行相尅火勝金金以畏火之故金為火妃夫妻相得而彊是楚彊盛之兆雖被吳入必不亡國故知吳入郢終亦弗克言其不能滅楚也食在辛亥之日亥在北方水位也北方水數六故曰六年吳入郢也經三十有二年春王正月公在乾侯取闞注無傳公别居乾侯遣人誘闞而取之不用師徒音義闞口暫反疏正義曰公羊傳曰闞者何邾婁之邑也案傳定元年將葬昭公季孫使役如闞公氏將溝焉則闞是魯公葬地非是邾邑公羊不可通於左氏也土地名東平須昌縣東南有闞城是也賈逵云昭公得闞季氏奪之不因師徒謂此取闞為季氏取於公也案檢經傳公自出奔以來唯齊侯取鄆以居公耳未有公取闞之處安得取於公也且若是季氏奪公無由得告廟書經故杜以為公取之也四年傳例曰凡克邑不用師徒曰取知公遣人誘而取之不用師徒也夏吳伐越秋七月冬仲孫何忌會晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人把人小邾人城成周注世叔申世叔儀孫也國參子産之子不書盟時公在外未及告公公已薨音義參七南反疏注正義曰傳稱晉魏舒合諸侯之大夫于狄泉尋盟令城成周則此時為盟矣而不書盟者賈逵云魯有昭公難故㑹而不盟案傳文無魯人辭盟之事其城成周又魯人共城之矣何以言㑹而不盟也若以難辭當辭不㑹身旣在㑹何敢辭豈以昭公在外而欲背盟乎故杜以為不書盟者時公在外未及告公而公已薨旣不得告公故不書於經也案傳尋盟令城成周則盟在城前猶得書城而盟不書者晉合諸侯大夫本以城事召之孟懿子將從晉命卽以告公雖㑹還乃書而已告公訖故得書之其尋盟之事晉不預令諸侯大夫旣集晉始𤼵意尋盟之事未嘗告公故行還不得書也此云城成周者實未城也晉人始計功庸賦丈數以令諸侯耳明年傳稱正月庚寅裁三旬而畢是明年始城也此未城而已書城知本以城事召集因集而書城耳十有二月己未公薨于乾侯注十五日疏注正義曰傳言十一月令城成周雖無某日明年乃始城之當在月之將末杜顯言此十五日者言盟去公薨日近以明未及告意也傳三十二年春王正月公在乾侯言不能外内又不能用其人也注其人謂子家羈也言公不能用其人故於今猶在乾侯夏吳伐越始用師於越也注自此之前雖疆事小爭未嘗用大兵音義疆居良反爭爭鬬之爭史墨曰不及四十年越其有吳乎注存亡之數不過三紀歲星三周三十六歲故曰不及四十年哀二十二年越滅吳至此三十八歲越得歲而吳伐之必受其凶注此年歲在星紀星紀吳越之分也歲星所在其國有福呉先用兵故反受其殃音義分扶問反殃於良反疏注正義曰十一年傳稱萇𢎞對景王云歲在豕韋言十一年歲星在豕韋也又曰歲在大梁蔡復楚凶謂十三年歲星在大梁也十三年距此十九年耳歲星歲行一次十二年而行天一周則二十五年復在大梁從彼而歴數之則此年始至析木之津而此年數在星紀者歲行一次舉大數耳其實一歲之行有餘一次故劉歆三統之術以為歲星一百四十四年行天一百四十五次計一千七百二十八年為歲星歲數言數滿此年剩得行天一周三統之歴以庚戌為上元從上元至襄二十八年積十四萬二千六百八十六歲置此歲數以歲星歲數一千七百二十八除之得積終八十二去之歲餘九百九十以一百四十五乘歲餘得十四萬三千五百五十以一百四十四除之得九百九十六為積次不盡一百二十六為次餘從襄二十八年至昭十五年合有一十八年歲星年行一次年有一餘以次加次得一千一十四以餘加餘得一百四十四餘數滿法又成一次以從積次得一千一十五也以十二去之餘餘次一百四十四周七个一百四十四年還得剩行天一周也餘七命起星紀算外得鶉火是昭十五年歲星在鶉火也計十三年在大梁十五年當在鶉首而在鶉火者由其餘分數滿剩得一次猶如閏餘滿而成月也以十五年歲在鶉火歷而數之則二十七年復在鶉火故此年在星紀也於十二次分野星紀是吳越之分也歲星是天之貴神所在之次其國有福今越得歲星故呉伐之則凶也呉越同分而云越福呉凶者以呉先用兵故反受其殃賈逵云然杜從之也鄭𤣥云天文分野斗主吳牽牛主越此是歲星在牽牛故吳伐之凶案史傳所云呉越同分不言於次之内更優分星姜氏任氏共守𤣥枵復以何星主齊何星主薛也且據三統之術星紀之初斗十二度至於牽牛初度乃為牛耳十五年餘分始滿則此年之初歲星初入此次伐越在夏未得已至牽牛鄭之此説為妄之甚也秋八月王使富辛與石張如晉請城成周注子朝之亂其餘黨多在王城敬王畏之徙都成周成周狹小故請城之音義狹音洽天子曰天降禍于周俾我兄弟竝有亂心以為伯父憂注俾使也兄弟謂子朝也伯父謂晉侯音義俾本又作卑同必爾反注同我一二親昵甥舅不皇啓處於今十年注謂二十三年二師圍郊至于今音義昵女乙反勤戍五年注謂二十八年晉籍秦致諸侯之戍至于今疏注正義曰案二十七年十二月晉籍秦致諸侯之戍于周而此杜云二十八年者以十二月垂盡去在十二月至周則在二十八年故云五年也余一人無日忘之注念諸侯勞閔閔焉如農夫之望歲懼以待時注閔閔憂貌王憂亂常閔閔冀望安定如農夫之憂飢冀望來歲之將熟伯父若肆大惠復二文之業弛周室之憂注肆展放也二文謂文侯仇文公重耳弛猶觧也音義弛式氏反注同重直龍反徼文武之福以固盟主宣昭令名則余一人有大願矣昔成王合諸侯城成周以為東都崇文德焉注作成周遷殷民以為京師之東都所以崇文王之德音義徼古堯反下同疏注正義曰杜知作成周為崇文王之德者以上傳云徼文武之福卽云成王合諸侯城成周以崇文德故以為崇文王之徳劉炫以為崇文王之教而規杜非也今我欲徼福假靈于成王脩成周之城俾戍人無勤諸侯用寧蝥賊遠屏晉之力也注蝥賊喻災害音義蝥亡侯反疏注正義曰蝥賊食苗之蟲釋蟲云食根蝥食節賊故以蝥賊喻災害也其委諸伯父使伯父實重圖之俾我一人無徵怨于百姓注徵召也音義徵張升反而伯父有榮施先王庸之注庸功也先王之靈以為大功音義施式䜴反范獻子謂魏獻子曰與其戍周不如城之天子實云注云欲罷戍而城雖有後事晉勿與知可也從王命以紓諸侯晉國無憂是之不務而又焉從事魏獻子曰善使伯音對注伯音韓不信音義勿與音預紓音舒焉於䖍反曰天子有命敢不奉承以奔告於諸侯遲速衰序注衰差也序次也音義衰初危反注同於是焉在注在周所命冬十一月晉魏舒韓不信如京師合諸侯之大夫于狄泉尋盟且令城成周注尋平丘盟魏子南靣注居君位衛彪傒曰魏子必有大咎干位以令大事非其任也注彪傒衛大夫音義彪彼蚪反傒音兮咎其久反詩曰敬天之怒不敢戲豫敬天之渝不敢馳驅注詩大雅戒王者言當敬畏天之譴怒不可遊戲逸豫馳驅自恣渝變也音義渝羊朱反譴棄戰反疏注正義曰此詩大雅板之篇刺厲王之詩也詩注以天謂厲王此據上天斷章取意况敢干位以作大事乎己丑士彌牟營成周計丈數注計所當城之丈數也疏注正義曰謂周廻逺近之丈數也知者下别云揣髙卑度厚薄故也揣高卑注度高曰揣音義揣丁果反又初委反度待洛反下文及注同度厚薄仭溝洫注度深曰仞音義仞本又作刃而愼反洫况域反物土方議遠邇注物相也相取土之方靣遠近之宜音義相息亮反下同量事期注知事幾時畢音義幾居豈反下皆同計徒庸注知用幾人功慮財用注知費幾財用音義費芳貴反書餱糧注知用幾糧食音義餱音侯本亦作糇糧音良以令役於諸侯屬役賦丈注付所當城尺丈音義屬之欲反疏正義曰屬役謂屬聚下役也賦文謂課付尺丈上旣號令下役之事以告諸侯令諸國國各出若干之役築若干之丈故云屬役賦文書以授帥也書以授帥注帥諸侯之大夫音義帥所頪反注同而效諸劉子注效致也音義效戸孝反韓簡子臨之以為成命注臨履其事以命諸侯經所以不書魏舒十二月公疾徧賜大夫注從公者音義徧音遍從才用反下同大夫不受賜子家子䨇琥注琥玉器音義琥音虎疏注正義曰周禮大宗伯云以玉作六器以禮天地四方白琥禮西方鄭𤣥云虎猛象秋嚴禮經及記言琥多矣都不説其狀蓋刻玉為虎形也一環一璧輕服注細好之服疏正義曰釋器云肉倍好謂之璧肉好若一謂之環李廵曰肉倍好璧邉肉大其孔小也肉好若一其孔及邊肉大小適等曰環也受之大夫皆受其賜己未公薨子家子反賜於府人曰吾不敢逆君命也大夫皆反其賜書曰公薨于乾侯言失其所也注不薨路寢為失所趙簡子問於史墨曰季氏出其君而民服焉諸侯與之君死於外而莫之或罪也對曰物生有兩有三有五有陪貳故天有三辰注謂有三音義陪蒲回反地有五行注謂有五體有左右注謂有兩各有妃耦注謂陪貳音義妃音配王有公諸侯有卿皆有貳也天生季氏以貳魯侯為日久矣民之服焉不亦宜乎魯君世從其失季氏世脩其勤民忘君矣雖死於外其誰矜之社稷無常奉注奉之無常人言唯德也音義從子用反本亦作縱君臣無常位自古以然注史墨跡古今以實言故詩曰高岸為谷深谷為陵注詩小雅言高下有變易疏正義曰詩小雅十月之交大夫刺幽王也三后之姓於今為庶主所知也注三后虞夏商疏注正義曰從周而上故數此三代三代子孫自有為國君者言其賤者為庶人也在易卦雷乘乾曰大壯注乾下震上大壯震在乾上故曰雷乘乾疏正義曰乾為天為剛震為雷為動天以剛而動動則為雷壯之大者故曰大壯天之道也注乾為天子震為諸侯而在上君臣易位猶臣大强壯若天上有雷疏注正義曰説卦乾為天為君君之極尊者是天子也震為長子其卦云震驚百里聲達百里之内而有震矅之威是諸侯而在天子之上象如君臣易位是天之道也昔成季友桓之季也文姜之愛子也始震而卜卜人謁之曰生有嘉聞注嘉名聞於世音義始震如字一音身聞音問疏正義曰震動也懷妊始動知有震娠而卽卜也其名曰友為公室輔及生如卜人之言有文在其手曰友遂以名之旣而有大功於魯注立僖公音義名之音武政反受費以為上卿至於文子武子注文子行父武子宿音義費音秘世増其業不廢舊績魯文公薨而東門遂殺適立庶魯君於是乎失國注失國權音義適丁歴反政在季氏於此君也四公矣民不知君何以得國是以為君愼器與名不可以假人注器車服名爵號疏正義曰器謂車服也名謂爵號也借人名器則君失位矣故不可以假人也言魯君失民是借季氏以權柄故令昭公至此出外因以戒人君使懲創也春秋左傳注疏卷五十三春秋左氏傳注疏卷五十三考證傳及有夏孔甲擾于有帝疏杼子帝芬芬子帝芒芒子帝世世子帝不降不降弟帝喬喬子帝廣也臣召南按此疏据帝王世紀也若夏本紀少康子帝宁卽世紀之帝杼杼子槐不作帝芬芒子帝泄不作帝世不降弟帝扄不作帝喬扄子帝廑不作帝廣卽金履祥前編亦依史記也傳帝賜之乗龍河漢各二注合為四臣召南按夏本紀言天降龍二有雌雄當是用此傳而忘其為各二耳傳以更豕韋之後臣召南按夏本紀作受豕韋之後集解引賈逵曰劉累之後至商不絶以代豕韋之後祝融之後封于豕韋殷武丁滅之傳周易有之疏九二同人卦爻九五大有卦爻監本脫二卦字以上文乾之初九姤卦爻下文上九夬卦爻例之則此二句應有卦字今添傳若不朝夕見誰能物之臣照按左氏之為傳信以傳信疑以傳疑皆以紀事左氏不着一語也如此傳豢龍語極荒唐葢太史墨離夏孔甲千年得諸傳聞而不知惟不能生得之謂龍惟不能生得故易于乾取象于龍乃述所聞于魏獻子左氏記之謂當時賢士大夫而其言龎猶如此耳傳世不失職遂濟窮桑疏杜以少皥之世以鳥名官不得有木正火正臣召南按如杜說則木正等官皆在顓頊之世與郯子所言顓頊以下命以民事者合傳有烈山氏之子曰柱為稷疏後為農神也監本訛作為神農也今改正又疏蓋柱人名人監本訛作地今改正春王正月公在乾侯臣召南按此聖人特筆注但作釋不朝正于廟非也劉敞曰以存公也公居于鄆有魯也在乾侯無魯也公雖無魯魯不可無公也傳非公且徴過也臣召南按左氏不知君臣大義宜為公羊家所排夫昭公無道失國何待經書所在而後見乎不言經嚴名義以警亂臣但言非公徴過謬矣杜注孔疏抑又甚焉趙汸補注曰鄆在境内故以書至書居為義乾侯晉地故書所在見公出在外也季孫意如㑹晉荀躒于適歴陸淳曰季孫逐君之臣也晉不罪之而反為㑹晉侯之為盟主可知矣荀躒之為人臣可知矣王應麟曰列國大夫之無君晉為之也㑹于戚而不討孫林父㑹于夷儀而不討崔杼㑹于適歴而不討意如君臣之義不明而大夫簒奪之禍晉自及矣晉侯使荀躒唁公于乾侯陸淳曰乾侯晉地故不言來唁黑肱以濫來奔注不書邾史闕文臣浩按公羊榖梁解不言邾之意不如杜注直截傳入郢必以庚辰注庚午有變日在辰尾臣召南按監本作庚辰有變誤也杜言史墨所以能知入郢必是庚辰日者以今年日變始于庚午則後之入郢必以庚日干也今年日變在辰尾則後之入郢必以辰日支也傳越得歲而吳伐之疏斗十二度至于牽牛初度乃為牛耳監夲訛作乃為申耳今改正傳昔成王合諸侯城成周以為東都崇文徳焉注所以崇文王之徳臣召南按東都之作專為朝㑹則崇文徳乃對武功言不必曰崇文王之徳也傳天生季氏以貳魯侯王應麟困學紀聞曰簡子在晉猶季氏在魯也史墨之對何其悖哉張睢陽責令狐潮曰未識人倫焉知天道臣照按左氏記史墨之對猶後代列史記亂臣之言耳而後世必欲以此等為左氏罪傳是以為君慎器與名不可以假人趙汸補注曰史墨對趙簡子與襄十四年師曠對晉侯皆釋君助臣阿附强家所謂社稷無常奉君臣無常位乃黨逆附簒之辭不可為訓臣照按史墨對趙簡子言簡子臣也則為黨逆附簒師曠對晉侯言則為納忠陳善之語趙氏混而一之失其㫖矣春秋左氏傳注疏卷五十三考證
