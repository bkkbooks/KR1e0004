body:
  text: 春秋左傳注疏卷五十八起哀公六年盡十一年晉杜氏注唐陸德明音義孔穎達疏經六年春城邾瑕注無傳備晉也任城亢父縣北有邾婁城音義瑕音遐任音壬亢苦浪反又音剛父音甫晉趙鞅帥師伐鮮虞吳伐陳夏齊國夏及高張來奔注二子阿君廢長立少旣受命又不能全書名罪之也音義長丁丈反少詩照反叔還㑹吳于柤注無傳音義柤莊加反秋七月庚寅楚子軫卒注未同盟而赴以名音義軫之忍反史記作珍齊陽生入于齊注為陳乞所逆故書入疏注正義曰成十八年傳例曰凡去國國逆而立之曰入此為陳乞私逆旣入而立之故依例書入也齊陳乞弑其君荼注弑荼者朱毛與陽生也而書陳乞所以明乞立陽生而荼見弑則禍由乞始也楚比刼立陳乞流涕子家憚老皆疑於免罪故春秋明而書之以為弑主音義弑荼音試下皆同疏注正義曰實非陳乞弑荼而書乞弑其君者以荼死由乞故書乞弑也此與楚公子比鄭公子歸生俱非弑君之首春秋顯而書之以為弑君之主所以惡此三人釋例曰諸懷賊亂以為心者固不容於誅也若鄭之歸生齊之陳乞楚公子比雖本無其心春秋之義亦同大罪是以君子愼所以立也是說罪之之意冬仲孫何忌帥師伐邾注無傳宋向巢帥師伐曹注無傳傳六年春晉伐鮮虞治范氏之亂也注四年鮮虞納荀寅于柏人吳伐陳復脩舊怨也注元年未得志故也音義復扶又反楚子曰吾先君與陳有盟不可以不救乃救陳師于城父注陳盟在昭十三年音義父音甫疏注正義曰昭十三年無楚與陳盟之事於時楚旣滅蔡使棄疾為蔡公子干子晳之入也傳稱朝吳奉蔡公召二子而盟于鄧依陳蔡人以國是與陳人盟更許復其國其年平王卽位更封陳是與盟也齊陳乞僞事高國者注高張國夏受命立荼陳乞欲害之故先僞事焉每朝必驂乘焉所從必言諸大夫注言其罪過音義乘繩證反曰彼皆􅅯蹇將棄子之命注偃蹇驕敖音義􅅯約免反蹇紀晚反敖五報反皆曰高國得君注得君寵也必偪我盍去諸固將謀子子早圖之圖之莫如盡滅之需事之下也注需疑也音義偪音逼盍戸臘反去起呂反下同需音須一音懦懦弱持疑也疏正義曰需是懦弱之意懦弱持疑不能决斷是為事之下者勸其决斷而盡殺之及朝則曰彼虎狼也見我在子之側殺我無日矣請就之位注欲與諸大夫謀高國故求就之又謂諸大夫曰二子者禍矣恃得君而欲謀二三子曰國之多難貴寵之由盡去之而後君定旣成謀矣盍及其未作也先諸作而後悔亦無及也大夫從之夏六月戊辰陳乞鮑牧注牧鮑圉孫音義難乃旦反鮑牧州牧之牧及諸大夫以甲入于公宮昭子聞之與惠子乘如公戰于莊敗注高國敗也莊六軌之道音義乘繩證反國人追之國夏奔莒遂及高張晏圉弦施來奔注晏圉嬰之子圉施不書非卿音義圉魚呂反秋七月楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死注前已敗於柏人今若退還亦是敗疏注正義曰劉炫言卜不吉謂戰當敗再敗當謂今伐更敗也杜言退還亦是敗非也以規杜氏今知劉非者杜言退還亦是敗者以傳卜退不吉是不得好退是雖欲退還亦必敗也故云退還亦是敗但文不委悉劉以為退還謂是好退而還以規杜非也棄盟逃讎亦不如死死一也其死讎乎命公子申為王不可則命公子結亦不可則命公子啓注申子西結子期啓子閭皆昭王兄五辭而後許將戰王有疾庚寅昭王攻大冥卒于城父注大冥陳地吳師所在音義辭本又作辤說文云辭不受也受辛宜辭也辝籕文冥亡丁反子閭退曰君王舍其子而讓羣臣敢忘君乎從君之命順也注從命許立音義舍音捨立君之子亦順也二順不可失也與子西子期謀潛師閉塗逆越女之子章立之而後還注潛師密發也閉塗不通外使也越女昭王妾章惠王是歲也有雲如衆赤鳥夾日以飛三日楚子使問諸周大史音義夾古洽反大音泰下同疏正義曰服䖍云諸侯皆有大史主周所賜典籍故曰周大史一曰是時往問周大史杜以問周大史於文自明故不煩辭周大史曰其當王身乎注日為人君妖氣守之故以為當王身雲在楚上唯楚見之故禍不及他國若禜之可移於令尹司馬注禜禳祭音義禜音詠禳如羊反王曰除腹心之疾而寘諸股肱何益不穀不有大過天其夭諸有罪受罰又焉移之遂弗禜音義寘之豉反夭於表反焉於䖍反疏正義曰言已若無大罪天其妄夭之乎必是身有大罪天乃下罰有罪受罰又焉移之初昭王有疾卜曰河為崇王弗祭大夫請祭諸郊王曰三代命祀祭不越望注諸侯望祀竟内山川星辰音義祟息遂反竟音境江漢睢漳楚之望也注四水在楚界音義睢七餘反漳音章疏注正義曰土地名江經南郡江夏弋陽安豐漢經襄陽至江夏安陸縣入江睢經襄陽至南郡枝江縣入江漳經襄陽至南郡當陽縣入江是四水皆在楚界也禍福之至不是過也不穀雖不徳河非所獲罪也遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉夏書曰惟彼陶唐帥彼天常注逸書言堯循天之常道音義楚昭王知大道矣本或作天道非夏戸雅反下注同此語在尚書五子之歌書無帥彼天常一句下亦微異有此冀方今失其行亂其紀綱乃滅而亡注滅亡謂夏桀也唐虞及夏同都冀州不易地而亡由於不知大道故音義行如字又下孟反尚書作厥道乃滅而亡尚書作乃底滅亡疏正義曰此夏書五子之歌第三章也彼云惟彼陶唐有此冀方今失厥道亂其紀綱乃底滅亡此多帥彼天常一句又字小異者文經篆隷師讀不同故兩存之賈服孫杜皆不見古文以為逸書解為夏桀之時唯王肅云太康時也案王肅注尚書其言多是孔傳疑肅見古文匿之而不言也堯治平陽舜治蒲坂禹治安邑三都相去各二百餘里俱在冀州統天下四方故云有此冀方也又曰允出兹在兹由已率常可矣注又逸書言信出已則福亦在已八月齊邴意兹來奔注高國黨陳僖子使召公子陽生注召在七月今在八月下記事之次疏注正義曰經書陽生入齊文在七月之下知其召在七月也今傳在八月下者欲令下接十月立之是記事之次也邴意兹來奔者自以高國之黨八月來奔耳僖子使召陽生自以七月之時别使人召之非遣意兹召也賈逵以傳文相連謂遣意來召又怪其日月錯誤云其說未聞杜以此故為注云高國黨以隔之陽生駕而見南郭且于注且于齊公子鉏在魯南郭音義且子餘反曰嘗獻馬于季孫不入於上乘故又獻此請與子乘之注畏在家人聞其言故欲二人共載以試馬為辭音義上乘繩證反出萊門而告之故注魯郭門也闞止知之先待諸外注闞止陽生家臣子我也待外欲俱去音義闞苦暫反公子曰事未可知反與壬也處注壬陽生子簡公音義壬而林反戒之遂行注戒使無洩言音義洩息列反逮夜至於齊國人知之注故以昏至不欲令人知也國人知而不言言陳氏得衆音義令力呈反下同僖子使子士之母養之注隱於僖子家内子士母僖子妾與饋者皆入注陳僖子又令陽生隨饋食之人入處公宫音義饋其位反冬十月丁卯立之將盟注盟諸大夫鮑子醉而往其臣差車鮑㸃曰注㸃鮑牧臣也差車主車之官音義差所宜反點之廉反又如字此誰之命也陳子曰受命于鮑子遂誣鮑子曰子之命也注見其醉故誣之鮑子曰女忘君之為孺子牛而折其齒乎而背之也注孺子荼也景公嘗銜繩為牛使荼牽之荼頓地故折其齒音義女音汝折之舌反又市列反注同背音佩後年皆同悼公稽首曰注悼公陽生吾子奉義而行者也若我可不必亡一大夫注言已可為君必不怨鮑子若我不可不必亡一公子注公子自謂也恐鮑子殺已故要之音義要一遙反義則進否則退敢不唯子是從廢興無以亂則所願也鮑子曰誰非君之子乃受盟注言陽生亦君之子固可立使胡姬以安孺子如賴注胡姬景公妾也賴齊邑安號也去鬻姒注荼之母音義去起呂反殺王甲拘江說囚王豹于句竇之丘注三子景公嬖臣荼之黨也音義拘音俱說音悅句音鉤竇音豆公使朱毛告於陳子曰注朱毛齊大夫微子則不及此然君異於器不可以二器二不匱君二多難敢布諸大夫僖子不對而泣曰君舉不信羣臣乎注舉皆也音義匱其位反難乃旦反以齊國之困困又有憂注内有饑荒之困又有兵革之憂少君不可以訪是以求長君庶亦能容羣臣乎不然夫孺子何罪毛復命公悔之注悔失言音義少詩照反長丁丈反夫音扶孺或作􅐐同毛曰君大訪於陳子而圖其小可也注大謂國政小謂殺荼使毛遷孺子於駘不至殺諸野幕之下葬諸殳冒淳注恐駘人不從故毛駐於野張帳而殺之駘齊邑殳冒淳地名實以冬殺經書秋者史書秋記始事遂連其死通以冬告鲁音義駘他才反又徒來反幕音莫殳音殊冒亡報反淳音純駐中住反疏注正義曰傳言十月立陽生陽生旣立之後方遣朱毛殺荼則荼死在冬經書為秋殺者記陽生初事入齊之始遂連荼死二事通以冬始來告言陽生秋入荼以秋死故竝書於秋也經七年春宋皇瑗帥師侵鄭音義瑗于眷反晉魏曼多帥師侵衞夏公會吳于鄫注鄫今琅琊鄫縣音義鄫本又作繒才稜反秋公伐邾八月己酉入邾以邾子益來注他國言歸於魯言來外内之辭宋人圍曹冬鄭駟𢎞帥師救曹傳七年春宋師侵鄭鄭叛晉故也注定八年鄭始叛晉師侵衛衛不服也注五年晉伐衞至今未服夏公㑹吳于鄫注吳欲霸中國吳來徵百牢子服景伯對曰先王未之有也吳人曰宋百牢我注是時吳過宋得百牢音義牢力刀反過古禾反魯不可以後宋且魯牢晉大夫過十注晉大夫范鞅也在昭二十一年音義後如字又戸豆反吳王百牢不亦可乎疏正義曰王制云君十卿祿魯牢晉大夫過十故吳王自謂合得百牢景伯曰晉范鞅貪而棄禮以大國懼敝邑故敝邑十一牢之君若以禮命於諸侯則有數矣注有常數疏注正義曰周禮大行人云上公九牢侯伯七牢子男五牢是常數也若亦棄禮則有淫者矣注淫過也周之王也制禮上物不過十二注上物天子之牢音義上如字一音時掌反注同疏注正義曰周禮掌客云王合諸侯而饗禮則具十有二牢鄭𤣥云饗諸侯而用王禮之數者以公侯伯子男盡在是兼饗之莫適用也以莫適用故用王禮是天子之禮十二牢也郊特牲云天子適諸侯諸侯膳用犢諸侯適天子天子賜之禮大牢貴誠之義也如彼記文諸侯共天子之膳唯一犢耳而得有十二牢者若是天子大禮必以十二為數其餘共王之膳食自用犢為食耳非謂獻大禮者唯一犢也以為天之大數也注天有十二次故制禮象之今棄周禮而曰必百牢亦唯執事吳人弗聽景伯曰吳將亡矣棄天而背本注違周為背本疏正義曰棄十二之數為棄天違周禮是背本不與必棄疾於我注放棄凶疾來伐擊我乃與之太宰嚭召季康子注嚭吳大夫康子使子貢辭太宰嚭曰國君道長注蓋言君長大於道路音義長丁丈反注及下注同而大夫不出門此何禮也對曰豈以為禮畏大國也注畏大國不敢虛國盡行大國不以禮命於諸侯苟不以禮豈可量也寡君既共命焉其老豈敢棄其國大伯端委以治周禮仲雍嗣之斷髪文身臝以為飾豈禮也哉有由然也注大伯周大王之長子仲雍大伯弟也大伯仲雍讓其弟季歴俱適荆蠻遂有民衆大伯卒無子仲雍嗣立不能行禮致化故效吳俗言其權時制宜以辟災害非以為禮也端委禮衣也音義共音恭大伯音泰注同斷丁管反臝本又作倮力果反效戸孝反疏注正義曰吳世家云大伯及仲雍皆周大王之子而王季歴之兄也季歴賢而有聖子昌大王欲立季歴以及昌於是大伯仲雍二人乃奔荆蠻文身斷髪示不可用大伯之奔荆蠻自號句吳荆蠻義之從而歸之千餘家立為吳大伯大伯卒無子弟仲雍立是說大伯仲雍適吳之由也魯人不堪吳責故舉吳之上祖以訐之二人同時適吳而大伯端委仲雍斷髪者大伯初往未為彼君故服其本服自治周禮及仲雍民歸稍多既為彼君宜從彼俗曲禮云君子行禮不求變俗仲雍為彼人主不能行周人之禮致中國之化故文身斷髪放效吳俗言其權時制宜以辟災害非以為禮也漢書地理志云越人文身斷髪以辟蛟龍之害應劭曰常在水中故斷其髪文其身以象龍子故不見傷害杜言辟害辟此蛟龍之害大伯之時未有周禮言治周禮者謂治其本國岐周之禮非周公所制禮也臝以為飾者臝其身體以文身為飾也端委禮衣者王肅云委貌之冠𤣥端之衣也此傳言大伯端委仲雍斷髪史記云二人皆文身斷髪然則文身斷髪自辟害耳史記以為示不可用二人亡去逺適荆蠻則周人不知其處何以須示不可用也皆馬遷謬耳反自鄫以吳為無能為也注棄禮知其不能霸也季康子欲伐邾乃饗大夫以謀之子服景伯曰小所以事大信也大所以保小仁也背大國不信注大國吳也伐小國不仁民保於城城保於德失二德者危將焉保注二德信與仁也音義焉於䖍反孟孫曰二三子以為何如注怪諸大夫不言故指問之惡賢而逆之注孟孫賢景伯欲使大夫不逆其言惡猶安也音義惡音烏注同對曰禹合諸侯於塗山執玉帛者萬國注諸大夫對也諸侯執玉附庸執帛塗山在壽春東北疏注正義曰周禮大宗伯云以玉作五瑞以等邦國公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧是諸侯執玉也典命云諸侯之適子未誓於天子以皮帛繼子男是世子執帛也知附庸執帛者以世子既繼子男附庸君亦繼子男公之孤四命以皮帛視小國之君附庸無爵雖不得同於子男其位不卑於世子與公之孤也諸侯世子各稱朝附庸君亦稱朝是與世子相似故知執帛也且附庸是國此言執玉帛者萬國國而執帛唯附庸耳知附庸執帛也案尚書有三帛公之孤諸侯世子附庸君此唯言附庸者以傳云禹合諸侯又云執玉皆據君身言之故不數世子及孤也下云萬國故唯據附庸言之王制云不能五十里者不合於天子附於諸侯曰附庸鄭𤣥云不合謂不朝㑹也小城曰附庸附庸者以國事附於大國未能以其名通也如彼云附庸不得朝㑹而禹㑹萬國有附庸者附庸不得特達天子耳禹㑹諸侯諸國盡至附庸從其所附之國共見天子故有執帛者言萬國者舉盈數耳鄭𤣥注尚書以為數正滿萬國案益稷州十有二師鄭以為每一師領百國州十有二師則每州千二百國畿外八州總九千六百國其餘四百國在畿内州得有千二百國者以唐虞土方萬里九州之内地方七千里七七四十九為方千里者四十九其一為畿内餘四十八八州分之州各有千里之方六以千里之方二為方百里之國二百又以千里之方二為七十里之國四百又以千里之方二為五十里之國八百總為一千四百國去其方五十里之國二百是州别千二百國也鄭𤣥云畿内四百國者皆謂五十里國也杜云諸侯執玉附庸執帛是與鄭異也尚書傳云百里之方三為國七有竒以百里之方一為百里之國一又以百里之方一為七十里之國二有竒知者但方百里者為方十里者百若方七十里之國唯有七七四十九是為七十里之國二仍有十里之方二在又以百里之方一為五十里之國四是百里之方三為國七有竒則千里之方三為國七百有竒有百里之方二在今其存者無數十焉唯大不字小小不事大也注言諸侯相伐古來以然音義數所主反知必危何故不言注知伐邾必危自當言今不言者不危故也大夫以答孟孫所怪且阿附季孫魯德如邾而以衆加之可乎注孟孫忿答大夫今鲁德無以勝邾但欲恃衆可乎言不可疏注正義曰傳於異人之言更應加曰今無曰者作傳略之論語之文此類多矣雖魯上無曰要言與大夫對反不得為大夫之辭故以為孟孫忿答大夫也服䖍以上二句亦為孟孫之言謂諸大夫誠知伐邾必危何故不早言也杜以上屬為便唯以此句為孟孫言耳不樂而出注季孟意異佞直不同故罷饗音義樂音岳一音洛秋伐邾及范門注邾郭門也猶聞鐘聲注邾不禦寇音義禦魚呂反大夫諫不聽茅成子請告於吳注成子邾大夫茅夷鴻不許曰魯擊柝聞於邾注言以近音義柝音託以兩木相擊以行夜也字又作􅈀同聞音問又如字疏正義曰易繫辭云重門繫柝以待暴客鄭𤣥云手持兩木以相敵是為擊柝守備警戒也吳二千里不三月不至何及於我且國内豈不足注言足以拒魯成子以茅叛注高平西南有茅鄉亭師遂入邾處其公宫衆師晝掠注虜掠取財物也音義晝音中救反掠音亮邾衆保于繹注繹邾山也在鄒縣北音義繹音亦鄒側留反師宵掠以邾子益來注益邾隱公也晝夜掠傳言康子無法獻于亳社注以其亡國與殷同囚諸負瑕負瑕故有繹注負瑕魯邑高平南平陽縣西北有瑕丘城前者魯得邾之繹民使在負瑕故使相就以辱之邾茅夷鴻以束帛乘韋自請救於吳注無君命故言自音義乘繩證反及下注同曰魯弱晉而逺吳馮恃其衆注馮依音義馮皮氷反注同而背君之盟辟君之執事注辟陋音義辟匹亦反注同以陵我小國邾非敢自愛也懼君威之不立君威之不立小國之憂也若夏盟於鄫衍注鄫衍即鄫也鄫盟不書吳行夷禮禮儀不典非所以結信義故不録秋而背之成求而不違注言魯成其所求無違逆也四方諸侯其何以事君且魯賦八百乘君之貳也注貳敵也魯以八百乘之賦貢於吳言其國大邾賦六百乘君之私也注為私屬以私奉貳唯君圖之吳子從之注為明年吳伐我傳宋人圍曹鄭桓子思曰宋人有曹鄭之患也不可以不救注桓諡冬鄭師救曹侵宋初曹人或夢衆君子立于社宮注社宮社也疏正義曰曹人夢見多人不識姓名故唯云衆君子也服䖍云衆君子諸國君妄耳而謀亡曹曹叔振鐸請待公孫彊許之注振鐸曹始祖音義鐸待洛反注同彊其良反旦而求之曹無之戒其子曰我死爾聞公孫彊為政必去之及曹伯陽即位好田弋曹鄙人公孫彊好弋獲白鴈獻之且言田弋之說說之因訪政事大說之有寵使為司城以聽政夢者之子乃行彊言霸說於曹伯曹伯從之乃背晉而奸宋宋人伐之晉人不救築五邑於其郊曰黍丘揖丘大城鍾邘注為明年入曹傳也梁國下邑縣西南有黍丘亭音義好呼報反下同弋以職反繳射也之說如字說之音悅下大說同霸說如字一音始銳反奸音干揖音集一音於入反邘音于疏正義曰周禮司弓矢云矰矢用諸弋射鄭𤣥云結繳於矢謂之矰矰高也可以弋飛鳥說文云繳生絲也謂用生絲為繩繫矢以射鳥也經八年春王正月宋公入曹以曹伯陽歸注曹人背晉而奸宋是以致討宋人既還而不忍褚師之詬怒而反兵一舉滅曹滅非本志故以入告音義禇中呂反詬呼豆反疏注正義曰傳例曰不有其地曰入案傳宋實滅曹而有之經書為入故杜原其事而解之吳伐我夏齊人取讙及闡注不書伐兵未加而魯與之邑闡在東平劉縣北音義讙音歡闡尺善反疏正義曰公羊穀梁以為賂齊謂前年魯伐邾取邾子益益是齊甥畏齊故賂之非左氏意也歸邾子益于邾秋七月冬十有二月癸亥把伯過卒注無傳未同盟而赴以名音義過古禾反疏正義曰世族譜云僖公過悼公曽孫案悼公祖文公以昭六年卒父平公以昭二十四年卒悼公以定四年卒未應有曾孫可以授之國也把世家僖公過是悼公之子疑譜誤齊人歸讙及闡注不言來命歸之無官使也音義使所吏反疏注正義曰定七年齊人來歸鄆讙龜隂田此不言來故解之傳八年春宋公伐曹將還禇師子肥殿注子肥宋大夫音義殿丁練反下注同曹人詬之不行注詬詈辱也不行殿兵止也音義詬本又作訽呼豆反詈力智反師待之公聞之怒命反之遂滅曹執曹伯及司城彊以歸殺之注終曹人之夢吳為邾故將伐魯問於叔孫輙注問可伐否輙故魯人音義為于偽反下注為之同疏正義曰定十二年叔孫輙與公山不狃帥費人以襲魯兵敗奔于齊後自齊奔吳吳子令問之叔孫輙對曰魯有名而無情注有大國名無情實伐之必得志焉退而告公山不狃注不狃亦故魯人音義狃女九反公山不狃曰非禮也君子違不適讎國注違奔亡也疏正義曰謂有故而去者也本國於已無大讎怨已無報怨之心則違而不適讎國武王數紂之罪以告衆云撫我則后虐我則讎若父本無罪而枉被誅殺如伍員之徒忠在復讎適讎亦可矣不得以此言格之也若父以罪而受誅者如鬭辛之徒本自不合怨君故辛亦不敢怨也未臣而有伐之奔命焉死之可也注未臣所適之國若有伐本國者則可還奔命死其難音義難乃旦反疏注正義曰既臣之後則身是新君之臣性命非復已有故不復得為舊君死節也若未有臣服則舊君之思未絶故可還奔舊君之命死其難也言奔命則有命乃奔之若命不及亦不當還所託也則隱注曽所因託則為之隱惡音義曾在増反且夫人之行也不以所惡廢鄉注不以其私怨惡廢棄其鄉黨之好音義夫音符行下孟反又如字惡烏路反又如字注同好呼報反下文好焉同今子以小惡而欲覆宗國不亦難乎注輙魯公族故謂之宗國音義覆芳服反若使子率子必辭王將使我子張病之注子張輙也疏正義曰率謂在軍前引道率領先行非為軍之將帥也故不狃云子辭王將使我以其知魯道者唯此二人故也王問於子洩注子洩不狃音義洩息列反又作泄對曰魯雖無與立注緩時若無能自立必有與斃注急則人人知懼皆將同死戰音義斃婢世反諸侯將救之未可以得志焉晉與齊楚輔之是四讎也注與魯而四夫魯齊晉之脣脣亡齒寒君所知也不救何為三月吳伐我子洩率故道險從武城注故由險道欲使魯成備音義子洩率絶句故道險絶句初武城人或有因於吳竟田焉注僑田吳界音義竟音境僑其驕反拘鄫人之漚菅者曰何故使吾水滋注鄫人亦僑田吳滋濁也音義拘音俱下同漚烏豆反菅古顔反滋音𤣥本又作兹子絲反字林云黒也及吳師至拘者道之以伐武城克之注鄫人教吳必可克音義道音導王犯嘗為之宰澹臺子羽之父好焉國人懼注王犯吳大夫故嘗奔魯為武城宰澹臺子羽武城人孔子弟子也其父與王犯相善國人懼其為内應音義澹待甘反應應對之應疏正義曰杜意拘者道之以伐武城克之謂語吳人云若伐武城必可克之吳人王犯嘗為武城之宰與澹臺子羽之父相善國人懼者謂武城邑懼子羽為吳内應劉炫以為實克武城今知非者以下傳始云王犯嘗為之宰國人懼是未得武城故知此克之是鄫人教吳之語劉以為伐武城克之者實克武城國人懼者懼其害魯若然吳師既來伐魯是顯然行兵不須云王犯與子羽之父相善魯已受害何須云國人始懼傳既云王犯嘗為之宰又繼武城之下是為武城之宰澹臺子羽又是武城之人皆據武城而言故知恐為武城内應傳載漚菅事者說來伐武城之由劉妄生異見而規杜非也懿子謂景伯若之何對曰吳師來斯與之戰何患焉且召之而至又何求焉注言犯盟伐邾所以召吳吳師克東陽而進舍於五梧明日舍於蠶室注三邑魯地公賔庚公甲叔子與戰于夷獲叔子與析朱鉏注公賔庚公甲叔子并析朱鉏為三人皆同車傳互言之音義析星暦反注及下同獻於王王曰此同車必使能國未可望也注同車能俱死是國能使人故不可望得明日舍于庚宗遂次於泗上微虎欲宵攻王舍注微虎魯大夫音義泗音四私屬徒七百人三踊於幕庭注於帳前設格令士試躍之音義屬音燭幕亡博反格更百反令力呈反躍羊灼反卒三百人有若與焉注卒終也終得三百人任行有若孔子弟子與在三百人中音義與音預注同任音壬及稷門之内注三百人行至稷門内或謂季孫曰不足以害吳而多殺國士不如已也乃止之吳子聞之一夕三遷注畏微虎音義三息暫反吳人行成注求與魯成將盟景伯曰楚人圍宋易子而食析骸而爨注在宣十五年音義骸戸皆反本又作骨爨七亂反猶無城下之盟我未及虧而有城下之盟是棄國也吳輕而逺不能久將歸矣請少待之弗從景伯負載造於萊門注以言不見從故負載書將欲出盟音義虧去危反輕遣政反載如字或音戴造七報反萊音來疏注正義曰劉炫云載書盟主所制自當吳人為之何由復出魯國又載書數簡之文耳何須負之且諸言載書未有單稱載者以為負載器物欲往質於吳以規杜今杜知負載是負載書者以周禮司盟掌盟載之事故傳云士莊子為載書此上有將盟之文下即云負載之事故知是載書也劉以負載謂背負器物然則景伯魯之大夫親自負物不近人情而規杜過非也乃請釋子服何於吳吳人許之以王子姑曹當之而後止注釋舍也魯人不以盟為了欲因留景伯為質於吳既得吳之許復求吳王之子以交質吳人不欲留王子故遂兩止音義質音致下同復扶又反吳人盟而還注不書盟恥吳夷齊悼公之來也注在五年季康子以其妺妻之即位而逆之季魴侯通焉注魴侯康子叔父音義妻七計反魴音房女言其情弗敢與也齊侯怒夏五月齊鮑牧帥師伐我取讙及闡或譖胡姫於齊侯注胡姫景公妾曰安孺子之黨也六月齊侯殺胡姫注傳言齊侯無道所以不終齊侯使如吳請師將以伐我乃歸邾子注齊未得季姫故請師也吳前為邾討魯懼二國同心故歸邾子音義為于偽反邾子又無道吳子使大宰子餘討之注子餘大宰嚭囚諸樓臺栫之以棘注栫擁也音義栫本又作荐在薦反擁於勇反使諸大夫奉大子革以為政注革邾大子桓公也為十年邾子來奔傳秋及齊平九月臧賔如如齊涖盟注賔如臧會子齊閭丘明來涖盟注明閭丘嬰之子也盟不書諱略之疏注正義曰魯以淫女見伐喪邑又屈服求盟是可恥之事二盟皆不書者諱其惡而略之且逆季姬以歸嬖注季姫魴侯所通者鮑牧又謂羣公子曰使女有馬千乘乎注有馬千乘使為君也鮑牧本不欲立陽生故諷動羣公子音義女音汝乘繩證反注及下同諷方鳳反公子愬之公謂鮑子或譖子子姑居於潞以察之注潞齊邑音義愬音素潞音路若有之則分室以行若無之則反子之所出門使以三分之一行半道使以二乘及潞麇之以入遂殺之注麇亦束縛音義麇丘隕反冬十二月齊人歸讙及闡季姫嬖故也經九年春王二月葬把僖公注無傳三月而葬速宋皇瑗帥師取鄭師于雍丘注書取覆而敗之雍丘縣屬陳留音義雍於勇反疏注正義曰莊十一年傳例曰覆而敗之曰取某師釋例曰覆者謂威力兼備若羅網之所掩覆一軍皆見禽制故以取為文專制之辭也案傳鄭師圍宋雍丘宋皇瑗復於鄭師之外築壘使合表裏受敵無處可逃子姚救之又大敗而宋師乃號令使有能者無死是其合軍盡禽敵人制其死命是於例正合書取也夏楚人伐陳秋宋公伐鄭冬十月傳九年春齊侯使公孟綽辭師于吳注齊與魯平故辭吳師音義綽昌灼反本又作卓同吳子曰昔歲寡人聞命今又革之不知所從將進受命於君注為十年吳伐齊傳鄭武子賸之嬖許瑕求邑無以與之注賸罕達也瑕武子之屬音義賸以證反請外取許之注瑕請取於他國故圍宋雍丘宋皇瑗圍鄭師注許瑕師每日遷舍注作壘塹成輙徙舍合其圍音義壘力軌反塹七艶反壘合鄭師哭子姚救之大敗注子姚武子賸也二月甲戌宋取鄭師于雍丘使有能者無死注惜其能也以郟張與鄭羅歸注鄭之有能者音義郟古洽反又音甲夏楚人伐陳陳即吳故也宋公伐鄭注報雍丘疏正義曰虛舉經文者為下趙鞅救鄭起并以終上取鄭師之事也秋吳城邗溝通江淮注於刋江築城穿溝東北通射陽湖西北至末口入淮通糧道也今廣陵邗江是音義邗音寒射食亦反又音亦晉趙鞅卜救鄭遇水適火注水火之兆疏正義曰服䖍云兆南行適火卜法横者為土立者為木邪向經者為金背經者為火因兆而細曲者為水占諸史趙史墨史龜注皆晉史史龜曰是謂沈陽注火陽得水故沈可以興兵注兵隂類也故可以興兵利以伐姜不利子商注姜齊姓子商謂宋伐齊則可敵宋不吉史墨曰盈水名也子水位也注趙鞅姓盈宋姓子水盈坎乃行子姓又得北方水位疏注正義曰秦本紀秦伯翳之後為嬴姓也趙世家云趙氏之先與秦同祖伯翳後世為蜚廉蜚廉有子二人一曰惡來其後為秦一曰季勝其後為趙今卜趙鞅伐宋故以嬴子二姓為占也名位敵不可干也注二水俱盛故言不可干炎帝為火師注神農有火瑞以火名官姜姓其後也水勝火伐姜則可史趙曰是謂如川之滿不可游也注既盈而得水位故為如川之滿不可馮游言其波流盛音義游音由馮皮氷反鄭方有罪不可救也注鄭以嬖寵伐人故以為有罪救鄭則不吉不知其他注救鄭則當伐宋故不吉也陽虎以周易筮之遇泰注乾下坤上泰之需注乾下坎上需泰六五變音義需音須疏正義曰乾下坤上泰乾為天坤為地地在上天在下象曰天地交泰泰者大也天地交合萬物大通故名此卦為泰乾下坎上需象曰需須也言雲在大上須散而為雨故名此卦為需曰宋方吉不可與也注不可與戰泰六五曰帝乙歸妹以祉元吉帝乙紂父立為天子故稱帝乙隂而得中有似王者嫁妹得如其願受福禄而大吉音義祉音恥疏注正義曰泰六五曰帝乙歸妹以祉元吉易之文也既引其文又解其意帝乙紂父殷本紀文也易之爻位五為天子故於六五之爻稱帝乙也其象曰以祉元吉中以行願六是隂爻也五是上體之中居天子之位隂而得中有似王者嫁妹得如其願受福禄而大吉王弼云婦人謂嫁曰歸泰者隂陽交通之時也女處尊位履中居順降身應二感以相與用中行願不失其禮帝乙歸妹誠合斯義履順居中行願以祉盡夫隂陽交配之宜故元吉也杜說與彼同案易稱高宗伐鬼方者實伐之帝乙歸妹者實嫁之其女有賢徳名聞昭著故得載之易象但書典散亡不知嫁與何人為誰之妻微子啓帝乙之元子也宋鄭甥舅也注宋鄭為婚姻甥舅之國宋為微子之後今卜得帝乙卦故以為宋吉疏正義曰宋鄭異姓必嫁娶往來或何時實有親故為甥舅輙言甥舅者言其婚姻勢敵敵則無以相傾宋有福鄭必衰言鄭不可助也祉禄也若帝乙之元子歸妹而有吉禄我安得吉焉乃止注吉在彼則我伐之為不吉冬吳子使來儆師伐齊注前年齊與吳謀伐魯齊既與魯成而止故吳恨之反為魯謀伐齊音義儆音景經十年春王二月邾子益來奔疏正義曰八年歸邾子益于邾傳云邾子又無道吳子使大宰子餘討之囚諸樓臺栫之以棘蓋將歸吳而囚之今言來奔當是自吳逃而來適魯傳稱齊甥也遂奔齊經不復書其奔齊者凡諸來奔既至魯而更復奔他國者已去其位略賤之不復書齊慶封亦是也公㑹吳伐齊注書㑹從不與謀音義與音預疏注正義曰往年吳來儆師是與我謀也而從不與謀者與謀者謂彼此和同計謀然後共伐則是我為伐主故言及某同行不與謀者謂彼心自定遣來召我則彼為伐主我往㑹之故言㑹某伐某今吳伐齊之意已定儆師者來召魯耳於例止當言㑹故從不與謀之文三月戊戌齊侯陽生卒注以疾赴故不書弑音義弑申志反疏注正義曰傳稱齊人弑悼公赴于師則陽生被弑矣而經書卒是以疾死赴也襄七年鄭伯髠頑卒于鄵傳稱子駟使賊夜弑僖公而以瘧疾赴于諸侯知此亦以疾死赴故不書弑也八年臧賔如如齊涖盟齊閭丘明來涖盟是再同盟故赴以名杜不言略之夏宋人伐鄭注無傳晉趙鞅帥師侵齊五月公至自伐齊注無傳葬齊悼公注無傳䘙公孟彄自齊歸于䘙注無傳書歸齊納之音義彄古侯反疏注正義曰定十四年䘙公孟彄出奔鄭自鄭奔齊故今自齊歸衞也成十八年傳例曰凡去其國諸侯納之曰歸此書自齊歸知是齊納之薛伯夷卒注無傳赴以名故書疏注正義曰定十三年薛弑其君比此夷當代為君爾夷未同盟而赴以名故書秋葬薛惠公注無傳冬楚公子結帥師伐陳吳救陳注季子不書陳人來告不以名疏注正義曰傳稱延州來季子救陳即是季札也札以襄二十九年來聘書名則此亦宜書名今不書者陳人來告不以名也傳十年春邾隱公來奔齊甥也故遂奔齊注終子貢之言公會吳子邾子郯子伐齊南鄙師于鄎注鄎齊地邾郯不書兵并屬吳不列於諸侯音義郯音談鄎音息并必政反齊人弑悼公赴于師注以說吳音義弑申志反吳子三日哭于軍門之外徐承帥舟師將自海入齊齊人敗之吳師乃還注承吳大夫夏趙鞅帥師伐齊注經書侵以侵告大夫請卜之趙孟曰吾卜於此起兵注謂往歲卜伐宗不吉利以伐姜故令興兵事不再令注再令瀆也卜不襲吉注襲重也音義重直龍反又直用反行也於是乎取犂及轅注犂一名隰濟南有隰隂縣祝阿縣西有轅城音義犂力兮反又力之反轅音袁一音于眷反隰音習本或作濕音同疏注正義曰犂即犂丘也二十三年傳稱齊晉戰于犂丘知伯親擒顔庚庚即􅃰聚也二十七年陳成子召顔􅃰聚之子晉曰隰之役而父死焉是犂一名隰毁高唐之郭侵及賴而還秋吳子使來復儆師注伐齊未得志故為明年吳伐齊傳音義復扶又反冬楚子期伐陳注陳即吳故吳延州來季子救陳謂子期曰二君不務德注二君吳楚而力爭諸侯民何罪焉我請退以為子名務德而安民乃還注季子吳王壽夢少子也壽夢以襄十二年卒至今七十七歲壽夢卒季子已能讓國年當十五六至今蓋九十餘音義夢音蒙少詩照反疏注正義曰襄昭之傳稱延州來季子者皆是季札也此說務德安民是大賢之事亦當是札故計跡其年言雖老猶能將兵也孫毓以為季子食邑於州來世稱延州來季子猶趙氏世稱知伯延州來季子或是札之子與孫也經十有一年春齊國書帥師伐我夏陳轅頗出奔鄭注書名貪也音義頗破可反又普多反五月公會吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書注公與伐而不與戰艾陵齊地音義艾五蓋反與伐音預下同秋七月辛酉滕子虞母卒注無傳赴以名故書之疏注正義曰四年滕子結卒虞母代結為君爾來未同盟來赴故書也冬十有一月葬滕隱公注無傳䘙世叔齊出奔宋注書名淫也傳十一年春齊為鄎故注鄎在前年音義為于偽反國書高無㔻帥師伐我及清注清齊地濟北盧縣東有清亭音義㔻音普悲反季孫謂其宰冉求注冉求魯人孔子弟子曰齊師在清必魯故也若之何求曰一子守二子從公禦諸竟季孫曰不能注自度力不能使二子禦諸竟音義守手又反從才用反禦魚呂反亦作御竟音境度待洛反求曰居封疆之間注封疆竟内近郊地音義疆居良反季孫告二子注二子叔孫孟孫也二子不可求曰若不可則君無出一子帥師背城而戰不屬者非魯人也注屬臣屬也言不戰為不臣魯之羣室衆於齊之兵車注羣室都邑居家一室敵車優矣子何患焉二子之不欲戰也宜政在季氏注言二子恨季氏專政故不盡力音義二子之不欲戰也宜絶句當子之身齊人伐魯而不能戰子之恥也大不列於諸侯矣季孫使從於朝注使冉求随已之公朝俟於黨氏之溝注黨氏溝朝中地名音義黨音掌武叔呼而問戰焉注問冉求對曰君子有逺慮小人何知懿子强問之對曰小人慮材而言量力而共者也注言子所問非已材力所及故不能言音義强其丈反共音恭武叔曰是謂我不成丈夫也注知冉求非已不欲戰故不對音義不成丈夫也本或作大夫非是退而蒐乘注蒐閲音義蒐所求反乘繩證反閲音悅孟孺子洩帥右師注孺子孟懿子之子武伯彘音義孺而住反彘直利反顔羽御邴洩為右注二子孟氏臣音義邴音丙又被命反冉求帥左師管周父御樊遲為右注樊遲魯人孔子弟子樊須音義父音甫季孫曰須也弱有子曰就用命焉注雖年少能用命有子冉求也音義少詩照反季氏之甲七千冉有以武城人三百為已徒卒注歩卒精兵音義卒子忽反注同老幼守宫次于雩門之外注南城門也音義雩音于五日右師從之注五日乃從言不欲戰公叔務人注務人公為昭公子見保者而泣注保守城者曰事充注繇役煩音義繇本或作徭同音遙政重注賦稅多上不能謀士不能死何以治民吾既言之矣敢不勉乎注既言人不能死已不敢不死師及齊師戰于郊齊師自稷曲注稷曲郊地名師不踰溝樊遲曰非不能也不信子也請三刻而踰之注與衆三刻約信如之衆從之注如樊遲言乃踰溝師入齊軍注冉求之師右師奔齊人從之注逐右師陳瓘陳莊渉泗注二陳齊大夫音義瓘古喚反泗音四孟之側後入以為殿注之側孟氏族也字反音義殿丁練反抽矢策其馬曰馬不進也注不欲伐善音義抽勅留反策初革反本或作筴林不狃之伍曰走乎注不狃魯士五人為伍敗而欲走不狃曰誰不如注我不如誰而欲走音義誰不如如字一音而庶反注同曰然則止乎不狃曰惡賢注言止戰惡足為賢皆無戰志音義惡音烏注同徐歩而死注徐行而死言魯非無壯士但季孫不能使師獲甲首八十注冉求所得齊人不能師注不能整其師宵諜曰齊人遁注諜間也音義諜音牒遁徒困反間間厠之間冉有請從之三季孫弗許孟孺子語人曰我不如顔羽而賢於邴洩注二子與孟孺子同車音義語魚據反子羽銳敏注子羽顔羽鋭精也敏疾也言欲戰我不欲戰而能默注心雖不欲口不言奔音義默本亦作嘿亡北反洩曰驅之注言驅馬欲奔公為與其嬖僮汪錡乘皆死皆殯注皆俱也音義嬖必計反僮本亦作童音同汪烏黄反錡魚綺反乘繩證反孔子曰能執干戈以䘙社稷可無殤也注時人疑童子當殤音義殤音商八歲至十九嵗為殤疏注正義曰喪服大功章云子女子子之長殤中殤傳曰何以大功未成人也年十九至十六為長殤十五至十二為中殤十一至八歲為下殤不滿八歲以下皆為無服之殤其於服也長殤中殤降成人一䒭下殤降二䒭此汪錡蓋長殤也時人疑其當降服又葬殤之禮亦異成人檀弓云周人以殷人之棺椁葬長殤以夏后氏之堲周葬中殤下殤以有虞氏之瓦棺葬無服之殤是其異於成人也冉有用矛於齊師故能入其軍孔子曰義也注言能以義勇不書戰不皆陳也不書敗勝負不殊音義矛亡侯反陳直覲反夏陳轅頗出奔鄭初轅頗為司徒賦封田以嫁公女注封内之田急賦稅之有餘以為已大器注大器鍾鼎之屬國人逐之故出道渴其族轅咺進稻醴梁糗腵脯焉注糗乾飯也音義咺况阮反稻醴音禮以稻米為醴酒梁糗起九反以粱米為之一音昌紹反腵脯丁亂反字亦作鍛加薑桂曰脯也疏正義曰周禮酒正辨五齊之名二曰醴齊鄭𤣥云醴猶體也成而汁滓相將如今之恬酒矣則醴是濁酒也月令命作酒云秫稻必齊是以稻為醴也釋草云虋赤苖芑白苗郭璞曰今之赤梁粟白粱粟皆好穀也内則鄭𤣥注云腵脩捶脯施簠桂也喜曰何其給也對曰器成而具注具此醴糗曰何不吾諫對曰懼先行注恐言不從先見逐為郊戰故公㑹吳子伐齊注欲以報也音義為于偽反五月克博壬申至于嬴注博嬴齊邑也二縣皆屬泰山音義嬴音盈中軍從王注吳中軍胥門巢將上軍王子姑曹將下軍展如將右軍注三將吳大夫齊國書將中軍高無㔻將上軍宗樓將下軍陳僖子謂其弟書爾死我必得志注書子占也欲獲死事之功宗子陽與閭丘明相厲也注相勸厲致死子陽宗樓也桑掩胥御國子注國子國書公孫夏曰二子必死注亦勸勉之音義夏戸雅反將戰公孫夏命其徒歌虞殯注虞殯送葬歌曲示必死音義殯必刃反疏正義曰賈逵云虞殯遣殯歌詩杜云送葬歌曲竝不解虞殯之名禮啓殯而葬葬則下棺反日中而虞蓋以啓殯將虞之歌謂之虞殯歌者樂也喪者哀也送葬得有歌者蓋挽引之人為歌聲以助哀今之挽歌是也舊說挽歌漢初田横之臣為之據此挽歌之有久矣晉初荀顗制禮以吉凶不雜送葬不宜有歌去之摰虞駮之云詩云君子作歌惟以告哀葬之有歌不為害也復存之陳子行命其徒具含玉注子行陳逆也具含玉亦示必死音義行如字又户郎反含户暗反本又作唅公孫揮命其徒曰人㝷約吳髪短注約繩也八尺為㝷吳髪短欲以繩貫其首音義揮許韋反東郭書曰三戰必死於此三矣注三戰夷儀五氏與今使問弦多以琴注弦多齊人也六年奔魯問遺也音義遺唯季反疏正義曰禮以物遺人謂之問二十六年䘙出公使以弓問子贛論語云問人於他邦皆是也曰吾不復見子矣注言將死戰陳書曰此行也吾聞鼓而已不聞金矣注鼓以進軍金以退軍不聞金言將死也傳言吳師彊齊人皆自知將敗疏注正義曰周禮大司馬教大閲之禮云中軍以鼙令鼓鼓人皆三鼓車徒皆作鼓行鳴鐲車徒皆行及表乃止鳴鐃且郤鄭注云凡進軍退軍鼓鐸同其所異者廢鐲而鳴鐃耳如鄭此言則進退皆有金鼓而杜云鼓以進軍金以退軍者周禮是教戰之法其臨敵之時欲戰則先擊鼓以動之欲退則先擊金以静之故長勺之役公將鼓之是欲戰擊鼓也此𫝊云吾聞鼓而已不聞金矣是欲退擊金也甲戌戰于艾陵展如敗高子注齊上軍敗國子敗胥門巢注吳上軍亦敗王卒助之大敗齊師獲國書公孫夏閭丘明陳書東郭書革車八百乘甲首三千以獻于公注公以兵從故以勞公音義卒子忽反乘繩證反從才用反又如字勞力報反將戰吳子呼叔孫注叔孫武叔州仇曰而事何也注問何職對曰從司馬注從吳司馬所命王賜之甲劒鈹曰奉爾君事敬無廢命叔孫未能對䘙賜進注賜子貢孔子弟子音義鈹普悲反疏正義曰子貢䘙人故稱䘙賜曰州仇奉甲從君而拜注拜受之公使大史固歸國子之元注歸於齊也元首也吳以獻魯寘之新篋褽之以𤣥纁注褽薦也音義寘之豉反篋古恊反褽音尉别本作褽以𤣥纁許云反本亦作勲加組帶焉寘書于其上曰天若不識不衷何以使下國注言天識不善故殺國子音義組音祖衷音忠吳將伐齊越子率其衆以朝焉王及列士皆有饋賂吳人皆喜唯子胥懼曰是豢吳也夫注豢養也若人養犧牲非愛之將殺之音義饋其位反或作餽賂音路豢音患夫音扶諫曰越在我心腹之疾也壤地同而有欲於我注欲得吳夫其柔服求濟其欲也不如早從事焉注從事擊之得志於齊猶獲石田也無所用之注石田不可耕越不為沼吳其泯矣使醫除疾而曰必遺類焉者未之有也盤庚之誥曰其有顚越不共則劓殄無遺育無俾易種于兹邑注盤庚商書也顛越不共從橫不承命者也劓割也殄絶也育長也俾使也易種轉生種類音義沼之兆反泯亡軫反盤歩干反誥古報反共音㳟注同劓魚器反殄大典反俾必耳反種章勇反注同從子容反長丁丈反疏注正義曰彼文云顛越不㳟暫遇姦宄我乃劓殄滅之無遺育無俾易種于兹新邑此傳字少於彼引之略也孔安國云顛殞越隊也不恭不奉上命孔言殞隊謂受上命而隊失之杜言從横不承命謂其人性自顛越從横不肯承命意小異也刑名以截鼻為劓劓是割也殄絶育長俾使皆釋詁文也易謂轉易無使轉生種類不令更有惡子孫也是商所以興也今君易之將以求大不亦難乎弗聽使於齊屬其子於鮑氏為王孫氏注私使人至齊屬其子改姓為王孫欲以辟吳禍音義使所吏反屬音燭注及下同反役王聞之使賜之屬鏤以死注艾陵役也屬鏤劔名音義鏤力俱反又力侯反將死曰樹吾墓檟檟可材也吳其亡乎三年其始弱矣盈必毁天之道也注越人朝之伐齊勝之盈之極也為十三年越伐吳起音義檟古雅反木名疏正義曰呉語云子胥將死曰而縣吾目於吳門以見越人之入吳國之亡也遂自殺王愠曰孤不使大夫得有見也乃使取申胥之尸盛以鴟夷而投之於江賈逵云鴟夷革囊也秋季孫命脩守備曰小勝大禍也齊至無日矣注善有備音義守手又反冬衞大叔疾出奔宋注疾卽齊也初疾娶于宋子朝注子朝宋人仕衞為大夫音義朝如字其娣嬖注娣所娶女之娣子朝出注出奔孔文子使疾出其妻而妻之疾使侍人誘其初妻之娣寘於犂注犂衞邑音義妻之七計反犂力兮反而為之一宮如二妻文子怒欲攻之仲尼止之遂奪其妻或淫于外州外州人奪之軒以獻注外州衞邑軒車也以獻於君恥是二者故出衞人立遺使室孔姞注遺疾之弟孔姞孔文子之女疾之妻音義姞其乙反又其吉反疾臣向魋注為宋向魋臣音義魋徒回反納美珠焉與之城鉏注城鉏宋邑宋公求珠魋不與由是得罪及桓氏出注出在十四年城鉏人攻大叔疾衞莊公復之注聽使還使處巢死焉殯於鄖葬於少禘注終言疾之失所也巢鄖少禘皆衞地音義鄖音云少詩照反禘大計反初晉悼公子憖亡在衞使其女僕而田注僕御田獵音義憖魚覲反一作整征領反大叔懿子止而飲之酒注懿子大叔儀之孫音義飲於鴆反遂聘之生悼子注悼子大叔疾音義聘匹政反悼子卽位故夏戊為大夫注夏戊悼子之甥音義夏戸雅反下同戊音茂悼子亡衞人翦夏戊注翦削其爵邑孔文子之將攻大叔也訪於仲尼仲尼曰胡簋之事則嘗學之矣注胡簋禮器名夏曰胡周曰簋音義簋音軌疏注正義曰胡簋行禮所用之器故以胡簋言禮事論語衛靈公問曰俎豆之事意亦同也明堂位說四代之器云有虞氏之兩敦夏后氏之四璉殷之六瑚周之八簋如記文則夏器名璉殷器名瑚而包咸鄭𤣥等注論語賈服等注此傳皆云夏曰瑚杜亦同之或别有所據或相從而誤甲兵之事未之聞也退命駕而行曰鳥則擇木木豈能擇鳥注以鳥自喻疏正義曰對靈公軍旅之事未之學也其意亦與此同軍旅甲兵以治國之具也此以文子非禮欲國内用兵靈公空問軍陳故竝不答非輕甲兵也文子遽止之曰圉豈敢度其私訪衞國之難也注圉文子名度謀也音義遽其據反度待洛反注及下同難乃旦反將止注仲尼止魯人以幣召之乃歸注於是自䘙反魯樂正雅頌各得其所疏正義曰孔子世家云季康子使公華公賔公林以幣迎孔子孔子歸是也季孫欲以田賦注丘賦之法因其田財通出馬一匹牛三頭今欲别其田及家財各為一賦故言田賦音義别如字一音彼列反疏注正義曰司馬法方里為井四井為邑四邑為丘丘出馬一匹牛三頭四丘為甸甸乃有馬四匹牛十二頭是為革車一乘今用田賦必改其舊但不知若何用之賈逵以為欲令一井之間出一丘之稅井别出馬一匹牛三頭若其如此則一丘之内有一十六井其出馬牛乃多於常一十六倍且直云用田賦何知使井為丘也杜以如此則賦稅大多非民所能給故改之舊制丘賦之法田之所收及家内資財井共一馬三牛今欲别其田及家資各為一賦計一丘民之家資令出一馬三牛又計田之所收更出一馬三牛是為所出倍於常也舊田與家資同賦今欲别賦其田故言欲以田賦也使冉有訪諸仲尼仲尼曰丘不識也三發注三發問卒曰注卒終也子為國老待子而行若之何子之不言也仲尼不對注不公答而私於冉有曰君子之行也注行政事度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣注丘十六井出戎馬一疋牛三頭是賦之常法音義施尸豉反斂力豔反若不度於禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲茍而行又何訪焉弗聽注為明年用田賦傳音義冒亡北反一音莫報反厭於鹽反春秋左傳注疏卷五十八春秋左氏傳注疏卷五十八考證齊陽生入于齊林堯叟曰䘙侯入于夷儀䘙寗喜弑其君剽則喜為䘙侯弑也齊陽生入于齊齊陳乞弑其君荼則乞為陽生弑也傳需事之下也音義懦弱持疑也監本脱懦字今添傳江漢睢漳楚之望也疏漳經襄陽至南郡當陽縣入江監本脱縣字今添傳楚昭王知大道矣王應麟曰邾文公之知命楚昭王之知大道惠王之知志其所知有出於卜祝史巫之外者傳出萊門而告之故注魯郭門也顧炎武日知録曰定九年杜注曰萊門陽關邑門臣召南按陽生此時駕出魯城共謀杜云魯郭門是也不得以彼注難此又按八年傳言景伯負載造于萊門卽此萊門也安得曰陽關邑門乎傳使胡姬以安孺子如賴臣浩按安孺子史記齊世家作晏孺子傳苟不以禮豈可量也林堯叟曰茍命諸侯不以禮法則其包藏禍心豈可量度傳太伯端委以治周禮疏太伯及仲雍皆周太王之子太王監本訛作文王今改正傳禹合諸侯于塗山執玉帛者萬國今其存者無數十焉臣召南按晉書地理志曰春秋之初尚有千二百國迄獲麟之末見于經傳者百有七十國百三十九知其所居三十一國盡亡其處按此總論經傳中所載國名耳至哀公時國之存者原不過數十也齊人取讙及闡注闡在東平劉縣北臣召南按各本同誤東平無劉縣當是剛縣之訛剛縣前漢屬泰山郡地理志曰剛故闡注應劭曰春秋取讙及闡今闡亭是也後漢改屬濟東國故郡國志于剛縣下引此傳及杜注可證傳吳子聞之一夕三遷臣召南按魯雖積弱微虎以三百人奮志雪耻吳人氣奪使魯能用聖賢不且却敵千里之外乎傳將進受命於君林堯叟曰言往歲我聞齊乞師之命今又欲革而易之不知二命何者當從將進師伐齊以受齊君之命傳秋吳城邗溝通江淮注西北至末口入淮末監本訛作宋今改正傳盈水名也子水位也疏臣召南按趙世家本文惟趙氏之先與秦共祖二句耳其伯翳以下皆孔疏約世家本文自為序次較本文更明晰但各本俱作共伯翳後世為盈泄此則刋刻之誤秦趙二國其先並無名盈泄者也今從趙世家訂正改曰伯翳後世為蜚廉傳公會吳子邾子郯子伐齊南鄙師于鄎臣召南按此邾子卽大子革上年為吳人所立者也傳務德而安民乃還疏猶趙氏世稱知伯以文義推之應作猶趙氏世稱趙孟知氏世稱知伯葢脱漏八字也傳冉求帥左師臣召南按季氏孟氏分將左右二軍孟懿子不親將而使其子季康子不親將而使家臣則知魯人之怯左師已㨗齊師已遁冉有請從而季孫勿許傳言魯之不振傳有餘以為已大器注大器鐘鼎之屬大監本訛作長今改正傳屬其子於鮑氏為王孫氏注改姓為王孫欲以避吳禍顧炎武日知録曰傳終言之猶夫槪王奔楚為堂谿氏也杜注非傳魯人以幣召之乃歸疏季康子使公華公賔公林以幣迎孔子臣召南按史記孔子世家作季康子逐公華公賔公林葢三人皆小人康子用冉求之言故逐三人而聘孔子也孔疏作使字則是康子使三人以幣聘矣傳有周公之典在王應麟曰魯用田賦孔子曰有周公之典在晉鑄刑書孔子曰晉國將守唐叔之所受法度周公之典唐叔之法度魯晉所以立國也是以漢循高祖之法則治唐變太宗之法則亂春秋左氏傳注疏卷五十八考證
