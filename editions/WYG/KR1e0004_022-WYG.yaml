body:
  text: 春秋左傳注疏卷二十二起宣公五年盡十一年晉杜氏注唐陸德明音義孔穎逹疏經五年春公如齊夏公至自齊秋九月齊髙固來逆叔姬注髙固齊大夫不書女歸降于諸侯疏正義曰僖五年公綜兹如牟注云娶于牟也卿非君命不越竟故奉公命聘于牟因自為逆然則此髙固亦是因來聘而自逆也經書公孫兹如牟是以聘為文此髙固以逆為文不言聘者此二者皆以非君之命不得越竟請君行聘而因自逆妻本意為逆不為聘也從魯而出私娶輕而君命重故書聘不書逆自外而来則嫁女重而受聘輕故書逆不書聘内外之異文耳諸侯嫁女于大夫則使大夫為之主而書于經者行禮為尊卑不敵故使大夫為主耳其女適他族以先公遺體許人必告於廟故書之耳嫁于諸侯者皆書其歸此不書歸者差降於諸侯也非齊夫人不得言歸于齊若言歸于齊髙氏則下嫁於大夫非公之敵故不得書其歸也叔孫得臣卒注無傳不書日公不與小斂音義不與音預斂力驗反冬齊髙固及子叔姬來注叔姬寧固反馬疏正義曰傳言來反馬也據髙固為文耳嫌叔姬亦為反馬故辨之二者各有所為而且相隨行耳女既適人當稱夫族宋蕩伯姬是其事也叔姬已適髙氏而猶言子叔姬者以其新歸於夫反馬乃成為婦今始來反馬故以父母之辭言之楚人伐鄭傳五年春公如齊髙固使齊侯止公請叔姬焉注留公强成昬音義强其丈反夏公至自齊書過也注公既見止連昬於鄰國之臣厭尊毁列累其先君而於廟行飲至之禮故書以示過音義厭於渉反累劣偽反疏正義曰凡公行還書至者徃反無咎喜之而告廟也公如齊見止求與髙固為昬方始得歸當以恥而不告亦復告廟飲至故依常書之以示過釋例曰凡反行飲至必以嘉㑹昭告祖禰有功則舎爵策勲無勲無勞告事而已若夫執止之辱厭尊毁列所以累其先君忝其社稷故當克躬罪已不以嘉禮自終宣公如齊既已見止連昬於鄰國之臣而行飲至之禮故傳曰書過也言書過者書之以示公過也秋九月齊髙固來逆女自為也故書曰逆叔姬卿自逆也注適諸侯稱女適大夫稱字所以别尊卑也此春秋新例故稱書曰而不言凡也不於莊二十七年發例者嫌見逼而成昬因明之音義自為于偽反别彼列反疏正義曰俱是外來逆女適諸侯諸侯遣臣來逆則稱逆女紀裂繻來逆女是也適大夫大夫自來逆則稱所逆之字此髙固來逆叔姬是也二文不同所以别尊卑也傳言卿自逆者别其與君逆也莊二十七年莒慶來逆叔姬文與此同不於彼發例者嫌此髙固見廹而成昬與常例或異故因此以明其不異也冬來反馬也注禮送女留其送馬謙不敢自安三月廟見遣使反馬髙固遂與叔姬俱寧故經傳具見以示譏音義廟見賢遍反下同使所吏反疏正義曰禮送女適於夫氏留其所送之馬謙不敢自安於夫若被出棄則将乘之以歸故留之也至三月廟見夫婦之情既固則夫家遣使反其所留之馬以示與之偕老不復歸也法當遣使不合親行髙固因叔姬歸寧遂親自反馬與之俱來故經傳具見其事以示譏也儀禮昬禮者士之禮也其禮無反馬故何休據之作膏肓以難左氏言禮無反馬之法鄭𤣥答之曰冠義云無大夫冠禮而有其昬禮則昬禮者天子諸侯大夫皆異也士昬禮云主人爵弁纁裳緇衣乘墨車從車二乘婦車亦如之此婦車出於夫家則士妻始嫁乘夫家之車也詩鵲巢云之子于歸百兩御之又曰之子于歸百兩将之将送也國君之禮夫人始嫁自乘其家之車也則天子諸侯嫁女留其乘車可知也髙固大夫也來反馬則大夫亦留其車也禮雖散亡以詩之義論之大夫以上其嫁皆有留車反馬之禮留車妻之道也反馬壻之義也髙固以秋九月來逆叔姬冬來反馬則婦入三月祭行乃反馬禮也是説禮有反馬之法唯髙固不宜親行耳杜言三月廟見謂無舅姑者士昬禮婦至其夕成昬質明贊見婦於舅姑若舅姑既沒則婦入三月乃奠菜鄭𤣥云奠菜者祭菜也又記曰婦入三月然後祭行鄭𤣥云謂助祭也曾子問篇端稱孔子曰三月而廟見稱來婦也擇日而祭於禰成婦之義也鄭𤣥云謂舅姑沒者也是舅姑沒者以三月而祭因以三月為反馬之節舅姑存者亦當以三月反馬也士昬禮又稱若不親迎則婦入三月然後壻見於妻之父母此髙固親迎則不須更見故譏其親反馬也案杜注經云叔姬寧固反馬傳唯舉反馬不言寧者以寧是常事唯反馬非禮故傳舉其非禮者楚子伐鄭陳及楚平晉荀林父救鄭伐陳注為明年晉衛侵陳傳經六年春晉趙盾衛孫免侵陳夏四月秋八月螽注無傳冬十月傳六年春晉衛侵陳陳即楚故也夏定王使子服求后于齊注子服周大夫秋赤狄伐晉圍懷及邢丘注邢丘今河内平臯縣晉侯欲伐之中行桓子曰使疾其民注驕則數戰為民所疾音義數所角反以盈其貫将可殪也注殪盡也貫猶習也音義貫古患反注同殪於計反疏正義曰釋詁云貫習也殪死也言其死盡故以殪為盡盈其貫者杜以為盈滿其心使貫習來伐劉炫云案尚書泰誓武王數紂之惡云商罪貫盈言紂之為惡如物在繩索之貫不得為習也今知不然者以詩稱射則貫兮先儒亦以為習故杜用焉義得兩通劉直以尚書之文而規杜過恐非也周書曰殪戎殷注周書康誥也義取周武王以兵伐殷盡滅之疏正義曰如杜所注戎訓為兵謂以兵伐殷而殪盡也殪字宜在下以周書本文故其字在上此類之謂也注為十五年晉滅狄傳音義為于偽反下注同冬召桓公逆王后于齊注召桓公王卿士事不闗魯故不書為成三年王甥舅張本音義召上照反楚人伐鄭取成而還注九年十一年傳所稱厲之役蓋在此鄭公子曼滿與王子伯廖語欲為卿注二子鄭大夫音義曼音萬廖力彫反伯廖告人曰無徳而貪其在周易豐注離下震上豐之離注豐上六變而為純離也周易論變故雖不筮必以變言其義豐上六曰豐其屋蔀其家闚其户闃其無人三嵗不覿凶義取無徳而大其屋不過三嵗必滅亡音義蔀歩口反又普口反闚又規反闃舌鵙反覿徒歴反疏正義曰豐卦震上離下震為動離為明動而益明豐大之義豐卦上六變而為純離之卦故為豐之離也杜以筮得此卦爻變而為彼卦可言遇觀之否遇坤之比耳此直口語不是揲蓍而亦言豐之離者周易論變為義故雖不筮論易者必以變言其義故言豐之離也杜又引豐上六至不覿凶皆周易之文也王弼以為上六以隂處極而最在外不履於位深自幽隠絶跡深藏者也蔀者覆彰之物也豐大其屋又彰蔽其家闇之甚也以甚闇而處大屋不能久享其利其屋雖大其室将空故闚其户而闃然無人也經三嵗而不能顯見則凶伯廖引此者義取無徳而居乃屋不過三嵗必滅亡弗過之矣注不過三年間一嵗鄭人殺之音義間間厠之間經七年春衛侯使孫良夫來盟疏正義曰文二年晉人以公不朝使陽處父盟公以恥之書曰及晉處父盟去其族以厭恥也然則公與大夫對盟則為恥辱此良夫來盟無貶責者彼公親朝晉晉侯不與公盟故遣大夫敵公是為恥辱此不貶責者其君不得親來遣臣來與公盟不對彼君非為恥也夏公㑹齊侯伐萊注傳例曰不與謀也萊國今東萊黄縣音義萊音來不與音預秋公至自伐萊注無傳大旱注無傳書旱而不書雩雩無功或不雩冬公㑹晉侯宋公衛侯鄭伯曺伯于黑壤音義壤如丈反傳七年春衛孫桓子來盟始通且謀㑹晉也注公即位衛始脩好音義好呼報反夏公㑹齊侯伐萊不與謀也凡師出與謀曰及不與謀曰㑹注與謀者謂同志之國相與講議利害計成而行之故以相連及為文若不獲已應命而出則以外合為文皆據魯而言師者國之大事存亡之所由故詳其舉動以例别之音義不與音預下及注與謀同年末不與放此應應對之應别彼列反下注同疏正義曰釋例曰與謀者同志之國彼我之計未定相與共謀講議利害計成而後行之故以相連及為文不與謀而出師者謂不得已而應命故以外合為文皆據魯而言之也公親㑹齊侯伐萊而傳以師出示例所以通卿大夫帥師者也魯既春㑹于曺以謀伐鄭夏遂起師而更從不與謀之文者厲公簒大子忽之位謀而納之非正故諱不與謀之例若夫盟主之令則上行乎下非匹敵和成之類故雖或先謀皆從不與謀之例成八年晉士爕來聘且言将伐郯下云㑹伐郯是也凡乞師者深求過理之辭執謙以偪成其計故雖小國乞之於火國太國乞之於小國亦皆從不與謀之例臧宣叔郤錡是也傳以師出為例是唯繫於戰伐而劉賈許穎濫以經諸及字為義本不在例今欲强合之所以多相錯亂也杜言小乞大大乞小者僖二十六年公子遂如楚乞師成二年臧宣叔如晉乞師是小國乞於大國也成十三年郤錡來乞師十六年欒黶來乞師十七年荀罃來乞師十八年士魴來乞師是大國乞於小國也與謀者心俱欲伐彼此同謀乞師者非彼所欲乞來為己也我乞彼者彼不與我謀彼乞我者我不與彼謀是故凡言乞者皆從不與謀之例宣叔是小乞大郤錡是大乞小除晉乞魯以外更無大乞小者故舉郤錡以辨乞小之事耳晉是盟主自是上行乎下例無與謀之文不由郤錡乞師乃從不與謀之例赤狄侵晉取向隂之禾注此無秋字蓋闕文晉用桓子謀故縱狄音義向舒亮反疏正義曰苖秀乃名為禾夏則無禾可取知此取必在秋此無秋字蓋闕文鄭及晉平公子宋之謀也故相鄭伯以㑹冬盟于黒壤王叔桓公臨之以謀不睦注王叔桓公周卿士銜天子之命以監臨諸侯不同歃者尊卑之别也音義相息亮反歃所洽反又所甲反監古衘反晉侯之立也注在二年公不朝焉又不使大夫聘晉人止公于㑹盟于黄父公不與盟以賂免注黄父即黒壤故黒壤之盟不書諱之也注慢盟主以取執止之辱故諱之疏正義曰昭十三年公㑹劉子晉侯云于平丘八月甲戌同盟于平丘公不與盟於時晉以讒慝𢎞多不與公盟公不得與非國之恥故書其同盟而顯言不與此時公實有罪為晉所執不得與盟是公之恥故諱而不書其盟若言諸侯實不盟公無所可與然經八年春公至自㑹注無傳義與五年書過同疏正義曰被執不以為恥而亦告廟飲至故書之以示過也故杜云義與五年書過同夏六月公子遂如齊至黄乃復注無傳蓋有疾而還大夫受命而出雖死以尸将事遂以疾還非禮也疏正義曰下言其卒故疑有疾而還也聘禮曰賔入竟而死遂也若賔死未将命則既歛于棺造于朝介将命哀十五年傳曰有朝聘而終以尸将事之禮是入所聘之竟則當遂行黄是齊竟遂以疾還非禮也辛巳有事于大廟仲遂卒于垂注有事祭也仲遂卒與祭同日略書有事為繹張本不言公子因上行還間無異事省文從可知也稱字時君所嘉無義例也垂齊地非魯竟故書地音義太音泰傳同為于偽反省所景反竟音境疏正義曰有事祭也者謂禘祭也釋例以昭十五年有事于武宫傳稱禘于武公則知此言有事亦是禘也祭之日仲遂卒不言禘而略言有事者禘事得常不主書禘為下繹祭張本耳上言公子遂如齊此言仲遂卒不言公子者此書有事為仲遂卒而書之與上相連猶是一事因上行還間無異事省公子之文從可知也衛氏難杜云其間有辛巳有事于大廟何得為間無異事秦氏釋云有事于大廟是為仲遂卒起文只是一事故云間無異事也既不稱公子而稱仲遂者時君所嘉寵故稱其字非義例也定五年傳季平子行東野卒于房房是魯地卒于竟内故不書其地垂是齊地非魯竟故書地也壬午猶繹萬入去籥注繹又祭陳昨日之禮所以賔尸萬舞名籥管也猶者可止之辭魯人知卿佐之喪不冝作樂而不知廢繹故内舞去籥惡其聲聞音義去起吕反注及傳同籥羊略反管音館惡烏路反聲聞音問又如字疏正義曰繹又祭釋祭文孫炎云祭之明日尋繹復祭也公羊傳曰繹者何祭之明日也榖梁傳云繹者祭之旦日之享賔也天子諸侯謂之為繹少牢饋食大夫之禮也謂之賔尸釋詁云繹陳也是陳昨日之禮以賔敬此尸也公羊傳曰萬者何干舞也籥者何籥舞也其言萬入去籥何去其有聲者不廢其無聲者知其不可而為之也猶者何通可以已也是萬為舞名禮明堂位曰朱干玉戚冕而舞大武干楯也戚斧也此舞者左手執楯右手執斧故謂之武舞言王者以萬人服天下故以萬為名詩言碩人之舞云左手執籥右手秉翟鄭𤣥云籥如管六孔何休云吹之以節舞也故吹籥而舞謂之文舞魯人知卿佐之喪不宜作樂故去其有聲而不知廢繹納舞去籥惡其聲聞也尋杜注意直云萬舞名以注隠五年亦直云萬舞也下問羽數則萬是舞之大名不取公羊萬是干舞之義則執羽吹籥是為萬舞故杜云納舞去籥惡其聲聞是無干舞籥舞之别名也沈氏云案曾子問嘗禘郊社簠簋既陳天子崩后之喪廢則卿喪不廢正祭繹是又祭為輕故當廢之戊子夫人嬴氏薨注無傳宣公母也晉師白狄伐秦楚人滅舒蓼秋七月甲子日有食之既注無傳月三十日食冬十月己丑葬我小君敬嬴注敬諡嬴姓也反哭成喪故稱葬小君疏正義曰諡法夙夜敬事曰敬雨不克葬庚寅日中而克葬注克成也疏正義曰定十五年九月丁巳葬我君定公雨不克葬戊午日下乃克葬彼云乃此云而者公羊傳曰而者何難也乃者何難也曷為或言而或言乃乃難乎而也何休云難者臣子重難不得以正日葬其君言乃者内而深言而者外而淺下日昳久故言乃左氏無傳杜又不説或如公羊之言或是史家異辭城平陽注今泰山有平陽縣楚師伐陳傳八年春白狄及晉平夏㑹晉伐秦注經在仲遂卒下從赴晉人獲秦諜殺諸絳市六日而蘇注蓋記異也音義諜徒協反間也今謂之細作絳古巷反有事于太廟襄仲卒而繹非禮也楚為衆舒叛故伐舒蓼滅之注舒蓼二國名音義為于偽反疏正義曰舒蓼二國名者蓋轉寫誤當云一國名案釋例土地名有舒羣舒舒蓼舒庸舒鳩以為五名則與文五年烕蓼同蓋蓼滅後更復故楚今更滅之劉炫以杜為一國而規之非也楚子疆之注正其界也音義疆居良反及滑汭注滑水名音義滑于八反汭如蛻反一音如悦反盟呉越而還注呉國今呉郡越國今㑹稽山隂縣也傳言楚疆呉越服從音義㑹古外反稽古兮反疆其良反疏止義曰譜云呉姬姓周大王之子大伯仲雍之後大伯仲雍讓其弟季歴而去之荆蠻自號句呉句或為工夷言發聲也大伯無子而卒仲雍嗣之當武王克殷而因封其曽孫周章於呉為呉子又别封章弟虞仲於虞自大伯五世而得封十二世而晉滅虞虞滅而呉始大至夀夢而稱王夀夢以上世數可知而不紀其年夀夢元年魯成公之六年也夫差十五年獲麟之嵗也二十三年魯哀公之二十二年而越滅呉越姒姓其先夏后少康之庶子也封於㑹稽自號於越於者夷言發聲也濵在南海不與中國通後二十餘世至於允常魯定公五年始伐呉允常卒子句踐立是為越王越王元年魯定公之十四年也魯哀公二十二年句踐滅呉霸中國卒春秋後七世大為楚所破遂㣲弱矣外傳曰芈姓歸越是越本楚之别封也或非夏后之後也晉胥克有蠱疾注惑以喪志音義蠱音古喪息浪反郤缺為政注代趙盾秋廢胥克使趙朔佐下軍注朔盾之子代胥克為成十七年胥童怨郤氏張本冬葬敬嬴旱無麻始用葛茀注記禮變之所由茀所以引柩殯則有之以備火葬則以下柩音義茀方勿反引棺索也柩其又反疏正義曰禮記諸言自某始者皆與後人為始此云始用葛茀則自此以後常用葛故云記禮變之所由茀字禮或作茀或作綍繩之别名也周禮遂人大喪屬六紼天子用六也喪大記君葬用四紼大夫士葬用二紼是紼者所以引柩也於殯則已有之繫於輴車以備火災有災則引柩以辟火及葬則用之以下柩也雨不克葬禮也禮卜葬先逺日辟不懷也注懷思也疏正義曰曲禮云凡卜筮日旬之外曰逺某日旬之内曰近某日喪事先逺日吉事先近日鄭𤣥云喪事葬與練祥也吉事祭祀冠娶之屬也然則先近日先卜上旬不吉卜次旬又不吉卜下旬喪事則先卜下旬卜葬先卜逺日辟不思念其親似欲汲汲而早葬之也今若冐雨而葬亦是不思其親欲得早葬故舉卜葬先逺日以證為雨而止禮也王制云庶人葬不為雨止者鄭𤣥云雖雨猶葬禮儀少也城平陽書時也陳及晉平楚師伐陳取成而還注言晉楚爭强經九年春王正月公如齊注無傳公至自齊注無傳夏仲孫蔑如京師齊侯伐萊注無傳秋取根牟注根牟東夷國也今琅邪陽都縣東有牟鄉八月滕子卒注未同盟九月晉侯宋公衛侯鄭伯曹伯㑹于扈晉荀林父帥師伐陳辛酉晉侯黒臀卒于扈注卒於竟外故書地四與文同盟九月無辛酉日誤音義竟音境疏正義曰釋例扈是鄭地故云卒於竟外黒臀以二年始立而云四與文同盟者杜注春秋又為釋例前後經傳勘當備盡豈晉侯二年始立不于文公之世而云四與文同盟必是後寫之誤蘇氏亦以為然劉炫以此規杜非也其君卒或書地或不書地皆從赴今云卒於竟外故書地者晋侯實在竟外卒非以為例也劉炫云襄七年鄭伯髠頑卒于鄵昭二十五年宋公佐卒于曲棘竟内亦書地非竟外九月無辛酉者下有十月癸酉杜以長歴推之癸酉是十月十六日辛酉在前十二日耳故云九月無辛酉上有八月下有十月非月誤也冬十月癸酉衛侯鄭卒注無傳三與文同盟疏正義曰鄭父燬以僖二十五年卒鄭代立其年盟于洮二十六年于向二十八年于踐土文七年于扈十四年于新城唯二與文同盟云三者以二三字體相近轉冩之誤耳若其不然杜無容不委劉炫以此規杜非也宋人圍滕楚子伐鄭晉郤缺帥師救鄭陳殺其大夫洩冶注洩冶直諫於淫亂之朝以取死故不為春秋所貴而書名音義洩息列反冶音也疏正義曰文八年宋人殺其大夫司馬貴之而不名此書洩冶之名是不為春秋所貴故書名傳稱臣者所以治煩去惑是以伏死而争則直諫者臣之盡忠之事洩冶忠諫而死不為春秋所貴者釋例曰魯哀之可諫者甚衆未聞仲尼之苦言至於陳恒弑其君孔子沐浴而朝告於哀公求討不義顯事施舍足以致益者固人臣之所當造膝也若乃情色之惑君不能得之於臣父不能得之於子臣子而欲顯直於其君父適所以益謗而致罪也陳靈公宣淫悖徳亂倫志同禽獸非盡言所救洩冶進無匡濟逺策退不危行言孫安昏亂之朝慕匹夫之直忘蘧氏可卷之徳死而無益故經同罪賤之文傳特稱仲尼以明之忠為令徳非其人猶不可況不令乎此其義也是説不貴洩冶之意也然則比干諫紂而死孔子稱殷有三仁焉善比干者家語云子貢曰陳靈公君臣宣淫於朝洩冶諫而殺之是與比干諌死同可謂仁乎孔子曰比干於紂親則諸父官則少師忠欵之心在於存宗廟而已固當以必死爭之冀身死之後紂當悔悟本志存於仁者也洩冶之於靈公位在大夫無骨肉之親懷寵不去仕於亂朝以區區之身欲止一國之淫昏死而無益可謂狷矣詩云民之多辟無自立辟其洩冶之謂乎是洩冶之行不得同於比干之意也傳九年春王使來徴聘注徴召也言周徴也徴聘不書㣲加諷諭不指斥音義諷芳鳳反夏孟獻子聘於周王以為有禮厚賄之音義賄呼罪反字林音悔秋取根牟言易也音義易以䜴反滕昭公卒注為宋圍滕傳㑹于扈討不睦也注謀齊陳陳侯不㑹注前年與楚成故晉荀林父以諸侯之師伐陳注不書諸侯師林父帥之無將師音義將子匠反帥所類反疏正義曰僖二十八年晉侯齊師宋師秦師及楚人戰于城濮彼註云宋公齊國歸父秦小子憗既次城濮以師屬晉不與戰也彼以師屬晉而經書其師此全不書者彼雖公卿不行仍存大夫帥之將卑師衆故稱師耳此則全無將帥以兵付晉并入晉軍林父獨自帥之故唯書林父伐陳也晉侯卒于扈乃還冬宋人圍滕因其喪也陳靈公與孔寧儀行父通於夏姬皆衷其衵服以戯于朝注二子陳卿夏姬鄭穆公女陳大夫御叔妻􅇆懷也衵服近身衣音義夏户雅反𠂻音忠王下仲反衵女乙反一音汝栗反説文云日日所衣裳也字林同又云婦人近身内􅐍也仁一反御如字一音魚吕反近附近之近洩冶諫曰公卿宣淫民無効焉注宣示也音義効户教反且聞不令君其納之注納藏衵服音義聞如字一音問公曰吾能改矣公告二子二子請殺之公弗禁遂殺洩冶孔子曰詩云民之多辟無自立辟其洩冶之謂乎注辟邪也辟法也詩大雅言邪辟之世不可立法國無道危行言孫音義禁居鴆反又音金多辟本又作僻匹亦反注同立辟婢亦反注同邪似嗟反下同行下孟反孫音遜楚子為厲之役故伐鄭注六年楚伐鄭取成於厲既成鄭伯逃歸事見十一年音義為于偽反見賢遍反晉郤缺救鄭鄭伯敗楚師于柳棼注柳棼鄭地音義柳力手反棼扶云反國人皆喜唯子良憂曰是國之災也吾死無日矣注自是晉楚交兵伐鄭十二年卒有楚子入鄭之禍經十年春公如齊公至自齊注無傳齊人歸我濟西田注元年以賂齊也不言來公如齊因受之音義濟子禮反夏四月丙辰日有食之注無傳不書朔官失之己巳齊侯元卒注未同盟而赴以名齊崔氏出奔衛注齊略見舉族出因其告辭以見無罪音義見賢遍反下同疏正義曰崔杼有寵於惠公惠公既薨高國二家恐其藉前世之寵又有寵於新君故畏其偪已因君薨而逐之崔杼未有罪也齊人疑其事故不言其名略言崔氏見其舉族出奔耳及仲尼脩之大夫出奔無罪不名不名即是無罪故因告稱氏而書氏以見無罪若貴之或稱官或稱字如司城子哀之類是也公如齊五月公至自齊注無傳癸巳陳夏徴舒弑其君平國注徴舒陳大夫也靈公惡不加民故稱臣以弑音義夏戸雅反六月宋師伐滕公孫歸父如齊葬齊惠公注無傳歸父襄仲之子晉人宋人衛人曹人伐鄭注鄭及楚平故秋天王使王季子來聘注王季子者公羊以為天王之母弟然則字季子天子大夫稱字疏正義曰公羊傳曰王季子者何天子之大夫也其稱王季子何貴也其貴柰何母弟也是公羊以為天王之母弟也母弟而稱季子然則字季子也天子大夫例稱字襄三十年天王殺其弟佞夫母弟稱弟此不言王弟者釋例云朝聘盟㑹嘉好之事此兄弟之篤睦非義例之所興故仍舊史之策或稱弟或稱公子是由義無所見故因其舊文其相殺害乃稱弟以示義耳公孫歸父帥師伐邾取繹注繹邾邑魯國鄒縣北有繹山音義繹音亦疏正義曰文十三年傳稱邾遷于繹則繹為邾之都矣更别有繹邑今魯仍取之非取邾之都也亦因繹山為名蓋近在邾都之旁耳大水注無傳季孫行父如齊冬公孫歸父如齊齊侯使國佐來聘注既葬成君故稱君命使也饑注無傳有水災嘉榖不成楚子伐鄭傳十年春公如齊齊侯以我服故歸濟西之田注公比年朝齊故夏齊惠公卒崔杼有寵于惠公髙國畏其偪也注髙國二家齊正卿音義杼直吕反偪彼力反公卒而逐之奔衛書曰崔氏非其罪也且告以族不以名注典䇿之法告者皆當書以名今齊特以族告夫子因而存之以示無罪又言且告以族不以名者明春秋有因而用之不皆改舊史疏正義曰傳言且告以族不以名知法當以名告而齊人誤以族告也釋例云乃若稱司城以貴效節於府人書歸父之還以善復命於介因齊人告辭以著其無罪蓋隨事以示褒貶也傳既云書曰崔氏以明非罪復云且告以族不以名知典策之書舊當以名通也齊國雖繆以族告適合仲尼新褒之實因而不革以示無罪且明春秋之作或因仍舊史成文不必皆有改也何休膏肓以為公羊譏世卿而難左氏蘇氏釋云崔杼祖父名不見經則知非世卿且春秋之時諸侯擅相征伐猶尚不譏世卿雖曰非禮夫子何由獨責又鄭駁異義引尚書世選爾勞又引詩刺幽王絶功臣之世然則興滅繼絶王者之常譏世卿之文其義何在凡諸侯之大夫違注違奔放也疏正義曰釋例曰迫窘而奔及以禮見放俱去其國故傳通以違為文是言違兼奔放也告于諸侯曰某氏之守臣某注上某氏者姓下某名音義守手又反疏正義曰若言崔氏之守臣杼也大夫受氏當世守宗廟故謂之守臣言守宗廟之臣也僖十二年管仲云天子之二守髙國在彼謂天子命之為守國之臣與此異也知此異於彼者蓋天子命者出奔乃得告於諸侯餘臣出奔不得告也且下句云失守宗廟知守臣謂守宗廟之臣非守國也天子賜姓諸侯賜族對文則姓與族别散又則可以通禮謂族人為庶姓故云上某氏者姓其實正是族也失守宗廟敢告所有玉帛之使者則告注玉帛之使謂聘音義之使所吏反疏正義曰聘禮執玉致命執帛致享故云玉帛之使謂聘也下註云恩好不接故亦不告又昭二十年曹公孫㑹自鄸出奔宋注云嘗有玉帛之使來告故書則杜意以為奔者之身嘗有玉帛之使於彼國已經相接則告之若奔者未嘗往聘恩好不接則不告唯告奔者嘗聘之國餘不告也劉炫以為玉帛之使謂國家有交好之國皆告非指奔者之一身不然則否注恩好不接故亦不告音義好呼報反公如齊奔喪注公親奔喪非禮也公出朝㑹奔喪㑹葬皆書如不言其事史之常也陳靈公與孔寧儀行父飲酒于夏氏公謂行父曰徴舒似女對曰亦似君徴舒病之注靈公即位於今十五年徴舒已為卿年大無嫌是公子蓋以夏姬淫放故謂其子多似以為戯音義夏户雅反女音汝公出自其廐射而殺之二子奔楚音義廐居又反射食亦反滕人恃晉而不事宋六月宋師伐滕鄭及楚平注前年敗楚師恐楚深怨故與之平諸侯之師伐鄭取成而還秋劉康公來報聘注報孟獻子之聘即王季子也其後食采於劉師伐邾取繹注為子家如齊傳季文子初聘于齊注齊侯初即位冬子家如齊伐邾故也注魯侵小恐為齊所討故往謝國武子來報聘注報文子也楚子伐鄭晉士㑹救鄭逐楚師于潁北注潁水出河南陽城至下蔡入淮疏正義曰釋例曰潁水出河南陽城縣陽乾山東南經潁川汝隂至淮南下蔡縣入淮也諸侯之師戍鄭鄭子家卒鄭人討幽公之亂斵子家之棺而逐其族注以四年弑君故也斵薄其棺不使從卿禮音義斵竹角反疏正義曰喪大記云君大棺八寸屬六寸椑四寸上大夫大棺八寸屬六寸下大夫大棺六寸屬四寸士棺六寸然則子家上大夫棺富八寸今斵薄其棺不使從卿禮耳不知斵薄之使從何禮也改葬幽公諡之曰靈疏正義曰諡法動靜亂常曰幽經十有一年春王正月夏楚子陳侯鄭伯盟于辰陵注楚復伐鄭故受盟也辰陵陳地潁川長平縣東南有辰亭音義復扶又反下復封陳同公孫歸父㑹齊人伐莒注無傳秋晉侯㑹狄于欑函注晉侯往㑹之故以狄為㑹主欑函狄地音義欑才端反函音咸疏正義曰凡諸侯聚㑹魯不與者皆歴序諸國云㑹于某地上盟于辰陵即其事也狄從諸夏序例亦然僖二十年齊人狄人盟于刑是也此異於彼而云晉侯㑹狄是狄在彼地晉往㑹之故𫝊説晉大夫欲召狄郤成子勸其勤是晉侯自往故以狄為㑹主成十五年㑹呉于鍾離襄十年㑹呉于柤其意與此同冬十月楚人殺陳夏徴舒注不言楚子而稱人討賊辭也疏正義曰討賊辭者言弑君之賊人人皆欲殺之作舉國共殺之文故不言楚子也襄二十七年衛殺其大夫寗喜亦是討賊但衛人自殺其臣故稱大夫徴舒非楚之臣不得言殺其大夫諸放殺及執他國之臣皆不言某國大夫者以人臣卑賤故沒其爵號而空書名氏丁亥楚子入陳注楚子先殺徴舒而欲縣陳後得申叔時諫乃復封陳不有其地故書入在殺徴舒之後疏正義曰案傳楚子為陳討夏氏亂遂入陳殺夏徴舒轘諸栗門此經先書殺夏徴舒後書入陳者據先後事實為文故杜注云楚子先殺徴舒而欲縣陳後得申叔時諫乃復封陳不有其地故書入陳在殺徴舒之後是其事也劉炫云楚子入陳乃殺徴舒經先書殺徴舒後言入陳者以楚子本意止欲討賊無心滅陳及殺徴舒滅陳為縣後得申叔時諫乃復封陳於例不有其地故云入陳言楚人既殺徴舒楚子乃復入陳納二子於陳入陳之文為下納張本傳言書曰入陳納公孫寧儀行父于陳書有禮也入納連文是入為納也昭八年楚師滅陳執公子招放于越殺陳孔奐彼心欲滅陳此則主為討賊無心滅陳而復封之君子善其自悔故退入陳於下隠其縣陳之過若其不然當云楚子入陳殺夏徴舒如此則楚子本為入陳因入方討陳賊則是惡楚子故書入在殺徴舒之後納公孫寧儀行父于陳注二子淫昬亂人也君弑之後能外託楚以求報君之讎内結强援於國故楚莊得平歩而討陳除弑君之賊於時陳成公播蕩於晉定亡君之嗣靈公成喪賊討國復功足以補過故君子善楚復之音義播補賀反蕩如字疏正義曰二子與君淫昬致使君死國亂實罪人也今楚子入陳而納之乃是納罪人也例應罪楚子而傳言書曰入陳納公孫寧儀行父于陳書有禮也既善楚子有禮則是恕彼之過故杜迹其合恕之由言賊討國復是二子之力其功足以補過故君子善楚復之賈逵云二子不繫之陳絶於陳也惡其與君淫故絶之善楚有禮也案子紏㨗菑皆不繫國自是例之常賈説非也釋例云賈氏依放榖梁云稱納者内難之辭納公孫寧儀行父于陳言書有禮不可言内難也陳縣而見復上下交驩二人雖有淫縱之闕今道楚匡陳賊討君葬威權方盛傳稱其禮理無所難此先儒説之不安也杜言於時陳成公播蕩於晉者此傳云陳侯在晉襄二十五年傳云夏氏之亂成公播蕩是也傳十一年春楚子伐鄭及櫟子良曰晉楚不務徳而兵爭與其來者可也晉楚無信我焉得有信乃從楚夏楚盟于辰陵陳鄭服也注傳言楚與晉狎主盟音義櫟力狄反爭爭鬬之爭焉於䖍反夏楚盟本或作楚子楚左尹子重侵宋注子重公子嬰齊莊王弟王待諸郔注郔楚地音義郔音延令尹蒍艾獵城沂注艾獵孫叔敖也沂楚邑音義艾五蓋反獵力劣反沂魚依反疏正義曰服䖍亦云艾獵蒍賈之子孫叔敖也此年云令尹蒍艾獵明年云令尹孫叔敖明一人也世本艾獵為叔敖之兄世本多誤本必不然使封人慮事注封人其時主築城者慮事謀慮計功音義慮如字一音力於反廣雅云無慮都邑也疏正義曰周禮封人凡封國封其四疆造都邑之封域者亦如之大司馬大役與慮事受其要以待考而賞誅鄭𤣥云慮事者封人也於有役司馬與之屬賦丈尺與其用人數也是封人主造城邑計度人數此云使封人故云其時主築城者慮事者謀慮城築之事無則慮之訖則計功也史書多有無慮之語皆謂揆度前事也以授司徒注司徒掌役量功命日注命作日數分財用注財用築用具平板幹注幹楨也音義幹古旦反亦作幹楨音貞疏正義曰釋詁云楨幹楨也舍人曰楨正也築墻所立兩木也幹所以當墻兩邊鄲土者也彼楨為幹故為幹為楨謂墻之兩頭立木也板在兩旁即鄣土者即彼丈幹也平板幹者等其髙下使城齊也稱畚築注量輕重畚盛土器音義畚音本盛音成程土物注為作程限音義為于偽反又如字疏正義曰畚者盛土之器築者築土之杵司馬法輦車所載二築是也稱畚築者量其輕重均負土與築者之力也程土物謂鍬钁畚轝之屬為作程限備豫也議逺邇注均勞逸略基趾注趾城足略行也音義趾音止行下孟反具餱糧注餱乾食也音義餱音侯糧音良乾食如字一音嗣本或作乾飯度有司注謀監主音義度待洛反監古銜反事三旬而成注十日為旬不愆于素注不過素所慮之期也傳言叔敖之能使民音義愆起䖍反晉郤成子求成于衆狄衆狄疾赤狄之役遂服于晉注赤狄潞氏最强故服役衆狄音義潞音路秋㑹于欑函衆狄服也是行也諸大夫欲召狄郤成子曰吾聞之非徳莫如勤非勤何以求人能勤有繼其從之也注勤則功繼之詩曰文王既勤止注詩頌文王勤以創業音義創初亮反文王猶勤况寡徳乎冬楚子為陳夏氏亂故伐陳注十年夏徴舒弑君音義為于偽反謂陳人無動将討於少西氏注少西徴舒之祖子夏之名音義少詩照反疏正義曰禮以王父字為氏徴舒以夏為氏知子夏是字少西是名言少西氏者氏猶家也言将討少西之家遂入陳殺夏徴舒轘諸栗門注轘車裂也栗門陳城門音義轘音患因縣陳注滅陳以為楚縣陳侯在晉注靈公子成公午申叔時使于齊反復命而退王使讓之曰夏徴舒為不道殺其君寡人以諸侯討而戮之疏正義曰經無諸侯而云以諸侯討之諸侯皆慶者時有楚之屬國從行也十二年邲之戰經不書唐而傳云唐侯為左拒昭十七年長岸之戰經不書隨而傳言使隨人守舟明此時亦有諸侯但為楚私屬不以告耳諸侯縣公皆慶寡人注楚縣大夫皆僣稱公音義使所吏反僣子念反女獨不慶寡人何故對曰猶可辭乎王曰可哉曰夏徴舒弑其君其罪大矣討而戮之君之義也抑人亦有言曰牽牛以蹊人之田注抑辭也蹊徑也音義女音汝蹊音兮徑古定反而奪之牛牽牛以蹊者信有罪矣而奪之牛罰己重矣諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉吾未之聞也反之可乎曰吾儕小人所謂取諸其懐而與之也注叔時謙言小人意淺謂譬如取人物於其懷而還之為愈於不還音義儕仕皆反輩也乃復封陳鄉取一人焉以歸謂之夏州注州鄉屬示討夏氏所獲也音義復扶又反夏户雅反疏正義曰謂之夏州者討夏氏鄉取一人以歸楚而成一州故謂之夏州故書曰楚子入陳納公孫寧儀行父于陳書有禮也注沒其縣陳本意全以討亂存國為文善其得禮疏正義曰言入陳納人為有禮也直言入陳納人是沒其縣陳本意言陳國見存入而納此人耳是全以討亂存國為文所以善其得禮厲之役鄭伯逃歸注蓋在六年自是楚未得志焉鄭既受盟于辰陵又徼事于晉注為明年楚圍鄭傳十年鄭及楚平既無其事辰陵盟後鄭徼事晉又無端跡傳皆特發以明經也自厲之役鄭南北兩屬故未得志九年楚子伐鄭不以黒壤興伐逺稱厲之役者志恨在厲役此皆傳上下相包通之義也音義徼古堯反疏正義曰十年鄭及楚平既無其事謂經無之也鄭徼事晉又無端跡亦謂經所無也傳若不發此語不知楚以何故明年忽然圍鄭為此特發此傳以明後年圍鄭之經也自厲役以來鄭南北兩屬不專心於楚故楚未得志而明年圍之七年晉為黒壤之㑹鄭伯在焉厲役在黒壤之前九年傳言楚子為厲之役故伐鄭事在黒壤之後而彼傳不以黒壤興伐而逺稱厲之役者楚子之志所恨在於厲役逃歸不為黒壤㑹晉故也上指厲下指辰陵中包黒壤此皆傳上下相包通之義也春秋左傳注疏卷二十二春秋左氏傳注疏卷二十二考證齊高固來逆叔姬臣召南按公榖經文叔姬上有子字又按榖梁傳曰諸侯之嫁子於大夫主大夫以與之來者接内也不正其接内故不與夫婦之稱也杜注不書女歸降於諸侯蓋用其説傳楚人伐鄭注九年十一年傳所稱厲之役蓋在此趙汸補注曰楚比年伐鄭惟此年傳記取成而還故杜氏以厲之役在此傳蓋有闕臣召南按九年傳曰楚子為厲之役故伐鄭杜注六年楚伐鄭取成于厲既成鄭伯逃歸十一年傳曰厲之役鄭伯逃歸自是楚未得志焉杜注蓋在六年傳所稱楚人伐鄭取成而還也此傳既曰取成而還鄭伯又何至于逃歸乎杜注前後皆言蓋蓋者疑辭也衛侯使孫良夫來盟疏文二年晉人以公不朝一段監本誤刻於公㑹齊侯伐萊注下今改正傳故黑壤之盟不書諱之也趙汸補注曰説者多以沙隨平邱不諱駁此傳為妄今知不妄者宣公恃齊而不事晉於是見止而以賂免其恥在内故諱之臣浩按傳既曰不書諱之則舊史已無其文非孔子始為隱諱也壬午猶繹萬入去籥疏去其有聲者不廢其無聲者監本脱不字今添傳楚為衆舒叛故伐舒蓼滅之注舒蓼二國名疏當云一國名趙汸補注曰經傳記舒庸舒鳩皆冠以舒故釋例知此舒蓼亦是其類孔疏謂注言二國為轉寫誤也得之文五年傳記楚子燮滅蓼不冠以舒者别是蓼國臯陶之後亦如文十六年滅庸與舒庸無與也孔氏併文五年所滅之蓼與此年舒蓼為一則又誤矣又疏土地名有舒羣舒舒蓼舒庸舒鳩以為五名臣召南按文十二年傳羣舒叛楚正義引世本云舒庸舒蓼舒鳩舒龍舒鮑舒龔則是有六舒矣此云五舒當是不數舒龔也此疏舒羣舒羣字誤應作舒龍舒鮑各本俱誤耳臣照按疏云劉炫以杜為一國而䂓之非也一國當是二國孔氏意謂杜本作一國傳寫之誤乃作二劉以杜為二國而䂓之不知杜本作一也若作一國便不可解傳盟吳越而還注傳言楚彊吳越服從臣浩按吳越二國始見于傳吳之服楚始于此其抗楚亦基于此陳殺其大夫洩冶注洩冶直諫於淫亂之朝以取死故不為春秋所貴而書名萬斯大曰古今持論最不平者莫如以直諫罪洩冶冶無罪也殺之者之罪也經書殺洩冶繼書陳夏徴舒弑其君繼書楚子入陳以著為君不道而殺諫臣必至身弑國亡為後鑒也又疏臣之盡忠之事事監本訛作争今改正傳王以為有禮厚賄之賄監本訛作賂今改正傳孔子曰詩云一叚陳洙曰此非聖人之言孔子稱三仁曰比干諫而死反罪洩冶乎趙汸補注曰傳以稱國殺大夫為有罪故雖無罪見殺者必求其罪以實之杜氏遂以書名為貶非但不知經㫖亦未究史法臣召南謂洩冶不見幾早去猶可謂直諫為非忠必不可臣照按傳稱孔子曰詩云民之多辟無自立辟其洩冶之謂乎蓋哀之也非譏之也玩詩語可知且以孔父例之安知洩冶之冶仇牧之牧為非字乎傳楚子為厲之役故伐鄭注六年楚伐鄭取成於厲既成鄭伯逃歸事見十一年臣浩按監本訛作六年伐楚鄭取成於厲既成鄭伯逃歸事見十二年今以别本改正傳崔杼有寵于惠公高國畏其偪也趙汸補注曰自此至崔杼弑君凡五十一年惠公之世杼應尚幼成十七年傳言齊侯使崔杼為大夫明前此未仕故此年傳説者不取今以告以族之説推之崔氏出自丁公杼之祖若父必有嘗為卿者至杼雖未為卿其寵已足以偪高國此高國之所忌也故因惠公卒舉族出之杼未為卿故不書名實卿族也故來告書其族春秋辭從主人而世卿之失自見公羊譏世卿之説不為無所本也萬斯大曰豐氏謂氏夭二字篆文相近蓋崔夭也按僖二十八年城濮之戰左傳有齊崔夭至是凡三十四年其人宜尚存可備參考納公孫寧儀行父于陳注功足以補過故君子善楚復之臣召南按復封陳者楚莊之有禮納二子者楚莊之失刑但以能復陳國則大善當襃未暇及細過耳二子陷君於惡致國幾亡行同禽獸有何功足以補過乎杜注迂矣春秋左氏傳注疏卷二十二考證
