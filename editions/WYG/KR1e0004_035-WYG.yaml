body:
  text: 春秋左傳注疏卷三十五起襄公二十二年盡二十四年晉杜氏注唐陸徳明音義孔頴逹疏經二十有二年春王正月公至自㑹注無傳夏四月秋七月辛酉叔老卒注無傳子叔齊子冬公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于沙隨公至自會注無傳楚殺其大夫公子追舒注書名者寵近小人貪而多馬為國所患音義近附近之近傳二十二年春臧武仲如晉注公頻與晋侯外㑹念各将罷還魯之守卿遣武仲為公謝不敏故不書音義守手又反為公于僞反疏正義曰經書正月公至自㑹則武仲初發公仍未至𫝊言武仲如晋正為御叔傲使不論聘晋之意故杜原公之未歸而遣使使又不書扵經知是魯之守臣使適晋也二十六年鄭伯朝晉而歸使公孫夏謝不敏知此亦是為公謝不敏非公命故不書也服䖍云武仲非卿故不書前年傳武仲為司宼後年出奔書扵經此年不得云非卿也雨過御叔在其邑將飲酒注御叔魯御邑大夫音義過古禾反御叔魚呂反又魚據反曰焉用聖人注武仲多知時人謂之聖音義焉於䖍反知音智又如字疏正義曰周禮大司徒以鄉三物教萬民一曰六徳知仁聖義中和鄭𤣥云聖通而先識也尚書洪範云睿作聖者通識之名時人見其多知故以聖人言之非為武仲實是大聖也尚書稱惟狂克念作聖惟聖罔念作狂詩稱人之齊聖皇父孔聖母氏聖善皆非大聖也我將飲酒而已雨行何以聖為穆叔聞之曰不可使也而傲使人注言御叔不任使四方音義傲五報反使所吏反注同任音壬國之蠧也令倍其賦注古者家其國邑故以重賦為罰傳言穆叔能用教音義蠧丁故反疏正義曰周礼大司徒云凡建邦國諸公之地方五百里其食者半諸侯之地方四百里諸伯之地方三百里其食者三之一諸子之地方二百里諸男之地方百里其食四之一鄭𤣥云其食者半三之一四之一者土均均邦國地貢輕重之䒭必足其國禮俗喪紀祭祀之用乃貢其餘大國貢重正之也小國貢輕字之也此是諸侯之國貢王之差也司勲職云凡頒賞地三之一食鄭𤣥云賞地之税三分計税王食其一二全入扵臣此采邑貢王之數也然則諸侯之臣受其采邑者亦當三分之一而歸扵公故云古者家其國邑言以國邑為巳之家有貢於公者是减已而貢之故以重賦為罰言重倍其賦當以三分而二入公也夏晉人徴朝于鄭注召鄭使朝鄭人使少正公孫僑對曰注少正鄭卿官也公孫僑子産音義少詩照反注及下少牢同僑其驕反疏正義曰十九年𫝊云立子産為卿知少正是鄭之卿官名也春秋之時官名變改周禮無此名也在晉先君悼公九年我寡君於是即位注魯襄八年即位八月注即位年之八月而我先大夫子駟從寡君以朝于執事執事不禮於寡君注言朝執事謙不敢斥晉侯寡君懼因是行也我二年六月朝于楚注因朝晉不見禮生朝椘心晉是以有戲之役注在九年音義戲許宜反楚人猶競而申禮於敝邑敝邑欲從執事而懼為大尤曰晉其謂我不共有禮是以不敢􅂝貳於楚我四年三月先大夫子蟜又從寡君以觀釁於楚注實朝言觀釁飾辭也言欲徃視楚知可去否音義共音恭下共祀同釁許靳反晉於是乎有蕭魚之役注在十一年謂我敝邑邇在晉國譬諸草木吾臭味也注晉鄭同姓故而何敢差池注差池不齊一音義差初宜反又初佳反一音七何反注同池徐夲作沱直知反一音徒何反注同楚亦不競寡君盡其土實注土地所有重之以宗器注宗廟禮樂之器鐘磬之屬音義重直用反以受齊盟注齊同也遂帥羣臣隨于執事以會歳終注朝正疏正義曰言以㑹歲終則歳事終以至正月朝正也朝正二十九年𫝊文也貳於楚者子侯石盂歸而討之注石盂石􅎢音義盂音于􅎢勑略反溴梁之明年注溴梁在十六年子蟜老矣公孫夏從寡君以朝于君見於嘗酎注酒之新熟重者為酎嘗新飲酒為嘗酎音義夏戸雅反下同見賢遍反又如字酎直又反疏正義曰月令孟夏天子飲酎用禮樂鄭𤣥云酎之言醇也謂重醸之酒也春酒至此始成與羣臣以禮樂飲之扵朝正尊卑也彼言飲酎當是夏祭之後此言嘗酎謂見扵夏祭故云與執膰焉謂祭末受胙肉也與執燔焉注助祭音義與音預燔又作膰音煩祭肉也間二年聞君將靖東夏注謂二十年澶淵盟音義間間厠之間又如字四月又朝以聽事期注先澶淵二月徃朝以聼㑹期音義先悉薦反不朝之間無歳不聘無役不從以大國政令之無常國家罷病不虞荐至注荐仍也音義罷音皮荐在薦反無日不惕豈敢忘職注惕懼也音義惕他歴反大國若安定之其朝夕在庭何辱命焉注言自將徃不須来召音義朝如字若不恤其患而以為口實注口實但有其言而已疏正義曰但有徴責之言實出扵口也服䖍云實謂譴譲也其無乃不堪任命而翦爲仇讎注翦削也謂見剝削不堪命則成仇讎敝邑是懼其敢忘君命委諸執事執事實重圖之注傳言子産有辭所以免大國之討秋欒盈自楚適齊晏平仲言於齊侯曰商任之會受命於晉注受錮欒氏之命今納欒氏將安用之小所以事大信也失信不立君其圖之弗聽退告陳文子曰君人執信臣人執共忠信篤敬上下同之天之道也君自棄也弗能久矣注為二十五年齊弑其君光傳九月鄭公孫黒肱有疾歸邑于公注黑肱子張音義肱古𢎞反召室老宗人立叚注叚子石黑肱子而使黜官薄祭注黜官無多受職祭以特羊殷以少牢注四時祀以一羊三年盛祭以羊豕殷盛也疏正義曰少牢饋食禮者諸侯之大夫時祭之禮也是時祭用少牢今公孫黒肱使黜官薄祭故時祭用特羊殷祭乃少牢諸侯之大夫止用少牢而禮噐云君子大牢而祭謂之禮匹士大牢而祭謂之攘鄭𤣥云君子謂大夫以上是大夫之祭有用大牢時也又雜記云上大夫之虞也少牢卒哭成事祔皆大牢據此二文大夫得用大牢者禮器之文據天子大夫故也雜記據喪祭進用一等士喪禮士遣奠用少牢是也大夫無禘祫而云殷三年祭者禮記言大夫有善扵君祫及五世是大夫有功或得禘祫也劉炫云禮噐云君子大牢而祭謂之禮匹士大牢而祭謂之攘鄭𤣥云君子謂大夫以上是大夫祭有用大牢時也雜記云大夫之虞也皆少牢卒哭與祔皆大牢喪祭有大牢明吉祭亦有也此言特羊必是時祭殷以少牢明是三年一為大祭猶天子諸侯禘也禮大夫時祭少牢大祭大牢今黒肱全减之謙也足以共祀盡歸其餘邑曰吾聞之生於亂世貴而能貧民無求焉可以後亡敬共事君與二三子生在敬戒不在富也己巳伯張卒君子曰善戒詩曰愼爾侯度用戒不虞鄭子張其有焉注詩大雅侯維也義取慎法度戒未然音義盡歸津忍反凡此例可求故特音之疏正義曰詩大雅抑之篇侯維也言謹慎爾身唯在依法度用此以戒不憶度之事鄭子張其有此詩之義焉言生在敬戒是慎法度也貴而能貧是戒不虞也冬會于沙隨復錮欒氏也注晉知欒盈在齊故復錮也音義復扶又反注同下復使下注復生不復行皆同欒盈猶在齊晏子曰禍將作矣齊將伐晉不可以不懼注為明年齊伐晉傳楚觀起有寵於令尹子南未益祿而有馬數十乗注言子南偏寵觀起令富音義數所主反乗繩證反令力呈反楚人患之王將討焉子南之子棄疾為王御士注御王車者王毎見之必泣棄疾曰君三泣臣矣敢問誰之罪也王曰令尹之不能爾所知也國將討焉爾其居乎注問能止事我否對曰父戮子居君焉用之􅂥命重刑臣亦不為注漏泄君命罪之重音義焉於䖍反下焉入同泄息列反又以制反王遂殺子南於朝轘觀起於四竟注轘車裂以狥音義轘音患竟音境下同子南之臣謂棄疾請徙子尸於朝注欲犯命取殯音義殯必刃反曰君臣有禮唯二三子注不欲犯命移尸三日棄疾請尸王許之既葬其徒曰行乎注行去也曰吾與殺吾父行將焉入曰然則臣王乎曰棄父事讎吾弗忍也注於事是讎於實是君故雖謂讎而不敢報音義與音預殺如字一音試遂縊而死注𫝊譏康王與人子謀其父失君臣之義音義縊一賜反復使薳子馮為令尹公子齮爲司馬屈建爲莫敖注屈建子木也音義齮五綺反屈居忽反有寵於薳子者八人皆無祿而多馬他日朝與申叔豫言弗應而退從之入於人中注申叔辟薳子不欲與語音義應應對之應又從之遂歸退朝見之注薳子就申叔家見之曰子三困我於朝吾懼不敢不見吾過子姑告我何疾我也對曰吾不免是懼何敢告子注言恐與子并罪故不敢與子語音義不見賢遍反曰何故對曰昔觀起有寵於子南子南得罪觀起車裂何故不懼自御而歸不能當道注薳子惶懼意不在御至謂八人者曰吾見申叔夫子所謂生死而肉骨也注已死復生白骨更肉知我者如夫子則可注夫子謂申叔也如夫子謂以義匡已不然請止注止不相知辭八人者而後王安之注辭遣之十二月鄭游昄將如晉注游昄公孫蠆子音義昄呼板反未出竟遭逆妻者奪之以館于邑注舍止其邑不復行丁巳其夫攻子明殺之以其妻行注十二月無丁巳丁巳十一月十四日也子展廢良而立大叔注良游昄子大叔昄弟音義大音泰曰國卿君之貳也民之主也不可以苟請舎子明之類注子明有罪而良又不賢故音義舍音捨求亡妻者使復其所使游氏勿怨注鄭國不討專殺之人所以抑强扶弱臨時之宜曰無昭惡也注交怨則父之不脩益明也疏正義曰若游氏報殺此人則人知其父被殺其父所以見殺為奪人妻故也報殺則人知其父是父之行不修益明也經二十有三年春王二月癸酉朔日有食之注無傳三月己巳把伯匄卒注五同盟音義匄占害反疏正義曰匄以七年即位九年盟于戲十一年于亳城北十六年于溴梁十九年于祝柯二十年于澶淵皆魯把俱在是五同盟夏邾畀我來奔注無𫝊畀我是庶其之黨同有竊邑叛君之罪來奔故書音義畀必利反疏正義曰杜從賈説以為庻其之黨同有竊邑叛君之罪劉炫規過云杜此注云庶其之黨庶其奔魯三年若是其黨邾人即應討之何因至今始奔庶其以邑奔魯魯人還以賜之畀我不得彼邑竊邑之状復何在焉釋例又曰小國之卿或命而禮儀不備或未加命數故不書之邾畀我之等其奔亡亦多所書唯數人而巳知其合制者少也如彼所説又以畀我是卿何為両說自相矛楯乎炫以為釋例是集解非今刪定知不然者原杜之意以二十一年邾庶其竊邑來奔去此既近邾更無事今畀我來奔必是庶其之黨同有竊邑叛君之罪春秋之例命卿有罪出奔皆書名畀我書名罪其與庶其同黨非謂畀我非命卿與釋例不違劉不曉杜㫖妄為規非也葬杞孝公注無𫝊陳殺其大夫慶虎及慶寅注書名皆罪其專國叛君言及史異辭無義例疏正義曰被殺書名是罪之文故以專國叛君為二慶罪狀成十八年晉殺其大夫郤錡郤犫卻至哀四年蔡殺其大夫公孫姓公孫霍皆不言及文九年晉殺其大夫士縠及箕鄭父與此竝言及傳無其説知是史異辭無義例也陳侯之弟黃自楚歸于陳注諸侯納之曰歸黃至楚自理得直故為楚所納晉欒盈復入于晉注以惡入曰復入音義復扶又反注同入于曲沃注兵敗奔曲沃據曲沃衆還與君爭非欲出附他國故不言叛音義還户關反爭爭鬭之爭疏正義曰案傳欒盈潜帥曲沃之甲以入晉都及敗又入于曲沃潜入之時晉人不覺及敗後更入晉人以其狀告故先書復入于晉後言入于曲沃謂其後入故云兵敗奔曲沃也不言叛者叛謂以邑叛屬他國欒盈既入曲沃據曲沃之衆與君戰爭兵敗而死終亦不附他國故不言叛也然則昭二十一年宋華亥入于宋南里以叛定十一年宋公之弟辰入于蕭以叛十三年晉趙鞅入于晉陽以叛荀寅入于朝歌以叛皆非叛屬他國而竝書叛者彼皆與國相距不勝而即出奔得歸乃言復國皆有叛屬他國之意故夲國皆以叛告此欒盈與君爭勝不勝即死未有叛屬他國之意故晉人不以叛告也秋齊侯伐衞遂伐晉注兩事故言遂疏正義曰遂者因上事生下事之辭是兩事故曰遂僖二十八年晉侯侵曹晉侯伐衞亦是一舉而為兩事不言遂者於彼注云再舉晉侯者曹衞兩来告然則此言遂者齊人來告以齊告為文故乃言遂也八月叔孫豹帥師救晉次于雍榆注豹救晉待命于雍榆故書次雍榆晉地汲郡朝歌縣東有雍城音義雍於用反朝如字己卯仲孫速卒注孟莊子也冬十月乙亥臧孫紇出奔邾注書名者阿順季氏為之廢長立少以取奔亡罪之音義為于偽反長丁丈反少詩照反疏正義曰書名是罪之文案傳紇為孟氏所譛其奔非紇之罪故杜以阿順季氏廢長立少為紇之罪狀也晉人殺欒盈齊侯襲莒注輕行掩其不備曰襲因伐晉還襲莒不言遂者間有事音義輕遣政反疏正義曰莊二十九年𫝊例曰凡師有鐘鼓曰伐無曰侵輕曰襲是輕者舍其輜重倍道輕行掩其不備曰襲𫝊言齊侯還自晉不入遂襲莒經不言遂者間有他事故也若然僖六年夏公㑹齊侯云云伐鄭秋楚人圍許諸侯遂救許二十八年公㑹晉侯云云于温天王狩于河陽云云諸侯遂圍許彼亦間有他事而言遂者兩事言遂取其省文彼二者公皆親在事不待告故逺承上事縂言諸侯遂行此書齊事雖告稱遂行襲莒亦不可書遂為間有數事與前文隔絶故也傳二十三年春把孝公卒晉悼夫人䘮之注悼夫人晉平公母把孝公姊妹音義䘮如字徐息浪反平公不徹樂非禮也注徹去也音義去起呂反禮爲鄰國闕注禮諸侯絶期故以鄰國責之音義為于僞反下注為召下而爲並同期居其反疏正義曰把孝公晉平公之舅也尊同則相為不降平公扵禮為舅當服緦麻三月但緦服既輕其恩不過鄰國故𫝊言禮為鄰國闕也杜言諸侯絶期者據禮之正法言諸侯尊降其親雖有夲服期者亦當為之闕故以鄰國責之禮父在為母服期䘮絶旁期非母也陳侯如楚注朝也公子黃愬二慶於楚楚人召之注二慶虎及寅也二十年二慶譖黃黃奔楚自理今陳侯徃楚乃信黃為召二慶音義愬息路反使慶樂往殺之注慶樂二慶之族二慶畏誅故不敢自徃音義使慶樂往絶句慶氏以陳叛注因陳侯在楚而叛之不書叛不以告夏屈建從陳侯圍陳陳人城注治城以距君屈建楚莫敖音義從才用反又如字板隊而殺人役人相命各殺其長注慶氏忿其板隊遂殺築人故役人怒而作亂音義隊直類反注同長丁丈反遂殺慶虎慶寅楚人納公子黃君子謂慶氏不義不可肆也注肆放也故書曰惟命不于常注周書康誥言有義則存無義則亡疏正義曰杜言慶氏以陳叛叛不書不以告則傳載君子之言其意不為經也君子自論慶氏之罪所為不義不可放肆以為宜其誅滅故引尚書康誥言天命之不于常有義則存無義則亡慶氏族有二卿為不義之故而竝䘮亡故君子論其事傷之也服䖍以為傳之此言為不書慶氏以陳叛為楚所圍稱國以殺不成惡人肆其志也服意見元年圍宋彭城追書繫宋不登叛人謂此亦宜然故為此觧然叛是大罪若書為叛其惡益明何當匿其罪名謂之不可肆也若慶氏不可放肆故不書其叛則林父華亥趙鞅荀寅之徒豈皆可使放肆而書其叛乎且傳文不言書經之意知其不為經也故杜以為叛不告故不書耳晉將嫁女于吳齊侯使析歸父媵之以藩載欒盈及其士注藩車之有障蔽者使若媵妾在其中音義析星暦反媵以證反又繩證反藩方元反注同障之亮反又音章疏正義曰晉將嫁女為吳之夫人齊以女為媵使析歸父送媵女於晉令與適俱行也禮媵同姓適異姓今晉嫁女扵同姓齊以異姓為媵者非禮也傳不言非禮者但傳夲主説欒盈不言事之可否納諸曲沃注欒盈邑也欒盈夜見胥午而告之注胥午守曲沃大夫對曰不可天之所廢誰能興之子必不免吾非愛死也知不集也注集成也音義知音智又如字盈曰雖然因子而死吾無悔矣我實不天子無咎焉注言我雖不為天所祐子無天咎故可因音義咎其九反祐音又許諾伏之而觴曲沃人注胥午匿盈而飲其衆音義觴式羊反匿女力反飲於鴆反樂作午言曰今也得欒孺子何如注孺子欒盈對曰得主而爲之死猶不死也皆歎有泣者爵行又言皆曰得主何貳之有盈出徧拜之注謝衆之思已四月欒盈帥曲沃之甲因魏獻子以晝入絳注獻子魏舒絳晉國都初欒盈佐魏莊子於下軍注莊子魏絳獻子之父獻子私焉故因之注私相親愛趙氏以原屏之難怨欒氏注成八年莊姬譖之欒卻為徴音義屏薄輕反難乃旦反韓趙方睦注韓起讓趙武故和睦中行氏以伐秦之役怨欒氏注十四年晉伐秦欒黶違荀偃命曰余馬首欲東而固與范氏和親注范宣子佐中行偃於中軍知悼子少而聽於中行氏注悼子知罃之子荀盈也少年十七知氏中行氏同祖故相聽從音義知音智少詩照反注同疏正義曰十三年傳云荀罃卒十四年傳言盈生六年而武子卒是其少也知悼子荀首之孫中行吳荀林父之曾孫首是林父之弟首為知氏林父為中行氏是同祖也悼子是荀吳二從叔父故相聽從計悼子年十六不得為十七是故沈氏云後人傳冩誤劉氏以此而規杜氏非也程鄭嬖於公注鄭亦荀氏宗音義嬖必計反疏正義曰鄭雖非卿亦是强族言嬖於公見其不助欒氏唯魏氏及七輿大夫與之注七輿官名音義輿音餘疏正義曰僖十年傳言七輿大夫杜云侯伯七命副車七乗謂副車毎車有一大夫主之則此七輿大夫杜亦為主副車之官也劉炫云若是主公車則當情親於公不應曲附欒氏服䖍云下軍輿帥七人炫謂服言是樂王鮒侍坐於范宣子或告曰欒氏至矣宣子懼桓子曰奉君以走固宮必無害也注桓子樂王鮒音義鮒音附坐如字一音十臥反走如字一音奏且欒氏多怨子爲政欒氏自外子在位其利多矣旣有利權又執民柄注賞罰為民柄音義柄彼命反疏正義曰欒氏多怨言易克既有為利之權又執民之八柄也注正義曰周禮太宰以八柄詔王馭羣臣一曰爵二曰祿三曰予四曰置五曰生六曰奪七曰廢八曰誅此八者爵祿予置生是賞也奪廢誅是罸也賞罰二事分為八名此時臨與敵戰惟賞罰而已故以賞罰言之鄭𤣥云柄所秉執以起事者也然則柄以器物為喻若用斧之執其柄也將何懼焉欒氏所得其唯魏氏乎而可强取也夫克亂在權子無懈矣公有姻䘮注夫人有杞䘮音義强其丈反下注强取同懈徒賣反疏正義曰隱元年傅説葬之節云士踰月外姻至則姻是外親之總名把孝公卒夫人有兄弟之服是有把䘮也傳言公有姻䘮注言夫人有杞䘮者下文樂王鮒使宣子墨縗冒絰詐為夫人故也案經葬把孝公之下始書欒盈復入于晉則欒盈之入在孝公葬後杜觧諸侯既葬除服而夫人猶有服者葬把孝公書魯史去之曰欒盈入晉當在葬把孝公之前故夫人猶有服故得詐為之也王鮒使宣子墨縗冒絰注晉自殽戰還遂常墨縗音義縗七雷反夲又作衰音同冐莫報反絰直結反冒絰以絰冐其首也一云縗冒絰三者皆墨之疏正義曰夫人為其兄弟當大功䘮服大功布衰裳牡麻絰冒絰者言以絰冒其首也樂王鮒使宣子詐為夫人孝服也二婦人輦以如公注恐欒氏有内應距之故爲婦人服而入奉公以如固宮注固宮宮之有臺觀備守者音義觀古喚反守手又反疏正義曰晉語云范宣子以公入于襄公之宮蓋襄公有别宮牢固故謂之固宮范鞅逆魏舒注用王鮒計欲强取之則成列旣乗將逆欒氏矣趨進曰欒氏帥賊以入鞅之父與二三子在君所矣注二三子諸大夫音義乗繩證反下驂乗超乗并注同使鞅逆吾子鞅請驂乗持帶注驂乗必持帶備隋隊音義隋待果反隊直類反遂超乗注跳上獻子車音義跳他彫反上時掌反右撫劍左援帶注刼之音義援音袁命驅之出僕請注請所至鞅曰之公宣子逆諸階注逆獻子也執其手賂之以曲沃注恐不與已同心初斐豹𨽻也著於丹書注蓋犯罪沒為官奴以丹書其罪音義斐音非一音芳匪反疏正義曰周禮司厲職云其奴男子入于罪𨽻女子入于舂槀鄭𤣥云奴從坐而沒入縣官者男女同名杜用鄭説以無正文故云蓋以斐豹請焚丹書知以丹書其籍近世魏律縁坐配沒為工樂雜戸者皆用赤紙為籍其卷以鉛為軸此亦古人丹書之遺法欒氏之力臣曰督戎國人懼之斐豹謂宣子曰苟焚丹書我殺督戎宣子喜曰而殺之所不請於君焚丹書者有如日注言不負要盟如日音義督丁毒反乃出豹而閉之注閉著門外音義著陟畧反督戎從之踰隱而待之注隱短墻也督戎踰入豹自後擊而殺之范氏之徒在臺後注公臺之後欒氏乗公門注乗登也宣子謂鞅曰矢及君屋死之鞅用劍以帥卒注用短劍兵接敵欲致死音義卒子忽反欒氏退攝車從之注鞅攝宣子戎車遇欒樂注欒盈之族曰樂免之死將訟女於天注言雖死猶不舍女罪音義女音汝注同樂射之不中又注注注屬矢於弦也音義射食亦反中丁仲反注之住反注同屬之玉反則乗槐夲而覆注欒樂車擽槐而覆音義槐音懐覆芳服反注同擽音歴或以㦸鉤之斷肘而死欒魴傷欒盈奔曲沃晉人圍之注魴欒氏族音義斷音短肘張九反疏正義曰服䖍云魴盈之子俱無文也計欒盈宣子之外孫胥午謂為孺子未得有子已堪戰十九年欒魴已帥師伐齊必非欒盈子故杜以為欒氏族世族譜欒魴為欒氏族以欒樂為雜人不知杜意何故也秋齊侯伐衞先驅穀榮御王孫揮召揚爲右注先驅前鋒軍音義揮許韋反召上照反申驅成秩御莒恒申鮮虞之傅摯爲右注申驅次前軍傅摯申鮮虞之子音義鮮音仙之傅摯音至夲或作申鮮虞之子傅摯疏正義曰俗夲多云申鮮虞之子今案注云傅摯申鮮虞之子若傳先有子字無煩此注故今定夲皆無曹開御戎晏父戎爲右注公御右也音義晏父音甫貳廣上之登御邢公盧蒲癸爲右注貳廣公副車音義廣古曠反注同邢音刑啓牢成御襄罷師狼蘧疏爲右注左翼曰啓音義牢魯刀反一夲作罕成罷音皮徐音彼一音皮買反狼音郎蘧其居反疏正義曰在翼曰啓右翼曰胠賈逵以為此言或當有成文也且此傳上下先驅申驅是前軍也大殿是後軍也明啓胠是在旁之軍説文云胠掖下也胠是在旁明矣凡言左右以左為先知啓是左也名之曰啓或使之先行詩云以先啓行服䖍引司馬法謀帥篇曰大前驅啓乗車大晨倅車屬焉大晨大殿也音相似如服言古人有名軍為啓者胠商子車御侯朝桓跳為右注右翼曰胠音義胠起居反徐又音脅或起業反朝如字一音直遙反跳徒彫反大殿商子游御夏之御寇崔如為右注大殿後軍音義殿都練反注同夏戸雅反御魚呂反燭庸之越駟乗注四人共乗殿車也傳具載此言莊公廢舊臣任武力音義駟乗繩證反自衞將遂伐晉晏平仲曰君恃勇力以伐盟主若不濟國之福也不德而有功憂必及君崔杼諫曰不可臣聞之小國間大國之敗而毁焉必受其咎君其圖之弗聽陳文子見崔武子注文子陳完之孫須無武子崔杼也音義間間厠之間又如字咎其九反曰將如君何武子曰吾言於君君弗聽也以為盟主而利其難羣臣若急君於何有注言有急不能顧君欲弑之以説晉音義難乃旦反弑申志反下同説音悦一音如字子姑止之文子退告其人曰崔子將死乎謂君甚而又過之注弑君之惡過於背盟主音義背音佩不得其死過君以義猶自抑也况以惡乎注自抑損齊侯遂伐晉取朝歌注朝歌今屬汲郡為二隊入孟門登大行注二隊分兵為二部孟門晉隘道大行山在河内郡北音義隊徒對反徐徒猥反大音泰行徐户郎反一音如字隘於懈反張武軍於熒庭注張武軍謂築壘壁熒庭晉地音義熒户扄反庭音廷夲亦作廷壘力軌反壁亦作辟音壁疏正義曰宣十二年傳稱楚既戰勝潘黨請築武軍昭十三年傳子于帥陳蔡之師入楚陳蔡請為武軍蔡公曰欲速且役病矣請藩而已乃藩為軍以此知武軍謂築壘壁也張謂張設築作之具服䖍云張設旗鼓也戍郫邵注取晉邑而守之音義郫婢支反封少水注封晉尸扵少水以為京觀音義少詩照反地名下注孟氏之少立少同觀宮喚反以報平隂之役乃還注平隂役在十八年趙勝帥東陽之師以追之獲晏􅈊注趙勝趙旃之子東陽晉之山東魏郡廣平以北晏􅈊齊大夫音義勝音升一音申證反􅈊力之反徐音來疏正義曰昭二十二年傳曰荀吳略東陽遂襲鼓滅之鼓在鉅鹿居山之東山東曰朝陽知東陽是寛大之語􅄣謂晉之山東故為魏郡廣平以北二年齊晏弱城東陽以偪萊哀八年吳伐魯克東陽而晉齊魯皆有東陽名同而實異服䖍以東陽為魯邑繆之甚矣東陽之師謂下文叔孫豹所帥者也八月叔孫豹帥師救晉次于雍榆禮也注救盟主故曰禮疏正義曰公羊傳曰曷為先言救而後言次先通君命也僖元年齊師宋師曹師次于聶北救邢公羊傳曰曷為先言次而後言救君也其意言君則進止自由故先次後救臣則先通君命故先救後次賈氏耶以為説謂此傳云禮者言其先救後次為得禮也釋例曰所記或次在事前次以成事也或次在事後事成而次也皆隨事實無義例也叔孫豹次于雍榆傳曰禮者善其宗助盟主非以次為禮也齊桓次于聶北救邢亦存邢具其噐用師人無私見善不在次也杜以此故言救盟主故曰禮所以明異舊説也季武子無適子公彌長而愛悼子欲立之注公彌公鉏悼子紇也音義適丁歴反長丁丈反下皆同鉏仕居反紇恨發反訪於申豐曰彌與紇吾皆愛之欲擇才焉而立之申豐趨退歸盡室將行注申豐季氏屬大夫他日又訪焉對曰其然將具敝車而行注其然猶必爾音義敝婢世反徐扶滅反乃止注止不立紇訪於臧紇臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客注為上賔音義飲於鴆反下皆同吾為于偽反下注為定為公鉏同旣獻注已獻酒臧孫命北面重席新樽絜之注酒樽旣新復絜澡之音義重直恭反樽音尊夲亦作尊復扶又反下非復下文復戰同澡音早召悼子降逆之大夫皆起注臧孫下迎悼子及旅而召公鉏注獻酬禮畢通行為旅疏正義曰案郷飲酒禮主人席於阼階上西面賔席扵堂戸西南面介席於西階上東面衆賔席於上賔之西南面初賔介及衆賔至立扵門外東面主人出迎于門外西面主人延賔入及介衆賔䒭立於西階下主人揖賔升主人酌酒於阼階上拜獻賔賔西階上拜受飲卒爵酌酒以酢主人主人阼階上飲卒爵又酌酒先自飲以酬賔賔拜受酬酒奠于薦東賔降主人又酌酒於西階上獻介介於西階上受爵飲卒爵酌以酢主人主人於西階上受爵飲卒爵介降主人又酌酒扵西階上獻衆賔衆賔飲訖降引樂工人歌詩主人獻樂工又飲笙人立於堂下主人獻笙師訖主人及賔介衆賔等皆升就席乃立相者為司正使弟子一人舉觶於賔賔酬主人主人酬介介酬衆賔是為旅也杜言獻酬禮畢者謂獻酬賔介及衆賔禮畢也言通行為旅者謂一人舉觶於賔旅衆相酬通至於下案郷飲酒禮未旅以前賔介皆立此𫝊云大夫皆起則季氏飲大夫酒未必純如郷飲酒禮則獻酬事訖大夫皆坐然則旣獻召悼子者謂獻臧紇及大夫訖而召悼子至旅酬之時而召公鉏使與之齒注使從庻子之禮列在悼子之下季孫失色注恐公鉏不從季氏以公鉏為馬正注馬正家司馬愠而不出閔子馬見之注閔子馬閔馬父音義愠紆運反怨也怒也曰子無然禍福無門唯人所召為人子者患不孝不患無所注所位處音義處昌慮反敬共父命何常之有注言廢置在父無常位也若能孝敬富倍季氏可也注父寵之則可富姦回不軌禍倍下民可也注禍甚於貧賤疏正義曰悼子旣為適子將承季氏之後故謂悼子為季氏下言為孟孫其意亦然富倍季氏言可過悼子也姦回不軌更獲罪戾非徒貧賤而巳是為倍下民故杜云禍甚扵貧賤也公鉏然之敬共朝夕恪居官次注次舍也音義朝如字恪苦各反季孫喜使飲已酒而以具徃盡舍旃注具燕饗之具音義舍音捨故公鉏氏富又出為公左宰注出季氏家臣仕於公孟孫惡臧孫注不相善音義惡烏路反下之惡子之惡我君所惡皆同季孫愛之注愛其成已志孟氏之御騶豐點好羯也注羯孟莊子之庻子孺子秩之弟孝伯也音義騶側留反點都簟反又之廉反好呼報反羯居竭反曰從余言必為孟孫注為孟孫後疏正義曰成十八年傳曰程鄭為乗馬御六騶屬焉使訓羣騶知禮注云六騶六閑之騶則騶是掌馬之官蓋兼掌御事謂之御騶再三云羯從之孟莊子疾豐點謂公鉏苟立羯請讎臧氏注使孟氏與公鉏共憎臧孫公鉏謂季孫曰孺子秩固其所也注固自當立若羯立則季氏信有力於臧氏矣注臧氏因季孫之欲而為定之猶為有力今若專立孟氏之少則季氏有力過扵臧氏疏正義曰不應得而得之則彼荷其恩故功力多也弗應己卯孟孫卒公鉏奉羯立于户側注户側䘮主音義應應對之應疏正義曰䘮大記云大夫之䘮主人坐于東方此立于户側則在室戸之東西靣立也禮記云坐此云立者以季孫来故立耳季孫至入哭而出曰秩焉在公鉏曰羯在此矣季孫曰孺子長公鉏曰何長之有唯其才也注季孫廢鉏立紇云欲擇才故以此答之音義焉在於䖍反且夫子之命也注遂誣孟孫遂立羯秩奔邾臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也注常志相順從身之害音義疢耻刃反孟孫之惡我藥石也注常志相為戾猶藥石之療疾疏正義曰治病藥分用石本草所云鍾乳礬磁石之類多矣美疢不如惡石夫石猶生我注愈已疾也疏正義曰服䖍云夫謂孟孫也桓十三年𫝊夫固謂君夫豈不知服䖍云夫謂鬭伯比也二十六年𫝊夫不惡女乎服杜竝云夫謂夫子也其年又曰夫獨無族姻乎杜云夫謂晉也三十一年傳夫亦愈知治矣杜云夫謂尹何皆謂所斥前人為夫此言之類也疢之美其毒滋多孟孫死吾亡無日矣孟氏閉門告於季孫曰臧氏將為亂不使我葬注欲為公鉏讎臧氏季孫不信臧孫聞之戒注戒為備也冬十月孟氏將辟藉除於臧氏注辟穿藏也於臧氏借人除葬道音義辟婢亦反徐甫亦反注同藉徐音借又如字藉亦借也藏才浪反臧孫使正夫助之注正夫隧正音義隧音遂下文之隧同疏正義曰七年𫝊稱叔仲昭伯為隧正謂南遺請城費吾多與而役是役夫隧正所主知此正天是隧正也隧正當屬司徒臧氏為司寇而借之於臧氏者盖當時臧氏兼主掌之除於東門甲從已而視之注畏孟氏故從甲士視作者音義從才用反注同一音如字孟氏又告季孫季孫怒命攻臧氏注見其有甲故乙亥臧紇斬鹿門之關以出奔邾注魯南城東門疏正義曰盖舊名猶在相𫝊如此也且邾在魯之東南奔邾出此門以為便初臧宣叔娶于鑄生賈及為而死注鑄國濟北蛇丘縣所治音義娶七徃反鑄之樹反蛇音移治直吏反繼室以其姪注女子謂兄弟之子為姪音義姪大結反又丈一反穆姜之姨子也注姪穆姜姨母之子與穆姜為姨昆弟疏正義曰釋親云妻之姊妹同出為姨孫炎曰同出俱已嫁也然則據父言之謂之姨據子言之當謂之從母但子效父語亦呼為姨姨子昆弟即䘮服從母昆弟是也故曰姨昆弟生紇長於公宮姜氏愛之故立之注立為宣叔嗣臧賈臧為出在鑄注還舅氏也臧武仲自邾使告臧賈且致大蔡焉注大蔡大龜音義大蔡龜名也一云龜出蔡地因以為名疏正義曰漢書食貨志云元龜為蔡論語云臧文仲居蔡家語稱漆彫平對孔子云臧氏有守龜其名曰蔡文仲三年而為一兆武仲三年而為二兆是大蔡為大龜蔡是龜之名耳鄭𤣥云出蔡地因以名名焉非也曰紇不佞失守宗祧注遠祖廟為祧音義祧他彫反敢告不弔注不為天所弔恤紇之罪不及不祀注言應有後疏正義曰禮天子封諸侯以國諸侯賜大夫以族天子不滅國諸侯不滅族有小罪則廢其身擇立次賢使紹其先祀論語云興滅國繼絶世謂此也必有大罪乃得滅之周禮大司馬云外内亂鳥獸行則滅之是也武仲自言罪輕不及於不祀言其應有後也子以大蔡納請其可注請為先人立後音義請為于僞反下為已請自為請為先人下文遂自為也皆同賈曰是家之禍也非子之過也賈聞命矣再拜受龜使為以納請注賈使為為已請遂自為也注為自為請臧孫如防注防臧孫邑使來告曰紇非能害也知不足也注言使甲從已但慮事淺耳音義知音智非敢私請注為其先人請也苟守先祀無廢二動注二勲文仲宣叔疏正義曰哀二十四年傳曰晉侯將伐齊使来乞師曰昔臧文仲以楚師伐齊取穀臧宣叔以晉師伐齊取汶陽寡君欲徼福於周公願乞靈於臧氏是二勲謂文仲宣叔也敢不辟邑注據邑請後故孔子以為要君音義要一遙反下同乃立臧為臧紇致防而奔齊其人曰其盟我乎注謂陳其罪惡盟諸大夫以為戒臧孫曰無辭注廢長立少季孫所忌故謂無辭以罪已將盟臧氏季孫召外史掌惡臣而問盟首焉注惡臣謂奔亡者盟首載書之章首疏正義曰周禮外史掌書外令掌四方之志今季孫召外史盖魯亦立此官也對曰盟東門氏也曰毋或如東門遂不聽公命殺適立庻注文公命立子惡公子遂殺之立宣公音義毋音無聽吐定反適丁歴反盟叔孫氏也曰毋或如叔孫僑如欲廢國常蕩覆公室注謂譖公與季孟於晉音義覆芳服反季孫曰臧孫之罪皆不及此孟椒曰盍以其犯門斬關季孫用之乃盟臧氏曰無或如臧孫紇干國之紀犯門斬關注干亦犯也音義盍户臘反臧孫聞之曰國有人焉誰居其孟椒乎注孟椒孟獻子之孫子服惠伯居猶與也音義居音基與音餘晉人克欒盈于曲沃盡殺欒氏之族黨欒魴出奔宋書曰晉人殺欒盈不言大夫言自外也注自外犯君而入非復晉大夫齊侯還自晉不入注不入國遂襲莒門于且于注且于莒邑音義于子餘反傷股而退注齊侯傷明日將復戰期于壽舒注夀舒莒地杞殖華還載甲夜入且于之隧宿于莒郊注二子齊大夫且于隧狹路音義殖市力反華胡化反還音旋狹户夾反疏正義曰既入而又得出宿知所入非城邑也故杜以為狹道檀弓説此事云齊莊公襲莒于奪把梁死焉言于奪則當為地名鄭𤣥引此傳云隧奪聲相近言其與此一事則此亦為地名若是地名不得云且于之隧即如記文蓋當且于之旁别有奪地非此且于之隧也明日先遇莒子於蒲侯氏注蒲侯氏近莒之邑音義近附近之近莒子重賂之使無死曰請有盟注欲以盟要二子無致死戰華周對曰貪貨棄命亦君所惡也注華周即華還昏而受命曰未中而棄之何以事君莒子親鼓之從而伐之獲把梁注把梁即杞殖莒人行成注勝大國益懼故行成齊侯歸遇把梁之妻於郊注梁戰死妻行迎䘮使弔之辭曰殖之有罪何辱命焉注言若有罪不足弔若免於罪猶有先人之敝廬在下妾不得與郊弔注婦人無外事故下猶賤也音義廬力居反與音預疏正義曰檀弓云哀公使人弔蕢尚遇諸道辟於路畫宫而受弔焉曾子曰蕢尚不如把梁之妻之知禮也鄭𤣥云行弔禮於野非也然則男子亦不得受野弔而言婦人無外弔者檀弓云君遇柩扵路必使人弔之鄭𤣥云君於民臣有父母之恩是男子從柩在野則得野受弔婦人無外事雖從柩亦不得野受弔耳若男子得受野弔而曾子非蕢尚者以蕢尚在朝顯著故宜弔扵其家若君遇柩扵路使人弔之者謂庻人及㣲小之臣也檀弓因蕢尚而説此事云把梁死其妻迎其柩扵路而哭之哀則杞梁之妻扵時從杞梁柩雖從柩而辭不受弔是由異扵男子故也服䖍以下從上讀言敝廬在下禮記無下知下猶賤謙言賤妾也齊侯弔諸其室注傳善婦人有禮齊侯將為臧紇田注與之田邑臧孫聞之見齊侯與之言伐晉注齊侯自道伐晉之功音義臧孫聞之見賢遍反齊侯絶句一讀以見字絶句齊侯向下讀對曰多則多矣抑君似䑕夫䑕晝伏夜動不穴於寢廟畏人故也疏正義曰一觧䑕不敢穿寢廟墉以為穴者自畏人故也但寢則近人廟則幽静䑕不穿廟豈是畏人故知寢廟閒雅䑕不即以為穴必須穿壁始敢安處止為畏人故也計燕巢䑕穴自是其常假喻言之不可執此為難也今君聞晉之亂而後作焉注作起兵也寧將事之非䑕何如乃弗與田注臧孫知齊侯將敗不欲受其邑故以比䑕欲使怒而止仲尼曰知之難也有臧武仲之知注謂能辟齊過音義知之音智而不容於魯國抑有由也作不順而施不恕也夏書曰念兹在兹注逸書也念此事在此身言行事當常念如在已身也注正義曰服䖍云不順謂阿季氏廢長立少也不恕謂惡孟氏立庻也然則作而不順當如服言𫝊無惡孟氏之事故不取當謂知其不可而為之是不恕也順事恕施也經二十有四年春叔孫豹如晉注賀克欒氏仲孫羯帥師侵齊夏楚子伐吳秋七月甲子朔日有食之旣注無傳疏正義曰漢書律歴志載劉歆三統之術以為五月二十二分月之二十乃為一交以為交在望前朔則日食望則月食交在望後望則月食後月朔則日食交正在朔則日食既前後望不食交正在望則月食旣前後朔不食而二十一年九月十月頻月日食此年七月八月日食凡交前十五度交後十五度竝是食竟去交逺則日食漸少去交近則日食漸多正當交則日食旣若前月在交初一度日食則至後月之朔日猶在交之末度未出食竟月行天既帀來及於日或可更食若前月日在交初二度以後則後月復食無疑今七月日食旣而八月又食於推歩之術必無此理盖古書磨滅致有錯誤劉炫云漢末以来八百餘載考其注記莫不皆爾都無頻月日食之事計天道轉運古今一也後世旣無其事前世理亦當然而今有頻食於術不符有交之所在日月必食日食在朔月食在望日月共盡一體日食少則月食多日食多則月食少日食盡則前後望月不食月食盡則前後朔日不食以其交道旣不復其相揜故也此與二十一年頻月日食理必不然但其字則變古為篆改篆為𨽻書則縑以代簡紙以代縑多歴世代年數遙遠䘮亂或轉寫誤失其夲真先儒因循莫能改易執文求義理必不通後之學者宜知此意也齊崔杼帥師伐莒大水注無傳八月癸巳朔日有食之注無傳公會晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀冬楚子蔡侯陳侯許男伐鄭公至自㑹注無傳陳鍼宜咎出奔楚注陳鍼子八世孫慶氏之黨書名惡之也音義鍼其廉反咎其九反惡烏路反疏注陳鍼子八世孫正義曰世夲文也叔孫豹如京師大饑注無傳傳二十四年春穆叔如晉范宣子逆之問焉曰古人有言曰死而不朽何謂也穆叔未對宣子曰昔匄之祖自虞以上為陶唐氏注陶唐堯所治地太原晉陽縣也終虞之世以為號故曰自虞以上音義上時掌反注同治直吏反疏正義曰如杜此注陶唐共為一名即是晉陽縣也釋例云晉大鹵大原大夏參虚晉陽六名大原晉陽縣也唯載六名而言不及唐釋例又别記小國所都唐大原晉陽縣也亦云唐是晉陽而言不及陶則以陶與唐别不是共為一名也史記云帝堯為陶唐氏韋昭云陶唐皆國名猶湯稱殷商也案經傳契居商故湯以商為國號后盤庚遷殷故殷商䨇舉歴檢書𫝊未聞帝堯居陶而以陶冠唐盖地以二字為名所稱或單或􅃨也張晏云堯為唐侯國於中山唐縣然則唐是中山縣名非晉陽也堯自唐侯而升為天子旣為天子乃治扵晉陽故杜於晉陽六名言不及唐記其諸國之都乃云唐是晉陽言堯為天子號曰陶唐其治在晉陽耳唐非晉陽縣内之地名也舜受堯禅封堯子丹朱為王者之后猶稱為唐其名不易終虞之世以陶唐為號故曰自虞以上也在夏為御龍氏注謂劉累也事見昭二十九年音義見賢遍反疏正義曰昭二十九年𫝊曰陶唐氏旣衰其后有劉累學擾龍于豢龍氏以事孔甲夏后嘉之賜氏曰御龍在商為豕韋氏注豕韋國名東郡白馬縣東南有韋城疏正義曰鄭語云祝融之後八姓大彭豕韋為商伯矣又曰彭姓彭祖豕韋則商滅之矣賈逵云大彭豕韋為商伯其後世失道殷德復興而滅之然則商之初豕韋國君為彭姓也其後乃以劉累之後代之亦不知殷之何王滅彭姓而封累後也昭二十九年傳稱夏王孔甲嘉劉累賜氏曰御龍以更豕韋之後則賜劉累身封豕韋而此云在商為豕韋氏者杜扵彼注云劉累代彭姓之豕韋累尋遷魯縣豕韋復國至商而滅累之後世復承其國為豕韋氏是杜觧劉累及其後世再封豕韋之事在周為唐杜氏注唐杜二國名殷末豕韋國於唐周成王滅唐遷之於杜為杜伯杜伯之子隰叔奔晉四世及士㑹食邑於范氏杜今京兆杜縣音義隰徐入反復扶又反下同疏正義曰以國語杜伯文不連唐知唐杜二國名又以豕韋為一嫌唐杜亦一故辯之也昭元年𫝊稱堯遷實沈于大夏唐人是因以服事夏商其季世曰唐叔虞及成王滅唐而封大叔是言周成王滅唐也周語曰周之衰也杜伯射宣王於鎬是周有杜國故杜以為成王滅唐遷之于杜為杜伯也晉語訾袥對范宣子云昔隰叔子違周難奔於晉生子輿為司空世及武子佐文襄為卿以輔成景後之人可則是以受隨范賈逵云宣王殺杜伯其子逃而奔晉子輿士蔿字武子士㑹也㑹士蔿之孫是隰叔四世及士㑹食邑於范為范氏也劉炫云案杜於昭元年注云唐人若劉累之等累遷魯縣此在大夏即如彼言則居唐之人非累之裔此注何云豕韋國於唐也又據何文知初封於唐後封於杜乎今知劉説非者彼注雖似有異其義與此不殊彼𫝊云唐人是因杜以唐人非一人之稱故云劉累之等謂累之子孫故云之等也累遷魯縣𫝊云唐人是因因居大夏則累之子孫遷居大夏也杜知殷末封之於唐者以周武王滅唐故也知後封扵杜者以宣王時有杜伯故也是成王之時有唐無杜宣王之時有杜無唐故杜為此觧劉炫又規云唐非豕韋之􅉙杜亦未必是後安知滅唐遷於杜也賈逵注國語云武王封堯後為唐杜二國以為竝時為國非滅唐封杜劉以為唐非劉累之後又取賈逵注國語武王封堯後為唐杜二國以為二國竝封而規杜氏非也炫謂宣子歴言已之宗族扵上世有國有家未必繼體相承炫於處秦為劉謂非丘明之筆豕韋唐杜不信元愷之言已之逺祖數自譏訐或聞此義必將見嗤但𫝊言於人懼誤後學意之所見不敢有隐唯賢者裁之晉主夏盟為范氏其是之謂乎注晉為諸夏盟主范氏復為之佐言巳世為興家音義夏户雅反注同穆叔曰以豹所聞此之謂世祿非不朽也魯有先大夫曰臧文仲旣沒其言立注立謂不廢絶音義旣沒其言立今俗夲皆作其言立於世檢元熈以前本則無於世二字其是之謂乎豹聞之大上有立德注黃帝堯舜音義大音泰其次有立功注禹稷其次有立言注史佚周任臧文仲音義佚音逸任音壬疏正義曰大上其次以人之才知淺深為上次也大上謂人之最上者上聖之人也其次次聖者謂大賢之人也其次又次大賢者也立德謂創制垂法博施濟衆聖德立扵上代惠澤被扵無窮故服以伏羲神農杜以黄帝堯舜當之言如此之類乃是立德也禮運稱禹湯文武成王周公後代人主之選計成王非聖但欲言周公不得不言成王耳禹湯文武周公與孔子皆可謂立德者也立功謂拯危除難功濟扵時故服杜皆以禹稷當之言如此之類乃是立功也祭法云聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大菑則祀之能捍大患則祀之法施扵民乃謂上聖當是立德之人其餘勤民定國禦災捍患皆是立功者也立言謂言得其要理足可𫝊記𫝊稱史佚有言論語稱周任有言及此臧文仲既沒其言存立扵世皆其身旣没其言尚存故服杜皆以史佚周任臧文仲當之言如此之類乃是立言也老莊荀孟管晏揚墨孫吳之徒制作子書屈原宋玊賈逵揚雄馬遷班固以後撰集史𫝊及制作文章使後世學習皆是立言者也此三者雖經世代常不朽腐故穆子歴言之雖久不廢此之謂不朽若夫保姓受氏以守宗祊注祊廟門音義祊布彭反注同疏正義曰釋宮云祊謂之門李廵曰祊故廟門名也孫炎曰詩云祝祭於祊謂廟門也世不絶祀無國無之禄之大者不可謂不朽注𫝊善穆叔之知言范宣子為政諸侯之幣重鄭人病之二月鄭伯如晉子産寓書於子西以告宣子曰注寓寄也音義寓音遇子為晉國四鄰諸侯不聞令德而聞重幣僑也惑之僑聞君子長國家者非無賄之患而無令名之難夫諸侯之賄聚於公室則諸侯貳注貳離也音義長丁丈反難如字又乃旦反賄呼罪反若吾子賴之則晉國貳注賴恃用之諸侯貳則晉國壊晉國貳則子之家壊何沒没也注没没沈滅之言音義沒如字一音妹沈溺也將焉用賄夫令名德之輿也注德須令名以遠聞音義焉於䖍反聞音問又如字德國家之基也有基無壊無亦是務乎有德則樂樂則能久詩云樂只君子邦家之基有令德也夫注詩小雅言君子樂美其道為邦家之基所以濟令德音義樂樂竝音洛夫音扶下也夫同上帝臨女無貳爾心有令名也夫注詩大雅言武王為天所臨不敢懐貳心所以濟令名音義女音汝疏正義曰詩小雅南山有臺之篇只美也言有樂美之德君子以有樂美之德故為邦家之基本也此詩所言言此君子有令德也夫又引詩大雅大明之篇詩人謂武王云上天之意臨視汝武王矣言武王為天所臨不敢懐貳扵女之心此詩所言言武王有令名也夫樂美君子者言君子有可樂可美之德也劉炫云詩人謂武王云上天之意臨視女武王故在下臣民無懐貳於女之心也恕思以明德則令名載而行之是以逺至邇安毋寧使人謂子子實生我注無寧寧也音義毋音無而謂子浚我以生乎注浚取也言取我財以自生音義浚思俊反疏正義曰無寕寕也言人等作二事為不取人財寧使人謂子實能生飬我民也為多取人財使人言子不能自活而須我民財以生活乎此二者孰勝也象有齒以焚其身賄也注焚斃也音義焚扶云反服云焚讀曰僨僨僵也斃婢世反疏正義曰焚是燒也象不燒死故訓為斃服䖍云焚讀曰僨僨僵也為生齒牙僵仆其身宣子説乃輕幣是行也鄭伯朝晉為重幣故且請伐陳也鄭伯稽首宣子辭子西相曰以陳國之介恃大國而陵虐於敝邑注介因也大國楚也音義説音悦為于偽反下注魯為同相息亮反介音戒注及下同寡君是以請罪焉注請得罪於陳也音義是以請罪焉一本作是以請請罪焉請並七井反徐上請字音情敢不稽首注為明年鄭入陳𫝊孟孝伯侵齊晉故也注前年齊伐晉魯為晉報侵夏楚子為舟師以伐吳注舟師水軍不為軍政注不設賞罰之差無功而還注為下吳召舒鳩起本齊侯旣伐晉而懼將欲見楚子楚子使薳啟疆如齊聘且請期注請㑹期音義疆其良反又居良反齊社蒐軍實使客觀之注祭社因閲數軍器以示薳啟疆音義蒐所求反閲音悦數所主反陳文子曰齊將有㓂吾聞之兵不戢必取其族注戢藏也族類也取其族還自害也音義戢側立反秋齊侯聞將有晉師注夷儀之師使陳無宇從薳啟疆如楚辭且乞師注辭有晉師未得相見崔杼帥師送之遂伐莒侵介根注介根莒邑今城陽黔陬縣東北計基城是也齊旣與莒平因兵出侵之言無信也音義黔其廉反又其令反如淳音耿弇反陬側留反又子侯反韋昭音諏基本又作其音基又如字漢書作斤如淳斤音基會于夷儀將以伐齊水不克注晉合諸侯以報前年見伐冬楚子伐鄭以救齊門于東門次于棘澤注以齊無宇乞師故也諸侯還救鄭注夷儀諸侯晉侯使張骼輔躒致楚師求御于鄭注欲得鄭人自御知其地利故也音義骼庚百反一音古洛反躒力狄反徐音洛鄭人卜宛射犬吉注射犬鄭公孫音義宛於元反射食亦反徐神石反子大叔戒之曰大國之人不可與也注言不可與等也欲使卑下之大叔游吉音義大叔音泰下遐嫁反對曰無有衆寡其上一也注言在已上者有常分無大小國之異音義分扶問反疏正義曰射犬之意言我與彼俱是大夫無有國土大小人民衆寡之異其在我上彼此一也其意言我下鄭卿亦下晉卿彼若是卿我當下之彼是大夫我不下之大叔曰不然部婁無松栢注部婁小阜松柏大木喻小國異於大國音義部蒲口反徐扶苟反婁本或作樓路口反徐力侯反阜扶又反疏正義曰釋地云大陸曰阜大阜曰陵李廵曰大陸謂土地高大名曰阜阜最大為陵則阜地之高者是丘陵之類也部婁小阜相𫝊為然大山有松柏小阜無松柏小阜異於大山喻小國異于大國不得與大國之人等也服䖍云喻小國無賢材知勇之人不與大國等也二子在幄坐射犬于外注二子張骼輔躒幄帳也音義幄於角反旣食而後食之使御廣車而行注廣車兵車音義後食音嗣廣古曠反注同已皆乗乗車注乗車安車音義下乗字繩證反注及下皆同將及楚師而後從之乗皆踞轉而鼓琴注轉衣裝音義踞居慮反轉張戀反注及下同一音張臠反裝側良反一本作囊疏正義曰踞謂坐其上也戰車所有可坐其上明是衣囊耳當是盛衣甲之囊也下云取胄於櫜當必有小囊盛胄定本作衣装近不告而馳之注射犬恨故近敵不告而馳皆取胄於櫜而胄入壘皆下搏人以投收禽挟囚注禽獲也音義胄直救反櫜古毛反壘力軌反搏音博徐甫各反挟音協弗待而出注射犬又不待二子皆超乗抽弓而射旣免復踞轉而鼓琴曰公孫同乗兄弟也注言同乗義如兄弟音義復扶又反下復討同胡再不謀注謂不告而馳不待而出對曰曩者志入而已今則怯也皆笑曰公孫之亟也注亟急也言其性急不能受屈音義曩奴黨反曏也怯去業反亟居力反注同疏正義曰曩猶向也向者志入前敵而馳馳入遇怯而出非是故不告也楚子自棘澤還使薳啓疆帥師送陳無宇注𫝊言齊楚固相結也吳人為楚舟師之役故注在此年夏音義為于僞反下注同召舒鳩人舒鳩人叛楚注舒鳩楚屬國召欲與共伐楚楚子師于荒浦注荒浦舒鳩地音義浦判五反使沈尹壽與師祁犂讓之注二子楚大夫音義犂力兮反又利之反舒鳩子敬逆二子而告無之且請受盟二子復命王欲伐之薳子曰不可注令尹薳子馮彼告不叛且請受盟而又伐之伐無罪也姑歸息民以待其卒注卒終也卒而不貳吾又何求若猶叛我無辭有庸乃還注彼無辭我有功為明年楚滅舒鳩𫝊陳人復討慶氏之黨鍼宜咎出奔楚注言宜咎所以稱名齊人城郟注郟王城也於是穀雒鬭毁王宫齊叛晉欲求媚於天子故為王城之音義郟苦洽反疏正義曰𫝊稱成王定鼎于郟鄏周公就而營之謂之洛邑亦名王城其地舊名為郟故以郟為城名周語云靈王二十二年穀洛鬬毁王宫計靈王以二年即位往年為二十二年往年毁壊其城故齊人今歲為王城之也穆叔如周聘且賀城王嘉其有禮也賜之大路注大路天子所賜車之總名為昭四年叔孫所以賜路葬張本晉侯嬖程鄭使佐下軍注代欒盈也鄭行人公孫揮如晉聘注揮子羽也音義揮許韋反程鄭問焉曰敢問降階何由注問自降下之道音義下遐嫁反又如字疏正義曰下注階猶道也知問降階者問自降下之道程鄭既得為卿以卿是髙位欲降意下人故問自降下之道子羽不能對歸以語然明注然明鬷蔑音義語魚據反鬷子公反然明曰是將死矣不然將亡貴而知懼懼而思降乃得其階注階猶道也下人而已又何問焉注言易知音義下户嫁反易以豉反且夫旣登而求降階者知人也不在程鄭其有亡釁乎不然其有惑疾將死而憂也注言鄭本小人為明年程鄭卒張本音義夫音扶知音智釁許覲反疏正義曰程鄭忽問降階然明議其將死故云此程鄭身有罪禍懼奔亡之釁而輙問降階也若不然則有迷惑之疾將死而憂乎何休難此云善言者君子所尚有小人道之輙為死徴是善言不可出口此未得傳之意也然明者鄭之知人知程鄭以佞媚嬖幸得升卿位非有謙退止足之心今忽問降階是改其常度以其改常知其將死故疑其知將有亡釁惑疾而憂故能出此語耳善言非其常所以知其死非謂口出善言即當死也趙文子賢人也將死其語偷程鄭小人也將死其言善俱是失常無所怪惑也春秋左傳注疏卷三十五春秋左氏傳注疏卷三十五考證公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于沙隨公至自會注無傳臣浩按傳言復錮欒氏是有傳也注云無傳者蓋為公至自㑹言意古夲公至自㑹自為一條傳鄭人使少正公孫僑對曰注少正鄭卿官也臣召南按鄭有六卿其司徒司馬司空皆見於傳有太宰官而非卿石􅎢是也少正為卿官尋傳上下惟見此文是時子産之位在四其上為子展子西伯有見二十六年傳傳貳於楚者子侯石盂歸而討之注石盂石􅎢臣召南按石􅎢與良霄以十一年如楚為楚所執傳在會蕭魚之前至十三年冬楚人始歸良霄于鄭石􅎢之計也此傳言歸而討之似蕭魚㑹後鄭即朝晉十二年春歸國即討子侯石盂石盂似又是一人非石㚟也必以石􅎢實石盂則所謂子侯者又何人乎傳執事實重圖之趙汸補注曰此記子産之言與二十九年女叔侯論魯事皆以見霸國政令無節諸侯不勝其勞晉之不競以此晉欒盈復入于晉入于曲沃注據曲沃衆還與君爭非欲出附他國故不言叛劉敞曰不言叛者劫衆以敵君則亂而已矣蘇轍曰不書自齊何也齊之納盈非以兵明納之也辟如盗賊私納之耳齊侯襲莒林堯叟曰春秋書襲者此特茟也傳慶氏以陳叛趙汸補注曰叛楚非叛國故不以叛告也傳知悼子少而聽於中行氏注悼子知罃之子荀盈也臣召南按史記索隱引系本云林父生庚庚生偃偃生吳又曰首生罃罃生朔朔生盈並是四代則知盈與中行吳是再從兄弟也傳齊侯伐衛注先驅前鋒軍先驅監本訛作申齊今改正傳趙勝帥東陽之師以追之疏服䖍以東陽為魯邑繆之甚矣東陽之師謂下文叔孫豹所帥者也臣召南按孔疏既知服䖍以魯東陽觧晉東陽之非又云東陽之師謂下文叔孫豹所帥是仍以魯師觧晉師矣傳下文明曰叔孫豹帥師救晉次于雍榆與趙勝所帥東陽之師並無干渉疏文自相矛盾又何以糾服䖍之失也尋按文勢必係從来刋本之誤疑疏元文當云服䖍以東陽為魯邑東陽之師謂下文叔孫豹所帥者謬之甚矣傳臧賈臧為出在鑄臣召南按十七年傳高厚圍臧紇于防郰叔紇臧疇臧賈帥甲三百宵犯齊師送之而復是賈于紇為卿之後亦嘗還魯矣紇奔邾時賈又在鑄耳傳自虞以上為陶唐氏臣召南按唐書宰相世系表劉氏出自祁姓劉累事夏為御龍氏在商為豕韋氏在周封為杜伯至宣王滅其國其子隰叔奔晉為士師生士蔿蔿生成伯缺缺生士㑹傳在周為唐杜氏注遷之於杜為杜伯杜伯之子隰叔奔晉監本脱杜伯二字今添傳齊社蒐軍實注祭社因閲數軍器祭社監本訛作祭禮今改正傳齊人城郟趙汸補注曰時穀水盛出於王城之西而南流入于洛水毁王城之西南將及王宫故齊人城郟春秋左氏傳注疏巻三十五考證
