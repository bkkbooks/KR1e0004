body:
  text: 春秋左傳注疏卷三十九起襄公二十九年盡二十九年晉杜氏注唐陸德明音義孔穎達疏經二十有九年春王正月公在楚注公在外闕朝正之禮甚多而唯書此一年者魯公如楚既非常此公又踰年故發此一事以明常疏注正義曰僖十六年冬公會諸侯于淮十七年秋九月公至自會宣七年冬公會諸侯于黒壤八年春公至自會成十年秋公如晉十一年春公至自晉十二年冬公如晉十三年春公至自晉此等正月公皆不在其類多矣是公在外闕朝正之禮甚多而皆不書唯書此一年者魯公如楚云云釋例曰襄二十九年春正月公在楚凡公之行始則書所如還則書公至今中復書公在楚者明國之守臣每月亦以公不朝之故告於廟也每月必告而特於正月釋之者蓋歲之正也月之正也日之正也三始之正嘉禮所重人理所以自新故特顯以通他月也公之在外所以闕朝正之禮甚多唯書此一年釋此一事者斯禮有常非義例所急故因公逺出踰年存此一事以示法也夏五月公至自楚庚午衞侯衎卒注無傳四同盟音義衎苦旦反疏注正義曰衎以成十五年即位其年盟于戚十七年于柯陵十八年于虚朾襄三年于雞澤五年于戚七年及孫林父盟九年于戲十一年于亳城北二十七年于宋衎自前即位及後復歸凡與魯九同盟劉炫以為杜云四同盟者誤今知不然者以其與成公三盟不數五年盟戚經不書不數七年林父是大夫又特共魯盟亦不數故為四同盟也劉不尋此理而規杜過非也閽弑吳子餘祭注閽守門者下賤非士故不言盗音義閽音昏弑申志反祭側界反疏注正義曰周禮閽人王宫每門四人鄭𤣥云閽人司昏晨以啟閉者刑人墨者使守門既服墨刑使之守門是下賤人也哀四年盗殺蔡侯申此為下賤非士故不言盗也穀梁傳曰不稱名姓閽不得齊於人不稱其君閽不得君其君也仲孫羯會晉荀盈齊高止宋華定衞世叔儀鄭公孫叚曹人莒人滕人薛人小邾人城杞注公孫叚伯石也三十年伯有死乃命為卿今蓋以攝卿行音義羯居謁反疏注正義曰公孫叚即伯石也據三十年傳伯有死始命伯石為卿則此時未為卿矣未為卿而得書其名故疑之云蓋以攝卿行也以隐公攝位為君而國人君之諸侯與之知攝位為卿者諸侯亦即以為卿序之於列故史得以卿書也文七年傳稱晉使先􅌸如秦逆公子雍荀林父謂蔑曰攝卿以徃可也何必子是知有使大夫攝卿之法也晉侯使士鞅來聘杞子來盟注杞復稱子用夷禮也音義復扶又反疏注正義曰把人春秋書爵稱侯又稱伯僖二十三年二十七年稱子傳曰用夷禮故曰子自爾以來常稱為伯今復稱子傳云書曰子賤之也明為用夷禮故賤之知把復稱子用夷禮也吳子使札來聘注吳子餘祭既遣札聘上國而後死札以六月到魯未聞喪也不稱公子其禮未同於上國音義札側八反疏注正義曰上云閽弑吳子此言吳子使聘傳曰其出聘也通嗣君也不知通嗣君通誰嗣也賈逵服䖍皆以為夷末新即位使來通聘案隐三年武氏子來求賻文九年毛伯來求金竝不言王使傳皆云王未葬也是知先君未葬嗣君不得命臣此與閽弑吳子文不隔月吳魯相去經塗至逺豈以君死之月即命臣乎而得書吳子使也且傳稱季札至魯徧觀周樂至戚聞鐘聲譏孫文子云君又在殯而可以樂乎自請觀樂譏人聼樂曠世大賢豈當若是故杜以為通嗣君通餘祭嗣也二十五年遏為巢牛臣所殺餘祭嗣立至此始使札通上國吳子未死之前命札出使既遣札聘而後身死札以六月到魯未及聞喪故每事皆行吉禮也經傳皆無札至之月知以六月到者以城杞在五月之下城杞既訖乃有士鞅來聘把子來盟若共在月中則不容此事下文有秋知札以六月至也札去之後吳始告喪告以三月被弑故追書在聘上耳札實公子不書公子者吳是東夷其禮未同於上國故史不書氏以札是卿故書其名耳釋例曰吳晚通上國故其君臣朝會不同於例亦猶楚之初始也昭二十七年傳稱延州來季子聘于上國是吳謂諸夏為上國也秋九月葬衞獻公注無傳齊高止出奔北燕注止高厚之子音義燕音烟冬仲孫羯如晉傳二十九年春王正月公在楚釋不朝正于廟也注釋解也告廟在楚解公所以不朝正疏注正義曰公本在國每月之朔常以朝享之禮親自祭廟今以在外之故闕於此禮國之守臣於此朔日告廟云公在楚史官因書於策傳解其告廟之意告云公在楚者解釋公所以不得親自朝正也楚人使公親襚注諸侯有遣使賵襚之禮今楚欲遣使之比音義襚音遂説文云衣死人衣遣使所吏反下同賵芳鳳反一本作贈比必利反疏正義曰檀弓云襄公朝于荆康王卒荆人曰必請襲魯人曰非禮也荆人强之巫先拂柩荆人悔之記之所言即是此事所異者此言請襚彼言請襲此言袚殯彼言拂柩雖俱説此事先後不同禮死而浴浴即襲襲後始小斂大斂乃殯案徃年𫝊公及漢聞康王卒公欲反則康王之卒公未至楚楚人使公親襚傳在此年言之則此年始令公親襚襚不得為襲也卒巳踰月不得柩仍在地足知殯是而柩非記虚而傳實也然則襚衣所以衣尸既殯而使公襚者致襚所以結恩好其衣不必充用雜記記致襚之禮云委衣于殯東是既殯猶致襚也文九年秦人來歸僖公成風之襚僖薨十年猶致之况既殯也注正義曰雜記云弔者含襚賵臨是諸侯之臣使於鄰國之禮也楚人以諸侯相好有遣使賵襚之禮今以公身既在意在輕魯欲以公依遣使之比使公親行之也公患之穆叔曰袚殯而襚則布幣也注先使巫袚殯之凶邪而行襚禮與朝而布幣無異音義袚音拂徐音廢邪似嗟反疏正義曰案雜記諸侯使臣致襚之禮云委衣於殯東今楚人以公身在意欲輕魯公依遣使之比公以楚人輕已所以患之故穆叔云若使巫人先徃袚殯則是君臨臣喪之禮袚除既了而行襚禮布陳衣物與行朝之時布陳幣帛無異有何可患劉炫云朝禮兩君相見先授玉然後致享乃布陳幣帛於庭也袚殯者君臨臣喪之禮先使袚殯行臨喪之禮然後致襚則全是布幣之禮言與朝而布幣無異也君臨臣喪者由先見臣故以袚殯比行朝禮自然致襚似布幣楚以親襚屈魯魯以袚殯自尊今僭為疏云以殯有凶邪畏惡患之不肯親襚穆叔云先使巫人袚除殯之凶邪既無而行襚禮布陳衣物與行朝之時布陳幣帛無異言俱無咎有何可患乃使巫以桃茢先袚殯注茢黍穰音義茢音列徐音例穰如羊反鄭注周禮云茢苕菷疏正義曰巫者接神之官周禮男巫王弔則與祝前檀弓云君臨臣喪以巫祝桃茢執戈惡之也鄭𤣥云為有凶邪之氣在側桃鬼所惡茢萑苕可埽不祥君臨臣喪禮有此法故使巫以桃茢先袚殯若以楚子為臣然所以屈楚也茢是菷盖桃為棒也詩毛傳曰薍為萑萑苕謂薍穂也杜云茢黍穰者今世所謂苕菷者或用薍穂或用黍穰是二者皆得為之也楚人弗禁既而悔之注禮君臨臣喪乃袚殯故楚悔之二月癸卯齊人葬莊公於北郭注兵死不入兆域故葬北郭疏注正義曰周禮冡人掌公墓之地辨其兆域凡死於兵者不入兆域夏四月葬楚康王公及陳侯鄭伯許男送葬至于西門之外諸侯之大夫皆至于墓楚郟敖即位注郟敖康王子熊麋也王子圍為令尹注圍康王弟鄭行人子羽曰是謂不宜必代之昌松柏之下其草不殖注言楚君弱令尹强物不兩盛為昭元年圍弑郟敖起本公還及方城季武子取卞注取卞邑以自益使公冶問注問公起居公冶季氏屬大夫璽書追而與之注璽印也疏注正義曰蔡邕獨斷云璽印也信也天子璽白玉螭虎紐古者尊卑共之月令曰固封璽季武子使公冶問璽書此諸侯大夫印稱璽也衛宏云秦以前民皆以金玉為印唯其所好自秦以來唯天子之印獨稱璽又以玉羣臣莫敢用也案周禮掌節貨賄用璽節鄭𤣥云今之印章也則周時印巳名璽但上下通用曰聞守卞者將叛臣帥徒以討之既得之矣敢告公冶致使而退注致季氏使命及舍而後聞取卞注發書乃聞之公曰欲之而言叛祗見疏也注言季氏欲得卞而欺我言叛盖疏我疏正義曰武子書云聞卞將叛則是叛形未著故公猜之言武子自欲得之而誣言其叛多見疏外我也多見疏猶論語云多見其不知量也服䖍本作祗見疏解云祗適也晉宋杜本皆作多古人多祗同音張衡西京賦云炙炮夥清酤多皇恩􅄎洪德施施與多為韻此類衆矣公謂公冶曰吾可以入乎注以季氏疏已故不敢入對曰君實有國誰敢違君公與公冶冕服注以卿服𤣥冕賞之疏注正義曰公冶先為大夫公令以恩加賜知以卿服𤣥冕賞之也周禮司服云卿大夫之服自𤣥冕而下是卿與大夫同服𤣥冕也其旒當以命數為異耳固辭强之而後受公欲無入榮成伯賦式微乃歸注式微詩􅆁風曰式微式微胡不歸式用也義取寄寓之微陋勸公歸也五月公至自楚公冶致其邑於季氏注本從季氏得邑故還之而終不入焉注不入季孫家曰欺其君何必使余季孫見之則言季氏如他日不見則終不言季氏及疾聚其臣注大夫家臣曰我死必無以冕服斂非徳賞也注言公畏季氏而賞其使非以我有徳音義斂力騐反且無使季氏葬我葬靈王注不書魯不會鄭上卿有事子展使印叚往疏正義曰鄭之上卿即子展也有事謂君適楚而代守國也計於時鄭卿在國猶有子西伯有不使彼行而使印叚者盖别有所掌矣子展守國故不得行也伯有曰弱不可注印叚年少官卑音義少詩照反子展曰與其莫往弱不猶愈乎詩云王事靡鹽不遑啟處注詩小雅盬不堅固也啟跪也言王事無不堅固故不暇跪處音義鹽音古跪其委反疏注正義曰小雅四牡之章盬亦蠱也昭元年傳曰於文皿蟲為蠱榖之飛亦為蠱蠱是蟲之害物故為不牢固也釋言云遑暇也啟跪也李廵曰遑閒暇也啟小跪也言王事無有不牢固已當牢固之故不得閒暇而跪處也東西南北誰敢寧處注謂上卿堅事晉楚以蕃王室也注言我固事晉楚乃所以蕃屏王室音義蕃芳元反王事無曠何常之有遂使印叚如周注傳言周衰卑於晉楚吳人伐越獲俘焉以為閽使守舟吳子餘祭觀舟閽以刀弑之注言以刀明近刑人音義近附近之近鄭子展卒子皮即位注子皮代父為上卿於是鄭饑而未及麥民病子皮以子展之命餼國人粟户一鍾注在喪故以父命也六斛四斗曰鍾音義餼許氣反疏正義曰蓋死日近死時民巳饑故假其生時之遺命也是以得鄭國之民故罕氏常掌國政以為上卿宋司城子罕聞之曰鄰於善民之望也注民亦望君為善疏正義曰鄰近也近於善民亦望君為善也宋亦饑請於平公出公粟以貸使大夫皆貸司城氏貸而不書注施而不徳音義貸他代反下同施始豉反下文同為大夫之無者貸宋無飢人叔向聞之曰鄭之罕宋之樂其後亡者也二者其皆得國乎注得掌國政音義向許丈反民之歸也施而不徳樂氏加焉其以宋升降乎注升降隨宋盛衰晉平公杞出也故治杞注治理其地脩其城疏注正義曰經書城杞謂築杞城耳下使女叔侯來治杞田知治杞之地非獨脩其城也六月知悼子合諸侯之大夫以城杞孟孝伯會之鄭子大叔與伯石往注大叔不書不親事音義知音智大叔音泰下同子大叔見大叔文子注文子衛大叔儀與之語文子曰甚乎其城杞也子大叔曰若之何哉晉國不恤周宗之闕而夏肄是屏注周宗諸姬也夏肄杞也肄餘也屏城也音義夏户雅反注下皆倣此肄以二反詩傳云斬而復生曰肄方言云枿餘也秦晉之間曰肄疏正義曰方言云肄枿餘也秦晉之間曰肄鄭𤣥云斬而復生曰肄杞是夏後滅而復存猶木之枿生小栽也其弃諸姬亦可知也巳諸姬是弃其誰歸之吉也聞之弃同即異是謂離徳詩曰協比其鄰昏姻孔云注詩小雅言王者和協近親則昏姻甚歸附也音義比毗志反晉不鄰矣其誰云之注云猶旋旋歸之齊髙子容與宋司徒見知伯女齊相禮注子容髙止也司徒華定也知伯荀盈也女齊司馬侯也相禮侍威儀也音義女音汝相息亮反賓出司馬侯言於知伯曰二子皆將不免子容專注專自是也司徒侈皆亡家之主也知伯曰何如對曰專則速及注速及禍也音義侈昌氏反又尸氏反侈將以其力斃注力盡而自斃音義斃婢世反專則人實斃之將及矣注為此秋高止出奔燕昭二十年華定出奔陳傳音義專則人實斃之絶句將及矣本或作侈將及矣者非范獻子來聘拜城杞也注謝魯為杞城音義為于偽反下文為之歌皆同公享之展莊叔執幣注公將以酬賓射者三耦注二人為耦音義耦五口反疏正義曰燕禮云若射則大射正為司射如郷射之禮是燕有為射之時也此云公享之則享法亦有射也周禮射人云諸侯之射以四耦此三耦者彼是畿内諸侯故四耦此及儀禮大射畿外諸侯故三耦或當臣與君異也公臣不足取於家臣家臣展瑕展王父為一耦公臣公巫召伯仲顔莊叔為一耦鄶鼓父黨叔為一耦注言公室卑微公臣不能備於三耦音義召上照反鄶才陵反黨音掌晉侯使司馬女叔侯來治杞田注使魯歸前侵杞田所歸少故不書弗盡歸也晉悼夫人慍曰齊也取貨注夫人平公母杞女也謂叔侯取貨於魯故不盡歸杞田音義慍紆運反怒也怨也先君若有知也不尚取之注不尚叔侯之取貨疏注正義曰服䖍云不尚尚也尚當取女叔侯殺之下叔侯云先君而有知也母寧夫人而焉用老臣服䖍云毋寧寧也寧自取夫人將焉用老臣乎杜以其言大悖無復君臣之禮故改之以為夫人云不尚取之者先君不髙尚此叔侯之取貨也母寧夫人謂先君當怪夫人之所為也劉炫以夫人慍而出辭則其言當悖直言不尚此事所譏大輕淺非是慍之意昭八年穿封戍云若知君之及此追恨不殺靈王其意乃悖於此盖古者不諱之言服䖍之説未必非也公告叔侯叔侯曰虞虢焦滑霍揚韓魏皆姬姓也注八國皆晉所滅焦在陜縣揚屬平陽郡音義虢瓜百反焦子消反滑乎八反晉是以大若非侵小將何所取武獻以下兼國多矣注武公獻公晉始盛之君誰得治之杞夏餘也而即東夷注行夷禮魯周公之後也而睦於晉以杞封魯猶可而何有焉注何有盡歸之魯之於晉也職貢不乏玩好時至公卿大夫相繼於朝史不絶書注書魯之朝聘音義好呼報反下好善同府無虛月注無月不受魯貢如是可矣何必瘠魯以肥杞且先君而有知也毋寧夫人而焉用老臣注言先君毋寧怪夫人之所為無用責我音義瘠在亦反毋音無焉用於䖍反杞文公來盟注魯歸其田故來盟書曰子賤之也注賤其用夷禮吳公子札來聘見叔孫穆子說之謂穆子曰子其不得死乎注不得以壽終音義說音悦壽音授好善而不能擇人吾聞君子務在擇人吾子為魯宗卿而任其大政不慎舉何以堪之禍必及子注為昭四年豎牛作亂起本疏正義曰昔有當塗貴邳國公蘇威嘗問曰知人是善然後好之何以言其不能擇人貴曰好善仁擇人鑒雖有仁心鑒不周物故好而不能擇也劉炫以此言亦有所切於彼請觀於周樂注魯以周公故有天子禮樂疏注正義曰明堂位云成王以周公為有勲勞於天下是以封周公於曲阜命魯公世世祀周公以天子之禮樂又曰凡四代之服噐魯兼用之是魯以周公故有天子之禮樂也使工為之歌周南召南注此皆各依其本國歌所常用聲曲音義召上照反本或作邵疏正義曰歌周南召南之詩而以樂音為之節也周南召南皆文王之詩也周召者岐山之陽地名周之先公曰大王者自豳始遷焉而脩德建王業大王生王季王季生文王於時雍梁荆豫徐揚之民皆歸文王文王三分天下有其二以服事殷文王改都於豐乃分岐邦周召之地賜周公旦召公奭以為采邑使此二公施教於己所職之國為文王行先公賢化與己聖化使二公雜而施行之但南土感化有深有淺其作詩也或感聖化或感賢化及武王伐紂定天下廵守述職陳諸國之詩以觀民風俗其六州所作詩其得聖人之化者謂之周南其得仁賢之化者謂之召南其實皆是文王之化而分繋周召二公耳必分繫者文王以諸侯之身行王者之化詩人述其本志為作聖賢之風此詩體實是風不可以雅名之文王身有王號不可以風繋之名無所繋詩不可棄因二公為王行化是故繋之二公周公聖以聖化繫之召公賢以賢化繫之周南十一篇召南十四篇季札此時徧觀周樂詩篇三百不可歌盡或每詩歌一篇兩篇以示意耳未必盡歌之也劉炫云不直言周召者以其實非二公身化也言南者詩序云言化自北而南也謂從岐周南被江漢也注正義曰詩人觀時政善惡而發憤作詩其所作文辭皆準其樂音令宫商相和使成歌曲樂人采其詩辭以為樂章述其詩之本音以為樂之定聲其聲既定其法可傳雖多歴年世而其音不改今此為季札歌者各依其本國歌所常用聲曲也由其各有聲曲故季札聼而識之言本國者變風諸國之音各異也曰美哉注美其聲疏注正義曰先儒以為季札所言觀其詩辭而知故杜顯而異之季札所云美哉者皆美其聲也詩序稱詩者志之所之也在心為志發言為詩情動於中而形於言言之不足故嗟嘆之長歌以申意也及其八音俱作歌詩為章則人之情意更復發見於樂之音聲出言為詩各述已情聲能寫情情皆可見聼音而知治亂觀樂而曉盛衰神瞽人賢師曠季札之徒其當有以知其趣也始基之矣注周南召南王化之基猶未也注猶有商紂未盡善也音義盡津忍反然勤而不怨矣注未能安樂然其音不怨怒音義樂音洛下和樂聲下文樂而不荒同疏注正義曰詩序云治世之音安以樂亂世之音怨以怒此作周召之詩其時猶有紂存音雖未能安樂巳得不怨怒矣為之歌􅆁鄘衞注武王伐紂分其地為三監三監叛周公滅之更封康叔并三監之地故三國盡被康叔之化音義鄘音容被皮義反疏注正義曰􅆁鄘衞者商紂畿内之地名也漢書地理志云周既滅殷分其畿内為三國詩風􅆁鄘衛國是也􅆁以封紂子武庚鄘管叔尹之衛蔡叔尹之以監殷民謂之三監故書序曰武王崩三監叛周公誅之盡以其地封弟康叔故􅆁鄘衞三國之詩相與同風此注取漢志為說也漢世大儒孔安國賈逵馬融之徒皆以為然故杜亦同之鄭𤣥詩譜云武王伐紂以其京師封紂子武庚為殷後庶殷頑民被紂化日久未可以建諸侯乃三分其地置三監管叔蔡叔霍叔使尹而監教之自紂城而北謂之􅆁南謂之鄘東謂之衛武王崩後五年周公居攝三監道武庚叛成王既黜殷命殺武庚復伐三監更於此三國建諸侯以殷餘民封康叔於衛使為之長後世子孫稍彊兼并彼二國混其地而名之先儒唯鄭言然康叔以後七世至頃侯仁人不遇􅆁人作柏舟之詩以刺之以後繼作十九篇為􅆁風十篇為鄘風十篇為衛風皆美刺衛君而分為三耳此三國之風實同是衛詩而必為三者鄭𤣥云作者各有所傷從其本國分而異之故為􅆁鄘衛之詩焉其意以為􅆁鄘衛各是大國土風不同作者雖俱有美刺而各述土風故大師各從其本分而異之曰美哉淵乎憂而不困者也注淵深也亡國之音哀以思其民困衞康叔武公德化深逺雖遭宣公滛亂懿公滅亡民猶秉義不至於困音義思息嗣反下憂思同吾聞衞康叔武公之徳如是是其衞風乎注康叔周公弟武公康叔九世孫皆衞之令徳君也聼聲以為别故有疑言音義别彼列反疏注正義曰康叔周公弟武公康叔九世孫世本世家文也魯為季札作樂為之歌聲曲耳不告季札以所歌之樂名也札言吾聞康叔武公之德如是是先聞其善今聲合其意雖不知其名而疑是衛風也言是其衛風乎疑之辭也直聼聲以為别不因名而後知故有疑言焉為之歌王注王黍離也幽王遇西戎之禍平王東遷王政不行於天下風俗下與諸侯同故不為雅疏注正義曰王詩黍離為首王非國名故舉首篇以表之王者周東都王城畿内方六百里之地也始武王作邑于鎬是為西都周公攝政營洛邑謂之王城是為東都成王既居洛邑復還歸西都十一世至幽王遇西戎之禍平王東遷王城於時王政不行於天下其風俗下同諸侯王畿内之人怨刺者以其政同諸侯皆作風詩不復為雅其音既是風體故大師别之謂之王國之變風也謂之王者以王當國猶春秋之王人天命未改尚尊之故不言周也曰美哉思而不懼其周之東乎注宗周隕滅故憂思猶有先王之遺風故不懼為之歌鄭注詩第七疏正義曰周宣王封母弟友於西都畿内是為鄭桓公於漢則京兆鄭縣是其都也幽王之時桓公為大司徒見幽王政荒問於史伯曰王室多故余懼及焉其何所可以逃死史伯教之濟洛河潁之間有虢鄶之國取而守之唯是可以少固及幽王為犬戎所殺桓公死之其子武公為晉文侯定平王於東都王城卒取史伯所云虢鄶之地而居之於漢則河南新鄭縣是其都也武公入作卿士國人作緇衣之篇以美之以後凡二十一篇皆鄭風也曰美哉其細巳甚民弗堪也是其先亡乎注美其有治政之音譏其煩碎知不能久疏正義曰樂歌詩篇情見於聲美哉者美其政治之音有所善也鄭君政教煩碎情見於詩以樂播詩見於聲内言其細碎巳甚矣下民不能堪也民不堪命國不可久是國其將在先亡乎居上者寛則得衆為政細宻庶事煩碎故民不能堪也為之歌齊注詩第八疏正義曰齊者古少皥之世爽鳩氏之虛也武王伐紂封大師吕望於齊是為齊太公其封域在禹貢青州岱山之隂濰淄之野於漢則齊郡臨淄縣是其都也太公後五世哀公荒滛怠慢國人作雞鳴之詩以刺之後凡十一篇皆齊風也曰美哉泱泱乎大風也哉注泱泱𢎞大之聲音義泱於良反韋昭於康反表東海者其大公乎注大公封齊為東海之表式音義大音泰國未可量也注言其或將復興音義復扶又反下不復譏同為之歌豳注詩第十五豳周之舊國在新平漆縣東北音義豳彼貧反疏正義曰豳者禹貢雍州岐山之北原隰之野其地西近戎北近狄豳是彼土之地名於漢則扶風栒邑縣是其都也周室之先后稷之曾孫曰公劉者自邰而遷彼焉由能脩后稷之業教民以農桑民咸歸之而成國積九世至大王乃入處於岐山世世脩德卒成王業武王崩成王幼周公攝政管蔡流言云公將不利於孺子周公於是舉兵東伐之乃陳后稷先公風化之所由致王業之艱難作七月之詩以表志大師以其主意於先公在豳時之事故别其詩以為豳國之變風凡七篇皆是周公之事也曰美哉蕩乎樂而不淫其周公之東乎注蕩乎蕩然也樂而不淫言有節周公遭管蔡之變東征三年為成王陳后稷先公不敢荒淫以成王業故言其周公之東乎音義樂而不淫音岳又音洛注同下而又何樂而可以樂倣此為成于僞反王業如字又于况反疏正義曰美哉又美其聲也蕩蕩寛大之意好樂不巳則近於荒淫故美其樂而不淫也先聞周公之德此聲同於所聞故疑之云其周公之在東乎言在東之時為此聲也為之歌秦注詩第十一後仲尼刪定故不同音義刪所姦反疏正義曰秦者隴西山谷之名於漢則隴西郡秦亭秦谷是也堯時有伯益者佐禹治水有功帝舜賜之姓曰嬴氏其後世之孫曰非子事周孝王孝王使之養馬於汧渭之間封之為附庸邑之於秦谷非子㑹孫秦仲宣王又命以為大夫始有車馬禮樂侍御之好國人作車鄰之詩以美之秦仲之孫襄公平王之初興兵討西戎以救周王既東遷乃以岐豐之地賜之始列為諸侯更有駟驖以下凡十篇皆秦風也注正義曰此為季札歌詩風有十五國其名皆與詩同唯其次第異耳則仲尼以前篇目先具其所刪削盖亦無多記傳引詩亡逸甚少知本先不多也史記孔子世家云古者詩三千餘篇孔子去其重取三百五篇盖馬遷之謬耳曰此之謂夏聲夫能夏則大大之至也其周之舊乎注秦本在西戎汧隴之西秦仲始有車馬禮樂去戎狄之音而有諸夏之聲故謂之夏聲及襄公佐周平王東遷而受其地故曰周之舊音義汧苦賢反去起吕反又如字為之歌魏注詩第九魏姬姓國閔元年晉獻公滅之疏正義曰魏者虞舜夏禹所都之地在禹貢冀州雷首之北析城之西於漢則河東郡河北縣是其都也周以封同姓世本無魏君名諡不知始封之君何所名也鄭𤣥以為周王平桓之世魏君儉嗇且褊急不務施徳國人作葛屨之詩以刺之後凡七篇皆魏風也曰美哉渢渢乎大而婉險而易行以徳輔此則明主也注渢渢中庸之聲婉約也險當為儉字之誤也大而約則儉節易行惜其國小無明君也音義渢扶弓反徐敷劒反韋昭音凡婉紆阮反險依注音儉易以豉反注同為之歌唐注詩第十唐晉詩疏正義曰唐者帝堯舊都之地於漢則太原郡晉陽縣是也周成王封母弟叔虞於堯之故墟曰唐侯其地南有晉水虞子爕父改為晉侯爕父後六世至僖侯甚嗇愛物儉不中禮國人閔之作蟋蟀之詩以刺之以後凡十二篇皆唐風也詩序云此晉也而謂之唐本其風俗憂深思逺有堯之遺風又叔虞初國亦以唐為名故名其詩為唐風曰思深哉其有陶唐氏之遺民乎不然何憂之逺也注晉本唐國故有堯之遺風憂深思逺情發於聲音義思息嗣反非令徳之後誰能若是疏正義曰陶唐之化遺法猶在作歌之民與唐世民同故察此歌曰思慮深逺哉見其思深故疑之云其有陶唐氏之遺民乎若其不是唐民何其憂思之逺也非承令徳之後誰能如此深慮也令徳謂唐堯也為之歌陳注詩第十二疏正義曰陳者太皥伏羲氏之虛也於漢則淮陽郡陳縣是其都也帝舜之胄有虞閼父者為周武王陶正武王賴其利器用又以其人是聖舜神明之後乃封其子滿於陳使奉虞舜之祀賜姓曰媯是為陳胡公後五世至幽公荒淫無度國人作宛丘之詩以刺之以後凡十篇皆陳風也曰國無主其能乆乎注淫聲放蕩無所畏忌故曰國無主自鄶以下無譏焉注鄶第十三曹第十四言季子聞此二國歌不復譏論之以其微也音義鄶古外反疏注正義曰言以下知兼有曹也鄶者古高辛氏火正祝融之虛也國在禹貢豫州外方之北滎波之南居溱洧之間於漢則河南郡宻縣竟内有其都也祝融之後分為八姓唯有妘姓為鄶國者處祝融之故地焉鄶是小國世本無其號諡不知其君何所名也鄭𤣥以為周王夷厲之時鄶公不務政事而好衣服大夫作羔裘之詩以刺之凡四篇皆鄶風也其後鄭武公滅其國而處之曹者禹貢兖州陶丘之地名於漢則濟隂郡定陶縣是其都也周武王封其弟叔振鐸於曹後十一世當周惠王時昭公好奢而任小人國人作蜉蝣之詩以刺之以後凡四篇皆曹風也鄶曹二國皆國小政狭季子不復譏之以其微細故也為之歌小雅注小雅小正亦樂歌之常疏正義曰詩序云言天下之事形四方之風謂之雅雅者正也政有小大故有小雅焉有大雅焉然則小雅大雅皆天子之詩也立政所以正下故詩序訓雅為正又以政解之天子以政教齊正天下故民述天子之政還以齊正而為名故謂之雅也王者政教有大有小詩人述之亦有大小故有小雅大雅焉據詩以小雅所陳有飲食賓客賞勞羣臣燕賜以懐諸侯征伐以彊中國樂得賢者長育人材於天子之政皆小事也大雅所陳有受命作周伐殷繼代受先王之福禄尊祖考以配天醉酒飽徳官人用士澤被昆蟲仁及草木於天子之政皆大事也詩人歌其大事制為大體述其小事制為小體體有大小故分為二焉詩體既異樂音亦殊其音既定其法可傳後之作者各從其舊二雅正經述小政為小雅述大政為大雅既有小雅大雅之體亦有小雅大雅之音王道既衰變雅竝作取小雅之音歌其政事之變者謂之變小雅取大雅之音歌其政事之變者謂之變大雅故變雅之美刺皆由音制有大小不復由政事之大小也風述諸侯之政非無大小但化止一國不足分别頌則功成乃作歸美報神皆是大事無復小體故風頌不分唯雅分為二也周自文王受命發跡肇基武王伐紂功成業就及成王周公而治致升平頌聲乃作此功成之頌本由此風雅而来故録周南召南之風鹿鳴文王之雅以為詩之正經計周南召南之風鹿鳴文王之雅所述文王之事亦有同時者也但文王實是諸侯而有天子之政詩人所作立意不同述諸侯之政則為之作風述天子之政則為之作雅就雅之内又為大小二體是由體制異非時節異也詩見積漸之義小雅先於大雅故魯為季札亦先歌小雅曰美哉思而不貳注思文王之德無貳叛之心怨而不言注有哀音其周徳之衰乎注衰小也猶有先王之遺民焉注謂有殷王餘俗故未大衰疏正義曰杜以此言皆歎正小雅也言其時之民思文武之徳不有二心也雖怨時政而能忍而不言其是周徳衰小之時乎猶有殷先王之遺民故使周徳未得大也服䖍以為此歎變小雅也其意言思上世之明聖而不貳於當時之王怨當時之政而不有背叛之志也其周徳之衰微乎疑其幽厲之政也劉炫以服言為是而謂杜解錯謬今知不然者以小雅大雅二詩相對今歌大雅云其文王之徳乎是歌其善者以大雅準之明知歌小雅亦歌其善者也若其不然何意大雅歌善小雅歌不善且魯為季札歌詩不應揚先王之惡以示逺夷劉不逹此㫖以服意而規杜非也注正義曰衰者差也九章算術謂差分為衰分言從大漸差而小故杜以衰為小也服䖍讀為衰微之衰謂幽厲之時也為之歌大雅注大雅陳文王之徳以正天下疏注正義曰大雅亦有武王成王之詩杜唯言文王者以下云其文王之徳乎故也曰廣哉熙熙乎注熙熙和樂聲曲而有直體注論其聲其文王之徳乎注雅頌所以詠盛徳形容故但歌其美者不皆歌變雅為之歌頌注頌者以其成功告於神明疏注正義曰鄭𤣥云頌之言容也天子之徳光被四表格于上下無不覆燾無不持載此謂之容也詩序云頌者美盛徳之形容以其成功告於神明者也言天子盛徳有形容可美可美之形容謂道教周備也成功者營造之功畢也天之所營在於命聖聖之所營在於任賢賢之所營在於養民民安而財豐衆和而事濟如是則司牧之功畢矣故告於神明也劉炫又云干戈既戢夷狄來賓嘉瑞悉臻逺近咸服羣生遂其性萬物得其所即功成之騐也萬物本於天人本於祖天之所命者牧人祖之所本者成業人安業就告神明使知雖社稷山川四嶽河海皆以民為主欲民安樂故作詩歌其成功徧告神明所以報神明恩也王者政有興廢未嘗不祭羣神祖廟政未太平則神無恩力故太平徳洽始報神功也頌詩止述祭祀之狀不言徳神之力者美其祭祀是報徳可知言其降福是荷恩可知幽王小雅云先祖非人胡寕忍予則於時之意豈復美其祭乎故美其祭則報情顯以成功告神明之意如此正謂周頌也其商頌則異雖是祭祀之歌祭先祖王廟述其生時之功乃是死後頌徳非以成功告神意同大雅與周頌異魯則止頌僖公􅂊如變風之美者文體類小雅又與商頌異也此當是歌周頌杜解盛徳所同兼殷魯三頌皆歌也曰至矣哉注言道備音義至矣哉一本無矣字直而不倨注倨傲音義倨音據徐音居傲五報反曲而不屈注屈撓音義撓乃孝反邇而不偪注謙退音義偪彼力反逺而不攜注攜貳遷而不淫注淫過蕩復而不厭注常日新音義厭於艷反徐於瞻反哀而不愁注知命樂而不荒注節之以禮用而不匱注徳𢎞大音義匱其位反廣而不宣注不自顯施而不費注因民所利而利之音義施始豉反費芳味反取而不貪注義然後取處而不㡳注守之以道音義底丁禮反行而不流注制之以義五聲和注宫商角徴羽謂之五聲音義徴張里反八風平注八方之氣謂之八風節有度守有序注八音克諧節有度也無相奪倫守有序也盛徳之所同也注頌有殷魯故曰盛徳之所同疏正義曰至矣哉言其美之至也以王道周備故為至美也自直而不倨至行而不流之十四事皆音有此意明王者之徳季札或取於人或取於物以形見此徳每句皆下字破上字而美其能不然也人性直者失於倨傲此直而能不倨也謂王者體性質直雖富有四海而不倨傲慢易在下物有曲者失於屈撓此曲而能不屈也謂王者曲降情意以尊接下恒守尊􅃊不有屈撓相去近者失於相偪此邇而能不偪也謂王者雖為在下與之親近能執謙退不陵偪在下相去逺者失於乖離此逺而能不攜也謂王者雖為在下與之疎逺而能不有攜離猜疑在下數遷徙者失於淫佚此遷而能不淫也謂王者雖有遷動流去能以徳自守不至放蕩去而復反則為人所厭此復而能使不厭也謂王者政教日新雖反覆而行不為下之厭薄哀者近於憂愁此哀而不憂愁也謂王者雖遇凶災知運命如此不有憂愁樂者失於荒廢此樂而能不荒廢也用之不巳物將匱乏此用而不可匱也志寛大者多自宣揚此雖廣而不自宣揚也好施與者皆費財物此能施而不費損也取人之物失於貪多此雖取而不為貪多也處而不動則失於留滯此雖乆處而能不底滯也謂王者相時而動時未可行雖復止處意不底滯行而不巳則失於流放此雖常行而能不流放也謂王者量時可行施布政教能制之以義不妄流移五等之聲皆和八方之風皆平八音之作有節其節皆有常度音之所守有分其守各有次序周魯與商皆有盛徳此上諸事盛徳之所同也注正義曰八音克諧無相奪倫舜典文也倫理也言八音能和諧是其音有節度也八音不相奪道理是音各守其分有次序也杜以為之歌頌言其亦歌商魯故以盛徳之所同謂商魯與周其徳俱盛也劉炫以為魯頌只美僖公之徳本非徳洽之歌何知不直據周頌而云頌有商魯乎今知不然者商頌之大體皆述其太平祭祀告神之事魯頌雖非太平經稱皇皇后帝皇祖后稷又云周公皇祖亦其福女美其祭神獲福與周頌相似且季文子請周作頌取其美名又季札至魯欲褒崇魯徳取其一善故云盛徳所同若直歌周頌宜加周字不得唯云歌頌故杜為此解劉以為魯頌不得與周頌同而規杜氏非也見舞象箾南籥者注象箾舞所執南籥以籥舞也皆文王之樂音義箾音朔籥羊略反疏正義曰樂之為樂有歌有舞歌則詠其辭而以聲播之舞則動其容而以曲隨之歌者樂器同而辭不一聲隨辭變曲盡更歌故云為之歌風為之歌雅及其舞則每樂别舞其舞不同季札請觀周樂魯人以次而舞每見一舞各有所歎故以見舞為文不言為之舞也且歌則聼其聲舞則觀其容歌以主人為文故言為歌也舞以季札為文故言見舞也樂有音聲唯言舞者樂以舞為主周禮大司樂云以樂舞教國子舞雲門大卷大咸大㲈大夏大濩大武又云乃分樂而序之以祭以享以祀舞雲門以祀天神舞咸池以祭地祗舞大韶以祀四望舞大夏以祭山川舞大濩以享先妣舞大武以享先祖凡六樂者文之以五聲播之以八音鄭𤣥云播之言被也是其以舞為主而被以音聲故魯作諸樂於季札皆云見舞也禮法歌在堂而舞在庭故郊特牲云歌者在上匏竹在下貴人聲也以貴人聲樂必先歌後舞故魯為季札先歌諸詩而後舞諸樂其實舞時堂上歌其舞曲也注正義曰賈逵云箾舞曲名言天下樂箾去無道杜云箾舞者所執二者俱無所據各以意言之耳詩述碩人之善舞云左手執籥右手秉翟籥是舞者所執則箾亦舞者所執杜說當得其實但不知箾是何等器耳杜云皆文王之樂則象箾與南籥各是一舞南籥既是文舞則象箾當是武舞也詩云維清奏象舞則此象箾之舞故鄭𤣥注詩云象用兵時刺伐之舞是武舞可知其名之曰南其義未聞也知是武王制者以為人子者貴其成父之事文王既有大功武王無容不述於周公之時已象伐紂之功作大武之樂不應復象文王之伐制為别樂故知此舞是武王制焉王者之作禮樂必太平乃得為之武王未及太平而得作此樂者一代大典須待太平此象文王之功非為易代大法故雖未制禮亦得為之周公太平雖作大武尊重文王之功留播之以為别樂故六代之樂不數此象也周禮分樂而序之象舞不以祭祀或當祈告所用故魯今亦有之劉炫云知是文王樂者詩云維清緝熙文王之典此象樂之所舞故知是文王樂也鄭𤣥注象又云此樂名象而巳以其象事有舞音故詩序謂之象舞舞非此樂名故此直言舞也其箾籥是可執之物司馬相如上林賦曰拂鷺鳥捎鳳凰則捎亦拂之類今人謂拂為拂捎此必傳於古其箾拍字同也杜不解南劉炫謂南如周南之意南在箾籥之間盖二者共有南義曰美哉猶有憾注美哉美其容也文王恨不及巳致太平音義憾本亦作感胡暗反大平音泰疏注正義曰歌聼聲而舞觀形故知美者美其容也歌詩由口而出樂音以詩為章人歌君徳情見於音聼聲知政容或可爾計聖人之徳非舞容可象而季札觀舞皆知其徳者聖人之作樂也各象當時之事時事見於舞故觀之可以知也樂記稱賓牟賈問大武之樂云敢問遲之遲而又乆何也子曰夫樂者象成者也摠干而山立武王之事也發揚蹈厲大公之志也武亂皆坐周召之治也且夫武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子夾振之而四伐盛威於中國也分夾而進事早濟也久立於綴以待諸侯之至也彼言大武之舞是象武王之事則知諸樂之舞皆象時王功徳也聖王功徳見於舉動之容故觀其舞容各知其徳也見舞大武者注武王樂疏正義曰鄭𤣥周禮注云大武武王樂也武王伐紂以除其害言其徳能成武功此舞四代之樂從後代而稍前也象是文王之樂事在大武之先先舞象而後舞武者以象為一代大樂故先舞之曰美哉周之盛也其若此乎見舞韶濩者注殷湯樂音義韶上昭反本或作招濩音護又户郭反疏正羲曰周禮謂之大濩鄭𤣥云大濩湯樂也湯以寛治民而除其邪言其徳能使天下得其所也然則以其防濩下民故稱濩也此言韶濩不解韶之義韶亦紹也言其能紹繼大禹也曰聖人之𢎞也而猶有慙徳聖人之難也注慙於始伐見舞大夏者注禹之樂疏正義曰樂記解此樂名夏大也鄭𤣥云言禹能大堯舜之徳又周禮注云禹治水敷土言其徳能大中國也季札見此舞歎禹勤苦為民而不以為恩徳則鄭周禮注是也曰美哉勤而不徳非禹其誰能脩之注盡力溝洫勤也音義洫况域反見舞韶箾者注舜樂音義韶箾音簫疏正義曰樂記解此樂名云韶繼也鄭𤣥云韶之言紹也言舜能繼紹堯之徳杜不解箾義箾即簫也尚書曰簫韶九成鳳凰來儀此云韶箾即彼簫韶是也孔安國云言簫見細器之備也盖韶樂兼簫為名簫字或上或下耳曰徳至矣哉大矣如天之無不幬也注幬覆也音義幬徒報反如地之無不載也雖甚盛徳其蔑以加於此矣觀止矣若有他樂吾不敢請已注魯用四代之樂故及韶箾而季子知其終也季札賢明才博在吳雖已涉見此樂歌之文然未聞中國雅聲故請作周樂欲聼其聲然後依聲以參時政知其興衰也聞秦詩謂之夏聲聞頌曰五聲和八風平皆論聲以參政也舞畢知其樂終是素知其篇數疏注正義曰明堂位云四代之服器官魯兼用之是魯之所用四代而巳唯用四代之樂不得用雲門大咸故舞及韶箾而季札知其終也先儒以為季札在吳未嘗經見此樂為歌諸詩其所歎美皆以詩辭之内求所歎之意故杜辨之在吳雖巳見此樂歌之文但未聞中國雅聲其所言者皆聼聲而知非察其文辭故取傳文證之明是素知其篇數也其出聘也通嗣君也注吳子餘祭嗣立故遂聘于齊説晏平仲謂之曰子速納邑與政注納歸之公音義説音悦下皆同無邑與政乃免於難齊國之政將有所歸未獲所歸難未歇也注歇盡也音義難乃旦反下皆同歇許謁反故晏子因陳桓子以納政與邑是以免於欒高之難注難在昭八年聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉注大帶也吳地貴縞鄭地貴紵故各獻已所貴示損已而不為彼貨利音義縞古老反徐古到反繒也紵直吕反疏注正義曰玉藻説大帶之制大夫以素為帶裨其垂三尺者外以𤣥内以華居士錦帶弟子縞帶季札吳卿也而以縞帶與子産者是其當時之所有耳吳始通上國未必服章依禮也杜以縞是中國所有紵是南邊之物非土所有各是其貴知其示損已耳不為彼貨利也若其不然傳不須載明其有此意也孔安國云縞白繒也鄭𤣥禮記注云白經赤緯曰縞黒經白緯曰纖謂子産曰鄭之執政侈難將至矣政必及子子為政慎之以禮不然鄭國將敗注侈謂伯有疏注正義曰據二十七年傳伯有次子展之下此年子展卒故伯有執政也上文云子展卒子皮為政者盖鄭人以子展有大功使子皮代父為上卿耳其父始卒國政猶在伯有下云伯有使公孫黒如楚是伯有執政之事也適衞説蘧瑗注蘧伯玉音義蘧其居反瑗于眷反史狗注史朝之子文子音義史朝如字下文公子朝同史鰌注史魚音義鰌音秋公子荆公叔發注公叔文子公子朝曰衞多君子未有患也自衞如晉將宿於戚注戚孫文子之邑聞鍾聲焉曰異哉吾聞之也辯而不徳必加於戮注辯猶争也音義争争鬬之争夫子獲罪於君以在此注孫文子以戚叛懼猶不足而又何樂夫子之在此也猶燕之巢于幕上注言至危音義幕音莫君又在殯而可以樂乎注獻公卒未葬遂去之注不止宿文子聞之終身不聼琴瑟注聞義能改適晉説趙文子韓宣子魏獻子曰晉國其萃於三族乎注言晉國之政將集於三家音義萃在醉反集也説叔向將行謂叔向曰吾子勉之君侈而多良疏正義曰謂多以惡人為良而善之大夫皆富政將在家注富必厚施故政在家音義施式䜴反吾子好直必思自免於難秋九月齊公孫蠆公孫竈放其大夫高止於北燕注蠆子尾竈子雅放者宥之以遠音義蠆勑邁反宥音又乙未出書曰出奔罪高止也注實放書奔所以示罪疏注正義曰釋例云奔者迫窘而去逃死四鄰不必禮出也放者受罪黜免宥之以逺也迫窘而奔及以禮見放俱去其國故傳通以為文仲尼脩春秋又以所稱為優劣也夫立功立事者國之厚益而身之表的也表髙的明雖婦人猶欲彎弓而况當塗之士是以君子慎之道家貴善行者無轍跡功遂而身退高止既犯其始又專以終之免死為幸斯乃聖賢之篤戒故變放言奔又致其罪以示過胥甲之放命陳招之首惡矯厲以篤教也杜以高止之罪輕於陳招胥甲而變放言奔以止為重故原聖意欲以申之高止好以事自為功且專故難及之音義好呼報反冬孟孝伯如晉報范叔也注范叔士鞅也此年夏來聘為高氏之難故高豎以盧叛注豎高止子音義為于偽反下注為子産同豎上主反十月庚寅閭丘嬰帥師圍盧高豎曰苟使高氏有後請致邑注還邑於君齊人立敬仲之曾孫酀注敬仲高傒音義酀於顯反傒音兮良敬仲也注良猶賢也疏正義曰依世本敬仲生莊子莊子生傾子傾子生宣子宣子生厚厚生止止是敬仲𤣥孫之子也世本又云敬仲生莊子莊子生傾子傾子之孫武子偃據世本則偃為敬仲𤣥孫今傳云曾孫必有一誤也此酀即後所云高偃是也世族譜以高武子為酀偃為一人盖酀偃聲相近而字為二耳董遇注此亦作偃劉炫云據世本高止敬仲𤣥孫之子不立止近親逺取敬仲曾孫者齊人賢敬仲故繫之言敬仲曾孫則此人祖父皆非正適今别立之逺繼敬仲後髙止祖父皆絶其祀也十一月乙卯高豎致盧而出奔晉晉人城緜而寘旃注晉人善其致邑音義緜音緜寘之豉反旃之然反鄭伯有使公孫黑如楚注黒子晳音義晳星歴反辭曰楚鄭方惡而使余徃是殺余也伯有曰世行也注言女世為行人音義女音汝子晳曰可則往難則已何世之有伯有將强使之子晳怒將伐伯有氏大夫和之十二月已巳鄭大夫盟於伯有氏裨諶曰是盟也其與幾何注言不能久也裨諶鄭大夫音義强其丈反裨婢之反諶本亦作湛其與如字或音預幾居豈反詩曰君子屢盟亂是用長今是長亂之道也禍未歇也必三年而後能紓注紓解也音義屢力住反長丁丈反下同紓直吕反徐音舒解音蟹然明曰政將焉往裨諶曰善之代不善天命也其焉辟子産注言政必歸子産音義將焉於䖍反下同舉不踰等則位班也注子産位班次應知政擇善而舉則世隆也注世所高也天又除之奪伯有魄注喪其精神為子産驅除音義喪息浪反除驅竝如字一讀上丘具反下直據反子西即世將焉辟之天禍鄭久矣其必使子産息之乃猶可以戾注戾定也不然將亡矣疏正義曰案傳伯有死後子皮授子産政云虎帥以聼命則子皮於時位在子産上矣此裨諶論鄭卿位次其言不及子皮者盖以子皮非舊卿雖繼父而居高位民望政次未之許也及伯有既死子西亦卒子皮位為上卿故鄭人使知政耳春秋左傳注疏卷三十九春秋左氏傳注疏卷三十九考證春王正月公在楚劉敞曰書公在楚以存公也公之在楚則殆乎不得反矣國非其國也季孫宿取卞以自封公曰吾不可以入矣將適諸侯榮成伯强之乃歸故曰公在楚無魯之辭也臣召南按事勢有漸書襄公在楚即昭公在乾侯之漸也昭公之辱始於襄公而意如之惡又甚于宿臣照按左氏但以闕朝正之禮言之録實也時謂闕朝正之禮則記之非左氏云然也若夫劉敞之論則由後而知前由今而論古也左氏傳止記當日事不得闌入己語如劉敞云云固古今史法然使劉敞于千百年後知如是云云者左氏史之功也夏五月公至自楚孫復曰公留于楚者七月傳齊人葬莊公於北郭疏周禮冡人掌公墓之地辨其兆域辨監本訛作下今改正傳璽書追而與之疏月令曰固封璽固監本訛作周今改正臣浩按鄭注月令但有固封疆不見有固封璽之文也但蔡邕在康成前或所見月令本異未可知也傳袛見疏也臣照按如孔疏所言則晉宋杜本作多見疏也今從袛從服䖍本也其引西京賦炙炮夥清酤多皇恩􅄎洪徳施盖言古者多有袛音故多與施叶又義則多袛並通音則多袛易混也然西京賦本不以多與施叶古韻四聲通分四聲自沈約始是故夥與多叶溥與施叶支紙麌虞古同用當句自韻非隔句為韻也傳且無使季氏葬我林堯叟曰公冶不義季氏欺君故生不入其家死不受其葬趙汸曰傳見襄公幾不入國季氏志久無君宿意如乃世濟其惡也傳遂使印叚如周陳傅良曰傳見魯不往會不書葬例趙汸曰此史法也臣召南按魯君至親襚楚喪而於王室不遣卿大夫名義尚可問乎傳記印叚如周見鄭之卑衰周於晉楚也又見魯之但知有晉楚并不知有周也傳來治杞田趙汸補注曰杞田盖魯伐杞時所取賂田魯人墮甥舅之義諱不登于策故復歸于杞亦不書事與汶陽田異又見昭七年傳美哉淵乎憂而不困者也吾聞衞康叔武公之徳如是漢書地理志引此無憂而不困句又無武公二字傳為之歌鄭疏於漢則京兆鄭縣又於漢則河南新鄭縣監本作京兆郡河南郡誤也西漢京兆及東漢河南皆稱尹不稱郡鄭康成譜原無郡字今從别本刪傳美哉其細巳甚史記吳世家引此於其細巳甚上無美哉二字傳美哉泱泱乎大風也哉地理志引此無美哉二字又無表東海者四字傳為之歌豳疏於漢則扶風栒邑縣扶風下監本有郡字誤也右扶風與左馮翊稱三輔亦不稱郡别本無郡字今刪傳以徳輔此則明主也吳世家引此作盟主傳思深哉其有陶唐氏之遺民乎吳世家遺民作遺風地理志引此無不然以下三句傳其周徳之衰乎猶有先王之遺民焉注謂有殷王餘俗故未大衰臣召南按文義當云謂有殷王餘俗故未大吳世家引此注作故未大是也各本俱衍一衰字又疏服䖍以為此歎變小雅也臣浩按服義勝杜傳見舞象箾南籥者臣召南按下文韶箾箾音簫疑此箾亦應同之注雖無明文但云舞所執則簫亦可執也陸氏于此音朔與下不同必有所據今不可考又吳世家注引賈逵曰象文王之樂舞象也箾舞曲也南籥以籥舞也又疏舞大韶以祀四望周禮韶作㲈又疏詩云維清奏象舞臣召南按詩云應作詩序此引序不引詩也又疏此樂名象而巳今本鄭箋無此語又疏以其象事有舞音詩疏作象事為舞傳見舞大夏者疏樂記解此樂名夏大也推尋文義樂名下應有云字傳若有他樂吾不敢請巳臣召南按吳世家注引服䖍曰周用六代之樂堯曰咸池黄帝曰雲門魯受四代下周二等故不舞其二季札知之故曰雖有他樂吾不敢請杜注盖用其説也春秋左氏傳注疏卷三十九考證
