body:
  text: 春秋左傳注疏卷四十起㐮公三十年盡三十一年晉杜氏注唐陸徳眀音義孔穎逹疏經三十年春王正月楚子使薳罷来聘音義罷音皮夏四月蔡世子般弑其君固音義般音班五月甲午宋災注天火曰災宋伯姫卒天王殺其弟佞夫注稱弟以惡王殘骨肉音義佞乃定反惡烏路反下惡宋同一音如字疏注正義曰傳言罪在王知稱弟以惡王也王子瑕奔晉注不言出奔周無外秋七月叔弓如宋葬宋共姫注共姫從夫諡也叔弓叔老之子卿共葬事禮過厚三月而葬速音義共音恭注皆同傳亦倣此疏注正義曰公羊傳曰其稱諡何賢也杜以共非夫人之諡故注顯而異之夫諡為共從夫諡而稱之耳共非夫人之身行也昭三十年傳曰先王之制諸侯之喪士弔大夫送葬則夫人之喪不得􅂈之也昭三年傳云文㐮之覇也君薨大夫弔卿共葬事夫人士弔大夫送葬是法皆不使卿也伯姬魯女以災而死魯人愍之故使卿共葬事禮􅂈厚也鄭良霄出奔許注耆酒荒淫書名罪之音義耆市志反疏注正義曰據傳子晳伐伯有而伯有非有罪也春秋出奔書名皆是罪之之文故杜跡其罪状耆酒荒淫故書名也自許入于鄭注不言復入獨還無兵音義復扶又反疏注正義曰成十八年傳例曰以惡曰復入謂還而以兵害國為惡事而入若魚石以楚師伐宋取其彭城欒盈帥曲沃之甲以入于絳如是乃為惡入也良霄獨還無兵入國始為惡非是以惡入故不得書復入直言入者自外而入内耳非彼例也成十五年宋華元出奔晉宋華元自晉歸于宋奔之與歸再書名氏此良霄不重書名氏者彼宋再告此鄭一告故連書之鄭人殺良霄冬十月葬蔡景公注無傳晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人把人小邾人㑹于澶淵宋災故注㑹未有言其事者此言宋災故以惡宋人不克己自責而出㑹求財音義澶市然反字林云丈仙反澶水在宋疏注正義曰案桓二年㑹于稷以成宋亂則是㑹言其事而此言㑹未有言其事義相違者彼言以成宋亂直連言所㑹之事與桓十五年㑹于袲伐鄭相似經不眀言事之意故今此言宋災故是丁寧之辭不與彼同按傳責諸侯之卿并及宋人杜此注何以唯言惡宋人不克己自責不兼為諸侯卿者以傳云書曰某人某人宋災故尤之也是宋災之文獨繫向戌稱人故知宋災特惡宋也傳三十年春王正月楚子使薳罷来聘通嗣君也注郟敖即位穆叔問王子之為政何如注王子圍為令尹音義問王子之為政一本作問王子圍之為政服䖍王肅本同疏正義曰傳無圍字故杜云王子圍為令尹也服䖍云王子楚令尹王子圍也王肅云王子楚令尹圍也對曰吾儕小人食而聽事猶懼不給命而不免於戾焉與知政固問焉不告穆叔告大夫曰楚令尹将有大事子蕩将與焉注子蕩薳罷音義儕仕皆反焉與上於䖍反下音預下将與與於食同助之匿其情矣注子圍素貴郟敖微弱諸侯皆知其将為亂故穆叔問之音義匿女力反子産相鄭伯以如晉叔向問鄭國之政焉對曰吾得見與否在此嵗也駟良方爭未知所成注駟氏子晳也良氏伯有也音義相息亮反爭爭闘之爭下注駟良爭同若有所成吾得見乃可知也叔向曰不既和矣乎對曰伯有侈而愎注愎狠也音義愎彼力反狠胡懇反子晳好在人上莫能相下也雖其和也猶相積惡也惡至無日矣注為此年秋良霄出奔傳音義好呼報反下遐嫁反三月癸未晉悼夫人食輿人之城把者注輿衆也城把在徃年音義食音嗣輿音餘絳縣人或年長矣無子而徃與於食有與疑年使之年注使言其年音義長丁丈反疏正義曰有與同食者問此老人之年不告以實疑其年也使之年者更使言其真年也曰臣小人也不知紀年臣生之嵗正月甲子朔四百有四十五甲子矣其季於今三之一也注所稱正月謂夏正月也三分六甲之一得甲子甲戍盡癸未音義夏戸雅反吏走問諸朝注皆不知故問之音義吏走一本作使走如字速疾之意也一曰走使之人也服䖍王肅本作吏云吏不知厯也疏正義曰俗本吏作使服䖍云吏不知厯數故走問於卿大夫王肅云吏不知厯也師曠曰魯叔仲惠伯㑹郤成子于承匡之嵗也注在文十一年疏正義曰劉炫云傳之叙事自可以魯為主若載人語則當如其本言此師曠晉人自道晉事當云郤成子㑹魯叔仲惠伯所以云叔仲惠伯㑹郤成子于承匡之嵗者丘眀意在以魯為主遂使此言反耳丘眀尚不免於此况後解説者乎今知非者凡魯史所記云公卿㑹某侯者皆據公卿徃㑹他若他来㑹我則以他為文若衛侯㑹公于㳫鄭伯㑹公于棐是也今郤成子在承匡魯徃㑹之以晉為主晉人之言正是其宜劉炫以為晉人不當稱叔仲惠伯㑹郤成子以為丘眀之誤恐非也是嵗也狄伐魯叔孫荘叔於是乎敗狄于鹹獲長狄僑如及虺也豹也而皆以名其子七十三年矣注叔孫僑如叔孫豹皆取長狄名音義鹹音咸僑其驕反虺虚鬼反疏正義曰敗狄于鹹事在彼嵗未必其年頓生三子當是欲表其功雖在後生子追以前事名之史趙曰亥有二首六身注史趙晉大史亥字二畫在上併三人為身如算之六音義畫音獲下同下二如身是其日數也注下亥上二畫竪置身旁疏正義曰二畫為首六畫為身下首之二畫並之使如其身旁則是生来日數也因亥畫似算位故假之以為言其本作亥字不為此也案字書古之亥字體殊不然盖春秋之時亥字有二六之體異於古制其説文是小篆之書又異於此説文云亥荄也十月微陽起接盛隂從二二古文上字一人男一人女也從乙象懐子咳咳之形也士文伯曰然則二萬二千六百有六旬也注文伯士弱之子疏正義曰文十一年至此年為七十四年而上云七十三年案文十一年正月甲子朔為夏之正月是其年三月也此年之二月癸未是夏之十二月計為七十三年猶尚年未終也假作全年算之置七十三年以全日三百六十五日乘之巳得二萬六千六百四十五日也每年有四分日之一是四年而成一日以四除七十三年又得十八日并全日為二萬六千六百六十三日計終此十二月盡有二萬六千六百六十三日四分十之一今除去三日四分日之一整取六旬合當十二月二十七日今杜長厯云二十三日癸未是少四日所以不與常歴同者盖杜為長歴約凖春秋日月以為長歴與常歴不同故置閏逺近不定盖七十三年之内於常厯校四箇大月而剩用四日故癸未為二十三日若依常厯是二十七日也劉炫云所以少三日者文十一年非首章年其間閏有前却故長歴此月辛酉朔二十三日得癸未来月庚寅朔計至朔長三日長歴去年閏八月由閏近故也趙孟問其縣大夫則其屬也注屬趙武疏正義曰諸是守邑之長公邑稱大夫私邑則稱宰此言問其縣大夫問絳縣之大夫也絳非趙武私邑而云則其屬者盖諸是公邑國卿分掌之而此邑屬趙武也召之而謝過焉曰武不才任君之大事以晉國之多虞不能由吾子注由用也使吾子辱在泥塗乆矣武之罪也敢謝不才遂仕之使助為政辭以老與之田使為君復陶注復陶主衣服之官音義復音服疏注正義曰昭十二年傳説楚子出獵王皮冠秦復陶翠被豹舄執鞭以出復陶之文在冠屨之間知復陶是衣也此言君復陶知是主君衣服之官也衣服之名復陶其義未聞以為絳縣師注縣師掌地域辨其夫家人民疏注正義曰既使為主衣服之官又以為絳邑之縣師也周禮縣師上士二人其職掌邦國都鄙稍甸郊里之地域而辨其夫家人民田畆之數及其六畜車輦之稽凡造都邑量其地而制其域以嵗時徴野之賦貢天子之縣師掌此諸事則諸侯之縣師亦當然故杜略引周禮以解之據如周禮則縣師是王朝之官而此言絳縣師者絳是晉國所都之邑盖以居在絳邑故繫絳以言之而廢其輿尉注以役孤老故疏正義曰服䖍云輿尉軍尉主發衆使民於時趙武将中軍若是軍尉當是中軍尉也注正義曰知者上云無子是孤年七十三是老也於是魯使者在晉歸以語諸大夫季武子曰晉未可婾也注媮薄也音義使所吏反語魚據反媮它侯反有趙孟以為大夫有伯瑕以為佐注伯瑕士文伯有史趙師曠而咨度焉有叔向女齊以師保其君其朝多君子其庸可婾乎勉事之而後可注傳言晉所以強不失諸侯且眀歴也音義度待洛反夏四月己亥鄭伯及其大夫盟注駟良爭故君子是以知鄭難之不巳也注鄭伯微弱不能制其臣下君臣詛盟故曰亂未巳音義難乃旦反詛側慮反蔡景侯為大子般娶于楚通焉大子弑景侯注終子産言有子祸也音義為于偽反娶七住反初王儋季卒注儋季周靈王弟音義儋丁甘反其子括将見王而歎注括除服見靈王入朝而歎音義括古活反見賢遍反注同單公子愆期為靈王御士過諸廷注愆期行過王廷音義單音善愆起䖍反下同廷音庭注同聞其歎而言曰烏乎必有此夫注欲有此朝廷之權音義烏乎本又作嗚呼音同夫音扶入以告王且曰必殺之不慼而願大視躁而足髙心在他矣不殺必害王曰童子何知及靈王崩儋括欲立王子佞夫注佞夫靈王子景王弟音義躁早報反佞夫弗知戊子儋括圍蒍逐成愆注成愆蒍邑大夫音義蒍于委反成愆奔平畤注平畤周邑音義畤音止又音市本或作疇五月癸巳尹言多劉毅單蔑甘過鞏成殺佞夫注五子周大夫音義過音戈鞏力勇反括瑕廖奔晉注括廖不書賤也音義廖力彫反一音𠡠㽞反書曰天王殺其弟佞夫罪在王也注佞夫不知故經書在宋災下從赴或叫于宋大廟注叫呼也音義叫古弔反大廟音泰一本無大字呼火故反曰譆譆出出注譆譆熱也出出戒伯姬音義譆許其反出如字鄭注周禮引此作詘詘劉昌宗亦音出鳥鳴于亳社注殷社音義亳歩各反疏正義曰哀四年亳社災穀梁傳曰亳社者亳之社也亳亡國也亡國之社以為廟屏戒也然則此亳社是殷社也殷都于亳武王伐紂而頒其社於諸侯以為亡國之戒此鳥鳴于魯國之亳社也服䖍云殷宋之祖也故鳴其社伯姬魯女欲使魯徃悟伯姬也如曰譆譆注皆火妖也甲午宋大災宋伯姬卒待姆也注姆女師音義姆徐音茂字林音亡又反一音母疏正義曰荘二十年齊大災杜云来告以大故書此不書大告者不言大也服䖍云不書大非災火及人伯姬坐而待之耳然則昭十八年衛宋陳鄭災災皆及人何以不言大也注正義曰鄭𤣥昏禮注云姆婦人年五十無子出而不復嫁能以婦道教人者若今時乳母矣何休云選老大夫妻為姆也大夫之妻當在夫室安得從女而嫁也若言既為夫人選大夫之妻為之則禮言女未嫁而有姆非至夫家始選也君子謂宋共姬女而不婦女待人注待人而行婦義事也注義從宜也伯姬時年六十左右疏注正義曰義者宜也從宜宜辟火也成九年伯姬歸于宋至此四十年故為六十左右也六月鄭子産如陳蒞􅉀歸復命告大夫曰陳亡國也不可與也注不可與結好音義好呼報反聚禾粟繕城郭恃此二者而不撫其民其君弱植公子侈大子卑大夫敖政多門注政不由一人音義繕上戰反植徐直吏反一音時力反敖五報反本亦作傲服本作放云淫放也疏正義曰周禮謂草木為植物植為樹立君志弱不樹立也大夫敖言大夫驕敖也服䖍云言大夫淫放則服本為大夫放矣故今俗本多為放字以介於大國注介間也音義介音界能無亡乎不過十年矣注為昭八年楚滅陳傳秋七月叔弓如宋葬共姬也注傷伯姬之遇災故使卿共葬音義共音恭鄭伯有耆酒為窟室注窟室地室音義耆市志反窟口忽反而夜飲酒擊鍾焉朝至未巳朝者曰公焉在注家臣故謂伯有為公音義焉於䖍反其人曰吾公在壑谷注壑谷窟室音義壑呼洛反皆自朝布路而罷注布路分散音義罷皮買反徐扶彼反既而朝注伯有朝鄭君則又将使子晳如楚歸而飲酒庚子子晳以駟氏之甲伐而焚之伯有奔雍梁注雍梁鄭地音義雍於用反醒而後知之遂奔許大夫聚謀子皮曰仲虺之志注仲虺湯左相音義醒星頂反相息亮反云亂者取之亡者侮之推亡固存國之利也罕駟豐同生注罕子皮駟子晳豐公孫叚也三家本同母兄弟音義侮亡甫反伯有汰侈故不免注三家同出而伯有孤特又汏侈所以亡音義汰音泰人謂子産就直助彊注時謂子晳直三家彊子産曰豈為我徒注徒黨也言不以駟良為黨國之禍難誰知所敝或主彊直難乃不生注言能彊能直則可弭難今三家未能伯有方爭音義難乃旦反下及注同弭彌氏反爭爭闘之爭姑成吾所注欲以無所附著為所音義著直略反辛丑子産斂伯有氏之死者而殯之不及謀而遂行注不與於國謀音義斂力豔反下同不與音預下文不與同印叚從之注義子産子皮止之衆曰人不我順何止焉子皮曰夫子禮於死者况生者乎遂自止之壬寅子産入癸夘子石入注子石印段皆受盟于子晳氏乙巳鄭伯及其大夫盟于大宫注大宫祖廟盟國人于師之梁之外注師之梁鄭城門伯有聞鄭人之􅉀已也怒聞子皮之甲不與攻已也喜曰子皮與我矣癸丑晨自墓門之瀆入注墓門鄭城門音義瀆徐音豆因馬師頡介于襄庫以伐舊北門注馬師頡子羽孫音義頡戸結反介音界下文同駟帶率國人以伐之注駟帶子西之子子晳之宗主皆召子産注駟氏伯有俱召子産曰兄弟而及此吾從天所與注兄弟恩等故無所偏助伯有死於羊肆注羊肆市列子産襚之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬諸斗城注斗城鄭地名音義襚音遂枕之鴆反股音古子駟氏欲攻子産子皮怒之曰禮國之幹也殺有禮禍莫大焉乃止注歛葬伯有為有禮於是游吉如晉還聞難不入注懼禍并及音義難乃旦反復命于介八月甲子奔晉駟帶追之及酸棗與子上盟用兩珪質于河注子上駟帶也沈珪於河為信也酸棗陳留縣音義與子上用兩珪質于河質如字一音致一本作與子上絶句用兩珪質于河别為一句也沈音鴆又如字使公孫􅆄入􅉀大夫己巳復歸注游吉歸也音義􅆄許乙反書曰鄭人殺良霄不稱大夫言自外入也注既出位絶非復鄭大夫音義復扶又反於子蟜之卒也注子蟜公孫蠆卒在十九年音義蟜居表反将葬公孫揮與裨竈晨㑹事焉注㑹葬事音義揮許韋反過伯有氏其門上生莠子羽曰其莠猶在乎注子羽公孫揮以莠喻伯有伯有侈知其不能乆存音義莠羊九反草也於是嵗在降婁降婁中而旦注降婁奎婁也周七月今五月降婁中而天眀音義降戸江反下及注同奎吉圭反疏注正義曰降婁奎婁釋天文也孫炎曰降下也奎為溝瀆故稱降也杜以周七月今五月降婁中而天眀劉炫以為五月降婁未中而規杜失今知非者以三月諸星復位合昏奎婁在戌以衝反之平旦在辰又三月日體在胃平旦之時奎婁在胃昴之前亦當在辰既三月平旦在辰則四月在巳五月在午月令旦危中者據夜有長短及星度有廣狹是細計之數杜據大略而言故與月令不同劉以月令之文而規杜氏非也裨竈指之曰猶可以終嵗注指降婁也嵗星十二年而一周嵗不及此次也巳注不及降婁及其亡也嵗在娵訾之口注娵訾營室東壁二十八年嵗星淫在𤣥枵今三十年在娵訾是嵗星停在𤣥枵二年音義娵子須反訾子斯反壁音璧枵許驕反疏注正義曰釋天云娵觜之口營室東壁也李廵曰娵訾𤣥武宿也營室東壁北方宿名孫炎曰娵訾之次則口開方營室東壁四方似口故因名云十二次子為𤣥枵亥為娵訾二十八年傳稱嵗在星紀而淫於𤣥枵二十八年巳在𤣥枵今三十年始在娵訾三年始移一次是嵗星住在𤣥枵二年也其眀年乃及降婁僕展從伯有與之皆死注僕展鄭大夫伯有黨羽頡出奔晉為任大夫注羽頡馬師頡任晉縣今屬廣平郡音義任音壬雞澤之㑹注在三年鄭樂成奔楚遂適晉羽頡因之與之比而事趙文子言伐鄭之説焉以宋之􅉀故不可注宋􅉀約弭兵故音義比毗志反子皮以公孫鉏為馬師注鉏子罕之子代羽頡音義鉏仕居反楚公子圍殺大司馬蒍掩而取其室注蒍掩二十五年為大司馬申無宇曰王子必不免注無宇芋尹音義芋于付反善人國之主也王子相楚國将善是封殖而虐之是禍國也且司馬令尹之偏注偏佐也音義相息亮反下善相之同而王之四體也注俱股肱也絶民之主去身之偏艾王之體以禍其國無不祥大焉何以得免注為昭十三年楚弑靈王傳音義去起呂反艾魚廢反為宋災故諸侯之大夫㑹以謀歸宋財冬十月叔孫豹㑹晉趙武齊公孫蠆宋向戌衛北宫佗注佗北宫括之子音義佗徒河反鄭罕虎注虎子皮及小邾之大夫㑹于澶淵既而無歸于宋故不書其人君子曰信其不可不慎乎澶淵之㑹卿不書不信也夫諸侯之上卿㑹而不信寵名皆弃不信之不可也如是注寵謂族也音義不信也夫音扶一讀以夫為下句首詩曰文王陟降在帝左右信之謂也注詩大雅言文王所以能上接天下接人動順帝者唯以信又曰淑慎爾止無載爾偽不信之謂也注逸詩也言當善慎舉止無載行詐偽書曰某人某人㑹于澶淵宋災故尤之也注傳云既而無歸所以釋諸侯大夫之不書也又云宋災故尤之所以釋向戌之并貶也戍為正卿深致火災燒殺其夫人未聞克己之意而以求財合諸侯故與不歸財者同文疏注正義曰諸侯不歸宋財諸國大夫合貶耳向戌不合貶也而向戌亦貶稱人故傳明經所由杜又釋傳之意傳曰既而無歸者是釋上傳之文故不書其人是也經又别言宋災故者此一句見向戌之并貶釋此傳書曰某人某人之文也向戌若不求財當顯書名氏今貶稱某人與諸國某人同故云所以釋向戌之并貶與不歸財者同文也不書魯大夫諱之也注向戌既以災求財諸大夫許而不歸客主皆貶君子以尊尊之義也君親有隱故略不書魯大夫以示例鄭子皮授子産政注伯有死子皮知政以子産賢故譲之辭曰國小而偪注偪近大國音義偪彼力反近附近之近族大寵多不可為也注為猶治也子皮曰虎帥以聽誰敢犯子子善相之國無小注言在治政音義治直吏反小能事大國乃寛注為大所恤故也子産為政有事伯石賂與之邑注伯石公孫段有事欲使之子大叔曰國皆其國也奚獨賂焉注言鄭大夫共憂鄭國事何為獨賂之子産曰無欲實難注言人不能無欲皆得其欲以從其事而要其成非我有成其在人乎注言成猶在我非在他也音義要一遙反下注同何愛於邑邑将焉徃注言猶在國音義焉於䖍反子大叔曰若四國何注恐為四鄰所笑子産曰非相違也而相從也注言賂以邑欲為和順四國何尤焉鄭書有之注鄭國史書曰安定國家必大焉先注先和大族而後國家安音義必大焉先並如字姑先安大以待其所歸注要其成也既伯石懼而歸邑卒與之注卒終也伯有既死使大史命伯石為卿辭大史退則請命焉注請大史更命已復命之又辭如是三乃受䇿入拜子産是以惡其為人也注惡其虚飾音義復扶又反三息暫反又如字策初革反惡烏路反注同使次已位注畏其作亂故寵之子産使都鄙有章注國都及邊鄙車服尊卑各有分部音義分扶運反上下有服注公卿大夫服不相踰田有封洫注封疆也洫溝也音義洫况域反疆居良反廬井有伍注廬舎也九夫為井使五家相保大人之忠儉者注謂卿大夫音義大人之忠儉者本或作大夫者非從而與之泰侈者因而斃之注因其罪而斃踣之音義踣蒲比反豐卷将祭請田焉弗許注田獵也音義卷眷勉反徐居阮反曰唯君用鮮注鮮野獸衆給而已注衆臣祭以芻豢為足音義芻初俱反豢音患牛羊曰芻犬豕曰豢子張怒注子張豐卷退而徴役注召兵欲攻子産子産奔晉子皮止之而逐豐卷豐卷奔晉子産請其田里注請於公不役人三年而復之反其田里及其入焉注田里所收入從政一年輿人誦之曰取我衣冠而褚之注褚畜也奢侈者畏法故畜藏音義褚張呂反畜勑六反又許六反本又作䙒同取我田疇而伍之孰殺子産吾其與之注竝畔為疇音義竝蒲杏反又蒲頂反及三年又誦之曰我有子弟子産誨之我有田疇子産殖之注殖生也音義殖時力反徐是吏反此協下韻子産而死誰其嗣之注嗣續也傳言鄭所以興經三十有一年春王正月夏六月辛巳公薨于楚宫注公不居先君之路寝而安所樂失其所也音義樂音洛一音岳又一音五教反秋九月癸巳子野卒注不書葬未成君己亥仲孫羯卒冬十月滕子來㑹葬注諸侯㑹葬非禮癸酉葬我君襄公十有一月莒人弑其君密州注不稱弑者主名君無道也音義弑申志反傳三十一年春王正月穆叔至自㑹注澶淵㑹還見孟孝伯語之曰趙孟将死矣其語偷不似民主注偷苟且音義語之魚據反下吾語諸同偷他侯反且年未盈五十而諄諄焉如八九十者弗能乆矣注成二年戰於案趙朔已死於是趙文子始生至㐮三十年㑹澶淵盖年四十七八故言未盈五十音義諄徐之聞反或一音之純反若趙孟死為政者其韓子乎注韓子韓起吾子盍與季孫言之可以樹善君子也注言韓起有君子之德今方知政可素徃立善音義盍戸獵反晉君将失政矣若不樹焉使早備魯注使韓子早為魯備既而政在大夫韓子懦弱大夫多貪求欲無厭齊楚未足與也魯其懼哉孝伯曰人生幾何誰能無偷朝不及夕將安用樹穆叔出而告人曰孟孫将死矣吾語諸趙孟之偷也而又甚焉注言朝不及夕偷之甚也音義懦乃亂反厭於鹽反人生幾何居起反本或作民生无幾何朝如字注同又與季孫語晉故注如與孟孫言季孫不從及趙文子卒注在昭元年晉公室卑政在侈家韓宣子為政不能圗諸侯魯不堪晉求䜛慝𢎞多是以有平丘之㑹注平丘㑹在昭十三年晉人執季孫意如音義慝他得反齊子尾害閭丘嬰欲殺之使帥師以伐陽州注陽州魯地我問師故注魯以師往問齊何故伐我夏五月子尾殺閭丘嬰以說于我師注言伐魯者嬰所為也伐陽州不書不成伐音義說如字工僂灑渻竈孔虺賈寅出奔莒注四子嬰之黨音義僂力侯反灑所蟹反舊所綺反渻生領反徐本作省所幸反一音息井反一音銷虺許鬼反出羣公子注為昭十年欒高之難復羣公子起本音義難乃旦反公作楚宫注適楚好其宫歸而作之音義好呼報反穆叔曰大誓云民之所欲天必從之注今尚書大誓亦無此文故諸儒疑之音義大音泰本亦作㤗疏注正義曰今尚書大誓謂漢魏諸儒馬融鄭𤣥王肅等所注者也自秦焚詩書漢初求之尚書唯得二十八篇故太常孔臧與孔安國書云尚書二十八篇前世以為放二十八宿都不知尚書有百篇也在後又得僞大誓一篇通為二十九篇漢魏以來未立於學官馬融尚書傳序云大誓後得案其文似若淺露又春秋引大誓曰民之所欲天必從之國語引大誓曰朕夢協朕卜襲于休祥戎商必克孟子引大誓曰我武惟揚侵于之疆則取于凶殘我伐用張于湯有光孫卿引大誓曰獨夫紂禮記引大誓曰予克紂非予武惟朕文考無罪紂克子非朕文考有罪惟予小子無良今之大誓皆無此言吾見書傳多矣所引大誓而不在大誓者甚衆不復悉記略引五事以明之亦可知已王肅亦云大誓近非本經是諸儒疑之也杜氏在晉之初亦未見真本及江東晉元帝時其豫章内史梅賾始獻孔安國所注古文尚書其内有泰誓二篇記傳所引大誓其文悉皆有之君欲楚也夫故作其宫若不復適楚必死是宫也六月辛巳公薨于楚宫叔仲帶竊其拱璧注拱璧公大璧音義夫音扶復扶又反拱九勇反以與御人納諸其懐而從取之由是得罪注得罪謂魯人薄之故子孫不得志於魯立胡女敬歸之子子野注胡歸姓之國敬歸㐮公妾次于季氏秋九月癸巳卒毁也注過哀毁􅇤以致滅性音義􅇤在亦反己亥孟孝伯卒注終穆叔言立敬歸之娣齊歸之子公子裯注齊諡裯昭公名音義娣大計反齊歸如字注同裯直由反穆叔不欲曰大子死有母弟則立之無則立長注立庶子則以年音義長丁丈反年均擇賢義均則卜古之道也注先人事後卜筮也義均謂賢等非嫡嗣何必娣之子注言子野非適嗣音義適丁歴反且是人也居喪而不哀在慼而有嘉容是謂不度不度之人鮮不為患若果立之必為季氏憂武子不聽卒立之比及葬三易衰衰衽如故衰注言其嬉戲無度音義鮮息淺反比及必利反一本無及字三如字又息暫反衰本又作縗亦作䙑同七雷反下同衽而甚反徐而鴆反裳下也嬉許其反疏正義曰喪服注云衽為兩燕尾凡用布三尺五寸上正一尺兩燕尾衺袲裁二尺五寸下廣四寸綴於身傍所以掩裳際也於是昭公十九年矣猶有童心君子是以知其不能終也注為昭二十五年公孫於齊傳冬十月滕成公來㑹葬惰而多涕注惰不敬也音義惰徒臥反涕他禮反子服惠伯曰滕君将死矣怠於其位而哀已甚兆於死所矣注有死兆能無從乎注為昭三年滕子卒傳癸酉葬襄公公薨之月子産相鄭伯以如晉晉侯以我喪故未之見也子産使盡壊其館之垣而納車馬焉士文伯讓之曰敝邑以政刑之不脩宼盗充斥注充滿斥見言其多音義相息亮反盡子忍反壊音怪下皆同館古亂反字從食字林云客舎也旁作舍非垣音袁牆也斥見賢遍反無若諸侯之屬辱在寡君者何是以令吏人完客所館注館舍也音義令力呈反下注同完音丸高其閈閎注閎門也音義閈戸旦反説文云閭也汝南平輿縣里門曰閈沈云閉也閎獲耕反杜云門也爾雅云衖門謂之閎是也爾雅又云所以止扉謂之閎然爾雅本扉之名或作閣字讀者因攷左傳傳皆作各音案下文云門不容車此云高其閈閎俱謂門耳於義自通無為穿鑿疏正義曰説文云閈門也汝南平輿里門曰閈釋宫云衖門謂之閎李廵云衖頭門也然則閈閎皆門名言高為其門耳厚其牆垣以無憂客使注無令客使憂宼盗音義使所吏反注同今吾子壊之雖從者能戒其若異客何以敝邑之為盟主繕完葺牆注葺覆也音義從才用反下賓從同葺侵入反徐音集一音子入反謂以草覆牆疏正義曰周禮任人有葺屋瓦屋瓦屋以瓦覆葺屋以草覆此云葺牆謂草覆牆也以待賓客若皆毁之其何以共命寡君使匄請命注請問毁垣之命音義共音恭匄本作丐古害字士文伯名也今傳本皆作匄字或作丐字釋例亦然解者云士伯是范氏之族不應與范宣子同名作丐是也案士文伯字伯瑕又春秋時人名字皆相配楚令尹陽丐字子瑕即與文伯名字正同又鄭有駟乞字子瑕匄與乞義同則作匄者是又案魯有仲嬰齊是荘公之孫又有公孫嬰齊是文公之孫仲嬰齊於公孫嬰齊為從祖同時同名鄭有公孫叚字子石又云伯石印叚字子石傳又謂之二子石然印叚即公孫叚從父兄弟之子尚同名字伯瑕與宣子何廢同乎疏正義曰匄士文伯名也晉宋古本及釋例皆作丐俗本作匄此士文伯是范氏之别族不宜與范宣子同名今定本作匄恐非對曰以敝邑褊小介於大國注介間也誅求無時注誅責也是以不敢寧居悉索敝賦以來㑹時事注隨時來朝㑹音義索所白反一音悉各反逢執事之不間而未得見又不獲聞命未知見時不敢輸幣亦不敢暴露其輸之則君之府實也非薦陳之不敢輸也注薦陳猶獻見也音義間音閑見賢遍反下及注同暴歩卜反下同其暴露之則恐燥濕之不時而朽蠧以重敝邑之罪僑聞文公之為盟主也注僑子産名文公晉重耳音義燥素早反蠧丁故反蟲敗也以重直用反下重罪同僑其驕反重耳直龍反宫室卑庳無觀臺榭以崇大諸侯之館館如公寢庫廐繕脩司空以時平易道路注易治也音義庳音婢亦音卑觀古亂反榭音謝本亦作謝土高曰臺有木曰榭廐九又反易以豉反注同疏正義曰釋宫云四方而高曰臺有木者謂之榭李廵云臺上有屋謂之榭然則臺榭皆高可升之以觀望言無觀望之臺榭也注正義曰言往前文公之客館如今日晉君之路寝也圬人以時塓館宫室注圬人塗者塓塗也音義圬本作汚同音烏塓莫歴反疏正義曰釋宫云鏝謂之杇李廵曰鏝一名杇塗工作具也郭璞云泥鏝也然則圬是塗之所用因謂泥牆屋之人為圬人塓亦泥也使此泥屋之人以時泥塗客館之宫室也諸侯賓至甸設庭燎注庭燎設火於庭音義甸徒遍反燎力妙反徐力遙反一音力弔反庭燎大燭疏正義曰郊特牲云庭燎之百由齊桓公始也鄭𤣥云僭天子也庭燎之差公盖五十侯伯子男皆三十僕人廵宫注廵宫行夜音義行下孟反下廵行同車馬有所注有所處賓從有代注代客役巾車脂轄注巾車主車之官音義巾車如字劉昌宗周禮音居覲反轄戸瞎反隸人牧圉各瞻其事注瞻視客所當得音義瞻之廉反百官之屬各展其物注展陳也謂羣官各陳其物以待賓公不留賓而亦無廢事注賓得速去則事不廢憂樂同之事則廵之注廵行也音義樂音洛教其不知而恤其不足賓至如歸無寧菑患注言見遇如此寧當復有菑患邪無寧寧也音義菑音災復扶又反不畏宼盜而亦不患燥濕今銅鞮之宫數里注銅鞮晉離宫音義鞮丁兮反數所主反而諸侯舍於隸人注舍如隸人舍門不容車而不可踰越注門庭之内迫迮又有牆垣之限音義迮側百反疏注正義曰知非館門卑小不得容車而云門庭之内迫迮者以傳稱舍於隸人明院宇迮小也盜賊公行而夭厲不戒注厲猶災也言水潦無時音義潦音老賓見無時命不可知若又勿壊是無所藏幣以重罪也敢請執事將何所命之注問晉命已所止之宜音義見賢遍反雖君之有魯喪亦敝邑之憂也注言鄭與魯亦有同姓之憂若獲薦幣注薦進也脩垣而行注行去也君之惠也敢憚勤勞文伯復命注反命於晉君趙文子曰信注信如子産言我實不德而以隸人之垣以贏諸侯注贏受也音義贏音盈疏注正義曰賈服王注皆讀為盈盈是滿也故皆訓為受是吾罪也使士文伯謝不敏焉晉侯見鄭伯有加禮注禮加敬厚其宴好而歸之乃築諸侯之館叔向曰辭之不可以已也如是夫子産有辭諸侯賴之若之何其釋辭也詩曰辭之輯矣民之協矣辭之繹矣民之莫矣注詩大雅言辭輯睦則民協同辭説繹則民安定莫猶定也音義好呼報反如是夫音扶讀者亦以夫為下句首輯音集又七入反繹本又作懌音亦説音悦其知之矣注謂詩人知辭之有益鄭子皮使印段如楚以適晉告禮也注得事大國之禮莒犂比公生去疾及展輿注犂比莒子密州之號音義犂力私反或音力兮反比音毗去起吕反輿音餘本又作與音同既立展輿注立以為世子又廢之犂比公虐國人患之十一月展輿因國人以攻莒子弑之乃立注展輿立為君音義弑之乃立弑音試本或作乃自立者誤去疾奔齊齊出也注母齊女也展輿吳出也注為明年奔吳傳書曰莒人弑其君買朱組注買朱組密州之字音義組仕居反言罪之在也注罪在組也傳始例申明君臣書弑今者父子故復重明例音義復扶又反重直用反吳子使屈狐庸聘于晉注狐庸巫臣之子也成十年適吳為行人音義屈君勿反狐音胡通路也注通吳晉之路趙文子問焉曰延州來季子其果立乎注延州來季札邑疏正義曰釋例土地名延州來闕不知其處則杜謂延州來三字共為一邑服䖍云延延陵也州來邑名季子讓王位升延陵為大夫食邑州來傳家通言之案傳文謂之延陵季子則是延陵與州來必不得為一但不知何以呼為延陵耳或延陵亦是邑名盖並食二邑故連言之巢隕諸樊注在二十五年音義隕于敏反閽戕戴吳注在二十五年戴吳餘祭音義閽音昏戕在良反祭側界反天似啟之何如對曰不立是二王之命也非啟季子也若天所啟其在今嗣君乎注嗣君謂夷昧甚德而度德不失民注民歸德度不失事注審事情民親而事有序其天所啟也有吳國者必此君之子孫實終之季子守節者也雖有國不立注言其三兄雖欲傳國與之終不肯立音義傳直專反十二月北宫文子相衛襄公以如楚注文子北宫佗襄公獻公子音義相息亮反宋之盟故也注晉楚之從交相見也過鄭印段迋勞于棐林如聘禮而以勞辭注用聘禮而用郊勞之辭音義過五禾反迋于况反勞力報反下及注同棐芳尾反本又作斐文子入聘注報印段子羽為行人馮簡子與子大叔逆客注逆文子事畢而出言於衛侯曰鄭有禮其數世之福也其無大國之討乎詩云誰能執熱逝不以濯注詩大雅濯以水濯手音義數所主反濯直角反禮之於政如熱之有濯也濯以救熱何患之有注此以上文子辭音義上時掌反子産之從政也擇能而使之馮簡子能斷大事子大叔羙秀而文注其貌羙其才秀音義斷丁亂反下同公孫揮能知四國之為注知諸侯所欲為而辨於其大夫之族姓班位貴賤能否而又善為辭令裨諶能謀謀於野則獲注得所謀也音義裨婢支反諶市林反謀於邑則否注此才性之敝鄭國將有諸侯之事子産乃問四國之為於子羽且使多為辭令與裨諶乘以適野使謀可否而告馮簡子使斷之事成乃授子大叔使行之以應對賓客是以鮮有敗事北宫文子所謂有禮也注傳跡子産行事以明北宫文子之言音義乘繩證反鮮息淺反鄭人游于鄉校注鄉之學校音義校戸孝反下同鄭國謂學為校以論執政注論其得失然眀謂子産曰毁鄉校如何注患人於中謗議國政音義謗布浪反疏正義曰詩序云子衿刺學校廢是校為學之别名子産曰何為夫人朝夕退而游焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之我聞忠善以損怨注為忠善則怨謗息音義夫音扶下并注同朝直遙反舊如字惡烏路反又如字不聞作威以防怨注欲毁鄉校即作威豈不遽止然猶防川注遽畏懼也音義遽其據反大決所犯傷人必多吾不克救也不如小決使道注道通也音義道音導注同不如吾聞而藥之也注以為己藥石疏正義曰言不如不毁鄉校使人游處其中聞謗我之政者而即改焉以為我之藥石也然明曰蔑也今而後知吾子之信可事也小人實不才若果行此其鄭國實賴之豈唯二三臣仲尼聞是語也曰以是觀之人謂子産不仁吾不信也注仲尼以二十二年生於是十嵗長而後聞之音義長丁丈反疏注正義曰公羊傳於二十一年下云十有一月庚子孔子生穀梁傳於二十一年十月之下云庚子孔子生二十一年賈逵注經云此年仲尼生哀十六年夏四月己丑卒七十三年昭二十四年服䖍載賈逵語云是嵗孟僖子卒屬其子使事仲尼仲尼時年三十五定以孔子為襄二十一年生也孔子世家云魯襄公二十二年而孔子生年七十三魯哀公十六年夏四月己丑卒杜此注從史記也子皮欲使尹何為邑注為邑大夫子産曰少未知可否注尹何年少音義少詩照反注同子皮曰愿吾愛之不吾叛也注愿謹善也音義愿音願疏正義曰謂尹何也劉炫云叛違也欲令子産不於我有違得使尹何為邑也使夫往而學焉夫亦愈知治矣注夫謂尹何音義治直吏反下注之治同疏正義曰病差謂之愈言不能之病愈知治必速也劉炫云尹何比未解治邑以為己病今若遣往學治邑之病差自然以為知治邑矣子産曰不可人之愛人求利之也今吾子愛人則以政注以政與之猶未能操刀而使割也其傷實多注多自傷音義操七刀反其傷實多一本作其傷多子之愛人傷之而巳其誰敢求愛於子子於鄭國棟也棟折榱崩僑將厭焉敢不盡言子有羙錦不使人學製焉注製裁也音義棟丁弄反榱所追反椽也厭本又作壓於甲反徐於輒反下同製音制大官大邑身之所庇也而使學者製焉其為羙錦不亦多乎注言官邑之重多於羙錦音義所庇必利反又音祕僑聞學而後入政未聞以政學者也若果行此必有所害譬如田獵射御貫則能獲禽注貫習也音義貫古患反若未嘗登車射御則敗績厭覆是懼何暇思獲子皮曰善哉虎不敏吾聞君子務知大者逺者小人務知小者近者我小人也衣服附在吾身我知而慎之大官大邑所以庇身也我逺而慢之注慢易也音義覆芳服反易以䜴反微子之言吾不知也他日我曰子為鄭國我為吾家以庇焉其可也今而後知不足注自知謀慮不足謀其家自今請雖吾家聽子而行子産曰人心之不同如其面焉吾豈敢謂子面如吾面乎抑心所謂危亦以告也子皮以為忠故委政焉子産是以能為鄭國注傳言子産之治乃子皮之力衛侯在楚北宫文子見令尹圍之威儀言於衛侯曰令尹似君矣將有他志注言語瞻視行歩不常疏正義曰言令尹威儀已是國君之容矣服䖍云言令尹動作似君儀故云似君矣服言似君儀者明年傳云二執戈者前矣是用君儀也俗本作以君若云以君不須言矣今定本亦作以字恐非雖獲其志不能終也詩云靡不有初鮮克有終終之實難令尹其將不免公曰子何以知之對曰詩云敬慎威儀惟民之則令尹無威儀民無則焉民所不則以在民上不可以終公曰善哉何謂威儀對曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之故能守其官職保族宜家順是以下皆如是是以上下能相固也衛詩曰威儀棣棣不可選也注詩邶風棣棣富而閑也選數也音義鮮息淺反令聞音問本亦作問衛詩此􅆁詩刺衛頃公故曰衛詩棣棣本又作逮直待反選息兖反注同數所主反下文同言君臣上下父子兄弟内外大小皆有威儀也周詩曰朋友攸攝攝以威儀注詩大雅攸所也攝佐也言朋友之道必相教訓以威儀也周書數文王之德注逸書曰大國畏其力小國懐其德言畏而愛之也詩曰不識不知順帝之則言則而象之也注大雅又言文王行事無所斟酌唯在則象上天音義斟之林反疏正義曰尚書武成篇曰大國以威加小國以德撫故大畏力小懐德也不識不知謂不妄斟酌以為識知惟順天之法則是言則而象之謂文王法則放象上天而行下傳覆此謂天下則象文王不同者謂文王能則象於天故天下亦則象文王也紂囚文王七年諸侯皆從之囚紂於是乎懼而歸之可謂愛之文王伐崇再駕而降為臣注文王聞崇德亂而伐之三旬不降退脩教而復伐之因壘而降音義降户江反復扶又反疏正義曰傳言囚文王七年文王必七年為囚矣尚書無逸云文王受命唯中身厥享國五十年則文王在位歴年多矣未知何時被囚也周本紀稱紂囚西伯於牖里閎夭之徒求羙女羙寳而獻之紂紂大説乃赦西伯賜之弓矢使之得征伐其下乃云虞芮爭獄俱讓而去諸侯聞之曰西伯受命之君也如馬遷所云虞芮質獄之前被囚也尚書傳稱文王一年質虞芮二年伐邗三年伐密須四年伐犬夷紂乃囚之四友獻寳乃得免於虎口出而伐耆鄭𤣥尚書注據書傳為説云紂聞文王斷虞芮之訟後又三伐皆勝始畏而惡之拘於羑里紂得散宜生等獻寳而釋文王文王釋而伐黎以為四年囚之五年釋之即如所言被囚不盈一年此傳不得言紂囚文王七年也文王既已改元而又專伐諸國是則反形已露雖紂之愚非寳貨所能釋也馬遷之言當得其實在質虞芮之前囚之故囚之得七年也蠻夷帥服可謂畏之文王之功天下誦而歌舞之可謂則之文王之行至今為法可謂象之有威儀也故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也音義行下孟反下同樂音洛又音岳春秋左傳注疏卷四十春秋左氏傳注疏卷四十考證傳三月癸未晉悼夫人食輿人之城把者絳縣人或年長矣無子而徃與於食有與疑年使之年曰臣小人也不知紀年臣生之嵗正月甲子朔四百有四十五甲子矣其季于今三之一也漢書律歴志曰僖公五年正月辛亥朔旦冬至是嵗距辛亥百一十三年三月有癸未上距文公十一年㑹于承筐之嵗夏正月甲子朔凡四百四十有五甲子奇二十日為日二萬六千六百有六旬趙汸補注曰劉待制云季者末也今今日也謂巳得四百四十四全甲子其末一甲子六十日而今乃癸未纔得二十日也故曰三之一傳使為君復陶疏衣服之名復陶其義未聞服監本訛作冠今改正傳以為絳縣師疏盖以居在絳邑居監本訛作車今改正傳君子謂宋共姬女而不婦王應麟曰宋伯姬先儒謂婦人中之伯夷左氏謂女而不婦非也臣照按伯姬守禮以死于火視死生如蟬蜕然火非所畏而非禮之是畏所為與日月爭光者矣而其時之君子譏其女而不婦左氏記其語俾後世知其時之人視節義輕而妄議論人長短如此也傳裨竈指之曰猶可以終嵗注嵗星十二年而一周周監本訛作嵗今改正傳嵗在娵訾之口疏娵訾爾雅訾作觜其疏又仍作訾今並如其本文傳高其閈閎音義爾雅云衖門謂之閎各本俱作衡門謂之閎今依爾雅改正臣召南按郭璞注爾雅引此傳曰閎長杙即門橜也與杜注異傳延州來季子其果立乎疏季子讓王位升延陵為大夫臣召南按升延陵為大夫文義不順疑當作居延陵為大夫又疏但不知何以呼為延陵耳臣召南按吳世家曰季札封於延陵故號曰延陵季子其説曉然又按漢書地理志㑹稽郡毗陵季札所居顔師古注曰舊延陵漢改之又沛郡下蔡故州來國為楚所滅後吳取之至夫差遷蔡昭侯於此然則夫差以前為季札食邑矣傳不如吾聞而藥之也王應麟曰子産不以防怨為善而怨自弭故與鄭俱昌李斯以分過為忠而過益彰故與秦俱亡春秋左氏傳注疏卷四十考證
