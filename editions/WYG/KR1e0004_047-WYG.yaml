body:
  text: 春秋左傳注疏卷四十七起昭公十四年盡十六年晉杜氏注唐陸德明音義孔穎達疏經十有四年春意如至自晉注書至者喜得免三月曹伯滕卒注無傳四同盟疏注正義曰曹伯負芻以襄十八年冬十月卒則武公立十九年盟于祝柯二十年于澶淵二十五年于重丘二十七年于宋皆魯曹俱在是四同盟也夏四月注無傳秋葬曹武公注無傳八月莒子去疾卒注未同盟音義去起吕反冬莒殺其公子意恢注以禍亂告不必繫於為卿故雖公子亦書意恢與亂君為黨故書名惡之音義恢苦囘反惡烏路反疏注正義曰莒是小國其卿多不備禮唯莊僖之世有莒慶見經爾来唯牟夷以竊地故書以外更無見者今意恢非卿亦書故解其意云云釋例曰福莫大於享國有家禍莫甚於骨肉相殘故公子取國及為亂見殺者亦皆書之不必繫於為卿故公子糾意恢以公子見書於經是解非卿而書之意也諸公子大夫被殺而書名皆是惡之文意恢與亂君為黨故書名惡之傳十四年春意如至自晉尊晉罪己也注以舍族為尊晉罪己音義舍音捨疏注正義曰一命大夫經書為人以卿之貴得備名氏若有罪過宜貶黜者他國之卿則稱某人魯卿不得自稱魯人有罪則貶去其族族去則非卿此舍意如之族是為罪己也季孫本實伐莒晉人討而執之放令歸魯荷晉恩德罪己亦以尊晉故云尊晉罪己也文二年晉人宋人陳人鄭人伐秦稱晉先且居宋公子成陳轅選鄭公子歸生伐秦卿不書為穆公故尊秦也謂之崇德注云秦穆悔過終用孟明故貶四國大夫以尊秦也此貶意如以尊晉其事與彼同也此意如至自晉傳言尊晉罪己二十四年婼至自晉傳直云尊晉不言罪己俱是去族傳文不同者釋例曰意如至自晉傳言尊晉罪己婼至自晉傳復重發但言尊晉者意如以罪見執宜在罪己婼本使人不應見執故尊晉而已内大夫行還皆不書至異于公也今此二人執而見釋更以書至見義也若然季孫見執為魯有罪矣而徃年公不與盟注云非國惡故不諱者魯實伐莒取郠若以伐莒責魯魯則無辭而兼受邾人之訴妄稱朝夕伐我為此不與公盟故言非國之惡其執季孫不是無罪也子服惠伯云寡君未知其罪而執其老者拒晉之怨辭耳尊晉罪己禮也注禮脩已而不責人南蒯之将叛也盟費人司徒老祁慮癸注二人南蒯家臣音義祁巨夷反字林音上尺反疏注正義曰世族譜司徒老祁為一人慮癸為一人服䖍云司徒姓也老祁字也慮癸亦姓字也二子季氏家臣也杜以下句請於南蒯曰臣願受􅉀知是南蒯家臣偽廢疾使請於南蒯曰臣願受􅉀而疾興若以君靈不死請待間而盟注間差也音義差音初資反許之二子因民之欲叛也請朝衆而盟注欲因合衆以作亂遂刧南蒯曰羣臣不忘其君注君謂季氏音義刧居業反疏注正義曰費是季氏之邑南蒯已是季氏家臣此南蒯之下羣臣還欲歸邑季氏知君謂季氏畏子以及今三年聼命矣子若不圖費人不􅃘其君将不能畏子矣注不能復畏子音義畏子以及今絶句復扶又反子何所不逞欲請送子注送使出奔請期五日注南蒯請期冀有變遂奔齊侍飲酒於景公公曰叛夫注戲之對曰臣欲張公室也注張彊也子韓晳曰注齊大夫音義晳音星厯反家臣而欲張公室罪莫大焉注言越職司徒老祁慮癸來歸費注歸魯齊侯使鮑文子致之注南蒯雖叛費人不從未專屬齊二子逐蒯而復其舊故經不書歸費齊使文子致邑欲以假好非事實也音義好呼報反疏注正義曰經書叔弓圍費則歸費亦應書經經不書歸故解其意也南蒯雖以費叛降齊費人不從未專屬齊叔弓圍費齊人不救是費未專屬齊也二子逐蒯而費復其舊便是本未去魯故經不書歸費是二子自以費歸非齊人来歸也齊人因其自歸而使文子致邑施恩於魯欲以假好非事實也夏楚子使然丹簡上國之兵於宗丘且撫其民注上國在國都之西西方居上流故謂之上國宗丘楚地分貧振窮注分與也振救也音義分如字徐甫問反長孤㓜養老疾收介特注介特單身民也收聚不使流散音義長丁丈反收介音界又古賀反注同單音丹救災患宥孤寡注寛其賦税音義宥音又税始鋭反赦罪戾詰姦慝注詰責問也音義戾力計反詰起吉反慝他得反舉淹滯注淹滯有才德而未叙者禮新叙舊注新覊旅也禄勲合親注勲功也親九族任良物官注物事也疏正義曰周禮司兵掌五兵鄭衆云五兵者戈殳㦸酋矛夷矛鄭𤣥云歩卒之五兵則無夷矛而有弓矢然則兵者戰器之名戰必令人執兵因即名人為兵也此簡上國之兵謂料簡人丁之彊弱於宗丘之地集而簡之且即慰撫其民也大體貧窮相類細言窮困於貧貧者家少貨財窮謂全無生業分財貨以與貧者授生業以救窮者孤弱㓜少無父母有賜與以長成之老疾乏於藥膳有饋餼以養育之孤介特獨者收歛之不使流散有水火之災冦盜之患者救助之孤子寡妻寛其賦税雖有罪戾原情可恕者赦放之姦邪慝惡為民害者詰治之賢才淹滯未蒙任用者舉用之外人新來者禮待之舊人未用者進叙之施禄於功勲使有功必得禄也和合其親戚使宗族皆相親也任賢良以職事使野無遺賢凖事能以任官皆令才職相當不使違方易務此皆撫民之事也注正義曰下云簡東國之兵亦如之知此是簡西國之兵也西國東國皆是楚人在國之東西者以水皆東流西方居上流皆謂之上國西為上則東為下下言東則此是西互相見也分減富者之財以與貧者則分為施與之名故分為與也窮者全無生業或授之田宅賜之器物以救濟之傳稱一介行李逢澤有介麋焉則介亦特之義也介特謂單身特立無兄弟妻子者無所附著或将轉移收聚之令有附依不使流散服䖍以宥為寛赦其罪杜以下云赦罪戾則此宥非寛罪故以為寛其賦税也王制云少而無父謂之孤老而無子謂之獨老而無妻謂之鰥老而無夫謂之寡此四者天民之窮而無告者也皆有常餼然則孤寡常有餼賜夲無賦税而云寛賦税者正以不責賦税即是寛之也孤寡之貧者有餼賜能自給者免賦税文雖不言鰥獨宥與孤寡必同任良謂選賢而任之也物官謂量事而官之也賈逵云物官量能授官也鄭衆云物官相其才之所宜而官之是也使屈罷簡東國之兵於召陵注兵在國都之東者音義罷音皮召上照反亦如之注如然丹好於邊疆注結好四鄰音義好呼報反注同疆居良反息民五年而後用師禮也疏正義曰謂從此簡兵之後息民不征旣滿五年而後用師征伐是為禮也即十九年城州來以挑吳是也案十七年與吴戰于長岸未滿五年而云息民五年者平王之意息民五年長岸之戰吳来伐楚被伐不可不戰雖戰非王本心也秋八月莒著丘公卒郊公不慼注郊公著丘公子音義著直居反除直據反國人弗順欲立著丘公之弟庚輿注庚輿莒共公音義輿音餘本亦作與下同共音恭蒲餘侯惡公子意恢而善於庚輿注蒲餘侯莒大夫兹夫也意恢莒羣公子音義惡烏路反下同郊公惡公子鐸而善於意恢注鐸亦羣公子音義鐸待洛反公子鐸因蒲餘侯而與之謀曰爾殺意恢我出君而納庚輿許之注為下冬殺意恢傳楚令尹子旗有德於王不知度注有佐立之德與養氏比而求無厭注養氏子旗之黨養由基之後音義比毗志反厭於鹽反本又作饜下注同王患之九月甲午楚子殺鬭成然而滅養氏之族使鬭辛居鄖以無忘舊勲注辛子旗之子鄖公辛音義鄖音云冬十二月蒲餘侯兹夫殺莒公子意恢郊公奔齊公子鐸逆庚輿於齊齊隰黨公子鉏送之有賂田注莒賂齊以田音義鉏仕居反晉邢侯與雍子爭鄐田注邢侯楚申公巫臣之子也雍子亦故楚人音義鄐許六反又起六反疏注正義曰巫臣雍子皆故楚人也襄二十六年傳稱巫臣奔晉晉人與之邢雍奔晉晉人與之鄐則鄐是雍子之田也邢侯巫臣之子而得與之爭鄐者孔晁注晋語云邢與鄐比爭疆界乆而無成士景伯如楚注士景伯晉理官叔魚攝理注攝代景伯疏正義曰晉語云士景伯如楚叔魚為贊理孔晁云景伯晉理官叔魚佐之景伯聘楚叔魚專斷韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪邢侯注蔽斷也音義命斷丁亂反注同蔽必世反注同徐甫世反王補弟反疏注正義曰周禮大司㓂云凡庶民之獄訟以邦成蔽之鄭衆云蔽之斷其獄訟也尚書康誥云服念五六日至于旬時丕蔽要囚孔安國云服膺思念五六日至于十日至于三月乃大斷之皆以蔽為斷是相傳為説邢侯怒殺叔魚與雍子於朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也注施行罪也雍子自知其罪而賂以買直鮒也鬻獄邢侯專殺其罪一也已惡而掠羙為昏注掠取也昏亂也音義鬻羊六反賣也掠音亮貪以敗官為墨注墨不潔之稱音義敗必邁反又如字稱尺證反殺人不忌為賊注忌畏也夏書曰昏墨賊殺注逸書三者皆死刑臯陶之刑也請從之乃施邢侯而尸雍子與叔魚於市仲尼曰叔向古之遺直也注言叔向之直有古人遺風音義陶音遥乃施如字服云施罪於邢侯也孔晁注國語云廢也尺氏反疏正義曰晋語説此事云叔向既對宣子邢侯聞之而逃遂施邢侯氏孔晁云廢其族也則國語讀為弛訓之為廢家語説此事亦為弛王肅註云弛宜為施施行也服䖍云施罪於邢侯施猶劾也邢侯亡故劾之杜無注當從施也成十七年晉殺三郤皆尸於朝此尸於市者以其賤故也治國制刑不隱於親注謂國之大問己所荅當也至於他事則宜有隱音義當丁浪反三數叔魚之惡不為末減注末薄也減輕也以正言之音義數色主反又色具反下同為于偽反末武葛反疏正義曰三度數叔魚之惡不為薄輕言皆重厚極言之也三者即下丈數其賄也稱其詐也言其貪也是也服䖍讀減為咸下屬為句不為末者不為末􅔁隐蔽之也咸曰義也言人皆曰叔向是義妄也曰義也夫可謂直矣注於義未安直則有之音義夫舊音扶一讀芳于反下同平丘之會數其賄也注謂言瀆貨無厭以寛衞國晉不為暴歸魯季孫稱其詐也注謂言鮒也能以寛魯國晉不為虐邢侯之獄言其貪也以正刑書晉不為頗三言而除三惡加三利注三惡暴虐頗也三惡除則三利加音義頗普何反疏注正義曰尚書武王數紂之罪泰誓云敢行暴虐牧誓云俾暴虐于百姓武成云暴殄天物害虐烝民然則暴是亂下之稱虐是殺害之名大同而小異殺親益榮注榮名益已猶義也夫注三罪唯荅宣子問不可以不正其餘則以直傷義故重疑之音義重直用反疏注正義曰杜讀此文言猶義也夫言不是義也故言以直傷義謂叔向非是義也劉炫云直則是義而規杜氏今知不然者義者於事合宜所為得理直者唯無阿曲未能圓通故書云直而温若直而無温則非德非義是義之與直二者不同故上傳云義也夫此傳云猶義也夫於義之下並云夫夫是疑怪之辭故杜以為非義裁可謂之直矣故仲尼云叔向古之遺直不云遺義是直與義别劉以直義為一而規杜氏非也經十有五年春王正月吳子夷末卒注無傳未同盟二月癸酉有事于武宫籥入叔弓卒去樂卒事注略書有事為叔弓卒起也武宫魯武公廟成六年復立之音義籥羊略反去起吕反為于偽反復扶又反疏正義曰有事謂有祭事于武公之宫廟也祭必有樂樂有文舞武舞文執羽籥武執干戚其入廟也必先文而後武當籥始入叔弓暴卒故於是去樂不用而終卒祭事也叔弓之卒當籥入之時故舉籥入也及其去之則諸樂皆去故云去樂鐘鼓管磬悉皆去之非獨去籥舞也祭禮鼎爼既陳籩豆既設然後舞樂始入縁先祖之心以大臣之卒必聞樂不樂又孝子之心不忍徹已設之饌故去樂卒事注正義曰閔二年吉禘于荘公僖八年禘于太廟彼皆書禘此傳言禘于武公則亦是禘不書為禘而言有事者此經所書不論禘祭是非略書有祭事者本為叔弓卒起也止為叔弓之卒須道當祭之時所書不為禘也釋例曰三年之禘自國之常常事不書故唯書此數事祭雖得常亦記仲遂叔弓之非常也是言叔弓之卒非常故書之也釋例亦云凡三年喪畢然後禘於是遂以三年為節當仍計除喪即吉之月十日而後行事無復常月也是以經書禘及大事𫝊唯見荘公之速他無非時之譏也即如例言三年一禘若計襄公之薨則禘當在二年五年八年十一年十四年此年非禘年也若計齊歸之薨則禘當在十三年十六年此年亦非禘年也而云祭雖得常者釋例曰禘于太廟禮之常也各于其宫時之為也雖非三年大祭而書禘用禘禮也昭二十五年傳曰将禘于襄公亦其義也是言于武宫者時之所為實非禘年用禘禮此實非常但經之所書唯譏荘公之速其餘不復譏耳既不以為譏即是得常故云祭雖得常叔弓為非常也武宫者魯武公廟毁已乆矣成六年復立之遂即不毁明堂位云魯公之廟文世室也武公之廟武世室也鄭𤣥云此二廟象周有文武之廟也世室者不毁之名是魯以武公為不毁之廟故禘于其宫不于太廟亦非常也夏蔡朝吳出奔鄭注朝吳不逺讒人所以見逐而書名音義逺于萬反六月丁巳朔日有食之注無傳秋晉荀吳帥師伐鮮虞冬公如晉傳十五年春将禘于武公戒百官注齊戒音義禘大計反齊側皆反疏正義曰周禮大宰祀五帝前期十日帥執事而卜日遂戒享先王亦如之鄭𤣥云前期前所諏之日也十日容散齊七日致齊三日也執事宗伯大卜之屬既卜又戒百官以始齊此戒百官亦謂戒之令齊故杜云齊戒言是齊之戒也祭統云及時将祭君子乃齊齊之為言齊也齊不齊以致齊也是故君子之齊也專致其精明之德也故散齊七日以定之致齊三日以齊之定之之謂齊齊者精明之至也是将祭必齊祭前豫戒之也梓愼曰禘之日其有咎乎吾見赤黑之祲非祭祥也喪氛也注祲妖氛也蓋見於宗廟故以為非祭祥也氛惡氣也音義咎其九反祲子鴆反氛芳云反徐候云反蓋見賢遍反疏注正義曰周禮有眡祲之官鄭𤣥云祲隂陽氣相侵漸成祥者其職掌十煇之法一曰祲二曰象鄭衆云煇為日光氣也然則祲是隂陽之氣相侵之名日光之氣有名為祲祲之所見非獨見於日光故直云祲妖氣也梓愼唯言見祲不言祲之所在為祭而言故疑云蓋見於宗廟故以為非祭祥也月令云氛霧冥冥則氛亦氣也以言喪氛故以氛為惡氣也見赤黒之祲以為喪氛則赤黑是喪象梓愼有以知之服䖍云水黒火赤水火相遇云云其在涖事乎注涖臨也音義涖音利疏正義曰既見喪氣又言喪之所在其在涖事之人乎意疑涖事者當其咎也二月癸酉禘叔弓涖事籥入而卒去樂卒事禮也注大臣卒故為之去樂音義去起吕反註及下同為于偽反楚費無極害朝吳之在蔡也注朝吳蔡大夫有功於楚平王故無極恐其有寵疾害之音義費扶味反欲去之乃謂之曰王唯信子故處子於蔡子亦長矣而在下位辱必求之吾助子請注請求上位音義長丁丈反疏正義曰言在下位可耻辱也服䖍以辱從下讀訓之為欲欲必求之吾助子請妄也又謂其上之人注蔡人在上位者曰王唯信吳故處諸蔡二三子莫之如也疏正義曰言二三子無如吳之見信而在其上不亦難乎弗圗必及於難夏蔡人逐朝吳朝吳出奔鄭王怒曰余唯信吳故寘諸蔡且微吳吾不及此女何故去之無極對曰臣豈不欲吳注非不欲善吳音義於難乃旦反寘之豉反女音汝然而前知其為人之異也注言其多權謀疏正義曰然此朝吳於事必豫前知其為人之有異於餘人也吳在蔡蔡必速飛去吳所以翦其翼也注以鳥喻也言吳在蔡必能使蔡速强而背楚音義背音佩六月乙丑王大子夀卒注周景王子秋八月戊寅王穆后崩注大子夀之母也傳為晉荀躒如周葬穆后起晉荀吳帥師伐鮮虞圍鼓注鼓白狄之别鉅鹿下曲陽縣有鼓聚音義聚才喻反鼓人或請以城叛穆子弗許左右曰師徒不勤而可以獲城何故不為穆子曰吾聞諸叔向曰好惡不愆民知所適事無不濟注愆過也適歸也音義好呼報反惡烏路反或並依字讀下及注皆同愆起䖍反疏正義曰所好必善所惡必惡在上者所好所惡不有愆過則下民知所適歸言皆知歸於善也或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何注無以復加所好音義復扶又反若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色姑脩而城軍吏曰獲城而弗取勤民而頓兵何以事君穆子曰吾以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊注完猶保守音義庇必吏反又音秘喪息浪反繕市戰反守手又反降户江反見賢遍反焉於䖍反賈音古下同疏正義曰若不受其降民皆一心事其本國不敢怠惰以叛其主今若受其降人便是許其叛主則是教我國人令其外叛是雖獲一邑而教民怠惰不守死事君是所得少所失多賈怠無卒注卒終也棄舊不祥鼓人能事其君我亦能事吾君率義不爽注爽差也疏正義曰言今不聽降叛使鼓人能事其君也教民不怠是我亦能事吾君也好惡不愆城可獲而民知義所注知義所在也荀吳必其能獲故因以示義疏注正義曰知義所在在於事君不怠惰不茍求生也十七年荀吳詐祭于雒以滅陸渾二十二年負甲偽糴以入昔陽而此時獨得降而不納者此時荀吳自度己力必其能獲故因以示義有死命而無二心不亦可乎鼓人告食竭力盡而後取之克鼓而反不戮一人以鼓子䳒鞮歸注䳒鞮鼓君名音義䳒本又作鳶悅全反鞮丁兮反冬公如晉平丘之會故也注平丘會公不與盟季孫見執今旣得免故往謝之音義與音預十二月晉荀躒如周葬穆后籍談為介旣葬除喪以文伯宴樽以魯壺注文伯荀躒也魯壺魯所獻壺樽音義躒力狄反本又作櫟同介音界樽本或作尊又作罇竝同疏注正義曰周禮司尊彛云秋嘗冬烝其饋獻用兩壺罇鄭𤣥云壺者以壺為尊燕禮云司宫尊于東楹之西兩方壺左𤣥酒是禮法有以壺為樽王曰伯氏諸侯皆有以鎭撫王室晉獨無有何也注感魯壺而言也鎭撫王室謂貢獻之物文伯揖籍談注文伯無辭揖籍談使對對曰諸侯之封也皆受明器於王室注謂明德之分器音義分扶問反年内同以鎭撫其社稷故能薦彛器於王注薦獻也彛常也謂可常寶之器若魯壺之屬音義彛以之反晉居深山戎狄之與鄰而遠於王室王靈不及拜戎不暇注言王寵靈不見及故數為戎所加陵音義遠于萬反又如字數音朔疏正義曰數為戎所侵陵拜謝戎師不有間暇其何以獻器王曰叔氏而忘諸乎注叔籍談字叔父唐叔成王之母弟也其反無分乎密須之鼓與其大路文所以大蒐也注密須姞姓國也在安定隂密縣文王伐之得其鼓路以蒐音義蒐所求反姞其吉反又其乙反闕鞏之甲武所以克商也注闕鞏國所出鎧音義鞏九勇反鎧開代反唐叔受之以處參虛匡有戎狄注參虚實沈之次晉之分野音義參所金反注同疏注正義曰實沈之次晉之分野上繫參之虛域故云參虚其後襄之二路注周襄王所賜晉文公大路戎路鏚鉞秬鬯注鏚斧也鉞金鉞秬黒黍鬯香酒音義鏚音戚鉞音越秬音巨鬯音暢疏注正義曰廣雅云鏚鉞斧也俱是斧也蓋鉞大而斧小太公六韜云大柯斧重八斤一名天鉞是鉞大於斧也尚書牧誓云武王左杖黄鉞孔安國云以黄金飾斧是鉞以金飾也秬黒黍釋草文也周禮有鬯人之官鄭𤣥云鬯釀秬為酒芬香條暢於上下也是鬯為香酒也賜之鏚鉞者使之專殺戮也賜之秬鬯者使之祭先祖也王制云諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓚然後為鬯詩陳宣王賜召穆公云秬鬯一卣告于文人是也彤弓虎賁文公受之以有南陽之田注事在僖二十八年音義彤徒冬反賁音奔撫征東夏非分而何音義夏戸雅反疏正義曰服者撫之叛者征之晉於諸夏國差近西故令主東夏夫有勲而不廢注加重賞有績而載注書功於䇿奉之以土田注有南陽撫之以彛器注弓鉞之屬旌之以車服注襄之二路明之以文章注旌旗子孫不忘所謂福也福祚之不登叔父焉在注言福祚不在叔父當在誰邪音義福祚之不登叔父絶句焉於䖍反下将焉用之同疏正義曰言福祚之不在叔父此福祚更焉所在乎言其不在他也登陟即是在之義也且昔而髙祖孫伯黶司晉之典籍以為大政故曰籍氏注孫伯黶晉正卿籍談九世祖音義黶以斬反疏注正義曰孫伯黶為晉之正卿世掌典籍有功故曰籍氏是籍談九世祖也其九世之次世本云黶生司空頡頡生南里叔子子生叔正官伯伯生司徒公公生曲沃正少襄襄生司功大伯伯生侯季子子生籍游游生談談生秦是也九世之祖稱高祖者言是髙遠之祖也郯子以少皥為高祖意與此同及辛有之二子董之晉於是乎有董史注辛有周人也其二子適晉為太史籍黶與之共董督晉典因為董氏董狐其後疏注正義曰僖二十二年傳曰平王之東遷也辛有適伊川則辛有平王時人也此王因籍說董言晉國唯有籍董二族世掌典籍女司典之後也何故忘之籍談不能對賔出王曰籍父其無後乎數典而忘其祖注忘祖業音義女音汝數色主反疏正義曰定十四年晉人敗范中行氏之師於潞獲籍秦秦即談之子是無後籍談歸以告叔向叔向曰王其不終乎吾聞之所樂必卒焉今王樂憂若卒以憂不可謂終王一歲而有三年之喪二焉注天子絶期唯服三年故后雖期通謂之三年喪音義樂音洛下文注皆同期居其反下同疏正義曰言王其不得以壽終乎言将夭命而横死也吾聞之心之所樂必卒於此焉今王在憂而樂是為樂憂也亦既樂憂必以憂卒若性命之卒以憂而死不可謂之終也言以憂死是不終其天年也注正義曰喪服斬衰三年章内有父為長子傳曰何以三年也正體於上又乃将所傳重也齊衰杖期章内有夫為妻傳曰為妻何以期也妻至親也服問曰君所主夫人妻大子適婦鄭𤣥云言妻見大夫以下亦為此三人為喪主記言君者主謂諸侯而天子亦與妻為喪主也然則妻服齊衰期耳而傳以后崩太子卒為三年之喪二者喪服杖期章内有父在為母傳曰何以期屈也至尊在不敢申其私親也父必三年然後娶達子之志也父以其子有三年之戚為之三年不娶則夫之於妻有三年之義故可通謂之三年之喪於是乎以喪賔宴又求彛器樂憂甚矣且非禮也彛器之來嘉功之由非由喪也三年之喪雖貴遂服禮也注天子諸侯除喪當在卒哭今王既葬而除故譏其不遂王雖弗遂宴樂以早亦非禮也注言今雖不能遂服猶當靜嘿而便宴樂又失禮也音義嘿亡北反本或作黙同疏正義曰弔喪送葬之賔不合與之宴樂王於是乎以喪賔共宴樂又求常寶之器在憂而為此樂其為樂憂甚矣且求器又非禮也諸侯有常器之來獻王者乃為嘉功之由諸侯自有善功乃作常器以獻其功獻非由喪也言王不可責喪賔獻器也遂由申也竟也其意言三年之喪雖貴為天子由當申遂其服使終日月乃是禮也除喪大速是非禮也王雖不能遂竟其服猶當静黙而已不宜宴樂而宴樂以早亦非禮也注正義曰禮葬日為虞既虞之後乃為卒哭之祭喪服傳稱成服之後晝夜􅂘無時既虞之後朝夕各一哭而已卒􅂘者謂卒此無時之哭故鄭𤣥士喪禮注云卒哭虞後祭名始者朝夕之間哀至即哭至此祭止唯朝夕哭而已傳稱旣𦵏除喪譏王不遂其服知天子諸侯除喪當在卒哭今至既葬而除故譏其不遂也杜云卒止也止哭與鄒不同若如此言除喪當在卒哭而上下杜注多云既葬除喪者以葬日既虞虞即卒哭卒哭去葬相去不逺共在一月葬是大禮事書於經故成君以否皆舉葬言之王不能遂服乃與喪賔宴又失禮也以其喪服將終早除猶可宴事必不可也襄十六年葬晉悼公平公即位會于溴梁與諸侯宴于温又九年八月葬我小君穆姜其年十二月晉侯以公宴于河上𫝊皆無譏則卒哭之後得宴樂禮王之大經也一動而失二禮無大經矣注失二禮謂旣不遂服又設宴樂疏正義曰經者綱紀之言也傳稱經國家經德義詩序云經夫婦中庸云凡為天下國家有九經言禮是王之大經紀也服䖍曰經常也常所當行也言以考典注考成也典以志經忘經而多言舉典將焉用之注為二十二年王室亂傳疏正義曰人之出言所以成典法也典法所以記禮經也王一動而失二禮忘已大經矣而多為言語舉先王分器之典將焉用之經十有六年春齊侯伐徐楚子誘戎蠻子殺之音義誘音酉疏正義曰四夷之名在西曰戎春秋之時錯居中國杜言河南新城縣東南有蠻城則是内地之戎在楚北也戎是種號蠻是國名子爵也十一年楚子䖍誘蔡侯般殺之彼書楚子之名此不書楚子名者彼注云蔡大夫深怨故以楚子名告此非蠻人所告蓋楚人不以其君名告故不得書其名也公羊傳曰楚子何以不名夷狄相誘君子不疾也􅂚為不疾若不疾乃疾之也言其不足疾更是深責之也賈逵云楚子不名以立其子二說異於杜也蔡侯般書名蠻子不名者釋例曰諸見執者已在罪賤之地書名與否非例所加或名不名從所赴之文夏公至自晉秋八月己亥晉侯夷卒注未同盟九月大雩音義雩音于季孫意如如晉冬十月葬晉昭公注三月而葬速傳十六年春王正月公在晉晉人止公不書諱之也注猶以取郠故也公為晉人所執止故諱不書疏正義曰禮君不在國則守國之臣毎月告廟云公在某處釋君不得親自朝廟之意若於歲首不在則或史書之於䇿襄二十九年春王正月公在楚傳曰釋不朝正於廟是也此年正月公在晉計亦應告廟書䇿但為晉人執止公不以被執告廟故史不書諱之齊侯伐徐疏正義曰虚舉經文者經在楚誘戎蠻上傳依經文故先舉之下有徐人行成之事非虚舉但行成在誘蠻後故先依次舉經於上為下徐人行成起本也不下此經文就徐人者出自史意楚子聞蠻氏之亂也與蠻子之無質也注質信也音義質之實反或音致使然丹誘戎蠻子嘉殺之遂取蠻氏旣而復立其子焉禮也注詐之非也立其子禮也河南新城縣東南有蠻城音義復扶又反疏正義曰蠻子雖與楚舊交元無誠信故云與蠻子之無信也誘而殺之誠為不可楚能復立其子大勝遂滅其國嫌其殺父立子猶為非禮故禮之也大舜之刑也鯀殛而禹興周公之誅也放蔡叔而立蔡仲是立子為得禮二月丙申齊師至于蒲隧注蒲隧徐地下邳取慮縣東有滿如陂音義隧音遂邳普悲反取慮上音秋下力居反如淳取音陬訾之陬慮音邾婁之婁如陂彼皮反徐人行成徐子及郯人莒人會齊侯盟于蒲隧賂以甲父之鼎注甲父古國名高平昌邑縣東南有甲父亭徐人得甲父鼎以賂齊音義郯音談父音甫叔孫昭子曰諸侯之無伯害哉注為小國害齊君之無道也興師而伐遠方會之有成而還莫之亢也注無亢禦音義亢古浪反無伯也夫詩曰宗周旣滅靡所止戾正大夫離居莫知我肄注詩小雅戾定也肄勞也言周舊為天下宗今乃衰滅亂無息定執政大夫離居異心無有念民勞者也音義也夫音扶肄以制反徐又以自反下同其是之謂乎注傳言晉之衰疏正義曰詩小雅雨無正之篇也周家舊為天下所宗今旣衰滅矣其亂無所止定也執政大夫離散其居處人各異心無有知我民之勞苦者其是此時之謂乎言今晉衰微不能止亂晉之諸卿異心不憂民之勞苦如詩人之所云三月晉韓起聘于鄭鄭伯享之子産戒曰苟有位於朝無有不共恪孔張後至立於客間注孔張子孔之孫音義恪苦各反執政禦之注執政掌位列者禦止也音義禦魚呂反注及下同適客後又禦之適縣間注縣樂肆音義縣音𤣥注同疏正義曰諸侯享賔之禮亡唯有公食大夫禮存耳其禮云大夫納賔賔入門左鄭𤣥云左西方賔位也又云及廟門公揖入賔入三揖至於階三讓公升二等賔升大夫立于東夾南西面北上士立于門東北面西上鄭𤣥云自卿大夫至此不先卽位從君而入者明助君饗食賔自無事也饗食事俱在廟鄭𤣥饗食並言則享位亦當然也孔張後至蓋賔入廟門乃始來至當從大夫適東夾之南西面位也張乃立於客間賔入未升階立于西方孔張入客行間也執政禦之適客後張乃移立于客之西也又禦之適縣間適鐘磬樂肆之間也大射禮者亦諸侯之禮也樂人宿縣于阼階東笙磬西面其南笙鐘其南鑮皆南陳西階之西頌磬東面其南鐘其南鑮皆南陳張初立客間已在西方被禦適客後又益西也又被禦適縣間蓋又復益西入於頌磬鐘鑮之間也客從而笑之事畢富子諫曰注富子鄭大夫諫子産也夫大國之人不可不愼也幾為之笑而不陵我注言數見笑則必陵侮我音義幾居豈反復音機近也數音朔侮亡甫反疏正義曰幾度之為笑而不於我加陵言數被笑必陵侮我也服䖍云幾近也孔張失位近為所笑近者未至之辭客已笑訖何言近也我皆有禮夫猶鄙我注鄙賤也音義夫音扶國而無禮何以求榮孔張失位吾子之耻也子産怒曰發命之不衷注衷當也音義衷丁仲反又音忠當丁浪反或如字出令之不信刑之頗類注縁事類以成偏頗音義頗普多反類如字一音力對反徐又力猥反疏注正義曰事有相類真偽難明縁此事類以致偏頗雖非故心亦為罪也服䖍讀類為纇解云頗偏也纇不平也獄之放紛注放縱也紛亂也音義紛音芳云反縱音子用反會朝之不敬注謂國無禮敬之心疏正義曰此孔張失位則是於朝不敬而子產不以為耻者此其出外會朝大國非謂在本國故注云謂無禮敬大國之心使命之不聽注下不從上命疏正義曰謂若伯有使子晳如楚不肯行是也取陵於大國罷民而無功罪及而弗知僑之耻也孔張君之昆孫子孔之後也注昆兄也子孔鄭襄公兄孔張之祖父音義罷音皮執政之嗣也注子孔嘗執鄭國之政疏注正義曰襄十年盗殺鄭公子騑公子發公孫輒傳曰子孔當國至十九年鄭殺子孔為嗣大夫承命以使周於諸侯國人所尊諸侯所知立於朝而祀於家注卿得自立廟於家音義使音所吏反下以使同疏注正義曰士以上皆得立廟則孔張雖是大夫亦得立廟而云卿得立廟者以子孔是卿故以卿言之服䖍云祀其所自出之君於家以為大祖案禮記郊特牲曰諸侯不敢祖天子大夫不敢祖諸侯而公廟之設於私家非禮也安得祀所出之君為大祖乎有禄於國注受禄邑有賦於軍注軍出卿賦百乗音義乗繩證反喪祭有職注有所主受脤歸脤注受脤謂君祭以肉賜大夫歸脤謂大夫祭歸肉於公皆社之戎祭也音義脤市軫反疏注正義曰周禮掌蜃云祭祀共蜃器之蜃鄭𤣥云蜃大蛤飾祭器之屬也蜃之器以蜃飾因名焉鄭衆云蜃可以白器令色白是蜃為器名祭肉盛之脤器以獻遺人因名祭肉為脤孔張是大夫也而云受脤歸脤知受脤謂君祭以肉賜大夫歸脤謂大夫祭以肉歸於公也故周禮祭僕凡祭祀致福者展而受之是在下之祭有歸脤之義又傳有成子受脤于社前代諸儒皆以脤為祭社之肉故云皆社之戎祭也劉炫故違傳證以破先儒以為脤亦祭廟之肉以規杜氏文無所出其義非也然大夫不得私自出軍自祭私社而得歸脤於公者謂大夫奉君命以戎事攝祭於社故杜直言祭歸肉於公亦不謂家祭也其祭在廟已有著位在位數世世守其業而忘其所僑焉得耻之注其祭在廟謂助君祭音義數色主反焉於䖍反下焉用同疏注正義曰謂鄭伯其祭在先君之廟孔張有助祭著位在廟中以有事為業言其所掌有常也服䖍以為其祭在廟謂孔張先祖配廟食案周禮司勲云凡有功者銘書於王之大常祭於大烝司勲詔之則配廟食者皆是有功之臣子孔作亂而死公孫洩因妖鬼而立不得有配食在廟辟邪之人而皆及執政是先王無刑罰也注言為過謬者自應用刑罰音義辟匹亦反邪似嗟反子寧以他規我注規正也宣子有環其一在鄭商注玉環同工共朴自共為雙音義朴普角反疏注正義曰下云韓子奉命以使而求玉焉知環是玉環也釋器云肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環李廵云好孔也肉倍好邊肉大其孔小也好倍肉其孔大邊肉小也肉好若一其孔及邊肉大小適等曰環是環亦璧之類也言其一在鄭商則其一在韓子知其同工共朴相與為雙故韓子欲得而雙之宣子謁諸鄭伯注謁請也子産弗與曰非官府之守器也寡君不知子大叔子羽謂子産曰韓子亦無幾求注言所求少音義守手又反幾居豈反晉國亦未可以貳晉國韓子不可偷也注偷薄也音義偷他侯反若屬有讒人交鬭其間鬼神而助之以興其凶怒悔之何及吾子何愛於一環其以取憎於大國也盍求而與之子産曰吾非偷晉而有二心將終事之是以弗與忠信故也僑聞君子非無賄之難立而無令名之患僑聞為國非不能事大字小之難無禮以定其位之患音義屬音燭盍户臘反難乃旦反下同又如字疏正義曰僑聞君子非無賄之難家貧無賄不為難立於職位而無善名是為身之大患言韓子當患無令名不宜患家無賄也僑聞為國家者非不能事大字小之難事大國受小國不為難也無禮以定其位是國之大患言鄭當患位不定不宜患事晉之難也下句自大國之人至則失位矣此覆無禮定位也自若韓子至獨非罪乎此覆無令名也此辭一為韓子一為鄭國故再言僑聞服䖍斷字小之難以下為義解云字養也言事大國易養小國難然則鄭人豈憂養小國乎尚未能離經辯句復何須註述大典且字為愛不為養也夫大國之人令於小國而皆獲其求將何以給之一共一否為罪滋大注滋益也音義共音恭下而共無藝同大國之求無禮以斥之何饜之有吾且為鄙邑則失位矣注不復成國音義饜於鹽反復扶又反下弗敢復并注同疏正義曰若晉之大夫求無不得則鄭國乃為晉之邊鄙之邑不復成國謂失國君之位也若韓子奉命以使而求玉焉貪淫甚矣獨非罪乎出一玉以起二罪吾又失位韓子成貪將焉用之且吾以玉賈罪不亦銳乎注銳細小也音義賈音古下無强賈同銳悅歲反疏正義曰一共一否為鄭國之罪也貪淫為韓子之罪也注正義曰銳是鋒芒不得為折韓子買諸賈人旣成賈矣商人曰必告君大夫韓子請諸子産曰日起請夫環執政弗義弗敢復也注復重求也音義成賈音嫁本或作價請夫音扶重直用反今買諸商人商人曰必以聞敢以為請子産對曰昔我先君桓公與商人皆出自周注鄭本在周畿内桓公東遷并與商人俱疏正義曰賈人即商人也行曰商坐曰賈對文雖别散則不殊故商賈並言之注正義曰世本云鄭桓公封棫林即漢之京兆鄭縣是也本在周之西都畿内也鄭語稱史伯為桓公謀使桓公寄帑與賄於虢鄶之國桓公從之其子武公遂滅虢鄶而國之當桓公東遷帑賄之時并與商人俱來也庸次比耦注庸用也用次更相從耦耕音義比毗志反更音庚以艾殺此地斬之蓬蒿藜藋而共處之世有盟誓以相信也曰爾無我叛我無强賈注無强市其物音義艾魚廢反蓬蒲東反蒿呼高反藜力兮反藋徒弔反强其丈反下强奪同又其良反注倣此毋或匄奪爾有利市寶賄我勿與知恃此質誓故能相保以至于今今吾子以好來辱而謂敝邑强奪商人是教敝邑背盟誓也毋乃不可乎吾子得玉而失諸侯必不為也若大國令而共無藝注藝法也音義毋音無下同匄古害反又姑未反乞也賄呼罪反或音貨與音預好呼報反下及注並同背音佩疏正義曰六年傳稱楚公子棄疾之過鄭也不强匄則匄是乞也乞則可也唯不得强耳此言毋或匄奪亦謂不得强匄乞奪取也乞之與乞一字也取則入聲與則去聲也此匄亦有取與此傳言匄謂取也詔書稱租調匄民謂與民上云買諸賈人則是和買而子産謂之强奪者韓子以威偪之其賈必賤故商人欲得告君大夫子産知其非和買故云然也鄭鄙邑也亦弗為也注不欲為鄙邑之事僑若獻玉不知所成敢私布之注布陳也韓子辭玉曰起不敏敢求玉以徼二罪敢辭之注傳言子産知禮宣子能改過音義徼古堯反疏正義曰徼二罪謂晉失諸侯鄭為邊邑夏四月鄭六卿餞宣子於郊注餞送行飲酒音義餞賤淺反字林子扇反疏注正義曰詩云飲餞于禰毛傳云祖而舍軷飲酒於其側曰餞宣子曰二三君子請皆賦起亦以知鄭志注詩言志也子齹賦野有蔓草注子齹子皮之子嬰齊也野有蔓草詩鄭風取其邂逅相遇適我願兮音義齹才何反字林才可反又士知反説文作云齒差跌也在河千多二反蔓音萬邂户賣反逅戸豆反疏正義曰野有蔓草思遇時也君之澤不下流民窮於兵革男女失時思不期而會焉其詩云野有蔓草零露溥兮有羙一人清揚婉兮邂逅相遇適我願兮注云清揚眉目之間婉然羙好邂逅不期而會適其時願宣子曰孺子善哉吾有望矣注君子相願己所望也音義孺如住反子產賦鄭之羔裘注言鄭别於唐羔裘也取其彼己之子舍命不渝邦之彥兮以羙韓子音義别彼列反己音記舍音赦又音捨渝羊朱反疏注正義曰羔裘刺朝也言古之君子以風其朝焉釋訓云之子者是子也斥韓子也鄭𤣥云己語辭也舍猶處也渝變也處命不變謂守死善道見危授命之類也釋訓云羙士為彥言一邦之羙士以羙韓子也宣子曰起不堪也注不堪國之司直子大叔賦褰裳注褰裳詩曰子惠思我褰裳渉溱子不我思豈無他人言宣子思己將有褰裳之志如不我思亦豈無他人音義褰起䖍反溱側巾反疏正義曰褰裳思見正也狂童恣行國人思大國之正已也其詩云子惠思我褰裳渉溱注云子者斥大國之正卿子若愛而思我我國有突篡國之事而可征而正之我則揭衣渉溱水往告難也又云子不思我豈無他人注云言他人者先郷齊晉宋衞後至荆楚宣子曰起在此敢勤子至於他人乎注言已今崇好在此不復令子適他人音義復扶又反令力呈反下同子大叔拜注謝宣子之有鄭宣子曰善哉子之言是注是褰裳疏注正義曰是猶此也子之言此褰裳之詩也不有是告他人之事其能終相善乎不有是事其能終乎注韓起不欲令鄭求他人子大叔拜以荅之所以晉鄭終善子游賦風雨注子游駟帶之子駟偃也風雨詩取其旣見君子云胡不夷疏正義曰風雨思君子也亂世則思君子不改其度焉其詩云風雨凄凄鷄鳴喈喈注云風且雨凄凄然鷄猶守時而鳴喈喈然喻君子雖居亂世不變改其節度又云旣見君子云胡不夷注云胡何也夷說也思而見之云何而心不說子旗賦有女同車注子旗公孫叚之子豐施也有女同車取其洵羙且都愛樂宣子之志音義樂音洛又五孝反疏注正義曰洵信也都閑也言信羙好且閑習於威儀是愛樂宣子之志子栁賦蘀兮注子栁印叚之子印癸也蘀兮詩取其倡予和女言宣子倡己將和從之音義蘀他洛反印一刃反倡昌亮反本或作唱同和户卧反下注同女音汝疏正義曰蘀兮刺忽也君弱臣彊不唱而和也其詩云蘀兮蘀兮風其吹女注云蘀槁也槁謂木葉也木葉槁待風乃落喻君有政教臣乃行之言此者刺今不然又云叔兮伯兮唱予和女注云叔伯言羣臣長㓜也羣臣無其君而行自以强弱相服女倡矣我則將和之言此者刺其自專也宣子喜曰鄭其庶乎注庶幾於興盛二三君子以君命貺起賦不出鄭志注六詩皆鄭風故曰不出鄭志音義貺音况皆昵燕好也注昵親也賦不出其國以示親好音義昵女乙反二三君子數世之主也可以無懼矣宣子皆獻馬焉而賦我將注我将詩頌取其日靖四方我其夙夜畏天之威言志在靖亂畏懼天威音義數色主反疏正義曰我將祀文王於明堂也云儀式刑文王之典日靖四方我其夙夜畏天之威于時保之注云蚤夜敬天於是得安文王之道子產拜使五卿皆拜曰吾子靖亂敢不拜德宣子私覲於子產以玉與馬曰子命起舍夫玉是賜我玉而免吾死也敢不藉手以拜注以玉馬藉手拜謝子產音義覲其靳反舍音捨夫音扶藉在夜反注同公至自晉注晉人聽公得歸子服昭伯語季平子注昭伯惠伯之子子服回也隨公從晉還音義語魚據反曰晉之公室其將遂卑矣君㓜弱六卿彊而奢傲將因是以習習實為常能無卑乎平子曰爾㓜惡識國注昭伯尚㓜平子不信其言音義傲五報反惡烏路反少詩照反疏正義曰言將因是君㓜弱以習奢傲之事旣習奢傲實以為常常行輕君之禮能無卑乎秋八月晉昭公卒注為下平子如晉葬起九月大雩旱也鄭大旱使屠擊祝款竪柎有事於桑山注三子鄭大夫有事祭也音義屠音徒柎音附又方于反斬其木不雨子產曰有事於山蓻山林也注蓻養䕶令繁殖音義蓻音藝令方呈反而斬其木其罪大矣奪之官邑冬十月季平子如晉葬昭公平子曰子服回之言猶信注自往見之乃信回言子服氏有子哉注有賢子也春秋左傳注疏卷四十七春秋左氏傳注疏卷四十七考證傳曰義也夫可謂直矣趙汸補注曰傳本以直為義杜說失傳意又傳曰猶義也夫杜云故重疑之按數其賄稱其詐皆為國事言之杜以為傷義非也傳文語助也夫二字甚多未必皆是疑辭其治國制刑以下未必皆夫子語臣照按傳文作也夫字者俱是流連詠歎之辭不應此處獨為疑辭趙汸說是也傳叔弓涖事臣召南按公羊穀梁皆以為方祭而聞叔弓之卒遂去樂卒事是叔弓卒于家也左傳所載梓愼之言又明言涖事籥入而卒則卒于祭所矣君之去樂卒事不亦宜乎凡叙事以左氏為實傳唐叔受之以處參虚臣召南按傳凡言虚必係古人言之如顓頊之虚少昊之虚是也惟此一文以天星之分野而亦言虚又十七年傳宋大辰之虚也與此正同傳福祚之不登叔父焉在注言福祚不在叔父當在誰邪顧炎武日知録曰言忘其彛器是福祚之不登惡在其為叔父乎杜注非也臣浩按杜注自確若如顧炎武之解雖似直截而殊少韞藉傳故曰籍氏疏伯生司徒公公生曲沃正少襄臣召南按晉僖侯名司徒後遂諱之然則籍氏之司徒公必在僖侯之前傳無伯也夫陳傅良曰晉自平丘之會不能合諸侯諸侯始有自為盟會者不書義見二十六年又曰傳言昭公以來伯者不作而齊人横納北燕伯伐徐莒今為此會至鄟陵而專盟矣傳子齹賦野有蔓草注子皮之子嬰齊也臣召南按子皮卒後其子復為上卿在子產之上前傳所謂展氏為上卿者也子產位在次卿而執國政故下文曰使五卿皆拜傳宣子曰起不堪也注不堪國之司直臣浩按羔裘三章皆以羙宣子宣子遜謝謂三章所云皆非所堪也傳平子曰爾㓜惡識國臣召南按晉六卿彊而公室弱誠如子服昭伯所言但意如與晉六卿同惡相濟其䟦扈傲上正喜公室之卑可以縱肆耳謂昭伯㓜惡識國葢出君之心已萌于此日哉春秋左氏傳注疏卷四十七考證
