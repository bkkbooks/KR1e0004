body:
  text: 春秋左傳注疏卷二十一起宣公元年盡四年晉杜氏注唐陸德明音義孔頴逹疏宣公音義陸曰宣公名倭一名接又作委文公子母敬嬴謚法善問周逹曰宣疏正義曰魯世家云宣公名倭或作接文公之子敬嬴所生以匡王五年即位是嵗嵗在夀星謚法善問周逹曰宣經元年春王正月公即位注無傳公子遂如齊逆女注不譏䘮娶者不待貶責而自明也卿為君逆例在文四年音義娶七喻反為于偽反疏正義曰文公䘮未期此時已娶違禮不譏者此事甚惡言不待貶責而其惡自明也昭元年公羊傳曰春秋不待貶絶而罪惡見者不貶絶以見罪惡貶絶然後罪惡見者貶絶以見罪惡是其義也文四年逆婦姜于齊傳云卿不行非禮也是卿為君逆之例也三月遂以夫人婦姜至自齊注稱婦有姑之辭不書氏史闕文疏正義曰宣公母敬嬴在是有姑也夫人以姜為姓舉姓而稱姜氏去氏稱姜則不成文義知不稱氏者史闕文也傳言新作延廐而經無作字是作傳之時經猶未闕於後經始闕耳此文傳亦無氏知其本史先闕故云史闕文而不云經闕文也史文既闕仲尼不正之者以無所褒貶故因其詳略也諸經所闕者或史文先闕仲尼不改或仲尼具文在後始闕公羊榖梁漢初始為其傳見其闕文妄為之説非其實也公羊傳曰夫人何以不稱姜氏貶曷為貶譏䘮娶䘮娶者公也則曷為貶夫人内無貶于公之道也内無貶于公之道則曷為貶夫人夫人與公一體也穀梁之意亦然先儒取以為説服䖍云古者一禮不備貞女不從故詩云雖速我訟亦不女從宣公既以䘮娶夫人從亦非禮故不稱氏見略賤之也杜不然者女之出嫁事由父母夫来取之父母許之豈得問禮具否拒逆昏姻之命從夫䘮娶父母之咎自可罪其父母何以貶責夫人若其貶青夫人當去夫人之號減一氏字復何所明夫人之稱姜氏猶遂之稱公子也舎遂之族而去子稱公可乎亦知遂不可去子稱公夫人復安可以去氏稱姜也逆婦姜于齊以卿不行變文略賤此經貶遂不稱公子以成夫人之尊非略賤之事也詩責彊暴之男行不由禮陳其爭訟之辭述其守貞之意此豈是宣公淫掠而欲令齊女守貞哉夏季孫行父如齊晉放其大夫胥甲父于衛注放者受罪黜免宥之以逺音義宥音又疏正義曰舜典云流宥五刑孔安國云以流放之法寛五刑是放者有罪當刑而不忍刑之寛其罪而放棄之也三諫不從待放而去者彼雖無罪君不用其言任令自去亦是放棄之義放之與奔俱是去國而去情小異釋例曰奔者廹窘而去逃死四隣不以禮出也放者受罪黜免宥之以逺也臣之事君三諫不從有待放之禮故傳曰義則進否則奉身而退廹窘而出奔及以禮見放俱去其國故傳通以進為文仲尼脩春秋又以所稱為優劣也言優劣者放者君舎其罪緩歩而出是其優也奔者止則懼死奔馳而去是其劣也昭八年楚人執陳公子招放之于越哀三年蔡人放其大夫公孫獵于吳與此胥甲父等皆甘心受罪黜其官位宥之以適逺方是實放而書放也襄二十九年傳稱齊公孫蠆公孫竈放其大夫髙止於北燕書曰出奔罪髙止也髙止好以事自為功且専故難及之彼罪髙止故實放而書奔也然則文十四年傳稱宋髙哀不義宋公而出遂来奔髙哀無罪亦改放而書奔者放者縁遣者之意為義奔者指去國之人立文據其所徃之處皆是從外来耳髙哀身来至魯自魯而稱来奔不書宋人之意故不得言放此乃外内之文異耳叛者以地適他稱叛入魯則稱来奔亦此之類也公㑹齊侯于平州注平州齊地在泰山牟縣西音義牟亡侯反公子遂如齊六月齊人取濟西田注魯以賂齊齊人不用師徒故曰取秋邾子来朝注無傳楚子鄭人侵陳遂侵宋晉趙盾帥師救陳注傳言救陳宋經無宋字盖闕音義盾徒本反疏正義曰陳宋俱被楚侵明其並救二國傳稱救陳宋而經無宋字故設疑云盖闕也服䖍云趙盾既救陳而楚師侵宋趙盾欲救宋而楚師觧去按經傳皆言侵陳遂侵宋陳在宋南是先侵陳去陳乃侵宋也若趙盾越宋而南救陳猶及楚師北廻救宋安得不及楚也若言欲救宋而楚師解去則救陳之時楚師已向宋矣何以書救陳也盖以陳既被侵方始告晉晉人起師救陳楚又移師侵宋晉師比至於鄭楚師既已去矣故諸國㑹于棐林同共伐鄭棐林鄭地明晉始至鄭不得與楚相遇故竟無戰事言救陳宋者皆是致其意耳宋公陳侯衛侯曹伯㑹晉師于棐林伐鄭注晉師救陳宋四國君徃㑹之共伐鄭也不言㑹趙盾取於兵㑹非好㑹也棐林鄭地滎陽􅁐陵縣東南有林鄉音義棐芳尾反好呼報反疏正義曰晉本興師為救陳宋但楚師已去故四國之君在㑹晉師與共伐鄭言于棐林者行㑹禮然後伐桓十五年公㑹宋公衛侯陳侯于袲伐鄭亦行㑹禮乃伐與此同也晉使趙盾為将不言㑹趙盾而言晉師者取於兵㑹非好㑹言所㑹㑹其兵非㑹其人故稱師案定八年公㑹晉師于瓦注云卿不書禮不敵公知此非為趙盾不敵公侯稱師者沈氏云此㑹有宋公陳侯等猶成二年㑹于蜀有蔡許之君故知此非為趙盾不得敵諸侯但取於兵㑹彼㑹于瓦唯有公故知與此異耳冬晉趙穿帥師侵崇音義崇本亦作崈晉人宋人伐鄭傳元年春王正月公子遂如齊逆女尊君命也注諸侯之卿出入稱名氏所以尊君命也傳於此發者與還文不同故釋之疏正義曰氏者位尊乃賜是臣之寵號具名氏所以尊君命言君命重故貴臣行行人貴則君命尊也諸侯之卿出入稱名氏者若宋華元衛元咺之類是也如魯卿公孫敖䘮歸尚稱氏明生歸亦然其歸父意如叔孫婼不稱氏者各有所為與常例不同也㑹盟征伐具名氏者皆是尊君命也傳獨於此發者為其與還文不同故於此釋之釋例曰昏禮雖奉時君之命其言必稱先君以為禮辭故公子翬逆女傳曰脩先君之好公子遂逆女傳稱曰尊君命互發其義也三月遂以夫人婦姜至自齊尊夫人也注遂不言公子替其尊稱所以成小君之尊也公子當時之寵號非族也故傳不言舎族釋例論之備矣音義稱尺證反舍音捨疏正義曰公子亦是寵號其事與族相似魯臣有罪則貶去其族族去則非卿今遂與夫人俱至物無兩大人不並尊若從夫人者尊則夫人卑矣故替其尊稱令從夫人者卑則夫人尊矣釋例曰徃必稱族以示其重還雖在塗必舎族以替之所以成小君之尊是其義也成十四年叔孫僑如逆女及以夫人至其文與此正同彼傳云稱族尊君命舍族尊夫人此傳不言稱族舎族者釋例曰傳云公子遂如齊逆女尊君命也遂以夫人婦姜至自齊尊夫人也叔孫僑如逆女則徃曰稱族還曰舎族然則公子公孫繋公之常言非族也是言公子非族故與彼異文公子雖則非族稱舎亦與族同故其言尊君命尊夫人與彼亦不異也所以異者族必君賜乃稱之公子公孫繋公之常言不須待賜乃稱之耳夏季文子如齊納賂以請㑹注宣公簒立未列於㑹故以賂請之音義簒初患反晉人討不用命者放胥甲父于衛注胥甲下軍佐文十二年戰河曲不肯薄秦於險疏正義曰按彼傳胥甲與趙穿同罪放胥甲而舎趙穿者於時趙盾為政穿見晉君之壻或本罪輕於胥甲故得無咎而立胥克注克甲之子先辛奔齊注辛甲之屬大夫㑹于平州以定公位注簒立者諸侯既與之㑹則不得復討臣子殺之與弑君同故公與齊㑹而位定音義復扶又反疏正義曰春秋之世王政不行諸侯自相推戴廢立不由天子簒弑而立則鄰國討之若與之㑹則序之於列成其為君諸侯既已為㑹則臣子不得復討若其殺之則與弑君罪同宣公殺子惡而取國常畏魯人討己心不自安納賂請㑹故既與齊㑹而公位乃定成十五年戚之會討曹成公成公得列于㑹後曹人請于晉曰先君無乃有罪乎若有罪則君列諸㑹矣是列㑹則位定也東門襄仲如齊拜成注謝得會也六月齊人取濟西之田為立公故以賂齊也注濟西故曹地僖三十一年晉文以分魯音義為于偽反宋人之弑昭公也注在文十六年晉荀林父以諸侯之師伐宋宋及晉平宋文公受盟于晉又會諸侯于扈将為魯討齊皆取賂而還注文十五年十七年二扈之盟皆受賂疏正義曰杜以傳言皆取賂而還必有二事乃得稱皆故指二扈之盟以充皆義劉炫云案傳數晉罪近發宋弑昭公前扈之盟文所不及何當虚指其事言皆取賂炫謂宋及晉平取宋賂為魯討齊取齊賂也案此言㑹諸侯于扈文承宋人之弑昭公下知非十七年㑹于扈既取宋賂又取齊賂而稱皆必為十七年十五年二扈之盟者案十七年㑹于扈尋檢經傳全無為魯討齊之事豈得違背經傳妄指十七年乎但宋弑昭公其罪既大故先言之為魯討齊其失小故後言之劉炫以傳文先後顛倒又以㑹于扈為十七年之事違背經傳而規杜非也取賂而還書本或云取齊賂而還檢勘古本及杜注意並無齊字文十七年宋及晉平唯受宋賂十五年㑹扈受齊賂耳傳言皆者皆齊宋也故知皆取齊賂者非也鄭穆公曰晉不足與也遂受盟于楚陳共公之卒楚人不禮焉注卒在文十二年音義共音恭陳靈公受盟于晉秋楚子侵陳遂侵宋晉趙盾帥師救陳宋㑹于棐林以伐鄭也楚蒍賈救鄭遇于北林注與晉師相遇滎陽中牟縣西南有林亭在鄭北囚晉解揚晉人乃還注解揚晉大夫音義解音蟹晉欲求成於秦趙穿曰我侵崇秦急崇必救之注崇秦之與國音義秦急崇絶句本或作崇急秦必救之是後人改耳疏正義曰崇是秦之與國故秦人急於援崇吾以求成焉冬趙穿侵崇秦弗與成晉人伐鄭以報北林之役注報囚解揚於是晉侯侈趙宣子為政驟諫而不入故不競於楚注競强也為明年鄭伐宋張本音義侈昌氏反又户氏反驟仕救反經二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元注得大夫生死皆曰獲例在昭二十三年大棘在陳留襄邑縣南疏正義曰此華元歸生及哀二年趙鞅罕逹客主各言帥師者皆是将尊師衆故並具其文或於歸生之下無帥師之字脱耳注正義曰此獲華元生也哀十一年獲齊國書死也以此知生死皆曰獲昭二十三年傳云書曰胡子髠沈子逞滅獲陳夏齧君臣之辭也傳言書曰是仲尼變例也秦師伐晉夏晉人宋人衛人陳人侵鄭注鄭為楚伐宋獲其大夫晉趙盾興諸侯之師将為宋報恥畏楚而還失覇者之義故貶稱人音義為楚于偽反下同疏正義曰諸經貶諸侯之卿稱人者傳皆言其名氏此傳唯稱趙盾及諸侯之師侵鄭諸侯之将不言名氏則實是微者非貶之也趙盾畏楚而還故貶之稱人釋例曰鄭受楚命伐宋大敗宋師獲其二卿此晉之不競也晉於是申命衆國大起其衆将以雪宋之恥取威定霸趙盾為政而畏越椒之盛不敢遂其所志託辭班師失宋之心孤諸侯之望所以致貶也秋九月乙丑晉趙盾弑其君夷臯注靈公不君而稱臣以弑者以示良史之法深責執政之臣例在四年音義臯古刀反疏正義曰釋例曰經書趙盾弑君而傳云靈公不君又以明於例此弑宜稱君也弑非趙盾而經不變文者以示良史之意深責執政之臣傳故特見仲尼曰越竟乃免明盾亦應受罪也雖原其本心而春秋不赦其罪盖為教之逺防冬十月乙亥天王崩注無傳傳二年春鄭公子歸生受命于楚伐宋注受楚命也音義受命于楚本或作命于楚宋華元樂吕禦之二月壬子戰于大棘宋師敗績囚華元獲樂吕注樂吕司寇獲不書非元帥也獲生死通名經言獲華元故傳特䕶之曰囚以明其生獲故得見贖而還音義帥所類反贖食欲反及甲車四百六十乗俘二百五十人馘百人狂狡輅鄭人鄭人入于井注狂狡宋大夫輅迎也音義乗繩證反下同俘芳夫反馘古獲反馘百人或馘百者人衍字狡古夘反輅五嫁反倒㦸而出之獲狂狡君子曰失禮違命宜其為禽也戎昭果毅以聽之之謂禮注聽謂常存於耳著於心想聞其政令音義倒丁老反宜其為禽一本作宜其禽也毅魚既反著直略反殺敵為果致果為毅易之戮也注易反易疏正義曰軍法以殺敵為上将軍臨戰必三令五申之狂狡失即戎之禮違元帥之命曲法以拯鄭人宜其為禽也昭明也兵戎之事明此果毅以聴之之謂禮能殺敵人是名為果言能果敢以除賊致此果敢乃名為毅言能疆毅以立功易之戮也反易此道則合刑戮也昭謂明曉此禮致謂逹之於敵毅疆也能致用此意乃謂彊人言在軍對敵必須殺也尚書成湯數桀之罪以誓衆云爾尚輔予一人致天之罰予其大賚汝爾不從誓言予則孥戮汝武王數紂之罪以誓衆云勗哉夫子尚桓桓如虎如貔如熊如熊于商郊爾所不勗其于爾躬有戮二王以至聖伐至惡尚誓衆使多殺是軍法務在多殺殺敵乃為禮也公羊善宋襄公不鼓不成列以為文王之戰亦不過此武王之戰既知不然文王之戰豈當若是審如公羊之言文王未曉戰法其不能身定天下豈為此乎將戰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政注疇昔猶前日也音義食音嗣斟之金反不與音預疏正義曰禮記檀弓云孔子謂子貢曰吾疇昔之夜夢坐奠於兩楹之間鄭𤣥云疇昔猶前日也是相傳為然今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民注憾恨也殄盡也音義憾本亦作感戸暗反注同敗必邁反又如字殄大典反於是刑孰大焉詩所謂人之無良者注詩小雅義取不良之人相怨以亡其羊斟之謂乎殘民以逞音義逞勑領反宋人以兵車百乗文馬百駟注畫馬為文四百匹疏正義曰謂文飾雕畫之若朱其尾鬛之類也以贖華元于鄭半入華元逃歸立于門外告而入注告宋城門而後入言不苟見叔牂曰子之馬然也注叔牂羊斟也卑賤得先歸華元見而慰之音義牂子郎反對曰非馬也其人也注叔牂知前言已顯故不敢讓罪既合而来奔注叔牂言畢逐奔魯合猶荅也疏正義曰叔牂卑賤故得先歸華元見而安慰之曰徃奔入鄭軍者子之馬自然非子之罪叔牂自知前言已顯不敢隠諱乃對元曰非馬也其人也言是已為之叔牂既荅華元而即来奔魯耳服䖍載三説皆以子之馬然為叔牂之語對曰以下為華元之辭賈逵云叔牂宋守門大夫華元既見叔牂牂謂華元曰子見獲於鄭者是由子之馬使然也華元對曰非馬自奔也其人為之也謂羊斟驅入鄭也奔走也言宋人贖我之事既和合而我即来奔耳鄭衆云叔牂即羊斟也在先得歸華元見叔牂牂即誣之曰奔入鄭軍者子之馬然也非我也華元對曰非馬也其人也言是女驅之耳叔牂既與華元合語而即来奔魯又一説叔牂宋人見宋以馬贖華元謂元以贖得歸謂元曰子之得来當以馬贖故然華元曰非馬也其人也言已不由馬贖自以人事来耳贖事既合而我即来奔杜以傳文見叔牂而即言曰則曰下皆當為華元之語不得為叔牂之辭且以華元與賤人交語而稱對曰謂歸國而来奔皆於文不順又羊斟與叔牂當是名字相配故不從三家而别為之説采鄭氏来奔為奔魯耳合是聚合言語故云合猶荅也宋城華元為植廵功注植将主也音義植直吏反注同将子匠反疏正義曰周禮大司馬大役屬其植鄭司農云植謂部曲将吏故宋城華元為植廵功是植為将領主帥監作者也廵功謂廵城檢作功也城者謳曰睅其目皤其腹棄甲而復注睅出目皤大腹棄甲謂亡師音義謳烏侯反睅户板反説文字林云大目也蘇林云寝視不安貌孟康云猶分然也皤歩何反疏正義曰説文云睅大目也目大則出見故云出目也皤是腹之状腹以大為異故為大腹也于思于思棄甲復来注于思多鬚之貌音義于思如字又西才反多鬚貌賈逵云白頭貌復扶又反来力知反又如字以協上韻鬚脩于反字又作鬢疏正義曰賈逵以為白頭貌成十五年華元為右師距此三十二年計未得頭白故杜以為多鬚貌亦是以意言之耳使其驂乗謂之曰牛則有皮犀兕尚多棄甲則那注那猶何也音義驂七南反犀音西兕徐履反那乃多反疏正義曰釋獸云犀似豕郭璞曰形似水牛豬頭大腹痺脚脚有三蹄黒色三角一在頂上一在額上一在鼻上鼻上者食角也小而不橢好食棘亦有一角者劉欣期交州記曰犀出九徳毛如豕蹄有甲頭似馬吴録地理志云武陵沅南縣以南皆有犀釋獸云兕似牛郭璞云一角青色重千斤説文云兕如野牛青毛其皮堅厚可制鎧交州記曰兕出九徳有一角角長三尺餘形如馬鞭柄徧檢書傳犀兕二獸並出南方非宋所有假令波及宋國必不能多言尚多者苟以荅謳者耳役人曰從其有皮丹漆若何華元曰去之夫其口衆我寡注傳言華元不吝其咎寛而容衆音義漆音七吝力刃反咎其九反秦師伐晉以報崇也注伐崇在元年遂圍焦注焦晉河外邑夏晉趙盾救焦遂自隂地及諸侯之師侵鄭注隂地晉河南山北自上洛以東至陸渾音義渾户昏反以報大棘之役楚鬭椒救鄭曰能欲諸侯而惡其難乎遂次于鄭以待晉師趙盾曰彼宗競于楚殆将斃矣注競强也鬭椒若敖之族自子文以来世為楚令尹音義惡烏路反難乃旦反斃婢世反姑益其疾乃去之注欲示弱以驕之傳言趙盾所以稱人且為四年楚滅若敖氏張本晉靈公不君注失君道也以明於例應稱國以弑音義弑申志反厚斂以雕牆注雕畫也音義斂力驗反雕本亦作彫牆在良反從臺上彈人而觀其辟丸也宰夫胹熊蹯不熟殺之寘諸畚使婦人載以過朝注畚以草索為之筥屬音義彈徒丹反胹音而煑也蹯扶元反寘之䜴反畚音本草器也索素各反筥九吕反疏正義曰字書過熟曰胹命此宰夫胹熊蹯不至於熟以其違命故殺之注正義曰周禮挈壺氏挈畚以令軍糧鄭衆云縣畚于廩假之處畚所以盛糧之器故以畚表廩説文云畚蒲器可以盛糧韓詩外傳云鮑焦挈畚采蔬遇子貢於道是畚可以盛糧盛菜以草索為之今人猶有此器形制似筥故為筥屬過朝以示人令衆懼也趙盾士季見其手問其故而患之將諫士季曰諫而不人則莫之繼也㑹請先不入則子繼之三進及溜而後視之注士季随㑹也三進三伏公不省而又前也公知欲諫故佯不視音義其手一本作首溜力救反屋霤也疏正義曰言二人将欲相随入諫士季謂盾曰子是尊卿今與子俱諫而不入則莫之能繼續為諫㑹是卑卿請先徃諫不入則子繼之注正義曰溜謂簷下水溜之處入門伏而不省起而更進三進而及於君之屋溜言廹於公之前曰吾知所過矣將改之稽首而對曰人誰無過過而能改善莫大焉詩曰靡不有初鮮克有終注詩大雅也音義鮮息淺反少也下同夫如是則能補過者鮮矣君能有終則社稷之固也豈惟羣臣賴之又曰衮職有闕惟仲山甫補之能補過也注詩大雅也衮君之上服闕過也言服衮者有過則仲山甫能補之音義衮古本反君能補過衮不廢矣注常服衮也猶不改宣子驟諫公患之使鉏麑賊之注鉏麑晉力士音義鉏仕俱反麑音迷一音五兮反晨徃寢門闢矣盛服將朝尚早坐而假寐注不解衣冠而睡音義闢婢亦反盛音成本或作成睡垂偽反麑退歎而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死注槐趙盾庭樹音義槐音懐又音回秋九月晉侯飲趙盾酒伏甲將攻之其右提彌明知之注右車右音義飲於鴆反提本又作祗上支反彌面皮反趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒焉明搏而殺之注獒猛犬也音義遂扶舊本皆扶房孚反服䖍注作跣先典反云徒跣也今杜注本徃徃有跣者嗾素口反説文云使犬也服本作㖩夫音扶獒五羔反尚書傳云大犬也爾雅云狗四尺為獒説文云犬知人心可使者搏音博疏正義曰此言飲趙盾酒是小飲酒耳非正燕禮燕禮獻酬之後方脱屨升堂行無算爵非止三爵而已其侍君小飲則三爵而退玉藻云君子之飲酒也受一爵而色洒如也二爵而言言斯禮已三爵而油油以退鄭𤣥云禮飲過三爵則敬殺可以去矣是三爵禮訖自當退也提彌明言此之時未必已過三爵假此辭以悟趙盾耳服䖍本扶作跣注云趙盾徒跣而下走禮脱屨而升堂降階乃納屨堂上無屨跣則是常何須云遂跣而下且遂者因上生下之言提彌明言訖而遂不得為趙盾遂也杜本作扶言扶趙盾下階也服䖍云嗾取也夫語辭獒犬名公乃嗾夫獒使之噬盾也釋畜云狗四尺為獒是大犬之名以其使之噬盾故云獒猛犬也盾曰棄人用犬雖猛何為注責公不養士而更以犬為己用鬭且出提彌明死之初宣子田於首山舎於翳桑注田獵也翳桑桑之多䕃翳者首山在河東蒲坂縣東南音義翳於計反䕃音隂又於鴆反見靈輙饑問其病注靈輙晉人曰不食三日矣食之舎其半問之曰宦三年矣注宦學也音義食之音嗣下同舎其音捨疏正義曰曲禮云宦學事師則二者俱是學也但宦者學仕宦學者尋經藝以此為異矣未知母之存否今近焉注去家近請以遺之使盡之而為之簞食與肉注簞笥也音義遺唯季反下注同簞音丹笥思嗣反疏正義曰鄭𤣥曲禮注云圓曰簞方曰笥然則俱是竹器方圎異名耳故以簞為笥鄭𤣥論語注亦云簞笥也寘諸橐以與之既而與為公介注靈輙為公甲士音義橐他􅏖反而與音預公介音界倒㦸以禦公徒而免之問何故對曰翳桑之饑人也問其名居注問所居不告而退注不望報也遂自亡也注輙亦去乙丑趙穿攻靈公於桃園注穿趙盾之從父昆弟子乙丑九月二十七日音義攻如字本或作弑疏正義曰晉語云趙衰趙夙之弟世族譜盾是衰子穿是夙孫是穿為盾之從父昆弟之子也世本夙為衰祖穿為夙之曾孫世本轉寫多誤其本未必然也宣子未出山而復注晉竟之山也盾出奔聞公弑而還音義竟音境下文注同弑申志反大史書曰趙盾弑其君以視於朝宣子曰不然對曰子為正御亡不越竟反不討賊非子而誰宣子曰嗚呼我之懐矣自詒伊慼其我之謂矣注逸詩也言人多所懐戀則自遺憂音義大音泰孔子曰董狐古之良史也書法不隠注不隠盾之罪趙宣子古之良大夫也為法受惡注善其為法受屈音義為于偽反注同惜也越竟乃免注越竟則君臣之義絶可以不討賊疏正義曰哀八年傳公山不峱云君子違不適讐國未臣而有伐之奔命焉死之可也注云未臣所適之國則可還奔命死其難如彼傳文雖則出奔臣義未絶此注云越竟則君臣之義絶者以仲尼云越竟乃免出竟則免責明其義巳絶也襄三十年鄭人殺良霄傳曰不稱夫人言自外入也去國不稱大夫是為義絶之驗且受君之命乃得為臣今君欲殺巳逃奔他國君之於臣既巳絶矣臣之於君能無絶乎董狐云子為正卿反不討賊明其威足討賊卿位猶在故責之耳我以君寵得為國卿仗君之威故羣下用命亦既失位出奔國人不復畏我國内自有賊亂非我所能禁之故越竟得免由義絶故也不峱之言謂巳以他故出奔非是君欲殺巳閔其宗國宜還救之昭二十一年宋公子城以晉師救宋是其事也襄二十七年傳曰崔氏之亂申鮮虞来奔僕貴於野以䘮荘公彼是公之寵臣去國而行君服豈復貴無罪而將見殺逃竄而得免死者皆令反服君乎禮檀弓曰穆公問於子思曰為舊君反服古與子思曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若將加諸膝退人若將隊諸淵無為戎首不亦善乎又何反服之禮之有是言去國雖同本情有異不可以一槩論也宣子使趙穿逆公子黒臀于周而立之注黒臀晉文公子音義臀徒門反疏正義曰周語單襄公云吾聞成公之生也其母夢神䂓其臀以墨曰使有晉國故命之曰黑臀晉世家成公者文公少子其母周女也壬申朝于武宫注壬申十月五日既有日而無月冬又在壬申下明傳文無較例音義較音角初驪姬之亂詛無畜羣公子注詛盟誓音義驪力知反詛側慮反疏正義曰服䖍云驪姬與獻公及諸大夫詛無畜羣公子欲令其二子專國杜雖不注義似不然若驪姬身為此詛姬死即應復當何得比至於今國無公族豈復文襄之霸遂踵驪姬法乎盖為夷齊卓子以庶簒適晉國創其為亂不用復畜公子按檢傳文及國語文公之子雍在秦樂在陳黒臀在周襄公之孫談在周則是晉之公子悉皆出在他國是其因行而不改成公今始革之故傳本其初也則是國内因驪姬之亂故設此詛非驪姬自為詛也若驪姬為詛不須言驪姬之亂以言之亂知其創驪姬也自此之後雖立公族而顯者亦少唯有悼公之弟揚干悼公之子愸二人名見於傳昭十八年鄭人救火子産辭晉公子公孫於東門以外更無其人良由偪於六卿不被任用故耳自是晉無公族注無公子故廢公族之官疏正義曰不畜羣公子故無公族是公族之官掌教公之子弟也下注云餘子適子之母弟亦治餘子之政子屬餘子之官則適子屬公族之官也孔晁注國語云公族大夫掌公族及卿大夫子弟之官是卿之適子屬公族也晉語云欒伯請公族悼公曰荀家惇惠荀㑹文敏黶也果敢無忌慎靖使茲四人者為之膏粱之性難正也故使惇惠者教之文敏者道之果敢者諗之慎靖者脩之使茲四人者為公族大夫是公族主教誨也及成公即位乃宦卿之適子而為之田以為公族注宦仕也為置田邑以為公族大夫音義適本又作嫡丁歴反下注同為置于偽反又宦其餘子亦為餘子注餘子嫡子之母弟也亦治餘子之政疏正義曰下庶子為妾子知餘子則是嫡子之母弟也言亦為餘子則知餘子之官亦治餘子之政令主教卿大夫適妻之次子也下云庶子為公行掌率公之戎車則公行不教庶子然則卿大夫之妾子亦是餘子之官教之矣其庶子為公行注庶子妾子也掌率公戎行音義行户郎反注及下同疏正義曰下句趙盾自以為庶為旄車之族即公行也掌車而謂之公行知其掌率公戎車之行列也晉於是有公族餘子公行注皆官名疏正義曰此晉有公族餘子公行詩魏風有公族公路公行其公族公行既同公路似此餘子但餘子不主路車公路非餘子也當與公行為一以其主君路車謂之公路主車行列謂之公行其實止是一官詩人變文以韻句耳周禮無此三官之名夏官有諸子下大夫二人掌國子之倅事與公族同也春官有巾車下大夫二人掌王之五路事與公行同也無餘子同者天子諸侯禮異耳趙盾請以括為公族注括趙盾異母弟趙姬之中子屏季也音義括古活反中如字又丁仲反屏歩丁反曰君姬氏之愛子也注趙姬文公女成公姊也微君姬氏則臣狄人也公許之注盾狄外孫也姬氏逆之以為嫡事見僖二十四年音義見賢遍反冬趙盾為旄車之族注旄車公行之官盾本卿適其子當為公族辟屏季故更掌旄車音義旄音毛一本作軞疏正義曰主公車行列謂之公行車皆建旄謂之旄車之族詩云孑孑干旄又曰建旐設旄是公車必建旄也周禮主車之官謂之巾車巾者衣也主衣飾之車謂之巾車此掌建旄之車謂之旄車之族盾本卿之適子其子世承正適當為公族使辟屏季故更為旄車之族自以身為妾子故使其子為妾子之官知非盾身自為旄車之族而云使其子者旄車之族賤官耳盾身既為正卿無容退掌賤職六年經稱晉趙盾衛孫免侵陳仍書於經非身退位故知使其子耳原同長而使趙括者沈氏云以其君姬氏之愛子故使之非正適也使屏季以其故族為公族大夫注盾以其故官屬與屏季使為衰之適音義衰初危反疏正義曰族即屬也故官屬者父時舊官屬也将父時官屬盡與屏季使季為衰之正適也盾之此意欲令身死之後使屏季承其父後為趙氏宗主但晉人以盾之忠更使其子朔承盾後耳經三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望注牛不稱牲未卜日葬匡王注無傳四月而葬速楚子伐陸渾之戎夏楚人侵鄭秋赤狄侵齊注無傳宋師圍曹冬十月丙戌鄭伯蘭卒注再與文同盟疏正義曰蘭以僖三十三年即位文二年盟于垂隴七年于扈十四年于新城魯鄭俱在當言三同盟而云再者以扈之盟經文不序諸侯故不數劉炫規之非也葬鄭穆公注無傳傳三年春不郊而望皆非禮也注言牛雖傷死當更改卜取其吉者郊不可廢也前年冬天王崩未葬而郊者不以王事廢天事禮記曾子問天子崩未殯五祀不行既殯而祭自啟至于反哭五祀之祭不行已葬而祭疏正義曰按經牛死在正月郊當用三月其間足得養牛牛雖一傷一死當更改卜取其吉者郊天之禮不可廢也牛死而遂不郊故為非禮也不郊非禮則於禮得郊禮諸侯為天子斬衰天王崩未葬而得郊者不以王事廢天事也引曾子問者舉輕以明重也初死以至於殯唘殯以至反哭於此之間五祀之祭不行耳既殯之後唘殯以前五祀之祭猶尚不廢郊天必不廢矣故鄭注云郊社亦然王制云䘮三年不祭唯祭天地社稷為越紼而行事鄭𤣥云不敢以卑廢尊紼輴車索禮天子殯於西序櫕輴車而塗之繋紼以備火災言越紼而行事是在殯得祭也按曾子問既殯而祭其祭也尸入三飯不侑酳不酢而已矣謂尸唯三飯祝不侑勸其食食罷主人酌酒酳尸尸不酢主人曾子問又云已葬而祭祝畢獻而已謂尸飯而侑勸訖酳尸尸酢主人酢訖又布祝席祝坐主人酌酒以獻祝獻畢而止故鄭注云既葬彌吉畢獻祝而後止是也鄭又注彼云天子七祀言五者闗中言之按禮記祭法云王為羣姓立七祀曰司命曰中霤曰國門曰國行曰泰厲曰尸曰竈王自為立七祀諸侯為國立五祀曰司命曰中霤曰國門曰國行曰公厲諸侯自為立五祀大夫立三祀曰族厲曰門曰行適士立二祀曰門曰行庶士庶人立一祀或立户或立竈是其義也望郊之屬也不郊亦無望可也注已有例在僖三十一年復發傳者嫌牛死與卜不從異音義復扶又反晉侯伐鄭及郔鄭及晉平士會入盟注郔鄭地為夏楚侵鄭傳音義郔音延楚子伐陸渾之戎遂至於雒觀兵于周疆注雒水出上雒冢領山至河南鞏縣入河音義疆居良反定王使王孫滿勞楚子注王孫滿周大夫音義勞力報反楚子問鼎之大小輕重焉注示欲偪周取天下對曰在徳不在鼎昔夏之方有徳也注禹之世音義夏户雅反逺方圖物注圖畫山川竒異之物而獻之貢金九牧注使九州之牧貢金鑄鼎象物注象所圖物著之於鼎音義鑄之樹反著張慮反舊直略反百物而為之備使民知神姦注圖鬼神百物之形使民逆備之故民入川澤山林不逢不若注若順也螭魅罔兩注螭山神獸形魅怪物罔兩水神音義螭勑知反魅亡備反本又作鬽罔亡丈反兩本又作蜽音同説文云罔兩山川之精物也疏正義曰螭山神獸形魅怪物先儒相傳為然魯語仲尼云木石之怪夔罔兩水之恠龍罔象則罔兩是木石之神杜以為水神者魯語賈逵注云罔兩罔象言有夔龍之形而無實體然則罔兩罔象皆是虚無當總彼之意非神名也上句言山林川澤則螭魅罔兩四神文十八年注螭魅山林異氣所生螭魁既為山林之神則罔兩宜為川澤之神故以為水神也莫能逢之注逢遇也用能協于上下以承天休注民無災害則上下和而受天祐音義休許蚪反下同祐音右巢有昏徳鼎遷于商載祀六百注載祀皆年音義載祀爾雅云商曰祀唐虞曰載周曰年夏曰嵗疏正義曰釋天云唐虞曰載商曰祀周曰年孫炎云載取物終更始祀取四時祭祀一訖年取年穀一熟是載祀皆年之别名􅃨言之耳律歴志云商三十一王六百二十九年商紂暴虐鼎遷于周徳之休明雖小重也注不可遷音義封直九反其姦回昏亂雖大輕也注言可移天祚明徳有所底止注底致也音義祚才故反底音㫖成王定鼎于郟鄏注郟鄏今河南也武王遷之成王定之音義郟古洽反鄏音辱卜世三十卜年七百天所命也周徳雖衰天命未改鼎之輕重未可問也疏正義曰律歴志云周三十六王八百六十七年過卜數也夏楚人侵鄭鄭即晉故也宋文公即位三年殺母弟須及昭公子武氏之謀也注武氏謀奉母弟須及昭公子以作亂事在文十八年使戴桓之族攻武氏於司馬子伯之館盡逐武穆之族武穆之族以曹師伐宋秋宋師圍曹報武氏之亂也冬鄭穆公卒初鄭文公有賤妾曰燕姞注姞南燕姓音義姞其乙反又其吉反夢天使與巳蘭注蘭香草疏正義曰夢言天者皆非天也此既言天使與巳蘭即云余為伯鯈鯈即非天也伯鯈不得自稱為天天不得變為伯鯈明是夢者恍惚之言耳成五年晉趙嬰夢天使為己祭余余福女上天之神聰明正直寧當就淫亂之人降福以求食乎昭四年叔孫穆子夢天壓己弗勝號豎牛助而勝之若是上天之神寧當與豎牛爭力而不勝也明皆恍惚之言或别有邪神夢者不識而妄稱天耳曰余為伯鯈余而祖也注伯鯈南燕祖音義鯈以留反以是為而子注以蘭為女子名音義女音汝以蘭有國香人服媚之如是注媚愛也欲令人愛之如蘭音義媚亡冀反令力呈反既而文公見之與之蘭而御之辭曰妾不才幸而有子將不信敢徴蘭乎注懼將不見信故欲託所賜蘭為懐子月數公曰諾生穆公名之曰蘭文公報鄭子之妃曰陳媯注鄭子文公叔父子儀也漢律淫季父之妻曰報音義媯九危反生子華子臧子臧得罪而出注出奔宋音義臧作郎反誘子華而殺之南里注在僖十六年南里鄭地使盗殺子臧於陳宋之間注在僖二十四年又娶于江生公子士朝于楚楚人酖之及葉而死注葉楚地今南陽葉縣音義酖直䕃反葉式渉反疏正義曰諸侯大子攝行父事稱朝此公子士非大子亦稱朝者以大子稱朝故傳亦通言之其實合稱聘耳又娶于蘇生子瑕子俞彌俞彌早卒洩駕惡瑕文公亦惡之故不立也注洩駕鄭大夫音義俞音愉惡烏路反下同公逐羣公子公子蘭奔晉從晉文公伐鄭注在僖三十年音義從如字又才用反石癸曰吾聞姬姞耦其子孫必蕃注姞姓宜為姬配耦音義癸居揆反蕃音煩下同姞吉人也后稷之元妃也注姞姓之女為后稷妃周是以興故曰吉人今公子蘭姞甥也天或啓之必將為君其後必蕃先納之可以亢寵注亢極也音義亢苦浪反與孔將鉏侯宣多納之盟于大宫而立之注大宫鄭祖廟音義鉏仕俱反大音泰注同以與晉平穆公有疾曰蘭死吾其死乎吾所以生也刈蘭而卒注傳言穆氏所以大興於鄭天所啓也音義刈魚廢反經四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向注莒郯二國相怨故公與齊侯共平之向莒邑東海承縣東南有向城遠疑也音義郯音談向舒亮反承韋昭之甑反一作烝又音拯秦伯稻卒注無傳未同盟音義稻徒老反夏六月乙酉鄭公子歸生弑其君夷注傳例曰稱臣臣之罪也子公實弑而書子家罪其權不足也赤狄侵齊注無傳秋公如齊公至自齊注無傳告于廟例在桓二年冬楚子伐鄭傳四年春公及齊侯平莒及郯莒人不肯公伐莒取向非禮也平國以禮不以亂伐而不治亂也注責公不先以禮治之而用伐音義不治直吏反以亂平亂何治之有無治何以行禮楚人獻黿於鄭靈公注穆公大子夷也音義黿音元公子宋與子家將見注宋子公也子家歸生音義見賢遍反子公之食指動注第二指也疏正義曰大射禮云右巨指鈎弦鄭𤣥云右巨指右手大擘也又曰設決朱極三鄭𤣥云極猶放也所以韜指利放弦也以朱韋為之三者食指將指無名指小指短不用然則手之五指之名曰巨指食指將指無名指小指也定十四年傳闔閭傷将指取其一屨注云其足大指見斬遂失屨謂大指為将指者将者言其将領諸指也足之用力大指為多手之取物中指最長故足以大指為将指手以中指為將指其食指者食所偏用服䖍云俗所謂啑鹽指也以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之注問所笑音義解如字一音蟹疏正義曰説文云黿大鼈也𤣥中要記曰千嵗之黿能與人語子家以告及食大夫黿召子公而弗與也注欲使指動無效音義食音嗣子公怒染指於鼎嘗之而出公怒欲殺子公子公與子家謀先注先公為難音義染如琰反先悉薦反難乃旦反子家曰畜老猶憚殺之注六畜音義畜許又反注同王許六反憚徒旦反難也而况君乎反譖子家子家懼而從之注譖子家於公夏弑靈公書曰鄭公子歸生弑其君夷權不足也注子家權不足以禦亂懼譖而從弑君故書以首惡音義禦魚吕反君子曰仁而不武無能逹也注初稱畜老仁也不討子公是不武也故不能自通於仁道而䧟弑君之罪凡弑君稱君君無道也稱臣臣之罪也注稱君謂唯書君名而稱國以弑言衆所共絶也稱臣者謂書弑者之名以示来世終為不義改殺稱弑辟其惡名取有漸也書弑之義釋例論之備矣疏正義曰晉語云趙宣子曰大者天地其次君臣則君臣之交猶父子也君無可弑之理而云弑君稱君君無道者弑君之人固為大罪欲見君之無道罪亦合弑所以懲創将来之君兩見其義非赦弑君之人以弑之為無罪也釋例曰天生民而樹之君使司牧之羣物所以繋命故戴之如天親之如父母仰之如日月事之如神明其或受雪霜之嚴雷電之威則奉身歸命有死無貳故傳曰君天也天可逃乎此人臣所執之常也然本無父子自然之恩末無家人習翫之愛髙下之隔縣殊壅塞之否萬端是以居上者降心以察下表誠以感之然後能相親也若亢髙自肆羣下絶望情義圯隔是謂路人非君臣也人心苟離則位號雖存無以自固故傳例曰凡弑君稱君君無道稱臣臣之罪稱君者唯書君名而稱國稱人以弑言衆之所共絶也稱臣者謂書弑者主名以垂来世終為不義而不可赦也然君雖不君臣不可以不臣故宋昭之惡罪及國人晉荀林父討宋曰何故弑君猶立文公而還深見貶削諸懐賊亂以為心者故不容於誅也若鄭之歸生齊之陳乞楚之公子比雖本無其心春秋之義亦同大罪是以君子慎所以立也諸侯不受先君之命而簒立得與諸侯㑹者則以成君書之齊商人蔡侯班之屬是也若未得接於諸侯則不稱爵楚公子棄疾殺公子比蔡人殺陳佗齊人殺無知衛人殺州吁公子瑕之屬是也諸侯簒立雖以㑹諸侯為正此列國之制也至於國内策名委質即君臣之分已定故殺不成君者亦與成君同義傳曰㑹于平州以定公位又云若有罪則君列諸㑹矣此以㑹為斷也經書趙盾弑君而傳云靈公不君又以明於例此弑宜稱君也弑非趙盾而經不變文者以示良史之意深責執政之臣傳特見仲尼曰越竟乃免明盾亦應受罪也醫不三世不服其藥古之慎戒也人子之孝當盡心嘗禱而已藥物之劑非所習也許止身為國嗣國非無醫而輕果進藥故罪同於弑二者雖原其本心而春秋不赦盖為教之逺防也楚靈無道於民於例當稱國以弑公子比首兵自立楚衆散歸而靈王縊死故以比為弑王也比既得國國人驚亂棄疾從而扇之比懼自殺皆棄疾之由故書公子棄疾殺公子比也左氏義例止此而已其餘小異皆從赴也劉賈許頴以為君惡及國朝則稱國以弑君惡及國人則稱人以弑按傳鄭靈宋昭經文異而例同故重發以同之子弑其父又嫌異於他臣亦重明其不異既不辭别國之與人而傳云莒杞公多行無禮於國大子僕因國人以弑之經但稱國不稱人知國之與人雖言别而事一也杜言小異從赴者宋之䝉澤楚之乾谿俱是國内而弑捷不書蒙澤齊商人衛州吁俱是公子而州吁不稱公子諸如此類所有不同皆從赴也此弑君之例有君罪臣罪之異而諸侯出奔皆不書逐君之人以罪臣者以君之見弑未必皆為無道故立臣罪之丈以見君有無罪死者國君而被臣逐悉是不能固位其罪皆在於君故杜諸侯出奔例云諸侯奔者皆廹逐而苟免非自出也仲尼之經更沒逐者主名以自奔為文者責其不能自安自固所犯非徒所逐之臣也蔡侯朱雖無罪據其失位出奔亦其咎也是説逐君無罪臣之文意也鄭人立子良注穆公庶子辭曰以賢則去疾不足注去疾子良名音義去起吕反下皆同以順則公子堅長乃立襄公注襄公堅也音義長丁丈反襄公將去穆氏注逐羣兄弟而舎子良注以其讓已音義舎音赦下同子良不可曰穆氏宜存則固願也若將亡之則亦皆亡去疾何為注何為獨留乃舎之皆為大夫初楚司馬子良生子越椒子文曰必殺之注子文子良之兄是子也熊虎之狀而豺狼之聲弗殺必滅若敖氏矣諺曰狼子野心是乃狼也其可畜乎子良不可子文以為大慼及將死聚其族曰椒也知政乃速行矣無及於難且泣曰鬼猶求食若敖氏之鬼不其餒而注而語助言必餒音義難乃旦反餒奴罪反餓也及令尹子文卒鬬般為令尹注般子文之子子揚音義般音班子越為司馬蒍賈為工正譖子揚而殺之子越為令尹已為司馬注賈為椒譖子揚而已得椒處音義蒍于委反賈為于偽反處昌慮反子越又惡之注惡賈音義惡烏路反注同乃以若敖氏之族圄伯嬴於轑陽而殺之注圄囚也伯嬴蒍賈也轑陽楚邑音義圄吾吕反嬴音盈轑音遼遂處烝野將攻王王以三王之子為質焉弗受注烝野楚邑三王文成穆音義烝之承反質音致師于漳澨注漳澨漳水邊音義漳音章澨市制反疏正義曰釋例云漳水出新城沶鄉縣南至荆山東南經襄陽南郡當陽縣入沮爾雅水邉之名唯有涯涘岸滸無以澨為水邊者但此云漳澨成十五年云決睢澨睢漳皆水名舉水名而言澨知澨是水邊也秋七月戊戌楚子與若敖氏戰于臯滸注臯滸楚地音義滸呼五反伯棼射王汰輈及鼓跗著於丁寧注伯棼越椒也輈車轅汰過也箭過車轅上丁寧鉦也音義棼扶云反射食亦反下同汰他来反輈陟留反跗芳扶反著直略反鉦音正疏正義曰車上不得置簨􅙇以縣鼓故為作跗若殷之楹鼓也言著於丁寧則丁寧是器晉語云伐備鐘鼓聲其罪也戰以淳于丁寧儆其民也是丁寧戰之用也周禮鼓人以金錞和鼓鄭𤣥云錞淳于也其形圓如椎頭以金鐲節鼓鄭𤣥云鐲鉦也形如小鍾軍行鳴之以為鼓節是錞即淳于鐲即丁寧故先儒皆以鐲為鉦之别名丁寧即是鉦也又射汰輈以貫笠轂注兵車無盖尊者則邊人執笠依轂而立以禦寒暑名曰笠轂此言箭過車轅及王之盖音義貫古亂反笠音立轂古木反疏正義曰服䖍云笠轂轂之盖如笠所以蔽轂上以禦矢也一曰車轂上鐵也或曰兵車旁慢輪謂之笠轂杜以彼為不安故改之而為此説亦是以意而言差於人情為近耳師懼退王使廵師曰吾先君文王克息獲三矢焉伯棼竊其二盡於是矣鼓而進之遂滅若敖氏初若敖娶於䢵注䢵國名音義䢵本又作鄖音云疏正義曰此是疆軍人之心耳息有此矢矢當有法不得無人學作唯二而已且射中王車由射之工不由矢善若其由矢王國猶有一矢何不一發以取越椒生鬭伯比若敖卒從其母畜於䢵注畜養也音義畜許六反淫於䢵子之女生子文焉䢵夫人使棄諸夢中注夢澤名江夏安陸縣城東南有雲夢城音義夢音蒙又亡貢反虎乳之䢵子田見之懼而歸夫人以告注告女私通所生音義乳如主反遂使收之楚人為乳穀謂虎於莬故命之曰鬭穀於莬以其女妻伯比注伯比所淫者音義穀如口反於音烏莬音徒妻七計反實為令尹子文注鬭氏始自子文為令尹其孫箴尹克黄注箴尹官名克黄子揚之子音義箴之金反使於齊還及宋聞亂其人曰不可以入矣箴尹曰棄君之命獨誰受之君天也天可逃乎遂歸復命而自拘於司敗王思子文之治楚國也曰子文無後何以勸善使復其所改命曰生注易其名也音義使於所吏反拘音俱疏正義曰言越椒之亂合誅絶其族今更存立故命曰生言應死而重生冬楚子伐鄭鄭未服也注前年楚侵鄭不獲成故曰未服春秋左傳注疏卷二十一春秋左氏傳注疏卷二十一考證傳遂以夫人婦姜至自齊尊夫人也趙汸補注曰此魯史成法成十四年僑如襄二十七年叔孫豹皆同臣召南按逆女既書公子遂此文蒙上自應單稱其名公羊謂一事而再見是也傳晉人討不用命者放胥甲父于衛疏穿見晉君之壻或本罪輕於胥甲臣浩按疏説甚迂不討趙穿而以胥甲蔽罪此趙盾之專擅行私也桃園之㡬已伏於此矣穿見晉君之壻見疑應作是傳㑹于平州以定公位趙汸補注曰簒立者請㑹于大國以免于討且假外援以臨制其民人杜注所云當時事情然也晉趙盾弑其君夷臯疏以示良史之意臣召南按三傳俱言弑君者趙穿其實盾為主使故亡不越竟俟其事也反不討賊徳其私也盾自為司馬昭而以穿為成濟此董狐所以直書而孔子因之以為萬世賊臣之戒如曰盾實無罪以良史之深文遂成鐵案有是理哉靈公不君或趙氏粉飾以欺後人未可定也况君即不君臣可因以不臣乎哉傳今日之事我為政與入鄭師故敗與本或作輿謂御輿以入鄭師也定本從與傳于思于思注多鬚之貌鬚監本誤作鬢今改正傳華元曰去之夫林堯叟曰言此役夫臣照按坊本以去之斷句夫字作扶音連下讀作夫其口衆我寡亦得即以夫字斷句作語辭亦得若林氏謂夫指役夫則于文義難通傳惜也越竟乃免劉敞曰哀八年公山不狃曰君子違不適仇國未臣而有伐之奔命焉死之可也安在越竟乃君臣之義絶乎吾以謂此非孔子之言葉夢得曰使與乎弑雖在四海之外無所逃使不與聞雖在朝如晏子誰能責之趙汸補注曰孔子曰以下乃趙盾子孫託聖人之言為其祖分惡耳傳宣子使趙穿逆公子黑臀于周而立之趙汸補注曰於此見盾與穿同志逆新君不使他人而使穿欲免穿於討也又疏其母夢神規其臀以墨墨監本訛作黑今改正傳晉於是有公族餘子公行臣召南按順文以觀晉於是始收公族實則多設數官凡卿之嫡子庶子無不用為大夫世卿之强遂至根深蒂固而公族日替矣公伐莒取向注東海承縣東南有向城臣召南按承縣當作氶音如承傳書曰鄭公子歸生弑其君夷權不足也萬斯大曰前年大棘之戰歸生敗宋而獲華元威權已震至是靈公立方九月君臣之際必多不相能歸生已隂懐異志適子公有嘗黿之隙遂假手焉不然豈其身執國柄不能除一亂臣反懼譖而從之乎臣照按歸生位在宋上使以宋逆謀告靈公而誅之易於反掌安得言權不足凡左氏所引君子論斷皆云當時之君子其言然昭世風之澆也春秋左氏傳注疏卷二十一考證
