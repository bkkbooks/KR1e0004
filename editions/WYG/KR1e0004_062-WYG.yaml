body:
  text: 原詹事臣陳浩謹言按傳春秋者三家左氏立學官最後然傳世久且益盛逈非公羊榖梁所能及葢作傳者親見策書熟知掌政説經雖略而事實甚詳為例無多而史文該洽自惠公至隠桓下迄獲麟之後趙魏韓分晉以前三百年中列國之世系逺近王霸之先後盛衰公卿士大夫之行事善惡言論是非㑹盟征伐之得失成敗有本有原瞭如指掌學春秋者非此不足以識其顚末夫豈師弟子口相講授更歴數世始著簡編事涉傳聞義多穿鑿者所可同日語哉自漢及晉二傳漸微杜預博極羣書自云左癖以其生平精力萃於經傳又承劉歆賈逵潁容許淑服䖍諸儒後尋端究緒舍短録長分傳附經為之集解大而天官地理細而名物典文罔勿剖析淵微敷暢㫖趣是以學左氏者稱邱明為夫子素臣即稱元凱為邱明功臣雖偏私黨䕶間有瑕疵如崔靈恩衛冀隆所難劉炫所規然亦猶夫范升摘左氏之違何休祖李育之議朽壤一撮曽不足以輕重泰山此唐初詔孔穎逹等撰疏專用左傳杜注以解春秋配周易尚書毛詩禮記而為五經者也是書文既浩繁國子監本相承訛舛經傳字畫多有異同杜注亦時脱落釋文及疏尤附麗失次烏焉亥豕沿襲紛綸今奉敕校刋謹用石經及舊本訂正疏所徴引載籍各以本書校改若其書今世所無字句即有可疑但于卷末著之仍從舊本不敢强改志慎也至如先儒論經有闗於左氏短長補注有裨於杜氏訓釋他書引用有足與孔疏相發明者亦採附卷末以備一經之考証臣浩謹識
