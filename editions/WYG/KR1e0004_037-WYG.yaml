body:
  text: 春秋左傳注疏卷三十七起襄公二十六年盡二十六年晉杜氏注唐陸徳明音義孔頴達疏經二十有六年春王二月辛卯衛甯喜弑其君剽音義剽匹妙反衛孫林父入于戚以叛注衎雖未居位林父專邑背國猶為叛也音義背音佩疏正義曰叛者背君之名嫌無君不得為叛故注明之林父畏衎入殺巳以邑先叛故衎雖未居位林父以背國之故猶為叛也甲午衛侯衎復歸于衛注復其位曰復歸名與不名傳無義例疏正義曰復其位曰復歸成十八年傳例也僖二十八年衛侯鄭復歸于衛曹伯襄復歸于曹與此衞侯衎皆書其名成十六年曹伯歸自京師不書名俱是歸國立文不同傳無義例史異辭也夏晉侯使荀吳來聘注吳荀偃子公會晉人鄭良霄宋人曹人于澶淵注卿㑹公侯皆應貶方責宋向戌後期故書良霄以駮之若皆稱人則嫌向戌直以㑹公貶之音義澶市延反駮邦角反疏正義曰僖二十九年傳曰在禮卿不㑹公侯㑹伯子男可也是卿㑹公侯皆合貶良霄亦當貶也但向戌㑹公巳自當貶而又有後期之責仲尼書經方責向戌後期故書良霄以駮之書良霄所以責向戌非是舍霄罪也若良霄與晉宋皆貶稱人則嫌向戌直以㑹公被貶其後期之責不見故書良霄名退宋班明向戌有二罪也案春秋諸國之㑹後至者多唯退班在下不褒進先至之人此直退宋人在鄭人之下於文自足必特書良霄以駮向戌者以向戌宋之執政上卿魯公親自在㑹後期而至惰慢之甚故特書良霄深責向戌異於他例也秋宋公殺其世子痤注稱君以殺惡其父子相殘害音義痤才未反惡烏路反晉人執衛甯喜八月壬午許男甯卒于楚注未同盟而赴以名疏正義曰宣十七年許男錫我卒甯即錫我之子嗣立以來未與魯㑹盟而赴以名也冬楚子蔡侯陳侯伐鄭葬許靈公傳二十六年春秦伯之弟鍼如晉脩成注脩㑹夷儀歲之成叔向命召行人子員注欲使答秦命音義員音云行人子朱曰朱也當御注御進也言次當行疏正義曰言當進侍君受君命也行人非一逓進御此日次朱當御次而不使是黜之也三云叔向不應子朱怒曰班爵同注同為大夫音義應應對之應何以黜朱於朝注黜退也撫劒從之注從叔向也叔向曰秦晉不和久矣今日之事幸而集注集成也晉國賴之不集三軍暴骨子員道二國之言無私子常易之姦以事君者吾所能御也拂衣從之注拂衣褰裳也音義暴蒲卜反徐扶沃反道音導御魚呂反拂芳弗反褰起䖍反本或作騫音雖同義非也説文云褰袴也疏注正義曰拂衣張迅之義以其將鬬知拂衣即褰裳也對則上衣下裳散則可以相通故以褰裳解拂衣人救之平公曰晉其庶乎注庶幾於治音義治直吏反吾臣之所爭者大師曠曰公室懼卑臣不心競而力爭注謂二子不心競為忠而撫劒拂衣音義爭爭鬬之爭不務徳而爭善注爭謂所行為善私欲巳侈能無卑乎注私欲侈則公義廢音義侈昌氏反又尺氏反疏正義曰平公見其臣鬬而言其庶乎者以其臣爭為固國事必興故庶幾於治也劉炫云不心競而力爭不務徳而爭善皆道子朱之心非叔向之罪杜言二子不心竸似亦并責叔向者以鬬雖一曲一直乃是兩人爭理故以二子言之據其鬬而言力爭則叔向亦爭爭善則叔向無之叔向以子員無私欲令應客縱子員應客亦非叔向爭善叔向無可爭杜云爭謂所行為善惟言子朱之心也衛獻公使子鮮為復注使為巳求反國音義鮮音仙為于偽反注同辭注辭不能敬姒强命之注敬姒獻公及子鮮之母音義姒音似强其丈反對曰君無信臣懼不免敬姒曰雖然以吾故也許諾初獻公使與甯喜言注言復國甯喜曰必子鮮在不然必敗注子鮮賢國人信之必欲使在其間故公使子鮮子鮮不獲命於敬姒注不得止命以公命與甯喜言曰苟反政由甯氏祭則寡人甯喜告蘧伯玉伯玉曰瑗不得聞君之出敢聞其入注十四年孫氏欲逐獻公瑗走從近闗出音義蘧其居反瑗于眷反又于萬反遂行從近闗出告右宰穀注衛大夫右宰榖曰不可獲罪於兩君注前出獻公今弑剽音義弑申志反天下誰畜之注畜猶容也音義畜許六反注同一音勑六反悼子曰吾受命於先人不可以貳注悼子甯喜也受命在二十年穀曰我請使焉而觀之注觀知可還否音義使所吏反還音環遂見公於夷儀反曰君淹恤在外十二年矣注淹久也音義見賢遍反一音如字淹於廉反徐於嚴反而無憂色亦無寛言猶夫人也注言其為人猶如故音義夫人音扶若不巳死無日矣注已止也悼子曰子鮮在右宰穀曰子鮮在何益多而能亡於我何有注言子鮮為義多不過亡出悼子曰雖然弗可以巳孫文子在戚孫嘉聘於齊孫襄居守注二子孫文子之子音義守手又反二月庚寅甯喜右宰榖伐孫氏不克伯國傷注伯國孫襄也父兄皆不在故乘弱攻之甯子出舍於郊注欲奔伯國死孫氏夜哭國人召甯子甯子復攻孫氏克之辛卯殺子叔及太子角注子叔衛侯剽言子叔剽無諡故音義復扶又反下復愬同疏正義曰服䖍云殺太子角不書舉重者案晉侯宋公殺其世子及陳侯之弟招殺陳世子皆書經則世子不輕於大夫也孔父荀息之徒弑君之下并亦言大夫大夫既書於經則弑君并殺世子世子亦當書不得為舉重也杜既不解當以不告故耳注正義曰此剽是穆公之孫黑背之子於獻公為從父昆弟成十年衛侯之弟黒背帥師侵鄭傳云衛子叔黒背侵鄭是黒背字子叔即以子叔為族也元年衛侯使公孫剽來聘傳云衛子叔來聘是舉族而稱之也今云殺子叔亦是舉其族為剽無諡故稱族也書曰甯喜弑其君剽言罪之在甯氏也注嫌受父命納舊君無罪故發之孫林父以戚如晉注以邑屬晉書曰入於戚以叛罪孫氏也臣之祿君實有之義則進否則奉身而退專祿以周旋戮也注林父事剽而衎入義可以退徒以專邑自隨為罪故傳發之疏正義曰春秋書叛者有此孫林父與宋華亥宋公之弟辰晉趙鞅晉荀寅五者經皆書叛邾庶其莒牟夷邾黒肱皆以地來奔雖文不稱叛傳謂此三人為三叛人則三者亦是叛也所言叛者或據邑而距其君或竊地他國皆為有地隨巳故稱為叛昭二十二年宋華亥向寧華定自宋南里出奔楚定十四年宋公之弟辰自蕭來奔地不隨巳則不稱叛是叛雖反背之辭皆由地以生名也叛者判也欲分君之地以從他國故以叛為名焉叛無凡例𫝊言書曰是仲尼書為叛也人君賜臣以邑以為禄食臣之祿謂所食邑也君實有之言其不得専以為巳有也君臣以義而合義則進以事君受此禄食否則奉身而退當身奔他國而以禄歸君專君之禄以周旋從巳於法為罪戮之人故書入於戚以叛罪孫氏也釋例曰古之大夫或錫之田邑或分之都城故有千室之邑百乗之家君之禄義則進否則奉身而退若專祿以周旋雖無危國害主之實皆書曰叛叛者反背之辭也庶賤之人不齒於列故雖有善惡不章顯名氏若乃披邑害國則以地重必書其名且終顯其惡也適魯則書地曰來奔來奔則叛可知盖記事外内之辭也劉賈説三叛人以地來奔不書叛謂不能專也此直外内之辭既以地來妻公之姑姊還其大邑不得復言不能専也是社以庶其之等皆為叛也専禄者謂専君之禄以為巳有東西隨巳謂之為専服䖍云專禄謂以戚叛也既叛衛亦不臣於晉自謂若小國是為專禄其意言專獨有之不屬人也若不屬晉何故被衛侵而愬於晉地若不入晉晉復何以戍之𫝊言以戚如晉服言不臣於晉是反丘明以解𫝊也甲午衛侯入書曰復歸國納之也注本晉納之夷儀今從夷儀入國嫌若晉所納故發國納之例言國之所納而復其位大夫逆於竟者執其手而與之言道逆者自車揖之逆於門者頷之而巳注頷摇其頭言衎驕心易生音義竟音境頷戸感反本又作顉易以䜴反公至使讓大叔文子曰寡人淹恤在外二三子皆使寡人朝夕聞衛國之言注二三子諸大夫音義大音泰朝如字吾子獨不在寡人注在存問之公聞文子答甯喜之言故忿之疏注正義曰沈氏云大叔文子聞甯喜許公之言而發歎本非面答甯喜之言而云答者時聞甯喜之言遂自評論不許於甯子與對面相答無異故言答也古人有言曰非所怨勿怨寡人怨矣注所怨在親親對曰臣知罪矣臣不佞不能負覊絏以從扞牧圉臣之罪一也有出者有居者注出謂衎居謂剽也音義覊居宜反絏息列反扞戸幹反圉魚呂反下同臣不能貳通外内之言以事君臣之罪二也有二罪敢忘其死乃行從近闗出公使止之注傳言衛侯不能安和大臣衛人侵戚東鄙注以林父叛故孫氏愬于晉晉戍茅氏注茅氏戚東鄙音義愬悉路反下同殖綽伐茅氏殺晉戍三百人注殖綽齊人今來在衛孫蒯追之弗敢擊文子曰厲之不如注厲惡鬼也遂從衛師敗之圉注蒯感父言更還逐殖綽圉衛地雍鉏獲殖綽注雍鉏孫氏臣也復愬于晉注為下晉討衛張本鄭伯賞入陳之功注入陳在前年三月甲寅朔享子展賜之先路三命之服注先路次路皆王所賜車之總名蓋請之於王音義路本亦作輅音路疏注正義曰周禮巾車云服車五乘孤乘夏篆卿乘夏縵大夫乘墨車則禮於卿大夫所當乘者名車不名路也而傳稱王賜叔孫豹鄭子蟜者皆云大路知此先路次路皆王所賜車之總名也賜車稱路從王賜之名必是禀王之命故云盖請之於王也宣十六年傳云晉侯請于王以黻冕命士㑹知諸侯命臣有請王之法故云盖也先八邑注以路及命服為邑先八邑三十二井音義先徐悉薦反下同或如字疏注正義曰禮遺人以物皆以輕先重後故以路及命服為邑之先也周禮小司徒四井為邑故杜以八邑為三十二井劉炫云案論語有十室之邑又杜注免餘邑為一乘之邑又宋鄭之間六邑嵒戈錫等杜何以知此邑非彼等之邑必以為四井之邑今知不然者邑之為名大小無定子展子産為卿日乆先有采邑今以入陳有功加賜田土不應更以八个大邑而又與之至於免餘辭邑云惟卿備百邑故杜以為一乘之邑合論語百乘之家其實一乘稱邑文無所出周禮稱四井為邑杜以正邑解之故云三十二井得為漸賜土田之義又八邑六邑為節級之差劉以為大邑而規杜氏非也賜子産次路再命之服先六邑子産辭邑曰自上以下降殺以兩禮也臣之位在四注上卿子展次卿子西十一年良霄見經十九年乃立子産為卿故位在四音義殺所界反見賢遍反疏注正義曰十五年傳云鄭人以子西伯有子産之故納賂于宋是伯有在子西之下也十九年傳曰子展當國子西聼政當國謂攝君事聼政謂為上卿是子西次子展故此注以子西為二良霄為三二十七年鄭伯享趙孟于垂隴子展伯有子西子産子大叔二子石從如彼文次伯有在子西之上二十九年禆諶論子産位次云天又除之奪伯有魄子西即世政焉辟之先言伯有後言子西又是子西在伯有之下者據十九年傳子西必在伯有之上盖其後更有進退杜據傳上文以次之且子展之功也臣不敢及賞禮請辭邑注賞禮以禮見賞謂六邑也公固予之乃受三邑注位次當受二邑以公固與之故受三邑公孫揮曰子産其将知政矣注知國政讓不失禮晉人為孫氏故召諸侯将以討衛也夏中行穆子來聘召公也注召公為澶淵㑹音義為于偽反楚子秦人侵吳及雩婁聞吳有備而還注雩婁今屬安豐郡音義雩音于徐况于反如淳同韋昭音虚或一呼反婁如字徐力俱反如淳音樓遂侵鄭五月至于城麇鄭皇頡戍之注皇頡鄭大夫守城麇之邑音義麇九倫反頡戸結反出與楚師戰敗穿封戍囚皇頡公子圍與之爭之注公子圍共王子靈王也音義戍音恤正於伯州犂注正曲直也伯州犂曰請問於囚乃立囚伯州犂曰所爭君子也其何不知注言王子圍及穿封戍皆非細人易别識也音義易以䜴反别彼列反上其手曰夫子為王子圍寡君之貴介弟也注介大也音義上時掌反下注同介音界下其手曰此子為穿封戍方城外之縣尹也誰獲子注上下手以道囚意音義道音導囚曰頡遇王子弱焉注弱敗也言為王子所得戍怒抽戈逐王子圍弗及楚人以皇頡歸印堇父與皇頡戍城麇注印堇父鄭大夫音義抽勑留反印一刃反堇音謹楚人囚之以獻於秦鄭人取貨於印氏以請之子大叔為令正注主作辭令之正以為請子産曰不獲注謂大叔辭以貨請堇父必不得音義為于偽反又如字受楚之功而取貨於鄭不可謂國秦不其然注受楚獻功大名也以貨免之小利故謂秦不爾疏正義曰秦不肯其如是也若曰拜君之勤鄭國微君之惠楚師其猶在敝邑之城下其可注辭如此堇父可得弗從遂行秦人不予更幣從子産而後獲之注更遣使執幣用子産辭乃得堇父𫝊稱子産之善音義使所吏反六月公㑹晉趙武宋向戌鄭良霄曹人于澶淵以討衛疆戚田注正戚之封疆音義疆居良反注同取衛西鄙懿氏六十以與孫氏注戚城西北五十里有懿城因姓以名城取田六十井也疏注正義曰𫝊言西鄙懿氏則西鄙之地以懿氏為名也謂之懿氏則以懿為氏族之名盖上世有大夫姓懿氏食邑於此地因以其姓名其城也杜以懿氏既為邑名而云取其六十故以為取田六十井服䖍云六十邑劉炫以服言為是今知非者此六十之文總屬懿氏不見經𫝊則卑細可知既非卿大夫何得廣有土地分六十之邑而與孫氏且直言六十本無邑文故杜以為六十井劉從服説以規杜氏非也趙武不書尊公也注罪武㑹諸侯向戌不書後也注後㑹期鄭先宋不失所也注如期至疏正義曰僖二十九年諸侯之卿㑹公于翟泉皆貶之稱人𫝊曰卿不書罪之也八年諸侯之卿㑹晉侯于邢丘亦貶稱人傳曰大夫不書尊晉侯也然則尊公侯罪大夫其義一也傳文互相見耳此言趙武不書尊公也亦是罪武也故杜云罪武㑹公侯也其㑹公侯之罪向戌良霄與趙武亦同但為别有見義不貶良霄不得總云卿不書罪之故特言趙武不書尊公明良霄向戌亦為尊公不應書也向戌不書後也言既為㑹公侯復為後㑹期故不得如良霄書名氏也㑹之班次以國大小為序諸㑹鄭在宋後此㑹鄭先於宋為鄭依期而至不失所也如不失其所自是常事非有善可褒而得進其班者鄭班常在衛下此㑹齊衛不至無常班宋自當次晉此直退宋耳非進鄭也言其不失所直是不失常亦非褒文也計良霄㑹公亦應合貶所以得書名者方責向戌後期故書良霄以駮向戌非為舍霄罪也釋例曰澶淵之㑹趙武向戌良霄以大夫而㑹魯侯違在禮之制其罪一也戌加後㑹之尤霄有不失所之進文不得並言卿不書罪之故特言尊公明公尊非三人之所敵三人之罪既正而二人獨以他義别叙也以是杜言良霄㑹公亦合貶也言霄有不失所之進者正謂不使與宋俱退得進復其本班耳非有升進異於常也宋以後至退班不在曹人下者宋是大國退居鄭下足以為責故令仍在曹上此㑹曹國最小其班正當居末曹人非後至也案翟泉之盟諸卿敵公則没公此亦諸卿敵公不没公者翟泉之盟杜注云魯侯諱盟天子大夫是以没公然則此大夫敵公非公有罪是以不没公也於是衛侯會之注晉將執之不得與會故不書音義與㑹音預疏注正義曰下云衛侯如晉晉人執而囚之是於此㑹為将執之不得與㑹也不得與㑹而𫝊云衛侯㑹之言其至㑹所耳晉人執甯喜北宮遺使女齊以先歸注討其弑君伐孫氏也遺北宮括之子女齊司馬侯歸晉而後告諸侯故經書在秋音義女音汝衛侯如晉晉人執而囚之於士弱氏注士弱晉主獄大夫秋七月齊侯鄭伯為衛侯故如晉注欲共請之音義為于偽反下為臣託為林父為臣皆同晉侯兼享之晉侯賦嘉樂注嘉樂詩大雅取其嘉樂君子顯顯令徳宜民宜人受禄于天音義嘉戸嫁反注同疏注正義曰嘉樂君子以下皆詩之文也晉侯賦此言巳嘉樂二君也二君以晉侯樂巳之故故齊賦蓼蕭言澤及於巳鄭賦緇衣言不敢逺晉所以答嘉樂也服䖍云晉侯自嘉樂愚之甚也國景子相齊侯注景子國弱音義相息亮反賦蓼蕭注蓼蕭詩小雅言大平澤及逺若露之在蕭以喻晉君恩澤及諸侯音義蓼音六大音泰子展相鄭伯賦緇衣注緇衣詩鄭風義取適子之館兮還予授子之粲兮言不敢違逺於晉音義緇側其反粲七旦反逺于萬反叔向命晉侯拜二君曰寡君敢拜齊君之安我先君之宗祧也敢拜鄭君之不貳也注蓼蕭緇衣二詩所趣各不同故拜二君辭異音義祧他彫反疏正義曰沈氏云賦蓼蕭喻晉侯徳澤及諸侯言晉侯有徳是安我宗廟也其言與注合緇衣首章云緇衣之宜兮敝子又改為兮適子之館兮還予授子之粲兮欲常進衣服獻飲食是其不二心也劉炫云蓼蕭首章云既見君子燕笑語兮是以有譽處兮言晉侯有聲譽常處位是得宗廟安也國子使晏平仲私於叔向曰注私與叔向語晉君宣其明徳於諸侯恤其患而補其闕正其違而治其煩所以為盟主也今為臣執君若之何注謂晉為林父執衛侯叔向告趙文子文子以告晉侯晉侯言衛侯之罪使叔向告二君注言自以殺晉戍三百人為罪不以林父故國子賦轡之柔矣注逸詩見周書義取寛政以安諸侯若柔轡之御剛馬音義見賢遍反疏注正義曰漢書藝文志無周書篇目其書今在或云是孔子删尚書之餘案其文非尚書之類彼引詩云馬之剛矣轡之柔矣馬亦不剛轡亦不柔志氣麃麃取與不疑此詩餘無所見故謂彼文是也子展賦將仲子兮注將仲子詩鄭風義取衆言可畏衛侯雖别有罪而衆人猶謂晉為臣執君音義將仲子兮將七羊反注同本亦無兮字此依詩序晉侯乃許歸衛侯叔向曰鄭七穆罕氏其後亡者也子展儉而壹注子展鄭子罕之子居身儉而用心壹鄭穆公十一子子然二子孔三族巳亡子羽不為卿故唯言七穆音義鄭七穆謂子展公孫舍之罕氏也子西公孫夏駟氏也子産公孫僑國氏也伯有良霄良氏也子太叔㳺吉游氏也子石公孫叚豐氏也伯石印叚印氏也穆公十一子謂子良公子去疾也子罕公子喜也子駟公子騑也子國公子發也子孔公子嘉也子㳺公子偃也子豐也子印也子羽也子然也士子孔也子然二子孔巳亡子羽不為卿故止七也疏注正義曰居身儉而用心壹叔向自以察貌觀言而知之其知不由賦詩也子然二子孔三族巳亡十九年傳文也子羽不為卿者案成十三年鄭公子班自訾求入于大宮不能殺子印子羽不書於經故知不為卿也杜注彼云皆穆公子也又世族譜云子羽穆公子其後為羽氏即羽師頡是其孫此非行人子羽公孫揮也世族譜以公孫揮為雜人自外唯有罕駟豐㳺印國良七族見於經傳皆出穆公故稱七族也初宋芮司徒生女子注芮司徒宋大夫音義芮如鋭反赤而毛棄諸堤下共姬之妾取以入注共姬宋伯姬也音義堤亦作隄徐丁兮反沈直兮反共音恭名之曰棄長而美平公入夕注平公共姬子也音義長丁丈反共姬與之食公見棄也而視之尤注尤甚也姬納諸御嬖生佐注佐元公惡而婉注佐貌惡而心順音義婉於阮反大子痤美而狠注貌美而心狠戾音義狠胡懇反合左師畏而惡之注合左師向戌音義惡烏路反下皆同寺人惠牆伊戾為太子内師而無寵注惠牆氏伊戾名音義牆或作廧音檣戾力計反疏注正義曰服䖍云惠伊皆發聲實為牆戾杜以下文單稱伊戾是舍族稱名故以惠牆為氏伊戾為名也内師者身為寺人之官公使之監知大子内事為在内人之長也秋楚客聘於晉過宋注上巳有秋復發傳者中間有初不言秋則嫌楚客過在他年音義復扶又反大子知之請野享之公使往伊戾請從之公曰夫不惡女乎注夫謂太子也音義夫音扶注同女音汝疏正義曰知之謂與楚客舊相知故請野享之對曰小人之事君子也惡之不敢遠好之不敢近敬以待命敢有貳心乎縱有共其外莫共其内注伊戾為大子内師不行恐内侍廢闕音義逺于萬反好呼報反近附近之近共音恭本又作供下同臣請往也遣之至則欿用牲加書徴之注詐作盟處為大子反徴驗也音義欿古感反處昌慮反而騁告公注騁馳也音義騁勑景反曰大子將為亂既與楚客盟矣公曰為我子又何求對曰欲速注言欲速得公位公使視之則信有焉注有盟徴焉問諸夫人與左師注夫人佐母棄也則皆曰固聞之公囚大子大子曰唯佐也能免我注以其婉也召而使請曰日中不來吾知死矣左師聞之聒而與之語注聒讙也欲使佐失期音義聒古活反下同讙呼端反疏注正義曰聲亂耳謂之聒多為言語讙譁亂其耳故聒為讙也過期乃縊而死佐為大子公徐聞其無罪也乃亨伊戾左師見夫人之步馬者注步馬習馬音義縊一賜反亨普彭反問之對曰君夫人氏也左師曰誰為君夫人余胡弗知圉人歸以告夫人夫人使饋之錦與馬先之以玉注以玉為錦馬之先音義饋其位反先悉薦反又如字曰君之妾棄使某獻左師改命曰君夫人而後再拜稽首受之注左師令使者改命也傳言宋公闇左師諛大子所以無罪而死音義令力呈反使所吏反下文通使同諛羊朱反疏正義曰夫人氏者氏猶家也言夫人家之馬也痤死佐為大子棄即正為夫人步馬之時夫人名巳定矣故對云君夫人氏也但棄本是妾左師欲令夫人重已故佯不知之夫人聞之懼巳不得為夫人故自稱為妾饋之錦馬也左師喜得其賜故令使者改命曰君夫人而後拜受之使棄成為夫人傳言左師之諛也鄭伯歸自晉注請衛侯歸使子西如晉聘辭曰寡君來煩執事懼不免於戾注言自懼失敬於大國而得罪使夏謝不敏注夏子西名音義夏戸雅反君子曰善事大國注將求於人必先下之言鄭所以能自安音義下遐嫁反初楚伍參與蔡太師子朝友其子伍舉與聲子相善也注聲子子朝之子伍舉子胥祖父椒舉也音義朝如字疏注正義曰聲子則經傳所云蔡公孫歸生是也𫝊言其子伍舉足明舉為參之子聲子文不繫朝故云子朝之子以辨明之伍舉娶於王子牟王子牟為申公而亡注獲罪出奔音義娶七住反牟亡侯反為申如字舊于偽反楚人曰伍舉實送之伍舉奔鄭將遂奔晉聲子將如晉遇之於鄭郊班荆相與食而言復故注班布也布荆坐地共議歸楚事朋友世親疏正義曰楚語云椒舉將奔晉蔡聲子遇之於鄭郊饗之以璧侑曰子尚良食尚能事晉君以為諸侯主辭曰非所願也若得歸骨於楚死且不朽聲子曰子尚良食吾歸子故椒舉降三拜納其乗馬聲子受之是杜所云共議歸楚之事傳云言復故謂此也聲子曰子行也吾必復子及宋向戌將平晉楚注平在明年疏注正義曰明年聲子始説子木傳於此言之者盖伍舉以此年去楚故傳記之於此年也聲子通使於晉注為國通平事音義為于偽反還如楚令尹子木與之語問晉故焉注故事且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如杞梓皮革自楚往也注把梓皆木名音義杞梓徐上音起下音子雖楚有材晉實用之注言楚亡臣多在晉子木曰夫獨無族姻乎注夫謂晉對曰雖有而用楚材實多歸生聞之注歸生聲子名善為國者賞不僭而刑不濫賞僭則懼及淫人刑濫則懼及善人若不幸而過寧僭無濫與其失善寧其利淫無善人則國從之注從之亡也音義僭子念反下皆同濫力暫反疏正義曰僭謂僭差濫謂濫佚賞不僭所賞必有功不僭差也刑不濫所刑必得罪不濫佚也詩曰人之云亡邦國殄瘁無善人之謂也注詩大雅殄盡也瘁病也音義殄徒典反瘁在醉反疏正義曰詩大雅瞻卬之篇也言國内賢人之既云巳喪亡矣則邦國盡皆困病此詩之意言無善人之謂也故夏書曰與其殺不辜寧失不經懼失善也注逸書也不經不用常法疏正義曰此在大禹謨之篇臯陶論用刑之法也經常也言若用刑錯失等與其殺不罪之人寧失於不常之罪謂實有罪而失於妄免也此書之意懼失善也商頌有之曰不僭不濫不敢怠皇命于下國封建厥福注詩商頌言殷湯賞不僭差刑不濫溢不敢怠解自寛暇則能為下國所命為天子音義解佳賣反疏注正義曰此商頌殷武之篇詩注謂天命湯於在下之國此云為下國所命謂下國諸侯推命湯為天子則商書云東征西夷怨南征北狄怨又云室家相慶曰后來其蘇是也此湯所以獲天福也古之治民者勸賞而畏刑注樂行賞而憚用刑恤民不倦賞以春夏刑以秋冬注順天時是以將賞為之加膳加膳則飫賜注飫饜也酒食賜下無不饜足所謂加膳也音義為之于偽反下為之不舉同飫於據反饜亦作厭於豔反下同此以知其勸賞也將刑為之不舉不舉則徹樂注不舉盛饌音義饌士眷反疏正義曰周禮膳夫職云王日一舉鼎十有二物皆有爼以樂侑食鄭𤣥云殺牲盛饌曰舉又曰大䘮則不舉大荒則不舉大札則不舉天地有災則不舉邦有大故則不舉鄭衆云大故刑殺也莊二十年𫝊曰司冦行戮君為之不舉是禮法將刑為之不舉也舉則以樂勸食不舉故徹去樂縣大司樂云大札大凶大災大臣死國之大憂令弛縣鄭𤣥云弛釋下之釋下即是徹縣也大司樂弛縣之内不言刑殺大故文不具耳此以知其畏刑也夙興夜寐朝夕臨政此以知其恤民也三者禮之大節也有禮無敗今楚多淫刑其大夫逃死於四方而為之謀主以害楚國不可救療所謂不能也注療治也所謂楚人不能用其材也音義朝如字療力召反子儀之亂析公奔晉注在文十四年音義析星歴反晉人寘諸戎車之殿以為謀主注殿後軍音義寘之䜴反殿多練反注同繞角之役晉將遁矣析公曰楚師輕窕易震蕩也若多鼓鈞聲以夜軍之注鈞同其聲音義遁徒困反窕勑堯反又通弔反易以豉反鈞音均徐居旬反楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗由息之師於桑隧獲申麗而還注成六年晉欒書救鄭與楚師遇於繞角楚師還晉侵沈獲沈子八年復侵楚敗申息獲申麗音義潰戸内反隧音遂麗力馳反復扶又反鄭於是不敢南靣楚失華夏則析公之為也雍子之父兄譖雍子君與大夫不善是也注不是其曲直音義夏戸雅反雍子奔晉晉人與之鄐注鄐晉邑音義鄐許六反徐又超六反以爲謀主彭城之役晉楚遇於靡角之谷注在成十八年晉將遁矣雍子發命於軍曰歸老幼反孤疾二人役歸一人簡兵蒐乘注簡擇蒐閲音義蒐所留反乘繩證反閱音悦秣馬蓐食師陳焚次注次舍也焚舍示必死音義秣音末蓐音辱陳直覲反明日將戰行歸者而逸楚囚注欲使楚知之楚師宵潰晉降彭城而歸諸宋以魚石歸注在元年音義降戸江反楚失東夷子辛死之則雍子之為也注楚東小國及陳見楚不能救彭城皆叛五年楚人討陳叛故殺令尹子辛子反與子靈爭夏姬注子靈巫臣而雍害其事注子反亦雍害巫臣不使得取夏姬音義雍於勇反注同子靈奔晉晉人與之邢注邢晉邑音義邢音刑以為謀主扞禦北狄通吳於晉教吳叛楚敎之乘車射御驅侵疏正義曰教之驅車侵伐人也使其子狐庸為吳行人焉吳於是伐巢取駕克棘入州來注駕棘皆楚邑譙國鄼縣東北有棘亭音義譙在遥反鄼才多反又子旦反或作賛楚罷於奔命至今為患則子靈之為也注事見成七年音義罷音皮見賢遍反若敖之亂伯賁之子賁皇奔晉晉人與之苗注若敖亂在宣四年苗晉邑音義賁扶云反下同以為謀主鄢陵之役注在成十六年音義鄢音偃楚晨壓晉軍而陳晉將遁矣苗賁皇曰楚師之良在其中軍王族而巳注言楚之精卒唯在中軍音義壓本又作厭於甲反徐於輙反而陳直覲反下成陳并注同卒子忽反若塞井夷竈成陳以當之注塞井夷竈以為陳疏注正義曰成十六年傳説此事云范匄趨進曰塞井夷竈陳於軍中則此謀范匄所為今以為苗賁皇之計者鄭衆云此范匄所言苗賁皇亦言之故聲子引以為喻欒范易行以誘之注欒書時將中軍范爕佐之易行謂簡易兵備欲令楚貪巳不復顧二穆之兵音義易以䜴反注及下易成同賈音亦行戸郎反注及下同賈音衡令力呈反下同復扶又反下復仕同疏正義曰賈逵鄭衆皆讀易為變易之易賈以行為道也欒為將范為佐二人分中軍别將之欲使欒與范易道令范先誘楚欒以良卒從而擊之鄭謂易行中軍與下軍易卒伍也計設謀之時軍既未動道未定分何以言改道也將卒相附繫屬乆矣無容臨戰而改易將卒且言易行行非卒伍之名安得為易卒伍也二者之説皆不可通以傳言誘之則謂羸師毁軍示弱以誘敵故讀易為簡易之易謂簡易行陳少其兵備令楚貪已不復顧二穆之兵使中行二郤得克二穆也楚語説此事云雍子謂欒書曰楚師可料也在中軍王族而已若易中下楚必歆之韋昭云中下中軍之上下也歆猶貪也簡易欒范之行示之弱以誑楚也是韋昭已讀為簡易之易故杜從之也此與楚語俱述聲子之言傳言鄢陵之敗苗賁皇之為楚語亦論鄢陵之役而云雍子之為二文不同或丘明傳聞兩説兩記之也劉炫以為國語非丘明所作為有此類往往與左傳不同故也中行二郤必克二穆注郤錡時將上軍中行偃佐之郤至佐新軍令此三人分良以攻二穆之兵楚子重子辛皆出穆王故曰二穆音義錡魚綺反吾乃四萃於其王族必大敗之注四萃四面集攻之音義萃在醉反疏注正義曰楚語云三萃以攻其王族必大敗之韋昭云時晉有四軍言三集者中軍先入而上下及新軍乃三集以致攻之韋昭見彼為三字故説之使通耳盖二文不同必有一誤晉人從之楚師大敗王夷師熸注夷傷也吳楚之間謂火滅為熸音義熸子濳反疏注正義曰月令云瞻夷察傷知夷亦傷也於時呂錡身王中目是王傷也吳楚之間謂火滅為熸相傳有此語也言軍師之敗若火滅然子反死之鄭叛吳興楚失諸侯則苗賁皇之為也子木曰是皆然矣聲子曰今又有甚於此椒舉娶於申公子牟子牟得戾而亡君大夫謂椒舉女實遣之懼而奔鄭引領南望曰庶幾赦余亦弗圖也注言楚亦不以為意音義娶本又作取七住反女音汝今在晉矣晉人將與之縣以比叔向注以舉材能比叔向彼若謀害楚國豈不為患子木懼言諸王益其祿爵而復之聲子使椒鳴逆之注椒鳴伍舉子傳言聲子有辭伍舉所以得反子孫復仕於楚疏正義曰楚語説此事云子木愀然曰夫子何如召之其來乎對曰亡人得復何為不來子木曰不來則若之何對曰資東陽之盗殺之其可乎子木曰不可我為楚卿而賂盗以賊一夫於晉非義也子為我召之吾倍其室乃使椒鳴召其父而復之許靈公如楚請伐鄭注十六年晉伐許他國皆大夫獨鄭伯自行故許恚欲報之音義恚一睡反曰師不興孤不歸矣八月卒于楚楚子曰不伐鄭何以求諸侯冬十月楚子伐鄭注為許音義為于偽反下為國同鄭人將禦之子産曰晉楚將平諸侯將和注和在明年楚王是故昧於一來注昧猶貪冒音義昧音妹冒亡報反又亡兑反不如使逞而歸乃易成也注逞快也夫小人之性釁於勇嗇於禍以足其性而求名焉者非國家之利也若何從之注釁動也嗇貪也言鄭之欲與楚戰者皆釁勇貪名之人非能為國計慮久利不可從也音義釁許覲反足子住反又如字疏正義曰於時鄭國勇夫皆貪欲禦冦敗楚以成巳名故子産為此言以破之夫此鄭國欲得戰者小人之性奮動於勇貪於禍亂冀得戰鬬以足滿其性而自求成武勇之名焉欲得禦㓂者皆自為其身非國家之利也若何得從之言禦冦之計不可從也注正義曰賈鄭先儒皆以釁為動也王肅云釁謂自矜奮以夸人工延夀魯靈光殿賦云仡奮釁以軒鬐是釁為奮動之意也嗇是吝惜之名故為貪也詩云民之貪亂寧為荼毒是小人之性貪禍亂也言鄭人欲得與楚戰者皆是奮動於勇貪求名譽之人欲望因有禍亂以成已名非能為國家計慮希長久之利不可從也定本云嗇養也非也子展説不禦㓂十二月乙酉入南里墮其城注南里鄭邑音義説音悦下注同禦魚呂反墮許規反涉於樂氏注樂氏津名門于師之梁注鄭城門縣門發獲九人焉涉于汜而歸注於汜城下涉汝水南歸音義縣音𤣥汜音凡徐扶嚴反疏注正義曰杜檢汜是地名非水名而云涉于汜是於汜地涉水耳釋例土地名云楚伐鄭師于汜襄城縣南汜城是也汝水出南陽魯縣東南經襄城是知於汜城下渉汝水而南歸也而後葬許靈公注卒靈公之志而後葬之衛人歸衛姬于晉乃釋衛侯注衛侯以女説晉而後得免君子是以知平公之失政也注𫝊言晉之衰晉韓宣子聘于周王使請事注問何事來聘對曰晉士起將歸時事於宰旅無他事矣注起宣子名禮諸侯大夫入天子國稱士時事四時貢職宰旅冡宰之下士言獻職貢於宰旅不敢斥尊疏注正義曰周禮大國之卿三命天子上士亦三命曲禮云列國之大夫入天子之國曰某士是諸侯大夫入天子之國禮法當稱士也以其人官卑故下士獨得旅稱周禮大宰之屬官有旅下士三十有二人是知宰旅為冢宰之下士也劉炫云知時事四時貢職者小行人云春入貢秋獻功王親受之鄭𤣥云貢謂六服所貢功謂考績之功是諸侯大夫貢時事之義也王聞之曰韓氏其昌阜於晉乎辭不失舊注阜大也傳言周衰諸侯莫能如禮唯韓起不失舊齊人城郟之歲注在二十四年其夏齊烏餘以廩丘奔晉注烏餘齊大夫廪丘今東郡廪丘縣故城是音義廩力甚反疏注正義曰釋例土地名以廩丘為齊地案廪丘地在東郡則是衛之邦域齊竟不至此也羊角髙魚皆在東郡廪丘與之相近齊不得别有廪丘烏餘齊之大夫得以廪丘奔晉者盖齊人往前取得衛邑以賜烏餘如鄭公孫叚之得州宋樂大心之有原也宋鄭大夫得以晉地為采邑是知齊大夫得以衛地為采邑杜見齊人以之奔晉故釋例以為齊地明年討烏餘皆取其邑而歸諸侯盖以廪丘歸齊也襲衛羊角取之注今廩丘縣所治羊角城是音義冶直吏反遂襲我高魚注高魚城在廪丘縣東北有大雨自其竇入注雨故水竇開音義竇音豆介于其庫注入高魚庫而介其甲音義介音界以登其城克而取之注取魯髙魚無所諱而不書其義未聞疏注正義曰服䖍云取魯髙魚及反之皆不書盖諱之杜以被人取邑無所可諱故云其義未聞莊十八年公追戎于濟西傳云不言其來諱之也戎來不覺國以為諱盗竊魯邑而云無可諱者所言諱者諱國惡禮也候不在疆戎來不覺是國無政令故諱之此守髙魚者不覺介於其庫直是守者罪耳非國之恥故諸被伐取魯邑皆不諱也昭二十五年齊侯取鄆書而不諱知失邑無可諱也此亦戰於麻隧之類盖經文脱漏耳又取邑于宋於是范宣子卒注宣子范匄諸侯弗能治也及趙文子為政乃卒治之文子言於晉侯曰晉為盟主諸侯或相侵也則討而使歸其地今烏餘之邑皆討類也注言於比類宜見討音義比必利反疏正義曰烏餘以二十四年奔晉二十五年范宣子卒趙文子代之為政至明年始討烏餘故云乃卒治之𫝊先言治之下乃述其治之事也而貪之是無以為盟主也請歸之公曰諾孰可使也對曰胥梁帶能無用師晉侯使往注胥梁帶晉大夫能無用師言有權謀春秋左傳注疏卷三十七春秋左氏傳注疏卷三十七考證衛孫林父入于戚以叛林堯叟曰書叛始于此凡叛賤者不書是故成十七年齊高無咎之子弱以盧叛襄二十九年齊高止之子豎以盧叛不書必卿佐而後書公㑹晉人鄭良霄宋人曹人于澶淵臣召南按監本晉人訛晉侯别本亦然按傳明曰趙武不書尊公也不書者貶之稱人使與宋向戌及曹人一例也孔疏甚明今改正傳吾所能御也臣召南按此御字音義云魚呂反則即禦字故杜注訓為止傳享子展賜之先路三命之服注蓋請之於王臣召南按趙汸曰晉命士㑹傳言請於王此不言請於王則鄭伯自賜之可知杜説非也按杜所以言請於王者以此傳先路次路與王賜叔孫豹大路賜鄭子蟜大路以葬二文同耳豈知路車冕服本隨命數春秋諸侯僭妄固有不請命而賜其臣者乎魯賞晉諸帥以三命再命之服襄公賞公冶以冕服晉悼賞魏絳以金石之樂衛賞新築人以曲縣繁纓豈皆一一請之於王趙氏糾杜之違是也傳囚曰頡遇王子弱焉臣召南按楚既僭號稱王則其子亦必僭稱王子惟與列國㑹盟王子仍稱公子經傳所書楚公子某是也其在本國臣民自皆稱為王子此𫝊是以前言公子圍後言王子圍傳衛侯如晉晉人執而囚之於士弱氏趙汸曰不書執衛侯為臣執君不可以為訓傳楚人曰伍舉實送之注共議歸楚事朋友世親臣浩按注朋友世親四字以文義推之應在上文初楚伍參與蔡太師子朝友其子伍舉與聲子相善也注下今各本皆然未敢遽改傳君與大夫不善是也大夫監本訛作夫人今改正𫝊聲子使椒鳴逆之陳傅良曰隨會在秦而六卿謀椒舉在晉而子木懼此晉楚所以代興也于聲子之辭知開戰國説士之漸春秋左氏傳注疏卷三十七考證
