body:
  text: 春秋左傳注疏卷五十五起定公五年盡九年晉杜氏注唐陸徳明音義孔頴達疏經五年春王三月辛亥朔日有食之注無傳夏歸粟于蔡注蔡為楚所圍饑乏故魯歸之粟疏注正義曰公羊傳曰孰歸之諸侯歸之曷為不言諸侯歸之離至不可得而序故言我也穀梁傳亦然賈逵取彼為説云不書所㑹後也杜以傳文唯言周亟矜無資自觧魯歸粟之意不言諸侯歸之諸侯或亦歸之要此經所書其意不及諸侯故顯而異之言魯歸之粟於越入呉注於𤼵聲也疏注正義曰公羊傳云於越者何越者何於越者未能以其名通也越者能以其名通也其意言越與於越立文不同事有褒貶左氏無此義越是南夷夷言有此𤼵聲史官或正其名或從其俗越與於越史異辭無義例六月丙申季孫意如卒秋七月壬子叔孫不敢卒注無傳冬晉士鞅帥師圍鮮虞傳五年春王人殺子朝於楚注因楚亂也終閔馬父之言夏歸粟于蔡以周亟矜無資注亟急也音義亟紀力反越入吳吳在楚也六月季平子行東野注東野季氏邑音義行下孟反下桓子行同還未至丙申卒于房陽虎將以璵璠歛注璵璠羙玉君所佩音義璵夲又作與音餘璠音煩又方煩反歛力驗反疏注正義曰案説文云璵璠魯之寳玉璵璠是一玉名説文又云瑜羙玉與璵璠異也昭公出奔之後平子攝行君事入宗廟佩此玉陽虎以平子嘗佩此玉故將以歛之仲梁懐不與明此玉是君所佩也君之所佩故為羙玉也玉藻云公侯佩山𤣥玉此當時所佩未必是山𤣥也玉藻又云古之君子必佩玉右徴角左宫羽鄭𤣥云徴角在右事也民也可以勞宫羽在左君也物也宜逸仲梁懐弗與注懐亦季氏家臣曰改歩改玉注昭公之出季孫行君事佩璵璠祭宗廟今定公立復臣位改君歩則亦當去璵璠音義去起吕反疏正義曰歩謂行也玉藻云君與尸行接武大夫繼武士中武鄭𤣥云尊者尚徐接武蹈半迹繼武迹相及也中武迹間容迹是君臣歩不同也玉藻又云公侯佩山𤣥玉大夫佩水蒼玉是君臣玉不同也昭公之出季氏行君事為君行佩君玉及定公立季氏復臣位故歩玉皆改矣陽虎欲逐之告公山不狃不狃曰彼為君也子何怨焉注不狃季氏臣費宰子洩也為君不欲使僣音義狃女九反為于偽反注同洩息列反僣子念反疏正義曰家臣謂季氏為君故注云不欲使僣既葬桓子行東野注桓子意如子季孫斯及費子洩為費宰逆勞於郊桓子敬之勞仲梁懐仲梁懐弗敬注懐時從桓子行輕慢子洩音義勞力報反下同從才用反下從父昆弟皆從王並同子洩怒謂陽虎子行之乎注行逐懐也為下陽虎囚桓子起申包胥以秦師至秦子蒲子虎帥車五百乘以救楚注五百乘三萬七千五百人音義乘繩證反注同子蒲曰吾未知吳道注道由法術使楚人先與吳人戰而自稷㑹之大敗夫槩王于沂注稷沂皆楚地音義沂魚依反呉人獲薳射於栢舉注薳射楚大夫音義射食亦反又食夜反其子帥奔徒注奔徒楚散卒音義卒子忽反以從子西敗吳師於軍祥注楚地秋七月子期子蒲滅唐注從吳伐楚故九月夫槩王歸自立也以與王戰而敗注自立為吳王號夫槩奔楚為堂谿氏注傳終言之音義谿芳兮反吳師敗楚師于雍澨秦師又敗吳師吳師居麇注麇地名音義麇九倫反子期將焚之子西曰父兄親暴骨焉不能收又焚之不可注前年楚人與吳戰多死麇中言不可并焚音義暴歩卜反子期曰國亡矣死者若有知也可以歆舊祀注言焚吳復楚則祭祀不廢音義歆許金反豈憚焚之焚之而又戰吳師敗又戰於公壻之谿注楚地名吳師大敗吳子乃歸囚闉輿罷闉輿罷請先遂逃歸注輿罷楚大夫請先至吳而逃歸言吳唯得楚一大夫復失之所以不克音義闉音因輿音餘又作與羊汝反罷音皮復扶又反葉公諸梁之弟后臧從其母於呉不待而歸注諸梁司馬沈尹戌之子葉公子髙也吳入楚獲后臧之母楚定臧棄母而歸音義葉舒渉反從如字又才用反葉公終不正視注不義之乙亥陽虎囚季桓子及公父文伯注文伯季桓子從父昆弟也陽虎欲為亂恐二子不從故囚之音義公父音甫而逐仲梁懐冬十月丁亥殺公何藐注藐季氏族音義藐亡角反一音彌小反己丑盟桓子于稷門之内注魯南城門庚寅大詛逐公父歜及秦遄皆奔齊注歜即文伯也秦遄平子姑壻也傳言季氏之亂音義詛莊慮反歜昌欲反遄市專反楚子入于郢注呉師已歸初鬭辛聞呉人之爭宫也曰吾聞之不讓則不和不和不可以逺征呉爭於楚必有亂有亂則必歸焉能定楚王之奔隨也將渉於成臼注江夏竟陵縣有臼水出聊屈山西南入漢音義焉於䖍反臼其九反屈其勿反藍尹亹渉其帑注亹楚大夫音義藍力甘反亹亡匪反帑音奴不與王舟及寜王欲殺之注寜安定也子西曰子常唯思舊怨以敗君何效焉王曰善使復其所吾以志前惡注惡過也王賞鬭辛王孫由于王孫圉鍾建鬭巢申包胥王孫賈宋木鬭懐注九子皆從王有大功者子西曰請舍懐也注以初謀弑王也音義舍音捨又音赦弑申志反王曰大徳滅小怨道也注終從其兄免王大難是大徳音義難乃旦反申包胥曰吾為君也非為身也君既定矣又何求且吾尤子旗其又為諸注子旗蔓成然也以有徳於平王求欲無厭平王殺之在昭十四年音義為君于偽反下為身同厭於塩反遂逃賞王將嫁季芈季芈辭曰所以為女子逺丈夫也鍾建負我矣以妻鍾建以為樂尹注司樂大夫音義逺于萬反妻七計反王之在隨也子西為王輿服以保路國于脾洩注脾洩楚邑也失王恐國人潰散故偽為王車服立國脾洩以保安道路人音義脾婢支反洩息列反疏正義曰王之在随也國内無王子西以民無所依恐其潰散故偽為王之車服以安道路之人國于脾洩之地於時子西盖假稱王矣聞王所在而後從王王使由于城麇注於麇築城復命子西問髙厚焉弗知疏正義曰子西問由于所築麇城之髙厚㡬何由于不知董遇云問城髙厚丈尺也夲或有大小者渉下文而誤耳子西曰不能如辭注言自知不能當辭勿行疏正義曰敢為不敢如為不如古人之語然也僖二十二年傳云若爱重傷則如勿傷爱其二毛則如服焉經傳之文此類多矣城不知髙厚小大何知疏正義曰王肅㫁小大何知為句注云如是小大何所知也張奐古今人論云子西問城之髙厚小大而弗知也子西怒曰不能則如辭城之而不知又何知乎張奐引傳為文小大上屬杜雖無注盖與張同對曰固辭不能子使余也人各有能有不能王遇盗於雲中余受其戈其所猶在􅃝而示之背曰此余所能也脾洩之事余亦弗能也注傳言昭王所以復國有賢臣也音義􅃝音但晉士鞅圍鮮虞報觀虎之役也注三年鮮虞獲晉觀虎經六年春王正月癸亥鄭游速帥師滅許以許男斯歸注㳺速大叔子二月公侵鄭公至自侵鄭注無傳夏季孫斯仲孫何忌如晉秋晉人執宋行人樂祁犂注稱行人言非其罪音義犂力兮反又力之反冬城中城注無傳公為晉侵鄭故懼而城之音義為于偽反季孫斯仲孫忌帥師圍鄆注無傳何忌不言何􅇅文鄆貳於齊故圍之音義鄆音運疏正義曰鄆是魯邑輒曰圍之必是鄆邑叛也三傳並無其事不知何為而叛明年齊人歸鄆是叛屬齊也傳六年春鄭滅許因楚敗也二月公侵鄭取匡為晉討鄭之伐胥靡也注胥靡周地也周儋翩因鄭人以作亂鄭為之伐胥靡故晉使魯討之匡鄭地取匡不書歸之晉音義為于僞反注同儋丁甘反翩音篇疏正義曰下注云鄭伐周六邑在魯伐鄭取匡前而此獨云胥靡者此時湏顯侵鄭之意故言討鄭之伐胥靡畧言之也但鄭伐周事須從下文戍周𤼵之故傳文乃逆指下事為次也往不假道於衛及還陽虎使季孟自南門入出自東門注陽虎將逐三桓欲使得罪於鄰國舍於豚澤衛侯怒使彌子瑕追之注彌子瑕衛嬖大夫音義豚杜孫反嬖必計反公叔文子老矣注文子公叔𤼵輦而如公曰尤人而效之非禮也疏正義曰入其國門非也追伐其師亦非也尤其非而復效之為非禮也下云效小人以棄之即云天將多陽虎之罪則公叔文子知此出入衛門是陽虎之計非魯公使然尤人謂尤陽虎也昭公之難君將以文之舒鼎注衛文公之鼎成之昭兆注寳龜疏正義曰賈逵云舒鼎鼎名昭兆寳龜杜依用之盖衛文公鑄此鼎也其名曰舒不知其故成之昭兆成公新得此龜盖以灼之出兆兆文分明故名為昭兆定之鞶鑑注鞶帶而以鏡為餙也今西方𦍑胡猶然古之遺服音義鞶又作盤歩丹反又蒲官反鑑古暫反茍可以納之擇用一焉公子與二三臣之子諸侯茍憂之將以為之質注為質求納魯昭公音義質音致注同此羣臣之所聞也今將以小忿䝉舊徳注䝉覆也無乃不可乎大姒之子注大姒文王妃音義大音泰姒音似唯周公康叔為相睦也而效小人以棄之不亦誣乎天將多陽虎之罪以斃之君姑待之若何乃止注止不伐魯師夏季桓子如晉獻鄭俘也注獻此春取匡之俘音義俘芳夫反陽虎强使孟懿子往報夫人之幣注虎欲困辱三桓并求媚於晉故强使正卿報晉夫人之聘音義强其丈反注同下皆放此疏正義曰聘禮者諸侯使卿聘鄰國之禮也執圭以致君命執璧以致享幣其於夫人則聘用璋享用琮聘君與夫人一使兼致之夫人不别使也傳言報夫人之幣則晉之夫人嘗有聘魯者矣禮法夫人不别遣使則晉之夫人聘者亦為晉君来聘也經無其事盖遣大夫来聘名氏不合見經故畧之也不言報晋君唯言報夫人者桓子如晉獻鄭俘即亦報聘晉也桓子報聘即亦得報夫人也但陽虎欲困辱三桓又欲求媚扵晉既使桓子報聘晉君又别遣正卿報晉夫人所以困辱三桓而重晉禮也晉人兼享之注賤魯故不復兩設禮明經所以不備書音義復扶又反疏注正義曰若桓子特為獻俘懿子專為報聘則經當两書如晉不合共文晉人亦當两設享禮各待一客今乃桓子聘晉君懿子報夫人聘則似共為一使若賔與介然故晉人兼享之賤魯故不復两為設禮傳言此者明經所以不偹書也不備書謂不各自立文两書如晉也若然文十八年公子遂叔孫得臣如齊亦是經不偹書而怪此不備者彼傳言惠公立故且拜𦵏也則是魯並命二卿令行两事雖各有所主而受命俱行故宜共文書之此則桓子獻俘并亦報聘一卿足以兼之懿子不湏行矣陽虎强使之行乃是從後而去去時不同受命宜當别書如晋止為晉人所賤故經不復備書正以𫝊言强使懿子報夫人之幣知桓子報晉君矣𫝊言兼享之知其不應兼矣以此明二人不同受命宜應别書略而不備書耳孟孫立于房外謂范獻子曰陽虎若不能居魯而息肩於晉所不以為中軍司馬者有如先君注稱先君以徴其言若欲使晉必厚待之疏正義曰懿子之意不為陽虎求官欲使晋人知陽虎專權為國所患言若不得居魯而息肩於晋示已知陽虎必將作亂而出奔也中軍司馬晉國大夫之最貴者為求此官似若欲使晉厚待之然令晉知其情耳諸言有如皆是誓辭稱先君以徴其言似若欲晉必從之獻子曰寡君有官將使其人注擇得其人鞅何知焉獻子謂簡子曰魯人患陽虎矣孟孫知其釁以為必適晉故强為之請以取入焉注欲令晉人聞虎當逃走故强設請託之辭因此言以入晉令晉素知之音義釁許靳反為之于偽反令力呈反疏注正義曰夲意不為陽虎請官欲令晉人知陽虎終必逃走強設託請之辭因此言辭以取入晉之意欲令晋人素知陽虎之必逃四月己丑吳大子終纍敗楚舟師注終纍闔廬子夫差兄舟師水戰音義纍力追反又力軌反夫音扶差初佳反獲潘子臣小惟子注二子楚舟師之帥音義惟位悲反本又作帷亦如字帥所類反及大夫七人楚國大惕懼亡子期又以陵師敗于繁揚注陵師陸軍音義惕他厯反疏注正義曰上云舟師水戰此言陵師陸軍南人謂陸為陵此時猶然釋地云髙平曰陸大陸曰阜大阜曰陵是陵陸小大之異名耳令尹子西喜曰乃今可為矣注言知懼而後可治於是乎遷郢於鄀而改紀其政以定楚國注𫝊言楚頼子西以安音義鄀音若周儋翩率王子朝之徒因鄭人將以作亂于周注儋翩子朝餘黨鄭於是乎伐馮滑胥靡負黍狐人闕外鄭伐周六邑在魯伐鄭取匡前扵此見者為戍周起也陽城縣西南有負黍亭音義見賢遍反下文見溷并注同為于偽反下同六月晉閻沒戍周且城胥靡注為下天王出居姑蕕起秋八月宋樂祁言於景公曰諸侯唯我事晉今使不往晉其憾矣樂祁告其宰陳寅注以與公言告之音義使所吏反憾户暗反陳寅曰必使子往他日公謂樂祁曰唯寡人説子之言子必往陳寅曰子立後而行吾室亦不亡注寅知晉政多門往必有難故使樂祁立後而行音義説音悦難乃旦反下文同唯君亦以我為知難而行也見溷而行注溷樂祁子也見於君立以為後音義溷侯温反又侯困反趙簡子逆而飲之酒於緜上獻楊楯六十於簡子注楊木名音義飲於鴆反楯食允反又音允陳寅曰昔吾主范氏今子主趙氏又有納焉以楊楯賈禍弗可為也已注知范氏必怨將得禍音義賈音古然子死晉國子孫必得志於宋注以其為國死音義為于偽反下同范獻子言於晉侯曰以君命越疆而使未致使而私飲酒不敬二君不可不討也乃執樂祁注獻子怒祁比趙氏經所以稱行人音義疆居良反使所吏反下同比毗志反陽虎又盟公及三桓於周社盟國人於亳社詛于五父之衢注𫝊言三桓㣲陪臣專政為八年陽虎作亂起音義亳歩各反詛側慮反父音甫衢其俱反冬十二月天王處于姑蕕注姑蕕周地音義蕕音由一音由舊反辟儋翩之亂也注為明年單劉逆王起音義單音善經七年春王正月夏四月秋齊侯鄭伯盟于鹹注衛地音義鹹音咸齊人執衛行人北宫結以侵衛注稱行人非使人之罪音義使所吏反齊侯衛侯盟于沙注結叛晉也陽平元城縣東南有沙亭音義沙如字又星和反大雩汪無𫝊過也齊國夏帥師伐我西鄙注夏國佐孫九月大雩注無傳過也疏注正義曰案賈逵云旱也杜言過者杜以春秋旱雩𫝊皆𤼵之言旱以此𫝊無旱文故謂之過如賈之所言前既有雩後又有雩旱可知不湏𤼵傳若然昭二十五年上辛大雩季辛又雩一月两雩旱亦可知何湏𤼵𫝊言旱甚也劉以賈言規杜非也盖時有小旱故𫝊不言旱未應合雩故杜云過也𫝊七年春二月周儋翩入于儀栗以叛注儀栗周邑齊人歸鄆陽闗陽虎居之以為政注鄆陽闗皆魯邑中貳於齊齊今歸之不書虎専之音義中丁仲反夏四月單武公注穆公子劉桓公注文公子敗尹氏于窮谷注尹氏復黨儋翩共為亂也音義復扶又反秋齊侯鄭伯盟于鹹徴㑹于衛注徴召也衛侯欲叛晉注屬齊鄭也諸大夫不可使北宫結如齊而私於齊侯曰執結以侵我注欲以齊師懼諸大夫齊侯從之乃盟于瑣注瑣即沙也為明年渉佗捘衛侯手起音義瑣素果反佗徒何反捘子對反齊國夏伐我注齊叛晉故陽虎御季桓子公歛處父御孟懿子注䖏父孟氏家臣成宰公歛陽音義歛力檢反又音亷或音慮㸃反將宵軍齊師齊師聞之堕伏而待之注堕毁其軍以誘敵而設伏兵音義堕許規反處父曰虎不圖禍而必死注而女也音義女音汝下文同疏正義曰齊人設伏待魯若入其伏内是為禍也虎不謀此禍而欲夜掩齊師女必死處父欲自殺之苫夷曰虎䧟二子於難注苫夷季氏家臣二子季孟音義苫始占反難乃旦反不待有司余必殺女虎懼乃還不敗注𫝊言陪臣強能自相制季孟不敢有心疏正義曰言不待掌刑戮之有司余必自殺女也虎見二子以此言懼之乃還不敗冬十一月戊午單子劉子逆王于慶氏注慶氏守姑蕕大夫晉籍秦送王己巳王入于王城注己巳十二月五日有日無月疏注正義曰此年經𫝊日少上下無可考驗杜自以長歴校之己巳為十二月五日館于公族黨氏注黨氏周大夫音義黨音掌而後朝于莊宫注莊王廟也經八年春王正月公侵齊注報前年伐我西鄙公至自侵齊注無𫝊二月公侵齊注未得志故三月公至自侵齊注無𫝊曹伯露卒注無𫝊四年盟臯鼬音義鼬由又反疏注正義曰露以昭二十八年即位三十二年諸侯之大夫盟于狄泉魯曹俱在時以未告公而公薨故不書于經杜盖以此故不數之四年盟臯鼬四年二月陳侯吳卒其年盟于臯鼬自爾以来唯有此盟耳夏齊國夏帥師伐我西鄙音義國夏戸雅反年末注同公㑹晉師于瓦注瓦衛地將来救魯公逆㑹之東郡燕縣東北有瓦亭音義瓦顔寡反燕音煙公至自瓦注無𫝊秋七月戊辰陳侯栁卒注無𫝊四年盟臯鼬音義栁力乆反本或作抑晉士鞅帥師侵鄭遂侵衛注两事故曰遂𦵏曹靖公注無𫝊疏正義曰謚法共以觧信曰靖九月𦵏陳懐公注無𫝊三月而𦵏速疏正義曰謚法慈仁短折曰懐季孫斯仲孫何忌帥師侵衛冬衛侯鄭伯盟于曲濮注無傳結叛晉曲濮衛地音義濮音卜從祀先公注從順也先公閔公僖公也將正二公之位次所順非一親盡故通言先公疏注正義曰傳言順祀是從為順也文二年大事于太廟躋僖公升僖于閔上閔先為君退在僖下是逆也今升閔在僖上依其先後是順也廟主失次唯此二公故知從祀先公唯閔僖耳躋僖公指僖言之此不指言升閔者彼所升者止升僖公之一神不得不指言僖公也今從祀之時閔僖俱得正位且以親盡故通言先公此言從祀躋僖公不言逆祀者此從祀因躋僖公之文故得畧言從祀至於躋僖公文無所繫不知逆祀何公且見是親廟不可言先公故指僖言之而言躋也然則此以親盡故通言先公下桓宫僖宫災彼亦親盡言桓僖者彼據災之所在須指言其處與此體例不同盗竊寳玉大弓注盗謂陽虎也家臣賤名氏不見故曰盗寳玉夏后氏之璜大弓封父之繁弱音義見賢遍反璜音黄父音甫疏注正義曰傳言陽虎取寳玉大弓以出是盗謂陽虎也公羊傳曰盗者孰謂謂陽虎也陽虎者曷為者也季氏之宰也季氏之宰則微者也惡乎得國寳而竊之陽虎專季氏季氏専魯國其説將殺季氏亦與左傳大同春秋之例再命之卿始得名氏書經陽虎季氏家臣以賤名氏不見故書曰盗盗者賤人之稱也此寳玉大弓必是國之重寳厯世掌之故自劉歆以來説左氏者皆以為夏后氏之璜封父之繁弱成王所以分魯公也公羊𫝊曰寳者何璋判白弓繡質龜青純彼不知魯有先王分噐繆為言耳且所盗無龜知其並是妄也傳八年春王正月公侵齊門于陽州注攻其門士皆坐列注言無鬬志曰顔髙之弓六鈞注顔髙魯人三十斤為一鈞鈞百八十斤古稱重故以為異強音義鈞音均稱尺證反強其丈反疏注正義曰漢書律厯志云量者龠合升斗斛也本起黄鍾之龠以子穀秬黍中者千有二百實其龠合龠為合十合為升十升為斗十斗為斛而五量嘉矣權者銖两斤鈞石也本起黄鍾之重一龠容千二百黍重十二銖两之為两十六两為斤三十斤為鈞四鈞為石而五權謹矣由此而言龠之所容重十二銖合龠為合两之為两則合重一两升重十两斗重百两斛重千两計六鈞有一百八十斤合為二千八百八十两於量為重两斛八斗八升計今人用弓此亦未為彊矣而魯人𫝊而觀之故杜以為古稱重故以為異強計古稱亦凖黄鍾之重為之而得重於今者權量之起本自黄鍾而世俗不同每有改易𫝊稱齊舊四量陳氏皆加一焉是其不必常依古也近世以來或輕或重魏齊斗稱於古二而為一周隋斗稱於古三而為一則古時亦當然杜言古者謂此顔髙之時為古耳非言自古稱皆重也皆取而傳觀之陽州人出顔髙奪人弱弓籍丘子鉏擊之與一人俱斃注子鉏齊人斃仆也音義傳直專反鉏仕居反與一人俱斃婢世反顔髙與一人俱為子鉏所擊而仆仆音赴又蒲北反孫炎云前覆曰仆偃且射子鉏中頰殪注子鉏死音義且如字射食亦反下同中丁仲反下同頬古協反殪扵計反死也言顔髙雖為子鉏所擊偃仆且射子鉏中頬而死言其善射也一讀且音子餘反云偃且人姓名也檢世族譜無此人一讀者非也疏正義曰釋言云斃仆也孫炎曰前覆曰仆吳越春秋稱要離謂吳王夫差曰臣迎風則偃背風則仆是前覆是郤倒此顔髙被擊而仆乃轉而仰且射子鉏猶死言其善射之功然也顔息射人中眉注顔息魯人退曰我無勇吾志其目也注以自矜師退冉猛偽傷足而先注猛魯人欲先歸其兄會乃呼曰猛也殿注㑹見師退而猛不在列乃大呼詐言猛在後為殿𫝊言魯無軍政音義呼火故反殿丁電反注同二月己丑單子伐榖城劉子伐儀栗注討儋翩之黨穀城在河南縣西音義單音善儋丁甘反翩音篇辛夘單子伐簡城劉子伐盂以定王室注𫝊終王室之亂音義盂音于趙鞅言於晉侯曰諸侯唯宋事晉好逆其使猶懼不至今又執之是絶諸侯也將歸樂祁士鞅曰三年止之無故而歸之宋必叛晉注執樂祁在六年音義好呼報反使所吏反獻子私謂子梁注獻子范鞅子梁樂祁曰寡君懼不得事宋君是以止子子姑使溷代子注溷樂祁子音義溷侯温反又侯困反子梁以告陳寅陳寅曰宋將叛晉是棄溷也不如待之注㽞代勿以子自代樂祁歸卒于大行注大行晉東南山音義大音泰行户郎反一音衡士鞅曰宋必叛不如止其尸以求成焉乃止諸州注州晉地為明年宋公使樂大心如晉張夲公侵齊攻廪丘之郛注郛郭也音義廪力甚反郛芳夫反主人焚衝注衝戰車音義衝昌容反説文作䡴云䧟陣車也或濡馬褐以救之注馬褐馬衣音義濡人于反褐户葛反遂毁之注毁郛主人出師奔注攻郛人少故遣後師走往助之疏正義曰賈逵以為主人出魯師奔走而郤退言魯無戰備也劉炫云杜亦不勝舊今杜必異扵賈以為後師奔走往助之者若以賈言魯師奔走則是被敗而還下𫝊陽虎何得云猛在此必敗明其於時不敗故猛得逐廪丘之人是賈言非也陽虎偽不見冉猛者曰猛在此必敗注陽州之役猛先歸言若在此必復敗音義復扶又反猛逐之顧而無繼偽顛注逐廪丘人虎曰盡客氣也注言皆客氣非勇音義客苦百反苫越生子將待事而名之注苫越苫夷音義苫戎占反陽州之役獲焉名之曰陽州注欲自比僑如音義僑其驕反夏齊國夏髙張伐我西鄙注報上二侵晉士鞅趙鞅荀寅救我注救不書齊師已去未入竟音義竟音境疏注正義曰春秋諸侯相救皆書扵經此救亦當書之不書者齊師聞晉来救已去魯地晉師未入魯竟不成為救故不書也公㑹晉師于瓦瓦是衛地公往衛地㑹晉師是其未入竟也公㑹晉師于瓦范獻子執羔趙簡子中行文子皆執雁魯於是始尚羔注獻子士鞅也簡子趙鞅也中行文子荀寅也禮卿執羔大夫執雁魯則同之今始知執羔之尊也卿不書禮不敵公史略之音義行戸即反疏注正義曰禮卿執羔大夫執雁周禮大宗伯文也魯則同之盖命卿與大夫俱執雁今見士鞅執羔始知執羔之尊扵是方始尚羔令卿執之記禮廢之乆也𫝊言扵是始尚羔必往前不執羔矣但往前所執難知先儒各以意説賈逵云周禮公之孤四命執皮帛卿三命執羔大夫再命執雁魯廢其禮三命之卿皆執皮帛至是乃始復禮尚羔案周禮禮記皆言卿執羔大夫執雁並以爵斷不依命數賈何以計命髙下妄稱禮乎𫝊言始尚羔者當謂舊賤羔而今尊之耳若夲僣孤禮皆執皮帛當云始復用羔不得云尚也若改僣從禮得名為尚則初獻六羽何以不言始尚六佾也以尚言之足知魯卿舊執非皮帛矣鄭衆云天子之卿執羔大夫執雁諸侯之卿當天子之大夫故𫝊曰唯卿為大夫當執雁而執羔僣天子之卿也魯人效之而始尚羔記禮所從壊案禮傳及記天子之臣與諸侯之臣所執無異文也周禮掌客見諸侯之禮上公及侯伯之下皆云卿相見以羔是諸侯之卿執羔不執雁又士相見者諸侯之臣相見之禮也經曰下大夫相見以鴈上大夫相見以羔是諸侯之卿必執羔矣安在扵諸侯之卿當天子之大夫乎是則背眀文而用肺腸也天子諸侯之臣所異者士相見之禮羔雁皆云餙之以布而曲禮云餙羔雁者以繢鄭𤣥云此為諸侯之臣與天子之臣異也然則天子之臣衣之以布而又畫之諸侯之臣則用布不畫所異唯此而已其執不為異也𫝊文之乖扵禮者爵是卿也皆當執羔趙鞅荀寅不應執雁此是當時之失失於偪下以晉卿失於偪下魯卿不應僣上益明賈言魯卿舊執皮帛非其義矣魯人扵是始知執羔為尊或亦效晉唯上卿一人獨執羔耳未必即能如禮諸卿皆執羔也此經言公㑹晉師不言公㑹士鞅僖二十九年𫝊曰在禮卿不㑹公侯㑹伯子男可也故杜云卿不書禮不敵公史略之劉炫云案宣元年㑹晉師于棐林伐鄭杜云趙盾稱師取于師會故稱師何知此非亦以師㑹故稱師而云禮不敵公略稱師乎今知不然者以宣元年諸侯俱在又文連伐鄭故言師㑹此則公之獨㑹晉師又無征伐之事故以為卿不書禮不敵公史略之劉以此與宣元年並取於師㑹以規杜氏非也晉師將盟衛侯于鄟澤注自瓦還就衛地盟音義鄟音専又市轉反夲亦作䧠同趙簡子曰羣臣誰敢盟衛君者注前年衛叛晉屬齊簡子意欲摧辱之渉佗成何曰我能盟之注二子晉大夫音義佗徒何反衛人請執牛耳注盟禮尊者涖牛耳主次盟者衛侯與晉大夫盟自以當涖牛耳故請疏注正義曰盟用牛耳卑者執之尊者涖之請執牛耳請使晉大夫執牛耳周禮戎右云盟則賛牛耳鄭𤣥云謂尸盟者割牛耳取血助為之襄二十七年𫝊曰諸侯盟小國固必有尸盟者是小國主偹辨盟具宜執牛耳哀十七年𫝊曰公㑹齊侯盟于䝉孟武伯問于髙柴曰諸侯盟誰執牛耳季羔曰鄫衍之役吳公子姑曹𤼵陽之役衛石魋武伯曰然則彘也鄫衍吳為盟主不知盟禮當令小國執牛耳而自使其臣執之𤼵陽宋魯衛三國衛為小䝉則齊魯二國魯為小皆是以小國執牛耳而尊者涖之以主次同盟者今衛侯與晉大夫盟自以當為盟主宜涖牛耳故請晉大夫使執之成何曰衛吾温原也焉得視諸侯注言衛小可比晉縣不得從諸侯禮音義焉於䖍反將㰱渉佗捘衛侯之手及捥注捘擠也血至捥音義㰱所洽反捘子對反捥烏喚反擠子計反一音子禮反説文云排也疏注正義曰説文云推排也排擠也捘是推排之意故為擠也昭十三年𫝊言擠于溝壑謂被推入坑也衛侯怒王孫賈趨進注賈衛大夫曰盟以信禮也注信猶眀也有如衛君其敢不唯禮是事而受此盟也注言晉無禮不欲受其盟衛侯欲叛晉而患諸大夫王孫賈使次于郊大夫問故注問不入故公以晉詬語之注詬恥也音義詬呼豆反語魚據反且曰寡人辱社稷其改卜嗣寡人從焉注使改卜他公子以嗣先君我從大夫所立大夫曰是衛之禍豈君之過也公曰又有患焉謂寡人必以而子與大夫之子為質注為質於晉音義質音致注及下同大夫曰茍有益也公子則往羣臣之子敢不皆負覊絏以從將行王孫賈曰茍衛國有難工商未嘗不為患使皆行而後可注欲以激怒國人音義絏息列反從才用反下説從弟下從者同難乃旦反激古狄反公以告大夫乃皆將行之行有日注有期日公朝國人使賈問焉曰若衛叛晉晉五伐我病何如矣皆曰五伐我猶可以能戰賈曰然則如叛之病而後質焉何遲之有乃叛晉晉人請改盟弗許秋晉士鞅㑹成桓公侵鄭圍蟲牢報伊闕也注桓公周卿士不書監帥不親侵也六年鄭伐周􅇅外晉為周報之音義監古銜反為于偽反下同遂侵衛注討叛九月師侵衛晉故也注魯為晉討衛季寤注季桓子之弟音義寤五故反公鉏極注公彌曾孫桓子族子公山不狃注費宰音義狃女九反皆不得志於季氏叔孫輙無寵於叔孫氏注輙叔孫氏之庶子叔仲志不得志於魯注志叔孫帶之孫皆為國人所薄故五人因陽虎陽虎欲去三桓以季寤更季氏注代桓子音義去起吕反更音庚舊古孟反下皆同以叔孫輙更叔孫氏注代武叔已更孟氏注陽虎自代懿子冬十月順祀先公而祈焉注將作大事欲以順祀取媚辛夘禘于僖公注辛夘十月二日不於太廟者順祀之義當退僖公懼於僖神故於僖廟行順祀音義禘大計反疏正義曰釋例曰大祭于太廟以審定昭穆謂之禘禘于太廟禮之常也各以其宫時之為也雖非三年大祭而書禘用禘禮也然則禘者審定昭穆之祭也今為順祀而禘于僖公則是并取先公之主盡入僖廟而以昭穆祭之是為用禘禮也計禘禮當于太廟今就僖廟為禘者順祀之義退僖升閔懼扵僖公之神故扵僖廟行禘禮使先公之神徧知之禮祭尊可以及卑後世之主宜上徙太廟而食今徙上世之主下入僖廟祀之當時所為非正禮也昭三十五年禘于襄公義亦然也壬辰將享季氏于蒲圃而殺之戒都車曰癸巳至注都邑之兵車也陽虎欲以壬辰夜殺季孫明日癸巳以都車攻三家音義圃布五反成宰公歛處父告孟孫曰季氏戒都車何故孟孫曰吾弗聞處父曰然則亂也必及於子先備諸與孟孫以壬辰為期注處父期以兵救孟氏壬辰先癸巳一日音義先癸悉薦反陽虎前驅林楚御桓子虞人以鈹盾夾之陽越殿注越陽虎從弟音義鈹普皮反盾食允反又音允夹古洽反殿丁見反將如蒲圃桓子咋謂林楚注咋暫也音義咋仕詐反曰而先皆季氏之良也爾以是繼之注欲使林楚免己於難以繼其先人之良音義難乃旦反下同疏正義曰而女也言女先祖以来皆為季氏忠良之臣女今不良反以是殺我之事繼續之對曰臣聞命後注後猶晚陽虎為政魯國服焉違之徴死死無益於主桓子曰何後之有而能以我適孟氏乎對曰不敢愛死懼不免主桓子曰往也注言必往孟氏選圉人之壯者三百人以為公期築室於門外注實欲以備難不欲使人知故偽築室於門外因得聚衆公期孟氏支子音義圉魚吕反為于偽反林楚怒馬及衢而騁注騁馳也音義騁勅領反陽越射之不中築者闔門注季孫既得入乃閉門音義射食亦反下同中丁仲反闔户臘反有自門間射陽越殺之陽虎劫公與武叔注武叔叔孫不敢之子州仇也音義劫居業反仇音求以伐孟氏公歛處父帥成人自上東門入注魯東城之北門與陽氏戰于南門之内弗勝又戰于棘下注城内地名陽氏敗陽虎説甲如公宫取寳玉大弓以出舍于五父之衢寝而為食其徒曰追其將至虎曰魯人聞余出喜於徴死何暇追余注徴召也陽虎召季氏於蒲圃將殺之今得脱必喜故言喜於召死音義説夲又作税同他活反得脱徒活反又他活反疏注正義曰徵召也釋言文陽虎召季孫欲殺之今既得脱魯人歡喜季孫免於召死之事何暇追我劉炫云虎召季孫欲殺之則召季孫為召死季孫得脱必大喜魯人聞我出去喜扵召死言人人皆喜於季孫從者曰嘻速駕公歛陽在注嘻懼聲音義嘻許其反公歛陽請追之孟孫弗許注畏陽虎陽欲殺桓子注欲因亂討季氏以強孟氏孟孫懼而歸之注不敢殺子言辨舍爵於季氏之廟而出注子言季寤辨猶周徧也徧告廟飲酒示無懼音義言辨音遍注徧同舍如字陽虎入于讙陽闗以叛注叛不書略家臣音義讙音歡鄭駟歂嗣子大叔為政注歂駟乞子子然也為眀年殺鄧析張本音義歂市専反析星暦反經九年春王正月夏四月戊申鄭伯蠆卒注無傳四年盟臯鼬音義蠆𠡠邁反疏注正義曰蠆以昭二十九年即位三十二年大夫盟于狄泉以未告公而公薨故不數得寳玉大弓注弓玉國之分噐得之足以為榮失之足以為辱故重而書之音義分扶問反六月𦵏鄭獻公注無𫝊三月而𦵏速疏正義曰諡法博聞多能曰獻秋齊侯衛侯次于五氏注五氏晉地不書伐者諱伐盟主以次告疏注正義曰𫝊言齊侯伐晉夷儀乃與衛侯次于五氏次既告則伐亦應告故杜以為諱伐盟主直以次告知非不告伐故不書者若全不告魯容可不以伐告今既以次告魯何意告次不告伐眀以衛新叛晉又魯與晉親故恥以伐告唯告次耳劉炫以為不告伐故不書而規杜氏非也秦伯卒注無𫝊不書名未同盟冬𦵏秦哀公注無𫝊𫝊九年春宋公使樂大心盟于晉且逆樂祁之尸辭偽有疾乃使向巢如晉盟且逆子梁之尸注巢向戍曾孫音義向舒亮反子明謂桐門右師出注子眀樂祁之子溷也右師樂大心子明族父也右師往到子眀舍子明逐使出門去曰吾猶衰絰而子擊鐘何也注忿其不逆父喪因責其無同族之㤙音義衰七雷反絰田結反下同右師曰喪不在此故也既而告人曰己衰絰而生子余何故舍鐘己子眀也音義舍音捨子眀聞之怒言於公曰右師將不利戴氏注樂氏戴公族不肯適晉將作亂也不然無疾乃逐桐門右師注逐之在眀年終叔孫昭子之言鄭駟歂殺鄧析而用其竹刑注鄧析鄭大夫欲改鄭所鑄舊制不受君命而私造刑法書之於竹簡故云竹刑疏注正義曰昭六年子産鑄刑書於鼎今鄧析别造竹刑明是改鄭所鑄舊制若用君命遣造則是國家法制鄧析不得獨専其名知其不受君命而私造刑書書之於竹謂之竹刑駟歂用其刑書則其法可取殺之不為作此書也下云棄其邪可也則鄧析不為私作刑書而殺盖别有當死之罪駟歂不矜免之耳君子謂子然於是不忠茍有可以加於國家者棄其邪可也注加猶益也棄不責其邪惡也音義邪似嗟反注同疏正義曰周禮大司㓂以八辟麗邦法附刑罰三曰議賢之辟四曰議能之法鄭𤣥云賢謂有德行者能謂有道藝者春秋傳曰夫謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者今壹不免其身以棄社稷不亦惑乎是賢能之人當明罪狀可赦則赦之今鄧析制刑有益於國即是有能者殺有能之人是不忠之臣君子謂子然於是為不忠也國之臣民誠有可以加益於國家者取其善處棄其邪惡可也雖知其邪當棄而不責所以勸勉人使學為善能也静女之三章取彤管焉注詩邶風也言静女三章之詩雖説羙女義在彤管彤管赤管筆女史記事規誨之所執音義彤徒冬反邶音佩説音悦疏正義曰邶風静女之篇也於時衛君無道夫人無德國人欲得貞静之女以配國君易去無徳之夫人也詩有三章其一章云静女其姝俟我於城隅其二章云静女其孌貽我彤管彤管者筆赤管也必用赤者示其以赤心正人也古者后夫人必有女史執赤管之筆記妃妾善惡進御之法所以規誨人君也静女三章之詩雖説羙女之事事之常耳無可特善彤管記事乃是婦人之大法本録静女云者特為彤管之言可取故全篇取之不棄上下之二章也其女史所書之事毛傳有其畧也毛傳云古者后夫人必有女史彤管之法史不記過其罪殺之后妃羣妾以禮御於君所女史書其日月授之以環以進退之生子月辰則以金環退之當御者以銀環進之著於左右既御著於右手事無大小記以成法竿旄何以告之取其忠也注詩鄘風也録竿旄詩者取其中心願告人以善道也言此二詩皆以一善見采而鄧析不以一善存身音義竿旄音干下音毛鄘音容疏注正義曰詩鄘風干旄之篇也於是衛文公之臣子多好善賢者樂告以善道也其詩言大夫之好善者乗駟馬建干旄就賢者諮國事焉云孑孑干旄在浚之郊素􅁝紕之良馬四之彼姝者子何以畀之孑孑干旟在浚之都素􅁝組之良馬五之彼姝者子何以予之孑孑干旌在浚之城素􅁝祝之良馬六之其末句云彼姝者子何以告之姝順貎也賢者見其好善羙其共順言己寡知復何以告之自恨無可告之明其無所吝惜夲録干旄之詩者取其中心願告人以善道彼二詩皆以一善見采而鄧析不以一善存身故君子引二詩以譏子然也故用其道不棄其人詩云蔽芾甘棠勿翦勿伐召伯所茇注詩召南也召伯决訟於蔽芾小棠之下詩人思之不伐其樹茇草舍也音義芾芳味反召音邵注同茇畔末反疏正義曰詩召南甘棠之篇也蔽芾小貎甘棠杜也茇草舍也召伯之聴獄訟不重煩勞百姓止舍小棠之下而聴斷焉國人被其徳説其化故爱其樹彼蔽芾然小者甘棠之樹也勿得翦削之勿得斫伐之此乃是召伯舍息之處思其人猶愛其樹况用其道而不恤其人乎子然無以勸能矣注𫝊言子然嗣大叔為政鄭所以衰弱夏陽虎歸寳玉大弓注無益近用而祗為名故歸之音義祗音支書曰得噐用也凡獲噐用曰得注噐用者謂物之成噐可為人用者也得用焉曰獲注謂用噐物以有獲若麟為田獲俘為戰獲音義麟夲又作驎呂辛反俘芳夫反疏正義曰噐用者謂噐物可為人用凡獲此噐物之用者謂之為得也得用者謂将此噐用以得於物焉謂之為獲劉炫以為得用焉曰獲謂得此可用為噐之物謂之為獲若麟之皮角之屬以杜觧為非今知不然者案春秋書獲唯有囚俘囚俘不可以為噐物除囚俘之外惟有獲麟麟為靈獸帝王所重不可以鳯羽麟皮以餙噐物劉以麟皮亦堪為噐而規杜氏非也六月伐陽闗注討陽虎也陽虎使焚萊門注陽闗邑門音義萊音來師驚犯之而出奔齊請師以伐魯曰三加必取之注三加兵於魯齊侯將許之鮑文子諫曰臣嘗為𨽻於施氏矣注施氏魯大夫文子鮑國也成十七年齊人召而立之至今七十四嵗於是文子盖九十餘矣魯未可取也上下猶和衆庶猶睦能事大國注大國晉也而無天菑若之何取之陽虎欲勤齊師也齊師罷大臣必多死亡已於是乎􅁬其詐謀夫陽虎有寵於季氏而將殺季孫以不利魯國而求容焉注求自容音義菑音災罷音皮親富不親仁君焉用之君富於季氏而大於魯國茲陽虎所欲傾覆也魯免其疾而君又收之無乃害乎齊侯執陽虎將東之陽虎願東注陽虎欲西奔晉知齊必反已故詐以東為願音義焉於䖍反傾又作頃音傾覆芳服反乃囚諸西鄙盡借邑人之車鍥其軸麻約而歸之注鍥刻也欲絶追者音義鍥苦結反軸音逐載葱靈寝於其中而逃注葱靈輜車名音義葱初江反或音怱輜側其反説文云衣車也疏注正義曰説文云輜軿衣車也前後有蔽賈逵云葱靈衣車也有葱有靈然則此車前後有蔽两旁開葱可以觀望葱中豎木謂之靈今人猶名葱木為靈子其内容人卧故得寝於其中而逃追而得之囚於齊又以葱靈逃奔宋遂奔晉適趙氏仲尼曰趙氏其世有亂乎注受亂人故疏正義曰言其當世将有亂也秋齊侯伐晉夷儀注為衛討也音義為于偽反下同疏注正義曰往年衛侯叛晉叛晉必當事齊下文衛侯㑹之知是為衛討也敝無存之父將室之辭以與其弟注無存齊人也室之為取婦曰此役也不死反必娶於髙國注髙氏國氏齊貴族也無存欲必有功還取卿相之女音義娶七住反相息亮反先登求自門出死於霤下注既入城夷儀人不服故鬭死於門屋霤下也音義霤力又反東郭書讓登注登城非人所樂故讓衆使後而已先登音義樂如字又五􅍿反犂彌從之曰子讓而左我讓而右使登者絶而後下注恐書先下故又譎以譲之下入城也音義犂力兮反譎古穴反疏正義曰言使登城人絶皆上訖然後與書下遂自下亦譲書而先下書左彌先下注書從彌言左行彌遂自先下亦譲也書與王猛息注戰訖共止息猛曰我先登書歛甲曰曩者之難今又難焉注斂甲起欲擊猛音義曩乃黨反嚮也難乃旦反猛笑曰吾從子如驂之靳注靳車中馬也猛不敢與書争言己從書如驂馬之随靳也𫝊言齊師和所以能克音義驂七南反騑馬也靳居覲反夲或作如驂之有靳非也争争闘之争又如字疏正義曰詩云两服齊首两驂雁行鄭云两服中央夹轅者然則古人車用四馬夹轅二馬謂之服两首齊其外二馬謂之驂首差退説文云靳當膺也則靳是當胸之皮也驂馬之首當服馬之胸胸上有靳故云我之從子如驂馬當服馬之靳杜言靳車中馬也言靳是中馬之駕具故以靳表中馬詩云騏騮是中騧驪是驂是名服馬為中馬也晉車千乗在中牟注救夷儀也今滎陽有中牟縣廻逺疑非也音義乗䋲證反疏注正義曰此中牟在晋竟内也趙世家云獻侯即位治中牟漢書地理志云河南郡有中牟縣趙獻侯自耿徙此又云三家分晉河南之中牟魏分也杜言今滎陽有中牟縣謂此河南之中牟也晉世分河南為滎陽郡中牟屬焉此地乃在河南計非晉竟所及故云廻逺疑非也又三家分晋中牟屬魏則非趙得都之趙獻侯治中牟亦非河南之中牟也此言晋車在中牟哀五年趙鞅伐衛圍中牟論語佛肸為中牟宰與趙獻侯所都中牟或當是一必非河南中牟當扵河北别有中牟但不復知其處耳有臣瓉者不知其姓或云姓傅作漢書音義云臣瓉案河南中牟春秋之時在鄭之疆内及三卿分晋則為魏之邦土趙界自漳水以北不及此也春秋衛侯如晋過中牟案此之中牟非衛適晉之次也汲郡古文曰齊師伐趙東鄙圍中牟此中牟不在趙之東也案中牟當在温水之上瓉言河南中牟非此中牟誠如其語謂此中牟當在温水之上不知其所案據也衛侯將如五氏注齊侯在五氏將往助之卜過之龜焦注衛至五氏道過中牟畏晋故卜龜焦兆不成不可以行事也衛侯曰可也衛車當其半寡人當其半敵矣注衛侯怒晉甚不復顧卜欲以身當五百乗音義復扶又反乃過中牟中牟人欲伐之衛褚師圃亡在中牟曰衛雖小其君在焉未可勝也齊師克城而驕其帥又賤注城謂夷儀也帥謂東郭書音義禇中吕反帥所類反注同疏注正義曰杜見𫝊言帥賤則云是東郭書劉炫云案上伐夷儀乃齊侯親兵所陳東郭書之事非是将帥杜何知帥謂東郭書若東郭書為帥則人無不識何故云晳幘而衣貍製齊侯使視之乃知夫子也且書若為帥被晋之敗何故君以為功而更受賞乎今知劉難非者以此云克城而驕其帥又賤文既相連止是一事克城謂克夷儀其帥則克城之帥上克城之事郭書先登故知郭書為帥身先士卒也僖二十三年晋侯親自敗狄而郤缺為将成十六年楚子親戰鄢陵而子反為主今齊侯雖伐夷儀郭書何妨别為元帥戎事上下同服故逢丑父得與齊侯易位郭書雖為元帥軍衆之内齊侯容或不辨齊侯賞其先登之功不責其後敗之罪故以為帥謂東郭書劉據此諸事以為更有别帥而規杜非也遇必敗之不如從齊乃伐齊師敗之注獲齊車五百乗事見哀十五年音義見賢遍反齊侯致禚媚杏於衛注三邑皆齊西界以答謝衛意音義禚諸若反媚武冀反杏户猛反齊侯賞犂彌犂彌辭曰有先登者臣從之晳幘而衣貍製注晳白也幘齒上下相值製裘也音義晳星厯反幘音策又音責説文作䶦音義同衣於既反貍力之反製音制疏注正義曰詩君子偕老之篇説夫人之羙云揚且之晳晳是靣白之名故為白也説文云䶦齒相值也言齒長而白上下之齒相當也說文云製裁也衣貍製謂著貍皮也裁皮著之明是裘矣故以製為裘也月令孟冬天子始裘𫝊言秋齊侯伐夷儀周之秋未寒而衣裘者哀二十七年𫝊言陳成子衣製杖戈文在秋上製亦裘也然則在軍之服或臨時所湏不可以寒暑常節約之公使視東郭書曰乃夫子也吾貺子注貺賜也音義貺音况公賞東郭書辭曰彼賔旅也注言彼與我若賔主相讓旅俱進退乃賞犂彌齊師之在夷儀也齊侯謂夷儀人曰得敝無存者以五家免注給其五家令常不共役事音義令力呈反共音恭疏注正義曰一人得之則以五家給所得者令常不共國家役事服䖍云是時齊克夷儀而有之既為齊有故齊得優其為役也然夷儀故邢都也邢滅入衛後乃屬晉自齊而伐夷儀其入晋竟深矣不必永為齊有當時暫得之耳乃得其尸公三禭之注禭衣也比殯三加禭深禮厚之音義禭音遂比必利反疏注正義曰送死之禮衣服曰禭故以禭為衣也公三禭之則明三時與衣自死至殯有襲與小斂大斂比殯三加衣也無存舊是賤人盖初以士服次大夫服次卿服也下與之犀軒犀軒是卿車明三禭終以卿服與之犀軒與直蓋注犀軒卿車直盖髙盖疏注正義曰説文云軒曲旃也謂軒車有蕃蔽也下云齊侯斂諸大夫之軒邴意兹乗軒意茲非卿也𫝊稱曹乗軒者三百人詩毛𫝊云大夫以上赤芾乗軒大夫亦乗軒矣指言卿車者言以貴者賞之也魚軒以魚皮為餙犀軒當以犀皮為餙也考工記車人為盖不言有曲此云直盖或時有曲直故云直盖髙盖亦謂車盖也而先歸之坐引者以師哭之注停喪車以盡哀也君方為位而哭故挽喪者不敢立音義挽音晚親推之三注齊侯自推喪車輪三轉音義推如字又也回反春秋左傳注疏卷五十五春秋左氏𫝊注疏卷五十五考證𫝊子浦曰吾未知吳道注道猶法術臣浩按杜所以觧為法術者以時吳已據楚不得言吳之道路也法術謂吳人攻戰之術𫝊奔楚為堂谿氏臣召南按後漢郡國志汝南郡吳房有棠谿亭公侵鄭林堯叟曰自宣之季年凡伐不言公魯無君將之事八十年矣自是書公侵鄭則以公山不狃侯犯陽虎之専也故曰政逮于大夫四世矣故夫三桓之子孫㣲矣季孫斯仲孫忌帥師圍鄆注何忌不言何闕文吕祖謙曰仲孫忌之為脱文無疑矣公羊以為譏二名非是𫝊公侵鄭取匡注取匡不書歸之晉趙汸補注曰杜氏知匡歸晉者以非鄰國不能有其地𫝊子期又以陵師敗于繁揚林堯叟曰以上文有舟師故以陵師敗之𫝊於是乎遷郢於鄀臣召南按郢即漢時南郡之江陵鄀即若縣後漢以為鄀縣者也漢志若楚昭王畏吳自郢徙此後復還郢顔師古注曰春秋𫝊作鄀其音同是也齊侯鄭伯盟于鹹林堯叟曰此特相盟也特相盟自齊桓以来未之有也於是再見諸侯無主盟矣是故書石門以志諸侯之合書鹹以志諸侯之散此春秋之始終也九月大雩疏劉以賈言規杜監本脱劉以二字今添晉士鞅帥師侵鄭遂侵衛林堯叟曰晉始伐與國也於襄之二十三年齊始叛晉取朝歌去年鄭始叛晋盟齊于鹹衛始叛晋盟齊于沙于是侵鄭衛又眀年及齊平雖魯亦叛晉矣故悉書之也𦵏曹靖公疏諡法共以觧信曰靖推尋文義似應作共已鮮言曰靖𫝊魯於是始尚羔臣召南按晉范鞅將中軍是上卿趙鞅荀寅盖上下軍將下卿也唯上卿執羔餘俱執雁以晉例魯則唯季孫可執羔叔孫孟孫皆宜執雁耳𫝊將㰱渉佗捘衛侯之手及捥注血至捥趙汸補注曰𫝊不言見血杜注甚矣言及捥者以大夫辱國君詳其事也臣照按捘衛侯之手及捥杜云血至捥非以刀傷其手也盖㰱血之時擠血以濺其手流至捥耳故杜云血至捥趙汸謂𫝊不言見血杜注甚矣似以血為衛侯傷手流血而不知其為所㰱之牛血也𫝊静女之三章取彤管焉疏生子月辰則以金環退之退監本訛作進今改正𫝊乃過中牟疏戎事上下同服下監本訛作衣今改正春秋左氏𫝊注疏卷五十五考證
