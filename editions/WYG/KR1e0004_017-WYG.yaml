body:
  text: 春秋左傳注疏卷十七起文公元年盡四年晋杜氏注唐陸徳明音義孔穎逹疏文公音義陸曰文公名興僖公子母聲姜諡法慈恵愛民曰文忠信接禮曰文疏正義曰魯世家文公名興僖公之子夫人聲姜所生以襄王二十六年即位諡法慈惠愛民曰文是嵗嵗在降婁經元年春王正月公即位注無傳先君未𦵏而公即位不可曠年無君疏正義曰諸侯之禮既𦵏成君先君雖則未𦵏既踰年矣而君即位者不可曠年無君故也即位必於嵗首若嵗首不行此禮餘月不得行之便是曠年無君故雖則未𦵏亦即行之釋例曰遭喪繼立者毎新年正月必改元正位百官以序故國史書即位於策以表之文公成公先君之喪未𦵏而書即位因三正之始明繼嗣之正表朝儀以固百姓之心此乃國君明分制之大禮譬周康王麻冕黼裳以行事事畢然後反喪服也雖踰年行即位之禮名通於國内必湏既葬卒哭乃免喪古之制也杜引顧命康王之事以譬此者彼是既殯此是踰年雖時不同取其暫服吉服事相似耳康王之誥云王義嗣徳答拜彼始殯訖即呼為王知諸侯既殯臣子亦呼為公既尸其位名號即成但先君未葬事猶聼於冡宰未得即成為君八年八月天王崩九年春毛伯來求金傳曰不書王命未𦵏也是踰年未𦵏不得命臣出使必待卒哭乃免喪也二月癸亥日有食之注無傳癸亥月一日不書朔官失之天王使叔服來㑹𦵏注叔氏服字諸侯喪天子使大夫㑹𦵏禮也疏正義曰四年風氏薨五年王使榮叔歸含且賵召昭公來㑹𦵏傳曰禮也夫人之喪㑹𦵏為禮知諸侯之喪天子使大夫㑹𦵏為得也蘇氏云外卿來㑹𦵏不書此書者尊王使故特書之傳稱内史叔服内史於周禮為中大夫天子大夫例書字知叔氏服字也夏四月丁巳𦵏我君僖公注七月而𦵏緩天王使毛伯來錫公命注毛國伯爵諸侯為王卿士者諸侯即位天子賜以命圭合瑞為信僖十一年王賜晋侯命亦其比也音義錫呈厯反比必利反例也又如字疏正義曰僖二十四年傳有原伯毛伯杜云原毛皆采邑此毛與彼計是一人而注不同者此毛當是文王之子封為畿外之國於時諸侯無復有毛或是世事王朝夲封絶滅從此以後常稱毛伯國名尚存仍為伯爵必受得采邑為畿内諸侯故注彼云采邑此云國也封爵既存故云諸侯為王卿士者周禮大宗伯以玉作六瑞以等邦國王執鎮圭公執桓圭侯執信圭伯執躬圭子執穀璧男執蒲璧冬官玉人桓圭以下皆謂之命圭是用之以命諸侯也諸侯即位天子賜之以命圭魯是侯爵當賜之以信圭也玉人又云天子執冒四吋以朝諸侯其冒邪刻其下與圭頭相合諸侯執圭以朝天子天子執冒以冒之觀其相當以否所以合瑞為信也僖十一年晋惠公新立王賜之命此亦新立是其比也傳稱晋侯受玉惰以此知賜命必有玉也公羊傳曰錫者何賜也命者何加我服也唐風無衣之篇晋人為其君請命於天子之使以無衣為辭則賜命亦有服杜不言服者主於玉而畧之耳晋侯伐衛注晋襄公先告諸侯而伐衛雖大夫親伐而稱晋侯從告辭也叔孫得臣如京師注得臣叔牙之孫衛人伐晋注衞孔逹為政不共盟主興兵鄰國受討喪邑故貶稱人音義喪息浪反秋公孫敖㑹晋侯于戚注戚衛邑在頓丘衛縣西禮卿不㑹公侯而春秋魯大夫皆不貶者體例已舉故據用魯史成文而已内稱公卒稱薨皆用魯史疏正義曰僖二十九年翟泉之盟諸侯之卿為會魯侯故貶稱人則魯卿會他諸侯亦合貶而春秋魯大夫皆不貶者貶他國之卿以成體例體例已舉於魯不湏加貶理足可明故據用魯史成文不復改易也他國君書卒及爵内常稱公稱薨亦體例已舉皆用魯史也冬十月丁未楚世子商臣弑其君頵注商臣穆王也弑君例在宣四年音義頵憂倫反又丘倫反公孫敖如齊注傳例曰始聘焉禮也傳元年春王使内史叔服來㑹𦵏公孫敖聞其能相人也注公孫敖魯大夫慶父之子音義相息亮反見其二子焉叔服曰榖也食子難也收子注榖文伯難惠叔食子奉祭祀供飬者也收子𦵏子身也音義見賢遍反下注孤見同食音嗣注同難乃多反又如字供俱用反飬餘亮反榖也豐下必有後於魯國注豐下蓋面方為八年公孫敖奔莒傳於是閏三月非禮也注於厯法閏當在僖公末年誤於今年三月置閏蓋時逹厯者所譏先王之正時也履端於始舉正於中歸餘於終注歩厯之始以為術之端首朞之日三百六十有六日日月之行又有遲速而必分為十二月舉中氣以正月有餘日則歸之於終積而為閏故言歸餘於終音義朞居其反履端於始序則不愆注四時無愆過音義愆起䖍反舉正於中民則不惑注斗建不失其次寒暑不失其常故無疑惑歸餘於終事則不悖注四時得所則事無悖亂音義悖必内反疏正義曰於是年魯厯置閏閏三月非禮也言於禮置閏不當在此月也因論置閏之法先王之正時也履端於始履歩也謂推歩厯之初始以為術厯之端首舉月之正半在於中氣歸其餘分置於終末言於終末乃置閏也更復申之履端於始序則不愆謂四時之序不愆過也舉正於中民視贍則不疑惑也歸餘於終於時事則不悖亂也此年不合置閏而置閏則不是歸餘於終故為非禮也注正義曰古今厯法推閏月之術皆以閏餘減章嵗餘以嵗中乗之章閏而一所得為積月命起天正算外閏所在也其有進退以中氣定之無中氣則閏月也古厯十九年為一章章有七閏八章三年閏九月六年閏六月九年閏三月十一年閏十一月十四年閏八月十七年閏四月十九年閏十二月此據元首初章若於後漸積餘分大率三十二月則置閏不必恒同初章閏月僖五年正月辛亥朔日南至治厯者皆以彼為章首之嵗漢書律厯志云文公元年距僖五年辛亥二十九嵗是嵗閏餘十三閏當在十一月後而在三月故傳曰非禮也志之所言閏當在此年十一月後今三月已即置閏是嫌閏月大近前也杜以為僖三十年閏九月文二年閏正月故言於厯法閏當在僖公末年誤於今年置閏嫌置閏大近後也杜為長厯置閏疏數無復定準凡為厯者閏前之月中氣在晦閏後之月中氣在朔僖五年正月朔旦冬至則四年當閏十二月也杜長厯僖元年閏十一月五年閏十二月與常厯不同者杜以襄二十七年再失閏司厯過昭二十年二月己丑日南至哀十二年十二月螽云火猶西流司厯過則春秋之世厯法錯失所置閏月或先或後不與常同杜唯勘絰傳上下日月以為長厯若日月同者則數年不置閏月若日月不同湏置閏乃同者則未滿二十二月頻置閏所以異於常厯故釋例云春秋日有頻月而食者有曠年不食者理不得一一如算以守恒數故厯無有不失也始失於毫毛尚未可覺積而成多以失弦望朔晦則不得不改憲以順之書所謂欽若昊天厯象日月星辰易所謂治厯明時言當順天以求合非苟合以騐天者也故當修絰傳日月以考晦朔以推時騐下又云據經傳微㫖考日辰晦朔以相發明為經傳長厯未必得天蓋春秋當時之厯也是杜自言不與常厯同注正義曰日月轉運於天猶如人之行歩故推厯謂之歩厯歩厯之始以為術之端首謂厯之上元必以日月全數為始於前更無餘分以此日為術之端首故言履端於始也朞之日三百六十有六日謂從冬至至冬至必滿此數乃周天也日月之行有遲有速日行遲月行速凡二十九日過半月行及日謂之一月過半者謂一日於厯法分為九百四十分月行及日必四百九十九分是過半二十九分今一嵗氣周有三百六十五日四分日之一其十二月一周唯三百五十四日是少十一日四分日之一未得氣周細而言之一嵗只少弱十一日所以然者一月有餘分二十九一年十二月有餘分三百四十八是一嵗既得三百五十四日又得餘分三百四十八其四分日之一一日為九百四十分則四分日之一為二百三十五分今於餘分三百四十八内取二百三十五以當郤四分日之一餘分仍有一百一十三其整日唯有十一日又以餘分一百一十三減其一日九百四十分唯有八百二十七分是一年有餘十日八百二十七分少一百一十三分不成十一日也劉炫云計一嵗為十二月猶有十一日有餘未得周也分一周之日為十二月則每月常三十日餘計月及日為一月則每月唯二十九日餘前朔後朔相去二十九日餘前氣後氣相去三十日餘每月參差氣漸不正但觀中氣所在以為此月之正取中氣以正月故言舉正於中也月朔之與月節每月剩一日有餘所有餘日歸之於終積成一月則置之為閏故言歸餘於終注正義曰閏後之月中氣在朔則斗柄月初已指所建之辰閏前之月中氣在晦則斗柄月末方指所建之辰故舉月之正在於中氣則斗柄常不失其所指之次如是乃得寒暑不失其常夏四月丁已𦵏僖公注傳皆不虛載經文而此經孤見知僖公末年傳宜在此下王使毛伯衛來錫公命注衛毛伯字音義夲作毛伯衛來錫公命一夲作天王使疏正義曰知是字者以天子公卿例書爵不言名大夫稱字故毛伯雖卿或稱字案僖九年公㑹宰周公云云杜云三公不字明卿或書字叔孫得臣如周拜注謝賜命晋文公之季年諸侯朝晋衛成公不朝使孔逹侵鄭伐緜訾及匡注孔逹衛大夫匡在潁川新汲縣東北音義訾子斯反汲居及反晋襄公既祥注諸侯雖諒闇亦因祥祭為位而哭音義諒音良又音亮疏正義曰禮朞而小祥晋文公以僖三十二年十二月卒則三十三年十二月為小祥此云既祥謂小祥也使告于諸侯而伐衛及南陽注今河内地先且居曰效尤禍也注尤衛不朝故伐今不朝王是效衛致禍時王在温故勸之音義且子餘反請君朝王臣從師晋侯朝王于温先且居胥臣伐衛五月辛酉朔晋師圍戚六月戊戌取之獲孫昭子注昭子衛大夫食戚邑衛人使告于陳陳共公曰更伐之我辭之注見伐求和不兢太甚故使報伐示己力足以距晋音義共音恭更古孟反又音庚大音泰又如字衛孔逹帥師伐晋君子以為古古者越國而謀注合古之道而失今事霸主之禮故國失其邑身見執辱疏正義曰釋例云衛孔逹為政不共盟主興兵於鄰國受討喪邑窘而告陳雖從陳之謀僅得自定以謀而濟故君子但言合古而不釋其尤也劉炫云春秋之時天子微弱霸主秉徳刑以長諸侯諸侯從時命以事霸主大事小小事大所以相保恃也晋之與衛小大不同而耻於受屈望以彊獲免明王在上理在可然度時之宜則非善計君子以為合古之道失當今之宜亦不言其謀全非理也秋晋侯疆戚田故公孫敖㑹之注晋取衛田正其疆界音義疆居良反注同初楚子將以商臣為大子訪諸令尹子上子上曰君之齒未也注齒年也言尚少音義少詩照反下文同而又多愛黜乃亂也楚國之舉恒在少者注舉立也且是人也蠭目而豺聲忍人也注能忍行不義音義蠭夲又作蜂芳逄反豺什皆反不可立也弗聽既又欲立王子職而黜大子商臣注職商臣庶弟也商臣聞之而未察告其師潘崇曰若之何而察之潘崇曰享江芈而勿敬也注江芈成王妹嫁於江音義芈亡氏反史記以為成王妾從之江芈怒曰呼役夫注呼發聲也役夫賤者稱音義呼報賀反注同役夫如字稱尺證反宜君王之欲殺女而立職也告潘崇曰信矣潘崇曰能事諸乎注問能事職不音義女音汝曰不能能行乎曰不能能行大事乎曰能注大事謂弑君音義弑申志反一夲無此注冬十月以宫甲圍成王注大子宫甲僖二十八年王以東宫卒從子玉盖取此宫甲音義卒子忽反從如字又才用反王請食熊蹯而死注熊掌難熟冀乆將有外救音義蹯音煩弗聽丁未王縊諡之曰靈不瞑曰成乃瞑注言其忍甚未斂而加惡諡音義瞑亡丁反又亡千反斂力驗反疏正義曰既見其不瞑目則是未斂於棺故知未斂也禮𦵏乃加諡未斂而加惡諡言其忍之甚也寃枉之人衆矣未有能見其靈此事特為商臣忍甚耳桓譚以為自縊而死其目未合尸冷乃瞑非由諡之善惡也亂而不損曰靈安民立政曰成穆王立以其為大子之室與潘崇疏正義曰商臣今既為王以其為大子之時所居室内財物僕妾盡以與潘崇非與其所居之宫室也使為大師且掌環列之尹注環列之尹宫衛之官列兵而環王宫音義大音㤗環如字又音患穆伯如齊始聘焉禮也注穆伯公孫敖凡君即位卿出並聘疏正義曰即位者既𦵏除喪即成君之吉位也唯以既𦵏為限不以踰年為斷八年八月天王崩九年春毛伯來求金傳曰不書王命未𦵏也是未𦵏雖踰年不得命臣出使也宣十年夏四月齊侯元卒六月葬齊惠公冬齊侯使國佐來聘是既𦵏未踰年得命臣出使也何休膏肓以為三年之喪使卿出聘於義左氏為短鄭康成箴云周禮諸侯邦交嵗相問殷相聘世相朝左氏合古禮何以難之踐脩舊好要結外援注踐猶履行也音義好呼報反下及注同要於遙反援于眷反好事鄰國以衛社稷忠信卑讓之道也忠徳之正也信徳之固也卑讓徳之基也注傳因此發凡以明諸侯諒闇則國事皆用吉禮殽之役注在僖三十三年晋人既歸秦帥秦大夫及左右皆言於秦伯曰是敗也孟明之罪也必殺之秦伯曰是孤之罪也周芮良夫之詩曰大風有隧貪人敗類注詩大雅隧蹊徑也周大夫芮伯刺厲王言貪人之敗善類若大風之行毁壊衆物所在成蹊徑音義帥所類反芮如鋭反詩大雅桑柔篇隧音遂道也敗必邁反注同蹊音兮徑古定反聽言則對誦言如醉注言昏亂之君不好典誦之言聞之若醉得道聽塗説之言則喜而答對音義誦似用反昏夲亦作惛音昏匪用其良覆俾我悖注覆反也俾使也不用良臣之言反使我為悖亂音義覆芳服反俾夲亦作卑必爾反注同是貪故也孤之謂矣孤實貪以禍夫子夫子何罪復使為政注為明年秦晋戰彭衙𫝊音義復扶又反經二年春王二月甲子晋侯及秦師戰于彭衙秦師敗績注孟明名氏不見非命卿也大崩曰敗績馮翊郃陽縣西北有彭衙城音義衙音牙見賢遍反郃户納反疏正義曰於例將卑師衆稱師今稱秦師知將非尊者故云孟明名氏不見非命卿也傳稱秦伯不廢孟明復使為政則孟明秦之執政之卿也而言非卿者成二年注云曺大夫常不書而書公子首者首命於國備於禮成為卿故也然則備卿禮乃成為卿禮不備則不書秦是辟陋之國不以卿禮成孟明不言孟明非執政也此年晋士縠堪其事故名書於垂隴襄二十九年鄭公孫叚攝卿以行名見於城杞况此真卿而不書者以秦辟陋在戎異於中國禮命不足故云非命卿也丁丑作僖公主注主者殷人以栢周人以栗三年喪終則遷入於廟疏正義曰主所用木經無正文公羊傳曰主者曷用虞主用桑練主用栗左傳唯言祔而作主主一而已非虞練冄作公羊之言不可通於此也論語哀公問主於宰我宰我對曰夏后氏以松殷人以栢周人以栗先儒舊解或有以為宗廟主者故杜依用之案古論語及孔鄭皆以為社主社為木主者古論不行於世且社主周禮謂之田主無單稱主者以張包周等並為廟主故杜所依用劉炫就所以規杜過未為得也三月乙巳及晋處父盟注䖏父為晋正卿不能匡君以禮而親與公盟故貶其族族去則非卿故以微人常稱為耦以直厭不直不地者盟晋都音義去起吕反稱尺證反厭於涉反疏正義曰春秋卿則書名氏賤者則稱人外卿之貶例皆稱人魯卿之貶乃去其族去族與稱人相類即是不為卿也䖏父為晋正卿不能匡君以禮君使盟魯即從君命親與公盟故貶去其族若言䖏父是晋之賤人則不復書公直言及晋䖏父盟若言魯之賤人往與之盟也魯之賤人不合書名舉其所為之事而己言及不言名是微人之常稱也以微人常稱與䖏父為偶若䖏父亦賤人也魯以微人敵㣲人直也晋以卿敵公不直也如此書經者以魯之直厭晋之不直也然則不貶䖏父稱人者貶之稱人則惡名不見貶其族留其名所以惡䖏父也釋例曰隨例稱人則所罪之名不章故特書䖏父也翟泉澶淵亦㑹公侯所以稱人者以其衆卿非一依例總貶不地者盟於晋之都也諸侯㑹聚盟於他國之都者即以國名為盟地魯之君臣獨往他國而與之盟者不復舉國地三年冬公如晋十二月公及晋侯盟是也夏六月公孫敖㑹宋公陳侯鄭伯晋士縠盟于垂隴注垂隴鄭地滎陽縣東有隴城士縠出盟諸侯受成於衛故貴而書名氏音義縠户木反夲亦作穀同隴力勇反自十有二月不雨至于秋七月注無傳周七月今五月也不雨足為災不書旱五榖猶有收音義收如字又手又反八月丁夘大事于大廟躋僖公注大事禘也躋升也僖公閔公庻兄繼閔而立廟坐宜次閔下今升在閔上故書而譏之時未應吉禘而於大廟行之其譏已明徒以逆祀故特大其事異其文音義大廟音㤗注及𫝊大廟同躋子兮反坐木卧反又如字疏正義曰昭十五年有事于武宫傳稱禘于武宫有事是禘則知大事亦是禘也躋升也釋詁云公羊傳曰躋者何升也禘祭之禮審諦昭穆諸廟已毁未毁之主皆於大祖廟中以昭穆為次序父為昭子為穆大祖東向昭南向穆北向孫從王父以次而下祭畢則復其廟其兄弟相代則昭穆同班近據春秋以來惠公與莊公當同南面西上隠桓與閔僖亦同北面西上僖是閔之庶兄繼閔而立昭穆雖同位次閔下今升在閔上故書而譏之僖公以其三十三年十一月薨至此年十一月喪服始畢今始八月時未應吉禘而於大廟行之與閔公二年吉禘于莊公其違禮同也彼書吉禘其譏已眀則此亦從譏可知不復更譏其速也徒猶空也空以逆祀之故亂國大典故特大其事謂之大事譏逆祀也釋例曰文公二年僖公之喪未終未應行吉禘之禮而於大廟行之其譏已眀徒以躋僖而退閔故特大其事異其文定八年亦特書順祀皆所以起非常也有事于武宫及順祀傳皆稱禘則知大事有事于大廟亦禘也冬晋人宋人陳人鄭人伐秦注四人皆卿秦穆悔過終用孟明故貶四國大夫以尊秦伯疏正義曰四國大夫傳皆言名氏是四人皆卿也秦穆悔過終用孟明仲尼特善其事無辭可以寄文故貶四國大夫稱人所以尊崇秦徳以諸侯之名無所可加貶大夫以尊秦大夫非有罪也襄八年邢丘之㑹晋悼霸功既就徳立刑行貶諸侯之卿以尊晋侯其事與此同也釋例曰秦伯終用孟明而致敗敗而罪己赦其闕而飬其志孟明増脩其徳以霸西戎夫子嘉之故於伐秦之役貶四國大夫四國大夫奉君命而行今以一義變例故稱尊秦謂之崇徳明罪不在四國大夫也公子遂如齊納幣注傳曰禮也僖公喪終此年十一月則納幣在十二月也士昏六禮其一納采納徴始有𤣥纁束帛諸侯則謂之納幣其禮與士禮不同盖公為大子時已行昏禮也音義纁許云反疏正義曰公羊傳曰此何以書譏何譏爾譏喪娶也娶在三年之外則何譏乎喪娶三年之内不圗昏其意謂此喪服未畢而行昏禮也何休據此作膏肓以左氏為短今左氏傳謂之禮也必是喪服已終杜以長厯推之知僖公以其三十三年十一月薨至此年十一月喪已畢矣納幣雖則無月以傳言禮則知納在十二月也士昏六禮其一納采次有問名納吉至納徴始有𤣥纁束帛士謂之納徴諸侯則謂之納幣以其幣帛多其禮大與士禮不同故異其名也按士之昏禮納采問名同日行事納采者納其采擇之禮主人既諾賔即問名將歸卜其吉凶也卜而得吉又遣使納吉如納采之禮納吉之後方始納徴徴成也使使納幣以成昏禮也此納幣以前已有三禮湏冄度遣使一月之内不容三遣適齊盖公為大子時已行昏禮疑在僖公之世已行納采納吉今續而成之也杜言其一納采欲明納徴之前更有昏禮納幣非昏禮之始豫為下句公為大子時已行昏禮張夲也大子昏禮理自不書雖則公昏唯書納幣其納采納吉亦不書也釋例曰諸侯昏禮亡以士昏禮準之不得唯只於納幣逆女逆女納幣二事皆必使卿行卿行則書之他禮非卿則不書也宋公使華元來聘聘不應使卿故傳但言聘共姬也使公孫夀來納幣納幣應使卿故傳明言得禮也君之昏亦唯存納幣逆女此其義傳二年春秦孟明視帥師伐晋以報殽之役二月晋侯禦之先且居將中軍趙衰佐之注代郤溱音義禦魚吕反將子匠反衰初危反溱側巾反王官無地御戎注代梁𢎞狐鞫居為右注鞫居續簡伯音義鞫九六反甲子及秦師戰于彭衙秦師敗績晋人謂秦拜賜之師注以孟明言三年將拜君賜故嗤之音義嗤尺之反戰於殽也晋梁𢎞御戎萊駒為右戰之明日晋襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈以斬囚禽之以從公乘遂以為右箕之役注箕役在僖三十三年音義呼火故反瞫尺甚反字林式衽反乗䋲證反先軫黜之而立續簡伯疏正義曰御與車右雖有常貟必臨戰更選定之韓之戰卜右慶鄭吉是其事也自殽戰之後狼瞫為右箕之役將戰選右先軫黜之箕戰先軫死焉非既戰乃黜之也狼瞫怒其友曰盍死之瞫曰吾未獲死所注未得可死䖏音義盍户臘反䖏昌慮反其友曰吾與女為難注欲共殺先軫音義女音汝難乃旦反瞫曰周志有之勇則害上不登於明堂注周志周書也明堂祖廟也所以䇿功序徳故不義之士不得升死而不義非勇也共用之謂勇注共用死國用音義共音恭注同吾以勇求右無勇而黜亦其所也注言今死而不義更成無勇宜見退謂上不我知黜而宜乃知我矣注言今見黜而合宜則吾不得復言上不我知音義復扶又反子姑待之疏正義曰周之志記有之曰有勇以害在上則為不義之人不得升於明堂若殺先軫則必死死而不義非勇也如以死共國家之用是之謂勇吾自以有勇之故求為車右若殺先軫則是無勇無勇而被黜退亦是得其所也吾復安得為恨吾今恨者謂在上不我知也言其不知我有勇也若殺先軫即是成為無勇無勇被黜退則黜而合其宜也乃是在上知我矣不得言在上不我知也子且待之注正義曰志者記也謂之周志明是周世之書不知其書何所名也鄭𤣥以為明堂在國之陽與祖廟别䖏左氏舊説及賈逵盧植蔡邕服䖍等皆以祖廟與明堂為一故杜同之祭統云古者明君必賜爵禄於大廟傳稱公行還告廟舍爵䇿勲是明堂之中所以䇿功序徳故不義之人不得升之也害上即是不義故不得登明堂也及彭衙既陳以其屬馳秦師死焉注属属已兵音義陳直覲反晋師從之大敗秦師君子謂狼瞫於是乎君子詩曰君子如怒亂庶遄沮注詩小雅言君子之怒必以止亂遄疾也沮止也音義遄市專反沮在汝反又曰王赫斯怒爰整其旅注詩大雅言文王赫然奮怒則整師旅以討亂音義赫火百反怒不作亂而以從師可謂君子矣秦伯猶用孟明孟明増脩國政重施於民趙成子言於諸大夫曰注成子趙衰音義施式豉反秦師又至將必辟之懼而增徳不可當也詩曰毋念爾祖聿􅁱厥徳注詩大雅言念其祖考則宜述脩其徳以顯之毋念念也音義辟音避毋音無注同孟明念之矣念徳不怠其可敵乎注為明年秦人伐晋傳丁丑作僖公主書不時也注過𦵏十月故曰不時例在僖三十三年疏正義曰僖三十三年傳已發例言作主非禮此復云書不時者彼因葬緩遂通譏作主之失未辯失之所由於此又言不時以明失禮之狀接成彼義也晋人以公不朝來討公如晋夏四月己巳晋人使陽處父盟公以耻之注使大夫盟公欲以恥辱魯也經書三月乙巳經傳必有誤書曰及晋䖏父盟以厭之也注厭猶損也晋以非禮盟公故文厭之以示譏音義厭於渉反注同適晋不書諱之也注不書公如晋公未至六月穆伯㑹諸侯疏正義曰沈云非公命不書此穆伯會諸侯公未至而書者此公既在外命正卿守國故守國之臣亦合告廟而行故得書之也及晋司空士縠盟于垂隴晋討衛故也注討元年衛人伐晋士縠士蒍子音義蒍于委反書士縠堪其事也注晋司空非卿也以士縠能堪卿事故書音義書士縠或作書曰晋士縠疏正義曰傳舉司空之官云堪其事乃書之明夲不當書故知非卿也成二年傳稱魯賜晋三帥三命之服司空亞旅皆受一命之服是其知司空非卿之文也陳侯為衛請成于晋執孔逹以説注陳始與衛謀謂可以强得免今晋不聽故更執孔逹以苟免也音義為于偽反秋八月丁卯大事于太廟躋僖公逆祀也注僖是閔兄不得為父子嘗為臣位應在下令居閔上故曰逆祀音義令力呈反閔上時掌反一夲無上字疏正義曰禮父子異昭穆兄弟昭穆同故僖閔不得為父子同為穆耳當閔在僖上今升僖先閔故云逆祀二公位次之逆非昭穆亂也魯語云將躋僖公宗有司曰非昭穆也弗忌曰我為宗伯明者為昭其次為穆何常之有如彼所言似閔僖異昭穆者位次之逆如昭穆之亂假昭穆以言之非謂異昭穆也若兄弟相代即異昭穆設令兄弟四人皆立為君則祖父之廟即已從毁知其禮必不然故先儒無作此說於是夏父弗忌為宗伯注宗伯掌宗廟昭穆之禮音義夏户雅反昭上遥反後昭穆之例放此疏正義曰周禮大宗伯掌建邦之天神人鬼地祗之禮小宗伯掌建國之神位辯廟祧之昭穆諸侯之官所掌亦當然也尊僖公且明見曰吾見新鬼大故鬼小注新鬼僖公既為兄死時年又長故鬼閔公死時年少弗忌明言其所見音義長丁丈反少詩照反疏正義曰且明見者既尊崇僖公且明言其意之所見見其順大小升聖賢也劉炫以為直據兄弟大小為義不湏云死之長㓜以規杜氏今刪定知不然者以傳云新鬼大故鬼小則大小之語總該諸事非直獨據兄弟明知亦據年時也先大後小順也躋聖賢明也注又以僖公為聖賢明順禮也君子以為失禮疏正義曰傳有評論皆託之君子此下盡先姑以來皆是一君子之辭耳引詩二文於詩之下各言君子者君子謂作詩之人此論事君子又引彼作詩君子以為證且僖公薨後始作魯頌為傳之時乃設此辭非當時君子有此言也弗忌之意以先大後小為順故言明順禮也君子之意以臣不先君為順故云禮無不順各言其順順不同也魯語展禽云夏父弗忌必有天殃其葬也焚煙逹于土孔晁云已𦵏而柩焚煙逹椁外禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食乆矣注齊肅也臣繼君猶子繼父音義先悉薦反下不先皆同故禹不先鯀湯不先契注鯀禹父契湯十三世祖音義鯀古夲反契息列反殷始封之君疏正義曰鯀禹父夏夲紀文也契湯十三世祖殷夲紀文契生昭明昭明生相土相土生昌若昌若生曺圉曺圍生㝠㝠生振振生微微生報丁報丁生報乙報乙生報丙報丙生主壬主壬生主癸主癸生天乙天乙即湯也下注云不窋后稷子周夲紀文服䖍云周家祖后稷以配天明不可先也故言不先不窋禹湯異代之王故言不先鯀契也然則文武大聖后稷賢耳非是不可先也下句引詩皇祖后稷不欲重耳故舉不窋以辟之文武不先不窋注不窋后稷子音義窋知律反宋祖帝乙鄭祖厲王猶上祖也注帝乙微子父厲王鄭桓公父二國不以帝乙厲王不肖而猶尊尚之音義肖悉召反疏正義曰帝乙微子父宋世家文厲王鄭桓公父鄭世家文微子桓公宋鄭始祖也言宋祖帝乙鄭祖厲王則二國立其廟而祖祀之微子不先帝乙桓公不先厲王猶上祖也言不以不肖猶尊尚之也宋為王者之後得祀殷之先王帝乙之廟不毁者盖以為其所出故特存焉周制王子有功徳出封者得廟祀所出之王魯以周公之故得立文王之廟襄十二年傳稱魯為諸姬臨於周廟周廟文王廟也鄭之桓武世有大功故得立厲王之廟昭十八年傳稱鄭人救火使祝史徙王祏於周廟周廟厲王廟也是以魯頌曰春秋匪解享祀不忒皇皇后帝皇祖后稷注忒差也皇皇羙也后帝天也詩頌僖公郊祭上天配以后稷音義解戸買反忒他得反差二也疏正義曰魯頌閟宫之篇羙僖公之徳也上皇皇為羙下皇為君言僖公春秋祭祀非有懈倦其所享祀不有差忒所祀之神有皇皇之羙者為君之上天配之以君祖后稷也君子曰禮謂其后稷親而先帝也注先稱帝也詩曰問我諸姑遂及伯姊注詩邶風也衛女思歸而不得故願致問於姑姊音義邶音佩君子曰禮謂其姊親而先姑也注僖親文公父夏父弗忌欲阿時君先其所親故傳以此二詩深責其意仲尼曰臧文仲其不仁者三不知者三下展禽注展禽栁下惠也文仲知栁下惠之賢而使在下位非己欲立而立人之道音義不知音智下同廢六闗注塞闗陽闗之属凡六闗所以禁絶末逰而廢之音義塞悉再反妾織蒲三不仁也注家人販席言其與民争利音義販甫萬反作虛器注謂居蔡山節藻棁也有其器而無其位故曰虛音義棁章悦反縱逆祀注聽夏父躋僖公祀爰居三不知也注海鳥曰爰居止於魯東門外文仲以為神命國人祀之音義爰居爾雅一名雜縣樊光云似鳯凰爰居事見國語莊子云魯侯御而觴之于廟疏正義曰魯臣多矣而獨譏文仲者以文仲執國之政有大知之名為不知之事故特譏之其餘則不足責矣論語稱仁者愛人知者不惑故以害於物者為不仁闇於事者為不知卑下展禽而不肯舉薦廢去六闗而不設防禁妾織蒲席而與民争利此三事為不仁也無其位而作虛器不知禮而縦逆祀不識鳥而祀爰居此三事為不知也注正義曰論語云臧文仲其竊位者與知栁下惠之賢而不與立也又曰仁者已欲立而立人知賢不舉是無恕心故為不仁也昭五年傳稱孟丙仲壬之子殺豎牛於塞闗之外襄十七年傳稱師自陽闗逆臧孫二闗見於傳如此之属凡有六也民以田農為夲啇賈為末農民力以自食商民遊以求食漢書賈誼説上曰今敺民而歸之農皆著其夲各食其力末技遊食之民轉而緣南􅒪則畜積足矣杜稱末遊者謂此末技遊食之民也周禮司闗司貨賄之出入掌其治禁是所以禁絶末遊者令其出入有度今而廢之使末遊之人無所禁約損害農民是不仁也家語説此事作妾織席知織蒲是為席以販賣之也大學云食禄之家不與民争利故以此為不仁也論語云子曰臧文仲居蔡山節藻棁何如其知也鄭𤣥云節栭也刻之為山棁梁上楹也畫以藻文蔡謂國君之守龜山節藻棁天子之廟飾皆非文仲所當有之有其器而無其位故曰虛君子下不僭上其居奢如此是不知也魯語云海鳥曰爰居止於魯東門之外三日臧文仲命國人祭之展禽曰越哉臧孫之為政也夫祀國之大節也節政之所成也故制祭祀以為國典今無故而加典非政之宜也今海鳥至已不知而祀之以為國典難以言仁曰知矣無功而祀之非仁也弗知而不問非知也今兹海其有災乎夫廣川之鳥獸皆知辟其災是嵗海多大風冬暖冬晋先且居宋公子成陳轅選鄭公子歸生伐秦取汪及彭衙而還以報彭衙之役卿不書為穆公故尊秦也謂之崇徳音義成音城夲或作戌音恤選息兖反汪烏黄反為于偽反㐮仲如齊納幣禮也凡君即位好舅甥脩昏姻娶元妃以奉粢盛孝也注謂諒闇既終嘉好之事通于外内外内之禮始備此除凶之即位也於是遣卿申好舅甥之國脩禮以昏姻也元妃嫡夫人奉粢盛共祭祀音義好呼報反注同娶七住反妃芳菲反粢音姿盛音成嫡丁厯反共音恭孝禮之始也經三年春王正月叔孫得臣㑹晋人宋人陳人衛人鄭人伐沈沈潰注傳例曰民逃其上曰潰沈國名也汝南平輿縣北有沈亭音義沈尸甚反潰户内反輿音餘一音預夏五月王子虎卒注不書爵者天王赴也翟泉之盟雖輙假王命周王因以同盟之例為赴音義為于偽反又如字夲或作來赴疏正義曰王子虎即王叔文公也諡之為文必當有爵不書爵者畿内之國不得外交諸侯其臣不敢赴魯必天子為之赴赴以王子為親不復言其爵也翟泉之盟子虎在列而貶之稱人若王使來盟不應貶責不假王命則不得與盟故知於時輙假王命周王遂以同盟之禮為之赴魯傳稱來赴弔如同盟禮也是其來赴往弔皆如同盟之禮秦人伐晋注晋人恥不出以微者告秋楚人圍江雨螽于宋注自上而隋有似於雨宋人以其死為得天祐而來告故書音義雨于付反注及傳同螽音終隋徒大反傳注同祐音又冬公如晋十有二月己巳公及晋侯盟晋陽䖏父帥師伐楚以救江傳三年春莊叔㑹諸侯之師伐沈以其服於楚也沈潰凡民逃其上曰潰在上曰逃注潰衆散流移若積水之潰自壊之象也國君輕走羣臣不知其謀與匹夫逃竄無異是以在衆曰潰在上曰逃各以類言之音義輕如字又遣政反竄七亂反疏正義曰公羊傳曰潰者何下叛上也國曰潰邑曰叛釋例曰衆保於城城保於徳言上能以徳附衆以功庇下民信其徳恃其固故能交相依懐以衛社稷苟無固志盈城之衆一朝而散如積水之敗故曰潰潰者衆散流遁之辭也國君而逃師棄盟違其典儀棄其車服羣臣不知其謀社稷不保其安此與匹夫逃竄無異是以在衆為潰在君為逃以别上下之名無取於别國邑也賈穎以為舉國曰潰一邑曰叛按左氏無此義也傳曰陳侯如楚慶氏以陳叛此則舉國不必言潰也叛者舉城而属他非民潰之謂也是解潰逃之義也僖五年首止之盟鄭伯逃歸襄七年鄬之㑹陳侯逃歸皆書於經十年傳厥貉之㑹麋子逃歸不書者於時楚㑹諸侯魯不與楚不告故不書也襄十六年溴梁之㑹傳稱髙厚逃歸不書於經者釋例云例之潰逃指為一國一軍一邑君民相湏為用變文以别之也鄭詹見囚於齊自齊逃來此為逸囚無下可逃春秋指事而書所謂民逃非在上之逃也而賈氏復申以入例亦不安也如例所言髙厚之逃縦有師衆止同逸囚之限非是逃例然鄭詹書而髙厚不書者鄭詹為逃來向魯故書髙厚不别赴故不書衛侯如陳拜晋成也注二年陳侯為衛請成于晋音義為于偽反夏四月乙亥王叔文公卒來赴弔如同盟禮也注王子虎與僖公同盟於翟泉文公是同盟之子故赴以名傳因王子虎異於諸侯王叔又未與文公盟故於此顯示體例也經書五月又不書日從赴也疏正義曰隐七年傳例曰凡諸侯同盟於是稱名故薨則赴以名者指謂同盟之二君耳不言與其父盟得以名赴其子但同盟稱名則両君相知君既知之則國内皆知故彼父雖卒得以名赴其子此理雖爾凡例未明王子虎與僖同盟文公是其同盟之予今乃以名赴文是其於禮合赴此類多矣傳因王子虎天子之臣異於諸侯王叔又未與文公同盟故於此顯示體例則其餘從可知也秦伯伐晋濟河焚舟注示必死也取王官及郊注王官郊晋地晋人不出遂自茅津濟封殽尸而還注茅津在河東大陽縣西封埋藏之音義大音㤗遂霸西戎用孟明也君子是以知秦穆公之為君也舉人之周也注周備也不偏以一惡棄其善與人之壹也注壹無貳心孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也注子桑公孫枝舉孟明者音義解佳買反下同詩曰于以采蘩于沼于沚于以用之公侯之事秦穆有焉注詩國風言沼沚之蘩至薄猶采以共公侯以喻秦穆不遺小善音義蘩音煩沼之紹反沚音止共音恭夙夜匪解以事一人孟明有焉注詩大雅羙仲山甫也一人天子也詒厥孫謀以燕翼子子桑有焉注詒遺也燕安也翼成也詩大雅羙武王能遺其子孫善謀以安成子孫言子桑有善舉之謀音義詒以之反遺唯季反疏正義曰詒遺釋詁云燕之為安常訓也翼者賛成之義故為成也詩大雅文王有聲之篇羙武王之事言子桑有此義也秋雨螽于宋隊而死也注螽飛至宋隊地而死若雨音義隊直類反楚師圍江晋先僕伐楚以救江注晋救江在雨螽下故使圍江之經隨在雨螽下疏正義曰先僕救江經無其事但實在雨螽之後不進救江於前而退圍江於下欲令下與處父救江相接故也冬晋以江故告于周注欲假天子之威以伐楚王叔桓公晋陽處父伐楚以救江注桓公周卿士王叔文公之子桓公不書示威名不親伐疏正義曰王叔文公不知何王之子字叔遂以叔為氏桓公是其子王叔陳生是其後也衛有公叔文子此人盖以王叔為氏也門于方城遇息公子朱而還注子朱楚大夫伐江之帥也聞晋師起而江兵解故晋亦還音義帥所類反解音蟹又佳買反晋人懼其無禮於公也請改盟注改二年處父之盟公如晋及晋侯盟晋侯饗公賦菁菁者莪注菁菁者莪詩小雅取其既見君子樂且有儀音義菁子丁反莪五多反樂音洛下文何樂小國之樂同莊叔以公降拜注謝其以公比君子也曰小國受命於大國敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也晋侯降辭注降堦辭讓公登成拜注俱還上成拜禮音義上時掌反又如字疏正義曰燕禮賔降階冄拜稽首公命小臣辭賔升成拜鄭𤣥云升成拜復冄拜稽首也先時君辭之於禮若未成然此莊叔以公降拜晋侯辭之禮未成故更登成拜是賔主俱還上成拜禮也公賦嘉樂注嘉樂詩大雅義取其顯顯令徳宜民宜人受祿于天音義嘉户嫁反樂如字注同經四年春公至自晋注無傳夏逆婦姜于齊注稱婦有姑之辭疏正義曰桓三年齊侯送姜氏于讙注云已去齊國故不言女未至於魯故不稱夫人然則往逆當稱逆女入國當稱夫人此時逆則卿不行入復不告至其禮輕畧異於常文徒以有姑故稱婦以齊女則稱姜直云逆婦姜于齊畧賤之文也狄侵齊注無傳秋楚人滅江注滅例在文十五年疏正義曰案莊十年齊師滅譚注云滅例在文十五年滅弦滅黄滅夔皆不注獨更於此言者沈氏云滅譚為入春秋之初故湏指其例弦黄夔等傳皆載其見滅所由今滅江傳無事跡恐異於餘滅故更引滅例云在十五年晋侯伐秦衛侯使寗俞來聘音義俞羊朱反冬十有一月壬寅夫人風氏薨注僖公母風姓也赴同袝姑故稱夫人音義袝音附疏正義曰杜言此者以成風夲是莊公之妾嫌其不成夫人故明之也釋例曰凡妾子為君其母猶為夫人雖先君不命其母母以子貴其適夫人薨則尊得加於臣子内外之禮皆如夫人矣故姒氏之喪貴以小君不成成風之喪王使會葬傳曰禮也是言適夫人既死妾母於法得成夫人也傳四年春晋人歸孔逹于衛以為衛之良也故免之注二年衛執孔逹以説晋夏衛侯如晋拜注謝歸孔逹曹伯如晋㑹正注㑹受貢賦之政也傳言襄公能繼文之業而諸侯服從逆婦姜于齊卿不行非禮也注禮諸侯有故則使卿逆君子是以知出姜之不允於魯也注允信也始來不見尊貴故終不為國人所敬信也文公薨而見出故曰出姜曰貴聘而賤逆之注公子遂納幣是貴聘也君而卑之立而廢之注君小君也不以夫人禮迎是卑廢之棄信而壊其主在國必亂在家必亡注主内主也音義壊音怪不允宜哉詩曰畏天之威于時保之敬主之謂也注詩頌言畏天威於是保福祿秋晋侯伐秦圍邧新城以報王官之役注邧新城秦邑也王官役在前年音義邧願晚反一音元楚人滅江秦伯為之降服出次不舉過數注降服素服也出次辟正寢不舉去盛饌鄰國之禮有数今秦伯過之音義為于偽反下文注為賦為􅁔皆同去起吕反饌仕眷反疏正義曰僖三十三年傳曰秦伯素服郊次意與此同知此降服為素服也出次出於宫而别次舍故云辟正寢也殺牲盛饌曰舉知不舉去盛饌也鄰國之禮有数不知其数㡬何以言過数知其必有数耳哀十年傳稱齊人弑悼公赴于師吴子三日哭于軍門之外鄰國之数盖三日也大夫諫公曰同盟滅雖不能救敢不矜乎吾自懼也注秦江同盟不告故不書音義矜君陵反君子曰詩云惟彼二國其政不獲惟此四國爰究爰度其秦穆之謂矣注詩大雅言夏商之君政不得人心故四方諸侯皆懼而謀度其政事也言秦穆亦能感江之滅懼而思政爰於也究度皆謀也音義究音救度待洛反注同疏正義曰徧檢諸夲君子曰下皆無詩云則傳文夲自畧也詩意言維彼夏商二國其政不得民心致使國家喪滅維此四方之國見其亡滅於是自謀於是自度其政事自懼己之滅亡也此詩所言其秦穆之謂也此詩大雅皇矣一篇衞寗武子來聘公與之宴為賦湛露及彤弓注非禮之常公特命樂人以示意故言為賦湛露彤弓詩小雅音義湛直減反彤徒冬反疏正義曰諸自賦詩以表己志者斷章以取義意不限詩之尊卑若使工人作樂則有常禮穆叔所云肆夏樊遏渠天子所以享元侯也文王大明緜則両君相見之樂也燕禮者諸侯燕其羣臣及燕聘問之賔禮也歌鹿鳴四牡皇皇者華如彼所云盖尊卑之常禮也自賦者或全取一篇或止歌一章未有頓賦两篇者也其使工人歌樂各以三篇為斷此其所以異也此時武子來聘魯公燕之於法當賦鹿鳴之三今賦湛露彤弓非是禮之常法傳特云為賦知公特命樂人歌此二篇以示意也此二篇天子燕諸侯之詩公非天子賔非諸侯不知歌此欲示何意盖以武子有令名歌此疑是試之耳不辭又不荅賦使行人私焉注私問之對曰臣以為肄業及之也注肄習也魯人失所賦寗武子佯不知此其愚不可及音義肄字又作肆以二反注同佯音陽一音祥疏正義曰説文肆訓為陳字從長聿聲貄訓為習字從聿豸聲古書經傳所作字皆同耳臣以為工人自習詩業以及此篇非謂歌之以為己也魯人失於所賦辭則章主之失荅則已當其寵故不辭又不荅佯若不知其所為如愚人然論語云寗武子其知可及其愚不可及此亦是愚之一事也按燕禮無荅賦之法而怪其不荅賦者非常之賦宜有對荅故也昔諸侯朝正於王注朝而受政教也王宴樂之於是乎賦湛露則天子當陽疏正義曰湛露詩云湛湛露斯匪陽不晞陽謂日也言天子當日諸侯當露也諸侯用命也注湛露曰湛湛露斯匪陽不晞晞乾也言露見日而乾猶諸侯禀天子命而行音義樂音洛下注宴樂同晞音希諸侯敵王所愾而獻其功注敵猶當也愾恨怒也音義愾苦愛反疏正義曰敵者相當之言愾是恨怒之意當王所怒謂往征伐之勝而獻其功也彤弓序云天子賜有功諸侯也王於是乎賜之彤弓一彤矢百玈弓矢干以覺報宴注覺明也謂諸侯有四夷之功王賜之弓矢又為歌彤弓以明報功宴樂音義玈音盧覺音角疏正義曰覺者悟知之意故為明也使諸侯明己心也莊三十一年傳曰諸侯有四夷之功則獻于王中國則否禮諸侯賜弓矢然後専征伐故有功則賜之以弓矢又歌此彤弓之詩以明天子之心知是報功宴樂也詩言一朝饗之則是為設饗禮此云宴者明其為宴樂耳非言設宴禮也今陪臣來繼舊好注方論天子之樂故自稱陪臣音義好呼報反君辱貺之其敢干大禮以自取戾注貺賜也干犯也戾罪也音義貺音況戾力計反冬成風薨注為明年王使含􅈖傳春秋左傳注疏卷十七春秋左氏傳注疏卷十七考證天王使毛伯來錫公命疏或是世事王朝臣浩按文義當作世仕王朝傳於是閏三月非禮也注於厯法閏當在僖公末年誤于今年三月置閏顧炎武日知錄曰古人以閏為嵗之餘凡置閏必在十二月之後故曰歸餘於終考經文之書閏月者皆在嵗末文公六年閏月不告朔哀公五年閏月葬齊景公是也而左傳成公十七年襄公九年哀公十五年皆有閏月亦並在嵗末又經傳之文凡閏不言其月者言閏即嵗之終可知也今魯改厯法置閏在三月故為非禮臣照按閏必嵗終則四時多舛事之昔非今是者惟厯法􅆟為顯然盖天地亦以漸而開推歩之密魯實始基之矣孔子紀魯始閏三月其譏與否固無明文左氏則以非周制而謂為非禮傳先王之正時也一節臣召南按律厯志曰經于四時雖亡事必書時月時所以紀啟閉也月所以紀分至也啟閉者節也分至者中也節不必在其月中必在正數之月按此解舉正于中甚精又按王應麟困學紀聞曰素問立端於始表正於中推餘於終而天度畢矣注謂立首氣於初節之日示斗建於月半之辰退餘閏於相望之後可以發明左氏正時之義傳穆伯如齊始聘焉禮也劉敞曰左氏見當時諸侯廢喪而聘故推以為禮杜氏見左氏有得禮之言遂推以當喪而吉皆反經越禮不可以教後世八月丁卯大事于大廟躋僖公注大事禘也萬斯大曰天子四時之祭春礿夏禘秋嘗冬烝四祭中惟禘最大故嘗烝曰有事禘曰大事又疏躋升也釋詁云臣浩按疏例當作釋詁文傳狐鞫居為右注鞫居續簡伯臣召南按杜所以知鞫居即續簡伯者以六年傳賈季使續鞫居殺陽處父鞫居即狐氏之族也傳書曰及晋䖏父盟以厭之也趙汸補注曰傳釋䖏父去族傳先大後小注又以僖公為聖賢臣召南按魯人甚重僖公魯頌之文鋪張揚厲賛不容口宜乎夏父弗忌之以為聖賢也傳故禹不先鯀湯不先契疏昭明生相土昭監夲訛作相今改正傳宋祖帝乙鄭祖厲王猶上祖也注二國不以帝乙厲王不肖而猶尊尚之臣浩按帝乙未見有不肖之事以與周厲並稱注順文為説耳臣照按易屢稱帝乙歸妹先儒以帝乙為成湯此帝乙當亦是成湯盖武王封微子以奉湯祀宋自當以湯為祖鄭則出自厲自當以厲為祖傳盖言宋祖湯鄭祖厲豈繄賢否但尚祖耳子孫不得臧否祖宗也于文不必帝乙厲王皆不肖乃可通自有杜注而後世并以疑易傳仲尼曰注非己欲立而立人之道監夲脱非字脱之道二字今添傳廢六闗王應麟困學紀聞曰家語作置六闗注謂文仲置闗以税行者故為不仁傳襄仲如齊納幣禮也萬斯大曰昏禮有六納幣之先已有納采問名納吉三禮縱納幣在十二月其未祥而納采問名未禫而納吉斷可知矣安得謂非喪娶乎王子虎卒林堯叟曰王卿不卒惟王子虎劉卷書傳王叔文公卒趙汸補注曰傳言同盟指當時諸侯㑹盟而言王子虎踐土翟泉實盟諸侯故赴弔用諸侯同盟例傳今陪臣來繼舊好林堯叟曰此尊天子之辭非稱陪臣于魯也臣照按寗武子自稱陪臣言己固周室之陪臣不言魯之非天子而言己之實陪臣善辭也春秋左氏傳注疏卷十七考證
