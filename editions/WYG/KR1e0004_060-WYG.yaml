body:
  text: 春秋左傳注疏卷六十起哀公十六年盡二十七年晉杜氏注唐陸德明音義孔穎逹疏十有六年春王正月己卯衛世子蒯聵自戚入于衛衛侯輙來奔注書此春皆從告二月衛子還成出奔宋注即瞞成音義還音旋夏四月己丑孔丘卒注仲尼既告老去位猶書卒者魯之君臣宗其聖德殊而異之魯襄二十二年生至今七十三也四月十八日乙丑無己丑己丑五月十二日日月必有誤音義孔子卒孔子作春秋終於獲麟之一句公羊榖梁經是也弟子欲記聖師之卒故採魯史記以續夫子之經而終於此丘明因隨而作傳終於哀公從此已下無復經矣魯襄二十二年生至今七十三也本或作魯襄二十三年生至今七十一則與史記孔子世家異此本非也疏注正義曰魯臣見為卿乃書其卒致事而卒猶尚不書仲尼書卒者魯之君臣宗其聖德殊而異之故特命史官使書其卒耳孔子世家云魯襄公二十二年而孔子生孔子年七十三以魯哀公十六年四月己丑卒杜自以長歴校之四月十八日有乙丑無己丑己丑乃是五月十二日也日月必有誤者劉炫云春秋之例卿乃書卒縱令仲尼不告老例不合書而杜云告老去位猶書卒非也今知不然者案周禮典命云公侯伯之卿三命大夫再命仲尼為魯大夫夾谷之㑹攝相事十一年傳云子為國老是大夫尊者則二命以上凖例合書故杜為此注或曰杜為抑揚之辭以為仲尼縱未去位例不合書告老去位猶書卒者欲明魯之君臣宗其聖徳之甚劉不尋杜㫖以為例不合書而規杜過非也傳十六年春瞞成禇師比出奔宋注欲伐莊公不果而奔衛侯使鄢武子告于周注武子衛大夫􅆄也音義鄢於䖍反􅆄許乙反曰蒯聵得罪于君父君母逋􅇡于晉晉以王室之故不棄兄弟寘諸河上注河上戚也音義逋布呉反􅇡七亂反寘之豉反天誘其衷獲嗣守封焉使下臣􅆄敢告執事王使單平公對曰􅆄以嘉命來告余一人徃謂叔父余嘉乃成世復爾禄次敬之哉注繼父之世還居君之禄次音義衷音忠單音善余嘉乃成世絶句方天之休注言天方受爾以休音義休音許蚪反注及下同美也弗敬弗休悔其可追注傳終蒯瞶之事夏四月己丑孔丘卒公誄之曰旻天不弔不憖遺一老俾屏余一人以在位注仁覆閔下故稱旻天弔至也憖且也俾使也屏蔽也音義誄力軌反說文云諡也旻亡巾反弔如字又音的憖魚覲反俾必爾反屏必領反煢煢余在疚嗚呼哀哉尼父無自律注疚病也律法也言喪尼父無以自為法音義煢求營反疚久又反父音甫喪息浪反疏正義曰周禮大祝掌作六辭以通上下親疎逺近六曰誄鄭衆曰誄謂積累生時德行以賜之命主為其辭即引此傳是為賜命之辭也鄭𤣥禮記注云誄累也累列生時行迹讀之以作諡此傳唯說誄辭不言作諡傳記羣書皆不載孔子之諡蓋唯累其美行示已傷悼之情而賜之命耳不為之諡故書傳無稱焉至漢王莽輔政尊尚儒術封孔子後為褒成侯追諡孔子為褒成宣尼君明是舊無諡也鄭𤣥禮注云尼父因其字以為之諡謂諡孔子為尼父鄭𤣥錯讀左傳云以字為諡遂復妄為此解子贛曰君其不没於魯乎夫子之言曰禮失則昏名失則愆失志為昏失所為愆生不能用死而誄之非禮也稱一人非名也注天子稱一人非諸侯之名音義愆起䖍反君兩失之六月衛侯飲孔悝酒於平陽注東郡燕縣東北有平陽亭音義飲於鴆反重酬之大夫皆有納焉注納財賄也醉而送之夜半而遣之注夜遣者慙負孔悝不欲令人見音義令力呈反載伯姬於平陽而行注載其母俱去及西門注平陽門使貳車反祏於西圃注使副車還取廟主西圃孔氏廟所在祏藏主石函音義祏音石圃布五反函音咸疏注正義曰少牢饋食大夫之祭禮其祭無主鄭𤣥祭法注云惟天子諸侯有主禘祫大夫不禘祫無主耳今孔悝得有主者當時僭為之非禮也鄭𤣥駁異義云大夫無主孔悝之反祏所出公之主耳案孔氏姞姓春秋時國唯南燕為姞姓耳孔氏仕於衛朝已歴多世不知本出何國安得有所出公之主也知是僭為之耳子伯季子初為孔氏臣新登于公注升為大夫請追之遇載祏者殺而乗其車注子伯殺載祏者許公為反祏注孔悝怪載祏者久不來使公為反逆之音義許公為如字人姓名反本亦作返音同遇之曰與不仁人爭明無不勝注不仁人謂子伯季子也明無不勝言必勝音義爭爭鬭之爭必使先射射三發皆遠許為許為射之殪注傳言子伯不仁所以死也音義射食亦反下同發如字一音廢逺于萬反殪於計反或以其車從注從公為音義從才用反又如字注同得祏於槖中孔悝出奔宋音義槖音託楚大子建之遇讒也自城父奔宋注在昭十九年音義城父音甫又辟華氏之亂於鄭注在昭二十年音義華戸化反鄭人甚善之又適晉與晉人謀襲鄭乃求復焉鄭人復之如初晉人使諜於子木請行而期焉注請行襲鄭之期子木即建也音義諜徒協反子木暴虐於其私邑邑人訴之鄭人省之得晉諜焉遂殺子木其子曰勝在呉子西欲召之葉公曰吾聞勝也詐而亂無乃害乎注葉公子髙沈諸梁也音義葉始渉反子西曰吾聞勝也信而勇不為不利舍諸邊竟使衛藩焉注使為藩屏之衛音義竟音境下同藩方元反注同葉公曰周仁之謂信注周親也率義之謂勇注率行也吾聞勝也好復言注言之所許必欲復行之不顧道理音義好呼報反而求死士殆有私乎注私謀復讐復言非信也期死非勇也注期必也子必悔之弗從召之使處呉竟為白公注白楚邑也汝隂褒信縣西南有白亭請伐鄭子西曰楚未節也注言楚國雖復政令猶未得節制不然吾不忘也他日又請許之未起師晉人伐鄭楚救之與之盟勝怒曰鄭人在此讐不遠矣注比子西於鄭人勝自厲劒子期之子平見之曰王孫何自厲也曰勝以直聞不告女庸為直乎將以殺爾父平以告子西子西曰勝如卵余翼而長之注以鳥為喻音義女音汝卵來管反長丁丈反楚國第注用士之次第音義第大細反我死令尹司馬非勝而誰勝聞之曰令尹之狂也得死乃非我注言我必殺之若得自死我乃不復成人音義復扶又反子西不悛勝謂石乞注石乞勝之徒音義悛七全反曰王與二卿士注二卿士子西子期皆五百人當之則可矣乞曰不可得也注五百人不可得曰市南有熊宜僚者若得之可以當五百人矣乃從白公而見之與之言説告之故辭注告欲作亂宜僚辭距之音義熊音雄宜僚者本或作熊相宜僚相息亮反説音悦承之以劒不動注按劒指其喉音義喉音侯勝曰不為利諂不為威惕不洩人言以求媚者去之音義不為于偽反下同諂勅檢反惕他歴反洩息列反又以制反疏正義曰白公告之知必許其爵位而宜僚辭是不為利而諂也承之以劒欲刺殺之而宜僚不動是不為威而懼也如此之人必不是漏洩人言以求媚者也言其必不洩已謀故舍而去之呉人伐愼白公敗之注汝隂慎縣也請以戰備獻注與呉戰之所得鎧杖兵器皆備而獻之欲因以為亂音義鎧苦代反杖直亮反疏正義曰服䖍云欲陳士卒甲兵如與呉戰時所入獻㨗杜以陳列甲兵士卒以入王宫人情所不許豈當時肯聽之故以為戰時所得鎧杖兵器皆備具獻之所得既多欲因獻用之以作亂許之遂作亂秋七月殺子西子期于朝而劫惠王子西以袂掩面而死注慙於葉公音義劫居業反袂彌世反子期曰昔者吾以力事君不可以弗終抉豫章以殺人而後死注以效其多力豫章大木音義抉鳥穴反石乞曰焚庫弑王不然不濟白公曰不可殺王不祥焚庫無聚將何以守矣乞曰有楚國而治其民以敬事神可以得祥且有聚矣何患弗從葉公在蔡注蔡遷州來楚并其地音義聚才住反下同方城之外皆曰可以入矣子高曰吾聞之以險徼幸者其求無饜偏重必離注險猶惡也所求無饜則不安譬如物偏重則離敗欲須其斃而討之音義徼古堯反饜於艷反聞其殺齊管脩也而後入注管脩楚賢大夫故齊管仲之後聞其殺賢知其可討白公欲以子閭為王注子閭平王子啟五辭王者子閭不可遂劫以兵子閭曰王孫若安靖楚國匡正王室而後庇焉啓之願也敢不聽從若將專利以傾王室不顧楚國有死不能注不能從音義庇必利反又音秘遂殺之而以王如高府注髙府楚别府石乞尹門注為門尹圉公陽穴宫負王以如昭夫人之宫注公陽楚大夫昭夫人王母越女音義圉魚吕反葉公亦至及北門或遇之曰君胡不胄國人望君如望慈父母焉盗賊之矢若傷君是絶民望也若之何不胄乃胄而進又遇一人曰君胡胄國人望君如望歲焉注歲年榖也音義胄直又反日月以幾注冀君來音義幾音冀本或作兾若見君面是得艾也注艾安也音義艾魚廢反一音五蓋反民知不死其亦夫有奮心猶將旌君以徇於國注旌表也音義夫方于反或音扶奮方問反旌音精徇似俊反而又掩面以絶民望不亦甚乎乃免胄而進注言葉公得民心遇箴尹固帥其屬將與白公注欲與白公并音義箴之林反子高曰微二子者楚不國矣注二子子西子期也柏舉之敗二子功多棄德從賊其可保乎乃從葉公使與國人以攻白公白公奔山而縊其徒微之注微匿也音義使與國人與羊汝反一夲作使興國人如字興謂興廢也縊一賜反微如字匿也爾雅云匿微也匿女力反疏注正義曰釋詁云匿微也舍人曰匿藏之微也郭璞曰微謂逃藏也左傳曰其徒微之是也生拘石乞而問白公之死焉對曰余知其死所而長者使余勿言注長者謂白公也音義拘音俱長丁丈反注同曰不言將烹乞曰此事克則為卿不克則烹固其所也何害乃烹石乞王孫燕奔頯黄氏注燕勝弟頯黄呉地音義烹普庚反燕烏賢反又烏練反頯求龜反舊求悲反諸梁兼二事注二事令尹司馬國寜注寜安也乃使寜為令尹注子西之子子國也使寛為司馬注子期之子而老於葉注傳終言之音義葉始涉反衛侯占夢嬖人注以能占夢見愛音義嬖必計反求酒於大叔僖子注僖子大叔遺音義大叔音泰不得與卜人比而告公曰君有大臣在西南隅弗去懼害注託占卜夢而言音義比毗志反去起吕反乃逐大叔遺遺奔晉衛侯謂渾良夫曰吾繼先君而不得其器若之何注國之寳器輙皆將去良夫代執火者而言注將密謀屏左右曰疾與亡者皆君之子也召之而擇材焉可也注召輙若不材器可得也注輙若不材可廢其身因得其器豎告大子注大子疾大子使五人輿豭從已劫公而强盟之注盟求必立已音義豭音加强其丈反且請殺良夫公曰其盟免三死注盟在十五年曰請三之後有罪殺之公曰諾哉傳十七年春衛侯為虎幄於藉圃注於藉田之圃新造幄幕皆以虎獸為餙音義幄於角反幕武博反成求令名者而與之始食焉大子請使良夫注以良夫應為令名音義成絶句求令名者絶句應應對之應良夫乗衷甸兩牡注衷甸一轅卿車音義乘衷甸時證反説文作佃云中也春秋乗中佃一轅車也牡茂后反疏注正義曰甸即乘也四丘為甸出車一乘故以甸為名是古者乘甸同也衛侯本許良夫服冕乘軒則衛侯既入良夫為大夫矣傳特言乘衷甸兩牡則良夫不合乗之故知為卿車也兵車一轅而二馬夾之其外更有二驂是為四馬今止乘兩牡而謂之衷乘者衷中也蓋以四馬為上乘兩馬為中乘大事駕四小事駕二為等差故也知大事駕四者異義古毛詩説天子之大夫皆駕四故詩云四牡騑騑周道倭遲是也如今乘輿有大駕中駕小駕為行之等差也其諸侯大夫士唯駕二無四二十七年陳成子以乘車兩馬賜顔涿聚之子士喪禮云􅈖以兩馬是唯得駕兩無上乗也下文大子數之三罪衷甸不在其數而傳言之者積其奢僭多也紫衣狐裘注紫衣君服疏注正義曰賈逵云然杜從之紫衣為君服禮無明文要此云紫衣言良夫不合服之玉藻云𤣥冠紫緌自魯桓公始也鄭𤣥云蓋僭宋王者之後服也管子稱齊桓好服紫衣齊人尚之五素而易一紫孔子云惡紫之奪朱蓋當時人主好服紫衣君既服紫則臣不得僭今傳言紫衣為良夫之罪明紫是君服良夫僭之故言紫衣君服也大夫狐裘非僭言之者為袒裘張本至袒裘不釋劒而食注食而熱故偏袒亦不敬音義袒音但疏注正義曰禮裘上有衣謂之裼玉藻云君衣狐白裘錦衣以裼之如此之類皆是裘上之裼衣也裼衣之上乃有朝祭正服裘上有兩衣也如此兩衣襲則二衣皆重之裼則袒正服露裼衣玉藻云裘之裼也見美也君在則裼盡餙也服之襲也充美也然則在君之所於法唯有露裼衣耳無露裘之時今良夫為食熱之故偏袒其裘則并裘亦袒是不敬也劒是害物之器不得近至尊故近君則解劒良夫與君食而不釋劒亦不敬也大子使牽以退數之以三罪而殺之注三罪紫衣袒裘帶劒疏正義曰三者皆偪僭於君故以此為三罪衷甸僭卿耳比此為輕知衷甸非也三月越子伐呉呉子禦之笠澤夾水而陳越子為左右句卒注句卒鉤伍相著别為左右屯音義禦魚吕反下同笠音立夾居恰反陳直覲反句古侯反注同卒子忽反注及下注同著直略反使夜或左或右鼓譟而進呉師分以御之越子以三軍潛涉當呉中軍而鼓之呉師大亂遂敗之注左右句卒為聲勢以分呉軍而三軍精卒并力擊其中軍故得勝也音義譟素報反并如字又必政反晉趙鞅使告于衛曰君之在晉也志父為主請君若大子來以免志父不然寡君其曰志父之為也注恐晉君為志父敎使不來衛侯辭以難大子又使㭬之注㭬訴父欲速得其處音義難乃旦反㭬中角反處昌慮反夏六月趙鞅圍衛齊國觀陳瓘救衛注國觀國書之子音義觀工喚反下陳瓘音同得晉人之致師者子玉使服而見之注釋囚服服其本服曰國子實執齊柄而命瓘曰無辟晉師豈敢廢命注欲必敵晉音義柄彼命反子又何辱注言不須來致師自將徃戰簡子曰我卜伐衛未卜與齊戰乃還注畏子玉楚白公之亂陳人恃其聚而侵楚注聚積聚也音義聚才住反注及下注邑聚同積子賜反楚既寜將取陳麥楚子問帥於大師子榖與葉公諸梁子榖曰右領差車與左史老皆相令尹司馬以伐陳其可使也注言此二人皆嘗輔相子西子期伐陳今復可使音義帥所類反相息亮反注及下而相國并注同復扶又反子高曰率賤民慢之懼不用命焉注右領左史皆楚賤官音義率所類反本又作帥下同子榖曰觀丁父鄀俘也武王以為軍率注楚武王音義鄀音若俘芳扶反是以克州蓼服隨唐大啓羣蠻彭仲爽申俘也文王以為令尹實縣申息注楚文王滅申息以為縣音義蓼本又作鄝音了朝陳蔡封畛於汝注開封畛北至汝水音義畛之忍反一音貞唯其任也何賤之有子高曰天命不慆注慆疑也音義慆本又作滔徒刀反令尹有憾於陳注十五年子西伐呉陳使貞子弔呉以此為恨音義憾本又作感戸暗反天若亡之其必令尹之子是與君盍舍焉注舍右領與左史音義盍戸臘反舍音捨又音赦注同臣懼右領與左史有二俘之賤而無其令徳也王卜之武城尹吉注武城尹子西子公孫朝音義朝如字使帥師取陳麥陳人御之敗遂圍陳秋七月己卯楚公孫朝帥師滅陳注終鄭裨竈言歲五及鶉火陳卒亡音義鶉音純王與葉公枚卜子良以為令尹注枚卜不斥言所卜以令龜子良惠王弟音義枚亡杯反沈尹朱曰吉過於其志注志望也葉公曰王子而相國過將何為注過相將為王也他日改卜子國而使為令尹注子國寜也衛侯夢于北宫見人登昆吾之觀注衛有觀在於昆吾氏之虚今濮陽城中音義觀音工喚反注同虛去魚反下文同濮音卜被髮北面而譟曰登此昆吾之虛緜緜生之瓜注緜緜瓜初生也良夫善已有以小成大之功若瓜之初生謂使衛侯得國音義被皮義反瓜古華反疏正義曰北宫衛侯之别宫於是衛侯在南宫夢裏身在北宫見人登昆吾之觀被髮北面而譟北宫在昆吾觀北故此人北面向君而呌譟也余為渾良夫呌天無辜注本盟當免三死而并數一時之事為三罪殺之故自謂無辜音義并必政反數所主反公親筮之胥彌赦占之注赦衛筮史曰不害與之邑寘之而逃奔宋注言衛侯無道卜人不敢以實對懼難而逃也音義難乃旦反下文而難作同衛侯貞卜注正卜夢之吉凶其繇曰如魚竀尾注竀赤色魚勞則尾赤音義繇直又反竀勑呈反衡流而方羊裔焉注横流方羊不能自安裔水邊言衛侯將若此魚音義衡華盲反又如字方蒲郎反注同裔以制反大國滅之將亡闔門塞竇乃自後踰注此皆繇辭音義闔戸臘反竇音豆疏正義曰杜以魚勞則尾赤方羊不能自安裔焉謂魚至水邊以喻衛侯將如此是賈逵之説杜用之也鄭衆以為魚勞則尾赤方羊遊戱喻衛侯淫縱杜不然者以此魚喻衛侯詩云魴魚頳尾王室如燬魚勞則尾赤以勞苦之魚比喻衛侯則方羊為勞苦之狀若其方羊是縱恣之狀何得比勞苦之魚也劉炫以為卜繇之辭文句相韻以裔焉二字宜向下讀之知不然者詩之為體文皆韻句其語助之辭皆在韻句之下即齊詩云俟我於著乎而充耳以素乎而其王詩云君子陽陽左執簧其樂只且之類是也此之方羊與下句將亡自相為韻裔焉二字為助句之辭上繇辭之例未必皆韻此云闔門塞竇乃自後踰不與將亡為韻又一薰一蕕十年尚猶有臭不與攘公之揄為韻是或韻或不韻理無定準劉以為裔焉大國謂土地遠焉之大國近不辭矣又以方羊為縱恣之狀而規杜過非也冬十月晉復伐衛注春伐未得志故音義復扶又反入其郛將入城簡子曰止叔向有言曰怙亂滅國者無後注不欲乘人之衰音義向許丈反怙音戸衛人出莊公而與晉平晉立襄公之孫般師而還十一月衛侯自鄄入般師出注辟蒯聵也音義般音班下同鄄音絹初公登城以望見戎州注戎州戎邑問之以告公曰我姬姓也何戎之有焉注言姬姓國何故有戎邑翦之注削壊其邑聚公使匠久注久不休息公欲逐石圃注石圃衛卿石惡從子音義從才用反未及而難作辛巳石圃因匠氏攻公公闔門而請弗許踰于北方而隊折股注終如卜言乃自後踰音義隊直類反折之設反股音古戎州人攻之大子疾公子青踰從公注青疾弟戎州人殺之公入于戎州已氏注已氏戎人姓音義已音紀又音杞初公自城上見已氏之妻髮美使髠之以為吕姜髢注吕姜莊公夫人髢髲也音義髠苦存反髢大計反又庭計反髲皮義反既入焉而示之璧曰活我吾與女璧己氏曰殺女璧其焉徃遂殺之而取其璧衛人復公孫般師而立之十二月齊人伐衛衛人請平立公子起注起靈公子音義女音汝下同其焉於䖍反執般師以歸舍諸潞注潞齊邑音義潞音路公㑹齊侯盟于蒙注齊侯簡公弟平公敖也蒙在東莞蒙隂縣西故蒙隂城也音義平公敖如字一本作鷔五報反又五刀反莞音管孟武伯相齊侯稽首公拜齊人怒武伯曰非天子寡君無所稽首武伯問於高柴曰諸侯盟誰執牛耳注執牛耳尸盟者音義相息亮反季羔曰鄫衍之役呉公子姑曹注季羔髙柴也鄫衍在七年音義衍以善反發陽之役衛石魋注發陽鄖地在十二年石魋石曼姑之子音義魋徒回反鄖音云曼音萬武伯曰然則彘也注彘武伯名也鄫衍則大國執發陽則小國執據時執者無常故武伯自以為可執音義彘直例反疏注正義曰依禮小國執牛耳武伯得季羔之言以鄫衍則大國執發陽則小國執小國執之既合古典武伯自以魯是小國故云然則彘也杜以傳有小國大國之執故云據時執者無常劉炫以為小國恒執牛耳何得云執者無常若如劉意季羔直舉發陽何須云鄫衍之役呉公子姑曹横規杜過非也宋皇瑗之子麇注瑗宋右師音義瑗于眷反麇九倫反有友曰田丙而奪其兄劖般邑以與之劖般愠而行告桓司馬之臣子儀克注克在下邑不與魋亂故在音義劖仕咸反愠紆問反怒也不與音預子儀克適宋告夫人曰麇將納桓氏公問諸子仲注子仲皇野初子仲將以杞姒之子非我為子注為適子杞姒子仲妻音義姒音似適子丁歴反麇曰必立伯也注伯非我兄是良材子仲怒弗從故對曰右師則老矣不識麇也注言右師老不能為亂麇則不可知公執之注執麇皇瑗奔晉召之注召令還音義令力呈反傳十八年春宋殺皇瑗公聞其情復皇氏之族使皇緩為右師注言宋景公無常也緩瑗從子音義緩戸管反從才用反疏注正義曰世族譜瑗皇父充石八世孫緩充石十世孫則為從孫非從子二者必有一誤巴人伐楚圍鄾注鄾楚邑音義鄾音憂初右司馬子國之卜也觀瞻曰如志注子國未為令尹時卜為右司馬得吉兆如其志觀瞻楚開卜大夫觀從之後故命之注命以為右司馬及巴師至將卜帥王曰寜如志何卜焉注寜子國也音義帥所類反使帥師而行請承注承佐王曰寢尹工尹勤先君者也注柏舉之後寢尹呉由于以背受戈工尹固執燧象奔呉師皆為先君勤勞音義燧音遂為于偽反三月楚公孫寜呉由于薳固敗巴師于鄾故封子國於析君子曰惠王知志注知用其意音義薳于委反析星歴反夏書曰官占唯能蔽志昆命于元龜注逸書也官占卜筮之官蔽斷也昆後也言當先斷意後用龜也音義蔽必世反斷也注同尚書能作克克亦能也昆命于元龜本依尚書斷丁亂反下同疏正義曰夏書大禹謨之篇也唯彼能作先耳唯先蔽志昆命于元龜孔安國云帝王立卜占之官故曰官占蔽斷昆後也官占之法先斷人志後命于元龜言志定然後卜筮杜雖不見古文其解亦與孔合周禮謂斷獄為蔽獄是蔽為斷也昆後也釋言文其是之謂乎志曰聖人不煩卜筮惠王其有焉注不疑故不卜也夏衛石圃逐其君起起奔齊注齊所立故衛侯輙自齊復歸逐石圃而復石魋與大叔遺注皆蒯聵所逐傳十九年春越人侵楚以誤呉也注誤呉使不為備夏楚公子慶公孫寛追越師至㝠不及乃還注㝠越地音義㝠亡丁反秋楚沈諸梁伐東夷注報越三夷男女及楚師盟于敖注從越之夷三種敖東夷地音義敖五刀反種章勇反冬叔青如京師敬王崩故也注言敬王能終其世終萇𢎞言東王必大克叔青叔還子音義敬王崩故也案傳敬王崩在此年世本亦爾世族譜云敬王四十二年崩敬王子元王十年春秋之傳終矣據此則敬王崩當在哀公十七年史記周本紀及十二諸侯年表敬王四十二年崩子元王仁立則敬王是魯哀十二年崩也六國年表起自元王及本紀皆云元王八年崩子定王介立定王元年是魯哀公之二十七年與杜預世族譜為異又世本云魯哀公二十年是定王介崩子元王赤立則定王之崩年是魯哀二十七年也衆説不同未詳其正也疏注正義曰自十六年以來經文已終傳無所解當時之事亦不書記所記者為終竟前事叔青如周計不應録為終萇𢎞之言故録之耳萇𢎞言在昭二十三年此叔青如京師自為敬王崩未知敬王何年崩也史記十二諸侯年表敬王四十一年孔子卒四十三年敬王崩則敬王崩在他年也周本紀云敬王崩子元王立八年崩子定王立六國年表定王元年左傳盡此則傳以定王元年終矣杜世族譜云敬王三十九年魯哀公十四年獲麟之歲也四十二年而敬王崩敬王子元王十年春秋之傳終矣與史記不同者但史記世代年月事多舛錯故班固以文多牴牾謂此類也案世本敬王崩貞王介立貞王崩元王赤立宋忠注引太史公書云元王仁生貞王介與世本不相應不知誰是則宋忠不能定也又帝王世紀敬王三十九年春秋已終四十四年敬王崩子貞定王立貞定王崩子元王立是世本與史記參差不同良以書籍久逺事多紕繆故杜違史記亦何怪焉劉炫以杜與史記不同而規其過未知劉意能定與否傳二十年春齊人來徴㑹夏會于廩丘為鄭故謀伐晉注十五年晉伐鄭音義廩力甚反為于僞反下為降同鄭人辭諸侯秋師還注終叔向言晉公室卑呉公子慶忌驟諫呉子曰不改必亡弗聽注呉子弗聽出居于艾注艾呉邑豫章有艾縣音義艾五蓋反遂適楚聞越將伐呉冬請歸平越遂歸欲除不忠者以説于越呉人殺之注言其不量力音義説如字又音悦十一月越圍呉趙孟降於喪食注趙孟襄子無恤時有父簡子之喪楚隆曰三年之喪親䁥之極也主又降之無乃有故乎注楚隆襄子家臣音義䁥女乙反趙孟曰黄池之役先主與呉王有質注黄池在十三年先主簡子質盟信也音義質如字曰好惡同之今越圍呉嗣子不廢舊業而敵之注嗣子襄子自謂欲敵越救呉非晉之所能及也吾是以為降楚隆曰若使呉王知之若何趙孟曰可乎隆曰請嘗之注嘗試也乃徃先造于越軍曰呉犯間上國多矣聞君親討焉諸夏之人莫不欣喜唯恐君之志不從請入視之許之告于呉王曰寡君之老無恤使陪臣隆敢展謝其不共注展陳也音義造之到反間間側之間夏戸雅反共音恭黄池之役君之先臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡人不佞不能事越以為大夫憂拜命之辱與之一簞珠注簞小笥音義難乃旦反簞音丹笥終嗣反疏注正義曰鄭𤣥曲禮注云簞笥盛飯食者圓曰簞方曰笥宣二年趙盾見餓人為之簞食注云簞笥也不言小此言小笥者以盛珠之器不宜與盛飯器同故云小耳使問趙孟注問遺也音義遺唯季反曰句踐將生憂寡人寡人死之不得矣王曰溺人必笑吾將有問也注以自喻所問不急猶溺人不知所為而反笑音義句古侯反溺乃歴反史黯何以為君子注晉史黯云不及四十年呉當亡呉王感問此也音義黯於減反對曰黯也進不見惡注時行則行退無謗言注時止則止音義謗博浪反疏正義曰為時所用進在朝廷言行無愆不見怨惡言人無惡之者時所不用退歸私室則無誹謗之言故得君子之名也杜解進退之由由時可行則行故有進時可止則止故有退時易艮彖曰艮止也時止則止時行則行動靜不失其時其道光明言史黯行如此也王曰宜哉傳二十一年夏五月越人始來注越人勝呉欲霸中國始遣使適魯音義使所吏反秋八月公及齊侯邾子盟于顧齊人責稽首注責十七年齊侯為公稽首不見答顧齊地音義為于偽反年末及注同因歌之曰魯人之臯數年不覺使我高蹈注臯緩也髙蹈猶逺行也言魯人臯緩數年不知答齊稽首故使我高蹈來為此㑹音義臯古刀反數所主反注同覺音角又古孝反蹈徒報反疏注正義曰士喪禮始死復魂之辭云臯某復鄭𤣥云臯長聲也臯者緩聲而長引之是臯為緩也高蹈高舉足而蹈地故言猶逺行也此盟于顧顧是齊地行不出竟而言逺者止為魯不稽首而為此㑹雖近猶恨故以逺言之耳唯其儒書以為二國憂注二國齊邾也言魯據周禮不肯答稽首令齊邾逺至音義令力呈反是行也公先至于陽榖注先期至也音義先悉薦反齊閭丘息曰君辱舉玉趾以在寡君之軍注息閭丘明之後羣臣將傳遽以告寡君比其復也君無乃勤為僕人之未次注次舍也音義傳中戀反遽其據反比必利反請除館於舟道注舟道齊地辭曰敢勤僕人注不敢勤齊僕為魯除館傳二十二年夏四月邾隠公自齊奔越曰呉為無道執父立子越人歸之大子革奔越注邾隱公八年為呉所囚十年奔齊疏正義曰革為邾君十餘年矣仍稱為大子者承其父歸之下故繫父言之冬十一月丁卯越滅呉請使呉王居甬東注甬東越地會稽句章縣東海中洲也音義甬音勇㑹古外反稽古兮反句九具反如淳音拘韋昭亦音怐洲音州水中可居曰洲辭曰孤老矣焉能事君乃縊越人以歸注以其尸歸終史墨子胥之言也音義焉於䖍反縊一賜反疏正義曰呉語説此事云越師入呉國圍王宫呉王懼使人行成越王曰昔天以越賜呉而呉不受今天以呉賜越孤敢不聽天之命而聽君之命乎乃不許成因使告呉王曰以民生之不長王其無死寡人其逹王於甬句東夫婦三百唯王所安以没王年夫差辭曰孤之身實失宗廟社稷凡呉土地人民越既有之孤何以視於天下夫差將死使人告於子胥曰使死者無知則已矣若有知也吾其何面目以見員也遂自殺傳二十三年春宋景曹卒注景曹宋元公夫人小邾女季桓子外祖母疏注正義曰宋景曹者宋景公之母姓曹氏也昭二十五年傳云季公若之娣為小邾夫人生宋元夫人生子以妻季平子此曹是平子之妻母故為桓子外祖母也今康子是桓子之子父之外祖母卒故使冉有弔且送葬婦人多以姓繫夫此以景公見在遣弔景公故繫其子小邾姓曹故稱景曹季康子使冉有弔且送葬曰敝邑有社稷之事使肥與有職競焉注肥康子名競遽也音義與音預是以不得助執紼使求從輿人注求冉有名輿衆也音義紼音弗輿音餘曰以肥之得備彌甥也注彌逺也康子父之舅氏故稱彌甥疏注正義曰彌者増益之義故為逺也釋親云母之昆弟為舅謂我舅者吾謂之甥季桓子為景公之甥景公為康子父之舅氏也桓子於景公為親甥故康子致辭於景公自以為彌逺之甥有不腆先人之産馬使求薦諸夫人之宰注薦進也音義薦進典反其可以稱旌繁乎注稱舉也繁馬飾繁纓也終樂祁之言政在季氏音義繁步干反注同夏六月晉荀瑤伐齊注荀瑶荀躒之孫知伯襄子音義知音智高無㔻帥師御之知伯視齊師馬駭遂驅之曰齊人知余旗其謂余畏而反也及壘而還將戰長武子請卜注武子晉大夫音義御魚吕反壘力軌反知伯曰君告于天子而卜之以守龜於宗祧吉矣吾又何卜焉且齊人取我英丘君命瑤非敢耀武也治英丘也注治齊取英丘音義守手又反祧他彫反以辭伐罪足矣何必卜壬辰戰于犂丘注犂丘隰也音義隰音習本亦作濕齊師敗績知伯禽顔庚注顔庚齊大夫顔􅃰聚音義􅃰丁角反秋八月叔青如越始使越也越諸鞅來聘報叔青也音義始使所吏反傳二十四年夏四月晉侯將伐齊使來乞師曰昔臧文仲以楚師伐齊取榖注在僖二十六年宣叔以晉師伐齊取汶陽注在成二年音義汶音問寡君欲徼福於周公願乞靈於臧氏注以臧氏世勝齊故欲乞其威靈音義徼古堯反臧石帥師㑹之取廩丘注石臧賔如之子軍吏令繕將進注晉軍吏也繕治戰備音義繕市戰反萊章曰君卑政暴注萊章齊大夫音義萊音來徃嵗克敵注禽顔庚也今又勝都注取廩丘天奉多矣又焉能進是㦣言也注㦣過也音義奉扶用反焉於䖍反㦣戸快反謂過謬之言服云偽不信言也字林作㦣云夢言意不慧也音于例反疏注正義曰服䖍云㦣偽不信也杜云㦣過謬言也俱是不實之義各自以意訓也役將班矣晉師乃還餼臧石牛注生曰餼音義餼許器反大史謝之注晉大史音義大音㤗注同曰以寡君之在行注在軍行間牢禮不度注不如禮度敢展謝之注終臧氏有後於魯邾子又無道越人執之以歸注終子贛之言而立公子何何亦無道注何大子革弟公子荆之母嬖注荆哀公庶子音義嬖必計反將以為夫人使宗人釁夏獻其禮注宗人禮官也音義釁許靳反夏戸雅反對曰無之公怒曰女為宗司立夫人國之大禮也何故無之對曰周公及武公娶於薛注武公敖也音義女音汝娶七住反下同孝惠娶於商注孝公稱惠公弗皇商宋也音義孝惠娶於商定公名宋是哀公之父故釁夏為諱而稱商也稱尺證反又如字自桓以下娶於齊注桓公始娶文姜此禮也則有若以妾為夫人則固無其禮也公卒立之而以荆為大子國人始惡之注惡公音義惡烏路反注同閏月公如越得大子適郢注適郢越王大子得相親説也音義郢以井反適郢越王句踐大子名説音悦將妻公而多與之地公孫有山使告于季孫季孫懼使因大宰嚭而納賂焉乃止注嚭故呉臣也季孫恐公因越討已故懼音義妻七計反嚭普美反賂音路傳二十五年夏五月庚辰衛侯出奔宋注衛侯輙也疏正義曰服䖍云此下但有適城鉏以鉤越無奔宋之事其説未聞今杜云城鉏近宋邑蓋衛侯出近宋境似欲奔宋衛人以奔宋告也衛侯為靈臺于藉圃與諸大夫飲酒焉禇師聲子韤而登席注古者見君解韤音義圃布五反禇張吕反韤戸伐反足衣也見賢遍反公怒辭曰臣有疾異於人注足有創疾音義創初羊反若見之君將之注嘔吐也音義許角反又許各反嘔於口反吐他故反是以不敢注不敢解公愈怒大夫辭之不可注共辭謝公公不可解禇師出公㦸其手注抵徙手屈肘如㦸形音義抵音紙肘女九反曰必斷而足聞之褚師與司宼亥乘曰今日幸而後亡注恐死以得亡為幸音義斷丁管反乘時證反公之入也奪南氏邑注南氏子南之子公孫彌牟而奪司寇亥政公使侍人納公文懿子之車于池注懿子公文要公有忿使人投其車于池水中音義要一遙反初衛人翦夏丁氏注在十一年音義夏戸雅反以其帑賜彭封彌子注彭封彌子彌子瑕音義帑音奴彌子飲公酒納夏戊之女嬖以為夫人其弟期大叔疾之從孫甥也注期夏戊之子姊妹之孫為從孫甥與孫同列音義飲於鴆反大音㤗從如字又才用反注同疏注正義曰期是夏戊之子戊是大叔疾之甥期為大叔疾姊妹之孫也姊妹之子為甥姊妹之孫與已之孫尊卑同列男子謂兄弟之孫為從孫故謂姊妹之孫為從孫甥少畜於公以為司徒夫人寵衰期得罪公使三匠久公使優狡盟拳彌注優狡俳優也拳彌衛大夫使俳優盟之欲恥辱也音義少詩照反優音憂狡古卯反拳音權俳皮皆反而甚近信之故褚師比注韤登席者音義近附近之近下注皆同公孫彌牟注喪邑者音義䘮息浪反公文要注失車者司宼亥注奪政者司徒期因三匠與拳彌以作亂皆執利兵無者執斤注斤工匠所執使拳彌入于公宫注信近之故得入而自大子疾之宫譟以攻公鄄子士請禦之注鄄子士衛大夫音義譟素報反鄄音絹禦魚吕反後倣此彌援其手曰子則勇矣將若君何注言不可救音義援音袁不見先君乎君何所不逞欲注先君蒯瞶也亂不速奔故為戎州所殺欲令早去音義令力呈反且君嘗在外矣豈必不反當今不可衆怒難犯休而易間也乃出將適蒲注蒲近晉邑音義易以豉反間間厠之間下注内間為君間皆同彌曰晉無信不可將適鄄注鄄齊晉界上邑彌詐不知謀故公信之彌曰齊晉爭我不可將適泠注泠近魯邑音義泠力丁反彌曰魯不足與請適城鉏注城鉏近宋邑音義鉏仕居反以鉤越越有君注宋南近越轉相鉤牽音義鉤古侯反一本或作拘同注同乃適城鉏彌曰衛盗不可知也請速自我始乃載寳以歸注欺衛君言君以寳自隨將致衛盗請速行已為先發而同載寶歸衛也公為支離之卒注支離陳名音義卒子忽反陳直覲反因祝史揮以侵衛注揮衛祝史音義揮音暉衛人病之懿子知之注知揮為内間見子之注子之公孫彌牟文子也請逐揮文子曰無罪懿子曰彼好專利而妄注妄不法音義好呼報反夫見君之入也將先道焉注若見君有入勢必道助之音義道音導注下同若逐之必出於南門而適君所注雖知其為君間不審察故私評之音義評音平又音病夫越新得諸侯將必請師焉揮在朝使吏遣諸其室注難面逐之先逐其家音義難乃旦反揮出信弗内注再宿為信音義内如字又音納五日乃館諸外里注外里公所在遂有寵使如越請師注請師伐衛求入六月公至自越注前年行今還季康子孟武伯逆於五梧注魯南鄙也音義梧音吾郭重僕注為公僕音義重直龍反又直用反見二子曰惡言多矣君請盡之注二子不臣之言甚多欲使公盡極以觀之公宴於五梧武伯為祝注祝上壽酒音義祝之六反又之又反上時掌反壽音授又音受惡郭重曰何肥也注訾毁其貌音義惡烏路反訾音紫季孫曰請飲彘也注飲罰也音義飲於鴆反注同以魯國之密邇仇讐臣是以不獲從君克免於大行又謂重也肥注言重隨君逺行劬勞不宜稱肥音義從才用反又如字劬奚俱反公曰是食言多矣能無肥乎注以激三桓之數食言音義激古歴反數所角反飲酒不樂公與大夫始有惡注為二十七年公孫邾起音義樂音洛孫音遜本又作遜傳二十六年夏五月叔孫舒帥師會越臯如后庸宋樂茷納衛侯注舒武叔之子文子也臯如后庸越大夫樂茷宋司城子納衛侯輙也音義茷扶廢反文子欲納之懿子曰君愎而虐少待之必毒於民注愎狠也音義愎皮逼反狠胡懇反乃睦於子矣衛師侵外州大獲注越納輙之師出禦之大敗注衛師敗掘褚師定子之墓焚之于平莊之上注定子褚師比之父也平莊陵名也音義掘具勿反又具月反本或作猾胡忽反文子使王孫齊私於臯如注齊衛大夫王孫賈之子昭子也曰子將大滅衛乎抑納君而已乎臯如曰寡君之命無他納衛君而已文子致衆而問焉曰君以蠻夷伐國國幾亡矣請納之衆曰勿納曰彌牟亡而有益請自北門出注欲以觀衆心音義幾音畿又音機衆曰勿出重賂越人申開守陴而納公注申重也開重門而嚴設守備欲以恐公使不敢入音義陴毗支反重直龍反下同守手又反恐丘勇反公不敢入師還立悼公注悼公蒯聵庶弟公子黚也音義黚低亷反疏注正義曰衛世家謂輙為出公季父黚殺出公子而自立是為悼公南氏相之以城鉏與越人公曰期則為此注司徒期也音義相息亮反疏正義曰衛侯先居城鉏以兵侵衛衛人申開守陴衛侯不敢入退還城鉏衛人得以城鉏與越者衛人賂遺於越故公所在亦以與之令苟有怨於夫人者報之注夫人期姊也怒期而不得加戮故勑宫女令苦困期姊音義令力呈反注同司徒期聘於越注為悼君聘音義為于偽反公攻而奪之幣期告王注越王也王命取之期以衆取之公怒殺期之甥之為大子者注忿期而及其姊為夫人者遂復及夫人之子音義復扶又反遂卒于越注終言之也終效夷言死于夷宋景公無子取公孫周之子得與啓畜諸公宫注周元公孫子高也得昭公也啓得弟畜養也疏注正義曰宋世家云景公卒公子得殺大子而自立是為昭公昭公者元公之曽孫也昭公父元公孫糾糾父公子褍秦褍秦即元公小子也景公殺昭公父糾故昭公怨賊殺大子而自立其説昭公得立之所由與此不合亦以得為昭公也未有立焉於是皇緩為右師皇非我為大司馬皇懐為司徒注皇懐非我從昆弟音義從才用反靈不緩為左師注不緩子靈圍龜之後樂茷為司城注茷樂溷之子音義溷戸門反又戸困反樂朱鉏為大司宼注朱鉏樂輓之子音義鉏仕居反輓音晚六卿三族降聽政注三族皇靈樂也降和同也因大尹以逹注大尹近官有寵者六卿因之以自通逹於君大尹常不告而以其欲稱君命以令注不告君也國人惡之司城欲去大尹左師曰縱之使盈其罪注盈滿也音義惡烏路反下注惡其同去起吕反重而無基能無敝乎注言勢重而無德以為基必敝也冬十月公遊于空澤注空澤宋邑辛巳卒于連中注連中館名音義連如字又音輦大尹興空澤之士千甲注甲士千人音義興如字興發也或作輿字非奉公自空桐入如沃宫注奉公尸也梁國虞縣東南有地名空桐沃宫宋都内宫名音義沃烏毒反使召六子曰聞下有師君請六子畫注畫計策音義畫音獲六子至以甲劫之曰君有疾病請二三子盟乃盟于少寢之庭曰無為公室不利大尹立啓奉喪殯于大宫三日而後國人知之司城茷使宣言于國曰大尹惑蠱其君而專其利令君無疾而死死又匿之是無他矣大尹之罪也注言大尹所弑音義劫居業反少詩照反下注同大宫音泰蠱音古匿女力反弑音申志反得夢啓北首而寢於盧門之外注盧門宋東門北首死象在門外失國也音義首手又反注同疏注正義曰禮運云死者北首生者南鄉故以北首為死象已為鳥而集於其上咮加於南門尾加於桐門曰余夢美必立注桐門北門音義咮張又反鳥口大尹謀曰我不在盟注少寢盟但以君命盟六卿大尹不盟無乃逐我復盟之乎使祝為載書六子在唐盂注地名音義復扶又反盂音于將盟之祝襄以載書告皇非我注襄祝名皇非我因子潞注子潞樂茷音義潞音路門尹得注樂得左師謀曰民與我逐之乎皆歸授甲使狥于國曰大尹惑蠱其君以陵虐公室與我者救君者也衆曰與之大尹狥曰戴氏皇氏將不利公室注戴氏即樂氏音義狥似俊反與我者無憂不富衆曰無别注惡其號令與君無别音義别彼列反注同戴氏皇氏欲伐公注公謂啓樂得曰不可彼以陵公有罪我伐公則甚焉使國人施于大尹注施罪於大尹大尹奉啓以奔楚乃立得司城為上卿盟曰三族共政無相害也衛出公自城鉏使以弓問子贛且曰吾其入乎子贛稽首受弓對曰臣不識也私於使者曰昔成公孫於陳注僖二十八年衛成公奔楚遂適陳音義使者所吏反孫音遜本亦作遜下注除孫字皆同甯武子孫莊子為宛濮之盟而君入注在魯僖二十八年音義􅑔乃定反宛於阮反濮音卜獻公孫於衛齊注在襄十四年子鮮子展為夷儀之盟而君入注在襄二十六年今君再在孫矣注謂十五年孫魯今又孫宋内不聞獻之親外不聞成之卿則賜不識所由入也詩曰無競惟人四方其訓之注詩周頌言無强惟得人也疏正義曰詩周頌烈文之篇戒飭言也無强乎惟得賢人也若得其人四方諸國皆順從之矣若得其人四方以為主注為主四方而國於何有傳二十七年春越子使后庸來聘且言邾田封于駘上注欲使魯還邾田封竟至駘上音義駘他來反又音臺竟音境二月盟于平陽注西平陽疏注正義曰宣八年城平陽此年盟于平陽土地名云宣八年平陽東平陽也㤗山有平陽縣此年平陽西平陽也高平有南平陽縣三子皆從注季康子叔孫文子孟武伯皆從后庸盟音義從如字注同從才用反非也康子病之注恥從蠻夷盟言及子贛曰若在此吾不及此夫注不及與越盟音義夫音扶武伯曰然何不召曰固將召之文子曰他日請念注言季孫不能用子贛臨難而思之音義難乃旦反夏四月己亥季康子卒公弔焉降禮注禮不備也言公之多妄音義妄亡亮反本又作忘下文放此晉荀瑤帥師伐鄭次于桐丘鄭駟𢎞請救于齊注𢎞駟歂子音義歂市專反齊師將興陳成子屬孤子三日朝注屬會死事者之子使朝三日以禮之音義屬音燭注同設乘車兩馬繫五邑焉注乘車兩馬大夫服又加之以五邑音義乘繩證反注及下皆同召顔􅃰聚之子晉曰隰之役而父死焉注隰役在二十三年音義􅃰中角反隰音習以國之多難未女恤也今君命女以是邑也服車而朝毋廢前勞乃救鄭及留舒違榖七里榖人不知注言其整也留舒齊地違去也音義難乃旦反女音汝下同毋音無及濮雨不涉注濮水自陳留酸棗縣傍河東北經濟隂至高平入濟音義傍浦浪反濟子禮反下同子思曰大國在敝邑之宇下是以告急今師不行恐無及也注子思國參音義參七南反成子衣製杖戈注製雨衣也音義子衣於既反製音制杖直亮反又音丈立於阪上馬不出者助之鞭之知伯聞之乃還注畏其得衆心音義阪音反一音扶版反曰我卜伐鄭不卜敵齊使謂成子曰大夫陳子陳之自出陳之不祀鄭之罪也注十七年楚獨滅陳非鄭之罪蓋知伯誣陳子故陳子怒謂其多陵人故寡君使瑤察陳衷焉注衷善也音義衷音中謂大夫其恤陳乎若利本之顚瑤何有焉注言陳滅於已無傷成子怒曰多陵人者皆不在知伯其能久乎中行文子告成子注文子荀寅此時奔在齊音義行戸郎反曰有自晉師告寅者將為輕車千乘以厭齊師之門則可盡也成子曰寡君命恒曰無及寡無畏衆雖過千乘敢辟之乎將以子之命告寡君注成子疑其有為晉之心也音義輕遣政反厭於甲反又音於輙反有為于偽反下為鄭同疏正義曰無陵侮寡少而横及之也文子曰吾乃今知所以亡注自恨已無知君子之謀也始衷終皆舉之而後入焉注謀一事則當慮此三變然後入而行之所謂君子三思音義三思息暫反疏正義曰君子之為謀也思其始思其中思其終三者盡無猜嫌皆可舉而行之然後設言以入於人焉今我三不知而入之不亦難乎注悔其言不可復公患三桓之侈也欲以諸侯去之注欲求諸侯師以逐三桓音義侈昌氏反又吕氏反去起吕反下而去同三桓亦患公之妄也故君臣多間注間隙也公游于陵阪遇孟武伯於孟氏之衢曰請有問於子余及死乎注問可得壽死否對曰臣無由知之三問卒辭不對公欲以越伐魯而去三桓秋八月甲戌公如公孫有陘氏注有陘氏即有山氏因孫於邾乃遂如越國人施公孫有山氏注以公從其家出故也終子贛之言君不没於魯音義因孫於邾音遜悼之四年晉荀瑤帥師圍鄭注悼公哀公之子寜也哀公出孫魯人立悼公疏注正義曰魯世家云哀公奔越國人迎哀公復歸卒於有山氏子寜立是為悼公傳稱國人施罪於有山氏不得復歸而卒於其家也馬遷妄爾未至鄭駟𢎞曰知伯愎而好勝早下之則可行也音義行去聲好呼報反早一本作蚤下戸嫁反乃先保南里以待之注保守也南里在城外知伯入南里門于桔柣之門鄭人俘酅魁壘注壘晉士音義桔戸吉反柣大結反俘芳夫反酅尸支反魁苦回反壘力軌反賂之以知政注欲使反為鄭閉其口而死將門注將攻鄭門知伯謂趙孟入之對曰主在此注主謂知伯也言主在此何不自入也知伯曰惡而無勇何以為子注惡貌醜也簡子舍適子而立襄子故知伯言其醜且無勇何以立為子音義適丁歴反疏注正義曰趙世家云孤布子卿見簡子簡子徧召諸子相之子卿曰無為將軍者簡子召子毋恤毋恤至子卿起曰此眞將軍矣簡子曰此其毋賤翟婢也奚道貴哉子卿曰天之所授雖賤必貴自是之後簡子盡召諸子與語毋恤最賢乃廢太子伯魯而以毋恤為太子對曰以能忍恥庶無害趙宗乎知伯不悛趙襄子由是惎知伯注惎毒也音義惎其冀反遂喪之知伯貪而愎故韓魏反而喪之注史記晉懿公之四年魯悼公之十四年知伯帥韓魏圍趙襄子於晉陽韓魏反與趙氏謀殺知伯於晉陽之下在春秋後二十七年音義喪息浪反疏注正義曰晉世家云定公三十三年孔子卒三十七年定公卒則晉定公以魯哀公二十年卒也又云定公卒子出公鑿立十七年出公奔齊則出公之奔在魯悼公之十年也又云出公既奔知伯立昭公曾孫驕為晉君是為哀公哀公之四年趙襄子韓康子魏桓公共殺知伯是殺知伯當魯悼公之十四年也又六國年表亦云晉哀公四年魯悼公十四年韓魏趙敗知伯於晉陽戰國策説此事云知伯帥韓康子魏桓子攻趙襄子於晉陽引汾水以灌之城不没者三版知伯行水魏桓子御車韓康子為右知伯曰吾今乃知水可以亡人之國汾水可以灌安邑絳水可以灌平陽安邑魏也平陽韓也魏桓子肘韓康子韓康子躡魏桓子之足其夜趙襄子使張孟談私於韓魏韓魏反與趙合遂殺知伯於晉陽之下而三分其地事在春秋獲麟之後二十七年春秋左傳注疏卷六十春秋左氏傳注疏卷六十考證傳召之使處呉竟為白公楚世家曰子西召勝於呉以為巢大夫號曰白公又伍子胥傳曰使勝守楚之邊邑傳他日又請許之未起師楚世家以白公請伐鄭為惠王六年事以楚救鄭為八年事傳市南有熊宜僚者林堯叟曰熊宜僚勇士也居於市之南傳大子又使椓之注㭬訴父欲速得其處訴監本訛作許今改正臣照按離騷衆女嫉余之蛾眉兮謡諑謂余以善滛即此㭬字之義並疑㭬字應從言旁傳國子實執齊柄臣召南按此時陳氏專齊久矣如此文所云則國氏尚為上卿但政權一歸陳氏耳高無㔻于十五年奔北燕于二十三年又帥師禦晉師則高氏亦仍為上卿矣傳楚公孫朝帥師滅陳注歲五及鶉火陳卒亡監本脱歲字又及字訛反今改正傳見人登昆吾之觀注今濮陽城中臣召南按後漢郡國志曰東郡濮陽古昆吾國傳衛石圃逐其君起起奔齊衛世家作石曼傳唯其儒書以為二國憂王應麟曰春秋之季已輕儒矣至戰國而淳于髠有賢者無益之譏秦昭王有儒無益之問末流極于李斯傳衛侯為靈臺於藉圃臣浩按藉圃即十七年莊公蒯聵為虎幄於藉圃者也傳取公孫周之子得與啓疏其説昭公得立之所由監本昭公上衍一殺字今删傳獻公孫於衛齊推尋文義衛字衍各本俱同傳子鮮子展為夷儀之盟而君入注在襄二十六年襄監本訛作僖今改正傳盟于平陽疏高平有南平陽縣臣召南按監本作高平南有平陽縣非也唐時無高平郡疏葢言晉時地也南平陽三字縣名至北齊始省今改正傳知伯曰注簡子舍適子而立襄子舍監本訛作奔適監本訛作敵今俱改正又疏趙世家云孤布子卿見簡子臣召南按史記本文作姑布子卿集解引司馬彪曰姑布姓子卿字則疏應作姑布也春秋左氏傳注疏卷六十考證
