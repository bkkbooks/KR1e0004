body:
  text: 春秋左傳注疏卷五十四起定公元年盡四年晉杜氏注唐陸徳明音義孔穎達疏定公音義陸曰定公名宋襄公之子昭公之弟諡法安民大慮曰定疏正義曰魯世家定公名宋襄公之子昭公之弟史傳不言其母不知誰所生也以敬王十一年卽位諡法安民大慮曰定經元年春王注公之始年而不書正月公卽位在六月故疏注正義曰凡新君初立必於歲首元日朝正於廟因卽改元正位百官以序國史因書於策云元年春王正月公卽位也其或國有事故不得行卽位之禮國史亦書元年春王正月見此月公應卽位而有故不得隱莊閔僖四公元年無事而空書春王正月其義也此年不書正月者公卽位在六月故也傳稱昭公喪及壊隤公子宋先入則正月之時定公猶從昭公之喪在於乾侯未入魯境國内無君不是卽位闕禮故不須書正月也釋例曰癸亥公之喪至自乾侯戊辰公卽位喪在外踰年乃入故因五日改殯之節國史用元年卽位之禮因以元年爲此年也然則正月之時未有公矣公未卽位元必不改而於春夏卽稱元年者公未卽位必未改元未改之日必乗前君之年於時春夏當名此年爲昭公三十三年及六月旣改之後方以元年紀事及史官定策須有一統不可半年從前半年從後雖則年初亦統此歲故入年卽稱元年也漢魏以来雖於秋冬改元史於春夏卽以元年冠之是有因於古也三月晉人執宋仲幾于京師注晉執人于天子之側而不以歸京師故但書其執不書所歸音義幾音機疏注正義曰晉執仲幾傳無日月據經所書是三月始執案傳則不然也傳稱辛巳合諸侯之大夫于狄泉長歴推辛巳是正月七日也旣㑹而魏舒始卒庚寅栽是正月十六日也宋仲幾不受功當於栽時不肯役耳士彌牟云晉之從政者新是士鞅已代魏舒矣乃執仲幾以歸三月歸諸京師必是旣栽之後三月以前執以歸晉至三月乃歸於京師耳經書三月始執者晉人初執不告後知以歸不可至三月復歸於京師諱其以歸乃歸王故以三月初執告也縱晉執人諸侯不得相治事當使歸决於天子况在天子之側不以歸於京師晉人自知不可不以歸晉告魯故經但書其執不書所歸旣不言歸王亦不言歸晉是不以所歸告也夏六月癸亥公之喪至自乾侯注告於廟故書至戊辰公卽位注定公不得以正月卽位失其時故詳而日之記事之宜無義例疏注正義曰公羊傳曰卽位不日此何以日錄乎内也榖梁以為公喪在外踰年六月乃得卽位危故日之左氏無此義故杜顯而異之正月卽位正也定公不得以正月卽位為失其時故詳而日之直記事之宜書曰無義例秋七月癸巳葬我君昭公注公在外薨故八月乃葬九月大雩注無傳過也音義雩音于立煬宮注煬公伯禽子也其廟已毁季氏禱之而立其宮書以譏之音義煬羊讓反禱丁老反疏注正義曰諡法好内怠政曰煬煬公伯禽子世本世家文諸侯之禮親廟有四計煬公𤣥孫旣薨其廟旣已毁矣季氏禱于煬公以求昭公不入公死於外謂禱有益而更立其宫賽之於禮不合更立惡其改變國典故書以譏之公羊榖梁皆云立者不宜立立煬宫非禮也冬十月隕霜殺菽注無傳周十月今八月隕霜殺菽非常之災音義隕于敏反菽本又作叔音同疏注正義曰月令九月霜始降八月未應霜殺菽菽者大豆之苗又是耐霜之榖今以八月隕霜霜能殺菽是非常之災故書之僖三十三年隕霜不殺草此云殺菽彼言不殺草者榖梁傳曰未可以殺而殺舉重可殺而不殺舉輕其曰菽舉重也傳元年春王正月辛巳晉魏舒合諸侯之大夫于狄泉將以城成周魏子涖政注涖臨也代天子大夫為政音義涖音利又音類衞彪傒注衞大夫曰將建天子注立天子之居而易位以令非義也大事奸義必有大咎晉不失諸侯魏子其不免乎是行也魏獻子屬役於韓簡子及原壽過注簡子韓起孫不信也原壽過周大夫音義奸音干咎其九反屬之欲反過古禾反疏正義曰徃年傳魏子南靣衛彪傒云干位以令此云魏子涖政彪傒云易位以令文不同者郊特牲云君之南郷答陽之義也臣之北面答君也然則禮國君乃南面徃年魏子亦南面是干君之位故云干位此時諸國為天子築城但當為君各致徒役而已宜使天子之臣自號令之而魏子涖政代天子大夫改易上下故為易位所譏别故其文異而田於大陸焚焉注禹貢大陸在鉅鹿北嫌絶遠疑此田在汲郡吳澤荒蕪之地火田并見燒也爾雅廣平曰陸音義蕪音無疏注正義曰禹貢云導河積石至于大伾北過降水至于大陸孔安國云大陸澤名釋地十藪云晉有大陸郭璞曰今鉅鹿北廣阿澤孫炎曰廣阿猶大陸以地名言之近為是也計鉅鹿之城與周相去千有餘里魏子不應徃彼田獵故嫌絶逺疑此田當在汲郡吳澤吳澤在脩武縣北還卒於甯甯卽脩武城是也當時荒蕪之地故亦以大陸名焉引爾雅以證平地皆名陸也案爾雅髙平曰陸杜言廣平者以吳澤之地地下寛平故以廣平言之非是不見爾雅劉君以爾雅高平曰陸而規杜氏非還卒於甯注甯今脩武縣近吳澤音義近附近之近范獻子去其柏椁以其未復命而田也注范獻子代魏子為政去其柏椁示貶之音義去起呂反注同椁音郭疏正義曰喪大記云君松椁大夫柏椁士雜木椁是卿葬於禮用柏椁也以其未復君命而為田獵故獻子去其柏椁不使用也孟懿子會城成周注不書公未卽位疏注正義曰懿子徃年唯受號令知所得丈尺人功而已今復將徒役城之計當更書之於策以公未卽位無君可告故不書庚寅栽注栽設板築音義栽才代反又音再注同宋仲幾不受功曰滕薛郳吾役也注欲使三國代宋受功役也音義郳五兮反小邾國薛宰曰宋為無道絶我小國於周以我適楚故我常從宋晉文公為踐土之盟注在僖二十八年曰凡我同盟各復舊職若從踐土若從宋亦唯命仲幾曰踐土固然注固曰從舊薛舊為宋役薛宰曰薛之皇祖奚仲居薛以為夏車正注皇大也奚仲為夏禹掌車服大夫音義夏戸雅反注同奚仲遷于邳注邳下邳縣音義邳皮悲反仲虺居薛以為湯左相注仲虺奚仲之後音義虺許鬼反相息亮反若復舊職將承王官何故以役諸侯注承奉也仲幾曰三代各異物薛焉得有舊注言居周世不得以夏殷為舊音義焉於䖍反為宋役亦其職也士彌牟曰晉之從政者新注言范獻子新為政未習故事疏注正義曰魏舒以辛巳㑹諸國至庚寅相去唯十日耳魏舒始卒已得范鞅代者范鞅本是中軍之佐於次當代魏舒葢晉人聞舒卒而馳使代之子姑受功歸吾視諸故府注求故事仲幾曰縱子忘之山川鬼神其忘諸乎注山川鬼神盟所告士伯怒謂韓簡子曰薛徵於人注典籍故事人所知也宋徴於鬼注取證於鬼神宋罪大矣且已無辭而抑我以神誣我也啓寵納侮其此之謂矣注開寵過分則納受侵侮音義侮亡甫反分扶問反疏正義曰尚書說命傅說進戒於王云無啓寵納侮古有此言故云其此之謂矣開彼寵人過其本分其人不知止足乃至侵侮在上據在上受之故云納侮必以仲幾為戮乃執仲幾以歸三月歸諸京師注知以歸不可故復歸之京師音義復扶又反城三旬而畢乃歸諸侯之戌齊高張後不從諸侯注後期不及諸侯之役晉女叔寛曰周萇𢎞齊高張皆將不免注叔寛女寛也音義萇直良反萇叔違天高子違人注天旣厭周德萇𢎞欲遷都以延其祚故曰違天諸侯相率以崇天子而高子後期故曰違人音義厭於艶反祚才故反天之所壞不可支也衆之所為不可奸也注為哀三年周人殺萇𢎞六年高張来奔起夏叔孫成子逆公之喪于乾侯注成子叔孫婼之子季孫曰子家子亟言於我未嘗不中吾志也吾欲與之從政子必止之且聽命焉注衆事皆諮問子家子音義亟起冀反中丁仲反疏正義曰言子家子數於公處致言於我云意如事君不敢不改又言君以一乗入於魯師季孫必與君歸季孫之意實然故云未嘗不中吾志吾欲與之從政欲用為大夫也公喪歸則從者散故令止之且聼命者一聽子家之所為子家欲將歸者卽與之歸子家子不見叔孫易幾而哭注幾哭㑹也不欲見叔孫故朝夕哭不同㑹音義朝如字叔孫請見子家子子家子辭曰羈未得見而從君以出注出時成子未為卿音義羈居宜反子家子名見賢遍反下同從才用反注義從同又如字下從君從公放此君不命而薨羈不敢見注言未受昭公之命託辭以距叔孫叔孫使告之曰公衍公為實使羣臣不得事君注二子始謀逐季氏疏注正義曰謀逐季氏公為為之傳文不言公衍謀也但以公衍見復為大子季氏欲俱廢之故言此也若公子宋主社稷則羣臣之願也注宋昭公弟定公凡從公出而可以入者將唯子是聽子家氏未有後季孫願與子從政此皆季孫之願也使不敢以告注不敢叔孫成子名對曰若立君則有卿士大夫與守龜在羈弗敢知若從君者則貌而出者入可也注貌出謂以義從公與季氏無實怨音義守手又反寇而出者行可也注與季氏為宼讐者自可去若覊也則君知其出也注君昭公而未知其入也羈將逃也喪及壞隤公子宋先入從公者皆自壞隤反注出奔音義壊徐音懷又户怪反隤徒回反六月癸亥公之喪至自乾侯戊辰公卽位注諸侯薨五日而殯殯則嗣子卽位癸亥昭公喪至五日殯於宮定公乃卽位疏正義曰王制云天子十日而殯諸侯五日而殯自癸亥至戊辰五日殯訖則嗣子卽位故定公以此日卽位也公羊榖梁皆云正棺於兩楹之間然後卽位案正棺兩楹之間卽禮所謂夷於堂者也喪大記君薨之禮云旣小歛男女奉尸夷於堂鄭𤣥云諸侯之小歛於死者俱三日此戊辰去癸亥五日非正棺之日不得為正棺卽位也雜記云諸侯行而死歸至於廟門遂入適所殯鄭玄云適所殯謂兩楹之間自外来者正棺於兩楹之間尸亦夷之於此因殯焉殯必於兩楹之間者以其死不於室而自外来留之於中不忍逺也鄭取二傳之說言死從外來者殯在兩楹之間若謂殯為正棺則與杜言合矣季孫使役如闞公氏將溝焉注闞魯羣公墓所在也季孫惡昭公欲溝絶其兆域不使與先君同音義闞口暫反惡烏路反又如字疏正義曰闞是先公葬地春秋言氏猶如言家故謂公之墓地為公氏言是公死之家宅也玄卿以為闞屬上句公氏將溝焉猶言將溝公氏焉古人多倒語公氏則昭公榮鴐鵞曰生不能事死又離之以自旌也注鴐鵞魯大夫榮成伯也旌章也音義鴐音加鵞五何反旌音精縱子忍之後必或恥之乃止季孫問於榮鴐鵞曰吾欲為君諡使子孫知之注為惡諡疏注正義曰知者下文死又惡之所以知也對曰生弗能事死又惡之以自信也將焉用之乃止音義惡之如字又烏路反焉於䖍反疏正義曰信明也以自明已之不臣也秋七月癸巳葬昭公於墓道南孔子之為司寇也溝而合諸墓注明臣無貶君之義疏正義曰孔子之為司寇在定公十年以後未知何年溝之昭公出故季平子禱于煬公九月立煬宫注平子逐君懼而請禱於煬公昭公死於外自以為獲福故立其宫疏正義曰旣毁其廟而得禱者葢就祧而禱之周鞏簡公棄其子弟而好用遠人注簡公周卿士遠人異族也為明年鞏氏賊簡公張夲音義鞏九勇反好呼報反疏正義曰諡法平易不從曰簡經二年春王正月夏五月壬辰雉門及兩觀災注無傳雉門公宫之南門兩觀闕也天火曰災音義觀古亂反注及下同疏注正義曰明堂位云庫門天子臯門雉門天子應門是魯之雉門公宮南門之中門也釋宮云觀謂之闕郭璞曰宮門雙闕周禮大宰正月之吉縣治象之法于象魏使萬民觀治象鄭衆云象魏闕也劉熙釋名云闕在門兩旁中央闕然為道也然則其上縣法象其狀魏魏然髙大謂之象魏使人觀之謂之觀也是觀與象魏闕一物而三名也觀與雉門俱災則兩觀在雉門之兩旁矣公羊傳曰其言雉門及兩觀災何兩觀㣲也然則曷為不言雉門災及兩觀主災者兩觀也主災者兩觀則曷為後言之不以㣲及大也榖梁亦云災自兩觀始先言雉門尊尊也公羊稱子家駒云設兩觀諸侯僭天子其意以其奢僭故天災之左氏無此義案禮器云天子諸侯臺門此以高為貴也郊特牲云臺門大夫之僭禮也唯言大夫異於諸侯不言諸侯異於天子兩觀為僭禮無其文天之所災不可意卜言主災兩觀以門尊先門若災先從門起又將何以為異丘明無文或是災起雉門而延及兩觀也天火曰災宣十六年傳例秋楚人伐吳注囊瓦稱人見誘以敗軍音義囊乃郎反冬十月新作雉門及兩觀注無傳傳二年夏四月辛酉鞏氏之羣子弟賊簡公注傳言棄親用疎所以敗也桐叛楚注桐小國廬江舒縣西南有桐鄉吳子使舒鳩氏誘楚人注舒鳩楚屬國曰以師臨我注敎舒鳩誘楚使以師臨吳我伐桐為我使之無忌注吳伐桐也偽若畏楚師之臨己而為伐其叛國以取媚者也欲使楚不忌吳所謂多方以誤之音義為我于偽反注及下同疏正義曰桐是小國世屬於楚桐今叛楚楚有間隙故吳子因是而謀之舒鳩自是楚之屬國居吳楚之間亦兩取其意故意吳得使之也吳子使舒鳩誘楚人又敎舒鳩為辭曰令楚以師臨我我吳自稱我令楚臨吳也我當偽若畏楚為楚伐桐女舒鳩當為我誘楚我軍楚師或曰囊瓦本出師伐吳見吳欲伐桐而不設備遂被吳敗之又擊楚巢邑潛師圍而克之獲其守邑大夫為我使之無忌謂為我之畏楚形狀使楚人無復防忌於我也若楚不忌吳則師不設備欲因其無備而掩襲取之耳下云吳人見舟于豫章偽欲伐桐也吳軍楚師于豫章掩其不備也潛師于巢吳人詐巢邑人云此師將伐桐也其實本擬取巢故下遂圍巢克之言潛者對豫章之師稱潛秋楚囊瓦伐吳師于豫章注從舒鳩言吳人見舟于豫章注偽將為楚伐桐音義見賢遍反而潛師于巢注實欲以擊楚冬十月吳軍楚師于豫章敗之注楚不忌故遂圍巢克之獲楚公子繁注繁守巢大夫邾莊公與夷射姑飲酒私出注射姑邾大夫出辟酒音義射音亦一音夜閽乞肉焉奪之杖以敲之注奪閽杖以敲閽頭也為明年邾子卒傳音義閽音昬守門人也敲苦孝反又苦學反說文作敲云擊頭也字林同又一曰擊聲也口交反又口卓反訓從敲云横擿也又或作茅或作刜口交反經三年春王正月公如晉至河乃復注無傳疏正義曰三傳皆無其說不知何故乃復賈逵云刺緩朝見辭失所不諱罪已賈雖為此解於傳無文不可從故杜不言劉炫謂公以六月卽位此年便卽徃朝於事未為緩也晉人何以辭之若以緩見譴當退謝罪何由此後更無謝處空言罪已經無孫謝自罪之狀復安在乎晉若以緩致辭必當更有譴責何由明年㑹次復得依常班序乃復之意不可懸知二月辛卯邾子穿卒注再同盟音義穿音川疏注正義曰穿以昭二年卽位十一年盟于祲祥二十六年于鄟陵皆魯邾俱在是再同盟也夏四月秋葬邾莊公注六月乃葬緩冬仲孫何忌及邾子盟于拔注拔地闕音義拔皮八反傳三年春二月辛卯邾子在門臺注門上有臺臨廷閽以缾水沃廷邾子望見之怒閽曰夷射姑旋焉注旋小便音義廷音庭下竝同缾歩丁反本又作瓶命執之注見其不潔執射姑弗得滋怒自投于牀廢于鑪炭爛遂卒注廢隋也音義鑪力吳反炭他旦反隋徒火反先葬以車五乘殉五人注欲藏中之潔故先内車及殉别為便房蓋其遺命音義先悉薦反又如字乗繩證反殉辭俊反藏才浪反疏注正義曰以人從葬謂之殉邾子好潔以人為殉欲備地下掃除若令與柩同入恐其汚履藏内欲其藏中之潔故先内車及殉别為便房處之傳言此事意在非責邾子若是葬者自為則非莊公之罪無為輙說此事故云葢其遺命也邾子隊鑪而卒不應得有遺命疑其是遺命者禮國君卽位而為椑初立卽營死事當是平素之時先有此命葬者奉行之莊公卞急而好潔故及是注卞躁疾也音義卞皮彦反好呼報反下文及注同躁早報反秋九月鮮虞人敗晉師于平中注平中晉地獲晉觀虎恃其勇也注為五年士鞅圍鮮虞張本冬盟于郯注郯卽拔也音義郯音談脩邾好也注公卽位故脩好蔡昭侯為兩佩與兩裘注佩佩玉也以如楚獻一佩一裘於昭王昭王服之以享蔡侯蔡侯亦服其一子常欲之弗與三年止之唐成公如楚有兩肅爽馬子常欲之注成公唐惠侯之後肅爽駿馬名音義肅如字又所六反爽音霜駿音俊疏注正義曰宣十二年傳有唐恵侯故云唐恵侯之後也釋畜於馬無肅爽之名爽或作霜賈逵云色如霜紈馬融說肅爽鴈也其羽如綀高首而脩頸馬似之天下稀有故子常欲之杜以馬名臨時所作本意不可得知故直云駿馬名弗與亦三年止之唐人或相與謀請代先從者許之音義從才用反下同疏正義曰謂請楚楚許之也知非請唐侯者若唐侯許之自合養馬何須言飲先從者竊馬以獻乎飲先從者酒醉之竊馬而獻之子常子常歸唐侯自拘於司敗注竊馬者自拘音義飲於鴆反拘九于反曰君以弄馬之故隱君身注隱憂約也音義弄魯貢反棄國家羣臣請相夫人以償馬必如之注相助也夫人謂養馬者音義相息亮反夫音扶注同償市亮反唐侯曰寡人之過也二三子無辱皆賞之蔡人聞之固請而獻佩于子常子常朝見蔡侯之徒命有司曰蔡君之久也官不共也注言楚所以禮遣蔡侯之物不共備故音義共音恭注同明日禮不畢將死注遣蔡侯之禮蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川注自誓言若復渡漢當受禍明如大川音義沈音鴆復扶又反蔡侯如晉以其子元與其大夫之子為質焉而請伐楚注為明年㑹召陵張本音義質音致經四年春王二月癸巳陳侯吳卒注無傳未同盟而赴以名癸巳正月七日書二月從赴疏注正義曰杜以長歴校之知癸巳是正月七日故云書二月從赴也知非日誤者以崩薨之事皆以赴為文故平王崩赴以庚戌陳侯卒赴以甲戌己丑杜依大例而言故云從赴劉炫以為諸侯五月而葬下云六月葬陳恵公則陳侯卒在二月以為日誤而規杜氏今知非者但諸侯雖五月可葬春秋之時或緩或速無復常準此陳侯之葬事旣無傳何知必五月而葬妄以杜為失其義非也三月公㑹劉子晉侯宋公蔡侯衞侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯把伯小邾子齊國夏于召陵侵楚注於召陵先行㑹禮入楚竟故書侵音義夏戸雅反召上照反竟音境疏注正義曰先言於召陵後言侵楚是於召陵先行㑹禮也土地名召陵楚地也諸侯旣入楚竟先行㑹禮後乃侵之故經書先㑹後侵也夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之音義公孫姓本又作生姓音生五月公及諸侯盟于臯鼬注召陵㑹劉子諸侯總言之也繁昌縣東南有城臯亭復稱公者㑹盟異處故音義鼬由又反復扶又反處昌慮反疏注正義曰書經之例諸侯先㑹而後盟皆前目而後凡此共盟者還是前㑹之諸侯前已歴序故於此總言之也劉子雖是王朝之臣而亦有封爵故諸侯之文可以兼劉子也僖二十九年王子虎與諸侯盟于翟泉貶之稱人此劉子得與諸侯盟者楚僭號稱王不事天子諸侯㑹而侵楚將以尊崇王室傳言劉文公合諸侯是天子敕之使盟也下文書劉卷卒葬魯人弔㑹依同盟之禮知劉子亦與盟也復稱公者由其㑹盟異處故也劉炫規杜云㑹盟異處故復稱公案襄二十五年盟重丘亦是㑹盟異處何以不言公今删定知非者但㑹盟異處理合稱公重丘不書公史官自略耳以此規杜非也把伯成卒于㑹注無傳音義成音城疏正義曰成以昭二十五年卽位二十六年盟于鄟陵三十二年于翟泉此年于臯鼬魯把俱在計杜當云三同盟無注者漏脫耳諸侯薨于朝㑹加一等此旣薨于㑹其禮亦當然六月葬陳惠公注無傳許遷于容城注無傳秋七月公至自㑹注無傳劉卷卒注無傳卽劉蚠也劉子奉命出盟召陵死則天王為告同盟故不具爵音義巻音權一音眷免反蚠扶粉反為于偽反下吳為蔡同疏注正義曰昭二十二年傳曰單子立劉蚠卽此是也世族譜伯蚠劉蚠劉文公劉狄劉卷劉子為一人王朝公卿卒不赴魯魯不㑹葬文三年書王子虎卒傳曰來赴弔如同盟禮也彼為同盟于翟泉故也此亦書卒明為同盟故也畿内之國不得外交諸侯必非劉邑之臣来赴知是天子為告也天子告臣略言名封而已不言劉子故書不具爵葬把悼公注無傳楚人圍蔡注不服故也晉士鞅衞孔圉帥師伐鮮虞注無傳孔圉孔羈孫士鞅卽范鞅音義圉魚呂反葬劉文公注無傳冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績注師能左右之曰以皆陳曰戰大崩曰敗績吳為蔡討楚從蔡計謀故書蔡侯以吳子言能左右之也囊瓦稱人貪以致敗不能死難罪賤之柏舉楚地昭三十一年傳曰六年十二月庚辰吳入郢今以十一月者并數閏音義陳直覲反難乃旦反數所主反疏注正義曰師能左右之日以僖二十六年傳例也皆陳曰戰大崩曰敗績莊十一年傳例也吳大蔡小而蔡能以吳者吳子為蔡討楚言蔡能左右之也釋例曰吳雖大國順蔡侯之請自將其衆唯蔡侯之命故亦言以吳子也囊瓦楚之上卿當稱名氏今稱人者貪以致敗又不能死難罪賤之也釋例曰楚之囊瓦貪珮馬以致討稱人罪賤之也昭三十一年傳言六年十二月庚辰吳入郢今以十一月與彼期有差殊者長歴推此年閏十月庚辰又是十一月二十九日其月垂盡并數閏得為十二月也楚囊瓦出奔鄭注書名惡之音義惡烏路反疏注正義曰文八年宋司城來奔十四年宋子哀來奔傳皆云貴之也不稱名為貴之是稱名為惡之庚辰吳入郢注弗地曰入吳不稱子史略文疏注正義曰弗地曰入襄十三年傳例也上文戰稱吳子此言吳入楚不稱子猶成二年鄭伐許昭十二年晉伐鮮虞史略文無義例公羊榖梁以為吳於戰稱子為其憂中國故進而稱爵及其入郢君舍于君室大夫舍于大夫室反為夷狄之行故貶而稱吳左氏無此義故杜異而顯之傳四年春三月劉文公合諸侯于召陵謀伐楚也注文公王官伯也晉人假王命以討楚之久留蔡侯故曰文公合諸侯疏注正義曰劉子是天子大臣故言王官伯也徃年蔡侯如晉請晉耳不請天子今稱劉文公合諸侯知是晉人告王假王命以討楚王使劉子㑹之故言劉文公合諸侯以示禀於王命假王威也晉荀寅求貨於蔡侯弗得言於范獻子曰國家方危諸侯方貳將以襲敵不亦難乎水潦方降疾瘧方起中山不服注中山鮮虞音義潦音老瘧魚略反棄盟取怨無損於楚注晉楚同盟伐之為取怨而失中山不如辭蔡侯吾自方城以來楚未可以得志注晉敗楚侵方城在襄十六年祗取勤焉乃辭蔡侯晉人假羽旄於鄭鄭人與之注析羽為旌王者遊車之所建鄭私有之因謂之羽旄借觀之音義祗音支旄音毛析星暦反下放此疏注正義曰周禮司常掌九旗之名物全羽為旞析羽為旌道車載旞遊車載旌鄭𤣥云全羽析羽皆五采繫之於旞旌之上所謂注旄於干首也凡九旗之帛皆用絳道車象路也王以朝夕燕出入遊車木路也王以田以鄙是其析羽為旌王者遊車之所建也釋天云注旄首曰旌李廵曰以旄牛尾著旌首者也孫炎曰析五采羽注旌上亦有旒縿據彼文言之則羽毛者有五色鳥羽又有旄牛尾也言全羽析羽者葢有全取其趐或析取其翮故有全析二名也繫此鳥羽牛尾於干首猶自别有絳為旒縿縣之於干今之旗韣猶然此傳直言羽耳注不引全羽而以析羽解之者以全羽尊於析羽鄭人所有未必尊貴故以析羽解之計羽旄所用其費無多晉人自應有之而襄十四年范宣子假羽毛於齊此又假羽旄於鄭者或當制作巧異故聞而借觀之明日或斾以會注或賤者也繼旐曰斾令賤人施其斾執以從會示卑鄭音義斾歩貝反旐音兆令力呈反下欲令蔡同疏注正義曰鄭𤣥注論語云或云言有人不顯其名而略稱為或是或為賤者也繼旐曰斾釋天文也郭璞曰帛續旐末為燕尾者然則旐謂旂身斾為旂尾晉令賤人建此羽旄施其旒斾於下執之以從其㑹本謂其美而就鄭借觀之旣得其物令賤人服用之是示其卑侮鄭也鄭是列國而晉卑侮之諸侯於是知晉輕蔑心皆怨恨故晉於是乎失諸侯晉於是乎失諸侯注傳言晉無禮所以遂弱將㑹衞子行敬子言於靈公注子行敬于衞大夫曰會同難注難得宜嘖有煩言莫之治也注嘖至也煩言忿爭音義嘖仕責反一音責爭爭鬬之爭疏注正義曰嘖至賈逵云然是相傳訓也易繫辭云聖人有以見天下之賾謂見其至深之處賾亦深之義也謂至於㑹時有煩亂忿爭之言無才辨者則莫之能治也其使祝佗從注祝佗大祝子魚音義佗徒何反從才用反下師從旅從同大音泰下大祝大卜大史大原同公曰善乃使子魚子魚辭曰臣展四體以率舊職猶懼不給而煩刑書若又共二注共二職音義共音恭注同徼大罪也且夫祝社稷之常隸也注隸賤臣也音義徼古堯反夫音扶社稷不動祝不出竟官之制也注社稷動謂國遷音義竟音境下同疏注正義曰周禮大祝云大師宜于社造于祖設軍社及軍歸獻于社則前祝天子之祝如此則諸侯之祝官亦然也然則彼軍行唯有社無稷今社稷俱動故知謂國遷也國遷唯在竟内得云祝不出竟者詩稱公劉遷豳大王來岐及春秋把都陳留而遷緣陵及許遷于析之屬竝是離棄本國逺適它土故有出竟之事劉以社稷動謂軍行而規社非也君以軍行祓社釁鼓注師出先有事祓禱於社謂之宜社於是殺牲以血塗鼓鼙為釁鼓音義祓音弗徐音廢釁許靳反鼙歩西反本又作鞞疏注正義曰釋天云起大事動大衆必先有事乎社而後出謂之宜是軍師將出必有祭社之事也周禮女巫掌祓除釁浴則祓亦祭名故知祓社卽宜社是也說文云釁血祭也是殺牲以血塗鼓鼙為釁鼓此皆祝官掌之祝奉以從注奉社主也音義從如字又才用反疏正義曰禮軍行必以廟主社主從軍而行尚書甘誓云用命賞于祖弗用命戮于社孔安國云天子親征必載遷廟之祖主及社主行有功則賞祖主前示不專也不用命奔北者則戮之於社主前社主隂隂主殺親祖嚴社之義也是軍行必載社主行故祝官奉主以從於是乎出竟若嘉好之事注謂朝㑹音義好呼報反君行師從注二千五百人卿行旅從注五百人臣無事焉疏正義曰此㑹因而侵楚衛侯當以軍行而云臣無事者晉本以㑹召諸侯傳言將㑹是赴㑹之時未知將侵伐也但諸國旣集師衆自多故因得行侵耳公曰行也及臯鼬注將盟將長蔡於衞注欲令蔡先衞歃音義長丁丈反令力呈反先悉薦反下文先衛同歃所洽反又所甲反衞侯使祝佗私於萇𢎞曰聞諸道路不知信否若聞蔡將先衞信乎萇𢎞曰信蔡叔康叔之兄也注蔡叔周公兄康叔周公弟疏注正義曰史記管蔡世家云武王同母兄弟十人母曰大姒文王正妃也其長子曰伯邑考次曰武王𤼵次曰管叔鮮次曰周公旦次曰蔡叔度次曰曹叔振鐸次曰郕叔武次曰霍叔處次曰康叔封次曰􅆅季載如彼文則蔡叔周公弟也今以蔡叔為周公兄者以僖二十四年傳富辰言文之昭十六國蔡在魯上明以長幼為次賈逵等皆言蔡叔周公兄故杜從之馬遷之言多辟謬故不用史記為說先衞不亦可乎子魚曰以先王觀之則尚德也昔武王克啇成王定之選建明德以藩屏周故周公相王室以尹天下注尹正也音義藩方元反相息亮反於周為睦注睦親厚也以盛德見親厚分魯公以大路大旂注魯公伯禽也此大路金路錫同姓諸侯車也交龍為旂周禮同姓以封音義分扶問反下竝同路本亦作輅音路下皆同旂其依反錫星歴反疏注正義曰周禮巾車云金路建大旂以賔同姓以封鄭𤣥云金路以金餙諸末大旂九旗之畫交龍者以賔以㑹賔客同姓以封謂王子母弟以功徳出封若魯衛也交龍為旂司常文也夏后氏之璜注璜美玉名音義夏戸雅反下皆同璜音黄疏注正義曰夏后氏所寳歴代傳之知美玉名也哀十四年傳云向魋出於衛地公文氏攻之求夏后氏之璜焉則璜非一也尚書旅獒及魯語皆云古者分同姓以寳玉展親則先王不以玉賜向魋向魋自規求得之也鄭𤣥注周禮云半璧曰璜封父之繁弱注封父古諸侯也繁弱大弓名音義父音甫下武父同封父國名繁扶元反疏注正義曰鄭𤣥云古者伐國遷其重器以與同姓此繁弱封父之國為之不知何時滅其國而得之也孔叢云楚王張繁弱之弓載忘歸之矢以射蛟于雲夢是繁弱為弓名也殷民六族條氏徐氏蕭氏索氏長勺氏尾勺氏使帥其宗氏輯其分族將其類醜注醜衆也音義索素各反下同勺市灼反下同輯音集又七入反以法則周公用卽命于周注卽就也使六族就周受周公之法制是使之職事于魯注共魯公之職事音義共音恭下文以共王職同以昭周公之明德注昭顯也疏正義曰使六族之長各自帥其當宗同氏輯合也合其所分枝屬族屬也將其族類人衆以法則周公令其移家居魯用就受周公之命是以使之共職事于魯以昭周公之明徳也下賜殷民七族亦是使之法則康叔令共職事于衛也賜唐叔及壊姓九宗亦然分之土田陪敦注陪增也敦厚也音義陪本亦作倍同歩回反疏正義曰陪是加増之義敦厚釋詁文也言旣封為大國地方五百里又分以土田更増彼寛厚為七百里也明堂位云封周公于曲阜地方七百里鄭𤣥云公之地方五百里加魯以四等之附庸方百里者二十四并五五二十五積四十九開方之得七百里鄭𤣥周禮大司徒注云凡諸侯為牧正帥長及有徳者乃有附庸公無附庸侯附庸九同伯附庸七同子附庸五同男附庸三同進則取焉退則歸焉魯於周法不得有附庸故言錫之也地方七百里者包附庸以大言之附庸二十四言得兼此四等矣是増厚魯國之事也祝宗卜史注大祝宗人大卜大史凡四官備物典策注典策春秋之制音義䇿本又作冊亦作筴或作笧皆初革反官司彝器注官司百官也彝器常用器音義彜羊之反疏正義曰祝宗接神之官大卜主卜大史主書與此四等官人使之將歸於魯也服䖍云備物國之職物之備也當謂國君威儀之物若今繖扇之屬備賜魯也杜不觧備物則與典策為一也備物典䇿謂史官書策之典若傳之所云𤼵凡之類賜之以法使依法書時事也官司彜器謂百官常用之器蓋罇罍俎豆之屬具賜魯也因商奄之民注商奄國名也與四國流言或迸散在魯皆令卽屬魯懷柔之音義迸彼諍反令徐力呈反疏注正義曰書傳云武王殺紂繼公子禄父及管蔡流言奄君謂禄父曰武王死成王幼周公疑此百世之時請舉事然後祿父及三監叛是奄與四國流言也昭九年傳云蒲姑商奄吾東土也此復云因商奄之民則商奄是東方之國近魯之地也昭元年傳云周有徐奄杜以彼奄與此商奄為一故土地名奄商奄二名共為一國此注言商奄國名以商奄二字為國名也詩稱四國流言毛傳以四國為管蔡商奄則商奄各自為國奄則此奄是也商謂紂子禄父下云管蔡啟商是名禄父為商也然則毛言商奄為二杜言商奄為一杜言四國流言亦謂管蔡禄父與商奄為四也商奄卽四國之一言與者據民與四國之君流言故言與也或者據奄君道三國為亂故言與總稱四國非為商奄外别有四國也言封魯於少皥之虚則商奄非魯地也非魯地而言因其民是誅啇奄之日民或迸散在魯皆命使卽屬於魯令魯懐柔之𤣥卿以為三監與商為四國奄在外故言與四國命以伯禽注伯禽周公世子時周公唯遣伯禽之國故皆以付伯禽疏注正義曰詩魯頌說封魯之事云王曰叔父建爾元子俾侯于魯是伯禽為周公世子也魯世家云周公相成王使其子伯禽代就封于魯文十三年公羊傳曰周公何以稱大廟于魯封魯公以為周公也周公拜乎前魯公拜乎後曰生以養周公死以為周公主然則周公之魯乎曰不之魯也封魯公以為周公則周公曷為不之魯欲天下之一乎周也其意言周公聖人若使之魯則恐天下廻心向之故不使之魯也以周公身不適魯唯遣伯禽之國故傳皆言分魯公不言分周公也傳言命以伯禽於體例命以康誥命以唐誥則伯禽亦似策命篇名今杜云唯遣伯禽之國故皆以付伯禽則伯禽非是誥誓篇名若必是誥誓當云命以魯誥旣為國君不得與君牙伯冏同類也劉炫云伯禽猶下命以康誥是伯禽為命書似書序穆王命君牙為周大司徒作君牙卽以君牙為篇與此同也而封於少皥之虛注少皥虛曲阜也在魯城内音義少詩照反注及下同皥胡老反虚起居反注及下皆同疏注正義曰此注少皥之虛卽曲阜是也曲阜在魯城内則魯之所都正在少皥虛矣昭二十九年注窮桑少皥之號窮桑地在魯北與此異者賈逵云少皥居窮桑登為帝葢未為帝居魯北旣為帝乃居魯也分康叔注康叔衞之祖以大路少帛綪茷旃旌注少帛雜帛也綪茷大赤取染草名也通帛為旃析羽為旌音義綪七見反茷歩貝反又音吠旃章然反疏注正義曰周禮司常云通帛為旜雜帛為物鄭𤣥云通帛謂大赤從周正色無餙雜帛者以帛素餙其側白殷之正色大赤是通帛知少帛是雜帛也釋草云茹蘆茅蒐郭璞曰今之蒨也可以染絳則綪是染赤之草茷卽斾也爾雅繼旐曰斾旐是旂身斾是旂尾尾猶用赤則通身皆赤知綪茷是大赤大赤卽今之紅旗取染赤之草為名也葢王以通帛雜帛竝賜衛也然則大赤卽是旃也於綪茷之下更言旃者茷言旂尾旃言旂身圓其文故具言耳若其不然旌是干之所建旗皆有旌少帛旃斾之後何須更復言旌明是圓其文故重言之大呂注鐘名疏正義曰周鑄無射魯鑄林鍾皆以律名名鍾知此大呂姑洗皆鐘名也其聲與此律相應故以律名焉殷民七族陶氏施氏繁氏錡氏樊氏饑氏終葵氏封畛土略自武父以南及圃田之北竟注畛塗所徑也略界也武父衞北界圃田鄭藪名音義陶徒刀反繁歩河反錡魚綺反畛之忍反一音真圃布五反本亦作圃同塗音徒徑音經藪素口反疏注正義曰周禮遂人云夫間有遂廣深各二尺遂上有徑容車馬也十夫有溝廣深四尺溝上有畛容大車百夫有洫廣深八尺洫上有塗容乗車一軌千夫有澮廣二尋深二仞澮上有道容二軌萬夫有川川上有路容三軌畛是路故為塗所徑也桓十二年公㑹鄭伯盟于武父杜云陳留濟陽縣東北有武父城彼是鄭地與此武父非一也土地名云傳曰封畛土略自武父以南則武父衛之北竟也非河南武父其地闕無處故直云衛北界也釋地十藪鄭有圃田郭璞曰今滎陽中牟縣西圃田澤是也衛之南竟至此澤畔取於有閻之土以共王職注有閻衞所受朝宿邑蓋近京畿音義近附近之近下近京同取於相土之東都以㑹王之東蒐注為湯沐邑王東廵守以助祭泰山音義相息亮反蒐所求反守手又反疏正義曰土地名有閻之土與相土之東都其地皆闕無其處言共王職猶魯之許田葢近京畿也㑹王東蒐則為從王廵守助祭泰山為湯沐之邑若鄭之祊田葢近泰山也王廵守者諸侯為王守土天子以時出廵行之今言蒐則王之廵守亦因田獵以教習兵士聃季授土注聃季周公弟司空音義聃乃甘反疏注正義曰富辰言文之昭聃季在魯下史記大姒十子聃季最少是周公弟也周禮司空主土司徒主民知聃季授土為司空也下陶叔授民為司徒也陶叔授民注陶叔司徒命以康誥而封於殷虛注康誥周書殷虛朝歌也皆啟以商政疆以周索注皆魯衞也啟開也居殷故地因其風俗開用其政疆理土地以周法索法也音義疆居良反注及下同疏注正義曰王制云凡居民材必因天地寒煖燥濕廣谷大川異制民生其間者異俗脩其敎不易其俗齊其政不易其宜是言王者布政當順民俗而施之也此民習商之政為日已久還因其風俗開導以舊政也衛居殷虚開以商政可矣魯亦開以商政者王者所法不過二代夏在衛西魯在衛東夏政非魯所及與衛大同以殷之餘民有六族將其醜類以卽事于魯故與衛皆啟以商政也疆理土地以周法則三代經界法皆有異其異未盡聞也索之為法相傳訓耳考工記量器銘曰時文思索允臻其極鄭亦以索為法分唐叔注唐叔晉之祖以大路密須之鼓注密須國名闕鞏注甲名音義鞏九勇反沽洗注鐘名音義沽音孤洗息典反懷姓九宗職官五正注懷姓唐之餘民九宗一姓為九族職官五正五官之長音義長丁丈反下文乃長衞同疏注正義曰懐姓居在晉地而不言殷民知是唐之餘民也言懐姓九宗則皆姓懐矣知一姓而有九族也職官五正杜云五官之長則謂五官之長子孫耳曲禮云天子之五官曰司徒司馬司空司士司寇鄭𤣥云此殷時制也然則殷時五官居在唐地世為貴族以賜唐叔使主領之所以榮寵唐叔也殷之五官不必皆在唐地但有三官四官亦得總五言之劉炫云職官五正職主也正長也主官事者有五長分九宗為五官使主之此九宗葢宗有一人數少者當宗不足立官并之為五使五官領此九宗或以為於懐姓之内立五正使分主九宗未知誰是故備言之或以為五官之長謂如昭二十九年蔡墨所云五行之官長也是天子之大臣非唐之遺民然姓而有五也并賜唐叔豈天子得以五行官長賜諸侯哉命以唐誥而封於夏虛注唐誥誥命篇名也夏虛大夏今大原晉陽也啟以夏政注亦因夏風俗開用其政疆以戎索注大原近戎而寒不與中國同故自以戎法三者皆叔也而有令德故昭之以分物不然文武成康之伯猶多而不獲是分也唯不尚年也疏正義曰文武成康皆以處長而立未得更有兄伯封為諸侯而云伯猶多者以叔年稚於伯仲處叔而得分多明其長者無所得伯是兄弟之長故舉伯以為言所云猶多者甚言之耳歴檢書傳文武成康未有兄為諸侯者幼者分物多長者無所得此唯為不尚年故也管蔡啟商惎間王室注惎毒也周公攝政管叔蔡叔開道紂子祿父以毒亂王室音義惎音忌間間厠之間道音導王於是乎殺管叔而蔡蔡叔注周公稱王命以討二叔蔡放也音義蔡蔡叔上素逹反注同下蔡叔如字以車七乘徒七十人注與蔡叔車徒而放之音義乗繩證反其子蔡仲改行帥德周公舉之以為己卿士注為周公臣音義行下孟反見諸王而命之以蔡注命為蔡侯音義見賢遍反其命書云王曰胡無若爾考之違王命也注胡蔡仲名疏正義曰書序云蔡叔旣没王命蔡仲踐諸侯位作蔡仲之命其經云唯周公位冡宰正百工羣叔流言乃致辟管叔于啇囚蔡叔于郭鄰以車七乗降霍叔于庶人三年不齒蔡仲克庸祗徳周公以為卿士叔卒乃命諸王邦之蔡王若曰小子胡惟爾率徳改行克慎厥猷肆予命爾侯于東土徃卽乃封敬哉爾尚葢前人之愆惟忠惟孝率乃祖文王之􅉓訓無若爾考之違王命傳之此言皆述書意而為之辭唯増言徒七十人耳孔安國云郭鄰中國之外地名亦不知何方地名也注正義曰惎毒間亂賈逵云然是相傳訓也道禄父作亂將以害周若毒螫然故云毒亂王室也蔡仲之命篇云周公乃致辟管叔于商囚蔡叔于郭鄰則是周公誅之矣而此言王者周公稱王命以討之書序云成王旣伐管叔蔡叔是稱王命之文也說文云􅔁散之也從米殺聲然則􅔁字殺下米也􅔁為放散之義故訓為放也隸書改作已失字體􅔁字不復可識寫者全類蔡字至有為一蔡字重㸃以讀之者今定本作蔡非也孔安國云明王之法誅父用子言至公周公圻内諸侯二卿治事是為周公圻内采邑之卿也若之何其使蔡先衞也武王之母弟八人周公為太宰康叔為司寇聃季為司空五叔無官豈尚年哉注五叔管叔鮮蔡叔度成叔武霍叔處毛叔聃也疏正義曰上言十人而此云八者伯邑考已死不數武王故八人尚書蘓公為司寇此言康叔者為蘓公出封為國康叔替之注正義曰史記云聃季載杜云毛叔聃又不數叔振鐸者杜以振鐸非周公同母故不數之或杜别有所見不以管蔡世家為說曹文之昭也注文王子與周公異母音義昭上饒反說文作紹晉武之穆也注武王子曹為伯甸非尚年也注以伯爵居甸服言小音義甸徒練反疏正義曰於昭穆曹是晉之叔父也晉為大國多受分物曹為伯爵而在甸服非是尊尚年長也桓二年傳云晉甸侯也晉亦在甸唯侯伯之爵異耳言為伯甸連言之耳於甸無升降也鄭𤣥云曹今濟隂定陶也去王城八百里東都之畿方六百里半之三百里侯服五百里定陶在畿外故為在甸服言其小也今將尚之是反先王也晉文公為踐土之盟衞成公不在夷叔其母弟也猶先蔡注踐土召陵二㑹經書蔡在衞上霸主以國大小之序也子魚所言盟㰱之次其載書云王若曰晉重注文公音義重直龍反魯申注僖公衞武注叔武蔡甲午注莊侯鄭㨗注文公音義㨗在接反齊潘注昭公音義潘普安反宋王臣注成公音義宋王臣如字本或作壬如林反莒期注兹丕公也齊序鄭下周之宗盟異姓為後音義丕普悲反藏在周府可覆視也吾子欲復文武之略注略道也音義覆芳服反疏正義曰言周家府藏之内有此載書在也本或為盟府由僖五年傳藏於盟府渉彼而誤耳而不正其德將如之何萇𢎞說告劉子與范獻子謀之乃長衞侯於盟疏正義曰正長也謂不長其有徳者也釋例曰周之宗盟異姓為後故踐土之盟載書齊宋雖大降於鄭衞斥周而言指謂王官之宰臨盟者也其餘雜盟未必皆然踐土召陵二㑹皆蔡在衛上時國次也至盟乃正其高下者敬共明神本其始也是言㑹以國之大小為次至盟乃先同姓盟之先同姓者唯謂王官之宰臨盟時耳踐土則王子虎盟諸侯於王庭此盟則劉子在焉故二者先同姓其餘雜盟亦以國之大小為次故襄二十七年宋之盟晉楚爭先若其皆先同姓則楚不得競也以此知餘盟不然反自召陵鄭子大叔未至而卒晉趙簡子為之臨甚哀曰黃父之㑹注在昭二十五年音義說音悅為于偽反下楚為沈同臨力鴆反父音甫夫子語我九言曰無始亂無怙富無恃寵無違同無敖禮無驕能注以能驕人音義語魚據反怙音戸敖五報反疏正義曰古者一字與二字並為一言易云伏羲作十言之教曰乾坤震巽坎離艮兌消息乾坤雖是二字亦一出口乃得言之故謂之一言今則一字為一言三字以上為一句無復怒注復重也音義復扶又反注同無謀非德注非所謀也無犯非義注傳言簡子能用善言所以遂興沈人不㑹于召陵晉人使蔡伐之夏蔡滅沈秋楚為沈故圍蔡伍員為吳行人以謀楚楚之殺郤宛也注在昭二十七年音義員音云伯氏之族出注郤宛黨伯州犂之孫嚭為吳大宰以謀楚楚自昭王卽位無歲不有吳師蔡侯因之以其子乾與其大夫之子為質於吳冬蔡侯吳子唐侯伐楚注唐侯不書兵屬於吳蔡音義犂力兮反嚭普鄙反乾其連反質音致舍舟于淮汭注吳乘舟從淮來過蔡而舍之音義舍音赦置也又音捨棄也注同汭人鋭反自豫章與楚夾漢注豫章漢東江北地名音義夾古洽反疏注正義曰漢書地理志豫章郡名在江南此在江北者土地名云定二年楚人伐吳師于豫章吳人見舟于豫章而潛師于巢吳軍楚師于豫章又柏舉之役吳人舍舟于淮汭而自豫章與楚師夾漢此皆在江北淮南蓋後徙在江南之豫章左司馬戌謂子常曰子㳂漢而與之上下注㳂緣也緣漢上下遮使勿渡音義㳂悅全反上時掌反遮正奢反我悉方城外以毁其舟注以方城外人毁吳所舍舟還塞大隧直轅㝠阨注三者漢東之隘道音義隧音遂㝠亡丁反本或作寘之豉反阨於懈反本或作隘音同子濟漢而伐之我自後擊之必大敗之旣謀而行武城黑謂子常注黑楚武城大夫曰吳用木也我用革也注用軍器不可久也不如速戰史皇謂子常楚人惡子而好司馬注史皇楚大夫司馬沈尹戌音義惡烏路反好呼報反若司馬毁吳舟于淮塞城口而入注城口三隘道之總名是獨克吳也子必速戰不然不免乃濟漢而陳自小别至于大别注禹貢漢水至大别南入江然則此二别在江夏界音義陳直覲反下文及注同夏戸雅反疏注正義曰禹貢云嶓冡導漾東流為漢又東為滄浪之水過三澨至于大别南入于江孔安國云三澨水名入漢大别山名觸山廻南入江如彼文大别在江北小别當近之小别當在大别之東也何則子常從小别與吳戰退而至大别明其自東而漸西也土地名小别大别皆闕不知所在或曰大别在安豊縣西南傳曰吳旣與楚夾漢然後楚乃濟漢而陳自小别至于大别然則二别近漢之名無縁反在安豊也三戰子常知不可欲奔注知吳不可勝史皇曰安求其事注求知政事難而逃之將何所入子必死之初罪必盡說注言致死以克吳可以免貪賄致寇之罪音義難乃旦反十一月庚午二師陳于柏舉注經所以書戰二師吳楚師闔廬之弟夫槩王晨請於闔廬曰楚瓦不仁注瓦子常名其臣莫有死志先伐之其卒必奔而後大師繼之必克弗許夫槩王曰所謂臣義而行不待命者其此之謂也今日我死楚可入也音義卒子忽反下同疏正義曰臣見義則行不待君命古有此言故云其此之謂也今日我致死而戰楚可入也以其屬五千先擊子常之卒子常之卒奔楚師亂吳師大敗之子常奔鄭史皇以其乘廣死注以戰死音義乗繩證反廣古曠反吳從楚師及淸發注清發水名將擊之夫槩王曰困獸猶鬭况人乎若知不免而致死必敗我若使先濟者知免後者慕之蔑有鬭心矣半濟而後可擊也從之又敗之楚人為食呉人及之奔食而從之敗諸雍澨五戰及郢注奔食食者走不陳故不在戰數音義澨市制反疏注正義曰五戰謂濟漢而陳自小别至于大别三戰也柏舉也清𤼵也此已五矣若復數雍澨則為六也傳例皆陳曰戰奔食而從之則食者走不暇為陳故不數也己卯楚子取其妹季芈畀我以出涉睢注睢水出新城昌魏縣東南至枝江縣入江是楚王西走音義芈面爾反楚姓畀必利反世族譜季芈畀我皆平王女也服云畀我季芈之字睢音七餘反下同疏正義曰世族譜季芈與畀我二人皆平王女也服䖍云季芈許嫁而字畀我季芈字也禮婦人許嫁笄而稱字季芈稱字是許嫁也葢遭亂夫死而改適鍾建耳注正義曰睢地名睢水出新城昌魏縣南𤼵河山東南經襄陽至南郡枝江縣入江此水在郢都之西楚王辟吳而西走鍼尹固與王同舟王使執燧象以奔吳師注燒火燧繫象尾使赴吳師驚却之音義鍼之林反燧音遂疏注正義曰賈逵云燧火燧也象象獸也以火繫其尾使奔吳師驚却其衆使王得脫杜用其說也禮有金燧木燧皆取火之物故以燧名火也說文云象長牙鼻南越之大獸也南州異物志云象身倍數牛而目則如豕其鼻長七八尺其所食物皆鼻取之性馴良為人所養夷人服乗之史記大宛傳曰身毒國其民皆乗象以戰是象可調馴楚近南邉故有此象王將渉睢吳師來偪故使以火繫象尾令突吳師使驚馬却之執燧象者旣繫火於尾執而牽向吳師乃放之庚辰呉入郢以班處宮注以尊卑班次處楚王宫室子山處令尹之宮注子山吳王子夫槩王欲攻之懼而去之夫槩王入之注入令尹宮也言吳無禮所以不能遂克左司馬戌及息而還注息汝南新息也聞楚敗故還敗吳師于雍澨傷注司馬先敗吳師而身被創音義創初良反初司馬臣闔廬故恥為禽焉注司馬嘗在吳為闔廬臣是以今恥於見禽謂其臣曰誰能免吾首吳句卑曰臣賤可乎司馬曰我實失子可哉注失不知子賢音義句古侯反疏正義曰言我比來失子不知子有賢行臨難能免吾首女今可守此言哉三戰皆傷曰吾不可用也已句卑布裳剄而裹之注司馬已死剄取其首音義剄古頂反裹音果疏注正義曰言布裳剄之是司馬傷而自殺故云已死藏其身而以其首免注傳言司馬之忠壯疏注正義曰謀毁舟敗吳是忠也雖傷猶戰不止是壯也楚子涉睢濟江入于雲中注入雲夢澤中所謂江南之夢音義夢如字又音蒙疏注正義曰土地名云南郡枝江縣西有雲夢城江夏安陸縣東南亦有夢城或曰南郡華容縣東南有巴丘湖江南之夢也郢都在江北睢東王走西渉睢又南濟江乃入于雲中知此在江南昭三年王與鄭伯田於江南之夢謂此也言江南之夢則江北亦有夢矣司馬相如子虚賦云雲夢者方九百里則此澤跨江南北王寢盜攻之以戈擊王王孫由于以背受之中肩王奔鄖鍾建負季芈以從注鍾建楚大夫音義中丁仲反鄖音云從才用反下同一音如字由于徐蘇而從注以背受戈故當時悶絶鄖公辛之弟懷將弑王曰平王殺吾父我殺其子不亦可乎注辛蔓成然之子鬭辛也昭十四年楚平王殺成然音義殺如字又申志反下我殺同蔓音萬辛曰君討臣誰敢讐之君命天也若死天命將誰讐詩曰柔亦不茹剛亦不吐不侮矜寡不畏彊禦唯仁者能之注詩大雅言仲山甫不辟疆陵弱音義茹音汝矜古頂反疏正義曰詩大雅烝民美宣王之詩其章内言仲山甫不茹柔不吐剛也釋言云啜茹也舍人曰啜茹食也檀弓云啜菽飲水啜菽謂食藜藿也然則茹者噉食之名違彊陵弱非勇也乘人之約非仁也滅宗廢祀非孝也注弑君罪應滅宗動無令名非知也必犯是余將殺女鬭辛與其弟巢以王奔隨音義知音智女音汝疏正義曰桓六年傳曰漢東之國隨為大土地名隨義陽隨縣其國在楚之東也土地名鄖江夏雲杜縣則是楚之西南吳師猶尚在楚更東來奔隨國者蓋為楚與隨有恩謂可保守故也吳人從之謂隨人曰周之子孫在漢川者楚實盡之天誘其衷致罰於楚而君又􅇡之注􅇡匿也音義衷音忠􅇡七亂反匿女力反周室何罪君若顧報周室施及寡人以奬天衷注奬成也音義施以䜴反君之惠也漢陽之田君實有之楚子在公宫之北注隨公宮也吳人在其南子期似王注子期昭王兄公子結也逃王而已為王曰以我與之王必免隨人卜與之不吉乃辭吳曰以隨之辟小而密邇於楚楚實存之世有盟誓至于今未改若難而棄之何以事君執事之患不唯一人注一人楚王音義辟匹亦反難乃旦反若鳩楚竟敢不聽命吳人乃退注鳩安集也音義竟音境鑪金初官於子期氏實與隨人要言注要言無以楚王與吳并欲脱子期音義鑪本又作鑢金名音慮是也王使見注王喜其意欲引見之以比王臣且欲使盟隨人音義見賢遍反下注敢見皆同辭曰不敢以約為利注此約謂要言也此一時之事非為德舉故辭不敢見亦不肯為盟主音義約如字又於妙反王割子期之心以與隨人盟注當心前割取血以盟示其至心初伍員與申包胥友注包胥楚大夫音義包必交反其亡也謂申包胥曰我必復楚國注復報也申包胥曰勉之子能復之我必能興之及昭王在隨申包胥如秦乞師曰吳為封豕長蛇以荐食上國注荐數也言吳貪害如蛇豕音義荐在薦反數所角反疏注正義曰釋言云荐再也再亦數之義也虐始於楚寡君失守社稷越在草莽使下臣告急曰夷德無厭若鄰於君疆埸之患也注吳有楚則與秦鄰音義草莽舊作茅亡交反今本多作莽莫蕩反下同厭於鹽反疆居良反埸音亦逮吳之未定君其取分焉注與吳共分楚地音義逮音代分扶問反若楚之遂亡君之土也若以君靈撫之世以事君注撫存恤也秦伯使辭焉曰寡人聞命矣子姑就館將圖而告對曰寡君越在草莽未獲所伏注伏猶處也下臣何敢卽安立依於庭牆而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣注詩秦風取其王于興師脩我戈矛與子同仇與子偕作與子偕行音義勺市灼反又音灼為于偽反仇音求疏正義曰無衣刺用兵也秦人刺其君好攻戰亟用兵而不與民同欲焉其詩云豈曰無衣與子同袍王于興師脩我戈矛與子同仇鄭注云此責康公之言也君豈嘗曰女無衣我與女同袍乎言不與民同欲也下注云君不與我同欲而於王興師則云脩我戈矛與子同仇徃伐之刺其好攻戰又云豈曰無衣與子同澤王于興師脩我矛㦸與子偕作又云豈曰無衣與子同裳王于興師脩我甲兵與子偕行九頓首而坐注無衣三章章三頓首秦師乃出注為明年包胥以秦師至張夲春秋左傳注疏卷五十四春秋左氏傳注疏卷五十四考證元年春王臣召南按定無正月則此春王連下文三月為句也注家解所以無正月之故截此二字疏亦從之其實當連下讀晉人執宋仲幾于京師疏長歴推辛巳是正月七日也監本脫推字傳將以城成周魏子涖政衞彪傒曰一叚顧炎武日知録曰此傳與昭三十二年傳共一事左氏兩收而失删其一耳周之正月晉之十一月也前傳曰己丑士彌牟營成周云云此傳曰庚寅栽宋仲幾不受功庚寅卽己丑之明日而傳分為兩年豈有遲之兩月而始栽宋仲幾乃不受功者乎且此役又不過三旬而畢矣傳魏獻子屬役於韓簡子注簡子韓起孫不信也臣浩按不信當是韓須之子須未及為卿先卒不信代立者也史記韓世家宣子生貞子貞子生簡子然則須卽貞子歟傳孟懿子㑹城成周注不書公未卽位趙汸補注曰前年冬㑹而令役新年乃赴功無再書之法傳晉女叔寛曰周萇𢎞齊高張皆將不免萇叔違天高子違人天之所壊不可支也衆之所為不可奸也趙汸補注曰女寛之言不明君臣之義非知天者也晉伯字亦曰天方授楚皆周末士大夫偷慢之言至范鞅謂季孫有天之贊則又託以文其奸皆邪說也臣召南按趙氏此論最正信如女叔寛言將自古忠臣義士皆違天乎哉傳子家子不見叔孫易㡬而哭趙汸補注曰季孫逐君君臣之義絶故子家子亦與季孫絶其不見叔孫卽所以絶季孫也傳吳人見舟於豫章而潛師於巢臣召南按釋例土地名謂豫章為淮南江北地甚確且與巢當亦不逺也公如晉至河乃復程子曰意如上不請天子下不請方伯而立定公故晉怒而公徃朝焉晉辭公而復明年因㑹而請盟于臯鼬蔡侯以吳子及楚人戰于柏舉孫復曰以者乞師而用之也吳稱子者大救蔡也晉合十八國之君不能救蔡伐楚吳子救之伐之吳晉强弱之勢較然故自是諸侯大小皆宗於吳傳晉荀寅求貨於蔡侯臣召南按晉自平公以後其卿大夫皆貪求賄賂致失諸侯與楚囊瓦何異哉范鞅荀寅穢跡尤著宜乎先四族而亡也傳嘖有煩言煩監本訛作頓今改正傳祝奉以從疏尚書甘誓云用命賞于祖甘誓監本訛作其音今改正傳夏后氏之璜疏古者分同姓以寳玉展親寳監本訛作珍今改正傳五叔無官豈尚年哉注毛叔聃也臣召南按傳旣曰聃季為司空矣謂之無官可乎不數曹叔振鐸而數毛叔聃此不可解孔氏揣杜氏之意謂叔鐸非周公同母故不數之亦未可信傳夫子語我九言曰王應麟曰古以一句為一言子大叔九言論語一言以蔽之曰思無邪是也秦漢以來乃有句稱今以一字為一言如五言六言七言詩之類非也又疏古者一字與二字並為一言易曰伏羲作十言之敎曰乾坤震巽坎離艮兌消息乾坤雖是二字亦一出口乃得言之故謂之一言今則一字為一言三字以上為一句臣照按此疏語必有舛訛乾坤震巽坎離艮兌消息為十字曰十言孔氏乃以乾坤二字為一言則九言矣又以此為十言之教何也傳奔食而從之臣召南按杜注以奔食為句林堯叟以奔字為句食而從之為句言吳人卽食楚軍之食而從之戰也傳九頓首而坐秦師乃出臣召南按申包胥戰國策謂之棼冐勃蘓莫敖子華曰昔吳與楚戰于柏舉三戰入郢棼冐勃蘓贏糧潛行上崢山踰深溪蹠穿膝暴七日而薄秦朝雀立不轉晝吟宵哭七日不得告水漿無入口秦遂出革車千乗卒萬人屬之子滿與子虎下塞以東與吳人戰于濁水大敗之卽此事也臣照按管子申麃醫郢申麃當亦卽是申包胥蓋吳楚之間人名非告于上國而史得書于策者大抵皆有音無字隨紀載者所聞而書之申麃申包胥棼冐勃蘓音皆似也春秋左氏傳注疏卷五十四考證
