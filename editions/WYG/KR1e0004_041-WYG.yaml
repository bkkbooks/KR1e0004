body:
  text: 春秋左傳注疏卷四十一起昭公元年盡元年晉杜氏注唐陸徳明音義孔穎逹疏昭公音義陸曰昭公名裯㐮公子母齊歸在位二十五年遜于齊在外八年凡三十三年薨于乾侯謚法威儀恭明曰昭疏正義曰魯世家昭公名裯襄公之子齊歸所生以周景王四年即位諡法威儀恭明曰昭是嵗嵗在大梁經元年春王正月公即位注無傳叔孫豹㑹晉趙武楚公子圍齊國弱宋向戌衞齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢注招實陳侯母弟不稱弟者義與莊二十五年公子友同今讀舊書則楚當先晉而先書趙武者亦取宋盟貴武之信故尚之也衞在陳蔡上先至於㑹音義招常遥反虢𤓰百反當先悉薦反疏注正義曰八年經書陳侯之弟招故知是陳侯母弟也不稱弟云云荘二十五年注云公子友荘公之母弟稱公子者史策之通言母弟至親異於他臣其相殺害則稱弟以示義至於嘉好之事兄弟篤睦非例所興或稱弟或稱公子仍舊史之文也八年招殺世子故稱弟以章招罪此奉使以會諸國非義例之所興舊史書為公子而仲尼因之也公羊傳曰此陳侯之弟招也何以不稱弟貶􅂚為貶殺世子偃師貶大夫相殺稱人此其稱名氏以殺何言将自是弑君也然則􅂚為不於其弑焉貶以親者弑然後其罪惡甚春秋不待貶絶而罪惡見者不貶􅅸以見罪惡也貶􅅸然後罪惡見者貶絶以見罪惡也今招之罪巳重矣􅂚為復貶乎此著招之有罪也何著乎招之有罪言楚之託乎討招以滅陳也其意言八年楚託討於招以㓕陳著招之罪重故於此預貶之先儒或取公羊為說釋例云穎氏曰臣無竟外之交故去弟以貶季友子招樂憂故去弟以懲􅂈鄭段去弟唯以名通故謂之貶今此二人皆書公子公子者名號之羙稱非貶詞也是觧招不稱弟之意也春秋之初衞在陳上荘十六年幽之盟衛在陳下自爾以来常在陳下荘十六年注云陳國小每盟㑹皆在衞下齊桓始覇楚亦始強陳侯介于二大國之間而為三恪之客故齊桓因而進之遂班在衞上終於春秋是衛之班次常在陳下今衛乃在蔡之上必有其故也㐮十年諸侯伐鄭齊世子光序在滕子之上傳曰齊崔杼使太子光先至于師故長於滕是先至有進班之理故謂此為先至於㑹故也三月取鄆注不稱将帥将卑師少書取言易也音義鄆音運将子匠反下同帥所類反易以䜴反疏注正義曰将卑師少例當稱人魯史不得自言魯人直書所為之事明其有人取之也若将卑師衆則言師取某㐮十三年傳例云凡書取言易也故杜以此為易耳賈逵云楚以伐莒来討故諱伐不諱取劉炫以賈說為是故又規杜云案傳武子伐莒知非将卑師少也稱伐則是非易也社何得以為易将卑師少乎今刪定知不然者以諸稱取傳皆以易釋之此取文與彼同故以為易也若以武子伐而取之則致力難重當以㓕為文與㓕項同也案㓕項被討不諱㓕此亦被討何以諱㓕而言取若必有所諱當傳有其事今傳言莒魯争鄆為日乆矣魯無大罪亦何所諱也傳云武子伐莒者武子為伐莒之主耳别遣小将而行故不書武子猶如成二年傳言楚子重侵衞經書楚師杜云子重不書不親兵之類是也不書伐者以兵未加鄆鄆人逆服與襄九年傳稱諸侯圍鄭經不書杜云鄭人逆服不成圍相似劉以賈氏之注而規杜氏非也夏秦伯之弟鍼出奔晉注稱弟罪秦伯音義鍼其亷反六月丁巳邾子華卒注無傳三同盟疏注正義曰華以㐮十八年即位十九年盟于祝柯二十年于澶淵二十五年于重丘皆邾魯俱在是三同盟晉荀吳帥師敗狄于大鹵注大鹵大原晉陽縣音義大鹵大如字徐音㤗鹵音魯穀梁傳云中國曰大原夷狄曰大鹵秋莒去疾自齊入于莒注國逆而立之曰入音義去起吕反莒展輿出奔吳注弑君賊未㑹諸侯故不稱爵音義莒展輿出奔吳一本莒展出奔呉疏注正義曰釋例云諸侯不受先君之命而纂立得與諸侯㑹者則以成君書之若未得接於諸侯則不稱爵傳曰㑹于平州以定公位又曰先君若有罪則君列諸㑹矣此以㑹為斷也是杜據彼傳之二文知此為未㑹諸侯不稱爵叔弓帥師疆鄆田注春取鄆今正其封疆音義疆居良反注同𦵏邾悼公注無傳冬十有一月己酉楚子麇卒注楚以瘧疾赴故不書弑音義麇九倫反以瘧音虐書弑申志反或作殺音同疏注正義曰傳稱縊而殺之而經書卒者㐮七年鄭子駟使賊夜弑僖公而以瘧疾赴于諸侯而經書為卒知此亦以瘧疾赴故不書弑公子比出奔晉注書名罪之疏注正義曰齊崔氏宋司城無罪書氏書官此傳無罪状直以不能自固其位耳出奔又無可善無可善即是罪未必犯大罪也傳元年春楚公子圍聘于鄭且娶於公孫段氏伍舉為介注伍舉椒舉介副也音義娶七住反介音界注同将入館注就客舍鄭人惡之注知楚懐詐音義惡烏路反使行人子羽與之言乃館於外注舍城外既聘将以衆逆注以兵入逆婦子産患之使子羽辭曰以敝邑􅄶小不足以容從者請墠聼命注欲於城外除地為墠行婚禮音義􅄶必淺反下同從才用反墠音善令尹命太宰伯州犂對曰君辱貺寡大夫圍謂圍将使豐氏撫有而室注豐氏公孫段音義貺音况圍布几筵告於荘共之廟而来注荘王圍之祖共王圍之父音義几本亦作機筵音延共音恭疏正義曰聘禮臣奉君命聘于鄰國猶尚幣于禰乃行况婚是嘉禮之重故圍自布几筵告祖父母之廟而来也文王世子曰五廟之孫祖廟未毁雖為庻人冠取妻必告鄭𤣥云告於君也亦既告君必湏告廟君尊不主臣婚故圍自告也若野賜之是委君貺於草莾也是寡大夫不得列於諸卿也注言不得從卿禮音義莾莫蕩反疏正義曰言我若受野賜之禮則是委頓我君之命得貺於草莽之中則是寡大夫不得列於諸卿之位也不寕惟是又使圍䝉其先君注䝉欺也告先君而来不得成禮於女氏之廟故以為欺先君疏正義曰不寕寕也言寕有唯是之事又使圍䝉其先君連讀為義也告廟云将向豐氏之家取妻若使受之於野不至豐氏之家是欺先君也言又者既辱今君又辱先君故云又也将不得為寡君老注大臣稱老懼辱命而黜退其蔑以復矣唯大夫圖之子羽曰小國無罪恃實其罪注恃大國而無偹則是罪将恃大國之安靖巳而無乃包藏禍心以圖之小國失恃而懲諸侯使莫不憾者距違君命而有所壅塞不行是懼注言已失所恃則諸侯懲恨以距君命壅塞不行所懼唯此音義懲直升反憾户暗反壅本又作雍於勇反注及下注同不然敝邑館人之屬也注館人守舍人也其敢愛豐氏之祧注祧逺祖廟音義祧他彫反疏注正義曰祭法云逺廟為祧鄭𤣥云祧之言超也超上去意也以祧是尊逺之意故以祧言廟耳此公孫段是穆公之孫子豐之子其家唯有子豐之廟君若特賜或得立穆公之廟耳其家無逺祖廟也杜言逺祖廟者順𫝊文且據正法言之伍舉知其有偹也請垂櫜而入注垂櫜示無弓音義櫜古刀反弓衣也許之正月乙未入逆而出遂㑹於虢注虢鄭地尋宋之盟也注宋盟在㐮二十七年祁午謂趙文子曰宋之盟楚人得志於晉注得志謂先㰱午祁奚子音義㰱所洽反今令尹之不信諸侯之所聞也子弗戒懼又如宋注恐楚復得志音義復扶又反子木之信稱於諸侯猶詐晉而駕焉注駕猶陵也詐謂􅇆甲音義駕如字又音加注及下同􅇆音忠况不信之尤者乎注尤甚也楚重得志於晉晉之耻也子相晉國以為盟主於今七年矣注㐮二十五年始為政以春言故云七年音義重直用反相息亮反疏正義曰㐮二十五年傳云趙文子為政至此八年也而云七年者敫周雖改正朔常以夏正為言此春正月故為七年年末醫和則云八年再合諸侯注㐮二十五年㑹夷儀二十六年㑹澶淵疏正義曰㐮二十六年經書公㑹晉人鄭良霄宋人曹人于澶淵晉人即趙武也時有魯公在㑹雖則唯公一人即是諸侯不得謂之大夫也故知再㑹諸侯數澶淵也三合大夫注㐮二十七年㑹于宋三十年㑹澶淵及今㑹虢也服齊狄寕東夏注㐮二十八年齊侯白狄朝晉音義夏户雅反平秦亂注㐮二十六年秦晉為成城淳于注㐮二十九年城把之淳于杞遷都音義淳音純師徒不頓國家不罷民無謗讟注讟誹也音義罷音皮讟音獨誹非畏反疏注正義曰說文云謗毁也誹謗也則謗讟誹其義同皆是非毁人古人重言之猶險阻艱難也諸侯無怨天無大災子之力也有令名矣而終之以耻午也是懼吾子其不可以不戒文子曰武受賜矣注受午言然宋之盟子木有禍人之心武有仁人之心是楚所以駕於晉也今武猶是心也楚又行僣注僣不信音義僣子念反下同非所害也我将信以為本循而行之譬如農夫是穮是蓘注穮耘也壅苖為蓘音義穮彼驕反蓘古本反耘音云除草也疏注正義曰漢書食貨志云后稷始甽田以二耜為耦廣尺深尺曰畎長終一畆一畆三甽一夫三百甽而播種于甽中苖生三葉以上稍壮耨壟草因壝為土以附苖根故其詩云或耘或耔黍稷薿薿耘除草也耔附根也言苖稍壮每耨輙附其根比至盛暑壟盡平而根深能風與旱故薿薿而盛也此言穮衮即詩之耘耔也故知穮是耨以土壅苖根為蓘也耨定本耘雖有饑饉必有豐年注言耕鉏不以水旱息必獲豐年之收音義饉其靳反鉏仕居反收手又反又如字疏正義曰言耕鉏不息必有豐年之收以喻禮信不愆必為諸侯之長也且吾聞之能信不為人下吾未能也注自恐未能信也詩曰不僣不賊鮮不為則信也注詩大雅僣不信賊害人也音義鮮息淺反能為人則者不為人下矣吾不能是難楚不為患楚令尹圍請用牲讀舊書加于牲上而巳注舊書宋之盟書楚恐晉先㰱故欲從舊書加于牲上不㰱血經所以不書盟音義難乃旦反下注並同晉人許之三月甲辰盟楚公子圍設服離衞注設君服二人執戈陳於前以自衞離陳也疏注正義曰穆子言似君知設服設君服也唯譏執戈不言衣服則君服即二戈是也離衞之語必為執戈發端但語畧雖明服䖍云二人執戈在前在國居君離宫陳衞在門然則執戈在前國君行時之衞非在家守門之衞也守門之衞其兵必多非徒二戈而已縱使在國居君之離宫即名宫門之衞以為離衛其言大不侔矣故杜以離衛即執戈是也言二人執戈陳列於前以自防衞也離之為陳雖無正訓兩人一左一右相離而行故稱衞離亦陳之義叔孫穆子曰楚公子羙矣君哉注羙服似君鄭子皮曰二執戈者前矣注禮國君行有二執戈者在前疏注正義曰士喪禮言君臨臣喪之禮云小臣二人執戈先二人後是知國君之行常有二執戈者在前也國君亦有二戈在後子皮唯言前有二戈者當是公子圍不設後戈故也蔡子家曰蒲宫有前不亦可乎注公子圍在㑹特緝蒲為王殿屋屏蔽以自殊異言既造王宫而居之雖服君服無所怪也音義緝七入反疏注正義曰服䖍云蒲宫楚君離宫言令尹在國巳居君之宫出有前戈不亦可乎令尹居君離宫事無所出且諸侯大夫見其在㑹之儀不譏在國所居伯州犂云此行也辭而假之寡君言行而借戈以衞非在國借宫以居也故杜以為公子圍在㑹特緝蒲為王殿屋以自殊異此亦無所案據要惬人情楚伯州犂曰此行也辭而假之寡君注聞諸大夫譏之故言假以餙令尹過鄭行人揮曰假不反矣注言将遂為君伯州犂曰子姑憂子晳之欲背誕也注㐮三十年鄭子晳殺伯有背命放誕将為國難言子且自憂此無為憂令尹不反戈音義背音佩注同誕音但子羽曰當璧猶在假而不反子其無憂乎注子羽行人揮當璧謂棄疾事在昭十三年言棄疾有當璧之命圍雖取國猶将有難不無憂也齊國子曰吾代二子愍矣注國子國弱也二子謂王子圍及伯州犂圍此冬便簒位不能自終州犂亦尋為圍所殺故言可愍音義篡初患反疏注正義曰服䖍云愍憂也代伯州犂憂公子圍代子羽憂子晳劉炫從服言而規杜失今知不然者以圍不能自終伯州犂尋為圍所殺是皆遇凶害故云吾代二子愍矣若以二子為伯州犁子羽子羽則卒無禍害又何可愍而代之乎劉以服意而規杜過非也陳公子招曰不憂何成二子樂矣注言以憂生事事成而樂音義樂音洛注及下樂樂而樂同衞齊子曰苟或知之雖憂何害注齊子齊惡言先知為偹雖有憂難無所損害宋合左師曰大國令小國共吾知共而已注共承大國命不能知其禍福音義共音恭下及注同晉樂王鮒曰小旻之卒章善矣吾從之注小旻詩小雅其卒章義取非唯暴虎馮河之可畏也不敬小人亦危殆王鮒從斯義故不敢譏議公子圍音義鮒音附旻亡中反馮皮氷反疏注正義曰小旻詩小雅刺幽王也退㑹子羽謂子皮曰叔孫絞而婉注絞切也譏其似君反謂之羙故曰婉音義絞古夘反婉紆阮反注同宋左師簡而禮注無所臧否故曰簡共事大國故曰禮音義否悲矣反舊方凡反樂王鮒字而敬注字爱也不犯凶人所以自爱敬子與子家持之注子子皮子家蔡公孫歸生持之言無所取與音義持如字本或作恃誤疏注正義曰持謂執持之也子皮直云二執戈者前矣雖意知不可而詞無譏切子家云蒲宮有前不亦可乎意雖并譏蒲宮言乃謂之為可不如子羽之譏訐不同伯州犂之飾辭持其兩端無所取與是持之也奕棋謂不能相害為持意亦同于此也皆保世之主也齊衞陳大夫其不免乎國子代人憂子招樂憂齊子雖憂弗害夫弗及而憂與可憂而樂與憂而弗害皆取憂之道也憂必及之大誓曰民之所欲天必從之注逸書三大夫兆憂憂能無至乎注開憂兆也言以知物其是之謂矣注物類也察言以知禍福之類八年陳招殺太子國弱齊惡當身各無患音義當丁浪反季武子伐莒取鄆注兵未加莒而鄆服故書取而不言伐莒人告於㑹楚告於晉曰尋盟未退注尋弭兵之盟而魯伐莒瀆齊盟注瀆慢也音義瀆徒木反請戮其使注時叔孫豹在㑹欲戮之音義使所吏反下注出使自使下召使者同樂桓子相趙文子注桓子樂王鮒相佐也音義相息亮反注同欲求貨於叔孫而為之請使請帶焉注難指求貨故以帶為辭音義而為于偽反下注為諸侯同弗與梁其踁曰貨以藩身子何愛焉注踁叔孫家臣音義踁户定反藩方元反叔孫曰諸侯之㑹衞社稷也我以貨免魯必受師注言不戮其使必伐其國疏注正義曰晉語趙文子謂叔孫曰子盍逃之對曰豹也受命於君以從諸侯之盟為社禝也若魯有罪受盟者逃魯必不免是吾出而危之也若為諸侯戮魯誅盡矣必不加師請為戮也是言不戳其使必伐其國也是禍之也何衞之為人之有牆以蔽惡也注喻巳為國衞如牆為人蔽牆之隙壊誰之咎也注咎在墻音義隙去逆反咎其九反注同衞而惡之吾又甚焉注罪甚牆雖怨季孫魯國何罪注怨季孫之伐莒叔出季䖏有自来矣吾又誰怨注季孫守國叔孫出使所從来乆今遇此戮無所怨也疏注正義曰歴檢上世以来季孫出使不少於叔孫而云叔出季䖏從来久者季孫世為上卿法當上卿守國次卿出使以此為從来久耳必須使上卿者上卿非不使也然鮒也賄弗與不已召使者裂裳帛而與之曰帶其􅄶矣注言帶􅄶盡故裂裳示不相逆音義賄呼罪反趙孟聞之曰臨患不忘國忠也注謂言魯國何罪思難不越官信也注謂言叔出季䖏音義難乃旦反下同圖國忘死貞也注謂不以貨免謀主三者義也注三者忠信貞有是四者又可戮乎注并義而四乃請諸楚曰魯雖有罪其執事不辟難注執事謂叔孫畏威而敬命矣注謂不敢辟戮子若免之以勸左右可也若子之羣吏處不辟汚注汚勞事音義汚音烏注及下同疏注正義曰䖏國之所辟者唯有辟勞事耳故以汚為勞事也言事之勞身若檅之汚物也出不逃難注不苟免其何患之有患之所生汚而不治難而不守所由来也能是二者又何患焉不靖其能其誰從之注安靖賢能則衆附從魯叔孫豹可謂能矣請免之以靖能者子㑹而赦有罪注不伐魯又賞其賢注赦叔孫諸侯其誰不欣焉望楚而歸之視逺如邇疆埸之邑一彼一此何常之有注言今衰世彊場無定主音義彊居良反注及下封疆莒之疆事同場音亦注同王伯之令也注言三王五伯有令徳時疏注正義曰以傳言王伯故言三王下云虞有三苖則帝時亦有非獨三王也但王亦帝也故傳通言其王耳引其封疆注引正也正封界而樹之官注樹立也立官以守國舉之表旗注旌旗以表貴賤音義旗音其疏正義曰舉立也為立表貴賤之旌旗也故杜云旌旗以表貴賤而著之制令注為諸侯作制度法令使不得相侵犯過則有刑猶不可壹於是乎虞有三苖注三苖饕餮放三危者音義饕吐刀反餮吐結反夏有觀扈注觀國今頓丘衞縣扈在始平鄠縣書序曰啟與有扈戰于甘之野音義夏户雅反觀音館舊音官扈音户鄠音于商有姺邳注二國商諸侯邳今下邳縣音義姺西典反又商禮反邳皮悲反周有徐奄注二國皆嬴姓書序曰成王伐淮夷遂踐奄徐即淮夷音義嬴音盈疏注正義曰二國皆嬴姓世本文也書序曰成王伐淮夷遂踐奄淮夷與奄同時伐之此徐奄連文故以為徐即淮夷賈逵亦然是相傳說也服䖍云一曰魯公所伐徐戎也案費誓云淮夷徐戎竝興孔安國云淮浦之夷徐州之戎竝起為冦則徐亦非國名此徐是國名當謂淮浦之夷其國名徐書序記其大號此傳言其國名也僖公時楚人伐徐杜云下邳僮縣東南有大徐城彼近淮旁成王時徐盖亦在彼地也此傳所云四代有罪之國其三苗與有扈徐奄尚書畧有其事其觀與姺邳則史傳無文傳言王伯之令猶尚有此軰則此軰皆是王道盛明時諸侯也自無令王諸侯逐進注逐猶競也狎主齊盟其又可壹乎注彊弱無常故更主盟音義狎户甲反更音庚恤大舍小足以為盟主注大謂簒試㓕亡之禍又焉用之注焉用治小事音義焉於䖍反注同封疆之削何國蔑有主齊盟者誰能辯焉注辯治也疏正義曰言封疆之相侵削何國無有此乃常事主齊盟者誰能一一治之吳濮有釁楚之執事豈其顧盟注吳在東濮在南今建寕郡南有濮夷釁過也音義濮音卜釁許靳反莒之疆事楚勿與知諸侯無煩不亦可乎莒魯爭鄆為日乆矣苟無大害於其社稷可無亢也注亢禦音義與音預亢苦浪反徐又音剛禦魚吕反去煩宥善莫不競勸疏正義曰不徃討魯諸侯無煩是去煩也叔孫賢人今若赦之是宥善也徳義如是餘人莫不競力勸慕為善矣子其圖之固請諸楚楚人許之乃免叔孫令尹享趙孟賦大眀之首章注大明詩大雅首章言文王明明照於下故能赫赫盛於上令尹意在首章故特稱首章以自光大音義去起吕反宥音又趙孟賦小宛之二章注小宛詩小雅二章取其各敬爾儀天命不又言天命一去不可復還以戒令尹音義宛紅阮反復扶又反疏注正義曰詩序云大夫刺幽王也其二章云人之齊聖飲酒温克彼昏不知壹醉日富各敬爾儀天命不又注又復也今女君臣各敬慎威儀天命一去不復來也事畢趙孟謂叔向曰令尹自以為王矣何如注問将能成否對曰王弱令尹彊其可哉注言可成雖可不終趙孟曰何故對曰彊以克弱而安之彊不義也注安於勝君是彊而不義不義而彊其斃必速詩曰赫赫宗周褒姒滅之彊不義也注詩小雅褒姒周幽王后幽王惑焉而行不義遂至滅亡言雖赫赫盛彊不義足以滅之音義姒音似滅如字詩作烕音呼悦反令尹為王必求諸侯晋少懦矣注懦弱也音義懦乃亂反諸侯将徃若獲諸侯其虐滋甚注滋益也民弗堪也将何以終夫以彊取注取不以道不義而克必以為道注以不義為道道以滛虐弗可乆已矣注為十二年楚弑靈王傳疏正義曰以不義謂之為道而滛虐為之民所不堪不可乆矣夏四月趙孟叔孫豹曹大夫入於鄭注㑹罷過鄭音義過古禾反鄭伯兼享之子皮戒趙孟注戒享期禮終趙孟賦瓠葉注受所戒禮畢而賦詩瓠葉詩小雅義取古人不以㣲薄廢禮雖瓠葉兔首猶與賔客享之音義瓠户故反客享之許丈反又普庚反子皮遂戒穆叔且告之注告以趙孟賦瓠葉穆叔曰趙孟欲一獻注瓠葉詩義取薄物而以獻酬知欲一獻子其從之子皮曰敢乎注言不敢穆叔曰夫人之所欲也又何不敢注夫人趙孟音義夫音扶注同及享具五獻之籩豆於幕下注朝聘之制大國之卿五獻音義幕武博反疏注正義曰周禮大行人稱上公饔餼九牢饗禮九獻侯伯七獻子男五獻皆獻数各同饔餼之数也案聘禮卿聘饔餼五牢故卿皆五獻至春秋之時大國之卿乃得從卿禮若次國之卿依大國大夫之制唯三獻耳故杜此注云大國之卿五獻又昭六年傳注云大夫三獻是也趙孟辭注趙孟自以今非聘鄭故辭五獻私於子産注私語曰武請於冡宰矣注冡宰子皮請謂賦瓠葉乃用一獻趙孟為客禮終乃宴注卿㑹公侯享晏皆折俎不體薦音義折之設反疏注正義曰傳言禮終乃宴謂之享禮既終即因而為宴不待異日也杜觧享宴禮異所以得相因者以其殽俎同故也宣十六年傳云王享有體薦宴有折俎公當享卿當宴王室之禮也彼傳之意言享公當依享法有體薦也享卿當如宴法有折俎也彼王自言之故云王室禮耳其實諸侯之待公卿禮亦當然以卿㑹公侯享宴皆折俎不體薦享宴俎同故得因行禮也穆叔賦鵲巢注鵲巢詩召南言鵲有巢而鳩居之喻晋君有國趙孟治之趙孟曰武不堪也又賦采蘩注亦詩召南義取蘩菜薄物可以薦公侯享其信不求其厚音義蘩音煩曰小國為蘩大國省穡而用之其何實非命注穆叔言小國微薄猶蘩菜大國能省愛用之而不棄則何敢不從命穡愛也音義省所景反徐所幸反注同子皮賦野有死􅍪之卒章注野有死􅍪詩召南卒章曰舒而脫脫兮無感我帨兮無使厖也吠脫脫安徐帨佩巾義取君子徐以禮来無使我失節而使狗驚吠喻趙孟以義撫諸侯無以非禮相加陵音義麕亦作麏九倫反脫脱吐外反帨始鋭反厖武江反吠扶廢反趙孟賦常棣注常棣詩小雅取其凡今之人莫如兄弟言欲親兄弟之國音義常棣直計反且曰吾兄弟比以安厖也可使無吠注受子皮之詩音義比毗志反下注徳比同穆叔子皮及曹大夫興拜注三大夫皆兄弟國興起也舉兕爵曰小國頼子知免於戾矣注兕爵所以罰不敬言小國蒙趙孟徳比以安自知免此罰戮音義兕徐履反戾力計反下同飲酒樂趙孟出曰吾不復此矣注不復見此樂音義樂音洛注同復扶又反注及下不復年并注同天王使劉定公勞趙孟於潁館於雒汭注王周景王定公劉夏潁水出陽城縣雒汭在河南鞏縣南水曲流為汭音義勞力報反下以勞之同穎營井反汭如鋭反夏户雅反劉子曰羙哉禹功注見河雒而思禹功明徳逺矣㣲禹吾其魚乎吾與子弁冕端委以治民臨諸侯禹之力也注弁冕冠也端委禮衣言今得共服冠冕有國家者有由禹之力音義弁冕端委本亦作弁端委疏注正義曰冠者首服之縂名弁冕冠中之小别弁冕是首服端委是身服言弁冕端委縂舉冠衣而言非謂定公趙孟身所自衣也哀七年傳云大伯端委以治周禮仲雍嗣之㫁髪文身以文身從彼之俗知端委是依禮之衣杜直言端委禮衣不知是何衣也名曰端委又無所說周禮司服於士服之下云其齊服有𤣥端素端鄭𤣥云謂之端者取其正也謂士之衣袂皆二尺二寸而屬幅是廣袤等也其祛尺二寸大夫以上侈之侈之者盖半而益一焉半而益一則其袂三尺三寸祛尺八寸如鄭此言唯士服當端制大夫以上不復端也服䖍云禮衣端正無殺故曰端文徳之衣尚褒長故曰委案論語鄉黨非帷裳必殺之鄭康成云帷裳謂朝祭之服其制正幅如帷非帷裳者謂深衣削其幅縫齊倍要禮記深衣制短不見膚長不被土然則朝祭之服當曵地服言是也子盍亦逺績禹功而大庇民乎注勸趙孟使纂禹功音義子盍户臘反何不也亦逺績禹功本或作亦逺績功庇必利反又音祕疏正義曰績亦功也重其言耳逺績禹功者勸之為大功使逺及後世若大禹也謂勸武何不逺纂大禹之績而立大功以庇民也對曰老夫罪戾是懼焉能恤逺吾儕偷食朝不謀夕何其長也注言欲苟免目前不能念長乆音義焉於䖍反下焉用焉能同儕仕皆反朝如字下同疏正義曰儕等也言吾等於彼卑賤苟且飲食之人也劉子歸以語王曰諺所謂老将知而耄及之者注八十曰耄耄亂也音義語魚據反知音智耄莫報反其趙孟之謂乎為晋正卿以主諸侯而儕於𨽻人朝不謀夕注言其自比於賤人而無恤民之心疏注正義曰趙孟自言吾儕偷食是自比於𨽻役賤人也在上位者當憂勞百姓卑賤之人勞身而已自比賤人是無憂民之心也棄神人矣注民為神主不恤民故神人皆去神怒民叛何以能乆趙孟不復年矣注言将死不復見明年神怒不歆其祀民叛不即其事祀事不從又何以年注為此冬趙孟卒起本叔孫歸注虢㑹歸㑹天御季孫以勞之旦及日中不出注恨季孫伐莒使已㡬被戮會天謂會阜注㑹阜叔孫家臣曰旦及日中吾知罪矣魯以相忍為國也忍其外不忍其内焉用之注欲受楚戮是忍其外日中不出是不忍其内阜曰數月於外注言叔孫勞役在外數月音義數所主反注同一旦於是庸何傷賈而欲贏而惡囂乎注言譬如商賈求贏利者不得惡諠囂之聲音義賈音古注同贏音盈注同惡烏路反注及下同囂許驕反徐五髙反注同諠或作讙呼端反疏注正義曰言已伐莒求利而不得惡日中不出譬如商賈求利不得惡諠囂之聲以商賈在市市人多諠囂之聲阜謂叔孫曰可以出矣叔孫指楹曰雖惡是其可去乎乃出見之注楹柱也以喻魯有季孫猶屋有柱音義楹音盈去起吕反鄭徐吾犯之妹羙注犯鄭大夫公孫楚聘之矣注楚子南穆公孫公孫黑又使強委禽焉注禽雁也納采用雁音義強其丈反犯懼告子産子産曰是國無政非子之患也唯所欲與犯請於二子請使女擇焉皆許之子晳盛飾入布幣而出注布陳贄幣子晳公孫黑音義贄音至子南戎服入左右射超乗而出女自房觀之曰子晳信羙矣抑子南夫也注言丈夫音義乗繩證反夫夫婦婦所謂順也疏正義曰夫如夫道當剛強也婦如婦節當柔弱也如是所謂順也曹大家女誡曰生男如狼猶恐其虺生女如䑕猶懼其武是男欲剛而女欲柔也適子南氏子晳怒既而櫜甲以見子南欲殺之而取其妻子南知之執戈逐之及衝擊之以戈注衝交道音義橐古刀反本或作衷丁隆反衝尺容反子晳傷而歸告大夫曰我好見之不知其有異志也故傷大夫皆謀之子産曰直鈞幼賤有罪罪在楚也注先聘子南直也子南用戈子晳直也子産力未能討故鈞其事歸罪於楚音義好如字一音呼報反直鈞音均􅅸句乃執子南而數之曰國之大節有五女皆奸之注奸犯也音義女音汝下皆同奸音干畏君之威聼其政尊其貴事其長養其親五者所以為國也今君在國女用兵焉不畏威也奸國之紀不聼政也注奸國之紀謂傷人音義長丁丈反下同養如字下同子晳上大夫女嬖大夫而弗下之不尊貴也幼而不忌不事長也注忌畏也音義嬖必計反下户嫁反兵其從兄不養親也君曰余不女忍殺宥女以逺勉速行乎無重而罪五月庚辰鄭放㳺楚於呉将行子南子産咨於太叔注太叔㳺楚之兄子音義從兄如字又才用反重直用反又直勇反太叔曰吉不能亢身焉能亢宗注亢蔽也音義亢苦浪反彼國政也非私難也子圖鄭國利則行之又何疑焉周公殺管叔而蔡蔡叔注蔡放也音義難乃旦反而蔡蔡叔上蔡字音素葛反說文作􅔁音同字從殺下米云􅔁散之也㑹杜義下蔡叔如字疏正義曰說文云􅔁散之也從米殺聲然則􅔁字殺下米也􅔁為放散之義故訓為放也𨽻書改作巳失本體􅔁字不復可識寫者全類蔡字至有重為一蔡字重點以讀之者尚書蔡仲之命云周公乃致辟管叔于商囚蔡叔于郭鄰以車七乗孔安國云囚謂制其出入郭鄰中國之外地名是放蔡叔之事也孔唯言中國之外地不知在何方也夫豈不愛王室故也疏正義曰夫謂周公也夫此周公豈不爱管蔡乎所以􅔁放之為王室故也吉若獲戾子将行之何有於諸游注為二年鄭殺公孫黒傳音義夫音扶秦后子有寵於桓如二君於景注后子秦桓公子景公母弟鍼也其權寵如兩君其母曰弗去懼選注選數也恐景公數其罪而加戮音義選息轉反徐素短反注及下同數所主反注及下文數世同癸卯鍼適晋其車千乗書曰秦伯之弟鍼出奔晋罪秦伯也注罪失教音義乗繩證反下及注同疏正義曰釋例曰秦伯有千乗之國不能容其母弟傳曰罪秦伯則鍼罪輕也言其對兄為輕耳非無罪也公羊以為仕諸晋謂之奔者譏秦伯有千乗之國不能容其母弟故謂之出奔也劉炫云奔者迫窘而去逃死四鄰不以禮出也今鍼適晋乃與母計議緩歩而出實非奔也仲尼既書為奔傳釋云罪秦伯秦伯不預教戒其弟不能早為之所致奢富􅂈度懼而去國罪其失兄之教鍼不自知度亦是其罪歸罪秦伯言兄罪耳例曰以下同也后子享晋侯注為晋侯設享禮音義為于偽反造舟于河注造舟為梁通秦晋之道音義造七報反注同李廵注爾雅云比其船而度也郭云併舟為橋疏正義曰詩云造舟為梁是比舟以為橋也釋水云天子造舟李巡曰比其舟而渡曰造孫炎曰比舟為梁郭璞曰比船為橋皆不觧造義盖造為至義言船相至而竝比也十里舍車注一舍八乗為八反之偹疏注正義曰直言十里舍車不知每舍㡬車以下言八反知一舍八乗為八反之其也自雍及絳注雍絳相去千里用車八百乗音義雍於用反歸取酬幣注偹九獻之儀始禮自齎其一故續送其八酬酒幣音義齎子兮反本又作賫疏注正義曰僖二十二年鄭享楚子為九獻知此偹九獻之儀也每一獻酒必有幣帛以隨之后子從始自齎其一以為初獻故續送其八也飲酒之禮主人初獻於賔賔酢主人主人受賔之酢禮飲訖又飲乃酌以酬賔如是乃成為一獻於酬之時始有幣以勸飲故以為酬酒幣也終事八反注每十里以八乗車各以次載幣相授而還不徑至故言八反千里用車八百乗其二百乗以自隨故言千乗傳言秦鍼之出極奢富以成禮欲盡敬於所赴音義還音環徑古定反疏注正義曰服䖍以為每於十里置幣車一乗千里百乗以次相授車率皆日行一百六十里謂從絳向雍去而復還一享之間八度至也然則千里之路徃還八反車率日行一百六十里計則一萬六千里雖追風逐日之足猶将不逮于此后子之馬一何駛乎縱令如此纔可以章馬疾未足以明車多司馬侯何以怪其車多而發問也杜以反者謂車反復其故䖏耳每於十里置車八乗后子初發幣則續行自齎其一以為初獻餘則以次續至至則車反比至享終八車皆反以此謂之八反非言反至雍也此幣發雍計已多日故設享之初此八車之幣去絳不􅂈一二十里耳使之相續而来每獻皆到以示己之豪富故令漸送之也如杜此言則后子預前約速使幣早發而来非臨享始取而云歸取酬幣者后子必適晋多日然後設享非初至即享君也為享之具酒食之属皆在絳偹之其幣亦應於絳偹之乃遣還取秦國之幣故言歸取不言設享之日始歸取也上云其車千乗下司馬侯問其車多則是見車多而發問也故杜辯其事之所在千里用車八百乗其二百乗以自隨故言千乗也傳說此車多之事者言秦鍼之出極奢富以成禮盡敬於所赴之國故為此以示豪也司馬侯問焉曰子之車盡於此而巳乎對曰此之謂多矣若能少此吾何以得見注言已坐車多故出奔音義見賢遍反坐才臥反女叔齊以告公注叔齊司馬侯音義女音汝且曰秦公子必歸臣聞君子能知其過必有令圖令圖天所贊也后子見趙孟趙孟曰吾子其曷歸注問何時當歸對曰鍼懼選於寡君是以在此将待嗣君趙孟曰秦君何如對曰無道趙孟曰亡乎對曰何為一世無道國未艾也注艾絶也音義艾魚廢反注同國於天地有與立焉注言欲輔助之者多不數世滛弗能斃也趙孟曰天乎對曰有焉趙孟曰其㡬何對曰鍼聞之國無道而年榖和熟天贊之也注贊􅂇佐也音義㡬居豈反下同鮮不五稔注鮮少也少尚當歴五年多則不啻音義稔而甚反啻始鼓反疏正義曰國無道而歳又饑則君或早天年穀和熟是天佐􅂇之故少猶五年多或不啻也期之五年者后子之意耳㐮二十七年傳云所謂不及五稔盖古有此言也趙孟視䕃曰朝夕不相及誰能待五注䕃日景也趙孟意衰以日景自喻故言朝夕不相及誰能待五音義䕃於金反本亦作隂朝夕如字景如字又於領反疏正義曰趙孟自比於日景此景朝夕尚移不能相及人命流去與此相似既無常定誰能待五后子出而告人曰趙孟将死矣主民翫歳而愒日注翫愒皆貪也音義翫五喚反說文云習厭也字又作玩愒苦盖反其與幾何注言不能乆音義與如字又音預鄭為游楚亂故注游楚子南音義為于偽反六月丁巳鄭伯及其大夫盟于公孫段氏罕虎公孫僑公孫段印段游吉駟帶私盟於閨門之外實薰隧注閨門鄭城門薰隧門外道名實之者為明年子産數子晳罪稱薰隧盟起本音義閨音圭薰許云反隧音遂數色主反又色具反公孫黑強與於盟使太史書其名且曰七子注自欲同於六卿故曰七子音義強其丈反與音預子産弗討注子晳強討之恐亂國晋中行穆子敗無終及羣狄于太原注即大鹵也無終山戎音義太原音秦疏正義曰釋例土地名以北戎山戎無終三名為一北平有無終縣大原即大原郡晋陽縣是也計無終在大原東北二千許里逺就大原来與晋戰不知其何故也盖與諸戎近晋者相率而共来也㐮四年無終子遣使如晋請和諸戎則無終是其大者故顯言其國名也崇卒也注崇聚也音義卒子忽反下及注皆同将戰魏舒曰彼徒我車所遇又阨注地險不便車音義阨本又作隘於懈反便婢靣反以什共車必克注更増十人以當一車之用音義什音十共音恭疏正義曰周禮十人為什以一什之人共一車之地故必克也困諸阨又克注車每困於阨道今去車故為必克音義去起吕反下皆同請皆卒注去車為歩卒自我始乃毁車以為行注魏舒先自毁其屬車為歩陳音義行户郎反陳直覲反下文五陳未陳同五乗為三伍注乗車者車三人五乗十五人今改去車更以五人為伍分為三伍音義五乗绳證反注五乗同荀吳之嬖人不肯即卒斬以狥注魏舒輒斬之荀吳不恨所以能立功音義狥辭俊反為五陳以相離兩於前伍於後專為右角參為左角偏為前拒注皆臨時處置之名音義拒九甫反疏正義曰五陳者即兩伍専参偏是也相離者布置使相逺也服䖍引司馬法云五十乗為両百二十乗為伍八十一乗為專二十九乗為參二十五乗為偏彼皆凖車数多少以為别名此傳去車用卒而有此名則此名不以車数為别也杜云皆臨時處置之名其意不同服說則名與人数不可得知也周禮則五人為伍二十五人為兩無專參偏之名也以誘之翟人笑之注笑其失常未陳而薄之大敗之注傳言荀呉能用善謀莒展輿立而奪羣公子秩公子召去疾于齊秋齊公子鉏納去疾注齊雖納去疾莒人先召之故從國逆例書入去疾奔齊在㐮三十一年展輿奔吳注吳外孫叔弓帥師疆鄆田因莒亂也注此春取鄆今正其疆界音義疆居良反注同於是莒務婁瞀胡及公子滅明以大厖與常儀靡奔齊注三子展輿黨大厖常儀靡莒二邑音義務婁竑如字務又音謀一音無瞀徐音茂一音謀厖武江反君子曰莒展之不立棄人也夫注奪羣公子秩是棄人音義夫音扶人可棄乎詩曰無競維人善矣注詩周頌言惟得人則國家彊疏正義曰周頌烈文之萹也彼注云競彊也無彊乎維得賢人也得賢人則國家彊矣故天下諸侯順其所為也晋侯有疾鄭伯使公孫僑如晋聘且問疾叔向問焉曰寡君之疾病卜人曰實沈䑓駘為祟史莫之知敢問此何神也子産曰昔髙辛氏有二子伯曰閼伯季曰實沈注髙辛帝嚳音義駘他才反祟息遂反閼於葛反嚳苦毒反居於曠林不相能也注曠林地闕音義能如字又奴代反日尋干戈以相征討注尋用也后帝不臧注后帝堯也臧善也疏注正義曰㐮九年傳稱閼伯為陶唐氏之火正知后帝是堯也遷閼伯于商丘主辰注商丘宋地主祀辰星辰大火也商人是因故辰為商星注商人湯先相土封商丘因閼伯故國祀辰星音義相息亮反疏注正義曰殷本紀稱相土契孫是湯之先也㐮五年𫝊云閼伯居商丘祀大火相土因之故商主大火辰即大火星也故商人祀辰星商謂宋也宋商後故稱商人也遷實沈于大夏主參注大夏今晋陽縣音義夏户雅反注及下同參所林反注及下同唐人是因以服事夏商注唐人若劉累之等累遷魯縣此在大夏疏注正義曰謂之唐人當是陶唐之後二十九年𫝊云陶唐氏既衰其後有劉累知此唐人是彼劉累之等類也言等類者謂劉累後世子孫累雖遷魯縣子孫仍在大夏故歴夏及商也劉炫曰彼稱累事孔甲下云遷于魯縣此云唐人是因以服事夏商則此居於大夏子孫終商不㓕非累子孫是其同族等類耳服䖍以唐人即是劉累故杜顯而異之云累遷魯縣此在大夏其季世曰唐叔虞注唐人之季世其君曰叔虞疏注正義曰服䖍以為唐叔虞即下句邑姜所生者也杜以𫝊說唐人即云季世明季世是唐人之末世叔虞即唐人之末君矣邑姜之子叔虞乃是晋之始祖豈得以後世始封之君謂之前代之末世也故云唐人之季世其君曰叔虞帝命邑姜之子曰虞者将以唐國與之取唐君之名以為名耳當武王邑姜方震大叔注邑姜武王后齊大公之女懐胎為震大叔成王之弟叔虞音義震本又作娠之慎反又音申懐妊也大音泰注及下同胎他来反疏注正義曰𫝊言武王邑姜繫之武王知是武王后也十二年𫝊稱吕伋王舅伋是齊太公之子丁公也伋為王舅知邑姜是大公之女也說文云娠女妊身動也從女辰聲是懐胎為震震取動義字書以是女事故今字從女耳叔虞成王母弟晋世家文也夢帝謂己余命而子曰虞注帝天取唐君之名将與之唐屬諸參而蕃育其子孫及生有文在其手曰虞遂以命之及成王滅唐而封大叔焉故參為晋星注叔虞封唐是為晋侯音義屬之玉反蕃音煩叔虞封唐是為晋侯案史記叔虞封唐侯叔虞之子爕父改為晋侯疏正義曰晋世家云初武王之與叔虞母㑹時夢天謂武王曰余命汝生子名虞謂此夢為武王之夢也若是武王之夢此傳直云武王方生大叔其文足矣何以須言邑姜方震也邑姜方震而夢明是邑姜夢矣安得以為武王夢也薄姬之夢龍據其身燕姞之夢蘭為已子彼皆夢發於母此何以夢發於父是馬遷之妄言耳服觧此云巳武王也是習非而逐迷者也注正義曰晋世家云唐叔子爕是為晋侯杜譜亦云爕父改為晋侯則叔虞之身不稱晋也叔虞為晋之祖故言為晋侯也由是觀之則實沈參神也昔金天氏有裔子曰昧為𤣥冥師生􅁢格臺駘注金天氏帝少皥裔逺也𤣥冥水官昧為水官之長音義裔以制反昧音妹為𤣥冥師師長也為官之長皥尸老反長丁丈反疏注正義曰金天氏帝少皥帝系世本文也金天代號少皥身號月令於冬云其神𤣥冥是𤣥冥為水官也昧為𤣥冥師師訓長也故云昧為水官之長二十九年𫝊云少皥氏有四叔修及熈為𤣥冥昧為金天裔子當是脩熙之後釋例曰修及熙皆為𤣥冥未知昧為誰之子或是其子孫也臺駘能業其官注纂昧之業音義纂子管反宣汾洮注宣猶通也汾洮二水名疏正義曰釋例曰汾水出大原故汾陽縣至河東汾隂縣入河其洮水闕不知所在當亦是晋地之水後世竭涸無其䖏耳障大澤注陂障之以處大原注大原晋陽也臺駘之所居帝用嘉之封諸汾川注帝顓頊疏注正義曰顓頊為帝承金天之後臺駘是金天裔孫為臣宜當顓頊故以帝用嘉之為顓頊嘉耳昧於金天巳云裔子臺駘又是昧之所生則去少皥逺矣而帝系世本皆云少皥是黄帝之子顓頊是黄帝之孫臣世多而帝世少史籍散亡無可檢勘此事未必然也釋例云案鯀則舜之五世從祖父也而及舜共為堯臣堯則舜之三從高祖而妻其女此史記之可疑者也是皆疑不能决因舊說耳沈姒蓐黃實守其祀注四國臺駘之後今晋主汾而滅之矣注滅四國由是觀之則臺駘汾神也抑此二者不及君身山川之神則水旱癘疫之災於是乎禜之注有水旱之災則禜祭山川之神若臺駘者周禮四曰禜祭為營攅用幣以祈福祥音義癘音例疫音役禜音詠徐又音營日月星辰之神則雪霜風雨之不時於是乎禜之注星辰之神若實沈者疏正義曰水旱癘疫在地之災山川帶地故祭山川之神也霜雪風雨天氣所降日月麗天故祭日月星辰之神也此因其所在分繋之耳其實水旱癘疫亦是天氣所致雪霜風雨亦是在地之災且雨之不時而致水旱水旱與雨不甚為異而分言之者據其雨不下而霖不止是雨不時也據其苗稼生死則為水與旱也禜是祈禱之小祭耳若大旱而雩則徧祭天地百神不復别其日月與山川者也注正義曰水旱癘疫俱祭山川杜畧癘疫而不言之耳杜言山川之神若臺駘者下云星辰之神若實沈者言此禜祭祭其先世主山川主星辰者之神矣非獨祭此山川星辰之神也計日月無其主者以與星辰俱是天神連言之耳周禮大祝掌六祈以同鬼神示一曰類二曰造三曰禬四曰禜五曰攻六曰說鄭衆云禜日月星辰山川之祭也鄭𤣥云禜告之以時有災變也禜如日食以朱絲營社也𤣥之此言取公羊為說荘二十五年公羊傳曰日食以朱絲營社或曰脅之或曰為闇恐人犯之故營之然社有形質故可朱絲營繞日月山川非可營之物不得以此觧禜也賈逵以為營攅用幣杜依用之日月山川之神其祭非有常䖏故臨時營其地立攅表用幣告之以祈福祥也攅聚也聚草木為祭處耳癘疫謂害氣流行嵗多疾病然則君身有病亦是癘氣而云不及君身者陳思王以為癘疫之氣止害貧賤其富貴之人攝生厚者疫氣所不及其事或當然也且子産知晋君之病不在於此故言二者不及君身以病非癘疫故不須祭臺駘等也若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉注言實沈臺駘不為君疾音義樂音洛疏正義曰家語孔子云飲食不時逸勞􅂈度者病共殺之此云出入即逸勞也據國君之身則朝以聼政晝以訪問是出也夕以修令夜以安身是入也僑聞之君子有四時朝以聼政注聼國政音義朝如字晝以訪問注問可否夕以脩令注念所施夜以安身於是乎節宣其氣注宣散也疏正義曰以時節宣散其氣也節即四時是也凡人形神有限不可乆用神乆用則竭形太勞則敝不可以乆勞也神不用則鈍形不用則痿不可以乆逸也固當勞逸更遞以宣散其氣朝以聼政乆則疲疲則易之以訪問訪問乆則倦倦則易之以脩令脩令乆則怠怠則易之以安身安身乆則滯滯則易之以聼政以後事改前心則亦所以散其氣也勿使有所壅閉湫底以露其體注湫集也底滯也露羸也壹之則血氣集滯而體羸露音義壅於勇反湫子小反徐音秋又在酒反服云著也底丁體反服云止也羸劣危反下同疏正義曰壅謂障而不使行若土壅水也閉謂塞而不得出若閉門户也湫謂氣聚㡳謂氣止四者皆是不散之意也氣不散則食不消食不消則食少食少則肌膚瘦肌膚瘦則骸骨露也言人之飬身當須宣散其氣勿使氣有壅閉集滯以羸露其形骸也注正義曰服䖍云湫著也㡳止也杜云湫集也㡳滯也皆是以意訓耳壅閉言其不得散出故以湫㡳為集滯言氣聚集而停滯也若以湫為著則與止同義故易之以為集其止滯亦同義也上文所云四時之事若其壹之則血氣集滯使不得宣散氣不散則骨羸露也肥則肌膚厚骨不見瘦則肌膚薄故體羸露羸露是露骨之名其義與倮相近倮露形也羸露骨也瘦必羸羸亦瘦之别名今晋侯壹之者唯謂安身親近婦人四時皆爾以恒安身不動故使氣集滯也兹心不爽而昏亂百度注兹此也爽明也百度百事之節疏正義曰形之與神相隨而有形以神為主神以形為宅形彊則神彊形弱則神弱神長隨形而盛衰也既露其體則神識亦弱致使此心不明照察失冝而昏亂百事之節度也今無乃壹之注同四時也則生疾矣僑又聞之内官不及同姓注内官嬪御音義嬪婢人反其生不殖注殖長也羙先盡矣則相生疾注同姓之相與先羙矣羙極則盡盡則生疾疏正義曰此僑重述不及同姓之意言内官若取同姓則夫婦所以生疾性命不得殖長何者以其同姓相與先羙今既為夫妻又相寵爱羙之至極在先盡矣乃相厭患而生疾病非直羙極惡生疾病而已又羙極驕寵更生妬害也故晋語云異姓則異徳異徳則異類異類雖近男女相及以生民也同姓則同徳同徳則同心同心則同志同志雖逺男女不相及畏凟敬也瀆則生怨怨亂育災災育滅性是故取女避同姓畏亂災也禮記大傳云百世而昏姻不通者周道然也然則周法始如此耳前代則不然也盖以前代敬簡未設禁防周人以其慢瀆故立法以禁之劉炫云違禮而娶則神人不祐故所生不長也晋文姬出而覇諸侯同姓未必皆不殖此以禮法為言勸勵人耳注正義曰劉炫云人之本心自然有爱爱之所及先及近親同姓是親之近者其爱之羙必深是同姓之相與先自羙矣若使又為夫妻則相爱之羙尤極極則羙先盡矣羙盡則必惡生故羙盡則生疾此以禮為防推致此意耳晋語云云同君子是以惡之故志曰買妾不知其姓則卜之違此二者古之所慎也注壹四時取同姓二者古人所慎音義惡如字又烏路反取七住反疏正義曰曲禮云取妻不取同姓故買妾不知其姓則卜之鄭𤣥云為其近禽獸也妾賤或時非媵取於賤者世無本繋也男女辨姓禮之大司也注辨别也音義别彼列反今君内實有四姬焉注同姓姬四人其無乃是也乎若由是二者弗可為也巳注為治也四姬有省猶可無則必生疾矣注據異姓去同姓故言省音義省所景反徐所幸反注同去起吕反疏正義曰子産云四姬之外若有異姓之女接御於公減省公之寵爱於四姬之事如此猶可若無異姓之女減省公情專爱四姬則必由此故以生疾矣劉炫云子産言若於同姓不深病猶可差若於四姬有此省相見稀接御則此病猶尚可如無稀省眈之過度則必生疾叔向曰善哉肸未之聞也此皆然矣叔向出行人揮送之注送叔向叔向問鄭故焉且問子晳對曰其與㡬何注言将敗不乆音義與如字又音預㡬居豈反無禮而好陵人怙富而卑其上弗能乆矣注為明年鄭殺公孫黑傳音義好呼報反怙音户晋侯聞子産之言曰博物君子也重賄之晋侯求醫於秦秦伯使醫和視之曰疾不可為也是謂近女室疾如蠱注蠱惑疾音義近附近之近蠱音古疏正義曰女在房室故以室言之是謂近女室說此病之由由近女室為此病也又言疾如蠱言此疾似蠱疾也蠱者心志惑亂之疾若今昏狂失性其疾名之為蠱公惑於女色失其常性如彼惑蠱之疾也蠱是惑疾公心既惑是蠱疾而云如蠱者蠱是失志之疾名志之所失不獨為女宣八年傳胥克有蠱疾者直是病而失性不由近女為之此公滛而失志未全為蠱故云如蠱注正義曰和言公疾如蠱下云惑以喪志知蠱是心志惑亂之疾非鬼非食惑以喪志注惑女色而失志音義喪息浪反疏正義曰此說公病之状病有鬼為之者有食為之者此病非鬼非食滛於女色情性惑亂以喪失志意也良臣将死天命不祐注良臣不匡救君過故将死而不為天所祐音義祐音右公曰女不可近乎對曰節之先王之樂所以節百事也故有五節注五聲之節遲速本末以相及中聲以降五降之後不容弹矣注此謂先王之樂得中聲聲成五降而息也降罷退音義降音絳下及注同或音户江反弹丹徒反又徒旦反疏正義曰女之為節不可得說故以樂譬之先王之為此樂也所以限節百種之事故為樂有五聲之節為聲有違有速從本至末緩急相及使得中和之聲其曲既了以此罷退五聲既成中和罷退之後謂為曲已了不容更復弹作以為煩手滛聲鄭衛之曲也劉炫云言五降而息罷退者五聲一周聲下而息前聲罷退以待後聲非作樂息也樂曲成乃息非五聲一周得息也又傳於是至弗聼劉云此說降後不弹之意也五聲皆降則聲一成曲既未成當從上始不以後聲來接前聲而容手妄弹擊是為煩手此手所擊非復正聲是為滛聲滛聲之漫塞人心耳乃使人忘失平和之性故君子不聼也於是有煩手滛聲慆堙心耳乃忘平和君子弗聼也注五降而不息則雜聲並奏所謂鄭衛之聲音義慆他刀反下同堙音因疏注正義曰五降不息則非復正聲手煩不已則雑聲並奏記傳所謂鄭衛之聲謂此也樂記云鄭衛之音亂世之音也又曰鄭音好濫滛志衛音趨数煩志是言鄭衛之聲是煩手雜聲也物亦如之注言百事皆如樂不可失節至於煩乃舍也巳無以生疾注煩不舍則生疾音義舍音捨注同君子之近琴瑟以儀節也非以慆心也注為心之節儀使動不過度天有六氣注謂隂陽風雨晦明也降生五味注謂金味辛木味酸水味鹹火味苦土味甘皆由隂陽風雨而生疏注正義曰尚書洪範云五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘孔安國云鹹水鹵所生也苦焦氣之味也酸木實之性也辛金之氣味也甘味生於百穀也是五味為五行之味也以五者竝行于天地之間故洛書謂之五行物皆有本本自天來故言五者皆由隂陽風雨而生也是隂陽風雨晦明合雜共生五味若先儒以為雨為木味風為土味晦為水味明為火味陽為金味而隂氣属天不為五味之主此杜所不用也洪範本文以生数為次水火木金土大禹謨六府之次水火金木土榖月令於四時之次木火土金水杜数五味之次金木水火土以五行相循更互相代其次不以為常隨便言耳此注所言五味五色五聲配五行者經傳多有之洪範是其本月令尤為明杜所觧者皆依月令文也發為五色注辛色白酸色青鹹色黒苦色赤甘色黄發見也音義見賢遍反徴為五聲注白聲商青聲角黒聲羽赤聲徴黃聲宫徴驗也音義聲徴張里反滛生六疾注滛過也滋味聲色所以飬人然過則生害疏正義曰上既以樂譬女乃云物亦如之至煩乃舍言用之有節也此又本諸上天言物皆不得過度也氣皆由天故言天有六氣也五味在地故云降生五味也五味是五行之味六氣共生五行故杜觧五味皆由隂陽風雨晦明而生是言六氣共生之非言一氣生一行也味則嘗而可知未有形色可視發見而為五色也色既不同其聲亦異為驗而為五聲也此味聲色也皆本諸上天所以飬人用之大過則生六種之疾注正義曰此滛生六疾承氣味色聲之下則謂四者之過皆生疾也但醫和将說晦滛惑疾故下句特舉六氣之滛其言不及味與聲色故杜觧以偹之言滋味聲色所以飬人然過則生疾以見滛生六疾非獨六氣生疾也但晋侯不以味聲色生疾故醫和不言之耳六氣曰隂陽風雨晦明也分為四時序為五節注六氣之化分而序之則成四時得五行之節疏注正義曰六氣共行無時止息但氣有温暑凉寒分為四時春夏秋冬也序此四時以為五行之節計一年有三百六十五日序之為五行每行得七十二日有餘土無定方分王四季故每季之末有十八日為土正王日也過則為菑隂滛寒疾注寒過則為冷音義菑音災下同陽滛熱疾注熱過則喘渴音義喘昌兖反風滛末疾注末四支也風為緩急雨滛腹疾注雨濕之氣為洩注音義洩息列反下如字晦滛惑疾注晦夜也為宴寝過節則心惑亂明滛心疾注明晝也思慮煩多心勞生疾音義思息利反疏正義曰上云滛生六疾搃謂氣味聲色此云過則為菑獨謂六氣過耳過即滛也故歴言六氣之滛各生疾也此六者隂陽風雨有多時有少時晦明則天有常度無多少時也今言滛者謂人受用此氣有過度者也隂過則冷陽過則熱風多則四支緩急雨多則腹膓泄注此四者雖各以其氣與人為病若其能自防䕶受之不多則得無此病也其晦明亦是天氣不以病人但人用晦明過度則人亦為病晦是夜也夜當安身女以宣氣近女過度則心惑亂也明是晝也晝以營務營務當用心思慮煩多則心勞敝也隂陽風雨當受之有節晦明當用之有限無節無限必為菑害故過則為菑也注正義曰人之身體頭為元首四支為末故以末為四支謂手足也風氣入身則四支有緩急賈逵以末疾為首疾謂風眩也女陽物而晦時滛則生内熱惑蠱之疾注女常隨男故言陽物家道常在夜故言晦時疏正義曰男為陽女為隂女常隨男則女是陽象之物也而晦夜之時用之若用之滛過則生内熱惑蠱之疾以女陽物故内熱以晦時惑蠱也晋語云文子問醫和曰君其㡬何對曰若諸侯服不過三年不服不過十年過是晋之殃也孔晁曰人雖有命荒滛者必損夀無外患則并心於内故三年死諸侯不服則思外患損其内情故十年無道之君乆在民上實國之殃也今君不節不時能無及此乎出告趙孟趙孟曰誰當良臣對曰主是謂矣主相晋國於今八年晋國無亂諸侯無闕可謂良矣和聞之國之大臣榮其寵禄任其大節有菑禍興而無改焉注改改行以救菑音義相息亮反行下孟反必受其咎今君至於滛以生疾将不能圖恤社稷禍孰大焉主不能禦吾是以云也注云主将死音義咎其九反禦本亦作御魚吕反趙孟曰何謂蠱對曰滛溺惑亂之所生也注溺沉没於嗜欲音義溺乃狄反嗜時志反疏正義曰此滛謂滛於女也没水謂之溺没於嗜欲與溺水相似故滛溺連言之此論晋侯将蠱疾故言滛溺惑亂之所生耳人自有欲故失志志性恍惚不自知者其疾名為蠱蠱非盡由滛也以毒藥藥人令人不自知者今律謂之蠱毒於文皿蟲為蠱注文字也皿噐也噐受蟲害者為蠱音義皿命景反訖文讀若猛字林音猛榖之飛亦為蠱注榖乆積則變為飛蟲名曰蠱在周易女惑男風落山謂之蠱注巽下艮上蠱巽為長女為風艮為少男為山少男而說長女非匹故惑山木得風而落音義巽音遜艮古恨反長丁丈反下同少詩照反下同說音悦皆同物也注物猶類也趙孟曰良醫也厚其禮而歸之注贈賄之禮楚公子圍使公子黒肱伯州犂城犫櫟郟注黑肱王子圍之弟子晳也犫縣属南陽郟縣属㐮城櫟今河南陽霍縣三邑本鄭地音義犫尺州反櫟音歴徐失灼反郟古洽反鄭人懼子産曰不害令尹将行大事注謂将弑君而先除二子也注二子謂黒肱伯州犂禍不及鄭何患焉冬楚公子圍将聘于鄭伍舉為介未出竟聞王有疾而還伍舉遂聘十一月己酉公子圍至入問王疾縊而弑之注縊絞也孫卿曰以冠纓絞之長歴推己酉十二月六日經傳皆言十一月月誤也音義介音界竟音境縊一䜴反弑申志反絞古卯反疏注正義曰孫卿姓荀名况著書一部名荀卿子漢宣帝諱詢故轉為孫也下有十二月甲辰朔甲辰後五日得己酉故杜以長歴推己酉是十二月六日而此郟敖之卒經傳皆云十一月己酉杜謂十一月誤者止謂十一月不得有己酉以己酉為誤十一月非誤也必知然者若以為十二月己酉杜謂日己酉子干奔晋至晋猶見趙孟七日庚戌趙孟卒便是日相切廹無相見之理故知十一月為是己酉為誤劉炫以為杜云誤者以十一月為誤當云十二月而規杜氏非也劉炫規云杜言十一月誤當為十二月案下文趙孟庚戌卒彼是郟敖今日死趙孟明日卒則子干奔晋不得見趙孟而議其禄故謂十一月是己酉字誤也遂殺其二子幕及平夏注皆郟敖子音義幕音莫夏户雅反右尹子干出奔晋注子干王子比宫廏尹子晳出奔鄭注因築城而去音義廐居又反殺大宰伯州犂于郟𦵏王于郟謂之郟敖注郟敖楚子麇使赴于鄭伍舉問應為後之辭焉注問赴者對曰寡大夫圍伍舉更之曰共王之子圍為長注伍舉更赴辭使從禮此告終稱嗣不以篡弑赴諸侯音義共王音恭長丁丈反子干奔晋從車五乗叔向使與秦公子同食注食禄同音義從才用反乗繩證反下同皆百人之餼注百人一卒也其禄足百人音義餼許氣反卒子忽反疏注正義曰百人為卒周禮司馬序官文也禄足百人謂與之田取稅以共食足為百人餼也晋語稱秦后子楚公子干來仕叔向為太傅實賦禄韓宣子問二公子之禄焉對曰大國之卿禄一旅之田上大夫一卒之田夫二公子者上大夫皆一卒可也趙文子曰秦公子富注謂秦鍼富強秩禄不宜與子干同叔向曰底禄以徳注底致也音義底音㫖徳鈞以年年同以尊公子以國不聞以富且夫以千乗去其國彊禦已甚詩曰不侮鰥寡不畏彊禦注詩大雅侮陵也音義夫音扶侮亡甫反鰥古顔反疏正義曰徳大則官髙官髙則禄厚故致禄以徳之小大為差也年同以尊謂以官為之尊卑也秦楚匹也使后子與子干齒注以年齒為髙下而坐辭曰鍼懼選楚公子不獲是以皆來亦唯命注不獲不得自安言俱奔事有優劣唯主人命所處謙辭且臣與覊齒無乃不可乎注后子先来仕欲自同於晋臣為主人子干後來奔以為覊旅之客史佚有言曰非覊何忌注忌敬也欲謙以自别音義佚音逸别彼列反疏正義曰忌敬也史佚有言云非是覊客何須敬之言子干是客當湏敬之我不敢與同是謙以自别也楚靈王即位薳罷為令尹薳啟疆為太宰注靈王公子圍也即位易名熊䖍音義罷音皮疆其良反又居良反鄭㳺吉如楚𦵏郟敖且聘立君歸謂子産曰具行噐矣注行噐㑹偹楚王汰侈而自說其事必合諸侯吾徃無日矣子産曰不數年未能也注為四年㑹申傳音義汰音泰說徐音悦始悅反數所注反十二月晋既烝注烝冬祭也音義烝之承反趙孟適南陽将㑹孟子餘注孟子餘趙衰趙武之曾祖其廟在晋之南陽溫縣徃㑹祭之音義衰初危反疏注正義曰服䖍以孟為趙盾子餘為趙衰若其必然當先衰後盾何以先言孟也杜以孟子餘是趙衰一人盖子餘是字孟是長㓜之字也甲辰朔烝于温注趙氏烝祭甲辰十二月朔晋既烝趙孟乃烝其家廟則晋烝當在甲辰之前傳言十二月月誤疏注正義曰杜以十二月晋既烝趙孟始適南陽則趙孟初行已是十二月也此句乃云甲辰朔烝于温案文言之則是來年正月朔也服䖍云甲辰朔夏十一月朔也若是夏十一月朔當於明年言之而此年說之何也杜以服言不通故為此觧云晋既烝趙孟乃蒸其家廟則晋烝當在甲辰之前當言十一月傳言十二月月誤也劉炫以為晋烝及趙孟適南陽竝在十一月之前文繫十二月者欲見烝後即行先公後私十二月之文為下甲辰朔起本舉月遥属下明晋烝猶在朔前十二月非誤也若必如劉言傳當云晋既烝趙孟適南陽将㑹孟子餘十二月甲辰朔烝于温足明先公後私之義何湏虚張十二月於上遥為甲辰朔起本傳文上下未有此例劉炫之言非也庚戌卒注十二月七日終劉定公秦后子之言鄭伯如晋弔及雍乃復注弔趙氏盖趙氏辭之而還傳言大夫彊諸侯畏而弔之音義及雍於用反春秋左傳注疏卷四十一春秋左氏傳注疏卷四十一考證傳令尹命太宰伯州犂對曰州監本訛作氏今改正傳若野賜之疏則是寡大夫不得列於侯卿之位也臣浩按侯卿之位推尋文義疑當作諸卿之位或因天子之卿授地視侯故當時有侯卿之稱亦未可定傳譬如農夫是穮是蓘疏漢書食貨志云食貨志監本訛貨殖志今改正又疏后稷始甽田甽監本訛作畊今改正又疏苗生三葉以上食貨志原文作苗生葉以上無三字又疏耨定本耘推尋文義當云耨定本作耘傳季武子伐莒取鄆注兵未加莒而鄆服故書取而不言伐趙汸曰不書季孫伐莒者莒人告於㑹叔孫豹幾被戮晋趙孟固請于楚而後免故為内諱之義與僖十六年滅項不言師同傳夏有觀扈臣召南按漢書地理志右扶風鄠有扈谷亭扈夏啟所伐又東郡畔觀注應劭曰夏有觀扈後漢郡國志衛本觀故國姚姓傳商有姺邳臣召南按竹書紀年商外壬元年姺人邳人叛當即此傳周有徐奄臣召南按地理志臨淮郡徐故國盈姓後漢郡國志魯國古奄國傳吳濮有釁楚之執事豈其顧盟臣召南按濮在楚西南今為雲南之地春秋時曰百濮蓋蠻人非一種也國語曰叔熊逃難于濮則楚之先世早有竄入其地者傳去煩宥善莫不競勸疏不往討魯云云各本俱誤刋在下文賦大明之首章注下今改正傳宣汾洮臣召南按洮水釋例闕不知所在水經曰涑水出河東聞喜縣東山黍葭谷酈注曰涑水出華谷至周陽與洮水合洮水出清野山西流合涑水子產曰臺駘汾洮之神也司馬彪曰洮水出聞喜縣故王莾以縣為洮亭也然則涑水殆亦兼洮水之稱乎按後漢郡國志曰聞喜有涑水有洮水亦其證也據水經注則洮水即涑水矣杜於前傳涑川注曰涑水出聞喜至蒲坂入河必是疑洮水與涑水不同故闕之傳沈姒蓐黄實守其祀臣浩按此沈國黄國為晉所滅當在太原河東之間非江黄胡沈近於楚之沈黄也傳美先盡矣疏更生妬害也妬監本訛作姤今改正傳女陽物而晦時臣照按六子二陰一陽皆男也二陽一隂皆女也隂卦多陽故曰女陽物也杜氏以女隨男為觧其義未瑩孔氏謂女是陽象之物益以不明傳公子圍至疏孫卿姓荀名况况監本訛作説今改正傳皆百人之餼疏大國之卿祿一旅之田晉語原文大國之卿一旅之田無祿字春秋左氏傳注疏卷四十一考證
