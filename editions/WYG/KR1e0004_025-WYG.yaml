body:
  text: 春秋左傳注疏卷二十五起成公元年盡二年晉杜氏注唐陸徳明音義孔頴達疏成公音義陸曰成公名黒肱宣公子諡法安民立政曰成疏正義曰魯世家云成公名黒肱宣公之子穆姜所生以定王十七年即位諡法安民立政曰成釋例曰計公衡之年成公又非穆姜所生不知其母何氏也案宣元年夫人婦姜至自齊即穆姜也至此始十八年耳二年傳稱公衡為質於楚公衡成公子也既堪為質則其年已長成公若是穆姜之子未得有成長之男經元年春王正月公即位注無傳二月辛酉葬我君宣公注無傳無冰注無傳周二月今之十二月而無冰書冬温疏正義曰襄二十八年春無冰彼春無月則是竟春無冰亦應竟春無冰而書在二月下者以盛寒之月書之也縠梁傳曰終時無冰則志此未終時而言無冰何也終無冰矣加之寒之辭也其意言此月寒最甚此月無冰則終無冰矣杜言今之十二月者見此意也冬而無冰是時之失故書之記冬温也三月作丘甲注周禮九夫為井四井為邑四邑為丘丘十六井出戎馬一匹牛三頭四丘為甸甸六十四井出長轂一乘戎馬四匹牛十二頭甲士三人步卒七十二人此甸所賦今魯使丘出之譏重歛故書音義甸徒練反一音繩證反乘繩證反卒尊忽反歛力驗反疏正義曰周禮九夫為井四井為邑四邑為丘四丘為甸小司徒職文也司馬法六尺為步步百為畝畆百為夫夫三為屋屋三為井四井為邑四邑為丘丘有戎馬一匹牛三頭是曰匹馬丘牛四丘為甸甸六十四井出長轂一乘馬四匹牛十二頭甲士三人步卒七十二人戈楯具謂之乘馬然則杜之此注多是司馬法文而獨以周禮冠之者以司馬法祖述周禮其所陳者即是周法言此是周之禮法耳不言周禮有此文也鄭注論語云司馬法成方十里出革車一乘與此不同者鄭注小司徒云方十里為成縁邊一里治溝洫實出税者方八里六十四井案鄭注小司徒又引司馬法云成出革車一乘甲士十人徒二十人十成為終千井革車十乘甲士百人徒二百人十終為同萬井革車百乘甲士千人徒二千人與此車一乘甲士三人步卒七十二人不同者小司徒辨畿内都鄙之地域鄭所引士十人徒二十人者謂公卿大夫畿内采地之制此之所謂諸侯邦國出軍之法故不同也古者用兵天子先用六鄉六鄉不足取六遂六遂不足取公卿采邑及諸侯邦國若諸侯出兵先盡三鄉三遂鄉遂不足然後總徴竟内之兵案此一車甲士步卒總七十五人周禮大司馬五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍大致不同者大司馬所云謂鄉遂出軍及臨時對敵布陳用兵之法此甲士三人步卒七十二人謂徵課邦國出兵之時所徵之兵既至臨陳還同鄉遂之法必知臨敵用鄉遂法者以桓五年戰于繻葛先偏後伍又宣十二年廣有一卒卒偏之兩及尚書牧誓云千夫長百夫長是臨時對敵皆用卒兩師旅也長轂馬牛甲兵戈楯皆一甸之民同共此物若鄉遂所用車馬甲兵之屬皆國家所共知者以一鄉出一軍則是家出一人其物不可私備故也此言四丘為甸竝據上地言之若以上中下地相通則二甸共出長轂一乘耳甸即乘也六十四井出車一乘是故以甸為名此一乘甲兵甸之所賦今魯使丘出甸賦乃四倍於常譏其重歛故書之也穀梁傳曰作為也丘為甲也丘甲國之事也丘作甲非正也古者立國家百官具農工皆有職以事上古者有四民有士民有商民有農民有工民丘作甲非正也其意以為四邑為丘使一丘農民皆作甲以農為工失其本業故譏之今左氏經傳竝言作丘甲耳重斂之事傳無明文而知必異穀梁以為丘作甸甲者以傳云為齊難故作丘甲以慮有齊難而多作甲兵知使丘為甸甲而倍作之也士卒馬牛悉倍於常而獨言甲者甲是新作之物其餘歛充之耳非作之也譏其新作故舉甲言之初税畆言初此不言初者此備齊難暫為之耳非是終用故不言初然則築城備難非時不譏此亦備難而譏之者魯是大國甲兵先多僖公之世頌云公車千乘昭公之蒐傳稱革車千乘此時亦應然也其甲足以拒敵而又加之重歛故譏之夏臧孫許及晉侯盟于赤棘注晉地秋王師敗績于茅戎注茅戎戎别種也不言戰王者至尊天下莫之得校故以自敗為文不書敗地而書茅戎明為茅戎所敗書秋從告音義茅亡交反史記及二傳皆作貿種章勇反冬十月傳元年春晉侯使瑕嘉平戎于王注平文十七年邥垂之役詹嘉處瑕故謂之瑕嘉音義邥音審詹之亷反單襄公如晉拜成注單襄公王卿士謝晉為平戎音義單音善為于偽反下文同劉康公徼戎將遂伐之注康公王季子也戎平還欲要其無備音義徼古堯反要也要一遥反疏正義曰宣十年經書王季子來聘傳言劉康公知即王季子也傳言平戎于王戎必遣使詣周受平但康公要戎者非要戎平還之使單使來平不足伐也欲伐其國耳以未平之日設備禦周今既平矣戎必無備要其無備將遂往伐之故下云遂伐茅戎起兵伐其國也叔服曰背盟而欺大國此必敗注叔服周内史音義背音佩下音同背盟不祥欺大國不義神人弗助將何以勝不聼遂伐茅戎三月癸未敗績于徐吾氏注徐吾氏茅戎之别也疏正義曰敗于徐吾之地也茅戎已是戎内之别徐吾又是茅戎之内聚落之名王師與茅戎戰之處為齊難故作丘甲注前年魯乞師於楚欲以伐齊楚師不出故懼而作丘甲音義難乃旦反下同聞齊將出楚師夏盟于赤棘注與晉盟懼齊楚秋王人來告敗注解經所以秋乃書冬臧宣叔令修賦繕完注治完城郭音義繕市戰反完和端反具守備音義守手又反曰齊楚結好我新與晉盟晉楚爭盟齊師必至雖晉人伐齊楚必救之是齊楚同我也注同共也音義好呼報反知難而有備乃可以逞注逞解也為二年齊侯伐傳音義解音蟹經二年春齊侯伐我北鄙夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績注新築衛地皆陳曰戰大崩曰敗績四月無丙戌丙戌五月一日音義築音竹陳直覲反六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉郤克衛孫良夫曹公子首及齊侯戰于鞌齊師敗績注魯乞師於晉而不以與謀之例者從盟主之令上行於下非匹敵和成之類例在宣十年曹大夫常不書而書公子首者首命於國備於禮成為卿故也鞌齊地音義僑其驕反注同郤去逆反鞌音安與音預敵如字本或作適音敵疏正義曰此云盟主之令故不從與謀釋例云乞師不得從與謀所以不同者以事得兩通故互言之魯於聘與盟會雖二卿竝行止書一使至於行師用兵則竝書諸將此書四卿昭定之世或書三卿或書二卿皆謂重兵故書之其他國唯書元帥詳内略外也書曹公子首者釋例曰公侯伯子男及卿大夫士命數周官具有等差當春秋時漸以變改是故仲尼丘明據時之宜從而然之不復與周官同也命者其君正爵命之於朝其宫室車旗衣服禮儀各如其命數皆以卿禮書於經衛之於晉不得比次國則邾莒杞鄫之屬固以微矣此等諸國當時附隨大國不得列於㑹者甚衆及其得列上不能自通於天子下無暇於備禮成制故與於盟㑹戰伐甚多唯曹公子首得見經其餘或命而禮儀不備或未加命數故皆不書之是言首成為卿故書秋七月齊侯使國佐如師己酉及國佐盟于袁婁注穀梁曰鞌去齊五百里袁婁去齊五十里疏正義曰齊之四竟不應過遥且鞌已是齊地未必竟上之邑豈得去齊有五百里乎穀梁又云壹戰緜地五百里則是甚言之耳釋例土地名鞌與袁婁竝闕不知其處逺近無以驗之八月壬午宋公鮑卒注未同盟而赴以名音義鮑步卯反庚寅衛侯速卒注宣十七年盟于斷道據傳庚寅九月七日取汶陽田注晉使齊還魯故書取不以好得故不言歸音義汶音問好呼報反疏正義曰晉使齊還魯魯不用力故直書取哀八年齊人歸讙及闡此不言齊人歸者不以好得非齊歸我故不言歸冬楚師鄭師侵衛注子重不書不親伐疏正義曰僖二十五年楚人圍陳注云子玉稱人從告此云子重不書不親伐者彼以路逺或當不以實告此傳言侵衛遂侵我道路既近告當以實經傳皆言楚師例是將卑師衆故以為子重不親伐所以𢎞通其義也十有一月公會楚公子嬰齊于蜀注公與大夫會不貶嬰齊者時有許蔡之君故疏正義曰傳稱在禮卿不會公侯會公侯則貶之而稱人翟泉之盟是也此嬰齊會公乃稱公子而不貶者為其會有蔡許之君蔡侯許男與公相敵嬰齊不與公敵故不貶也傳稱孟孫賂楚楚人許平即云十一月公及楚公子嬰齊蔡侯許男秦右大夫説宋華元陳公孫寜衛孫良夫鄭公子去疾及齊國之大夫盟于蜀凡會且盟者必先會而後盟盟時蔡許在列會時必亦在焉以二君乘楚車謂之失位經雖抑而不書會時其身實在且二君與楚同行無容不列於會故知二君在會嬰齊不敵公也或以為於時兵将嬰齊為主蔡許為王左右𨽻屬嬰齊則二君卑於嬰齊何由得與公敵斯不然矣征伐以主兵為先盟會以尊卑為序春秋之常也僖二十七年楚人陳侯蔡侯鄭伯許男圍宋楚既稱人必非貴者為其主兵猶序於上文十年公會諸侯晉大夫盟于扈傳曰齊侯宋公衛侯陳侯鄭伯許男曹伯會晉趙盾盟于扈於時晉為盟主召諸侯使集會而趙盾猶序於下文不先諸侯則知此時行兵楚為其主會則蔡許在先故二君自敵公明嬰齊不敵公也襄二十六年公會晉人鄭良霄宋人曹人于澶淵傳曰公會晉趙武宋向戌鄭良霄曹人于澶淵趙武不書尊公也於是衛侯會之然則時有衛侯猶貶趙武者於時衛侯雖往晉將執之不得與會而趙武敵公故貶之也彼傳又曰晉人執寗喜北宫遺使女齊以先歸衛侯如晉晉人執之於會己執其卿衛侯如晉晉即執之明其不得與會公無所敵故趙武敵公與此異也丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀注齊在鄭下非卿傳曰卿不書匱盟也然則楚卿於是始與中國凖自此以下楚卿不書皆貶惡也音義匱其位反疏正義曰諸會盟同地而間無他事者例不重序其人此㑹盟序者前㑹之時唯公㑹楚耳蔡許從楚而行唯應蔡許在列秦宋以下諸國未至㑹盟人别故别序也諸征伐㑹盟實卿而貶稱人者傳皆言其名氏實是大夫而本合稱人者則傳皆言大夫此傳鄭公子去疾以上言其名氏則皆是卿也齊國之大夫則實是大夫故齊在鄭下為非卿故也傳曰卿不書匱盟也謂匱盟之故并貶楚卿楚卿於是盟上始與中國相凖釋例曰楚之君臣最多混錯舊説亦隨文強生善惡之狀混瀆無已其不能得辭則皆言惡蠻夷得志然當齊桓之盛而經以屈完敵之若必有褒貶非抑楚也此乃楚之初興未閑周之典禮告命之書自生同異猶秦之僻陋不與中國凖故春秋抑秦以存例也楚之熊繹始封於楚辟在荆山蓽路藍縷以居俗裔及武王熊通始居江漢之間然未能自同於列國故經稱荆敗蔡師荆人來聘從其所居之稱而總其君臣至於魯僖始稱楚人而班次在於蔡下僖二十一年當楚成王之世能遂其業内列於公侯㑹于盂楚之君爵始與中國列然其臣名氏猶多參錯至魯成二年楚公子嬰齊始乃具列傳曰卿不書匱盟也兼為楚臣示例也自此以上春秋未以入例自此以下褒貶之義可得而論之也杜言兼為楚臣示例者觧傳言匱盟之意傳言卿不書者非獨言諸侯之卿不書兼言楚卿亦不書是兼為楚卿示例傳二年春齊侯伐我北鄙圍龍注龍魯邑在泰山博縣西南頃公之嬖人盧蒲就魁門焉注攻龍門也音義頃音傾嬖必計反魁苦回反龍人囚之齊侯曰勿殺吾與而盟無入而封注封竟音義竟音境弗聼殺而膊諸城上注膊磔也音義膊普各反磔陟百反疏正義曰周禮掌戮掌斬殺賊諜而搏之鄭𤣥云搏當為膊諸城上之膊字之誤也膊謂去衣磔之方言云膊曝也齊侯親鼓士陵城三日取龍遂南侵及巢丘注取龍侵巢丘不書其義未聞疏正義曰外取内邑非魯之罪無所可諱而此獨不書故杜云其義未聞賈逵云殺盧蒲就魁不與齊盟以亡其邑故諱不書耳案楚子滅蕭嬰齊入莒皆殺楚人而經不變文以加罪此何當改文以諱惡也哀八年齊人取讙及闡以淫女見取猶尚書之此殺敵見取何以當諱知諱義不通故不從也衛侯使孫良夫石稷寗相向禽將侵齊與齊師遇注齊伐魯還相遇於衛也良夫孫林父之父石稷石碏四世孫寗相寗俞子音義相息亮反向舒亮反碏七畧反俞羊朱反石子欲還孫子曰不可以師伐人遇其師而還將謂君何注言無以答君若知不能則如無出令既遇矣不如戰也夏有注闕文失新築戰事石成子曰師敗矣子不少須衆懼盡注成子石稷也衛師已敗而孫良夫復欲戰故成子欲使須救音義復扶又反子喪師徒何以復命皆不對又曰子國卿也隕子辱矣注隕見禽獲音義喪息浪反隕于敏反疏正義曰子者指斥孫子其言竝告諸將言皆不對者孫子與寗相向禽皆不對又曰子國卿也乃專與孫子言耳子以衆退我此乃止注我於此止禦齊師音義禦魚吕反且告車來甚衆注新築人救孫桓子故竝告令軍中齊師乃止次于鞫居注鞫居衛地音義鞫居六反新築人仲叔于奚救孫桓子桓子是以免注于奚守新築大夫疏正義曰大夫守邑以邑冠之呼為某人孔子父鄒邑大夫傳稱鄒人紇論語謂孔子為鄒人之子即此類也既衛人賞之以邑注賞于奚辭請曲縣注軒縣也周禮天子樂宫縣四面諸侯軒縣闕南方音義縣音𤣥注同疏正義曰周禮小胥正樂縣之位王宫縣諸侯軒縣大夫判縣士特縣鄭衆云宫縣四面縣軒縣去其一面判縣又去一面特縣又去一面四面象宫室四面有牆故謂之宫縣軒縣三面其形曲故春秋傳曰請曲縣繁纓以朝諸侯之禮也鄭𤣥云樂縣謂鐘磬之屬縣於筍虡者軒縣去南面辟王也判縣左右之合又空北面特縣縣於東方或於階間而已是先儒皆以闕南方故曲也家語説此事云請曲縣之樂繁纓以朝王肅云軒縣闕一面故謂之曲縣繁纓以朝許之注繁纓馬飾皆諸侯之服音義繁步于反注同疏正義曰周禮巾車掌王之五路玉路繁纓十有再就以祀金路繁纓九就同姓以封象路繁纓七就異姓以封革路絛纓五就以封四衛木路前樊鵠纓以封蕃國鄭𤣥云樊讀如鞶帶之鞶謂金馬大帶也纓金馬鞅也玉路金路象路其樊及纓皆以五彩罽飾之就成也玉路十二成金路九成象路七成革路繁纓以絛絲飾之而五成木路以淺黒飾韋為樊鵠色飾韋為纓亦五成是言天子諸侯樊纓之飾樊即鞶也字之異耳巾車又云孤乘夏篆卿乘夏縵大夫乘墨車士乘棧車其飾皆無樊纓是樊纓為馬之飾皆諸侯之服也案儀禮既夕士薦馬纓三就又諸侯之卿有受革輅木輅之賜皆有繁纓而云諸侯之服者以與曲縣相對又于奚所請故云諸侯之服且諸侯之卿特賜乃有大輅士喪禮為送葬設盛服耳皆非正法所有仲尼聞之曰惜也不如多與之邑唯器與名不可以假人注器車服名爵號君之所司也名以出信注名位不愆為民所信音義愆起䖍反信以守器注動不失信則車服可保器以蔵禮注車服所以表尊卑禮以行義注尊卑有禮各得其冝義以生利注得其宜則利生利以平民政之大節也若以假人與人政也政亡則國家從之弗可止也已疏正義曰仲尼在後聞之曰此曲縣繁纓可惜也不如多與之邑唯車服之器與爵號之名不可以借人也此名號車服是君之所主也名位不愆則為下民所信此名所以出信也動不失信然後車服可保此信所以守車服之器也禮明尊卑之别車服以表尊卑車服之器其中所以蔵禮言禮蔵於車服之中也義者宜也尊卑各有其禮上下乃得其宜此禮所以行其物宜也物皆得宜然則是利生焉此義所以生利益也利益所以成民此乃政教之大節也若以名器借人則是與人政也政教既亡則國家從之而亡不復可救止也已言利以平民者平成也每事有利所以成就下民使國益民皆是利也此以曲縣繁纓與人假人器耳名器俱是可重故并言也孫桓子還於新築不入注不入國遂如晉乞師臧宣叔亦如晉乞師皆主郤獻子注宣十七年郤克至齊為婦人所笑遂怒故魯衛因之孫桓子臧宣叔皆不以國命各自詣郤克故不書晉侯許之七百乘注五萬二千五百人音義乘繩證反下同郤子曰此城濮之賦也注城濮在僖二十八年音義濮音卜有先君之眀與先大夫之肅故㨗克於先大夫無能為役注無能為之役使請八百乘許之注六萬人郤克將中軍士燮佐上軍注范文子代荀庚音義將子匠反疏正義曰宣十二年邲之戰傳稱荀林父將中軍先縠佐之士㑹將上軍郤克佐之趙朔將下軍欒書佐之十三年晉殺先縠當是士㑹佐中軍郤克將上軍不知誰代郤克佐上軍疑是荀首為之十六年士㑹將中軍則林父卒矣當是郤克佐中軍疑是荀首將上軍荀庚佐之十七年士㑹請老郤克將中軍當是荀首佐中軍荀庚將上軍所以知者此年傳稱楚屈巫對荘王云知罃之父中行伯之季弟也新佐中軍則荀首於荘王之世已佐中軍明士㑹老後郤克遷而荀首代也首於邲戰尚為大夫不應宣之末年得佐中軍故疑先縠死後代郤克佐上軍也眀年荀庚來聘傳稱中行伯之於晉也其位在三則此時荀庚將上軍矣林父卒來已久不應始用荀庚故疑林父卒後荀庚即佐上軍士會老後荀庚轉將上軍故杜以為士燮代荀庚也邲戰以來趙朔無代令欒書將下軍則趙朔卒矣故知欒書代趙朔不如此時誰代欒書佐下軍也欒書將下軍注代趙朔韓厥為司馬以救魯衛臧宣叔逆晉師且道之季文子帥師㑹之及衛地韓獻子將斬人郤獻子馳將救之至則既斬之矣郤子使速以徇告其僕曰吾以分謗也注不欲使韓氏獨受謗音義道音導徇似俊反師從齊師于莘注莘齊地音義莘所巾反六月壬申師至于靡笄之下注靡笄山名音義靡笄如字或又音摩笄音雞齊侯使請戰曰子以君師辱於敝邑不腆敝賦詰朝請見注詰朝平旦音義腆他典反詰起吉反朝如字注及下朝夕朝食同見賢遍反對曰晉與魯衛兄弟也來告曰大國朝夕釋憾於敝邑之地注大國謂齊敝邑魯衛自稱音義憾胡暗反本又作感寡君不忍使羣臣請於大國無令輿師淹於君地注輿衆也淹久也音義令力呈反師如字下無令輿師同一音所類反能進不能退君無所辱命注言自欲戰不復須君命音義復扶又反齊侯曰大夫之許寡人之願也若其不許亦將見也齊高固入晉師桀石以投人注桀擔也音義擔丁甘反禽之而乘其車注既獲其人因釋已車而載所獲者車繋桑本焉以徇齊壘注將至齊壘以桑樹繋車而走欲自異音義壘力軌反曰欲勇者賈余餘勇注賈賣也言已勇有餘欲賣之音義賈音古注同賣摩懈反癸酉師陳于鞌邴夏御齊侯逄丑父為右晉觧張御郤克鄭丘緩為右齊侯曰余姑翦滅此而後朝食注姑且也翦盡也音義陳直覲反邴音丙又彼命反夏户雅反觧音蟹張如字一音直亮反不介馬而馳之注介甲也郤克傷於矢流血及屨未絶鼓音注中將自執旗鼓故雖傷而擊鼓不息音義將子匠反下將在左同疏正義曰以郤克為中軍之將言己之傷而未絶鼓音眀是法當自執旗鼓也周禮大僕軍旅田役贊王鼓鄭𤣥云王通鼓佐擊其餘面上云齊侯親鼓則天子諸侯自將兵者亦親執旗鼓以令衆曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之注張侯觧張也朱血色血色久則殷殷音近烟今人謂赤黒為殷色言血多汙車輪御猶不敢息音義貫古亂反下注同肘竹九反折之設反殷於閑反徐於辰反注同近附近之近汙汚穢之汙字林一故反緩曰自始合苟有險余必下推車子豈識之然子病矣注以其不識已推車音義推昌誰反又他囘反注及下推車同張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事注殿鎮也集成也音義殿多練反注同若之何其以病注絶句敗君之大事也疏正義曰郤克云余病矣言已不堪擊鼓欲有退軍之意故責之云如之何其以身病之故欲喪敗君之大事也擐甲執兵固即死也注擐貫也即就也音義擐音患病未及死吾子勉之左并轡右援枹而鼓馬逸不能止師從之注晉師從郤克車音義并必政反援音爰枹音浮鼓槌也亦作桴疏正義曰説文云援引也枹擊鼓杖也援枹而鼓謂引杖以擊之齊師敗績逐之三周華不注注華不注山名音義華如字又户化反注之住反韓厥夢子輿謂已曰且辟左右注子輿韓厥父故中御而從齊侯注居中代御者自非元帥御者皆在中將在左音義帥所類反疏正義曰韓厥為司馬亦是軍之諸將也以夢之故乃居中為御明其本不當中先非御者若御不在中又不須云代御以此知自非元帥其餘軍之諸將皆御者在中將在左邴夏曰射其御者君子也公曰謂之君子而射之非禮也注齊侯不知戎禮音義射食亦反下并注皆同疏正義曰僖二十二年傳曰雖及胡耉獲則取之明恥敎戰求殺敵也宣二年傳曰戎昭果毅以聼之之謂禮殺敵為果致果為毅是戎事以殺敵為禮齊侯謂射君子為非禮者乃是齊侯不知戎禮也射其左越于車下注越隊也音義隊直類反射其右斃于車中綦母張喪車從韓厥曰請寓乘注綦母張晉大夫寓寄也音義綦母音其下音無喪息浪反乘繩證反從左右皆肘之使立於後注以左右皆死不欲使立其處音義處昌慮反疏正義曰説文云肘臂節也謂左右為凶處故以肘排退之韓厥俛定其右注俛俯也右被射仆車中故俯安隠之音義俛音勉仆音赴又蒲北反疏正義曰言此者為下丑父與公易位由厥之俯故不覺其易綦母張葢助厥定右故竝不見之逢丑父與公易位注居公處將及華泉驂絓於木而止注驂馬絓也音義華户化反絓户卦反一音卦驂七南反丑父寢於轏中注轏士車音義轏士産仄又士板反字林仕諫反云卧車也疏正義曰周禮巾車士乘棧車鄭𤣥云棧車不韋鞔而漆之考工記輿人云棧車欲弇鄭𤣥云為其無革鞔不堅易坼壊然則弇者謂上狹下闊也轏與棧字異音義同耳蛇出於其下以肱擊之傷而匿之故不能推車而及注為韓厥所及丑父欲為右故匿其傷音義肱古𢎞反匿女力反注同韓厥執縶馬前注縶馬絆也執之示脩臣僕之職音義縶張立反絆音半再拜稽首奉觴加璧以進注進觴璧亦以示敬音義觴式羊反疏正義曰襄二十五年鄭公孫舎之帥師入陳傳曰陳侯免擁社子展執縶而見再拜稽首承飲而進獻事與此同唯無璧耳蓋古者有此禮彼雖敗績猶是國君故戰勝之將示之以臣禮事之不忍即加屈辱所以申貴賤之義晉語云靡笄之役郤獻子伐齊齊侯來獻之以得殞命之禮也服䖍引司馬法其有殞命以行禮如㑹所用儀也若殞命則左結旗司馬授飲右持苞壺左承飲以進杜不引之者蓋彼此不甚相當故也曰寡君使羣臣為魯衛請曰無令輿師陷入君地注本但為二國救請不欲乃過入君地謙辭音義為于偽反注同令力呈反下臣不幸屬當戎行無所逃隠注屬適也音義屬音燭注同行下郎反且懼奔辟而忝兩君臣辱戎士注若奔辟則為辱晉君并為齊侯羞故言二君此蓋韓厥自處臣僕謙敬之飾言音義辟音避注同徐扶臂反服氏扶赤反敢告不敏攝官承乏注言欲以已不敏攝承空乏從君俱還音義從才用反又如字丑父使公下如華泉取飲鄭周父御佐車宛茷為右載齊侯以免注佐車副車音義宛紆元反茷扶廢反韓厥獻丑父郤獻子將戮之呼曰自今無有代其君任患者有一於此將為戮乎郤子曰人不難以死免其君我戮之不祥赦之以勸事君者乃免之齊侯免求丑父三入三出注重其代已故三入晉軍求之音義呼火故反任音壬難乃旦反疏正義曰劉炫以齊侯三入齊軍又三出齊軍以求丑父毎出之時齊之將帥敗而怖懼以帥而退不待齊侯致使齊侯入于狄卒今知不然者以傳文三入在前三出在後若用此説齊侯先在晉軍今入齊軍得以三入在前今齊侯既先在齊軍欲出求丑父應先出後入不應先入後出且初時二出容有二入在後之出遂入狄卒有出無入何得云三入又以傳文師帥兩字分眀故杜以為齊侯每出齊師以帥厲退者每出之文别自為義不計上之三出劉君不逹此㫖妄規杜失非也每出齊師以帥退入于狄卒注齊師大敗皆有退心故齊侯輕出其衆以帥厲退者遂迸入狄卒狄卒者狄人從晉討齊者音義卒子忽反注及下同輕遣政反迸補諍反狄卒皆抽戈楯冒之以入于衛師衛師免之注狄衛畏齊之強故不敢害齊侯皆共免護之音義楯食凖反又音允冒亡報反遂自徐闗入齊侯見保者曰勉之齊師敗矣注所過城邑皆勉勵其守者音義守手又反辟女子注使辟君也齊侯單還故婦人不辟之音義辟音避注皆同一音扶亦反單音丹女子曰君免乎曰免矣曰鋭司徒免乎曰免矣注鋭司徒主鋭兵者音義鋭悦嵗反曰苟君與吾父免矣可若何注言餘人不可復如何音義復扶又反乃奔注走辟君齊侯以為有禮注先問君後問父故也既而問之辟司徒之妻也注辟司徒主壘辟者音義辟音壁必覓反注同徐甫亦反予之石窌注石窌邑名濟北盧縣東有地名石窌音義窌力救反一音力到反晉師從齊師入自丘輿擊馬陘注丘輿馬陘皆齊邑音義陘音刑齊侯使賓媚人賂以紀甗玉磬與地注媚人國佐也甗玉甑皆滅紀所得音義媚羙異反賂音路甗魚輦反徐音彦又音言字林牛健反甑子孕反又慈陵反疏正義曰經書齊侯使國佐如師故知賓媚人即國佐也杜譜云國佐賓媚人武子三事互見於經傳不知賔媚人是何等名號也鄭衆注考工記云甗無底甑方言云甑自闗而東謂之甗知甗是甑也下云子得其國寳知甗亦以玉為之傳文玉在甗磬之間眀二者皆是玉也荘四年紀侯大去其國不言齊滅而云滅紀所得者紀侯被偪而去後齊侯收其民人又取其國寳此則與滅無異故為此解不可則聼客之所為賓媚人致賂晉人不可曰必以蕭同叔子為質注同叔蕭君之字齊侯外祖父子女也難斥言其母故逺言之音義質徐音致下同難乃旦反而使齊之封内盡東其畝注使壟畝東西行音義盡津忍反壟力勇反行户郎反又如字對曰蕭同叔子非他寡君之母也若以匹敵則亦晉君之母也吾子布大命於諸侯而曰必質其母以為信其若王命何注言違王命且是以不孝令也詩曰孝子不匱永錫爾類注詩大雅言孝心不乏者又能以孝道長賜其志類若以不孝令於諸侯其無乃非徳類也乎注不以孝徳賜同類疏正義曰蕭同叔子非他人是寡君之母也若以匹敵言之則亦晉君之母也吾子布大命於諸侯而曰必質其諸侯之母以為信其若王命何先王之命諸侯也使之孝其母親其類今輕慢其母不愛同類即是違王命也奈此王命何子今輕齊侯之母亦是輕晉侯之母自輕其母即是不孝且告吾諸侯云以母為質是此者以不孝之事令諸侯也詩之意言孝子所以行孝不為匱乏之道故以孝道長賜女之族類諸侯皆晉侯之類晉侯皆以孝徳賜同類若以不孝之事號令諸侯其無乃非是以孝徳賜同類乎責其違孝道也所引詩者大雅既醉之篇先王疆理天下物土之宜而布其利注疆界也理正也物土之宜播殖之物各從土宜音義疆居良反注下皆同故詩曰我疆我理南東其畝注詩小雅或南或東從其土宜疏正義曰此詩小雅信南山之篇今吾子疆理諸侯而曰盡東其畝而已唯吾子戎車是利注晉之伐齊循壟東行易音義易以䜴反無顧土宜其無乃非先王之命也乎反先王則不義何以為盟主其晉實有闕注闕失四王之王也注禹湯文武音義之王于况反樹徳而濟同欲焉注樹立也濟成也五伯之霸也注夏伯昆吾商伯大彭豕韋周伯齊桓晉文音義或曰齊桓晉文宋襄秦穆楚荘疏正義曰鄭語云祝融能昭顯天地之光明其後八姓昆吾為夏伯矣大彭豕韋為商伯論語云管仲相桓公霸諸侯昭九年傳曰文之伯也豈能改物是三代有五伯矣伯者長也言為諸侯之長也鄭𤣥云天子哀諸侯興故曰霸霸把也言把持王者之政教故其字或作伯或作霸也勤而撫之以役王命注役事也今吾子求合諸侯以逞無疆之欲注疆竟也音義竟如字又音境疏正義曰禹湯文武四王之王天下也立徳於民而成其同欲民有所欲上即同之東畆南畆皆順民意五伯之霸諸侯也唯勤勞其功而撫順之以奉事王命而已不改王之制度也吾子求合諸侯以快其無疆畔之欲止求自快已欲不與民同是違王霸之政也詩曰布政優優百禄是遒注詩頌殷湯布政優和故百禄來聚遒聚也音義遒在由反徐子由反子實不優而棄百禄諸侯何害焉注言不能為諸侯害疏正義曰詩商頌言成湯布政優優然而寛故百種福禄於是聚歸之子實不能優寛而自棄福禄於諸侯何害言不能為諸侯害也所引詩者商頌長發之篇不然注不見許寡君之命使臣則有辭矣曰子以君師辱於敝邑不腆敝賦以犒從者注戰而曰犒為孫辭音義使所吏反犒苦報反從才用反疏正義曰士卒之勞於外師衆枯犒以酒食勞之謂之犒師此以師拒戰非犒勞之義而亦稱犒者言以此師衆徃當待之如以酒食犒之然為遜順之辭耳畏君之震師徒橈敗注震動橈曲也音義橈乃教反吾子惠徼齊國之福不泯其社稷使繼舊好唯是先君之敝器土地不敢愛子又不許請收合餘燼注燼火餘也音義泯彌忍反好呼報反合如字一音閤燼似刃反背城借一注欲於城下復借一戰音義背音佩復扶乂反敝邑之幸亦云從也况其不幸敢不唯命是聽注言完全之時尚不敢違晉今若不幸則從命疏正義曰言於先完全福幸之時尚不違晉故言亦云從也是指其實事劉炫以為齊人請戰言敝邑脱或有幸戰勝亦云從也虛稱未然之事乖違文勢上下苟異杜氏而規其過非也魯衛諫曰齊疾我矣注諫郤克也其死亡者皆親暱也子若不許讎我必甚唯子則又何求子得其國寳注謂甗磬音義暱女亦反我亦得地注齊歸所侵而紓於難注齊服則難緩音義紓音紆緩也一音直吕反難乃旦反注同其榮多矣齊晉亦唯天所授豈必晉晉人許之對曰羣臣帥賦輿注賦輿猶兵車以為魯衛請若苟有以藉於口而復於寡君注藉薦復白也音義為于偽反藉在夜反注同疏正義曰禮承玉之物名為繅藉藉是承薦之言故為薦也復者報命於君故為白也言無物則空口以為報少有所得則於口為藉故曰藉口服䖍云今河南俗語治生求利少有所得皆言可用藉手也君之惠也敢不唯命是聽禽鄭自師逆公注禽鄭魯大夫歸逆公㑹晉師秋七月晉師及齊國佐盟于爰婁使齊人歸我汶陽之田公㑹晉師于上鄍注上鄍地闕公㑹晉師不書史闕音義鄍覓經反疏正義曰定八年經書公㑹晉師于瓦此獨不書故云史闕謂舊史先闕故仲尼修經無之賜三帥先路三命之服注三帥郤克士燮欒書已嘗受王先路之賜今改而易新并此車所建所服之物音義帥所類反注及下同疏正義曰周禮典命公之孤四命其卿三命其大夫再命其士一命侯伯之卿大夫士亦如之此三帥皆卿也本國三命故魯賜以三命之服司馬司空輿師侯正亞旅皆大夫本國一命故皆受一命之服於卿言賜於大夫言受互相足也周禮大夫再命此司馬司空等皆是再命春秋之時其事已異於周禮故大夫一命注正義曰三卿各統一軍故總稱三帥魯君之賜晉臣正可如其法所得服改新以與之耳不得特命他臣發初賜以此物且彼若先無此物則無由敢受魯賜故杜以為此三帥已嘗受王先路之賜今改而易新并此車所建之旌旗所著之衣服皆賜之也案釋例先路者革路若木路或云先或云次蓋以就數為差其受之於王則稱大杜言革路若木路者或用革或用木也知受之於王則稱大者鄭子蟜叔孫穆子受之於王皆稱大是也革木是卿大夫車之尊者故云大路金路是諸侯車之尊者亦稱大則定四年大路大旂是也玉路天子車之尊者亦稱大故顧命云大路在賓階面是也言所建所服之物者周禮巾車革路建大白以即戎司服云凡兵事韋弁服巾車又云木路建大麾以田司服又云凡田冠弁服然則此車所建或是大白大麾所服或是韋弁冠弁劉炫以為既言先路則是晉君之賜杜云受王先路之賜非其義也今知不然者杜以穆叔子蟜嘗受王路故杜據而言之釋例應云受王大路之賜言先路者順傳先路之文故也劉以為嘗受晉君賜而規杜氏非也司馬司空輿師候正亞旅皆受一命之服注晉司馬司空皆大夫輿師主兵車候正主斥候亞旅亦大夫也皆魯侯賜疏正義曰司馬司空本是卿官之名但晉之諸卿皆以三軍將佐為號其司馬司空皆為大夫之官仍有為卿之嫌故云晉司馬司空皆大夫也明他國以為卿晉以為大夫也輿師至於亞旅本是大夫官名故又云亦大夫也軍行有此大夫從者司馬主甲兵司空主營壘輿師主兵車候正主斥候亞旅次於卿是衆大夫也無專職掌散共軍事故後言之直言受服嫌非魯賜故云皆魯侯賜八月宋文公卒始厚葬用蜃炭益車馬始用殉注燒蛤為炭以瘞壙多埋車馬用人從葬音義蜃市忍反蛤也炭吐旦反殉似浚反蛤苦答反瘞於例反壙苦晃反一音曠疏正義曰晉語云雀入于海為蛤雉入于淮為蜃月今孟冬雉入大水為蜃鄭𤣥云大水謂淮也大蛤曰蜃則蜃者蛤之類也周禮掌蜃掌斂互物蜃物以共闉壙之蜃鄭𤣥云互物蚌蛤之屬闉猶塞也将井椁先塞下以蜃禦濕也是用蜃以瘞壙也禮檀弓記曰塗車芻靈自古有之鄭𤣥曰芻靈束茅為人馬謂之靈者神之類也不解塗車當是用泥為車也傳言益車馬者謂用此塗車茅馬益多於常故云多埋車馬也鄭𤣥云殺人以衛死者曰殉言殉還其左右也言始用殉則自此以後宋君葬常用殉故謂此為始也劉炫以為用蜃炭者用蜃復用炭知不然者杜以傳用蜃炭共文故知燒蛤為炭又且炭亦灰之類雖灰亦得稱炭劉君以為用蜃復用炭而規杜氏非也重器備注重猶多也音義重直恭反注同疏正義曰重謂重疊故猶多多為皿器也言噐備者士喪禮下篇陳明器云用器弓矢耒耜敦杅槃匜役器甲胄干笮燕器杖笠翣其器有共用之器有備禦之器故言器備椁有四阿棺有翰檜注四阿四注椁也翰旁飾檜上飾皆王禮音義椁音郭翰户旦反一音韓檜古外反徐音會疏正義曰周禮匠人云殷人四阿重屋鄭𤣥云阿棟也四角設棟也是為四注槨也士喪禮下篇陳明器云抗木横三縮二謂於椁之上設此木從二横三以禦土則士之椁上平也今此椁上四注而下則其上方而尖也禮天子槨題凑諸侯不題凑不題凑則無四阿釋詁云楨翰榦也舎人曰楨正也築墻所立兩木也翰所以當墻兩邊障土者也翰在墻之旁則知此翰亦在旁也詩云會弁如星鄭𤣥云㑹謂弁之縫中言其際㑹之處也㑹在弁之上知此檜亦在上棺有此物明是其飾故以為旁飾上飾也言椁有棺有則是本不當有言其厚葬譏其奢侈宋公所僭必僭天子明此四阿翰檜皆是王之禮也蜃炭言用亦本不當用其蜃炭蓋亦王之禮也車馬器備法得有之言益言重但譏其多耳殉則本不得然非譏其僭君子謂華元樂舉於是乎不臣臣治煩去惑者也是以伏死而爭今二子者君生則縱其惑注謂文十八年殺母弟須音義去起吕反下去之同爭爭鬬之爭死又益其侈是棄君於惡也何臣之為注若言何用為臣音義侈昌氏反又式氏反疏正義曰言何用為臣是不成臣也言雖有若無劉君還以為不成臣與杜義無别而規杜氏非也九月衛穆公卒晉三子自役弔焉哭於大門之外注師還過衛故因弔之未復命故不敢成禮音義過古禾反人古臥反衛人逆之注逆於門外設喪位婦人哭於門内注喪位婦人哭於堂賔在門外故移在門内送亦如之遂常以葬注至葬行此禮疏正義曰哭於大門之外謂大門外之西東面衛人逆之謂大門外之東西面各從賔主之位婦人哭於門内謂門内之西東面以堂上在西東面故也至於三子之去衛人送之其位亦如之自此有鄰國弔者常行此禮而至於葬沈氏云雜記弔者即位于門西東面主孤西面相者受命曰孤某使請事客曰寡君使某如何不淑相者入告出曰孤某須矣弔者入主人升堂西面弔者升自西階東面致命此臣奉君命行弔之禮今三子師行經衛竟不敢成禮故於大門之外注正義曰喪大記云君之喪夫人坐于西方内命婦姑姊妹子姓立于西方外命婦率外宗哭于堂上北面又曰婦人迎客送客不下堂是喪位婦人哭於堂楚之討陳夏氏也注在宣十二年音義夏户雅反下同莊王欲納夏姬申公巫臣曰不可君召諸侯以討罪也今納夏姬貪其色也貪色為淫淫為大罰周書曰明徳慎罰注周書康誥文王所以造周也明徳務崇之之謂也慎罰務去之之謂也疏正義曰周書康誥之篇周公述文王之事以告康叔云惟乃丕顯考文王克明徳慎罰巫臣既引其言乃申其意言文王能為此行故所以造周國也務崇之謂務欲崇益道徳務去之謂務欲去其刑罰若興諸侯以取大罰非慎之也君其圖之王乃止子反欲取之巫臣曰是不祥人也是夭子蠻注子蠻鄭靈公夏姬之兄殺死無後音義殺申志反下文殺靈侯同殺御叔注御叔夏姬之夫亦早死音義御魚據反疏正義曰子蠻御叔自以短命死耳似天鍾羙於是致使物無兩大故以二事為夏姬之罪弑靈侯注陳靈公也戮夏南注夏姬子徵舒出孔儀注孔寜儀行父喪陳國注楚滅陳音義喪息浪反下注而喪同何不祥如是人生實難其有不獲死乎注言死易得無取夏姬以速之音義易以䜴反天下多羙婦人何必是子反乃止王以予連尹襄老襄老死於邲不獲其尸注邲戰在宣十二年其子黒要烝焉注黒要襄老子音義要一遥反烝之承反巫臣使道焉曰歸吾聘女注道夏姬使歸鄭音義道音導注同聘女匹政反下音汝疏正義曰禮記内則云聘則為妻奔則為妾道之云女歸鄭國吾依禮聘女以為妻也又使自鄭召之曰尸可得也注襄老尸必來逆之姬以告王王問諸屈巫注屈巫巫臣音義屈居勿反對曰其信知罃之父成公之嬖也而中行伯之季弟也注知罃父荀首也中行伯荀林父也邲之戰楚人囚知罃音義知罃音智下於耕反新佐中軍而善鄭皇戌甚愛此子注愛知罃也其必因鄭而歸王子與襄老之尸以求之注王子楚公子殺臣也邲之戰以荀首囚也鄭人懼於邲之役而欲求媚於晉其必許之王遣夏姬歸將行謂送者曰不得尸吾不反矣巫臣聘諸鄭鄭伯許之注聘夏姬及共王即位將為陽橋之役注楚伐魯至陽橋在此年冬音義共音恭使屈巫聘于齊且告師期巫臣盡室以行注室家盡去申叔跪從其父將適郢遇之注叔跪申叔時之子音義跪其委反又居委反從才用反郢以井反又以政反曰異哉夫子有三軍之懼而又有桑中之喜宜將竊妻以逃者也注桑中衛風淫奔之詩及鄭使介反幣而以夏姬行注介副也幣聘物音義介音界將奔齊齊師新敗曰吾不處不勝之國遂奔晉而因郤至注至郤克族子疏正義曰世本郤豹生冀芮芮生缺缺生克又云豹生義義生步楊楊生蒲城鵲居居生至如世本克是豹之曾孫至是豹之𤣥孫於克為二從兄弟子以臣於晉晉人使為邢大夫注邢晉邑音義邢音刑子反請以重幣錮之注禁錮勿令仕音義錮音固令力呈反疏正義曰説文云錮鑄塞也鐡器穿穴者鑄鐡以塞之使不漏禁人使不得仕官者其事亦似之故謂之禁錮今世猶然王曰止其自為謀也則過矣其為吾先君謀也則忠忠社稷之固也所蓋多矣注蓋覆也音義自為于偽反又如字為吾于偽反且彼若能利國家雖重幣晉將可乎注言不許若無益於晉晉將棄之何勞錮焉注為七年楚滅巫臣族晉南通吳張本晉師歸范文子後入武子曰無為吾望爾也乎注武子士㑹文子之父對曰師有功國人喜以逆之先入必屬耳目焉是代帥受名也故不敢武子曰吾知免矣注知其不益已禍音義屬章欲反後同帥所類反下注稱帥軍帥将帥同吾知一本無知字郤伯見公曰子之力也夫對曰君之訓也二三子之力也臣何力之有焉注郤伯郤克音義見賢遍反下同夫音扶范叔見勞之如郤伯對曰庚所命也克之制也燮何力之有焉注荀庚將上軍時不出范文子上軍佐代行故稱帥以讓音義勞力報反将子匠反下同欒伯見公亦如之對曰燮之詔也士用命也書何力之有焉注詔告也欒書下軍帥故推功上軍傳言晉將帥克讓所以能勝齊宣公使求好于楚莊王卒宣公薨不克作好注在宣十八年音義好呼報反下同公即位受盟于晉注元年盟赤棘㑹晉伐齊衛人不行使于楚注不聘楚音義使音所吏反而亦受盟于晉從於伐齊故楚令尹子重為陽橋之役以救齊將起師子重曰君弱注傳曰寡人生十年而喪先君共王即位至是二年蓋年十二三矣羣臣不如先大夫師衆而後可詩曰濟濟多士文王以寜注詩大雅言文王以衆士安音義濟子禮反夫文王猶用衆况吾儕乎注儕等音義儕仕皆反且先君莊王屬之曰無徳以及逺方莫如惠恤其民而善其用之乃大户注閲氏户口音義閲音悦已責注棄逋責音義逋補吾反逮鰥注施及老鰥音義鰥古頑反施始䜴反救乏赦罪悉師王卒盡行彭名御戎蔡景公為左許靈公為右注王卒盡行故王戎車亦行雖無是王令二君當左右之位音義卒子忽反注同令力呈反疏正義曰諸言御戎皆御君之戎車此云彭名御戎知王戎車亦行也若君親在軍則君當車中御者在左勇力之士在右故御戎戎右常連言之此王車雖行王身不在故不立戎右使御者在中令蔡許二君居王車上當左右之位若夾衛王然下注云乘楚王車為左右是二君皆在車之上也二君弱皆强冠之冬楚師侵衛遂侵我師于蜀注公賂之而退故不書侵音義强其丈反冠古亂反使臧孫往注臧孫宣叔也辭曰楚逺而久固將退矣無功而受名臣不敢注不敢虛受退楚名楚侵及陽橋注陽橋魯地孟孫請往賂之注楚侵遂深故孟孫請以賂往孟孫獻子也以執斵執鍼織紝注執斵匠人執鍼女工織紝織繒布者音義斵竹角反鍼之林反紝女金反徐而鴆反皆百人公衡為質注公衡成公子音義質音致以請盟楚人許平十一月公及楚公子嬰齊蔡侯許男秦右大夫説宋華元陳公孫寜衛孫良夫鄭公子去疾及齊國之大夫盟于蜀注齊大夫不書其名非卿也音義説音悦去起吕反疏正義曰諸大夫盟㑹經貶之稱人或總言大夫若實是國卿本合書名者傳即顯其名氏若本是大夫不合書名者傳直言其大夫見其貶與不貶俱當稱人故不復言其名氏此傳言齊國之大夫傳不顯其名為非卿故也襄十六年溴梁之㑹經書戊寅大夫盟傳云於是叔孫豹晉荀偃宋向戌衛寗殖鄭公孫蠆小邾之大夫盟於時㑹上鄭之下有曹莒邾薛杞而小邾之大夫最處其下舉小邾而上包之此盟鄭人之下有齊曹邾薛鄫俱是大夫齊最在上舉齊而下總之止為齊若是卿則合言名氏此㑹非卿故舉齊也卿不書匱盟也於是乎畏晉而竊與楚盟故曰匱盟注匱乏也疏正義曰私竊為盟盟終不固此盟是匱乏之道也傳既言匱盟以解經又自解名曰匱盟之意於是乎畏晉而竊與楚盟故曰此是匱乏之盟也諸侯之卿竊與楚盟而仲尼貶之言其不應背晉故責之也責諸侯之背晉是成晉為盟主也哀十二年公㑹吴於槖臯呉子請盟公不欲使子貢辭之而私與衛侯宋皇瑗盟彼畏吳而竊相與盟不貶者不與吳為盟主言其私盟可許但魯自畏吳不書其盟其情無可責也釋例曰諸侯畏晉而竊與楚盟書盟而貶其卿此所以成晉為盟主也吳之彊大始於㑹鄫終於黄池凡三㑹三伐三盟雅書㑹伐而不書盟者吳以盟主自居而行其夷禮禮儀不典則盟神不蠲非所以結信義昭明徳故不録其盟不與其成為盟主也既不與呉之為盟主則宋魯衛三國私盟可許故無貶文是也若然僖二十一年公㑹諸侯盟于薄二十七年公㑹諸侯盟于宋彼二者皆顯與楚盟並無貶責此竊與楚盟而貶之者當僖公之時齊桓既卒晉文未興中國無伯惟彊是與雖逺共楚盟無所可責此時晉為盟主堪率諸侯私竊為盟心實畏晉故貶之耳然諸侯之卿畏晉容可貶之楚之彊盛恒與晉敵非是畏晉卿亦貶者楚既彊盛應顯然作盟今私竊受盟不敢宣露亦是畏晉之義且成晉為伯事須貶楚蔡侯許男不書乘楚車也謂之失位注乘楚王車為左右則失位也卿不書則稱人諸侯不書皆不見經君臣之别音義見賢遍反别彼列反疏正義曰小國之從大國其征伐也皆自乘其車自率其軍至戰陳之時與同出力耳此二君棄己之車乘楚之乘乃為楚王左右則是失位既失其位非復國君故侵與盟㑹竝皆不序經書楚師鄭師侵衛於時蔡許在矣公㑹楚公子嬰齊于蜀蔡許亦在也及盟又蔡許之君在焉侵也㑹也盟也三事竝失其位經悉不書故傳於盟下釋之明上侵衛㑹蜀皆失位也舊説諸侯之貶亦書為人杜意謂諸侯之貶不至於人故因此而又明之卿不書則稱人諸侯不書則全不見經此是君臣之别明貶諸侯無稱人之法也君子曰位其不可不慎也乎蔡許之君一失其位不得列於諸侯况其下乎詩曰不解于位民之攸塈注詩大雅言在上者勤正其位則國安而民息也攸所也塈息也音義解佳賣反塈許器反疏正義曰此大雅假樂之篇其是之謂矣楚師及宋公衡逃歸臧宣叔曰衡父不忍數年之不宴注宴樂也音義數所主反樂音洛以棄魯國國將若之何誰居後之人必有任是夫國棄矣注居辭也言後人必有當此患音義居音基任音壬夫音扶是行也晉辟楚畏其衆也君子曰衆之不可已也大夫為政猶以衆克况明君而善用其衆乎大誓所謂商兆民離周十人同者衆也注大誓周書萬億曰兆民離則弱合則成衆言殷以散亡周以衆興疏正義曰泰誓云受有億兆夷人離心離徳予有亂臣十人同心同徳此言大誓所謂者引其意非本文也晉侯使鞏朔獻齊㨗于周王弗見使單襄公辭焉曰蠻夷戎狄不式王命注式用也音義㨗在妾反淫􅊺毁常王命伐之則有獻㨗王親受而勞之所以懲不敬勸有功也兄弟甥舅侵敗王略注兄弟同姓國甥舅異姓國略經略法度音義􅊺面善反勞力報反敗必邁反王命伐之告事而已不獻其功所以敬親暱注告伐事而不獻囚俘音義暱女乙反禁淫慝也注淫慝謂虣掠百姓取囚俘也音義慝他得反虣本又作暴薄報反掠音亮今叔父克遂有功于齊注克能也而不使命卿鎮撫王室所使來撫余一人而鞏伯實來未有職司於王室注鞏朔上軍大夫非命卿名位不達於王室又奸先王之禮注謂獻齊㨗音義奸音干余雖欲於鞏伯注欲受其獻其敢廢舊典以忝叔父夫齊甥舅之國也而大師之後也注齊世與周昏故曰甥舅音義大音泰寜不亦淫從其欲以怒叔父抑豈不可諫誨士莊伯不能對注荘伯鞏朔音義從才用反本亦作縱王使委於三吏注委屬也三吏三公也音義三公者天子之吏也疏正義曰曲禮云五官之長曰伯其擯於天子也曰天子之吏鄭𤣥云謂三公也是三公稱吏故知三吏三公也禮之如侯伯克敵使大天告慶之禮降於卿禮一等王以鞏伯宴而私賄之使相告之曰非禮也勿籍注相相禮者籍書也王畏晉故私宴賄以慰鞏朔音義相息亮反注同疏正義曰如侯伯克敵使大夫告慶之禮則不得依獻㨗之禮其獻㨗之禮王待之必重於告慶之禮鞏朔晉之上軍大夫也縱使得如獻㨗之禮亦當降卿禮一等傳言降於卿禮一等以見王待鞏朔不失常也春秋左傳注疏卷二十五春秋左氏傳注疏卷二十五考證作丘甲注此甸所賦今魯使丘出之孫覺曰如杜説以為甸出甲士三人而使丘出之也夫一甸之地兼有四丘而使丘出甸賦丘豈能供之哉亦不能頓取于民如此之暴也蓋古者一甸之地兼有四丘而出長轂一乘甲士三人步卒七十二人成公始作丘甲則是丘出一甲而甸出甲士四人也往者三人而今增其一丘出一人焉故曰作丘甲也又按萬斯大學春秋隨筆曰作丘甲増甲士也而步卒如故魯畏齊强車増一甲皆為四乘因使一丘出一甲其步卒之增則在襄十一年作三軍時也傳士燮佐上軍臣召南按以傳及疏證之則士燮佐上軍也監本别本作將上軍者非今改正傳丑父使公下如華泉取飲林堯叟曰時丑父代為齊侯故詐使公下車往華泉取水而飲欲使公因而走逸臣召南按華泉華不注山泉水也傳五伯之霸也注夏伯昆吾商伯大彭豕韋周伯齊桓晉文趙汸補注曰傳以五伯對四王則通三代霸者言之是也宋襄秦穆不成霸楚莊吞噬中國豈有所謂勤而撫之以役王命之事顧炎武日知録曰詩正義引服䖍説與此同應邵風俗通亦主此説傳使齊人歸我汶陽之田林堯叟曰汶陽之田本魯地為齊所侵故晉使齊歸之於我臣召南按汶陽之田魯僖所以賞季友是季氏私田也故是役行父力主之傳公衡為質注公衡成公子臣召南按公衡恐是宣公子成公弟以成公之年計之不應以稚子為質也傳而不使命卿鎮撫王室臣浩按晉之命卿當是三軍將佐据此則當時列國之卿雖擅自廢置尚猶禀于王室假其爵命如士㑹之將中軍為太傅且必請王命以黻冕也杜前注三帥已嘗受王先路之賜知非臆度傳使相告之曰非禮也勿籍林堯叟曰言此宴賄皆非禮之正也勿書此以為禮典臣召南按此説恐未全言獻齊捷及使大夫皆非禮也勿書此于冊以見待晉獨優春秋左氏傳注疏卷二十五考證
