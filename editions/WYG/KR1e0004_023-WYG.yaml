body:
  text: 春秋左傳注疏卷二十三起宣公十二年盡十二年晉杜氏注唐陸德明音義孔穎達疏經十有二年春葬陳靈公注無傳賊討國復二十二月然後得葬楚子圍鄭注前年盟辰陵而又徼事晉故音義徼古堯反夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績注晉上軍成陳故書戰邲鄭地音義邲扶必反一音弼陳音直覲反疏正義曰此一軍成陳兩軍不成陳成陳者雖少以戰為文案昭二十三年鷄父之戰六國成陳而楚不成陳成陳者多而以敗為文者六國雖衆楚為兵主楚既未陳故以獨敗為文與此異也秋七月冬十有二月戊寅楚子滅蕭注蕭宋附庸國十二月無戊寅戊寅十一月九日疏正義曰莊十二年宋萬弑閔公蕭叔大心者宋蕭邑之大夫也平宋亂立桓公宋人嘉之以蕭邑封叔為附庸莊二十三年蕭叔朝公是其事也此年楚子㓕蕭定十一年宋公之弟辰入于蕭以叛則此後復為宋邑也杜以長歴校之十二月無戊寅乃是十一月九日此不言月誤長歴云日月必有誤者案傳稱師人多寒若是十一月則令之九月未是寒時當月是而日誤也晉人宋人衛人曺人同盟于清丘注晉衛背盟故大夫稱人宋華椒承羣偽之言以誤其國宋雖有守信之善而椒猶不免譏清丘衛地今在濮陽縣東南音義背蒲對反下注同疏正義曰傳云盟曰恤病討貳陳貳於楚而宋伐之衛救陳不討貳也楚伐宋而晉衛不救不恤病也是晉衛背盟故貶其大夫而稱人曺是小國貶與不貶俱當稱人故不言曺也明年傳稱君子曰凊丘之盟唯宋可以免則宋不違盟而亦貶宋卿者彼晉衛曺並皆偽妄華椒承羣偽之言以誤其國致使宋為盟故伐陳衛人救之楚人討之伐陳怒楚被伐無救宋雖有守信之善而椒猶不免譏者為諸國失信而累及椒也晉衛不信乃在盟後非是心欲不信而妄作此盟當盟之時未有不信之状在後違約不可豫知而亦并責椒者君子結交當擇善而從之所與不善必将敗徳椒與不信約盟則是不信之黨雖獨守信并亦貶之戒後之人使擇交也宋師伐陳衛人救陳注背清丘之盟傳十二年春楚子圍鄭旬有七日鄭人卜行成不吉卜臨于大宫注臨哭也大宫鄭祖廟音義臨力鴆反下注同大宫音泰注同注正義曰案雜記客致含􅈖訖請臨襄十二年傳呉子壽夢卒臨于周廟故云臨哭也宫即廟也象其尊貌則謂之為廟言其墻屋則稱之為宫大宫宫之大者鄭祖廟者謂鄭大祖之廟也且巷出車吉注出車於巷示將見遷不得安居國人大臨守陴者皆哭注陴城上僻倪皆哭所以告楚窮也音義陴婢支反徐扶移反僻普計反倪五計反疏正義曰陴城上小墻僻倪者看視之名襄六年晏弱圍萊堙之環城傳於堞注云堞女墻也又二十五年呉子門于巢巢牛臣隠於短墻以射之二十七年虚蒲嫳攻崔氏崔氏㻡其宫而守之注云堞短垣也陴堞僻倪短墻短垣女墻皆一物也説文云堞城上女垣也廣雅云陴倪女墻也釋名云城上垣曰陴於其孔中俾倪非常亦言陴益也助城之高也或曰女墻言其卑小比之於城如女子之於丈夫也楚子退師鄭人脩城進復圍之三月克之注哀其窮哭故為退師而猶不服故復圍之九十日音義復扶又反注同故為于偽反疏正義曰杜以三月克之謂圍經三月方始克之故云九十日也知非季春克之者下云六月晉師救鄭及河聞鄭既及楚平桓子欲還是將欲至河鄭猶未敗至河聞敗猶欲還師在國聞敗師必不發若是季春克之不應比至六月而晉人不開以此知三月非季春也經傳皆言春圍鄭不知圍以何月為始圍經旬有七日為之退師聞其修城乃復更進圍三月方始克之則從初以至於克凡經一百二十許日蓋以三月始圍至六月乃克也入自皇門至于逵路注塗方九軌曰逵音義逵求龜反爾雅云九逹謂之逵説文作馗云九逹道似龜背故謂之馗逵或馗字鄭伯肉袒牽羊以逆注肉袒牽羊示服為臣僕音義袒徒旱反曰孤不天注不為天所祐音義祐音又不能事君使君懷怒以及敝邑孤之罪也敢不唯命是聽其俘諸江南以實海濵亦唯命其翦以賜諸侯使臣妾之亦唯命注翦削也音義俘方夫反囚也濵音賔翦子淺反若惠顧前好注楚鄭世有盟誓之好音義好呼報反注同徼福於厲宣桓武不泯其社稷注周厲王宣王鄭之所自出也鄭桓公武公始封之賢君也願楚要福于此四君使社稷不滅泯猶滅也音義厲宣鄭桓公友周厲王之子宣王之母弟桓武鄭武公名滑突桓公之子泯彌忍反徐亡軫反要於遥反疏正義曰鄭桓公是周厲王之子宣王母弟又宣王封之故僖二十四年及此皆厲宣並言之桓公始封西鄭武公始居東鄭二公是始封之賢君若其存鄭則四君祐楚故願楚要福於此四君使社稷不滅泯滅也釋詁文使改事君夷於九縣注楚滅九國以為縣願得比之音義九縣莊六年㓕鄧十四年滅息僖五年滅弦十二年滅黄二十六年滅䕫文四年㓕江五年㓕六滅蓼十六年滅庸傳稱楚武王克權使鬬緍尹之又稱文王縣申息此十一國不知何以言九疏正義曰楚滅諸國見於傳者哀十七年稱文王縣申息莊六年稱楚滅鄧十八年稱武王克權僖五年滅弦十二年滅黄二十六年滅夔文四年滅江五年滅六又滅蓼十六年滅庸凡十一國見於傳僖二十八年傳曰漢陽諸姬楚實盡之則楚之滅國多矣言九縣者申息定是其二餘不知所謂蘇氏沈氏以權是小國庸先屬楚自外為九也君之惠也孤之願也非所敢望也敢布腹心君實圖之左右曰不可許也得國無赦王曰其君能下人必能信用其民矣庸可㡬乎退三十里而許之平注退一舍以禮鄭音義下遐嫁反㡬音冀疏正義曰庸用也㡬讀如冀言用可冀幸而得之乎何必滅其國潘尫入盟子良出質注潘尫楚大夫子良鄭伯弟音義尫烏黄反質音致夏六月晉師救鄭荀林父将中軍注代郤缺音義將子匠反下及注並同下尹將將左將右皆倣此先縠佐之注彘季代林父音義縠户木反本又作榖音同彘直例反疏正義曰服䖍云食采於彘或當然也文十二年河曲之戰荀林父佐中軍臾駢佐上軍欒盾將下軍自爾以來傳無其代知先縠代林父郤克代臾駢趙朔代欒盾也八年傳趙朔佐下軍知欒書代趙朔也案傳文皆稱彘子今注云彘季者勘譜亦以彘子彘季為一人則杜君别有所據書傳殘缺不可得而知也劉炫云傳文皆稱彘子何以知是彘季以縠非彘季以規杜今知非者杜以子為男子之稱季是㓜小之辭季之與子是得通稱子路或為季路舉其常稱謂之子論其字謂之季故公子友或稱季友而劉以傳唯稱彘子無彘季而規杜非也士㑹将上軍注河曲之役郤缺將上軍宣八年代趙盾為政將中軍士㑹代將上軍郤克佐之注郤缺之子代叟駢音義臾滋朱反駢蒲邊反趙朔将下軍注代欒盾欒書佐之注欒盾之子代趙朔趙括趙嬰齊為中軍大夫注括嬰齊皆趙盾異母弟鞏朔趙穿為上軍大夫荀首趙同為下軍大夫注荀首林父弟趙同趙嬰兄音義鞏九勇反韓厥為司馬注韓萬𤣥孫疏正義曰韓世家云韓之先事晉得封韓原曰韓武子後三世有韓厥世本云桓叔生子萬萬生求伯求伯生子輿子輿生獻子厥史記所云武子蓋韓萬也如彼二文厥是萬之曽孫而服䖍杜預皆言厥韓萬𤣥孫不知何所據也及河聞鄭既及楚平桓子欲還曰無及於鄭而勦民焉用之注桓子林父勦勞也音義勦初交反徐又子小反焉於䖍反楚歸而動不後注動兵伐鄭隨武子曰善注武子士㑹㑹聞用師觀釁而動注釁罪也音義釁許靳反服云間也疏正義曰釁訓為罪者釁是間隙之名今人謂瓦裂龜裂皆為釁既有間隙故得為罪也徳刑政事典禮不易不可敵也不為是征注言征伐為有罪不為有禮音義為于偽反注同疏正義曰既言觀釁而動更説無釁之事徳刑政事典禮此六事行之不變易者不可與之敵也聖王之制征伐者為有罪者耳不為是六事不易行征伐也此舉六事之目下文歴説楚不易六事以克之楚軍討鄭怒其貳而哀其卑叛而伐之服而舍之徳刑成矣伐叛刑也柔服徳也二者立矣昔嵗入陳注討徴舒今茲入鄭民不罷勞君無怨讟注讟謗也音義罷音皮讟徒木反疏正義曰讟謗也政有常則民不恨故國君無人怨無人謗擊鼓怨州吁鄭人謗子産是有怨謗也政有經矣注經常也荆尸而舉注荆楚也尸陳也楚武王始更為此陳法遂以為名音義此陳直覲反下同商農工賈不敗其業而卒乘輯睦注歩曰卒車曰乘音義賈音古卒子忽反注同乘繩證反注皆同輯音集又七入反疏正義曰齊語云公曰成民之事若何管子對曰四民者勿使雜處公曰處士工商農若何管子對曰昔聖王之制也處士就間燕處工就官府處商就市井處農就田野彼四民為士農工商此數亦四無士而有賈者此武子意言舉兵動衆四者不敗其業發兵則以士從征不容復就間燕故不云士而分商賈為二行曰商坐曰賈雖同是販賣而行坐異業發兵征伐四者悉皆不與故揔云不敗其業也事不奸矣注奸犯也音義奸音干蒍敖為宰擇楚國之令典注宰令尹蒍敖孫叔敖音義蒍于委反疏正義曰周禮六卿大宰為長遂以宰為上卿之號楚臣令尹為長故從他國論之謂令尹為宰楚國仍别有大宰之官但位任卑耳傳稱大宰伯州犁是也楚國名上卿為令尹者釋詁云令善也釋言云尹正也言用善人正此官也楚官多以尹為名皆取其正直也軍行右轅左追蓐注在車之右者挾轅為戰僃在左者追求草蓐為宿僃傳曰令尹南轅又曰改乘轅楚陳以轅為主音義蓐音辱挾胡牒反又古洽反一音古協反疏正義曰司馬法兵車一乘有甲士三人歩卒七十二人甲士在車不共卒役所言左右者分歩卒為左右也兵車一轅服馬夾之而言挾轅者歩卒被分在右者當軍行之時又分之使在兩廂挾轅以為戰備楚陳以轅為主故以轅表車正是挾車嚴兵以備不虞也其應在左者使之追求草蓐今離道求草不近兵車也蓐謂卧上之草故云為宿備也此是在道時然故云軍行右轅左追蓐至於對陳之時則各在車之左右故豫定左右之分在道分使之耳前茅慮無注慮無如今軍行前有斥候蹹伏皆持以綘及白為幡見騎賊舉綘幡見歩賊舉白幡僃慮有無也茅明也或曰時楚以茅為旌識音義蹹徒臘反幡芳元反騎其寄反識中志反又音志疏正義曰茅明也在前者明為思慮其所無之事恐其卒有非常當預告軍中兵衆使知而為之備也如今軍行謂當杜之時行軍有此法也前有斥候蹹㐲者令人逺在軍前斥度候望慮有伏兵使蹹行之持以綘及白為幡與軍人為私號也曲禮曰前有水則載青旌前有塵埃則載鳴鳶前有車騎則載飛鴻前有士師則載虎皮前有摯獸則載貔貅其事與此見賊舉幡相似也茅明釋言文舍人曰茅昧之明也中權後勁注中軍制謀後以精兵為殿音義勁吉政反殿丁練反百官象物而動軍政不戒而備注物猶類也戒勅令疏正義曰類謂旌旗畫物類也百官尊卑不同所建各有其物象其所建之物而行動軍之政教不待約勅號令而自備辨也周禮大司馬中秋教治兵辨旗物之用王載大常諸侯載旗軍吏載旗師都載旃鄉遂載物郊野載旐百官載旟鄭𤣥云軍吏諸軍帥也師都遂大夫也鄉遂鄉大夫也或載旃或載物衆屬軍吏無所將也郊謂鄉遂之州長縣正以下野謂公邑大夫載旐者以其將羡卒也百官卿大夫也載輿者以其屬衛士也凡旌旗有軍衆者畫異物無者帛而已是其尊異所建各有物類也案春官司常職云及國之大閲贊司馬頒旗物王建大常諸侯建旗孤卿建旃大夫士建物師都建旗州里建旟縣鄙建旐道車載旞游車建旌俱是周禮而所建不同者大司馬所云中秋教治兵之法司常所云中冬教大閲之法鄭𤣥云凡頒旗物以出軍之旗則如秋以尊卑之常建則如冬大閲備軍禮旌旗不如出軍時空辟實也是為時不同故所建異此云象物而動謂軍行之時當指治兵之法也能用典矣其君之舉也内姓選於親外姓選於舊注言親疎並用舉不失徳賞不失勞老有加惠注賜老則不計勞旅有施舍注旅客來者施之以惠舍不勞役疏正義曰内姓謂同姓也其君之舉用人也於同姓則選之於親於外姓則選之於舊於親内選賢言唯賢是任不以親以舊便即用之所舉不失有徳所賞不失有勞必有徳乃舉有勞乃賞言不賞無勞不舉無徳臣民年老有加増恩惠外來旅客有施舍常法謂羈旅之臣以其新來施以恩惠舍不勞役也注正義曰老有恩惠當謂年老有加増恩惠不論有勞與無勞也劉炫云老者當有恩惠之賜非勞役之限但恩惠則賞賜之以文連賞不失勞之下故杜云賜老則不計勞劉炫以不計勞之文而規杜氏一何煩碎君子小人物有服章注尊卑别也音義别彼列反貴有常尊賤有等威注威儀有等差音義差初佳反又初宜反疏正義曰言貴有常尊則當云賤有常卑而云賤有等威者威儀等差又兼貴賤既屬常尊於貴遂屬等威於賤使互相發明耳禮不逆矣徳立刑行政成事時典從禮順若之何敵之疏正義曰功徳苦其不立刑威苦其不行政以成就為上事以得時為善典貴其從禮惡其逆故云徳立刑行政成事時典從禮順各以義理相配為文皆不易之事既歴序此事乃云若之何敵之覆上徳刑政事典禮不易不可敵也見可而進知難而退軍之善政也兼弱攻昧武之善經也注昧昏亂經法也音義昧音妹子姑整軍而經武乎注姑且也猶有弱而昧者何必楚仲虺有言曰取亂侮亡兼弱也注仲虺湯左相薛之祖奚仲之後音義虺許鬼反侮亡吕反相息亮反疏正義曰取亂侮亡尚書仲虺之誥文也定元年傳薛宰曰薛之皇祖奚仲居薛以為夏車正仲虺居薛以為湯左相二人皆是薛祖是仲虺為奚仲之後汋曰於鑠王師遵養時晦注汋詩頌篇名鑠美也言美武王能遵天之道須暗昧者惡積而後取之音義汋章畧反於音烏鑠舒若反疏正義曰汋詩經無汋字序云言能汋先祖之道以養天下故以汋為名焉鑠美釋詁文於嘆辭也時是也侮昧也言於乎美哉武王之用師也能遵天之道養是闇昧之君待闇昧者惡積而後取之言道天之道者上天誅紂之期未至武王靜以待之是其道天之道也耆昧也注耆致也致討於昧音義耆音㫖徐其夷反老也注及下同疏正義曰耆音㫖㫖致聲相近故為致也致討於昧者言養之使昧然後可討之上句云兼弱攻昧引仲虺之言以證兼弱引武王之事以證攻昧此不云攻昧而言耆昧者以汋詩之意言養紂而不言伐紂不得謂之攻昧故縁詩之意言致之於昧然後攻之武曰無競惟烈注武詩頌篇名烈業也言武王兼弱取昧故成無疆之業音義疆居良反疏正義曰烈業也釋詁文競疆也詩意言無疆乎唯武王之功業言克商功業實無疆也此引武詩承兼弱攻昧之下故杜以傳意解之言武王兼弱取昧故成此無疆之業此詩汋武二篇並無兼弱之事因傳上文連言之撫弱耆昧以務烈所可也注言當務從武王之功業撫而取之音義以務烈所絶句疏正義曰上言兼弱此云撫弱言其撫養而取之未必皆攻伐以求之也此撫弱即覆上仲虺有言兼弱也耆昧即覆上汋曰於鑠王師耆昧也以務烈所覆土武曰無競惟烈士㑹言不須敵楚兼撫餘諸侯弱者致討諸侯昧者以務武王烈業之所可也彘子曰不可注彘子先縠晉所以霸師武臣力也今失諸侯不可謂力有敵而不從不可謂武由我失霸不如死且成師以出聞敵彊而退非夫也注非丈夫命為軍帥而卒以非夫唯羣子能我弗為也以中軍佐濟注佐彘子所帥也濟渡河音義帥所類反下及注有帥元帥三帥同疏正義曰言晉之所以得為霸主者由軍師之武羣臣有力以有武力成此霸功令失諸侯不可謂之為力見敵不能從不可謂之為武命為軍帥者三軍將佐皆受君命為軍之主帥以中軍佐濟謂一軍之内將佐分之各有所帥故注云佐彘子所帥也僖二十八年胥臣以下軍之佐與此同也知莊子曰此師殆哉注莊子荀首音義知音智周易有之在師注坎下坤上師之臨注兌下坤上臨師初六變而之臨疏正義曰師坎為水坤為衆衆行如水師出之象故名其卦為師服䖍云坎為水坤為衆又互體震震為雷雷鼓類又為長子長子帥衆鳴鼓廵水而行行師之象也臨兌為澤坤為地居地而附視於澤臨下之義故名為臨曰師出以律否臧凶注此師卦初六爻辭律法否不也音義臧子郎反執事順成為臧逆為否注今彘子逆命不順成故應否臧之凶音義應應對之應衆散為弱注坎為衆今變為兌兌柔弱疏正義曰晉語文公筮尚有晉國司空季子占之曰震雷也車也坎水也衆也主雷與車而尚水與衆是坎為衆也易説卦兌為少女故為柔弱衆聚則彊散則弱坎變為兌是衆散為弱也川壅為澤注坎為川今變為兌兌為澤是川見壅音義壅於勇反本又作壅注皆同疏正義曰說卦坎為溝瀆溝瀆即是川也説卦兌為澤川是流水今變為澤是川見壅也有律以如已也注如從也法行則人從法法敗則法從人坎為法象今為衆則散為川則壅是失法之用從人之象疏正義曰釋詁云如徃也徃是相從之義故訓為從也法行則人從之率人以從法也法敗則法從人人各有心乖法不用法從人也釋言云坎律銓也樊光曰坎卦水也水性平律亦平銓亦平也郭璞曰易坎卦主法法律皆所以銓量輕重是坎為法象也今坎變為兌為衆則散而為弱為川則壅而為澤是失法之所用法敗從人之象也故曰律否臧且律竭也注竭敗也坎變為兑是法敗疏正義曰竭是水涸之名坎為水為法水之竭似法之敗故云竭敗也坎變為兌則為水不流則為法不行失為坎之用是法敗之象盈而以竭夭且不整所以凶也注水遇夭塞不得整流則竭涸也音義夭於表反疏正義曰哀九年傳曰如川之滿不可㳺也水當盈川而以壅故竭是水遇夭塞不得整流則竭涸也夭遏是壅塞之義故云遇夭塞也不行之謂臨注水變為澤乃成臨卦釋不行之物有帥而不從臨孰甚焉此之謂矣注譬彘子之違命亦不可行果遇必敗注遇敵彘子尸之注主此禍疏正義曰釋言訓尸為主故云主此禍也服䖍亦云此禍也又引易師卦六五長子帥師弟子輿尸凶長子帥師以中行也弟子輿尸使不當也佐之於元帥弟子也而專以師濟使不當也軍必破敗而輿尸案下句云雖免而歸則謂彘子當在陳而免師封有輿尸之語其言尸之或容有此意但尸字不可兩解故杜畧去之雖免而歸必有大咎注為明年晉殺先縠傳音義咎其九反疏正義曰莊子見彘子逆命必當有過乃論其事云此師之行甚危殆哉周易之書而有此事師之初六變而為臨初六爻辭云軍師之出當須以法若不善則致其凶既引易文以人從律令者師出乃以律從人則有不臧之凶又覆解不臧之義云執事上下相順和成則為臧若相違逆則為不臧既釋不臧之事又釋以律之意坎為衆今變為兌兌為柔弱是衆散為弱坎為川今變為兌兌為澤是川壅為澤坎為法象今為衆則弱為川則壅是法律破壊從人之象故曰律否臧以釋易文律否臧之義否臧易注云為師之始齊師者也齊衆以律失律則散故師出以律律不可失失律而臧何異於否失令有功法所不赦故師出不以律否臧皆凶釋否臧既了又釋凶之一字故云且律竭言法律竭盡也川水當盈而以竭盡且又被天塞不得整流以法當嚴整而以破壊被人違逆不得施行所以致此凶禍解釋凶義既了以盡易意然後論彘子之惡當此初六之禍故云水之不行是謂臨矣彘子有帥不從欲論不行之臨事誰甚於彘子周易所言是彘子之謂若能違辟前敵於事猶可若果敢遇敵必致禍敗也此禍敗之事彘子主受之雖在敵免死而歸必大咎也韓獻子謂桓子注獻子韓厥曰彘子以偏師陷子罪大矣子為元帥師不用命誰之罪也失屬亡師為罪已重不如進也注今鄭屬楚故曰失屬彘子以偏師陷故曰亡師音義令力呈反事之不捷惡有所分注捷成也與其專罪六人同之不猶愈乎注三軍皆敗則六卿同罪不得獨責元帥師遂濟楚子北師次於郔注郔鄭北地音義郔音筵沈尹將中軍注沈或作寢寢縣也今汝隂固始縣音義沈音審疏正義曰楚官多名為尹沈者或是邑名而其字或作寢哀十八年有寢尹呉由于因解寢為縣名不言寢是而沈非也子重將左子反將右將飲馬於河而歸注子反公子側音義飲於鴆反聞晉師既濟王欲還嬖人伍參欲戰注參伍奢之祖父音義嬖必計反徐甫詣反字林方豉反參七南反令尹孫叔敖弗欲曰昔歲入陳今茲入鄭不無事矣戰而不捷參之肉其足食乎參曰若事之捷孫叔為無謀矣不捷參之肉將在晉軍可得食乎令尹南轅反斾注廻車南鄉斾軍前大旗音義斾蒲貝反郷本又作嚮同許亮反伍參言於王曰晉之從政者新未能行令其佐先縠剛愎不仁未肯用命注愎狠也音義愎皮逼反狠胡墾反其三帥者專行不獲注欲專其所行而不得聽而無上衆誰適從注聽彘子趙同趙括則為軍無上令衆不知所從音義適丁歴反此行也晉師必敗且君而逃臣若社稷何王病之告令尹改乘轅而北之次于管以待之疏正義曰土地名榮陽京縣東北有管城古管國也晉師在敖鄗之間注榮陽京縣東北有管城敖鄗二山在榮陽縣西北音義乘繩證反管古緩反管城管叔所封也本或作菅古顔反非也敖五刀反鄗苦交反鄭皇戌使如晉師曰鄭之從楚社稷之故也未有貳心楚師驟勝而驕其師老矣而不設備子擊之鄭師為承注承繼也音義皇戌雖律反使所吏反驟仕救反楚師必敗彘子曰敗楚服鄭於此在矣必許之欒武子曰注武子欒書音義敗必邁反楚自克庸以來注在文十六年其君無日不討國人而訓之注討治也于民生之不易禍至之無日戒懼之不可以怠注于日也音義易以豉反在軍無日不討軍實而申儆之注軍實軍器音義儆敬領反于勝之不可保紂之百克而卒無後訓之以若敖蚡冒篳路藍縷以啓山林注若敖蚡冒皆楚之先君篳路柴車藍縷敝衣言此二君勤儉以啓土音義紂直九反蚡扶粉反冒莫報反篳音必藍力甘反縷力主反疏正義曰楚世家云熊咢卒子熊儀立是為若敖若敖卒子霄敖立霄敖卒子熊眴立是為蚡冐蚡冐卒弟熊通立是為楚武王案杜注文十六年傳蚡冐楚武王父不從史記也以荆竹織門謂之篳門則篳路亦以荆竹編車故謂篳路為柴車方言云楚謂凡人貧衣破醜敝為藍縷藍縷謂敝衣也服虔云言其縷破藍藍然箴之曰民生在勤勤則不匱不可謂驕注箴誡音義箴章金反匱其位反先大夫子犯有言曰師直為壯曲為老我則不徳而徼怨于楚我曲楚直不可謂老注不徳謂以力爭諸侯徼要也音義要一遥反其君之戎分為二廣注君之親兵音義廣古曠反下及注皆同廣有一卒卒偏之兩注十五乘為一廣司馬法百人為卒二十五人為兩車十五乘為大偏今廣十五乘亦用舊偏法復以二十五人為承副疏正義曰兩廣之别各有一卒之兵百人也一卒之外復有十五乘之偏并二十五人之兩既言一卒又云卒偏之兩言卒之者成辭婉句耳或解云兩屬於偏云偏之兩者謂偏家之兩知不然者案成七年以兩之一卒亦云之字豈又是兩家之卒且杜注云十五乘為大偏今楚亦用舊偏法此一廣之中實有此偏非是偏名為兩而出一卒别有偏之一兩二十五人從之劉炫云兩廣之别各有一卒百人一卒外復有偏之一兩二十五人兵法十五乘為偏偏有一兩從之兩是偏家之物故謂此為偏之兩其實一廣十五乘有一百二十五人從之注正義曰下云楚子為乘廣三十乘分為左右知十五乘為一廣也史記稱齊景公時有司馬田穰苴善用兵至六國時齊威王使大夫追論古者司馬兵法附穰苴於其中凡一百五十篇號曰司馬法百人為卒二十五人為兩十五卒為偏皆司馬法之文百人為卒二十五人為兩周禮亦有此文但周禮無偏故杜并引司馬法耳此云大偏對成七年九乘為小偏故此為大偏也桓五年二十五乘為偏戰時臨陳所用不同不可與此相對為大小杜注多少皆望文也言亦用舊偏法者謂楚雖荆尸而舉仍用舊偏舊於穰苴前已有則應周禮有又但以亡沒者多故禮文不具右廣初駕數及日中左則受之以至于昏内官序當其夜注内官近官序次也音義序當其夜一本作序當其次疏正義曰右廣鷄鳴初駕數及日中則左廣受而代之以至於昏此晝日事也其内官親近王者為次序以當其夜若今宿直遞持更也以待不虞不可謂無備子良鄭之良也師叔楚之崇也注師叔潘虺為楚人所崇貴師叔入盟子良在楚楚鄭親矣來勸我戰我克則來不克遂往以我卜也鄭不可從疏正義曰将我晉戰之勝負卜其遂來遂徃猶人揲蓍看卦善惡而卜其去之與徃也趙括趙同曰率師以來唯敵是求克敵得屬又何俟必從彘子注得屬服鄭知季曰原屏咎之徒也注知季莊子也原趙同屏趙括徒黨也音義知季音智荀首後為智氏屏歩丁反趙莊子曰欒伯善哉注莊子趙朔欒伯武子實其言必長晉國注實猶充也言欒書之身行能充此言則當執晉國之政也音義張徐丁丈反行下孟反楚少宰如晉師注少宰官名音義少詩照反注及下同曰寡君少遭閔凶不能文注閔憂也聞二先君之出入此行也注二先君楚成王穆王疏正義曰莊十六年楚始伐鄭文王之世也二十八年子元伐鄭成王之初也僖五年首止之㑹鄭伯逃歸自是以後鄭始時復從楚成王以前鄭未屬楚故出入此行唯成穆耳今之莊王成王孫穆王子出入此行猶往來於鄭將鄭是訓定豈敢求罪于晉二三子無淹久注淹留也隨季對曰昔平王命我先君文侯曰與鄭夾輔周室母廢王命今鄭不率注率遵也音義夾古洽反舊古協反母音無寡君使羣臣問諸鄭豈敢辱候人注候人謂伺候望敵者音義候音户豆反伺音司又音息嗣反敢拜君命之辱彘子以為諂使趙括從而更之曰行人失辭注言誤對音義諂勅檢反寡君使羣臣遷大國之跡於鄭注遷徙也曰無辟敵羣臣無所逃命楚子又使求成于晉晉人許之盟有日矣注有期日楚許伯御樂伯攝叔為右以致晉師注單車挑戰又示不欲崇和以疑晉之羣帥音義單音丹挑徒了反下文同帥所類反疏正義曰周禮環人掌致師鄭𤣥云致師致其必戰之志則致師者致已欲戰之意於敵人故單車揚威武以挑之下云趙旃請挑戰是也挑彼晉師故言以致晉師也楚子既求成而又令挑戰示其不欲崇和以疑誤晉之羣帥許伯曰吾聞致師者御靡旌摩壘而還注靡旌驅疾也摩近也音義摩末多反壘力軌反近附近之近樂伯曰吾聞致師者左射以菆注左車左也菆矢之善者音義射食亦反下注音同菆側留反疏正義曰兵車自非元帥皆射者在左御在中央故云左車左樂伯居左故稱左也下云莊子抽矢菆納諸㕑子之房選好矢而留之知菆是矢之善者代御執轡御下兩馬掉鞅而還注兩飾也掉正也示閒暇音義兩馬徐云或作􅧇皆力掌反或音亮掉徒弔反徐乃較反鞅於丈反閒音閑疏正義曰兩飾掉正皆無明訓服䖍亦云是相傳為然也飾馬者謂隨宜刷刮焉又正其鞅以示閒暇攝叔曰吾聞致師者右入壘折馘注折馘斷耳音義折之設反注同馘右獲反斷音短執俘而還皆行其所聞而復晉人逐之左右角之注張兩角從旁夾攻之樂伯左射馬而右射人角不能進矢一而已麋興於前射麋麗龜注麗著也龜背之隆高當心音義麋亡悲反著直畧反疏正義曰易雜卦象云離麗也日月離乎天百榖草木麗乎土是麗為著之義龜之形背高而前後下此射麋麗龜謂著其高處故杜以龜為背之隆高當心者服䖍亦然是相傳為此説也晉鮑癸當其後使攝叔奉麋獻焉曰以嵗之非時獻禽之未至敢膳諸從者音義從才用反下從者同疏正義曰周禮獸人冬獻狼夏獻麋春秋獻獸物者謂獻之以共王之膳耳非能徧及於百官也禮冬獵曰狩言圍守而取之獲禽多也於時虞人所獻或頒及羣臣故言嵗之非時獻獸之未至以為語之辭耳鮑癸止之曰其左善射其右有辭君子也既免注止不復逐晉魏錡求公族未得注錡魏犫子欲為公族大夫音義錡魚綺反犫尺周反疏正義曰服䖍亦以為犫子世本以為犫孫世本多誤未必然也而怒欲敗晉師請致師弗許請使許之遂往請戰而還楚潘黨逐之及熒澤見六麋射一麋以顧獻曰子有軍事獸人無乃不給於鮮敢獻於從者注熒澤在熒陽縣東新殺為鮮見六得一言其不如楚音義敗必邁反又如字使所吏反熒户扄反射食亦反鮮音仙注同叔黨命去之注叔黨潘黨潘之子趙旃求卿未得注旃趙穿子且怒於失楚之致師者請挑戰弗許請召盟許之與魏錡皆命而往郤獻子曰二憾徃矣注獻子郤克音義憾胡暗反弗備必敗彘子曰鄭人勸戰弗敢從也楚人求成弗能好也師無成命多備何為士季曰備之善若二子怒楚楚人乘我喪師無日矣注乘猶登也音義好呼報反下同喪息浪反不如備之楚之無惡除備而盟何損於好若以惡來有備不敗且雖諸侯相見軍衛不徹警也注徹去也音義警音景去起吕反彘子不可注不肯設備士季使鞏朔韓穿帥七覆于敖前注帥將也覆為伏兵七處音義覆扶又反注同帥如字將子匠反處昌慮反故上軍不敗趙嬰齊使其徒先具舟于河故敗而先濟潘黨既逐魏錡注言魏錡見逐而退趙旃夜至於楚軍注二人雖俱受命而行不相隨趙旃在後至席於軍門之外使其徒入之注布席坐示無所畏也疏正義曰使已從人入壘以取俘馘也楚子為乘廣三十乘分為左右右廣鷄鳴而駕日中而説注説舍也音義乘繩證反下三十乘下乘并注皆同説舒鋭反注及下同左則受之日入而説許偃御右廣養由基為右彭名御左廣屈蕩為右注楚王更迭載之故各有御右音義屈居勿反更音庚迭直結反乙卯王乘左廣以逐趙旃趙旃棄車而走林屈蕩摶之得其甲裳注下曰裳音義摶音博晉人懼二子之怒楚師也使軘車迎之注軘車兵車名音義軘徒温反疏正義曰襄十一年鄭人賂晉侯以廣車軘車淳十五乘甲兵備甲兵從之是兵車明矣鄭𤣥云廣車横陳之車服䖍云軘車屯守之車古名難得而知其義或當然矣潘黨望其塵使騁而告曰晉師至矣楚人亦懼王之入晉軍也遂出陳孫叔曰進之寧我薄人無人薄我詩云元戎十乘以先啓行先人也注元戎戎車在前也詩小雅言王者軍行必有戎車十乘在前開道先人為備音義騁勅景反陳直勤反下注皆同先人悉薦反注及下同疏正義曰元大也戎車也詩小雅六月之篇言王者軍行必有大車十乘常在軍前以開道諸軍從行所以先人為備也詩毛傳云夏后氏曰鉤車先正也殷曰寅車先疾也周曰元戎先良也三代行軍皆前有此車其名司馬法之文也其先正先疾先良毛解其名鄭𤣥又釋其意鉤車備設鉤鞶其行曲直有正故曰先正寅進也此車能進取逺道故曰先疾元戎大車之善者故曰先良也軍志曰先人有奪人之心薄之也注奪敵戰心遂疾進師車馳卒奔乘晉軍桓子不知所為鼓於軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也注兩手曰掬音義卒子忽反下及注並同掬九六反晉師右移上軍未動注言餘軍皆移去唯上軍在經所以書戰言猶有陳疏正義曰晉之三軍上軍在左中軍在中下軍在右言晉之中軍下軍敗走在上軍之右者皆移唯上軍未動故杜云餘軍皆移去唯上軍在工尹齊將右拒卒以逐下軍注工尹齊楚大大夫右拒陳名音義拒音矩本亦作矩下同楚子使唐狡與蔡鳩居告唐惠侯注二子楚大夫唐屬楚之小國義陽安昌縣東南有上唐鄉音義狡古卯反疏正義曰此未戰之前告經不書唐侯者為楚私屬故不見也曰不榖不徳而貪以遇大敵不榖之罪也然楚不克君之羞也敢藉君靈以濟楚師注藉猶假借也使潘黨率游闕四十乘注游車補闕者音義乘繩證反下之乘并注易乘同疏正義曰周禮車僕有闕車之倅鄭𤣥云闕車所用補闕之車也此言游闕知游車以擬補闕今使從唐侯是補闕也從唐侯以為左拒以從上軍駒伯曰待諸乎注駒伯郤克上軍佐也隨季曰楚師方壯若萃於我吾師必盡注萃聚也音義萃似醉反不如收而去之分謗生民不亦可乎注同奔為分謗不戰為生民殿其卒而退不敗注以其所將卒為軍後殿音義殿多練反注同王見右廣將從之乘屈蕩户之曰君以此始亦必以終注户止軍中易乘則恐軍人惑自是楚之乘廣先左注以乘左得勝故疏正義曰桓八年傳云楚人尚左君必左者謂置車尚左故君在左此言先左謂乘廣先左耳上文且云右廣初駕日中乃授左廣則舊法先乘右廣今楚王偶然乘左車以逐趙旃因是而得戰勝以為宜乘左廣自是以後乘廣先左以乘左得勝故也晉人或以廣隊不能進注廣兵車音義隊直類反疏正義曰襄十一年鄭人賂晉侯以廣車定四年史皇以乘廣死是兵車稱廣也此言晉人廣隊下云㧞斾投衡軍行則斾在軍前不是車皆有斾也此蓋是晉人在軍之前載斾之車楚人惎之脱扄注惎教也扄車上兵闌音義惎其器反扄古熒反徐公㝠反服云扄横木投輪間一曰車前横木也西京賦云旗不脱扄薛綜云扄所以止旗也疏正義曰脱扄抜斾皆是教人之語知惎為教也服䖍云扄横木有横木投於輪間一日扄車前横木張衡西京賦云旗不脱扄薛綜注云扄所以止旗今杜以扄為車上兵闌各以意言皆無明證而禮扛鼎之木其名曰扄則扄是横木之名教之脱扄則扄是可脱之物杜云兵闌蓋横木車前以約車上之兵器慮其落也隊坑則横木有礙故不能進少進馬還又惎之㧞斾投衡乃出注還便旋不進斾大旗也抜旗投衡上使不帆風差輕音義帆凡劔反本又作帊普霸反差初資反疏正義曰斾扇風重故馬便旋而不能進釋文云緇廣克幅長尋曰旐繼旐曰斾郭璞云帛續旐末為燕尾者此斾能扇風使重令馬不能進則其制必大矣故云斾大旗也城濮之役亡大斾之左旃此之類也斾縣於竿揷之車上衡是馬頸上横木故㧞取旗竿投於衡上卧之使不帆風則於車差輕故得出坑也帆是扇風之名今人舡上張布以鄣風名之曰帆顧曰吾不如大國之數奔也趙旃以其良馬二濟其兄與叔父以他馬反遇敵不能去棄車而走林逢大夫與其二子乘注逄氏音義數所角反乘繩證反謂其二子無顧注不欲見趙旃顧曰趙傁在後注傁老稱也音義傁素口反稱尺證反怒之使下指木曰尸女於是授趙旃綏以免明日以表尸之注表所指木取其尸音義女音汝皆重獲在木下注兄弟累尸而死音義重直隴反疏正義曰獲者被殺之名並皆被殺唯當言皆獲耳欲見尸相重累之皆獲故杜辯之云兄弟累尸而死累即傳之重也楚熊負羈囚知罃知莊子以其族反之注負羈楚大夫知罃知莊子之子族家兵反還戰音義罃於耕反還音環㕑武子御注武子魏錡音義㕑直誅反下軍之士多從之注知莊子下軍大夫故每射抽矢菆納諸厨子之房注抽擢也菆好箭房箭舍音義射食夜反又食亦反擢直角反㕑子怒曰非子之求而蒲之愛注蒲楊柳可以為箭董澤之蒲可勝既乎注董澤澤名河東聞喜縣東北有董池陂既盡也音義勝音升陂彼宜反疏正義曰重物不可舉者謂之不勝用之不可盡者亦言不勝史傳多有其事今人無復此語故少難解耳既盡也可勝盡乎言用之不可盡也知季曰不以人子吾子其可得乎吾不可以苟射故也音義射食亦反下同疏正義曰言我不以好箭射楚貴人之子而質之吾之子其可得乎吾為此計者不可用惡箭苟且為射故也射連尹襄老獲之遂載其尸射公子榖臣囚之以二者還注穀臣楚王子及昏楚師軍於邲晉之餘師不能軍注不能成營也宵濟亦終夜有聲注言其兵衆將不能用音義將子匠反丙辰楚重至於邲注重輜重也音義重直勇反又直用反注上重字同輜側其反重也直用反疏正義曰輜重載物之車也說文云輜一名軿前後蔽也蔽前後以載物謂之輜車載物必重謂之重車人挽以行謂之輦輜重輦一物也襄十年傳稱秦堇父輦重如役挽此車也輜重載器物糧食常在軍後故乙卯曰戰丙辰始至於邲也周禮鄉師大軍旅會同正治其徒役與其輂輦鄭𤣥云輂駕馬輦人輓行所以載什器也止以為藩營司馬法云夏后氏謂輦曰余車殷曰胡奴車周曰輜輦輦一斧一斤一鑿一梩一鋤周輦加二版二築又曰夏后氏二十人而輦殷十八人而輦周十五人而輦說者以為夏出師不踰時殷踰時周歴時故前世輦少而後世輦多遂次于衡雍潘黨曰君盍築武軍注築軍營以章武功音義雍於用反盍户臘反而收晉尸以為京觀注積尸封土其上謂之京觀音義觀古亂反注及下京觀同臣聞克敵必示子孫以無忘武功楚子曰非爾所知也夫文止戈為武注文字武王克商作頌曰載戢干戈載櫜弓矢注戢藏也櫜韜也詩美武王能誅滅暴亂而息兵音義戢側立反櫜古刀反韜他刀反我求懿德肆于時夏允王保之注肆遂也夏大也言武王既息兵又能求美徳故遂大而信王保天下音義夏户雅反注同疏正義曰昔武王克商周公為之作頌曰武王誅紂之後則戢藏其干戈則櫜韜其弓矢言既誅暴亂則無復所用故韜藏之懿美也肆遂也時是也夏大也允信也武王以天下既定又能求美徳之士而任用之故於是功業遂大信哉唯我武王保之美武王能保天下也注正義曰戢訓為歛聚斂藏之義故為藏也櫜一名韜盛弓矢之衣也干戈弓矢藏而不復用是美武王能誅滅暴亂而息兵也此所引者周頌時邁之篇也詩頌云頌者以其成功告於神明則頌詩功成乃作此傳言武王克商作頌者武王克商後世追為作頌頌其克商之功非克商即作也國語引此云周文公之頌曰則此周公所作也傳言克商作頌者包下三篇皆述武王之事肆之為遂相傳為此訓也夏大釋詁文求美徳謂求而任用之遂大者功業遂大也又作武其卒章曰耆定爾功注武頌篇名耆致也言武王誅紂致定其功音義耆音㫖注同疏正義曰既作時邁又作武篇也頌皆一章言其卒章者謂終章之句也言武王誅紂致定爾武之大功也其三曰鋪時繹思我徂維求定注其三三篇鋪布也繹陳也時是也思辭也頌美武王能布政陳敎使天下歸徃求安定音義鋪普吳反徐音敷繹音亦疏正義曰其三周頌賚之篇也鋪布也繹陳也徂徃也言武王能布陳政殽故其時之民歸武王者皆云我徂惟自求安定美武王能安民故民師之也注正義曰鋪是布散之義故為布也繹陳釋詁文思是語之辭不為義也其六曰綏萬邦屢豐年注其六六篇綏安也屢數也言武王既安天下數致豐年此三六之數與今詩頌篇次不同蓋楚樂歌之次第音義屢力注反注同數所角反疏正義曰其六周頌桓之篇也綏安也屢數也言武王伐紂安天下萬國數有豐熟之年美武王能和衆國豐民財也注正義曰綏安釋詁文屢數常訓也杜以其三其六與今詩頌篇次不同故為疑辭蓋楚樂歌之第言楚之樂人歌周頌者别無次第故賚第三桓第六也劉炫以為其三其六者是楚子第三引鋪時繹思第六引綏萬邦今刪定知非者此傳若是舊文及傳家叙事容可言楚子第三引鋪時繹思第六引綏萬邦此既引楚子之言明知先有三六之語故楚子引之得云其三其六若楚子始第三引詩第六引詩豈得自言其三曰其六曰劉以其三其六為楚子引詩次第以規杜過何辟之甚沈氏雖云襄二十九年季札觀樂篇次不同杜云仲尼未刪定此亦不同而云楚樂歌之次者襄二十九年雖少有篇次不同大畧不甚乖越故云仲尼未刪定以前此之三六全與詩次不同故云楚樂歌之第今頌篇次桓第八賚第九也夫武禁暴戢兵保大定功安民和衆豐財者也注此武七徳疏正義曰楚子既引四篇乃陳七徳則四篇之内有此七者之義戢干戈櫜弓矢禁暴戢兵也時夏保之保大也耆定爾功定功也我徂求定安民也綏萬邦和衆也屢豐年豐財也我徂求定是能安民故徃求定也綏萬國由徳能和衆故厲國安也故使子孫無忘其章注著之篇章使子孫不忘疏正義曰杜以不忘其章謂子孫不忘上四篇之詩故云著之篇章使子孫不忘必知然者以文承武王克商作頌之後文連四篇詩義故以為著之篇章劉炫云能有七徳故子孫不忘章明功業横取下文京觀為無忘其章明武功以規杜過非也今我使二國暴骨暴矣觀兵以威諸侯兵不戢矣暴而不戢安能保大猶有晉在焉得定功所違民欲猶多民何安焉無徳而强爭諸侯何以和衆利人之幾注幾危也音義暴骨蒲卜反本或作曝焉得於䖍反强其丈反而安人之亂以為已榮何以豐財注兵動則年荒武有七徳我無一焉何以示子孫其為先君宫告成事而已注祀先君告戰勝疏正義曰禮記曾子問稱古者師行必以遷廟主行載于齊車言必有尊也尚書甘誓云用命賞于祖謂遷廟之祖主也為先君宫為此遷主作宫於此祀之告成事告戰勝也禮記大傳云牧之野武王之大事也既事而奠於牧室亦是新作室而奠祭也曾子問又曰無遷主則何主孔子曰天子諸侯將出必以幣帛皮圭告於祖禰遂奉以出載於齊車以行每舍奠焉而後就舍武非吾功也古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲淫慝注鯨鯢大魚名以喻不義之人吞食小國音義鯨其京反鯢五兮反懲直升反慝他得反疏正義曰裴淵廣州記云鯨鯢長百尺雄曰鯨雌曰鯢目即明月珠也故死即不見眼睛也周處風土記云鯨鯢海中大魚也俗說出入穴即為潮水今罪無所注晉罪無所犯也而民皆盡忠以死君命又何以為京觀乎祀于河作先君宫告成事而還注傳言楚莊有禮所以遂興是役也鄭石制實入楚師將以分鄭而立公子魚臣疏正義曰入楚師言入此楚師於鄭國服䖍云入楚師使楚師來入鄭是也此石制引楚師入鄭將以分鄭國以半與楚取半立公子魚臣為鄭君已欲擅其寵也辛未鄭殺僕叔及子服注僕叔魚臣也子服石制也君子曰史佚所謂母怙亂者謂是類也注言恃人之亂以要利音義佚音逸母音無怙音户要一遙反詩曰亂離瘼矣爰其適歸注詩小雅離憂也瘼病也爰於也言禍亂憂病於何所歸乎歎之音義瘼音莫疏正義曰詩小雅四月之篇也離憂瘼病爰於皆釋詁文言時世禍亂必有憂病者於何其所適歸乎歎此禍亂不知將何所歸也歸於怙亂者也夫注恃亂則禍歸之音義夫音扶鄭伯許男如楚注為十四年晉伐鄭傳秋晉師歸桓子請死疏正義曰檀弓云謀人之軍師敗則死之謀人之邦邑危則亡之今桓子將軍師敗故請死晉侯欲許之士貞子諫曰不可注貞子士渥濁音義渥於角反城濮之役晉師三日榖注在僖二十八年音義濮音卜文公猶有憂色左右曰有喜而憂如有憂而喜乎注言憂喜失時公曰得臣猶在憂未歇也注歇盡也音義歇許竭反困獸猶鬭况國相乎及楚殺子玉注子玉得臣音義相息亮反下熊相同公喜而後可知也注喜見於顔色音義見賢遍反曰莫余毒也已是晉再克而楚再敗也楚是以再世不競注成王至穆王音義競其敬反今天或者大警晉也注警戒也而又殺林父以重楚勝其無乃久不競乎林父之事君也進思盡忠退思補過疏正義曰孝經有此二句孔安國云進見於君則必竭其忠貞之節以圖國事直道正辭有犯無隠退還所職思其事宜獻可替否以補主過此孔意進謂見君退謂還私職也或當以此二句據臣心為文文既據臣君在其上施之於君則稱進内省其身則稱退盡忠者進己之心以進獻於君補過者内修己心以補君愆失故以盡忠為進補過為退耳非謂進見與退還也社稷之衛也若之何殺之夫其敗也如日月之食焉何損於明晉侯使復其位注言晉景所以不失霸音義重直用反冬楚子伐蕭宋華椒以蔡人救蕭蕭人囚熊相宜僚及公子丙王曰勿殺吾退蕭人殺之王怒遂圍蕭蕭潰疏正義曰實未潰史以實王之意故言潰知者下云明日蕭潰是也申公巫臣曰師人多寒王廵三軍拊而勉之注拊撫慰勉之音義僚子彫反潰户内反拊芳甫反三軍之士皆如挾纊注纊綿也言説以忘寒音義挾户牒反纊音曠説音悦疏正義曰玉藻云纊為繭緼為袍鄭𤣥云纊新緜也遂傅於蕭還無社與司馬卯言號申叔展注還無社蕭大夫司馬卯申叔展皆楚大夫也無社素識叔展故因卯呼之音義傅音附還音旋卯馬鮑反號徐户到反一音户刀反呼也叔展曰有麥麴乎曰無有山鞠窮乎曰無注麥麴鞠窮所以禦濕欲使無社逃泥水中無社不解故曰無軍中不敢正言故謬語音義麴去六反鞠起弓反禦魚吕反下同解音蟹下同疏正義曰麥麴鞠窮所以禦濕賈逵有此言則相傳為此説也尚書説命云若作酒醴爾惟麴蘖則麥麴作酒之物本草有芎窮者是藥草之名觀傳文勢欲使無社逃於泥水中而問有此物以否知是禦濕所用但不知若為用之耳河魚腹疾奈何注叔展言無禦濕藥將病曰目於眢井而拯之注無社意解欲入井故使叔展視虚廢井而求拯已出溺為拯音義眢烏九反眢井廢井也字林云井無水也一皮反拯拯救之拯注同疏正義曰上句是叔展之言曰下是無社對語無社頻答言無叔展乃言必須入井故以水厄告之云如似河中之魚久在水内則生腹疾無此二物其奈濕何無社乃解其意告叔展云當目視眢井而拯出之出溺為拯方言文若為茅絰哭井則已注叔展又欲結茅以表井須哭乃應以為信音義絰直結反已音紀舊音以應應對之應疏正義曰此亦叔展之言也無社既解其意令展視井拯已但廢井必多不可知處故教無社令結茅為絰置於井上又恐無社錯應他人更教之云若號哭向井則是我之已身已展叔自謂也明日蕭潰申叔視其井則茅絰存焉號而出之注號哭也傳言蕭人無守心音義號戸刀反注同守手又反晉原縠宋華椒衛孔逹曹人同盟于清丘注原縠先縠疏正義曰杜譜以為雜人則不知誰之子也案傳先軫或稱原軫此蓋先軫之後也傳有名號之異杜譜皆竝言之先縠之下不言原縠是杜脱也上文稱其彘子服䖍以為食采於彘今復稱原原其上世所食也於是趙氏有原同蓋分原邑而共食之也曰恤病討貳於是卿不書不實其言也注宋伐陳衛救之不討貳也楚伐宋晉不救不恤病也宋為盟故伐陳注陳貳於楚故音義為于為反衛人救之孔達曰先君有約言焉若大國討我則死之注衛成公與陳共公有舊好故孔逹欲背盟救陳而以死謝晉為十四年衛殺孔逹傳音義約於妙反又如字共公音恭好呼報反背音佩十四年經注同春秋左傳注疏卷二十三春秋左氏傳注疏卷二十三考證傳卜臨于大宫注大宫鄭祖廟臣召南按大宫即太廟鄭自桓公始封則桓公廟也襄二十五年傳齊盟國人于大宫注太宫廟亦始封之君也又按傳云鄭祖厲王則當時僭禮諸侯亦祖天子所謂周廟者厲王廟也昭十八年子産使祝史徙主祏於周廟注曰厲王廟是也傳徼福於厲宣桓武注周厲王宣王鄭之所自出也臣召南按鄭桓公厲王之子宣王始封於鄭以宣為鄭所自出注稍未檢當云厲王鄭之所自出宣王鄭之所自封也傳使改事君夷於九縣音義監本顚倒訛謬今俱改正傳荀林父將中軍注代郤缺臣浩按趙盾卒後郤缺為政見八年傳十一年傳稱郤成子求成于衆狄衆狄皆服于晉則林父之代郤缺即在本年故伍參曰晉之從政者新未能行令也傳郤克佐之注郤缺之子監本訛作郤克之子今改正傳汋曰於鑠王師遵養時晦疏汋詩經無汋字序云言能汋先祖之道以養天下故以汋為名焉臣召南按文義應作詩經無汋字序云言能酌先祖之道以養天下故以酌為名傳知莊子曰此師殆哉下監本有疏莊子見彘子逆命一段按其文義宜在雖免而歸必有大咎注下又有師坎為水至故名為臨一段按其文義宜在周易有之在師之臨注下今俱改正傳沈尹將中軍臣照按楚官莫尊於令尹或疑沈尹將中軍則令尹孫叔敖何所將乎沈尹當作孫尹竊謂其時楚王在軍則中軍楚王所自將也王自將無與左軍右軍旗鼓一例之理則以沈尹為之將猶後世丞相府以長史主文書丞相不與六卿敵也孫叔敖楚相當運籌帷幄之中亦不得將中軍故沈尹實將之傳晉師在敖鄗之間注敖鄗二山在滎陽縣西北臣召南按後漢書郡國志河南尹滎陽有敖亭注周宣王狩於敖左傳晉師在敖鄗之間秦立為敖倉傳箴之曰民生在勤王應麟曰生如生於憂患之生故公父文伯之母曰民勞則思思則善心生傳代御執轡御下兩馬掉鞅而還臣召南按周禮環人注引春秋傳作掚馬又音義徐云或作􅧇疑當云或作掚偏傍從手不從木傳使軘車迎之疏廣車横陳之車陳監本訛作車今改正傳晉師右移上軍未動趙汸補注曰據傳上軍雖未動下言殿其卒而退是亦未嘗出陳也臣召南按上軍未動即上文所謂士季使鞏朔韓穿帥七覆於敖前故上軍不敗也傳王見右廣將從之乘屈蕩户之臣浩按注户訓為止諸本多有作屈蕩尸之誤也今改正傳宵濟亦終夜有聲顧炎武日知録曰杜注言其兵衆將不能用非也言其軍囂無復部伍傳晉原縠疏先軫或稱原軫此蓋先軫之後也臣召南按史記晉世家縠先軫子也以傳考之軫子先居且居且子先克文九年為箕鄭等所殺則此先縠當是軫之孫或曾孫史記未可信也疏云蓋先軫之後可謂慎審矣春秋左氏傳注疏卷二十三考證
