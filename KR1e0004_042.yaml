body:
  text: 春秋左傳注疏卷四十二起昭公二年盡四年晉杜氏注唐陸德明音義孔穎逹疏經二年春晉侯使韓起來聘夏叔弓如晉注叔弓叔老子秋鄭殺其大夫公孫黑注書名惡之薰隧盟子産不討遂以為卿故書之音義惡烏路反疏正義曰傳稱子産數其罪是書名為惡之也往年傳云子晳上大夫也則非卿非卿則不合書薰隧之盟子晳强與卿列子産不討即以為卿故書之冬公如晉至河乃復注弔少姜也晉人辭之故還音義少詩照反傳放此季孫宿如晉注致禭服也公實以秋行冬還乃書音義致禭音遂疏注正義曰傳稱季孫宿遂致服焉知其致禭服也傳說此事文正在冬上而經書在冬知公實以秋行至冬還乃書即書還時日月不復追言秋故文在冬也傳二年春晉侯使韓宣子來聘注公即位故疏注正義曰傳言且告為政而來見則其來非獨為為政故知主為公即位故也襄元年傳曰凡諸侯即位小國朝之大國聘焉是也且告為政而來見禮也注代趙武為政雖盟主而修好同盟故曰禮音義見賢遍反好呼報反疏注正義曰五年傳曰韓起之下有趙成中行吳魏舒范鞅知盈則六者三軍之將佐也韓起代趙武將中軍趙成繼父為卿代韓起也觀書於大史氏見易象與魯春秋曰周禮盡在魯矣注易象上下經之象辭魯春秋史記之策書春秋遵周公之典以序事故曰周禮盡在魯矣疏正義曰大史之官職掌書籍必有藏書之處若今之祕閣也觀書於大史氏者氏猶家也就其所司之處觀其書也見易象易象魯無增改故不言魯易象其春秋用周公之法書魯國之事故言魯春秋也魯國寶文王之書遵周公之典故云周禮盡在魯矣文王周公能制此典因見此書而追歎周德吾乃於今日始知周公之德以周公制春秋之法故也與周之所以得王天下之由由文王有聖德能作易象故也此二書晉國亦應有之韓子舊應經見而至魯始歎之乃云今知者因味其義而善其人非為素不見也注正義曰易有六十四卦分為上下二篇及孔子又作易傳十篇以翼成之後世謂孔子所作為傳謂本文為經故云上下經也易文推演爻卦象物而為之辭故易繫辭云八卦成列象在其中又云易者象也是故謂之易象孔子述卦下總辭謂之為彖述爻下别辭謂之為象以其無所分别故别立二名以辨之其實卦下之語亦是象物為辭故二者俱為象也定四年傳稱分魯公以傋物典策所言典策則史官書策之法若發凡言例皆是周公制之周衰之後諸國典策各違舊章唯魯春秋遵此周公之典以序時事故云周禮盡在魯矣吾乃今知周公之德與周之所以王也注易象春秋文王周公之制當此時儒道廢諸國多闕唯魯備故宣子適魯而說之音義以王于况反周𢎞正依字讀說音悅疏注正義曰易象文王所作春秋周公垂法故杜雙舉釋之云易象春秋文王周公之所制也易繫辭云易之興也其當殷之末世周之盛德耶當文王與紂之事耶鄭𤣥云據此言以易是文王所作斷可知矣且史傳䜟緯皆言文王演易演謂為其辭以演說之易經必是文王作也但易之爻辭有箕子之明夷利貞箕子明傷乃在武王之世文王不得言之又云王用享于岐山又云東鄰殺牛不如西鄰之禴祭實受其福二者之意皆斥文王若是文王作經無容自伐其德故先代大儒鄭衆賈逵等或以為卦下之彖辭文王所作爻下之象辭周公所作雖復紛競大久無能決當是非杜今雙舉並釋似同鄭說也然據傳先言易象後言春秋則應先云周之所以王與周公之德也今傳乃先云周公之德者易象諸國同有其春秋獨遵周公典法韓子美周禮在魯故先云周公之德公享之季武子賦綿之卒章注綿詩大雅卒章取文王有四臣故能以綿綿致興盛以晉侯比文王以韓子比四輔音義四臣大顚閎夭散宜生南宫適四輔謂先後奔走疏附禦侮疏注正義曰綿詩云豫曰有疏附豫曰有先後豫曰有奔奏豫曰有禦侮注云率下親上曰疏附相道前後曰先後喻德宣譽曰奔奏武臣折衝曰禦侮韓子賦角弓注角弓詩小雅取其兄弟昏姻無胥逺矣言兄弟之國宜相親季武子拜曰敢拜子之彌縫敝邑寡君有望矣注彌縫猶補合也謂以兄弟之義音義縫扶恭反合如字一音閣武子賦節之卒章注節詩小雅卒章取式訛爾心以畜萬邦以言晉德可以畜萬邦音義節才結反徐又如字訛五禾反既享宴于季氏有嘉樹焉宣子譽之注譽其好也音義譽音餘注同疏注正義曰服䖍云譽游也宣子游其樹下夏諺曰一游一譽為諸侯度所引夏諺孟子文也若是游於其下宣子本自無言武子何以輒對故杜以為譽其美好也武子曰宿敢不封殖此樹以無忘角弓注封厚也殖長也音義長丁丈反遂賦甘棠注甘棠詩召南召伯息於甘棠之下詩人思之而愛其樹武子欲封殖嘉樹如甘棠以宣子比召公音義召上照反下同宣子曰起不堪也無以及召公宣子遂如齊納幣注為平公聘少姜音義為于僞反下為之請同見子雅子雅召子旗注子旗子雅之子使見宣子宣子曰非保家之主也不臣注志氣亢音義見賢遍反下見彊同亢苦浪反見子尾子尾見彊注彊子尾之子宣子謂之如子旗注亦不臣大夫多笑之唯晏子信之曰夫子君子也注夫子韓起君子有信其有以知之矣注為十年齊欒施高彊來奔張本自齊聘於衛衛侯享之北宫文子賦淇澳注淇澳詩衛風美武公也言宣子有武公之德音義淇音其澳於六反宣子賦木瓜注木瓜亦衛風義取於欲厚報以為好音義好呼報反後文注皆同夏四月韓須如齊逆女注須韓起之子逆少姜齊陳無宇送女致少姜少姜有寵於晉侯晉侯謂之少齊注為立别號所以寵異之音義少詩照反疏注正義曰婦人稱姓姜是其常蓋以其齊女故以齊為别號所以寵異之言少姜少齊蓋本字為少也服䖍云所以寵異不以齊衆女字等言齊國如此好女甚少謂陳無宇非卿注欲使齊以適夫人禮送少姜音義適丁歷反執諸中都注中都晉邑在西河界休縣東南音義界音介休許蚪反少姜為之請曰送從逆班注班列也疏正義曰昏禮諸侯以下法當親迎有故得使卿明是使上卿也桓三年傳例云凡公女嫁于敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之是送者與逆者俱為上卿是送者依逆者班列若公子嫁於敵國及姊妹嫁於小國皆下卿送之是降逆者一等公子嫁於小國上大夫送之是降逆者二等也若晉以少姜為夫人當以上卿逆齊當以上卿送是亦送逆同班少姜據此言之故云送從逆班或可晉使公族大夫逆少姜元不以夫人之禮則同妾媵之屬送者皆從逆者班次不與桓三年逆夫人之禮同少姜據此而言故云送從逆班也劉炫云昏禮諸侯以下法當親迎有故得使卿明是使上卿也凡例云凡公女嫁于敵國姊妹則上卿送之公子則下卿送之是送卑於逆者一等故云送者從逆者之班次言當卑於逆者也畏大國也猶有所易是以亂作注韓須公族大夫陳無宇上大夫言齊畏晉改易禮制使上大夫送遂致此執辱之罪蓋少姜謙以示譏叔弓聘于晉報宣子也注此春韓宣子來聘晉侯使郊勞注聘禮賓至近郊君使卿勞之音義勞力報反注皆同辭曰寡君使弓來繼舊好固曰女無敢為賔徹命於執事敝邑𢎞矣注徹逹也音義女音汝下及注皆同敢辱郊使請辭注辭郊勞音義使所吏反下同致館辭曰寡君命下臣來繼舊好好合使成臣之祿也注得通君命則於已為榮祿敢辱大館注敢不敢叔向曰子叔子知禮哉吾聞之曰忠信禮之器也卑讓禮之宗也注宗猶主也辭不忘國忠信也注謂稱舊好先國後己卑讓也注始稱敝邑之𢎞先國也次稱臣之祿後己也詩曰敬愼威儀以近有德夫子近德矣注詩大雅音義近附近之近下同秋鄭公孫黑將作亂欲去游氏而代其位注游氏大叔之族黑為游楚所傷故欲害其族音義去起吕反傷疾作而不果注前年游楚所擊創音義創初良反駟氏與諸大夫欲殺之注駟氏黑之族子産在鄙聞之懼弗及乘遽而至注遽傳驛音義遽其據反爾雅云驛遽傳也孫炎注云傳車驛馬傳中戀反驛音亦疏注正義曰釋言云驛遽傳也孫炎曰傳車驛馬也使吏數之注責數其罪曰伯有之亂注在襄三十年以大國之事而未爾討也注務共大國之命不暇治女罪音義共音恭下文注皆同爾有亂心無厭國不女堪專伐伯有而罪一也昆弟爭室而罪二也注謂爭徐吾犯之妹音義厭於鹽反薰隧之盟女矯君位而罪三也注謂使大史書七子音義矯居表反有死罪三何以堪之不速死大刑將至再拜稽首辭曰死在朝夕無助天為虐疏正義曰言我創疾見作死在朝夕之間天巳虐我無更助天以為虐也子産曰人誰不死凶人不終命也作凶事為凶人不助天其助凶人乎請以印為褚師注印子晳之子褚師市官音義朝如字下同印一刃反褚張吕反注同疏注褚師市官正義曰蓋相傳說也子産曰印也若才君將任之不才將朝夕從女女罪之不恤而又何請焉不速死司寇將至七月壬寅縊尸諸周氏之衢注衢道也音義衢其于反加木焉注書其罪於木以加尸上晉少姜卒公如晉及河晉侯使士文伯來辭曰非伉儷也注晉侯溺於所幸為少姜行夫人之服故諸侯弔不敢以私煩諸侯故止之音義伉苦浪反儷力計反疏正義曰成十一年注云伉敵也儷耦也言少姜是妾非敵身對耦之人也少姜是妾杜言晉侯為少姜行夫人之服者以明年傳云寡君在縗絰之中知其為之服也請君無辱公還季孫宿遂致服焉注致少姜之禭服公以末秋行始冬還乃書之故經在冬叔向言陳無宇於晉侯曰彼何罪注彼無宇君使公族逆之齊使上大夫送之猶曰不共君求以貪國則不共注逆卑於送是晉國不共而執其使君刑已頗何以為盟主注頗不平音義使所吏反頗普多反且少姜有辭注謂請無宇之辭冬十月陳無宇歸注晉侯赦之十一月鄭印段如晉弔注弔少姜經三年春王正月丁未滕子原卒注襄二十五年盟重丘音義重直恭反疏注正義曰杜世族譜滕成公是文公之子成十六年滕子卒自爾以來襄五年盟于戚九年于戲十一年于亳城北十九年于祝柯二十年于澶淵二十五年于重丘皆魯滕俱在凡六同盟但經傳更無明文未知皆是滕成公否杜氏之意疑故指重丘近者而言劉炫以為皆是滕成公而規杜氏非也夏叔弓如滕五月葬滕成公注卿共小國之葬禮過厚葬襄公滕子來㑹故魯厚報之音義共音恭傳倣此秋小邾子來朝八月大雩冬大雨雹注無傳記災音義雨于付反雹蒲學反北燕伯欵出奔齊注不書大夫逐之而言奔罪之也書名從告疏注正義曰傳稱燕大夫比以殺公之外嬖公懼奔齊是被逐而出非自去也傳又云書曰北燕伯欵出奔齊罪之是仲尼新意不書大夫逐之而言其自奔是罪之也釋例曰諸侯奔亡皆迫逐而苟免非自出也傳稱孫林父寧殖出其君名在諸侯之策此以臣名赴告之文也仲尼之經更沒逐者主名以自奔為文責其君不能自安自固所犯非徒所逐之臣也衛赴不以名而燕赴以名各隨赴而書之義在彼不在此也傳不發於蔡朱衛衎而發於燕欵者欵罪輕於衛衎而重於蔡朱故舉中示例以兼通上下也晉悼感衛衎而發問師曠恃其目盲因問以極言且明君不能君故臣亦不能臣罪不純在臣也杜言在彼不在此者書其出奔已是罪賤不假書名以見罪故名與不名皆從本赴不復更見義也傳三年春王正月鄭游吉如晉送少姜之葬梁丙與張躍見之注二子晉大夫音義躍他歷反梁丙曰甚矣哉子之為此來也注卿共妾葬過禮甚音義為于僞反子大叔曰將得已乎注言不得止昔文襄之霸也注晉文公襄公疏正義曰襄是文公子能繼父業故連言之其命朝聘之數弔葬之使皆文公令之非襄公也其務不煩諸侯令諸侯三歲而聘五歲而朝有事而會不協而盟注明王之制歲聘間朝在十三年今簡之音義間間厠之間疏注正義曰十三年傳云明王之制使諸侯歲聘以志業間朝以講禮再朝而會以示威再會而盟以顯昭明彼謂諸侯於天子朝聘會盟之數計十二年而有八聘四朝再會一盟此說文襄之霸令諸侯朝聘霸主大國之法也諸侯朝天子因朝而為盟會所以同好惡奬王室霸主之合諸侯不得令其同盟以奬已故令有事而會不協而盟不復設年限之期周室既衰政在霸主霸主不可自同天子以明王舊制大煩諸侯不敢依用故設此制以簡之君薨大夫弔卿共葬事夫人士弔大夫送葬注先王之制諸侯之喪士弔大夫送葬在三十年蓋時俗過制故文襄雖節之猶過於古足以昭禮命事謀闕而已注朝聘以昭禮盟會以謀闕無加命矣注命有常今嬖寵之喪不敢擇位而數於守適注不敢以其位卑而令禮數如守適夫人然則時適夫人之喪弔送之禮巳過文襄之制音義而數所具反徐所主反適丁歷反注同本或作嫡下同令力呈反疏正義曰今嬖寵賤妾之喪不敢計擇妾位卑賤而令禮數即同於守適夫人也言守適者夫守外職妻守內職言夫人守內官之適長故以長適言夫人也文襄之制夫人喪士弔大夫送葬今游吉卿也而云同於守適則於時適夫人喪已令卿送葬矣故杜云然則時適夫人之喪弔送之禮已過文襄之制也劉炫云不敢擇取使人於卑賤之位而禮數同於守內官之適夫人也唯懼獲戾豈敢憚煩少姜有寵而死齊必繼室注繼室復薦女音義復扶又反下不出者皆同今兹吾又將來賀不唯此行也張躍曰善哉吾得聞此數也然自今子其無事矣譬如火焉注火心星火中寒暑乃退注心以季夏昏中而暑退季冬旦中而寒退疏注正義曰月令季夏之月日在柳昏心中旦奎中季冬之月日在婺女昏婁中旦氐中氐後即次房心是季冬旦火中也此其極也能無退乎晉將失諸侯諸侯求煩不獲注言將不能復煩諸侯二大夫退子大叔告人曰張躍有知其猶在君子之後乎注譏其無隱諱音義知音智丁未滕子原卒同盟故書名注同盟於襄之世亦應從同盟之禮故傳發之疏注正義曰文三年王子虎卒傳曰弔如同盟禮也杜云王子虎與僖公同盟于翟泉文公是同盟之子故赴以名然則與其父盟得以名赴其子於子虎之卒既已發傳而此復發者以子虎非諸侯又滕入春秋以來未嘗書滕子名故於此重發傳也齊侯使晏嬰請繼室於晉注復以女繼少姜曰寡君使嬰曰寡人願事君朝夕不倦將奉質幣以無失時則國家多難是以不獲注不得自來音義朝如字質徐之二反又音如字難乃旦反不腆先君之適注謂少姜音義腆他典反以備內官焜耀寡人之望音義焜胡本反又音昆服云明也耀羊照反服云照也疏正義曰服䖍云耀照也焜明也言得備妃嬪之列照明已之意望也則又無祿早世隕命寡人失望君若不忘先君之好惠顧齊國辱收寡人徼福於大公丁公注徼要也二公齊先君言收恤寡人則先君與之福也音義隕于敏反好呼報反徼古堯反大公音泰要一遙反照臨敝邑鎮撫其社稷則猶有先君之適注適夫人之女及遺姑姊妹注遺餘也疏正義曰姑姊妹亦先君之女也上云先君之適謂適夫人所生及遺姑姊妹謂非夫人所生者也若而人注言如常人不敢譽音義譽音餘君若不棄敝邑而辱使董振擇之以備嬪嬙寡人之望也注董正也振整也嬪嬙婦官音義振之刃反一音真注同嬙本又作墻在良反疏注正義曰董正釋詁文也振為整理之意言正整選擇示精審也周禮天子有九嬪嬪是婦官知嬙亦婦官哀元年傳說夫差宿有妃嬙婦御焉蓋周末婦官有此名漢成帝時胸奴來朝詔以掖庭王嬙賜之是名因於古也韓宣子使叔向對曰寡君之願也寡君不能獨任其社稷之事未有伉儷在縗絰之中是以未敢請注制夫人之服則葬訖君臣乃釋服音義任音壬縗本亦作衰七雷反絰直結反疏正義曰少姜本非正夫人而云未有伉儷者蓋晉侯當時無正夫人其繼室者使韓起上卿逆之鄭罕虎如晉賀之則後娶者為夫人也君有辱命惠莫大焉若惠顧敝邑撫有晉國賜之內主豈惟寡君舉羣臣實受其貺其自唐叔以下實寵嘉之注唐叔晉之祖音義貺音况疏正義曰舉亦皆之義言舉朝羣臣也既成昏注許昏成晏子受禮注受賔享之禮叔向從之宴相與語叔向曰齊其何如注問興衰晏子曰此季世也吾弗知齊其為陳氏矣注不知其他唯知齊將為陳氏音義吾弗知絶句公棄其民而歸於陳氏注棄民不恤齊舊四量豆區釜鍾四升為豆各自其四以登於釜注四豆為區區斗六升四區為釜釜六斗四升登成也音義量音亮下及注同區烏侯反注及下皆同釜十則鍾注六斛四斗陳氏三量皆登一焉鍾乃大矣注登加也加一謂加舊量之二也以五升為豆五豆為區五區為釜則區二斗釜八斗鍾八斛音義舊本以五升為豆四豆為區四區為釜直加豆為五升而區釜自大故杜云區二斗釜八斗是也本或作五豆為區五區為釜者為加舊豆區為五亦與杜注相會非於五升之豆又五五而加也疏正義曰陳氏三量各登其一則釜為八斗陳氏亦自依釜數釜十為鍾比於齊之舊鍾不言四而加一故云鍾乃大矣言其大於齊鍾明亦自十其釜也以家量貸而以公量收之注貸厚而收薄音義貸他代反山木如市弗加於山魚鹽蜃蛤弗加於海注賈如在山海不加貴音義蜃食軫反蛤古答反賈音嫁疏正義曰如訓往也言將山木往至市也於木既云如市魚鹽蜃蛤亦如市可知蒙上文也民參其力二入於公而衣食其一注言公重賦斂音義參七南反又音三斂力驗反公聚朽蠧而三老凍餒注三老謂上夀中夀下夀皆八十已上不見養遇音義聚徐在喻反一音在主反蠧丁故反三老服云工老商老農老也凍丁貢反餒奴罪反夀音授下同上時掌反疏注正義曰服䖍云三老者工老商老農老案民有四民其老無别不宜以三種之民為三老且士之老者亦應須恤不當獨遺士也故杜以為上中下夀言皆八十以上則上夀百年以上中夀九十以上下夀八十以上此亦以意言之釋此文耳不通於餘文也若秦伯謂蹇叔云中夀爾墓之木拱矣不言九十而死木已拱矣國之諸市屨賤踊貴注踊刖足者屨言刖多音義屨九具反踊音勇刖足者之屨也刖音月又五刮反民人痛疾而或燠休之注燠休痛念之聲謂陳氏也音義燠於喻反徐音憂又於到反一音於六反休虛渝反徐許留反賈云燠厚也休美也疏注正義曰賈逵云燠厚也休美也服䖍云燠休痛其痛而念之若今時小兒痛父母以口就之曰燠休代其痛也杜云燠休痛念之聲其意如服言也此民人痛疾承踊貴之下以其傳文相連無所分别故言謂陳氏也其愛之如父母而歸之如流水欲無獲民將焉辟之箕伯直柄虞遂伯戲注四人皆舜後陳氏之先音義焉於䖍反戲許宜反疏注正義曰論陳氏而言此四人知四人皆陳氏之先也八年傳云舜重之以明德實德於遂遂世守之及胡公不淫遂在舜之後知四人皆舜之後世數逺近不可復知也其相胡公大姬已在齊矣注胡公四人之後周始封陳之祖大姬其妃也言陳氏雖為人臣然將有國其先祖鬼神已與胡公共在齊音義相息亮反服如字大姬音泰疏正義曰杜不解相服䖍云相隨也蓋相訓為助不為隨也言箕伯四人其皆助胡公大姬神靈已在齊矣神之在否不可測度而晏子為此言者以陳氏必興姜姓必滅示已審見其事故言先神歸之其實神歸以否非晏子所能知也今定本相作祖叔向曰然雖吾公室今亦季世也戎馬不駕卿無軍行注言晉衰弱不能征討救諸侯音義行戶郎反公乘無人卒列無長注百人為卒言人皆非其人非其長音義乘繩證反卒子忽反注同長丁丈反注同庶民罷敝而宫室滋侈注滋益也音義罷音皮侈尺氏反又昌氏反道殣相望注餓死為殣音義殣音覲說文云道中死者人所覆也毛詩作墐傳云墐路冡也而女富溢尤注女嬖寵之家民聞公命如逃寇讎欒郤胥原狐續慶伯降在皂隸注八姓晉舊臣之族也皂𨽻賤官音義卻主逆反皂才早反𨽻力計反疏注正義曰此八姓之先欒卻胥原狐皆卿也續簡伯慶鄭伯宗亦見於傳先皆大夫也政在家門注大夫專政民無所依君曰不悛以樂慆憂注慆藏也悛改也音義悛七全反樂音洛又音嶽慆他刀反疏正義曰劉炫云慆慢也好音樂而慢易憂禍也杜以慆為藏當讀如弓韜之韜言以音樂樂身埋藏憂愁於樂中猶古詩云埋憂地下也公室之卑其何日之有注言今至讒鼎之銘注讒鼎名也音義讒仕咸反服云疾讒之鼎也疏注正義曰服䖍云讒鼎疾讒之鼎明堂位所云崇鼎是也一云讒地名禹鑄九鼎於甘讒之地故曰讒鼎二者竝無案據其名不可審知故杜直云鼎名而已曰昧旦丕顯後世猶怠注昧旦早起也丕大也言夙興以務大顯後世猶解怠音義昧音妹丕普悲反解佳賣反况日不悛其能久乎晏子曰子將若何注問何以免此難音義况日人實反難乃旦反叔向曰晉之公族盡矣肸聞之公室將卑其宗族枝葉先落則公從之肸之宗十一族注同祖為宗音義肸許乙反疏正義曰世族譜云羊舌氏晉之公族也羊舌其所食邑名唯言晉之公族不知出何公也杜云同祖為宗謂同出一公有十一族也譜又云或曰羊舌氏姓李名果有人盜羊而遺其頭不敢不受而埋之後盜羊事發辭連李氏李氏掘羊頭示之以明已不食唯識其舌存得免號曰羊舌氏杜言或曰蓋舊有此說杜所不從記異聞耳唯羊舌氏在而已肸又無子注無賢子公室無度注無法度幸而得死注言得以壽終為幸豈其獲祀注言必不得祀初景公欲更晏子之宅曰子之宅近市湫隘嚻塵不可以居注湫下隘小囂聲塵土音義近附近之近下同湫子小反徐音湫又在酒反下同隘於賣反囂許驕反一音五高反請更諸爽塏者注爽明塏燥音義塏苦代反燥素刀反疏注正義曰塏高地故為燥也以所居下濕塵埃故欲更於明燥之處晏子春秋云將更於豫章之圃豫章之圃高燥之地也辭曰君之先臣容焉注先臣晏子之先人臣不足以嗣之於臣侈矣注侈奢也且小人近市朝夕得所求小人之利也敢煩里旅注旅衆也不敢勞衆為已宅音義朝如字下朝夕同公笑曰子近市識貴賤乎對曰既利之敢不識乎公曰何貴何賤於是景公繁於刑注繁多也有鬻踊者故對曰踊貴屨賤既已告於君故與叔向語而稱之注傳護晏子令不與張躍同譏音義鬻羊六反賣也令力呈反疏注正義曰傳護晏子故為發此傳而叔向亦言已國傳雖無說蓋亦嘗以諌君故無譏也景公為是省於刑君子曰仁人之言其利博哉晏子一言而齊侯省刑詩曰君子如祉亂庶遄已注詩小雅如行也祉福也遄疾也言君子行福則庶幾亂疾止也音義為是于僞反省所景反下同祉音耻遄市專反其是之謂乎及晏子如晉公更其宅反則成矣既拜注拜謝新宅乃毁之而為里室皆如其舊注本壞里室以大晏子之宅故復之音義壞音怪復音服下卒復為其復欲復之同則使宅人反之注還其故室音義還音環且諺曰非宅是卜唯鄰是卜注卜良鄰音義諺音彥二三子先卜鄰矣注二三子謂鄰人違卜不祥君子不犯非禮注去儉即奢為非禮小人不犯不祥古之制也吾敢違諸乎卒復其舊宅公弗許因陳桓子以請乃許之注傳言齊晉之衰賢臣懷憂且言陳氏之興夏四月鄭伯如晉公孫段相甚敬而卑禮無違者晉侯嘉焉授之以策注策賜命之書音義相息亮反策初革反曰子豐有勞於晉國注子豐段之父疏正義曰服䖍云鄭僖公之為太子豐與之俱適晉計從太子一朝於晉不足以為勞也或當别有功勞事無所見故杜不解之余聞而弗忘賜女州田注州縣今屬河內郡音義女音汝以胙乃舊勳伯石再拜稽首受策以出君子曰禮其人之急也乎伯石之汰也注汰驕也音義胙才路反汰音泰一為禮於晉猶荷其祿况以禮終始乎詩曰人而無禮胡不遄死其是之謂乎初州縣欒豹之邑也注豹欒盈族音義荷戶可反任也又音可及欒氏亡范宣子趙文子韓宣子皆欲之文子曰溫吾縣也注州本屬溫溫趙氏邑二宣子曰自郤稱以别三傳矣注郤稱晉大夫始受州自是州與溫别至今傳三家音義稱尺證反以别絶句三傳直專反注同晉之别縣不唯州誰獲治之注言縣邑既别甚多無有得追而治取之文子病之乃舍之二子曰吾不可以正議而自與也皆舍之及文子為政趙獲曰可以取州矣注獲趙文子之子音義乃舍音赦又音捨下同文子曰退注使獲退也二子之言義也注二子二宣子也違義禍也余不能治余縣又焉用州其以徼禍也君子曰弗知實難注患不知禍所起音義焉於䖍反知而弗從禍莫大焉有言州必死豐氏故主韓氏注故猶舊也豐氏至晉舊以韓氏為主人伯石之獲州也韓宣子為之請之為其復取之之故注後若還晉因自欲取之為七年豐氏歸州張本音義為之于僞反下為其復為少姜下注為之辟仇為平公逆皆同五月叔弓如滕葬滕成公子服椒為介及郊遇懿伯之忌敬子不入注忌怨也懿伯椒之叔父敬子叔弓也叔弓禮椒為之辟仇音義介音界辟音避疏正義曰經書夏叔弓如滕五月葬滕公今傳文叔弓如滕亦在五月之下杜於桓十六年注引此事以為本事異兩書之故或言月或言時事異故文異其實叔弓亦以五月行也劉炫云叔弓以四月發魯滕以五月葬君叔弓書始行之月滕書實葬之月故書經異文也傳述遇讐之事并就葬月言耳檀弓下云滕成公之喪使子叔敬叔弔進書子服惠伯為介及郊為懿伯之忌不入惠伯曰政也不可以叔父之私不將公事遂入敬叔即此敬子也懿伯是惠伯之叔父為人所殺及滕郊遇懿伯之忌逢其讐也敬叔不入以禮惠伯欲使惠伯報叔父之讐殺彼人也惠伯以公義不可先入受館記文雖字有小異意與傳同而鄭𤣥注云敬叔有怨於懿伯難惠伯故不入又云敬叔於昭穆以懿伯為叔父其言差錯不可顯解是鄭之謬也注正義曰記云不可以叔父之私知懿伯是椒之叔父也叔弓不入者禮椒也為椒有辟仇之耻禮之欲使殺之惠伯曰公事有公利無私忌椒請先入乃先受館敬子從之注惠伯子服椒也傳言叔弓之有禮疏正義曰檀弓云子夏請問居昆弟之仇如之何曰仕不與共國銜君命而使雖遇之不鬬鄭𤣥云為負而廢君命也叔父之與昆弟親踈同耳故有公利無私忌辟仇非耻故椒請先入也晉韓起如齊逆女注為平公逆公孫蠆為少姜之有寵也以其子更公女而嫁公子注更嫁公女音義蠆敕邁反人謂宣子子尾欺晉晉胡受之宣子曰我欲得齊而遠其寵寵將來乎注寵謂子尾音義遠于萬反秋七月鄭罕虎如晉賀夫人且告曰楚人日徵敝邑以不朝立王之故注楚靈王新立敝邑之往則畏執事其謂寡君而固有外心其不往則宋之盟云注云交相見進退罪也寡君使虎布之注布陳也宣子使叔向對曰君若辱有寡君在楚何害修宋盟也君苟思盟寡君乃知免於戾矣君若不有寡君雖朝夕辱於敝邑寡君猜焉注猜疑也音義猜七才反君實有心何辱命焉注言若有事晉心至楚可不須告君其往也苟有寡君在楚猶在晉也張躍使謂大叔曰自子之歸也注歸在此年春小人糞除先人之敝廬曰子其將來今子皮實來小人失望大叔曰吉賤不獲來注賤非上卿音義糞甫問反疏正義曰張躍自晉使告大叔大叔在鄭遙報躍語而云不獲來者教使者報躍作至晉時語故云不獲來今人之語猶然也畏大國尊夫人也且孟曰而將無事吉庶幾焉注孟張躍也庶幾如躍言小邾穆公來朝季武子欲卑之注不欲以諸侯禮待之穆叔曰不可曹滕二邾實不忘我好敬以逆之猶懼其二又卑一睦焉注一睦謂小邾音義實不忘我好絶句一讀以好字向下好呼報反下文羣好同音疏注正義曰睦親也言曹滕二邾皆親魯小邾是親魯者之一國也逆羣好也其如舊而加敬焉志曰能敬無災又曰敬逆來者天所福也季孫從之八月大雩旱也齊侯田於莒注莒齊東竟音義竟音境下同盧蒲嫳見泣且請曰余髮如此種種余奚能為注嫳慶封之黨襄二十八年放之於竟種種短也自言衰老不能復為害音義嫳普結反又匹舌反見賢遍反種本亦作董董章勇反公曰諾吾告二子注二子子雅子尾歸而告之子尾欲復之子雅不可曰彼其髮短而心甚長其或寢處我矣注言不可信九月子雅放盧蒲嫳于北燕注恐其復作亂疏正義曰前已在竟今復徙之遠國也燕簡公多嬖寵欲去諸大夫而立其寵人冬燕大夫比以殺公之外嬖注比相親比音義去起吕反比毗志反注同公懼奔齊書曰北燕伯欵出奔齊罪之也注欵罪輕於衛衎重於蔡朱故舉中示例音義衎苦旦反十月鄭伯如楚子産相楚子享之賦吉日注吉日詩小雅宣王田獵之詩楚王欲與鄭伯共田故賦之音義相息亮反既享子産乃具田備王以田江南之夢注楚之雲夢跨江南北音義夢如字徐莫公反注同齊公孫竈卒注竈子雅司馬竈見晏子注司馬竈齊大夫曰又喪子雅矣晏子曰惜也子旗不免殆哉注以其不臣音義喪息浪反姜族弱矣而媯將始昌注媯陳氏音義媯九危反二惠競爽猶可注子雅子尾皆齊惠公之孫也競彊也爽明也又弱一個焉姜其危哉音義個古賀反經四年春王正月大雨雹注當雪而雹故以為災而書之音義雨于付反傳大雨雹同雹蒲學反夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會于申注楚靈王始會諸侯音義沈音審楚人執徐子注稱人以執以不道於其民告秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吳注因申會以伐吳不言諸侯者鄭徐滕小邾宋不在故也胡國汝陰縣西北有胡城疏正義曰釋例班序譜稱齊桓既沒宋楚爭盟起僖十八年盡二十七年陳與蔡凡三會在蔡上楚合諸侯蔡與陳凡六會其五在陳上莊十六年注云陳國小每盟會皆在衛下齊桓始霸楚亦始彊陳侯介於二大國之間而為三恪之客故齊桓因而進之遂班在衛上終於春秋然則陳實小於蔡衛桓公進陳班耳楚以大小為序不進陳班故蔡多在陳上注正義曰傳稱楚子以諸侯伐吳則因會而遂行春秋一事而再見者皆前目而後凡計此當云諸侯遂伐吳不言諸侯者以屬晉之國鄭徐滕小邾宋皆不在行不得總言諸侯故别序之也傳稱宋華費遂鄭大夫從則宋鄭在行亦不序者楚既慰遣彼自義從楚人成巳意遣不以告也執齊慶封殺之注楚子欲行霸為齊討慶封故稱齊音義為于僞反遂滅賴九月取鄫注鄫莒邑傳例曰克邑不用師徒曰取音義鄫才陵反冬十有二月乙卯叔孫豹卒傳四年春王正月許男如楚楚子止之注欲與俱田遂止鄭伯復田江南許男與焉注前年楚子已與鄭伯田江南故言復音義復扶又反注同與焉音預使椒舉如晉求諸侯二君待之注二君鄭許椒舉致命曰寡君使舉曰日君有惠賜盟于宋注宋盟在襄二十七年曰晉楚之從交相見也以歲之不易注不易言有難音義易以䜴反注同難乃旦反下文注同寡人願結歡於二三君注欲得諸侯謀事補闕音義歡喚端反使舉請間君若苟無四方之虞注虞度也音義請間徐音間一音如字度待洛反則願假寵以請於諸侯注欲借君之威寵以致諸侯晉侯欲勿許司馬侯曰不可楚王方侈天或者欲逞其心以厚其毒而降之罰未可知也其使能終亦未可知也晉楚唯天所相注相助也音義侈昌氏反又尺氏反逞敇景反相息亮反注同不可與爭君其許之而修德以待其歸若歸於德吾猶將事之况諸侯乎若適淫虐楚將棄之注棄不以為君吾又誰與爭公曰晉有三不殆其何敵之有注殆危也音義殆直改反國險而多馬齊楚多難注多篡弒之難音義篡初患反弒申志反有是三者何鄉而不濟對曰恃險與馬而虞鄰國之難是三殆也四嶽注東嶽岱西嶽華南嶽衡北嶽恆音義鄉許亮反本又作嚮嶽音嶽岱音代在兖州華如字又胡化反在雍州衡如字在荆州恆如字或作常在冀州案作恆者是也北嶽本名恆山漢為文帝諱改作常耳疏正義曰釋山云河南華河東岱河北恆江南衡李巡曰華西嶽華山也岱東嶽泰山也恆北嶽恆山也衡南嶽衡山也釋例土地名云東嶽泰山奉高縣泰山也南嶽長沙湘南縣衡山也西嶽𢎞農華隂縣西南華山也北嶽中山曲陽縣西北恆山也郭璞注恆山名常山辟漢文帝諱耳爾雅於釋山發首言此四山明其即是四嶽故注者皆以嶽解之且諸書史傳䜟緯皆以岱衡華恆為四嶽四嶽必是此四山也釋山又云泰山為東嶽華山為西嶽霍山為南嶽恆山為北嶽岱泰衡霍二文不同者此二嶽者皆一山而二名也白虎通云嶽者何嶽之為言桷也桷功德也應劭風俗通云嶽桷也桷考功德黜陟也然則四方方有一山天子巡狩至其下桷考諸侯功德而黜陟之故謂之嶽也風俗通又云泰山山之尊者一曰岱宗岱始也宗長也萬物之始陰陽交代故為五嶽長王者受命恆封禪之衡山一名霍山言萬物霍然大也華變也萬物成變由於西方也恆常也萬物伏北方有常也是解衡之與霍泰之與岱皆一山有二名也張揖云天柱謂之霍山漢書地理志云天柱在廬江灊縣風俗通亦云霍山廟在廬江灊縣如彼所云則霍山在江北而得與江南衡山為一者本江南衡山一名霍山漢武帝移嶽神於天柱又名天柱為霍山故漢魏以來衡霍别耳郭璞注爾雅云霍山今廬江灊縣灊水出焉别名天柱山漢武帝以衡山遼曠故移其神於此今其土俗人皆呼之為南嶽嶽本自以兩山為名非從近來也而學者多以霍山不得為南嶽又云從漢武帝來始有名即如此言為武帝在爾雅之前乎斯不然也是解衡霍二名之山也書傳多云五嶽此傳云四嶽者中嶽嵩高即大室是也下别言之故此云四嶽也三塗注在河南陸渾縣南音義三塗山名大行轘轅崤澠也渾戶昏反又戶困反疏正義曰服䖍云三塗大行轘轅崤澠也謂三塗為三處道也杜云在河南陸渾縣南則以三塗為一釋例土地名云三塗河南陸渾縣南山名或曰三塗伊闕大谷轘轅三道也傳曰晉將伐陸渾而先有事於洛與三塗先祭山川也謂三道皆非也是杜據彼十七年傳文知三塗是山非三道也陽城注在陽城縣東北疏正義曰陽城山名也土地名云河南陽城縣東北山洧水所出也大室注在河南陽城縣西北音義大室音泰下文大室同大室即中嶽嵩高山也在豫州疏正義曰大室即嵩高也釋山云嵩高為中嶽郭璞云大室山也别名外方今在河南陽城縣西北土地名云大室河南陽城縣西嵩高山中嶽也地理志云武帝置嵩高縣以奉大室之山是為中嶽又有少室在大室之西也荆山注在新城沶鄉縣南音義沶音市又音示漢書音義音稚或一音肄則當水旁作示恐非本或作泄字誤也中南注在始平武功縣南九州之險也是不一姓注雖是天下至險無德則滅亡冀之北土注燕代音義燕鳥賢反馬之所生無興國焉恃險與馬不可以為固也從古以然是以先王務修德音以亨神人注亨通也音義亨許庚反注同疏注正義曰易文言云亨者嘉之會也嘉會禮通謂之亨是亨為通也言治民事神使人神通說故云以亨神人也不聞其務險與馬也鄰國之難不可虞也或多難以固其國啓其疆土或無難以喪其國失其守宇注於國則四垂為宇音義疆居良反喪息浪反下同疏注正義曰易稱上棟下宇宇謂屋簷也於屋則簷邊為宇也於國則四垂為宇也四垂謂四竟邊垂若何虞難齊有仲孫之難而獲桓公至今賴之注仲孫公孫無知事在莊九年晉有里㔻之難而獲文公是以為盟主注里克㔻鄭事在僖九年音義㔻普悲反衛邢無難敵亦喪之注閔二年狄滅衛僖二十五年衛滅邢音義邢音刑故人之難不可虞也恃此三者而不修政德亡於不暇又何能濟君其許之紂作淫虐文王惠和殷是以隕周是以興夫豈爭諸侯乃許楚使使叔向對曰寡君有社稷之事是以不獲春秋時見注言不得自往謙辭音義紂直救反隕于敏反楚使所吏反向許丈反見賢遍反下注朝見昏見同諸侯君實有之何辱命焉椒舉遂請昏注蓋楚子遣舉時兼使求昏晉侯許之楚子問於子産曰晉其許我諸侯乎對曰許君晉君少安不在諸侯注安於小小不能遠圖音義少安如字其大夫多求注貪也莫匡其君疏正義曰釋言云匡正也孝經云君子之事上也將順其美匡救其惡在宋之盟又曰如一注晉楚同也若不許君將焉用之注焉用宋盟音義焉於䖍反注同王曰諸侯其來乎對曰必來從宋之盟承君之歡不畏大國注大國晉也何故不來不來者其魯衛曹邾乎曹畏宋邾畏魯魯衛逼於齊而親於晉唯是不來其餘君之所及也誰敢不至注言楚威力所能及音義逼彼力反疏正義曰言其餘諸侯君之威力所能及誰敢不來至楚者也王曰然則吾所求者無不可乎對曰求逞於人不可注逞快也求人以快意人必違之與人同欲盡濟注為下會申傳大雨雹季武子問於申豐曰雹可禦乎注禦止也申豐魯大夫對曰聖人在上無雹雖有不為災疏正義曰無雹復云雖有不為災者言有相形之勢也聖人在上無雹言必無雖有不為災復見無雹之意猶論語祭肉不出三日出三日不食之矣古者日在北陸而藏氷注陸道也謂夏十二月日在虛危氷堅而藏之疏注正義曰釋例云北陸虛也西陸昴也孫炎云陸中也北方之宿虛為中也西方之宿昴為中也彼以陸為中杜以陸為道者陸之為中為道皆為正訓各以意言耳杜以西陸朝覿謂奎星朝見昴為西方中宿則昴未得見宿是日行之道爾雅高平曰陸高平是道路之處故以陸為道也日在北陸為夏之十二月也十二月日在𤣥枵之次小寒節大寒中漢書律歷志載劉歆三統歷云𤣥枵之初日在婺女八度為小寒節在危初度為大寒中終於危十五度是夏之十二月日在虛危也於是之時寒極氷厚故取而藏之也周禮凌人正嵗十有二月令斬氷詩云二之日鑿氷冲冲月令季冬氷盛水腹命取氷鄭𤣥云腹厚也以此知日在北陸謂夏之十二月也西陸朝覿而出之注謂夏三月日在昴畢蟄蟲出而用氷春分之中奎星朝見東方疏正義曰覿見也西道之宿有星朝見者於是而出之謂奎星晨見而出氷也注正義曰杜以西陸為三月日在大梁之次清明節榖雨中三統歷云大梁之初日在胃七度為清明節在昴八度為榖雨中終於畢十一度是夏之三月日在昴畢於是之時蟄蟲已出有溫暑臭穢宜當用氷故以是時出之也歷法星去日半次則得朝見三統歷春分日在婁四度宿分奎有十六度乃次婁則春分之日奎之初度去日已二十度矣故春分之中得早朝見東方也西方凡有七宿傳言西陸朝覿於傳之文未知何宿覿也服䖍以為二月日在婁四度春分之中奎始朝見東方以是時出氷月令仲春天子乃獻羔啓氷是也服䖍又以此言出之即是仲春啓氷故為此說案下句再言其藏其出覆此藏出之文言其出之也朝之祿位賔食喪祭於是乎用之即是班氷之事非初啓也安得以出之為啓氷也如鄭𤣥答其弟子孫皓問云西陸朝覿謂四月立夏之時周禮夏班氷是也與杜說異理亦通也劉炫云春分奎星已見杜以夏三月仍云奎始朝見非其義也杜鄭及服三說鄭為近之今知非者杜以西陸朝覿實是春分二月故杜此注云春分之中奎星朝見東方及下獻羔啓之注云謂二月春分獻羔祭韭是也皆據初出其氷公始用之時也所以杜又注云謂夏之三月日在昴畢蟄蟲出而用氷者以此傳云西陸朝覿而出之下傅覆之云其出之也朝之祿位賔食喪祭於是乎用之既云朝之祿位賔食喪祭則是普賜羣臣故杜云謂夏三月又下注云言不獨共公是據普班之時也故下傳又云火出而畢賦是也然氷之初出在西陸始朝覿之時氷之普出在西陸朝覿之後總而言之亦得稱西陸朝覿而出之也劉炫不細觀杜意以為杜既言春分朝見又言謂夏三月以規杜失非也其藏氷也深山窮谷固陰沍寒於是乎取之注沍閉也必取積陰之氷所以道逹其氣使不為災疏正義曰此傳再言其藏其出者上言取之用之之事下言藏之出之之禮也山則遠而難窮故言深山也谷則近而易盡故言窮谷也固牢也沍閉也牢陰閉寒言其不得見日寒甚之處於是乎取之注正義曰周禮鱉人掌互物鄭司農云互物謂龜鱉有甲㒼胡是沍為閉也深山窮谷之氷至夏猶未釋陽氣起於下隔於氷伏積而不能出憤發或散而為雹藏氷必取此山谷之內積隂之氷所以道達其氣使不為災也藏氷凌室所藏不多積隂之氷不可取盡不取川池之氷以示道達陽氣耳未必陽氣皆待此而達也其出之也朝之祿位賔食喪祭於是乎用之注言不獨共公疏正義曰此謂公家用之也朝廷之臣食祿在位大夫以上皆當賜之氷也其公家有賔客享食公家有喪有祭於是乎用之言其不獨共公身所用也周禮凌人云春始治鑑凡內外饔之膳羞鑑焉凡酒漿之酒醴亦如之祭祀共氷鑑賔客共氷大喪共夷槃氷是公家所用氷也其藏之也黑牡秬黍以享司寒注黑牡黑牲也秬黑黍也司寒𤣥冥北方之神故物皆用黑有事於氷故祭其神音義牡茂后反秬音巨冥亡丁反疏注正義曰此祭𤣥冥之神非大神且非正祭計應不用大牡杜言黑牡黑牲當是黑牡羊也秬黑黍釋草文也啓氷唯獻羔祭韭藏氷則祭用牲黍者啓唯告而已藏則設享祭之禮祭禮大而告禮小故也月令於冬云其神𤣥冥故知司寒是𤣥冥也此方之神故物皆用黑從其方色也有事於氷故祭其寒神其出之也桃弧棘矢以除其災注桃弓棘箭所以禳除凶邪將御至尊故音義弧音胡禳如羊反邪似嗟反疏注正義曰說文云弧木弓也謂空用木無骨飾也服䖍云桃所以逃凶也棘矢者棘赤有針取其名也蓋出氷之時置此弓矢於凌室之户所以禳除凶邪將御至尊故愼其事為此禮也此傳言其出之也雖覆上文出之之文其實此出之謂二月初出之時公將用之故設弓矢也劉炫云此言出之覆上西陸朝覿知是火出時事二月已啓此方用弓矢者二月啓氷始薦宗廟此公將用之故設弓矢也其出入也時食肉之祿氷皆與焉注食肉之祿謂在朝廷治其職事就官食者音義與音預疏注正義曰在官治事官皆給食大夫以上食乃有肉故魯人謂曹劌曰肉食者謀之又說子雅子尾之食云公膳日雙雞是大夫得食肉也傳言食肉之祿祿即此肉是也若依禮常所合食案玉藻云天子日食少牢諸侯日食特牲大夫特豕士特豚則士亦食肉但彼是在家之禮非公朝常食也杜言謂在朝廷治其職事就官食者以明在官之食有氷耳下云自命夫命婦無不受氷謂賜之氷受以歸在家用之也大夫命婦喪浴用氷注命婦大夫妻音義浴音欲疏正義曰喪服傳曰大夫弔於命婦鍚衰命婦弔於大夫亦鍚衰此傳與彼命婦之文皆與大夫相對故杜知是大夫妻也喪大記云君設大盤造氷焉大夫設夷盤造氷焉士併瓦盤無氷鄭𤣥云禮自仲春之後尸既襲既小斂先內氷盤中乃設牀於其上不施席而遷尸焉秋凉而止士喪禮君賜氷亦用夷盤是當喪之時特賜之氷浴訖乃設故云喪浴用氷祭寒而藏之注享司寒音義祭寒而藏之本或作祭司寒者非獻羔而啓之注謂二月春分獻羔祭韭開氷室音義韭音九疏正義曰上已云其藏氷也黑牡秬黍以享司寒今復云祭寒而藏之與上一事而重其文者欲明獻羔而啓之還是獻之於寒神故更使藏之啓之文相對也注正義曰詩云四之日其蚤獻羔祭韭四之日即夏之二月也告神而始開氷室始薦宗廟薦神之後公遂用之俱在春分之月公始用之注公先用優尊火出而畢賦注火星昏見東方謂三月四月中疏注正義曰十七年傳云火出於夏為三月於商為四月於周為五月此云火出而畢賦謂以火出而後賦之以火出為始也周禮云夏頒氷為正歲之夏即四月是也故杜兼言四月自命夫命婦至於老疾無不受氷注老致仕在家者山人取之縣人傳之注山人虞官縣人遂屬音義傳直專反疏注正義曰周禮山虞掌山林之政令知山人虞官也周禮五縣為遂是縣為遂之屬也輿人納之𨽻人藏之注輿𨽻皆賤官音義輿音餘夫氷以風壯注氷因風寒而堅音義壯側亮反而以風出注順春風而散用其藏之也周注周密也其用之也遍注及老疾音義遍音遍則冬無愆陽注愆過也謂冬溫音義愆起䖍反夏無伏陰注伏陰謂夏寒春無凄風注凄寒也音義凄七西反秋無苦雨注霖雨為人所患苦音義霖音林疏注正義曰詩云以祈甘雨此云苦雨雨水一也味無甘苦之異養物為甘害物為苫耳月令云孟夏行秋令則苦雨數來五榖不滋是霖雨為人所患謂之苦也鄭𤣥云申之氣乘之苦雨白露之類時物得而傷也雷出不震注震霆也音義霆音亭又音挺又亭佞反疏注正義曰說文云震劈歷震物者釋天云疾雷為霆霓郭璞云雷之急激者謂劈歷則霆是震之别名雷出不震言有雷而不為霹靂也下云雷不發而震言無雷而有霹靂也無菑霜雹癘疾不降注癘惡氣也音義菑音災下同癘音例疏正義曰霜雹即是菑言無此菑害之霜雹也寒暑失時則民多癘疾癘疾天氣為之故云降也民不夭札注短折為夭夭死為札音義札側八反一音截字林作壯列反疏注正義曰洪範六極一日凶短折孔安國曰短未六十折未三十是短折為少夭之名也周禮膳夫夭札則不舉鄭𤣥云夭札疫癘也謂遭疫癘而夭死也癘疾謂民病夭札謂人死故云夭死為札今藏川池之氷棄而不用注既不藏深山窮谷之氷又火出不畢賦有餘則棄之風不越而殺雷不發而震注越散也言隂陽失序雷風為害音義殺如字又色界反徐色例反疏正義曰風不以理舒散而暴疾殺物雷不徐緩動發而震擊為害雹之為菑誰能禦之七月之卒章藏氷之道也注七月詩豳風卒章曰二之日鑿氷冲冲謂十二月鑿而取之三之日納于凌隂凌陰氷室也四之日其蚤獻羔祭韭謂二月春分蚤開氷室以薦宗廟音義豳彼貧反鑿在洛反冲冲直忠反凌陵證反一音陵蚤音早疏注正義曰凌人十二月令斬氷月令十二月令取氷當是即以其月納於凌室也詩言三之日納于凌隂即是正月矣不以鑿氷之月即納之者鄭𤣥云豳土晚寒可以正月納氷言由晚寒故也上言將欲頒賦公始用之知蚤開氷室唯薦宗廟何休膏肓難此云春秋書雹以為政之所致非由氷也若今朝廷藏氷亦不於深山窮谷何故或無雹天下郡縣皆不藏氷何故或不雹若言有之於古者必有驗於今此其不合於義失天人相與之意鄭𤣥針之曰雨雹政失之所致是固然也國之失政君子知其大者其次知其小者藏氷之禮凌人掌之月令載之豳詩歌之此獨非政與故其小者耳夫深山窮谷固陰沍寒極隂之處氷凍所聚不取其氷則氣畜不泄結滯而為伏隂凡雨水陽也雪雹隂也雨水而伏陰薄之則凝而為雹雨雪而愆陽薄之則合而為霰中豐見時失藏氷之禮而有雹推之陰陽知此伏隂所致亦聖人之寓言也詳載其言者以著藏氷之禮不可廢耳炫謂鄭言是也申豐寄言於此以諫失政其雹不是盡由氷也夏諸侯如楚魯衛曹邾不會曹邾辭以難公辭以時祭衛侯辭以疾注如子産言音義難乃旦反疏正義曰宋之盟邾滕為私屬不許交相見而楚召邾滕使從會者邾滕自欲辟役不在宋盟又晉令諸侯常列於會襄二十九年城把三十年會于澶淵邾滕皆在楚知其事故使召之此申之會滕至而邾不至鄭伯先待于申注自楚先至會地六月丙午楚子合諸侯于申椒舉言於楚子曰臣聞諸侯無歸禮以為歸今君始得諸侯其愼禮矣霸之濟否在此會也夏啓有鈞臺之享注啓禹子也河南陽翟縣南有鈞臺陂蓋啓享諸侯於此音義夏啓戶雅反注倣此鈞音均陂彼宜反商湯有景亳之命注河南鞏縣西南有湯亭或言亳即偃師音義亳步各反鞏九勇反周武有孟津之誓注時伐紂也音義孟本又作盟音孟成有岐陽之搜注周成王歸自奄大搜於岐山之陽岐山在扶風美陽縣西北音義岐其宜反搜所求反康有酆宫之朝注酆在始平鄠縣東有靈臺康王於是朝諸侯音義酆芳弓反穆有塗山之會注周穆王會諸侯於塗山塗山在夀春東北疏正義曰此六王之事唯周武王孟津之誓尚書有其事武王伐殷作泰誓三篇是也其餘五者皆書傳無文不能知其本末注正義曰書序云成王歸自奄在宗周誥庶邦作多方其經云告爾四國多方則於時諸侯大集故謂岐陽之搜在此時也齊桓有召陵之師注在僖四年音義召上照反晉文有踐土之盟注在僖二十八年君其何用宋向戌鄭公孫僑在諸侯之良也君其選焉注選擇所用音義向舒亮反戌音恤僑其驕反王曰吾用齊桓注用會召陵之禮疏正義曰用會召陵之禮出自王意也服䖍云召陵之役齊桓退舍以禮楚靈王今感其意是以用之王使問禮於左師與子産左師曰小國習之大國用之敢不薦聞注言所聞謙示所未行獻公合諸侯之禮六注其禮六儀也宋爵公故獻公禮疏注正義曰以言禮六故言其禮六儀當是會上有此六儀不知六者何謂也子産曰小國共職敢不薦守獻伯子男會公之禮六注鄭伯爵故獻伯子男會公之禮其禮同所從言之異音義共音恭守手又反疏注正義曰杜知其禮同所從言之異者以左師獻公合諸侯之禮六子産獻伯子男會公之禮六若其各異凡十二禮下椒舉云禮吾所未見者六焉故知其禮同也於公言之云合諸侯之禮於伯子男言之云會公之禮是所從言之異君子謂合左師善守先代子産善相小國王使椒舉侍於後以規過注規正二子之過音義相息亮反卒事不規王問其故對曰禮吾未見者有六焉又何以規注左師子産所獻六禮楚皆未嘗行宋大子佐後至王田於武城久而弗見椒舉請辭焉注請王辭謝之王使往曰屬有宗祧之事於武城注言為宗廟田獵音義屬章玉反適也祧他雕反為于僞反疏正義曰土地名楚之武城在南陽宛縣北也魯之武城在泰山南武城縣也有淡臺子羽冡寡君將墮幣焉敢謝後見注恨其後至故言將因諸侯會布幣乃相見經并書宋大子佐知此言在會前音義墮許規反布也服云輸也見如字又賢遍反疏正義曰杜唯云將因諸侯會布幣乃相見不解墮之義案隱六年公羊傳鄭人來輸平輸平者何輸平猶墮成也然則墮是輸之義也朝聘之禮客必致幣於主據主則為受據客則為輸襄三十一年傳子産論幣云其輸之則君之府實也非薦陳之不敢輸也是謂布幣為輸幣也言將待輸幣之時乃相見見既在後故遣我來敢謝後見也服䖍云墮輸也言將輸受宋之幣於宗廟案禮之享幣皆令宰受不以薦宗廟雖訓為輸義不當也徐子吳出也以為二焉故執諸申注言楚子以疑罪執諸侯楚子示諸侯侈注自奢侈椒舉曰夫六王二公之事注六王啓湯武成康穆也二公齊桓晉文皆所以示諸侯禮也諸侯所由用命也夏桀為仍之會有緡叛之注仍緡皆國名音義仍而承反緡亡巾反商紂為黎之搜東夷叛之注黎東夷國名音義黎力兮反周幽為大室之盟戎狄叛之注大室中嶽皆所以示諸侯汰也諸侯所由棄命也今君以汰無乃不濟乎王弗聽子産見左師曰吾不患楚矣汰而愎諫注愎狠也音義汰音泰愎皮逼反狠胡懇反不過十年左師曰然不十年侈其惡不遠遠惡而後棄注惡及遠方則人棄之善亦如之德遠而後興注為十三年楚弒其君傳秋七月楚子以諸侯伐吳宋大子鄭伯先歸注經所以更叙諸侯也時晉之屬國皆歸獨言二國者鄭伯久於楚宋大子不得時見故慰遣之音義見賢遍反又如字宋華費遂鄭大夫從注從伐吳以答見慰音義費扶味反從才用反注同使屈申圍朱方注朱方吳邑齊慶封所封也屈申屈蕩之子音義屈居忽反八月甲申克之執齊慶封而盡滅其族注慶封以襄二十八年奔吳八月無甲申日誤疏正義曰長歷推此年七月己未朔二十六日得甲申八月己丑朔其月無甲申而傳上有七月下有九月月不容誤故知日誤將戮慶封椒舉曰臣聞無瑕者可以戮人慶封惟逆命是以在此注逆命謂性不恭順其肯從於戮乎注言不肯默而從戮播於諸侯焉用之注播揚也音義播波佐反徐云字或作幡敷袁反焉於䖍反王弗聽負之斧鉞以狥於諸侯使言曰無或如齊慶封弒其君弱其孤以盟其大夫注齊崔杼弒君慶封其黨也故以弒君罪責之音義鉞音越狥似俊反杼直吕反疏正義曰崔杼弒莊公立其弟景公孤謂景公也以其幼小輕弱之慶封曰無或如楚共王之庶子圍弒其君兄之子麇而代之以盟諸侯疏正義曰靈王即位以來經傳不見與諸侯盟事蓋楚子自與屬楚諸侯私盟不告魯而慶封知之王使速殺之遂以諸侯滅賴賴子靣縳銜璧士袒輿櫬從之造於中軍注中軍王所將音義共音恭麇九倫反袒音但輿櫬所覲反棺也造七報反將子匠反下將師同王問諸椒舉對曰成王克許注在僖六年許僖公如是王親釋其縛受其璧焚其櫬王從之注從舉言音義縛如字舊扶臥反遷賴於鄢注鄢楚邑音義鄢於晚反又於建反楚子欲遷許於賴使鬭韋龜與公子棄疾城之而還注為許城也韋龜子文之𤣥孫音義為于僞反申無宇曰楚禍之首將在此矣召諸侯而來伐國而克城竟莫校注謂築城於外竟諸侯無與爭音義竟音境注同爭爭鬬之爭王心不違民其居乎注言將有事不得安也民之不處其誰堪之不堪王命乃禍亂也九月取鄫言易也莒亂著丘公立而不撫鄫鄫叛而來故曰取凡克邑不用師徒曰取注著丘公去疾也不書奔者潰散而來將帥微也重發例者以通叛而自來音義易以䜴反著直居反徐直據反去起吕反潰戶對反帥所類反重直用反鄭子産作丘賦注丘十六井當出馬一匹牛三頭今子産别賦其田如魯之田賦田賦在哀十一年疏注正義曰丘十六井當出馬一匹牛三頭司馬法之文也服䖍以為子産作丘賦者賦此一丘之田使之出一馬三牛復古法耳丘賦之法不行久矣今子産復修古法民以為貪故謗之案春秋之世兵革數興鄭在晉楚之間尤當其劇正當重於古不應廢古法也若往前不修此法豈得全無賦乎故杜以為今子産於牛馬之外别賦其田如魯之田賦田賦在哀十一年彼注云丘賦之法因其田財通出馬一匹牛三頭今欲别其田及家財各為一賦故言田賦然則此與彼同賦斂家資使出牛馬又别賦其田使之出粟若今輸租更出馬一匹牛三頭是一丘出兩丘之稅案周禮有夫征家征夫征謂出稅家征謂出車徒給徭役此牛馬之屬則周禮之家征也其夫征十一而稅是與家征别也國人謗之注謗毁也曰其父死於路注謂子國為尉氏所殺已為蠆尾注謂子産重賦毒害百姓音義蠆敕邁反以令於國國將若之何子寬以告注子寬鄭大夫子産曰何害苟利社稷死生以之注以用也且吾聞為善者不改其度故能有濟也民不可逞度不可改注度法也詩曰禮義不愆何恤於人言注逸詩子産自以為權制濟國於禮義無愆吾不遷矣注遷移也渾罕曰國氏其先亡乎注渾罕子寬音義渾矢溫反罕徐許但反君子作法於凉其敝猶貪注凉薄也音義凉音良徐音亮作法於貪敝將若之何注言不可久行姬在列者注在列國也蔡及曹滕其先亡乎逼而無禮注蔡逼楚曹滕逼宋鄭先衛亡逼而無法注逼晉楚疏正義曰渾罕意譏子産將言鄭之先亡故遂博言諸國亡之先後杜據世本史記作世族譜說諸國滅亡之年此下十一年楚滅蔡十三年蔡復封春秋後二世十八年而楚滅蔡也哀八年宋滅曹也滕以春秋後六世而齊滅之鄭在春秋後五世九十一年韓滅鄭衛在春秋後十一世二百五十八年而秦滅衛也據蔡之前亡則渾罕之言終亦驗矣政不率法而制於心民各有心何上之有注子産權時救急渾罕譏之正道冬吳伐楚入棘櫟麻注棘櫟麻皆楚東鄙邑譙國鄼縣東北有棘亭汝陰新蔡縣東北有櫟亭音義櫟力狄反徐又失灼反鄼才河反疏注正義曰吳來伐楚入此三邑知此三邑皆楚之東鄙故疑新蔡縣東北有櫟亭者是此櫟亭也鄭有櫟邑者則河南陽翟縣也以報朱方之役注朱方役在此年秋楚沈尹射奔命於夏汭注夏汭漢水曲入江今夏口也吳兵在東北楚盛兵在東南以絶其後音義尹射食夜反又食亦反一音夜夏戶雅反夏汭如鋭反針尹宜咎城鍾離注宜咎本陳大夫襄二十四年奔楚音義針之林反咎其九反薳啓疆城巢然丹城州來注然丹鄭穆公孫襄十九年奔楚音義薳于委反疆其良反又居良反東國水不可以城彭生罷賴之師注彭生楚大夫罷鬬韋龜城賴之師音義罷皮買反徐甫綺反初穆子去叔孫氏及庚宗注成十六年辟僑如之難奔齊庚宗魯地音義難乃旦反遇婦人使私為食而宿焉問其行告之故哭而送之注婦人聞而哭之適齊娶於國氏注國氏齊正卿姜姓音義娶七住反生孟丙仲壬夢天壓己弗勝注穆子夢也音義壓於甲反又於輒反勝音升下同顧而見人黑而上僂注上僂肩傴音義僂力主反傴紆甫反深目而豭喙注口象豬音義豭音加喙許穢反號之曰牛助余乃勝之旦而皆召其徒無之注徒從者音義號胡到反一音戶刀反下同從才用反且曰志之注志識也音義識申志反一音式及宣伯奔齊饋之注宣伯僑如穆子之兄成十六年奔齊穆子饋宣伯音義饋求位反餉也宣伯曰魯以先子之故注先子宣伯先人將存吾宗必召女召女何如對曰願之久矣注言兄始為亂已則有今日之願蓋忿言音義女音汝下同魯人召之不告而歸既立注在齊生孟丙仲壬魯召之立為卿襄二年始見經音義見賢遍反下接見同所宿庚宗之婦人獻以雉注獻穆子問其姓注問有子否音義問其姓女生曰姓姓謂子也對曰余子長矣能奉雉而從我矣注襄二年豎牛五六嵗音義長丁丈反下同奉芳勇反疏正義曰穆子還魯傳無歸歲襄二年始見於經疑是其年新還也成十六年傳云子叔聲伯使叔孫豹請逆于晉師於時豹猶在魯疑其因使而遂奔齊蓋自鄭過魯而去故得宿於庚宗成十六年出奔襄二年始還凡經五年故豎牛五六歲能奉雉也計豎牛至襄二年四歲也杜言五六歲者豎牛見穆子未必即以還年見之召而見之則所夢也未問其名號之曰牛曰唯皆召其徒使視之遂使為豎注豎小臣也傳言從夢未必吉音義唯維癸反徐以水反唯應辭猶也豎士注反疏正義曰曲禮云父召無諾先生召無諾唯而起鄭𤣥云應辭唯恭於諾有寵長使為政注為家政公孫明知叔孫於齊注公孫明齊大夫子明也與叔孫相親知歸未逆國姜子明取之注國姜孟仲母音義取七住反又如字故怒其子長而後使逆之注子孟丙仲壬疏正義曰怒者怒其妻也忿其母遂及其子其子在齊成長而後逆之歸魯非謂逆其妻也田於丘蕕注丘蕕地名音義蕕音由遂遇疾焉豎牛欲亂其室而有之强與孟盟不可注欲使從己孟不肯音義强其丈反下同疏正義曰孟雖適妻之子叔孫未立為嗣豎牛欲亂其室望已有之未應即欲為適使孟事已強與盟者欲其與己同心使已得專恣耳叔孫為孟鍾曰爾未際注際接也孟未與諸大夫相接見音義為于僞反又如字疏注正義曰釋詁云際接捷也郭璞曰捷謂相接續也大夫將立適子必須接見同寮季武子立紇飲大夫酒是其事也孟丙未與大夫交接故為之作鍾因落鍾令與相見饗大夫以落之注以豭豬血釁鐘曰落音義釁許覲反疏注正義曰說文云釁血祭也雜記釁廟之禮云雍人舉羊升屋自中中屋南面刲羊血流于前是釁祭之法以血澆落之知落之即是釁也雜記又曰凡宗廟之器其名者成則釁之以豭豚是知以豭豬之血也記稱宗廟之器成乃釁以豭豚此叔孫為孟作鍾非是宗廟之器亦釁之者周禮小子職曰釁邦器及軍器鄭𤣥云邦器謂禮樂之器及祭器之屬此鍾是禮樂之器故釁也既具注饗禮具使豎牛請日注請饗日疏正義曰孟不自請使豎牛者內則云由命士以上父子皆異宫鄭𤣥云異宫者樂敬也以其異宫故使豎牛入弗謁注謁日也出命之日注詐命也及賔至聞鍾聲牛曰孟有北婦人之客注北婦人國姜也客謂公孫明怒將往牛止之賔出使拘而殺諸外注殺孟丙音義拘音俱牛又强與仲盟不可仲與公御萊書觀於公注萊書公御士名仲與之私遊觀於公宫音義萊書音來人姓名觀古亂反注同又如字公與之環注賜玉環使牛入示之注示叔孫入不示出命佩之牛謂叔孫見仲而何注而何如何音義見賢遍反下及注杜泄見同叔孫曰何為注怪牛言曰不見既自見矣注言仲已自往見公公與之環而佩之矣疏正義曰而如同是語辭故注云而何如何牛謂叔孫曰以仲見君何問何故以仲見君也叔孫怪其語故曰何為牛曰不將仲見君乎若不將見則既自見君矣言不待父命所以怒叔孫也大夫立子為適必自見之於君宣十四年申舟見犀而行定六年樂祁見溷而行是其事也或曰豎牛謂叔孫曰今將仲見君其事如何叔孫以已見病故怪之曰何為以下同遂逐之奔齊疾急命召仲牛許而不召杜泄見告之饑渴授之戈注杜泄叔孫氏宰也牛不食叔孫叔孫怒欲使杜泄殺之音義泄息列反食音嗣對曰求之而至又何去焉注言求食可得無為去豎牛蓋杜泄力不能去設辭以免音義去起吕反注及下同豎牛曰夫子疾病不欲見人使置饋于個而退注置置也個東西廂音義置之䜴反本或作奠個古賀反謂廂屋廂本作箱息羊反疏正義曰禮置器物於地皆謂之置是置為置也月令天子居左個右個是個為東西廂也牛弗進則置虛命徹注寫器令空示若叔孫已食命去之音義令力呈反十二月癸丑叔孫不食乙卯卒注三日絶糧牛立昭子而相之注昭子豹之庶子叔孫婼也音義相息亮反婼敕略反公使杜泄葬叔孫豎牛賂叔仲昭子與南遺注昭子叔仲帶也南遣季氏家臣音義賂音路使惡杜泄於季孫而去之注憎泄不與已同志音義惡烏路反杜泄將以路葬且盡卿禮注路王所賜叔孫車南遺謂季孫曰叔孫未乘路葬焉用之且冡卿無路介卿以葬不亦左乎注冡卿謂季孫介次也左不便音義葬焉於䖍反下將焉用同介音界左如字注同舊音佐便婢面反季孫曰然使杜泄舍路注舍置也音義舍式夜反注同或音捨不可曰夫子受命於朝而聘于王注在襄二十四年夫子謂叔孫王思舊勳而賜之路注感其有禮以念其先人復命而致之君注豹不敢自乘君不敢逆王命而復賜之使三官書之吾子為司徒實書名注謂季孫也書名定位號音義復扶又反夫子為司馬與工正書服注謂叔孫也服車服之器工正所書孟孫為司空以書勳注勳功也疏正義曰杜泄是叔孫家臣故稱已君為夫子工正是司馬之屬官也季孟亦有屬官共書其事但季孟身在不假言屬以叔孫已亡取屬官為徴故兼言之所以司徒書名者周禮大司徒掌十二教十有一曰以賢制爵十有二曰以庸制祿故司徒書名定位號也司馬與工正書服者周禮夏官司馬其屬有司士掌羣臣之政以德詔爵以功詔祿工正雖不屬司馬掌作車服故與司馬書服也案周禮司勳屬夏官今司空書勳者春秋之時又是諸侯之法不可盡與禮同今死而弗以是棄君命也書在公府而弗以是廢三官也若命服生弗敢服死又不以將焉用之乃使以葬季孫謀去中軍豎牛曰夫子固欲去之注誣叔孫以媚季孫音義媚眉冀反疏注正義曰季孫因叔孫之弱欲四分公室已取其二故謀去中軍豎牛云夫子固欲去之是誣叔孫以媚季孫春秋左傳注疏卷四十二春秋左氏傳注疏卷四十二考證叔弓如晉注叔弓叔老子臣召南按各本俱有此注但杜注例前文已見者後不重出叔弓於襄三十年如宋葬共姬注已曰叔老子矣是以上年帥師疆鄆田不重注也此注五字疑是後人校刻時添益耳公如晉至河乃復孫復曰公如晉至河乃復者五惟二十三年書有疾而反餘皆譏公數如晉見拒不能以禮自重大取困辱也傳季武子賦綿之卒章臣浩按杜注取文王有四臣即詩所謂疏附先後奔奏禦侮耳陸氏音義解以大顚閎夭散宜生南宫適蓋漢儒有此說實則疏附先後奔奏禦侮之臣豈必各居其一傳有嘉樹焉宣子譽之疏服䖍云譽游也宣子遊其樹下夏諺曰一游一譽為諸侯度臣浩按孟子作一遊一豫當是服䖍所見孟子本不同耳傳執諸中都注在西河界休縣東南臣召南按漢時中都縣屬太原郡後書郡國志引此傳及注曰界休縣南中都城是也傳火中寒暑乃退疏旦氐中氐後即次房心監本作旦氐後即次房心脫中氐二字以文義推之當是訛脫今添傳欒郤胥原狐續慶伯降在皂隸注八姓晉舊臣之族也臣召南按欒郤等皆氏族非姓也杜注謂八姓稍未檢原氏即先氏也續與狐同宗而各為氏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會于申程子曰晉平公不在諸侯楚於是為伯者之事林堯叟曰以楚莊之賢辰陵之盟從之者陳鄭焉耳申之會合十二國楚之得志于中國未有盛於此時者也傳四嶽疏是解衡霍二名之山也臣召南按三代以上衡山亦稱霍山是一山二名如泰之名岱耳漢武以後即祀南嶽於潛霍後人遂稱潛霍為南嶽焉是二山而一名矣江北湘南相去千有餘里謂潛霍即三代時之衡霍可乎傳三塗疏大行轘轅崤黽也崤澠似應作崤黽傳陽城注在陽城縣東北大室注在河南陽城縣西北臣召南按杜注之例郡縣名不重見此陽城縣河南郡所統也於陽城下應曰在河南陽城縣東北於大室下應曰在陽城縣西北各本相沿誤也傳中南臣召南按書禹貢詩秦風史記漢書皆作終南傳古者日在北陸而藏氷疏月令季冬氷盛水腹命取氷臣浩按月令原文季冬氷方盛水澤腹堅今各本俱脫去方字澤字堅字明是訛漏但疏引鄭注腹厚也又似截取字句不依原文者傳康有酆宫之朝臣召南按楚世家作豐宫注引服䖍曰豐宫成王廟所在也傳使三官書之臣召南按周制天子六卿諸侯大國三卿當王朝之半漢世承之遂以司徒司馬司空為三公官矣傳孟孫為司空以書勳趙汸補注曰傳見魯三卿官猶舊制如晉宋皆改易周官矣春秋左氏傳注疏卷四十二考證
