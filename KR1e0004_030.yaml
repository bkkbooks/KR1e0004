body:
  text: 春秋左傳注疏卷三十起襄公五年盡九年晉杜氏注唐陸德明音義孔穎達疏經五年春公至自晉夏鄭伯使公子發來聘注發子産父叔孫豹鄫世子巫如晉注比魯大夫故書巫如晉音義巫亡無反仲孫蔑衛孫林父㑹吳于善道注魯衛俱受命於晉故不言及吳先在善道二大夫往會之故曰會吳善道地闕疏正義曰諸言及者皆魯君命之使與彼行故稱及彼此傳稱晉將為吳合諸侯使魯衛先會之魯衛俱受命於晉非是魯君命蔑使與林父會吳故不言及也下文戚之會序吳於列書公㑹晉侯云云吳人鄫人于戚此不序吳於林父之下而别云㑹吳者為吳人先在善道蔑與林父往彼㑹之故云會吳也十年會吳于柤成十五年會吳于鍾離皆是吳在彼地往彼會之故殊㑹吳也公羊以為外吳言春秋內其國而外諸夏內諸夏而外夷狄故殊㑹以外之左氏無此義杜不從公羊故皆云吳在彼也下戚會不殊吳者來會于戚故與諸國同序列也秋大雩楚殺其大夫公子壬夫注書名罪其貪公㑹晉侯宋公陳侯衛侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚注穆叔使鄫人聽命於會故鄫見經不復殊吳者吳來會于戚音義見賢遍反復扶又反下同公至自㑹注無傳冬戍陳注諸侯在戚會皆受命戍陳各還國遣戍不復有告命故獨書魯戍疏正義曰此戍陳及十年戍鄭虎牢僖二年城楚邱案傳皆諸國同行而經獨書魯者城楚邱傳云不書所會後也彼為魯人後期諸侯已散故作獨城之文此則於戚之會受命戍陳十年諸侯伐鄭於伐鄭受命戍鄭虎牢還國各自遣戍更無告命故獨書魯戍也楚公子貞帥師伐陳公㑹晉侯宋公衛侯鄭伯曹伯齊世子光救陳十有二月公至自救陳注無傳辛未季孫行父卒傳五年春公至自晉注公在晉既聽屬鄫聞其見伐遙命臧紇出救故傳稱經公至以明之王使王叔陳生訴戎于晉注王叔周卿士也戎陵暴周室故告訴於盟主音義訴悉路反暴白報反晉人執之士魴如京師言王叔之二於戎也注王叔反有二心於戎失奉使之義故晉執之音義使所吏反夏鄭子國來聘通嗣君也注鄭僖公初即位穆叔覿鄫太子于晉以成屬鄫注覿見也前年請屬鄫故將鄫大子巫如晉以成之音義覿直歷反見賢遍反疏正義曰覿見釋詁文也前年魯請屬鄫雖被晉許而鄫人未知故將巫至晉以成之書曰叔孫豹鄫大子巫如晉言比諸魯大夫也注豹與巫俱受命於魯故經不書及比之魯大夫疏正義曰巫若自受鄫命則豹當言及今巫來至魯魯侯命之令與豹同行與豹俱受魯命故經不言及比之魯大夫也魯大夫兩人同行皆不言及文十八年公子遂叔孫得臣如齊定六年季孫斯仲孫何忌如晉其類皆是也吳子使壽越如晉注夀越吳大夫辭不㑹于雞澤之故注三年㑹雞澤吳不至今來謝之且請聽諸侯之好注更請㑹音義好呼報反晉人將為之合諸侯使魯衛先㑹吳且告㑹期注以其道逺故使魯衛先告期音義將為于僞反故孟獻子孫文子會吳于善道注二子皆受晉命而行秋大雩旱也注雩夏祭所以祈甘雨若旱則又修其禮故雖秋雩非書過也然經與過雩同文是以傳每釋之曰旱也雩而獲雨故書雩而不書旱疏正義曰例稱龍見而雩是夏祭常禮所以祈甘雨也過時則書若值嵗旱則又修此雩禮而為祈禱故雖秋雩非書過也此是為旱而雩非常雩過時也但經書大雩則過雩旱雩無以相别故為旱而雩𫝊皆言旱以釋之釋例曰始夏而雩者為純陽用事防有災旱而祈之也至於四時之旱則又用此禮而求雨故亦曰雩經書雩而傳不以旱釋之者皆過雩也經書過雩則與旱雩不别故𫝊皆發之是解發𫝊言旱之意也雩為旱禱而不書旱者雩而獲雨故書雩而不書旱雩不得雨則書旱以明災成僖二十一年夏大旱是也雩而獲雨則書雩榖梁𫝊文也楚人討陳叛故注討治也曰由令尹子辛實侵欲焉乃殺之書曰楚殺其大夫公子壬夫貪也君子謂楚共王於是不刑注陳之叛楚罪在子辛共王既不能素明法教陳叛之日又不能嚴斷威刑以謝小國而擁其罪人興兵致討加禮於陳而陳恨彌篤乃怨而歸罪子辛子辛之貪雖足以取死然共王用刑為失其節故言不刑音義共音恭斷丁亂反疏正義曰釋例曰陳之叛楚罪在子辛共王既不能明法示教以肅大臣陳叛之日又不能嚴斷威刑以謝小國而擁其罪人以興兵致討暴師經年加禮於陳陳恨彌篤乃愠而歸罪子辛子辛之貪雖足以取死然共王用刑為失其節故君子論之以為不刑也加禮於陳者謂四年楚將伐陳聞喪乃止是也不刑者言不得用刑之道也詩曰周道挺挺我心扄扄講事不令集人來定注逸詩也挺挺正直也扄扄明察也講謀也言謀事不善當聚致賢人以定之音義挺挺他頂反扄扄工逈反徐孔穎反己則無信而殺人以逞不亦難乎注共王伐宋封魚石背盟敗于鄢陵殺子反公子申及壬夫八年之中戮殺三卿欲以屬諸侯故君子以為不可音義背音佩疏正義曰釋例以君子此言止為殺公子申與壬夫二人而已此注又兼言殺子反者傳言已則無信尤共王也背盟而敗于鄢陵及殺子反皆是共王無信之事故追言之也殺此三卿欲令諸侯息忿還來屬已故言欲以屬諸侯以屬諸侯者僖十九年傳文也逞訓解也共王殺此三人望解已意而諸侯不從意竟不解故云殺人以逞不亦難乎夏書曰成允成功注亦逸書也允信也言信成然後有成功疏正義曰此虞書大禹謨之文禹是夏王故傳稱夏書杜不見古文故稱逸書亦亦前逸詩也彼舜謂禹能成聲教之信成治水之功為二事此𫝊引之言共王無信故無成功杜順𫝊意言信成然後有成功為一事也九月丙午盟于戚會吳且命戍陳也注公及其會而不書盟非公後會蓋不以盟告廟疏正義曰凡諸侯會而盟者皆先會而後盟非先盟而後會既及其會知非後盟釋例曰盟于鄧盟于犖盟于戚公既在會而不書其盟者以理推之會在盟前知非後盟也蓋公還告會而不告盟也穆叔以屬鄫為不利使鄫大夫聽命于會注鄫近魯竟故欲以為屬國既而與莒有忿魯不能救恐致譴責故復乞還之傳言鄫人所以見於戚會音義近附近之近下文陳近同竟音境譴棄戰反復扶又反見賢遍反楚子囊為令尹注公子貞音義囊乃郎反范宣子曰我喪陳矣楚人討二而立子囊必改行注改子辛所行音義喪息浪反行如字徐下孟反而疾討陳注疾急也陳近於楚民朝夕急能無往乎有陳非吾事也無之而後可注言晉力不能及陳故七年陳侯逃歸音義朝夕如字冬諸侯戍陳注備楚子囊伐陳十一月甲午會于城棣以救之注公及救陳而不及㑹故不書城棣城棣鄭地陳留酸棗縣西南有棣城音義棣力計反一音徒妹反疏正義曰桓十五年公會宋公衛侯陳侯于袲伐鄭既會而伐并會書之計此亦當書會故解之公及救陳而不及其會故不書會季文子卒大夫入斂公在位注在阼階西鄉音義斂力艷反鄉許亮反疏正義曰喪大記云大夫之喪將大斂既鋪絞襟衾衣君至主人迎先入門右巫止于門外君釋菜祝先入升堂君即位于序端士喪禮君若有賜焉則視斂既布衣君至君升自阼階西鄉以君臨士喪西鄉知臨大夫之喪即位于序端者亦西鄉也鄭𤣥士冠禮注云阼猶酢也東階所以答酢賔客也堂東西牆謂之序劉炫又引記云君既即位于序端卿大夫即位于堂亷楹西北面東上主人房外南面主婦尸西東面遷尸卒斂宰告主人降北面于堂下君撫之主人拜稽顙君降升主人馮之命主婦馮之士之喪將大斂君不在其餘禮猶大夫也宰庀家器為葬備注庀具也音義庀匹婢反無衣帛之妾無食粟之馬無藏金玉無重器備注器備謂珍寶甲兵之物音義衣於既反無食如字又音嗣重如字又置龍反君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎音義相息亮反積子賜反疏正義曰季孫行父以文六年見經則為卿久矣宣公之初襄仲執政宣八年仲遂卒後始文子得政故至今為相三君也經六年春王三月壬午杞伯姑容卒夏宋華弱來奔注華椒孫秋葬把桓公注無傳滕子來朝莒人滅鄫冬叔孫豹如邾季孫宿如晉注行父之子十有二月齊侯滅萊注書十二月從告傳六年春杞桓公卒始赴以名同盟故也注把入春秋未嘗書名桓公三與成同盟故赴以名疏正義曰杞入春秋以來惟僖二十三年杞成公卒用夷禮書把子卒未嘗書杞君之名也世本杞桓公是成公之弟成公卒而桓公立至此七十一年唯成五年盟于蟲牢七年于馬陵九年于蒲魯杞俱在未嘗與襄同盟嫌其不合以名赴故傳發之釋例曰杞伯姑容未與襄同盟而事逮其父用同盟之禮蓋繼好之義也嫌於赴非所盟之君故傳曰始赴以名同盟故也宋華弱與樂轡少相狎長相優又相謗也注狎親習也優調戲也音義少詩照反狎戶甲反長丁丈反調徒弔反疏正義曰論語云雖狎必變曲禮云賢者狎而敬之狎是相䙝慢相貫習之名也二十八年𫝊稱慶氏之徒觀優至於魚里是優為戲名也晉語有優施史記滑稽傳有優孟優旃皆善為優遂以優著名是優為調戲也子蕩怒以弓梏華弱于朝注子蕩樂轡也張弓以貫其頸若械之在手故曰梏音義梏古毒反貫古亂反疏正義曰貫者穿也張弓以貫沓其頸頸穿於弓之中故曰貫其頸周禮掌囚有梏桎在手曰梏在足曰桎頸貫於弓若手在梏故云以弓梏也桎梏俱名為械釋名云械者戒也戒止人使不得逰行也平公見之曰司武而梏於朝難以勝矣注司武司馬言其懦弱不足以勝敵音義懦乃亂反又乃卧反遂逐之夏宋華弱來奔司城子罕曰同罪異罰非刑也專戮於朝罪孰大焉亦逐子蕩子蕩射子罕之門曰幾日而不我從注言我射女門女亦當以不勝任見逐音義射食亦反注同幾居豈反女音汝勝音升子罕善之如初注言子罕雖見辱不追忿所以得安疏正義曰子罕以華弱奔後而發此言蓋以告諸大夫非告君也亦逐子蕩一句亦是子罕之語說子蕩之罪言亦宜逐子蕩也子蕩恐即被逐故射子罕之門宋亦不復逐之子蕩作被逐之意故云幾日而不我從也宋人不復更逐故子罕善之如初不恨其射門也或當實逐子蕩故子蕩云幾日而不我從理亦通也注正義曰服䖍云言子罕不阿同族亦逐樂轡以正國法忠之至也及樂轡射其門畏從華弱之罰復善樂轡如初是為茹柔吐剛喪其志矣𫝊故舉之明春秋之義善惡俱見杜以春秋之世君弱臣强莫不蓋失掩罪以相忍為國向戌欲蓋華臣子罕不怨樂轡皆忍忿求安之事不足以為大尢知傳載此言是善其得安非尢其從惡故異於服也秋滕成公來朝始朝公也莒人滅鄫鄫恃賂也注鄫有貢賦之賂在魯恃之而慢莒故滅之冬穆叔如邾聘且修平注平四年狐駘戰晉人以鄫故來討曰何故亡鄫注鄫屬魯恃賂而慢莒魯不致力輔助無何以還晉尋便見滅故晉責魯季武子如晉見且聽命注始代父為卿見大國且謝亡鄫聽命受罪音義見賢遍反注同疏正義曰昭二年晉韓宣子來聘𫝊曰告為政而來見也大國正卿尚來見小國知此𫝊言見者是始代父為政卿往見於大國也十一月齊侯滅萊萊恃謀也注賂夙沙衛之謀也事在二年於鄭子國之來聘也四月晏弱城東陽而遂圍萊注子國聘在五年二年晏弱城東陽至五年四月復託治城因遂圍萊音義復扶又反甲寅堙之環城傅於堞注堞女墻也堙土山也周城為土山及女墻音義堙音因環戶關反又音患傅音附堞音牒一名俾亦謂之俾倪徐養涉反疏正義曰兵書攻城有為堙之法宣十五年公羊傳曰子反乘堙而窺宋城是堙為土山使髙與城等而攻之也言環城是環繞其城知周幣其城為土山也及杞桓公卒之月注此年三月乙未王湫帥師及正輿子棠人軍齊師注王湫故齊人成十八年奔萊正輿子萊大夫棠萊邑也北海即墨縣有棠鄉三人帥别邑兵來解圍音義湫子小反徐子烏反齊師大敗之注敗湫等丁未入萊萊共公浮柔奔棠正輿子王湫奔莒莒人殺之四月陳無宇獻萊宗器于襄宫注無宇桓子陳完𤣥孫襄宫齊襄公廟音義共音恭晏弱圍棠十一月丙辰而滅之遷萊于郳注遷萊子于郳國音義遷萊于郳五兮反本或作遷于郳萊衍字疏正義曰郳即小邾也二年𫝊曰滕薛小邾之不至皆齊故也小邾附屬於齊故滅萊國而遷其君於小邾使之寄居以終身也髙厚崔杼定其田注定其疆界髙厚髙固子音義疆居良反經七年春郯子來朝音義郯音談夏四月三卜郊不從乃免牲注稱牲既卜日也卜郊又非禮也疏正義曰周禮大宰職云祀五帝前期十日帥執事而卜日然則將祭十日之前預卜之蓋一旬一卜也例稱啓蟄而郊建寅之月也此四月三卜蓋三月二卜四月又一卜也春分之前猶是啓蟄節內於法仍可以郊據𫝊獻子之言三卜在春分之後則初卜即已大晚故三卜而涉於春分也人心欲其吉不吉是不從不從則不郊故免牲而不殺也注正義曰僖三十一年夏四月四卜郊不從乃免牲𫝊曰禮不卜常祀而卜其牲日牛卜日曰牲牲成而卜郊上怠慢此經與彼正同唯四卜三卜為異耳彼言其非則此亦非也牛已稱牲是既卜日矣牲既成矣而又卜郊與僖同譏故云又非禮也小邾子來朝城費注南遺假事難而城之音義費音祕難乃旦反疏正義曰此𫝊唯說南遺請城之由不言時與不時則知南遺假託言有事難而請城之秋季孫宿如衛八月螽注無傳為災故書冬十月衛侯使孫林父來聘壬戌及孫林父盟楚公子貞帥師圍陳十有二月公會晉侯宋公陳侯衛侯曹伯莒子邾子于鄬注謀救陳陳侯逃歸不成救故不書救也鄬鄭地音義鄬于軌反字林几吹反疏正義曰楚既圍陳而陳侯亦列於會者當是圍之不密故陳侯得出會求救也陳侯逃歸陳遂屬楚諸侯不與楚戰各自罷歸不成為救故不書救也鄭伯髠頑如會未見諸侯丙戌卒于鄵注實為子駟所弒以瘧疾赴故不書弒稱名為書卒同盟故也如會會于鄬也未見諸侯未至㑹所而死鄵鄭地不欲再稱鄭伯故約文書其名於會上音義鄵七報反又采南反字林于消反弒音試下同為書于僞反上時掌反疏正義曰魯之隱閔實被弒而書薨諱而不言弒則亦不以被弒赴諸侯此鄭伯實為子駟所弒而以瘧疾赴於諸侯亦如隱閔之類諱而不言弒故魯史不得書弒也榖梁傳曰禮諸侯不生名此其生名何也卒之名也卒之名則何為加之如會之上見以如會卒也是言書名為書卒而稱之也三年盟于雞澤五年盟于戚魯鄭俱在同盟故赴以名法當書名故進名於上其名本為下卒非是生名之也如會者會諸侯于鄬欲往赴其會也公羊𫝊曰未見諸侯其言如㑹何致其意也原其意本欲往會故書之也未見諸侯言其未至會所而死非至會而不見也書卒于鄵者赴以所卒之地故書之陳侯逃歸注畏楚逃晉而歸傳七年春郯子來朝始朝公也夏四月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也注郊祀后稷以配天后稷周始祖能播殖者疏正義曰言后稷周之始祖能播殖者辨知后稷是何人不為能播殖故祀以祈農事自謂郊天以祈農耳案孝經云孝莫大於嚴父嚴父莫大於配天則周公其人也昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝止云配天而祀之不言祈農也郊特牲說郊天之義曰萬物本乎天人本乎祖此所以配上帝也郊之祭也大報本反始也宣三年公羊傳曰郊則曷為必祭稷王者必以其祖配王者則曷為必以其祖配自內出者無匹不行自外至者無主不止何休云天道暗昧故推人道以接之不以文王配者重本尊始之義也據此諸文則郊祭天者為物本於天故祭天以報本神必須配故推祖以配天止報生成之恩非求未來之福此傳専言郊祀社稷主為祈農事者斯有㫖矣祭祀者為報己往非求將來之福也但祭為明神所享神以將來致福將來而獲多福乃由祭以得之禮器稱君子曰祭祀不祈祭者意雖不祈其實福以祭降以祭獲福即祈之義也宗廟之祭緣生事死盡其孝順之心非求耕稼之利少牢饋食者大夫之祭禮也其祭之末尸嘏主人使女受福于天宜稼于田彼豈為田而祭哉神以宜田福之耳郊天之義亦由是也神以人為主人以榖為命人以精意事天天以宜稼祐人以此謂之祈農本意非祈農也詩噫嘻序曰春夏祈榖于上帝禮仲春之月月令曰是月也天子乃以元日祈榖于上帝即是郊天之祭也其下即云乃擇元辰天子親載耒耜躬耕帝籍是郊而後耕也獻子此言正與禮合孝經只言尊嚴其父主述孝子之志本意不說郊天之祭無由得有祈榖之言何休膏肓執彼難此追而想之亦可以歎息也是故啓蟄而郊郊而後耕今既耕而卜郊宜其不從也注啓蟄夏正建寅之月耕謂春分音義蟄直立反夏戶雅反疏正義曰釋例曰歷法正月節立春啓蟄為中氣二月節驚蟄春分為中氣是啓蟄為夏正建寅之月中氣也月令祈榖之後即擇日而耕初耕亦在正月𫝊言既耕而卜郊宜其不從是此卜之時已涉春分之節時過不復可郊故言耕謂春分指釋獻子言耕是春分之節不謂春分始可耕也釋例又曰僖公襄公夏四月卜郊但譏其非所宜卜不譏其四月不可郊也孟獻子曰啓蟄而郊郊而後耕耕謂春分也言得啓蟄即當卜郊不得過春分也是言此卜在春分之後故獻子譏之據𫝊獻子此言郊天之禮必用周之三月而雜記云孟獻子曰正月日至可以有事於上帝七月日至可以有事於祖七月而禘獻子為之也此與禮記俱稱獻子二文不同必有一謬禮記後人所録左傳當得其真若七月而禘獻子為之則當獻子之時應有七月禘者蒸嘗過則書禘過亦宜書何以獻子之時不書七月禘也足知禮記之言非獻子矣南遺為費宰注費季氏邑叔仲昭伯為隧正注隧正主役徒昭伯叔仲惠伯之孫音義隧音遂疏正義曰九年注云隧正官名五縣為隧則隧正當周禮之遂人也掌諸遂之政令徒役出諸遂之民故為主徒役者欲善季氏而求媚於南遺謂遺請城費注使遺請城吾多與而役故季氏城費注傳言祿去公室季氏所以强小邾穆公來朝亦始朝公也注亦郯子也秋季武子如衛報子叔之聘且辭緩報非二也注子叔聘在元年言國家多難故不時報音義難乃旦反冬十月晉韓獻子告老公族穆子有廢疾注穆子韓厥長子成十八年為公族大夫音義長丁丈反下師長同將立之注代厥為卿辭曰詩曰豈不夙夜謂行多露注詩言雖欲早夜而行懼多露之濡已義取非禮不可妄行疏正義曰詩國風召南行露之首章也言人行者豈不欲早夜而行乎謂早夜而行則多露濡已義取非禮不可以妄行穆子引之言非其才不可以妄居官位又曰弗躬弗親庶民弗信注詩小雅言譏在位者不躬親政事則庶民不奉信其命言已有疾不能躬親政事疏正義曰此詩小雅節南山之篇詩注云言王之政不躬而親之則恩澤不信於衆民矣無忌不才讓其可乎請立起也注無忌穆子名起無忌弟宣子也與田蘇游而曰好仁注田蘇晉賢人蘇言起好仁音義好呼報反注及下同詩曰靖共爾位好是正直神之聽之介爾景福注靖安也介助也景大也詩小雅言君子當思不出其位求正直之人與之竝立如是則神明順之致大福也音義共音恭下注同介音界下及注同疏正義曰定本介景皆為大也恤民為德注靖共其位所以恤民疏正義曰天生蒸民立君以牧之君不獨治為臣以佐之君之與臣皆為恤民而設之也能安靖共敬在其職位是其所以憂民也正直為正注正己心正曲為直注正人曲參和為仁注德正直三者備乃為仁音義參七南反或作三如是則神聽之介福降之立之不亦可乎注言起有此三德故可立疏正義曰詩小雅小明之篇言人能安靖共敬以居爾之職位愛好正直之人與之共處於朝則神明聽順之當助女以大福也既引詩文又𫐠其意能愛念下民是為德也正直己心是為正也能以己正正人之曲是為直也此德也正也直也三者和備是為仁也人能如是則神明聽順之大福降與之田蘇是知人者也田蘇言起好仁起必備有此行立之不亦可乎庚戌使宣子朝遂老注韓厥致仕晉侯謂韓無忌仁使掌公族大夫注為之師長疏正義曰無忌先為公族大夫今言使掌是與諸公族大夫為師長也衛孫文子來聘且拜武子之言注緩報非二之言而尋孫桓子之盟注盟在成三年公登亦登注禮登階臣後君一等音義後胡豆反下文不後寡君同疏正義曰聘禮公迎賔于大門內及廟門公揖入立于中庭納賔賔入三揖至于階三讓公升二等鄭𤣥云先賔升二等亦欲君行一臣行二言君先升二等然後臣始升一等是禮登階臣當後君一等叔孫穆子相趨進曰諸侯之會寡君未嘗後衛君注敵體竝登音義相息亮反下駟相同嘗後如字徐胡豆反今吾子不後寡君寡君未知所過吾子其少安注安徐也孫子無辭亦無悛容注悛改也音義悛七全反穆叔曰孫子必亡為臣而君過而不悛亡之本也詩曰退食自公委蛇委蛇注委蛇順貌詩召南言人臣自公門入私門無不順禮音義委於危反蛇以支反下同召上照反謂從者也注從順行衡而委蛇必折注衡橫也橫不順道必毁折為十四年林父逐君起本疏正義曰詩國風召南羔羊之篇言大夫賢者退朝而食從公門入私門委蛇委蛇然委蛇順從之貌詩之此意謂順者也今孫子為臣而君自處是橫不順道以橫道而為委蛇其人必將毁折不得終其職位楚子囊圍陳會于鄬以救之注晉會諸侯鄭僖公之為大子也於成之十六年注魯成公疏正義曰杜必言魯成公者欲明非鄭成公也知非者以鄭成公成七年即位至襄二年卒唯十四年無十六年故也與子罕適晉不禮焉又與子豐適楚亦不禮焉注子豐穆公子及其元年朝于晉注鄭僖元年魯襄三年子豐欲訴諸晉而廢之子罕止之及將會于鄬子駟相又不禮焉侍者諫不聽又諫殺之及鄵子駟使賊夜弒僖公而以瘧疾赴于諸侯注傳言經所以不書弒簡公生五年奉而立之注僖公子陳人患楚注楚圍陳故慶虎慶寅謂楚人曰吾使公子黃往而執之注二慶陳執政大夫公子黃哀公弟疏正義曰於時楚師圍陳使公子黃往入楚軍也楚人從之注為執黃音義為于僞反二慶使告陳侯于會注鄬之㑹曰楚人執公子黃矣君若不來羣臣不忍社稷宗廟懼有二圖注背君屬楚音義背音佩陳侯逃歸注鄬會所以不書救經八年春王正月公如晉夏葬鄭僖公注無傳鄭人侵蔡獲蔡公子燮注鄭子國稱人刺其無故侵蔡以生國患燮蔡莊公子音義燮息協反疏正義曰此决舍之入陳鄭有宿怨此時與蔡無怨晉復無命使侵無故興師以生國患以其動而無謀故貶之釋例曰陳蔡楚之與國鄭欲求親於晉故伐而入之晉士莊伯詰其侵小且問陳之罪子産答以東門之役故免於譏及其侵蔡既無晉令又無直辭君死主少興師以求媚於晉不能以德懷親以直報怨故二大夫異於子産也陳之見伐本以助晉晉不逆勞而以法詰之得盟主道理故仲尼曰晉為伯鄭入陳非文辭不為功善之也季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢邱注時公在晉晉悼難勞諸侯唯使大夫聽命故季孫在會而公先歸音義邢徐音刑難乃旦反疏正義曰公以正月如晉此會之下始云公至則晉侯適會公乃歸魯季孫蓋從公朝晉即從晉赴會故季孫在會而公先歸公至自晉注無傳莒人伐我東鄙秋九月大雩冬楚公子貞帥師伐鄭晉侯使士丐來聘傳八年春公如晉朝且聽朝聘之數注晉悼復修霸業故朝而稟其多少音義復扶又反霸本亦作伯音霸又如字疏正義曰昭三年鄭子大叔云文襄之霸也令諸侯三嵗而聘五歲而朝自襄以後晉德少衰諸侯朝聘無復定準今晉悼復修霸業更合諸侯故公朝晉而稟其多少如公朝者蓋亦非一晉侯謙不敢在國約束故出外合之又難煩諸侯使大夫聽命故為邢邱之會以命朝聘之數數之多少傳亦無文據子大叔之言不說悼公之法而逺陳文襄之令則悼公此命還同文襄耳非復别制法也鄭羣公子以僖公之死也謀子駟子駟先之夏四月庚辰辟殺子狐子熙子侯子丁注辟罪也加罪以戮之音義先悉薦反又如字辟婢亦反注同熙許其反徐音怡疏正義曰辟罪釋詁文也不直言殺而云辟殺明是加誣以罪而殺之子駟知其謀已不以罪殺恐動衆心故加誣以罪言其罪自當死非為已討所以自解說也孫擊孫惡出奔衛注二孫子狐之子疏正義曰賈逵云然未必有文可據相傳為此說也庚寅鄭子國子耳侵蔡獲蔡司馬公子燮注鄭侵蔡欲以求媚於晉子耳子良之子不言敗唯以獲告疏正義曰於時鄭無蔡怨又無晉令鄭自發心侵蔡知欲求媚於晉也獲其將必與之戰戰敗乃獲之不言敗者唯以獲告不告敗也鄭人皆喜唯子産不順注子産子國子不順衆而喜曰小國無文德而有武功禍莫大焉楚人來討能勿從乎從之晉師必至晉楚伐鄭自今鄭國不四五年弗得寧矣子國怒之曰爾何知國有大命而有正卿童子言焉將為戮矣注大命起師行軍之命五月甲辰會于邢邱以命朝聘之數使諸侯之大夫聽命季孫宿齊髙厚宋向戌衛寧殖邾大夫會之注晉難重煩諸侯故使大夫聽命鄭伯獻捷于會故親聽命注獻蔡捷也大夫不書尊晉侯也注晉悼復文襄之業制朝聘之節儉而有禮德義可尊故退諸侯大夫以崇之疏正義曰禮卿不會公侯會則貶之稱人自是常例而云尊晉侯者此有鄭伯在會自與晉侯相敵諸卿不敵晉侯無罪不合貶也但欲尊晉侯無辭以見之故貶大夫以尊之大夫非有罪也文二年晉宋陳鄭四國之卿伐秦皆貶稱人尊秦謂之崇德其意與此同也諸侯之卿皆貶而獨不貶季孫宿者文元年公孫敖會晉侯于戚注云禮卿不會公侯而春秋魯大夫皆不貶者體例已舉故據用魯史成文是其義也言儉而有禮德義可尊者難煩諸侯使大夫聽命亦是有禮之事也莒人伐我東鄙以疆鄫田注莒既滅鄫魯侵其西界故伐魯東鄙以正其封疆音義疆居良反注同秋九月大雩旱也冬楚子囊伐鄭討其侵蔡也子駟子國子耳欲從楚子孔子蟜子展欲待晉注待晉來救子孔穆公子子蟜子游子子展子罕子音義蟜居表反子駟曰周詩有之曰俟河之清人壽幾何注逸詩也言人壽促而河清遲喻晉之不可待音義壽音授或如字注同幾居豈反兆云詢多職競作羅注兆卜詢謀也職主也言既卜且謀多則競作羅網之難無成功音義難乃旦反疏正義曰杜云兆卜詢謀也既卜且謀多如杜此言則云是語辭謀之多族民之多違注族家也事滋無成注滋益也民急矣姑從楚以紓吾民晉師至吾又從之敬共幣帛以待來者小國之道也犧牲玉帛待於二竟注二竟晉楚界上音義紓音舒共音恭竟音境注同以待彊者而庇民焉寇不為害民不罷病不亦可乎子展曰小所以事大信也小國無信兵亂日至亡無日矣五會之信注謂三年會雞澤五年會戚又會城棣七年會鄬八年會邢邱音義庇必利反又音祕下同罷音皮疏正義曰鄬之會鄭伯未至而卒亦數之者鄭伯雖身死耳其會與鄭同謀故數之今將背之雖楚救我將安用之注言失信得楚不足貴音義背音佩至卷末皆同親我無成注晉親鄭鄙我是欲注楚欲以鄭為鄙邑而反欲與成不可從也注言子駟不可從不如待晉晉君方明四軍無闕八卿和睦必不棄鄭注四軍謂上中下新軍也軍有二卿疏正義曰八卿者據元年傳荀罃將中軍士丐佐之荀偃將上軍韓起佐之欒黶將下軍士魴佐之趙武將新軍魏絳佐之楚師遼逺糧食將盡必將速歸何患焉舍之聞之注舍之子展名杖莫如信完守以老楚杖信以待晉不亦可乎子駟曰詩云謀夫孔多是用不集注詩小雅孔甚也集就也言人欲為政是非相亂而不成音義杖直亮反下同守手又反或如字下守官竝注同發言盈庭誰敢執其咎注言謀者多若有不善無適受其咎音義咎其九反下同適丁歷反下同如匪行邁謀是用不得于道注匪彼也行邁謀謀於路人也不得于道衆無適從疏正義曰詩小雅小旻之三章也言謀事之夫甚多是非相奪無可適從為是之故其事用此益不成也發言訩訩而盈滿于庭無能决當是非事若不成誰敢執其咎責者如彼道上行人每得人即與之謀意無所從為是之故用此不得于正道也注正義曰鄭𤣥以匪為非如非行邁之謀言止而不行坐圗遠近也杜以如者如似他物故以匪為彼言如彼行人逢值岐路問其所從也鄭以行為道邁為行言道上行人杜亦當然請從楚騑也受其咎注騑子駟名音義騑芳非反乃及楚平使王子伯駢告于晉曰注伯駢鄭大夫音義駢披賢反又披經反君命敝邑修而車賦警而師徒以討亂略蔡人不從敝邑之人不敢寧處悉索敝賦注索盡也音義警居領反索悉各反注同一音所百反以討于蔡獲司馬燮獻于邢邱今楚來討曰女何故稱兵于蔡注稱舉也音義女音汝焚我郊保注郭外曰郊保守也馮陵我城郭注馮迫也音義馮皮氷反注同敝邑之衆夫婦男女不遑啓處以相救也注遑暇也啓跪也音義跪其威反疏正義曰皆釋言文也舍人曰間暇無事也李巡曰啓小跪也翦焉傾覆無所控告注翦盡也控引也音義覆芳服反控苦貢反民死亡者非其父兄即其子弟夫人愁痛注夫人猶人人也音義夫音扶注同不知所庇民知窮困而受盟于楚孤也與其二三臣不能禁止注孤鄭伯不敢不告知武子使行人子員對之曰君有楚命注見討之命亦不使一介行李告于寡君注一介獨使也行李行人也音義介古賀反注同獨使所吏反而即安于楚君之所欲也誰敢違君寡君將帥諸侯以見于城下唯君圖之注為明年晉伐鄭傳音義見賢遍反或如字晉范宣子來聘且拜公之辱注謝公此春朝告將用師于鄭公享之宣子賦摽有梅注摽有梅詩召南摽落也梅盛極則落詩人以興女色盛則有衰衆士求之宜及其時宣子欲魯及時共討鄭取其汲汲相赴音義摽徐披妙反又披表反興許譍反季武子曰誰敢哉注言誰敢不從命今譬於草木寡君在君君之臭味也注言同類音義譬本亦作辟音譬後放此歡以承命何時之有注遲速無時武子賦角弓注角弓詩小雅取其兄弟婚姻無相遠矣賓將出武子賦彤弓注彤弓天子賜有功諸侯之詩欲使晉君繼文之業復受彤弓於王音義彤徒冬反復扶又反宣子曰城濮之役注在僖二十八年音義濮音卜我先君文公獻功于衡雍受彤弓于襄王以為子孫藏注藏之以示子孫音義雍於用反藏如字徐才浪反丐也先君守官之嗣也敢不承命注言已嗣其父祖為先君守官不敢廢命欲匡正君君子以為知禮注彤弓之義義在晉君故范丐受之所謂知禮疏正義曰文四年寧俞來聘為賦彤弓寧俞不敢當此賦彤弓而宣子受之故解其意彼以彤弓當寧俞故寧俞不敢受此賦彤弓其義在於晉君非當范丐故范丐受之而為知禮也經九年春宋災注天火曰災來告故書疏正義曰得告則書史之常例於此須言告者公羊傳曰外災不書此何以書為王者之後記災也曷為或言災或言火大者曰災小者曰火然則內何以不言火內不言火者甚之也公羊此言不可通於左氏故杜明為此注以異之夏季孫宿如晉五月辛酉夫人姜氏薨注成公母秋八月癸未葬我小君穆姜注無傳四月而葬速冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭十有二月己亥同盟于戲注伐鄭而書同盟則鄭受盟可知傳言十有一月己亥以長曆推之十二月無己亥經誤戲鄭地音義戲許宜反疏正義曰成十七年夏公會尹子云云伐鄭六月乙酉同盟于柯陵於時鄭實不服諸侯自同盟耳鄭不與盟也此注云伐鄭而書同盟則鄭受盟可知者此盟鄭與傳文分明不是凖約同盟之文始知鄭與盟也杜言此解經於盟不書鄭伯之意耳經若重序諸侯必當鄭伯在列但經已前目諸侯不復重序鄭伯不見故特解之以其伐鄭而書同盟則鄭與盟可知同盟之文足以包鄭故不復見鄭伯耳非謂因伐而同盟者所伐之國必與也柯陵之盟鄭實不服諸侯自相與盟非同鄭也文同事異不可執彼以難此十一年諸侯伐鄭同盟于亳城北其文與此同矣此經書十二月己亥同盟于戲傳言十一月己亥同盟于戲經傳不同必有一誤而傳於戲盟之下更言十二月癸亥門其三門己亥在癸亥之前二十四日杜以長歷推之十一月庚寅朔十日得己亥十二月己未朔五日得癸亥故長歷參校上下己亥在十一月十日又十二月五日有癸亥則其月不得有己亥經書十二月誤也此誤者唯以一字誤為二非書經誤也楚子伐鄭傳九年春宋災樂喜為司城以為政注樂喜子罕也為政卿知將有火災素戒為備火之政疏正義曰文七年及成十五年二傳言宋六卿之次皆云右師左師司馬司徒司城司寇其右師最貴故華元曰我為右師君臣之訓師所司也然則宋國之前當右師為政卿今言司城為政卿者蓋宋以華閲是華元之子以元有大功使閲繼其父耳子罕賢知故特使為政齊任管夷吾魯任叔孫婼皆位卑而執國政此亦當然也此傳言以為政者以為救火之政耳但從此以後歷檢傳文鄭人討賊宋人獻玉抶築臺之謳削向戌之賞皆是政卿之任故言為政卿也下晉侯云宋災於是乎知有天道是宋人自知天道當有火災故子罕素相戒勑為備火之政也自伯氏司里以下巷伯警宫以上皆是子罕素戒之也其享祀之事是政卿命之非子罕也使伯氏司里注伯氏宋大夫司里里宰疏正義曰釋言曰里邑也李巡云里居之邑也是里為邑居之名也周禮五鄰為里以五鄰必同居故以里為名里長謂之宰周禮里宰每里下士一人謂六遂之內二十五家之長也此言司里謂司城之內民若今城內之坊里也里必有長不知其官之名周禮有里宰故以宰言之非是郊外之民二十五家之長也使伯氏司此城內諸里之長令各率里內之民表火道以來皆使此伯氏率里民為之火所未至徹小屋塗大屋注大屋難徹就塗之陳畚挶具綆缶注畚簣籠挶土輿綆汲索缶汲器音義畚音本草器也挶九録反綆古杏反汲水索缶方九反汲水瓦器簣其位反籠力東反輿音預汲音急索悉各反疏正義曰說文云畚蒲器所以盛糧也宣二年注云畚以草索為之其器可以盛糧又可以盛土也論語稱為山用簣是簣為盛土之器故以畚為簣籠也說文云挶㦸持也㦸持者執持此輿其臂如㦸形故也其字從手謂以手持物也與畚共文畚是盛土之器則挶是輿土之物也綆者汲水之索儀禮謂之繘方言云自關而東周洛韓魏之間謂之綆關西謂之繘釋器云盎謂之缶說文云缶瓦器所以盛酒漿亦謂之罌罌可以汲水故云汲器也易井卦亦謂取井水為汲也備水器注盆􅧲之屬音義􅧲戶暫反疏正義曰周禮凌人春始治鑑鄭𤣥云鑑如甀大口以盛氷則􅧲是盛氷之器知備水器者備盆􅧲之屬量輕重注計人力所任音義任音壬蓄水潦積土塗巡丈城繕守備注巡行也丈度也繕治也行度守備之處恐因災作亂音義蓄本又作畜勑六反潦音老守手又反注守備同巡行下孟反下同度待洛反下同處昌慮反疏正義曰十尺為丈巡行其城以丈度之故云丈城表火道注火起則從其所趣摽表之音義摽必遙反使華臣具正徒注華臣華元子為司徒正徒役徒也司徒之所主也疏正義曰周禮大司徒掌徒庶之正令小司徒凡用衆庶則掌其政教凡國之大事致民是司徒掌役徒也言具正徒司里所使遂正所納皆是臨時調民而役之若今之夫役也司徒所具正徒者常共官役若今之正丁也令隧正納郊保奔火所注隧正官名也五縣為隧納聚郊野保守之民使隨火所起往救之疏正義曰此隧正當天子之遂大夫故遂大夫職云各掌其遂之政令遂人職云五家為鄰五鄰為里四里為鄼五酇為鄙五鄙為縣五縣為遂鄭司農云王國百里內為六鄉外為六遂鄭𤣥云郊內比閭族黨州鄉郊外鄰里酇鄙縣遂異其名者示相變耳尚書費誓云魯人三郊三遂然則諸侯之有鄉遂亦以郊內郊外别之也郊內屬鄉者近於國都司徒自率之以入城矣郊外屬遂者是郊野保守之民不可全離所守司徒令遂正量其多少納之於國隨火所起而奔往救之華臣直言具正徒不言其事者以是郊內之民共救火百役即上蓄水潦積土塗之類非唯救火而己若郊保之民既逺故使隨火所起奔往救之直救火而已使華閲討右官官庀其司注亦華元子代元為右師討治也庀具也使具其官屬音義閲音悅庀芳婢反注同向戌討左亦如之注向戌左師使樂遄庀刑器亦如之注樂遄司寇刑器刑書音義遄市專反疏正義曰此人掌具刑器知其為司寇也恐其為火所焚當是國之所重必非刑器為刑書也哀三年魯人救火云出禮書御書書不名器此言刑器必載於器物鄭鑄刑書而叔向責之晉鑄刑鼎而仲尼譏之彼鑄之於鼎以示下民故譏其使民知之此言刑器必不在鼎當書於器物官府自掌之不知其在何器也或書之於版號此版為刑器耳使皇鄖命校正出馬工正出車備甲兵庀武守注皇鄖皇父充石之後校正主馬工正主車使各備其官音義鄖音云本亦作員音同校戶教反注同出馬如字徐尺遂反下同守手又反下同疏正義曰服䖍云皇鄖皇父充石之後十世宗卿為人之子大司馬椒也車馬甲兵司馬之職使皇鄖掌此事皇鄖必是司馬也校正主馬於周禮為校人是司馬之屬官也周禮司馬之屬無主車之官巾車車僕職皆掌車乃為宗伯之屬昭四年傳云夫子為司馬與工正書服是諸侯之官司馬之屬有工正主車也國有火災恐致姦寇故使司馬命此二官出車馬備甲兵以防非常也傳言庀武守者甲兵器械藏於府庫若今武庫使具其守守此武庫也此事輕於車馬故後言之使西鉏吾庀府守注鉏吾大宰也府六官之典音義鉏吾音魚疏正義曰鉏吾大宰傳無其文賈逵云然相傳說耳不知其本何所出也周禮大宰之職掌建邦之六典以佐王治邦國一曰治典二曰教典三曰禮典四曰政典五曰刑典六曰事典六官之典謂此也杜以此為六官之典當謂六官之典其事載之於書故使具官守劉炫以為府守謂府庫守藏今知不然者以百司府藏已屬左右二師上華閲討右官官庀其司向戌討左亦如之則是府庫之物二師總令羣官所主宋哀三年魯遭火災出禮書御書藏象魏皆以典籍為重明此府守是六官之典若以為府庫財物便是不重六典唯貴財物劉以為府庫而規杜非也令司宮巷伯警宮注司宮奄臣巷伯寺人皆掌宮內之事音義警音景疏正義曰昭五年傳楚子欲以羊舌肹為司宮欲加宮刑以此知司宮奄臣謂奄人為臣主司宮內周禮無司宮巷伯之官唯有內小臣奄上士四人掌王后之命正其服位鄭𤣥云奄稱士者異其賢也奄人之官此最為長則司宮當天子之內小臣也周禮又云寺人王之正內五人鄭𤣥云正內路寢也釋宫云宮中巷謂之壼孫炎曰巷舍間道也王肅云今後宮稱永巷是巷者宮內道名伯長也是宮內門巷之長也周禮內小臣其次即有寺人故知巷伯是寺人也又以詩篇名巷伯經云寺人孟子作為此詩故知巷伯寺人一也鄭以巷伯為內小臣既無明文各以意說二師令四鄉正敬享注二師左右師也鄉正鄉大夫享祀也疏正義曰周禮大司徒云五家為比五比為閭四閭為族五族為黨五黨為州五州為鄉鄉大夫每鄉卿一人天子六鄉即以卿為之長此傳云二師令四鄉正則别立鄉正非卿典之但其所職掌當天子之鄉大夫耳周禮鄉大夫各掌其鄉之政教正月之吉受教法于司徒退而頒之于其鄉則鄉正當屬司徒此傳言二師命之者上文右師討右左師討左則宋國之法二師分掌其方左右各掌其二鄉並言其事故云二師令四鄉正也費誓云魯人三郊三遂則魯立三鄉此云命四鄉正則宋立四鄉也周禮鄉為一軍大國三軍宋是大國不過三軍而有四鄉者當時所立非正法也於時宋置六卿况四鄉乎周禮祭人鬼曰享故享為祀也止令敬享不知所享何神周禮大祝國有天災彌祀社稷禱祠鄭𤣥云天災疫癘水旱也彌猶遍也遍祀社稷及諸所禱又大司徒以荒政十有二聚萬民其十有一曰索鬼神鄭衆云索鬼神求廢祀而修之雲漢之詩所謂靡神不舉靡愛斯牲者也彼凶荒之年水旱之災尚索鬼神而祭之此遇天火為災亦當遍祀羣神其所合祭皆應祭之也蓋火起始命之祭耳祝宗用馬于四墉祀盤庚于西門之外注祝大祝宗宗人墉城也用馬祭于四城以禳火盤庚殷王宋之遠祖城積隂之氣故祀之凡天災有幣無牲用馬祀盤庚皆非禮音義墉本又作庸音同盤字亦作般步干反禳如羊反疏正義曰周禮大祝掌六祝之辭以事鬼神祇祈福祥小宗伯掌建國之神位特牲少牢士大夫之祭祀也皆宗人掌其事然則諸是祭神言辭大祝掌之禮儀宗人掌之故所有祭祀皆祝宗同行此事别命祝宗使奉此祭非鄉正所為也文承二師令下亦是二師命之不復言命者亦從上省文也用馬者以馬為牲祭於四面之城以禳火也禳郤也郤火使滅也盤庚湯之九世孫殷之第十九王也自盤庚至紂又十二王而殷滅盤庚弟小乙是宋微子之八世祖也盤庚之為殷王無大功德而祀盤庚者當時之意不知何故特祀之也祀盤庚不别言特明其祀亦用馬也城以積土為之土積則為陰積積陰之氣或能制火故祭城以禳火禮亦無此法也莊二十五年傳例曰凡天災有幣無牲用馬祀盤庚皆非禮言用馬祭城祭盤庚皆非禮也此備火災所使羣官急者在前緩者在後故先伯氏司里次華臣具正徒次到隧正納郊保然後二師總庀羣官先右後左尊卑之次也以刑器車馬甲兵典法國之所重故特命三官庀具其物先外官備具救火然後及內故次司宮巷伯人事既畢乃祭享鬼神故次敬享祀盤庚之事也晉侯問於士弱曰注弱士渥濁之子莊子音義渥於角反吾聞之宋災於是乎知有天道何故注問宋何故自知天道將災對曰古之火正或食於心或食於咮以出內火是故咮為鶉火心為大火注謂火正之官配食於火星建辰之月鶉火星昏在南方則令民放火建戌之月大火星伏在日下夜不得見則令民內火禁放火音義咮竹又反徐丁遘反出如字徐尺遂反內如字徐音納鶉音純見如字又賢遍反疏正義曰昭二十九年傳五行之官有木正火正金正水正土正立此五官各掌其職封為上公祀為貴神謂能其事者後世祀之火正之官居職有功祀火星之時以此火正之神配食也五行之官每歲五時祀之謂之五祀月令云其神勾芒祝融后土蓐收𤣥冥配五帝而食其神矣而火正又配食於火星者以其於火有功祭火星又祭之后稷得配天又配稷火正何故不得配帝又配星也有天下者祭百神天子祭天之時因祭四方之星諸侯祭其分野之星其祭火星皆以正配食也火正配火星而食有此傳文其金木水土之正不知配何神而食經典散亡不可知也周禮司爟掌行火之政令季春出火民咸從之季秋內火民亦如之鄭𤣥云火所以用陶冶民隨國而為之鄭司農云以三月本時昏心星見於辰上使民出火九月本黃昏心星伏在戌上使民內火故春秋傳曰以出內火周禮所言皆據夏正故杜以周禮之意解其心咮為火之由建辰之月即月令季春之月日在胃昏七星中南方七星有井鬼栁星張翼軫七者共為朱鳥之宿星即七星也咮謂栁也春秋緯文耀鉤云咮謂鳥陽七星為頸宋均注云陽猶首也栁謂之咮咮鳥首也七星為朱鳥頸也咮與頸共在於午者鳥之止宿口屈在頸七星與咮體相接連故也鶉火星昏而在南方於此之時令民放火咮星為火之候故於十二次咮為鶉火也建戌之月即月令季秋之月日在房東方七宿角亢氐房心尾箕七者共為蒼龍之宿釋文云大辰房心尾也大火謂之大辰孫炎曰龍星明者以為時候大火心也在中最明故時候主焉以是故此傳心為大火九月日體在房房心相近與日俱出俱沒伏在日下不得出見故令民內火禁放火也火官合配其人蓋多不知誰食於心誰食於咮也此傳鶉火大火共為出火之候周禮之注不言咮者以咮非內火之候故唯指大火以解出內之文故其言不及咮也陶唐氏之火正閼伯居商邱注陶唐堯有天下號閼伯髙辛氏之子傳曰遷閼伯於商邱主辰辰大火也今為宋星然則商邱在宋地音義閼於葛反疏正義曰史記五帝本紀云帝堯為陶唐氏是堯有天下以陶唐為代號也氏猶家也古言髙辛氏陶唐氏猶言周家夏家也閼伯髙辛氏之子遷閼伯於商邱主辰皆昭元年傳文也爾雅以大火為大辰是辰為大火也昭十七年傳云宋大辰之虛是大火為宋星也閼伯已居商邱祀大火今大火為宋星則知宋亦居商邱以此明之故云然則商邱在宋地也釋例云宋商商邱三名一地梁國睢陽縣也傳曰陶唐氏之火正閼伯居商邱祀大火又曰宋大辰之虛也然則商邱在宋或以為漳水之南故殷虛為商邱非也是由商邱所在不明故釋例與此注俱以閼伯明之祀大火而火紀時焉注謂出內火時相土因之故商主大火注相土契孫商之祖也始代閼伯之後居商邱祀大火音義相息亮反注同契息列反疏正義曰祀大火者閼伯祀此大火之星居商邱而祀火星也相土因之復主大火是商邱之地屬大火也然則在地之土各有上天之分周禮保章氏以星土辨九州之地所封封域皆有分星鄭𤣥云星土星所主土也封猶界也大界則曰九州州中諸國之封域於星亦有分焉其書亡矣今其存可言者十二次之分也星紀吳越也𤣥枵齊也娵訾衛也降婁魯也大梁趙也實沈晉也鶉首秦也鶉火周也鶉尾楚也夀星鄭也大火宋也析木燕也是言地屬於天各有其分之事也鄭唯云其存可言不知存者本是誰說其見於傳記者則此云商主大火昭元年傳云參為晉星二十八年傳云龍宋鄭之星則蒼龍之方有宋鄭之分也又曰以害鳥帑周楚惡之則朱鳥之方有周楚之分也昭七年四月日食傳稱魯衛惡之去衛地如魯地則春分之日在魯衛之分也又十年傳曰今茲歲在顓頊之虛姜氏任氏實守其地則於時歲星在齊薛之分也又三十二年傳曰越得嵗而吳伐之凶則於時歲星在吳越之分也晉語云實沈之虛晉人是居周語云歲在鶉火我有周之分野是有分野之言也天有十二次地有九州以此九州當彼十二次周禮雖云皆有分星不知其分誰分之也何必所分能當天地星紀在於東北吳越實在東南魯衛東方諸侯遙屬戌亥之次又三家分晉方始有趙而韓魏無分趙獨有之漢書地理志分羣國以配諸次其地分或多或少鶉首極多鶉火甚狹徒以相傳為說其源不可得而聞之於其分野或有妖祥而為占者多得其效蓋古之聖哲有以度知非後人所能測也注正義曰殷本紀契生昭明昭明生相土相土是契孫也本紀云帝舜封契於商鄭𤣥云商國在大華之陽皇甫謐云今上洛商縣是也如鄭𤣥意契居上洛之商至相土而遷於宋之商及湯有天下逺取契所封商以為一代大號服䖍云相土居商邱故湯以為天下號王肅書序注云契孫相土居商邱故湯以為國號案詩𫐠后稷云即有邰家室述契云天命𤣥鳥降而生商即稷封邰而契封商也若契之居商即是商邱則契已居之不得云相土因閼伯也若别有商地則湯之為商不是因相土矣且經傳言商未有稱商邱者釋例云宋之先契佐唐虞封於商武王封微子啓為宋公都商邱是同鄭𤣥說也傳言商主大火商謂宋也宋主大火耳成湯不主火也宋是商後故謂宋為商昭八年傳曰自根牟至于商衛是名宋為商之驗釋例曰商宋一地謂此商也相土商之祖者是湯之祖亦宋之祖也堯封閼伯於商邱比及相土應歷數世故云代閼伯之後居商邱祀大火也商人閲其禍敗之釁必始於火是以日知其有天道也注閲猶數也商人數所更歷恆多火災宋是殷商之後故知天道之災必火音義釁許靳反數所主反下同更音庚疏正義曰閲猶數也釁謂間隙也商人謂殷商之人為王之時數其禍敗之釁隙必始於火言其政教有失將欲致禍既開禍敗之釁必有火災應之也今宋是商後亦如商世欲有禍敗必初始於火是以言日知其有天道也然殷商不居商邱必有火者以商是相土子孫相土居商邱祀火之故故火之為災連及殷商之世也傳唯如此而已亦不知爾時宋有何失而有此災公曰可必乎對曰在道國亂無象不可知也注言國無道則變亂亦殊故不可必知疏正義曰公曰此事可必乎但有愆失必致火乎對曰在其君之所行道耳若時政小失天未棄之或下災異冀其覺悟或可常有火災也若國家昏亂無復常象不可知也象謂妖祥有所象似以戒人也國若無道災變亦殊既無所象故不可必知也夏季武子如晉報宣子之聘也注宣子聘在八年穆姜薨於東宮注太子宮也穆姜淫僑如欲廢成公故徙居東宫事在成十六年始往而筮之遇艮之八注艮下艮上周禮大卜掌三易然則雜用連山歸藏周易二易皆以七八為占故言遇艮之八音義艮古根反疏正義曰周禮大卜掌三易之法一曰連山二曰歸藏三曰周易鄭𤣥云易者揲著變易之數可占者也名曰連山似山之出內雲氣也歸藏者萬物莫不歸而藏於其中也洪範言卜筮之法三人占則從二人之言孔安國云夏殷周卜筮各異三法竝下從二人之言是言筮用三易之事也大卜周官而職掌三易然則周世之卜雜用連山歸藏周易也周易之爻唯有九六此筮乃言遇艮之八二易皆以七八為占故此筮遇八謂艮之第二爻不變者是八也揲蓍求爻繫辭有法其揲所得有七八九六說者謂七為少陽八為少隂其爻不變也九為老陽六為老隂其爻皆變也周易以變為占占九六之爻傳之諸筮皆是占變爻也其連山歸藏以不變為占占七八之爻二易竝亡不知實然以否世有歸藏易者僞妄之書非殷易也假令二易俱占七八亦不知此筮為用連山為用歸藏所云遇艮之八不知意何所道以為先代之易其言亦無所據賈鄭先儒相傳云耳先儒為此意者此言遇艮之八下文穆姜云是於周易晉語公子重耳筮得貞屯晦豫皆八其下司空季子云是在周易竝於遇八之下别言周易知此遇八非周易也史曰是謂艮之隨注震下兌上隨史疑占易遇八為不利故更以周易占變爻得隨卦而論之疏正義曰震為雷兌為澤象曰澤中有雷隨鄭𤣥云震動也兌說也內動之為德外說之以言則天下之民慕其行而隨從之故謂之隨也史疑占易遇八者為不利故更以周易占變變其爻乃得隨卦而論之所以說姜意也隨其出也注史謂隨非閉固之卦君必速出姜曰亡注亡猶無也音義亡如字讀者或音無是於周易曰隨元亨利貞無咎注易筮皆以變者占遇一爻變義異則論彖故姜亦以彖為占也史據周易故指言周易以折之音義亨許庚反下同彖吐亂反折之設反疏正義曰易筮皆以變者為占傳之諸筮皆是也若一爻獨變則得指論此爻遇一爻變以上或二爻三爻皆變則每爻義異不知所從則當總論彖辭故姜亦以彖為占此元亨利貞無咎是隨卦之彖辭也史言是謂艮之隨者據周易而言故姜亦指言周易以折之也周易卦下之辭謂之為彖彖者統論一卦之體明其所由之主隨彖云元享利貞無咎者元長也長亦大也亨通也貞正也隨卦震下兌上以剛下柔動而適說故物皆隨之而不能大通於事逆於時也相隨而不為利正共適邪淫則災之道也必有此元亨利貞四德乃得無咎過耳無此四德則不免於咎元體之長也亨嘉之會也利義之和也貞事之幹也體仁足以長人嘉德足以合禮利物足以和義貞固足以幹事然固不可誣也是以雖隨無咎注言不誣四德乃遇隨無咎明無四德者則為淫而相隨非吉事音義長丁丈反下同嘉德易作嘉會疏正義曰不誣四德者四德實有於身不可誣罔以無為有也如是乃遇隨卦可得身無咎耳明其無此四德而遇隨卦者乃是淫而相隨非是善事故得隨必有咎也穆姜自以身無四德遇隨為惡其意謂隨為惡卦故云雖隨無咎今我婦人而與於亂固在下位注婦人卑於丈夫音義與音預而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利弃位而姣注姣淫之别名音義姣戶交反注同徐又如字服氏同嵇叔夜音效疏正義曰服䖍讀姣為放效之效言效小人為淫淫自出於心非效人也今時俗語謂淫為姣故以姣為淫之别名不可謂貞有四德者隨而無咎我皆無之豈隨也哉我則取惡能無咎乎必死於此弗得出矣注傳言穆姜辨而不德疏正義曰自幹事以上與周易文言正同彼云元者善之長此云體之長彼云嘉會足以合禮此云嘉德唯二字異耳其意亦不異也元者始也長也物得其始為衆善之長於人則謂首為元元是體之長以善為體知亦善之長也亨通也嘉善也物無不通則為衆善之會故通者善之會也物得裁成乃名為義義理和協乃得其利故利者義之和也貞正也物得其正乃成幹用故正者事之幹也體仁以仁為體也君子體是仁人堪得與人為長體仁足以長人也身有美德動與禮合嘉德足以合禮也以已利物義事和協利物足以和義也正而牢固事得幹濟貞固足以幹事也此四德者在身必然固不可誣罔也是以雖得隨卦而其身無咎今我婦人也而與於僑如之亂婦人卑於男子固在下位而有不仁之行不可謂之元也不安靖國家欲除去季孟不可謂之亨也作為亂事而自害其身使放於東宫不可謂之利也棄夫人之德位而與僑如淫姣不可謂之貞也有此元亨利貞四德乃得隨而無咎四德我皆無之豈當隨卦也哉我則自取此惡其身能無咎乎必死於此宮不能出矣秦景公使士雃乞師于楚將以伐晉楚子許之子囊曰不可當今吾不能與晉爭晉君類能而使之注隨所能音義雃苫田反舉不失選注得所選音義選息戀反注同官不易方注方猶宜也其卿讓於善注讓勝己者其大夫不失守注各任其職其士競於教注奉上命其庶人力於農穡注種曰農收曰穡疏正義曰農是力田之名毛詩傳云種之曰稼斂之曰穡稼者言如嫁女之有所生也穡愛也言愛惜而收斂之也此文穡無所對故以農為種名其實農是營田之名種曰稼也商工皂𨽻不知遷業注四民不雜疏正義曰齊語四民者士農工商此傳言其士競於教是說士也庶人力於農稼是說農也士農已訖唯有工商在耳故以皂𨽻賤官足成其句杜言四民不雜通上士庶為四非以皂𨽻工商為四也韓厥老矣知罃稟焉以為政注代將中軍范丐少於中行偃而上之使佐中軍注使丐佐中軍偃將上軍音義少詩照反下同中行戶郎反韓起少於欒黶而欒黶士魴上之使佐上軍注黶魴讓起起佐上軍黶將下軍魴佐之音義黶於斬反魏絳多功以趙武為賢而為之佐注武新軍將音義將子匠反君明臣忠上讓下競注尊官相讓勞職力競當是時也晉不可敵事之而後可君其圖之王曰吾既許之矣雖不及晉必將出師秋楚子師于武城以為秦援秦人侵晉晉饑弗能報也注為十年晉伐秦傳音義饑音飢又音幾冬十月諸侯伐鄭注鄭從楚也庚午季武子齊崔杼宋皇鄖從荀罃士丐門于鄟門注鄭城門也三國從中軍音義鄟音專本亦作專衛北宮括曹人邾人從荀偃韓起門于師之梁注師之梁亦鄭城門三國從上軍滕人薛人從欒黶士魴門于北門注二國從下軍杞人郳人從趙武魏絳斬行栗注二國從新軍行栗表道樹音義行栗如字行道也疏正義曰行道也謂之行栗必是道上之栗周語云列樹以表道知此行栗是表道之樹甲戌師于泛注衆軍還聚泛泛鄭地東泛音義泛音泛令於諸侯曰修器備注兵器戰備盛餱糧注餱乾食音義盛音成餱音侯歸老幼注示將久師居疾于虎牢注諸侯已取鄭虎牢故使諸軍疾病息其中肆眚圍鄭注肆緩也眚過也不書圍鄭逆服不成圍音義眚生領反徐所幸反疏正義曰肆訓為緩緩從罪人謂放赦之也將求民力開恩赦罪赦諸侯之軍內犯法者服䖍以為放鄭囚案傳未與鄭戰無囚可放設使有囚可放鄭人以戰而獲非有所犯不得謂之肆眚也不書圍鄭者此肆眚圍鄭是號令之辭耳鄭人聞而逆服不成圍故也鄭人恐乃行成注與晉成也音義恐邱勇反中行獻子曰遂圍之以待楚人之救也而與之戰不然無成注獻子荀偃也恐楚救鄭鄭復屬之音義復扶又反知武子曰許之盟而還師以敝楚人注敝罷也音義罷音皮吾三分四軍注分四軍為三部疏正義曰賈逵以為三分四軍為十二部鄭衆以為分四軍為三部杜以分為十二則一部人少不足亢敵故從鄭說分四軍為三部晉各一動而楚三來欲罷楚使不能也與諸侯之鋭以逆來者注來者楚也於我未病楚不能矣注晉各一動而楚三來故曰不能猶愈於戰注勝聚戰暴骨以逞不可以爭注言爭當以謀不可以暴骨音義暴蒲卜反注同徐扶沃反爭爭鬬之爭注同又如字大勞未艾君子勞心小人勞力先王之制也注艾息也言當從勞心之勞音義艾魚廢反又五蓋反注同諸侯皆不欲戰乃許鄭成十一月己亥同盟于戲鄭服也注鄭服故言同盟將盟鄭六卿公子騑注子駟公子發注子國公子嘉注子孔公孫輒注子耳公孫蠆注子蟜音義蠆勑邁反公孫舍之注子展及其大夫門子皆從鄭伯注門子卿之適子音義從才用反適丁歷反疏正義曰周禮小宗伯掌三族之别以辨親疏其正室皆謂之門子鄭𤣥云正室適子也將代父當門者也是卿之適子為門子也晉士莊子為載書曰注莊子士弱載書盟書自今日既盟之後鄭國而不唯晉命是聽而或有異志者有如此盟注如違盟之罰公子騑趨進曰天禍鄭國使介居二大國之間注介猶間也音義介音界注同猶間音間厠之間又如字大國不加德音而亂以要之注謂以兵亂之力强要鄭音義要一遙反注强要下要人要盟皆同强其丈反使其鬼神不獲歆其禋祀其民人不獲享其土利夫婦辛苦墊隘無所底告注墊隘猶委頓底至也音義歆許今反墊丁念反隘於懈反底音㫖自今日既盟之後鄭國而不唯有禮與彊可以庇民者是從而敢有異志者亦如之注亦如此盟音義底必利反荀偃曰改載書注子駟亦以所言載於策故欲改之公孫舍之曰昭大神要言焉注要誓以告神若可改也大國亦可叛也知武子謂獻子曰我實不德而要人以盟豈禮也哉非禮何以主盟姑盟而退修德息師而來終必獲鄭何必今日我之不德民將棄我豈唯鄭若能休和逺人將至何恃於鄭乃盟而還注遂兩用載書音義休許虯反晉人不得志於鄭以諸侯復伐之十二月癸亥門其三門注三門鄟門師之梁北門也癸亥月五日晉果三分其軍各攻一門音義復扶又反閏月戊寅濟于陰阪侵鄭注以長歷參校上下此年不得有閏月戊寅戊寅是十二月二十日疑閏月當為門五日五字上與門合為閏則後學者自然轉日為月晉人三番四軍更攻鄭門門各五日晉各一攻鄭三受敵欲以苦之癸亥去戊寅十六日以癸亥始攻攻輒五日凡十五日鄭故不服而去明日戊寅濟于陰阪復侵鄭外邑陰阪洧津音義閏月依注讀為門五日阪音反又扶板反番芳元反更音庚復扶又反洧于軌反疏正義曰杜以長歷推之此年無閏故知此閏字當為門五又月當為日也晉人分四軍為三番以二番為待楚之備一番以攻鄭之門一番一門以癸亥初攻每門五日積十五日欲以苦鄭而來楚也楚不敢來鄭猶不服至明日戊寅濟于陰阪復侵鄭外邑而後歸也鄭都洧水之旁故知陰阪洧津也衛氏難云案昭二十年朔旦冬至其年云閏月戊辰殺宣姜又二十二年云閏月取前城竝不應有閏而傳稱閏是史之錯失不必皆在應閏之限杜豈得云此年不得有閏而改為門五日也若然閏月殺宣姜閏月取前城皆為門五日乎秦氏釋云以傳云三分四軍又云十二月癸亥門其三門既言三分則三分攻門計癸亥至戊寅十六日番别攻門五日三五十五日明日戊寅濟于陰阪上下符合故杜為此解蘇氏又云案長歷襄十年十一月丁未是二十四日十一年四月己亥是十九日據丁未至己亥一百七十三日計十年十一月之後十一年四月之前除兩箇殘月唯置四箇整月用日不盡尚餘二十九日故杜為長歷於十年十二月後置閏既十年有閏明九年無閏也次于陰口而還注陰口鄭地名子孔曰晉師可擊也師老而勞且有歸志必大克之子展曰不可注傳言子展能守信公送晉侯晉侯以公宴于河上問公年季武子對曰會于沙隨之歲寡君以生注沙隨在成十六年晉侯曰十二年矣是謂一終一星終也注歲星十二歲而一周天疏正義曰直言一星終知是歲星者以古今歷書推步五星金水日行一度土三百七十七日行星十二度火七百八十日行星四百一十五度四者皆不得十二年而一終唯木三百九十八日行星三十三度十二年而彊一周舉其大數十二年而一終故知是歲星國君十五而生子冠而生子禮也注冠成人之服故必冠而後生子音義冠古亂反注下皆同君可以冠矣大夫盍為冠具武子對曰君冠必以祼享之禮行之注祼謂灌鬯酒也享祭先君也音義盍户臘反祼古亂反灌古亂反疏正義曰周禮大宗伯以肆獻祼享先王鬱人凡祭祀之祼事和鬱鬯以實彝而陳之鄭𤣥云鬱鬱金香草也鬯釀秬為酒芬香條暢於上下也築鬱金煮之以和鬯酒郊特牲云灌用鬯臭鄭𤣥云灌謂以圭瓚酌鬯始獻神也然則祼即灌也故云祼謂灌鬯酒也祼是祭初之禮故舉之以表祭也周禮祭人鬼曰享故云享祭先君也劉炫云冠是大禮當遍羣廟以金石之樂節之注以鐘磬為舉動之節以先君之祧處之注諸侯以始祖之廟為祧音義祧他雕反疏正義曰冠是嘉禮之大者當祭以告神故有祼享之禮以祭祀也國君無故不徹縣故有金石之樂行冠禮之時為舉動之節也冠必在廟故先君之祧處之也既行祼享祭必有樂所言金石節之謂冠時之樂非祭祀之樂也諸侯之冠禮亡唯有士冠禮在耳其禮亦行事於廟而不為祭祀士無樂可設而唯處祧同耳士冠必三加始加緇布冠次加皮辨次加爵辨公則四大戴禮公冠篇於士三冠後更加𤣥冕是也案此傳文則諸侯十二加冠也文王十三生伯邑考則十二加冠親迎于渭用天子禮則天子十二冠也晉語柯陵會趙武冠見范文子冠時年十六七則大夫十六冠也士庶則二十而冠故曲禮云二十曰弱冠是也注正義曰祭法云遠廟為祧天子有二祧鄭𤣥云祧之言祧也超上去意也諸侯無祧聘禮云不腆先君之祧是謂始祖廟也聘禮注云天子七廟文武為祧諸侯五廟則祧始祖也是亦廟也言祧者祧尊而廟親待賓客者上尊者然則彼以始祖之尊故特言祧耳昭元年傳云敢愛豐氏之祧大夫之廟亦以祧言之是尊之意也不待至魯而假於衛者及諸侯賓客未散故也今寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衛冠于成公之廟注成公今衛獻公之曾祖從衛所處疏正義曰成公是獻公曾祖衛世家文也服䖍以成公是衛之曾祖即云祧謂曾祖之廟也曾祖之廟何以獨有祧名王制大夫三廟一昭一穆與太祖之廟為三鄭之豐氏豈得立曾祖之廟乎而亦謂之祧也杜意從衛所處意在排舊說也以晉悼欲速故寄衛廟而假鐘磬其祼享之禮歸魯乃祭耳假鐘磬焉禮也楚子伐鄭注與晉成故子駟將及楚平子孔子蟜曰與大國盟口血未乾而背之可乎子駟子展曰吾盟固云唯彊是從今楚師至晉不我救則楚彊矣盟誓之言豈敢背之且要盟無質神弗臨也注質主也疏正義曰質之為主以意言耳無正訓也晉云唯晉命是聽鄭云唯彊是從二辭俱以告神是其無定主也服䖍云質成也無忠誠之信故神弗臨也所臨唯信信者言之瑞也注瑞符也善之主也是故臨之注神臨之明神不蠲要盟注蠲潔也背之可也乃及楚平公子罷戎入盟同盟于中分注中分鄭城中里名罷戎楚大夫音義罷音皮徐音彼中分竝如字徐音丁仲反疏正義曰言入盟是入城盟也入城而言盟地知是城內里名楚莊夫人卒注共王母王未能定鄭而歸晉侯歸謀所以息民魏絳請施舍注施恩惠舍勞役輸積聚以貸注輸盡也音義積子賜反下同聚才住反貸他代反自公以下茍有積者盡出之國無滯積注散在民亦無困人注不匱乏公無禁利注與民共亦無貪民注禮讓行祈以幣更注不用牲賓以特牲注務崇省音義省所景反器用不作注因仍舊車服從給注足給事也行之期年國乃有節三駕而楚不能與爭注三駕三興師謂十年師於牛首十一年師於向其秋觀兵於鄭東門自是鄭遂服音義期音基本亦作朞向舒亮反春秋左傳注疏卷三十春秋左氏傳注疏卷三十考證公會晉侯宋公衛侯鄭伯曹伯齊世子光救陳臣浩按公羊榖梁經曹伯下有莒子邾子滕子薛伯傳君子謂楚共王於是不刑劉敞曰傳言壬夫貪殺之當也何謂不刑乎解經若此取舍安從臣照按劉敞之論蓋亦謂左氏自作史斷而託諸君子云爾夫使非其時君子實有此論左氏自以為君子而著其論于聖筆之後厠之國史䇿間謬妄已極尚何問其論之當否乎夫左傳紀事之書也紀當時君子之論云然即以知世風之升降後儒妄規左氏之過何未之思耶傳君子是以知季文子之忠於公室也趙汸補注曰行父殺適立庶專國政傳舍大惡録小善亦當時流俗之論臣照按趙汸之論亦是未悟左氏之意斥左氏同于當時流俗之論不知左氏所記者正當時流俗之論也傳晉人以鄫故來討臣召南按莒鄫同列于戚之會莒人敢于滅鄫魯固有不救之罪矣晉為盟主既不能討又不能絶明年會鄬莒子亦與焉以是知悼公復霸原不足以紹文公之烈也傳陳無宇獻萊宗器于襄宮注無宇桓子陳完𤣥孫完監本訛作桓今改正傳遷萊于郳趙汸曰傳言滅又言遷則所遷者其族屬人民與經言遷紀郱鄑郚同非必其君鄭伯髠頑如會未見諸侯丙戌卒于鄵注實為子駟所弒萬斯大曰隱行其弒外赴止云不祿史官從而書卒春秋烏得而更之傳得詳其事者其同謀之人久而漸露其姦本國之史乃稍得存之紀載春秋之學有必待傳而明者此其是歟傳是故啓蟄而郊郊而後耕注耕謂春分臣召南按注云啓蟄夏正建寅之月疏引釋例曰正月節立春啓蟄為中氣二月節驚蟄春分為中氣此古時節氣也禮記鄭注云夏小正正月啓蟄漢始亦以驚蟄為正月中疏曰漢時立春為正月節驚蟄為正月中雨水為二月節春分為二月中前漢之末劉歆作三統歷改驚蟄為二月節然則不以啓蟄名節自漢初已然矣傳今譬於草木寡君在君君之臭味也林堯叟曰如草木香氣滋味之同者傳令隧正納郊保臣浩按七年傳叔仲昭伯為隧正注曰隧正主役徒則此隧正亦主役徒也周禮遂人之官魯宋二國猶沿其舊傳工正出車疏與工正書服書監本訛作義今改正傳令司宮巷伯警宫疏司宮當天子之內小臣也司宮監本訛作官司今改正又疏王之正內五人監本訛作主之王內五人今改正傳古之火正或食於心或食於咮臣召南按漢書五行志載春秋說曰古之火正謂火官也掌祭火星行火政季春昏心星出東方而咮七星鳥首正在南方則用火季秋星入則止火以順天時救民疾帝嚳則有祝融堯時有閼伯民賴其德死則以為火祖配祭火星故曰或食於心或食於咮也據此則閼伯主辰是食於心者其食於咮即祝融也鶉火為南方正位其帝炎帝其神祝融栁星張為周分野是祝融食於咮之明證孔疏謂火官配食其人蓋多不知誰食於心誰食於咮豈祝融閼伯二人外别有火祖耶傳始往而筮之遇艮之八臣照按易以變者為占六者隂變陽也九者陽變陰也周易皆止于一爻變其二爻變以下皆無辭大抵皆觀彖也惟此傳五爻變而六二一爻不變命之為艮之隨曰遇艮之八則五爻變之占法猶可考焉周易固如是非雜用連山歸藏也且下文固云隨元亨利貞無咎矣安在其用連山歸藏耶傳元體之長也八句臣照按此與孔子文言大同小異穆姜在孔子之前安得預言之或謂四德之語蓋先聖先師之所傳而孔子述之葉夢得則直謂此為卜筮家之僞託而左氏妄信之春秋左氏傳注疏卷三十考證
