body:
  text: 春秋左傳注疏卷五十七起哀公元年盡五年晉杜氏注唐陸德明音義孔穎達疏哀公音義陸曰哀公名蔣定公之子蓋夫人定姒所生敬王二十八年即位諡法恭仁短折曰哀疏同上經元年春王正月公即位注無傳楚子陳侯隨侯許男圍蔡注隨世服於楚不通中國吳之入楚昭王奔隨隨侯免之卒復楚國楚人德之使列於諸侯故得見經定六年鄭滅許此復見者蓋楚封之音義見賢遍反下同此復扶又反疏注正義曰僖二十年楚人伐隨自爾以來隨不復見以隨世服於楚為楚私屬不通於諸侯征伐盟會不齒於列故史不得書之猶如邾滕為人私屬不序於宋盟也定四年保護昭王楚得復國楚人感其恩德使隨列於諸侯今楚帥諸侯圍蔡令隨在其班次以之告魯故得見經定六年鄭滅許以許男斯歸殺之此時許復見者以許屬楚故疑蓋楚封之當如蔡侯廬陳侯吳受封於楚也世族譜許男斯之後有元公成悼公孫則是楚封元公為許男也鼷鼠食郊牛改卜牛夏四月辛巳郊注無傳書過也不言所食非一處音義處昌慮反疏注正義曰桓五年傳例云凡祀啓蟄而郊過則書今以四月始郊已入春分之氣故書過也宣三年郊牛之口傷成七年鼷鼠食郊牛角言其傷食之處此不言所食處者所食非一處也秋齊侯䘙侯伐晉冬仲孫何忌帥師伐邾注無傳傳元年春楚子圍蔡報伯舉也注在定四年里而栽注栽設板築為圍壘周匝去蔡城一里音義栽才代反又音再注同說文云築牆長版壘力軌反匝子合反疏注正義曰築牆立版謂之栽栽者豎木以約版也楚慮外人救蔡則於表裏受敵故築圍壘周匝去蔡城一里以圍之欲置兵其內以攻蔡使外人不得救之廣丈高倍注壘厚一丈高二丈音義廣古曠反高倍竝如字高又古報反注同厚戶豆反夫屯晝夜九日注夫猶兵也壘未成故令人在壘裏屯守蔡音義屯徒門反夫兵也屯守也令力呈反疏注正義曰劉炫云杜言夫猶兵也以壘未成故令人在壘裏屯守蔡然則未築壘前兵豈逺城乎壘成之後兵復出壘乎以圍人夜守常事何言晝夜九日以後兵豈散乎炫以夫屯謂夫役屯聚晝夜不止九日而築壘成耳夫者别有城夫非戰士劉炫以為丁夫築城晝夜九日杜必以夫為兵屯守九日者以屯是城守之名故詩序云屯戌於母家又案傳晉有軘車皆是兵之屯守經籍未有作役之人而為屯守之號者故杜為此解劉妄規杜失非也如子西之素注子西本計為壘當用九日而成蔡人男女以辨注辨别也男女各别係纍而出降音義辨扶免反又方免反别彼列反下同纍力維反降戶江反使疆于江汝之間而還注楚欲使蔡徙國在江水之北汝水之南求田以自安也蔡權聽命故楚師還音義疆居良反疏注正義曰服䖍云蔡使楚進疆於故江國與汝水之間意言蔡割地以賂楚也杜不然者以昭七年傳申無宇云先君文王作僕區之法所以封汝哀十七年傳曰彭仲糞申俘也文王以為令尹實縣申息朝陳蔡封畛於汝則楚於文王之時其竟已至汝水寧於此役蔡始令楚進疆于江汝之間也且汝水江國不可共文故杜以為楚使蔡徙其國都於江北汝水之南自擇疆宇欲令遷都近楚為楚屬國蔡人冀令楚去心雖不肯權宜許之楚還之後蔡更自議已與楚惡不如事吳故請遷於吳以吳為援蔡於是乎請遷于吳注楚既還蔡人更叛楚就吳為明年蔡遷州來傳吳王夫差敗越于夫椒報檇李也注檇李在定十四年夫椒吳郡吳縣西南大湖中椒山音義夫音扶椒又作椒子消反檇李音醉大湖音泰疏注正義曰柱於此注以椒為山名土地名以夫椒為地名以椒必在山旁以山表地耳遂入越越子以甲楯五千保于㑹稽注上會稽山也在會稽山陰縣南音義楯食允反又音允㑹古外反稽古兮反會稽山名丄時掌反使大夫種因吳大宰嚭以行成吳子將許之伍員曰不可臣聞之樹德莫如滋去疾莫如盡昔有過澆殺斟灌以伐斟鄩注澆寒浞子封於過者二斟夏同姓諸侯襄四年傳曰澆用師滅斟灌音義種章勇反嚭普鄙反員音云去疾起呂反本又作去惡過古禾反國名注及下同澆五呌反一音五報反下同斟諸林反灌古亂反鄩音尋浞仕捉反夏戶雅反下注皆同疏注正義曰襄四年傳稱夏之衰也有窮后羿因夏民以代夏政而用寒浞寒浞殺羿因其室而生澆處澆于過是言澆是寒浞之子封於過也二斟夏同姓諸侯夏本紀文也又襄四年傳云澆用師滅斟灌此言殺斟灌者王肅云滅殺也古者滅殺尊卑同名其意言殺其君而滅其國故二文各言其一也賈逵云夏后相依斟灌而國故因殺夏后相也案下句别言滅夏后相王解是也滅夏后相注夏后相啓孫后相失國依於二斟復為澆所滅音義相息亮反注及下注同復扶又反疏注正義曰夏本紀云禹生啓啓生大康大康崩仲康立仲康崩子相立是相為仲康之子啓之孫也書序云大康失邦作五子之歌其經云大康尸位以逸豫乃畋于有洛之表十旬弗反有窮后羿因民弗忍距于河則大康之時羿已權盛能廢大康矣𦙍征云唯仲康肇位四海孔安國云羿廢大康而立其弟仲康為天子仲康羿之所立也仲康崩子相立蓋亦羿立之矣傳言羿因夏民以代夏政蓋於相時羿始自立為天子相於是失國依於二斟及澆滅斟灌相復為澆所滅后緡方娠逃出自竇注后緡相妻娠懷身也音義緡亡巾反娠音震又音身竇音豆歸于有仍注后緡有仍氏女生少康焉為仍牧正注牧官之長音義少詩照反長丁丈反惎澆能戒之注惎毒也戒備也音義惎音忌澆使椒求之注椒澆臣逃奔有虞為之庖正以除其害注虞舜後諸侯也梁國有虞縣庖正掌膳羞之官賴此以得除己害音義庖步交反疏注正義曰尚書堯典云有鰥在下曰虞舜又曰釐降二女于媯汭嬪于虞皇甫謐云嬪于虞因以虞為氏虞今河東大陽縣西山上虞城是也然則舜有天下其代號虞因本河東大陽之虞及周之興封仲雍之後為虞國即彼地是也但舜既襌禹禹封舜後為諸侯雖取虞為國名未必封於河東虞地而梁國有虞縣其地以虞為名疑是夏時虞國杜於地名言有者皆是疑辭言有以示不審也庖正當周禮之庖人謂之為正當是食官之長故為掌膳羞之官也賴此以得除己害得在浞之世不被殺也虞􅋠於是妻之以二姚注􅋠有虞君也虞􅋠自以二女妻少康姚虞姓音義妻七計反姚羊昭反邑諸綸注綸虞邑音義綸音倫有田一成有衆一旅注方十里為成五百人為旅疏注正義曰方十里為成司馬法文也五百人為旅夏官序文也田一成衆一旅言食此一成之地其內有為兵者五百人周禮小司徒云乃井牧其田野鄭衆云井牧者春秋傳所謂井衍沃牧隰臯者也鄭𤣥云隰臯之地九夫為牧二牧而當一井今造都鄙授民田有不易有一易有再易通率二而當一是之謂井牧昔夏少康在虞􅋠有田一成有衆一旅一旅之衆而田一成則井牧之法先古然矣杜解牧隰臯雖與鄭異其授民田二而當一理亦宜然計方十里為方一里者百方一里有九夫之田則十里容九百夫也其一百夫授上地不易者其四百夫授一易二而當一則得為五百夫矣能布其德而兆其謀注兆始以收夏衆撫其官職注襄四年傳曰靡自有鬲氏收二國之燼以滅浞而立少康音義鬲音革燼徐刃反又秦刃反疏注正義曰引此傳者言少康能布恩惠以收夏衆以德撫靡故得用靡遺民滅浞而立之使女艾諜澆注女艾少康臣諜候也音義女如字又音汝艾五蓋反諜音牒使季杼誘豷注豷澆弟也季杼少康子后杼也音義杼直呂反豷許器反遂滅過戈復禹之績注過澆國戈豷國音義過戈竝古禾反之績一本作迹祀夏配天不失舊物注物事也今吳不如過而越大於少康或將豐之不亦難乎注言與越成是使越豐大必為吳難音義難乃旦反句踐能親而務施施不失人注所加惠賜皆得其人音義施始䜴反下同親不棄勞注推親愛之誠則不遺小勞與我同壤而世為仇讐於是乎克而弗取將又存之違天而長寇讐注猶言天與不取音義長丁丈反下同疏注正義曰吳語云越滅吳吳王請行成越王曰昔天以越賜吳而吳不取是也後雖悔之不可食已注食消也已止也疏正義曰言悔恨之深結其心腹不可如食之消止姬之衰也日可俟也注姬吳姓言可計日而待音義俟本又作俟音仕介在蠻夷而長寇讐以是求伯必不行矣弗聽退而告人曰越十年生聚而十年教訓注生民聚財富而後教之音義介音界伯如字又音霸聚才喻反又如字疏注正義曰服䖍云令少者無娶老婦老者無娶少婦女十七不嫁男二十不娶父母有罪也將生子以告與之醫饋之餼也死者釋其征必哭泣葬埋如其子也孺子遊者必餔啜之也非手所種夫人所織不用十年不收於國二十年之外吳其為沼乎注謂吳宮室廢壞當為汚池為二十二年越入吳起本音義沼之兆反汚音烏三月越及吳平吳入越不書吳不告慶越不告敗也注嫌夷狄不與華同故復發傳音義復扶又反夏四月齊侯衛侯救邯鄲圍五鹿注趙稷以邯鄲叛范中行氏之黨也五鹿晉邑音義邯音寒鄲音丹吳之入楚也注在定四年使召陳懷公懷公朝國人而問焉曰欲與楚者右欲與吳者左陳人從田無田從黨注都邑之人無田者隨黨而立不知所與故直從所居田在西者居右在東者居左逢滑當公而進注當公不左不右音義滑于八反曰臣聞國之興也以福其亡也以禍今吳未有福楚未有禍楚未可棄吳未可從而晉盟主也若以晉辭吳若何公曰國勝君亡非禍而何注楚為吳所勝對曰國之有是多矣何必不復小國猶復況大國乎臣聞國之興也視民如傷是其福也注如傷恐驚動其亡也以民為土芥是其禍也注芥草也音義芥古邁反楚雖無德亦不艾殺其民吳日敝於兵暴骨如莽注草之生於廣野莽莽然故曰草莽音義艾魚廢反暴步卜反莽亡黨反而未見德焉天其或者正訓楚也注使懼而改過禍之適吳其何日之有注言今至陳侯從之及夫差克越乃修先君之怨秋八月吳侵陳修舊怨也注傳言吳不修德而修怨所以亡齊侯衛侯會于乾侯救范氏也師及齊師衛孔圉鮮虞人伐晉取棘蒲注魯師不書非公命也孔圉孔蒸鉏曾孫鮮虞狄帥賤故不書音義圉魚呂反蒸之承反鉏仕居反疏注正義曰杜以經書齊衛伐晉傳言四國伐晉故唯解魯與鮮虞不書意也劉炫以齊衛會乾侯救范氏者師相會因而行伐二君親行告伐不告會也行伐之後魯與鮮虞會之齊衛更遣師與同伐也但齊將卑師衆故稱師衛將尊師少故云孔圉後伐四國竝皆不書非獨魯與鮮虞不書也當謂魯師不書非公命餘者不書皆不告義出百塗竝皆通也今知劉非者杜以傳齊侯衛侯止云會乾侯不言伐晉即云師及齊師衛孔圉鮮虞人伐晉與經齊侯衛侯伐晉文相次當以為一鮮虞狄帥賤故略而不書猶邲之戰唐侯從楚而不書平丘之會狄人從晉而不書之類是也劉以為孔圉等更别伐晉魯師不書非公命餘者不告故不書而規杜過非也吳師在陳楚大夫皆懼曰闔廬惟能用其民以敗我於柏舉今聞其嗣又甚焉將若之何子西曰二三子恤不相睦無患吳矣昔闔廬食不二味疏正義曰謂與在下同其好惡不别二為美味也居不重席室不崇壇注平地作室不起壇也音義重直龍反壇徒丹反器不彤鏤注彤丹也鏤刻也音義彤徒冬反鏤魯豆反宮室不觀注觀臺榭音義觀古亂反注同榭音謝舟車不飾衣服財用擇不取費注選取堅厚不尚細靡音義費芳味反在國天有菑癘注癘疾疫也音義菑音災癘本或作天無菑癘疾疫音役疏正義曰在國與在君相對夭有菑癘與下句相連言有菑癘之時親自巡孤寡共其乏困也本或作天無誤耳親巡其孤寡而共其乏困在軍熟食者分而後敢食注必須軍士皆分熟食不敢先食分猶遍也音義共音恭熟食者分如字一讀以分字連下句遍音遍疏注正義曰孫武兵書云軍井未達將不言渴軍竈未炊將不言飢故闔閭在軍如良將之法必須軍士皆分熟食然後敢食王不先自食也服䖍云以其半分軍士而後自食其餘若簞醪注流也社以分王半食不得遍及軍人且所嘗珍異乃得卒乘與焉王所自食不得分軍士也故顯而異之分猶遍也待遍熟食王乃自食也其所嘗者卒乘與焉注所嘗甘珍非常食音義卒子忽反乘繩證反與音預勤恤其民而與之逸勞是以民不罷勞死知不曠注知身死不見曠棄音義罷音吾先大夫子常易之所以敗我也注易猶反也今聞夫差次有臺榭陂池焉注積土為高曰臺有木曰榭過再宿曰次音義陂彼宜反疏注正義曰釋宮云闍謂之臺郭璞云積土四方也又云有木者謂之榭李巡云臺上有屋謂之榭又曰無室曰榭四方而高曰臺莊三年傳例曰凡師一宿為舍再宿為信過信為次孔安國尚書傳云澤鄣曰陂停水曰池言夫差所停三日則役民為此也宿有妃嬙嬪御焉注妃嬙貴者嬪御賤者皆內官音義嬙本又作墻或作牆在羊反嬪毗人反疏注正義曰曲禮云天子之妃曰后則妃上下通名也釋詁云妃合會對也妃嫓也是匹對於夫婦官之最貴者也嬙在妃下次於妃也周禮有九嬪女御以有四名分為二等故言妃嬙貴者嬪御賤者皆婦官之名周禮無嬙蓋後世為之名漢有掖庭王嬙是因於古也一日之行所欲必成玩好必從珍異是聚觀樂是務視民如讎而用之日新夫先自敗也已安能敗我注為二十二年越滅吳起本音義好呼報反夫先自敗也已夫音扶本或作夫差先自敗者非冬十一月晉趙鞅伐朝歌注討范中行氏經二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田注邾人以賂取之易也音義漷火虢反音郭沂魚依反易以䜴反癸巳叔孫州仇仲孫何忌及邾子盟于句繹注句繹邾地取邑盟以要之音義句古侯反繹音亦要以遙反疏注正義曰既取其田慮後悔競故共盟以要之伐則三卿盟唯二卿者服䖍云季孫尊卿敵服先歸使二子與之盟穀梁傳曰三人伐而二人盟何各盟其得也其意言季孫不得田故不與盟也案十四年小邾射以句繹來奔則句繹小邾地也注言邾地者以傳云伐邾邾人愛其土賂以漷沂之田而受盟被伐受盟則盟在邾地猶若成二年楚人伐我師于蜀公及楚公子嬰齊盟于蜀之類是也邾與小邾國竟相近句繹所屬亦無定準猶齊魯汶陽之田莒魯爭鄆之事一彼一此豈有常乎而劉炫以句繹為小邾地而規杜非也夏四月丙子䘙侯元卒注定四年盟臯鼬疏注正義曰元以昭八年即位三十二年大夫盟于狄泉以未告公而公薨故不數滕子來朝注無傳晉趙鞅帥師納衛世子蒯聵于戚疏正義曰世子者父在之名蒯聵父既死矣而稱世子者晉人納之以世子告言是正世子以示宜為君也春秋以其本是世子未得衛國無可褒貶故因而書世子耳秋八月甲戌晉趙鞅帥師及鄭罕達帥師戰于鐡鄭師敗績注皆陳曰戰大崩曰敗績鐵在戚城南罕達子皮孫音義鐵天結反陳直覲反冬十月葬衛靈公注無傳七月而葬緩十有一月蔡遷于州來注畏楚而請遷故以自遷為文蔡殺其大夫公子駟注懷土而欺大國故罪而書名傳二年春伐邾將伐絞注絞邾邑音義絞古卯反邾人愛其土故賂以漷沂之田而受盟初衛侯遊于郊子南僕注子南靈公子郢也僕御也音義郢以井反公曰余無子將立女注蒯聵奔無大子音義女音汝不對他日又謂之對曰郢不足以辱社稷君其改圖君夫人在堂三揖在下注三揖卿大夫士音義揖一人反疏注正義曰周禮司士云孤卿特揖大夫以其等旅揖士旁三揖鄭𤣥云特揖一一揖之旅衆也大夫爵同者衆揖之三揖者士有上中下鄭衆云卿大夫士皆君之所揖禮春秋傳所謂三揖在下服䖍云三揖卿大夫士土揖庶姓時揖異姓天揖同姓君命祗辱注言立適當以禮與內外同之今君私命事必不從適為辱音義祗音支適丁歷反下適孫同夏衛靈公卒夫人曰命公子郢為大子君命也對曰郢異於他子注言用意不同且君沒於吾手若有之郢必聞之注言當以臨沒為正且亡人之子輒在注輒蒯瞶之子出公也靈公適孫乃立輒六月乙酉晉趙鞅納衛大子于戚宵迷陽虎曰右河而南必至焉注是時河北流過元城界戚在河外晉軍已渡河故欲出河右而南疏注正義曰土地名云河經河內之南界東北經汲郡魏郡頓丘陽平平原樂陵之東南入海是言晉時河所經也春秋之時河未必然故云是時河北流過元城界與晉時河道異也土地名又云戚頓丘衛縣西戚城在枯河東是春秋時戚在河東也從晉而言河西為內東為外故云戚在河外也是時晉軍已渡河矣師人皆迷不知戚處陽虎憶其渡處在戚之北河既北流據水所向則東為右故欲出河右而南行也使大子絻注絻者始發喪之服音義絻音問喪音桑疏注正義曰士喪禮既小斂主人括髮袒衆主人免于房鄭𤣥云括髮者去笄纚而紒也衆主人免者齊衰將袒以免代冠冠服之尤尊不以袒也又奔喪之禮至於家入門哭盡哀括髮袒自齊衰以下入門哭盡哀免麻于序東如彼禮文則主人當括髮齊衰以下乃免此大子絻者禮不至喪所不括髮故以絻代之耳靈公以四月卒今以六月而大子絻故云絻始發喪之服也遠近不臨喪者不得括髮故始發喪服絻也鄭𤣥注士喪禮云免之制未聞舊說以為如冠狀廣一寸喪服小記曰斬衰括髮以麻免而以布此用麻布為之狀如今之著慘頭矣自項中而前交於額上卻繞紒也八人衰絰僞自衛逆者注欲為衛人逆故衰絰成服音義衰七雷反絰田結反告於門哭而入遂居之秋八月齊人輸范氏粟鄭子姚子般送之注子姚罕達子般駟𢎞音義般音班士吉射逆之趙鞅禦之遇於戚陽虎曰吾車少以兵車之斾與罕駟兵車先陳注斾先驅車也以先驅車益其兵車以示衆音義陳直覲反下注同罕駟自後隨而從之彼見吾貌必有懼心注晉人先陳鄭人隨之不知其虛實見車多必懼於是乎會之注會合戰必大敗之從之卜戰龜焦注兆不成樂丁曰詩曰爰始爰謀爰契我龜注樂丁晉大夫詩大雅言先人事後卜筮音義契苦計反又苦結反疏正義曰詩大雅綿之篇美大王遷岐之事爰於也既見周原之地肥美可居於是始集豳人從已者於是與謀議人謀既從於是契灼我龜而卜之言先人謀後卜筮也謀協以故兆詢可也注詢咨詢也故兆始納衛大子卜得吉兆言今既謀同可不須更卜音義謀協以故兆絶句詢可也思遒反簡子誓曰范氏中行氏反易天明注不事君也疏正義曰天有尊卑人有上下下事上臣事君法則天之明道臣不事君是反易天之明道也斬艾百姓欲擅晉國而滅其君寡君恃鄭而保焉今鄭為不道棄君助臣二三子順天明從君命經德義除詬耻在此行也克敵者上大夫受縣下大夫受郡注周書作雒篇千里百縣縣有四郡音義艾魚廢反擅市戰反而滅其君滅或作戕音殘詬呼豆反又音茍雒音洛千里百縣縣方百里縣有四郡郡方五十里疏正義曰此經德義與傳經國家詩序經夫婦皆意同也經謂經紀營理之不除君惡則德義廢矣宜經紀德義使不壞也上大夫下大夫謂於大夫之內分為上下其上大夫非卿也此言先無田祿者若能克敵得此賞也注正義曰周禮小司徒云九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都鄭𤣥云邑方二里丘方四里甸方八里旁加一里則方十里為一成縣方二十里都方四十里四都方八十里旁加十里乃得方百里為一同也如彼文則縣方二十里耳周禮又無郡不可用以解此故引周書解之或曰周書者孔子刪尚書之餘今案其存者其文非尚書之類其作雒篇有此言方千里者為方百里者百十里百縣則縣方百里計成方十里出車一乘縣方百里則出車百乘也昭五年傳云晉有四十縣遺守四千乘是縣别有百乘與作雒之言合也上大夫受縣縣則為百乘之家言得進為卿也縣有四郡則郡方五十里下大夫得此方五十里之采邑士田十萬注十萬畝也疏注正義曰王制云方一里者為田九百畝方十里者為方一里者百為田九萬畝則士田十萬為方十里有餘庶人工商遂注得遂進仕人臣𨽻圉免注去厮役音義厮役如字字又作斯音同何休注公羊云艾草為防者曰厮汲水漿者曰役蘇林注漢書云厮取薪者韋昭云析薪曰厮志父無罪君實圖之注志父趙簡子之改名也言已事濟君當圖其賞音義志父音甫服云趙鞅入晉陽以畔後得歸改名志父春秋仍舊猶書趙鞅疏注正義曰牧誓武王誓衆尚自稱名况以人臣誓衆固當自稱名矣知志父是簡子名也簡子名鞅又名志父者服䖍云趙鞅入于晉陽以叛諸侯之策書曰晉趙鞅以叛既復更名志父或當然也楚公子圍弒君取國改名曰䖍經即書䖍公子棄疾弒君取國改名曰居經即書居今趙鞅改名志父經書猶云趙鞅者彼楚子既為國君臣下以所改之名告於鄰國故得書所改之名趙鞅人臣國家不為之諱仍以趙鞅名告故書鞅也鞅言君實圖之言己事濟君當謀其賞也簡子言此君當謀其賞者言君當賞其在下副上所誓之言欲使在下信之非欲自求賞也若其有罪絞縊以戮注絞所以縊人物音義縊一賜反戮音六桐棺三寸不設屬辟注屬辟棺之重數王棺四重君再重大夫一重音義桐棺三寸禮記云夫子制於中都四寸之棺五寸之椁以斯知不欲速朽也鄭康成注云此庶人之制也案禮上大夫棺八寸屬六寸下大夫棺六寸屬四寸無三寸棺制也棺用難朽之木桐木易壞不堪為棺故以為罰墨子尚儉有桐棺三寸不設屬音燭注同次大棺也辟步歷反注同親身棺也禮大夫無辟重直龍反下同王棺四重禮記云水兕革棺被之其厚三寸柂棺一梓棺二柂棺辟也梓棺二屬與大棺也被水牛及兕之革為一重辟為二重屬為三重大棺為四重君再重君謂侯伯子男侯伯以下無革棺屬與辟為一重大棺為再重上公則唯無水革耳兕革與辟為一重屬為再重大棺為三重大夫一重大夫唯屬與大棺為一重今云不設辟者時僭耳非正禮也疏注正義曰禮喪大記云君大棺八寸屬六寸椑四寸上大夫大棺八寸屬六寸下大夫大棺六寸屬四寸是屬辟為棺之重數也大記之文從外向內大棺之內有屬屬之內有椑椑親身之棺鄭𤣥云椑堅著之意也如記文大夫無椑今簡子自言有罪始不設辟者鄭𤣥云趙簡子云不設屬椑時僭也為時僭日久自言無罪則僭設有罪乃不設耳記言士棺六寸檀弓又云夫子為中都宰制四寸之棺五寸之槨鄭𤣥云為民作制民猶四寸簡子言三寸者亦示其罰之重令制度卑於民也記有柂棺梓棺柂謂椵也不以桐為棺簡子言桐棺者鄭𤣥云凡棺用能溼之物梓椵能溼故禮法尚之桐易腐壞亦以桐為罰也檀弓又云天子之棺四重鄭𤣥云尚深邃也諸公三重諸侯再重大夫一重士不重又云水兕革棺被之其厚三寸柂棺一梓棺二四者皆周鄭𤣥云以水牛兕牛之革以為棺被革各厚三寸合六寸也此為一重柂棺一所謂椑棺也梓棺二所謂屬與大棺也檀弓之文自內向外水牛之革一也兕牛之革二也二者相襲乃得為重故以此二者為一重也又有椑也屬也大棺也此是天子四重為數五棺為四重也喪大記之文君有大棺也椑也屬也大夫有大棺也屬也鄭𤣥注檀弓天子之棺四重以是差之上公革棺不被三重也諸侯無革棺再重也大夫無椑一重也士無屬不重也是上公數四棺為三重諸侯數三棺為再重大夫數二棺為一重士以一棺為不重也杜之此注惟無上公士耳其言重數與鄭同也若然禮器云天子葬五重諸侯葬三重大夫葬再重以多為貴也彼重亦當謂棺而其數皆較一者鄭𤣥云天子葬五重者謂抗木與茵也葬者抗木在上茵在下然則茵以藉棺抗為負土天子及諸侯大夫皆數彼以增棺數故皆多較一也杜言此棺之重數者以明不設屬辟為罰也素車朴馬注以載柩音義朴普卜反柩其又反疏正義曰素車無飾謂不以翣柳飾車也曲禮云大夫去國為位而哭乘髦馬鄭𤣥云髦馬不鬄落也則此朴馬亦謂不鬄落用此以載柩也雜記稱士喪有與天子同者三其終夜燎及乘人專道而行然則柩皆人挽用此車馬載者禮言乘人設法許之耳道遠者當用牛馬且此言亦為罰也無入于兆注兆葬域疏正義曰周禮冢人云凡死于兵者不入兆域鄭𤣥云戰敗無勇投諸塋外以罰之此言不入兆域亦罰也下卿之罰也注為衆設賞自設罰所以能克敵音義為于僞反甲戌將戰郵無恤御簡子衛大子為右注郵無恤王良也音義郵音尤疏注正義曰下云子良授綏是也服䖍云王良也孟子說王良善御之事古者車駕四馬御之為難故為六藝之一王良之善御最有名於書傳多稱之楚辭云當世豈無騏驥兮誠無王良之善御見執轡者非其人兮故駒跳而遠去登鐵上注鐵丘名望見鄭師衆大子懼自投于車下子良授大子綏而乘之曰婦人也注言其怯音義怯去業反疏正義曰曲禮云凡僕人之禮必授人綏論語稱孔子上車必正立執綏而升綏者挽以上車之索故授之使之升也少儀云僕者右帶劔負良綏申之面拖諸幦鄭𤣥云面前也幦覆苓也良綏君綏也負之由左肩上入右腋下申之於前覆苓上也簡子巡列曰畢萬匹夫也七戰皆獲有馬百乘死於牖下注畢萬晉獻公卿也皆獲有功死於牖下言得壽終音義乘繩證反牖羊九反疏正義曰襄二十七年傳云唯卿備百邑注云一乘之邑也坊記云家富不過百乘百乘卿之極制也檀弓云飯於牖下小斂於戶內大斂於阼殯於客位祖於庭葬於墓所以即遠也則禮之正法死於牖下羣子勉之死不在寇注言有命繁羽御趙羅宋勇為右注三子晉大夫羅無勇麇之注麇束縳也音義麇丘隕反注同吏詰之御對曰痁作而伏注痁瘧疾也音義詰起吉反痁詩占反瘧魚略反衛大子禱曰曾孫蒯聵敢昭告皇祖文王注周文王皇大也音義禱丁老反一音丁報反烈祖康叔注烈顯也文祖襄公注繼業守文故曰文祖蒯瞶襄公之孫疏正義曰禮於曾柤以上皆稱曾孫此雖竝告三祖對文王康叔稱曾孫也晉語說此事於襄公之下又有昭考靈公國語與傳異者多矣此下云無作三祖羞是無昭考也鄭勝亂從注勝鄭聲公名釋君助臣為從於亂晉午在難注午晉定公名音義難乃旦反下注為難同不能治亂使鞅討之注鞅簡子名蒯聵不敢自佚備持矛焉注戎右持矛音義佚音逸矛亡侯反敢告無絶筋無折骨無靣傷以集大事無作三祖羞注集成也音義筋居銀反大命不敢請佩玉不敢愛注不敢愛故以祈禱疏正義曰上言無絶筋無折骨謂軍之士衆無令傷損以成大事此云大命不敢請者謂已之身命不敢私請苟以求生佩玉不敢愛尚書金縢稱周公植璧秉圭以告大王王季文王是禱請用玉也在軍無圭璧故以佩鄭人擊簡子中肩斃于車中注斃踣也音義中肩丁仲反斃婢世反本亦作弊踣蒲北反獲其蜂旗注蜂旗旗名音義蜂芳恭反大子救之以戈鄭師北獲溫大夫趙羅注羅無勇故鄭師雖北猶獲羅大子復伐之鄭師大敗獲齊粟千車趙孟喜曰可矣注趙孟簡子也喜大子前怯今更勇音義復扶又反傅叟曰雖克鄭猶有知在憂未艾也注傅叟簡子屬也言知氏將為難後竟有晉陽之患音義叟素口反又作叟有知音智艾魚廢反又五蓋反初周人與范氏田公孫龍稅焉注龍范氏臣為范氏收周人所與田之稅音義龍武江反稅始鋭反為于僞反下文為其注同趙氏得而獻之注得龍以獻簡子吏請殺之趙孟曰為其主也何罪正而與之田注還其所稅及鐵之戰以徒五百人宵攻鄭師取蜂旗於子姚之幕下獻曰請報主德追鄭師姚般公孫林殿而射前列多死注晉前列音義幕音莫姚般子姚子般殿丁電反射食亦反趙孟曰國無小注言雖小國猶有善射者既戰簡子曰吾伏韜嘔血注韜弓衣嘔吐也音義韜吐刀反嘔本又作咎烏口反吐他露反鼓音不衰今日我上也注我功為上大子曰吾救主於車退敵於下我右之上也郵良曰我兩靷將絶吾能止之注止使不絶音義靷以刃反我御之上也駕而乘材兩靷皆絶注材橫木明細小也傳言簡子不讓下自伐疏正義曰古之駕四馬者服馬夾轅其頸負軛兩驂在旁挽靷助之詩所謂陰靷鋈續是也說文云靷引軸也僖二十八年注云在胸曰靷然則此皮約馬胸而引車軸也兩靷將絶而能制焉言其御之和也駕而乘材材謂橫地細小之木也乘小木而靷絶示其將絶之驗也吳泄庸如蔡納聘而稍納師師畢入衆知之注元年蔡請遷于吳中悔故因聘襲之音義泄息列反一音息引反未詳中丁仲反蔡侯告大夫殺公子駟以說注殺駟以說吳言不時遷駟之為哭而遷墓注將遷與先君辭故哭冬蔡遷于州來經三年春齊國夏衛石曼姑帥師圍戚注曼姑為子圍父知其不義故推齊使為兵首戚不稱衛非叛人音義曼音萬為于僞反疏注正義曰春秋行兵征伐自非霸主之命諸國共行皆以主兵為首此圍戚實出衛意引齊使之助已計應曼姑為首而序在齊下者曼姑為子圍父知其不義推齊使為兵首故先書齊也穀梁傳曰此衛事也其先國夏何也子圍父也是先儒及杜皆同穀梁之說也宋魚石去而復入據宋之彭城襄元年經言圍宋彭城傳曰非宋地追書也於是為宋討魚石故稱宋且不登叛人也此蒯聵在戚齊衛圍之與圍宋彭城事類同矣彭城稱宋此不稱衛者蒯聵據戚與輒爭國非是叛人故不須繫之衛也公羊傳曰齊國夏曷為與衛石曼姑帥師圍戚伯討也此其為伯討奈何曼姑受命乎靈公而立輒以曼姑之義為固可以距之也輒者曷為者也蒯聵之子也然則曷為不立蒯聵而立輒蒯聵為無道靈公逐蒯聵而立輒然則輒之義可以立乎曰可其可奈何不以父命辭王父命以王父命辭父命是父之行乎子也不以家事辭王事以王事辭家事是上之行乎下也其意言靈公廢蒯聵不用使之得國輒不以國與蒯聵是靈公之命行於蒯聵也立為國君是王事也以國與父是私事也不以國與父是天子之命行於諸侯也如公羊之言則輒義可以距父圍戚不為不義而杜言曼姑知其不義則輒不合距父意與公羊異者據左𫝊公子郢讓國不受然後立輒然則輒之立也以周禮無適子則立適孫緣是以得立耳非有靈公之命使立之也為輒之義自可讓而不受以已是適孫緣有可立之勢貪國以距父耳非有靈公之命天子之勑使之距蒯聵也論語說此事云冉有曰夫子為衛君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨乎出曰夫子不為也孔子意不助輒明是輒為不義故曼姑自知不義推齊為主夏四月甲午地震注無傳五月辛卯桓宮僖宮災注天火曰災季孫斯叔孫州仇帥師城啓陽注無傳魯黨范氏故懼晉比年四城啓陽今琅邪開陽縣宋樂髠帥師伐曹注無傳音義髠苦孫反秋七月丙子季孫斯卒蔡人放其大夫公孫獵于吳注無傳公子駟之黨冬十月癸卯秦伯卒注無傳不書名未同盟叔孫州仇仲孫何忌帥師圍邾注無傳傳三年春齊衛圍戚求援于中山注中山鮮虞夏五月辛卯司鐸火注司鐸宮名音義鐸待洛反疏注正義曰僖二十年西宮災書之此不書者西宮公之西宮親近逼君忽被天火故重而書之此司鐸雖是公小宮在公宮之後非君來往之急又是人火所以輕而不書或可舉廟重以略之火踰公宮桓僖災注桓公僖公廟疏正義曰傳言火而經書災者司鐸初被人火火越宮而至廟以火踰宮故以災言之救火者皆曰顧府注言常人愛財南宮敬叔至命周人出御書俟於宫注敬叔孔子弟子南宮閲周人司周書典籍之官御書進於君者也使待命於宮音義閲音悅曰庀女而不在死注庀具也音義庀匹婢反女音汝子服景伯至命宰人出禮書注景伯子服何也宰人家宰之屬以待命命不共有常刑注待求之命音義共音恭校人乘馬巾車脂轄注校人掌馬巾車掌車乘馬使四四相從為駕之易音義校戶校反注及下同乘繩證反注及下皆同轄戶瞎反本又作轄同為于僞反易以豉反百官官備府庫愼守官人肅給注國有火災恐有變難故愼為備音義難乃旦反濟濡帷幕鬱攸從之注鬱攸火氣也濡物於水出用為濟音義濟子細反又子禮反注同帷位悲反幕音莫攸音由蒙葺公屋注以濡物冒覆公屋音義葺七入反一音子入反自大廟始外內以悛注悛次也先尊後卑以次救之音義悛大全反助所不給有不用命則有常刑無赦公父文伯至命校人駕乘車注乘車公車季桓子至御公立于象魏之外注象魏門闕命救火者傷人則止財可為也命藏象魏注周禮正月縣教令之法于象魏使萬民觀之故謂其書為象魏音義縣音𤣥疏注正義曰周禮大宰云正月之吉始和布治于邦國都鄙乃縣治象之法于象魏使萬民觀治象浹日而斂之鄭𤣥云正月周之正月吉謂朔日大宰以正月朔日布王治之事於天下至正歲又書而縣于象魏使萬民觀焉凡治有故言始和者若改造云爾鄭衆云從甲至癸謂之浹日凡十日其地官夏官秋官皆有此言地官云布教縣教象夏官云布政縣政象秋官云布刑縣刑象各縣所掌之事為異其文悉同唯春官不縣者以禮法一頒百事皆足不可又縣故不縣之杜總彼意言縣教令之法彼所縣者皆是教令之事故也由其縣于象魏故謂其書為象魏命藏其書也彼言朔日縣之十日即斂之則救火之時其書久已藏矣而此立象魏之外方始命藏此書者象魏是縣書之處見其處而念及其書非始就縣處斂藏之曰舊章不可亡也富父槐至曰無備而官辦者猶拾瀋也注槐富父終生之後瀋汁也言不備而責辦不可得音義父音甫槐音懷官辦辦具之辦注竝同拾音十瀋尺審反北土呼汁為瀋於是乎去表之槀注表表火道風所向者去其槀積音義去起呂反注同槀古老反注同向許亮反積子賜反道還公宮注開除道周匝公宫使火無相連音義還本又作環戶關反又音患注同孔子在陳聞火曰其桓僖乎注言桓僖親盡而廟不毁宜為天所災疏注正義曰禮諸侯親廟四焉高祖之父即當毁其廟計桓之於哀八世祖也僖六世祖也親盡而廟不毁言其宜為天所災也所以不毁者服䖍云季氏出桓公又為僖公所立故不毁其廟其意或然公羊傳曰此皆毁廟也其言災何復立也曷為不言其復立春秋見者不復見也何以不言及敵也其意言哀公更立之不可通於左氏故以為元不毁耳服䖍又云俱在迭毁故不言及杜無說或當同時災無先後故不言及劉氏范氏世為㛰姻注劉氏周卿士范氏晉大夫萇𢎞事劉文公注為之屬大夫故周與范氏趙鞅以為討注責周與范氏六月癸卯周人殺萇𢎞注終違天之禍疏正義曰文公以定四年卒也為之屬大夫謂當昭公之世也此時文公以卒萇𢎞知政以已先事劉子劉氏又與范氏親至握國權遂與范氏故周人殺之以說於晉秋季孫有疾命正常曰無死注正常桓子之寵臣欲付以後事故敕命勿從已死音義令力呈反南孺子之子男也則以告而立之注南孺子季桓子之妻言若生男告公而立之音義孺如住反女也則肥也可注肥康子也季孫卒康子即位既葬康子在朝注在公朝也南氏生男正常載以如朝告曰夫子有遺言命其圉臣曰南氏生男則以告於君與大夫而立之今生矣男也敢告遂奔衛康子請退注退辟位也公使共劉視之注共劉魯大夫音義共音恭則或殺之矣乃討之注討殺者召正常正常不反注畏康子也傳備言季氏家事疏正義曰服䖍云召而問兒死意然則兒於正常去後始死死非正常得知召之復何所問也當欲問不立康子之意故正常畏康子不反冬十月晉趙鞍圍朝歌師于其南注范中行所在荀寅伐其郛汪伐其北郭圍音義郛芳夫反使其徒自北門入已犯師而出注荀寅使在外救已之徒擊趙氏圍之北門因外內攻得出疏正義曰荀寅從內伐其北郭之郛又使其救已之徒自外伐圍郛之北門而入因外內攻故得出也癸丑奔邯鄲十一月趙鞅殺士臯夷惡范氏也注惡范氏而殺其族言遷怒音義惡烏路反注同經四年春王二月庚戌盜殺蔡侯申注賤者故稱盜不言弒其君賤盜也音義盜殺申志反蔡侯申今本皆如此案宣十七年蔡侯申卒是文侯也今昭侯是其𤣥孫不容與高祖同名未詳何者誤也疏正義曰宣十七年蔡侯申卒是文侯也蔡世家云文侯申生景侯固固生靈侯般般生隱太子今昭侯申是隱太子之子杜世族譜亦然計昭侯是文侯𤣥孫乃與髙祖同名周人以諱事神二申必有誤者俱是經文未知孰誤注正義曰公孫辰公孫姓公孫霍雖竝是弒君之黨而非弒君之首首是公孫翩翩賤故稱盜不言弒其君者賤此盜也盜賤不得有其君故以盜為文不得言弒其君蔡公孫辰出奔吳注弒君賊之黨故書名葬秦惠公注無傳宋人執小邾子注無傳邾子無道於其民故稱人以執夏蔡殺其大夫公孫姓公孫霍注皆弒君黨音義姓音生又作主或一音性晉人執戎蠻子赤歸于楚注晉恥為楚執諸侯故稱人以告若蠻子不道於其民也赤本屬楚故言歸音義恥為于僞反城西郛注無傳魯西郭備晉也六月辛丑亳社災注無傳天火也亳社殷社諸侯有之所以戒亡國音義亳步洛反疏注正義曰傳例曰天火曰災知天火也殷有天下作都于亳故知亳社殷社也蓋武王伐紂以其社班賜諸侯使各各立之所以戒亡國也其社有屋故火得焚之公羊傳曰蒲社者何亡國之社也社者封也其言災何亡國之社蓋掩之掩其上而柴其下榖梁傳曰亳社者亳之社也亳亡國也亡國之社以為廟屏戒也其屋亡國之社不得逹上也說者以為立亳社於廟門之外以為屏蔽使人君視之而致戒也左𫝊稱間于兩社事當為然郊特牲亦云喪國之社屋之不受天陽故災其屋也秋八月甲寅滕子結卒注無傳同盟於臯鼬冬十有二月葬蔡昭公注無傳亂故是以緩葬滕頃公注無傳傳四年春蔡昭侯將如吳諸大夫恐其又遷也承注承音懲蓋楚言音義懲直升反疏注正義曰懲創往年之遷恐其更復遷徙承懲音相近蓋是楚人之言聲轉而字異耳公孫翩逐而射之入於家人而卒注翩蔡大夫音義翩音篇射食亦反下同疏正義曰言將如吳已適吳矣翩在路逐而殺之遂入于凡人之家言此者說其非理之意以兩矢門之衆莫敢進注翩以矢自守其門文之鍇後至注鍇蔡大夫音義鍇音楷又音皆又客駭反曰如牆而進多而殺二人注併行如牆俱進音義併步頂反鍇執弓而先翩射之中肘鍇遂殺之故逐公孫辰而殺公孫姓公孫旴注旴即霍也音義中丁仲反肘竹九反旴况于反夏楚人既克夷虎注夷虎蠻夷叛楚者乃謀北方左司馬眅申公壽餘葉公諸梁致蔡於負函注三子楚大夫也此蔡之故地人民楚因以為邑致之者會其衆也音義眅普版反字林匹姦反葉始涉反函音咸致方城之外於繒關注負函繒關皆楚地音義繒才陵反曰吳將泝江入郢注逆流曰泝音義泝音素郢以井反又以政反將奔命焉為一昔之期襲梁及霍注僞辭當備吳夜結期明日便襲梁霍使不知之梁河南梁縣西南故城也梁南有霍陽山皆蠻子之邑也單浮餘圍蠻氏蠻氏潰注浮餘楚大夫音義單音善潰戶內反蠻子赤奔晉陰地注陰地河南山北自上雒以東至陸渾音義渾戶門反司馬起豐析與狄戎注楚司馬眅也析縣屬南鄉郡析南有豐鄉皆楚邑發此二邑人及戎狄音義析星歷反注同以臨上雒左師軍于菟和注菟和山在上雒東也音義菟音徒右師軍于倉野注倉野在上雒縣使謂陰地之命大夫士蔑注命大夫别縣監尹音義監古銜反疏注正義曰陰地者河南山北東西橫長其間非一邑也若是典邑大夫則當以邑冠之乃言陰地之命大夫則是特命大夫使總監陰地故以為别縣監尹也以其去國遙遠别為置監楚官稱尹故以尹言之曰晉楚有盟好惡同之若將不廢寡君之願也不然將通於少習以聽命注少習商縣武關也將大開武關道以伐晉音義少詩照反又如字士蔑請諸趙孟趙孟曰晉國未寧安能惡於楚必速與之注未寧時有范中行之難音義難乃旦反士蔑乃致九州之戎注九州戎在晉陰地陸渾者將裂田以與蠻子而城之注以詐蠻子且將為之卜注卜城音義為于僞反下注同蠻子聽卜遂執之與其五大夫以畀楚師于三戶注今丹水縣北三戶亭音義畀必利反與也司馬致邑立宗焉以誘其遺民注楚復詐為蠻子作邑立其宗主音義復扶又反而盡俘以歸秋七月齊陳乞弦施衛寧跪救范氏注陳乞僖子弦施弦多音義跪其委反庚午圍五鹿注五鹿晉邑九月趙鞅圍邯鄲冬十一月邯鄲降荀寅奔鮮虞趙稷奔臨注臨晉邑音義降戶江反十二月弦施逆之遂墮臨疏正義曰稷初奔臨欲據臨距國今弦施逆稷欲納之他邑以臨險固故毁之會鮮虞納荀寅于柏人注晉邑也今趙國柏人縣也弦施與鮮虞會也經五年春城毗注無傳備晉也音義毗頻夷反夏齊侯伐宋注無傳晉趙鞅帥師伐衛秋九月癸酉齊侯杵臼卒注再同盟也音義杵昌呂反臼求又反疏注正義曰襄二十五年崔杼弒莊公而立杵臼昭二十六年盟于鄟陵定四年于臯鼬是再同盟也昭三十二年大夫盟于狄泉未告公而公薨故不數也冬叔還如齊閏月葬齊景公注無傳傳五年春晉圍柏人荀寅士吉射奔齊初范氏之臣王生惡張柳朔言諸昭子使為柏人注為柏人宰也昭子范吉射也音義惡烏路反下同柳良久反昭子曰夫非而讎乎對曰私讎不及公注公家之事也音義夫音扶好不廢過惡不去善義之經也臣敢違之及范氏出注出柏人奔齊音義好呼報反去起呂反張柳朔謂其子爾從主勉之我將止死王生授我矣注授我死節吾不可以僭之遂死於柏人注為吉射距晉戰死音義僭子念反後同為于僞反夏趙鞅伐衛范氏之故也遂圍中牟注衛助范氏故也齊燕姬生子不成而死注燕姬景公夫人不成未冠也音義燕於賢反冠古唤反諸子鬻姒之子荼嬖注諸子庶公子也鬻姒景公妾荼安孺子音義鬻音育姒音似荼音舒又音徒又文加反嬖必計反諸大夫恐其為大子也言於公曰君之齒長矣未有大子若之何公曰二三子間於憂虞則有疾疢亦姑謀樂何憂於無君注景公意欲立荼而未發故以此言塞大夫請音義長丁丈反間音間又音間厠之間又如字疢勑覲反本或作疹乃結反樂音洛疏正義曰公謂羣臣云若閒暇於憂虞謂國無憂虞事得閒暇則恐有疾疢不得歡樂今既無憂虞又無疾疢亦且謀樂何憂乎無君公疾使國惠子高昭子立荼注惠子國夏昭子高張置羣公子於萊注萊齊東鄙邑音義置之豉反羣或作諸萊音來秋齊景公卒冬十月公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔注皆景公子在萊者音義黔巨亷反又音琴鉏仕居反萊人歌之曰景公死乎不與埋三軍之事乎不與謀師乎師乎何黨之乎注師衆也黨所也之往也稱諡蓋葬後而為此歌哀羣公子失所音義與音預下同埋亡皆反疏注正義曰師衆之往釋詁文也周禮五百家為黨言其共居一所故以黨為名是黨為所也經書閏月葬齊景公長歷閏十一月禮葬乃有諡此歌稱諡明是葬後傳言冬十月者記公子出奔之月其萊人之歌在公子出奔之後杜以文承十月之下故云蓋耳公羊以為喪以閏數謂通數閏月榖梁云不正其閏也謂喪事不數左氏無傳未知所從鄭駟秦富而侈嬖大夫而常陳卿之車服於其庭鄭人惡而殺之子思曰詩曰不解于位民之攸暨注子思子産子國參也詩大雅攸所也暨息也音義侈昌氏反又尺氏反惡烏路反解佳賣反暨音許器反疏正義曰詩大雅嘉樂之篇也言在上者不解惰于其位民之所以得安息駟秦棄位僭上是惰于位也不守其位而能久者鮮矣商頌曰不僭不濫不敢怠皇命以多福注僭差也濫溢也皇暇也言駟秦違詩商頌故受禍音義鮮息淺反濫力暫反溢音逸疏正義曰啇頌殷武之篇歌成湯之德不僭差不濫溢不敢怠惰而自暇以此之故上天命以多福也詩於怠皇之下更云命于下國封建厥福傳言命以多福不復具引詩文取其意而言之也杜云違詩啇頌上言詩下言頌以駟秦於此二詩皆違故言違詩與商頌春秋左傳注疏卷五十七春秋左氏傳注疏卷五十七考證楚子陳侯隨侯許男圍蔡疏則是楚封元公為許男也元公監本訛作近公今改正傳邑諸綸臣召南按後漢郡國志梁國虞有綸城少康邑傳能布其德而兆其謀以收夏衆撫其官職金履祥曰夏衆即帝丘二斟之遺民靡收二國之燼亦其助也官職夏之士大夫播遷者若遺臣靡之類是也傳而越大於少康臣召南按伍員所以引夏少康之事者以越為少康之後也會稽之甲楯五千大于一成一旅多矣傳取棘蒲臣召南按杜氏不注棘蒲所在漢功臣陳武封棘蒲侯注家亦不知所在也蔡遷于州來臣召南按州來即漢之下蔡縣也地理志云沛郡下蔡故州來國為楚所滅後吳取之至夫差遷昭侯於此後四世侯齊竟為楚所滅傳克敵者上大夫受縣下大夫受郡注千里百縣縣有四郡千監本訛作十今改正又疏縣有四郡則郡方五十里臣召南按古者縣大郡小以縣統郡此文是也至戰國以後乃更以郡統縣杜佑通典曰春秋時縣大郡小至戰國則郡大而縣小故甘茂曰宜陽大縣其實郡也傳下卿之罰也臣召南按此役簡子將兵必已為上卿故其自誓以下卿之罰傳孔子在陳聞火曰其桓僖乎臣召南按漢書五行志曰董仲舒劉向以為此二宮不當立違禮者也桓季氏之所出僖使季氏世卿者也是服䖍所本以為說也傳趙鞅以為討臣照按萇𢎞王室大夫有志于强王室即右范氏趙鞅焉得而討之周人殺萇𢎞以說于晉不競甚矣而其時君子以萇𢎞為自取謂為違天大義之不明如此然三年化碧忠血猶存使後世莫不知其為忠則春秋之教也使後世知萇𢎞之事云何時人之論萇𢎞云何則左氏之功也後儒每以其時繆悠之論屬之邱明不知邱明紀事者也非斷事者也傳趙鞅殺士臯夷惡范氏也臣召南按臯夷即知韓魏所欲以代范氏者也使知躒猶在鞅必不敢殺臯夷傳于定哀間記事甚略是以知躒之卒知瑶之代皆無明文宋人執小邾子注邾子無道于其民推尋文義應作小邾子無道于其民各本俱脫一小字傳為一昔之期昔監本訛作備今改正傳使謂陰地之命大夫士蔑注命大夫别縣監尹臣召南按注不過言蔑以命大夫監治陰地耳非從楚之官名為尹也尚書立政曰三亳阪尹此監尹之說也孔疏楚官稱尹故以尹言之謬矣晉大夫肯從楚官名乎傳諸子鬻姒之子荼嬖史記齊世家作寵妾芮姬生子荼春秋左氏傳注疏卷五十七考證
